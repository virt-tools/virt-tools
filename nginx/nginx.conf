server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Force revalidation of HTML/JS/CSS so newly added tools show up for
    # returning visitors (ETag still allows cheap 304 responses). Vendored
    # libraries are stable and may be cached longer.
    location ~* \.(html|js|css)$ {
        add_header Cache-Control "no-cache";
    }

    # Feedback API is proxied to the Flask service. The rest is static
    # (all tools run client-side for privacy).
    location /api/ {
        proxy_pass http://api:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Pretty handling of /tools/<slug>/ and /feedback/ (serve index.html).
    location / {
        try_files $uri $uri/ =404;
    }
}