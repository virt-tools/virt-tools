<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <script src="assets/theme-init.js"></script>
  <title>Virtual Tools — free, private, browser-based utilities</title>
  <meta name="description" content="A collection of free browser-based tools that run locally and preserve your privacy.">
  <link rel="stylesheet" href="assets/style.css">
</head>
<body>
  <div id="site-header"></div>
  <main>
    <div class="hero">
      <h1>Virtual Tools</h1>
      <p>Free, browser-based utilities for common computing tasks. Everything here runs in your browser — your data never leaves your device. <a href="feedback/">Send feedback or suggest a tool</a>.</p>
      <div class="search-box">
        <input type="text" id="tool-search" placeholder="Search tools…" autocomplete="off">
      </div>
    </div>
    <div class="view-tabs" role="tablist" aria-label="Catalog view">
      <button class="view-tab active" type="button" role="tab" aria-selected="true" data-view="all">All tools</button>
      <button class="view-tab" type="button" role="tab" aria-selected="false" data-view="recent">Recently added</button>
    </div>
    <p class="note" id="search-empty" hidden>No tools match your search.</p>
    <div id="tool-catalog"></div>
  </main>
  <script src="assets/tools.js"></script>
  <script src="assets/app.js"></script>
</body>
</html>
