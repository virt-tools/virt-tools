<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <script src="/assets/theme-init.js"></script>
  <title>Feedback — Virtual Tools</title>
  <link rel="stylesheet" href="/assets/style.css">
</head>
<body>
  <div id="site-header"></div>
  <main>
    <div class="tool-header">
      <a class="back" href="/">← All tools</a>
      <h1>Feedback &amp; Suggestions</h1>
      <p>Send anonymous feedback about a tool, report a bug, or suggest a new tool. No name, no email, no tracking.</p>
    </div>

    <!-- Submit form -->
    <div class="panel feedback-form" id="submit-panel">
      <div class="field">
        <label for="kind">Type</label>
        <select id="kind">
          <option value="feedback">General feedback</option>
          <option value="suggestion">Suggest a new tool / feature</option>
          <option value="bug">Bug report</option>
        </select>
      </div>
      <div class="field">
        <label for="tool">Related tool (optional)</label>
        <input type="text" id="tool" placeholder="e.g. QR Code Generator">
      </div>
      <div class="field">
        <label for="message">Your message</label>
        <textarea id="message" placeholder="Tell me what you think…"></textarea>
      </div>
      <button id="submit-btn">Submit feedback</button>
      <p class="note" id="submit-err"></p>
    </div>

    <!-- Status view (shown after submit or when ?id= is present) -->
    <div class="panel" id="status-panel" hidden>
      <h2 style="margin-top:0;">Feedback status</h2>
      <p class="muted">Keep this ID to check back later. It is the only way to view your submission.</p>
      <label>Your feedback ID</label>
      <div class="uuid-box" id="status-uuid"></div>
      <div class="spacer"></div>
      <label>Status</label>
      <p><span class="status-badge" id="status-badge">received</span></p>
      <label>Reply from the developer</label>
      <div class="output" id="status-reply"></div>
      <p class="note" id="status-note"></p>
    </div>

    <!-- Lookup an existing submission -->
    <div class="spacer"></div>
    <div class="panel">
      <h2 style="margin-top:0;">Check an existing submission</h2>
      <div class="row">
        <input type="text" id="lookup-id" placeholder="Paste your feedback ID (UUID)">
        <button id="lookup-btn">Check status</button>
      </div>
      <p class="note" id="lookup-err"></p>
    </div>
  </main>

  <script src="/assets/app.js"></script>
  <script>
  (function () {
    var submitPanel = document.getElementById("submit-panel");
    var statusPanel = document.getElementById("status-panel");
    var statusUuid = document.getElementById("status-uuid");
    var statusBadge = document.getElementById("status-badge");
    var statusReply = document.getElementById("status-reply");
    var statusNote = document.getElementById("status-note");

    function setStatus(data) {
      statusUuid.textContent = data.uuid;
      statusBadge.textContent = data.status;
      statusBadge.className = "status-badge status-" + data.status;
      statusReply.textContent = data.reply || "(no reply yet — check back later)";
      statusNote.textContent = "Submitted " + (data.created_at || "") + (data.updated_at ? " · updated " + data.updated_at : "");
      submitPanel.hidden = true;
      statusPanel.hidden = false;
    }

    function loadStatus(id) {
      fetch("/api/feedback/" + id).then(function (r) {
        if (!r.ok) throw new Error("not found");
        return r.json();
      }).then(function (data) {
        setStatus(data);
        history.replaceState(null, "", "/feedback/?id=" + id);
      }).catch(function () {
        document.getElementById("lookup-err").textContent = "No feedback found for that ID.";
      });
    }

    // Auto-load if ?id= present
    var params = new URLSearchParams(location.search);
    var existingId = params.get("id");
    if (existingId) loadStatus(existingId);

    document.getElementById("submit-btn").addEventListener("click", function () {
      var err = document.getElementById("submit-err");
      err.textContent = "";
      var body = {
        kind: document.getElementById("kind").value,
        tool: document.getElementById("tool").value,
        message: document.getElementById("message").value,
      };
      if (!body.message.trim()) { err.textContent = "Please enter a message."; return; }
      var btn = this; btn.disabled = true;
      fetch("/api/feedback", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(body),
      }).then(function (r) {
        if (!r.ok) return r.json().then(function (j) { throw new Error(j.error || "error"); });
        return r.json();
      }).then(function (data) {
        loadStatus(data.uuid);
      }).catch(function (e) {
        err.textContent = "Could not submit: " + e.message;
      }).finally(function () { btn.disabled = false; });
    });

    document.getElementById("lookup-btn").addEventListener("click", function () {
      var id = document.getElementById("lookup-id").value.trim();
      var err = document.getElementById("lookup-err");
      err.textContent = "";
      if (!id) return;
      loadStatus(id);
    });
  })();
  </script>
</body>
</html>
