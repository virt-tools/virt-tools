<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <script src="/assets/theme-init.js"></script>
  <title>CSV / JSON Converter — Virtual Tools</title>
  <link rel="stylesheet" href="/assets/style.css">
</head>
<body>
  <div id="site-header"></div>
  <main>
    <div class="tool-header">
      <a class="back" href="/">← All tools</a>
      <h1>CSV / JSON Converter</h1>
      <p>Convert between CSV and JSON in your browser. Handles quoted fields, embedded delimiters and newlines. Nothing is uploaded.</p>
    </div>

    <div class="panel">
      <div class="row">
        <div>
          <label for="mode">Direction</label>
          <select id="mode">
            <option value="csv2json" selected>CSV → JSON</option>
            <option value="json2csv">JSON → CSV</option>
          </select>
        </div>
        <div>
          <label for="delim">Delimiter</label>
          <select id="delim">
            <option value="," selected>Comma</option>
            <option value=";">Semicolon</option>
            <option value="\t">Tab</option>
            <option value="|">Pipe</option>
          </select>
        </div>
        <div id="hdr-wrap">
          <label class="check" style="margin-top:18px;">
            <input type="checkbox" id="hdr" checked> <span id="hdr-label">First row is header</span>
          </label>
        </div>
        <div id="indent-wrap">
          <label for="indent">JSON indent</label>
          <select id="indent">
            <option value="2" selected>2 spaces</option>
            <option value="4">4 spaces</option>
            <option value="\t">Tab</option>
            <option value="">Compact</option>
          </select>
        </div>
      </div>

      <div class="spacer"></div>
      <div class="md-split">
        <div class="field">
          <label for="in" id="in-label">CSV input</label>
          <textarea id="in" placeholder="name,age,city&#10;Ada,36,London&#10;Linus,55,Portland" style="min-height:300px;"></textarea>
        </div>
        <div class="field">
          <div class="row" style="justify-content:space-between;">
            <label for="out" id="out-label">JSON output</label>
            <button id="copy" class="secondary" style="padding:4px 10px;">Copy</button>
          </div>
          <textarea id="out" readonly style="min-height:300px;" placeholder="Output appears here…"></textarea>
        </div>
      </div>

      <div class="spacer"></div>
      <div class="row">
        <button id="convert">Convert</button>
        <button id="swap" class="secondary">Use output as input</button>
        <button id="download" class="secondary">Download</button>
        <button id="clear" class="secondary">Clear</button>
      </div>
      <p class="note" id="note"></p>
    </div>
  </main>

  <script src="/assets/app.js"></script>
  <script>
  (function () {
    var mode = document.getElementById("mode");
    var delim = document.getElementById("delim");
    var hdr = document.getElementById("hdr");
    var hdrLabel = document.getElementById("hdr-label");
    var indent = document.getElementById("indent");
    var hdrWrap = document.getElementById("hdr-wrap");
    var indentWrap = document.getElementById("indent-wrap");
    var inEl = document.getElementById("in");
    var out = document.getElementById("out");
    var inLabel = document.getElementById("in-label");
    var outLabel = document.getElementById("out-label");
    var convertBtn = document.getElementById("convert");
    var swap = document.getElementById("swap");
    var download = document.getElementById("download");
    var clear = document.getElementById("clear");
    var copy = document.getElementById("copy");
    var note = document.getElementById("note");

    function delimChar() {
      var v = delim.value;
      return v === "\\t" ? "\t" : v;
    }
    function indentStr() {
      var v = indent.value;
      if (v === "\\t") return "\t";
      if (v === "") return undefined; // compact
      return parseInt(v, 10);
    }
    function setNote(msg, bad) {
      note.textContent = msg || "";
      note.style.color = bad ? "var(--bad)" : "var(--text-dim)";
    }

    function syncMode() {
      var csv2json = mode.value === "csv2json";
      inLabel.textContent = csv2json ? "CSV input" : "JSON input";
      outLabel.textContent = csv2json ? "JSON output" : "CSV output";
      hdrLabel.textContent = csv2json ? "First row is header" : "Include header row";
      hdrWrap.style.display = "";
      indentWrap.style.display = csv2json ? "" : "none";
      inEl.placeholder = csv2json
        ? "name,age,city\nAda,36,London\nLinus,55,Portland"
        : '[\n  {"name":"Ada","age":36,"city":"London"},\n  {"name":"Linus","age":55}\n]';
    }

    /* ---- CSV parser (RFC-4180-ish: quoted fields, doubled quotes, embedded
            delimiters and newlines) ----------------------------------------- */
    function parseCSV(text, d) {
      var rows = [], row = [], field = "", inQuotes = false, i = 0, n = text.length;
      while (i < n) {
        var c = text[i];
        if (inQuotes) {
          if (c === '"') {
            if (text[i + 1] === '"') { field += '"'; i += 2; }
            else { inQuotes = false; i++; }
          } else { field += c; i++; }
        } else {
          if (c === '"') { inQuotes = true; i++; }
          else if (c === d) { row.push(field); field = ""; i++; }
          else if (c === "\r" || c === "\n") {
            row.push(field); rows.push(row); row = []; field = "";
            if (c === "\r" && text[i + 1] === "\n") i += 2; else i++;
          } else { field += c; i++; }
        }
      }
      if (field.length > 0 || row.length > 0) { row.push(field); rows.push(row); }
      // Drop a single trailing empty row produced by a final newline.
      if (rows.length && rows[rows.length - 1].length === 1 && rows[rows.length - 1][0] === "" && /[\r\n]$/.test(text)) {
        rows.pop();
      }
      return rows;
    }

    function csv2json(text) {
      var d = delimChar();
      var rows = parseCSV(text, d);
      if (!rows.length) return "[]";
      var data;
      if (hdr.checked) {
        var headers = rows.shift() || [];
        data = rows.map(function (r) {
          var obj = {};
          headers.forEach(function (h, idx) {
            var key = h !== "" ? h : ("field_" + (idx + 1));
            obj[key] = r[idx] !== undefined ? r[idx] : "";
          });
          // Extra cells beyond the header get generated keys.
          for (var idx = headers.length; idx < r.length; idx++) {
            obj["field_" + (idx + 1)] = r[idx];
          }
          return obj;
        });
      } else {
        data = rows;
      }
      return JSON.stringify(data, null, indentStr() || undefined);
    }

    function csvCell(v, d) {
      var s;
      if (v === null || v === undefined) s = "";
      else if (typeof v === "object") s = JSON.stringify(v);
      else s = String(v);
      if (/[\"\r\n]/.test(s) || s.indexOf(d) !== -1) {
        return "\"" + s.replace(/"/g, "\"\"") + "\"";
      }
      return s;
    }

    function json2csv(text) {
      var d = delimChar();
      var parsed;
      try { parsed = JSON.parse(text); }
      catch (e) { throw new Error("Invalid JSON: " + e.message); }
      if (parsed === null || typeof parsed !== "object") {
        throw new Error("JSON must be an array or object.");
      }
      var arr = Array.isArray(parsed) ? parsed : [parsed];
      // Decide header keys: union of object keys (first-seen order).
      var isObjects = arr.length && arr.every(function (x) { return x && typeof x === "object" && !Array.isArray(x); });
      var keys = [];
      if (isObjects) {
        arr.forEach(function (o) { Object.keys(o).forEach(function (k) { if (keys.indexOf(k) === -1) keys.push(k); }); });
      }
      var lines = [];
      if (hdr.checked && keys.length) {
        lines.push(keys.map(function (k) { return csvCell(k, d); }).join(d));
      }
      arr.forEach(function (row) {
        var cells;
        if (isObjects) {
          cells = keys.map(function (k) { return csvCell(row[k], d); });
        } else if (Array.isArray(row)) {
          cells = row.map(function (v) { return csvCell(v, d); });
        } else {
          cells = [csvCell(row, d)];
        }
        lines.push(cells.join(d));
      });
      return lines.join("\r\n");
    }

    function doConvert() {
      setNote("");
      var text = inEl.value;
      if (!text.trim()) { out.value = ""; setNote("Enter some input to convert."); return; }
      try {
        out.value = mode.value === "csv2json" ? csv2json(text) : json2csv(text);
        setNote(mode.value === "csv2json" ? "Converted to JSON." : "Converted to CSV.");
      } catch (e) {
        out.value = "";
        setNote(e.message, true);
      }
    }

    function doDownload() {
      if (!out.value) { setNote("Nothing to download yet — convert first.", true); return; }
      var isJson = mode.value === "csv2json";
      var mime = isJson ? "application/json" : "text/csv";
      var ext = isJson ? "json" : "csv";
      var blob = new Blob([out.value], { type: mime });
      var url = URL.createObjectURL(blob);
      var a = document.createElement("a");
      a.href = url; a.download = "converted." + ext;
      document.body.appendChild(a); a.click(); a.remove();
      URL.revokeObjectURL(url);
    }

    // ---- wiring ----
    mode.addEventListener("change", syncMode);
    convertBtn.addEventListener("click", doConvert);
    swap.addEventListener("click", function () {
      if (!out.value) { setNote("Output is empty — convert first.", true); return; }
      inEl.value = out.value;
      // Flip direction so re-converting is meaningful.
      mode.value = mode.value === "csv2json" ? "json2csv" : "csv2json";
      syncMode();
      doConvert();
    });
    download.addEventListener("click", doDownload);
    clear.addEventListener("click", function () { inEl.value = ""; out.value = ""; setNote(""); inEl.focus(); });
    copy.addEventListener("click", function () {
      if (!out.value) return;
      var done = function () { copy.textContent = "Copied!"; setTimeout(function () { copy.textContent = "Copy"; }, 1200); };
      if (navigator.clipboard && navigator.clipboard.writeText) navigator.clipboard.writeText(out.value).then(done);
      else { var ta = out; ta.select(); try { document.execCommand("copy"); done(); } catch (e) {} }
    });
    // Ctrl/Cmd+Enter converts from the input.
    inEl.addEventListener("keydown", function (e) {
      if ((e.ctrlKey || e.metaKey) && e.key === "Enter") { e.preventDefault(); doConvert(); }
    });

    syncMode();
  })();
  </script>
</body>
</html>
