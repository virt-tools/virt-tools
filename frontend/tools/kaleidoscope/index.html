<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="/assets/theme-init.js"></script>
<title>Kaleidoscope — Virtual Tools</title>
<link rel="stylesheet" href="/assets/style.css">
<style>
.tool-wrap{max-width:600px;margin:0 auto;text-align:center;}
.tool-desc{font-size:14px;color:var(--text-secondary,#aaa);margin:8px 0;}
canvas{border-radius:50%;cursor:crosshair;background:#000;margin:12px auto;display:block;max-width:100%;height:auto;}
.controls{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin:8px 0;}
.controls button{padding:8px 20px;border-radius:6px;border:1px solid var(--border,#444);background:var(--bg-alt,#1a1f2e);color:var(--text,#eee);cursor:pointer;font-size:14px;}
.controls button:hover{background:var(--accent,#5b8def);color:#fff;}
.palette{display:flex;gap:6px;justify-content:center;margin:8px 0;}
.swatch{width:28px;height:28px;border-radius:50%;cursor:pointer;border:2px solid transparent;}
.swatch.active{border-color:#fff;transform:scale(1.15);}
label{font-size:14px;color:var(--text-secondary,#aaa);}
input[type=range]{vertical-align:middle;}
</style>
</head>
<body>
<header id="site-header"></header>
<main>
<div class="tool-wrap">
<h1>Kaleidoscope 🌀</h1>
<p class="tool-desc">Draw symmetric patterns with mirror symmetry. Adjust segments (2-16), brush size, and color. Touch and drag to create.</p>
<canvas id="cv" width="500" height="500"></canvas>
<div class="palette" id="pal"></div>
<div class="controls">
<label>Segments: <input type="range" id="segs" min="2" max="16" value="8" oninput="document.getElementById('segVal').textContent=this.value"><span id="segVal">8</span></label>
<label>Brush: <input type="range" id="brush" min="1" max="20" value="4" oninput="document.getElementById('brushVal').textContent=this.value"><span id="brushVal">4</span></label>
<button onclick="clearCanvas()">🗑️ Clear</button>
<button onclick="savePNG()">💾 Save PNG</button>
</div>
</div>
</main>
<script src="/assets/app.js"></script>
<script>
const cv=document.getElementById('cv'),ctx=cv.getContext('2d');
const COLORS=['#ff006e','#fb5607','#ffbe0b','#8338ec','#3a86ff','#06ffa5','#ff006e','#fb5607','#ffbe0b','#8338ec','#3a86ff','#06ffa5'];
let color='#3a86ff',drawing=false,lastX=0,lastY=0;
function initPal(){const p=document.getElementById('pal');COLORS.forEach((c,i)=>{const s=document.createElement('div');s.className='swatch'+(i===4?' active':'');s.style.background=c;s.onclick=()=>{color=c;document.querySelectorAll('.swatch').forEach(x=>x.classList.remove('active'));s.classList.add('active');};p.appendChild(s);});}
function clearCanvas(){ctx.fillStyle='#000';ctx.fillRect(0,0,cv.width,cv.height);}
function draw(x,y){const cx=cv.width/2,cy=cv.height/2;const segs=parseInt(document.getElementById('segs').value);const r=parseInt(document.getElementById('brush').value);const dx=x-lastX,dy=y-lastY;const dist=Math.sqrt(dx*dx+dy*dy);const steps=Math.max(1,Math.floor(dist/2));for(let i=0;i<=steps;i++){const t=i/steps;const px=lastX+dx*t,py=lastY+dy*t;const a=Math.atan2(py-cy,px-cx);const d=Math.sqrt((px-cx)**2+(py-cy)**2);for(let s=0;s<segs;s++){const ang=a+(Math.PI*2/segs)*s;const sx=cx+Math.cos(ang)*d,sy=cy+Math.sin(ang)*d;ctx.beginPath();ctx.arc(sx,sy,r,0,Math.PI*2);ctx.fillStyle=color;ctx.globalAlpha=0.6;ctx.fill();const ang2=-a+(Math.PI*2/segs)*s;const sx2=cx+Math.cos(ang2)*d,sy2=cy+Math.sin(ang2)*d;ctx.beginPath();ctx.arc(sx2,sy2,r,0,Math.PI*2);ctx.fill();}}ctx.globalAlpha=1;lastX=x;lastY=y;}
function pos(e){const r=cv.getBoundingClientRect();const sx=cv.width/r.width,sy=cv.height/r.height;const t=e.touches?e.touches[0]:e;return{x:(t.clientX-r.left)*sx,y:(t.clientY-r.top)*sy};}
cv.addEventListener('mousedown',e=>{drawing=true;const p=pos(e);lastX=p.x;lastY=p.y;draw(p.x,p.y);});
cv.addEventListener('mousemove',e=>{if(!drawing)return;const p=pos(e);draw(p.x,p.y);});
cv.addEventListener('mouseup',()=>drawing=false);
cv.addEventListener('mouseleave',()=>drawing=false);
cv.addEventListener('touchstart',e=>{e.preventDefault();drawing=true;const p=pos(e);lastX=p.x;lastY=p.y;draw(p.x,p.y);});
cv.addEventListener('touchmove',e=>{e.preventDefault();if(!drawing)return;const p=pos(e);draw(p.x,p.y);});
cv.addEventListener('touchend',()=>drawing=false);
function savePNG(){const a=document.createElement('a');a.download='kaleidoscope.png';a.href=cv.toDataURL();a.click();}
clearCanvas();initPal();
</script>
</body>
</html>
