<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="/assets/theme-init.js"></script>
<title>Word Search Maker — Virtual Tools</title>
<link rel="stylesheet" href="/assets/style.css">
<style>
.tool-wrap{max-width:800px;margin:0 auto;}
.tool-desc{font-size:14px;color:var(--text-secondary,#aaa);margin:8px 0;}
.section{background:var(--bg-alt,#1a1f2e);border-radius:8px;padding:16px;margin:12px 0;}
label{display:block;font-size:13px;color:var(--text-secondary,#aaa);margin:4px 0;}
input[type=text],textarea{width:100%;padding:8px;border-radius:6px;border:1px solid var(--border,#444);background:var(--bg,#0d1117);color:var(--text,#eee);font-family:inherit;font-size:14px;box-sizing:border-box;}
textarea{min-height:80px;resize:vertical;}
.controls{display:flex;gap:8px;flex-wrap:wrap;margin:8px 0;}
button{padding:10px 20px;border-radius:6px;border:1px solid var(--border,#444);background:var(--accent,#5b8def);color:#fff;cursor:pointer;font-size:14px;}
button:hover{opacity:0.85;}
button.secondary{background:var(--bg-alt,#1a1f2e);color:var(--text,#eee);}
.grid-wrap{overflow-x:auto;margin:12px 0;}
table{border-collapse:collapse;margin:0 auto;}
td{width:32px;height:32px;text-align:center;font-family:monospace;font-size:16px;font-weight:bold;border:1px solid var(--border,#333);position:relative;cursor:pointer;user-select:none;}
td.found{background:var(--accent,#5b8def);color:#fff;}
td.found-rev{background:#e8743b;color:#fff;}
.word-list{display:flex;flex-wrap:wrap;gap:6px;margin:8px 0;}
.word-chip{padding:4px 12px;border-radius:20px;background:var(--bg-alt,#1a1f2e);font-size:13px;color:var(--text,#eee);}
.word-chip.found{text-decoration:line-through;opacity:0.5;background:#2d5a2d;}
.result{font-size:14px;color:var(--text,#eee);margin:8px 0;}
.hint{font-size:12px;color:var(--text-secondary,#888);margin:2px 0;}
.preset{display:flex;gap:6px;flex-wrap:wrap;margin:8px 0;}
.preset button{padding:6px 12px;font-size:12px;}
</style>
</head>
<body>
<header id="site-header"></header>
<main>
<div class="tool-wrap">
<h1>Word Search Maker 🔍</h1>
<p class="tool-desc">Create custom word search puzzles from your own word list. Words can be placed horizontally, vertically, or diagonally — some reversed!</p>
<div class="section">
<label for="words">Words (one per line, or comma-separated):</label>
<textarea id="words" placeholder="CAT&#10;DOG&#10;FISH&#10;BIRD">CAT
DOG
FISH
BIRD
TREE
BOOK
STAR
MOON</textarea>
<label for="size">Grid size: <span id="sizeVal">12</span></label>
<input type="range" id="size" min="8" max="20" value="12" style="width:200px">
<div class="preset">
<span class="hint">Presets:</span>
<button class="secondary" onclick="loadPreset('animals')">Animals</button>
<button class="secondary" onclick="loadPreset('fruits')">Fruits</button>
<button class="secondary" onclick="loadPreset('space')">Space</button>
<button class="secondary" onclick="loadPreset('colors')">Colors</button>
</div>
<div class="controls">
<button onclick="generate()">Generate Puzzle</button>
<button class="secondary" onclick="clearPuzzle()">Clear</button>
<button class="secondary" onclick="printPuzzle()">Print</button>
</div>
</div>
<div class="section" id="puzzleSection" style="display:none;">
<h3 style="margin:0 0 8px;">Find these words:</h3>
<div class="word-list" id="wordList"></div>
<div class="grid-wrap"><table id="grid"></table></div>
<div class="result" id="result"></div>
<p class="hint">Click and drag across letters to select a word. Found words are highlighted.</p>
</div>
</div>
</main>
<script src="/assets/app.js"></script>
<script>
const presets={animals:['CAT','DOG','FISH','BIRD','HORSE','TIGER','EAGLE','WHALE','SHARK','MOUSE'],fruits:['APPLE','BANANA','ORANGE','GRAPE','MANGO','PEACH','LEMON','MELON','CHERRY','PLUM'],space:['STAR','MOON','COMET','PLANET','GALAXY','ORBIT','ROCKET','MARS','VENUS','EARTH'],colors:['RED','BLUE','GREEN','YELLOW','PURPLE','ORANGE','PINK','BROWN','BLACK','WHITE']};
function loadPreset(name){document.getElementById('words').value=presets[name].join('\n');}
const DIRS=[[0,1],[1,0],[1,1],[-1,1],[0,-1],[1,-1],[-1,0],[-1,-1]];
let grid=[],words=[],found=new Set(),size=12,selStart=null,selCells=[];
function parseWords(){const t=document.getElementById('words').value;return t.split(/[\n,]/).map(w=>w.trim().toUpperCase().replace(/[^A-Z]/g,'')).filter(w=>w.length>=2&&w.length<=size);}
function place(g,w){const tries=100;for(let i=0;i<tries;i++){const d=DIRS[Math.floor(Math.random()*DIRS.length)];const maxR=d[0]<0?size:d[0]>0?size-w.length+1:size;const maxC=d[1]<0?size:d[1]>0?size-w.length+1:size;const minR=d[0]<0?w.length-1:0;const minC=d[1]<0?w.length-1:0;const r=Math.floor(Math.random()*(maxR-minR))+minR;const c=Math.floor(Math.random()*(maxC-minC))+minC;let ok=true,cells=[];for(let j=0;j<w.length;j++){const rr=r+d[0]*j,cc=c+d[1]*j;if(rr<0||rr>=size||cc<0||cc>=size){ok=false;break;}const ex=g[rr][cc];if(ex&&ex!==w[j]){ok=false;break;}cells.push([rr,cc]);}if(ok){cells.forEach(([rr,cc],j)=>g[rr][cc]=w[j]);return true;}}return false;}
function generate(){size=+document.getElementById('size').value;document.getElementById('sizeVal').textContent=size;words=parseWords();if(words.length===0){alert('Enter at least one word (2+ letters).');return;}grid=Array.from({length:size},()=>Array(size).fill(''));const placed=[];words.forEach(w=>{if(place(grid,w))placed.push(w);});words=placed;fillRandom();render();document.getElementById('puzzleSection').style.display='block';found.clear();updateResult();}
function fillRandom(){const A='ABCDEFGHIJKLMNOPQRSTUVWXYZ';for(let r=0;r<size;r++)for(let c=0;c<size;c++)if(!grid[r][c])grid[r][c]=A[Math.floor(Math.random()*26)];}
function render(){const tbl=document.getElementById('grid');tbl.innerHTML='';for(let r=0;r<size;r++){const tr=tbl.insertRow();for(let c=0;c<size;c++){const td=tr.insertCell();td.textContent=grid[r][c];td.dataset.r=r;td.dataset.c=c;td.addEventListener('mousedown',startSel);td.addEventListener('mouseenter',extendSel);td.addEventListener('touchstart',startSelT,{passive:true});}}document.getElementById('wordList').innerHTML=words.map(w=>`<span class="word-chip" data-w="${w}">${w}</span>`).join('');updateResult();}
let dragging=false;
function startSel(e){dragging=true;selStart=[+this.dataset.r,+this.dataset.c];clearSel();this.style.outline='2px solid var(--accent,#5b8def)';selCells=[selStart];}
function startSelT(e){const t=e.touches[0];const td=document.elementFromPoint(t.clientX,t.clientY);if(td&&td.tagName==='TD'){dragging=true;selStart=[+td.dataset.r,+td.dataset.c];clearSel();selCells=[selStart];}}
function extendSel(e){if(!dragging)return;const r=+this.dataset.r,c=+this.dataset.c;clearSel();const dr=Math.sign(r-selStart[0]),dc=Math.sign(c-selStart[1]);const len=Math.max(Math.abs(r-selStart[0]),Math.abs(c-selStart[1]));selCells=[];for(let i=0;i<=len;i++){const rr=selStart[0]+dr*i,cc=selStart[1]+dc*i;if(rr<0||rr>=size||cc<0||cc>=size)break;selCells.push([rr,cc]);const cell=document.querySelector(`td[data-r="${rr}"][data-c="${cc}"]`);if(cell)cell.style.outline='2px solid var(--accent,#5b8def)';}}
document.addEventListener('mouseup',endSel);
function clearSel(){document.querySelectorAll('td[style*="outline"]').forEach(td=>td.style.outline='');}
function endSel(){if(!dragging)return;dragging=false;const w=selCells.map(([r,c])=>grid[r][c]).join('');const wr=w.split('').reverse().join('');let matched=null;if(words.includes(w)&&!found.has(w))matched=w;else if(words.includes(wr)&&!found.has(wr))matched=wr;if(matched){found.add(matched);selCells.forEach(([r,c])=>{const td=document.querySelector(`td[data-r="${r}"][data-c="${c}"]`);if(td)td.classList.add(w===matched?'found':'found-rev');});const chip=document.querySelector(`.word-chip[data-w="${matched}"]`);if(chip)chip.classList.add('found');}clearSel();updateResult();}
function updateResult(){const rem=words.length-found.size;document.getElementById('result').textContent=`${found.size}/${words.length} found — ${rem} remaining`;}
function clearPuzzle(){document.getElementById('puzzleSection').style.display='none';grid=[];words=[];found.clear();}
function printPuzzle(){window.print();}
document.getElementById('size').addEventListener('input',e=>document.getElementById('sizeVal').textContent=e.target.value);
</script>
</body>
</html>
