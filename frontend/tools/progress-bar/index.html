<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="/assets/theme-init.js"></script>
<title>CSS Progress Bar Generator — Virtual Tools</title>
<link rel="stylesheet" href="/assets/style.css">
<style>
.tool-wrap{max-width:680px;margin:0 auto;}
.tool-desc{font-size:14px;color:var(--text-secondary,#aaa);margin:8px 0 20px;}
.controls{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin:12px 0;}
.ctrl{display:flex;flex-direction:column;gap:4px;}
.ctrl label{font-size:12px;color:var(--text-secondary,#888);}
.ctrl input,.ctrl select{padding:6px 8px;border-radius:6px;border:1px solid var(--border,#444);background:var(--bg,#1e2230);color:var(--text,#eee);font-size:13px;}
.ctrl input[type="color"]{padding:2px;height:34px;}
.preview{background:var(--bg,#1e2230);border:1px solid var(--border,#444);border-radius:8px;padding:24px;margin:12px 0;}
.pb{height:30px;background:var(--card,#2a2f3e);border-radius:6px;overflow:hidden;position:relative;margin:8px 0;}
.pb-fill{height:100%;border-radius:6px;transition:width .3s;display:flex;align-items:center;justify-content:center;color:#fff;font-size:12px;font-weight:600;}
button.action{padding:8px 16px;border-radius:6px;border:1px solid var(--border,#444);background:var(--card,#2a2f3e);color:var(--text,#eee);cursor:pointer;font-size:13px;margin:4px 4px 0 0;}
button.action:hover{border-color:var(--accent,#5b8def);}
.preset-row{display:flex;gap:8px;flex-wrap:wrap;margin:8px 0;}
button.preset{padding:5px 10px;border-radius:6px;border:1px solid var(--border,#444);background:var(--card,#2a2f3e);color:var(--text,#eee);cursor:pointer;font-size:12px;}
button.preset:hover{border-color:var(--accent,#5b8def);}
.code-block{background:var(--bg,#1e2230);border:1px solid var(--border,#444);border-radius:8px;padding:12px;margin:8px 0;font-family:monospace;font-size:11px;color:var(--text,#eee);white-space:pre-wrap;word-break:break-all;max-height:200px;overflow:auto;}
</style>
</head>
<body>
<header id="site-header"></header>
<main>
<div class="tool-wrap">
<h1>📊 CSS Progress Bar Generator</h1>
<p class="tool-desc">Create animated CSS progress bars with gradients, stripes, glow, and pulse effects. Copy CSS with one click.</p>
<div class="controls">
<div class="ctrl"><label>Progress %</label><input type="number" id="pct" value="65" min="0" max="100" oninput="render()"></div>
<div class="ctrl"><label>Height (px)</label><input type="number" id="hgt" value="30" min="4" max="80" oninput="render()"></div>
<div class="ctrl"><label>Start Color</label><input type="color" id="c1" value="#5b8def" oninput="render()"></div>
<div class="ctrl"><label>End Color</label><input type="color" id="c2" value="#a855f7" oninput="render()"></div>
<div class="ctrl"><label>Track Color</label><input type="color" id="trk" value="#2a2f3e" oninput="render()"></div>
<div class="ctrl"><label>Radius (px)</label><input type="number" id="rad" value="6" min="0" max="40" oninput="render()"></div>
<div class="ctrl"><label>Style</label><select id="style" onchange="render()"><option value="solid">Solid</option><option value="gradient" selected>Gradient</option><option value="striped">Striped</option><option value="glow">Glow</option><option value="pulse">Pulse</option><option value="striped-animated">Striped Animated</option></select></div>
<div class="ctrl"><label>Stripe Angle</label><input type="number" id="ang" value="45" min="0" max="360" oninput="render()"></div>
</div>
<div class="preset-row">
<button class="preset" onclick="preset(25)">25%</button>
<button class="preset" onclick="preset(50)">50%</button>
<button class="preset" onclick="preset(75)">75%</button>
<button class="preset" onclick="preset(100)">100%</button>
</div>
<div class="preview" id="prev"></div>
<div style="margin:8px 0;">
<button class="action" onclick="copyCSS()">Copy CSS</button>
</div>
<div class="code-block" id="code"></div>
</div>
</main>
<script src="/assets/app.js"></script>
<script>
let cssText='';
function v(id){return document.getElementById(id).value;}
function render(){
const pct=parseInt(v('pct'))||0,h=parseInt(v('hgt'))||30,rad=parseInt(v('rad'))||6;
const c1=v('c1'),c2=v('c2'),trk=v('trk'),style=v('style'),ang=parseInt(v('ang'))||45;
let bg,anim='',extra='';
if(style==='solid')bg=c1;
else if(style==='gradient'||style==='striped'||style==='striped-animated')bg=`linear-gradient(${style==='gradient'?90:ang}deg, ${c1}, ${c2})`;
else if(style==='glow'){bg=`linear-gradient(90deg, ${c1}, ${c2})`;extra=`box-shadow:0 0 12px ${c1}, 0 0 6px ${c2};`;}
else if(style==='pulse'){bg=`linear-gradient(90deg, ${c1}, ${c2})`;anim='animation:pulse 1.5s ease-in-out infinite;';}
if(style==='striped-animated')anim='animation:stripes 1s linear infinite;';
const striped=style==='striped'||style==='striped-animated'?`background-image:repeating-linear-gradient(${ang}deg, ${c1} 0 10px, ${c2} 10px 20px);`:'';
cssText=`.progress-bar{width:100%;height:${h}px;background:${trk};border-radius:${rad}px;overflow:hidden;}
.progress-fill{height:100%;width:${pct}%;border-radius:${rad}px;background:${striped?''`:linear-gradient(90deg, ${c1}, ${c2})`};${striped}${extra}${anim}transition:width .3s ease;}
${style==='pulse'?`@keyframes pulse{0%,100%{opacity:1}50%{opacity:.6}}`:''}
${style==='striped-animated'?`@keyframes stripes{from{background-position:0 0}to{background-position:20px 0}}`:''}`;
document.getElementById('prev').innerHTML=`<div class="pb" style="height:${h}px;background:${trk};border-radius:${rad}px;"><div class="pb-fill" style="width:${pct}%;background:${striped?`repeating-linear-gradient(${ang}deg, ${c1} 0 10px, ${c2} 10px 20px)`:`linear-gradient(90deg, ${c1}, ${c2})`};border-radius:${rad}px;${extra}${anim}">${pct}%</div></div>`;
document.getElementById('code').textContent=cssText;
}
function preset(p){document.getElementById('pct').value=p;render();}
function copyCSS(){navigator.clipboard.writeText(cssText).then(()=>alert('CSS copied!')).catch(()=>alert('Copy failed'));}
render();
</script>
</body>
</html>
