<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CSS Click Ripple Effect Generator — virt.tools</title>
<link rel="stylesheet" href="/assets/style.css">
<style>
.tool-area{max-width:900px;margin:2rem auto;padding:0 1rem}
.controls{display:grid;gap:1rem;margin:1.5rem 0;padding:1.5rem;background:#1a1a2e;border-radius:12px}
.ctrl-row{display:flex;gap:1rem;align-items:center;flex-wrap:wrap;margin-bottom:.5rem}
.ctrl-row label{font-weight:600;font-size:.9rem;min-width:120px}
.ctrl-row select,.ctrl-row input{padding:.5rem;border-radius:8px;border:1px solid #444;background:#0f0f1e;color:#eee}
.preview-box{margin:1.5rem 0;padding:2rem;border-radius:12px;min-height:200px;border:1px solid #333;display:flex;align-items:center;justify-content:center;gap:1rem;flex-wrap:wrap}
.output-block{margin:2rem 0}
.output-block textarea{width:100%;min-height:80px;font-family:monospace;font-size:.85rem;padding:1rem;border-radius:8px;border:1px solid #444;background:#0f0f1e;color:#eee;resize:vertical}
.copy-btn{padding:.6rem 1.2rem;border:none;border-radius:8px;background:#667eea;color:#fff;cursor:pointer;font-size:.9rem;margin-top:.5rem}
h2{margin-top:2rem;font-size:1.2rem}
.ripple-btn{position:relative;overflow:hidden;padding:1rem 2rem;border:none;border-radius:var(--r,8px);background:var(--bg,#667eea);color:#fff;font-size:1rem;cursor:pointer}
</style>
</head>
<body>
<header id="site-header"></header>
<main>
<div class="tool-area">
<h1>🌊 CSS Click Ripple Effect Generator</h1>
<p>Create CSS ripple effects on button click. 5 styles, adjustable color/duration/size. Copy HTML+CSS+JS.</p>
<div class="controls">
<div class="ctrl-row">
<label>Ripple Style</label><select id="style"><option value="circle">Circle</option><option value="square">Square</option><option value="diamond">Diamond</option><option value="ring">Ring</option><option value="splash">Splash</option></select>
<label>Ripple Color</label><input type="color" id="rippleColor" value="#ffffff">
</div>
<div class="ctrl-row">
<label>Duration</label><select id="duration"><option value="0.4s">Fast (0.4s)</option><option value="0.6s" selected>Medium (0.6s)</option><option value="1s">Slow (1s)</option></select>
<label>Max Size</label><select id="maxSize"><option value="100">100px</option><option value="200" selected>200px</option><option value="400">400px</option></select>
</div>
<div class="ctrl-row">
<label>Button Color</label><input type="color" id="btnColor" value="#667eea">
<label>Radius</label><select id="radius"><option value="0">0</option><option value="8" selected>8px</option><option value="20">20px</option><option value="50">50%</option></select>
</div>
<div class="ctrl-row"><button class="copy-btn" onclick="update()">Update</button></div>
</div>
<h2>Preview (click buttons)</h2>
<div class="preview-box" id="preview"></div>
<h2>HTML</h2><div class="output-block"><textarea id="htmlOut" readonly></textarea><button class="copy-btn" onclick="copyText('htmlOut')">Copy HTML</button></div>
<h2>CSS</h2><div class="output-block"><textarea id="cssOut" readonly></textarea><button class="copy-btn" onclick="copyText('cssOut')">Copy CSS</button></div>
<h2>JS</h2><div class="output-block"><textarea id="jsOut" readonly></textarea><button class="copy-btn" onclick="copyText('jsOut')">Copy JS</button></div>
</div>
</main>
<script src="/assets/app.js"></script>
<script>
function update(){
var s=document.getElementById('style').value;
var rc=document.getElementById('rippleColor').value;
var dur=document.getElementById('duration').value;
var ms=document.getElementById('maxSize').value;
var bc=document.getElementById('btnColor').value;
var r=document.getElementById('radius').value;
var clipStyle='';
if(s==='circle')clipStyle='border-radius:50%';
else if(s==='square')clipStyle='border-radius:0';
else if(s==='diamond')clipStyle='border-radius:0;transform:scale(1) rotate(45deg)';
else if(s==='ring')clipStyle='border-radius:50%;border:3px solid '+rc+';background:transparent';
else clipStyle='border-radius:50%;clip-path:polygon(50% 0%,60% 40%,100% 50%,60% 60%,50% 100%,40% 60%,0% 50%,40% 40%)';
var html='<button class="ripple-btn">Click Me</button>';
var css='.ripple-btn{position:relative;overflow:hidden;padding:1rem 2rem;border:none;border-radius:'+r+'px;background:'+bc+';color:#fff;font-size:1rem;cursor:pointer}\n.ripple-effect{position:absolute;border-radius:50%;background:'+rc+';transform:scale(0);animation:ripple '+dur+' ease-out;pointer-events:none';
if(s==='square')css=css.replace('border-radius:50%','border-radius:0');
else if(s==='diamond')css=css.replace('border-radius:50%','border-radius:0;transform:scale(0) rotate(45deg)');
else if(s==='ring')css=css.replace('background:'+rc,css.includes('border')?'background:transparent':'background:transparent;')+';border:3px solid '+rc;
else if(s==='splash')css=css.replace('border-radius:50%','border-radius:50%;clip-path:polygon(50% 0%,60% 40%,100% 50%,60% 60%,50% 100%,40% 60%,0% 50%,40% 40%)');
css+='}\n@keyframes ripple{to{transform:scale('+(ms/20)+');opacity:0}}';
var js="document.querySelectorAll('.ripple-btn').forEach(function(btn){\n  btn.addEventListener('click',function(e){\n    var rect=btn.getBoundingClientRect();\n    var x=e.clientX-rect.left;\n    var y=e.clientY-rect.top;\n    var ripple=document.createElement('span');\n    ripple.className='ripple-effect';\n    ripple.style.left=x+'px';\n    ripple.style.top=y+'px';\n    ripple.style.width='"+ms+"px';\n    ripple.style.height='"+ms+"px';\n    ripple.style.marginLeft=-"+(ms/2)+"+'px';\n    ripple.style.marginTop=-"+(ms/2)+"+'px';\n    btn.appendChild(ripple);\n    setTimeout(function(){ripple.remove()},600);\n  });\n});";
document.getElementById('htmlOut').value=html;
document.getElementById('cssOut').value=css;
document.getElementById('jsOut').value=js;
var p=document.getElementById('preview');
p.innerHTML='<style>'+css+'</style>'+html+'<button class="ripple-btn" style="background:#764ba2">Also Click Me</button>';
eval(js);
}
function copyText(id){var t=document.getElementById(id);t.select();document.execCommand('copy')}
['style','rippleColor','duration','maxSize','btnColor','radius'].forEach(function(id){var el=document.getElementById(id);el.addEventListener('input',update);el.addEventListener('change',update)});
update();
</script>
</body>
</html>
