<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="/assets/theme-init.js"></script>
<title>Craps — Virtual Tools</title>
<link rel="stylesheet" href="/assets/style.css">
<style>
.tool-wrap{max-width:520px;margin:0 auto;text-align:center;}
#dice{font-size:48px;margin:16px 0;letter-spacing:8px;min-height:60px;}
.die-face{display:inline-block;transition:transform .3s;}
.die-face.rolling{animation:roll .3s infinite;}
@keyframes roll{0%{transform:rotate(0) scale(.9);}50%{transform:rotate(180deg) scale(1.1);}100%{transform:rotate(360deg) scale(.9);}}
.stats{display:flex;gap:20px;justify-content:center;margin:10px 0;font-size:16px;}
.stats span{color:var(--accent,#5b8def);font-weight:700;}
#point{font-size:18px;margin:8px 0;min-height:28px;font-weight:600;}
#msg{font-size:16px;font-weight:600;margin:8px 0;min-height:24px;color:#f1c40f;}
.bets{margin:12px 0;display:flex;gap:8px;justify-content:center;flex-wrap:wrap;}
.bet-btn{padding:10px 18px;border-radius:8px;border:2px solid var(--border,#444);background:var(--bg-alt,#1a1f2e);color:var(--text,#eee);cursor:pointer;font-size:14px;font-weight:600;}
.bet-btn:hover:not(:disabled){border-color:var(--accent,#5b8def);}
.bet-btn.active{border-color:#2ecc71;background:rgba(46,204,113,.15);color:#2ecc71;}
.bet-btn:disabled{opacity:.4;cursor:default;}
.amount{margin:8px 0;display:flex;gap:8px;justify-content:center;flex-wrap:wrap;}
.amount button{padding:6px 14px;border-radius:6px;border:1px solid var(--border,#444);background:var(--bg-alt,#1a1f2e);color:var(--text,#eee);cursor:pointer;font-size:13px;}
.amount button.active{background:var(--accent,#5b8def);color:#fff;}
.controls{margin:12px 0;}
.controls button{padding:12px 28px;border-radius:8px;border:none;background:var(--accent,#5b8def);color:#fff;cursor:pointer;font-size:16px;font-weight:700;}
.controls button:hover:not(:disabled){opacity:.85;}
.controls button:disabled{opacity:.4;cursor:default;}
.payouts{margin:16px auto;text-align:left;font-size:12px;color:var(--text-secondary,#aaa);max-width:280px;border-collapse:collapse;}
.payouts td{padding:2px 8px;}
.payouts td:last-child{text-align:right;color:var(--accent,#5b8def);font-weight:600;}
.tool-desc{font-size:14px;color:var(--text-secondary,#aaa);}
</style>
</head>
<body>
<header id="site-header"></header>
<main>
<div class="tool-wrap">
<h1>Craps 🎲</h1>
<p class="tool-desc">Classic casino dice game. Bet on Pass Line or Don't Pass, roll the dice, and make your point!</p>
<div class="stats"><div>Bankroll: $<span id="bank">1000</span></div><div>Bet: $<span id="bet-amt">0</span></div></div>
<div class="amount" id="amount"></div>
<div class="bets">
<button class="bet-btn" id="pass-btn" onclick="setBet('pass')">Pass Line (1:1)</button>
<button class="bet-btn" id="nopass-btn" onclick="setBet('nopass')">Don't Pass (1:1)</button>
<button class="bet-btn" id="field-btn" onclick="setBet('field')">Field (varies)</button>
</div>
<div id="point"></div>
<div id="dice"></div>
<div id="msg"></div>
<div class="controls">
<button id="roll-btn" onclick="roll()" disabled>🎲 Roll Dice</button>
<button onclick="newGame()">🔄 New Game</button>
</div>
<table class="payouts"><tr><td colspan="2" style="font-weight:700;color:var(--text,#eee)">Field Bet Payouts</td></tr><tr><td>Roll 3,4,9,10,11</td><td>1:1</td></tr><tr><td>Roll 2 or 12</td><td>2:1</td></tr><tr><td colspan="2" style="font-weight:700;color:var(--text,#eee)">Pass Line</td></tr><tr><td>7 or 11 on come-out</td><td>Win</td></tr><tr><td>2,3,12 on come-out</td><td>Lose</td></tr><tr><td>Point then 7</td><td>Lose</td></tr><tr><td>Point made</td><td>Win</td></tr></table>
</div>
</main>
<script src="/assets/app.js"></script>
<script>
let bank=1000,bet=10,betType=null,point=0,phase='comeout',rolling=false;
const FACES=['⚀','⚁','⚂','⚃','⚄','⚅'];
function newGame(){bank=1000;bet=10;betType=null;point=0;phase='comeout';rolling=false;document.getElementById('msg').textContent='';document.getElementById('dice').textContent='';update();}
function setBet(type){if(rolling)return;betType=type;document.querySelectorAll('.bet-btn').forEach(b=>b.classList.remove('active'));document.getElementById(type+'-btn').classList.add('active');document.getElementById('roll-btn').disabled=false;document.getElementById('msg').textContent='';}
function roll(){if(!betType||rolling)return;rolling=true;document.getElementById('roll-btn').disabled=true;
let d1,d2;const di=document.getElementById('dice');di.innerHTML='<span class="die-face rolling">🎲</span><span class="die-face rolling">🎲</span>';
let ticks=0;const iv=setInterval(()=>{d1=Math.floor(Math.random()*6)+1;d2=Math.floor(Math.random()*6)+1;di.innerHTML=`<span class="die-face rolling">${FACES[d1-1]}</span><span class="die-face rolling">${FACES[d2-1]}</span>`;if(++ticks>=8){clearInterval(iv);finishRoll(d1,d2);}},80);
}
function finishRoll(d1,d2){
rolling=false;const sum=d1+d2;document.getElementById('dice').innerHTML=`<span class="die-face">${FACES[d1-1]}</span><span class="die-face">${FACES[d2-1]}</span>`;
let win=false,msg='';
if(betType==='pass'){
if(phase==='comeout'){
if(sum===7||sum===11){win=true;msg='🎉 Natural! Pass wins!';}
else if(sum===2||sum===3||sum===12){win=false;msg='💀 Craps! Pass loses.';}
else{point=sum;phase='point';document.getElementById('point').textContent='📍 Point: '+point+' — roll again to make it, 7 to lose.';document.getElementById('roll-btn').disabled=false;document.getElementById('msg').textContent='Point established: '+point;return;}
}else{
if(sum===point){win=true;msg='✅ Point made! Pass wins!';point=0;phase='comeout';}
else if(sum===7){win=false;msg='💀 Seven-out! Pass loses.';point=0;phase='comeout';}
else{document.getElementById('roll-btn').disabled=false;document.getElementById('msg').textContent='Rolled '+sum+'. Point is '+point+'.';return;}
}
}else if(betType==='nopass'){
if(phase==='comeout'){
if(sum===7||sum===11){win=false;msg='💀 Natural! Don\'t Pass loses.';}
else if(sum===2||sum===3){win=true;msg='🎉 Craps! Don\'t Pass wins!';}
else if(sum===12){msg='🔁 Push (12). Bet returned.';bank+=bet;point=0;phase='comeout';resetBet();return;}
else{point=sum;phase='point';document.getElementById('point').textContent='📍 Point: '+point+' — 7 to win, '+point+' to lose.';document.getElementById('roll-btn').disabled=false;document.getElementById('msg').textContent='Point established: '+point;return;}
}else{
if(sum===7){win=true;msg='✅ Seven-out! Don\'t Pass wins!';point=0;phase='comeout';}
else if(sum===point){win=false;msg='💀 Point made! Don\'t Pass loses.';point=0;phase='comeout';}
else{document.getElementById('roll-btn').disabled=false;document.getElementById('msg').textContent='Rolled '+sum+'. Point is '+point+'.';return;}
}
}else if(betType==='field'){
if([2,3,4,9,10,11].includes(sum)){const mult=sum===2||sum===12?2:1;win=true;bank+=bet*mult;msg='✅ Field '+sum+'! '+mult+':1 payout.';}
else{win=false;msg='💀 Field loses on '+sum+'.';}
point=0;phase='comeout';
}
if(win){bank+=bet;msg+=' +$'+bet;}
else{bank-=bet;msg+=' -$'+bet;}
document.getElementById('msg').textContent=msg;
document.getElementById('point').textContent='';
if(bank<=0){document.getElementById('msg').textContent='💸 Bankrupt! Click New Game.';document.getElementById('roll-btn').disabled=true;return;}
resetBet();update();
}
function resetBet(){betType=null;document.querySelectorAll('.bet-btn').forEach(b=>b.classList.remove('active'));document.getElementById('roll-btn').disabled=true;}
function update(){
document.getElementById('bank').textContent=bank;
document.getElementById('bet-amt').textContent=bet;
const am=document.getElementById('amount');am.innerHTML='';
[5,10,25,50,100].forEach(a=>{const b=document.createElement('button');b.textContent='$'+a;b.className=a===bet?'active':'';b.onclick=()=>{bet=a;update();setBet===betType;if(betType)document.getElementById('roll-btn').disabled=false;update();};am.appendChild(b);});
}
update();
</script>
</body>
</html>
