<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CSS Scroll Progress Generator — virt.tools</title>
<link rel="stylesheet" href="/assets/style.css">
<style>
.tool-area{max-width:960px;margin:2rem auto;padding:0 1rem}
.controls{display:grid;gap:1rem;margin:1.5rem 0;padding:1.5rem;background:#1a1a2e;border-radius:12px}
.control-row{display:flex;gap:1rem;align-items:center;flex-wrap:wrap}
.control-row label{min-width:120px;font-weight:600;font-size:.9rem}
.control-row select,.control-row input[type="color"],.control-row input[type="range"]{padding:.5rem .75rem;border-radius:8px;border:1px solid #444;background:#0f0f1e;color:#eee;font-size:.9rem}
.preview-bar{position:fixed;top:0;left:0;height:4px;background:#4a9eff;z-index:9999;width:30%;border-radius:0 4px 4px 0}
.preview-radial{position:fixed;top:1rem;right:1rem;width:48px;height:48px;z-index:9999}
.css-output{margin:2rem 0}
.css-output textarea{width:100%;min-height:180px;font-family:monospace;font-size:.85rem;padding:1rem;border-radius:8px;border:1px solid #444;background:#0f0f1e;color:#eee;resize:vertical}
.copy-btn{padding:.6rem 1.2rem;border:none;border-radius:8px;background:#4a9eff;color:#fff;cursor:pointer;font-size:.9rem;margin-top:.5rem}
h2{margin-top:2rem;font-size:1.2rem}
</style>
</head>
<body>
<header id="site-header"></header>
<main>
<div class="tool-area">
<h1>📊 CSS Scroll Progress Generator</h1>
<p>Create CSS scroll progress indicators — top bar, bottom bar, or radial indicator. Pure CSS.</p>
<div class="controls">
<div class="control-row">
<label>Style</label><select id="style"><option value="top-bar">Top Bar</option><option value="bottom-bar">Bottom Bar</option><option value="radial">Radial Circle</option></select>
<label>Color</label><input type="color" id="color" value="#4a9eff">
<label>Height</label><input type="range" id="height" min="2" max="12" value="4"><span id="heightVal">4px</span>
</div>
<div class="control-row">
<label>Gradient</label><select id="gradient"><option value="none">None</option><option value="linear">Linear</option><option value="rainbow">Rainbow</option></select>
<label>Width</label><input type="range" id="width" min="20" max="80" value="30"><span id="widthVal">30%</span>
</div>
</div>
<h2>CSS</h2><div class="css-output"><textarea id="cssOut" readonly></textarea><button class="copy-btn" onclick="copyText('cssOut')">Copy CSS</button></div>
<h2>HTML+JS</h2><div class="css-output"><textarea id="htmlOut" readonly></textarea><button class="copy-btn" onclick="copyText('htmlOut')">Copy HTML+JS</button></div>
</div>
</main>
<script src="/assets/app.js"></script>
<script>
function update(){
var style=document.getElementById('style').value;
var color=document.getElementById('color').value;
var height=+document.getElementById('height').value;
var gradient=document.getElementById('gradient').value;
var width=+document.getElementById('width').value;
document.getElementById('heightVal').textContent=height+'px';
document.getElementById('widthVal').textContent=width+'%';
var bg=color;
if(gradient==='linear')bg='linear-gradient(90deg,'+color+',#e94560)';
if(gradient==='rainbow')bg='linear-gradient(90deg,red,orange,yellow,green,blue,indigo,violet)';
var pos=style==='bottom-bar'?'bottom:0':'top:0';
var css='';
if(style==='radial'){
css='.scroll-progress-radial{\n  position:fixed;top:1rem;right:1rem;\n  width:48px;height:48px;\n  z-index:9999;\n}\n.scroll-progress-radial circle{\n  fill:none;\n  stroke:'+color+';\n  stroke-width:'+height+';\n  stroke-linecap:round;\n  transform:rotate(-90deg);\n  transform-origin:50% 50%;\n  transition:stroke-dashoffset .1s;\n}\n';
}else{
css='.scroll-progress-bar{\n  position:fixed;'+pos+';left:0;\n  height:'+height+'px;\n  background:'+bg+';\n  z-index:9999;\n  width:0%;\n  transition:width .1s;\n  border-radius:0 '+(style==='bottom-bar'?'4px 4px 0 0':'0 4px 4px 0')+';\n}\n';
}
var html='';
if(style==='radial'){
html='<svg class="scroll-progress-radial" viewBox="0 0 48 48">\n  <circle cx="24" cy="24" r="20" stroke="#333" stroke-width="'+height+'" fill="none" opacity="0.2"/>\n  <circle id="progressCircle" cx="24" cy="24" r="20" fill="none"/>\n</svg>\n<script>\nvar c=document.getElementById("progressCircle");\nvar r=20;\nvar circ=2*Math.PI*r;\nc.style.strokeDasharray=circ;\nwindow.addEventListener("scroll",function(){\n  var p=document.documentElement.scrollTop/(document.documentElement.scrollHeight-document.documentElement.clientHeight);\n  c.style.strokeDashoffset=circ*(1-p);\n});\n<\/script>';
}else{
html='<div class="scroll-progress-bar" id="progressBar"></div>\n<script>\nwindow.addEventListener("scroll",function(){\n  var p=document.documentElement.scrollTop/(document.documentElement.scrollHeight-document.documentElement.clientHeight);\n  document.getElementById("progressBar").style.width=(p*100)+"%";\n});\n<\/script>';
}
document.getElementById('cssOut').value=css;
document.getElementById('htmlOut').value=html;
}
function copyText(id){var t=document.getElementById(id);t.select();document.execCommand('copy')}
document.querySelectorAll('select,input').forEach(function(e){e.addEventListener('input',update)});
update();
</script>
</body>
</html>
