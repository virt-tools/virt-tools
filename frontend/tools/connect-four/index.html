<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="/assets/theme-init.js"></script>
<title>Connect Four — Virtual Tools</title>
<link rel="stylesheet" href="/assets/style.css">
<style>
.tool-wrap{max-width:480px;margin:0 auto;text-align:center;}
canvas{border:1px solid var(--border,#2a2f3a);border-radius:8px;background:#1a4d7a;display:block;margin:16px auto;cursor:pointer;touch-action:manipulation;}
#status{font-size:18px;font-weight:700;margin:8px 0;min-height:24px;}
.tool-desc{opacity:.7;font-size:14px;margin-bottom:8px;}
.controls{display:flex;gap:8px;justify-content:center;margin:8px 0;flex-wrap:wrap;}
.controls button{padding:6px 16px;border-radius:6px;border:1px solid var(--border,#2a2f3a);background:var(--bg-alt,#1a1f2e);color:var(--text,#e0e0e0);cursor:pointer;font-size:14px;}
.controls button.active{background:#3498db;color:#fff;border-color:#3498db;}
.score{display:flex;gap:24px;justify-content:center;margin:8px 0;font-size:15px;}
.score span{font-weight:700;}
.red{color:#e74c3c;}.yellow{color:#f1c40f;}
</style>
</head>
<body>
<header id="site-header"></header>
<main>
<div class="tool-wrap">
<h1>Connect Four</h1>
<p class="tool-desc">Drop discs to get 4 in a row — horizontally, vertically, or diagonally. Play vs a friend or vs AI (minimax with depth 5). Click a column or use number keys 1–7.</p>
<div class="controls">
<button id="pvp" class="active" onclick="setMode('pvp')">2 Players</button>
<button id="ai" onclick="setMode('ai')">vs AI</button>
<button onclick="resetGame()">Reset</button>
</div>
<div id="status">Red's turn</div>
<div class="score"><span class="red">Red: <b id="rs">0</b></span><span class="yellow">Yellow: <b id="ys">0</b></span></div>
<canvas id="c" width="420" height="360"></canvas>
</div>
</main>
<script src="/assets/app.js"></script>
<script>
const cv=document.getElementById('c'),ctx=cv.getContext('2d');
const COLS=7,ROWS=6,CELL=60,PD=4;
const W=COLS*CELL+PD*2,H=ROWS*CELL+PD*2;
cv.width=W;cv.height=H;
const RED=1,YEL=2;
let board=[],current=RED,mode='pvp',scores={r:0,y:0},gameOver=false,hoverCol=3;

function init(){board=Array.from({length:ROWS},()=>Array(COLS).fill(0));current=RED;gameOver=false;updateStatus();draw();}
function updateStatus(){
  if(gameOver)return;
  document.getElementById('status').innerHTML=(current===RED?'<span class="red">Red':'<span class="yellow">Yellow')+"'s turn</span>";
}
function setMode(m){mode=m;document.getElementById('pvp').classList.toggle('active',m==='pvp');document.getElementById('ai').classList.toggle('active',m==='ai');resetGame();}
function resetGame(){scores={r:0,y:0};document.getElementById('rs').textContent='0';document.getElementById('ys').textContent='0';init();}

function dropDisc(col){
  if(gameOver)return;
  if(col<0||col>=COLS)return;
  for(let r=ROWS-1;r>=0;r--){if(board[r][col]===0){
    board[r][col]=current;
    if(checkWin(r,col,current)){
      gameOver=true;
      const name=current===RED?'Red':'Yellow';
      document.getElementById('status').innerHTML='<span class="'+(current===RED?'red':'yellow')+'">'+name+' wins!</span>';
      if(current===RED)scores.r++;else scores.y++;
      document.getElementById('rs').textContent=scores.r;document.getElementById('ys').textContent=scores.y;
      draw();return;
    }
    if(board.every(row=>row.every(c=>c!==0))){
      gameOver=true;document.getElementById('status').textContent="It's a draw!";draw();return;
    }
    current=current===RED?YEL:RED;updateStatus();draw();
    if(mode==='ai'&&!gameOver&&current===YEL){setTimeout(aiMove,400);}
    return;
  }}
}

function aiMove(){
  let best=-Infinity,bestCol=3;
  for(let c=0;c<COLS;c++){
    let r=-1;for(let rr=ROWS-1;rr>=0;rr--){if(board[rr][c]===0){r=rr;break;}}
    if(r===-1)continue;
    board[r][c]=YEL;
    let s=minimax(board,5,-Infinity,Infinity,false);
    board[r][c]=0;
    if(s>best){best=s;bestCol=c;}
  }
  dropDisc(bestCol);
}

function minimax(b,depth,alpha,beta,maximizing){
  let w=checkAnyWin(b);
  if(w===YEL)return 100000+depth;
  if(w===RED)return -100000-depth;
  if(depth===0||isFull(b))return evaluate(b);
  if(maximizing){
    let v=-Infinity;
    for(let c=0;c<COLS;c++){
      let r=getDropRow(b,c);if(r===-1)continue;
      b[r][c]=YEL;v=Math.max(v,minimax(b,depth-1,alpha,beta,false));b[r][c]=0;
      alpha=Math.max(alpha,v);if(beta<=alpha)break;
    }
    return v;
  }else{
    let v=Infinity;
    for(let c=0;c<COLS;c++){
      let r=getDropRow(b,c);if(r===-1)continue;
      b[r][c]=RED;v=Math.min(v,minimax(b,depth-1,alpha,beta,true));b[r][c]=0;
      beta=Math.min(beta,v);if(beta<=alpha)break;
    }
    return v;
  }
}

function getDropRow(b,c){for(let r=ROWS-1;r>=0;r--){if(b[r][c]===0)return r;}return -1;}
function isFull(b){return b.every(row=>row.every(c=>c!==0));}
function checkAnyWin(b){
  for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++){
    if(b[r][c]===0)continue;
    if(checkDirs(b,r,c,b[r][c]))return b[r][c];
  }
  return 0;
}
function checkWin(r,c,p){return checkDirs(board,r,c,p);}
function checkDirs(b,r,c,p){
  const dirs=[[0,1],[1,0],[1,1],[1,-1]];
  for(let [dr,dc] of dirs){
    let count=1;
    for(let d=1;d<4;d++){let nr=r+dr*d,nc=c+dc*d;if(nr<0||nr>=ROWS||nc<0||nc>=COLS||b[nr][nc]!==p)break;count++;}
    for(let d=1;d<4;d++){let nr=r-dr*d,nc=c-dc*d;if(nr<0||nr>=ROWS||nc<0||nc>=COLS||b[nr][nc]!==p)break;count++;}
    if(count>=4)return true;
  }
  return false;
}
function evaluate(b){
  let s=0;
  for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++){
    if(b[r][c]===0)continue;
    const p=b[r][c]===YEL?1:-1;
    const dirs=[[0,1],[1,0],[1,1],[1,-1]];
    for(let [dr,dc] of dirs){
      let count=0;
      for(let d=0;d<4;d++){let nr=r+dr*d,nc=c+dc*d;if(nr<0||nr>=ROWS||nc<0||nc>=COLS)return 0;if(b[nr][nc]===b[r][c])count++;else if(b[nr][nc]!==0)return 0;}
      if(count===2)s+=p*10;else if(count===3)s+=p*50;
    }
  }
  return s;
}

function draw(){
  ctx.fillStyle='#1a4d7a';ctx.fillRect(0,0,W,H);
  for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++){
    const x=PD+c*CELL+CELL/2,y=PD+r*CELL+CELL/2;
    ctx.beginPath();ctx.arc(x,y,CELL/2-3,0,Math.PI*2);
    ctx.fillStyle=board[r][c]===RED?'#e74c3c':board[r][c]===YEL?'#f1c40f':'#0a1a2a';
    ctx.fill();
  }
  if(!gameOver){
    const x=PD+hoverCol*CELL+CELL/2;
    ctx.beginPath();ctx.arc(x,PD+CELL/2-2,CELL/2-3,0,Math.PI*2);
    ctx.fillStyle=current===RED?'rgba(231,76,60,0.4)':'rgba(241,196,15,0.4)';
    ctx.fill();
  }
}

cv.addEventListener('mousemove',e=>{const r=cv.getBoundingClientRect();hoverCol=Math.floor((e.clientX-r.x-PD)/CELL);hoverCol=Math.max(0,Math.min(COLS-1,hoverCol));draw();});
cv.addEventListener('click',e=>{const r=cv.getBoundingClientRect();const col=Math.floor((e.clientX-r.x-PD)/CELL);dropDisc(Math.max(0,Math.min(COLS-1,col)));});
cv.addEventListener('touchstart',e=>{e.preventDefault();const r=cv.getBoundingClientRect();const col=Math.floor((e.touches[0].clientX-r.x-PD)/CELL);dropDisc(Math.max(0,Math.min(COLS-1,col)));},{passive:false});
document.addEventListener('keydown',e=>{const n=parseInt(e.key);if(n>=1&&n<=7)dropDisc(n-1);});

init();
</script>
</body>
</html>
