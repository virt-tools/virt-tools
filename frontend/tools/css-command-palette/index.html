<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CSS Command Palette Generator — virt.tools</title>
<link rel="stylesheet" href="/assets/style.css">
<style>
.tool-area{max-width:900px;margin:2rem auto;padding:0 1rem}
.controls{display:grid;gap:1rem;margin:1.5rem 0;padding:1.5rem;background:#1a1a2e;border-radius:12px}
.control-row{display:flex;gap:1rem;align-items:center;flex-wrap:wrap}
.control-row label{min-width:130px;font-weight:600;font-size:.9rem}
.control-row select,.control-row input{padding:.5rem .75rem;border-radius:8px;border:1px solid #444;background:#0f0f1e;color:#eee;font-size:.9rem}
.preview-box{margin:1.5rem 0;border-radius:12px;background:#0f0f1e;padding:2rem 1.5rem;min-height:300px;display:flex;align-items:flex-start;justify-content:center}
.output-block{margin:2rem 0}
.output-block textarea{width:100%;min-height:120px;font-family:monospace;font-size:.85rem;padding:1rem;border-radius:8px;border:1px solid #444;background:#0f0f1e;color:#eee;resize:vertical}
.copy-btn{padding:.6rem 1.2rem;border:none;border-radius:8px;background:#667eea;color:#fff;cursor:pointer;font-size:.9rem;margin-top:.5rem}
h2{margin-top:2rem;font-size:1.2rem}
</style>
</head>
<body>
<header id="site-header"></header>
<main>
<div class="tool-area">
<h1>⌘ CSS Command Palette Generator</h1>
<p>Create CSS command palette / quick action menu components (Cmd+K style). 3 themes, search input, keyboard hints, custom items.</p>
<div class="controls">
<div class="control-row">
<label>Theme</label><select id="theme"><option value="dark">Dark</option><option value="light">Light</option><option value="gradient">Gradient</option></select>
<label>Width</label><select id="width"><option value="480">480px</option><option value="560" selected>560px</option><option value="640">640px</option></select>
</div>
<div class="control-row">
<label>Accent Color</label><input type="color" id="accent" value="#667eea">
<label>Bg Color</label><input type="color" id="bgColor" value="#1a1a2e">
<label>Item Count</label><select id="count"><option value="3">3</option><option value="5" selected>5</option><option value="8">8</option></select>
</div>
</div>
<h2>Preview</h2>
<div class="preview-box" id="preview"></div>
<h2>HTML</h2><div class="output-block"><textarea id="htmlOut" readonly></textarea><button class="copy-btn" onclick="copyText('htmlOut')">Copy HTML</button></div>
<h2>CSS</h2><div class="output-block"><textarea id="cssOut" readonly></textarea><button class="copy-btn" onclick="copyText('cssOut')">Copy CSS</button></div>
</div>
</main>
</main>
<script src="/assets/app.js"></script>
<script>
var items=[
{icon:'📁',label:'Open File',shortcut:'⌘O'},
{icon:'🔍',label:'Search',shortcut:'⌘F'},
{icon:'⚙️',label:'Settings',shortcut:'⌘,'},
{icon:'📋',label:'Copy',shortcut:'⌘C'},
{icon:'💾',label:'Save',shortcut:'⌘S'},
{icon:'🗑️',label:'Delete',shortcut:'⌘D'},
{icon:'🔄',label:'Reload',shortcut:'⌘R'},
{icon:'🌙',label:'Toggle Theme',shortcut:'⌘T'}
];
function update(){
var theme=document.getElementById('theme').value;
var w=document.getElementById('width').value;
var ac=document.getElementById('accent').value;
var bg=document.getElementById('bgColor').value;
var n=parseInt(document.getElementById('count').value);
var isLight=theme==='light';
var textColor=isLight?'#1a1a2e':'#e0e0e0';
var subBg=isLight?'#f0f0f5':'#0f0f1e';
var hoverBg=isLight?'#e8e8f0':'#252540';
var actualBg=theme==='gradient'?bg:subBg;
var headerBg=theme==='gradient'?'linear-gradient(135deg,'+ac+',#764ba2)':subBg;
var html='<div class="cmd-palette">\n  <div class="cmd-header">\n    <span class="cmd-icon">🔍</span>\n    <input type="text" class="cmd-input" placeholder="Type a command...">\n    <kbd class="cmd-esc">ESC</kbd>\n  </div>\n  <div class="cmd-list">\n';
for(var i=0;i<n;i++){var it=items[i];html+='    <div class="cmd-item'+(i===0?' active':'')+'">\n      <span class="cmd-item-icon">'+it.icon+'</span>\n      <span class="cmd-item-label">'+it.label+'</span>\n      <kbd class="cmd-shortcut">'+it.shortcut+'</kbd>\n    </div>\n';}
html+='  </div>\n  <div class="cmd-footer">\n    <span><kbd>↑</kbd><kbd>↓</kbd> Navigate</span>\n    <span><kbd>↵</kbd> Select</span>\n    <span><kbd>ESC</kbd> Close</span>\n  </div>\n</div>';
var css='.cmd-palette{width:'+w+'px;background:'+actualBg+';border-radius:12px;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,.5);border:1px solid '+(isLight?'#ddd':'#333')+';font-family:system-ui,sans-serif;color:'+textColor+'}\n.cmd-header{display:flex;align-items:center;gap:.5rem;padding:1rem 1.25rem;background:'+headerBg+';border-bottom:1px solid '+(isLight?'#ddd':'#333')+'}\n.cmd-icon{font-size:1.1rem}\n.cmd-input{flex:1;background:transparent;border:none;outline:none;color:'+textColor+';font-size:1rem;padding:.25rem}\n.cmd-input::placeholder{color:'+(isLight?'#999':'#666')+'}\n.cmd-esc{font-size:.7rem;padding:.2rem .5rem;background:'+(isLight?'#eee':'#333')+';border-radius:4px;border:1px solid '+(isLight?'#ccc':'#555')+';color:'+(isLight?'#666':'#aaa')+'}\n.cmd-list{padding:.5rem;max-height:320px;overflow-y:auto}\n.cmd-item{display:flex;align-items:center;gap:.75rem;padding:.6rem .75rem;border-radius:8px;cursor:pointer;transition:background .15s}\n.cmd-item.active,.cmd-item:hover{background:'+hoverBg+'}\n.cmd-item-icon{font-size:1.1rem;width:1.5rem;text-align:center}\n.cmd-item-label{flex:1;font-size:.9rem}\n.cmd-shortcut{font-size:.7rem;padding:.15rem .4rem;background:'+(isLight?'#eee':'#2a2a3e')+';border-radius:4px;border:1px solid '+(isLight?'#ccc':'#444')+';color:'+(isLight?'#666':'#888')+'}\n.cmd-footer{display:flex;gap:1rem;padding:.6rem 1.25rem;font-size:.75rem;color:'+(isLight?'#888':'#666')+';border-top:1px solid '+(isLight?'#eee':'#222')+';background:'+(isLight?'#f8f8fc':'#161628')+'}\n.cmd-footer kbd{font-size:.65rem;padding:.1rem .3rem;background:'+(isLight?'#eee':'#2a2a3e')+';border-radius:3px;border:1px solid '+(isLight?'#ccc':'#444')+';margin:0 .15rem}';
document.getElementById('htmlOut').value=html;
document.getElementById('cssOut').value=css;
var p=document.getElementById('preview');
p.innerHTML='<style>'+css+'</style>'+html;
}
function copyText(id){var t=document.getElementById(id);t.select();document.execCommand('copy')}
document.querySelectorAll('select,input').forEach(function(e){e.addEventListener('input',update);e.addEventListener('change',update)});
update();
</script>
</body>
</html>
