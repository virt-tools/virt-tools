<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="/assets/theme-init.js"></script>
<title>CSS Search Bar Generator — Virtual Tools</title>
<link rel="stylesheet" href="/assets/style.css">
<style>
.tool-wrap{max-width:800px;margin:0 auto;}
.tool-desc{font-size:14px;color:var(--text-secondary,#aaa);margin:8px 0 20px;}
.controls{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin:12px 0;}
.ctrl{display:flex;flex-direction:column;gap:4px;}
.ctrl label{font-size:12px;color:var(--text-secondary,#888);}
.ctrl input,.ctrl select{padding:6px 8px;border-radius:6px;border:1px solid var(--border,#444);background:var(--bg,#1e2230);color:var(--text,#eee);font-size:13px;font-family:inherit;}
button.action{padding:8px 16px;border-radius:6px;border:1px solid var(--border,#444);background:var(--card,#2a2f3e);color:var(--text,#eee);cursor:pointer;font-size:13px;margin:4px 4px 0 0;}
.preview{border:1px solid var(--border,#444);border-radius:8px;margin:12px 0;overflow:hidden;}
.code-block{background:var(--bg,#1e2230);border:1px solid var(--border,#444);border-radius:8px;padding:12px;margin:8px 0;font-family:monospace;font-size:11px;color:var(--text,#eee);white-space:pre-wrap;word-break:break-all;max-height:400px;overflow:auto;}
</style>
</head>
<body>
<header id="site-header"></header>
<main>
<div class="tool-wrap">
<h1>🔍 CSS Search Bar Generator</h1>
<p class="tool-desc">Create styled CSS search bars with 6 styles, icons, custom colors, and sizes. Copy HTML+CSS.</p>
<div class="controls">
<div class="ctrl"><label>Style</label><select id="style" onchange="render()"><option value="modern" selected>Modern</option><option value="classic">Classic</option><option value="minimal">Minimal</option><option value="glass">Glass</option><option value="neon">Neon</option><option value="rounded">Rounded</option></select></div>
<div class="ctrl"><label>Width (px)</label><input type="number" id="width" value="400" oninput="render()" min="200" max="800"></div>
<div class="ctrl"><label>Height (px)</label><input type="number" id="height" value="48" oninput="render()" min="32" max="80"></div>
<div class="ctrl"><label>Radius</label><input type="range" id="radius" min="0" max="40" value="24" oninput="render()" style="width:100%"></div>
<div class="ctrl"><label>Border Color</label><input type="color" id="bcol" value="#6c5ce7" oninput="render()"></div>
<div class="ctrl"><label>Background</label><input type="color" id="bgcol" value="#ffffff" oninput="render()"></div>
<div class="ctrl"><label>Text Color</label><input type="color" id="tcol" value="#2d3436" oninput="render()"></div>
<div class="ctrl"><label>Focus Glow</label><input type="color" id="glow" value="#a29bfe" oninput="render()"></div>
</div>
<div style="margin:8px 0;"><button class="action" onclick="copyCode()">Copy HTML+CSS</button></div>
<div class="preview" id="prev"></div>
<div class="code-block" id="code"></div>
</div>
</main>
<script src="/assets/app.js"></script>
<script>
let codeText='';
function v(id){return document.getElementById(id).value;}
function render(){
const style=v('style'),w=v('width'),h=v('height'),rad=v('radius');
const bcol=v('bcol'),bgcol=v('bgcol'),tcol=v('tcol'),glow=v('glow');
let extraCss='',inputBg=bgcol,inputBorder=bcol;
if(style==='glass'){inputBg='rgba(255,255,255,0.15)';extraCss='backdrop-filter:blur(10px);';}
if(style==='neon'){inputBg='#1a1a2e';inputBorder=glow;extraCss='box-shadow:0 0 10px '+glow+';';}
if(style==='minimal'){inputBorder='transparent';}
let css=`.search-wrap {
  position: relative;
  display: inline-block;
}
.search-wrap svg {
  position: absolute;
  left: 14px;
  top: 50%;
  transform: translateY(-50%);
  width: 18px;
  height: 18px;
  color: ${tcol};
  opacity: 0.5;
  pointer-events: none;
}
.search-input {
  width: ${w}px;
  height: ${h}px;
  padding: 0 16px 0 44px;
  border: 2px solid ${inputBorder};
  border-radius: ${rad}px;
  background: ${inputBg};
  color: ${tcol};
  font-size: 15px;
  outline: none;
  ${extraCss}
  transition: box-shadow 0.2s, border-color 0.2s;
  box-sizing: border-box;
}
.search-input:focus {
  border-color: ${glow};
  box-shadow: 0 0 0 3px ${glow}40;
}
.search-input::placeholder {
  color: ${tcol};
  opacity: 0.4;
}`;
const html=`<div class="search-wrap">
  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
  <input type="text" class="search-input" placeholder="Search...">
</div>`;
document.getElementById('prev').innerHTML='<div style="padding:20px;background:'+(style==='neon'||style==='glass'?'#0a0a1a':'#f5f5f5')+';display:flex;justify-content:center;">'+html+'</div>';
codeText=`<style>
${css}
</style>

${html}`;
document.getElementById('code').textContent=codeText;
}
function copyCode(){navigator.clipboard.writeText(codeText).then(()=>alert('Copied!'));}
render();
</script>
</body>
</html>
