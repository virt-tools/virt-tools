<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="/assets/theme-init.js"></script>
<title>Font Previewer — Virtual Tools</title>
<link rel="stylesheet" href="/assets/style.css">
<style>
.tool-wrap{max-width:720px;margin:0 auto;}
.tool-desc{font-size:14px;color:var(--text-secondary,#aaa);margin:8px 0 20px;}
.controls{display:flex;gap:8px;margin:12px 0;flex-wrap:wrap;align-items:center;}
.controls label{font-size:13px;color:var(--text-secondary,#888);margin-right:4px;}
.controls select,.controls input[type="text"],.controls input[type="number"]{padding:6px 10px;border-radius:6px;border:1px solid var(--border,#444);background:var(--card,#2a2f3e);color:var(--text,#eee);font-size:13px;}
.controls input[type="text"]{flex:1;min-width:200px;}
.controls input[type="range"]{width:120px;}
.preview{background:var(--card,#2a2f3e);border:1px solid var(--border,#444);border-radius:8px;padding:24px;margin:12px 0;min-height:120px;overflow:hidden;word-break:break-word;}
.font-list{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:8px;margin:12px 0;}
.font-card{background:var(--card,#2a2f3e);border:1px solid var(--border,#444);border-radius:8px;padding:12px;cursor:pointer;transition:border-color .15s;}
.font-card:hover{border-color:var(--accent,#5b8def);}
.font-card.active{border-color:var(--accent,#5b8def);background:var(--bg-hover,#2e3548);}
.font-name{font-size:11px;color:var(--text-secondary,#888);margin-bottom:4px;text-transform:capitalize;}
.font-sample{font-size:20px;color:var(--text,#eee);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.val{font-size:12px;color:var(--accent,#5b8def);margin-left:4px;}
</style>
</head>
<body>
<header id="site-header"></header>
<main>
<div class="tool-wrap">
<h1>🔤 Font Previewer</h1>
<p class="tool-desc">Preview web-safe and system fonts with your own text. Adjust size, weight, style, letter spacing, and line height.</p>
<div class="controls">
<input type="text" id="sampleText" value="The quick brown fox jumps over the lazy dog" placeholder="Type your sample text...">
</div>
<div class="controls">
<label>Size: <input type="range" id="fontSize" min="8" max="72" value="24"><span class="val" id="fontSizeVal">24px</span></label>
<label>Weight: <select id="fontWeight"><option value="100">100 Thin</option><option value="300">300 Light</option><option value="400" selected>400 Regular</option><option value="500">500 Medium</option><option value="700">700 Bold</option><option value="900">900 Black</option></select></label>
<label>Style: <select id="fontStyle"><option value="normal" selected>Normal</option><option value="italic">Italic</option></select></label>
<label>Spacing: <input type="range" id="letterSpacing" min="-2" max="10" value="0" step="0.5"><span class="val" id="lsVal">0px</span></label>
<label>Line H: <input type="range" id="lineHeight" min="0.8" max="3" value="1.4" step="0.1"><span class="val" id="lhVal">1.4</span></label>
</div>
<div class="preview" id="preview">The quick brown fox jumps over the lazy dog</div>
<div class="font-list" id="fontList"></div>
<div class="controls">
<button onclick="copyCSS()" style="padding:8px 16px;border-radius:6px;border:1px solid var(--border,#444);background:var(--card,#2a2f3e);color:var(--text,#eee);cursor:pointer;font-size:13px;">Copy CSS</button>
</div>
</div>
</main>
<script src="/assets/app.js"></script>
<script>
const fonts=['Arial','Helvetica','Times New Roman','Georgia','Garamond','Courier New','Verdana','Tahoma','Trebuchet MS','Impact','Comic Sans MS','Palatino','Bookman','Courier','Lucida Console','Monaco','Bradley Hand','Brush Script MT','Century Gothic','Didot','Optima','Futura','Geneva','Cambria','Constantia','Corbel','Segoe UI','Roboto','Open Sans','Lato','Montserrat','Source Code Pro','Ubuntu','Cantarell','Noto Sans','Inter','System UI','serif','sans-serif','monospace','cursive','fantasy'];
let activeFont='Arial';
function init(){
const list=document.getElementById('fontList');
list.innerHTML='';
fonts.forEach(f=>{
const card=document.createElement('div');
card.className='font-card'+(f===activeFont?' active':'');
card.dataset.font=f;
card.innerHTML='<div class="font-name">'+f+'</div><div class="font-sample" style="font-family:\''+f+'\'">Aa Bb Cc 123</div>';
card.onclick=()=>{activeFont=f;updatePreview();document.querySelectorAll('.font-card').forEach(c=>c.classList.remove('active'));card.classList.add('active');};
list.appendChild(card);
});
updatePreview();
}
function updatePreview(){
const text=document.getElementById('sampleText').value||'The quick brown fox jumps over the lazy dog';
const size=document.getElementById('fontSize').value;
const weight=document.getElementById('fontWeight').value;
const style=document.getElementById('fontStyle').value;
const ls=document.getElementById('letterSpacing').value;
const lh=document.getElementById('lineHeight').value;
document.getElementById('fontSizeVal').textContent=size+'px';
document.getElementById('lsVal').textContent=ls+'px';
document.getElementById('lhVal').textContent=lh;
const p=document.getElementById('preview');
p.textContent=text;
p.style.fontFamily="'"+activeFont+"'";
p.style.fontSize=size+'px';
p.style.fontWeight=weight;
p.style.fontStyle=style;
p.style.letterSpacing=ls+'px';
p.style.lineHeight=lh;
}
['sampleText','fontSize','fontWeight','fontStyle','letterSpacing','lineHeight'].forEach(id=>{const el=document.getElementById(id);if(el)el.addEventListener('input',updatePreview);});
function copyCSS(){
const css="font-family: '"+activeFont+"';\nfont-size: "+document.getElementById('fontSize').value+"px;\nfont-weight: "+document.getElementById('fontWeight').value+";\nfont-style: "+document.getElementById('fontStyle').value+";\nletter-spacing: "+document.getElementById('letterSpacing').value+"px;\nline-height: "+document.getElementById('lineHeight').value+";";
navigator.clipboard.writeText(css).then(()=>alert('CSS copied!')).catch(()=>alert(css));
}
init();
</script>
</body>
</html>
