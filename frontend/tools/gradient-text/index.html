<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="/assets/theme-init.js"></script>
<title>Gradient Text Generator — Virtual Tools</title>
<link rel="stylesheet" href="/assets/style.css">
<style>
.tool-wrap{max-width:720px;margin:0 auto;}
.tool-desc{font-size:14px;color:var(--text-secondary,#aaa);margin:8px 0 20px;}
.controls{display:flex;gap:8px;margin:12px 0;flex-wrap:wrap;align-items:center;}
.controls label{font-size:13px;color:var(--text-secondary,#888);margin-right:4px;}
.controls input[type="text"]{flex:1;min-width:200px;padding:6px 10px;border-radius:6px;border:1px solid var(--border,#444);background:var(--card,#2a2f3e);color:var(--text,#eee);font-size:13px;}
.controls select,.controls input[type="number"]{padding:6px 10px;border-radius:6px;border:1px solid var(--border,#444);background:var(--card,#2a2f3e);color:var(--text,#eee);font-size:13px;}
.stops{display:flex;gap:6px;margin:8px 0;flex-wrap:wrap;align-items:center;}
.stop-item{display:flex;align-items:center;gap:4px;background:var(--card,#2a2f3e);padding:4px 8px;border-radius:6px;border:1px solid var(--border,#444);}
.stop-item input[type="color"]{width:32px;height:32px;border:none;border-radius:4px;cursor:pointer;background:none;}
.stop-item input[type="number"]{width:50px;padding:4px;border-radius:4px;border:1px solid var(--border,#444);background:var(--bg,#1e2230);color:var(--text,#eee);font-size:12px;}
.stop-item button{padding:4px 8px;border-radius:4px;border:1px solid var(--border,#444);background:var(--bg,#1e2230);color:var(--text,#eee);cursor:pointer;font-size:12px;}
.preview{background:var(--card,#2a2f3e);border:1px solid var(--border,#444);border-radius:8px;padding:32px;margin:12px 0;text-align:center;min-height:100px;display:flex;align-items:center;justify-content:center;}
.preview-text{font-size:48px;font-weight:700;line-height:1.2;}
button.action{padding:8px 16px;border-radius:6px;border:1px solid var(--border,#444);background:var(--card,#2a2f3e);color:var(--text,#eee);cursor:pointer;font-size:13px;}
button.action:hover{border-color:var(--accent,#5b8def);}
.css-output{background:var(--bg,#1e2230);border:1px solid var(--border,#444);border-radius:8px;padding:12px;margin:12px 0;font-family:monospace;font-size:12px;color:var(--text,#eee);white-space:pre-wrap;word-break:break-all;}
</style>
</head>
<body>
<header id="site-header"></header>
<main>
<div class="tool-wrap">
<h1>🌈 Gradient Text Generator</h1>
<p class="tool-desc">Create CSS gradient text effects with live preview. Multi-color stops, linear/radial/conic gradients, adjustable angle.</p>
<div class="controls">
<input type="text" id="text" value="Gradient Text" placeholder="Enter text...">
<label>Size: <input type="number" id="size" value="48" min="8" max="120"></label>
<label>Weight: <select id="weight"><option value="400">Regular</option><option value="700" selected>Bold</option><option value="900">Black</option></select></label>
<label>Type: <select id="type"><option value="linear" selected>Linear</option><option value="radial">Radial</option><option value="conic">Conic</option></select></label>
<label>Angle: <input type="number" id="angle" value="90" min="0" max="360">°</label>
</div>
<div class="stops" id="stops"></div>
<div class="controls">
<button class="action" onclick="addStop()">+ Add Stop</button>
<button class="action" onclick="copyCSS()">Copy CSS</button>
</div>
<div class="preview"><div class="preview-text" id="preview">Gradient Text</div></div>
<div class="css-output" id="cssOutput"></div>
</div>
</main>
<script src="/assets/app.js"></script>
<script>
let stops=[{color:'#ff0080',pos:0},{color:'#7928ca',pos:50},{color:'#00d4ff',pos:100}];
function renderStops(){
const c=document.getElementById('stops');c.innerHTML='';
stops.forEach((s,i)=>{
const item=document.createElement('div');item.className='stop-item';
item.innerHTML='<input type="color" value="'+s.color+'" data-i="'+i+'"><input type="number" value="'+s.pos+'" min="0" max="100" data-i="'+i+'">'+(stops.length>2?'<button data-i="'+i+'" onclick="rmStop('+i+')">✕</button>':'');
c.appendChild(item);
});
c.querySelectorAll('input[type=color]').forEach(el=>el.onchange=e=>{stops[+e.target.dataset.i].color=e.target.value;update();});
c.querySelectorAll('input[type=number]').forEach(el=>el.onchange=e=>{stops[+e.target.dataset.i].pos=+e.target.value;update();});
}
function addStop(){stops.push({color:'#'+Math.floor(Math.random()*16777215).toString(16).padStart(6,'0'),pos:100});update();}
function rmStop(i){stops.splice(i,1);update();}
function buildGradient(){
const parts=stops.map(s=>s.color+' '+s.pos+'%').join(', ');
const type=document.getElementById('type').value;
const angle=document.getElementById('angle').value;
if(type==='linear')return'linear-gradient('+angle+'deg, '+parts+')';
if(type==='radial')return'radial-gradient(circle, '+parts+')';
return'conic-gradient(from '+angle+'deg, '+parts+')';
}
function update(){
const text=document.getElementById('text').value||'Gradient Text';
const size=document.getElementById('size').value;
const weight=document.getElementById('weight').value;
const grad=buildGradient();
const p=document.getElementById('preview');
p.textContent=text;p.style.fontSize=size+'px';p.style.fontWeight=weight;
p.style.background=grad;p.style.webkitBackgroundClip='text';p.style.backgroundClip='text';
p.style.webkitTextFillColor='transparent';p.style.color='transparent';
const css='background: '+grad+';\n-webkit-background-clip: text;\nbackground-clip: text;\n-webkit-text-fill-color: transparent;\ncolor: transparent;\nfont-size: '+size+'px;\nfont-weight: '+weight+';';
document.getElementById('cssOutput').textContent=css;
renderStops();
}
['text','size','weight','type','angle'].forEach(id=>{const el=document.getElementById(id);if(el)el.addEventListener('input',update);});
function copyCSS(){navigator.clipboard.writeText(document.getElementById('cssOutput').textContent).then(()=>alert('CSS copied!')).catch(()=>alert('Copy failed'));}
update();
</script>
</body>
</html>
