<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CSS Donut Chart Generator — virt.tools</title>
<link rel="stylesheet" href="/assets/style.css">
<style>
.tool-area{max-width:900px;margin:2rem auto;padding:0 1rem}
.controls{display:grid;gap:1rem;margin:1.5rem 0;padding:1.5rem;background:#1a1a2e;border-radius:12px}
.control-row{display:flex;gap:1rem;align-items:center;flex-wrap:wrap}
.control-row label{min-width:120px;font-weight:600;font-size:.9rem}
.control-row select,.control-row input{padding:.5rem .75rem;border-radius:8px;border:1px solid #444;background:#0f0f1e;color:#eee;font-size:.9rem}
.preview-box{margin:1.5rem 0;border-radius:12px;min-height:200px;padding:2rem;background:#f5f5f5;display:flex;align-items:center;justify-content:center;gap:2rem;flex-wrap:wrap}
.output-block{margin:2rem 0}
.output-block textarea{width:100%;min-height:100px;font-family:monospace;font-size:.85rem;padding:1rem;border-radius:8px;border:1px solid #444;background:#0f0f1e;color:#eee;resize:vertical}
.copy-btn{padding:.6rem 1.2rem;border:none;border-radius:8px;background:#667eea;color:#fff;cursor:pointer;font-size:.9rem;margin-top:.5rem}
h2{margin-top:2rem;font-size:1.2rem}
</style>
</head>
<body>
<header id="site-header"></header>
<main>
<div class="tool-area">
<h1>🍩 CSS Donut Chart Generator</h1>
<p>Create CSS donut/ring chart components using conic-gradient. Adjustable segments, colors, sizes. Copy HTML+CSS.</p>
<div class="controls">
<div class="control-row">
<label>Segments</label><select id="segments"><option value="2">2</option><option value="3" selected>3</option><option value="4">4</option><option value="5">5</option></select>
<label>Size</label><select id="size"><option value="sm">Small (120px)</option><option value="md" selected>Medium (180px)</option><option value="lg">Large (240px)</option></select>
<label>Thickness</label><select id="thickness"><option value="thin">Thin</option><option value="md" selected>Medium</option><option value="thick">Thick</option></select>
<label>Show Labels</label><select id="labels"><option value="yes" selected>Yes</option><option value="no">No</option></select>
</div>
<div class="control-row" id="colorRow"></div>
</div>
<h2>Preview</h2>
<div class="preview-box" id="preview"></div>
<h2>HTML</h2><div class="output-block"><textarea id="htmlOut" readonly></textarea><button class="copy-btn" onclick="copyText('htmlOut')">Copy HTML</button></div>
<h2>CSS</h2><div class="output-block"><textarea id="cssOut" readonly></textarea><button class="copy-btn" onclick="copyText('cssOut')">Copy CSS</button></div>
</div>
</main>
<script src="/assets/app.js"></script>
<script>
var defaultColors=['#667eea','#764ba2','#f093fb','#4facfe','#43e97b'];
var defaultLabels=['Desktop','Mobile','Tablet','Other','Unknown'];
var defaultValues=[55,30,10,3,2];
function buildColorInputs(){var n=+document.getElementById('segments').value;var row=document.getElementById('colorRow');row.innerHTML='';for(var i=0;i<n;i++){row.innerHTML+='<label>Seg '+(i+1)+'</label><input type="color" value="'+defaultColors[i]+'" data-idx="'+i+'" class="seg-color" style="width:40px;padding:2px"><input type="text" value="'+defaultLabels[i]+'" data-idx="'+i+'" class="seg-label" style="width:80px"><input type="number" value="'+defaultValues[i]+'" data-idx="'+i+'" class="seg-val" min="0" max="100" style="width:50px">';}row.querySelectorAll('input').forEach(function(e){e.addEventListener('input',update);e.addEventListener('change',update)})}
function update(){
var n=+document.getElementById('segments').value;var sizeMap={sm:120,md:180,lg:240};var sz=sizeMap[document.getElementById('size').value];
var thMap={thin:20,md:35,thick:50};var th=thMap[document.getElementById('thickness').value];
var showLabels=document.getElementById('labels').value==='yes';
var colors=[],labels=[],vals=[];for(var i=0;i<n;i++){colors.push(document.querySelectorAll('.seg-color')[i].value);labels.push(document.querySelectorAll('.seg-label')[i].value);vals.push(+document.querySelectorAll('.seg-val')[i].value)}
var total=vals.reduce(function(a,b){return a+b},0)||1;var accum=0;var stops=[];
for(var i=0;i<n;i++){var pct=vals[i]/total*100;stops.push(colors[i]+' 0 '+accum+'%');accum+=pct;stops.push(colors[i]+' '+accum+'%');}
var grad='conic-gradient('+stops.join(',')+')';
var html='<div class="donut-chart" style="background:'+grad+';width:'+sz+'px;height:'+sz+'px;border-radius:50%;display:grid;place-items:center">\n  <div class="donut-center" style="width:'+(sz-th*2)+'px;height:'+(sz-th*2)+'px;background:#fff;border-radius:50%;display:grid;place-items:center;font-size:'+(sz/10)+'px;font-weight:700;color:#333">'+total+'%</div>\n</div>';
if(showLabels){html+='\n<div class="donut-legend" style="display:flex;flex-direction:column;gap:6px;font-size:.85rem">';for(var i=0;i<n;i++){html+='\n  <div class="legend-item" style="display:flex;align-items:center;gap:6px"><span style="width:12px;height:12px;border-radius:3px;background:'+colors[i]+'"></span>'+labels[i]+' ('+Math.round(vals[i]/total*100)+'%)</div>';}html+='\n</div>';}
var css='.donut-chart{border-radius:50%;display:grid;place-items:center}\n.donut-center{border-radius:50%;display:grid;place-items:center;font-weight:700}\n.donut-legend{display:flex;flex-direction:column;gap:6px}\n.legend-item{display:flex;align-items:center;gap:6px}';
document.getElementById('htmlOut').value=html;
document.getElementById('cssOut').value=css;
document.getElementById('preview').innerHTML=html;
}
function copyText(id){var t=document.getElementById(id);t.select();document.execCommand('copy')}
document.getElementById('segments').addEventListener('change',buildColorInputs);
document.getElementById('size').addEventListener('change',update);
document.getElementById('thickness').addEventListener('change',update);
document.getElementById('labels').addEventListener('change',update);
buildColorInputs();update();
</script>
</body>
</html>
