<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CSS Comment Box Generator — virt.tools</title>
<link rel="stylesheet" href="/assets/style.css">
<style>
.tool-area{max-width:960px;margin:2rem auto;padding:0 1rem}
.controls{display:grid;gap:1rem;margin:1.5rem 0;padding:1.5rem;background:var(--card-bg,#1a1a2e);border-radius:12px}
.control-row{display:flex;gap:1rem;align-items:center;flex-wrap:wrap}
.control-row label{min-width:120px;font-weight:600;font-size:.9rem}
.control-row select,.control-row input[type="text"],.control-row input[type="color"]{padding:.5rem .75rem;border-radius:8px;border:1px solid #444;background:var(--bg,#0f0f1e);color:var(--text,#eee);font-size:.9rem}
.preview-area{margin:2rem 0;padding:2rem;background:#1a1a2e;border-radius:12px}
.css-output{margin:2rem 0}
.css-output textarea{width:100%;min-height:200px;font-family:monospace;font-size:.85rem;padding:1rem;border-radius:8px;border:1px solid #444;background:#0f0f1e;color:#eee;resize:vertical}
.copy-btn{padding:.6rem 1.2rem;border:none;border-radius:8px;background:#4a9eff;color:#fff;cursor:pointer;font-size:.9rem;margin-top:.5rem}
h2{margin-top:2rem;font-size:1.2rem}
.comment-box{background:#2a2a3e;border-radius:12px;padding:1.5rem;margin-bottom:1rem}
.comment-header{display:flex;align-items:center;gap:.75rem;margin-bottom:.75rem}
.comment-avatar{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:bold;color:#fff;font-size:1rem}
.comment-meta{flex:1}
.comment-author{font-weight:bold;font-size:.95rem}
.comment-time{font-size:.75rem;opacity:.6}
.comment-body{font-size:.9rem;line-height:1.5}
.comment-actions{display:flex;gap:1rem;margin-top:.75rem}
.comment-action{font-size:.8rem;opacity:.7;cursor:pointer}
.comment-action:hover{opacity:1}
.comment-reply{margin-left:2.5rem;margin-top:1rem;border-left:3px solid #444;padding-left:1rem}
</style>
</head>
<body>
<header id="site-header"></header>
<main>
<div class="tool-area">
<h1>💭 CSS Comment Box Generator</h1>
<p>Create styled comment box components for blogs/forums. 3 styles with avatars, timestamps, and reply nesting.</p>

<div class="controls">
<div class="control-row">
<label>Style</label>
<select id="style"><option value="card">Card</option><option value="flat">Flat</option><option value="bordered">Bordered</option></select>
</div>
<div class="control-row">
<label>Avatar BG</label><input type="color" id="avatarBg" value="#4a9eff">
<label>Box BG</label><input type="color" id="boxBg" value="#2a2a3e">
</div>
<div class="control-row">
<label>Author</label><input type="text" id="author" value="Jane Doe" style="flex:1;min-width:150px">
</div>
<div class="control-row">
<label>Comment</label><input type="text" id="comment" value="This is a great article! Thanks for sharing." style="flex:1;min-width:200px">
</div>
<div class="control-row">
<label>Reply Author</label><input type="text" id="replyAuthor" value="John Smith" style="flex:1;min-width:150px">
</div>
<div class="control-row">
<label>Reply Text</label><input type="text" id="replyText" value="Agreed! Very helpful." style="flex:1;min-width:200px">
</div>
<div class="control-row">
<label>Radius</label><input type="range" id="radius" min="0" max="20" value="12"><span id="radiusVal">12px</span>
</div>
<div class="control-row">
<label>Show Reply</label><select id="showReply"><option value="yes">Yes</option><option value="no">No</option></select>
<label>Show Actions</label><select id="showActions"><option value="yes">Yes</option><option value="no">No</option></select>
</div>
</div>

<div class="preview-area" id="preview"></div>

<h2>HTML</h2><div class="css-output"><textarea id="htmlOut" readonly></textarea><button class="copy-btn" onclick="copyText('htmlOut')">Copy HTML</button></div>
<h2>CSS</h2><div class="css-output"><textarea id="cssOut" readonly></textarea><button class="copy-btn" onclick="copyText('cssOut')">Copy CSS</button></div>
</div>
</main>
<script src="/assets/app.js"></script>
<script>
function update(){
var style=document.getElementById('style').value;
var abg=document.getElementById('avatarBg').value;
var bbg=document.getElementById('boxBg').value;
var author=document.getElementById('author').value;
var comment=document.getElementById('comment').value;
var ra=document.getElementById('replyAuthor').value;
var rt=document.getElementById('replyText').value;
var r=parseInt(document.getElementById('radius').value);
var showReply=document.getElementById('showReply').value==='yes';
var showActions=document.getElementById('showActions').value==='yes';
document.getElementById('radiusVal').textContent=r+'px';

var initial=author.charAt(0).toUpperCase();
var rInitial=ra.charAt(0).toUpperCase();
var now=new Date();
var ts=now.toLocaleDateString(undefined,{month:'short',day:'numeric'})+' at '+now.toLocaleTimeString(undefined,{hour:'2-digit',minute:'2-digit'});

var borderStyle=style==='bordered'?'border:1px solid #444;':style==='flat'?'border:none;':'box-shadow:0 2px 8px rgba(0,0,0,.2);';

var html='<div class="comment-box">\n  <div class="comment-header">\n    <div class="comment-avatar" style="background:'+abg+'">'+initial+'</div>\n    <div class="comment-meta">\n      <div class="comment-author">'+author+'</div>\n      <div class="comment-time">'+ts+'</div>\n    </div>\n  </div>\n  <div class="comment-body">'+comment+'</div>';
if(showActions) html+='\n  <div class="comment-actions">\n    <span class="comment-action">Reply</span>\n    <span class="comment-action">Like</span>\n    <span class="comment-action">Share</span>\n  </div>';
if(showReply) html+='\n  <div class="comment-reply">\n    <div class="comment-header">\n      <div class="comment-avatar" style="background:'+shade(abg,30)+'">'+rInitial+'</div>\n      <div class="comment-meta">\n        <div class="comment-author">'+ra+'</div>\n        <div class="comment-time">'+ts+'</div>\n      </div>\n    </div>\n    <div class="comment-body">'+rt+'</div>\n  </div>';
html+='\n</div>';

var css='.comment-box{\n  background:'+bbg+';\n  border-radius:'+r+'px;\n  padding:1.5rem;\n  margin-bottom:1rem;\n  '+borderStyle+'\n}\n.comment-header{\n  display:flex;\n  align-items:center;\n  gap:.75rem;\n  margin-bottom:.75rem;\n}\n.comment-avatar{\n  width:40px;\n  height:40px;\n  border-radius:50%;\n  display:flex;\n  align-items:center;\n  justify-content:center;\n  font-weight:bold;\n  color:#fff;\n  font-size:1rem;\n}\n.comment-meta{flex:1}\n.comment-author{font-weight:bold;font-size:.95rem;color:#eee}\n.comment-time{font-size:.75rem;opacity:.6;color:#aaa}\n.comment-body{font-size:.9rem;line-height:1.5;color:#ddd}\n.comment-actions{display:flex;gap:1rem;margin-top:.75rem}\n.comment-action{font-size:.8rem;opacity:.7;cursor:pointer;color:#aaa}\n.comment-reply{\n  margin-left:2.5rem;\n  margin-top:1rem;\n  border-left:3px solid #444;\n  padding-left:1rem;\n}';

document.getElementById('preview').innerHTML=html;
document.getElementById('htmlOut').value=html;
document.getElementById('cssOut').value=css;
}
function shade(hex,p){var R=parseInt(hex.substring(1,3),16),G=parseInt(hex.substring(3,5),16),B=parseInt(hex.substring(5,7),16);R=Math.min(255,Math.max(0,R+p));G=Math.min(255,Math.max(0,G+p));B=Math.min(255,Math.max(0,B+p));return'#'+R.toString(16).padStart(2,'0')+G.toString(16).padStart(2,'0')+B.toString(16).padStart(2,'0');}
function copyText(id){var t=document.getElementById(id);t.select();document.execCommand('copy');}
document.querySelectorAll('select,input').forEach(function(e){e.addEventListener('input',update)});
update();
</script>
</body>
</html>
