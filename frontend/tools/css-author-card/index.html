<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CSS Author Card Generator — virt.tools</title>
<link rel="stylesheet" href="/assets/style.css">
<style>
.tool-area{max-width:900px;margin:2rem auto;padding:0 1rem}
.controls{display:grid;gap:1rem;margin:1.5rem 0;padding:1.5rem;background:#1a1a2e;border-radius:12px}
.control-row{display:flex;gap:1rem;align-items:center;flex-wrap:wrap}
.control-row label{min-width:100px;font-weight:600;font-size:.9rem}
.control-row select,.control-row input{padding:.5rem .75rem;border-radius:8px;border:1px solid #444;background:#0f0f1e;color:#eee;font-size:.9rem}
.preview-box{margin:1.5rem 0;border-radius:12px;background:#2a2a3e;padding:2rem 1.5rem;min-height:220px;display:flex;align-items:center;justify-content:center}
.output-block{margin:2rem 0}
.output-block textarea{width:100%;min-height:120px;font-family:monospace;font-size:.85rem;padding:1rem;border-radius:8px;border:1px solid #444;background:#0f0f1e;color:#eee;resize:vertical}
.copy-btn{padding:.6rem 1.2rem;border:none;border-radius:8px;background:#667eea;color:#fff;cursor:pointer;font-size:.9rem;margin-top:.5rem}
h2{margin-top:2rem;font-size:1.2rem}
</style>
</head>
<body>
<header id="site-header"></header>
<main>
<div class="tool-area">
<h1>👤 CSS Author Card Generator</h1>
<p>Create CSS author bio / user profile card components. 4 styles, social icons, cover image. Copy HTML+CSS.</p>
<div class="controls">
<div class="control-row">
<label>Style</label><select id="style"><option value="standard" selected>Standard</option><option value="compact">Compact</option><option value="cover">Cover</option><option value="glass">Glass</option></select>
<label>Accent</label><input type="color" id="accent" value="#667eea">
<label>Theme</label><select id="theme"><option value="dark" selected>Dark</option><option value="light">Light</option></select>
</div>
<div class="control-row">
<label>Name</label><input type="text" id="name" value="Jane Doe" style="width:120px">
<label>Role</label><input type="text" id="role" value="UI Designer" style="width:120px">
<label>Bio</label><input type="text" id="bio" value="Creating beautiful interfaces since 2015" style="width:250px">
<label>Avatar</label><input type="color" id="avatarBg" value="#f093fb">
</div>
<div class="control-row">
<label>Social</label><select id="social"><option value="none">None</option><option value="icons" selected>Icons</option><option value="buttons">Buttons</option></select>
<label>Width</label><select id="width"><option value="240">240px</option><option value="300" selected>300px</option><option value="360">360px</option></select>
</div>
</div>
<h2>Preview</h2>
<div class="preview-box" id="preview"></div>
<h2>HTML</h2><div class="output-block"><textarea id="htmlOut" readonly></textarea><button class="copy-btn" onclick="copyText('htmlOut')">Copy HTML</button></div>
<h2>CSS</h2><div class="output-block"><textarea id="cssOut" readonly></textarea><button class="copy-btn" onclick="copyText('cssOut')">Copy CSS</button></div>
</div>
</main>
<script src="/assets/app.js"></script>
<script>
function update(){
var s=document.getElementById('style').value;
var ac=document.getElementById('accent').value;
var th=document.getElementById('theme').value;
var nm=document.getElementById('name').value;
var rl=document.getElementById('role').value;
var bo=document.getElementById('bio').value;
var avBg=document.getElementById('avatarBg').value;
var soc=document.getElementById('social').value;
var w=document.getElementById('width').value;
var cardBg=th==='dark'?'#1a1a2e':'#fff';
var textCol=th==='dark'?'#eee':'#222';
var subCol=th==='dark'?'#aaa':'#666';
var initials=nm.split(' ').map(function(x){return x[0]}).join('').slice(0,2).toUpperCase();
var html='<div class="author-card">\n';
if(s==='cover'){html+='  <div class="cover"></div>\n'}
html+='  <div class="avatar" style="background:'+avBg+'">'+initials+'</div>\n';
html+='  <h3 class="name">'+nm+'</h3>\n';
html+='  <p class="role">'+rl+'</p>\n';
if(s!=='compact'){html+='  <p class="bio">'+bo+'</p>\n'}
if(soc!=='none'){
html+='  <div class="socials">\n';
var platforms=['Twitter','GitHub','LinkedIn','Dribbble'];
platforms.forEach(function(p,i){
var ic=soc==='icons'?'<span class="ic">'+p[0]+'</span>':'<a href="#" class="btn">'+p+'</a>';
html+='    '+ic+'\n';
});
html+='  </div>\n';
}
html+='</div>';
var css='.author-card{width:'+w+'px;background:'+(s==='glass'?'rgba(26,26,46,0.6)':cardBg)+';';
if(s==='glass'){css+='backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,0.1)'}
css+='border-radius:16px;padding:'+(s==='compact'?'1rem':s==='cover'?'2rem 1.5rem 1.5rem':'1.5rem')+';text-align:center;font-family:system-ui,sans-serif;color:'+textCol+';box-shadow:0 8px 32px rgba(0,0,0,0.3);margin:0 auto}\n';
if(s==='cover'){css+='.author-card .cover{height:80px;background:linear-gradient(135deg,'+ac+','+avBg+');border-radius:16px 16px 0 0;margin:-2rem -1.5rem 0.5rem}\n'}
css+='.author-card .avatar{width:'+(s==='compact'?'48':'72')+'px;height:'+(s==='compact'?'48':'72')+'px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:'+(s==='compact'?'18':'28')+'px;font-weight:700;color:#fff;margin:'+(s==='cover'?'-36px auto 0.5rem':'0 auto 0.75rem')+';border:3px solid '+(s==='glass'?'rgba(255,255,255,0.2)':cardBg)+'}\n';
css+='.author-card .name{margin:0 0 0.25rem;font-size:'+(s==='compact'?'1rem':'1.25rem')+';font-weight:700}\n';
css+='.author-card .role{margin:0 0 0.5rem;font-size:0.85rem;color:'+ac+';font-weight:600}\n';
css+='.author-card .bio{margin:0 0 1rem;font-size:0.85rem;color:'+subCol+';line-height:1.5}\n';
css+='.author-card .socials{display:flex;gap:'+(soc==='icons'?'0.5rem':'0.75rem')+';justify-content:center;align-items:center}\n';
css+='.author-card .socials .ic{width:32px;height:32px;border-radius:50%;background:'+ac+';display:flex;align-items:center;justify-content:center;color:#fff;font-size:0.8rem;font-weight:700;cursor:pointer;transition:opacity .2s}\n';
css+='.author-card .socials .ic:hover{opacity:0.85}\n';
css+='.author-card .socials .btn{padding:0.35rem 0.75rem;border-radius:8px;background:'+ac+';color:#fff;text-decoration:none;font-size:0.8rem;transition:opacity .2s}\n';
css+='.author-card .socials .btn:hover{opacity:0.85}';
document.getElementById('htmlOut').value=html;
document.getElementById('cssOut').value=css;
document.getElementById('preview').innerHTML='<style>'+css+'<\/style>'+html;
}
function copyText(id){var t=document.getElementById(id);t.select();document.execCommand('copy')}
document.querySelectorAll('select,input').forEach(function(e){e.addEventListener('input',update);e.addEventListener('change',update)});
update();
</script>
</body>
</html>
