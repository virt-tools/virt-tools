<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="/assets/theme-init.js"></script>
<title>Yahtzee — Virtual Tools</title>
<link rel="stylesheet" href="/assets/style.css">
<style>
.tool-wrap{max-width:700px;margin:0 auto;}
.dice-area{display:flex;gap:12px;justify-content:center;margin:20px 0;flex-wrap:wrap;}
.die{width:60px;height:60px;border-radius:12px;background:#fff;border:2px solid #333;display:flex;align-items:center;justify-content:center;font-size:32px;cursor:pointer;transition:all .2s;user-select:none;}
.die.held{border-color:#e65100;background:#fff3e0;transform:scale(1.1);}
.die:hover{box-shadow:0 2px 8px rgba(0,0,0,.3);}
.controls{display:flex;gap:10px;justify-content:center;margin:15px 0;flex-wrap:wrap;}
.btn{padding:10px 24px;border-radius:10px;border:none;cursor:pointer;font-size:15px;font-weight:600;}
.btn-primary{background:#1565c0;color:#fff;}
.btn-primary:hover{background:#0d47a1;}
.btn-primary:disabled{opacity:.5;cursor:not-allowed;}
.btn-secondary{background:#455a64;color:#fff;}
.btn-secondary:hover{background:#263238;}
.info-bar{display:flex;justify-content:space-around;background:var(--bg-alt,#1a1f2e);border-radius:10px;padding:12px;margin:15px 0;font-size:14px;}
.scorecard{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin:15px 0;}
.score-section{background:var(--bg-alt,#1a1f2e);border:1px solid var(--border,#333);border-radius:10px;padding:15px;}
.score-section h3{margin:0 0 10px;font-size:14px;color:var(--text,#e0e0e0);}
.score-row{display:flex;justify-content:space-between;align-items:center;padding:5px 8px;border-radius:6px;cursor:pointer;font-size:13px;margin:2px 0;}
.score-row:hover{background:rgba(255,255,255,.05);}
.score-row.scored{opacity:.6;cursor:not-allowed;}
.score-row .val{font-weight:700;min-width:30px;text-align:right;}
.score-row .val.potential{color:#4caf50;}
.total-row{font-weight:700;font-size:15px;border-top:1px solid var(--border,#333);margin-top:8px;padding-top:8px;}
.game-over{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.8);display:none;align-items:center;justify-content:center;z-index:100;}
.game-over.show{display:flex;}
.game-over-content{background:var(--bg-alt,#1a1f2e);border-radius:16px;padding:40px;text-align:center;max-width:400px;}
.game-over-content h2{font-size:24px;margin-bottom:10px;}
.game-over-content .final-score{font-size:48px;font-weight:700;color:#4caf50;margin:15px 0;}
</style>
</head>
<body>
<header id="site-header"></header>
<main>
<div class="tool-wrap">
<h1>Yahtzee 🎲</h1>
<p class="tool-desc">Roll 5 dice up to 3 times per turn, hold the ones you want, then score in one of 13 categories. Maximize your total score across 13 rounds!</p>

<div class="info-bar">
<span><strong>Round:</strong> <span id="round">1</span>/13</span>
<span><strong>Rolls left:</strong> <span id="rollsLeft">3</span></span>
<span><strong>Total:</strong> <span id="totalScore">0</span></span>
</div>

<div class="dice-area" id="diceArea"></div>
<div class="controls">
<button class="btn btn-primary" id="rollBtn" onclick="rollDice()">Roll Dice</button>
<button class="btn btn-secondary" onclick="newGame()">New Game</button>
</div>
<p style="text-align:center;font-size:13px;color:var(--text-secondary,#888);" id="hintText">Click Roll to start your first turn!</p>

<div class="scorecard">
<div class="score-section">
<h3>Upper Section</h3>
<div id="upperCard"></div>
</div>
<div class="score-section">
<h3>Lower Section</h3>
<div id="lowerCard"></div>
</div>
</div>
</div>

<div class="game-over" id="gameOver">
<div class="game-over-content">
<h2>Game Over!</h2>
<p>Your final score:</p>
<div class="final-score" id="finalScore">0</div>
<button class="btn btn-primary" onclick="newGame()">Play Again</button>
</div>
</div>
</main>
<script src="/assets/app.js"></script>
<script>
let dice=[1,1,1,1,1],held=[false,false,false,false,false];
let rollsLeft=3,round=1,scored={},gameOver=false;
const UPPER=[['Ones',1],['Twos',2],['Threes',3],['Fours',4],['Fives',5],['Sixes',6]];
const LOWER=['Three of a Kind','Four of a Kind','Full House','Small Straight','Large Straight','Yahtzee','Chance'];
const FACES=['⚀','⚁','⚂','⚃','⚄','⚅'];
function rollDice(){
if(rollsLeft<=0||gameOver)return;
for(let i=0;i<5;i++)if(!held[i])dice[i]=Math.floor(Math.random()*6)+1;
rollsLeft--;updateUI();calcPotentials();
}
function toggleHold(i){
if(rollsLeft===3||gameOver)return;
held[i]=!held[i];updateUI();
}
function updateUI(){
const area=document.getElementById('diceArea');area.innerHTML='';
dice.forEach((d,i)=>{
const el=document.createElement('div');
el.className='die'+(held[i]?' held':'');
el.textContent=FACES[d-1];el.onclick=()=>toggleHold(i);
area.appendChild(el);
});
document.getElementById('round').textContent=round;
document.getElementById('rollsLeft').textContent=rollsLeft;
document.getElementById('totalScore').textContent=getTotal();
document.getElementById('rollBtn').disabled=(rollsLeft<=0||gameOver);
const hint=document.getElementById('hintText');
if(gameOver)hint.textContent='';
else if(rollsLeft===3)hint.textContent='Click Roll to start round '+round+'!';
else if(rollsLeft===0)hint.textContent='Choose a category to score this turn.';
else hint.textContent='Click dice to hold them, then roll again or score.';
}
function countDice(){const c={};dice.forEach(d=>c[d]=(c[d]||0)+1);return c;}
function isStraight(n){const u=[...new Set(dice)].sort((a,b)=>a-b);let max=1,cur=1;for(let i=1;i<u.length;i++){if(u[i]===u[i-1]+1)cur++;else cur=1;if(cur>max)max=cur;}return max>=n;}
function calcPotentials(){
const pots={};const counts=Object.values(countDice());
const sorted=dice.slice().sort((a,b)=>a-b);
UPPER.forEach(([name,val])=>{if(!scored[name])pots[name]=dice.filter(d=>d===val).reduce((a,b)=>a+b,0);});
if(!scored['Three of a Kind'])pots['Three of a Kind']=counts.some(c=>c>=3)?dice.reduce((a,b)=>a+b,0):0;
if(!scored['Four of a Kind'])pots['Four of a Kind']=counts.some(c=>c>=4)?dice.reduce((a,b)=>a+b,0):0;
if(!scored['Full House'])pots['Full House']=counts.includes(3)&&counts.includes(2)?25:0;
if(!scored['Small Straight'])pots['Small Straight']=isStraight(4)?30:0;
if(!scored['Large Straight'])pots['Large Straight']=isStraight(5)?40:0;
if(!scored['Yahtzee'])pots['Yahtzee']=counts.includes(5)?50:0;
if(!scored['Chance'])pots['Chance']=dice.reduce((a,b)=>a+b,0);
return pots;
}
function scoreCategory(name){
if(scored[name]!==undefined||gameOver)return;
if(rollsLeft===3)return;
const pots=calcPotentials();
scored[name]=pots[name]!==undefined?pots[name]:0;
round++;rollsLeft=3;held=[false,false,false,false,false];dice=[1,1,1,1,1];
if(round>13){gameOver=true;showGameOver();}
updateUI();renderCard();
}
function getTotal(){
let t=0;Object.values(scored).forEach(v=>t+=v);
let upperBonus=0;UPPER.forEach(([n])=>{if(scored[n]!==undefined)upperBonus+=scored[n];});
if(upperBonus>=63)t+=35;
return t;
}
function renderCard(){
const uc=document.getElementById('upperCard'),lc=document.getElementById('lowerCard');
uc.innerHTML='';lc.innerHTML='';
const pots=calcPotentials();
UPPER.forEach(([name])=>{
const s=scored[name]!==undefined;const val=s?scored[name]:(pots[name]!==undefined&&rollsLeft<3?'<span class="val potential">'+pots[name]+'</span>':'');
uc.innerHTML+=`<div class="score-row${s?' scored':''}" onclick="scoreCategory('${name}')">${name}<span class="val">${s?scored[name]:val}</span></div>`;
});
let upperSum=0;UPPER.forEach(([n])=>{if(scored[n]!==undefined)upperSum+=scored[n];});
uc.innerHTML+=`<div class="score-row"><span>Bonus (63+)</span><span class="val">${upperSum>=63?'35':'0'}</span></div>`;
uc.innerHTML+=`<div class="score-row total-row"><span>Upper Total</span><span class="val">${upperSum+(upperSum>=63?35:0)}</span></div>`;
LOWER.forEach(name=>{
const s=scored[name]!==undefined;const val=s?scored[name]:(pots[name]!==undefined&&rollsLeft<3?'<span class="val potential">'+pots[name]+'</span>':'');
lc.innerHTML+=`<div class="score-row${s?' scored':''}" onclick="scoreCategory('${name}')">${name}<span class="val">${s?scored[name]:val}</span></div>`;
});
let lowerSum=0;LOWER.forEach(n=>{if(scored[n]!==undefined)lowerSum+=scored[n];});
lc.innerHTML+=`<div class="score-row total-row"><span>Lower Total</span><span class="val">${lowerSum}</span></div>`;
lc.innerHTML+=`<div class="score-row total-row"><span>Grand Total</span><span class="val">${getTotal()}</span></div>`;
}
function showGameOver(){document.getElementById('finalScore').textContent=getTotal();document.getElementById('gameOver').classList.add('show');}
function newGame(){dice=[1,1,1,1,1];held=[false,false,false,false,false];rollsLeft=3;round=1;scored={};gameOver=false;document.getElementById('gameOver').classList.remove('show');updateUI();renderCard();}
updateUI();renderCard();
</script>
</body>
</html>
