<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CSS Segmented Control Generator — virt.tools</title>
<link rel="stylesheet" href="/assets/style.css">
<style>
.tool-area{max-width:900px;margin:2rem auto;padding:0 1rem}
.controls{display:grid;gap:1rem;margin:1.5rem 0;padding:1.5rem;background:#1a1a2e;border-radius:12px}
.control-row{display:flex;gap:1rem;align-items:center;flex-wrap:wrap}
.control-row label{min-width:100px;font-weight:600;font-size:.9rem}
.control-row select,.control-row input{padding:.5rem .75rem;border-radius:8px;border:1px solid #444;background:#0f0f1e;color:#eee;font-size:.9rem}
.preview-box{margin:1.5rem 0;border-radius:12px;min-height:120px;padding:2rem;background:#f5f5f5;display:flex;align-items:center;justify-content:center}
.output-block{margin:2rem 0}
.output-block textarea{width:100%;min-height:100px;font-family:monospace;font-size:.85rem;padding:1rem;border-radius:8px;border:1px solid #444;background:#0f0f1e;color:#eee;resize:vertical}
.copy-btn{padding:.6rem 1.2rem;border:none;border-radius:8px;background:#667eea;color:#fff;cursor:pointer;font-size:.9rem;margin-top:.5rem}
h2{margin-top:2rem;font-size:1.2rem}
</style>
</head>
<body>
<header id="site-header"></header>
<main>
<div class="tool-area">
<h1>🎚️ CSS Segmented Control Generator</h1>
<p>Create CSS segmented control / toggle button groups. 3 styles, 3 themes, custom segments. Copy HTML+CSS.</p>
<div class="controls">
<div class="control-row">
<label>Style</label><select id="style"><option value="flat" selected>Flat</option><option value="pill">Pill</option><option value="underline">Underline</option></select>
<label>Theme</label><select id="theme"><option value="light" selected>Light</option><option value="dark">Dark</option><option value="gradient">Gradient</option></select>
<label>Segments</label><select id="segments"><option value="3" selected>3</option><option value="4">4</option><option value="5">5</option><option value="6">6</option></select>
<label>Active Color</label><input type="color" id="color" value="#667eea" style="width:50px;padding:2px">
<label>Size</label><select id="size"><option value="sm">Small</option><option value="md" selected>Medium</option><option value="lg">Large</option></select>
</div>
</div>
<h2>Preview</h2>
<div class="preview-box" id="preview"></div>
<h2>HTML</h2><div class="output-block"><textarea id="htmlOut" readonly></textarea><button class="copy-btn" onclick="copyText('htmlOut')">Copy HTML</button></div>
<h2>CSS</h2><div class="output-block"><textarea id="cssOut" readonly></textarea><button class="copy-btn" onclick="copyText('cssOut')">Copy CSS</button></div>
</div>
</main>
<script src="/assets/app.js"></script>
<script>
function update(){
var style=document.getElementById('style').value,theme=document.getElementById('theme').value;
var segs=+document.getElementById('segments').value,color=document.getElementById('color').value;
var size=document.getElementById('size').value;
var sizes={sm:{p:'.35rem .8rem',f:'.75rem'},md:{p:'.5rem 1rem',f:'.85rem'},lg:{p:'.7rem 1.4rem',f:'1rem'}};
var s=sizes[size];
var themes={light:{bg:'#e8e8e8',text:'#333',inactive:'#888'},dark:{bg:'#1a1a2e',text:'#eee',inactive:'#666'},gradient:{bg:'linear-gradient(135deg,#667eea,#764ba2)',text:'#fff',inactive:'rgba(255,255,255,.5)'}};
var th=themes[theme];
var radius=style==='pill'?'999px':style==='underline'?'0':'8px';
var labels=['All','Active','Archived','Drafts','Trash','Spam'].slice(0,segs);
var html='<div class="segmented">\n'+labels.map(function(l,i){return '  <button class="seg'+(i===0?' active':'')+'">'+l+'</button>'}).join('\n')+'\n</div>';
var css='.segmented{display:inline-flex;background:'+th.bg+';border-radius:'+radius+';gap:'+(style==='underline'?'0':'2px')+';padding:'+(style==='underline'?'0':'3px')+'}';
if(style==='underline'){css+=';border-bottom:2px solid '+(theme==='dark'?'#333':'#ddd')}
css+='\n.seg{padding:'+s.p+';font-size:'+s.f+';border:none;background:transparent;color:'+th.inactive+';cursor:pointer;border-radius:'+(radius==='999px'?'999px':'6px')+';transition:all .2s}';
css+='\n.seg:hover{color:'+th.text+'}';
css+='\n.seg.active{';
if(style==='underline'){css+='border-bottom:2px solid '+color+';color:'+th.text+';font-weight:600;border-radius:0'}
else if(theme==='gradient'){css+='background:rgba(255,255,255,.2);color:#fff;font-weight:600'}
else{css+='background:'+color+';color:#fff;font-weight:600;box-shadow:0 2px 6px '+color+'66'}
css+='}';
document.getElementById('htmlOut').value=html;
document.getElementById('cssOut').value=css;
document.getElementById('preview').innerHTML='<style>'+css+'<\/style>'+html;
}
function copyText(id){var t=document.getElementById(id);t.select();document.execCommand('copy')}
document.querySelectorAll('select,input').forEach(function(e){e.addEventListener('input',update);e.addEventListener('change',update)});
update();
</script>
</body>
</html>
