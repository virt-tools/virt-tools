<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="/assets/theme-init.js"></script>
<title>Mood Tracker — Virtual Tools</title>
<link rel="stylesheet" href="/assets/style.css">
<style>
.tool-wrap{max-width:700px;margin:0 auto;}
.tool-desc{font-size:14px;color:var(--text-secondary,#aaa);margin:8px 0 16px;}
.card{border:1px solid var(--border,#333);border-radius:12px;padding:20px;background:var(--bg-alt,#1a1f2e);margin-bottom:16px;}
.moods{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:16px;}
.mood-btn{width:60px;height:60px;border-radius:50%;border:2px solid var(--border,#444);background:var(--bg,#2a2f3e);font-size:28px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:transform 0.2s,border-color 0.2s;}
.mood-btn:hover{transform:scale(1.1);}
.mood-btn.selected{border-color:var(--accent,#5b8def);transform:scale(1.15);}
label{display:block;font-size:12px;color:var(--text-secondary,#888);margin-top:12px;margin-bottom:4px;}
input,textarea{width:100%;padding:10px;border-radius:8px;border:1px solid var(--border,#444);background:var(--bg,#2a2f3e);color:var(--text,#eee);font-size:14px;box-sizing:border-box;}
.btn{padding:10px 20px;border-radius:8px;border:none;background:var(--accent,#5b8def);color:#fff;cursor:pointer;font-size:14px;}
.btn:hover{opacity:0.9;}
.btn.secondary{background:var(--bg-alt,#1a1f2e);border:1px solid var(--border,#444);color:var(--text,#eee);}
.history{display:flex;flex-direction:column;gap:6px;}
.entry{display:flex;align-items:center;gap:10px;padding:8px 12px;border-radius:8px;background:var(--bg,#2a2f3e);font-size:13px;}
.entry .emoji{font-size:24px;}
.entry .date{color:var(--text-secondary,#888);min-width:90px;}
.entry .note{flex:1;color:var(--text,#eee);}
.stats{display:flex;gap:16px;flex-wrap:wrap;margin-bottom:16px;}
.stat{text-align:center;padding:12px 20px;border-radius:10px;background:var(--bg,#2a2f3e);border:1px solid var(--border,#333);}
.stat .num{font-size:28px;font-weight:700;color:var(--accent,#5b8def);}
.stat .lbl{font-size:11px;color:var(--text-secondary,#888);}
h3{margin:0 0 12px;}
.empty{text-align:center;padding:30px;color:var(--text-secondary,#888);}
</style>
</head>
<body>
<header id="site-header"></header>
<main>
<div class="tool-wrap">
<h1>Mood Tracker 😊</h1>
<p class="tool-desc">Track how you feel each day. Pick a mood, add a note, and see your trends over time. All data stored locally.</p>
<div class="stats" id="stats"></div>
<div class="card">
<h3>How are you feeling today?</h3>
<div class="moods" id="moodPicker">
<button class="mood-btn" data-m="5" title="Great">😄</button>
<button class="mood-btn" data-m="4" title="Good">🙂</button>
<button class="mood-btn" data-m="3" title="Okay">😐</button>
<button class="mood-btn" data-m="2" title="Down">😕</button>
<button class="mood-btn" data-m="1" title="Awful">😢</button>
</div>
<label>What's on your mind?</label>
<textarea id="note" placeholder="Optional note about your day…" rows="2"></textarea>
<div style="margin-top:12px"><button class="btn" onclick="save()">Save Today's Mood</button></div>
</div>
<div class="card">
<h3>Recent Moods</h3>
<div class="history" id="history"></div>
</div>
</div>
</main>
<script src="/assets/app.js"></script>
<script>
const KEY='mood_tracker_v1';const EMOJIS={5:'😄',4:'🙂',3:'😐',2:'😕',1:'😢'};const LABELS={5:'Great',4:'Good',3:'Okay',2:'Down',1:'Awful'};
let selected=null;
function load(){try{return JSON.parse(localStorage.getItem(KEY))||[];}catch(e){return[];}}
function saveData(arr){localStorage.setItem(KEY,JSON.stringify(arr));}
function todayKey(){const d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
document.querySelectorAll('.mood-btn').forEach(b=>b.onclick=()=>{document.querySelectorAll('.mood-btn').forEach(x=>x.classList.remove('selected'));b.classList.add('selected');selected=parseInt(b.dataset.m);});
function save(){
if(!selected){alert('Pick a mood first!');return;}
const note=document.getElementById('note').value.trim();
const arr=load();const key=todayKey();
const existing=arr.find(e=>e.date===key);
if(existing){existing.mood=selected;existing.note=note;}else{arr.unshift({date:key,mood:selected,note});}
saveData(arr);document.getElementById('note').value='';document.querySelectorAll('.mood-btn').forEach(x=>x.classList.remove('selected'));selected=null;
render();
}
function render(){
const arr=load();
const stats=document.getElementById('stats');
if(arr.length){
const avg=(arr.reduce((s,e)=>s+e.mood,0)/arr.length).toFixed(1);
const streak=calcStreak(arr);
const great=arr.filter(e=>e.mood>=4).length;
stats.innerHTML=`<div class="stat"><div class="num">${avg}</div><div class="lbl">Avg Mood</div></div><div class="stat"><div class="num">${streak}</div><div class="lbl">Day Streak</div></div><div class="stat"><div class="num">${arr.length}</div><div class="lbl">Total Entries</div></div><div class="stat"><div class="num">${great}</div><div class="lbl">Good Days</div></div>`;
}else{stats.innerHTML='';}
const hist=document.getElementById('history');
if(!arr.length){hist.innerHTML='<div class="empty">No moods logged yet.</div>';return;}
hist.innerHTML=arr.slice(0,20).map(e=>`<div class="entry"><span class="emoji">${EMOJIS[e.mood]}</span><span class="date">${e.date}</span><span class="note">${e.note?e.note.replace(/</g,'&lt;'):''}</span></div>`).join('');
}
function calcStreak(arr){
const set=new Set(arr.map(e=>e.date));let s=0;const d=new Date();
while(true){const k=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');if(set.has(k)){s++;d.setDate(d.getDate()-1);}else break;}
return s;
}
render();
</script>
</body>
</html>
