<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CSS Scroll Indicator Generator — virt.tools</title>
<link rel="stylesheet" href="/assets/style.css">
<style>
.tool-area{max-width:900px;margin:2rem auto;padding:0 1rem}
.controls{display:grid;gap:1rem;margin:1.5rem 0;padding:1.5rem;background:#1a1a2e;border-radius:12px}
.control-row{display:flex;gap:1rem;align-items:center;flex-wrap:wrap}
.control-row label{min-width:100px;font-weight:600;font-size:.9rem}
.control-row select,.control-row input{padding:.5rem .75rem;border-radius:8px;border:1px solid #444;background:#0f0f1e;color:#eee;font-size:.9rem}
.preview-box{margin:1.5rem 0;border-radius:12px;padding:1.5rem;min-height:250px;background:#111;display:flex;align-items:center;justify-content:center;overflow:hidden}
.output-block{margin:2rem 0}
.output-block textarea{width:100%;min-height:120px;font-family:monospace;font-size:.85rem;padding:1rem;border-radius:8px;border:1px solid #444;background:#0f0f1e;color:#eee;resize:vertical}
.copy-btn{padding:.6rem 1.2rem;border:none;border-radius:8px;background:#667eea;color:#fff;cursor:pointer;font-size:.9rem;margin-top:.5rem}
h2{margin-top:2rem;font-size:1.2rem}
</style>
</head>
<body>
<header id="site-header"></header>
<main>
<div class="tool-area">
<h1>⬇️ CSS Scroll Indicator Generator</h1>
<p>Create CSS scroll-down indicator arrows for hero sections. 4 styles, 3 themes, custom text. Copy HTML+CSS.</p>
<div class="controls">
<div class="control-row">
<label>Style</label><select id="style"><option value="arrow" selected>Arrow</option><option value="mouse">Mouse</option><option value="dots">Dots</option><option value="line">Line</option></select>
<label>Theme</label><select id="theme"><option value="light" selected>Light</option><option value="dark">Dark</option><option value="color">Color</option></select>
<label>Color</label><input type="color" id="color" value="#667eea">
<label>Text</label><input type="text" id="text" value="Scroll Down" style="width:120px">
<label>Speed</label><select id="speed"><option value="1s">Fast</option><option value="2s" selected>Normal</option><option value="3s">Slow</option></select>
</div>
</div>
<h2>Preview</h2>
<div class="preview-box" id="preview"></div>
<h2>HTML</h2><div class="output-block"><textarea id="htmlOut" readonly></textarea><button class="copy-btn" onclick="copyText('htmlOut')">Copy HTML</button></div>
<h2>CSS</h2><div class="output-block"><textarea id="cssOut" readonly></textarea><button class="copy-btn" onclick="copyText('cssOut')">Copy CSS</button></div>
</div>
</main>
<script src="/assets/app.js"></script>
<script>
function update(){
var style=document.getElementById('style').value,theme=document.getElementById('theme').value;
var color=document.getElementById('color').value,text=document.getElementById('text').value,speed=document.getElementById('speed').value;
var c=theme==='dark'?'#fff':theme==='color'?color:'#333';
var html='<div class="si si-'+style+'" style="--si-c:'+c+';--si-s:'+speed+'">\n';
if(text)html+='  <span class="si-text">'+text+'</span>\n';
if(style==='arrow')html+='  <div class="si-arrow"></div>\n';
else if(style==='mouse')html+='  <div class="si-mouse"><div class="si-wheel"></div></div>\n';
else if(style==='dots')html+='  <div class="si-dots"><span></span><span></span><span></span></div>\n';
else html+='  <div class="si-line"></div>\n';
html+='</div>';
var css='.si{display:flex;flex-direction:column;align-items:center;gap:8px;color:var(--si-c);font-family:system-ui}';
css+='\n.si-text{font-size:.85rem;opacity:.7;text-transform:uppercase;letter-spacing:2px}';
css+='\n.si-arrow{width:24px;height:24px;border-right:2px solid var(--si-c);border-bottom:2px solid var(--si-c);transform:rotate(45deg);animation:si-bounce var(--si-s) ease infinite}';
css+='\n.si-mouse{width:26px;height:42px;border:2px solid var(--si-c);border-radius:14px;display:flex;justify-content:center;padding-top:6px}';
css+='\n.si-wheel{width:4px;height:8px;background:var(--si-c);border-radius:2px;animation:si-scroll var(--si-s) ease infinite}';
css+='\n.si-dots{display:flex;gap:6px}';
css+='\n.si-dots span{width:8px;height:8px;border-radius:50%;background:var(--si-c);animation:si-fade var(--si-s) ease infinite}';
css+='\n.si-dots span:nth-child(2){animation-delay:.2s}.si-dots span:nth-child(3){animation-delay:.4s}';
css+='\n.si-line{width:2px;height:40px;background:var(--si-c);animation:si-pulse var(--si-s) ease infinite}';
css+='\n@keyframes si-bounce{0%,100%{transform:rotate(45deg) translate(0,0)}50%{transform:rotate(45deg) translate(4px,4px)}}';
css+='\n@keyframes si-scroll{0%{opacity:1;transform:translateY(0)}100%{opacity:0;transform:translateY(12px)}}';
css+='\n@keyframes si-fade{0%,100%{opacity:.3}50%{opacity:1}}';
css+='\n@keyframes si-pulse{0%,100%{transform:scaleY(1);opacity:.5}50%{transform:scaleY(1.3);opacity:1}}';
document.getElementById('htmlOut').value=html;
document.getElementById('cssOut').value=css;
document.getElementById('preview').innerHTML='<style>'+css+'<\/style>'+html;
}
function copyText(id){var t=document.getElementById(id);t.select();document.execCommand('copy')}
document.querySelectorAll('select,input').forEach(function(e){e.addEventListener('input',update);e.addEventListener('change',update)});
update();
</script>
</body>
</html>
