<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="/assets/theme-init.js"></script>
<title>Zodiac Sign Calculator — Virtual Tools</title>
<link rel="stylesheet" href="/assets/style.css">
<style>
.tool-wrap{max-width:700px;margin:0 auto;text-align:center;}
.input-row{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin:15px 0;}
input[type=date]{padding:10px 14px;border-radius:8px;border:1px solid var(--border,#555);background:var(--bg-alt,#1a1f2e);color:var(--text,#eee);font-size:16px;}
.btn-primary{padding:10px 24px;border-radius:8px;border:none;background:var(--accent,#5b8def);color:#fff;cursor:pointer;font-size:16px;font-weight:600;}
.result{margin:20px 0;padding:20px;background:var(--bg-alt,#1a1f2e);border-radius:16px;}
.result .symbol{font-size:64px;}
.result h2{color:var(--accent,#5b8def);margin:8px 0;}
.result .dates{color:var(--text-secondary,#aaa);font-size:14px;}
.result .element{display:inline-block;padding:4px 12px;border-radius:20px;font-size:13px;margin:4px;}
.traits{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin:12px 0;}
.traits span{padding:6px 14px;border-radius:20px;font-size:13px;background:var(--bg,#0f1117);border:1px solid var(--border,#444);}
.section{text-align:left;margin:15px 0;}
.section h3{color:var(--accent,#5b8def);margin:0 0 8px;font-size:15px;}
.section p{color:var(--text-secondary,#aaa);font-size:14px;line-height:1.6;}
.compat{display:flex;gap:8px;flex-wrap:wrap;}
.compat span{padding:4px 12px;border-radius:8px;font-size:13px;background:rgba(91,141,239,.15);color:var(--accent,#5b8def);}
.horoscope{margin:15px 0;padding:15px;background:var(--bg,#0f1117);border-radius:12px;border-left:4px solid var(--accent,#5b8def);text-align:left;}
</style>
</head>
<body>
<header id="site-header"></header>
<main>
<div class="tool-wrap">
<h1>Zodiac Sign Calculator ♈</h1>
<p class="tool-desc">Discover your Western zodiac sign, personality traits, element, compatibility, and a daily horoscope reading.</p>
<div class="input-row">
<input type="date" id="bday" max="2025-12-31" min="1900-01-01">
<button class="btn-primary" onclick="calc()">🔮 Reveal My Sign</button>
</div>
<div id="out"></div>
</div>
</main>
<script src="/assets/app.js"></script>
<script>
const signs=[
{n:'Aries',sym:'♈',el:'Fire',d:'Mar 21 – Apr 19',c:['Leo','Sagittarius','Gemini'],t:['Courageous','Energetic','Confident','Spontaneous','Passionate'],desc:'Aries is the first sign — a natural-born leader with a fiery spirit. You charge headfirst into challenges and inspire others with your enthusiasm.',h:'Today is a day for bold action. Trust your instincts and take that first step you\'ve been hesitating on.'},
{n:'Taurus',sym:'♉',el:'Earth',d:'Apr 20 – May 20',c:['Virgo','Capricorn','Cancer'],t:['Reliable','Patient','Devoted','Practical','Sensual'],desc:'Taurus values stability and comfort. You are grounded, hardworking, and appreciate life\'s simple pleasures.',h:'Slow and steady wins today. Focus on building something lasting rather than seeking quick results.'},
{n:'Gemini',sym:'♊',el:'Air',d:'May 21 – Jun 20',c:['Libra','Aquarius','Aries'],t:['Curious','Adaptable','Witty','Communicative','Playful'],desc:'Gemini is the sign of the Twins — versatile, expressive, and endlessly curious. You thrive on variety and connection.',h:'A conversation today could open a new door. Stay open-minded and share your ideas freely.'},
{n:'Cancer',sym:'♋',el:'Water',d:'Jun 21 – Jul 22',c:['Scorpio','Pisces','Taurus'],t:['Loyal','Emotional','Intuitive','Nurturing','Protective'],desc:'Cancer is the caregiver of the zodiac. Deeply intuitive and sentimental, you value home and family above all.',h:'Reach out to someone you care about today. Your emotional support means more than you know.'},
{n:'Leo',sym:'♌',el:'Fire',d:'Jul 23 – Aug 22',c:['Aries','Sagittarius','Libra'],t:['Charismatic','Generous','Creative','Confident','Ambitious'],desc:'Leo is the lion — bold, warm-hearted, and born to shine. You light up every room you enter.',h:'Your natural charisma is amplified today. Use it to lift someone up and make them feel seen.'},
{n:'Virgo',sym:'♍',el:'Earth',d:'Aug 23 – Sep 22',c:['Taurus','Capricorn','Scorpio'],t:['Analytical','Kind','Hardworking','Practical','Detail-oriented'],desc:'Virgo is the perfectionist of the zodiac. You are meticulous, helpful, and always striving to improve.',h:'Attention to detail pays off today. But remember — done is better than perfect.'},
{n:'Libra',sym:'♎',el:'Air',d:'Sep 23 – Oct 22',c:['Gemini','Aquarius','Leo'],t:['Diplomatic','Fair','Social','Charming','Romantic'],desc:'Libra is the sign of balance and harmony. You seek beauty, justice, and meaningful partnerships.',h:'A decision you\'ve been weighing will become clearer today. Trust your sense of balance.'},
{n:'Scorpio',sym:'♏',el:'Water',d:'Oct 23 – Nov 21',c:['Cancer','Pisces','Virgo'],t:['Passionate','Resourceful','Brave','Intense','Loyal'],desc:'Scorpio is the most intense sign — passionate, magnetic, and deeply emotional. You experience life at full depth.',h:'Your intuition is sharp today. If something feels off, trust that feeling and investigate.'},
{n:'Sagittarius',sym:'♐',el:'Fire',d:'Nov 22 – Dec 21',c:['Aries','Leo','Aquarius'],t:['Adventurous','Optimistic','Honest','Philosophical','Free-spirited'],desc:'Sagittarius is the explorer — always seeking new horizons, ideas, and experiences. Freedom is your highest value.',h:'An opportunity for adventure may appear. Say yes — the universe rewards your curiosity today.'},
{n:'Capricorn',sym:'♑',el:'Earth',d:'Dec 22 – Jan 19',c:['Taurus','Virgo','Pisces'],t:['Disciplined','Responsible','Ambitious','Patient','Wise'],desc:'Capricorn is the achiever. You are disciplined, determined, and build your life on a foundation of hard work.',h:'Your persistence is about to pay off. Stay the course — success is closer than you think.'},
{n:'Aquarius',sym:'♒',el:'Air',d:'Jan 20 – Feb 18',c:['Gemini','Libra','Sagittarius'],t:['Innovative','Independent','Humanitarian','Original','Intellectual'],desc:'Aquarius is the visionary — unconventional, forward-thinking, and driven by a desire to change the world.',h:'A creative idea may strike unexpectedly. Write it down before it fades — it has real potential.'},
{n:'Pisces',sym:'♓',el:'Water',d:'Feb 19 – Mar 20',c:['Cancer','Scorpio','Capricorn'],t:['Compassionate','Artistic','Intuitive','Gentle','Wise'],desc:'Pisces is the dreamer of the zodiac — empathetic, artistic, and deeply connected to the spiritual realm.',h:'Your empathy is a gift today. Create space for your imagination — art or music will be especially rewarding.'},
];
const elColors={Fire:'#e65100',Earth:'#2e7d32',Air:'#1565c0',Water:'#6a1b9a'};
function getSign(m,d){const ranges=[[3,21,0],[4,20,1],[5,21,2],[6,21,3],[7,23,4],[8,23,5],[9,23,6],[10,23,7],[11,22,8],[12,21,9],[1,20,10],[2,19,11]];for(const[mm,dd,idx] of ranges){if(m===mm&&d>=dd)return signs[idx];if(m===mm&&d<dd){return signs[idx>0?idx-1:11];}}return signs[0];}
function calc(){const v=document.getElementById('bday').value;if(!v)return;const[m,d]=v.split('-').map(Number);const s=getSign(m,d);
document.getElementById('out').innerHTML=`<div class="result"><div class="symbol">${s.sym}</div><h2>${s.n}</h2><div class="dates">${s.d}</div><div class="element" style="background:${elColors[s.el]}33;color:${elColors[s.el]}">${s.el} Element</div></div>
<div class="traits">${s.t.map(t=>`<span>${t}</span>`).join('')}</div>
<div class="section"><h3>About ${s.n}</h3><p>${s.desc}</p></div>
<div class="section"><h3>Best Compatibility</h3><div class="compat">${s.c.map(c=>`<span>${c}</span>`).join('')}</div></div>
<div class="horoscope"><h3>✨ Today's Horoscope</h3><p>${s.h}</p></div>`;
}
</script>
</body>
</html>
