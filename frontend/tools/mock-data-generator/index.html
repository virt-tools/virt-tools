<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <script src="/assets/theme-init.js"></script>
  <title>Mock Data Generator — Virtual Tools</title>
  <link rel="stylesheet" href="/assets/style.css">
  <style>
    .md-layout { display: grid; grid-template-columns: 280px 1fr; gap: 20px; }
    @media(max-width:760px){ .md-layout{ grid-template-columns:1fr; } }
    .md-controls { display: flex; flex-direction: column; gap: 12px; }
    .field-list { display: flex; flex-direction: column; gap: 6px; }
    .field-item { display: flex; align-items: center; gap: 8px; padding: 6px 10px; border: 1px solid var(--border,#2a2f3a); border-radius: 6px; background: var(--bg-panel,#11151c); cursor: grab; }
    .field-item .fname { flex: 1; font-weight: 600; font-size: 13px; }
    .field-item .ftype { font-size: 11px; opacity: .5; }
    .field-item .rm { opacity: .4; cursor: pointer; border: none; background: none; color: var(--text,#d4d9e0); font-size: 16px; }
    .field-item .rm:hover { opacity: 1; color: #f87171; }
    .add-field-row { display: flex; gap: 6px; }
    .add-field-row select, .add-field-row input { flex: 1; }
    select, input[type="text"], input[type="number"] { background: var(--bg-panel,#11151c); border: 1px solid var(--border,#2a2f3a); border-radius: 6px; padding: 6px 10px; color: var(--text,#d4d9e0); font-size: 13px; }
    .btn { padding: 8px 14px; border-radius: 8px; border: 1px solid var(--border,#2a2f3a); background: var(--bg-panel,#11151c); color: var(--text,#d4d9e0); cursor: pointer; font-size: 13px; font-weight: 600; }
    .btn:hover { border-color: var(--accent,#6ea8fe); }
    .btn.primary { background: var(--accent,#6ea8fe); color: #08101f; border-color: var(--accent,#6ea8fe); }
    .btn.sm { padding: 4px 10px; font-size: 12px; }
    .output-area { position: relative; }
    pre { background: var(--bg-panel,#11151c); border: 1px solid var(--border,#2a2f3a); border-radius: 8px; padding: 16px; overflow: auto; max-height: 500px; font-size: 12px; line-height: 1.5; white-space: pre-wrap; word-break: break-all; }
    .toolbar { display: flex; gap: 8px; margin-bottom: 12px; flex-wrap: wrap; align-items: center; }
    label { font-size: 12px; opacity: .7; }
    .cnt { width: 70px; }
    table { width: 100%; border-collapse: collapse; font-size: 12px; }
    th, td { padding: 6px 8px; text-align: left; border-bottom: 1px solid var(--border,#2a2f3a); white-space: nowrap; max-width: 200px; overflow: hidden; text-overflow: ellipsis; }
    th { opacity: .6; font-weight: 600; }
  </style>
</head>
<body>
  <div id="site-header"></div>
  <main>
    <div class="tool-header">
      <a class="back" href="/">← All tools</a>
      <h1>Mock Data Generator</h1>
      <p>Generate realistic fake data for testing — names, emails, addresses, phone numbers, UUIDs, dates, and more. Export as JSON, CSV, or SQL. Everything runs in your browser — no data leaves your device.</p>
    </div>

    <div class="panel">
      <div class="md-layout">
        <div class="md-controls">
          <div>
            <label>Field type:</label>
            <div class="add-field-row">
              <select id="fieldType">
                <option value="firstName">First Name</option>
                <option value="lastName">Last Name</option>
                <option value="fullName">Full Name</option>
                <option value="email">Email</option>
                <option value="phone">Phone</option>
                <option value="address">Street Address</option>
                <option value="city">City</option>
                <option value="state">State</option>
                <option value="zip">Zip Code</option>
                <option value="country">Country</option>
                <option value="company">Company Name</option>
                <option value="jobTitle">Job Title</option>
                <option value="uuid">UUID</option>
                <option value="date">Date</option>
                <option value="datetime">DateTime</option>
                <option value="price">Price</option>
                <option value="number">Random Number</option>
                <option value="boolean">Boolean</option>
                <option value="color">Color (hex)</option>
                <option value="ip">IP Address</option>
                <option value="url">URL</option>
                <option value="username">Username</option>
                <option value="password">Password</option>
                <option value="paragraph">Paragraph</option>
              </select>
              <button class="btn sm" id="addField">Add</button>
            </div>
          </div>

          <div>
            <label>Fields (<span id="fieldCount">0</span>):</label>
            <div class="field-list" id="fieldList"></div>
          </div>

          <div style="display:flex;gap:8px;align-items:center;">
            <label>Count:</label>
            <input type="number" class="cnt" id="count" value="10" min="1" max="1000">
          </div>

          <div style="display:flex;gap:8px;flex-wrap:wrap;">
            <button class="btn primary" id="generateBtn">Generate</button>
            <button class="btn" id="jsonBtn">JSON</button>
            <button class="btn" id="csvBtn">CSV</button>
            <button class="btn" id="sqlBtn">SQL</button>
          </div>
          <button class="btn" id="copyBtn" style="align-self:flex-start;">Copy to Clipboard</button>
        </div>

        <div class="output-area">
          <div class="toolbar">
            <label>Format:</label>
            <strong id="fmtLabel">JSON</strong>
          </div>
          <pre id="output">Click "Generate" to create mock data…</pre>
          <div id="tableWrap" style="display:none;overflow:auto;max-height:500px;">
            <table id="dataTable"></table>
          </div>
        </div>
      </div>
    </div>
  </main>

  <script src="/assets/app.js"></script>
  <script>
  (function() {
    const firstNames = ['James','Mary','John','Patricia','Robert','Jennifer','Michael','Linda','William','Elizabeth','David','Barbara','Richard','Susan','Joseph','Jessica','Thomas','Sarah','Charles','Karen','Christopher','Nancy','Daniel','Lisa','Matthew','Margaret','Anthony','Betty','Mark','Sandra','Donald','Ashley','Steven','Kimberly','Paul','Emily','Andrew','Donna','Joshua','Carol','Kenneth','Michelle','Kevin','Amanda','Brian','Dorothy','George','Melissa','Edward','Deborah'];
    const lastNames = ['Smith','Johnson','Williams','Brown','Jones','Garcia','Miller','Davis','Rodriguez','Martinez','Hernandez','Lopez','Gonzalez','Wilson','Anderson','Thomas','Taylor','Moore','Jackson','Martin','Lee','Perez','Thompson','White','Harris','Sanchez','Clark','Ramirez','Lewis','Robinson','Walker','Young','Allen','King','Wright','Scott','Torres','Nguyen','Hill','Flores','Green','Adams','Nelson','Baker','Hall','Rivera','Campbell','Mitchell','Carter','Roberts'];
    const cities = ['New York','Los Angeles','Chicago','Houston','Phoenix','Philadelphia','San Antonio','San Diego','Dallas','San Jose','Austin','Jacksonville','Fort Worth','Columbus','Charlotte','San Francisco','Seattle','Indianapolis','Denver','Boston','Portland','Las Vegas','Nashville','Atlanta','Miami'];
    const states = ['AL','AK','AZ','AR','CA','CO','CT','DE','FL','GA','HI','ID','IL','IN','IA','KS','KY','LA','ME','MD','MA','MI','MN','MS','MO','MT','NE','NV','NH','NJ','NM','NY','NC','ND','OH','OK','OR','PA','RI','SC','SD','TN','TX','UT','VT','VA','WA','WV','WI','WY'];
    const countries = ['United States','United Kingdom','Canada','Australia','Germany','France','Spain','Italy','Netherlands','Sweden','Norway','Denmark','Finland','Poland','Japan','China','India','Brazil','Mexico','Argentina','South Africa','New Zealand','Ireland','Portugal','Greece'];
    const companies = ['TechCorp','DataSoft','CloudNet','InfraSys','ByteWise','QuantumLabs','NeoSphere','ApexLogic','ZenithWorks','OrbitTech','NexaGen','VortexAI','PioneerDX','HelixSystems','FusionIO','VertexHub','LumenCore','StrataLink','CatalystIO','PrismData'];
    const jobTitles = ['Software Engineer','Product Manager','Data Analyst','UX Designer','DevOps Engineer','QA Tester','Project Manager','Marketing Specialist','Sales Representative','HR Coordinator','Financial Analyst','Operations Manager','CTO','CEO','Intern','Backend Developer','Frontend Developer','Full Stack Developer','Technical Writer','Security Analyst'];
    const streets = ['Main St','Oak Ave','Maple Dr','Cedar Ln','Pine St','Elm St','Washington Blvd','Park Ave','Lake Rd','Hill Ct','River Way','Sunset Blvd','Highland Ave','Forest Dr','Meadow Ln','Spring St','Valley Rd','Ridge Way','Church St','Union St'];
    const words = ['lorem','ipsum','dolor','sit','amet','consectetur','adipiscing','elit','sed','do','eiusmod','tempor','incididunt','ut','labore','et','dolore','magna','aliqua','enim','ad','minim','veniam','quis','nostrud','exercitation','ullamco','laboris','nisi','aliquip'];

    let fields = [
      { name: 'id', type: 'uuid' },
      { name: 'firstName', type: 'firstName' },
      { name: 'lastName', type: 'lastName' },
      { name: 'email', type: 'email' },
    ];
    let format = 'json';
    let lastData = [];

    const fieldList = document.getElementById('fieldList');
    const fieldCount = document.getElementById('fieldCount');
    const output = document.getElementById('output');
    const tableWrap = document.getElementById('tableWrap');
    const dataTable = document.getElementById('dataTable');
    const fmtLabel = document.getElementById('fmtLabel');

    function renderFields() {
      fieldList.innerHTML = '';
      fieldCount.textContent = fields.length;
      fields.forEach((f, i) => {
        const item = document.createElement('div');
        item.className = 'field-item';
        item.innerHTML = '<span class="fname">' + esc(f.name) + '</span><span class="ftype">' + f.type + '</span><button class="rm" data-i="' + i + '">×</button>';
        fieldList.appendChild(item);
      });
      fieldList.querySelectorAll('.rm').forEach(b => b.addEventListener('click', e => {
        fields.splice(parseInt(e.target.dataset.i), 1);
        renderFields();
      }));
    }

    function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

    function pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }
    function randInt(a, b) { return Math.floor(Math.random() * (b - a + 1)) + a; }
    function randStr(len) { const c='abcdefghijklmnopqrstuvwxyz0123456789'; let s=''; for(let i=0;i<len;i++) s+=c[Math.floor(Math.random()*c.length)]; return s; }

    function genValue(type) {
      switch(type) {
        case 'firstName': return pick(firstNames);
        case 'lastName': return pick(lastNames);
        case 'fullName': return pick(firstNames) + ' ' + pick(lastNames);
        case 'email': return (pick(firstNames).toLowerCase() + '.' + pick(lastNames).toLowerCase() + randInt(1,99) + '@example.com').replace(/'/g,'');
        case 'phone': return '+1 (' + randInt(200,999) + ') ' + randInt(200,999) + '-' + String(randInt(0,9999)).padStart(4,'0');
        case 'address': return randInt(100,9999) + ' ' + pick(streets);
        case 'city': return pick(cities);
        case 'state': return pick(states);
        case 'zip': return String(randInt(10000,99999));
        case 'country': return pick(countries);
        case 'company': return pick(companies) + ' Inc.';
        case 'jobTitle': return pick(jobTitles);
        case 'uuid': return crypto.randomUUID ? crypto.randomUUID() : randStr(8)+'-'+randStr(4)+'-'+randStr(4)+'-'+randStr(4)+'-'+randStr(12);
        case 'date': return new Date(randInt(946684800000, 1893456000000)).toISOString().slice(0,10);
        case 'datetime': return new Date(randInt(946684800000, 1893456000000)).toISOString();
        case 'price': return '$' + (Math.random() * 9999).toFixed(2);
        case 'number': return randInt(0, 10000);
        case 'boolean': return Math.random() > 0.5;
        case 'color': return '#' + Math.floor(Math.random()*16777215).toString(16).padStart(6,'0');
        case 'ip': return randInt(1,255)+'.'+randInt(0,255)+'.'+randInt(0,255)+'.'+randInt(0,255);
        case 'url': return 'https://www.' + pick(companies).toLowerCase() + '.com/' + randStr(6);
        case 'username': return pick(firstNames).toLowerCase() + randInt(1,999);
        case 'password': return randStr(12);
        case 'paragraph': { let p=[]; for(let i=0;i<12;i++) p.push(pick(words)); return p.join(' ')+'.'; }
        default: return '';
      }
    }

    function generate() {
      const count = Math.min(1000, Math.max(1, parseInt(document.getElementById('count').value) || 10));
      lastData = [];
      for (let i = 0; i < count; i++) {
        const row = {};
        for (const f of fields) row[f.name] = genValue(f.type);
        lastData.push(row);
      }
      renderOutput();
    }

    function renderOutput() {
      if (lastData.length === 0) { output.textContent = 'Click "Generate" to create mock data…'; tableWrap.style.display='none'; return; }
      if (format === 'json') {
        output.textContent = JSON.stringify(lastData, null, 2);
        output.style.display = 'block'; tableWrap.style.display = 'none';
      } else if (format === 'csv') {
        const headers = fields.map(f => f.name);
        const rows = [headers.join(',')];
        for (const row of lastData) {
          rows.push(headers.map(h => {
            const v = row[h];
            if (v === null || v === undefined) return '';
            const s = String(v);
            return s.includes(',') || s.includes('"') || s.includes('\n') ? '"' + s.replace(/"/g,'""') + '"' : s;
          }).join(','));
        }
        output.textContent = rows.join('\n');
        output.style.display = 'block'; tableWrap.style.display = 'none';
      } else if (format === 'sql') {
        const tbl = 'mock_data';
        const cols = fields.map(f => f.name).join(', ');
        const rows = lastData.map(row => '(' + fields.map(f => {
          const v = row[f.name];
          if (v === null || v === undefined) return 'NULL';
          if (typeof v === 'boolean') return v ? '1' : '0';
          if (typeof v === 'number') return v;
          return "'" + String(v).replace(/'/g,"''") + "'";
        }).join(', ') + ')');
        let sql = 'CREATE TABLE ' + tbl + ' (\n  ' + fields.map(f => f.name + ' TEXT').join(',\n  ') + '\n);\n\n';
        sql += 'INSERT INTO ' + tbl + ' (' + cols + ') VALUES\n';
        sql += rows.join(',\n') + ';\n';
        output.textContent = sql;
        output.style.display = 'block'; tableWrap.style.display = 'none';
      }
      fmtLabel.textContent = format.toUpperCase();
    }

    document.getElementById('addField').addEventListener('click', () => {
      const sel = document.getElementById('fieldType');
      const type = sel.value;
      const name = type.replace(/([A-Z])/g, '$1').replace(/^./, c => c.toLowerCase());
      fields.push({ name: uniqueName(name), type });
      renderFields();
    });

    function uniqueName(base) {
      let n = base, i = 1;
      while (fields.some(f => f.name === n)) n = base + (++i);
      return n;
    }

    document.getElementById('generateBtn').addEventListener('click', generate);
    document.getElementById('jsonBtn').addEventListener('click', () => { format='json'; renderOutput(); });
    document.getElementById('csvBtn').addEventListener('click', () => { format='csv'; renderOutput(); });
    document.getElementById('sqlBtn').addEventListener('click', () => { format='sql'; renderOutput(); });
    document.getElementById('copyBtn').addEventListener('click', () => {
      navigator.clipboard.writeText(output.textContent).then(() => {
        const b = document.getElementById('copyBtn');
        b.textContent = 'Copied!'; setTimeout(() => b.textContent = 'Copy to Clipboard', 1500);
      });
    });

    renderFields();
    generate();
  })();
  </script>
</body>
</html>
