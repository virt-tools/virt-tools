<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="/assets/theme-init.js"></script>
<title>Sokoban — Virtual Tools</title>
<link rel="stylesheet" href="/assets/style.css">
<style>
.tool-wrap{max-width:600px;margin:0 auto;text-align:center;}
.level-picker{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;margin:12px 0;}
.level-picker button{padding:6px 12px;border-radius:6px;border:1px solid var(--border,#444);background:var(--bg-alt,#1a1f2e);color:var(--text,#eee);cursor:pointer;font-size:13px;}
.level-picker button.active{background:var(--accent,#5b8def);color:#fff;}
.stats{display:flex;gap:20px;justify-content:center;margin:10px 0;color:var(--text-secondary,#aaa);font-size:14px;}
.stats span{font-weight:600;color:var(--accent,#5b8def);}
#game-canvas{border:2px solid var(--border,#444);border-radius:6px;image-rendering:pixelated;max-width:100%;}
.btn-row{display:flex;gap:8px;justify-content:center;margin:12px 0;}
.btn-row button{padding:8px 16px;border-radius:8px;border:1px solid var(--border,#444);background:var(--bg-alt,#1a1f2e);color:var(--text,#eee);cursor:pointer;font-size:14px;}
.btn-row button:hover{border-color:var(--accent,#5b8def);}
.msg{color:var(--accent,#5b8def);font-size:18px;font-weight:600;margin:10px 0;min-height:28px;}
.info{color:var(--text-secondary,#888);font-size:12px;margin:8px 0;}
</style>
</head>
<body>
<header id="site-header"></header>
<main>
<div class="tool-wrap">
<h1>Sokoban 📦</h1>
<p class="tool-desc">Push all boxes onto the target spots. You can only push, never pull. Arrow keys or WASD to move.</p>
<div class="level-picker" id="levels"></div>
<div class="stats">Moves: <span id="moves">0</span> · Pushes: <span id="pushes">0</span></div>
<canvas id="game-canvas"></canvas>
<div class="msg" id="msg"></div>
<div class="btn-row">
<button onclick="undo()">↩️ Undo</button>
<button onclick="reset()">🔄 Reset</button>
</div>
<p class="info">Arrow keys or WASD. U to undo. R to reset. Mobile: swipe on the board.</p>
</div>
</main>
<script src="/assets/app.js"></script>
<script>
const levels=[
["#######","#@    #","#  $  #","#  .  #","#  $  #","#  .  #","#     #","#######"],
["########","#@  .  #","#  $   #","#  $.  #","#   $  #","#  .   #","#      #","########"],
["#######","#  .  #","#  $  #","#.$@$.#","#  $  #","#  .  #","#######"],
["#########","#  .    #","#  $    #","#  .$.  #","#  $@$  #","#  .$.  #","#    $  #","#    .  #","#########"],
["#######","# .   #","# $   #","#  $@ #","#   $ #","#   . #","#######"],
];
const W='#',S=' ',P='@',B='$',T='.',G='*',_P='+',_B='*';
let map=[],px,py,moves=0,pushes=0,history=[],cur=0,ts=40;
const cv=document.getElementById('game-canvas');
const cx=cv.getContext('2d');
function load(n){cur=n;const lv=levels[n];const h=lv.length,w=lv[0].length;cv.width=w*ts;cv.height=h*ts;map=lv.map(r=>r.split(''));for(let y=0;y<h;y++)for(let x=0;x<w;x++){if(map[y][x]===P){px=x;py=y;map[y][x]=S;}}moves=0;pushes=0;history=[];render();document.getElementById('msg').textContent='';updateStats();}
function render(){cx.fillStyle='#1a1f2e';cx.fillRect(0,0,cv.width,cv.height);for(let y=0;y<map.length;y++)for(let x=0;x<map[y].length;x++){const c=map[y][x];const dx=x*ts,dy=y*ts;if(c===W){cx.fillStyle='#3a3f4e';cx.fillRect(dx,dy,ts,ts);cx.strokeStyle='#2a2f3e';cx.strokeRect(dx,dy,ts,ts);}else if(c===T){cx.fillStyle='rgba(91,141,239,.2)';cx.fillRect(dx,dy,ts,ts);cx.strokeStyle='#5b8def';cx.beginPath();cx.arc(dx+ts/2,dy+ts/2,ts/4,0,Math.PI*2);cx.stroke();}else if(c===G){cx.fillStyle='rgba(91,141,239,.2)';cx.fillRect(dx,dy,ts,ts);cx.fillStyle='#5b8def';cx.beginPath();cx.arc(dx+ts/2,dy+ts/2,ts/3,0,Math.PI*2);cx.fill();}else{cx.fillStyle='#11141a';cx.fillRect(dx,dy,ts,ts);}if(c===B||c===G){cx.fillStyle=c===G?'#5b8def':'#e2b33a';cx.fillRect(dx+ts/8,dy+ts/8,ts-ts/4,ts-ts/4);cx.strokeStyle=c===G?'#3a6fcf':'#b88f2a';cx.lineWidth=2;cx.strokeRect(dx+ts/8,dy+ts/8,ts-ts/4,ts-ts/4);}if(x===px&&y===py){cx.fillStyle='#e74c3c';cx.beginPath();cx.arc(dx+ts/2,dy+ts/2,ts/3,0,Math.PI*2);cx.fill();cx.fillStyle='#fff';cx.beginPath();cx.arc(dx+ts/2-2,dy+ts/2-2,ts/8,0,Math.PI*2);cx.fill();}}}
function isT(x,y){return map[y]&&(map[y][x]===T||map[y][x]===G);}
function isW(x,y){return map[y]&&(map[y][x]===W);}
function isB(x,y){return map[y]&&(map[y][x]===B||map[y][x]===G);}
function move(dx,dy){const nx=px+dx,ny=py+dy;if(isW(nx,ny))return;if(isB(nx,ny)){const bx=nx+dx,by=ny+dy;if(isW(bx,by)||isB(bx,by))return;history.push({px,py,bx:undefined,by:undefined});const boxOnT=isT(bx,by);const boxWasT=isT(nx,ny);map[by][bx]=boxOnT?G:B;map[ny][nx]=boxWasT?T:S;px=nx;py=ny;moves++;pushes++;}else{history.push({px,py});px=nx;py=ny;moves++;}render();updateStats();checkWin();}
function checkWin(){for(let y=0;y<map.length;y++)for(let x=0;x<map[y].length;x++){if(map[y][x]===B)return false;}document.getElementById('msg').textContent='🎉 Solved in '+moves+' moves ('+pushes+' pushes)!';return true;}
function undo(){if(!history.length)return;const s=history.pop();if(s.bx!==undefined){const dx=px-s.bx,dy=py-s.by;const bx=px+dx,by=py+dy;const boxWasT=isT(bx,by);const boxOnT=isT(px,py);map[by][bx]=boxWasT?T:S;map[py][px]=boxOnT?G:B;px=s.bx;py=s.by;moves--;pushes--;}else{px=s.px;py=s.py;moves--;}render();updateStats();document.getElementById('msg').textContent='';}
function reset(){load(cur);}
function updateStats(){document.getElementById('moves').textContent=moves;document.getElementById('pushes').textContent=pushes;}
document.addEventListener('keydown',e=>{const k=e.key.toLowerCase();if(['arrowup','w'].includes(k)){e.preventDefault();move(0,-1);}else if(['arrowdown','s'].includes(k)){e.preventDefault();move(0,1);}else if(['arrowleft','a'].includes(k)){e.preventDefault();move(-1,0);}else if(['arrowright','d'].includes(k)){e.preventDefault();move(1,0);}else if(k==='u'){undo();}else if(k==='r'){reset();}});
let tx,ty;cv.addEventListener('touchstart',e=>{e.preventDefault();const t=e.touches[0];tx=t.clientX;ty=t.clientY;});cv.addEventListener('touchend',e=>{e.preventDefault();const t=e.changedTouches[0];const dx=t.clientX-tx,dy=t.clientY-ty;if(Math.abs(dx)>Math.abs(dy)){if(Math.abs(dx)>20)move(dx>0?1:-1,0);}else{if(Math.abs(dy)>20)move(0,dy>0?1:-1);}});
function renderLevels(){const c=document.getElementById('levels');c.innerHTML='';levels.forEach((_,i)=>{const b=document.createElement('button');b.textContent='Level '+(i+1);if(i===cur)b.classList.add('active');b.onclick=()=>{document.querySelectorAll('.level-picker button').forEach(x=>x.classList.remove('active'));b.classList.add('active');load(i);};c.appendChild(b);});}
renderLevels();load(0);
</script>
</body>
</html>
