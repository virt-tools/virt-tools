<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CSS Tag Input/Chips Generator — virt.tools</title>
<link rel="stylesheet" href="/assets/style.css">
<style>
.tool-area{max-width:900px;margin:2rem auto;padding:0 1rem}
.controls{display:grid;gap:1rem;margin:1.5rem 0;padding:1.5rem;background:#1a1a2e;border-radius:12px}
.control-row{display:flex;gap:1rem;align-items:center;flex-wrap:wrap}
.control-row label{min-width:100px;font-weight:600;font-size:.9rem}
.control-row select,.control-row input{padding:.5rem .75rem;border-radius:8px;border:1px solid #444;background:#0f0f1e;color:#eee;font-size:.9rem}
.preview-box{margin:1.5rem 0;border-radius:12px;min-height:100px;padding:1rem;background:#f5f5f5}
.output-block{margin:2rem 0}
.output-block textarea{width:100%;min-height:100px;font-family:monospace;font-size:.85rem;padding:1rem;border-radius:8px;border:1px solid #444;background:#0f0f1e;color:#eee;resize:vertical}
.copy-btn{padding:.6rem 1.2rem;border:none;border-radius:8px;background:#667eea;color:#fff;cursor:pointer;font-size:.9rem;margin-top:.5rem}
h2{margin-top:2rem;font-size:1.2rem}
</style>
</head>
<body>
<header id="site-header"></header>
<main>
<div class="tool-area">
<h1>🏷️ CSS Tag Input/Chips Generator</h1>
<p>Create CSS tag input/chips components. 4 styles, 3 themes, removable tags. Copy HTML+CSS.</p>
<div class="controls">
<div class="control-row">
<label>Style</label><select id="style"><option value="rounded" selected>Rounded</option><option value="square">Square</option><option value="outline">Outline</option><option value="filled">Filled</option></select>
<label>Theme</label><select id="theme"><option value="light" selected>Light</option><option value="dark">Dark</option><option value="colorful">Colorful</option></select>
<label>Size</label><select id="size"><option value="sm">Small</option><option value="md" selected>Medium</option><option value="lg">Large</option></select>
<label>Accent</label><input type="color" id="accent" value="#667eea" style="width:50px;padding:2px">
</div>
</div>
<h2>Preview</h2>
<div class="preview-box" id="preview"></div>
<h2>HTML</h2><div class="output-block"><textarea id="htmlOut" readonly></textarea><button class="copy-btn" onclick="copyText('htmlOut')">Copy HTML</button></div>
<h2>CSS</h2><div class="output-block"><textarea id="cssOut" readonly></textarea><button class="copy-btn" onclick="copyText('cssOut')">Copy CSS</button></div>
</div>
</main>
<script src="/assets/app.js"></script>
<script>
function update(){
var style=document.getElementById('style').value,theme=document.getElementById('theme').value;
var size=document.getElementById('size').value,accent=document.getElementById('accent').value;
var sizes={sm:'0.6rem 0.75rem',md:'0.75rem 1rem',lg:'0.9rem 1.25rem'};
var fontSize={sm:'.7rem',md:'.8rem',lg:'.9rem'};
var bg=theme==='dark'?'#1a1a2e':theme==='colorful'?accent:'#f0f0f5';
var fg=theme==='dark'?'#e0e0e0':theme==='colorful'?'#fff':'#333';
var bd=style==='outline'?'1px solid '+accent:'1px solid transparent';
var radius=style==='square'?'4px':style==='rounded'?'20px':'8px';
var tagBg=style==='filled'?(theme==='dark'?'#2a2a3e':theme==='colorful'?accent:'#e0e0ea'):'transparent';
var tagFg=style==='filled'?(theme==='dark'?'#e0e0e0':theme==='colorful'?'#fff':'#333'):fg;
var tagBd=style==='outline'?bd:'1px solid '+(theme==='dark'?'#444':theme==='colorful'?'rgba(255,255,255,.3)':'#ddd');
var html='<div class="tag-input">\n  <span class="tag">HTML <button class="tag-remove">×</button></span>\n  <span class="tag">CSS <button class="tag-remove">×</button></span>\n  <span class="tag">JavaScript <button class="tag-remove">×</button></span>\n  <input class="tag-field" placeholder="Add tag...">\n</div>';
var css='.tag-input{display:flex;flex-wrap:wrap;gap:.5rem;align-items:center;padding:'+sizes[size]+';border-radius:'+radius+';border:1px solid '+(theme==='dark'?'#444':'#ddd')+';background:'+(theme==='dark'?'#0f0f1e':'#fff')+';color:'+fg+';font-size:'+fontSize[size]+'}';
css+='\n.tag{display:inline-flex;align-items:center;gap:.35rem;padding:.25rem .65rem;border-radius:'+(style==='square'?'4px':'20px')+';background:'+tagBg+';color:'+tagFg+';border:'+tagBd+';font-size:'+fontSize[size]+';font-weight:500}';
css+='\n.tag-remove{background:none;border:none;color:inherit;opacity:.5;cursor:pointer;font-size:1rem;padding:0;line-height:1}';
css+='\n.tag-remove:hover{opacity:1}';
css+='\n.tag-field{border:none;outline:none;background:transparent;color:inherit;font-size:'+fontSize[size]+';flex:1;min-width:80px;padding:.25rem 0}';
document.getElementById('htmlOut').value=html;
document.getElementById('cssOut').value=css;
document.getElementById('preview').innerHTML='<style>'+css+'<\/style>'+html;
}
function copyText(id){var t=document.getElementById(id);t.select();document.execCommand('copy')}
document.querySelectorAll('select,input').forEach(function(e){e.addEventListener('input',update);e.addEventListener('change',update)});
update();
</script>
</body>
</html>
