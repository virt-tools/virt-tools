<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="/assets/theme-init.js"></script>
<title>Pixel Art Editor — Virtual Tools</title>
<link rel="stylesheet" href="/assets/style.css">
<style>
.tool-wrap{max-width:700px;margin:0 auto;}
.toolbar{display:flex;flex-wrap:wrap;gap:8px;align-items:center;margin:15px 0;padding:10px;background:var(--bg-alt,#1a1f2e);border-radius:10px;}
.toolbar button,.toolbar select{padding:6px 12px;border-radius:6px;border:1px solid var(--border,#444);background:var(--bg,#111);color:var(--text,#eee);cursor:pointer;font-size:13px;}
.toolbar button:hover{border-color:var(--accent,#5b8def);}
.toolbar button.active{background:var(--accent,#5b8def);color:#fff;}
.palette{display:flex;flex-wrap:wrap;gap:4px;margin:10px 0;}
.swatch{width:28px;height:28px;border-radius:4px;cursor:pointer;border:2px solid transparent;}
.swatch.active{border-color:#fff;box-shadow:0 0 4px var(--accent,#5b8def);}
.swatch.custom{background:conic-gradient(red,yellow,lime,cyan,blue,magenta,red);}
#canvas-wrap{display:flex;justify-content:center;margin:15px 0;}
#pixel-canvas{image-rendering:pixelated;border:2px solid var(--border,#444);border-radius:4px;cursor:crosshair;max-width:100%;}
.size-label{color:var(--text-secondary,#aaa);font-size:13px;}
.info{color:var(--text-secondary,#888);font-size:12px;text-align:center;margin:8px 0;}
</style>
</head>
<body>
<header id="site-header"></header>
<main>
<div class="tool-wrap">
<h1>Pixel Art Editor 🎨</h1>
<p class="tool-desc">Create pixel art on a grid canvas. Adjustable size, color palette, eraser, fill, undo, and PNG export.</p>
<div class="toolbar">
<select id="size" onchange="newCanvas()">
<option value="8">8×8</option><option value="16" selected>16×16</option><option value="24">24×24</option><option value="32">32×32</option>
</select>
<button id="tool-pencil" class="active" onclick="setTool('pencil')">✏️ Pencil</button>
<button id="tool-eraser" onclick="setTool('eraser')">🧽 Eraser</button>
<button id="tool-fill" onclick="setTool('fill')">🪣 Fill</button>
<button onclick="undo()">↩️ Undo</button>
<button onclick="clearCanvas()">🗑️ Clear</button>
<button onclick="exportPNG()">💾 Export PNG</button>
<span class="size-label" id="info"></span>
</div>
<div class="palette" id="palette"></div>
<div id="canvas-wrap"><canvas id="pixel-canvas"></canvas></div>
<p class="info">Click and drag to draw. Right-click to erase.</p>
</div>
</main>
<script src="/assets/app.js"></script>
<script>
const colors=['#000000','#ffffff','#7f7f7f','#c3c3c3','#ed1c24','#ff7f27','#f2ec1e','#22b14c','#00a2e8','#3f48cc','#a349a4','#ffaec9','#b97a57','#ffbfd3','#e5a21b','#99d9ea'];
let grid=[],size=16,pixelSize=20,tool='pencil',color='#000000',history=[],drawing=false,isErase=false;
const cv=document.getElementById('pixel-canvas');
const cx=cv.getContext('2d');
function newCanvas(){size=parseInt(document.getElementById('size').value);pixelSize=Math.floor(400/size);grid=Array(size).fill().map(()=>Array(size).fill(null));cv.width=size*pixelSize;cv.height=size*pixelSize;cx.imageSmoothingEnabled=false;render();saveHist();}
function render(){cx.fillStyle='#1a1f2e';cx.fillRect(0,0,cv.width,cv.height);const cs=pixelSize/2;for(let y=0;y<size;y++)for(let x=0;x<size;x++){if(grid[y][x]){cx.fillStyle=grid[y][x];cx.fillRect(x*pixelSize,y*pixelSize,pixelSize,pixelSize);}else{if((x+y)%2===0){cx.fillStyle='rgba(255,255,255,.03)';cx.fillRect(x*pixelSize,y*pixelSize,pixelSize,pixelSize);}}}}
function setTool(t){tool=t;document.querySelectorAll('.toolbar button').forEach(b=>{if(b.id&&b.id.startsWith('tool-'))b.classList.remove('active');});document.getElementById('tool-'+t).classList.add('active');}
function getPos(e){const r=cv.getBoundingClientRect();const sx=cv.width/r.width;const sy=cv.height/r.height;const px=Math.floor((e.clientX-r.left)*sx/pixelSize);const py=Math.floor((e.clientY-r.top)*sy/pixelSize);return{x:Math.max(0,Math.min(size-1,px)),y:Math.max(0,Math.min(size-1,py))};}
function paint(e){const p=getPos(e);const erase=tool==='eraser'||(e.buttons===2)||isErase;if(tool==='fill'){floodFill(p.x,p.y,erase?null:color);render();saveHist();return;}grid[p.y][p.x]=erase?null:color;render();}
cv.addEventListener('mousedown',e=>{e.preventDefault();drawing=true;isErase=e.button===2;saveHist();paint(e);});
cv.addEventListener('mousemove',e=>{if(drawing)paint(e);});
cv.addEventListener('mouseup',()=>{if(drawing){drawing=false;saveHist();}});
cv.addEventListener('contextmenu',e=>e.preventDefault());
cv.addEventListener('touchstart',e=>{e.preventDefault();drawing=true;const t=e.touches[0];paint({clientX:t.clientX,clientY:t.clientY,buttons:1});});
cv.addEventListener('touchmove',e=>{e.preventDefault();if(drawing){const t=e.touches[0];paint({clientX:t.clientX,clientY:t.clientY,buttons:1});}});
cv.addEventListener('touchend',()=>{if(drawing){drawing=false;saveHist();}});
function floodFill(sx,sy,nc){const oc=grid[sy][sx];if(oc===nc)return;const q=[[sx,sy]];while(q.length){const[x,y]=q.shift();if(x<0||x>=size||y<0||y>=size||grid[y][x]!==oc)continue;grid[y][x]=nc;q.push([x+1,y],[x-1,y],[x,y+1],[x,y-1]);}}
function saveHist(){history.push(JSON.stringify(grid));if(history.length>30)history.shift();}
function undo(){if(history.length>1){history.pop();grid=JSON.parse(history[history.length-1]);render();}}
function clearCanvas(){saveHist();grid=Array(size).fill().map(()=>Array(size).fill(null));render();}
function exportPNG(){const tmp=document.createElement('canvas');tmp.width=size;tmp.height=size;const tc=tmp.getContext('2d');tc.imageSmoothingEnabled=false;for(let y=0;y<size;y++)for(let x=0;x<size;x++){if(grid[y][x]){tc.fillStyle=grid[y][x];tc.fillRect(x,y,1,1);}}const a=document.createElement('a');a.download='pixel-art.png';a.href=tmp.toDataURL();a.click();}
function renderPalette(){const p=document.getElementById('palette');p.innerHTML='';colors.forEach(c=>{const s=document.createElement('div');s.className='swatch'+(c===color?' active':'');s.style.background=c;s.onclick=()=>{color=c;renderPalette();};p.appendChild(s);});const cs=document.createElement('div');cs.className='swatch custom';cs.title='Custom color';cs.onclick=()=>{const ip=document.createElement('input');ip.type='color';ip.onchange=()=>{color=ip.value;renderPalette();};ip.click();};p.appendChild(cs);}
newCanvas();renderPalette();
</script>
</body>
</html>
