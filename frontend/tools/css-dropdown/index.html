<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="/assets/theme-init.js"></script>
<title>CSS Dropdown Generator — Virtual Tools</title>
<link rel="stylesheet" href="/assets/style.css">
<style>
.tool-wrap{max-width:800px;margin:0 auto;}
.tool-desc{font-size:14px;color:var(--text-secondary,#aaa);margin:8px 0 20px;}
.controls{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin:12px 0;}
.ctrl{display:flex;flex-direction:column;gap:4px;}
.ctrl label{font-size:12px;color:var(--text-secondary,#888);}
.ctrl input,.ctrl select{padding:6px 8px;border-radius:6px;border:1px solid var(--border,#444);background:var(--bg,#1e2230);color:var(--text,#eee);font-size:13px;font-family:inherit;}
button.action{padding:8px 16px;border-radius:6px;border:1px solid var(--border,#444);background:var(--card,#2a2f3e);color:var(--text,#eee);cursor:pointer;font-size:13px;margin:4px 4px 0 0;}
.preview{border:1px solid var(--border,#444);border-radius:8px;margin:12px 0;overflow:hidden;background:#0a0a1a;padding:30px 20px;min-height:200px;}
.code-block{background:var(--bg,#1e2230);border:1px solid var(--border,#444);border-radius:8px;padding:12px;margin:8px 0;font-family:monospace;font-size:11px;color:var(--text,#eee);white-space:pre-wrap;word-break:break-all;max-height:400px;overflow:auto;}
.dropdown{position:relative;display:inline-block;}
.dropdown-btn{padding:10px 20px;border:none;border-radius:6px;cursor:pointer;font-size:14px;font-weight:500;color:#fff;}
.dropdown-menu{position:absolute;top:100%;left:0;margin-top:4px;min-width:160px;border-radius:8px;overflow:hidden;box-shadow:0 8px 24px rgba(0,0,0,.3);opacity:0;visibility:hidden;transform:translateY(-10px);transition:all .2s ease;}
.dropdown:hover .dropdown-menu{opacity:1;visibility:visible;transform:translateY(0);}
.dropdown-item{padding:10px 16px;font-size:13px;color:#ddd;text-decoration:none;display:block;transition:background .15s;}
.dropdown-item:hover{background:rgba(255,255,255,.1);}
</style>
</head>
<body>
<header id="site-header"></header>
<main>
<div class="tool-wrap">
<h1>📂 CSS Dropdown Generator</h1>
<p class="tool-desc">Create CSS-only dropdown menus with 4 styles, hover trigger, custom colors. Copy HTML+CSS.</p>
<div class="controls">
<div class="ctrl"><label>Style</label><select id="style" onchange="render()">
<option value="flat" selected>Flat</option>
<option value="shadow">Shadow</option>
<option value="bordered">Bordered</option>
<option value="rounded">Rounded</option>
</select></div>
<div class="ctrl"><label>Items</label><input type="number" id="items" min="2" max="8" value="4" onchange="render()"></div>
<div class="ctrl"><label>Button Color</label><input type="color" id="btnCol" value="#6c5ce7" oninput="render()"></div>
<div class="ctrl"><label>Menu BG</label><input type="color" id="menuCol" value="#2a2f3e" oninput="render()"></div>
<div class="ctrl"><label>Label</label><input type="text" id="label" value="Menu" oninput="render()"></div>
</div>
<div style="margin:8px 0;"><button class="action" onclick="copyCode()">Copy HTML+CSS</button></div>
<div class="preview" id="prev"></div>
<div class="code-block" id="code"></div>
</div>
</div>
</main>
<script src="/assets/app.js"></script>
<script>
let codeText='';
function v(id){return document.getElementById(id).value;}
function render(){
const style=v('style'),items=parseInt(v('items')),btnCol=v('btnCol'),menuCol=v('menuCol'),label=v('label');
let borderRadius=style==='rounded'?'20px':style==='shadow'?'8px':'6px';
let shadow=style==='shadow'||style==='rounded'?'box-shadow:0 8px 24px rgba(0,0,0,.3);':'';
let border=style==='bordered'?'border:1px solid rgba(255,255,255,.15);':'';
let labels=['Profile','Settings','Messages','Help','Logout','Themes','Account','Privacy'];
let menuHtml=Array.from({length:items},(_,i)=>`  <a href="#" class="dropdown-item">${labels[i]||'Item '+(i+1)}</a>`).join('\n');
let p=document.getElementById('prev');
p.innerHTML=`<div class="dropdown"><button class="dropdown-btn" style="background:${btnCol};border-radius:${borderRadius};">▼ ${label}</button><div class="dropdown-menu" style="background:${menuCol};border-radius:${borderRadius};${shadow}${border}">\n${menuHtml}\n</div></div>`;
let css=`.dropdown{position:relative;display:inline-block;}
.dropdown-btn{padding:10px 20px;border:none;border-radius:${borderRadius};cursor:pointer;font-size:14px;font-weight:500;color:#fff;background:${btnCol};}
.dropdown-menu{position:absolute;top:100%;left:0;margin-top:4px;min-width:160px;border-radius:${borderRadius};overflow:hidden;background:${menuCol};${shadow}${border}opacity:0;visibility:hidden;transform:translateY(-10px);transition:all .2s ease;}
.dropdown:hover .dropdown-menu{opacity:1;visibility:visible;transform:translateY(0);}
.dropdown-item{padding:10px 16px;font-size:13px;color:#ddd;text-decoration:none;display:block;transition:background .15s;}
.dropdown-item:hover{background:rgba(255,255,255,.1);}`;
let html=`<div class="dropdown">
  <button class="dropdown-btn">▼ ${label}</button>
  <div class="dropdown-menu">
${menuHtml}
  </div>
</div>`;
codeText=`<style>\n${css}\n</style>\n\n${html}`;
document.getElementById('code').textContent=codeText;
}
function copyCode(){navigator.clipboard.writeText(codeText).then(()=>alert('Copied!'));}
render();
</script>
</body>
</html>
