<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CSS Glow Effect Generator — virt.tools</title>
<link rel="stylesheet" href="/assets/style.css">
<style>
.tool-area{max-width:900px;margin:2rem auto;padding:0 1rem}
.controls{display:grid;gap:1rem;margin:1.5rem 0;padding:1.5rem;background:#1a1a2e;border-radius:12px}
.control-row{display:flex;gap:1rem;align-items:center;flex-wrap:wrap}
.control-row label{min-width:130px;font-weight:600;font-size:.9rem}
.control-row select,.control-row input{padding:.5rem .75rem;border-radius:8px;border:1px solid #444;background:#0f0f1e;color:#eee;font-size:.9rem}
.preview-box{margin:1.5rem 0;padding:3rem 2rem;background:#0a0a12;border-radius:12px;min-height:200px;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:1.5rem}
.glow-target{padding:2rem 3rem;border-radius:12px;font-size:1.5rem;font-weight:700;color:#fff;transition:all .3s}
.output-block{margin:2rem 0}
.output-block textarea{width:100%;min-height:100px;font-family:monospace;font-size:.85rem;padding:1rem;border-radius:8px;border:1px solid #444;background:#0f0f1e;color:#eee;resize:vertical}
.copy-btn{padding:.6rem 1.2rem;border:none;border-radius:8px;background:#667eea;color:#fff;cursor:pointer;font-size:.9rem;margin-top:.5rem}
h2{margin-top:2rem;font-size:1.2rem}
</style>
</head>
<body>
<header id="site-header"></header>
<main>
<div class="tool-area">
<h1>✨ CSS Glow Effect Generator</h1>
<p>Create CSS glow effects for text, boxes, and buttons. Adjustable color, blur, spread. Copy CSS.</p>
<div class="controls">
<div class="control-row">
<label>Target Type</label><select id="target"><option value="box">Box</option><option value="text">Text</option><option value="button">Button</option></select>
<label>Glow Color</label><input type="color" id="color" value="#667eea">
<label>Background</label><input type="color" id="bgcolor" value="#0a0a12">
</div>
<div class="control-row">
<label>Blur (px)</label><input type="range" id="blur" min="0" max="100" value="30" style="width:150px"><span id="blurVal">30</span>
<label>Spread (px)</label><input type="range" id="spread" min="-20" max="50" value="0" style="width:150px"><span id="spreadVal">0</span>
</div>
<div class="control-row">
<label>Intensity</label><input type="range" id="intensity" min="0.1" max="1" step="0.05" value="0.6" style="width:150px"><span id="intensityVal">0.6</span>
<label>Animated</label><select id="animated"><option value="no">No</option><option value="pulse">Pulse</option><option value="breath">Breath</option></select>
</div>
<div class="control-row">
<label>Text</label><input type="text" id="text" value="Glow" style="width:120px">
<label>Radius (px)</label><input type="number" id="radius" value="12" min="0" max="50" style="width:60px">
</div>
</div>
<h2>Preview</h2>
<div class="preview-box" id="preview"><div class="glow-target" id="glowTarget">Glow</div></div>
<h2>CSS</h2><div class="output-block"><textarea id="cssOut" readonly></textarea><button class="copy-btn" onclick="copyText('cssOut')">Copy CSS</button></div>
<h2>HTML</h2><div class="output-block"><textarea id="htmlOut" readonly></textarea><button class="copy-btn" onclick="copyText('htmlOut')">Copy HTML</button></div>
</div>
</main>
<script src="/assets/app.js"></script>
<script>
function update(){
var target=document.getElementById('target').value;
var color=document.getElementById('color').value;
var bgcolor=document.getElementById('bgcolor').value;
var blur=parseInt(document.getElementById('blur').value);
var spread=parseInt(document.getElementById('spread').value);
var intensity=parseFloat(document.getElementById('intensity').value);
var animated=document.getElementById('animated').value;
var text=document.getElementById('text').value;
var radius=parseInt(document.getElementById('radius').value);
document.getElementById('blurVal').textContent=blur;
document.getElementById('spreadVal').textContent=spread;
document.getElementById('intensityVal').textContent=intensity;
var el=document.getElementById('glowTarget');
el.textContent=text;
document.getElementById('preview').style.background=bgcolor;
var rgb=hexToRgb(color);
var shadow='0 0 '+blur+'px '+spread+'px rgba('+rgb.r+','+rgb.g+','+rgb.b+','+intensity+')';
if(target==='text'){el.style.cssText='font-size:2rem;font-weight:700;color:'+color+';text-shadow:'+shadow+';padding:1rem;border-radius:'+radius+'px;transition:all .3s'}
else if(target==='button'){el.style.cssText='font-size:1.2rem;font-weight:600;color:#fff;background:'+color+';box-shadow:'+shadow+';padding:1rem 2rem;border:none;border-radius:'+radius+'px;cursor:pointer;transition:all .3s'}
else{el.style.cssText='font-size:1.5rem;font-weight:700;color:#fff;background:'+color+';box-shadow:'+shadow+';padding:2rem 3rem;border-radius:'+radius+'px;transition:all .3s'}
var cssStr='';
if(target==='text'){cssStr='.glow-text {\n  color: '+color+';\n  text-shadow: '+shadow+';\n'}
else if(target==='button'){cssStr='.glow-button {\n  background: '+color+';\n  color: #fff;\n  border: none;\n  padding: 1rem 2rem;\n  border-radius: '+radius+'px;\n  font-size: 1.2rem;\n  font-weight: 600;\n  cursor: pointer;\n  box-shadow: '+shadow+';\n  transition: all 0.3s;\n'}
else{cssStr='.glow-box {\n  background: '+color+';\n  color: #fff;\n  padding: 2rem 3rem;\n  border-radius: '+radius+'px;\n  box-shadow: '+shadow+';\n  transition: all 0.3s;\n'}
if(animated==='pulse'){cssStr+='  animation: glowPulse 2s ease-in-out infinite;\n}\n\n@keyframes glowPulse {\n  0%, 100% { box-shadow: '+shadow+'; }\n  50% { box-shadow: 0 0 '+(blur*1.5)+'px '+spread+'px rgba('+rgb.r+','+rgb.g+','+rgb.b+','+intensity*1.5+'); }\n}'}
else if(animated==='breath'){cssStr+='  animation: glowBreath 3s ease-in-out infinite;\n}\n\n@keyframes glowBreath {\n  0%, 100% { box-shadow: 0 0 '+(blur*0.5)+'px '+spread+'px rgba('+rgb.r+','+rgb.g+','+rgb.b+','+intensity*0.5+'); }\n  50% { box-shadow: '+shadow+'; }\n}'}
else{cssStr+='}'}
if(target==='text'){cssStr=cssStr.replace(/box-shadow/g,'text-shadow')}
document.getElementById('cssOut').value=cssStr;
var tag=target==='text'?'span':(target==='button'?'button':'div');
var cls=target==='text'?'glow-text':(target==='button'?'glow-button':'glow-box');
document.getElementById('htmlOut').value='<'+tag+' class="'+cls+'">'+text+'</'+tag+'>';
}
function hexToRgb(h){var r=parseInt(h.substr(1,2),16),g=parseInt(h.substr(3,2),16),b=parseInt(h.substr(5,2),16);return{r:r,g:g,b:b}}
function copyText(id){var t=document.getElementById(id);t.select();document.execCommand('copy')}
document.querySelectorAll('select,input').forEach(function(e){e.addEventListener('input',update);e.addEventListener('change',update)});
update();
</script>
</body>
</html>
