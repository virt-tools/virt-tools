<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CSS Line Chart Generator — virt.tools</title>
<link rel="stylesheet" href="/assets/style.css">
<style>
.tool-area{max-width:900px;margin:2rem auto;padding:0 1rem}
.controls{display:grid;gap:1rem;margin:1.5rem 0;padding:1.5rem;background:#1a1a2e;border-radius:12px}
.ctrl-row{display:flex;gap:1rem;align-items:center;flex-wrap:wrap;margin-bottom:.5rem}
.ctrl-row label{font-weight:600;font-size:.9rem;min-width:120px}
.ctrl-row select,.ctrl-row input{padding:.5rem;border-radius:8px;border:1px solid #444;background:#0f0f1e;color:#eee}
.data-row{display:grid;grid-template-columns:1fr 1fr 40px;gap:.5rem;align-items:center;margin-bottom:.5rem}
.data-row input{padding:.4rem;border-radius:6px;border:1px solid #444;background:#0f0f1e;color:#eee;font-size:.85rem}
.data-row button{padding:.4rem;border:none;border-radius:6px;background:#ef4444;color:#fff;cursor:pointer}
.preview-box{margin:1.5rem 0;border-radius:12px;min-height:300px;padding:2rem;background:#f5f5f5;display:flex;align-items:center;justify-content:center}
.output-block{margin:2rem 0}
.output-block textarea{width:100%;min-height:100px;font-family:monospace;font-size:.85rem;padding:1rem;border-radius:8px;border:1px solid #444;background:#0f0f1e;color:#eee;resize:vertical}
.copy-btn{padding:.6rem 1.2rem;border:none;border-radius:8px;background:#667eea;color:#fff;cursor:pointer;font-size:.9rem;margin-top:.5rem}
h2{margin-top:2rem;font-size:1.2rem}
.add-btn{padding:.5rem 1rem;border:none;border-radius:8px;background:#10b981;color:#fff;cursor:pointer;margin-top:.5rem}
</style>
</head>
<body>
<header id="site-header"></header>
<main>
<div class="tool-area">
<h1>📈 CSS Line Chart Generator</h1>
<p>Create CSS/SVG line chart components. 2-12 data points, smooth/stepped curves, custom colors. Copy HTML+CSS.</p>
<div class="controls">
<div class="ctrl-row"><label>Style</label><select id="style"><option value="smooth" selected>Smooth</option><option value="straight">Straight</option><option value="stepped">Stepped</option></select>
<label>Color</label><input type="color" id="lineColor" value="#3b82f6">
<label>Fill</label><select id="fill"><option value="yes" selected>Yes</option><option value="no">No</option></select>
<label>Show Dots</label><select id="dots"><option value="yes" selected>Yes</option><option value="no">No</option></select>
<label>Show Grid</label><select id="grid"><option value="yes" selected>Yes</option><option value="no">No</option></select></div>
<div id="dataPoints"></div>
<button class="add-btn" onclick="addPoint()">+ Add Point</button>
</div>
<h2>Preview</h2>
<div class="preview-box" id="preview"></div>
<h2>HTML</h2><div class="output-block"><textarea id="htmlOut" readonly></textarea><button class="copy-btn" onclick="copyText('htmlOut')">Copy HTML</button></div>
<h2>CSS</h2><div class="output-block"><textarea id="cssOut" readonly></textarea><button class="copy-btn" onclick="copyText('cssOut')">Copy CSS</button></div>
</div>
</main>
<script src="/assets/app.js"></script>
<script>
var pts=[{label:'Jan',val:30},{label:'Feb',val:45},{label:'Mar',val:28},{label:'Apr',val:60},{label:'May',val:50},{label:'Jun',val:72}];
var W=400,H=200,P=30;
function renderPts(){var c=document.getElementById('dataPoints');c.innerHTML='';
pts.forEach(function(p,i){var d=document.createElement('div');d.className='data-row';
d.innerHTML='<input value="'+p.label+'" onchange="pts['+i+'].label=this.value;update()" placeholder="Label">'+
'<input type="number" value="'+p.val+'" min="0" max="100" onchange="pts['+i+'].val=+this.value;update()" placeholder="Value">'+
(pts.length>2?'<button onclick="pts.splice('+i+',1);renderPts();update()">✕</button>':'<span></span>');
c.appendChild(d)})}
function addPoint(){if(pts.length<12){pts.push({label:'P'+(pts.length+1),val:50});renderPts();update()}}
function smoothPath(xs,ys){if(xs.length<3)return 'M'+xs[0]+' '+ys[0]+' L'+xs[1]+' '+ys[1];var p='M'+xs[0]+' '+ys[0];for(var i=1;i<xs.length;i++){var xc=(xs[i-1]+xs[i])/2,yc=(ys[i-1]+ys[i])/2;p+=' Q'+xs[i-1]+' '+ys[i-1]+' '+xc+' '+yc}p+=' L'+xs[xs.length-1]+' '+ys[ys.length-1];return p}
function steppedPath(xs,ys){var p='M'+xs[0]+' '+ys[0];for(var i=1;i<xs.length;i++){p+=' L'+xs[i]+' '+ys[i-1]+' L'+xs[i]+' '+ys[i]}return p}
function update(){var style=document.getElementById('style').value;var col=document.getElementById('lineColor').value;var doFill=document.getElementById('fill').value==='yes';var doDots=document.getElementById('dots').value==='yes';var doGrid=document.getElementById('grid').value==='yes';
var n=pts.length;var xs=[],ys=[];var maxV=Math.max.apply(null,pts.map(function(p){return p.val}));var minV=Math.min.apply(null,pts.map(function(p){return p.val}));var range=maxV-minV||1;
for(var i=0;i<n;i++){xs.push(P+i*((W-2*P)/(n-1)));ys.push(H-P-((pts[i].val-minV)/range)*(H-2*P))}
var path=style==='smooth'?smoothPath(xs,ys):style==='stepped'?steppedPath(xs,ys):'M'+xs.join(' L')+' '+ys.join(' L').replace(/L(\d)/g,'');
if(style==='straight'){path='M';xs.forEach(function(x,i){path+=(i>0?' L':'')+x+' '+ys[i]})}
var fillPath=path+' L'+xs[xs.length-1]+' '+(H-P)+' L'+xs[0]+' '+(H-P)+' Z';
var svg='<div class="line-chart-wrap">\n  <svg class="line-chart" viewBox="0 0 '+W+' '+H+'" width="'+W+'" height="'+H+'">\n';
if(doGrid){for(var g=0;g<=4;g++){var gy=P+g*((H-2*P)/4);svg+='    <line x1="'+P+'" y1="'+gy+'" x2="'+(W-P)+'" y2="'+gy+'" stroke="#e0e0e0" stroke-width="1"/>\n'}}
if(doFill)svg+='    <path d="'+fillPath+'" fill="'+col+'" opacity="0.15"/>\n';
svg+='    <path d="'+path+'" fill="none" stroke="'+col+'" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>\n';
if(doDots){xs.forEach(function(x,i){svg+='    <circle cx="'+x+'" cy="'+ys[i]+'" r="4" fill="#fff" stroke="'+col+'" stroke-width="2"/>\n'})}
pts.forEach(function(p,i){svg+='    <text x="'+xs[i]+'" y="'+(H-8)+'" text-anchor="middle" font-size="10" fill="#666">'+p.label+'</text>\n'});
svg+='  </svg>\n</div>';
var css='.line-chart-wrap{max-width:100%;overflow:hidden}\n.line-chart{width:100%;height:auto;font-family:system-ui,sans-serif}\n.line-chart text{font-family:system-ui,sans-serif}';
document.getElementById('htmlOut').value=svg;document.getElementById('cssOut').value=css;
document.getElementById('preview').innerHTML=svg}
function copyText(id){var t=document.getElementById(id);t.select();document.execCommand('copy')}
document.getElementById('style').addEventListener('change',update);
document.getElementById('lineColor').addEventListener('input',update);
document.getElementById('fill').addEventListener('change',update);
document.getElementById('dots').addEventListener('change',update);
document.getElementById('grid').addEventListener('change',update);
renderPts();update();
</script>
</body>
</html>
