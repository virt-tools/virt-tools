<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Base64 Encode / Decode — Virtual Tools</title>
  <link rel="stylesheet" href="/assets/style.css">
</head>
<body>
  <div id="site-header"></div>
  <main>
    <div class="tool-header">
      <a class="back" href="/">← All tools</a>
      <h1>Base64 Encode / Decode</h1>
      <p>Encode text to Base64 or decode it back. Handles UTF-8 correctly. Runs locally.</p>
    </div>

    <div class="panel">
      <div class="field">
        <label for="in">Input</label>
        <textarea id="in" placeholder="Type or paste text…"></textarea>
      </div>
      <div class="row">
        <button id="encode">Encode →</button>
        <button id="decode" class="secondary">← Decode</button>
        <button id="clear" class="secondary">Clear</button>
      </div>
      <div class="spacer"></div>
      <label for="out">Output</label>
      <div class="output" id="out"></div>
      <p class="note" id="err"></p>
    </div>
  </main>

  <script src="/assets/app.js"></script>
  <script>
  (function () {
    var inp = document.getElementById("in");
    var out = document.getElementById("out");
    var err = document.getElementById("err");

    function encode(str) {
      // UTF-8 safe Base64
      var bytes = new TextEncoder().encode(str);
      var bin = "";
      bytes.forEach(function (b) { bin += String.fromCharCode(b); });
      return btoa(bin);
    }
    function decode(str) {
      var bin = atob(str.trim());
      var bytes = new Uint8Array(bin.length);
      for (var i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
      return new TextDecoder().decode(bytes);
    }

    document.getElementById("encode").addEventListener("click", function () {
      err.textContent = "";
      try { out.textContent = encode(inp.value); }
      catch (e) { err.textContent = "Error: " + e.message; }
    });
    document.getElementById("decode").addEventListener("click", function () {
      err.textContent = "";
      try { out.textContent = decode(inp.value); }
      catch (e) { err.textContent = "Not valid Base64."; }
    });
    document.getElementById("clear").addEventListener("click", function () {
      inp.value = ""; out.textContent = ""; err.textContent = "";
    });
  })();
  </script>
</body></html>
