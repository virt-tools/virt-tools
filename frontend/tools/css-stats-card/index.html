<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="/assets/theme-init.js"></script>
<title>CSS Stats Card Generator — Virtual Tools</title>
<link rel="stylesheet" href="/assets/style.css">
<style>
.tool-wrap{max-width:800px;margin:0 auto;}
.tool-desc{font-size:14px;color:var(--text-secondary,#aaa);margin:8px 0 20px;}
.controls{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin:12px 0;}
.ctrl{display:flex;flex-direction:column;gap:4px;}
.ctrl label{font-size:12px;color:var(--text-secondary,#888);}
.ctrl input,.ctrl select{padding:6px 8px;border-radius:6px;border:1px solid var(--border,#444);background:var(--bg,#1e2230);color:var(--text,#eee);font-size:13px;}
button.action{padding:8px 16px;border-radius:6px;border:1px solid var(--border,#444);background:var(--card,#2a2f3e);color:var(--text,#eee);cursor:pointer;font-size:13px;margin:4px 4px 0 0;}
.preview{border:1px solid var(--border,#444);border-radius:8px;margin:12px 0;padding:24px;min-height:120px;}
.code-block{background:var(--bg,#1e2230);border:1px solid var(--border,#444);border-radius:8px;padding:12px;margin:8px 0;font-family:monospace;font-size:11px;color:var(--text,#eee);white-space:pre-wrap;word-break:break-all;max-height:400px;overflow:auto;}
.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:16px;}
.stat-card{padding:24px;border-radius:12px;text-align:center;}
.stat-card .icon{font-size:28px;margin-bottom:8px;}
.stat-card .num{font-size:28px;font-weight:800;}
.stat-card .lbl{font-size:13px;opacity:.7;margin-top:4px;}
</style>
</head>
<body>
<header id="site-header"></header>
<main>
<div class="tool-wrap">
<h1>📊 CSS Stats Card Generator</h1>
<p class="tool-desc">Create statistics card components with icons, numbers, labels. 4 styles, custom colors. Copy HTML+CSS.</p>
<div class="controls">
<div class="ctrl"><label>Style</label><select id="style" onchange="render()"><option value="solid" selected>Solid</option><option value="outline">Outline</option><option value="gradient">Gradient</option><option value="minimal">Minimal</option></select></div>
<div class="ctrl"><label>Card 1 Icon</label><input type="text" id="i1" value="👥" oninput="render()"></div>
<div class="ctrl"><label>Card 1 Number</label><input type="text" id="n1" value="12,543" oninput="render()"></div>
<div class="ctrl"><label>Card 1 Label</label><input type="text" id="l1" value="Total Users" oninput="render()"></div>
<div class="ctrl"><label>Card 2 Icon</label><input type="text" id="i2" value="📈" oninput="render()"></div>
<div class="ctrl"><label>Card 2 Number</label><input type="text" id="n2" value="98.4%" oninput="render()"></div>
<div class="ctrl"><label>Card 2 Label</label><input type="text" id="l2" value="Uptime" oninput="render()"></div>
<div class="ctrl"><label>Card 3 Icon</label><input type="text" id="i3" value="⚡" oninput="render()"></div>
<div class="ctrl"><label>Card 3 Number</label><input type="text" id="n3" value="847ms" oninput="render()"></div>
<div class="ctrl"><label>Card 3 Label</label><input type="text" id="l3" value="Avg Response" oninput="render()"></div>
<div class="ctrl"><label>Card 4 Icon</label><input type="text" id="i4" value="🌍" oninput="render()"></div>
<div class="ctrl"><label>Card 4 Number</label><input type="text" id="n4" value="42" oninput="render()"></div>
<div class="ctrl"><label>Card 4 Label</label><input type="text" id="l4" value="Countries" oninput="render()"></div>
<div class="ctrl"><label>Card Bg</label><input type="color" id="cardBg" value="#2a2f3e" oninput="render()"></div>
<div class="ctrl"><label>Accent</label><input type="color" id="accent" value="#6c5ce7" oninput="render()"></div>
<div class="ctrl"><label>Text</label><input type="color" id="txt" value="#ffffff" oninput="render()"></div>
</div>
<div style="margin:8px 0;"><button class="action" onclick="copyCode()">Copy HTML+CSS</button></div>
<div class="preview" id="prev"></div>
<div class="code-block" id="code"></div>
</div>
</div>
</main>
<script src="/assets/app.js"></script>
<script>
let codeText='';
function v(id){return document.getElementById(id).value;}
function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function render(){
const style=v('style'),cardBg=v('cardBg'),accent=v('accent'),txt=v('txt');
const cards=[[v('i1'),v('n1'),v('l1')],[v('i2'),v('n2'),v('l2')],[v('i3'),v('n3'),v('l3')],[v('i4'),v('n4'),v('l4')]];
let cardCss='';
if(style==='gradient'){cardCss=`background:linear-gradient(135deg,${cardBg},${accent});`;}
else if(style==='outline'){cardCss=`background:transparent;border:2px solid ${accent}55;`;}
else if(style==='minimal'){cardCss=`background:${cardBg};border-bottom:3px solid ${accent};`;}
else{cardCss=`background:${cardBg};`;}
let html='<div class="stat-grid">';
cards.forEach(c=>{
html+=`<div class="stat-card" style="${cardCss}color:${txt};"><div class="icon">${c[0]}</div><div class="num">${esc(c[1])}</div><div class="lbl">${esc(c[2])}</div></div>`;
});
html+='</div>';
document.getElementById('prev').innerHTML=html;
codeText=`<style>
.stat-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
  gap: 16px;
}
.stat-card {
  ${cardCss}
  color: ${txt};
  padding: 24px;
  border-radius: 12px;
  text-align: center;
}
.stat-card .icon { font-size: 28px; margin-bottom: 8px; }
.stat-card .num { font-size: 28px; font-weight: 800; }
.stat-card .lbl { font-size: 13px; opacity: 0.7; margin-top: 4px; }
</style>

<div class="stat-grid">`;
cards.forEach(c=>{
codeText+=`
  <div class="stat-card">
    <div class="icon">${c[0]}</div>
    <div class="num">${esc(c[1])}</div>
    <div class="lbl">${esc(c[2])}</div>
  </div>`;
});
codeText+=`
</div>`;
document.getElementById('code').textContent=codeText;
}
function copyCode(){navigator.clipboard.writeText(codeText).then(()=>alert('Copied!'));}
render();
</script>
</body>
</html>
