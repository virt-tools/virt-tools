<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CSS Image Compare Slider Generator — virt.tools</title>
<link rel="stylesheet" href="/assets/style.css">
<style>
.tool-area{max-width:900px;margin:2rem auto;padding:0 1rem}
.controls{display:grid;gap:1rem;margin:1.5rem 0;padding:1.5rem;background:#1a1a2e;border-radius:12px}
.control-row{display:flex;gap:1rem;align-items:center;flex-wrap:wrap}
.control-row label{min-width:120px;font-weight:600;font-size:.9rem}
.control-row select,.control-row input{padding:.5rem .75rem;border-radius:8px;border:1px solid #444;background:#0f0f1e;color:#eee;font-size:.9rem}
.preview-box{margin:1.5rem 0;border-radius:12px;overflow:hidden}
.output-block{margin:2rem 0}
.output-block textarea{width:100%;min-height:120px;font-family:monospace;font-size:.85rem;padding:1rem;border-radius:8px;border:1px solid #444;background:#0f0f1e;color:#eee;resize:vertical}
.copy-btn{padding:.6rem 1.2rem;border:none;border-radius:8px;background:#667eea;color:#fff;cursor:pointer;font-size:.9rem;margin-top:.5rem}
h2{margin-top:2rem;font-size:1.2rem}
.compare-container{position:relative;width:100%;max-width:600px;margin:0 auto;overflow:hidden;border-radius:12px;user-select:none;cursor:col-resize}
.compare-container .before-img,.compare-container .after-img{display:block;width:100%;height:auto;pointer-events:none}
.compare-container .after-wrap{position:absolute;top:0;left:0;width:50%;height:100%;overflow:hidden}
.compare-container .after-wrap img{width:600px;height:auto;max-width:none}
.compare-handle{position:absolute;top:0;left:50%;width:4px;height:100%;background:#fff;transform:translateX(-50%);pointer-events:none;box-shadow:0 0 8px rgba(0,0,0,.4)}
.compare-handle::before,.compare-handle::after{content:'';position:absolute;left:50%;top:50%;width:36px;height:36px;border-radius:50%;background:#fff;transform:translate(-50%,-50%);box-shadow:0 2px 6px rgba(0,0,0,.3)}
.compare-label{position:absolute;top:12px;padding:4px 12px;border-radius:6px;background:rgba(0,0,0,.6);color:#fff;font-size:.8rem;font-weight:600;z-index:2}
.compare-label.before{left:12px}
.compare-label.after{right:12px}
</style>
</head>
<body>
<header id="site-header"></header>
<main>
<div class="tool-area">
<h1>🖼️ CSS Image Compare Slider Generator</h1>
<p>Create before/after image comparison sliders. Drag the handle to reveal. Generate HTML+CSS+JS.</p>
<div class="controls">
<div class="control-row">
<label>Label Before</label><input type="text" id="labelBefore" value="Before" style="width:100px">
<label>Label After</label><input type="text" id="labelAfter" value="After" style="width:100px">
</div>
<div class="control-row">
<label>Handle Color</label><input type="color" id="handleColor" value="#ffffff">
<label>Handle Width</label><input type="range" id="handleWidth" value="4" min="2" max="12" style="width:120px">
<label>Border Radius</label><input type="range" id="radius" value="12" min="0" max="30" style="width:120px">
</div>
<div class="control-row">
<label>Initial Position</label><input type="range" id="initPos" value="50" min="0" max="100" style="width:120px">
<label>Labels</label><select id="showLabels"><option value="1">Show</option><option value="0">Hide</option></select>
</div>
</div>
<h2>Preview</h2>
<div class="preview-box" id="preview"></div>
<h2>HTML</h2><div class="output-block"><textarea id="htmlOut" readonly></textarea><button class="copy-btn" onclick="copyText('htmlOut')">Copy HTML</button></div>
<h2>CSS</h2><div class="output-block"><textarea id="cssOut" readonly></textarea><button class="copy-btn" onclick="copyText('cssOut')">Copy CSS</button></div>
<h2>JS</h2><div class="output-block"><textarea id="jsOut" readonly></textarea><button class="copy-btn" onclick="copyText('jsOut')">Copy JS</button></div>
</div>
</main>
<script src="/assets/app.js"></script>
<script>
function genCanvas(color,label){
var c=document.createElement('canvas');c.width=600;c.height=400;var ctx=c.getContext('2d');
ctx.fillStyle=color;ctx.fillRect(0,0,600,400);
ctx.fillStyle='rgba(255,255,255,0.25)';ctx.font='bold 48px sans-serif';ctx.textAlign='center';
ctx.fillText(label,300,210);
return c.toDataURL();
}
function update(){
var lb=document.getElementById('labelBefore').value;
var la=document.getElementById('labelAfter').value;
var hc=document.getElementById('handleColor').value;
var hw=document.getElementById('handleWidth').value;
var r=document.getElementById('radius').value;
var ip=document.getElementById('initPos').value;
var sl=document.getElementById('showLabels').value==='1';
var beforeImg=genCanvas('#4a4a6e',lb);
var afterImg=genCanvas('#667eea',la);
var html='<div class="compare-container">\n';
if(sl){html+='  <span class="compare-label before">'+lb+'</span>\n  <span class="compare-label after">'+la+'</span>\n'}
html+='  <img class="before-img" src="'+beforeImg+'" alt="Before">\n  <div class="after-wrap"><img class="after-img" src="'+afterImg+'" alt="After"></div>\n  <div class="compare-handle"></div>\n</div>';
var css='.compare-container{position:relative;width:100%;max-width:600px;margin:0 auto;overflow:hidden;border-radius:'+r+'px;user-select:none;cursor:col-resize}\n';
css+='.compare-container .before-img,.compare-container .after-img{display:block;width:100%;height:auto;pointer-events:none}\n';
css+='.compare-container .after-wrap{position:absolute;top:0;left:0;width:'+ip+'%;height:100%;overflow:hidden}\n';
css+='.compare-container .after-wrap img{width:600px;height:auto;max-width:none}\n';
css+='.compare-handle{position:absolute;top:0;left:'+ip+'%;width:'+hw+'px;height:100%;background:'+hc+';transform:translateX(-50%);pointer-events:none;box-shadow:0 0 8px rgba(0,0,0,.4)}\n';
css+='.compare-handle::before,.compare-handle::after{content:\\'\\';position:absolute;left:50%;top:50%;width:36px;height:36px;border-radius:50%;background:'+hc+';transform:translate(-50%,-50%);box-shadow:0 2px 6px rgba(0,0,0,.3)}\n';
if(sl){
css+='.compare-label{position:absolute;top:12px;padding:4px 12px;border-radius:6px;background:rgba(0,0,0,.6);color:#fff;font-size:.8rem;font-weight:600;z-index:2}\n';
css+='.compare-label.before{left:12px}.compare-label.after{right:12px}\n';
}
var js='var c=document.querySelector(".compare-container");\nvar handle=c.querySelector(".compare-handle");\nvar afterWrap=c.querySelector(".after-wrap");\nvar dragging=false;\nfunction setPos(x){var rect=c.getBoundingClientRect();var pct=Math.max(0,Math.min(100,((x-rect.left)/rect.width)*100));handle.style.left=pct+"%";afterWrap.style.width=pct+"%";}\nc.addEventListener("mousedown",function(e){dragging=true;setPos(e.clientX)});\nwindow.addEventListener("mousemove",function(e){if(dragging)setPos(e.clientX)});\nwindow.addEventListener("mouseup",function(){dragging=false});\nc.addEventListener("touchstart",function(e){dragging=true;setPos(e.touches[0].clientX)});\nwindow.addEventListener("touchmove",function(e){if(dragging)setPos(e.touches[0].clientX)});\nwindow.addEventListener("touchend",function(){dragging=false});';
document.getElementById('htmlOut').value=html;
document.getElementById('cssOut').value=css;
document.getElementById('jsOut').value=js;
var pv=document.getElementById('preview');
pv.innerHTML=html;
var st=document.createElement('style');st.textContent=css;pv.appendChild(st);
var container=pv.querySelector('.compare-container');
var hdl=container.querySelector('.compare-handle');
var aw=container.querySelector('.after-wrap');
var dragging=false;
function setPos(x){var rect=container.getBoundingClientRect();var pct=Math.max(0,Math.min(100,((x-rect.left)/rect.width)*100));hdl.style.left=pct+'%';aw.style.width=pct+'%';}
container.addEventListener('mousedown',function(e){dragging=true;setPos(e.clientX);e.preventDefault()});
window.addEventListener('mousemove',function(e){if(dragging)setPos(e.clientX)});
window.addEventListener('mouseup',function(){dragging=false});
container.addEventListener('touchstart',function(e){dragging=true;setPos(e.touches[0].clientX)});
window.addEventListener('touchmove',function(e){if(dragging)setPos(e.touches[0].clientX)});
window.addEventListener('touchend',function(){dragging=false});
}
function copyText(id){var t=document.getElementById(id);t.select();document.execCommand('copy')}
document.querySelectorAll('select,input').forEach(function(e){e.addEventListener('input',update);e.addEventListener('change',update)});
update();
</script>
</body>
</html>
