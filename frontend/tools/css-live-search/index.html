<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CSS Live Search Bar Generator — virt.tools</title>
<link rel="stylesheet" href="/assets/style.css">
<style>
.tool-area{max-width:900px;margin:2rem auto;padding:0 1rem}
.controls{display:grid;gap:1rem;margin:1.5rem 0;padding:1.5rem;background:#1a1a2e;border-radius:12px}
.control-row{display:flex;gap:1rem;align-items:center;flex-wrap:wrap}
.control-row label{min-width:130px;font-weight:600;font-size:.9rem}
.control-row select,.control-row input{padding:.5rem .75rem;border-radius:8px;border:1px solid #444;background:#0f0f1e;color:#eee;font-size:.9rem}
.preview-box{margin:1.5rem 0;border-radius:12px;background:#2a2a3e;padding:2rem 1.5rem;min-height:300px}
.output-block{margin:2rem 0}
.output-block textarea{width:100%;min-height:120px;font-family:monospace;font-size:.85rem;padding:1rem;border-radius:8px;border:1px solid #444;background:#0f0f1e;color:#eee;resize:vertical}
.copy-btn{padding:.6rem 1.2rem;border:none;border-radius:8px;background:#667eea;color:#fff;cursor:pointer;font-size:.9rem;margin-top:.5rem}
h2{margin-top:2rem;font-size:1.2rem}
.search-demo{max-width:400px;margin:0 auto}
.search-demo input{width:100%;padding:.75rem 1rem .75rem 2.5rem;border-radius:8px;border:1px solid #444;background:#0f0f1e;color:#eee;font-size:.9rem}
.search-demo .search-icon{position:relative}
.search-demo .search-icon:before{content:"🔍";position:absolute;left:.75rem;top:50%;transform:translateY(-50%);font-size:1rem;z-index:1}
.search-demo .results{margin-top:.5rem;border-radius:8px;overflow:hidden}
.search-demo .results div{padding:.6rem 1rem;border-bottom:1px solid #333;cursor:pointer;font-size:.85rem}
.search-demo .results div:hover{background:#33334a}
.search-demo .results div:last-child{border-bottom:none}
</style>
</head>
<body>
<header id="site-header"></header>
<main>
<div class="tool-area">
<h1>🔎 CSS Live Search Bar Generator</h1>
<p>Create CSS search bar components with live filter results. 3 styles, 4 themes. Copy HTML+CSS+JS.</p>
<div class="controls">
<div class="control-row">
<label>Style</label><select id="style"><option value="simple" selected>Simple</option><option value="rounded">Rounded</option><option value="underline">Underline</option></select>
<label>Theme</label><select id="theme"><option value="dark" selected>Dark</option><option value="light">Light</option><option value="glass">Glass</option><option value="gradient">Gradient</option></select>
<label>Accent</label><input type="color" id="accent" value="#667eea">
</div>
<div class="control-row">
<label>Radius</label><select id="radius"><option value="0">0</option><option value="8" selected>8px</option><option value="16">16px</option><option value="24">24px</option></select>
<label>Placeholder</label><input type="text" id="placeholder" value="Search items..." style="width:180px">
<label>Items</label><select id="items"><option value="4" selected>4</option><option value="6">6</option><option value="8">8</option></select>
</div>
</div>
<h2>Preview</h2>
<div class="preview-box" id="preview"></div>
<h2>HTML</h2><div class="output-block"><textarea id="htmlOut" readonly></textarea><button class="copy-btn" onclick="copyText('htmlOut')">Copy HTML</button></div>
<h2>CSS</h2><div class="output-block"><textarea id="cssOut" readonly></textarea><button class="copy-btn" onclick="copyText('cssOut')">Copy CSS</button></div>
<h2>JS</h2><div class="output-block"><textarea id="jsOut" readonly></textarea><button class="copy-btn" onclick="copyText('jsOut')">Copy JS</button></div>
</div>
</main>
<script src="/assets/app.js"></script>
<script>
function update(){
var st=document.getElementById('style').value;
var th=document.getElementById('theme').value;
var ac=document.getElementById('accent').value;
var r=document.getElementById('radius').value;
var ph=document.getElementById('placeholder').value;
var n=parseInt(document.getElementById('items').value);
var isLight=th==='light';var isGlass=th==='glass';var isGrad=th==='gradient';
var bg=isGlass?'rgba(26,26,46,.85)':isLight?'#fff':isGrad?'linear-gradient(135deg,'+ac+',#333)':'#1a1a2e';
var textC=isLight?'#333':'#e0e0e0';var borderC=isLight?'#ddd':isGlass?'rgba(255,2555,255,.1)':'#333';
var sampleItems=['Apple','Banana','Cherry','Date','Elderberry','Fig','Grape','Honeydew'];
var itemsHtml='';for(var i=0;i<n;i++){itemsHtml+='    <div class="ls-item" data-text="'+sampleItems[i].toLowerCase()+'">'+sampleItems[i]+'</div>\n'}
var html='<div class="ls-search">\n  <div class="ls-icon-wrap">\n    <svg class="ls-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>\n    <input type="text" class="ls-input" placeholder="'+ph+'" id="ls-input">\n  </div>\n  <div class="ls-results" id="ls-results">\n'+itemsHtml+'  </div>\n</div>';
var css='.ls-search{max-width:400px;width:100%;font-family:system-ui,sans-serif}\n';
if(st==='simple'){css+='.ls-icon-wrap{position:relative}\n.ls-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:'+textC+';opacity:.5}\n.ls-input{width:100%;padding:12px 16px 12px 40px;border-radius:'+r+'px;border:1px solid '+borderC+';background:'+bg+';color:'+textC+';font-size:14px;outline:none;transition:border .2s;box-sizing:border-box'+(isGlass?';backdrop-filter:blur(12px)':'')+'}\n.ls-input:focus{border-color:'+ac+'}\n'}
else if(st==='rounded'){css+='.ls-icon-wrap{position:relative}\n.ls-icon{position:absolute;left:16px;top:50%;transform:translateY(-50%);color:'+textC+';opacity:.5}\n.ls-input{width:100%;padding:14px 20px 14px 44px;border-radius:999px;border:1px solid '+borderC+';background:'+bg+';color:'+textC+';font-size:14px;outline:none;transition:border .2s;box-sizing:border-box'+(isGlass?';backdrop-filter:blur(12px)':'')+'}\n.ls-input:focus{border-color:'+ac+'}\n'}
else{css+='.ls-icon-wrap{position:relative}\n.ls-icon{position:absolute;left:0;top:50%;transform:translateY(-50%);color:'+textC+';opacity:.5}\n.ls-input{width:100%;padding:8px 0 8px 24px;border:none;border-bottom:2px solid '+borderC+';background:transparent;color:'+textC+';font-size:14px;outline:none;transition:border .2s;box-sizing:border-box}\n.ls-input:focus{border-bottom-color:'+ac+'}\n'}
css+='.ls-results{margin-top:4px;border-radius:'+r+'px;overflow:hidden;max-height:300px;overflow-y:auto}\n.ls-item{padding:10px 16px;border-bottom:1px solid '+(isLight?'#eee':'#333')+';cursor:pointer;font-size:14px;color:'+textC+';transition:background .15s}\n.ls-item:hover{background:'+(isLight?'#f5f5f5':'#33334a')+'}\n.ls-item:last-child{border-bottom:none}\n.ls-item.hidden{display:none}';
var js="var input=document.getElementById('ls-input');\nvar items=document.querySelectorAll('.ls-item');\ninput.addEventListener('input',function(){\n  var q=this.value.toLowerCase();\n  items.forEach(function(item){\n    var t=item.getAttribute('data-text');\n    item.classList.toggle('hidden',t.indexOf(q)===-1);\n  });\n});";
document.getElementById('htmlOut').value=html;
document.getElementById('cssOut').value=css;
document.getElementById('jsOut').value=js;
var p=document.getElementById('preview');
p.innerHTML='<style>'+css+'<\/style>'+html+'<scr'+'ipt>'+js+'<\/scr'+'ipt>';
}
function copyText(id){var t=document.getElementById(id);t.select();document.execCommand('copy')}
document.querySelectorAll('select,input').forEach(function(e){e.addEventListener('input',update);e.addEventListener('change',update)});
update();
</script>
</body>
</html>
