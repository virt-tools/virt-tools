<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="/assets/theme-init.js"></script>
<title>Snake — Virtual Tools</title>
<link rel="stylesheet" href="/assets/style.css">
<style>
.tool-wrap{max-width:500px;margin:0 auto;text-align:center;}
canvas{border:1px solid var(--border,#2a2f3a);border-radius:8px;background:#0a0d12;display:block;margin:16px auto;touch-action:none;}
#score{font-size:20px;font-weight:700;margin:8px 0;}
#best{font-size:14px;opacity:.6;margin:4px 0;}
#start{border:1px solid var(--border,#2a2f3a);border-radius:8px;padding:10px 24px;font-size:16px;cursor:pointer;background:var(--bg-panel,#11151c);color:var(--text);margin:8px 0;}
#start:hover{border-color:var(--accent,#6ea8fe);}
.tool-desc{opacity:.7;font-size:14px;margin-bottom:8px;}
.dpad{display:none;grid-template-columns:60px 60px 60px;grid-template-rows:60px 60px 60px;gap:4px;justify-content:center;margin:12px auto;}
.dpad button{border-radius:8px;border:1px solid var(--border,#2a2f3a);background:var(--bg-panel,#11151c);color:var(--text);font-size:24px;cursor:pointer;}
.dpad button:active{background:var(--accent,#6ea8fe);color:#000;}
@media(max-width:520px){.dpad{display:grid;}}
</style>
</head>
<body>
<header id="site-header"></header>
<main>
<div class="tool-wrap">
<h1>Snake</h1>
<p class="tool-desc">Classic arcade Snake. Eat the food, grow longer, don't hit yourself or the walls. Speed increases as you grow. Arrow keys or WASD, touch d-pad on mobile. Fully client-side.</p>
<div id="score">Score: 0</div>
<div id="best">Best: 0</div>
<canvas id="c" width="400" height="400"></canvas>
<div><button id="start" onclick="toggleGame()">Start</button></div>
<div class="dpad">
<div></div><button onclick="setDir(0,-1)">▲</button><div></div>
<button onclick="setDir(-1,0)">◀</button><div></div><button onclick="setDir(1,0)">▶</button>
<div></div><button onclick="setDir(0,1)">▼</button><div></div>
</div>
</div>
</main>
<script src="/assets/app.js"></script>
<script>
const cv=document.getElementById('c'),ctx=cv.getContext('2d');
const G=20,N=20;
let snake,dir,food,score,best=0,running=false,loopId,speed;

function reset(){
  snake=[{x:10,y:10},{x:9,y:10},{x:8,y:10}];
  dir={x:1,y:0};score=0;speed=120;
  placeFood();updateScore();
}

function placeFood(){
  do{food={x:Math.floor(Math.random()*N),y:Math.floor(Math.random()*N)};}
  while(snake.some(s=>s.x===food.x&&s.y===food.y));
}

function updateScore(){
  document.getElementById('score').textContent='Score: '+score;
  if(score>best){best=score;document.getElementById('best').textContent='Best: '+best;}
}

function setDir(x,y){
  if(!running)return;
  if(dir.x===-x&&dir.y===-y)return;
  dir={x,y};
}

function step(){
  const head={x:snake[0].x+dir.x,y:snake[0].y+dir.y};
  if(head.x<0||head.x>=N||head.y<0||head.y>=N||snake.some(s=>s.x===head.x&&s.y===head.y)){
    running=false;document.getElementById('start').textContent='Start';
    draw();return;
  }
  snake.unshift(head);
  if(head.x===food.x&&head.y===food.y){
    score++;updateScore();placeFood();
    if(speed>60)speed-=2;
    clearInterval(loopId);loopId=setInterval(step,speed);
  }else{snake.pop();}
  draw();
}

function draw(){
  ctx.fillStyle='#0a0d12';ctx.fillRect(0,0,cv.width,cv.height);
  ctx.fillStyle='#e74c3c';ctx.fillRect(food.x*G,food.y*G,G-1,G-1);
  snake.forEach((s,i)=>{
    ctx.fillStyle=i===0?'#2ecc71':'#27ae60';
    ctx.fillRect(s.x*G,s.y*G,G-1,G-1);
  });
}

function toggleGame(){
  if(running){running=false;clearInterval(loopId);document.getElementById('start').textContent='Start';return;}
  reset();running=true;document.getElementById('start').textContent='Stop';
  draw();loopId=setInterval(step,speed);
}

document.addEventListener('keydown',e=>{
  const m={'ArrowUp':[0,-1],'ArrowDown':[0,1],'ArrowLeft':[-1,0],'ArrowRight':[1,0],'w':[0,-1],'s':[0,1],'a':[-1,0],'d':[1,0]};
  if(m[e.key]){e.preventDefault();setDir(m[e.key][0],m[e.key][1]);}
});

cv.addEventListener('touchstart',e=>{
  e.preventDefault();
  if(!running)return;
  const t=e.touches[0],dx=t.clientX-cv.getBoundingClientRect().left-200,dy=t.clientY-cv.getBoundingClientRect().top-200;
  if(Math.abs(dx)>Math.abs(dy))setDir(dx>0?1:-1,0);else setDir(0,dy>0?1:-1);
},{passive:false});

reset();draw();
</script>
</body>
</html>
