<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="/assets/theme-init.js"></script>
<title>CSS Skeleton Loader Generator — Virtual Tools</title>
<link rel="stylesheet" href="/assets/style.css">
<style>
.tool-wrap{max-width:800px;margin:0 auto;}
.tool-desc{font-size:14px;color:var(--text-secondary,#aaa);margin:8px 0 20px;}
.controls{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:10px;margin:12px 0;}
.ctrl{display:flex;flex-direction:column;gap:4px;}
.ctrl label{font-size:12px;color:var(--text-secondary,#888);}
.ctrl input,.ctrl select{padding:6px 8px;border-radius:6px;border:1px solid var(--border,#444);background:var(--bg,#1e2230);color:var(--text,#eee);font-size:13px;}
button.action{padding:8px 16px;border-radius:6px;border:1px solid var(--border,#444);background:var(--card,#2a2f3e);color:var(--text,#eee);cursor:pointer;font-size:13px;margin:4px 4px 0 0;}
.preview{background:var(--bg,#1e2230);border:1px solid var(--border,#444);border-radius:8px;padding:24px;margin:12px 0;}
.code-block{background:var(--bg,#1e2230);border:1px solid var(--border,#444);border-radius:8px;padding:12px;margin:8px 0;font-family:monospace;font-size:11px;color:var(--text,#eee);white-space:pre-wrap;word-break:break-all;max-height:400px;overflow:auto;}
.sk-line{margin:8px 0;border-radius:6px;animation:shimmer 1.5s infinite linear;background:linear-gradient(90deg,#2a2f3e 25%,#3a3f4e 50%,#2a2f3e 75%);background-size:200% 100%;}
@keyframes shimmer{0%{background-position:200% 0;}100%{background-position:-200% 0;}}
</style>
</head>
<body>
<header id="site-header"></header>
<main>
<div class="tool-wrap">
<h1>💀 CSS Skeleton Loader Generator</h1>
<p class="tool-desc">Create CSS skeleton/shimmer loading placeholders. 4 layouts (card, article, profile, list), shimmer animation. Copy CSS.</p>
<div class="controls">
<div class="ctrl"><label>Layout</label><select id="layout" onchange="render()"><option value="card" selected>Card</option><option value="article">Article</option><option value="profile">Profile</option><option value="list">List</option></select></div>
<div class="ctrl"><label>Base Color</label><input type="color" id="bc" value="#2a2f3e" oninput="render()"></div>
<div class="ctrl"><label>Shimmer Color</label><input type="color" id="sc" value="#3a3f4e" oninput="render()"></div>
<div class="ctrl"><label>Lines</label><input type="number" id="ln" value="3" min="1" max="8" oninput="render()"></div>
<div class="ctrl"><label>Height</label><input type="number" id="ht" value="16" min="8" max="40" oninput="render()"></div>
<div class="ctrl"><label>Radius</label><input type="number" id="rd" value="6" min="0" max="24" oninput="render()"></div>
</div>
<div style="margin:8px 0;"><button class="action" onclick="copyCSS()">Copy CSS</button></div>
<div class="preview" id="prev"></div>
<div class="code-block" id="code"></div>
</div>
</main>
<script src="/assets/app.js"></script>
<script>
let cssText='';
function render(){
const layout=v('layout'),bc=v('bc'),sc=v('sc'),ln=+v('ln'),ht=+v('ht'),rd=+v('rd');
let html='';
const base=`background:linear-gradient(90deg,${bc} 25%,${sc} 50%,${bc} 75%);background-size:200% 100%;animation:shimmer 1.5s infinite linear;border-radius:${rd}px;height:${ht}px;`;
if(layout==='card'){
html=`<div style="width:300px">\n  <div style="${base}width:100%;height:160px;border-radius:${rd}px;margin-bottom:12px"></div>`;
for(let i=0;i<ln;i++) html+=`\n  <div style="${base}width:${i===ln-1?'40':'100'}%;margin-bottom:8px"></div>`;
html+=`\n</div>`;
}else if(layout==='article'){
html=`<div style="width:500px">\n  <div style="${base}width:60%;height:24px;margin-bottom:12px"></div>`;
for(let i=0;i<ln;i++) html+=`\n  <div style="${base}width:${i===ln-1?'50':'100'}%;margin-bottom:8px"></div>`;
html+=`\n</div>`;
}else if(layout==='profile'){
html=`<div style="display:flex;align-items:center;gap:12px;width:300px">\n  <div style="${base}width:60px;height:60px;border-radius:50%;flex-shrink:0"></div>\n  <div style="flex:1">\n    <div style="${base}width:60%;margin-bottom:8px"></div>\n    <div style="${base}width:40%"></div>\n  </div>\n</div>`;
}else{
html=`<div style="width:300px">`;
for(let i=0;i<ln;i++) html+=`\n  <div style="display:flex;align-items:center;gap:8px;margin-bottom:12px">\n    <div style="${base}width:40px;height:40px;border-radius:50%;flex-shrink:0"></div>\n    <div style="flex:1"><div style="${base}width:80%;margin-bottom:4px"></div><div style="${base}width:50%"></div></div>\n  </div>`;
html+=`\n</div>`;
}
document.getElementById('prev').innerHTML=html;
cssText=`.sk-line{\n  ${base}\n}\n@keyframes shimmer{\n  0%{background-position:200% 0;}\n  100%{background-position:-200% 0;}\n}`;
document.getElementById('code').textContent=cssText;
}
function v(id){return document.getElementById(id).value;}
function copyCSS(){navigator.clipboard.writeText(cssText).then(()=>alert('CSS copied!')).catch(()=>alert('Copy failed'));}
render();
</script>
</body>
</html>
