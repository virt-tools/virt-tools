<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CSS Skeleton Card Generator — virt.tools</title>
<link rel="stylesheet" href="/assets/style.css">
<style>
.tool-area{max-width:900px;margin:2rem auto;padding:0 1rem}
.controls{display:grid;gap:1rem;margin:1.5rem 0;padding:1.5rem;background:#1a1a2e;border-radius:12px}
.ctrl-row{display:flex;gap:1rem;align-items:center;flex-wrap:wrap;margin-bottom:.5rem}
.ctrl-row label{font-weight:600;font-size:.9rem;min-width:120px}
.ctrl-row select,.ctrl-row input{padding:.5rem;border-radius:8px;border:1px solid #444;background:#0f0f1e;color:#eee}
.preview-box{margin:1.5rem 0;border-radius:12px;padding:2rem;background:#111;min-height:300px;display:flex;gap:1rem;flex-wrap:wrap;justify-content:center}
.output-block{margin:2rem 0}
.output-block textarea{width:100%;min-height:80px;font-family:monospace;font-size:.85rem;padding:1rem;border-radius:8px;border:1px solid #444;background:#0f0f1e;color:#eee;resize:vertical}
.copy-btn{padding:.6rem 1.2rem;border:none;border-radius:8px;background:#667eea;color:#fff;cursor:pointer;font-size:.9rem;margin-top:.5rem}
h2{margin-top:2rem;font-size:1.2rem}
</style>
</head>
<body>
<header id="site-header"></header>
<main>
<div class="tool-area">
<h1>💀 CSS Skeleton Card Generator</h1>
<p>Create CSS skeleton loading placeholder cards with shimmer animation. 4 layouts, 3 themes, adjustable speed. Copy HTML+CSS.</p>
<div class="controls">
<div class="ctrl-row">
<label>Layout</label><select id="layout"><option value="article" selected>Article</option><option value="profile">Profile</option><option value="product">Product</option><option value="list">List Item</option></select>
<label>Theme</label><select id="theme"><option value="light">Light</option><option value="dark" selected>Dark</option><option value="gray">Gray</option></select>
</div>
<div class="ctrl-row">
<label>Base Color</label><input type="color" id="base" value="#1e293b" style="width:40px;height:34px">
<label>Shimmer Color</label><input type="color" id="shimmer" value="#334155" style="width:40px;height:34px">
<label>Speed</label><select id="speed"><option value="1">Fast</option><option value="1.5" selected>Normal</option><option value="3">Slow</option></select>
</div>
<div class="ctrl-row"><button class="copy-btn" onclick="update()">Update</button></div>
</div>
<h2>Preview</h2>
<div class="preview-box" id="preview"></div>
<h2>HTML</h2><div class="output-block"><textarea id="htmlOut" readonly></textarea><button class="copy-btn" onclick="copyText('htmlOut')">Copy HTML</button></div>
<h2>CSS</h2><div class="output-block"><textarea id="cssOut" readonly></textarea><button class="copy-btn" onclick="copyText('cssOut')">Copy CSS</button></div>
</div>
</main>
<script src="/assets/app.js"></script>
<script>
function update(){
var layout=document.getElementById('layout').value;
var base=document.getElementById('base').value;
var shim=document.getElementById('shimmer').value;
var speed=document.getElementById('speed').value;
var layouts={
article:'<div class="skeleton-card">\n  <div class="sk-line sk-w100 sk-tall"></div>\n  <div class="sk-line sk-w80"></div>\n  <div class="sk-line sk-w60"></div>\n  <div class="sk-line sk-w90"></div>\n  <div class="sk-line sk-w40"></div>\n</div>',
profile:'<div class="skeleton-card">\n  <div class="sk-circle"></div>\n  <div class="sk-line sk-w60"></div>\n  <div class="sk-line sk-w40"></div>\n  <div class="sk-line sk-w80"></div>\n</div>',
product:'<div class="skeleton-card">\n  <div class="sk-line sk-w100 sk-tall"></div>\n  <div class="sk-line sk-w60"></div>\n  <div class="sk-line sk-w30 sk-tall"></div>\n</div>',
list:'<div class="skeleton-card sk-row">\n  <div class="sk-circle sk-sm"></div>\n  <div class="sk-col">\n    <div class="sk-line sk-w70"></div>\n    <div class="sk-line sk-w50"></div>\n  </div>\n</div>'
};
var css='.skeleton-card{padding:1.5rem;background:'+base+';border-radius:12px;width:300px}\n.sk-line{height:12px;border-radius:6px;margin-bottom:10px;background:'+shim+';position:relative;overflow:hidden}\n.sk-line::after{content:"";position:absolute;inset:0;transform:translateX(-100%);background:linear-gradient(90deg,transparent,'+base.replace(')',',0.5)')+',transparent);animation:shimmer '+speed+'s infinite}\n.sk-tall{height:120px}\n.sk-w100{width:100%}.sk-w90{width:90%}.sk-w80{width:80%}.sk-w70{width:70%}.sk-w60{width:60%}.sk-w50{width:50%}.sk-w40{width:40%}.sk-w30{width:30%}\n.sk-circle{width:48px;height:48px;border-radius:50%;background:'+shim+';margin-bottom:12px;position:relative;overflow:hidden}\n.sk-circle::after{content:"";position:absolute;inset:0;transform:translateX(-100%);background:linear-gradient(90deg,transparent,'+base+',transparent);animation:shimmer '+speed+'s infinite}\n.sk-circle.sk-sm{width:40px;height:40px}\n.sk-row{display:flex;align-items:center;gap:12px}\n.sk-col{flex:1}\n@keyframes shimmer{100%{transform:translateX(100%)}}';
document.getElementById('htmlOut').value=layouts[layout];
document.getElementById('cssOut').value=css;
document.getElementById('preview').innerHTML='<style>'+css+'</style>'+layouts[layout].replace(/class="/g,'class="').replace(/</g,'<');
}
function copyText(id){var t=document.getElementById(id);t.select();document.execCommand('copy')}
['layout','theme','base','shimmer','speed'].forEach(function(id){var el=document.getElementById(id);el.addEventListener(el.tagName==='SELECT'?'change':el.type==='color'?'input':'input',update)});
update();
</script>
</body>
</html>
