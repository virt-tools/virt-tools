<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CSS Aurora Background Generator — virt.tools</title>
<link rel="stylesheet" href="/assets/style.css">
<style>
.tool-area{max-width:900px;margin:2rem auto;padding:0 1rem}
.controls{display:grid;gap:1rem;margin:1.5rem 0;padding:1.5rem;background:#1a1a2e;border-radius:12px}
.control-row{display:flex;gap:1rem;align-items:center;flex-wrap:wrap}
.control-row label{min-width:140px;font-weight:600;font-size:.9rem}
.control-row select,.control-row input{padding:.5rem .75rem;border-radius:8px;border:1px solid #444;background:#0f0f1e;color:#eee;font-size:.9rem}
.preview-box{margin:1.5rem 0;background:#0a0a14;border-radius:12px;min-height:300px;overflow:hidden;position:relative}
.output-block{margin:2rem 0}
.output-block textarea{width:100%;min-height:100px;font-family:monospace;font-size:.85rem;padding:1rem;border-radius:8px;border:1px solid #444;background:#0f0f1e;color:#eee;resize:vertical}
.copy-btn{padding:.6rem 1.2rem;border:none;border-radius:8px;background:#667eea;color:#fff;cursor:pointer;font-size:.9rem;margin-top:.5rem}
h2{margin-top:2rem;font-size:1.2rem}
</style>
</head>
<body>
<header id="site-header"></header>
<main>
<div class="tool-area">
<h1>🌌 CSS Aurora Background Generator</h1>
<p>Create animated aurora borealis gradient backgrounds. 3 presets, adjustable colors/speed/blur. Copy CSS.</p>
<div class="controls">
<div class="control-row">
<label>Preset</label><select id="preset"><option value="classic">Classic Green</option><option value="purple">Purple Dream</option><option value="sunset">Sunset Aurora</option><option value="ocean">Ocean Waves</option><option value="rainbow">Rainbow</option></select>
</div>
<div class="control-row">
<label>Color 1</label><input type="color" id="c1" value="#00ff87">
<label>Color 2</label><input type="color" id="c2" value="#60efff">
<label>Color 3</label><input type="color" id="c3" value="#0061ff">
</div>
<div class="control-row">
<label>Speed (s)</label><input type="number" id="speed" value="8" min="2" max="30" step="1" style="width:60px">
<label>Blur (px)</label><input type="number" id="blur" value="60" min="0" max="200" step="5" style="width:60px">
<label>Opacity</label><input type="number" id="opacity" value="0.5" min="0.1" max="1" step="0.1" style="width:60px">
</div>
</div>
<h2>Preview</h2>
<div class="preview-box" id="preview"></div>
<h2>CSS</h2><div class="output-block"><textarea id="cssOut" readonly></textarea><button class="copy-btn" onclick="copyText('cssOut')">Copy CSS</button></div>
</div>
</main>
<script src="/assets/app.js"></script>
<script>
var presets={
classic:['#00ff87','#60efff','#0061ff'],
purple:['#a855f7','#ec4899','#6366f1'],
sunset:['#ff6b6b','#feca57','#ff9ff3'],
ocean:['#00d4ff','#0099cc','#003366'],
rainbow:['#ff0000','#00ff00','#0000ff']
};
function update(){
var p=document.getElementById('preset').value;
var c1=document.getElementById('c1').value;
var c2=document.getElementById('c2').value;
var c3=document.getElementById('c3').value;
var sp=document.getElementById('speed').value;
var bl=document.getElementById('blur').value;
var op=document.getElementById('opacity').value;
var css='.aurora-bg{position:relative;width:100%;height:300px;overflow:hidden;border-radius:12px;background:#0a0a14}\n';
css+='.aurora-bg::before,.aurora-bg::after,.aurora-bg span{content:"";position:absolute;width:60%;height:100%;border-radius:50%;filter:blur('+bl+'px);opacity:'+op+';mix-blend-mode:screen}\n';
css+='.aurora-bg::before{background:'+c1+';top:-30%;left:-10%;animation:aurora-move1 '+sp+'s ease-in-out infinite alternate}\n';
css+='.aurora-bg::after{background:'+c2+';top:-20%;right:-10%;animation:aurora-move2 '+(sp*1.3)+'s ease-in-out infinite alternate}\n';
css+='.aurora-bg span{display:block;background:'+c3+';bottom:-30%;left:20%;animation:aurora-move3 '+(sp*0.8)+'s ease-in-out infinite alternate}\n';
css+='@keyframes aurora-move1{0%{transform:translate(0,0) rotate(0deg)}100%{transform:translate(30%,20%) rotate(180deg)}}\n';
css+='@keyframes aurora-move2{0%{transform:translate(0,0) rotate(0deg)}100%{transform:translate(-30%,30%) rotate(-180deg)}}\n';
css+='@keyframes aurora-move3{0%{transform:translate(0,0) rotate(0deg)}100%{transform:translate(20%,-30%) rotate(180deg)}}\n';
document.getElementById('cssOut').value=css;
var pv=document.getElementById('preview');
pv.innerHTML='<div class="aurora-bg"><span></span></div>';
var st=document.createElement('style');st.textContent=css;pv.appendChild(st);
}
function copyText(id){var t=document.getElementById(id);t.select();document.execCommand('copy')}
document.getElementById('preset').addEventListener('change',function(){
var p=presets[this.value];document.getElementById('c1').value=p[0];document.getElementById('c2').value=p[1];document.getElementById('c3').value=p[2];update();
});
document.querySelectorAll('select,input').forEach(function(e){e.addEventListener('input',update);e.addEventListener('change',update)});
update();
</script>
</body>
</html>
