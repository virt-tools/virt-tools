<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CSS Text Truncate Generator — virt.tools</title>
<link rel="stylesheet" href="/assets/style.css">
<style>
.tool-area{max-width:900px;margin:2rem auto;padding:0 1rem}
.controls{display:grid;gap:1rem;margin:1.5rem 0;padding:1.5rem;background:#1a1a2e;border-radius:12px}
.ctrl-row{display:flex;gap:1rem;align-items:center;flex-wrap:wrap;margin-bottom:.5rem}
.ctrl-row label{font-weight:600;font-size:.9rem;min-width:120px}
.ctrl-row select,.ctrl-row input{padding:.5rem;border-radius:8px;border:1px solid #444;background:#0f0f1e;color:#eee}
.preview-box{margin:1.5rem 0;border-radius:12px;padding:2rem;background:#1a1a2e;min-height:100px}
.output-block{margin:2rem 0}
.output-block textarea{width:100%;min-height:80px;font-family:monospace;font-size:.85rem;padding:1rem;border-radius:8px;border:1px solid #444;background:#0f0f1e;color:#eee;resize:vertical}
.copy-btn{padding:.6rem 1.2rem;border:none;border-radius:8px;background:#667eea;color:#fff;cursor:pointer;font-size:.9rem;margin-top:.5rem}
h2{margin-top:2rem;font-size:1.2rem}
</style>
</head>
<body>
<header id="site-header"></header>
<main>
<div class="tool-area">
<h1>✂️ CSS Text Truncate Generator</h1>
<p>Create CSS text truncation components. Single-line ellipsis, multi-line clamp, custom width. Copy HTML+CSS.</p>
<div class="controls">
<div class="ctrl-row">
<label>Mode</label><select id="mode"><option value="single" selected>Single-line</option><option value="multi">Multi-line</option><option value="char">Character count</option></select>
<label>Lines</label><input type="number" id="lines" value="3" min="1" max="10" style="width:60px">
<label>Max Width</label><input type="text" id="width" value="300px" style="width:80px">
</div>
<div class="ctrl-row">
<label>Ellipsis</label><select id="ellipsis"><option value="..." selected>...</option><option value="…">…</option><option value=" »">»</option><option value="custom">Custom</option></select>
<label>Custom</label><input type="text" id="customEll" value=" (more)" style="width:100px">
<label>Font Size</label><input type="text" id="fontsize" value="16px" style="width:60px">
</div>
<div class="ctrl-row"><button class="copy-btn" onclick="update()">Update</button></div>
</div>
<h2>Preview</h2>
<div class="preview-box" id="preview"></div>
<h2>HTML</h2><div class="output-block"><textarea id="htmlOut" readonly></textarea><button class="copy-btn" onclick="copyText('htmlOut')">Copy HTML</button></div>
<h2>CSS</h2><div class="output-block"><textarea id="cssOut" readonly></textarea><button class="copy-btn" onclick="copyText('cssOut')">Copy CSS</button></div>
</div>
</main>
<script src="/assets/app.js"></script>
<script>
function update(){
var mode=document.getElementById('mode').value;
var lines=parseInt(document.getElementById('lines').value)||3;
var width=document.getElementById('width').value;
var ell=document.getElementById('ellipsis').value;
var custom=document.getElementById('customEll').value;
var fs=document.getElementById('fontsize').value;
var ellipsis=ell==='custom'?custom:ell;
var html='<div class="truncate-text">Lorem ipsum dolor sit amet, consectetur adipiscing elit. Sed do eiusmod tempor incididunt ut labore et dolore magna aliqua. Ut enim ad minim veniam, quis nostrud exercitation ullamco laboris nisi ut aliquip ex ea commodo consequat.</div>';
var css;
if(mode==='single'){
css='.truncate-text{\n  max-width:'+width+';\n  font-size:'+fs+';\n  white-space:nowrap;\n  overflow:hidden;\n  text-overflow:\''+ellipsis+'\';\n  display:block\n}';
}else if(mode==='multi'){
css='.truncate-text{\n  font-size:'+fs+';\n  display:-webkit-box;\n  -webkit-line-clamp:'+lines+';\n  -webkit-box-orient:vertical;\n  overflow:hidden;\n  text-overflow:\''+ellipsis+'\';\n  max-width:'+width+';\n  line-height:1.5\n}';
}else{
css='.truncate-text{\n  font-size:'+fs+';\n  max-width:'+width+';\n  overflow:hidden;\n  text-overflow:\''+ellipsis+'\';\n  white-space:nowrap;\n  display:block\n}';
}
document.getElementById('htmlOut').value=html;
document.getElementById('cssOut').value=css;
var pv='<div style="font-size:'+fs+';';
if(mode==='single'||mode==='char'){
pv+='max-width:'+width+';white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:block';
}else{
pv+='display:-webkit-box;-webkit-line-clamp:'+lines+';-webkit-box-orient:vertical;overflow:hidden;max-width:'+width+';line-height:1.5';
}
pv+='">Lorem ipsum dolor sit amet, consectetur adipiscing elit. Sed do eiusmod tempor incididunt ut labore et dolore magna aliqua. Ut enim ad minim veniam, quis nostrud exercitation ullamco laboris nisi ut aliquip ex ea commodo consequat.</div>';
document.getElementById('preview').innerHTML=pv;
}
function copyText(id){var t=document.getElementById(id);t.select();document.execCommand('copy')}
['mode','lines','width','ellipsis','customEll','fontsize'].forEach(function(id){document.getElementById(id).addEventListener(document.getElementById(id).type==='number'||document.getElementById(id).tagName==='INPUT'?'input':'change',update)});
update();
</script>
</body>
</html>
