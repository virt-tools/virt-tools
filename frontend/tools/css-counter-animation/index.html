<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CSS Animated Counter Generator — virt.tools</title>
<link rel="stylesheet" href="/assets/style.css">
<style>
.tool-area{max-width:960px;margin:2rem auto;padding:0 1rem}
.controls{display:grid;gap:1rem;margin:1.5rem 0;padding:1.5rem;background:#1a1a2e;border-radius:12px}
.control-row{display:flex;gap:1rem;align-items:center;flex-wrap:wrap}
.control-row label{min-width:120px;font-weight:600;font-size:.9rem}
.control-row select,.control-row input[type="color"],.control-row input[type="range"],.control-row input[type="text"],.control-row input[type="number"]{padding:.5rem .75rem;border-radius:8px;border:1px solid #444;background:#0f0f1e;color:#eee;font-size:.9rem}
.preview-box{margin:1.5rem 0;padding:2rem;background:#0f0f1e;border-radius:12px;text-align:center}
.output-block{margin:2rem 0}
.output-block textarea{width:100%;min-height:200px;font-family:monospace;font-size:.85rem;padding:1rem;border-radius:8px;border:1px solid #444;background:#0f0f1e;color:#eee;resize:vertical}
.copy-btn{padding:.6rem 1.2rem;border:none;border-radius:8px;background:#4a9eff;color:#fff;cursor:pointer;font-size:.9rem;margin-top:.5rem}
h2{margin-top:2rem;font-size:1.2rem}
</style>
</head>
<body>
<header id="site-header"></header>
<main>
<div class="tool-area">
<h1>🔢 CSS Animated Counter Generator</h1>
<p>Create CSS animated number counters that count up from 0 to a target. 4 styles, custom colors, adjustable duration.</p>
<div class="controls">
<div class="control-row">
<label>Style</label><select id="style"><option value="card">Card</option><option value="plain">Plain</option><option value="circle">Circle</option><option value="badge">Badge</option></select>
<label>Theme</label><select id="theme"><option value="dark">Dark</option><option value="light">Light</option><option value="gradient">Gradient</option></select>
</div>
<div class="control-row">
<label>Accent Color</label><input type="color" id="accent" value="#4a9eff">
<label>Duration (s)</label><input type="number" id="duration" value="2" min="0.5" max="10" step="0.5" style="width:60px">
<label>Digit Size</label><input type="range" id="digitSize" min="20" max="72" value="40"><span id="digitSizeVal">40px</span>
</div>
<div class="control-row" id="itemsRow">
<label>Counters</label>
</div>
</div>
<h2>Preview</h2>
<div class="preview-box" id="preview"></div>
<button class="copy-btn" onclick="rerunCounters()">Re-run Animation</button>
<h2>CSS</h2><div class="output-block"><textarea id="cssOut" readonly></textarea><button class="copy-btn" onclick="copyText('cssOut')">Copy CSS</button></div>
<h2>HTML</h2><div class="output-block"><textarea id="htmlOut" readonly></textarea><button class="copy-btn" onclick="copyText('htmlOut')">Copy HTML</button></div>
<h2>JS</h2><div class="output-block"><textarea id="jsOut" readonly></textarea><button class="copy-btn" onclick="copyText('jsOut')">Copy JS</button></div>
</div>
</main>
<script src="/assets/app.js"></script>
<script>
var counters=[{value:12500,label:"Users",prefix:""},{value:99,label:"Satisfaction",prefix:"",suffix:"%"},{value:350,label:"Projects",prefix:""},{value:24,label:"Support",prefix:"",suffix:"/7"}];
function buildItemControls(){
var row=document.getElementById('itemsRow');
var existing=row.querySelectorAll('input[type="number"],input[type="text"]');
existing.forEach(function(e){e.remove()});
row.querySelectorAll('label.sub').forEach(function(e){e.remove()});
counters.forEach(function(c,i){
var numInput=document.createElement('input');
numInput.type='number';numInput.value=c.value;numInput.style.width='80px';
numInput.onchange=function(){counters[i].value=parseInt(this.value)||0;update()};
var lblInput=document.createElement('input');
lblInput.type='text';lblInput.value=c.label;lblInput.style.width='100px';
lblInput.onchange=function(){counters[i].label=this.value;update()};
row.appendChild(numInput);row.appendChild(lblInput);
});
}
function update(){
var style=document.getElementById('style').value;
var theme=document.getElementById('theme').value;
var accent=document.getElementById('accent').value;
var duration=document.getElementById('duration').value;
var digitSize=document.getElementById('digitSize').value;
document.getElementById('digitSizeVal').textContent=digitSize+'px';
var bg=theme==='dark'?'#1a1a2e':theme==='light'?'#f5f5f5':'linear-gradient(135deg,#667eea,#764ba2)';
var cardBg=theme==='dark'?'#0f0f1e':theme==='light'?'#fff':'rgba(255,255,255,.15)';
var textColor=theme==='dark'?'#eee':theme==='light'?'#333':'#fff';
var labelColor=theme==='dark'?'#aaa':theme==='light'?'#666':'rgba(255,255,255,.8)';
var css='';
css+='.counter-wrap {\n  display: flex;\n  gap: 2rem;\n  justify-content: center;\n  flex-wrap: wrap;\n  padding: 2rem;\n  border-radius: 12px;\n  background: '+bg+';\n}\n\n';
if(style==='card'){
css+='.counter-item {\n  background: '+cardBg+';\n  border-radius: 12px;\n  padding: 1.5rem 2rem;\n  text-align: center;\n  min-width: 120px;\n  box-shadow: 0 2px 8px rgba(0,0,0,.15);\n}\n';
}else if(style==='plain'){
css+='.counter-item {\n  text-align: center;\n  min-width: 120px;\n}\n';
}else if(style==='circle'){
css+='.counter-item {\n  text-align: center;\n}\n.counter-circle {\n  width: '+Math.round(digitSize*2.5)+'px;\n  height: '+Math.round(digitSize*2.5)+'px;\n  border-radius: 50%;\n  border: 3px solid '+accent+';\n  display: flex;\n  align-items: center;\n  justify-content: center;\n  margin: 0 auto;\n  background: '+cardBg+';\n}\n';
}else if(style==='badge'){
css+='.counter-item {\n  text-align: center;\n}\n.counter-badge {\n  background: '+accent+';\n  border-radius: 50px;\n  padding: .5rem 1.5rem;\n  display: inline-block;\n}\n';
}
css+='.counter-num {\n  font-size: '+digitSize+'px;\n  font-weight: 800;\n  color: '+(style==='badge'?textColor:accent)+';\n  font-variant-numeric: tabular-nums;\n  line-height: 1;\n}\n\n';
css+='.counter-label {\n  font-size: 0.85rem;\n  text-transform: uppercase;\n  letter-spacing: 1px;\n  color: '+labelColor+';\n  margin-top: 0.5rem;\n}\n';
document.getElementById('cssOut').value=css;
var html='<div class="counter-wrap">\n';
counters.forEach(function(c,i){
if(style==='circle')html+='  <div class="counter-item"><div class="counter-circle"><span class="counter-num" data-target="'+c.value+'" data-prefix="'+(c.prefix||'')+'" data-suffix="'+(c.suffix||'')+'">'+(c.prefix||'')+'0'+(c.suffix||'')+'</span></div><div class="counter-label">'+escapeHtml(c.label)+'</div></div>\n';
else if(style==='badge')html+='  <div class="counter-item"><div class="counter-badge"><span class="counter-num" data-target="'+c.value+'" data-prefix="'+(c.prefix||'')+'" data-suffix="'+(c.suffix||'')+'">'+(c.prefix||'')+'0'+(c.suffix||'')+'</span></div><div class="counter-label">'+escapeHtml(c.label)+'</div></div>\n';
else html+='  <div class="counter-item"><span class="counter-num" data-target="'+c.value+'" data-prefix="'+(c.prefix||'')+'" data-suffix="'+(c.suffix||'')+'">'+(c.prefix||'')+'0'+(c.suffix||'')+'</span><div class="counter-label">'+escapeHtml(c.label)+'</div></div>\n';
});
html+='</div>';
document.getElementById('htmlOut').value=html;
var js='function animateCounters() {\n  document.querySelectorAll(".counter-num").forEach(function(el) {\n    var target = parseInt(el.dataset.target);\n    var prefix = el.dataset.prefix || "";\n    var suffix = el.dataset.suffix || "";\n    var dur = '+duration*1000+';\n    var start = null;\n    function step(ts) {\n      if (!start) start = ts;\n      var progress = Math.min((ts - start) / dur, 1);\n      var eased = 1 - Math.pow(1 - progress, 3);\n      el.textContent = prefix + Math.floor(eased * target).toLocaleString() + suffix;\n      if (progress < 1) requestAnimationFrame(step);\n      else el.textContent = prefix + target.toLocaleString() + suffix;\n    }\n    requestAnimationFrame(step);\n  });\n}\nanimateCounters();';
document.getElementById('jsOut').value=js;
var previewHtml='<style>'+css+'</style>'+html+'<script>'+js+'<\/script>';
document.getElementById('preview').innerHTML=previewHtml;
}
function rerunCounters(){
document.querySelectorAll('#preview .counter-num').forEach(function(el){
el.textContent=(el.dataset.prefix||'')+'0'+(el.dataset.suffix||'');
});
setTimeout(function(){animateCountersInPreview()},100);
}
function animateCountersInPreview(){
var els=document.querySelectorAll('#preview .counter-num');
var duration=parseFloat(document.getElementById('duration').value)*1000;
els.forEach(function(el){
var target=parseInt(el.dataset.target);
var prefix=el.dataset.prefix||'';
var suffix=el.dataset.suffix||'';
var start=null;
function step(ts){
if(!start)start=ts;
var progress=Math.min((ts-start)/duration,1);
var eased=1-Math.pow(1-progress,3);
el.textContent=prefix+Math.floor(eased*target).toLocaleString()+suffix;
if(progress<1)requestAnimationFrame(step);
else el.textContent=prefix+target.toLocaleString()+suffix;
}
requestAnimationFrame(step);
});
}
function escapeHtml(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function copyText(id){var t=document.getElementById(id);t.select();document.execCommand('copy')}
document.querySelectorAll('select,input').forEach(function(e){e.addEventListener('input',update);e.addEventListener('change',update)});
buildItemControls();
update();
</script>
</body>
</html>
