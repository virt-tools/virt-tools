<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CSS Read Progress Bar Generator — virt.tools</title>
<link rel="stylesheet" href="/assets/style.css">
<style>
.tool-area{max-width:800px;margin:2rem auto;padding:0 1rem}
.controls{display:grid;gap:.8rem;margin:1.5rem 0;padding:1.5rem;background:#1a1a2e;border-radius:12px}
.ctrl-row{display:flex;gap:1rem;align-items:center;flex-wrap:wrap}
.ctrl-row label{font-weight:600;font-size:.9rem;min-width:120px}
.ctrl-row select,.ctrl-row input{padding:.5rem;border-radius:8px;border:1px solid #444;background:#0f0f1e;color:#eee}
.preview-box{margin:1.5rem 0;padding:0;background:#0a0a12;border-radius:12px;min-height:400px;overflow:hidden;position:relative}
.demo-scroll{height:400px;overflow-y:auto;padding:2rem;color:#aaa;font-size:.9rem}
.demo-scroll p{margin-bottom:1rem;line-height:1.6}
.output-block{margin:1.5rem 0}
.output-block textarea{width:100%;min-height:120px;font-family:monospace;font-size:.85rem;padding:1rem;border-radius:8px;border:1px solid #444;background:#0f0f1e;color:#eee;resize:vertical}
.copy-btn{padding:.6rem 1.2rem;border:none;border-radius:8px;background:#667eea;color:#fff;cursor:pointer;font-size:.9rem;margin-top:.5rem}
h2{margin-top:2rem;font-size:1.2rem}
</style>
</head>
<body>
<header id="site-header"></header>
<main>
<div class="tool-area">
<h1>📚 CSS Read Progress Bar Generator</h1>
<p>Create CSS scroll/read progress bar at top of page. 4 styles, adjustable height/color. Copy HTML+CSS+JS.</p>
<div class="controls">
<div class="ctrl-row"><label>Style</label><select id="style"><option value="solid" selected>Solid</option><option value="gradient">Gradient</option><option value="glow">Glow</option><option value="striped">Striped</option></select></div>
<div class="ctrl-row"><label>Height (px)</label><input type="number" id="height" value="5" min="1" max="20" step="1" style="width:80px"></div>
<div class="ctrl-row"><label>Color 1</label><input type="color" id="color1" value="#667eea" style="width:60px;height:36px"></div>
<div class="ctrl-row"><label>Color 2</label><input type="color" id="color2" value="#764ba2" style="width:60px;height:36px"></div>
<div class="ctrl-row"><label>Position</label><select id="pos"><option value="top" selected>Top</option><option value="bottom">Bottom</option></select></div>
<div class="ctrl-row"><button class="copy-btn" onclick="update()">Update</button></div>
</div>
<h2>Preview (scroll the box below)</h2>
<div class="preview-box" id="preview"></div>
<h2>CSS</h2><div class="output-block"><textarea id="cssOut" readonly></textarea><button class="copy-btn" onclick="copyText('cssOut')">Copy CSS</button></div>
<h2>HTML</h2><div class="output-block"><textarea id="htmlOut" readonly></textarea><button class="copy-btn" onclick="copyText('htmlOut')">Copy HTML</button></div>
<h2>JS</h2><div class="output-block"><textarea id="jsOut" readonly></textarea><button class="copy-btn" onclick="copyText('jsOut')">Copy JS</button></div>
</div>
</main>
<script src="/assets/app.js"></script>
<script>
function update(){
var style=document.getElementById('style').value;
var h=parseInt(document.getElementById('height').value);
var c1=document.getElementById('color1').value;
var c2=document.getElementById('color2').value;
var pos=document.getElementById('pos').value;
var bg=c1;
if(style==='gradient'||style==='glow'||style==='striped')bg='linear-gradient(90deg,'+c1+','+c2+')';
if(style==='striped')bg='repeating-linear-gradient(45deg,'+c1+' 0,'+c1+' 10px,'+c2+' 10px,'+c2+' 20px)';
var glow=style==='glow'?'box-shadow:0 0 8px '+c1+';':'';
var css='.read-progress{position:fixed;'+pos+':0;left:0;width:0;height:'+h+'px;background:'+bg+';z-index:9999;transition:width .1s;'+glow+'border-radius:0 0 4px 4px}';
var html='<div class="read-progress" id="readProgress"></div>';
var js='window.addEventListener("scroll",function(){var s=window.scrollY;var d=document.documentElement.scrollHeight-window.innerHeight;var p=(s/d)*100;document.getElementById("readProgress").style.width=p+"%"})';
document.getElementById('cssOut').value=css;
document.getElementById('htmlOut').value=html;
document.getElementById('jsOut').value=js;
var demoContent='<div class="demo-scroll" id="demoScroll" style="position:relative"><div class="read-progress" id="demoProgress" style="position:absolute;top:0;width:0;height:'+h+'px;background:'+bg+';z-index:10;'+glow+'border-radius:0 0 4px 4px"></div>';
for(var i=0;i<20;i++)demoContent+='<p>Lorem ipsum dolor sit amet, consectetur adipiscing elit. Sed do eiusmod tempor incididunt ut labore et dolore magna aliqua. Ut enim ad minim veniam.</p>';
demoContent+='</div>';
document.getElementById('preview').innerHTML='<style>.read-progress{position:absolute;'+pos+':0;left:0;width:0;height:'+h+'px;background:'+bg+';z-index:10;'+glow+'border-radius:0 0 4px 4px;transition:width .1s}</style>'+demoContent;
var ds=document.getElementById('demoScroll');
if(ds)ds.addEventListener('scroll',function(){var p=(ds.scrollTop/(ds.scrollHeight-ds.clientHeight))*100;document.getElementById('demoProgress').style.width=p+'%'});
}
function copyText(id){var t=document.getElementById(id);t.select();document.execCommand('copy')}
['style','height','color1','color2','pos'].forEach(function(id){var el=document.getElementById(id);el.addEventListener('input',update);el.addEventListener('change',update)});
update();
</script>
</body>
</html>
