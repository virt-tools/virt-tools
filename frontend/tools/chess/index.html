<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="/assets/theme-init.js"></script>
<title>Chess — Virtual Tools</title>
<link rel="stylesheet" href="/assets/style.css">
<style>
.tool-wrap{max-width:560px;margin:0 auto;text-align:center;}
.tool-desc{opacity:.7;font-size:14px;margin-bottom:8px;}
#board{display:inline-grid;grid-template-columns:repeat(8,56px);grid-template-rows:repeat(8,56px);border:3px solid #333;border-radius:4px;touch-action:manipulation;}
.sq{display:flex;align-items:center;justify-content:center;font-size:40px;cursor:pointer;user-select:none;line-height:1;}
.sq.light{background:#f0d9b5;}
.sq.dark{background:#b58863;}
.sq.sel{box-shadow:inset 0 0 0 3px #1565c0;}
.sq.legal::after{content:'';position:absolute;width:16px;height:16px;border-radius:50%;background:rgba(21,101,192,.35);pointer-events:none;}
.sq.legal-cap::after{content:'';position:absolute;width:48px;height:48px;border-radius:50%;border:3px solid rgba(196,37,37,.5);background:transparent;pointer-events:none;}
.sq{position:relative;}
.controls{margin:10px;display:flex;gap:8px;justify-content:center;flex-wrap:wrap;}
.controls button,.controls select{padding:6px 14px;border-radius:6px;border:1px solid var(--border,#2a2f3a);background:var(--bg-alt,#1a1f2e);color:var(--text,#e0e0e0);cursor:pointer;font-size:14px;}
.info{font-size:14px;min-height:20px;margin:8px 0;font-weight:600;}
.status{padding:4px 12px;border-radius:6px;background:var(--bg-alt,#1a1f2e);display:inline-block;}
#history{max-height:150px;overflow-y:auto;text-align:left;font-size:13px;margin:8px auto;max-width:300px;padding:8px;border-radius:6px;background:var(--bg-alt,#1a1f2e);}
</style>
</head>
<body>
<header id="site-header"></header>
<main>
<div class="tool-wrap">
<h1>Chess</h1>
<p class="tool-desc">Full chess with move validation, check detection, and AI opponent. Click a piece to see legal moves, then click a destination.</p>
<div class="controls">
<select id="mode"><option value="ai">vs AI</option><option value="2p">2 Players</option></select>
<button onclick="newGame()">New Game</button>
<button onclick="undoMove()">Undo</button>
</div>
<div class="info" id="info"></div>
<div id="board"></div>
<div id="history"></div>
</div>
</main>
<script src="/assets/app.js"></script>
<script>
const UNI={K:'♔',Q:'♕',R:'♖',B:'♗',N:'♘',P:'♙',k:'♚',q:'♛',r:'♜',b:'♝',n:'♞',p:'♟'};
let board,turn,selected,legalMoves,history,inCheck,gameOver,mode,castle;

function newGame(){
mode=document.getElementById('mode').value;
board=[
['r','n','b','q','k','b','n','r'],
['p','p','p','p','p','p','p','p'],
['','','','','','','',''],
['','','','','','','',''],
['','','','','','','',''],
['','','','','','','',''],
['P','P','P','P','P','P','P','P'],
['R','N','B','Q','K','B','N','R']
];
turn='w';selected=null;legalMoves=[];history=[];inCheck=false;gameOver=false;
castle={wK:true,wR:true,bK:true,bR:true};
render();updateInfo();
}

function isWhite(p){return p&&p===p.toUpperCase();}
function isBlack(p){return p&&p===p.toLowerCase();}
function sameColor(p,white){return p&&(isWhite(p)===white);}

function inBounds(r,c){return r>=0&&r<8&&c>=0&&c<8;}

function getMoves(r,c,b,skipCastle){
b=b||board;const p=b[r][c];if(!p)return[];
const white=isWhite(p);const moves=[];const type=p.toLowerCase();

if(type==='p'){
const dir=white?-1:1;const startRow=white?6:1;
if(inBounds(r+dir,c)&&!b[r+dir][c]){moves.push([r+dir,c]);
if(r===startRow&&!b[r+2*dir][c])moves.push([r+2*dir,c]);}
for(const dc of[-1,1]){const nr=r+dir,nc=c+dc;if(inBounds(nr,nc)&&b[nr][nc]&&!sameColor(b[nr][nc],white))moves.push([nr,nc]);}
}else if(type==='n'){
for(const[dr,dc]of[[-2,-1],[-2,1],[-1,-2],[-1,2],[1,-2],[1,2],[2,-1],[2,1]]){
const nr=r+dr,nc=c+dc;if(inBounds(nr,nc)&&!sameColor(b[nr][nc],white))moves.push([nr,nc]);}
}else if(type==='b'||type==='r'||type==='q'){
const dirs=[];if(type!=='b')dirs.push([-1,0],[1,0],[0,-1],[0,1]);
if(type!=='r')dirs.push([-1,-1],[-1,1],[1,-1],[1,1]);
for(const[dr,dc]of dirs){let nr=r+dr,nc=c+dc;
while(inBounds(nr,nc)){if(!b[nr][nc]){moves.push([nr,nc]);}else{if(!sameColor(b[nr][nc],white))moves.push([nr,nc]);break;}nr+=dr;nc+=dc;}}
}else if(type==='k'){
for(const dr of[-1,0,1])for(const dc of[-1,0,1]){
if(dr===0&&dc===0)continue;const nr=r+dr,nc=c+dc;
if(inBounds(nr,nc)&&!sameColor(b[nr][nc],white))moves.push([nr,nc]);}
if(!skipCastle){if(white&&castle.wK&&b[7][4]==='K'){if(castle.wR&&b[7][0]==='R'&&!b[7][1]&&!b[7][2]&&!b[7][3])moves.push([7,2,'KC']);
if(castle.wR&&b[7][7]==='R'&&!b[7][5]&&!b[7][6])moves.push([7,6,'QC']);}
if(!white&&castle.bK&&b[0][4]==='k'){if(castle.bR&&b[0][0]==='r'&&!b[0][1]&&!b[0][2]&&!b[0][3])moves.push([0,2,'kc']);
if(castle.bR&&b[0][7]==='r'&&!b[0][5]&&!b[0][6])moves.push([0,6,'qc']);}}
}
return moves;
}

function findKing(b,white){
for(let r=0;r<8;r++)for(let c=0;c<8;c++){const p=b[r][c];if(p&&p.toLowerCase()==='k'&&isWhite(p)===white)return[r,c];}
return null;
}

function isAttacked(r,c,b,byWhite){
for(let rr=0;rr<8;rr++)for(let cc=0;cc<8;cc++){
const p=b[rr][cc];if(!p||isWhite(p)!==byWhite)continue;
const moves=getMoves(rr,cc,b,true);
for(const[mr,mc]of moves)if(mr===r&&mc===c)return true;}
return false;
}

function inCheckState(b,white){
const k=findKing(b,white);if(!k)return false;
return isAttacked(k[0],k[1],b,!white);
}

function legalFilter(r,c,moves){
const white=isWhite(board[r][c]);const legal=[];
for(const[mr,mc,sp]of moves){
const snap=JSON.parse(JSON.stringify(board));
makeMove(r,c,mr,mc,sp);
if(!inCheckState(board,white))legal.push([mr,mc,sp]);
board=snap;}
return legal;
}

function makeMove(r,c,mr,mc,sp){
const p=board[r][c];board[mr][mc]=p;board[r][c]='';
if(p.toLowerCase()==='p'&&(mr===0||mr===7))board[mr][mc]=isWhite(p)?'Q':'q';
if(sp==='KC'){board[7][3]='R';board[7][0]='';}
if(sp==='QC'){board[7][5]='R';board[7][7]='';}
if(sp==='kc'){board[0][3]='r';board[0][0]='';}
if(sp==='qc'){board[0][5]='r';board[0][7]='';}
if(p==='K'){castle.wK=false;}
if(p==='k'){castle.bK=false;}
if(r===7&&c===0||mr===7&&mc===0)castle.wR=false;
if(r===7&&c===7||mr===7&&mc===7)castle.wR=false;
if(r===0&&c===0||mr===0&&mc===0)castle.bR=false;
if(r===0&&c===7||mr===0&&mc===7)castle.bR=false;
}

function undoMove(){
if(!history.length)return;
const h=history.pop();
board=h.board;turn=h.turn;castle=h.castle;selected=null;legalMoves=[];gameOver=false;
render();updateInfo();
}

function hasAnyMove(white){
for(let r=0;r<8;r++)for(let c=0;c<8;c++){
const p=board[r][c];if(!p||isWhite(p)!==white)continue;
const m=legalFilter(r,c,getMoves(r,c));
if(m.length)return true;}
return false;
}

function render(){
const el=document.getElementById('board');el.innerHTML='';
for(let r=0;r<8;r++)for(let c=0;c<8;c++){
const sq=document.createElement('div');
sq.className='sq '+((r+c)%2===0?'light':'dark');
const p=board[r][c];if(p)sq.textContent=UNI[p];
sq.dataset.r=r;sq.dataset.c=c;
if(selected&&selected[0]===r&&selected[1]===c)sq.classList.add('sel');
for(const[mr,mc]of legalMoves){
if(mr===r&&mc===c){sq.classList.add(board[r][c]?'legal-cap':'legal');break;}}
sq.onclick=()=>clickSq(r,c);
el.appendChild(sq);
}
}

function clickSq(r,c){
if(gameOver)return;
const white=turn==='w';
const p=board[r][c];
if(selected){
for(const[mr,mc,sp]of legalMoves){
if(mr===r&&mc===c){
const snap={board:JSON.parse(JSON.stringify(board)),turn,castle:JSON.parse(JSON.stringify(castle))};
const p2=board[selected[0]][selected[1]];
makeMove(selected[0],selected[1],r,c,sp);
const notation=p2.toUpperCase()+(sp?'O-O':String.fromCharCode(97+selected[1])+(8-selected[0])+'-'+String.fromCharCode(97+c)+(8-r));
history.push({...snap,notation});
turn=white?'b':'w';selected=null;legalMoves=[];
render();updateInfo();
if(mode==='ai'&&!gameOver&&turn==='b')setTimeout(aiMove,400);
return;
}}
if(sameColor(p,white)){selected=[r,c];legalMoves=legalFilter(r,c,getMoves(r,c));render();return;}
selected=null;legalMoves=[];render();return;
}
if(sameColor(p,white)){selected=[r,c];legalMoves=legalFilter(r,c,getMoves(r,c));render();}
}

function updateInfo(){
const white=turn==='w';
inCheck=inCheckState(board,white);
const canMove=hasAnyMove(white);
if(!canMove){
gameOver=true;
document.getElementById('info').innerHTML=inCheck?'<span class="status">Checkmate! '+(white?'Black':'White')+' wins.</span>':'<span class="status">Stalemate! Draw.</span>';
}else{
document.getElementById('info').innerHTML='<span class="status">'+(white?'White':'Black')+' to move'+(inCheck?' — Check!':'')+'</span>';
}
const hl=document.getElementById('history');
hl.innerHTML=history.map((h,i)=>(i%2===0?'<b>'+((i/2)+1)+'.</b> ':'')+h.notation+' ').join('');
hl.scrollTop=hl.scrollHeight;
}

function aiMove(){
if(gameOver||turn!=='b')return;
let bestScore=-Infinity;let bestMove=null;
for(let r=0;r<8;r++)for(let c=0;c<8;c++){
const p=board[r][c];if(!p||isWhite(p))continue;
const moves=legalFilter(r,c,getMoves(r,c));
for(const[mr,mc,sp]of moves){
const snap=JSON.parse(JSON.stringify(board));
makeMove(r,c,mr,mc,sp);
let score=evalPos();
// Add small randomness
score+=Math.random()*0.3;
board=snap;
if(score>bestScore){bestScore=score;bestMove=[r,c,mr,mc,sp];}
}
}
if(bestMove){
const snap={board:JSON.parse(JSON.stringify(board)),turn,castle:JSON.parse(JSON.stringify(castle))};
const p=board[bestMove[0]][bestMove[1]];
makeMove(bestMove[0],bestMove[1],bestMove[2],bestMove[3],bestMove[4]);
const notation=p.toUpperCase()+(bestMove[4]?'O-O':String.fromCharCode(97+bestMove[1])+(8-bestMove[0])+'-'+String.fromCharCode(97+bestMove[3])+(8-bestMove[2]));
history.push({...snap,notation});
turn='w';selected=null;legalMoves=[];
render();updateInfo();
}
}

const VAL={p:1,n:3,b:3,r:5,q:9,k:0};
function evalPos(){
let s=0;
for(let r=0;r<8;r++)for(let c=0;c<8;c++){
const p=board[r][c];if(!p)continue;
const v=VAL[p.toLowerCase()]+(p==='P'&&r===1?0.5:0)+(p==='p'&&r===6?0.5:0);
s+=isWhite(p)?-v:v;
}
return s;
}

newGame();
</script>
</body>
</html>
