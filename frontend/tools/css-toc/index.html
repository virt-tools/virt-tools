<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CSS Table of Contents Generator — virt.tools</title>
<link rel="stylesheet" href="/assets/style.css">
<style>
.tool-area{max-width:900px;margin:2rem auto;padding:0 1rem}
.controls{display:grid;gap:1rem;margin:1.5rem 0;padding:1.5rem;background:#1a1a2e;border-radius:12px}
.ctrl-row{display:flex;gap:1rem;align-items:center;flex-wrap:wrap;margin-bottom:.5rem}
.ctrl-row label{font-weight:600;font-size:.9rem;min-width:120px}
.ctrl-row select,.ctrl-row input{padding:.5rem;border-radius:8px;border:1px solid #444;background:#0f0f1e;color:#eee}
.preview-box{margin:1.5rem 0;border-radius:12px;padding:1.5rem;background:#111;min-height:250px;overflow:auto}
.output-block{margin:2rem 0}
.output-block textarea{width:100%;min-height:100px;font-family:monospace;font-size:.85rem;padding:1rem;border-radius:8px;border:1px solid #444;background:#0f0f1e;color:#eee;resize:vertical}
.copy-btn{padding:.6rem 1.2rem;border:none;border-radius:8px;background:#667eea;color:#fff;cursor:pointer;font-size:.9rem;margin-top:.5rem}
h2{margin-top:2rem;font-size:1.2rem}
.toc-preview{list-style:none;padding:0;margin:0}
.toc-preview li{padding:.4rem .5rem;border-left:2px solid #333;font-size:.9rem;color:#aaa}
.toc-preview li.active{color:#fff;border-left-color:#667eea}
.toc-preview li.h2{padding-left:1rem}
.toc-preview li.h3{padding-left:2rem}
</style>
</head>
<body>
<header id="site-header"></header>
<main>
<div class="tool-area">
<h1>📋 CSS Table of Contents Generator</h1>
<p>Create CSS table of contents / sidebar navigation components. 3 styles, 3 themes, nested headings. Copy HTML+CSS.</p>
<div class="controls">
<div class="ctrl-row">
<label>Style</label><select id="style"><option value="sidebar" selected>Sidebar</option><option value="top">Top card</option><option value="inline">Inline list</option></select>
<label>Theme</label><select id="theme"><option value="dark" selected>Dark</option><option value="light">Light</option><option value="gradient">Gradient</option></select>
</div>
<div class="ctrl-row">
<label>Accent</label><input type="color" id="accent" value="#667eea" style="width:40px;height:34px">
<label>Width</label><input type="range" id="width" min="180" max="400" value="260" style="width:120px">
</div>
<div class="ctrl-row"><button class="copy-btn" onclick="update()">Update</button></div>
</div>
<h2>Preview</h2>
<div class="preview-box" id="preview"></div>
<h2>HTML</h2><div class="output-block"><textarea id="htmlOut" readonly></textarea><button class="copy-btn" onclick="copyText('htmlOut')">Copy HTML</button></div>
<h2>CSS</h2><div class="output-block"><textarea id="cssOut" readonly></textarea><button class="copy-btn" onclick="copyText('cssOut')">Copy CSS</button></div>
</div>
</main>
<script src="/assets/app.js"></script>
<script>
function update(){
var style=document.getElementById('style').value;
var theme=document.getElementById('theme').value;
var accent=document.getElementById('accent').value;
var width=document.getElementById('width').value;
var bg,tx,bd;
if(theme==='dark'){bg='#1a1a2e';tx='#eee';bd='#333'}
else if(theme==='light'){bg='#fff';tx='#333';bd='#e0e0e0'}
else{bg='linear-gradient(135deg,#1a1a2e,'+accent+'33)';tx='#eee';bd='#444'}
var items=[
{t:'Introduction',l:'intro',h:1},
{t:'Getting Started',l:'getting-started',h:1},
{t:'Installation',l:'installation',h:2},
{t:'Configuration',l:'configuration',h:2},
{t:'Features',l:'features',h:1},
{t:'Basic Usage',l:'basic-usage',h:2},
{t:'Advanced Usage',l:'advanced-usage',h:2},
{t:'API Reference',l:'api',h:1},
{t:'FAQ',l:'faq',h:1},
{t:'Conclusion',l:'conclusion',h:1}
];
var html='<nav class="toc">\n  <ul>\n'+items.map(function(it){return '    <li class="h'+it.h+'"><a href="#'+it.l+'">'+it.t+'</a></li>'}).join('\n')+'\n  </ul>\n</nav>';
var css='.toc{\n  width:'+width+'px;\n  background:'+bg+';\n  border-radius:12px;\n  padding:1.5rem;\n  '+(style==='sidebar'?'position:sticky;top:1rem;':'')+'\n}\n.toc ul{\n  list-style:none;\n  padding:0;\n  margin:0;\n}\n.toc li{\n  padding:.4rem .5rem;\n  border-left:2px solid '+bd+';\n  font-size:.9rem;\n}\n.toc li.h2{padding-left:1rem}\n.toc li.h3{padding-left:2rem}\n.toc a{\n  color:'+tx+';\n  text-decoration:none;\n  transition:color .2s;\n}\n.toc a:hover{\n  color:'+accent+';\n}\n.toc li:hover{\n  border-left-color:'+accent+';\n}';
document.getElementById('htmlOut').value=html;
document.getElementById('cssOut').value=css;
var pv='<nav class="toc" style="width:'+width+'px;background:'+(theme==='light'?'#fff':'#1a1a2e')+';border-radius:12px;padding:1.5rem;'+(style==='sidebar'?'position:sticky;top:1rem;':'')+'"><ul style="list-style:none;padding:0;margin:0">'+items.map(function(it){return '<li class="h'+it.h+'" style="padding:.4rem .5rem;border-left:2px solid '+(theme==='light'?'#e0e0e0':'#333')+';font-size:.9rem"><a href="#'+it.l+'" style="color:'+(theme==='light'?'#333':'#eee')+';text-decoration:none" onmouseover="this.style.color=\''+accent+'\'" onmouseout="this.style.color=\''+(theme==='light'?'#333':'#eee')+'\'">'+it.t+'</a></li>'}).join('')+'</ul></nav>';
document.getElementById('preview').innerHTML=pv;
}
function copyText(id){var t=document.getElementById(id);t.select();document.execCommand('copy')}
['style','theme','accent','width'].forEach(function(id){var el=document.getElementById(id);el.addEventListener(el.tagName==='SELECT'?'change':el.type==='color'||el.type==='range'?'input':'input',update)});
update();
</script>
</body>
</html>
