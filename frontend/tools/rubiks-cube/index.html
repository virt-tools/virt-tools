<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="/assets/theme-init.js"></script>
<title>Rubik's Cube — Virtual Tools</title>
<link rel="stylesheet" href="/assets/style.css">
<style>
.tool-wrap{max-width:520px;margin:0 auto;text-align:center;}
.cube-net{display:grid;grid-template-columns:repeat(12,36px);grid-template-rows:repeat(9,36px);gap:2px;justify-content:center;margin:16px auto;}
.face{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;width:108px;height:108px;}
.sticker{width:34px;height:34px;border-radius:4px;border:1px solid rgba(0,0,0,.3);display:flex;align-items:center;justify-content:center;font-size:11px;color:rgba(255,255,255,.5);cursor:pointer;}
.sticker:hover{outline:2px solid #fff;}
.sticker.U{background:#f7f7f7;color:#333;}.sticker.D{background:#ffd500;}.sticker.F{background:#e74c3c;}.sticker.B{background:#ff8c00;}.sticker.L{background:#3498db;}.sticker.R{background:#2ecc71;}
.pos-U{grid-column:4/7;grid-row:1/4;}.pos-D{grid-column:4/7;grid-row:7/10;}.pos-F{grid-column:4/7;grid-row:4/7;}.pos-B{grid-column:7/10;grid-row:4/7;}.pos-L{grid-column:1/4;grid-row:4/7;}.pos-R{grid-column:10/13;grid-row:4/7;}
.controls{margin:12px 0;display:flex;gap:6px;justify-content:center;flex-wrap:wrap;}
.controls button{padding:8px 14px;border-radius:6px;border:1px solid var(--border,#444);background:var(--bg-alt,#1a1f2e);color:var(--text,#eee);cursor:pointer;font-size:13px;font-weight:600;}
.controls button:hover{background:var(--accent,#5b8def);color:#fff;}
.stats{font-size:14px;color:var(--text-secondary,#aaa);margin:8px 0;}
.stats span{color:var(--accent,#5b8def);font-weight:700;}
#msg{font-size:15px;font-weight:600;margin:8px 0;min-height:24px;color:#f1c40f;}
.tool-desc{font-size:14px;color:var(--text-secondary,#aaa);}
.moves{font-size:12px;color:var(--text-secondary,#999);max-height:80px;overflow-y:auto;margin:8px auto;max-width:300px;text-align:left;}
</style>
</head>
<body>
<header id="site-header"></header>
<main>
<div class="tool-wrap">
<h1>Rubik's Cube 🟥</h1>
<p class="tool-desc">Classic 3×3 Rubik's Cube simulator. Use buttons to rotate faces, scramble, and solve.</p>
<div class="stats">Moves: <span id="moves">0</span> | <span id="solved">✅ Solved</span></div>
<div class="cube-net" id="cube"></div>
<div id="msg"></div>
<div class="controls">
<button onclick="rot('U')">U</button><button onclick="rot(\"U'\")">U'</button>
<button onclick="rot('D')">D</button><button onclick="rot(\"D'\")">D'</button>
<button onclick="rot('L')">L</button><button onclick="rot(\"L'\")">L'</button>
<button onclick="rot('R')">R</button><button onclick="rot(\"R'\")">R'</button>
<button onclick="rot('F')">F</button><button onclick="rot(\"F'\")">F'</button>
<button onclick="rot('B')">B</button><button onclick="rot(\"B'\")">B'</button>
</div>
<div class="controls">
<button onclick="scramble()">🔀 Scramble</button>
<button onclick="resetCube()">🔄 Reset</button>
<button onclick="undoMove()">⬅ Undo</button>
</div>
<div class="moves" id="move-list"></div>
</div>
</main>
<script src="/assets/app.js"></script>
<script>
let cube,history=[],moveCount=0;
const COLORS={U:'#f7f7f7',D:'#ffd500',F:'#e74c3c',B:'#ff8c00',L:'#3498db',R:'#2ecc71'};
function newCube(){return{U:Array(9).fill('U'),D:Array(9).fill('D'),F:Array(9).fill('F'),B:Array(9).fill('B'),L:Array(9).fill('L'),R:Array(9).fill('R')};}
function rotFace(face){const f=cube[face];const t=f[0];f[0]=f[6];f[6]=f[8];f[8]=f[2];f[2]=t;const t2=f[1];f[1]=f[3];f[3]=f[5];f[5]=f[7];f[7]=t2;}
function rotEdges(move){
const m=move[0];const prime=move.includes("'");
const cycles={
U:[[F,0],[F,1],[F,2],[R,0],[R,1],[R,2],[B,0],[B,1],[B,2],[L,0],[L,1],[L,2]],
D:[[F,6],[F,7],[F,8],[L,6],[L,7],[L,8],[B,6],[B,7],[B,8],[R,6],[R,7],[R,8]],
L:[[F,0],[F,3],[F,6],[D,0],[D,3],[D,6],[B,8],[B,5],[B,2],[U,0],[U,3],[U,6]],
R:[[F,2],[F,5],[F,8],[U,2],[U,5],[U,8],[B,6],[B,3],[B,0],[D,2],[D,5],[D,8]],
F:[[U,6],[U,7],[U,8],[R,0],[R,3],[R,6],[D,2],[D,1],[D,0],[L,8],[L,5],[L,2]],
B:[[U,2],[U,1],[U,0],[L,6],[L,3],[L,0],[D,8],[D,7],[D,6],[R,2],[R,5],[R,8]],
};
const c=cycles[m].map(([f,i])=>[cube[f[0]],f[1]]);
const vals=c.map(([arr,i])=>arr[i]);
if(prime){const last=vals.pop();vals.unshift(last);vals.unshift(vals.pop());}
else{const first=vals.shift();vals.push(first);vals.push(vals.shift());}
c.forEach(([arr,i],idx)=>arr[i]=vals[idx]);
}
function rot(move){history.push(JSON.stringify(cube));rotFace(move[0]);rotEdges(move);moveCount++;update();}
function undoMove(){if(history.length===0)return;cube=JSON.parse(history.pop());moveCount--;update();}
function scramble(){for(let i=0;i<20;i++){const moves=['U',"U'",'D',"D'",'L',"L'",'R',"R'",'F',"F'",'B',"B'"];rot(moves[Math.floor(Math.random()*moves.length)]);}}
function resetCube(){cube=newCube();history=[];moveCount=0;update();}
function isSolved(){return['U','D','F','B','L','R'].every(f=>cube[f].every(c=>c===cube[f][0]));}
function render(){const el=document.getElementById('cube');el.innerHTML='';const faces=[['U','pos-U'],['L','pos-L'],['F','pos-F'],['R','pos-R'],['B','pos-B'],['D','pos-D']];faces.forEach(([f,cls])=>{const faceEl=document.createElement('div');faceEl.className='face '+cls;cube[f].forEach(c=>{const s=document.createElement('div');s.className='sticker '+c;s.style.background=COLORS[c];faceEl.appendChild(s);});el.appendChild(faceEl);});}
function update(){render();document.getElementById('moves').textContent=moveCount;document.getElementById('solved').textContent=isSolved()?'✅ Solved':'❌ Not solved';}
cube=newCube();update();
</script>
</body>
</html>
