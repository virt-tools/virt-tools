<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="/assets/theme-init.js"></script>
<title>Magic 8-Ball — Virtual Tools</title>
<link rel="stylesheet" href="/assets/style.css">
<style>
.tool-wrap{max-width:500px;margin:0 auto;text-align:center;}
.eight-ball{
width:280px;height:280px;border-radius:50%;margin:30px auto;cursor:pointer;
background:radial-gradient(circle at 30% 30%,#4a4a4a,#1a1a1a 60%,#000);
box-shadow:0 10px 30px rgba(0,0,0,.5),inset -10px -10px 30px rgba(0,0,0,.5);
display:flex;align-items:center;justify-content:center;
transition:transform .3s;position:relative;user-select:none;
}
.eight-ball:hover{transform:scale(1.02);}
.eight-ball.shaking{animation:shake .5s ease-in-out;}
@keyframes shake{
0%,100%{transform:translate(0,0) rotate(0);}
10%{transform:translate(-8px,-4px) rotate(-5deg);}
20%{transform:translate(8px,4px) rotate(5deg);}
30%{transform:translate(-6px,2px) rotate(-3deg);}
40%{transform:translate(6px,-2px) rotate(3deg);}
50%{transform:translate(-4px,4px) rotate(-2deg);}
60%{transform:translate(4px,-4px) rotate(2deg);}
70%{transform:translate(-2px,2px) rotate(-1deg);}
80%{transform:translate(2px,-2px) rotate(1deg);}
90%{transform:translate(-1px,1px) rotate(0);}
}
.triangle{
width:140px;height:120px;position:relative;
}
.triangle-text{
position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
width:100px;text-align:center;color:#fff;font-size:14px;font-weight:bold;
line-height:1.3;opacity:0;transition:opacity .5s;
}
.triangle-text.show{opacity:1;}
.question-input{
width:100%;padding:12px;border-radius:8px;border:1px solid var(--border,#333);
background:var(--bg-alt,#1a1f2e);color:var(--text,#e0e0e0);font-size:16px;
margin:10px 0;box-sizing:border-box;
}
.ask-btn{padding:14px 32px;border-radius:8px;border:none;background:#1565c0;color:#fff;cursor:pointer;font-size:18px;margin:10px 0;}
.ask-btn:disabled{opacity:.5;cursor:not-allowed;}
.history{margin:20px 0;text-align:left;}
.history h3{font-size:16px;margin:10px 0;}
.history-item{padding:8px 12px;border-bottom:1px solid var(--border,#333);font-size:14px;}
.history-item .q{opacity:.6;}.history-item .a{font-weight:bold;}
.clear-btn{padding:6px 14px;border-radius:6px;border:1px solid var(--border,#333);background:var(--bg-alt);color:var(--text);cursor:pointer;font-size:12px;margin-top:10px;}
.hint{font-size:13px;opacity:.5;margin:5px 0;}
</style>
</head>
<body>
<header id="site-header"></header>
<main>
<div class="tool-wrap">
<h1>Magic 8-Ball</h1>
<p class="tool-desc">Ask the Magic 8-Ball a yes-or-no question. Click the ball or press Ask. 20 classic answers. All client-side — your questions never leave your device.</p>

<input type="text" class="question-input" id="questionInput" placeholder="Ask a yes-or-no question..." onkeypress="if(event.key==='Enter')ask()">
<button class="ask-btn" onclick="ask()" id="askBtn">Ask the Magic 8-Ball</button>
<p class="hint">Or just click the ball</p>

<div class="eight-ball" id="eightBall" onclick="ask()">
<div class="triangle">
<svg width="140" height="120" viewBox="0 0 140 120"><polygon points="70,10 130,110 10,110" fill="#1a3a5c" stroke="#1565c0" stroke-width="2"/></svg>
<div class="triangle-text" id="answerText"></div>
</div>
</div>

<div class="history" id="historyDiv" style="display:none;">
<h3>Recent Questions</h3>
<div id="historyList"></div>
<button class="clear-btn" onclick="clearHistory()">Clear History</button>
</div>
</div>
</main>
<script src="/assets/app.js"></script>
<script>
const answers=[
"It is certain","It is decidedly so","Without a doubt","Yes definitely",
"You may rely on it","As I see it, yes","Most likely","Outlook good",
"Yes","Signs point to yes","Reply hazy try again","Ask again later",
"Better not tell you now","Cannot predict now","Concentrate and ask again",
"Don't count on it","My reply is no","My sources say no",
"Outlook not so good","Very doubtful"
];
let history=JSON.parse(localStorage.getItem('m8ball_history')||'[]');
let asking=false;

function ask(){
if(asking)return;
const q=document.getElementById('questionInput').value.trim();
if(!q){document.getElementById('answerText').textContent='Ask a question first';document.getElementById('answerText').classList.add('show');return;}
asking=true;
document.getElementById('askBtn').disabled=true;
const ball=document.getElementById('eightBall');
const text=document.getElementById('answerText');
text.classList.remove('show');
text.textContent='';
ball.classList.add('shaking');
setTimeout(()=>{
const ans=answers[Math.floor(Math.random()*answers.length)];
text.textContent=ans;
ball.classList.remove('shaking');
text.classList.add('show');
history.unshift({q:q.length>60?q.slice(0,60)+'...':q,a:ans,t:new Date().toLocaleTimeString()});
if(history.length>10)history=history.slice(0,10);
localStorage.setItem('m8ball_history',JSON.stringify(history));
renderHistory();
asking=false;
document.getElementById('askBtn').disabled=false;
},600);
}

function renderHistory(){
if(history.length===0){document.getElementById('historyDiv').style.display='none';return;}
document.getElementById('historyDiv').style.display='block';
const list=document.getElementById('historyList');
list.innerHTML=history.map(h=>`<div class="history-item"><div class="q">Q: ${escapeHtml(h.q)}</div><div class="a">A: ${escapeHtml(h.a)}</div></div>`).join('');
}

function clearHistory(){history=[];localStorage.removeItem('m8ball_history');renderHistory();}

function escapeHtml(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

VT.ready(function(){renderHistory();});
</script>
</body>
</html>
