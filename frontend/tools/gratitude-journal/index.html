<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="/assets/theme-init.js"></script>
<title>Gratitude Journal — Virtual Tools</title>
<link rel="stylesheet" href="/assets/style.css">
<style>
.tool-wrap{max-width:700px;margin:0 auto;}
.tool-desc{font-size:14px;color:var(--text-secondary,#aaa);margin:8px 0 16px;}
.entry{background:var(--bg-alt,#1a1f2e);border-radius:12px;padding:20px;margin:12px 0;}
.entry-date{font-weight:bold;font-size:16px;margin-bottom:12px;color:var(--accent,#5b8def);}
.entry-row{margin:8px 0;}
.entry-label{font-size:12px;color:var(--text-secondary,#888);margin-bottom:4px;}
.entry-input{width:100%;padding:10px;border-radius:8px;border:1px solid var(--border,#444);background:var(--bg,#2a2f3e);color:var(--text,#eee);font-size:14px;font-family:inherit;resize:vertical;min-height:50px;}
.entry-input:focus{outline:none;border-color:var(--accent,#5b8def);}
.btn{padding:10px 24px;border-radius:8px;border:none;background:var(--accent,#5b8def);color:#fff;cursor:pointer;font-size:14px;}
.btn:hover{opacity:0.9;}
.btn-sm{padding:6px 14px;font-size:12px;background:var(--bg-alt,#1a1f2e);border:1px solid var(--border,#444);color:var(--text,#eee);}
.btn-sm:hover{border-color:var(--accent,#5b8def);}
.stats{display:flex;gap:16px;margin:12px 0;flex-wrap:wrap;}
.stat{background:var(--bg-alt,#1a1f2e);border-radius:10px;padding:12px 20px;text-align:center;flex:1;min-width:100px;}
.stat-val{font-size:24px;font-weight:bold;color:var(--accent,#5b8def);}
.stat-label{font-size:11px;color:var(--text-secondary,#888);text-transform:uppercase;letter-spacing:1px;}
.prompt{font-style:italic;color:var(--text-secondary,#aaa);font-size:13px;margin:8px 0;}
.past{margin-top:24px;}
.past-head{font-size:16px;font-weight:bold;margin-bottom:8px;}
.past-entry{background:var(--bg-alt,#1a1f2e);border-radius:8px;padding:14px;margin:6px 0;font-size:13px;}
.past-date{font-weight:bold;color:var(--accent,#5b8def);margin-bottom:4px;}
.past-item{color:var(--text-secondary,#ccc);margin:2px 0;}
.past-item b{color:var(--text,#eee);}
.empty{text-align:center;color:var(--text-secondary,#888);padding:30px;font-size:14px;}
.del{float:right;background:none;border:none;color:var(--text-secondary,#888);cursor:pointer;font-size:16px;}
.del:hover{color:#f44;}
</style>
</head>
<body>
<header id="site-header"></header>
<main>
<div class="tool-wrap">
<h1>Gratitude Journal 🙏</h1>
<p class="tool-desc">Write what you're grateful for each day. Three prompts daily, streak tracking, all stored locally in your browser.</p>
<div class="stats" id="stats"></div>
<div class="entry" id="todayEntry">
<div class="entry-date" id="todayDate"></div>
<div id="prompts"></div>
<button class="btn" onclick="saveToday()">Save Today's Entry</button>
</div>
<div class="past">
<div class="past-head">Past Entries</div>
<div id="pastEntries"></div>
</div>
</div>
</main>
<script src="/assets/app.js"></script>
<script>
const STORE='vt_gratitude';
const PROMPTS=[
["What made you smile today?","What's something you're looking forward to?","Who are you thankful for today?"],
["What's a small win from today?","What's beautiful around you right now?","What ability do you have that you're grateful for?"],
["What's something that went well today?","What's a kindness you received or gave?","What's your favorite memory from this week?"],
["What made today better than yesterday?","What's something you're good at?","What's a comfort you enjoy?"],
["What's a challenge you overcame?","What's something nature provides that you love?","What's a lesson you're grateful to have learned?"],
["What's something simple that brings you joy?","Who makes you feel valued?","What's a freedom you appreciate?"],
["What's the best part of your morning?","What's something tasty you enjoyed?","What's a technology that improved your life?"]
];
let entries=JSON.parse(localStorage.getItem(STORE)||'{}');
function save(){localStorage.setItem(STORE,JSON.stringify(entries));}
function todayStr(){return new Date().toISOString().slice(0,10);}
function dateStr(offset){const d=new Date();d.setDate(d.getDate()+offset);return d.toISOString().slice(0,10);}
function getStreak(){let s=0;for(let i=0;;i++){if(entries[dateStr(-i)]&&entries[dateStr(-i)].length)break;else s++;}return s;}
function getTotal(){return Object.values(entries).filter(e=>e&&e.length).length;}
function getBestStreak(){const dates=Object.keys(entries).filter(d=>entries[d]&&entries[d].length).sort();let best=0,cur=0;for(let i=0;i<dates.length;i++){if(i>0){const diff=Math.round((new Date(dates[i])-new Date(dates[i-1]))/86400000);if(diff===1)cur++;else cur=1;}else cur=1;best=Math.max(best,cur);}return best;}
function fmtDate(ds){const d=new Date(ds);return d.toLocaleDateString('en-US',{weekday:'long',year:'numeric',month:'long',day:'numeric'});}
function renderStats(){document.getElementById('stats').innerHTML=`<div class="stat"><div class="stat-val">${getStreak()}</div><div class="stat-label">Day Streak</div></div><div class="stat"><div class="stat-val">${getBestStreak()}</div><div class="stat-label">Best Streak</div></div><div class="stat"><div class="stat-val">${getTotal()}</div><div class="stat-label">Total Days</div></div>`;}
function renderToday(){const ds=todayStr();const day=new Date().getDay();const prompts=PROMPTS[day];const existing=entries[ds]||['','',''];document.getElementById('todayDate').textContent=fmtDate(ds);document.getElementById('prompts').innerHTML=prompts.map((p,i)=>`<div class="entry-row"><div class="entry-label">${p}</div><textarea class="entry-input" id="prompt${i}" placeholder="Write here...">${esc(existing[i]||'')}</textarea></div>`).join('');}
function renderPast(){const dates=Object.keys(entries).filter(d=>entries[d]&&entries[d].length).sort().reverse().slice(0,10);const c=document.getElementById('pastEntries');if(!dates.length){c.innerHTML='<div class="empty">No past entries yet. Start writing today!</div>';return;}c.innerHTML=dates.map(ds=>{const day=new Date(ds);const prompts=PROMPTS[day.getDay()];const items=entries[ds].map((a,i)=>a?`<div class="past-item"><b>${esc(prompts[i])}</b> ${esc(a)}</div>`:'').join('');return `<div class="past-entry"><div class="past-date">${fmtDate(ds)}<button class="del" onclick="delEntry('${ds}')">×</button></div>${items}</div>`;}).join('');}
function esc(s){return (s||'').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function saveToday(){const ds=todayStr();const vals=[0,1,2].map(i=>document.getElementById('prompt'+i).value.trim());entries[ds]=vals;save();renderStats();renderPast();alert('Saved! Come back tomorrow. 🙏');}
function delEntry(ds){if(confirm('Delete this entry?')){delete entries[ds];save();renderStats();renderPast();}}
renderStats();renderToday();renderPast();
</script>
</body>
</html>
