<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CSS Holographic Card Generator — virt.tools</title>
<link rel="stylesheet" href="/assets/style.css">
<style>
.tool-area{max-width:900px;margin:2rem auto;padding:0 1rem}
.controls{display:grid;gap:1rem;margin:1.5rem 0;padding:1.5rem;background:#1a1a2e;border-radius:12px}
.ctrl-row{display:flex;gap:1rem;align-items:center;flex-wrap:wrap;margin-bottom:.5rem}
.ctrl-row label{font-weight:600;font-size:.9rem;min-width:100px}
.ctrl-row select,.ctrl-row input{padding:.5rem;border-radius:8px;border:1px solid #444;background:#0f0f1e;color:#eee}
.preview-box{margin:1.5rem 0;border-radius:12px;min-height:300px;border:1px solid #333;display:flex;align-items:center;justify-content:center;padding:2rem}
.holo-card{width:280px;height:180px;border-radius:16px;position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:1.5rem;font-weight:700;color:#fff;text-shadow:0 2px 10px rgba(0,0,0,.5)}
.output-block{margin:2rem 0}
.output-block textarea{width:100%;min-height:80px;font-family:monospace;font-size:.85rem;padding:1rem;border-radius:8px;border:1px solid #444;background:#0f0f1e;color:#eee;resize:vertical}
.copy-btn{padding:.6rem 1.2rem;border:none;border-radius:8px;background:#667eea;color:#fff;cursor:pointer;font-size:.9rem;margin-top:.5rem}
h2{margin-top:2rem;font-size:1.2rem}
</style>
</head>
<body>
<header id="site-header"></header>
<main>
<div class="tool-area">
<h1>🪞 CSS Holographic Card Generator</h1>
<p>Create CSS holographic/iridescent card effects with conic-gradient shimmer. 4 presets, adjustable angle/speed. Copy HTML+CSS.</p>
<div class="controls">
<div class="ctrl-row">
<label>Card Text</label><input type="text" id="cardText" value="HOLOGRAM" style="width:200px">
<label>Radius</label><select id="radius"><option value="8">8px</option><option value="16" selected>16px</option><option value="24">24px</option><option value="32">32px</option></select>
</div>
<div class="ctrl-row">
<label>Preset</label>
<select id="preset"><option value="rainbow">Rainbow</option><option value="aurora">Aurora</option><option value="neon">Neon</option><option value="pastel">Pastel</option></select>
<label>Animated</label><select id="animated"><option value="yes" selected>Yes</option><option value="no">No</option></select>
<label>Speed</label><select id="speed"><option value="3">3s</option><option value="5" selected>5s</option><option value="8">8s</option><option value="12">12s</option></select>
</div>
<div class="ctrl-row"><button class="copy-btn" onclick="update()">Update</button></div>
</div>
<h2>Preview</h2>
<div class="preview-box" id="preview"></div>
<h2>HTML</h2><div class="output-block"><textarea id="htmlOut" readonly></textarea><button class="copy-btn" onclick="copyText('htmlOut')">Copy HTML</button></div>
<h2>CSS</h2><div class="output-block"><textarea id="cssOut" readonly></textarea><button class="copy-btn" onclick="copyText('cssOut')">Copy CSS</button></div>
</div>
</main>
<script src="/assets/app.js"></script>
<script>
var presets={rainbow:'conic-gradient(from 0deg, #ff006e,#fb5607,#ffbe0b,#8338ec,#3a86ff,#ff006e)',aurora:'conic-gradient(from 180deg, #06ffa5,#00b4d8,#7209b7,#f72585,#06ffa5)',neon:'conic-gradient(from 90deg, #00f5ff,#ff00ff,#00ff7f,#ff006e,#00f5ff)',pastel:'conic-gradient(from 45deg, #f0a6ca,#b8d8be,#f7e1b5,#a6c8e0,#f0a6ca)'};
function update(){
var text=document.getElementById('cardText').value||'HOLOGRAM';
var r=document.getElementById('radius').value;
var p=document.getElementById('preset').value;
var an=document.getElementById('animated').value;
var sp=document.getElementById('speed').value;
var grad=presets[p];
var animCSS=an==='yes'?'animation:holoRotate '+sp+'s linear infinite;':'';
var css='.holo-card{width:280px;height:180px;border-radius:'+r+'px;position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:1.5rem;font-weight:700;color:#fff;text-shadow:0 2px 10px rgba(0,0,0,.5);background:'+grad+';'+animCSS+'box-shadow:0 8px 32px rgba(0,0,0,.3),inset 0 0 60px rgba(255,255,255,.1)}\n.holo-card::after{content:"";position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,.3) 0%,transparent 40%,transparent 60%,rgba(255,255,255,.2) 100%);pointer-events:none}';
if(an==='yes')css+='@keyframes holoRotate{0%{filter:hue-rotate(0deg)}100%{filter:hue-rotate(360deg)}}';
var html='<div class="holo-card">'+text+'</div>';
document.getElementById('htmlOut').value=html;
document.getElementById('cssOut').value=css;
document.getElementById('preview').innerHTML='<style>'+css+'</style>'+html;
}
function copyText(id){var t=document.getElementById(id);t.select();document.execCommand('copy')}
['cardText','radius','preset','animated','speed'].forEach(function(id){document.getElementById(id).addEventListener('input',update);document.getElementById(id).addEventListener('change',update)});
update();
</script>
</body>
</html>
