<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <script src="/assets/theme-init.js"></script>
  <title>Emoji String Generator — Virtual Tools</title>
  <link rel="stylesheet" href="/assets/style.css">
</head>
<body>
  <div id="site-header"></div>
  <main>
    <div class="tool-header">
      <a class="back" href="/">← All tools</a>
      <h1>Emoji String Generator</h1>
      <p>Generate a string of a given length made entirely of random emojis. Pick which emoji families to draw from — everything happens locally in your browser.</p>
    </div>

    <div class="panel">
      <div class="row" style="align-items:flex-end;">
        <div class="field" style="flex:0 0 120px;">
          <label for="count">Length (emojis)</label>
          <input type="number" id="count" value="10" min="1" max="1000">
        </div>
        <label class="check" style="margin-bottom:14px;"><input type="checkbox" id="unique"> No repeats</label>
      </div>

      <div class="spacer"></div>
      <label>Emoji families</label>
      <div class="row" id="families" style="align-items:center;">
        <label class="check"><input type="checkbox" data-fam="faces" checked> 😀 Faces</label>
        <label class="check"><input type="checkbox" data-fam="animals" checked> 🐱 Animals</label>
        <label class="check"><input type="checkbox" data-fam="food" checked> 🍕 Food</label>
        <label class="check"><input type="checkbox" data-fam="activity" checked> ⚽ Activity</label>
        <label class="check"><input type="checkbox" data-fam="travel" checked> 🚗 Travel</label>
        <label class="check"><input type="checkbox" data-fam="objects" checked> 💡 Objects</label>
        <label class="check"><input type="checkbox" data-fam="hearts" checked> ❤️ Hearts</label>
        <label class="check"><input type="checkbox" data-fam="symbols" checked> ✅ Symbols</label>
      </div>

      <div class="spacer"></div>
      <button id="generate">Generate</button>
      <button id="copy" class="secondary">Copy</button>
      <span class="note" id="status" style="margin:0;"></span>

      <div class="spacer"></div>
      <div id="err" class="note" style="color:var(--bad);"></div>

      <label for="out">Result</label>
      <div class="output" id="out" style="white-space:pre-wrap; word-break:break-all; font-size:1.2rem;"></div>
      <p class="note" id="countnote">Generated locally — no network requests.</p>
    </div>
  </main>

  <script src="/assets/app.js"></script>
  <script>
  (function () {
    var FAMILIES = {
      faces:    "😀😃😄😁😆😅🤣😂🙂🙃😉😊😇🥰😍🤩😘😋😛😜🤪😝🤗🤭🤫🤔😐😑😶🙄😏😬🥱😴🤯🥵🥶😱😨😰😥😓😒🙄",
      animals:  "🐶🐱🐭🐹🐰🦊🐻🐼🐨🐯🦁🐮🐷🐸🐵🐔🐧🐦🐤🦆🦅🦉🦇🐺🐴🦄🐝🦋🐌🐞🐜🦗🕷️🐢🐍🦎🐙🦑🦐🦀🐠🐟🐬🐳🐋🦈🐊🐅🐆🦓🦍🐘🦏🐪🦒🦘🐎🐖🐏🐑🐐🐕🐩🐈🐓🦃🦚🦜🕊️🐇",
      food:     "🍎🍏🍐🍊🍋🍌🍉🍇🍓🍈🍒🍑🥭🍍🥥🥝🍅🥑🥦🥒🌽🥕🥔🥐🍞🧀🥚🍳🥞🧇🥓🍔🍟🍕🥪🌮🌯🥗🍝🍜🍲🍛🍣🍱🍙🍚🍥🍦🍧🍨🍰🎂🍭🍬🍫🍿🍩🍪🌰🍯🥛☕🍵🧃🥤🍺🍻🍷",
      activity: "⚽🏀🏈⚾🎾🏐🏉🎱🏓🏸🏒🏑🥍🏏🥅⛳🏹🎣🥊🥋🎽🛹⛸️🎿🏂🏆🥇🥈🥉🏅🎖️🎫🎪🎨🎭🎤🎧🎼🎹🥁🎷🎺🎸🎻🎲♟️🎯🎳🎮🎰🧩",
      travel:   "🚗🚕🚙🚌🏎️🚓🚑🚒🚐🚚🛻🚲🛵🏍️🚨🚔🚠🚡🚃🚋🚞🚝🚄🚅🚈🚂🚆🚇🚊✈️🛫🛬🛩️💺🚀🛸🚁⛵🚤🛳️⛴️🚢⚓⛽🚏🚦🗺️🗽🗼🏰🏯🏟️🎡🎢🎠⛲🏖️🏝️🌋⛰️🏔️🏕️⛺🏠🏡🏘️🏢🏬🏣🏤🏥🏦🏨🏪🏫🏛️⛪🕌⛩️",
      objects:  "⌚📱📲💻⌨️🖥️🖨️🖱️🕹️💾💿📷📸📹📞☎️📺📻⏰⌛⏳🔋🔌💡🔦🕯️💸💵💴💶💷💰💳💎🔧🔨⚒️🛠️⛏️🔩⚙️🧲🔫💣🗡️⚔️🛡️🚬⚰️🏺🔮📿💈⚗️🔭🔬🕳️💉💊🧬🦠🧪🌡️🧹🧺🧻",
      hearts:   "❤️🧡💛💚💙💜🖤🤍🤎💔❣️💕💞💓💗💖💘💝💟♥️",
      symbols:  "♻️✅❌❎✳️❇️⚠️🚸🔱📛⭕💯💢💥💫💦💨🎉🎊🎈🎏🎀🎁🎗️🎟️🎫🎖️🏆🏅"
    };

    var countEl = document.getElementById("count");
    var unique = document.getElementById("unique");
    var checkboxes = document.querySelectorAll("#families input[data-fam]");
    var out = document.getElementById("out");
    var err = document.getElementById("err");
    var status = document.getElementById("status");
    var countnote = document.getElementById("countnote");
    var last = "";

    function rand(n) {
      if (window.crypto && crypto.getRandomValues) {
        var a = new Uint32Array(1);
        crypto.getRandomValues(a);
        return a[0] % n;
      }
      return Math.floor(Math.random() * n);
    }

    // Split a string of emojis into an array of individual grapheme clusters,
    // so multi-byte / variation-selector emojis are each one element.
    function splitEmojis(str) {
      if (window.Intl && Intl.Segmenter) {
        var seg = new Intl.Segmenter([], { granularity: "grapheme" });
        var arr = [];
        var iter = seg.segment(str)[Symbol.iterator]();
        var step;
        while (!(step = iter.next()).done) arr.push(step.value.segment);
        return arr;
      }
      return Array.from(str);
    }

    function graphemeCount(str) {
      if (window.Intl && Intl.Segmenter) {
        var seg = new Intl.Segmenter([], { granularity: "grapheme" });
        var n = 0, iter = seg.segment(str)[Symbol.iterator](), step;
        while (!(step = iter.next()).done) n++;
        return n;
      }
      return Array.from(str).length;
    }

    function pool() {
      var arr = [];
      var any = false;
      checkboxes.forEach(function (cb) {
        if (cb.checked) { any = true; arr = arr.concat(splitEmojis(FAMILIES[cb.getAttribute("data-fam")])); }
      });
      return any ? arr : null;
    }

    function generate() {
      err.textContent = "";
      status.textContent = "";
      var n = parseInt(countEl.value, 10);
      if (!n || n < 1) { err.textContent = "Enter a whole number ≥ 1."; out.textContent = ""; return; }
      if (n > 1000) { err.textContent = "Length must be 1000 or fewer."; out.textContent = ""; return; }

      var p = pool();
      if (!p) { err.textContent = "Select at least one emoji family."; out.textContent = ""; return; }

      if (unique.checked && n > p.length) {
        err.textContent = "“No repeats” needs at least " + n + " distinct emojis in the pool, but only " + p.length + " are selected. Uncheck “No repeats” or select more families.";
        out.textContent = "";
        return;
      }

      var chosen = [];
      var available = p.slice();
      for (var i = 0; i < n; i++) {
        if (unique.checked) {
          var idx = rand(available.length);
          chosen.push(available.splice(idx, 1)[0]);
        } else {
          chosen.push(p[rand(p.length)]);
        }
      }
      last = chosen.join("");
      out.textContent = last;
      var gc = graphemeCount(last);
      status.textContent = "Done";
      countnote.textContent = gc + (gc === 1 ? " emoji" : " emojis") + " — generated locally, no network requests.";
    }

    document.getElementById("generate").addEventListener("click", generate);
    countEl.addEventListener("input", generate);
    checkboxes.forEach(function (cb) { cb.addEventListener("change", generate); });
    unique.addEventListener("change", generate);

    document.getElementById("copy").addEventListener("click", function () {
      if (!last) return;
      var btn = this;
      if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(last).then(function () {
          btn.textContent = "Copied!"; setTimeout(function () { btn.textContent = "Copy"; }, 1200);
        });
      } else {
        var ta = document.createElement("textarea");
        ta.value = last; document.body.appendChild(ta); ta.select();
        try { document.execCommand("copy"); btn.textContent = "Copied!"; setTimeout(function () { btn.textContent = "Copy"; }, 1200); }
        catch (e) {}
        ta.remove();
      }
    });

    generate();
  })();
  </script>
</body>
</html>
