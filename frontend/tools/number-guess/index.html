<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="/assets/theme-init.js"></script>
<title>Number Guessing Game — Virtual Tools</title>
<link rel="stylesheet" href="/assets/style.css">
<style>
.tool-wrap{max-width:500px;margin:0 auto;text-align:center;}
.guess-area{background:var(--bg-alt,#1a1f2e);border:1px solid var(--border,#333);border-radius:12px;padding:25px;margin:20px 0;}
.range-display{font-size:14px;color:var(--text-dim,#888);margin-bottom:15px;}
.guess-input{font-size:24px;text-align:center;width:120px;padding:8px;border:2px solid var(--border,#333);border-radius:8px;background:var(--bg,#0f1219);color:var(--text,#e0e0e0);margin:10px;}
.guess-input:focus{border-color:#e65100;outline:none;}
.guess-btn{padding:12px 30px;border-radius:8px;border:none;background:#e65100;color:#fff;font-size:18px;font-weight:700;cursor:pointer;}
.guess-btn:hover{background:#bf360c;}
.guess-btn:active{transform:scale(.97);}
.feedback{font-size:20px;font-weight:700;margin:15px 0;min-height:28px;}
.feedback.higher{color:#4caf50;}
.feedback.lower{color:#ff9800;}
.feedback.correct{color:#4caf50;}
.feedback.wrong{color:#f44336;}
.stats{display:flex;justify-content:space-around;margin:15px 0;}
.stat-item{text-align:center;}
.stat-item .label{font-size:12px;color:var(--text-dim,#888);display:block;}
.stat-item .val{font-size:24px;font-weight:700;color:var(--text,#e0e0e0);}
.diff-btns{display:flex;gap:8px;justify-content:center;margin:10px 0;}
.diff-btn{padding:8px 20px;border-radius:8px;border:1px solid var(--border,#333);background:transparent;color:var(--text,#e0e0e0);cursor:pointer;font-size:14px;}
.diff-btn.active{background:rgba(230,81,0,.2);border-color:#e65100;color:#e65100;}
.history-box{text-align:left;margin:15px 0;}
.history-box h4{font-size:13px;color:var(--text-dim,#888);margin-bottom:8px;}
.guess-history{display:flex;flex-wrap:wrap;gap:6px;}
.hist-chip{padding:4px 12px;border-radius:20px;font-size:13px;background:var(--bg-alt,#1a1f2e);border:1px solid var(--border,#333);}
.hist-chip.higher{border-color:#4caf50;color:#4caf50;}
.hist-chip.lower{border-color:#ff9800;color:#ff9800;}
.hist-chip.correct{border-color:#4caf50;background:rgba(76,175,80,.15);color:#4caf50;font-weight:700;}
.reset-btn{padding:10px 20px;border-radius:8px;border:1px solid var(--border,#333);background:transparent;color:var(--text,#e0e0e0);cursor:pointer;font-size:14px;margin:10px;}
</style>
</head>
<body>
<header id="site-header"></header>
<main>
<div class="tool-wrap">
<h1>Number Guessing Game 🔢</h1>
<p class="tool-desc">Guess the secret number! Pick a difficulty, get hints (higher/lower), and try to find it in as few attempts as possible. Fully client-side.</p>

<div class="diff-btns">
<button class="diff-btn active" onclick="setDifficulty('easy')">Easy (1-50, 10 tries)</button>
<button class="diff-btn" onclick="setDifficulty('medium')">Medium (1-100, 7 tries)</button>
<button class="diff-btn" onclick="setDifficulty('hard')">Hard (1-500, 10 tries)</button>
</div>

<div class="guess-area">
<div class="range-display" id="rangeDisplay">I'm thinking of a number between 1 and 50</div>
<div class="feedback" id="feedback">Make your first guess!</div>
<input type="number" class="guess-input" id="guessInput" min="1" max="50" placeholder="?" onkeydown="if(event.key==='Enter')makeGuess()">
<button class="guess-btn" onclick="makeGuess()">Guess!</button>
<div class="stats">
<div class="stat-item"><span class="label">Attempts</span><span class="val" id="attempts">0</span></div>
<div class="stat-item"><span class="label">Remaining</span><span class="val" id="remaining">10</span></div>
<div class="stat-item"><span class="label">Best Score</span><span class="val" id="bestScore">—</span></div>
</div>
</div>

<div class="history-box">
<h4>Your guesses</h4>
<div class="guess-history" id="guessHistory"></div>
</div>

<button class="reset-btn" onclick="newGame()">New Game</button>
</div>
</main>
<script src="/assets/app.js"></script>
<script>
const DIFFS={easy:{min:1,max:50,tries:10},medium:{min:1,max:100,tries:7},hard:{min:1,max:500,tries:10}};
let diff='easy',target,attempts,remaining,gameOver,history=[];
function cryptoRandom(max){const a=new Uint32Array(1);crypto.getRandomValues(a);return a[0]%max;}
function setDifficulty(d){diff=d;document.querySelectorAll('.diff-btn').forEach((b,i)=>b.classList.toggle('active',['easy','medium','hard'][i]===d));newGame();}
function newGame(){
const cfg=DIFFS[diff];target=cryptoRandom(cfg.max-cfg.min+1)+cfg.min;attempts=0;remaining=cfg.tries;gameOver=false;history=[];
document.getElementById('rangeDisplay').textContent=`I'm thinking of a number between ${cfg.min} and ${cfg.max}`;
document.getElementById('feedback').textContent='Make your first guess!';
document.getElementById('feedback').className='feedback';
document.getElementById('attempts').textContent='0';
document.getElementById('remaining').textContent=cfg.tries;
document.getElementById('guessInput').value='';document.getElementById('guessInput').max=cfg.max;document.getElementById('guessInput').disabled=false;
document.getElementById('guessHistory').innerHTML='';
const best=localStorage.getItem('numguess_best_'+diff);
document.getElementById('bestScore').textContent=best||'—';
document.getElementById('guessInput').focus();
}
function makeGuess(){
if(gameOver)return;
const cfg=DIFFS[diff];const val=parseInt(document.getElementById('guessInput').value);
if(!val||val<cfg.min||val>cfg.max){document.getElementById('feedback').textContent='Enter a valid number!';document.getElementById('feedback').className='feedback wrong';return;}
attempts++;remaining--;
let cls,txt,chipCls;
if(val===target){cls='correct';txt=`🎉 Correct! You got it in ${attempts} ${attempts===1?'try':'tries'}!`;chipCls='correct';gameOver=true;
const best=localStorage.getItem('numguess_best_'+diff);if(!best||attempts<parseInt(best)){localStorage.setItem('numguess_best_'+diff,attempts);document.getElementById('bestScore').textContent=attempts;}
document.getElementById('guessInput').disabled=true;}
else if(val<target){cls='higher';txt='📈 Go higher!';chipCls='higher';}
else{cls='lower';txt='📉 Go lower!';chipCls='lower';}
if(remaining===0&&!gameOver){txt=`Game over! The number was ${target}.`;cls='wrong';chipCls='wrong';gameOver=true;document.getElementById('guessInput').disabled=true;}
document.getElementById('feedback').textContent=txt;document.getElementById('feedback').className='feedback '+cls;
document.getElementById('attempts').textContent=attempts;document.getElementById('remaining').textContent=remaining;
history.push({val,cls:chipCls});const h=document.getElementById('guessHistory');h.innerHTML='';
history.forEach(g=>{const c=document.createElement('span');c.className='hist-chip '+g.cls;c.textContent=g.val;h.appendChild(c);});
document.getElementById('guessInput').value='';if(!gameOver)document.getElementById('guessInput').focus();
}
newGame();
</script>
</body>
</html>
