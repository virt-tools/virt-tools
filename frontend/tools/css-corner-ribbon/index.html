<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CSS Corner Ribbon Generator — virt.tools</title>
<link rel="stylesheet" href="/assets/style.css">
<style>
.tool-area{max-width:900px;margin:2rem auto;padding:0 1rem}
.controls{display:grid;gap:1rem;margin:1.5rem 0;padding:1.5rem;background:#1a1a2e;border-radius:12px}
.control-row{display:flex;gap:1rem;align-items:center;flex-wrap:wrap}
.control-row label{min-width:100px;font-weight:600;font-size:.9rem}
.control-row select,.control-row input{padding:.5rem .75rem;border-radius:8px;border:1px solid #444;background:#0f0f1e;color:#eee;font-size:.9rem}
.preview-box{margin:1.5rem 0;border-radius:12px;background:#2a2a3e;padding:1.5rem;min-height:200px;display:flex;justify-content:center;align-items:center}
.card-demo{width:300px;height:180px;background:#f0f0f5;border-radius:12px;position:relative;overflow:hidden}
.output-block{margin:2rem 0}
.output-block textarea{width:100%;min-height:120px;font-family:monospace;font-size:.85rem;padding:1rem;border-radius:8px;border:1px solid #444;background:#0f0f1e;color:#eee;resize:vertical}
.copy-btn{padding:.6rem 1.2rem;border:none;border-radius:8px;background:#667eea;color:#fff;cursor:pointer;font-size:.9rem;margin-top:.5rem}
h2{margin-top:2rem;font-size:1.2rem}
</style>
</head>
<body>
<header id="site-header"></header>
<main>
<div class="tool-area">
<h1>🎀 CSS Corner Ribbon Generator</h1>
<p>Create CSS corner ribbon/banner overlays for cards. 4 corners, 4 styles, custom text/colors. Copy HTML+CSS.</p>
<div class="controls">
<div class="control-row">
<label>Corner</label><select id="corner"><option value="tl" selected>Top Left</option><option value="tr">Top Right</option><option value="bl">Bottom Left</option><option value="br">Bottom Right</option></select>
<label>Style</label><select id="style"><option value="solid" selected>Solid</option><option value="gradient">Gradient</option><option value="outline">Outline</option><option value="fold">Fold</option></select>
<label>Color</label><input type="color" id="color" value="#ef4444">
</div>
<div class="control-row">
<label>Text</label><input type="text" id="text" value="SALE" style="width:100px">
<label>Width</label><input type="number" id="width" value="150" min="80" max="250" style="width:60px">px
</div>
</div>
<h2>Preview</h2>
<div class="preview-box"><div class="card-demo" id="preview"></div></div>
<h2>HTML</h2><div class="output-block"><textarea id="htmlOut" readonly></textarea><button class="copy-btn" onclick="copyText('htmlOut')">Copy HTML</button></div>
<h2>CSS</h2><div class="output-block"><textarea id="cssOut" readonly></textarea><button class="copy-btn" onclick="copyText('cssOut')">Copy CSS</button></div>
</div>
</main>
<script src="/assets/app.js"></script>
<script>
function update(){
var corner=document.getElementById('corner').value,style=document.getElementById('style').value;
var color=document.getElementById('color').value,text=document.getElementById('text').value;
var w=document.getElementById('width').value;
var html='<div class="ribbon-card">\n  <div class="corner-ribbon">'+text+'</div>\n</div>';
var css='.ribbon-card{position:relative;width:300px;height:180px;border-radius:12px;overflow:hidden;background:#f0f0f5}\n';
css+='.corner-ribbon{position:absolute;width:'+w+'px;text-align:center;font-size:12px;font-weight:700;color:#fff;padding:4px 0;';
if(style==='outline')css+='border:2px solid '+color+';color:'+color+';background:transparent';
else if(style==='gradient')css+='background:linear-gradient(135deg,'+color+','+color+'88)';
else if(style==='fold')css+='background:'+color+';box-shadow:0 2px 6px rgba(0,0,0,.2)';
else css+='background:'+color;
var rot,corners;
if(corner==='tl'){rot='rotate(-45deg)';corners='top:-10px;left:-30px'}
else if(corner==='tr'){rot='rotate(45deg)';corners='top:-10px;right:-30px'}
else if(corner==='bl'){rot='rotate(45deg)';corners='bottom:-10px;left:-30px'}
else{rot='rotate(-45deg)';corners='bottom:-10px;right:-30px'}
css+=';transform:'+rot+';'+corners.replace(';',';')+'}\n';
document.getElementById('htmlOut').value=html;
document.getElementById('cssOut').value=css;
var p=document.getElementById('preview');
p.innerHTML='<style>'+css+'<\/style>'+html;
}
function copyText(id){var t=document.getElementById(id);t.select();document.execCommand('copy')}
document.querySelectorAll('select,input').forEach(function(e){e.addEventListener('input',update);e.addEventListener('change',update)});
update();
</script>
</body>
</html>
