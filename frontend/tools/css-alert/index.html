<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="/assets/theme-init.js"></script>
<title>CSS Alert Generator — Virtual Tools</title>
<link rel="stylesheet" href="/assets/style.css">
<style>
.tool-wrap{max-width:800px;margin:0 auto;}
.tool-desc{font-size:14px;color:var(--text-secondary,#aaa);margin:8px 0 20px;}
.controls{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin:12px 0;}
.ctrl{display:flex;flex-direction:column;gap:4px;}
.ctrl label{font-size:12px;color:var(--text-secondary,#888);}
.ctrl input,.ctrl select,.ctrl textarea{padding:6px 8px;border-radius:6px;border:1px solid var(--border,#444);background:var(--bg,#1e2230);color:var(--text,#eee);font-size:13px;}
.ctrl input[type="color"]{padding:2px;height:34px;}
.ctrl textarea{resize:vertical;min-height:40px;}
button.action{padding:8px 16px;border-radius:6px;border:1px solid var(--border,#444);background:var(--card,#2a2f3e);color:var(--text,#eee);cursor:pointer;font-size:13px;margin:4px 4px 0 0;}
.preview{background:var(--bg,#1e2230);border:1px solid var(--border,#444);border-radius:8px;padding:24px;margin:12px 0;}
.code-block{background:var(--bg,#1e2230);border:1px solid var(--border,#444);border-radius:8px;padding:12px;margin:8px 0;font-family:monospace;font-size:11px;color:var(--text,#eee);white-space:pre-wrap;word-break:break-all;max-height:400px;overflow:auto;}
</style>
</head>
<body>
<header id="site-header"></header>
<main>
<div class="tool-wrap">
<h1>🔔 CSS Alert Generator</h1>
<p class="tool-desc">Create CSS alert/notification banners with 4 types (success, warning, error, info), icons, dismiss button, and animations. Copy HTML+CSS.</p>
<div class="controls">
<div class="ctrl"><label>Type</label><select id="ty" onchange="render()"><option value="success">Success</option><option value="warning">Warning</option><option value="error">Error</option><option value="info" selected>Info</option></select></div>
<div class="ctrl"><label>Style</label><select id="st" onchange="render()"><option value="0" selected>Solid</option><option value="1">Outline</option><option value="2">Gradient</option></select></div>
<div class="ctrl"><label>Radius</label><input type="range" id="ra" min="0" max="20" value="8" oninput="render()"></div>
<div class="ctrl"><label>Animation</label><select id="an" onchange="render()"><option value="0">None</option><option value="1" selected>Slide-in</option><option value="2">Fade-in</option><option value="3">Pulse</option></select></div>
<div class="ctrl"><label>Dismiss</label><select id="di" onchange="render()"><option value="0">No</option><option value="1" selected>Yes</option></select></div>
<div class="ctrl" style="grid-column:1/-1"><label>Message</label><textarea id="msg" rows="2" oninput="render()">This is an informational message for your users.</textarea></div>
</div>
<div class="preview" id="prev"></div>
<div style="margin:8px 0;"><button class="action" onclick="copyCode()">Copy HTML+CSS</button></div>
<div class="code-block" id="code"></div>
</div>
</main>
<script src="/assets/app.js"></script>
<script>
let codeText='';
const TYPES={success:{icon:'✓',bg:'#d4edda',bd:'#28a745',tx:'#155724',gd:'linear-gradient(135deg,#d4edda,#b8e6c0)'},warning:{icon:'⚠',bg:'#fff3cd',bd:'#ffc107',tx:'#856404',gd:'linear-gradient(135deg,#fff3cd,#ffe6a8)'},error:{icon:'✕',bg:'#f8d7da',bd:'#dc3545',tx:'#721c24',gd:'linear-gradient(135deg,#f8d7da,#f0a8b0)'},info:{icon:'ℹ',bg:'#d1ecf1',bd:'#17a2b8',tx:'#0c5460',gd:'linear-gradient(135deg,#d1ecf1,#a8e0ea)'}};
function render(){
const ty=v('ty'),st=parseInt(v('st')),ra=v('ra'),an=parseInt(v('an')),di=parseInt(v('di')),msg=v('msg');
const t=TYPES[ty];
const bg=st===2?t.gd:t.bg;
const bd=t.bd,tx=t.tx;
const borderCSS=st===1?`background:transparent;border:2px solid ${bd};color:${bd}`:`background:${bg};border:1px solid ${bd};color:${tx}`;
const animCSS=an===1?'@keyframes alertSlide{from{opacity:0;transform:translateY(-10px)}to{opacity:1;transform:translateY(0)}}.alert{animation:alertSlide .3s ease}':an===2?'@keyframes alertFade{from{opacity:0}to{opacity:1}}.alert{animation:alertFade .4s ease}':an===3?`@keyframes alertPulse{0%,100%{box-shadow:0 0 0 0 ${bd}55}50%{box-shadow:0 0 0 8px ${bd}00}}.alert{animation:alertPulse 1.5s ease infinite}`':'';
const dismiss=di?`<button class="alert-dismiss" onclick="this.parentElement.style.display='none'">✕</button>`:'';
const html=`<div class="alert alert-${ty}">
  <span class="alert-icon">${t.icon}</span>
  <span class="alert-msg">${msg}</span>
  ${dismiss}
</div>`;
const css=`.alert{display:flex;align-items:center;gap:8px;padding:12px 16px;border-radius:${ra}px;${borderCSS};font-size:14px;font-family:sans-serif;margin:8px 0;position:relative}
.alert-icon{font-size:18px;font-weight:bold}
.alert-msg{flex:1}
.alert-dismiss{background:none;border:none;font-size:16px;cursor:pointer;color:inherit;opacity:.6;padding:0 4px}
.alert-dismiss:hover{opacity:1}${animCSS?'\n'+animCSS:''}`;
document.getElementById('prev').innerHTML=`<style>${css}</style>${html}`;
codeText=`<!-- HTML -->\n${html}\n\n<!-- CSS -->\n<style>\n${css}\n</style>`;
document.getElementById('code').textContent=codeText;
}
function v(id){return document.getElementById(id).value;}
function copyCode(){navigator.clipboard.writeText(codeText).then(()=>alert('Code copied!')).catch(()=>alert('Copy failed'));}
render();
</script>
</body>
</html>
