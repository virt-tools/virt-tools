<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="/assets/theme-init.js"></script>
<title>Pong — Virtual Tools</title>
<link rel="stylesheet" href="/assets/style.css">
<style>
.tool-wrap{max-width:600px;margin:0 auto;text-align:center;}
canvas{border:1px solid var(--border,#2a2f3a);border-radius:8px;background:#0a0d12;display:block;margin:16px auto;touch-action:none;}
#score{font-size:24px;font-weight:700;margin:8px 0;letter-spacing:8px;}
#msg{font-size:14px;opacity:.6;margin:4px 0;min-height:20px;}
.mode-btns{display:flex;gap:8px;justify-content:center;margin:8px 0;}
.mode-btns button{border:1px solid var(--border,#2a2f3a);border-radius:8px;padding:8px 16px;cursor:pointer;background:var(--bg-panel,#11151c);color:var(--text);font-size:14px;}
.mode-btns button.active{border-color:var(--accent,#6ea8fe);color:var(--accent,#6ea8fe);}
.tool-desc{opacity:.7;font-size:14px;margin-bottom:8px;}
</style>
</head>
<body>
<header id="site-header"></header>
<main>
<div class="tool-wrap">
<h1>Pong</h1>
<p class="tool-desc">Classic arcade Pong. Play against AI or a friend. Player 1: W/S. Player 2: ↑/↓ or mouse. First to 7 wins. Fully client-side.</p>
<div class="mode-btns">
<button class="active" id="ai-btn" onclick="setMode('ai')">vs AI</button>
<button id="pvp-btn" onclick="setMode('pvp')">2 Players</button>
</div>
<div id="score">0 : 0</div>
<div id="msg">Press Space to start</div>
<canvas id="c" width="600" height="400"></canvas>
</div>
</main>
<script src="/assets/app.js"></script>
<script>
const cv=document.getElementById('c'),ctx=cv.getContext('2d');
const W=600,H=400,PW=10,PH=80,BS=8;
let mode='ai',running=false,paused=false;
let p1={y:H/2-PH/2,s:0},p2={y:H/2-PH/2,s:0};
let ball={x:W/2,y:H/2,vx:4,vy:3};
let s1=0,s2=0,animId=null;

function setMode(m){mode=m;document.getElementById('ai-btn').classList.toggle('active',m==='ai');document.getElementById('pvp-btn').classList.toggle('active',m==='pvp');reset();}

function reset(){
  s1=0;s2=0;p1.y=H/2-PH/2;p2.y=H/2-PH/2;
  ball={x:W/2,y:H/2,vx:Math.random()>.5?4:-4,vy:(Math.random()*4-2)};
  running=false;paused=false;updateScore();
  document.getElementById('msg').textContent='Press Space to start';
  draw();
}

function updateScore(){document.getElementById('score').textContent=s1+' : '+s2;}

function update(){
  if(!running||paused)return;
  p1.y+=p1.s;p2.y+=p2.s;
  p1.y=Math.max(0,Math.min(H-PH,p1.y));
  p2.y=Math.max(0,Math.min(H-PH,p2.y));
  if(mode==='ai'){
    const target=ball.y-PH/2;
    if(p2.y<target)p2.y+=Math.min(4,target-p2.y);
    else if(p2.y>target)p2.y-=Math.min(4,p2.y-target);
  }
  ball.x+=ball.vx;ball.y+=ball.vy;
  if(ball.y<=0||ball.y>=H-BS)ball.vy=-ball.vy;
  if(ball.x<=PW&&ball.y>=p1.y&&ball.y<=p1.y+PH){ball.vx=Math.abs(ball.vx)*1.05;ball.vy+=(ball.y-(p1.y+PH/2))*0.1;}
  if(ball.x>=W-PW-BS&&ball.y>=p2.y&&ball.y<=p2.y+PH){ball.vx=-Math.abs(ball.vx)*1.05;ball.vy+=(ball.y-(p2.y+PH/2))*0.1;}
  if(ball.x<0){s2++;updateScore();serve(1);checkWin();}
  else if(ball.x>W){s1++;updateScore();serve(-1);checkWin();}
}

function serve(dir){
  ball={x:W/2,y:H/2,vx:dir*4,vy:Math.random()*4-2};
}

function checkWin(){
  if(s1>=7||s2>=7){
    running=false;
    document.getElementById('msg').textContent=(s1>=7?'Player 1':'Player 2')+' wins! Press Space to play again.';
  }
}

function draw(){
  ctx.fillStyle='#0a0d12';ctx.fillRect(0,0,W,H);
  ctx.strokeStyle='#333';ctx.setLineDash([8,8]);ctx.beginPath();ctx.moveTo(W/2,0);ctx.lineTo(W/2,H);ctx.stroke();ctx.setLineDash([]);
  ctx.fillStyle='#2ecc71';ctx.fillRect(0,p1.y,PW,PH);
  ctx.fillStyle='#3498db';ctx.fillRect(W-PW,p2.y,PW,PH);
  ctx.fillStyle='#fff';ctx.fillRect(ball.x,ball.y,BS,BS);
}

function loop(){update();draw();animId=requestAnimationFrame(loop);}

document.addEventListener('keydown',e=>{
  if(e.key===' '){e.preventDefault();if(!running){if(s1>=7||s2>=7)reset();running=true;paused=false;document.getElementById('msg').textContent='';}else paused=!paused;document.getElementById('msg').textContent=paused?'Paused':' ';return;}
  if(e.key==='w'||e.key==='W')p1.s=-5;
  if(e.key==='s'||e.key==='S')p1.s=5;
  if(mode==='pvp'){
    if(e.key==='ArrowUp')p2.s=-5;
    if(e.key==='ArrowDown')p2.s=5;
  }
});
document.addEventListener('keyup',e=>{
  if(e.key==='w'||e.key==='W'||e.key==='s'||e.key==='S')p1.s=0;
  if(e.key==='ArrowUp'||e.key==='ArrowDown')p2.s=0;
});
cv.addEventListener('mousemove',e=>{
  if(mode==='ai'){const r=cv.getBoundingClientRect();p2.y=e.clientY-r.y-PH/2;}
});

loop();reset();
</script>
</body>
</html>
