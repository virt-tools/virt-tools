<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CSS Radio Card Selector Generator — virt.tools</title>
<link rel="stylesheet" href="/assets/style.css">
<style>
.tool-area{max-width:900px;margin:2rem auto;padding:0 1rem}
.controls{display:grid;gap:1rem;margin:1.5rem 0;padding:1.5rem;background:#1a1a2e;border-radius:12px}
.control-row{display:flex;gap:1rem;align-items:center;flex-wrap:wrap}
.control-row label{min-width:100px;font-weight:600;font-size:.9rem}
.control-row select,.control-row input{padding:.5rem .75rem;border-radius:8px;border:1px solid #444;background:#0f0f1e;color:#eee;font-size:.9rem}
.preview-box{margin:1.5rem 0;border-radius:12px;min-height:120px;padding:2rem;background:#f5f5f5;display:flex;align-items:center;justify-content:center;gap:12px;flex-wrap:wrap}
.output-block{margin:2rem 0}
.output-block textarea{width:100%;min-height:100px;font-family:monospace;font-size:.85rem;padding:1rem;border-radius:8px;border:1px solid #444;background:#0f0f1e;color:#eee;resize:vertical}
.copy-btn{padding:.6rem 1.2rem;border:none;border-radius:8px;background:#667eea;color:#fff;cursor:pointer;font-size:.9rem;margin-top:.5rem}
h2{margin-top:2rem;font-size:1.2rem}
</style>
</head>
<body>
<header id="site-header"></header>
<main>
<div class="tool-area">
<h1>💳 CSS Radio Card Selector Generator</h1>
<p>Create CSS radio button card/select option components. 3 styles, 3 themes, 2-5 cards. Copy HTML+CSS.</p>
<div class="controls">
<div class="control-row">
<label>Style</label><select id="style"><option value="bordered" selected>Bordered</option><option value="filled">Filled</option><option value="shadow">Shadow</option></select>
<label>Theme</label><select id="theme"><option value="light" selected>Light</option><option value="dark">Dark</option><option value="gradient">Gradient</option></select>
<label>Cards</label><select id="cards"><option value="2">2</option><option value="3" selected>3</option><option value="4">4</option><option value="5">5</option></select>
<label>Active Color</label><input type="color" id="color" value="#667eea" style="width:50px;padding:2px">
<label>Size</label><select id="size"><option value="sm">Small</option><option value="md" selected>Medium</option><option value="lg">Large</option></select>
</div>
</div>
<h2>Preview</h2>
<div class="preview-box" id="preview"></div>
<h2>HTML</h2><div class="output-block"><textarea id="htmlOut" readonly></textarea><button class="copy-btn" onclick="copyText('htmlOut')">Copy HTML</button></div>
<h2>CSS</h2><div class="output-block"><textarea id="cssOut" readonly></textarea><button class="copy-btn" onclick="copyText('cssOut')">Copy CSS</button></div>
</div>
</main>
<script src="/assets/app.js"></script>
<script>
function update(){
var style=document.getElementById('style').value,theme=document.getElementById('theme').value;
var cards=+document.getElementById('cards').value,color=document.getElementById('color').value;
var size=document.getElementById('size').value;
var sizes={sm:{p:'.6rem .8rem',f:'.8rem',w:'120px'},md:{p:'.9rem 1rem',f:'.85rem',w:'160px'},lg:{p:'1.2rem 1.2rem',f:'.95rem',w:'200px'}};
var s=sizes[size];
var themes={light:{bg:'#fff',text:'#333',border:'#e0e0e0'},dark:{bg:'#1a1a2e',text:'#eee',border:'#333'},gradient:{bg:'linear-gradient(135deg,#667eea,#764ba2)',text:'#fff',border:'transparent'}};
var th=themes[theme];
var labels=['Free','Starter','Pro','Business','Enterprise'].slice(0,cards);
var prices=['$0','$9','$29','$59','$99'].slice(0,cards);
var html='<div class="radio-cards">\n'+labels.map(function(l,i){return '  <label class="radio-card'+(i===1?' selected':'')+'">\n    <input type="radio" name="plan"'+(i===1?' checked':'')+'>\n    <div class="card-content">\n      <div class="card-title">'+l+'</div>\n      <div class="card-price">'+prices[i]+'</div>\n    </div>\n  </label>'}).join('\n')+'\n</div>';
var css='.radio-cards{display:flex;gap:12px;flex-wrap:wrap}';
css+='\n.radio-card{cursor:pointer;border:2px solid '+th.border+';border-radius:12px;padding:'+s.p+';min-width:'+s.w+';background:'+th.bg+';color:'+th.text+';transition:all .2s;position:relative}';
if(style==='shadow'){css+=';box-shadow:0 2px 8px rgba(0,0,0,.08)'}
if(style==='filled'){css+=';background:'+(theme==='dark'?'#0f0f1e':'#f8f8f8')}
css+='\n.radio-card input{position:absolute;opacity:0}';
css+='\n.radio-card:hover{border-color:'+color+'99}';
css+='\n.radio-card.selected{border-color:'+color+';';
if(theme==='gradient'){css+='background:'+color+';color:#fff;'}
else{css+='box-shadow:0 0 0 3px '+color+'33;'}
css+='}';
css+='\n.card-content{display:flex;flex-direction:column;gap:4px}';
css+='\n.card-title{font-size:'+s.f+';font-weight:700}';
css+='\n.card-price{font-size:'+s.f+';opacity:.8}';
document.getElementById('htmlOut').value=html;
document.getElementById('cssOut').value=css;
document.getElementById('preview').innerHTML='<style>'+css+'<\/style>'+html;
}
function copyText(id){var t=document.getElementById(id);t.select();document.execCommand('copy')}
document.querySelectorAll('select,input').forEach(function(e){e.addEventListener('input',update);e.addEventListener('change',update)});
update();
</script>
</body>
</html>
