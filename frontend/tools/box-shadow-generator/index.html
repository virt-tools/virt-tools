<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <script src="/assets/theme-init.js"></script>
  <title>CSS Box-Shadow Generator — Virtual Tools</title>
  <link rel="stylesheet" href="/assets/style.css">
</head>
<body>
  <div id="site-header"></div>
  <main>
    <div class="tool-header">
      <a class="back" href="/">← All tools</a>
      <h1>CSS Box-Shadow Generator</h1>
      <p>Build layered CSS box-shadows with a live preview and copy-ready CSS. Everything runs in your browser.</p>
    </div>

    <div class="panel">
      <div class="bs-stage">
        <div class="bs-stage-bar">
          <button id="bg-toggle" class="secondary" style="padding:4px 10px;">Stage: light</button>
        </div>
        <div class="bs-stage-canvas" id="stage">
          <div class="bs-box" id="preview">Preview</div>
        </div>
      </div>

      <div class="spacer"></div>
      <div class="row">
        <div>
          <label for="boxbg">Box background</label>
          <input type="color" id="boxbg" value="#ffffff">
        </div>
        <div>
          <label for="radius">Box radius: <span id="radius-val">16</span>px</label>
          <input type="range" id="radius" min="0" max="80" value="16">
        </div>
        <div>
          <label for="boxw">Box size: <span id="boxw-val">220</span>px</label>
          <input type="range" id="boxw" min="80" max="360" value="220">
        </div>
      </div>

      <div class="spacer"></div>
      <div class="row" style="justify-content:space-between;">
        <label>Shadow layers <span class="muted" id="layer-count"></span></label>
        <button id="add" class="secondary" style="padding:4px 12px;">+ Add layer</button>
      </div>
      <div id="layers"></div>

      <div class="spacer"></div>
      <div class="row" style="justify-content:space-between;">
        <label for="css">CSS</label>
        <button id="copy" class="secondary" style="padding:4px 10px;">Copy</button>
      </div>
      <div class="output" id="css" style="word-break:break-all;"></div>
    </div>
  </main>

  <script src="/assets/app.js"></script>
  <script>
  (function () {
    var stage = document.getElementById("stage");
    var preview = document.getElementById("preview");
    var boxbg = document.getElementById("boxbg");
    var radius = document.getElementById("radius");
    var radiusVal = document.getElementById("radius-val");
    var boxw = document.getElementById("boxw");
    var boxwVal = document.getElementById("boxw-val");
    var bgToggle = document.getElementById("bg-toggle");
    var addBtn = document.getElementById("add");
    var layersEl = document.getElementById("layers");
    var layerCount = document.getElementById("layer-count");
    var css = document.getElementById("css");
    var copyBtn = document.getElementById("copy");

    var stageLight = false;

    // Each layer: { x, y, blur, spread, color (#rrggbb), alpha (0..1), inset }
    var layers = [
      { x: 0, y: 10, blur: 20, spread: -4, color: "#000000", alpha: 0.25, inset: false }
    ];

    function hexToRgb(hex) {
      var m = /^#?([0-9a-f]{6})$/i.exec(hex.trim());
      if (!m) return "0,0,0";
      var n = parseInt(m[1], 16);
      return ((n >> 16) & 255) + "," + ((n >> 8) & 255) + "," + (n & 255);
    }

    function layerCss(l) {
      return l.x + "px " + l.y + "px " + l.blur + "px " + l.spread + "px rgba(" +
        hexToRgb(l.color) + "," + (+l.alpha).toFixed(2) + ")" + (l.inset ? " inset" : "");
    }

    function buildShadow() {
      return layers.map(layerCss).join(", ");
    }

    function renderOutput() {
      preview.style.background = boxbg.value;
      preview.style.borderRadius = radius.value + "px";
      preview.style.width = boxw.value + "px";
      preview.style.boxShadow = buildShadow();
      radiusVal.textContent = radius.value;
      boxwVal.textContent = boxw.value;
      css.textContent = layers.length ? "box-shadow: " + buildShadow() + ";" : "box-shadow: none;";
      layerCount.textContent = "(" + layers.length + ")";
    }

    // Build a control card for one layer. Only the per-input value labels are
    // updated live; the layer cards themselves are not rebuilt on input, so
    // focus is preserved while dragging sliders.
    function buildCard(i) {
      var l = layers[i];
      var card = document.createElement("div");
      card.className = "bs-layer";

      function field(label, prop, min, max, step) {
        var wrap = document.createElement("div");
        var lab = document.createElement("label");
        lab.className = "bs-sm";
        lab.textContent = label;
        var inp = document.createElement("input");
        inp.type = "range";
        inp.min = min; inp.max = max; step = step || 1;
        inp.value = l[prop];
        var val = document.createElement("span");
        val.className = "bs-val";
        val.textContent = l[prop];
        inp.addEventListener("input", function () { l[prop] = parseInt(inp.value, 10); val.textContent = l[prop]; renderOutput(); });
        wrap.appendChild(lab); wrap.appendChild(inp); wrap.appendChild(val);
        return wrap;
      }

      card.appendChild(field("X", "x", -60, 60));
      card.appendChild(field("Y", "y", -60, 60));
      card.appendChild(field("Blur", "blur", 0, 100));
      card.appendChild(field("Spread", "spread", -40, 40));

      // color
      var cwrap = document.createElement("div");
      var clab = document.createElement("label"); clab.className = "bs-sm"; clab.textContent = "Color";
      var cin = document.createElement("input"); cin.type = "color"; cin.value = l.color;
      cin.addEventListener("input", function () { l.color = cin.value; renderOutput(); });
      cwrap.appendChild(clab); cwrap.appendChild(cin);
      card.appendChild(cwrap);

      // alpha
      var awrap = document.createElement("div");
      var alab = document.createElement("label"); alab.className = "bs-sm"; alab.textContent = "Opacity";
      var ain = document.createElement("input"); ain.type = "range"; ain.min = 0; ain.max = 1; ain.step = 0.01; ain.value = l.alpha;
      var aval = document.createElement("span"); aval.className = "bs-val"; aval.textContent = (+l.alpha).toFixed(2);
      ain.addEventListener("input", function () { l.alpha = parseFloat(ain.value); aval.textContent = l.alpha.toFixed(2); renderOutput(); });
      awrap.appendChild(alab); awrap.appendChild(ain); awrap.appendChild(aval);
      card.appendChild(awrap);

      // inset + remove
      var acts = document.createElement("div");
      acts.className = "bs-acts";
      var inset = document.createElement("label"); inset.className = "check";
      var ic = document.createElement("input"); ic.type = "checkbox"; ic.checked = l.inset;
      var icheck = document.createElement("span"); icheck.textContent = "inset";
      ic.addEventListener("change", function () { l.inset = ic.checked; renderOutput(); });
      inset.appendChild(ic); inset.appendChild(icheck);
      var rm = document.createElement("button"); rm.className = "secondary"; rm.style.padding = "4px 10px"; rm.textContent = "Remove";
      rm.disabled = layers.length <= 1;
      rm.addEventListener("click", function () {
        layers.splice(i, 1); renderCards(); renderOutput();
      });
      acts.appendChild(inset); acts.appendChild(rm);
      card.appendChild(acts);

      return card;
    }

    function renderCards() {
      layersEl.innerHTML = "";
      for (var i = 0; i < layers.length; i++) layersEl.appendChild(buildCard(i));
    }

    function addLayer() {
      layers.push({ x: 0, y: 8, blur: 16, spread: 0, color: "#6ea8fe", alpha: 0.4, inset: false });
      renderCards(); renderOutput();
    }

    function toggleStage() {
      stageLight = !stageLight;
      stage.classList.toggle("stage-light", stageLight);
      bgToggle.textContent = "Stage: " + (stageLight ? "light" : "dark");
    }

    bgToggle.addEventListener("click", toggleStage);
    addBtn.addEventListener("click", addLayer);
    boxbg.addEventListener("input", renderOutput);
    radius.addEventListener("input", renderOutput);
    boxw.addEventListener("input", renderOutput);
    copyBtn.addEventListener("click", function () {
      var text = css.textContent;
      if (!text) return;
      function done() { copyBtn.textContent = "Copied!"; setTimeout(function () { copyBtn.textContent = "Copy"; }, 1200); }
      if (navigator.clipboard && navigator.clipboard.writeText) navigator.clipboard.writeText(text).then(done);
      else { var ta = document.createElement("textarea"); ta.value = text; document.body.appendChild(ta); ta.select(); try { document.execCommand("copy"); done(); } catch (e) {} ta.remove(); }
    });

    renderCards();
    renderOutput();
  })();
  </script>
</body>
</html>
