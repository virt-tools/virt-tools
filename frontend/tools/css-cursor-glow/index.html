<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CSS Cursor Glow Generator — virt.tools</title>
<link rel="stylesheet" href="/assets/style.css">
<style>
.tool-area{max-width:900px;margin:2rem auto;padding:0 1rem}
.controls{display:grid;gap:1rem;margin:1.5rem 0;padding:1.5rem;background:#1a1a2e;border-radius:12px}
.ctrl-row{display:flex;gap:1rem;align-items:center;flex-wrap:wrap;margin-bottom:.5rem}
.ctrl-row label{font-weight:600;font-size:.9rem;min-width:120px}
.ctrl-row select,.ctrl-row input{padding:.5rem;border-radius:8px;border:1px solid #444;background:#0f0f1e;color:#eee}
.preview-box{margin:1.5rem 0;padding:3rem;border-radius:12px;min-height:250px;background:#0a0a1a;position:relative;overflow:hidden;cursor:none}
.output-block{margin:2rem 0}
.output-block textarea{width:100%;min-height:80px;font-family:monospace;font-size:.85rem;padding:1rem;border-radius:8px;border:1px solid #444;background:#0f0f1e;color:#eee;resize:vertical}
.copy-btn{padding:.6rem 1.2rem;border:none;border-radius:8px;background:#667eea;color:#fff;cursor:pointer;font-size:.9rem;margin-top:.5rem}
h2{margin-top:2rem;font-size:1.2rem}
</style>
</head>
<body>
<header id="site-header"></header>
<main>
<div class="tool-area">
<h1>🔦 CSS Cursor Glow Generator</h1>
<p>Create CSS cursor-following glow/spotlight effects. Adjustable color, size, blur, blend mode. Copy HTML+CSS+JS.</p>
<div class="controls">
<div class="ctrl-row">
<label>Glow Color</label><input type="color" id="glowColor" value="#667eea">
<label>Size</label><select id="glowSize"><option value="100">100px</option><option value="200" selected>200px</option><option value="300">300px</option><option value="400">400px</option></select>
</div>
<div class="ctrl-row">
<label>Blend Mode</label><select id="blendMode"><option value="screen" selected>screen</option><option value="lighten">lighten</option><option value="overlay">overlay</option><option value="soft-light">soft-light</option><option value="hard-light">hard-light</option></select>
<label>Shape</label><select id="shape"><option value="circle" selected>Circle</option><option value="radial">Radial</option></select>
</div>
<div class="ctrl-row"><button class="copy-btn" onclick="update()">Update</button></div>
</div>
<h2>Preview (move cursor over box)</h2>
<div class="preview-box" id="preview"></div>
<h2>HTML</h2><div class="output-block"><textarea id="htmlOut" readonly></textarea><button class="copy-btn" onclick="copyText('htmlOut')">Copy HTML</button></div>
<h2>CSS</h2><div class="output-block"><textarea id="cssOut" readonly></textarea><button class="copy-btn" onclick="copyText('cssOut')">Copy CSS</button></div>
<h2>JS</h2><div class="output-block"><textarea id="jsOut" readonly></textarea><button class="copy-btn" onclick="copyText('jsOut')">Copy JS</button></div>
</div>
</main>
<script src="/assets/app.js"></script>
<script>
function update(){
var gc=document.getElementById('glowColor').value;
var gs=document.getElementById('glowSize').value;
var bm=document.getElementById('blendMode').value;
var sp=document.getElementById('shape').value;
var bg=sp==='circle'?'radial-gradient(circle at var(--mx) var(--my),'+gc+' 0%,transparent 70%)':'radial-gradient('+gs+'px at var(--mx) var(--my),'+gc+' 0%,transparent 70%)';
var html='<div class="glow-container">\n  <div class="glow-content">Move your cursor here</div>\n</div>';
var css='.glow-container{position:relative;overflow:hidden;min-height:200px;border-radius:12px;background:#0a0a1a;cursor:none}\n.glow-container::before{content:"";position:absolute;inset:0;width:'+gs+'px;height:'+gs+'px;border-radius:50%;background:'+gc+';filter:blur(40px);opacity:.6;mix-blend-mode:'+bm+';transform:translate(-50%,-50%);left:var(--mx,50%);top:var(--my,50%);transition:opacity .3s;pointer-events:none}\n.glow-content{position:relative;z-index:1;padding:2rem;color:#fff;text-align:center}';
var js="document.querySelectorAll('.glow-container').forEach(function(el){\n  el.addEventListener('mousemove',function(e){\n    var rect=el.getBoundingClientRect();\n    el.style.setProperty('--mx',(e.clientX-rect.left)+'px');\n    el.style.setProperty('--my',(e.clientY-rect.top)+'px');\n  });\n});";
document.getElementById('htmlOut').value=html;
document.getElementById('cssOut').value=css;
document.getElementById('jsOut').value=js;
var p=document.getElementById('preview');
p.innerHTML='<style>'+css+'</style>'+html;
eval(js);
}
function copyText(id){var t=document.getElementById(id);t.select();document.execCommand('copy')}
['glowColor','glowSize','blendMode','shape'].forEach(function(id){var el=document.getElementById(id);el.addEventListener('input',update);el.addEventListener('change',update)});
update();
</script>
</body>
</html>
