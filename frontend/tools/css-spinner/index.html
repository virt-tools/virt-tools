<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="/assets/theme-init.js"></script>
<title>CSS Spinner Generator — Virtual Tools</title>
<link rel="stylesheet" href="/assets/style.css">
<style>
.tool-wrap{max-width:680px;margin:0 auto;}
.tool-desc{font-size:14px;color:var(--text-secondary,#aaa);margin:8px 0 20px;}
.gallery{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin:16px 0;}
.spinner-card{background:var(--card,#2a2f3e);border:1px solid var(--border,#444);border-radius:8px;padding:16px;display:flex;flex-direction:column;align-items:center;gap:12px;cursor:pointer;transition:border-color .2s;}
.spinner-card:hover{border-color:var(--accent,#5b8def);}
.spinner-card.active{border-color:var(--accent,#5b8def);}
.spin-box{width:60px;height:60px;display:flex;align-items:center;justify-content:center;}
.spin-name{font-size:12px;color:var(--text-secondary,#aaa);}
.preview{background:var(--bg,#1e2230);border:1px solid var(--border,#444);border-radius:8px;padding:32px;margin:12px 0;text-align:center;min-height:120px;display:flex;align-items:center;justify-content:center;}
.controls{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin:12px 0;}
.ctrl{display:flex;flex-direction:column;gap:4px;}
.ctrl label{font-size:12px;color:var(--text-secondary,#888);}
.ctrl input,.ctrl select{padding:6px 8px;border-radius:6px;border:1px solid var(--border,#444);background:var(--bg,#1e2230);color:var(--text,#eee);font-size:13px;}
.ctrl input[type="color"]{padding:2px;height:34px;}
button.action{padding:8px 16px;border-radius:6px;border:1px solid var(--border,#444);background:var(--card,#2a2f3e);color:var(--text,#eee);cursor:pointer;font-size:13px;margin:4px 4px 0 0;}
button.action:hover{border-color:var(--accent,#5b8def);}
.code-block{background:var(--bg,#1e2230);border:1px solid var(--border,#444);border-radius:8px;padding:12px;margin:8px 0;font-family:monospace;font-size:11px;color:var(--text,#eee);white-space:pre-wrap;word-break:break-all;max-height:220px;overflow:auto;}
</style>
</head>
<body>
<header id="site-header"></header>
<main>
<div class="tool-wrap">
<h1>🌀 CSS Spinner Generator</h1>
<p class="tool-desc">12 animated CSS loading spinners. Pick a style, customize colors and size, copy CSS.</p>
<div class="gallery" id="gallery"></div>
<div class="controls">
<div class="ctrl"><label>Color</label><input type="color" id="col" value="#5b8def" oninput="render()"></div>
<div class="ctrl"><label>Size (px)</label><input type="number" id="sz" value="48" min="16" max="120" oninput="render()"></div>
<div class="ctrl"><label>Speed (s)</label><input type="number" id="spd" value="1" min="0.2" max="5" step="0.1" oninput="render()"></div>
</div>
<div class="preview" id="prev"></div>
<div style="margin:8px 0;">
<button class="action" onclick="copyCSS()">Copy CSS</button>
</div>
<div class="code-block" id="code"></div>
</div>
</main>
<script src="/assets/app.js"></script>
<script>
const spinners=['Circle','Ring','Dots','Bars','Pulse','Ripple','Flip','Bounce','Wave','Square','Star','Heart'];
let active=0,cssText='';
function render(){
const c=v('col'),s=parseInt(v('sz'))||48,sp=parseFloat(v('spd'))||1;
const styles={
'Circle':`.spinner{width:${s}px;height:${s}px;border:${Math.max(2,s/12)}px solid var(--card,#2a2f3e);border-top-color:${c};border-radius:50%;animation:spin ${sp}s linear infinite}@keyframes spin{to{transform:rotate(360deg)}}`,
'Ring':`.spinner{width:${s}px;height:${s}px;border:${Math.max(3,s/10)}px solid transparent;border-top-color:${c};border-bottom-color:${c};border-radius:50%;animation:spin ${sp}s ease-in-out infinite}@keyframes spin{to{transform:rotate(360deg)}}`,
'Dots':`.spinner{display:flex;gap:${Math.max(2,s/16)}px}.spinner i{width:${s/4}px;height:${s/4}px;background:${c};border-radius:50%;animation:bounce ${sp}s ease-in-out infinite}.spinner i:nth-child(2){animation-delay:.2s}.spinner i:nth-child(3){animation-delay:.4s}@keyframes bounce{0%,80%,100%{transform:scale(0)}40%{transform:scale(1)}}`,
'Bars':`.spinner{display:flex;gap:${Math.max(2,s/16)}px}.spinner i{width:${s/5}px;height:${s}px;background:${c};border-radius:2px;animation:stretch ${sp}s ease-in-out infinite}.spinner i:nth-child(2){animation-delay:.1s}.spinner i:nth-child(3){animation-delay:.2s}.spinner i:nth-child(4){animation-delay:.3s}@keyframes stretch{0%,100%{transform:scaleY(.4)}50%{transform:scaleY(1)}}`,
'Pulse':`.spinner{width:${s}px;height:${s}px;background:${c};border-radius:50%;animation:pulse ${sp}s ease-in-out infinite}@keyframes pulse{0%,100%{transform:scale(.5);opacity:1}50%{transform:scale(1);opacity:.5}}`,
'Ripple':`.spinner{position:relative;width:${s}px;height:${s}px}.spinner i{position:absolute;inset:0;border:${Math.max(2,s/16)}px solid ${c};border-radius:50%;animation:ripple ${sp}s ease-out infinite}.spinner i:nth-child(2){animation-delay:.5s}@keyframes ripple{0%{transform:scale(0);opacity:1}100%{transform:scale(1);opacity:0}}`,
'Flip':`.spinner{width:${s}px;height:${s}px;background:${c};border-radius:4px;animation:flip ${sp}s ease-in-out infinite}@keyframes flip{0%{transform:perspective(120px) rotateX(0) rotateY(0)}50%{transform:perspective(120px) rotateX(180deg) rotateY(0)}100%{transform:perspective(120px) rotateX(180deg) rotateY(180deg)}}`,
'Bounce':`.spinner{width:${s}px;height:${s}px;background:${c};border-radius:50%;animation:bounce2 ${sp}s ease-in-out infinite}@keyframes bounce2{0%,100%{transform:translateY(-${s/4}px)}50%{transform:translateY(${s/4}px)}}`,
'Wave':`.spinner{display:flex;gap:2px;align-items:center}.spinner i{width:${s/6}px;height:${s/2}px;background:${c};border-radius:2px;animation:wave ${sp}s ease-in-out infinite}.spinner i:nth-child(2){animation-delay:.1s}.spinner i:nth-child(3){animation-delay:.2s}.spinner i:nth-child(4){animation-delay:.3s}.spinner i:nth-child(5){animation-delay:.4s}@keyframes wave{0%,100%{transform:scaleY(.3)}50%{transform:scaleY(1)}}`,
'Square':`.spinner{width:${s}px;height:${s}px;background:${c};animation:square ${sp}s ease-in-out infinite}@keyframes square{0%,100%{transform:rotate(0) scale(1)}50%{transform:rotate(180deg) scale(.5)}}`,
'Star':`.spinner{width:0;height:0;border-left:${s/2}px solid transparent;border-right:${s/2}px solid transparent;border-bottom:${s/2}px solid ${c};animation:spin ${sp}s linear infinite}@keyframes spin{to{transform:rotate(360deg)}}`,
'Heart':`.spinner{position:relative;width:${s}px;height:${s*0.9}px;animation:heartbeat ${sp}s ease-in-out infinite}.spinner:before,.spinner:after{content:'';position:absolute;width:${s/2}px;height:${s}px;background:${c};border-radius:${s/4}px ${s/4}px 0 0}.spinner:before{left:0;transform:rotate(-45deg);transform-origin:0 100%}.spinner:after{right:0;transform:rotate(45deg);transform-origin:100% 100%}@keyframes heartbeat{0%,100%{transform:scale(.8)}50%{transform:scale(1)}}`,
};
const name=spinners[active];
cssText=styles[name];
let html='<div class="spin-box"><div class="spinner"';
if(name==='Dots'||name==='Bars'||name==='Wave')html+='><i></i><i></i><i></i>'+(name==='Bars'||name==='Wave'?'<i></i>':'')+(name==='Wave'?'<i></i>':'')+'</div></div>';
else if(name==='Ripple')html+='><i></i><i></i></div></div>';
else html+='></div></div>';
document.getElementById('prev').innerHTML=html;
document.getElementById('code').textContent=cssText;
}
function v(id){return document.getElementById(id).value;}
function selectSpinner(i){active=i;document.querySelectorAll('.spinner-card').forEach((c,j)=>c.classList.toggle('active',i===j));render();}
function buildGallery(){
const g=document.getElementById('gallery');
g.innerHTML=spinners.map((n,i)=>`<div class="spinner-card${i===0?' active':''}" onclick="selectSpinner(${i})"><div class="spin-box" id="g${i}"></div><div class="spin-name">${n}</div></div>`).join('');
spinners.forEach((n,i)=>{const el=document.getElementById('g'+i);el.innerHTML=miniSpin(n);});
}
function miniSpin(n){
const s=32,c='#5b8def';
if(n==='Circle'||n==='Ring')return `<div style="width:${s}px;height:${s}px;border:3px solid var(--border);border-top-color:${c};border-radius:50%;animation:spin 1s linear infinite"></div>`;
if(n==='Dots')return `<div style="display:flex;gap:3px"><i style="width:8px;height:8px;background:${c};border-radius:50%;animation:bounce 1s ease-in-out infinite"></i><i style="width:8px;height:8px;background:${c};border-radius:50%;animation:bounce 1s ease-in-out .2s infinite"></i><i style="width:8px;height:8px;background:${c};border-radius:50%;animation:bounce 1s ease-in-out .4s infinite"></i></div>`;
if(n==='Bars')return `<div style="display:flex;gap:2px"><i style="width:5px;height:24px;background:${c};border-radius:2px;animation:stretch 1s ease-in-out infinite"></i><i style="width:5px;height:24px;background:${c};border-radius:2px;animation:stretch 1s ease-in-out .1s infinite"></i><i style="width:5px;height:24px;background:${c};border-radius:2px;animation:stretch 1s ease-in-out .2s infinite"></i><i style="width:5px;height:24px;background:${c};border-radius:2px;animation:stretch 1s ease-in-out .3s infinite"></i></div>`;
if(n==='Pulse')return `<div style="width:${s}px;height:${s}px;background:${c};border-radius:50%;animation:pulse 1s ease-in-out infinite"></div>`;
if(n==='Ripple')return `<div style="position:relative;width:${s}px;height:${s}px"><i style="position:absolute;inset:0;border:2px solid ${c};border-radius:50%;animation:ripple 1s ease-out infinite"></i><i style="position:absolute;inset:0;border:2px solid ${c};border-radius:50%;animation:ripple 1s ease-out .5s infinite"></i></div>`;
if(n==='Flip')return `<div style="width:${s}px;height:${s}px;background:${c};border-radius:4px;animation:flip 1s ease-in-out infinite"></div>`;
if(n==='Bounce')return `<div style="width:24px;height:24px;background:${c};border-radius:50%;animation:bounce2 1s ease-in-out infinite"></div>`;
if(n==='Wave')return `<div style="display:flex;gap:2px;align-items:center"><i style="width:4px;height:16px;background:${c};border-radius:2px;animation:wave 1s ease-in-out infinite"></i><i style="width:4px;height:16px;background:${c};border-radius:2px;animation:wave 1s ease-in-out .1s infinite"></i><i style="width:4px;height:16px;background:${c};border-radius:2px;animation:wave 1s ease-in-out .2s infinite"></i></div>`;
if(n==='Square')return `<div style="width:${s}px;height:${s}px;background:${c};animation:square 1s ease-in-out infinite"></div>`;
if(n==='Star')return `<div style="width:0;height:0;border-left:16px solid transparent;border-right:16px solid transparent;border-bottom:16px solid ${c};animation:spin 1s linear infinite"></div>`;
if(n==='Heart')return `<div style="position:relative;width:${s}px;height:28px;animation:heartbeat 1s ease-in-out infinite"><div style="position:absolute;left:0;width:16px;height:24px;background:${c};border-radius:8px 8px 0 0;transform:rotate(-45deg);transform-origin:0 100%"></div><div style="position:absolute;right:0;width:16px;height:24px;background:${c};border-radius:8px 8px 0 0;transform:rotate(45deg);transform-origin:100% 100%"></div></div>`;
return'';
}
function copyCSS(){navigator.clipboard.writeText(cssText).then(()=>alert('CSS copied!')).catch(()=>alert('Copy failed'));}
buildGallery();render();
</script>
</body>
</html>
