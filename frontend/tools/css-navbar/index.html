<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="/assets/theme-init.js"></script>
<title>CSS Navbar Generator — Virtual Tools</title>
<link rel="stylesheet" href="/assets/style.css">
<style>
.tool-wrap{max-width:720px;margin:0 auto;}
.tool-desc{font-size:14px;color:var(--text-secondary,#aaa);margin:8px 0 20px;}
.controls{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin:12px 0;}
.ctrl{display:flex;flex-direction:column;gap:4px;}
.ctrl label{font-size:12px;color:var(--text-secondary,#888);}
.ctrl input,.ctrl select{padding:6px 8px;border-radius:6px;border:1px solid var(--border,#444);background:var(--bg,#1e2230);color:var(--text,#eee);font-size:13px;}
.ctrl input[type="color"]{padding:2px;height:34px;}
button.action{padding:8px 16px;border-radius:6px;border:1px solid var(--border,#444);background:var(--card,#2a2f3e);color:var(--text,#eee);cursor:pointer;font-size:13px;margin:4px 4px 0 0;}
.preview{background:var(--bg,#1e2230);border:1px solid var(--border,#444);border-radius:8px;padding:0;margin:12px 0;overflow:hidden;}
.code-block{background:var(--bg,#1e2230);border:1px solid var(--border,#444);border-radius:8px;padding:12px;margin:8px 0;font-family:monospace;font-size:11px;color:var(--text,#eee);white-space:pre-wrap;word-break:break-all;max-height:350px;overflow:auto;}
.navbar{display:flex;align-items:center;justify-content:space-between;padding:0 20px;}
.navbar .logo{font-size:18px;font-weight:700;}
.navbar .links{display:flex;gap:24px;list-style:none;margin:0;padding:0;}
.navbar .links a{text-decoration:none;font-size:14px;position:relative;transition:all .3s;}
</style>
</head>
<body>
<header id="site-header"></header>
<main>
<div class="tool-wrap">
<h1>🧭 CSS Navbar Generator</h1>
<p class="tool-desc">Create responsive CSS navbars with 4 hover styles, sticky/fixed positioning, and custom colors. Copy HTML+CSS.</p>
<div class="controls">
<div class="ctrl"><label>Background</label><input type="color" id="bg" value="#1e2230" oninput="render()"></div>
<div class="ctrl"><label>Text Color</label><input type="color" id="tc" value="#eeeeee" oninput="render()"></div>
<div class="ctrl"><label>Accent</label><input type="color" id="ac" value="#5b8def" oninput="render()"></div>
<div class="ctrl"><label>Hover Style</label><select id="hv" onchange="render()"><option value="0">Color</option><option value="1" selected>Underline</option><option value="2">Background</option><option value="3">Border</option></select></div>
<div class="ctrl"><label>Position</label><select id="pos" onchange="render()"><option value="0">Static</option><option value="1">Sticky</option><option value="2">Fixed</option></select></div>
<div class="ctrl"><label>Items</label><select id="items" onchange="render()"><option value="3">3</option><option value="4" selected>4</option><option value="5">5</option><option value="6">6</option></select></div>
</div>
<div class="preview" id="prev"></div>
<div style="margin:8px 0;"><button class="action" onclick="copyCode()">Copy HTML+CSS</button></div>
<div class="code-block" id="code"></div>
</div>
</main>
<script src="/assets/app.js"></script>
<script>
let codeText='';
const labels=['Home','About','Services','Portfolio','Blog','Contact'];
function render(){
const bg=v('bg'),tc=v('tc'),ac=v('ac'),hv=v('hv'),pos=v('pos'),n=parseInt(v('items'));
const prev=document.getElementById('prev');
let posCss=pos==='0'?'':pos==='1'?'position:sticky;top:0;z-index:100;':'position:fixed;top:0;left:0;right:0;z-index:100;';
let hoverCss='';
if(hv==='0')hoverCss=`a:hover{color:${ac};}`;
else if(hv==='1')hoverCss=`a:hover{color:${ac};}a::after{content:'';position:absolute;left:0;bottom:-4px;width:0;height:2px;background:${ac};transition:width .3s;}a:hover::after{width:100%}`;
else if(hv==='2')hoverCss=`a:hover{background:${ac}20;border-radius:4px;padding:4px 8px;margin:-4px -8px;}`;
else if(hv==='3')hoverCss=`a:hover{color:${ac};border-bottom:2px solid ${ac};padding-bottom:2px;}`;
const items=labels.slice(0,n).map(l=>`<li><a href="#">${l}</a></li>`).join('\n      ');
prev.innerHTML=`<div class="navbar" style="background:${bg};height:56px;${posCss}"><span class="logo" style="color:${tc}">Brand</span><ul class="links"><style>.navbar .links a{color:${tc}cc}.navbar .links a:hover{${hoverCss.replace(/a:hover\{/g,'').replace(/\}/g,'')}||'}</style>${items}</ul></div>`;
const css=`/* Navbar */\n.navbar{display:flex;align-items:center;justify-content:space-between;padding:0 20px;background:${bg};height:56px;${posCss}}\n.navbar .logo{color:${tc};font-size:18px;font-weight:700}\n.navbar .links{display:flex;gap:24px;list-style:none;margin:0;padding:0}\n.navbar .links a{color:${tc}cc;text-decoration:none;font-size:14px;position:relative;transition:all .3s}\n${hoverCss}`;
codeText=`<!-- HTML -->\n<nav class="navbar">\n  <span class="logo">Brand</span>\n  <ul class="links">\n      ${items}\n  </ul>\n</nav>\n\n<!-- CSS -->\n<style>\n${css}\n</style>`;
document.getElementById('code').textContent=codeText;
const navbar=prev.querySelector('.navbar');
navbar.querySelectorAll('a').forEach(a=>{
a.addEventListener('mouseenter',function(){if(hv==='0'){this.style.color=ac}else if(hv==='1'){this.style.color=ac}else if(hv==='2'){this.style.background=ac+'20';this.style.borderRadius='4px';this.style.padding='4px 8px';this.style.margin='-4px -8px'}else if(hv==='3'){this.style.color=ac;this.style.borderBottom='2px solid '+ac;this.style.paddingBottom='2px'}});
a.addEventListener('mouseleave',function(){if(hv==='0'){this.style.color=tc+'cc'}else if(hv==='1'){this.style.color=tc+'cc'}else if(hv==='2'){this.style.background='';this.style.borderRadius='';this.style.padding='';this.style.margin=''}else if(hv==='3'){this.style.color=tc+'cc';this.style.borderBottom='';this.style.paddingBottom=''}});
});
}
function v(id){return document.getElementById(id).value;}
function copyCode(){navigator.clipboard.writeText(codeText).then(()=>alert('Code copied!')).catch(()=>alert('Copy failed'));}
render();
</script>
</body>
</html>
