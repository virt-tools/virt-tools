<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CSS Cookie Banner Generator — virt.tools</title>
<link rel="stylesheet" href="/assets/style.css">
<style>
.tool-area{max-width:960px;margin:2rem auto;padding:0 1rem}
.controls{display:grid;gap:1rem;margin:1.5rem 0;padding:1.5rem;background:var(--card-bg,#1a1a2e);border-radius:12px}
.control-row{display:flex;gap:1rem;align-items:center;flex-wrap:wrap}
.control-row label{min-width:120px;font-weight:600;font-size:.9rem}
.control-row select,.control-row input[type="text"],.control-row input[type="color"]{padding:.5rem .75rem;border-radius:8px;border:1px solid #444;background:var(--bg,#0f0f1e);color:var(--text,#eee);font-size:.9rem}
.preview-area{margin:2rem 0;padding:2rem;background:#1a1a2e;border-radius:12px;min-height:200px;position:relative}
.css-output{margin:2rem 0}
.css-output textarea{width:100%;min-height:200px;font-family:monospace;font-size:.85rem;padding:1rem;border-radius:8px;border:1px solid #444;background:#0f0f1e;color:#eee;resize:vertical}
.copy-btn{padding:.6rem 1.2rem;border:none;border-radius:8px;background:#4a9eff;color:#fff;cursor:pointer;font-size:.9rem;margin-top:.5rem}
h2{margin-top:2rem;font-size:1.2rem}
</style>
</head>
<body>
<header id="site-header"></header>
<main>
<div class="tool-area">
<h1>🍪 CSS Cookie Banner Generator</h1>
<p>Create cookie consent / GDPR banner components. 4 styles, 3 positions, custom message and buttons.</p>

<div class="controls">
<div class="control-row">
<label>Style</label><select id="style"><option value="bar">Bottom Bar</option><option value="card">Floating Card</option><option value="modal">Modal Overlay</option><option value="topbar">Top Bar</option></select>
<label>Theme</label><select id="theme"><option value="dark">Dark</option><option value="light">Light</option><option value="gradient">Gradient</option></select>
</div>
<div class="control-row">
<label>Message</label><input type="text" id="msg" value="We use cookies to improve your experience. By continuing you accept our privacy policy." style="flex:1;min-width:200px">
</div>
<div class="control-row">
<label>Accept Text</label><input type="text" id="acceptText" value="Accept All" style="flex:1;min-width:100px">
<label>Reject Text</label><input type="text" id="rejectText" value="Reject" style="flex:1;min-width:100px">
<label>Show Reject</label><select id="showReject"><option value="yes">Yes</option><option value="no">No</option></select>
</div>
<div class="control-row">
<label>Accent</label><input type="color" id="accent" value="#4a9eff">
<label>Radius</label><input type="range" id="radius" min="0" max="20" value="8"><span id="radiusVal">8px</span>
</div>
</div>

<div class="preview-area" id="preview"></div>

<h2>HTML</h2><div class="css-output"><textarea id="htmlOut" readonly></textarea><button class="copy-btn" onclick="copyText('htmlOut')">Copy HTML</button></div>
<h2>CSS</h2><div class="css-output"><textarea id="cssOut" readonly></textarea><button class="copy-btn" onclick="copyText('cssOut')">Copy CSS</button></div>
</div>
</main>
<script src="/assets/app.js"></script>
<script>
function update(){
var style=document.getElementById('style').value;
var theme=document.getElementById('theme').value;
var msg=document.getElementById('msg').value;
var acc=document.getElementById('acceptText').value;
var rej=document.getElementById('rejectText').value;
var showRej=document.getElementById('showReject').value==='yes';
var accent=document.getElementById('accent').value;
var r=parseInt(document.getElementById('radius').value);
document.getElementById('radiusVal').textContent=r+'px';

var bg=theme==='light'?'#fff':theme==='gradient'?'linear-gradient(135deg,#1a1a3e,#2a2a5e)':'#1a1a2e';
var color=theme==='light'?'#333':'#eee';
var pos=style==='topbar'?'top:0;left:0;right:0':style==='card'?'bottom:1rem;right:1rem;max-width:400px':style==='modal'?'top:50%;left:50%;transform:translate(-50%,-50%);max-width:500px':'bottom:0;left:0;right:0';

var html='<div class="cookie-banner">\n  <div class="cookie-msg">'+msg+'</div>\n  <div class="cookie-actions">';
if(showRej) html+='\n    <button class="cookie-btn cookie-reject">'+rej+'</button>';
html+='\n    <button class="cookie-btn cookie-accept">'+acc+'</button>\n  </div>\n</div>';

var css='.cookie-banner{\n  position:fixed;\n  '+pos+';\n  background:'+bg+';\n  color:'+color+';\n  padding:1.5rem;\n  border-radius:'+r+'px;\n  '+(theme!=='light'?'box-shadow:0 4px 20px rgba(0,0,0,.3);':'border:1px solid #ddd;')+'\n  display:flex;\n  align-items:center;\n  gap:1rem;\n  z-index:9999;\n  flex-wrap:wrap;\n}\n.cookie-msg{\n  flex:1;\n  font-size:.9rem;\n  line-height:1.4;\n}\n.cookie-actions{\n  display:flex;\n  gap:.5rem;\n  flex-shrink:0;\n}\n.cookie-btn{\n  padding:.5rem 1.2rem;\n  border-radius:6px;\n  font-size:.85rem;\n  cursor:pointer;\n  border:none;\n  font-weight:600;\n}\n.cookie-accept{\n  background:'+accent+';\n  color:#fff;\n}\n.cookie-reject{\n  background:transparent;\n  color:'+color+';\n  border:1px solid '+(theme==='light'?'#ccc':'#555')+';\n}';

document.getElementById('preview').innerHTML='<style>'+css.replace(/\.cookie-banner/g,'.preview-area .cookie-banner').replace(/\.cookie-/g,'.preview-area .cookie-')+'</style>'+html;
document.getElementById('htmlOut').value=html;
document.getElementById('cssOut').value=css;
}
function copyText(id){var t=document.getElementById(id);t.select();document.execCommand('copy');}
document.querySelectorAll('select,input').forEach(function(e){e.addEventListener('input',update)});
update();
</script>
</body>
</html>
