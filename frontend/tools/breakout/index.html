<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="/assets/theme-init.js"></script>
<title>Breakout — Virtual Tools</title>
<link rel="stylesheet" href="/assets/style.css">
<style>
.tool-wrap{max-width:560px;margin:0 auto;text-align:center;}
canvas{border:1px solid var(--border,#2a2f3a);border-radius:8px;background:#0a0d12;display:block;margin:16px auto;touch-action:none;}
#score{font-size:20px;font-weight:700;margin:8px 0;}
#msg{font-size:14px;opacity:.6;margin:4px 0;min-height:20px;}
.lives{color:#e74c3c;}
.tool-desc{opacity:.7;font-size:14px;margin-bottom:8px;}
</style>
</head>
<body>
<header id="site-header"></header>
<main>
<div class="tool-wrap">
<h1>Breakout</h1>
<p class="tool-desc">Classic brick-breaking game. Move the paddle with mouse, arrow keys, or touch. Clear all bricks to advance. 3 lives. Fully client-side.</p>
<div id="score">Score: 0 <span class="lives">♥♥♥</span></div>
<div id="msg">Press Space or click to start</div>
<canvas id="c" width="560" height="420"></canvas>
</div>
</main>
<script src="/assets/app.js"></script>
<script>
const cv=document.getElementById('c'),ctx=cv.getContext('2d');
const W=560,H=420;
const PW=80,PH=10,BR=5;
const ROWS=5,COLS=10,BW=52,BH=18,BGAP=4,BTOP=40;
const COLS_ARR=['#e74c3c','#e67e22','#f1c40f','#2ecc71','#3498db'];
let paddle={x:W/2-PW/2,y:H-25};
let ball={x:W/2,y:H-40,vx:3,vy:-3};
let bricks=[],score=0,lives=3,running=false,won=false,animId=null;

function initBricks(){
  bricks=[];
  for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++)
    bricks.push({x:c*(BW+BGAP)+BGAP,y:r*(BH+BGAP)+BTOP,w:BW,h:BH,alive:true,color:COLS_ARR[r%COLS_ARR.length],points:(ROWS-r)*10});
}

function reset(){
  score=0;lives=3;paddle.x=W/2-PW/2;
  ball={x:W/2,y:H-40,vx:3,vy:-3};
  initBricks();running=false;won=false;
  updateUI();document.getElementById('msg').textContent='Press Space or click to start';draw();
}

function updateUI(){
  document.getElementById('score').innerHTML='Score: '+score+' <span class="lives">'+'♥'.repeat(Math.max(0,lives))+'</span>';
}

function update(){
  if(!running)return;
  ball.x+=ball.vx;ball.y+=ball.vy;
  if(ball.x<=BR||ball.x>=W-BR)ball.vx=-ball.vx;
  if(ball.y<=BR)ball.vy=-ball.vy;
  if(ball.y>=paddle.y&&ball.x>=paddle.x&&ball.x<=paddle.x+PW&&ball.vy>0){
    ball.vy=-Math.abs(ball.vy);
    ball.vx+=(ball.x-(paddle.x+PW/2))*0.1;
  }
  if(ball.y>H){
    lives--;updateUI();
    if(lives<=0){running=false;document.getElementById('msg').textContent='Game Over! Press Space to retry.';return;}
    ball={x:W/2,y:H-40,vx:3,vy:-3};
  }
  for(let b of bricks){
    if(!b.alive)continue;
    if(ball.x>=b.x&&ball.x<=b.x+b.w&&ball.y>=b.y&&ball.y<=b.y+b.h){
      b.alive=false;ball.vy=-ball.vy;score+=b.points;updateUI();
      if(bricks.every(br=>!br.alive)){running=false;won=true;document.getElementById('msg').textContent='You Win! Press Space to play again.';}
      break;
    }
  }
}

function draw(){
  ctx.fillStyle='#0a0d12';ctx.fillRect(0,0,W,H);
  for(let b of bricks){if(!b.alive)continue;ctx.fillStyle=b.color;ctx.fillRect(b.x,b.y,b.w,b.h);}
  ctx.fillStyle='#fff';ctx.fillRect(paddle.x,paddle.y,PW,PH);
  ctx.beginPath();ctx.arc(ball.x,ball.y,BR,0,Math.PI*2);ctx.fill();
}

function loop(){update();draw();animId=requestAnimationFrame(loop);}

cv.addEventListener('mousemove',e=>{const r=cv.getBoundingClientRect();paddle.x=Math.max(0,Math.min(W-PW,e.clientX-r.x-PW/2));});
cv.addEventListener('touchmove',e=>{e.preventDefault();const r=cv.getBoundingClientRect();paddle.x=Math.max(0,Math.min(W-PW,e.touches[0].clientX-r.x-PW/2));},{passive:false});
cv.addEventListener('click',()=>{if(!running){if(lives<=0||won)reset();running=true;document.getElementById('msg').textContent='';}});
document.addEventListener('keydown',e=>{
  if(e.key===' '){e.preventDefault();if(!running){if(lives<=0||won)reset();running=true;document.getElementById('msg').textContent='';}return;}
  if(e.key==='ArrowLeft')paddle.x=Math.max(0,paddle.x-20);
  if(e.key==='ArrowRight')paddle.x=Math.min(W-PW,paddle.x+20);
});

loop();reset();
</script>
</body>
</html>
