<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CSS Theme Toggle Generator — virt.tools</title>
<link rel="stylesheet" href="/assets/style.css">
<style>
.tool-area{max-width:900px;margin:2rem auto;padding:0 1rem}
.controls{display:grid;gap:1rem;margin:1.5rem 0;padding:1.5rem;background:#1a1a2e;border-radius:12px}
.control-row{display:flex;gap:1rem;align-items:center;flex-wrap:wrap}
.control-row label{min-width:130px;font-weight:600;font-size:.9rem}
.control-row select,.control-row input{padding:.5rem .75rem;border-radius:8px;border:1px solid #444;background:#0f0f1e;color:#eee;font-size:.9rem}
.preview-box{margin:1.5rem 0;border-radius:12px;background:#0f0f1e;padding:2rem 1.5rem;display:flex;gap:2rem;align-items:center;flex-wrap:wrap}
.output-block{margin:2rem 0}
.output-block textarea{width:100%;min-height:100px;font-family:monospace;font-size:.85rem;padding:1rem;border-radius:8px;border:1px solid #444;background:#0f0f1e;color:#eee;resize:vertical}
.copy-btn{padding:.6rem 1.2rem;border:none;border-radius:8px;background:#667eea;color:#fff;cursor:pointer;font-size:.9rem;margin-top:.5rem}
h2{margin-top:2rem;font-size:1.2rem}
.toggle-wrap{position:relative;display:inline-block;width:60px;height:30px}
.toggle-wrap input{opacity:0;width:0;height:0}
.toggle-slider{position:absolute;cursor:pointer;inset:0;background:#ccc;border-radius:30px;transition:.3s}
.toggle-slider:before{content:"";position:absolute;height:22px;width:22px;left:4px;bottom:4px;background:#fff;border-radius:50%;transition:.3s}
input:checked+.slider{background:#222}
input:checked+.slider:before{transform:translateX(30px)}
</style>
</head>
<body>
<header id="site-header"></header>
<main>
<div class="tool-area">
<h1>🌓 CSS Theme Toggle Generator</h1>
<p>Create CSS dark/light mode toggle switch components with sun/moon icons. 5 styles, customizable colors and sizes.</p>
<div class="controls">
<div class="control-row">
<label>Style</label><select id="style"><option value="slide">Slide</option><option value="flip">Flip</option><option value="morph">Morph</option><option value="icon">Icon Swap</option><option value="minimal">Minimal</option></select>
<label>Size</label><select id="size"><option value="sm">Small</option><option value="md" selected>Medium</option><option value="lg">Large</option></select>
</div>
<div class="control-row">
<label>Sun Color</label><input type="color" id="sunColor" value="#fbbf24">
<label>Moon Color</label><input type="color" id="moonColor" value="#6366f1">
<label>Bg Color</label><input type="color" id="bgColor" value="#1a1a2e">
</div>
</div>
<h2>Preview</h2>
<div class="preview-box" id="preview"></div>
<h2>HTML</h2><div class="output-block"><textarea id="htmlOut" readonly></textarea><button class="copy-btn" onclick="copyText('htmlOut')">Copy HTML</button></div>
<h2>CSS</h2><div class="output-block"><textarea id="cssOut" readonly></textarea><button class="copy-btn" onclick="copyText('cssOut')">Copy CSS</button></div>
</div>
</div>
</main>
<script src="/assets/app.js"></script>
<script>
var sizes={sm:{w:44,h:22,k:16,o:3},md:{w:60,h:30,k:22,o:4},lg:{w:80,h:40,k:30,o:5}};
function update(){
var style=document.getElementById('style').value;
var sz=document.getElementById('size').value;
var s=sizes[sz];
var sc=document.getElementById('sunColor').value;
var mc=document.getElementById('moonColor').value;
var bg=document.getElementById('bgColor').value;
var html='<label class="theme-toggle">\n  <input type="checkbox">\n  <span class="toggle-track">\n    <span class="toggle-thumb">\n      <span class="icon-sun">☀</span>\n      <span class="icon-moon">☾</span>\n    </span>\n  </span>\n</label>';
var css='.theme-toggle{position:relative;display:inline-block;width:'+s.w+'px;height:'+s.h+'px}\n.theme-toggle input{opacity:0;width:0;height:0}\n.toggle-track{position:absolute;inset:0;background:'+bg+';border-radius:'+s.h+'px;cursor:pointer;transition:.3s;overflow:hidden}\n.toggle-thumb{position:absolute;top:'+s.o+'px;left:'+s.o+'px;width:'+s.k+'px;height:'+s.k+'px;background:'+sc+';border-radius:50%;transition:.3s;display:flex;align-items:center;justify-content:center;font-size:'+(s.k*0.6)+'px}\n.icon-sun{opacity:1;transition:.3s}\n.icon-moon{position:absolute;opacity:0;transition:.3s}\n.theme-toggle input:checked+.toggle-track{background:'+mc+'}\n.theme-toggle input:checked+.toggle-track .toggle-thumb{transform:translateX('+(s.w-s.k-s.o*2)+'px);background:'+mc+'}\n.theme-toggle input:checked+.toggle-track .icon-sun{opacity:0}\n.theme-toggle input:checked+.toggle-track .icon-moon{opacity:1}';
if(style==='flip'){css+='\n.toggle-thumb{transform-style:preserve-3d}\n.theme-toggle input:checked+.toggle-track .toggle-thumb{transform:translateX('+(s.w-s.k-s.o*2)+'px) rotateY(180deg)}';}
if(style==='minimal'){css+='\n.icon-sun,.icon-moon{display:none}';}
document.getElementById('htmlOut').value=html;
document.getElementById('cssOut').value=css;
var p=document.getElementById('preview');
p.innerHTML='<style>'+css+'</style>'+html;
p.querySelectorAll('.theme-toggle input').forEach(function(i){i.addEventListener('change',function(){this.closest('.theme-toggle').classList.toggle('checked',this.checked)})});
}
function copyText(id){var t=document.getElementById(id);t.select();document.execCommand('copy')}
document.querySelectorAll('select,input').forEach(function(e){e.addEventListener('input',update);e.addEventListener('change',update)});
update();
</script>
</body>
</html>
