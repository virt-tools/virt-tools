<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CSS Scroll Reveal Generator — virt.tools</title>
<link rel="stylesheet" href="/assets/style.css">
<style>
.tool-area{max-width:960px;margin:2rem auto;padding:0 1rem}
.controls{display:grid;gap:1rem;margin:1.5rem 0;padding:1.5rem;background:#1a1a2e;border-radius:12px}
.control-row{display:flex;gap:1rem;align-items:center;flex-wrap:wrap}
.control-row label{min-width:120px;font-weight:600;font-size:.9rem}
.control-row select,.control-row input[type="color"],.control-row input[type="range"],.control-row input[type="number"]{padding:.5rem .75rem;border-radius:8px;border:1px solid #444;background:#0f0f1e;color:#eee;font-size:.9rem}
.preview-box{margin:1.5rem 0;padding:2rem;background:#0f0f1e;border-radius:12px;max-height:400px;overflow-y:auto}
.output-block{margin:2rem 0}
.output-block textarea{width:100%;min-height:200px;font-family:monospace;font-size:.85rem;padding:1rem;border-radius:8px;border:1px solid #444;background:#0f0f1e;color:#eee;resize:vertical}
.copy-btn{padding:.6rem 1.2rem;border:none;border-radius:8px;background:#4a9eff;color:#fff;cursor:pointer;font-size:.9rem;margin-top:.5rem}
h2{margin-top:2rem;font-size:1.2rem}
</style>
</head>
<body>
<header id="site-header"></header>
<main>
<div class="tool-area">
<h1>👁️ CSS Scroll Reveal Generator</h1>
<p>Create CSS scroll-triggered reveal animations. 6 animation types, adjustable distance/delay/stagger. Copy HTML+CSS+JS.</p>
<div class="controls">
<div class="control-row">
<label>Animation</label><select id="anim"><option value="fade">Fade</option><option value="slide-up">Slide Up</option><option value="slide-down">Slide Down</option><option value="slide-left">Slide Left</option><option value="slide-right">Slide Right</option><option value="zoom">Zoom In</option><option value="flip">Flip</option></select>
<label>Easing</label><select id="easing"><option value="ease">Ease</option><option value="ease-in">Ease In</option><option value="ease-out">Ease Out</option><option value="ease-in-out">Ease In Out</option><option value="cubic-bezier(0.25,0.46,0.45,0.94)">Smooth</option></select>
</div>
<div class="control-row">
<label>Distance (px)</label><input type="number" id="distance" value="50" min="0" max="200" style="width:60px">
<label>Duration (s)</label><input type="number" id="duration" value="0.6" min="0.1" max="5" step="0.1" style="width:60px">
<label>Delay (s)</label><input type="number" id="delay" value="0" min="0" max="3" step="0.1" style="width:60px">
<label>Stagger (s)</label><input type="number" id="stagger" value="0.1" min="0" max="1" step="0.05" style="width:60px">
</div>
<div class="control-row">
<label>Items</label><input type="number" id="items" value="4" min="1" max="12" style="width:60px">
<label>Threshold</label><input type="range" id="threshold" min="0" max="100" value="20"><span id="thresholdVal">20%</span>
</div>
</div>
<h2>Preview (scroll down)</h2>
<div class="preview-box" id="preview"></div>
<h2>CSS</h2><div class="output-block"><textarea id="cssOut" readonly></textarea><button class="copy-btn" onclick="copyText('cssOut')">Copy CSS</button></div>
<h2>HTML</h2><div class="output-block"><textarea id="htmlOut" readonly></textarea><button class="copy-btn" onclick="copyText('htmlOut')">Copy HTML</button></div>
<h2>JS</h2><div class="output-block"><textarea id="jsOut" readonly></textarea><button class="copy-btn" onclick="copyText('jsOut')">Copy JS</button></div>
</div>
</main>
<script src="/assets/app.js"></script>
<script>
function update(){
var anim=document.getElementById('anim').value;
var easing=document.getElementById('easing').value;
var distance=parseInt(document.getElementById('distance').value);
var duration=parseFloat(document.getElementById('duration').value);
var delay=parseFloat(document.getElementById('delay').value);
var stagger=parseFloat(document.getElementById('stagger').value);
var items=parseInt(document.getElementById('items').value);
var threshold=parseInt(document.getElementById('threshold').value)/100;
document.getElementById('thresholdVal').textContent=(threshold*100)+'%';
var transform='';
if(anim==='fade')transform='none';
else if(anim==='slide-up')transform='translateY('+distance+'px)';
else if(anim==='slide-down')transform='translateY(-'+distance+'px)';
else if(anim==='slide-left')transform='translateX('+distance+'px)';
else if(anim==='slide-right')transform='translateX(-'+distance+'px)';
else if(anim==='zoom')transform='scale(0.5)';
else if(anim==='flip')transform='perspective(800px) rotateY(90deg)';
var css='.reveal-item {\n  opacity: 0;\n  transform: '+transform+';\n  transition: opacity '+duration+'s '+easing+', transform '+duration+'s '+easing+';\n';
if(anim==='flip')css+='  transform-origin: left center;\n';
css+='}\n\n.reveal-item.revealed {\n  opacity: 1;\n  transform: none;\n}';
document.getElementById('cssOut').value=css;
var html='<div class="reveal-container">\n';
for(var i=0;i<items;i++){
html+='  <div class="reveal-item" style="transition-delay: '+(delay+i*stagger)+'s">Item '+(i+1)+'</div>\n';
}
html+='</div>';
document.getElementById('htmlOut').value=html;
var js='var observer = new IntersectionObserver(function(entries) {\n  entries.forEach(function(entry) {\n    if (entry.isIntersecting) {\n      entry.target.classList.add("revealed");\n      observer.unobserve(entry.target);\n    }\n  });\n}, { threshold: '+threshold+' });\n\ndocument.querySelectorAll(".reveal-item").forEach(function(el) {\n  observer.observe(el);\n});';
document.getElementById('jsOut').value=js;
var previewHtml='<style>\n.reveal-container { padding: 1rem; }\n.reveal-item {\n  background: #4a9eff;\n  color: #fff;\n  padding: 2rem;\n  margin: 1rem 0;\n  border-radius: 12px;\n  text-align: center;\n  font-size: 1.2rem;\n  font-weight: 700;\n  opacity: 0;\n  transform: '+transform+';\n  transition: opacity '+duration+'s '+easing+', transform '+duration+'s '+easing+';\n';
if(anim==='flip')previewHtml+='  transform-origin: left center;\n';
previewHtml+='}\n.reveal-item.revealed {\n  opacity: 1;\n  transform: none;\n}\n</style>\n<div class="reveal-container">\n';
for(var i=0;i<items;i++){
previewHtml+='  <div class="preview-reveal-item" style="background:#4a9eff;color:#fff;padding:2rem;margin:1rem 0;border-radius:12px;text-align:center;font-size:1.2rem;font-weight:700;opacity:0;transform:'+transform+';transition:opacity '+duration+'s '+easing+',transform '+duration+'s '+easing+';transition-delay:'+(delay+i*stagger)+'s">Item '+(i+1)+'</div>\n';
}
previewHtml+='</div>\n<script>\nvar obs=new IntersectionObserver(function(entries){entries.forEach(function(e){if(e.isIntersecting){e.target.style.opacity=1;e.target.style.transform="none";obs.unobserve(e.target);}})},{threshold:'+threshold+'});\ndocument.querySelectorAll(".preview-reveal-item").forEach(function(el){obs.observe(el);});\n<\/script>';
document.getElementById('preview').innerHTML=previewHtml;
}
function copyText(id){var t=document.getElementById(id);t.select();document.execCommand('copy')}
document.querySelectorAll('select,input').forEach(function(e){e.addEventListener('input',update);e.addEventListener('change',update)});
update();
</script>
</body>
</html>
