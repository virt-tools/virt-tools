<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="/assets/theme-init.js"></script>
<title>CSS File Upload Button Generator — Virtual Tools</title>
<link rel="stylesheet" href="/assets/style.css">
<style>
.tool-wrap{max-width:800px;margin:0 auto;}
.tool-desc{font-size:14px;color:var(--text-secondary,#aaa);margin:8px 0 20px;}
.controls{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin:12px 0;}
.ctrl{display:flex;flex-direction:column;gap:4px;}
.ctrl label{font-size:12px;color:var(--text-secondary,#888);}
.ctrl input,.ctrl select{padding:6px 8px;border-radius:6px;border:1px solid var(--border,#444);background:var(--bg,#1e2230);color:var(--text,#eee);font-size:13px;font-family:inherit;}
button.action{padding:8px 16px;border-radius:6px;border:1px solid var(--border,#444);background:var(--card,#2a2f3e);color:var(--text,#eee);cursor:pointer;font-size:13px;margin:4px 4px 0 0;}
.preview{border:1px solid var(--border,#444);border-radius:8px;margin:12px 0;overflow:hidden;}
.code-block{background:var(--bg,#1e2230);border:1px solid var(--border,#444);border-radius:8px;padding:12px;margin:8px 0;font-family:monospace;font-size:11px;color:var(--text,#eee);white-space:pre-wrap;word-break:break-all;max-height:400px;overflow:auto;}
</style>
</head>
<body>
<header id="site-header"></header>
<main>
<div class="tool-wrap">
<h1>📎 CSS File Upload Button Generator</h1>
<p class="tool-desc">Create styled CSS file upload buttons with 6 styles, custom colors, and drag-drop zone look. Copy HTML+CSS.</p>
<div class="controls">
<div class="ctrl"><label>Style</label><select id="style" onchange="render()"><option value="button" selected>Button</option><option value="dropzone">Drop Zone</option><option value="inline">Inline</option><option value="card">Card</option><option value="glass">Glass</option><option value="neon">Neon</option></select></div>
<div class="ctrl"><label>Accent Color</label><input type="color" id="accent" value="#6c5ce7" oninput="render()"></div>
<div class="ctrl"><label>Background</label><input type="color" id="bgcol" value="#f5f5f5" oninput="render()"></div>
<div class="ctrl"><label>Text Color</label><input type="color" id="tcol" value="#2d3436" oninput="render()"></div>
<div class="ctrl"><label>Border Color</label><input type="color" id="bcol" value="#dfe6e9" oninput="render()"></div>
<div class="ctrl"><label>Radius</label><input type="range" id="radius" min="0" max="30" value="12" oninput="render()" style="width:100%"></div>
<div class="ctrl"><label>Padding</label><input type="range" id="pad" min="8" max="40" value="20" oninput="render()" style="width:100%"></div>
</div>
<div style="margin:8px 0;"><button class="action" onclick="copyCode()">Copy HTML+CSS</button></div>
<div class="preview" id="prev"></div>
<div class="code-block" id="code"></div>
</div>
</main>
<script src="/assets/app.js"></script>
<script>
let codeText='';
function v(id){return document.getElementById(id).value;}
function render(){
const style=v('style'),accent=v('accent'),bgcol=v('bgcol'),tcol=v('tcol'),bcol=v('bcol'),rad=v('radius'),pad=v('pad');
let css='',html='';
if(style==='button'){
css=`.upload-btn {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: ${pad}px ${pad*2}px;
  background: ${accent};
  color: #fff;
  border: none;
  border-radius: ${rad}px;
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
  transition: opacity 0.2s, transform 0.1s;
}
.upload-btn:hover { opacity: 0.9; }
.upload-btn:active { transform: scale(0.97); }
.upload-btn input { display: none; }`;
html=`<label class="upload-btn">
  <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
  Choose File
  <input type="file">
</label>`;
}else if(style==='dropzone'){
css=`.upload-dropzone {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 8px;
  padding: ${pad*2}px ${pad*3}px;
  background: ${bgcol};
  border: 2px dashed ${bcol};
  border-radius: ${rad}px;
  color: ${tcol};
  cursor: pointer;
  transition: border-color 0.2s, background 0.2s;
  text-align: center;
}
.upload-dropzone:hover {
  border-color: ${accent};
  background: ${accent}10;
}
.upload-dropzone svg { color: ${accent}; }
.upload-dropzone input { display: none; }
.upload-dropzone .dz-text { font-size: 15px; font-weight: 600; }
.upload-dropzone .dz-hint { font-size: 12px; opacity: 0.5; }`;
html=`<label class="upload-dropzone">
  <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
  <span class="dz-text">Drop files here or click to browse</span>
  <span class="dz-hint">Max 10MB</span>
  <input type="file">
</label>`;
}else if(style==='inline'){
css=`.upload-inline {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 8px 14px;
  background: ${bgcol};
  border: 1px solid ${bcol};
  border-radius: ${rad}px;
  color: ${tcol};
  font-size: 14px;
  cursor: pointer;
  transition: border-color 0.2s;
}
.upload-inline:hover { border-color: ${accent}; }
.upload-inline svg { color: ${accent}; }
.upload-inline input { display: none; }`;
html=`<label class="upload-inline">
  <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
  Browse files...
  <input type="file">
</label>`;
}else if(style==='card'){
css=`.upload-card {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 12px;
  padding: ${pad*2}px ${pad*3}px;
  background: ${bgcol};
  border: 1px solid ${bcol};
  border-radius: ${rad}px;
  color: ${tcol};
  text-align: center;
  cursor: pointer;
  transition: box-shadow 0.2s, border-color 0.2s;
}
.upload-card:hover {
  border-color: ${accent};
  box-shadow: 0 4px 12px ${accent}20;
}
.upload-card .uc-icon {
  width: 48px; height: 48px;
  border-radius: 50%;
  background: ${accent}15;
  display: flex; align-items: center; justify-content: center;
  color: ${accent};
}
.upload-card .uc-text { font-size: 15px; font-weight: 600; }
.upload-card .uc-hint { font-size: 12px; opacity: 0.5; }
.upload-card input { display: none; }`;
html=`<label class="upload-card">
  <div class="uc-icon"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg></div>
  <span class="uc-text">Upload your file</span>
  <span class="uc-hint">Click to browse</span>
  <input type="file">
</label>`;
}else if(style==='glass'){
css=`.upload-glass {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 8px;
  padding: ${pad*2}px ${pad*3}px;
  background: rgba(255,255,255,0.1);
  backdrop-filter: blur(10px);
  border: 1px solid rgba(255,255,255,0.2);
  border-radius: ${rad}px;
  color: #fff;
  cursor: pointer;
  text-align: center;
  transition: background 0.2s;
}
.upload-glass:hover { background: rgba(255,255,255,0.15); }
.upload-glass svg { color: ${accent}; }
.upload-glass input { display: none; }`;
html=`<label class="upload-glass">
  <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
  Drop files here
  <input type="file">
</label>`;
}else if(style==='neon'){
css=`.upload-neon {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: ${pad}px ${pad*2}px;
  background: #1a1a2e;
  color: ${accent};
  border: 2px solid ${accent};
  border-radius: ${rad}px;
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
  box-shadow: 0 0 15px ${accent}40, inset 0 0 5px ${accent}20;
  transition: box-shadow 0.2s;
}
.upload-neon:hover { box-shadow: 0 0 25px ${accent}80, inset 0 0 10px ${accent}40; }
.upload-neon input { display: none; }`;
html=`<label class="upload-neon">
  <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
  Upload File
  <input type="file">
</label>`;
}
document.getElementById('prev').innerHTML='<div style="padding:20px;background:'+(style==='glass'||style==='neon'?'#0a0a1a':'#fff')+';display:flex;justify-content:center;align-items:center;min-height:120px;">'+html+'</div>';
codeText=`<style>
${css}
</style>

${html}`;
document.getElementById('code').textContent=codeText;
}
function copyCode(){navigator.clipboard.writeText(codeText).then(()=>alert('Copied!'));}
render();
</script>
</body>
</html>
