<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <script src="/assets/theme-init.js"></script>
  <title>Prime Factorization & Number Explorer — Virtual Tools</title>
  <link rel="stylesheet" href="/assets/style.css">
  <style>
    .tool-wrap { max-width: 640px; margin: 0 auto; }
    .field { margin-bottom: 16px; }
    .field label { display: block; font-weight: 600; margin-bottom: 4px; font-size: 14px; }
    .field input { width: 100%; background: var(--bg-panel,#11151c); color: var(--text,#d4d9e0); border: 1px solid var(--border,#2a2f3a); border-radius: 8px; padding: 10px 12px; font-size: 18px; box-sizing: border-box; }
    .result-card { background: var(--bg-panel,#11151c); border: 1px solid var(--border,#2a2f3a); border-radius: 12px; padding: 20px; margin-top: 16px; }
    .factor-tree { font-family: 'SF Mono', 'Fira Code', monospace; font-size: 14px; line-height: 1.8; white-space: pre; overflow-x: auto; }
    .badge { display: inline-block; padding: 4px 12px; border-radius: 20px; font-size: 13px; font-weight: 700; }
    .badge.prime { background: #2d7d46; color: #fff; }
    .badge.composite { background: #8b5a2b; color: #fff; }
    .badge.one { background: #555; color: #fff; }
    .factor-chips { display: flex; flex-wrap: wrap; gap: 8px; margin: 12px 0; }
    .chip { background: var(--bg-panel,#11151c); border: 1px solid var(--accent,#6ea8fe); color: var(--accent,#6ea8fe); border-radius: 8px; padding: 6px 14px; font-size: 15px; font-weight: 600; }
    .chip .exp { opacity: .5; font-weight: 400; }
    .nearby-primes { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
    .nearby-primes span { background: var(--bg-panel,#11151c); border: 1px solid var(--border,#2a2f3a); border-radius: 6px; padding: 4px 10px; font-size: 13px; }
    .nearby-primes span.target { border-color: #2d7d46; color: #2d7d46; font-weight: 700; }
    .row { display: flex; gap: 12px; }
    .row .field { flex: 1; }
    table { width: 100%; border-collapse: collapse; margin-top: 8px; font-size: 14px; }
    td { padding: 6px 8px; border-bottom: 1px solid var(--border,#2a2f3a); }
    td:first-child { font-weight: 600; color: var(--accent,#6ea8fe); }
  </style>
</head>
<body>
  <div id="site-header"></div>
  <main>
    <div class="tool-header">
      <a class="back" href="/">← All tools</a>
      <h1>Prime Factorization & Number Explorer</h1>
      <p>Factor any integer into its prime components, check primality, view the factorization tree, and explore nearby primes. All calculations are done in your browser — no data leaves your device.</p>
    </div>
    <div class="panel tool-wrap">
      <div class="field">
        <label for="num">Enter a number (up to 10¹⁵)</label>
        <input type="number" id="num" value="840" min="0" max="1e15" step="1" inputmode="numeric">
      </div>
      <div class="result-card" id="result"></div>
    </div>
  </main>
  <script src="/assets/app.js"></script>
  <script>
  (function() {
    const input = document.getElementById('num');
    const result = document.getElementById('result');

    function isPrime(n) {
      if (n < 2) return false;
      if (n < 4) return true;
      if (n % 2 === 0) return false;
      if (n % 3 === 0) return n === 3;
      for (let i = 5, s = Math.floor(Math.sqrt(n)); i <= s; i += 6) {
        if (n % i === 0 || n % (i + 2) === 0) return false;
      }
      return true;
    }

    function factorize(n) {
      const factors = [];
      let d = 2;
      while (d * d <= n) {
        while (n % d === 0) { factors.push(d); n = n / d; }
        d += d === 2 ? 1 : 2;
      }
      if (n > 1) factors.push(n);
      return factors;
    }

    function groupFactors(factors) {
      const map = new Map();
      factors.forEach(f => map.set(f, (map.get(f) || 0) + 1));
      return [...map.entries()].map(([p, e]) => ({ p, e }));
    }

    function treeStr(n, indent) {
      if (n < 2) return indent + String(n);
      if (isPrime(n)) return indent + String(n) + ' (prime)';
      let p = 2;
      while (n % p !== 0) p = p === 2 ? 3 : p + 2;
      const q = n / p;
      return indent + String(n) + '\n' +
             indent + '├── ' + p + ' (prime)\n' +
             treeStr(q, indent + '└── ');
    }

    function nearbyPrimes(n) {
      const primes = [];
      let lower = Math.max(2, n - 20);
      let upper = n + 20;
      for (let i = lower; i <= upper; i++) if (isPrime(i)) primes.push(i);
      return primes;
    }

    function formatFactors(groups) {
      if (groups.length === 0) return '—';
      return groups.map(g => g.e > 1 ? g.p + '<span class="exp">^' + g.e + '</span>' : String(g.p)).join(' × ');
    }

    function divisorsCount(groups) {
      return groups.reduce((a, g) => a * (g.e + 1), 1);
    }

    function sumDivisors(groups) {
      let sum = 1;
      groups.forEach(g => {
        let pow = 1, term = 0;
        for (let i = 0; i <= g.e; i++) { term += pow; pow *= g.p; }
        sum *= term;
      });
      return sum;
    }

    function render() {
      const n = parseInt(input.value);
      if (isNaN(n) || n < 0) { result.innerHTML = '<p style="opacity:.6">Enter a positive integer.</p>'; return; }
      if (n === 0) { result.innerHTML = '<p><span class="badge one">special</span> 0 has no prime factorization (it is divisible by every prime).</p>'; return; }
      if (n === 1) {
        result.innerHTML = '<p><span class="badge one">unit</span> 1 has no prime factors. It is the empty product.</p>';
        return;
      }
      const prime = isPrime(n);
      const factors = factorize(n);
      const groups = groupFactors(factors);
      const badge = prime ? '<span class="badge prime">prime</span>' : '<span class="badge composite">composite</span>';
      const dCount = divisorsCount(groups);
      const dSum = sumDivisors(groups);

      let html = '<div style="margin-bottom:12px"><span style="font-size:28px;font-weight:800">' + n + '</span> ' + badge + '</div>';
      html += '<div class="factor-chips">' + formatFactors(groups).split(' × ').map(p => '<div class="chip">' + p + '</div>').join('') + '</div>';
      html += '<table>';
      html += '<tr><td>Factorization</td><td>' + groups.map(g => g.e > 1 ? g.p + '<sup>' + g.e + '</sup>' : g.p).join(' × ') + '</td></tr>';
      html += '<tr><td>Number of factors</td><td>' + dCount + '</td></tr>';
      html += '<tr><td>Sum of all factors</td><td>' + dSum + '</td></tr>';
      html += '<tr><td>Proper sum (aliquot)</td><td>' + (dSum - n) + '</td></tr>';
      const aliq = dSum - n;
      if (n > 1) {
        if (aliq === n) html += '<tr><td>Classification</td><td>Perfect number</td></tr>';
        else if (aliq > n) html += '<tr><td>Classification</td><td>Abundant (aliquot &gt; n)</td></tr>';
        else html += '<tr><td>Classification</td><td>Deficient (aliquot &lt; n)</td></tr>';
      }
      html += '</table>';

      if (n <= 1e6) {
        html += '<h3 style="margin-top:18px;font-size:15px">Factorization Tree</h3>';
        html += '<pre class="factor-tree">' + treeStr(n, '') + '</pre>';
      }

      html += '<h3 style="margin-top:18px;font-size:15px">Nearby Primes (±20)</h3>';
      const nearby = nearbyPrimes(n);
      html += '<div class="nearby-primes">' + nearby.map(p => '<span class="' + (p === n ? 'target' : '') + '">' + p + '</span>').join('') + '</div>';
      if (nearby.length === 0) html += '<p style="opacity:.5">None found in range.</p>';

      result.innerHTML = html;
    }

    input.addEventListener('input', render);
    render();
  })();
  </script>
</body>
</html>
