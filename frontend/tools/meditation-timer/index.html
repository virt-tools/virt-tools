<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="/assets/theme-init.js"></script>
<title>Meditation Timer — Virtual Tools</title>
<link rel="stylesheet" href="/assets/style.css">
<style>
.tool-wrap{max-width:500px;margin:0 auto;}
.tool-desc{font-size:14px;color:var(--text-secondary,#aaa);margin:8px 0 16px;}
.setup{background:var(--bg-alt,#1a1f2e);border-radius:12px;padding:24px;margin-bottom:20px;}
.setup label{display:block;font-size:13px;color:var(--text-secondary,#888);margin-bottom:6px;}
.setup select,.setup input{width:100%;padding:10px;border-radius:8px;border:1px solid var(--border,#444);background:var(--bg,#2a2f3e);color:var(--text,#eee);font-size:14px;margin-bottom:16px;}
.setup select:focus,.setup input:focus{outline:none;border-color:var(--accent,#5b8def);}
.timer-display{text-align:center;padding:40px 0;}
.timer-ring{width:280px;height:280px;border-radius:50%;border:4px solid var(--border,#333);position:relative;margin:0 auto;display:flex;align-items:center;justify-content:center;}
.timer-ring svg{position:absolute;top:0;left:0;transform:rotate(-90deg);}
.timer-ring circle{fill:none;stroke:var(--accent,#5b8def);stroke-width:4;stroke-linecap:round;transition:stroke-dashoffset 1s linear;}
.timer-text{font-size:48px;font-weight:bold;color:var(--text,#eee);position:relative;z-index:1;}
.phase{font-size:14px;color:var(--text-secondary,#888);text-align:center;margin-top:8px;text-transform:uppercase;letter-spacing:2px;}
.controls{display:flex;gap:12px;justify-content:center;margin-top:24px;}
.btn{padding:12px 32px;border-radius:10px;border:none;background:var(--accent,#5b8def);color:#fff;cursor:pointer;font-size:14px;}
.btn:hover{opacity:0.9;}
.btn.secondary{background:var(--bg-alt,#1a1f2e);border:1px solid var(--border,#444);color:var(--text,#eee);}
.preset-btn{padding:8px 16px;border-radius:8px;border:1px solid var(--border,#444);background:var(--bg,#2a2f3e);color:var(--text,#eee);cursor:pointer;font-size:13px;margin:4px;}
.preset-btn:hover{border-color:var(--accent,#5b8def);}
</style>
</head>
<body>
<header id="site-header"></header>
<main>
<div class="tool-wrap">
<h1>Meditation Timer 🧘</h1>
<p class="tool-desc">Silent meditation timer with configurable intervals and bell sounds. Set your session length, choose a bell, and meditate.</p>
<div class="setup" id="setup">
<label>Total session length (minutes)</label>
<div>
<button class="preset-btn" onclick="setMin(5)">5</button>
<button class="preset-btn" onclick="setMin(10)">10</button>
<button class="preset-btn" onclick="setMin(15)">15</button>
<button class="preset-btn" onclick="setMin(20)">20</button>
<button class="preset-btn" onclick="setMin(30)">30</button>
<button class="preset-btn" onclick="setMin(45)">45</button>
</div>
<input type="number" id="minutes" value="10" min="1" max="180">
<label>Interval bell every (minutes, 0 = off)</label>
<input type="number" id="interval" value="0" min="0" max="60">
<label>Bell sound</label>
<select id="bell">
<option value="singing">Singing Bowl</option>
<option value="chime">Chime</option>
<option value="gong">Gong</option>
<option value="none">None</option>
</select>
<button class="btn" style="width:100%" onclick="start()">Begin Meditation</button>
</div>
<div id="timerView" style="display:none">
<div class="timer-display">
<div class="timer-ring">
<svg width="280" height="280">
<circle cx="140" cy="140" r="136" id="progress" stroke-dasharray="854.5" stroke-dashoffset="0"/>
</svg>
<div class="timer-text" id="time">10:00</div>
</div>
<div class="phase" id="phase">Meditating</div>
</div>
<div class="controls">
<button class="btn secondary" onclick="pause()" id="pauseBtn">Pause</button>
<button class="btn secondary" onclick="stop()">Stop</button>
</div>
</div>
</div>
</main>
<script src="/assets/app.js"></script>
<script>
let totalSec=0,remaining=0,intervalSec=0,intTimer=null,timer=null,paused=false,ctx=null;
const CIRC=2*Math.PI*136;
function setMin(m){document.getElementById('minutes').value=m;}
function playBell(type){
if(type==='none')return;
if(!ctx)ctx=new (window.AudioContext||window.webkitAudioContext)();
const o=ctx.createOscillator(),g=ctx.createGain();
o.connect(g);g.connect(ctx.destination);
if(type==='singing'){
o.frequency.setValueAtTime(440,ctx.currentTime);
o.frequency.exponentialRampToValueAtTime(220,ctx.currentTime+3);
g.gain.setValueAtTime(0.3,ctx.currentTime);
g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+3);
o.start();o.stop(ctx.currentTime+3);
}else if(type==='chime'){
[523.25,659.25,783.99].forEach((f,i)=>{
const o2=ctx.createOscillator(),g2=ctx.createGain();
o2.connect(g2);g2.connect(ctx.destination);
o2.frequency.value=f;
g2.gain.setValueAtTime(0,ctx.currentTime+i*0.15);
g2.gain.linearRampToValueAtTime(0.2,ctx.currentTime+i*0.15+0.05);
g2.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+i*0.15+2);
o2.start(ctx.currentTime+i*0.15);o2.stop(ctx.currentTime+i*0.15+2);
});
}else if(type==='gong'){
o.type='sine';
o.frequency.setValueAtTime(110,ctx.currentTime);
o.frequency.exponentialRampToValueAtTime(55,ctx.currentTime+4);
g.gain.setValueAtTime(0.4,ctx.currentTime);
g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+4);
o.start();o.stop(ctx.currentTime+4);
}
}
function start(){
const m=parseInt(document.getElementById('minutes').value)||10;
const iv=parseInt(document.getElementById('interval').value)||0;
const bell=document.getElementById('bell').value;
totalSec=m*60;remaining=totalSec;intervalSec=iv*60;
document.getElementById('setup').style.display='none';
document.getElementById('timerView').style.display='block';
paused=false;
playBell(bell);
timer=setInterval(tick,1000);
}
function tick(){
if(paused)return;
remaining--;
updateDisplay();
if(remaining<=0){
clearInterval(timer);
document.getElementById('phase').textContent='Complete';
playBell(document.getElementById('bell').value);
return;
}
if(intervalSec>0&&remaining%intervalSec===0&&remaining!==totalSec){
playBell(document.getElementById('bell').value);
document.getElementById('phase').textContent='Interval';
setTimeout(()=>{if(remaining>0)document.getElementById('phase').textContent='Meditating';},3000);
}
}
function updateDisplay(){
const m=Math.floor(remaining/60),s=remaining%60;
document.getElementById('time').textContent=`${m}:${String(s).padStart(2,'0')}`;
const offset=CIRC*(1-remaining/totalSec);
document.getElementById('progress').style.strokeDashoffset=offset;
}
function pause(){
paused=!paused;
document.getElementById('pauseBtn').textContent=paused?'Resume':'Pause';
}
function stop(){
clearInterval(timer);
document.getElementById('setup').style.display='block';
document.getElementById('timerView').style.display='none';
}
</script>
</body>
</html>
