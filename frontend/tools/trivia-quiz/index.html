<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="/assets/theme-init.js"></script>
<title>Trivia Quiz — Virtual Tools</title>
<link rel="stylesheet" href="/assets/style.css">
<style>
.tool-wrap{max-width:600px;margin:0 auto;}
.cat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:10px;margin:15px 0;}
.cat-btn{padding:14px 10px;border-radius:10px;border:2px solid var(--border,#333);background:var(--bg-alt,#1a1f2e);color:var(--text,#e0e0e0);cursor:pointer;font-size:15px;text-align:center;transition:border-color .2s;}
.cat-btn:hover{border-color:#1565c0;}
.cat-btn.selected{border-color:#1565c0;background:#1565c0;color:#fff;}
.q-card{background:var(--bg-alt,#1a1f2e);border-radius:12px;padding:20px;margin:15px 0;border:1px solid var(--border,#333);}
.q-num{font-size:13px;color:var(--text-dim,#888);margin-bottom:8px;}
.q-text{font-size:20px;font-weight:600;margin-bottom:16px;line-height:1.4;}
.ans-btn{display:block;width:100%;padding:14px;margin:6px 0;border-radius:8px;border:2px solid var(--border,#333);background:var(--bg,#0d1117);color:var(--text,#e0e0e0);cursor:pointer;font-size:16px;text-align:left;transition:all .15s;}
.ans-btn:hover{border-color:#1565c0;}
.ans-btn.correct{border-color:#4caf50;background:rgba(76,175,80,.15);}
.ans-btn.wrong{border-color:#f44336;background:rgba(244,67,54,.15);}
.ans-btn:disabled{cursor:default;}
.score-bar{display:flex;justify-content:space-between;align-items:center;margin:10px 0;font-size:15px;}
.progress{height:6px;border-radius:3px;background:var(--bg-alt,#1a1f2e);margin:8px 0;overflow:hidden;}
.progress-fill{height:100%;background:#1565c0;transition:width .3s;}
.result-card{text-align:center;padding:30px;background:var(--bg-alt,#1a1f2e);border-radius:12px;margin:15px 0;border:1px solid var(--border,#333);}
.result-score{font-size:48px;font-weight:800;color:#1565c0;margin:10px 0;}
.restart-btn{padding:12px 28px;border-radius:8px;border:none;background:#1565c0;color:#fff;cursor:pointer;font-size:16px;margin:10px 0;}
.diff-row{display:flex;gap:8px;margin:10px 0;}
.diff-btn{padding:6px 16px;border-radius:6px;border:1px solid var(--border,#333);background:var(--bg-alt);color:var(--text);cursor:pointer;font-size:14px;}
.diff-btn.active{background:#1565c0;color:#fff;border-color:#1565c0;}
</style>
</head>
<body>
<header id="site-header"></header>
<main>
<div class="tool-wrap">
<h1>Trivia Quiz</h1>
<p class="tool-desc">Test your knowledge with 200+ trivia questions across 8 categories. Multiple choice, instant feedback, score tracking. All client-side — no data collected.</p>

<div id="setupDiv">
<h3>Choose categories</h3>
<div class="cat-grid" id="catGrid"></div>
<h3 style="margin-top:15px;">Difficulty</h3>
<div class="diff-row">
<button class="diff-btn active" onclick="setDiff('all')" id="diffAll">All</button>
<button class="diff-btn" onclick="setDiff('easy')" id="diffEasy">Easy</button>
<button class="diff-btn" onclick="setDiff('medium')" id="diffMedium">Medium</button>
<button class="diff-btn" onclick="setDiff('hard')" id="diffHard">Hard</button>
</div>
<button class="restart-btn" onclick="startQuiz()">Start Quiz (10 questions)</button>
</div>

<div id="quizDiv" style="display:none;">
<div class="score-bar"><span id="scoreText">Score: 0</span><span id="qCounter">Q 1/10</span></div>
<div class="progress"><div class="progress-fill" id="progressFill" style="width:10%"></div></div>
<div class="q-card">
<div class="q-num" id="qCategory"></div>
<div class="q-text" id="qText"></div>
<div id="answers"></div>
</div>
</div>

<div id="resultDiv" style="display:none;">
<div class="result-card">
<h2>Quiz Complete!</h2>
<div class="result-score" id="finalScore">0/10</div>
<p id="resultMsg"></p>
<button class="restart-btn" onclick="resetQuiz()">Play Again</button>
</div>
</div>
</div>
</main>
<script src="/assets/app.js"></script>

const CATEGORIES=[...new Set(QUESTIONS.map(q=>q.cat))];
let selectedCats=new Set(CATEGORIES);
let difficulty='all';
let quizQuestions=[];
let currentQ=0;
let score=0;
let answered=false;

function init(){
const grid=document.getElementById('catGrid');
CATEGORIES.forEach(cat=>{
const b=document.createElement('button');b.className='cat-btn selected';
b.textContent=cat;b.onclick=()=>{
if(selectedCats.has(cat)){selectedCats.delete(cat);b.classList.remove('selected');}
else{selectedCats.add(cat);b.classList.add('selected');}
};
grid.appendChild(b);
});
}

function setDiff(d){
difficulty=d;
['All','Easy','Medium','Hard'].forEach(label=>{
document.getElementById('diff'+label).classList.toggle('active',label.toLowerCase()===d);
});
}

function startQuiz(){
let pool=QUESTIONS.filter(q=>selectedCats.has(q.cat)&&(difficulty==='all'||q.diff===difficulty));
if(pool.length<10){alert('Not enough questions for selected filters. Please select more categories.');return;}
for(let i=pool.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[pool[i],pool[j]]=[pool[j],pool[i]];}
quizQuestions=pool.slice(0,10);
currentQ=0;score=0;
document.getElementById('setupDiv').style.display='none';
document.getElementById('resultDiv').style.display='none';
document.getElementById('quizDiv').style.display='block';
showQuestion();
}

function showQuestion(){
answered=false;
const q=quizQuestions[currentQ];
document.getElementById('qCategory').textContent=`${q.cat} • ${q.diff}`;
document.getElementById('qText').textContent=q.q;
document.getElementById('qCounter').textContent=`Q ${currentQ+1}/10`;
document.getElementById('scoreText').textContent=`Score: ${score}`;
document.getElementById('progressFill').style.width=((currentQ+1)/10*100)+'%';
const ansDiv=document.getElementById('answers');
ansDiv.innerHTML='';
const order=[...q.a.keys()];
for(let i=order.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[order[i],order[j]]=[order[j],order[i]];}
order.forEach(idx=>{
const b=document.createElement('button');b.className='ans-btn';
b.textContent=q.a[idx];b.onclick=()=>answer(idx,b);
ansDiv.appendChild(b);
});
}

function answer(idx,btn){
if(answered)return;answered=true;
const q=quizQuestions[currentQ];
const allBtns=document.querySelectorAll('.ans-btn');
allBtns.forEach((b,i)=>{
b.disabled=true;
const ansIdx=order[i];
});
btn.classList.add(idx===q.c?'correct':'wrong');
if(idx===q.c)score++;
if(idx!==q.c){
allBtns.forEach((b,i)=>{
const order2=[...q.a.keys()];
});
allBtns.forEach((b,i)=>{
const arr=[...q.a.keys()];
const sorted=arr.sort((a,b2)=>a-b2);
});
}
allBtns.forEach((b,i)=>{
const opts=document.querySelectorAll('.ans-btn');
const qi=quizQuestions[currentQ];
opts.forEach((bb,ii)=>{
const o=[...qi.a.keys()].sort((a,b2)=>a-b2);
});
});
allBtns.forEach((b,i)=>{});
const correctBtn=[...allBtns].find((b,i)=>{
const order2=[...q.a.keys()].sort((a,b2)=>a-b2);
return order2[i]===q.c;
});
if(correctBtn)correctBtn.classList.add('correct');
document.getElementById('scoreText').textContent=`Score: ${score}`;
setTimeout(()=>{
currentQ++;
if(currentQ>=10)showResult();else showQuestion();
},1500);
}

function showResult(){
document.getElementById('quizDiv').style.display='none';
document.getElementById('resultDiv').style.display='block';
document.getElementById('finalScore').textContent=`${score}/10`;
const msgs=score>=9?"Brilliant!":score>=7?"Great job!":score>=5?"Not bad!":score>=3?"Keep learning!":"Better luck next time!";
document.getElementById('resultMsg').textContent=msgs;
}

function resetQuiz(){
document.getElementById('resultDiv').style.display='none';
document.getElementById('setupDiv').style.display='block';
}
VT.ready(init);
</script>
</body>
</html>
