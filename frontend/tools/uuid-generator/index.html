<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <script src="/assets/theme-init.js"></script>
  <title>UUID Generator — Virtual Tools</title>
  <link rel="stylesheet" href="/assets/style.css">
</head>
<body>
  <div id="site-header"></div>
  <main>
    <div class="tool-header">
      <a class="back" href="/">← All tools</a>
      <h1>UUID Generator</h1>
      <p>Generate RFC 4122 version 4 UUIDs with <code>crypto.randomUUID()</code> — cryptographically random, entirely in your browser.</p>
    </div>

    <div class="panel">
      <div class="row">
        <div>
          <label for="count">How many</label>
          <select id="count">
            <option>1</option>
            <option selected>5</option>
            <option>10</option>
            <option>50</option>
          </select>
        </div>
        <label class="check" style="align-self:flex-end;"><input type="checkbox" id="upper"> Uppercase</label>
        <label class="check" style="align-self:flex-end;"><input type="checkbox" id="nohyphen"> No hyphens</label>
      </div>
      <div class="spacer"></div>
      <button id="generate">Generate</button>
      <button id="copy" class="secondary">Copy all</button>

      <div class="spacer"></div>
      <label for="out">UUIDs</label>
      <div class="output" id="out" style="white-space:pre-wrap; word-break:break-all;"></div>
      <p class="note">Generated locally — no network requests.</p>
    </div>
  </main>

  <script src="/assets/app.js"></script>
  <script>
  (function () {
    var out = document.getElementById("out");
    var upper = document.getElementById("upper");
    var nohyphen = document.getElementById("nohyphen");
    var last = "";

    function uuidv4() {
      // Prefer the native CSPRNG-backed generator.
      if (crypto.randomUUID) return crypto.randomUUID();
      // Fallback: RFC 4122 v4 from getRandomValues.
      var b = new Uint8Array(16);
      crypto.getRandomValues(b);
      b[6] = (b[6] & 0x0f) | 0x40;
      b[8] = (b[8] & 0x3f) | 0x80;
      var h = [];
      for (var i = 0; i < 16; i++) h.push(b[i].toString(16).padStart(2, "0"));
      return h.slice(0, 4).join("") + "-" + h.slice(4, 6).join("") + "-" +
        h.slice(6, 8).join("") + "-" + h.slice(8, 10).join("") + "-" + h.slice(10, 16).join("");
    }

    function fmt(u) {
      if (nohyphen.checked) u = u.replace(/-/g, "");
      if (upper.checked) u = u.toUpperCase();
      return u;
    }

    function generate() {
      var n = parseInt(document.getElementById("count").value, 10) || 1;
      var lines = [];
      for (var i = 0; i < n; i++) lines.push(fmt(uuidv4()));
      last = lines.join("\n");
      out.textContent = last;
    }

    document.getElementById("generate").addEventListener("click", generate);

    document.getElementById("copy").addEventListener("click", function () {
      if (!last) return;
      var btn = this;
      if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(last).then(function () {
          btn.textContent = "Copied!"; setTimeout(function () { btn.textContent = "Copy all"; }, 1200);
        });
      } else {
        var ta = document.createElement("textarea");
        ta.value = last; document.body.appendChild(ta); ta.select();
        try { document.execCommand("copy"); btn.textContent = "Copied!"; setTimeout(function () { btn.textContent = "Copy all"; }, 1200); }
        catch (e) {}
        ta.remove();
      }
    });

    upper.addEventListener("change", generate);
    nohyphen.addEventListener("change", generate);
    document.getElementById("count").addEventListener("change", generate);

    generate();
  })();
  </script>
</body>
</html>
