<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CSS Copy Button Generator — virt.tools</title>
<link rel="stylesheet" href="/assets/style.css">
<style>
.tool-area{max-width:900px;margin:2rem auto;padding:0 1rem}
.controls{display:grid;gap:1rem;margin:1.5rem 0;padding:1.5rem;background:#1a1a2e;border-radius:12px}
.control-row{display:flex;gap:1rem;align-items:center;flex-wrap:wrap}
.control-row label{min-width:120px;font-weight:600;font-size:.9rem}
.control-row select,.control-row input{padding:.5rem .75rem;border-radius:8px;border:1px solid #444;background:#0f0f1e;color:#eee;font-size:.9rem}
.preview-box{margin:1.5rem 0;background:#1a1a2e;border-radius:12px;min-height:120px;display:flex;align-items:center;justify-content:center;gap:1rem;flex-wrap:wrap;padding:2rem}
.output-block{margin:2rem 0}
.output-block textarea{width:100%;min-height:100px;font-family:monospace;font-size:.85rem;padding:1rem;border-radius:8px;border:1px solid #444;background:#0f0f1e;color:#eee;resize:vertical}
.copy-btn{padding:.6rem 1.2rem;border:none;border-radius:8px;background:#667eea;color:#fff;cursor:pointer;font-size:.9rem;margin-top:.5rem}
h2{margin-top:2rem;font-size:1.2rem}
</style>
</head>
<body>
<header id="site-header"></header>
<main>
<div class="tool-area">
<h1>📋 CSS Copy Button Generator</h1>
<p>Create CSS copy-to-clipboard buttons with click feedback animation. 5 styles, customizable colors. Copy HTML+CSS+JS.</p>
<div class="controls">
<div class="control-row">
<label>Style</label><select id="style"><option value="solid">Solid</option><option value="outline">Outline</option><option value="gradient">Gradient</option><option value="ghost">Ghost</option><option value="pill">Pill</option></select>
<label>Label</label><input type="text" id="label" value="Copy" style="width:100px">
<label>Copied Label</label><input type="text" id="copiedLabel" value="Copied!" style="width:100px">
</div>
<div class="control-row">
<label>Bg Color</label><input type="color" id="bgColor" value="#667eea">
<label>Text Color</label><input type="color" id="textColor" value="#ffffff">
<label>Radius</label><input type="range" id="radius" value="8" min="0" max="50" style="width:100px">
<label>Size</label><select id="size"><option value="sm">Small</option><option value="md" selected>Medium</option><option value="lg">Large</option></select>
</div>
</div>
<h2>Preview</h2>
<div class="preview-box" id="preview"></div>
<h2>HTML</h2><div class="output-block"><textarea id="htmlOut" readonly></textarea><button class="copy-btn" onclick="copyText('htmlOut')">Copy HTML</button></div>
<h2>CSS</h2><div class="output-block"><textarea id="cssOut" readonly></textarea><button class="copy-btn" onclick="copyText('cssOut')">Copy CSS</button></div>
<h2>JS</h2><div class="output-block"><textarea id="jsOut" readonly></textarea><button class="copy-btn" onclick="copyText('jsOut')">Copy JS</button></div>
</div>
</main>
<script src="/assets/app.js"></script>
<script>
function update(){
var s=document.getElementById('style').value;
var lb=document.getElementById('label').value;
var cl=document.getElementById('copiedLabel').value;
var bg=document.getElementById('bgColor').value;
var tc=document.getElementById('textColor').value;
var r=document.getElementById('radius').value;
var sz=document.getElementById('size').value;
var pad=sz==='sm'?'6px 14px':sz==='lg'?'12px 28px':'8px 20px';
var fs=sz==='sm'?'0.8rem':sz==='lg'?'1.1rem':'0.9rem';
var html='<button class="copy-button" data-text="Hello World!">'+lb+'</button>';
var css='.copy-button{padding:'+pad+';font-size:'+fs+';border-radius:'+r+'px;cursor:pointer;transition:all .3s ease;font-family:sans-serif;';
if(s==='solid'){css+='background:'+bg+';color:'+tc+';border:2px solid '+bg+'}
else if(s==='outline'){css+='background:transparent;color:'+bg+';border:2px solid '+bg+'}
else if(s==='gradient'){css+='background:linear-gradient(135deg,'+bg+','#444);color:'+tc+';border:none}
else if(s==='ghost'){css+='background:transparent;color:'+bg+';border:2px dashed '+bg+'}
else if(s==='pill'){css+='background:'+bg+';color:'+tc+';border:none;border-radius:50px}
css+='}\n';
css+='.copy-button:hover{opacity:0.85;transform:translateY(-1px)}\n';
css+='.copy-button:active{transform:translateY(0)}\n';
css+='.copy-button.copied{background:#4caf50;color:#fff;border-color:#4caf50}\n';
css+='.copy-button .check-icon{display:none;margin-right:4px}\n';
css+='.copy-button.copied .check-icon{display:inline}\n';
var js='document.querySelectorAll(".copy-button").forEach(function(btn){\n  btn.addEventListener("click",function(){\n    var text=btn.getAttribute("data-text");\n    navigator.clipboard.writeText(text);\n    var orig=btn.textContent;\n    btn.classList.add("copied");\n    btn.textContent="'+cl+'";\n    setTimeout(function(){btn.classList.remove("copied");btn.textContent=orig},2000);\n  });\n});';
document.getElementById('htmlOut').value=html;
document.getElementById('cssOut').value=css;
document.getElementById('jsOut').value=js;
var pv=document.getElementById('preview');
pv.innerHTML=html;
var st=document.createElement('style');st.textContent=css;pv.appendChild(st);
var scr=document.createElement('script');scr.textContent=js;pv.appendChild(scr);
}
function copyText(id){var t=document.getElementById(id);t.select();document.execCommand('copy')}
document.querySelectorAll('select,input').forEach(function(e){e.addEventListener('input',update);e.addEventListener('change',update)});
update();
</script>
</body>
</html>
