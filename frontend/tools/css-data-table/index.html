<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CSS Data Table Generator — virt.tools</title>
<link rel="stylesheet" href="/assets/style.css">
<style>
.tool-area{max-width:900px;margin:2rem auto;padding:0 1rem}
.controls{display:grid;gap:1rem;margin:1.5rem 0;padding:1.5rem;background:#1a1a2e;border-radius:12px}
.control-row{display:flex;gap:1rem;align-items:center;flex-wrap:wrap}
.control-row label{min-width:100px;font-weight:600;font-size:.9rem}
.control-row select,.control-row input{padding:.5rem .75rem;border-radius:8px;border:1px solid #444;background:#0f0f1e;color:#eee;font-size:.9rem}
.preview-box{margin:1.5rem 0;border-radius:12px;padding:1.5rem;min-height:200px;background:#2a2a3e;overflow-x:auto}
.output-block{margin:2rem 0}
.output-block textarea{width:100%;min-height:120px;font-family:monospace;font-size:.85rem;padding:1rem;border-radius:8px;border:1px solid #444;background:#0f0f1e;color:#eee;resize:vertical}
.copy-btn{padding:.6rem 1.2rem;border:none;border-radius:8px;background:#667eea;color:#fff;cursor:pointer;font-size:.9rem;margin-top:.5rem}
h2{margin-top:2rem;font-size:1.2rem}
</style>
</head>
<body>
<header id="site-header"></header>
<main>
<div class="tool-area">
<h1>📊 CSS Data Table Generator</h1>
<p>Create styled CSS data table components with sorting indicators. 4 styles, 3 themes, striped rows. Copy HTML+CSS.</p>
<div class="controls">
<div class="control-row">
<label>Style</label><select id="style"><option value="basic" selected>Basic</option><option value="bordered">Bordered</option><option value="card">Card</option><option value="compact">Compact</option></select>
<label>Theme</label><select id="theme"><option value="dark" selected>Dark</option><option value="light">Light</option><option value="stripe">Striped</option></select>
<label>Rows</label><select id="rows"><option value="3">3</option><option value="5" selected>5</option><option value="8">8</option></select>
<label>Accent</label><input type="color" id="accent" value="#667eea">
</div>
</div>
<h2>Preview</h2>
<div class="preview-box" id="preview"></div>
<h2>HTML</h2><div class="output-block"><textarea id="htmlOut" readonly></textarea><button class="copy-btn" onclick="copyText('htmlOut')">Copy HTML</button></div>
<h2>CSS</h2><div class="output-block"><textarea id="cssOut" readonly></textarea><button class="copy-btn" onclick="copyText('cssOut')">Copy CSS</button></div>
</div>
</main>
<script src="/assets/app.js"></script>
<script>
var data=[
['Alice','alice@example.com','Admin','Active'],
['Bob','bob@example.com','Editor','Active'],
['Carol','carol@example.com','Viewer','Inactive'],
['Dave','dave@example.com','Editor','Active'],
['Eve','eve@example.com','Admin','Active'],
['Frank','frank@example.com','Viewer','Inactive'],
['Grace','grace@example.com','Editor','Active'],
['Heidi','heidi@example.com','Admin','Active']
];
function update(){
var style=document.getElementById('style').value,theme=document.getElementById('theme').value;
var nrows=parseInt(document.getElementById('rows').value),accent=document.getElementById('accent').value;
var bg,text,bd,hd,sr;
if(theme==='light'){bg='#fff';text='#333';bd='#e0e0e0';hd='#f5f5f5';sr='#f9f9f9'}
else if(theme==='stripe'){bg='#fff';text='#333';bd='#e0e0e0';hd=accent+'20';sr='#f0f4ff'}
else{bg='#1a1a2e';text='#ccc';bd='#333';hd='#2a2a3e';sr='#252540'}
var html='<table class="dt dt-'+style+'">\n  <thead>\n    <tr>\n      <th>Name</th><th>Email</th><th>Role</th><th>Status</th>\n    </tr>\n  </thead>\n  <tbody>\n';
for(var i=0;i<nrows&&i<data.length;i++){
html+='    <tr>\n      <td>'+data[i][0]+'</td><td>'+data[i][1]+'</td><td>'+data[i][2]+'</td><td><span class="dt-badge '+(data[i][3]==='Active'?'dt-active':'dt-inactive')+'">'+data[i][3]+'</span></td>\n    </tr>\n';
}
html+='  </tbody>\n</table>';
var css='.dt{width:100%;border-collapse:collapse;font-size:14px;color:'+text+';background:'+bg+'}';
if(style==='bordered')css+=';border:1px solid '+bd;
if(style==='card')css+=';border-radius:12px;overflow:hidden;box-shadow:0 4px 12px rgba(0,0,0,.15)';
if(style==='compact')css+=';font-size:12px';
css+='\n.dt th{text-align:left;padding:'+(style==='compact'?'6px 10px':'12px 16px')+';font-weight:600;border-bottom:2px solid '+accent+';background:'+hd+';white-space:nowrap}';
css+='\n.dt td{padding:'+(style==='compact'?'6px 10px':'12px 16px')+';border-bottom:1px solid '+bd+'}';
if(theme==='dark'||theme==='stripe')css+='\n.dt tbody tr:nth-child(even){background:'+sr+'}';
css+='\n.dt tbody tr:hover{background:'+accent+'15}';
css+='\n.dt-badge{padding:2px 10px;border-radius:20px;font-size:11px;font-weight:600}';
css+='\n.dt-active{background:#22c55e20;color:#22c55e}';
css+='\n.dt-inactive{background:#ef444420;color:#ef4444}';
document.getElementById('htmlOut').value=html;
document.getElementById('cssOut').value=css;
document.getElementById('preview').innerHTML='<style>'+css+'<\/style>'+html;
}
function copyText(id){var t=document.getElementById(id);t.select();document.execCommand('copy')}
document.querySelectorAll('select,input').forEach(function(e){e.addEventListener('input',update);e.addEventListener('change',update)});
update();
</script>
</body>
</html>
