<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="/assets/theme-init.js"></script>
<title>Reading List — Virtual Tools</title>
<link rel="stylesheet" href="/assets/style.css">
<style>
.tool-wrap{max-width:800px;margin:0 auto;}
.tool-desc{font-size:14px;color:var(--text-secondary,#aaa);margin:8px 0 16px;}
.toolbar{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;}
.btn{padding:10px 20px;border-radius:8px;border:none;background:var(--accent,#5b8def);color:#fff;cursor:pointer;font-size:14px;}
.btn:hover{opacity:0.9;}
.btn.secondary{background:var(--bg-alt,#1a1f2e);border:1px solid var(--border,#444);color:var(--text,#eee);}
.btn.small{padding:6px 12px;font-size:12px;}
.search{flex:1;min-width:200px;padding:10px 14px;border-radius:8px;border:1px solid var(--border,#444);background:var(--bg-alt,#1a1f2e);color:var(--text,#eee);font-size:14px;}
.filters{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;}
.filter{padding:6px 14px;border-radius:20px;border:1px solid var(--border,#444);background:var(--bg-alt,#1a1f2e);color:var(--text-secondary,#888);cursor:pointer;font-size:13px;}
.filter.active{background:var(--accent,#5b8def);color:#fff;border-color:var(--accent,#5b8def);}
.items{display:flex;flex-direction:column;gap:8px;}
.item{border:1px solid var(--border,#333);border-radius:10px;padding:14px 16px;background:var(--bg-alt,#1a1f2e);display:flex;align-items:flex-start;gap:12px;}
.item.read{opacity:0.6;}
.item .check{width:20px;height:20px;border-radius:6px;border:2px solid var(--border,#555);cursor:pointer;flex-shrink:0;margin-top:2px;display:flex;align-items:center;justify-content:center;font-size:14px;color:var(--accent,#5b8def);}
.item.read .check{background:var(--accent,#5b8def);border-color:var(--accent,#5b8def);}
.item .body{flex:1;min-width:0;}
.item .title{font-size:15px;font-weight:600;margin:0 0 4px;}
.item .title a{color:var(--accent,#5b8def);text-decoration:none;}
.item .meta{font-size:12px;color:var(--text-secondary,#888);}
.item .tags{margin-top:6px;}
.tag{display:inline-block;padding:2px 8px;border-radius:12px;background:rgba(91,141,239,0.2);color:var(--accent,#5b8def);font-size:11px;margin-right:4px;}
.item .actions{display:flex;gap:6px;flex-shrink:0;}
.empty{text-align:center;padding:40px;color:var(--text-secondary,#888);}
.modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:100;align-items:center;justify-content:center;}
.modal.open{display:flex;}
.modal-box{background:var(--bg,#2a2f3e);border-radius:12px;padding:24px;max-width:500px;width:95%;}
.modal-box h3{margin:0 0 12px;}
.modal-box label{display:block;font-size:12px;color:var(--text-secondary,#888);margin-top:12px;margin-bottom:4px;}
.modal-box input,.modal-box textarea{width:100%;padding:10px;border-radius:8px;border:1px solid var(--border,#444);background:var(--bg-alt,#1a1f2e);color:var(--text,#eee);font-size:14px;box-sizing:border-box;}
.modal-box .btns{display:flex;gap:8px;margin-top:16px;justify-content:flex-end;}
</style>
</head>
<body>
<header id="site-header"></header>
<main>
<div class="tool-wrap">
<h1>Reading List 📚</h1>
<p class="tool-desc">Save articles and links to read later. Mark as read, add tags and notes, and filter by status. All stored locally in your browser.</p>
<div class="toolbar">
<input class="search" id="search" placeholder="Search by title, URL, or tag…" oninput="render()">
<button class="btn" onclick="openAdd()">+ Add Link</button>
</div>
<div class="filters" id="filters">
<div class="filter active" data-f="all" onclick="setFilter('all')">All</div>
<div class="filter" data-f="unread" onclick="setFilter('unread')">Unread</div>
<div class="filter" data-f="read" onclick="setFilter('read')">Read</div>
</div>
<div class="items" id="list"></div>
</div>
</main>
<div class="modal" id="modal">
<div class="modal-box">
<h3 id="modalTitle">Add Link</h3>
<label>Title</label>
<input id="iTitle" placeholder="Article title">
<label>URL</label>
<input id="iUrl" placeholder="https://example.com/article">
<label>Tags (comma-separated)</label>
<input id="iTags" placeholder="tech, ai, long-read">
<label>Notes</label>
<textarea id="iNotes" placeholder="Why you want to read this…"></textarea>
<div class="btns">
<button class="btn secondary" onclick="closeModal()">Cancel</button>
<button class="btn danger" id="delBtn" style="display:none" onclick="del()">Delete</button>
<button class="btn" onclick="save()">Save</button>
</div>
</div>
</div>
<script src="/assets/app.js"></script>
<script>
const KEY='reading_list_v1';let editId=null;let filter='all';
function load(){try{return JSON.parse(localStorage.getItem(KEY))||[];}catch(e){return[];}}
function save(arr){localStorage.setItem(KEY,JSON.stringify(arr));}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,6);}
function esc(s){return s.replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function setFilter(f){filter=f;document.querySelectorAll('.filter').forEach(el=>el.classList.toggle('active',el.dataset.f===f));render();}
function render(){
const q=document.getElementById('search').value.toLowerCase();
let items=load();
if(filter==='unread')items=items.filter(i=>!i.read);
if(filter==='read')items=items.filter(i=>i.read);
if(q)items=items.filter(i=>i.title.toLowerCase().includes(q)||i.url.toLowerCase().includes(q)||i.tags.some(t=>t.toLowerCase().includes(q)));
const list=document.getElementById('list');
if(!items.length){list.innerHTML='<div class="empty">No links yet. Click "+ Add Link" to get started.</div>';return;}
list.innerHTML=items.map(i=>`<div class="item${i.read?' read':''}"><div class="check" onclick="toggle('${i.id}')">${i.read?'✓':''}</div><div class="body"><div class="title">${esc(i.title)}${i.url?` <a href="${esc(i.url)}" target="_blank" rel="noopener">↗</a>`:''}</div>${i.url?`<div class="meta">${esc(i.url)}</div>`:''}${i.notes?`<div class="meta" style="margin-top:4px">${esc(i.notes)}</div>`:''}<div class="tags">${i.tags.map(t=>`<span class="tag">${esc(t)}</span>`).join('')}</div></div><div class="actions"><button class="btn secondary small" onclick="edit('${i.id}')">Edit</button></div></div>`).join('');
}
function toggle(id){const arr=load();const r=arr.find(x=>x.id===id);if(r){r.read=!r.read;save(arr);render();}}
function openAdd(){editId=null;document.getElementById('modalTitle').textContent='Add Link';document.getElementById('iTitle').value='';document.getElementById('iUrl').value='';document.getElementById('iTags').value='';document.getElementById('iNotes').value='';document.getElementById('delBtn').style.display='none';document.getElementById('modal').classList.add('open');}
function edit(id){const r=load().find(x=>x.id===id);if(!r)return;editId=id;document.getElementById('modalTitle').textContent='Edit Link';document.getElementById('iTitle').value=r.title;document.getElementById('iUrl').value=r.url||'';document.getElementById('iTags').value=r.tags.join(', ');document.getElementById('iNotes').value=r.notes||'';document.getElementById('delBtn').style.display='inline-block';document.getElementById('modal').classList.add('open');}
function closeModal(){document.getElementById('modal').classList.remove('open');}
function save(){const title=document.getElementById('iTitle').value.trim();if(!title)return;const url=document.getElementById('iUrl').value.trim();const tags=document.getElementById('iTags').value.split(',').map(t=>t.trim()).filter(Boolean);const notes=document.getElementById('iNotes').value.trim();const arr=load();if(editId){const r=arr.find(x=>x.id===editId);Object.assign(r,{title,url,tags,notes});}else{arr.unshift({id:uid(),title,url,tags,notes,read:false});}save(arr);closeModal();render();}
function del(){if(!editId)return;const arr=load().filter(x=>x.id!==editId);save(arr);closeModal();render();}
document.getElementById('modal').addEventListener('click',e=>{if(e.target.id==='modal')closeModal();});
render();
</script>
</body>
</html>
