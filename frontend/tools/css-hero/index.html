<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="/assets/theme-init.js"></script>
<title>CSS Hero Section Generator — Virtual Tools</title>
<link rel="stylesheet" href="/assets/style.css">
<style>
.tool-wrap{max-width:800px;margin:0 auto;}
.tool-desc{font-size:14px;color:var(--text-secondary,#aaa);margin:8px 0 20px;}
.controls{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin:12px 0;}
.ctrl{display:flex;flex-direction:column;gap:4px;}
.ctrl label{font-size:12px;color:var(--text-secondary,#888);}
.ctrl input,.ctrl select,.ctrl textarea{padding:6px 8px;border-radius:6px;border:1px solid var(--border,#444);background:var(--bg,#1e2230);color:var(--text,#eee);font-size:13px;}
.ctrl textarea{resize:vertical;min-height:32px;}
button.action{padding:8px 16px;border-radius:6px;border:1px solid var(--border,#444);background:var(--card,#2a2f3e);color:var(--text,#eee);cursor:pointer;font-size:13px;margin:4px 4px 0 0;}
.preview{border:1px solid var(--border,#444);border-radius:8px;margin:12px 0;overflow:hidden;min-height:200px;}
.code-block{background:var(--bg,#1e2230);border:1px solid var(--border,#444);border-radius:8px;padding:12px;margin:8px 0;font-family:monospace;font-size:11px;color:var(--text,#eee);white-space:pre-wrap;word-break:break-all;max-height:400px;overflow:auto;}
</style>
</head>
<body>
<header id="site-header"></header>
<main>
<div class="tool-wrap">
<h1>🦸 CSS Hero Section Generator</h1>
<p class="tool-desc">Create hero sections with heading, subheading, CTA button, and 5 background styles. Copy HTML+CSS.</p>
<div class="controls">
<div class="ctrl"><label>Style</label><select id="style" onchange="render()"><option value="centered" selected>Centered</option><option value="left">Left Aligned</option><option value="split">Split</option><option value="gradient">Gradient</option><option value="minimal">Minimal</option></select></div>
<div class="ctrl"><label>Heading</label><input type="text" id="heading" value="Build Something Amazing" oninput="render()"></div>
<div class="ctrl"><label>Subheading</label><textarea id="subheading" oninput="render()">A powerful tool to help you create beautiful experiences.</textarea></div>
<div class="ctrl"><label>Button Text</label><input type="text" id="btnText" value="Get Started" oninput="render()"></div>
<div class="ctrl"><label>Bg Color</label><input type="color" id="bg1" value="#1a1a2e" oninput="render()"></div>
<div class="ctrl"><label>Accent Color</label><input type="color" id="accent" value="#6c5ce7" oninput="render()"></div>
<div class="ctrl"><label>Text Color</label><input type="color" id="txt" value="#ffffff" oninput="render()"></div>
<div class="ctrl"><label>Height (px)</label><input type="number" id="height" value="320" min="200" max="600" oninput="render()"></div>
<div class="ctrl"><label>Font Size (px)</label><input type="number" id="fs" value="36" min="20" max="64" oninput="render()"></div>
</div>
<div style="margin:8px 0;"><button class="action" onclick="copyCode()">Copy HTML+CSS</button></div>
<div class="preview" id="prev"></div>
<div class="code-block" id="code"></div>
</div>
</div>
</main>
<script src="/assets/app.js"></script>
<script>
let codeText='';
function v(id){return document.getElementById(id).value;}
function render(){
const style=v('style'),heading=v('heading'),sub=v('subheading'),btn=v('btnText'),bg1=v('bg1'),accent=v('accent'),txt=v('txt'),h=+v('height'),fs=+v('fs');
let bg='';
if(style==='gradient')bg=`background:linear-gradient(135deg,${bg1},${accent});`;
else if(style==='minimal')bg=`background:${bg1};`;
else bg=`background:${bg1};`;
let layout='';
if(style==='centered'||style==='gradient'||style==='minimal'){
layout=`display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;`;
}else if(style==='left'){
layout=`display:flex;flex-direction:column;align-items:flex-start;justify-content:center;text-align:left;`;
}else if(style==='split'){
layout=`display:flex;align-items:center;justify-content:space-between;`;
}
const html=`<div style="${bg}${layout}min-height:${h}px;padding:40px;color:${txt};font-family:inherit;border-radius:8px;">
${style==='split'?'<div style="flex:1;">':''}
<h2 style="font-size:${fs}px;margin:0 0 12px;font-weight:700;line-height:1.2;">${heading}</h2>
<p style="font-size:16px;opacity:.8;margin:0 0 24px;max-width:480px;">${sub}</p>
<button style="background:${accent};color:#fff;border:none;padding:12px 32px;border-radius:8px;font-size:15px;cursor:pointer;font-weight:600;">${btn}</button>
${style==='split'?'<\\/div><div style="flex:1;display:flex;align-items:center;justify-content:center;"><div style="width:200px;height:200px;background:'+accent+'22;border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:64px;">🚀<\\/div></div>':''}
</div>`;
const cleanHtml=html.replace(/\\\/div/g,'/div');
document.getElementById('prev').innerHTML=cleanHtml;
codeText=`<style>
.hero {
  ${bg}${layout}
  min-height: ${h}px;
  padding: 40px;
  color: ${txt};
  font-family: inherit;
  border-radius: 8px;
}
.hero h2 {
  font-size: ${fs}px;
  margin: 0 0 12px;
  font-weight: 700;
  line-height: 1.2;
}
.hero p {
  font-size: 16px;
  opacity: 0.8;
  margin: 0 0 24px;
  max-width: 480px;
}
.hero button {
  background: ${accent};
  color: #fff;
  border: none;
  padding: 12px 32px;
  border-radius: 8px;
  font-size: 15px;
  cursor: pointer;
  font-weight: 600;
}
</style>

<div class="hero">
  <h2>${heading}</h2>
  <p>${sub}</p>
  <button>${btn}</button>
</div>`;
document.getElementById('code').textContent=codeText;
}
function copyCode(){navigator.clipboard.writeText(codeText).then(()=>alert('Copied!'));}
render();
</script>
</body>
</html>
