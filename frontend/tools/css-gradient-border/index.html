<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CSS Gradient Border Generator — virt.tools</title>
<link rel="stylesheet" href="/assets/style.css">
<style>
.tool-area{max-width:900px;margin:2rem auto;padding:0 1rem}
.controls{display:grid;gap:1rem;margin:1.5rem 0;padding:1.5rem;background:#1a1a2e;border-radius:12px}
.control-row{display:flex;gap:1rem;align-items:center;flex-wrap:wrap}
.control-row label{min-width:140px;font-weight:600;font-size:.9rem}
.control-row select,.control-row input{padding:.5rem .75rem;border-radius:8px;border:1px solid #444;background:#0f0f1e;color:#eee;font-size:.9rem}
.preview-box{margin:1.5rem 0;padding:2rem;background:#0f0f1e;border-radius:12px;display:flex;justify-content:center;align-items:center;min-height:200px}
.output-block{margin:2rem 0}
.output-block textarea{width:100%;min-height:120px;font-family:monospace;font-size:.85rem;padding:1rem;border-radius:8px;border:1px solid #444;background:#0f0f1e;color:#eee;resize:vertical}
.copy-btn{padding:.6rem 1.2rem;border:none;border-radius:8px;background:#667eea;color:#fff;cursor:pointer;font-size:.9rem;margin-top:.5rem}
h2{margin-top:2rem;font-size:1.2rem}
</style>
</head>
<body>
<header id="site-header"></header>
<main>
<div class="tool-area">
<h1>🌈 CSS Gradient Border Generator</h1>
<p>Create CSS animated gradient border effects. 5 styles, adjustable angle/speed/colors. Copy CSS+HTML.</p>
<div class="controls">
<div class="control-row">
<label>Style</label><select id="style"><option value="solid">Solid Gradient</option><option value="animated">Animated</option><option value="rotating">Rotating</option><option value="conic">Conic</option><option value="glow">Glow Border</option></select>
<label>Border Width</label><input type="range" id="borderWidth" min="1" max="10" step="1" value="3" style="width:120px"><span id="bwVal">3px</span>
</div>
<div class="control-row">
<label>Color 1</label><input type="color" id="color1" value="#667eea">
<label>Color 2</label><input type="color" id="color2" value="#764ba2">
<label>Color 3</label><input type="color" id="color3" value="#f093fb">
</div>
<div class="control-row">
<label>Radius (px)</label><input type="number" id="radius" value="12" min="0" max="50" style="width:70px">
<label>Speed (s)</label><input type="range" id="speed" min="1" max="10" step="0.5" value="3" style="width:120px"><span id="speedVal">3</span>
<label>Padding (px)</label><input type="number" id="padding" value="24" min="0" max="60" style="width:70px">
</div>
</div>
<h2>Preview</h2>
<div class="preview-box" id="preview"></div>
<h2>CSS</h2><div class="output-block"><textarea id="cssOut" readonly></textarea><button class="copy-btn" onclick="copyText('cssOut')">Copy CSS</button></div>
<h2>HTML</h2><div class="output-block"><textarea id="htmlOut" readonly></textarea><button class="copy-btn" onclick="copyText('htmlOut')">Copy HTML</button></div>
</div>
</main>
<script src="/assets/app.js"></script>
<script>
function update(){
var style=document.getElementById('style').value;
var bw=document.getElementById('borderWidth').value;
var c1=document.getElementById('color1').value;
var c2=document.getElementById('color2').value;
var c3=document.getElementById('color3').value;
var radius=document.getElementById('radius').value;
var speed=parseFloat(document.getElementById('speed').value);
var padding=document.getElementById('padding').value;
document.getElementById('bwVal').textContent=bw+'px';
document.getElementById('speedVal').textContent=speed;
var gradient='linear-gradient(135deg, '+c1+', '+c2+', '+c3+')';
var css='',html='<div class="gradient-border">\n  <div class="gradient-border-inner">\n    Your content here\n  </div>\n</div>';
var previewEl='';
if(style==='solid'){
css='.gradient-border {\n  border: '+bw+'px solid;\n  border-image: '+gradient+' 1;\n  border-radius: '+radius+'px;\n  padding: '+padding+'px;\n}';
previewEl='<div style="border:'+bw+'px solid;border-image:'+gradient+' 1;border-radius:'+radius+'px;padding:'+padding+'px;color:#fff">Your content here</div>';
}else if(style==='animated'){
css='@keyframes borderFlow {\n  0%, 100% { background-position: 0% 50%; }\n  50% { background-position: 100% 50%; }\n}\n\n.gradient-border {\n  background: '+gradient+';\n  background-size: 300% 300%;\n  animation: borderFlow '+speed+'s ease infinite;\n  padding: '+bw+'px;\n  border-radius: '+radius+'px;\n}\n\n.gradient-border-inner {\n  background: #1a1a2e;\n  border-radius: '+(radius-2)+'px;\n  padding: '+padding+'px;\n  color: #fff;\n}';
previewEl='<div style="background:'+gradient+';background-size:300% 300%;animation:borderFlow '+speed+'s ease infinite;padding:'+bw+'px;border-radius:'+radius+'px"><div style="background:#1a1a2e;border-radius:'+(radius-2)+'px;padding:'+padding+'px;color:#fff">Your content here</div></div>';
}else if(style==='rotating'){
css='@keyframes borderRotate {\n  to { --angle: 360deg; }\n}\n\n@property --angle {\n  syntax: "<angle>";\n  initial-value: 0deg;\n  inherits: false;\n}\n\n.gradient-border {\n  background: conic-gradient(from var(--angle), '+c1+', '+c2+', '+c3+', '+c1+');\n  animation: borderRotate '+speed+'s linear infinite;\n  padding: '+bw+'px;\n  border-radius: '+radius+'px;\n}\n\n.gradient-border-inner {\n  background: #1a1a2e;\n  border-radius: '+(radius-2)+'px;\n  padding: '+padding+'px;\n  color: #fff;\n}';
previewEl='<div style="border:'+bw+'px solid;border-image:conic-gradient(from 0deg,'+c1+','+c2+','+c3+','+c1+') 1;border-radius:'+radius+'px;padding:'+padding+'px;color:#fff">Your content here (rotating — see CSS)</div>';
}else if(style==='conic'){
css='.gradient-border {\n  background: conic-gradient(from 180deg, '+c1+', '+c2+', '+c3+', '+c1+');\n  padding: '+bw+'px;\n  border-radius: '+radius+'px;\n}\n\n.gradient-border-inner {\n  background: #1a1a2e;\n  border-radius: '+(radius-2)+'px;\n  padding: '+padding+'px;\n  color: #fff;\n}';
previewEl='<div style="background:conic-gradient(from 180deg,'+c1+','+c2+','+c3+','+c1+');padding:'+bw+'px;border-radius:'+radius+'px"><div style="background:#1a1a2e;border-radius:'+(radius-2)+'px;padding:'+padding+'px;color:#fff">Your content here</div></div>';
}else{
css='@keyframes borderGlow {\n  0%, 100% { box-shadow: 0 0 5px '+c1+', 0 0 10px '+c2+'; }\n  50% { box-shadow: 0 0 20px '+c1+', 0 0 40px '+c3+'; }\n}\n\n.gradient-border {\n  border: '+bw+'px solid;\n  border-image: '+gradient+' 1;\n  border-radius: '+radius+'px;\n  padding: '+padding+'px;\n  animation: borderGlow '+speed+'s ease-in-out infinite;\n}';
previewEl='<div style="border:'+bw+'px solid;border-image:'+gradient+' 1;border-radius:'+radius+'px;padding:'+padding+'px;color:#fff;animation:borderGlow '+speed+'s ease-in-out infinite">Your content here</div>';
}
document.getElementById('preview').innerHTML=previewEl;
document.getElementById('cssOut').value=css;
document.getElementById('htmlOut').value=html;
}
function copyText(id){var t=document.getElementById(id);t.select();document.execCommand('copy')}
document.querySelectorAll('select,input').forEach(function(e){e.addEventListener('input',update);e.addEventListener('change',update)});
update();
</script>
</body>
</html>
