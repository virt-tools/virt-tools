<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CSS Privacy Policy Page Generator — virt.tools</title>
<link rel="stylesheet" href="/assets/style.css">
<style>
.tool-area{max-width:900px;margin:2rem auto;padding:0 1rem}
.controls{display:grid;gap:1rem;margin:1.5rem 0;padding:1.5rem;background:#1a1a2e;border-radius:12px}
.control-row{display:flex;gap:1rem;align-items:center;flex-wrap:wrap}
.control-row label{min-width:100px;font-weight:600;font-size:.9rem}
.control-row select,.control-row input{padding:.5rem .75rem;border-radius:8px;border:1px solid #444;background:#0f0f1e;color:#eee;font-size:.9rem}
.preview-box{margin:1.5rem 0;border-radius:12px;min-height:300px;overflow-y:auto;max-height:500px}
.output-block{margin:2rem 0}
.output-block textarea{width:100%;min-height:120px;font-family:monospace;font-size:.85rem;padding:1rem;border-radius:8px;border:1px solid #444;background:#0f0f1e;color:#eee;resize:vertical}
.copy-btn{padding:.6rem 1.2rem;border:none;border-radius:8px;background:#667eea;color:#fff;cursor:pointer;font-size:.9rem;margin-top:.5rem}
h2{margin-top:2rem;font-size:1.2rem}
</style>
</head>
<body>
<header id="site-header"></header>
<main>
<div class="tool-area">
<h1>🔒 CSS Privacy Policy Page Generator</h1>
<p>Create CSS privacy policy page components. 3 styles, 3 themes, custom sections. Copy HTML+CSS.</p>
<div class="controls">
<div class="control-row">
<label>Style</label><select id="style"><option value="clean" selected>Clean</option><option value="card">Card</option><option value="sidebar">Sidebar</option></select>
<label>Theme</label><select id="theme"><option value="light" selected>Light</option><option value="dark">Dark</option><option value="mono">Mono</option></select>
<label>Accent</label><input type="color" id="accent" value="#667eea">
<label>Title</label><input type="text" id="title" value="Privacy Policy" style="width:140px">
<label>Updated</label><input type="text" id="updated" value="January 1, 2026" style="width:120px">
<label>Sections</label><select id="sections"><option value="4">4</option><option value="6" selected>6</option><option value="8">8</option></select>
</div>
</div>
<h2>Preview</h2>
<div class="preview-box" id="preview"></div>
<h2>HTML</h2><div class="output-block"><textarea id="htmlOut" readonly></textarea><button class="copy-btn" onclick="copyText('htmlOut')">Copy HTML</button></div>
<h2>CSS</h2><div class="output-block"><textarea id="cssOut" readonly></textarea><button class="copy-btn" onclick="copyText('cssOut')">Copy CSS</button></div>
</div>
</main>
<script src="/assets/app.js"></script>
<script>
var secData=[
['1. Information We Collect','We collect information you provide directly to us, such as when you create an account, use our services, or contact us. This may include your name, email address, and usage data.'],
['2. How We Use Information','We use the information we collect to provide, maintain, and improve our services, to communicate with you, and to develop new features.'],
['3. Cookies and Tracking','We use cookies and similar technologies to track activity on our website and store certain information. You can instruct your browser to refuse cookies.'],
['4. Data Storage and Security','We take reasonable measures to protect your information from unauthorized access. However, no method of transmission over the Internet is 100% secure.'],
['5. Sharing Your Information','We do not sell, trade, or rent your personal information to others. We may share generic aggregated demographic information with partners.'],
['6. Your Privacy Choices','You may update, correct, or delete your account information at any time. You may opt out of certain communications by adjusting your settings.'],
['7. Data Retention','We retain your information for as long as your account is active or as needed to provide our services. We will delete data upon request.'],
['8. Contact Us','If you have questions about this Privacy Policy, please contact us through the information provided on our website.']
];
function update(){
var style=document.getElementById('style').value,theme=document.getElementById('theme').value;
var accent=document.getElementById('accent').value,title=document.getElementById('title').value;
var updated=document.getElementById('updated').value,n=parseInt(document.getElementById('sections').value);
var bg=theme==='dark'?'#1a1a2e':theme==='mono'?'#f5f5f5':'#fff';
var fg=theme==='dark'?'#e0e0e0':theme==='mono'?'#222':'#333';
var bd=theme==='dark'?'#333':'#ddd';
var html='<div class="pp pp-'+style+'" style="--pp-bg:'+bg+';--pp-fg:'+fg+';--pp-bd:'+bd+';--pp-ac:'+accent+'">\n';
html+='  <div class="pp-header">\n    <h1>'+title+'</h1>\n    <p class="pp-updated">Last updated: '+updated+'</p>\n  </div>\n';
if(style==='sidebar'){
html+='  <nav class="pp-nav">\n';
for(var i=0;i<n;i++){html+='    <a href="#pp-'+i+'">'+secData[i][0]+'</a>\n';}
html+='  </nav>\n';
}
for(var i=0;i<n;i++){
html+='  <section class="pp-section" id="pp-'+i+'">\n    <h2>'+secData[i][0]+'</h2>\n    <p>'+secData[i][1]+'</p>\n  </section>\n';
}
html+='</div>';
var css='.pp{background:var(--pp-bg);color:var(--pp-fg);border:1px solid var(--pp-bd);border-radius:12px;padding:2rem;max-width:800px;margin:0 auto;font-family:system-ui;line-height:1.7}';
css+='\n.pp-header{border-bottom:2px solid var(--pp-ac);padding-bottom:1rem;margin-bottom:1.5rem}';
css+='\n.pp-header h1{color:var(--pp-ac);margin:0;font-size:1.6rem}';
css+='\n.pp-updated{font-size:.85rem;opacity:.6;margin:.5rem 0 0}';
css+='\n.pp-section{margin-bottom:1.5rem}';
css+='\n.pp-section h2{font-size:1.1rem;margin:0 0 .5rem}';
css+='\n.pp-section p{font-size:.95rem;margin:0}';
if(style==='card'){css+='\n.pp-section{background:rgba(0,0,0,.02);border:1px solid var(--pp-bd);border-radius:8px;padding:1rem}';}
if(style==='sidebar'){css+='\n.pp-sidebar .pp{display:grid;grid-template-columns:200px 1fr;gap:2rem}\n.pp-nav{display:flex;flex-direction:column;gap:.5rem;border-right:1px solid var(--pp-bd);padding-right:1rem}\n.pp-nav a{color:var(--pp-fg);text-decoration:none;font-size:.85rem;padding:.3rem .5rem;border-radius:6px}\n.pp-nav a:hover{background:var(--pp-ac);color:#fff}';}
document.getElementById('htmlOut').value=html;
document.getElementById('cssOut').value=css;
document.getElementById('preview').innerHTML='<style>'+css+'<\/style>'+html;
}
function copyText(id){var t=document.getElementById(id);t.select();document.execCommand('copy')}
document.querySelectorAll('select,input').forEach(function(e){e.addEventListener('input',update);e.addEventListener('change',update)});
update();
</script>
</body>
</html>
