<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <script src="/assets/theme-init.js"></script>
  <title>Sitemap Generator — Virtual Tools</title>
  <link rel="stylesheet" href="/assets/style.css">
</head>
<body>
  <div id="site-header"></div>
  <main>
    <div class="tool-header">
      <a class="back" href="/">← All tools</a>
      <h1>Sitemap Generator</h1>
      <p>Generate a standards-compliant <code>sitemap.xml</code> file for your website entirely in your browser.</p>
    </div>

    <div class="panel">
      <div class="row">
        <div style="flex:1">
          <label for="priority">Priority</label>
          <select id="priority">
            <option>0.1</option>
            <option>0.3</option>
            <option>0.5 selected</option>
            <option>0.7</option>
            <option>0.8</option>
            <option>1.0</option>
          </select>
        </div>
        <div style="flex:1">
          <label for="freq">Change Frequency</label>
          <select id="freq">
            <option>always</option>
            <option>hourly</option>
            <option>daily</option>
            <option>weekly</option>
            <option selected>monthly</option>
            <option>yearly</option>
            <option>never</option>
          </select>
        </div>
      </div>
      <div class="spacer"></div>

      <label for="urls">URLs (one per line)</label>
      <textarea id="urls" style="width:100%; height:200px; margin-bottom:1rem; font-family:monospace;"></textarea>

      <div class="row">
        <button id="generate">Generate XML</button>
        <button id="download" class="secondary">Download sitemap.xml</button>
      </div>

      <div class="spacer"></div>
      <label for="out">Preview</label>
      <div class="output" id="out" style="white-space:pre-wrap; word-break:break-all; font-family:monospace; opacity:0.8;"></div>
      <p class="note">Processed locally — no network requests.</p>
    </div>
  </main>

  <script src="/assets/app.js"></script>
  <script>
  (function () {
    var out = document.getElementById("out");
    var urlsInput = document.getElementById("urls");
    var priorityInput = document.getElementById("priority");
    var freqInput = document.getElementById("freq");
    var lastXml = "";

    function escapeXml(unsafe) {
      return unsafe.replace(/[<>&"']/g, function (m) {
        switch (m) {
          case '<': return '&lt;';
          case '>': return '&gt;';
          case '&': return '&amp;';
          case '"': return '&quot;';
          case "'": return '&apos;';
          default: return m;
        }
      });
    }

    function generate() {
      var urls = urlsInput.value.split("\n").map(function(u) { return u.trim(); }).filter(Boolean);
      var priority = priorityInput.value;
      var freq = freqInput.value;

      var xml = '<?xml version="1.0" encoding="UTF-8"?>\n';
      xml += '<urlset xmlns="http://www.sitemaps.org/schemas/sitemap/0.9">\n';

      for (var i = 0; i < urls.length; i++) {
        xml += '  <url>\n';
        xml += '    <loc>' + escapeXml(urls[i]) + '</loc>\n';
        xml += '    <lastmod>' + new Date().toISOString().split('T')[0] + '</lastmod>\n';
        xml += '    <changefreq>' + freq + '</changefreq>\n';
        xml += '    <priority>' + priority + '</priority>\n';
        xml += '  </url>\n';
      }

      xml += '</urlset>';
      lastXml = xml;
      out.textContent = xml;
    }

    document.getElementById("generate").addEventListener("click", generate);

    document.getElementById("download").addEventListener("click", function () {
      if (!lastXml) return;
      var blob = new Blob([lastXml], {type: "application/xml"});
      var url = URL.createObjectURL(blob);
      var a = document.createElement("a");
      a.href = url;
      a.download = "sitemap.xml";
      document.body.appendChild(a);
      a.click();
      a.remove();
      URL.revokeObjectURL(url);
    });

    urlsInput.addEventListener("input", generate);
    priorityInput.addEventListener("change", generate);
    freqInput.addEventListener("change", generate);

    // Initial placeholder
    urlsInput.value = "https://example.com/\nhttps://example.com/about\nhttps://example.com/contact";
    generate();
  })();
  </script>
</body>
</html>
