<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CSS Maintenance Page Generator — virt.tools</title>
<link rel="stylesheet" href="/assets/style.css">
<style>
.tool-area{max-width:900px;margin:2rem auto;padding:0 1rem}
.controls{display:grid;gap:1rem;margin:1.5rem 0;padding:1.5rem;background:#1a1a2e;border-radius:12px}
.control-row{display:flex;gap:1rem;align-items:center;flex-wrap:wrap}
.control-row label{min-width:100px;font-weight:600;font-size:.9rem}
.control-row select,.control-row input{padding:.5rem .75rem;border-radius:8px;border:1px solid #444;background:#0f0f1e;color:#eee;font-size:.9rem}
.preview-box{margin:1.5rem 0;border-radius:12px;padding:1.5rem;min-height:300px;background:#111;display:flex;align-items:center;justify-content:center;overflow:hidden}
.output-block{margin:2rem 0}
.output-block textarea{width:100%;min-height:120px;font-family:monospace;font-size:.85rem;padding:1rem;border-radius:8px;border:1px solid #444;background:#0f0f1e;color:#eee;resize:vertical}
.copy-btn{padding:.6rem 1.2rem;border:none;border-radius:8px;background:#667eea;color:#fff;cursor:pointer;font-size:.9rem;margin-top:.5rem}
h2{margin-top:2rem;font-size:1.2rem}
</style>
</head>
<body>
<header id="site-header"></header>
<main>
<div class="tool-area">
<h1>🔧 CSS Maintenance Page Generator</h1>
<p>Create CSS maintenance / under construction page components. 4 styles, 3 themes, custom text. Copy HTML+CSS.</p>
<div class="controls">
<div class="control-row">
<label>Style</label><select id="style"><option value="simple" selected>Simple</option><option value="construction">Construction</option><option value="gear">Spinning Gear</option><option value="rocket">Rocket</option></select>
<label>Theme</label><select id="theme"><option value="dark" selected>Dark</option><option value="light">Light</option><option value="gradient">Gradient</option></select>
<label>Color</label><input type="color" id="color" value="#667eea">
<label>Title</label><input type="text" id="title" value="Under Maintenance" style="width:150px">
<label>Subtitle</label><input type="text" id="sub" value="We'll be back soon!" style="width:150px">
</div>
</div>
<h2>Preview</h2>
<div class="preview-box" id="preview"></div>
<h2>HTML</h2><div class="output-block"><textarea id="htmlOut" readonly></textarea><button class="copy-btn" onclick="copyText('htmlOut')">Copy HTML</button></div>
<h2>CSS</h2><div class="output-block"><textarea id="cssOut" readonly></textarea><button class="copy-btn" onclick="copyText('cssOut')">Copy CSS</button></div>
</div>
</main>
<script src="/assets/app.js"></script>
<script>
function update(){
var style=document.getElementById('style').value,theme=document.getElementById('theme').value;
var color=document.getElementById('color').value,title=document.getElementById('title').value,sub=document.getElementById('sub').value;
var bg=theme==='light'?'#fff':theme==='gradient'?'linear-gradient(135deg,#667eea,#764ba2)':'#111';
var tx=theme==='light'?'#333':'#fff';
var icon='';
if(style==='simple')icon='🔧';
else if(style==='construction')icon='🚧';
else if(style==='gear')icon='⚙️';
else icon='🚀';
var html='<div class="mp" style="--mp-c:'+color+';--mp-bg:'+bg+';--mp-tx:'+tx+'">\n  <div class="mp-icon mp-'+style+'">'+icon+'</div>\n  <h1 class="mp-title">'+title+'</h1>\n  <p class="mp-sub">'+sub+'</p>\n  <div class="mp-bar"><div class="mp-bar-fill"></div></div>\n</div>';
var css='.mp{display:flex;flex-direction:column;align-items:center;gap:16px;min-height:100vh;justify-content:center;background:var(--mp-bg);color:var(--mp-tx);font-family:system-ui}';
css+='\n.mp-icon{font-size:72px;animation:mp-bounce 2s ease infinite}';
css+='\n.mp-gear{animation:mp-spin 4s linear infinite}';
css+='\n.mp-rocket{animation:mp-float 2s ease infinite}';
css+='\n.mp-title{font-size:2rem;margin:0;font-weight:800}';
css+='\n.mp-sub{font-size:1.1rem;opacity:.6;margin:0}';
css+='\n.mp-bar{width:200px;height:4px;background:var(--mp-tx);opacity:.2;border-radius:2px;overflow:hidden}';
css+='\n.mp-bar-fill{width:40%;height:100%;background:var(--mp-c);border-radius:2px;animation:mp-slide 1.5s ease infinite}';
css+='\n@keyframes mp-bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}';
css+='\n@keyframes mp-spin{to{transform:rotate(360deg)}}';
css+='\n@keyframes mp-float{0%,100%{transform:translateY(0)}50%{transform:translateY(-15px)}}';
css+='\n@keyframes mp-slide{0%{transform:translateX(-100%)}100%{transform:translateX(350%)}}';
document.getElementById('htmlOut').value=html;
document.getElementById('cssOut').value=css;
document.getElementById('preview').innerHTML='<style>'+css.replace(/100vh/g,'250px')+'<\/style>'+html;
}
function copyText(id){var t=document.getElementById(id);t.select();document.execCommand('copy')}
document.querySelectorAll('select,input').forEach(function(e){e.addEventListener('input',update);e.addEventListener('change',update)});
update();
</script>
</body>
</html>
