<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="/assets/theme-init.js"></script>
<title>Book Tracker — Virtual Tools</title>
<link rel="stylesheet" href="/assets/style.css">
<style>
.tool-wrap{max-width:700px;margin:0 auto;}
.tool-desc{font-size:14px;color:var(--text-secondary,#aaa);margin:8px 0 16px;}
.card{border:1px solid var(--border,#333);border-radius:12px;padding:20px;background:var(--bg-alt,#1a1f2e);margin-bottom:16px;}
label{display:block;font-size:12px;color:var(--text-secondary,#888);margin-bottom:4px;margin-top:12px;}
input,select,textarea{width:100%;padding:10px;border-radius:8px;border:1px solid var(--border,#444);background:var(--bg,#2a2f3e);color:var(--text,#eee);font-size:14px;box-sizing:border-box;}
.btn{padding:10px 20px;border-radius:8px;border:none;background:var(--accent,#5b8def);color:#fff;cursor:pointer;font-size:14px;margin-top:12px;}
.btn:hover{opacity:0.9;}
.btn-sm{padding:6px 12px;font-size:12px;}
.book-card{border:1px solid var(--border,#333);border-radius:10px;padding:14px;margin-bottom:12px;background:var(--bg,#2a2f3e);display:flex;gap:14px;align-items:flex-start;}
.book-emoji{font-size:36px;}
.book-info{flex:1;}
.book-title{font-weight:700;font-size:16px;}
.book-meta{font-size:12px;color:var(--text-secondary,#888);margin-top:4px;}
.book-actions{display:flex;gap:6px;margin-top:8px;}
.status-badge{display:inline-block;padding:2px 8px;border-radius:12px;font-size:11px;font-weight:700;}
.badge-read{background:rgba(76,175,80,0.2);color:#4caf50;}
.badge-reading{background:rgba(91,141,239,0.2);color:#5b8def;}
.badge-tbr{background:rgba(255,193,7,0.2);color:#ffc107;}
.empty{text-align:center;padding:30px;color:var(--text-secondary,#888);}
.row{display:flex;gap:12px;}.row>div{flex:1;}
.stars{color:#ffc107;font-size:16px;cursor:pointer;}
.filter-bar{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;}
.filter-btn{padding:6px 14px;border-radius:20px;border:1px solid var(--border,#444);background:var(--bg,#2a2f3e);color:var(--text,#eee);cursor:pointer;font-size:13px;}
.filter-btn.active{background:var(--accent,#5b8def);color:#fff;border-color:var(--accent,#5b8def);}
</style>
</head>
<body>
<header id="site-header"></header>
<main>
<div class="tool-wrap">
<h1>Book Tracker 📖</h1>
<p class="tool-desc">Track books you've read, are reading, or want to read. Add ratings and notes. Filter by status. All stored locally.</p>
<div class="card">
<h3>Add Book</h3>
<div class="row">
<div><label>Title</label><input type="text" id="btitle" placeholder="Book title"></div>
<div><label>Author</label><input type="text" id="bauthor" placeholder="Author"></div>
</div>
<div class="row">
<div><label>Status</label><select id="bstatus"><option value="tbr">Want to Read</option><option value="reading">Currently Reading</option><option value="read">Finished</option></select></div>
<div><label>Rating (1-5)</label><input type="number" id="brating" min="0" max="5" value="0"></div>
</div>
<label>Notes</label><input type="text" id="bnotes" placeholder="Optional notes">
<button class="btn" onclick="addBook()">Add Book</button>
</div>
<div class="filter-bar">
<button class="filter-btn active" onclick="setFilter('all',this)">All</button>
<button class="filter-btn" onclick="setFilter('tbr',this)">Want to Read</button>
<button class="filter-btn" onclick="setFilter('reading',this)">Reading</button>
<button class="filter-btn" onclick="setFilter('read',this)">Finished</button>
</div>
<div id="books"></div>
</div>
</main>
<script src="/assets/app.js"></script>
<script>
const KEY='book_tracker_v1';
let currentFilter='all';
function load(){try{return JSON.parse(localStorage.getItem(KEY))||[];}catch(e){return[];}}
function save(a){localStorage.setItem(KEY,JSON.stringify(a));}
function esc(s){return s.replace(/</g,'&lt;');}
function stars(n){return '★'.repeat(n)+'☆'.repeat(5-n);}
function statusLabel(s){return s==='read'?'Finished':s==='reading'?'Reading':'Want to Read';}
function statusBadge(s){return s==='read'?'badge-read':s==='reading'?'badge-reading':'badge-tbr';}
function addBook(){
const title=document.getElementById('btitle').value.trim();if(!title)return;
const author=document.getElementById('bauthor').value.trim();
const status=document.getElementById('bstatus').value;
const rating=Math.max(0,Math.min(5,parseInt(document.getElementById('brating').value)||0));
const notes=document.getElementById('bnotes').value.trim();
const arr=load();arr.push({id:Date.now(),title,author,status,rating,notes});save(arr);
document.getElementById('btitle').value='';document.getElementById('bauthor').value='';document.getElementById('bnotes').value='';render();
}
function cycleStatus(id){const arr=load();const b=arr.find(b=>b.id===id);if(b){b.status=b.status==='tbr'?'reading':b.status==='reading'?'read':'tbr';save(arr);render();}}
function deleteBook(id){const arr=load().filter(b=>b.id!==id);save(arr);render();}
function setFilter(f,el){currentFilter=f;document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));el.classList.add('active');render();}
function render(){
let arr=load();
if(currentFilter!=='all')arr=arr.filter(b=>b.status===currentFilter);
const c=document.getElementById('books');
if(!arr.length){c.innerHTML='<div class="card"><div class="empty">No books in this category. Add one above! 📚</div></div>';return;}
c.innerHTML=arr.map(b=>{
return `<div class="book-card"><div class="book-emoji">📖</div><div class="book-info"><div class="book-title">${esc(b.title)}</div>${b.author?`<div class="book-meta">by ${esc(b.author)}</div>`:''}<div class="book-meta"><span class="status-badge ${statusBadge(b.status)}">${statusLabel(b.status)}</span> ${b.rating>0?`<span class="stars">${stars(b.rating)}</span>`:''}</div>${b.notes?`<div class="book-meta">${esc(b.notes)}</div>`:''}<div class="book-actions"><button class="btn btn-sm" onclick="cycleStatus(${b.id})">Cycle Status</button><button class="btn btn-sm" onclick="deleteBook(${b.id})" style="background:#f44336">Delete</button></div></div></div>`;
}).join('');
}
render();
</script>
</body>
</html>
