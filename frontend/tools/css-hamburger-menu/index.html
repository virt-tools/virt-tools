<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CSS Hamburger Menu Generator — virt.tools</title>
<link rel="stylesheet" href="/assets/style.css">
<style>
.tool-area{max-width:960px;margin:2rem auto;padding:0 1rem}
.controls{display:grid;gap:1rem;margin:1.5rem 0;padding:1.5rem;background:#1a1a2e;border-radius:12px}
.control-row{display:flex;gap:1rem;align-items:center;flex-wrap:wrap}
.control-row label{min-width:100px;font-weight:600;font-size:.9rem}
.control-row select,.control-row input[type="color"]{padding:.5rem .75rem;border-radius:8px;border:1px solid #444;background:#0f0f1e;color:#eee;font-size:.9rem}
.preview-area{margin:2rem 0;padding:3rem;background:linear-gradient(135deg,#0f0f1e,#1a1a3e);border-radius:12px;display:flex;flex-wrap:wrap;gap:2rem;justify-content:center;align-items:center}
.hamburger-demo{display:flex;flex-direction:column;align-items:center;gap:.5rem}
.hamburger-demo span{font-size:.75rem;color:#888}
.css-output{margin:2rem 0}
.css-output textarea{width:100%;min-height:180px;font-family:monospace;font-size:.85rem;padding:1rem;border-radius:8px;border:1px solid #444;background:#0f0f1e;color:#eee;resize:vertical}
.copy-btn{padding:.6rem 1.2rem;border:none;border-radius:8px;background:#4a9eff;color:#fff;cursor:pointer;font-size:.9rem;margin-top:.5rem}
h2{margin-top:2rem;font-size:1.2rem}
</style>
</head>
<body>
<header id="site-header"></header>
<main>
<div class="tool-area">
<h1>☰ CSS Hamburger Menu Generator</h1>
<p>Create animated CSS hamburger menu toggles with 6 animation styles.</p>
<div class="controls">
<div class="control-row">
<label>Animation</label><select id="anim"><option value="spin">Spin</option><option value="collapse">Collapse</option><option value="arrow">Arrow</option><option value="minus">Minus</option><option value="3dy">3D Y-Rotate</option><option value="elastic">Elastic</option></select>
<label>Size</label><select id="size"><option value="32">Small</option><option value="40">Medium</option><option value="52">Large</option></select>
<label>Thickness</label><input type="range" id="thick" min="2" max="8" value="4"><span id="thickVal">4px</span>
</div>
<div class="control-row">
<label>Bar Color</label><input type="color" id="barColor" value="#4a9eff">
<label>Bar Bg</label><input type="color" id="barBg" value="#1a1a2e">
<label>Radius</label><input type="range" id="radius" min="0" max="8" value="2"><span id="radiusVal">2px</span>
</div>
</div>
<div class="preview-area" id="preview"></div>
<h2>HTML</h2><div class="css-output"><textarea id="htmlOut" readonly></textarea><button class="copy-btn" onclick="copyText('htmlOut')">Copy HTML</button></div>
<h2>CSS</h2><div class="css-output"><textarea id="cssOut" readonly></textarea><button class="copy-btn" onclick="copyText('cssOut')">Copy CSS</button></div>
</div>
</main>
<script src="/assets/app.js"></script>
<script>
function update(){
var anim=document.getElementById('anim').value;
var size=parseInt(document.getElementById('size').value);
var thick=parseInt(document.getElementById('thick').value);
var barColor=document.getElementById('barColor').value;
var barBg=document.getElementById('barBg').value;
var radius=parseInt(document.getElementById('radius').value);
document.getElementById('thickVal').textContent=thick+'px';
document.getElementById('radiusVal').textContent=radius+'px';
var gap=(size-thick*3)/4;
var names=['spin','collapse','arrow','minus','3dy','elastic'];
var demos='';
names.forEach(function(n){
demos+='<div class="hamburger-demo"><div class="hb-'+n+'" onclick="this.classList.toggle(\'open\')">'+
'<span></span><span></span><span></span></div><span>'+n+'</span></div>';
});
var css='.hb-spin,.hb-collapse,.hb-arrow,.hb-minus,.hb-3dy,.hb-elastic{\n  width:'+size+'px;height:'+size+'px;\n  position:relative;cursor:pointer;\n  background:'+barBg+';\n  border-radius:6px;\n  display:flex;flex-direction:column;\n  justify-content:center;align-items:center;\n  gap:'+gap+'px;\n  transition:all .3s ease;\n}\n.hb-spin span,.hb-collapse span,.hb-arrow span,.hb-minus span,.hb-3dy span,.hb-elastic span{\n  display:block;\n  width:'+(size-12)+'px;height:'+thick+'px;\n  background:'+barColor+';\n  border-radius:'+radius+'px;\n  transition:all .3s ease;\n}\n/* Spin */\n.hb-spin.open{transform:rotate(180deg)}\n.hb-spin.open span:nth-child(1){opacity:0}\n.hb-spin.open span:nth-child(2){width:'+(thick*2)+'px;height:'+(thick*2)+'px;border-radius:50%}\n.hb-spin.open span:nth-child(3){opacity:0}\n/* Collapse */\n.hb-collapse.open span:nth-child(1){opacity:0;transform:translateY(-'+(gap+thick)+'px)}\n.hb-collapse.open span:nth-child(3){opacity:0;transform:translateY('+(gap+thick)+'px)}\n/* Arrow */\n.hb-arrow.open span:nth-child(1){transform:translateY('+(gap+thick)+'px) rotate(45deg);width:'+(size*0.6)+'px}\n.hb-arrow.open span:nth-child(2){opacity:0}\n.hb-arrow.open span:nth-child(3){transform:translateY(-'+(gap+thick)+'px) rotate(-45deg);width:'+(size*0.6)+'px}\n/* Minus */\n.hb-minus.open span:nth-child(1){opacity:0;transform:translateY('+(gap+thick)+'px)}\n.hb-minus.open span:nth-child(3){opacity:0}\n/* 3D Y-Rotate */\n.hb-3dy.open{transform:rotateY(180deg)}\n.hb-3dy.open span:nth-child(1){transform:rotate(45deg) translateY('+(gap+thick/2)+'px)}\n.hb-3dy.open span:nth-child(2){opacity:0}\n.hb-3dy.open span:nth-child(3){transform:rotate(-45deg) translateY(-'+(gap+thick/2)+'px)}\n/* Elastic */\n.hb-elastic.open span:nth-child(1){transform:translateY('+(gap+thick)+'px) rotate(135deg)}\n.hb-elastic.open span:nth-child(2){opacity:0;transform:scaleX(0)}\n.hb-elastic.open span:nth-child(3){transform:translateY(-'+(gap+thick)+'px) rotate(-135deg)}';
var html='<button class="hb-'+anim+'">\n  <span></span>\n  <span></span>\n  <span></span>\n</button>';
document.getElementById('preview').innerHTML='<style>'+css+'</style>'+demos;
document.getElementById('htmlOut').value=html;
document.getElementById('cssOut').value=css;
}
function copyText(id){var t=document.getElementById(id);t.select();document.execCommand('copy');}
document.querySelectorAll('select,input').forEach(function(e){e.addEventListener('input',update)});
update();
</script>
</body>
</html>
