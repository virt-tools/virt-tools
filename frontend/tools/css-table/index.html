<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="/assets/theme-init.js"></script>
<title>CSS Table Generator — Virtual Tools</title>
<link rel="stylesheet" href="/assets/style.css">
<style>
.tool-wrap{max-width:800px;margin:0 auto;}
.tool-desc{font-size:14px;color:var(--text-secondary,#aaa);margin:8px 0 20px;}
.controls{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin:12px 0;}
.ctrl{display:flex;flex-direction:column;gap:4px;}
.ctrl label{font-size:12px;color:var(--text-secondary,#888);}
.ctrl input,.ctrl select{padding:6px 8px;border-radius:6px;border:1px solid var(--border,#444);background:var(--bg,#1e2230);color:var(--text,#eee);font-size:13px;font-family:inherit;}
button.action{padding:8px 16px;border-radius:6px;border:1px solid var(--border,#444);background:var(--card,#2a2f3e);color:var(--text,#eee);cursor:pointer;font-size:13px;margin:4px 4px 0 0;}
.preview{border:1px solid var(--border,#444);border-radius:8px;margin:12px 0;overflow:hidden;}
.code-block{background:var(--bg,#1e2230);border:1px solid var(--border,#444);border-radius:8px;padding:12px;margin:8px 0;font-family:monospace;font-size:11px;color:var(--text,#eee);white-space:pre-wrap;word-break:break-all;max-height:400px;overflow:auto;}
table.dt{width:100%;border-collapse:collapse;font-size:13px;}
table.dt th,table.dt td{padding:10px 14px;text-align:left;}
table.dt th{font-weight:600;text-transform:uppercase;font-size:11px;letter-spacing:.5px;}
table.dt tbody tr{transition:background .15s;}
</style>
</head>
<body>
<header id="site-header"></header>
<main>
<div class="tool-wrap">
<h1>📊 CSS Table Generator</h1>
<p class="tool-desc">Create styled CSS data tables with 5 styles, striped rows, hover effects, and sorting indicators. Copy HTML+CSS.</p>
<div class="controls">
<div class="ctrl"><label>Style</label><select id="style" onchange="render()"><option value="modern" selected>Modern</option><option value="classic">Classic</option><option value="minimal">Minimal</option><option value="dark">Dark</option><option value="gradient">Gradient</option></select></div>
<div class="ctrl"><label>Striped Rows</label><select id="striped" onchange="render()"><option value="yes" selected>Yes</option><option value="no">No</option></select></div>
<div class="ctrl"><label>Hover Effect</label><select id="hover" onchange="render()"><option value="yes" selected>Yes</option><option value="no">No</option></select></div>
<div class="ctrl"><label>Header Color</label><input type="color" id="hbg" value="#6c5ce7" oninput="render()"></div>
<div class="ctrl"><label>Header Text</label><input type="color" id="htxt" value="#ffffff" oninput="render()"></div>
<div class="ctrl"><label>Row Bg</label><input type="color" id="rbg" value="#f8f9fa" oninput="render()"></div>
<div class="ctrl"><label>Row Text</label><input type="color" id="rtxt" value="#2d3436" oninput="render()"></div>
<div class="ctrl"><label>Border Radius</label><input type="range" id="radius" min="0" max="20" value="8" oninput="render()" style="width:100%"></div>
</div>
<div style="margin:8px 0;"><button class="action" onclick="copyCode()">Copy HTML+CSS</button></div>
<div class="preview" id="prev"></div>
<div class="code-block" id="code"></div>
</div>
</main>
<script src="/assets/app.js"></script>
<script>
let codeText='';
function v(id){return document.getElementById(id).value;}
function render(){
const style=v('style'),striped=v('striped')==='yes',hover=v('hover')==='yes';
const hbg=v('hbg'),htxt=v('htxt'),rbg=v('rbg'),rtxt=v('rtxt'),rad=v('radius');
let headerBg=hbg,headerColor=htxt,rowBg=rbg,rowColor=rtxt,altBg='#f1f2f6',hoverBg='#e8eaf0',borderCol='#e0e0e0';
if(style==='dark'){rowBg='#1e2230';rowColor='#e0e0e0';altBg='#252a38';hoverBg='#2a3040';borderCol='#3a3f4e';}
else if(style==='gradient'){headerBg=`linear-gradient(135deg,${hbg},#fd79a8)`;}
let hoverCss=hover?`table.dt tbody tr:hover{background:${hoverBg}!important;}`:'';
let stripeCss=striped?`table.dt tbody tr:nth-child(even){background:${altBg};}`:'';
let borderCss=style==='minimal'?'border-bottom:1px solid '+borderCol:'';
let css=`table.dt {
  width: 100%;
  border-collapse: collapse;
  font-size: 13px;
  border-radius: ${rad}px;
  overflow: hidden;
}
table.dt th {
  padding: 12px 16px;
  text-align: left;
  background: ${headerBg};
  color: ${htxt};
  font-weight: 600;
  text-transform: uppercase;
  font-size: 11px;
  letter-spacing: 0.5px;
}
table.dt td {
  padding: 10px 16px;
  color: ${rowColor};
  ${borderCss}
}
${stripeCss}
${hoverCss}`;
const sampleData=[['Name','Email','Role','Status'],['Alice Johnson','alice@example.com','Admin','Active'],['Bob Smith','bob@example.com','Editor','Pending'],['Carol White','carol@example.com','Viewer','Active'],['Dan Brown','dan@example.com','Admin','Inactive']];
let html='<table class="dt">';
for(let i=0;i<sampleData.length;i++){
html+=(i===0?'<thead><tr>':'<tr>');
for(let j=0;j<sampleData[i].length;j++){
html+=(i===0?'<th>':'<td>')+sampleData[i][j]+(i===0?'</th>':'</td>');
}
html+=(i===0?'</tr></thead><tbody>':'</tr>');
}
html+='</tbody></table>';
document.getElementById('prev').innerHTML='<div style="padding:12px;background:'+(style==='dark'?'#15181f':'#fff')+'">'+html+'</div>';
codeText=`<style>
${css}
</style>

<table class="dt">
  <thead>
    <tr><th>Name</th><th>Email</th><th>Role</th><th>Status</th></tr>
  </thead>
  <tbody>
    <tr><td>Alice Johnson</td><td>alice@example.com</td><td>Admin</td><td>Active</td></tr>
    <tr><td>Bob Smith</td><td>bob@example.com</td><td>Editor</td><td>Pending</td></tr>
    <tr><td>Carol White</td><td>carol@example.com</td><td>Viewer</td><td>Active</td></tr>
    <tr><td>Dan Brown</td><td>dan@example.com</td><td>Admin</td><td>Inactive</td></tr>
  </tbody>
</table>`;
document.getElementById('code').textContent=codeText;
}
function copyCode(){navigator.clipboard.writeText(codeText).then(()=>alert('Copied!'));}
render();
</script>
</body>
</html>
