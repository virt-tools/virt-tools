<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CSS Animated Counter Generator — virt.tools</title>
<link rel="stylesheet" href="/assets/style.css">
<style>
.tool-area{max-width:900px;margin:2rem auto;padding:0 1rem}
.controls{display:grid;gap:1rem;margin:1.5rem 0;padding:1.5rem;background:#1a1a2e;border-radius:12px}
.ctrl-row{display:flex;gap:1rem;align-items:center;flex-wrap:wrap;margin-bottom:.5rem}
.ctrl-row label{font-weight:600;font-size:.9rem;min-width:120px}
.ctrl-row select,.ctrl-row input{padding:.5rem;border-radius:8px;border:1px solid #444;background:#0f0f1e;color:#eee}
.preview-box{margin:1.5rem 0;border-radius:12px;min-height:200px;padding:2rem;background:#f5f5f5;display:flex;align-items:center;justify-content:center;gap:2rem;flex-wrap:wrap}
.output-block{margin:2rem 0}
.output-block textarea{width:100%;min-height:100px;font-family:monospace;font-size:.85rem;padding:1rem;border-radius:8px;border:1px solid #444;background:#0f0f1e;color:#eee;resize:vertical}
.copy-btn{padding:.6rem 1.2rem;border:none;border-radius:8px;background:#667eea;color:#fff;cursor:pointer;font-size:.9rem;margin-top:.5rem}
h2{margin-top:2rem;font-size:1.2rem}
</style>
</head>
<body>
<header id="site-header"></header>
<main>
<div class="tool-area">
<h1>🔢 CSS Animated Counter Generator</h1>
<p>Create CSS animated number counter components. 4 animation styles, 3 themes, 3 sizes. Copy HTML+CSS+JS.</p>
<div class="controls">
<div class="ctrl-row">
<label>Target Number</label><input type="number" id="target" value="12345" style="width:120px">
<label>Duration (ms)</label><input type="number" id="duration" value="2000" style="width:120px">
<label>Prefix</label><input type="text" id="prefix" value="" style="width:60px">
<label>Suffix</label><input type="text" id="suffix" value="+" style="width:60px">
</div>
<div class="ctrl-row">
<label>Animation</label><select id="anim"><option value="count" selected>Count Up</option><option value="slide">Slide Up</option><option value="flip">Flip</option><option value="fade">Fade In</option></select>
<label>Theme</label><select id="theme"><option value="light" selected>Light</option><option value="dark">Dark</option><option value="gradient">Gradient</option></select>
<label>Size</label><select id="size"><option value="2" selected>Medium</option><option value="1.5">Small</option><option value="3">Large</option></select>
</div>
<div class="ctrl-row">
<label>Thousands Sep</label><select id="sep"><option value="yes" selected>Yes</option><option value="no">No</option></select>
<label>Label</label><input type="text" id="label" value="Downloads" style="width:150px">
<button class="copy-btn" onclick="update()">Update Preview</button>
</div>
</div>
<h2>Preview</h2>
<div class="preview-box" id="preview"></div>
<button class="copy-btn" onclick="animatePreview()">▶ Replay Animation</button>
<h2>HTML</h2><div class="output-block"><textarea id="htmlOut" readonly></textarea><button class="copy-btn" onclick="copyText('htmlOut')">Copy HTML</button></div>
<h2>CSS</h2><div class="output-block"><textarea id="cssOut" readonly></textarea><button class="copy-btn" onclick="copyText('cssOut')">Copy CSS</button></div>
<h2>JS</h2><div class="output-block"><textarea id="jsOut" readonly></textarea><button class="copy-btn" onclick="copyText('jsOut')">Copy JS</button></div>
</div>
</main>
<script src="/assets/app.js"></script>
<script>
function update(){
var target=+document.getElementById('target').value;var dur=+document.getElementById('duration').value;
var prefix=document.getElementById('prefix').value;var suffix=document.getElementById('suffix').value;
var anim=document.getElementById('anim').value;var theme=document.getElementById('theme').value;
var size=+document.getElementById('size').value;var sep=document.getElementById('sep').value==='yes';
var label=document.getElementById('label').value;
var color=theme==='dark'?'#fff':theme==='gradient'?'transparent':'#1a1a2e';
var bg=theme==='dark'?'#1a1a2e':theme==='gradient'?'linear-gradient(135deg,#667eea,#764ba2)':'transparent';
var gradStyle=theme==='gradient'?'background:linear-gradient(135deg,#667eea,#764ba2);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;':'';
var html='<div class="counter" data-target="'+target+'" data-duration="'+dur+'" data-anim="'+anim+'" data-sep="'+(sep?1:0)+'">\n  <div class="counter-num">'+prefix+'0'+suffix+'</div>\n  <div class="counter-label">'+label+'</div>\n</div>';
var css='.counter{text-align:center;padding:1rem;border-radius:12px;font-family:system-ui,sans-serif;}\n.counter-num{font-size:'+size+'rem;font-weight:800;color:'+color+';'+gradStyle+'line-height:1.2}\n.counter-label{font-size:0.9rem;color:#888;margin-top:.5rem;}\n.counter[data-anim="slide"] .counter-num{animation:slideUp '+dur+'ms ease-out;}\n.counter[data-anim="fade"] .counter-num{animation:fadeIn '+dur+'ms ease-out;}\n.counter[data-anim="flip"] .counter-num{animation:flipIn '+dur+'ms ease-out;}\n@keyframes slideUp{from{transform:translateY(30px);opacity:0}to{transform:translateY(0);opacity:1}}\n@keyframes fadeIn{from{opacity:0}to{opacity:1}}\n@keyframes flipIn{from{transform:rotateX(90deg);opacity:0}to{transform:rotateX(0);opacity:1}}';
var js='function animateCounter(el){\n  var target=+el.dataset.target,dur=+el.dataset.duration,sep=+el.dataset.sep;\n  var start=0,startTime=null;\n  function step(ts){\n    if(!startTime)startTime=ts;\n    var p=Math.min((ts-startTime)/dur,1);\n    var val=Math.floor(p*target);\n    var num=el.querySelector(".counter-num");\n    var fmt=sep?val.toLocaleString():val;\n    num.textContent=(el.dataset.prefix||"")+fmt+(el.dataset.suffix||"");\n    if(p<1)requestAnimationFrame(step);\n  }\n  requestAnimationFrame(step);\n}\ndocument.querySelectorAll(".counter").forEach(animateCounter);';
document.getElementById('htmlOut').value=html;
document.getElementById('cssOut').value=css;
document.getElementById('jsOut').value=js;
renderPreview();
}
function renderPreview(){
var target=+document.getElementById('target').value;var dur=+document.getElementById('duration').value;
var prefix=document.getElementById('prefix').value;var suffix=document.getElementById('suffix').value;
var theme=document.getElementById('theme').value;var size=+document.getElementById('size').value;
var sep=document.getElementById('sep').value==='yes';var label=document.getElementById('label').value;
var color=theme==='dark'?'#fff':theme==='gradient'?'transparent':'#1a1a2e';
var gradStyle=theme==='gradient'?'background:linear-gradient(135deg,#667eea,#764ba2);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;':'';
var bg=theme==='dark'?'#1a1a2e':theme==='gradient'?'linear-gradient(135deg,#667eea,#764ba2)':'transparent';
var p=document.getElementById('preview');
p.innerHTML='<div style="text-align:center;padding:1rem;border-radius:12px;background:'+bg+';font-family:system-ui,sans-serif">'+
'<div style="font-size:'+size+'rem;font-weight:800;color:'+color+';'+gradStyle+'line-height:1.2" id="prevNum">'+prefix+'0'+suffix+'</div>'+
'<div style="font-size:.9rem;color:#888;margin-top:.5rem">'+label+'</div></div>';
animatePreview();
}
function animatePreview(){
var target=+document.getElementById('target').value;var dur=+document.getElementById('duration').value;
var prefix=document.getElementById('prefix').value;var suffix=document.getElementById('suffix').value;
var sep=document.getElementById('sep').value==='yes';var el=document.getElementById('prevNum');
if(!el)return;var start=0,startTime=null;
function step(ts){if(!startTime)startTime=ts;var p=Math.min((ts-startTime)/dur,1);
var val=Math.floor(p*target);var fmt=sep?val.toLocaleString():val;
el.textContent=prefix+fmt+suffix;if(p<1)requestAnimationFrame(step);}
requestAnimationFrame(step);
}
function copyText(id){var t=document.getElementById(id);t.select();document.execCommand('copy')}
['target','duration','prefix','suffix','anim','theme','size','sep','label'].forEach(function(id){var el=document.getElementById(id);el.addEventListener(el.type==='number'?'input':'change',update)});
update();
</script>
</body>
</html>
