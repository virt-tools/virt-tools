<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <script src="/assets/theme-init.js"></script>
  <title>URL Encode / Decode — Virtual Tools</title>
  <link rel="stylesheet" href="/assets/style.css">
  <style>
    label { font-size:13px; opacity:.8; display:block; margin-bottom:4px; }
    textarea { width:100%; font-family:monospace; font-size:12px; min-height:120px; }
    .row { display:flex; gap:10px; flex-wrap:wrap; align-items:center; margin:10px 0; }
    .row label { display:inline-flex; align-items:center; gap:4px; }
    .seg { display:inline-flex; border:1px solid var(--border,#2a2f3a); border-radius:8px; overflow:hidden; margin-bottom:10px; }
    .seg button { border:none; border-radius:0; background:transparent; color:inherit; padding:6px 14px; cursor:pointer; font-size:13px; }
    .seg button.active { background: var(--accent,#6ea8fe); color:#08101f; }
    .out { width:100%; font-family:monospace; font-size:12px; min-height:120px; white-space:pre; overflow:auto; }
    .err { color:var(--bad,#f87171); font-size:13px; margin:6px 0; min-height:1em; }
    .stats { font-size:12px; opacity:.65; margin-top:6px; }
  </style>
</head>
<body>
  <div id="site-header"></div>
  <main>
    <div class="tool-header">
      <a class="back" href="/">← All tools</a>
      <h1>URL Encode / Decode</h1>
      <p>Encode text for safe use in URLs or decode percent-encoded strings back. Supports <code>encodeURIComponent</code> (component, default), <code>encodeURI</code> (full URL — keeps <code>/?:&amp;=+</code>), and RFC 3986 (also encodes <code>!'()*</code>). Handles UTF-8 correctly. Everything runs locally in your browser.</p>
    </div>

    <div class="panel">
      <div class="field">
        <label for="in">Input</label>
        <textarea id="in" spellcheck="false" autocomplete="off" placeholder="Type or paste text or a URL…">https://example.com/search?q=hello world&lang=en español</textarea>
      </div>
      <div class="row">
        <div class="seg" id="mode">
          <button type="button" data-m="component" class="active">component</button>
          <button type="button" data-m="uri">URI</button>
          <button type="button" data-m="rfc3986">RFC 3986</button>
        </div>
        <label><input type="checkbox" id="live" checked> Live</label>
      </div>
      <div class="row">
        <button id="encode" class="primary">Encode →</button>
        <button id="decode" class="secondary">← Decode</button>
        <button id="swap" class="secondary">⇅ Swap</button>
        <button id="clear" class="secondary">Clear</button>
      </div>
      <div class="field">
        <label for="out">Output</label>
        <textarea id="out" class="out" spellcheck="false" autocomplete="off"></textarea>
      </div>
      <div class="err" id="err"></div>
      <div class="stats" id="stats"></div>
    </div>
  </main>

  <script src="/assets/app.js"></script>
  <script>
  (function () {
    var inp = document.getElementById("in");
    var out = document.getElementById("out");
    var err = document.getElementById("err");
    var stats = document.getElementById("stats");
    var mode = "component";

    function rfc3986(s) {
      return encodeURIComponent(s).replace(/[!'()*]/g, function (c) {
        return "%" + c.charCodeAt(0).toString(16).toUpperCase();
      });
    }

    function doEncode() {
      err.textContent = "";
      var v = inp.value;
      var r;
      if (mode === "component") r = encodeURIComponent(v);
      else if (mode === "uri") r = encodeURI(v);
      else r = rfc3986(v);
      out.value = r;
      stats.textContent = "Encoded " + v.length + " → " + r.length + " chars.";
    }

    function doDecode() {
      err.textContent = "";
      var v = inp.value;
      try {
        out.value = decodeURIComponent(v.replace(/\+/g, " "));
        stats.textContent = "Decoded " + v.length + " → " + out.value.length + " chars.";
      } catch (e) {
        out.value = "";
        err.textContent = "Invalid percent-encoding: " + e.message;
      }
    }

    document.getElementById("encode").addEventListener("click", doEncode);
    document.getElementById("decode").addEventListener("click", doDecode);
    document.getElementById("clear").addEventListener("click", function () {
      inp.value = ""; out.value = ""; err.textContent = ""; stats.textContent = "";
    });
    document.getElementById("swap").addEventListener("click", function () {
      if (!out.value) return;
      var t = inp.value; inp.value = out.value; out.value = t;
    });

    document.getElementById("mode").addEventListener("click", function (e) {
      var b = e.target.closest("button[data-m]");
      if (!b) return;
      mode = b.getAttribute("data-m");
      Array.prototype.forEach.call(this.querySelectorAll("button"), function (x) {
        x.classList.toggle("active", x === b);
      });
      if (document.getElementById("live").checked) doEncode();
    });

    if (document.getElementById("live").checked) {
      inp.addEventListener("input", doEncode);
    }
    document.getElementById("live").addEventListener("change", function () {
      if (this.checked) inp.addEventListener("input", doEncode);
      else inp.removeEventListener("input", doEncode);
    });

    doEncode();
  })();
  </script>
</body>
</html>
