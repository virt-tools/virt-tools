<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CSS Animated Border Generator — virt.tools</title>
<link rel="stylesheet" href="/assets/style.css">
<style>
.tool-area{max-width:900px;margin:2rem auto;padding:0 1rem}
.controls{display:grid;gap:1rem;margin:1.5rem 0;padding:1.5rem;background:#1a1a2e;border-radius:12px}
.ctrl-row{display:flex;gap:1rem;align-items:center;flex-wrap:wrap;margin-bottom:.5rem}
.ctrl-row label{font-weight:600;font-size:.9rem;min-width:120px}
.ctrl-row select,.ctrl-row input{padding:.5rem;border-radius:8px;border:1px solid #444;background:#0f0f1e;color:#eee}
.preview-box{margin:1.5rem 0;border-radius:12px;min-height:250px;border:1px solid #333;display:flex;align-items:center;justify-content:center;padding:2rem}
.output-block{margin:2rem 0}
.output-block textarea{width:100%;min-height:80px;font-family:monospace;font-size:.85rem;padding:1rem;border-radius:8px;border:1px solid #444;background:#0f0f1e;color:#eee;resize:vertical}
.copy-btn{padding:.6rem 1.2rem;border:none;border-radius:8px;background:#667eea;color:#fff;cursor:pointer;font-size:.9rem;margin-top:.5rem}
h2{margin-top:2rem;font-size:1.2rem}
</style>
</head>
<body>
<header id="site-header"></header>
<main>
<div class="tool-area">
<h1>✨ CSS Animated Border Generator</h1>
<p>Create CSS animated gradient border effects. 5 styles, adjustable speed/width/colors. Copy HTML+CSS.</p>
<div class="controls">
<div class="ctrl-row">
<label>Style</label>
<select id="style"><option value="rotate">Gradient Rotate</option><option value="dash">Dashed March</option><option value="glow">Pulsing Glow</option><option value="shimmer">Shimmer</option><option value="rainbow">Rainbow Flow</option></select>
<label>Width</label><select id="width"><option value="2">2px</option><option value="3" selected>3px</option><option value="4">4px</option><option value="6">6px</option></select>
</div>
<div class="ctrl-row">
<label>Radius</label><select id="radius"><option value="0">0px</option><option value="8">8px</option><option value="12" selected>12px</option><option value="20">20px</option></select>
<label>Speed</label><select id="speed"><option value="2">2s</option><option value="3" selected>3s</option><option value="5">5s</option><option value="10">10s</option></select>
</div>
<div class="ctrl-row">
<label>Color 1</label><input type="color" id="color1" value="#667eea">
<label>Color 2</label><input type="color" id="color2" value="#764ba2">
<label>Color 3</label><input type="color" id="color3" value="#f093fb">
</div>
<div class="ctrl-row"><button class="copy-btn" onclick="update()">Update</button></div>
</div>
<h2>Preview</h2>
<div class="preview-box" id="preview"></div>
<h2>HTML</h2><div class="output-block"><textarea id="htmlOut" readonly></textarea><button class="copy-btn" onclick="copyText('htmlOut')">Copy HTML</button></div>
<h2>CSS</h2><div class="output-block"><textarea id="cssOut" readonly></textarea><button class="copy-btn" onclick="copyText('cssOut')">Copy CSS</button></div>
</div>
</main>
<script src="/assets/app.js"></script>
<script>
function update(){
var s=document.getElementById('style').value;
var w=document.getElementById('width').value;
var r=document.getElementById('radius').value;
var sp=document.getElementById('speed').value;
var c1=document.getElementById('color1').value;
var c2=document.getElementById('color2').value;
var c3=document.getElementById('color3').value;
var html='<div class="anim-border">Animated Border</div>';
var css='';
if(s==='rotate'){css='.anim-border{position:relative;padding:1rem 2rem;border-radius:'+r+'px;background:#1a1a2e;color:#fff;font-size:1.2rem}\n.anim-border::before{content:"";position:absolute;inset:-'+w+'px;border-radius:'+(parseInt(r)+parseInt(w))+'px;background:conic-gradient(from 0deg,'+c1+','+c2+','+c3+','+c1+');animation:borderSpin '+sp+'s linear infinite;z-index:-1}\n@keyframes borderSpin{to{transform:rotate(360deg)}}';}
else if(s==='dash'){css='.anim-border{padding:1rem 2rem;border-radius:'+r+'px;background:#1a1a2e;color:#fff;font-size:1.2rem;border:'+w+'px solid;border-image:repeating-linear-gradient(90deg,'+c1+' 0 10px,'+c2+' 10px 20px,'+c3+' 20px 30px) 1;animation:borderDash '+sp+'s linear infinite}\n@keyframes borderDash{to{border-image-slice:1}}';}
else if(s==='glow'){css='.anim-border{padding:1rem 2rem;border-radius:'+r+'px;background:#1a1a2e;color:#fff;font-size:1.2rem;border:'+w+'px solid '+c1+';box-shadow:0 0 10px '+c1+',0 0 20px '+c2+',0 0 40px '+c3+';animation:borderGlow '+sp+'s ease-in-out infinite alternate}\n@keyframes borderGlow{from{box-shadow:0 0 5px '+c1+',0 0 10px '+c2+',0 0 20px '+c3+'}to{box-shadow:0 0 20px '+c1+',0 0 40px '+c2+',0 0 80px '+c3+'}}';}
else if(s==='shimmer'){css='.anim-border{position:relative;padding:1rem 2rem;border-radius:'+r+'px;background:#1a1a2e;color:#fff;font-size:1.2rem;border:'+w+'px solid #333;overflow:hidden}\n.anim-border::after{content:"";position:absolute;top:-100%;left:-100%;width:300%;height:300%;background:linear-gradient(45deg,transparent 40%,'+c1+' 50%,'+c2+' 60%,transparent 70%);animation:borderShimmer '+sp+'s linear infinite}\n@keyframes borderShimmer{from{transform:translate(0,0)}to{transform:translate(33%,33%)}}';}
else{css='.anim-border{padding:1rem 2rem;border-radius:'+r+'px;background:#1a1a2e;color:#fff;font-size:1.2rem;border:'+w+'px solid;border-image:linear-gradient(90deg,'+c1+','+c2+','+c3+','+c1+') 1;animation:borderRainbow '+sp+'s linear infinite}\n@keyframes borderRainbow{0%{filter:hue-rotate(0deg)}100%{filter:hue-rotate(360deg)}}';}
document.getElementById('htmlOut').value=html;
document.getElementById('cssOut').value=css;
document.getElementById('preview').innerHTML='<style>'+css+'</style>'+html;
}
function copyText(id){var t=document.getElementById(id);t.select();document.execCommand('copy')}
['style','width','radius','speed','color1','color2','color3'].forEach(function(id){var el=document.getElementById(id);el.addEventListener('input',update);el.addEventListener('change',update)});
update();
</script>
</body>
</html>
