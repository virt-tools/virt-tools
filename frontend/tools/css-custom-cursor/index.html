<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CSS Custom Cursor Generator — virt.tools</title>
<link rel="stylesheet" href="/assets/style.css">
<style>
.tool-area{max-width:900px;margin:2rem auto;padding:0 1rem}
.controls{display:grid;gap:1rem;margin:1.5rem 0;padding:1.5rem;background:#1a1a2e;border-radius:12px}
.control-row{display:flex;gap:1rem;align-items:center;flex-wrap:wrap}
.control-row label{min-width:120px;font-weight:600;font-size:.9rem}
.control-row select,.control-row input{padding:.5rem .75rem;border-radius:8px;border:1px solid #444;background:#0f0f1e;color:#eee;font-size:.9rem}
.preview-box{margin:1.5rem 0;border-radius:12px;overflow:hidden;min-height:300px;background:#0f0f1e;position:relative}
.output-block{margin:2rem 0}
.output-block textarea{width:100%;min-height:120px;font-family:monospace;font-size:.85rem;padding:1rem;border-radius:8px;border:1px solid #444;background:#0f0f1e;color:#eee;resize:vertical}
.copy-btn{padding:.6rem 1.2rem;border:none;border-radius:8px;background:#667eea;color:#fff;cursor:pointer;font-size:.9rem;margin-top:.5rem}
h2{margin-top:2rem;font-size:1.2rem}
.cursor-dot{position:fixed;width:12px;height:12px;border-radius:50%;background:#667eea;pointer-events:none;z-index:9999;transform:translate(-50%,-50%);transition:width .2s,height .2s,background .2s}
.cursor-ring{position:fixed;width:36px;height:36px;border-radius:50%;border:2px solid #667eea;pointer-events:none;z-index:9998;transform:translate(-50%,-50%);transition:transform .15s ease-out,width .2s,height .2s}
</style>
</head>
<body>
<header id="site-header"></header>
<main>
<div class="tool-area">
<h1>🖱️ CSS Custom Cursor Generator</h1>
<p>Create custom cursor effects with trailing dot, ring, or glow. Generate HTML+CSS+JS.</p>
<div class="controls">
<div class="control-row">
<label>Style</label><select id="style"><option value="dot">Dot</option><option value="ring">Ring</option><option value="dot-ring">Dot + Ring</option><option value="glow">Glow</option><option value="crosshair">Crosshair</option></select>
<label>Color</label><input type="color" id="color" value="#667eea">
</div>
<div class="control-row">
<label>Size</label><input type="range" id="size" value="12" min="6" max="40" style="width:120px">
<label>Ring Size</label><input type="range" id="ringSize" value="36" min="20" max="80" style="width:120px">
</div>
<div class="control-row">
<label>Trail Lag</label><input type="range" id="lag" value="0.15" min="0" max="0.5" step="0.05" style="width:120px">
<label>Blend Mode</label><select id="blend"><option value="normal">Normal</option><option value="difference">Difference</option><option value="screen">Screen</option></select>
</div>
</div>
<h2>Preview (move mouse in box)</h2>
<div class="preview-box" id="preview"></div>
<h2>HTML</h2><div class="output-block"><textarea id="htmlOut" readonly></textarea><button class="copy-btn" onclick="copyText('htmlOut')">Copy HTML</button></div>
<h2>CSS</h2><div class="output-block"><textarea id="cssOut" readonly></textarea><button class="copy-btn" onclick="copyText('cssOut')">Copy CSS</button></div>
<h2>JS</h2><div class="output-block"><textarea id="jsOut" readonly></textarea><button class="copy-btn" onclick="copyText('jsOut')">Copy JS</button></div>
</div>
</main>
<script src="/assets/app.js"></script>
<script>
var cursors=[];
function update(){
var s=document.getElementById('style').value;
var c=document.getElementById('color').value;
var sz=document.getElementById('size').value;
var rs=document.getElementById('ringSize').value;
var lg=document.getElementById('lag').value;
var bm=document.getElementById('blend').value;
var html='';
if(s==='dot'||s==='dot-ring')html+='<div class="cursor-dot"></div>\n';
if(s==='ring'||s==='dot-ring')html+='<div class="cursor-ring"></div>\n';
if(s==='glow')html+='<div class="cursor-glow"></div>\n';
if(s==='crosshair')html+='<div class="cursor-crosshair-h"></div>\n<div class="cursor-crosshair-v"></div>\n';
var css='';
if(s==='dot'||s==='dot-ring'){
css+='.cursor-dot{position:fixed;width:'+sz+'px;height:'+sz+'px;border-radius:50%;background:'+c+';pointer-events:none;z-index:9999;transform:translate(-50%,-50%);mix-blend-mode:'+bm+'}\n';
}
if(s==='ring'||s==='dot-ring'){
css+='.cursor-ring{position:fixed;width:'+rs+'px;height:'+rs+'px;border-radius:50%;border:2px solid '+c+';pointer-events:none;z-index:9998;transform:translate(-50%,-50%);mix-blend-mode:'+bm+';transition:transform '+lg+'s ease-out}\n';
}
if(s==='glow'){
css+='.cursor-glow{position:fixed;width:'+(parseInt(sz)*4)+'px;height:'+(parseInt(sz)*4)+'px;border-radius:50%;background:'+c+';pointer-events:none;z-index:9999;transform:translate(-50%,-50%);mix-blend-mode:'+bm+';filter:blur(15px);opacity:.6}\n';
}
if(s==='crosshair'){
css+='.cursor-crosshair-h{position:fixed;left:0;width:100vw;height:2px;background:'+c+';pointer-events:none;z-index:9998;mix-blend-mode:'+bm+';transition:top '+lg+'s ease-out}\n';
css+='.cursor-crosshair-v{position:fixed;top:0;width:2px;height:100vh;background:'+c+';pointer-events:none;z-index:9998;mix-blend-mode:'+bm+';transition:left '+lg+'s ease-out}\n';
}
var js='var mouseX=0,mouseY=0;\n';
if(s==='dot-ring'){
js+='var dot=document.querySelector(".cursor-dot");\nvar ring=document.querySelector(".cursor-ring");\n';
js+='document.addEventListener("mousemove",function(e){mouseX=e.clientX;mouseY=e.clientY;dot.style.left=mouseX+"px";dot.style.top=mouseY+"px"});\n';
js+='function animateRing(){ring.style.left=mouseX+"px";ring.style.top=mouseY+"px";requestAnimationFrame(animateRing)}animateRing();\n';
js+='document.querySelectorAll("a,button").forEach(function(el){el.addEventListener("mouseenter",function(){ring.style.transform="translate(-50%,-50%) scale(1.5)"});el.addEventListener("mouseleave",function(){ring.style.transform="translate(-50%,-50%) scale(1)"})});';
}else if(s==='glow'){
js+='var glow=document.querySelector(".cursor-glow");\ndocument.addEventListener("mousemove",function(e){glow.style.left=e.clientX+"px";glow.style.top=e.clientY+"px"});';
}else if(s==='crosshair'){
js+='var ch=document.querySelector(".cursor-crosshair-h");var cv=document.querySelector(".cursor-crosshair-v");\ndocument.addEventListener("mousemove",function(e){ch.style.top=e.clientY+"px";cv.style.left=e.clientX+"px"});';
}else{
js+='var el=document.querySelector(".'+(s==='dot'?'cursor-dot':'cursor-ring')+'");\ndocument.addEventListener("mousemove",function(e){el.style.left=e.clientX+"px";el.style.top=e.clientY+"px"});';
}
document.getElementById('htmlOut').value=html;
document.getElementById('cssOut').value=css;
document.getElementById('jsOut').value=js;
// Live preview
var pv=document.getElementById('preview');
cursors.forEach(function(el){el.remove()});cursors=[];
var st=document.createElement('style');st.textContent=css;
pv.innerHTML=html;pv.appendChild(st);
pv.querySelectorAll('[class^="cursor-"]').forEach(function(el){cursors.push(el)});
var mouseX=0,mouseY=0;
pv.addEventListener('mousemove',function(e){
var rect=pv.getBoundingClientRect();
mouseX=e.clientX;mouseY=e.clientY;
cursors.forEach(function(el){
if(el.classList.contains('cursor-crosshair-h'))el.style.top=(mouseY-rect.top)+'px';
else if(el.classList.contains('cursor-crosshair-v'))el.style.left=(mouseX-rect.left)+'px';
else{el.style.position='absolute';el.style.left=(mouseX-rect.left)+'px';el.style.top=(mouseY-rect.top)+'px'}
});
});
}
function copyText(id){var t=document.getElementById(id);t.select();document.execCommand('copy')}
document.querySelectorAll('select,input').forEach(function(e){e.addEventListener('input',update);e.addEventListener('change',update)});
update();
</script>
</body>
</html>
