<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CSS Music Visualizer Generator — virt.tools</title>
<link rel="stylesheet" href="/assets/style.css">
<style>
.tool-area{max-width:900px;margin:2rem auto;padding:0 1rem}
.controls{display:grid;gap:1rem;margin:1.5rem 0;padding:1.5rem;background:#1a1a2e;border-radius:12px}
.control-row{display:flex;gap:1rem;align-items:center;flex-wrap:wrap}
.control-row label{min-width:130px;font-weight:600;font-size:.9rem}
.control-row select,.control-row input{padding:.5rem .75rem;border-radius:8px;border:1px solid #444;background:#0f0f1e;color:#eee;font-size:.9rem}
.preview-box{margin:1.5rem 0;background:#0a0a14;border-radius:12px;min-height:200px;overflow:hidden;position:relative;display:flex;align-items:flex-end;justify-content:center;padding:20px}
.output-block{margin:2rem 0}
.output-block textarea{width:100%;min-height:120px;font-family:monospace;font-size:.85rem;padding:1rem;border-radius:8px;border:1px solid #444;background:#0f0f1e;color:#eee;resize:vertical}
.copy-btn{padding:.6rem 1.2rem;border:none;border-radius:8px;background:#667eea;color:#fff;cursor:pointer;font-size:.9rem;margin-top:.5rem}
h2{margin-top:2rem;font-size:1.2rem}
</style>
</head>
<body>
<header id="site-header"></header>
<main>
<div class="tool-area">
<h1>🎵 CSS Music Visualizer Generator</h1>
<p>Create CSS animated music visualizer bars. 4 styles, adjustable bars/speed/colors. Copy HTML+CSS.</p>
<div class="controls">
<div class="control-row">
<label>Style</label><select id="style"><option value="bars">Bars</option><option value="mirror">Mirror Bars</option><option value="wave">Wave</option><option value="circle">Circle</option></select>
<label>Bars</label><input type="number" id="barCount" value="20" min="5" max="60" style="width:60px">
<label>Speed (s)</label><input type="number" id="speed" value="1" min="0.2" max="5" step="0.1" style="width:60px">
</div>
<div class="control-row">
<label>Bar Color</label><input type="color" id="barColor" value="#667eea">
<label>Bar Color 2</label><input type="color" id="barColor2" value="#f472b6">
<label>Bar Width</label><input type="range" id="barWidth" value="6" min="2" max="20" style="width:120px">
<label>Height</label><input type="range" id="maxHeight" value="120" min="40" max="200" style="width:120px">
</div>
</div>
<h2>Preview</h2>
<div class="preview-box" id="preview"></div>
<h2>HTML</h2><div class="output-block"><textarea id="htmlOut" readonly></textarea><button class="copy-btn" onclick="copyText('htmlOut')">Copy HTML</button></div>
<h2>CSS</h2><div class="output-block"><textarea id="cssOut" readonly></textarea><button class="copy-btn" onclick="copyText('cssOut')">Copy CSS</button></div>
</div>
</main>
<script src="/assets/app.js"></script>
<script>
function update(){
var n=parseInt(document.getElementById('barCount').value);
var sp=parseFloat(document.getElementById('speed').value);
var c1=document.getElementById('barColor').value;
var c2=document.getElementById('barColor2').value;
var bw=parseInt(document.getElementById('barWidth').value);
var mh=parseInt(document.getElementById('maxHeight').value);
var style=document.getElementById('style').value;
var html='<div class="visualizer">\n';
for(var i=0;i<n;i++){
html+='  <div class="vbar"></div>\n';
}
html+='</div>';
var css='.visualizer{display:flex;align-items:flex-end;gap:'+(bw/2)+'px;height:'+mh+'px}\n';
css+='.vbar{width:'+bw+'px;background:linear-gradient(to top,'+c1+','+c2+');border-radius:3px 3px 0 0;animation:viz '+sp+'s ease-in-out infinite alternate}\n';
for(var i=0;i<n;i++){
var delay=(i*0.05).toFixed(2);
var h=20+Math.floor(Math.sin(i*0.5)*30+Math.random()*40+40);
css+='.vbar:nth-child('+(i+1)+'){animation-delay:'+delay+'s;height:'+h+'%}\n';
}
if(style==='mirror'){
css+='.visualizer{align-items:center}\n';
css+='.vbar{height:'+mh+'px;transform-origin:center}\n';
} else if(style==='wave'){
css+='.vbar{animation:wave-viz '+sp+'s ease-in-out infinite}\n';
css+='@keyframes wave-viz{0%,100%{height:20%}50%{height:100%}}\n';
} else if(style==='circle'){
css+='.visualizer{flex-direction:column;align-items:center;justify-content:center;border-radius:50%}\n';
}
css+='@keyframes viz{0%{height:20%}100%{height:100%}}\n';
document.getElementById('htmlOut').value=html;
document.getElementById('cssOut').value=css;
var pv=document.getElementById('preview');
pv.innerHTML=html;
var st=document.createElement('style');st.textContent=css;pv.appendChild(st);
}
function copyText(id){var t=document.getElementById(id);t.select();document.execCommand('copy')}
document.querySelectorAll('select,input').forEach(function(e){e.addEventListener('input',update);e.addEventListener('change',update)});
update();
</script>
</body>
</html>
