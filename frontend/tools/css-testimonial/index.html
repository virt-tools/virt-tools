<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="/assets/theme-init.js"></script>
<title>CSS Testimonial Generator — Virtual Tools</title>
<link rel="stylesheet" href="/assets/style.css">
<style>
.tool-wrap{max-width:800px;margin:0 auto;}
.tool-desc{font-size:14px;color:var(--text-secondary,#aaa);margin:8px 0 20px;}
.controls{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin:12px 0;}
.ctrl{display:flex;flex-direction:column;gap:4px;}
.ctrl label{font-size:12px;color:var(--text-secondary,#888);}
.ctrl input,.ctrl select{padding:6px 8px;border-radius:6px;border:1px solid var(--border,#444);background:var(--bg,#1e2230);color:var(--text,#eee);font-size:13px;}
button.action{padding:8px 16px;border-radius:6px;border:1px solid var(--border,#444);background:var(--card,#2a2f3e);color:var(--text,#eee);cursor:pointer;font-size:13px;margin:4px 4px 0 0;}
.preview{border:1px solid var(--border,#444);border-radius:8px;margin:12px 0;padding:24px;min-height:120px;}
.code-block{background:var(--bg,#1e2230);border:1px solid var(--border,#444);border-radius:8px;padding:12px;margin:8px 0;font-family:monospace;font-size:11px;color:var(--text,#eee);white-space:pre-wrap;word-break:break-all;max-height:400px;overflow:auto;}
.test-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:16px;}
.test-card{padding:24px;border-radius:12px;}
.test-card .stars{font-size:16px;margin-bottom:8px;}
.test-card .quote{font-size:14px;line-height:1.6;margin-bottom:12px;}
.test-card .author{display:flex;align-items:center;gap:8px;}
.test-card .avatar{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:16px;}
.test-card .name{font-size:14px;font-weight:600;}
.test-card .role{font-size:12px;opacity:.6;}
</style>
</head>
<body>
<header id="site-header"></header>
<main>
<div class="tool-wrap">
<h1>💬 CSS Testimonial Generator</h1>
<p class="tool-desc">Create testimonial/review cards with avatar, name, role, quote, and star rating. 4 styles, custom colors. Copy HTML+CSS.</p>
<div class="controls">
<div class="ctrl"><label>Style</label><select id="style" onchange="render()"><option value="card" selected>Card</option><option value="bordered">Bordered</option><option value="quote">Quote Mark</option><option value="minimal">Minimal</option></select></div>
<div class="ctrl"><label>Name 1</label><input type="text" id="name1" value="Sarah Chen" oninput="render()"></div>
<div class="ctrl"><label>Role 1</label><input type="text" id="role1" value="Product Manager" oninput="render()"></div>
<div class="ctrl"><label>Quote 1</label><input type="text" id="quote1" value="This tool saved me hours every week!" oninput="render()"></div>
<div class="ctrl"><label>Stars 1</label><select id="stars1" onchange="render()"><option>5</option><option>4</option><option>3</option><option>2</option><option>1</option></select></div>
<div class="ctrl"><label>Name 2</label><input type="text" id="name2" value="Mike Ross" oninput="render()"></div>
<div class="ctrl"><label>Role 2</label><input type="text" id="role2" value="Developer" oninput="render()"></div>
<div class="ctrl"><label>Quote 2</label><input type="text" id="quote2" value="Best utility site I have found." oninput="render()"></div>
<div class="ctrl"><label>Stars 2</label><select id="stars2" onchange="render()"><option>5</option><option>4</option><option>3</option><option>2</option><option>1</option></select></div>
<div class="ctrl"><label>Card Bg</label><input type="color" id="cardBg" value="#2a2f3e" oninput="render()"></div>
<div class="ctrl"><label>Accent</label><input type="color" id="accent" value="#6c5ce7" oninput="render()"></div>
<div class="ctrl"><label>Text</label><input type="color" id="txt" value="#ffffff" oninput="render()"></div>
</div>
<div style="margin:8px 0;"><button class="action" onclick="copyCode()">Copy HTML+CSS</button></div>
<div class="preview" id="prev"></div>
<div class="code-block" id="code"></div>
</div>
</div>
</main>
<script src="/assets/app.js"></script>
<script>
let codeText='';
function v(id){return document.getElementById(id).value;}
function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function initials(n){return n.split(' ').map(w=>w[0]||'').slice(0,2).join('').toUpperCase();}
function starStr(n){return '★'.repeat(parseInt(n))+'☆'.repeat(5-parseInt(n));}
function render(){
const style=v('style'),cardBg=v('cardBg'),accent=v('accent'),txt=v('txt');
const tests=[[v('name1'),v('role1'),v('quote1'),v('stars1')],[v('name2'),v('role2'),v('quote2'),v('stars2')]];
let cardCss='';
if(style==='bordered'){cardCss=`background:${cardBg};border:2px solid ${accent}55;`;}
else if(style==='quote'){cardCss=`background:${cardBg};border-left:4px solid ${accent};`;}
else if(style==='minimal'){cardCss=`background:transparent;border:1px solid ${accent}22;`;}
else{cardCss=`background:${cardBg};box-shadow:0 4px 12px rgba(0,0,0,.15);`;}
let html='<div class="test-grid">';
tests.forEach(t=>{
html+=`<div class="test-card" style="${cardCss}color:${txt};"><div class="stars" style="color:${accent};">${starStr(t[3])}</div><div class="quote">${style==='quote'?'<span style="font-size:24px;color:'+accent+';">"</span>':''}${esc(t[2])}</div><div class="author"><div class="avatar" style="background:${accent};color:${cardBg};">${initials(t[0])}</div><div><div class="name">${esc(t[0])}</div><div class="role">${esc(t[1])}</div></div></div></div>`;
});
html+='</div>';
document.getElementById('prev').innerHTML=html;
codeText=`<style>
.test-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
  gap: 16px;
}
.test-card {
  ${cardCss}
  color: ${txt};
  padding: 24px;
  border-radius: 12px;
}
.test-card .stars { font-size: 16px; margin-bottom: 8px; color: ${accent}; }
.test-card .quote { font-size: 14px; line-height: 1.6; margin-bottom: 12px; }
.test-card .author { display: flex; align-items: center; gap: 8px; }
.test-card .avatar {
  width: 40px; height: 40px; border-radius: 50%;
  background: ${accent}; color: ${cardBg};
  display: flex; align-items: center; justify-content: center;
  font-weight: 700; font-size: 16px;
}
.test-card .name { font-size: 14px; font-weight: 600; }
.test-card .role { font-size: 12px; opacity: 0.6; }
</style>

<div class="test-grid">`;
tests.forEach(t=>{
codeText+=`
  <div class="test-card">
    <div class="stars">${starStr(t[3])}</div>
    <div class="quote">${esc(t[2])}</div>
    <div class="author">
      <div class="avatar">${initials(t[0])}</div>
      <div>
        <div class="name">${esc(t[0])}</div>
        <div class="role">${esc(t[1])}</div>
      </div>
    </div>
  </div>`;
});
codeText+=`
</div>`;
document.getElementById('code').textContent=codeText;
}
function copyCode(){navigator.clipboard.writeText(codeText).then(()=>alert('Copied!'));}
render();
</script>
</body>
</html>
