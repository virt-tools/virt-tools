<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CSS Notification Bar Generator — virt.tools</title>
<link rel="stylesheet" href="/assets/style.css">
<style>
.tool-area{max-width:960px;margin:2rem auto;padding:0 1rem}
.controls{display:grid;gap:1rem;margin:1.5rem 0;padding:1.5rem;background:var(--card-bg,#1a1a2e);border-radius:12px}
.control-row{display:flex;gap:1rem;align-items:center;flex-wrap:wrap}
.control-row label{min-width:120px;font-weight:600;font-size:.9rem}
.control-row select,.control-row input[type="text"],.control-row input[type="color"]{padding:.5rem .75rem;border-radius:8px;border:1px solid #444;background:var(--bg,#0f0f1e);color:var(--text,#eee);font-size:.9rem}
.control-row input[type="range"]{flex:1;min-width:150px}
.preview-area{margin:2rem 0;padding:2rem;background:var(--card-bg,#1a1a2e);border-radius:12px;min-height:200px;position:relative;overflow:hidden}
.css-output{margin:2rem 0}
.css-output textarea{width:100%;min-height:200px;font-family:monospace;font-size:.85rem;padding:1rem;border-radius:8px;border:1px solid #444;background:#0f0f1e;color:#eee;resize:vertical}
.copy-btn{padding:.6rem 1.2rem;border:none;border-radius:8px;background:#4a9eff;color:#fff;cursor:pointer;font-size:.9rem;margin-top:.5rem}
.copy-btn:hover{background:#3a8eef}
h2{margin-top:2rem;font-size:1.2rem}
.bar-preview{position:absolute;left:0;right:0;padding:.75rem 1rem;display:flex;align-items:center;justify-content:space-between;font-size:.9rem;transition:all .3s}
.bar-close{background:none;border:none;color:inherit;font-size:1.2rem;cursor:pointer;opacity:.7;padding:0 .25rem}
.bar-close:hover{opacity:1}
</style>
</head>
<body>
<header id="site-header"></header>
<main>
<div class="tool-area">
<h1>📢 CSS Notification Bar Generator</h1>
<p>Create top or bottom notification bars with close buttons, icons, and 5 styles.</p>

<div class="controls">
<div class="control-row">
<label>Style</label>
<select id="style">
<option value="solid">Solid</option>
<option value="gradient">Gradient</option>
<option value="outline">Outline</option>
<option value="glass">Glass</option>
<option value="stripe">Striped</option>
</select>
</div>
<div class="control-row">
<label>Type</label>
<select id="type">
<option value="info">Info</option>
<option value="success">Success</option>
<option value="warning">Warning</option>
<option value="error">Error</option>
<option value="promo">Promo</option>
</select>
</div>
<div class="control-row">
<label>Position</label>
<select id="position">
<option value="top">Top</option>
<option value="bottom">Bottom</option>
</select>
</div>
<div class="control-row">
<label>Background</label>
<input type="color" id="bgColor" value="#4a9eff">
<label>Text</label>
<input type="color" id="textColor" value="#ffffff">
</div>
<div class="control-row">
<label>Message</label>
<input type="text" id="message" value="🎉 Free shipping on all orders over $50!" style="flex:1;min-width:250px">
</div>
<div class="control-row">
<label>Show Close</label>
<select id="showClose">
<option value="yes">Yes</option>
<option value="no">No</option>
</select>
<label>Icon</label>
<select id="icon">
<option value="none">None</option>
<option value="info">ℹ️</option>
<option value="success">✅</option>
<option value="warning">⚠️</option>
<option value="error">❌</option>
<option value="promo">🎉</option>
</select>
</div>
<div class="control-row">
<label>Padding</label>
<input type="range" id="padding" min="4" max="24" value="12">
<span id="paddingVal">12px</span>
</div>
</div>

<div class="preview-area" id="preview">
<div class="bar-preview" id="bar"></div>
</div>

<h2>HTML</h2>
<div class="css-output">
<textarea id="htmlOut" readonly></textarea>
<button class="copy-btn" onclick="copyText('htmlOut')">Copy HTML</button>
</div>
<h2>CSS</h2>
<div class="css-output">
<textarea id="cssOut" readonly></textarea>
<button class="copy-btn" onclick="copyText('cssOut')">Copy CSS</button>
</div>
</div>
</main>
<script src="/assets/app.js"></script>
<script>
var typeColors={info:'#4a9eff',success:'#22c55e',warning:'#f59e0b',error:'#ef4444',promo:'#a855f7'};
var typeIcons={info:'ℹ️',success:'✅',warning:'⚠️',error:'❌',promo:'🎉'};

function update(){
var style=document.getElementById('style').value;
var type=document.getElementById('type').value;
var pos=document.getElementById('position').value;
var bg=document.getElementById('bgColor').value;
var txt=document.getElementById('textColor').value;
var msg=document.getElementById('message').value;
var showClose=document.getElementById('showClose').value==='yes';
var iconSel=document.getElementById('icon').value;
var pad=parseInt(document.getElementById('padding').value);
document.getElementById('paddingVal').textContent=pad+'px';

var icon=iconSel!=='none'?typeIcons[iconSel]:'';
var bg2=bg;

if(type!=='promo'&&document.getElementById('bgColor').value==='#4a9eff'){
bg2=typeColors[type];document.getElementById('bgColor').value=bg2;
}

var bar=document.getElementById('bar');
bar.style.cssText='';
bar.style.top=pos==='top'?'0':'auto';
bar.style.bottom=pos==='bottom'?'0':'auto';
bar.style.padding=pad+'px 1rem';
bar.style.color=txt;

if(style==='solid'){bar.style.background=bg2;}
else if(style==='gradient'){bar.style.background='linear-gradient(90deg,'+bg2+','+shadeColor(bg2,-20)+')';}
else if(style==='outline'){bar.style.background='transparent';bar.style.border='2px solid '+bg2;bar.style.color=bg2;}
else if(style==='glass'){bar.style.background=bg2+'40';bar.style.backdropFilter='blur(10px)';bar.style.border='1px solid '+bg2+'80';}
else if(style==='stripe'){bar.style.background='repeating-linear-gradient(45deg,'+bg2+','+bg2+' 10px,'+shadeColor(bg2,-15)+' 10px,'+shadeColor(bg2,-15)+' 20px)';}

var html='<div class="notification-bar'+(pos==='bottom'?' notification-bar-bottom':'')+'">\n  <span class="nb-content">'+(icon?'<span class="nb-icon">'+icon+'</span> ':'')+msg+'</span>'+(showClose?'<button class="nb-close" onclick="this.parentElement.style.display=\'none\'">&times;</button>':'')+'\n</div>';

var css='.notification-bar{\n  position:fixed;\n  '+(pos==='bottom'?'bottom:0':'top:0')+';\n  left:0;\n  right:0;\n  padding:'+pad+'px 1rem;\n  display:flex;\n  align-items:center;\n  justify-content:space-between;\n  color:'+txt+';\n  background:'+(style==='solid'?bg2:style==='gradient'?'linear-gradient(90deg,'+bg2+','+shadeColor(bg2,-20)+')':style==='outline'?'transparent':style==='glass'?bg2+'40':style==='stripe'?'repeating-linear-gradient(45deg,'+bg2+','+bg2+' 10px,'+shadeColor(bg2,-15)+' 10px,'+shadeColor(bg2,-15)+' 20px)':'')+';\n'+(style==='outline'?'  border:2px solid '+bg2+';\n':'')+(style==='glass'?'  backdrop-filter:blur(10px);\n  border:1px solid '+bg2+'80;\n':'')+'  z-index:9999;\n}\n.nb-content{\n  flex:1;\n}\n.nb-icon{\n  margin-right:.5rem;\n}\n.nb-close{\n  background:none;\n  border:none;\n  color:inherit;\n  font-size:1.4rem;\n  cursor:pointer;\n  opacity:.7;\n  padding:0 .25rem;\n}\n.nb-close:hover{\n  opacity:1;\n}';

bar.innerHTML='<span>'+(icon?icon+' ':'')+msg+'</span>'+(showClose?'<button class="bar-close" onclick="this.parentElement.style.display=\'none\'">&times;</button>':'');

document.getElementById('htmlOut').value=html;
document.getElementById('cssOut').value=css;
}

function shadeColor(hex,percent){
var R=parseInt(hex.substring(1,3),16);
var G=parseInt(hex.substring(3,5),16);
var B=parseInt(hex.substring(5,7),16);
R=parseInt(R*(100+percent)/100);G=parseInt(G*(100+percent)/100);B=parseInt(B*(100+percent)/100);
R=Math.min(255,Math.max(0,R));G=Math.min(255,Math.max(0,G));B=Math.min(255,Math.max(0,B));
return'#'+R.toString(16).padStart(2,'0')+G.toString(16).padStart(2,'0')+B.toString(16).padStart(2,'0');
}

function copyText(id){
var t=document.getElementById(id);t.select();document.execCommand('copy');
}

document.querySelectorAll('select,input').forEach(function(e){e.addEventListener('input',update)});
update();
</script>
</body>
</html>
