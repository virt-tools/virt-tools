<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="/assets/theme-init.js"></script>
<title>CSS Tag Generator — Virtual Tools</title>
<link rel="stylesheet" href="/assets/style.css">
<style>
.tool-wrap{max-width:800px;margin:0 auto;}
.tool-desc{font-size:14px;color:var(--text-secondary,#aaa);margin:8px 0 20px;}
.controls{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin:12px 0;}
.ctrl{display:flex;flex-direction:column;gap:4px;}
.ctrl label{font-size:12px;color:var(--text-secondary,#888);}
.ctrl input,.ctrl select{padding:6px 8px;border-radius:6px;border:1px solid var(--border,#444);background:var(--bg,#1e2230);color:var(--text,#eee);font-size:13px;font-family:inherit;}
button.action{padding:8px 16px;border-radius:6px;border:1px solid var(--border,#444);background:var(--card,#2a2f3e);color:var(--text,#eee);cursor:pointer;font-size:13px;margin:4px 4px 0 0;}
.preview{border:1px solid var(--border,#444);border-radius:8px;margin:12px 0;overflow:hidden;padding:20px;display:flex;flex-wrap:wrap;gap:8px;align-items:center;min-height:60px;}
.code-block{background:var(--bg,#1e2230);border:1px solid var(--border,#444);border-radius:8px;padding:12px;margin:8px 0;font-family:monospace;font-size:11px;color:var(--text,#eee);white-space:pre-wrap;word-break:break-all;max-height:400px;overflow:auto;}
</style>
</head>
<body>
<header id="site-header"></header>
<main>
<div class="tool-wrap">
<h1>🏷️ CSS Tag/Pill Generator</h1>
<p class="tool-desc">Create CSS tag/pill components with 6 styles, removable X button, custom colors. Copy HTML+CSS.</p>
<div class="controls">
<div class="ctrl"><label>Style</label><select id="style" onchange="render()"><option value="solid" selected>Solid</option><option value="outline">Outline</option><option value="soft">Soft</option><option value="gradient">Gradient</option><option value="glass">Glass</option><option value="neon">Neon</option></select></div>
<div class="ctrl"><label>Accent Color</label><input type="color" id="accent" value="#6c5ce7" oninput="render()"></div>
<div class="ctrl"><label>Text Color</label><input type="color" id="tcol" value="#ffffff" oninput="render()"></div>
<div class="ctrl"><label>Radius</label><input type="range" id="radius" min="0" max="20" value="12" oninput="render()" style="width:100%"></div>
<div class="ctrl"><label>Font Size</label><input type="range" id="fs" min="10" max="20" value="13" oninput="render()" style="width:100%"></div>
<div class="ctrl"><label>Removable X</label><select id="removable" onchange="render()"><option value="yes">Yes</option><option value="no" selected>No</option></select></div>
</div>
<div style="margin:8px 0;"><button class="action" onclick="copyCode()">Copy HTML+CSS</button></div>
<div class="preview" id="prev"></div>
<div class="code-block" id="code"></div>
</div>
</main>
<script src="/assets/app.js"></script>
<script>
let codeText='';
function v(id){return document.getElementById(id).value;}
function render(){
const style=v('style'),accent=v('accent'),tcol=v('tcol'),rad=v('radius'),fs=v('fs'),rem=v('removable');
let css='',tags=['JavaScript','Python','Rust','Go','TypeScript'];
let bg='';
if(style==='solid'){bg=accent;}
else if(style==='outline'){bg='transparent';}
else if(style==='soft'){bg=accent+'20';}
else if(style==='gradient'){bg='linear-gradient(135deg,'+accent+','#a29bfe)';}
else if(style==='glass'){bg='rgba(255,255,255,0.1)';}
else if(style==='neon'){bg='#1a1a2e';}
let border=style==='outline'?`border:2px solid ${accent};`:style==='glass'?'border:1px solid rgba(255,255,255,0.2);':style==='neon'?`border:1px solid ${accent};box-shadow:0 0 8px ${accent}60;`:'border:none;';
let textColor=style==='soft'?accent:style==='outline'?accent:style==='glass'?'#fff':style==='neon'?accent:tcol;
let extra=style==='glass'?'backdrop-filter:blur(8px);':'';
let xHtml=rem==='yes'?`<span class="tag-x">&times;</span>`:'';
let xCss=rem==='yes'?`.tag-x{margin-left:6px;cursor:pointer;opacity:0.6;font-size:${fs}px;line-height:1;}.tag-x:hover{opacity:1;}`:'';
css=`.tag {
  display: inline-flex;
  align-items: center;
  padding: ${Math.round(fs*0.5)}px ${Math.round(fs*0.8)}px;
  background: ${bg};
  color: ${textColor};
  border-radius: ${rad}px;
  font-size: ${fs}px;
  font-weight: 500;
  font-family: sans-serif;
  ${border}
  ${extra}
  white-space: nowrap;
}
${xCss}`;
let html=tags.map(t=>`<span class="tag">${t}${xHtml}</span>`).join('\n');
codeText=`<style>
${css}
</style>

${html}`;
document.getElementById('prev').style.background=(style==='glass'||style==='neon'?'#0a0a1a':'#fff');
document.getElementById('prev').innerHTML=tags.map(t=>`<span style="display:inline-flex;align-items:center;padding:${Math.round(fs*0.5)}px ${Math.round(fs*0.8)}px;background:${bg};color:${textColor};border-radius:${rad}px;font-size:${fs}px;font-weight:500;font-family:sans-serif;${border}${extra}white-space:nowrap;">${t}${rem==='yes'?'<span style="margin-left:6px;cursor:pointer;opacity:0.6;">&times;</span>':''}</span>`).join('');
document.getElementById('code').textContent=codeText;
}
function copyCode(){navigator.clipboard.writeText(codeText).then(()=>alert('Copied!'));}
render();
</script>
</body>
</html>
