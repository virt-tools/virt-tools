<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CSS Shimmer Effect Generator — virt.tools</title>
<link rel="stylesheet" href="/assets/style.css">
<style>
.tool-area{max-width:900px;margin:2rem auto;padding:0 1rem}
.controls{display:grid;gap:1rem;margin:1.5rem 0;padding:1.5rem;background:#1a1a2e;border-radius:12px}
.control-row{display:flex;gap:1rem;align-items:center;flex-wrap:wrap}
.control-row label{min-width:130px;font-weight:600;font-size:.9rem}
.control-row select,.control-row input{padding:.5rem .75rem;border-radius:8px;border:1px solid #444;background:#0f0f1e;color:#eee;font-size:.9rem}
.preview-box{margin:1.5rem 0;padding:2rem;background:#f5f5f5;border-radius:12px;min-height:200px}
.shimmer-card{background:#e0e0e0;border-radius:8px;overflow:hidden;position:relative;margin-bottom:1rem}
.shimmer-line{height:16px;border-radius:4px;margin-bottom:10px;background:#e0e0e0;overflow:hidden;position:relative}
.shimmer-avatar{width:50px;height:50px;border-radius:50%;background:#e0e0e0;overflow:hidden;position:relative;display:inline-block;vertical-align:middle;margin-right:12px}
.shimmer-bar{height:12px;border-radius:4px;background:#e0e0e0;overflow:hidden;position:relative}
.shimmer-rect{height:120px;border-radius:8px;background:#e0e0e0;overflow:hidden;position:relative}
.output-block{margin:2rem 0}
.output-block textarea{width:100%;min-height:120px;font-family:monospace;font-size:.85rem;padding:1rem;border-radius:8px;border:1px solid #444;background:#0f0f1e;color:#eee;resize:vertical}
.copy-btn{padding:.6rem 1.2rem;border:none;border-radius:8px;background:#667eea;color:#fff;cursor:pointer;font-size:.9rem;margin-top:.5rem}
h2{margin-top:2rem;font-size:1.2rem}
</style>
</head>
<body>
<header id="site-header"></header>
<main>
<div class="tool-area">
<h1>✨ CSS Shimmer Effect Generator</h1>
<p>Create CSS shimmer/skeleton loading placeholder effects. 5 presets, adjustable speed/colors. Copy CSS.</p>
<div class="controls">
<div class="control-row">
<label>Preset</label><select id="preset"><option value="card">Card</option><option value="text">Text Lines</option><option value="profile">Profile</option><option value="article">Article</option><option value="grid">Grid</option></select>
<label>Base Color</label><input type="color" id="baseColor" value="#e0e0e0">
<label>Shine Color</label><input type="color" id="shineColor" value="#f5f5f5">
</div>
<div class="control-row">
<label>Speed (s)</label><input type="range" id="speed" min="0.5" max="5" step="0.1" value="1.5" style="width:150px"><span id="speedVal">1.5</span>
<label>Width (px)</label><input type="number" id="width" value="100" min="50" max="500" style="width:70px">
<label>Direction</label><select id="direction"><option value="left">Left → Right</option><option value="right">Right → Left</option></select>
</div>
</div>
<h2>Preview</h2>
<div class="preview-box" id="preview"></div>
<h2>CSS</h2><div class="output-block"><textarea id="cssOut" readonly></textarea><button class="copy-btn" onclick="copyText('cssOut')">Copy CSS</button></div>
<h2>HTML</h2><div class="output-block"><textarea id="htmlOut" readonly></textarea><button class="copy-btn" onclick="copyText('htmlOut')">Copy HTML</button></div>
</div>
</main>
<script src="/assets/app.js"></script>
<script>
function update(){
var preset=document.getElementById('preset').value;
var base=document.getElementById('baseColor').value;
var shine=document.getElementById('shineColor').value;
var speed=parseFloat(document.getElementById('speed').value);
var width=parseInt(document.getElementById('width').value);
var dir=document.getElementById('direction').value;
document.getElementById('speedVal').textContent=speed;
var fromX=dir==='left'?'-100%':'100%';
var toX=dir==='left'?'100%':'-100%';
var keyframes='@keyframes shimmer {\n  0% { background-position: '+fromX+'; }\n  100% { background-position: '+toX+'; }\n}';
var shimmerCss='background: linear-gradient(90deg, '+base+' 25%, '+shine+' 50%, '+base+' 75%);\n  background-size: 200% 100%;\n  animation: shimmer '+speed+'s linear infinite;';
var preview=document.getElementById('preview');
var html='';
var css='';
if(preset==='card'){
html='<div class="shimmer-card" style="width:'+width+'px;padding:1rem">\n  <div class="shimmer-line"></div>\n  <div class="shimmer-line" style="width:80%"></div>\n  <div class="shimmer-line" style="width:60%"></div>\n</div>';
css='.shimmer-card {\n  '+shimmerCss+'\n  border-radius: 8px;\n}\n.shimmer-line {\n  '+shimmerCss+'\n  height: 16px;\n  border-radius: 4px;\n  margin-bottom: 10px;\n}\n'+keyframes;
preview.innerHTML='<div class="shimmer-card" style="width:'+width+'px;padding:1rem"><div class="shimmer-line"></div><div class="shimmer-line" style="width:80%"></div><div class="shimmer-line" style="width:60%"></div></div>';
}else if(preset==='text'){
html='<div style="width:'+width+'px">\n  <div class="shimmer-line"></div>\n  <div class="shimmer-line" style="width:90%"></div>\n  <div class="shimmer-line" style="width:70%"></div>\n  <div class="shimmer-line" style="width:85%"></div>\n</div>';
css='.shimmer-line {\n  '+shimmerCss+'\n  height: 16px;\n  border-radius: 4px;\n  margin-bottom: 10px;\n}\n'+keyframes;
preview.innerHTML='<div style="width:'+width+'px"><div class="shimmer-line"></div><div class="shimmer-line" style="width:90%"></div><div class="shimmer-line" style="width:70%"></div><div class="shimmer-line" style="width:85%"></div></div>';
}else if(preset==='profile'){
html='<div style="display:flex;align-items:center;gap:12px;width:'+width+'px">\n  <div class="shimmer-avatar"></div>\n  <div style="flex:1">\n    <div class="shimmer-line" style="width:60%"></div>\n    <div class="shimmer-line" style="width:40%"></div>\n  </div>\n</div>';
css='.shimmer-avatar {\n  '+shimmerCss+'\n  width: 50px;\n  height: 50px;\n  border-radius: 50%;\n}\n.shimmer-line {\n  '+shimmerCss+'\n  height: 16px;\n  border-radius: 4px;\n  margin-bottom: 10px;\n}\n'+keyframes;
preview.innerHTML='<div style="display:flex;align-items:center;gap:12px;width:'+width+'px"><div class="shimmer-avatar"></div><div style="flex:1"><div class="shimmer-line" style="width:60%"></div><div class="shimmer-line" style="width:40%"></div></div></div>';
}else if(preset==='article'){
html='<div style="width:'+width+'px">\n  <div class="shimmer-rect"></div>\n  <div class="shimmer-line" style="width:100%;height:24px;margin-top:12px"></div>\n  <div class="shimmer-line" style="width:80%"></div>\n  <div class="shimmer-line" style="width:60%"></div>\n</div>';
css='.shimmer-rect {\n  '+shimmerCss+'\n  height: 120px;\n  border-radius: 8px;\n}\n.shimmer-line {\n  '+shimmerCss+'\n  height: 16px;\n  border-radius: 4px;\n  margin-bottom: 10px;\n}\n'+keyframes;
preview.innerHTML='<div style="width:'+width+'px"><div class="shimmer-rect"></div><div class="shimmer-line" style="width:100%;height:24px;margin-top:12px"></div><div class="shimmer-line" style="width:80%"></div><div class="shimmer-line" style="width:60%"></div></div>';
}else{
html='<div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;width:'+width+'px">\n  <div class="shimmer-rect" style="height:80px"></div>\n  <div class="shimmer-rect" style="height:80px"></div>\n  <div class="shimmer-rect" style="height:80px"></div>\n  <div class="shimmer-rect" style="height:80px"></div>\n</div>';
css='.shimmer-rect {\n  '+shimmerCss+'\n  height: 80px;\n  border-radius: 8px;\n}\n'+keyframes;
preview.innerHTML='<div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;width:'+width+'px"><div class="shimmer-rect" style="height:80px"></div><div class="shimmer-rect" style="height:80px"></div><div class="shimmer-rect" style="height:80px"></div><div class="shimmer-rect" style="height:80px"></div></div>';
}
document.querySelectorAll('.preview-box .shimmer-line,.preview-box .shimmer-card,.preview-box .shimmer-avatar,.preview-box .shimmer-rect').forEach(function(el){
el.style.background='linear-gradient(90deg, '+base+' 25%, '+shine+' 50%, '+base+' 75%)';
el.style.backgroundSize='200% 100%';
el.style.animation='shimmer '+speed+'s linear infinite';
});
document.getElementById('cssOut').value=css;
document.getElementById('htmlOut').value=html;
}
function copyText(id){var t=document.getElementById(id);t.select();document.execCommand('copy')}
document.querySelectorAll('select,input').forEach(function(e){e.addEventListener('input',update);e.addEventListener('change',update)});
update();
</script>
</body>
</html>
