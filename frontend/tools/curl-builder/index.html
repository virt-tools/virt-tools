<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <script src="/assets/theme-init.js"></script>
  <title>cURL Command Builder — Virtual Tools</title>
  <link rel="stylesheet" href="/assets/style.css">
  <style>
    .vt-layout{max-width:800px;margin:20px auto;}
    textarea,input[type=text],input[type=url],select{width:100%;font-family:monospace;font-size:13px;padding:8px 10px;border:1px solid var(--border,#2a2f3a);border-radius:8px;background:var(--bg,#1a1a2e);color:var(--text,#e0e0e0);box-sizing:border-box;}
    label.vt-label{display:block;font-size:13px;margin:8px 0 4px;opacity:.8;}
    .vt-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
    @media(max-width:600px){.vt-grid{grid-template-columns:1fr;}}
    .vt-card{background:var(--card-bg,#21212e);border:1px solid var(--border,#2a2f3a);border-radius:8px;padding:12px 16px;margin:8px 0;}
    .vt-card h3{margin:0 0 8px;font-size:14px;}
    .vt-header-row{display:flex;align-items:center;gap:8px;}
    .vt-method{width:90px;}
    .vt-output{font-family:monospace;font-size:12px;white-space:pre-wrap;word-break:break-all;background:var(--bg,#1a1a2e);border:1px solid var(--border,#2a2f3a);border-radius:8px;padding:12px;min-height:120px;max-height:300px;overflow:auto;}
    button{padding:8px 16px;border-radius:8px;cursor:pointer;border:1px solid var(--border,#2a2f3a);background:var(--card-bg,#21212e);color:var(--text,#e0e0e0);}
    button:hover{opacity:.8;}
    .vt-header-row{margin-bottom:10px;}
    .vt-tabs{display:flex;gap:6px;margin:12px 0;}
    .vt-tab{padding:6px 14px;border-radius:8px;cursor:pointer;border:1px solid var(--border,#2a2f3a);background:var(--card-bg,#21212e);color:var(--text,#e0e0e0);font-size:13px;}
    .vt-tab.active{border-color:var(--accent,#6366f1);color:var(--accent,#6366f1);}
    .vt-header-pair{display:flex;gap:6px;margin:4px 0;}
    .vt-header-pair input{flex:1;}
    .vt-header-pair button{padding:4px 10px;font-size:12px;}
    .vt-data-pair{display:flex;gap:6px;margin:4px 0;}
    .vt-data-pair input{flex:1;}
    .vt-data-pair button{padding:4px 10px;font-size:12px;}
    .vt-parsed{font-size:13px;}
    .vt-parsed .key{color:var(--accent,#6366f1);font-weight:bold;}
    .vt-parsed table{width:100%;border-collapse:collapse;}
    .vt-parsed td{padding:4px 8px;border-bottom:1px solid var(--border,#2a2f3a);vertical-align:top;}
    .vt-parsed td:first-child{width:130px;opacity:.7;}
  </style>
</head>
<body>
  <div id="site-header"></div>
  <main>
    <div class="tool-header">
      <a class="back" href="/">← All tools</a>
      <h1>cURL Command Builder & Parser</h1>
      <p>Build cURL commands visually or parse existing cURL commands to understand their components. Supports methods, headers, body, auth, cookies, and flags. Fully client-side — nothing is sent anywhere.</p>
    </div>

    <div class="vt-layout">
      <div class="vt-tabs">
        <div class="vt-tab active" data-tab="build">Build</div>
        <div class="vt-tab" data-tab="parse">Parse</div>
      </div>

      <!-- Build tab -->
      <div id="buildTab" class="vt-card">
        <div class="vt-header-row">
          <select id="method" class="vt-method">
            <option>GET</option><option>POST</option><option>PUT</option><option>PATCH</option><option>DELETE</option><option>HEAD</option><option>OPTIONS</option>
          </select>
          <input type="text" id="url" placeholder="https://api.example.com/v1/resource" style="flex:1;">
        </div>

        <label class="vt-label">Headers</label>
        <div id="headers"></div>
        <button id="addHeader" style="font-size:12px;padding:4px 12px;margin:4px 0;">+ Add Header</button>

        <div id="bodySection">
          <label class="vt-label">Body</label>
          <select id="bodyType" style="width:auto;margin-bottom:6px;">
            <option value="none">None</option>
            <option value="raw">Raw</option>
            <option value="json">JSON</option>
            <option value="form">Form Data</option>
          </select>
          <textarea id="bodyRaw" placeholder='{"key":"value"}' style="display:none;min-height:100px;"></textarea>
          <div id="formFields" style="display:none;"></div>
          <button id="addFormField" style="display:none;font-size:12px;padding:4px 12px;margin:4px 0;">+ Add Field</button>
        </div>

        <label class="vt-label">Authentication</label>
        <div class="vt-grid">
          <div>
            <select id="authType" style="width:auto;">
              <option value="none">None</option>
              <option value="basic">Basic Auth</option>
              <option value="bearer">Bearer Token</option>
            </select>
          </div>
          <div id="authFields"></div>
        </div>

        <label class="vt-label">Options</label>
        <div style="display:flex;flex-wrap:wrap;gap:12px;font-size:13px;">
          <label><input type="checkbox" id="optInsecure"> -k (insecure)</label>
          <label><input type="checkbox" id="optFollow"> -L (follow redirects)</label>
          <label><input type="checkbox" id="optVerbose"> -v (verbose)</label>
          <label><input type="checkbox" id="optCompressed"> --compressed</label>
          <label><input type="checkbox" id="optSilent"> -s (silent)</label>
        </div>

        <label class="vt-label" style="margin-top:12px;">Generated cURL Command</label>
        <div class="vt-output" id="output">curl https://api.example.com/v1/resource</div>
        <div style="display:flex;gap:8px;margin:8px 0;">
          <button id="copyBtn">Copy</button>
          <button id="clearBtn">Clear All</button>
        </div>
      </div>

      <!-- Parse tab -->
      <div id="parseTab" class="vt-card" style="display:none;">
        <label class="vt-label">Paste a cURL command:</label>
        <textarea id="parseInput" placeholder="curl -X POST https://api.example.com/users -H 'Content-Type: application/json' -d '{&quot;name&quot;:&quot;John&quot;}'" style="min-height:120px;"></textarea>
        <button id="parseBtn" style="margin:8px 0;">Parse</button>
        <div id="parseResult" class="vt-parsed"></div>
      </div>
    </div>
  </main>

  <script src="/assets/app.js"></script>
  <script>
  (function(){
    var d=document;
    var headers=[];
    var formFields=[];

    function esc(s){return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");}

    function renderHeaders(){
      var c=d.getElementById("headers");
      c.innerHTML="";
      headers.forEach(function(h,i){
        var row=d.createElement("div");
        row.className="vt-header-pair";
        row.innerHTML='<input type="text" placeholder="Header name" value="'+esc(h.name)+'"><input type="text" placeholder="Header value" value="'+esc(h.value)+'"><button data-idx="'+i+'">✕</button>';
        row.querySelectorAll("input")[0].addEventListener("input",function(e){headers[i].name=e.target.value;generate();});
        row.querySelectorAll("input")[1].addEventListener("input",function(e){headers[i].value=e.target.value;generate();});
        row.querySelector("button").addEventListener("click",function(){headers.splice(i,1);renderHeaders();generate();});
        c.appendChild(row);
      });
    }

    function renderFormFields(){
      var c=d.getElementById("formFields");
      c.innerHTML="";
      formFields.forEach(function(f,i){
        var row=d.createElement("div");
        row.className="vt-data-pair";
        row.innerHTML='<input type="text" placeholder="Field name" value="'+esc(f.name)+'"><input type="text" placeholder="Field value" value="'+esc(f.value)+'"><button data-idx="'+i+'">✕</button>';
        row.querySelectorAll("input")[0].addEventListener("input",function(e){formFields[i].name=e.target.value;generate();});
        row.querySelectorAll("input")[1].addEventListener("input",function(e){formFields[i].value=e.target.value;generate();});
        row.querySelector("button").addEventListener("click",function(){formFields.splice(i,1);renderFormFields();generate();});
        c.appendChild(row);
      });
    }

    function quoteVal(s){
      if(!s)return"''";
      if(/^[A-Za-z0-9_\-:\/.,?=]+(\s|$)/.test(s)&&!s.includes("'")&&!s.includes('"'))return s;
      if(!s.includes("'"))return "'"+s+"'";
      if(!s.includes('"'))return '"'+s+'"';
      // Escape single quotes
      return "'"+s.replace(/'/g,"'\"'\"'")+"'";
    }

    function generate(){
      var method=d.getElementById("method").value;
      var url=d.getElementById("url").value.trim()||"https://api.example.com/v1/resource";
      var parts=["curl"];

      if(d.getElementById("optSilent").checked)parts.push("-s");
      if(d.getElementById("optInsecure").checked)parts.push("-k");
      if(d.getElementById("optFollow").checked)parts.push("-L");
      if(d.getElementById("optCompressed").checked)parts.push("--compressed");
      if(d.getElementById("optVerbose").checked)parts.push("-v");

      if(method!=="GET")parts.push("-X",method);

      headers.forEach(function(h){
        if(h.name||h.value){
          parts.push("-H");
          parts.push(quoteVal(h.name+": "+h.value));
        }
      });

      var authType=d.getElementById("authType").value;
      if(authType==="basic"){
        var user=d.getElementById("authUser").value;
        var pass=d.getElementById("authPass").value;
        parts.push("-u");
        parts.push(quoteVal(user+":"+pass));
      }else if(authType==="bearer"){
        var token=d.getElementById("authToken").value;
        parts.push("-H");
        parts.push(quoteVal("Authorization: Bearer "+token));
      }

      var bodyType=d.getElementById("bodyType").value;
      if(bodyType==="raw"||bodyType==="json"){
        var raw=d.getElementById("bodyRaw").value;
        if(raw){
          parts.push("-d");
          parts.push(quoteVal(raw));
          if(bodyType==="json"&&!headers.some(function(h){return h.name.toLowerCase()==="content-type";})){
            parts.splice(parts.indexOf("-d"),0,"-H");
            parts.splice(parts.indexOf("-d"),0,quoteVal("Content-Type: application/json"));
          }
        }
      }else if(bodyType==="form"){
        if(formFields.length){
          var formData=formFields.filter(function(f){return f.name;}).map(function(f){return encodeURIComponent(f.name)+"="+encodeURIComponent(f.value);}).join("&");
          parts.push("-d");
          parts.push(quoteVal(formData));
        }
      }

      parts.push(quoteVal(url));
      d.getElementById("output").textContent=parts.join(" ");
    }

    // --- Tab switching ---
    d.querySelectorAll(".vt-tab").forEach(function(tab){
      tab.addEventListener("click",function(){
        d.querySelectorAll(".vt-tab").forEach(function(t){t.classList.remove("active");});
        tab.classList.add("active");
        var which=tab.dataset.tab;
        d.getElementById("buildTab").style.display=which==="build"?"":"none";
        d.getElementById("parseTab").style.display=which==="parse"?"":"none";
      });
    });

    // --- Build tab listeners ---
    d.getElementById("method").addEventListener("change",generate);
    d.getElementById("url").addEventListener("input",generate);
    d.getElementById("addHeader").addEventListener("click",function(){headers.push({name:"",value:""});renderHeaders();generate();});
    d.getElementById("bodyType").addEventListener("change",function(){
      var bt=d.getElementById("bodyType").value;
      d.getElementById("bodyRaw").style.display=(bt==="raw"||bt==="json")?"":"none";
      d.getElementById("formFields").style.display=bt==="form"?"":"none";
      d.getElementById("addFormField").style.display=bt==="form"?"":"none";
      generate();
    });
    d.getElementById("bodyRaw").addEventListener("input",generate);
    d.getElementById("addFormField").addEventListener("click",function(){formFields.push({name:"",value:""});renderFormFields();generate();});

    d.getElementById("authType").addEventListener("change",function(){
      var at=d.getElementById("authType").value;
      var af=d.getElementById("authFields");
      if(at==="basic"){
        af.innerHTML='<input type="text" id="authUser" placeholder="Username" style="margin-top:0;"><input type="text" id="authPass" placeholder="Password" style="margin-top:4px;">';
        d.getElementById("authUser").addEventListener("input",generate);
        d.getElementById("authPass").addEventListener("input",generate);
      }else if(at==="bearer"){
        af.innerHTML='<input type="text" id="authToken" placeholder="Token" style="margin-top:0;">';
        d.getElementById("authToken").addEventListener("input",generate);
      }else{
        af.innerHTML="";
      }
      generate();
    });

    ["optInsecure","optFollow","optVerbose","optCompressed","optSilent"].forEach(function(id){
      d.getElementById(id).addEventListener("change",generate);
    });

    d.getElementById("copyBtn").addEventListener("click",function(){
      navigator.clipboard.writeText(d.getElementById("output").textContent);
    });

    d.getElementById("clearBtn").addEventListener("click",function(){
      d.getElementById("url").value="";
      d.getElementById("method").value="GET";
      headers=[];renderHeaders();
      d.getElementById("bodyType").value="none";
      d.getElementById("bodyRaw").value="";
      d.getElementById("bodyRaw").style.display="none";
      d.getElementById("formFields").style.display="none";
      d.getElementById("addFormField").style.display="none";
      formFields=[];renderFormFields();
      d.getElementById("authType").value="none";
      d.getElementById("authFields").innerHTML="";
      ["optInsecure","optFollow","optVerbose","optCompressed","optSilent"].forEach(function(id){d.getElementById(id).checked=false;});
      generate();
    });

    // --- Parse tab ---
    function parseCurl(input){
      // Tokenize: split by spaces but respect quotes
      var tokens=[];
      var i=0;
      while(i<input.length){
        while(i<input.length&&/\s/.test(input[i]))i++;
        if(i>=input.length)break;
        var tok="";
        if(input[i]==="'"){
          i++;
          while(i<input.length&&input[i]!=="'"){tok+=input[i];i++;}
          if(i<input.length)i++;
        }else if(input[i]==='"'){
          i++;
          while(i<input.length&&input[i]!=='"'){
            if(input[i]==="\\"&&i+1<input.length){tok+=input[i+1];i+=2;}
            else{tok+=input[i];i++;}
          }
          if(i<input.length)i++;
        }else{
          while(i<input.length&&!/\s/.test(input[i]))tok+=input[i++];
        }
        tokens.push(tok);
      }

      var result={method:"GET",url:"",headers:[],body:"",cookies:"",auth:"",flags:[]};
      var j=0;
      // Skip 'curl'
      if(tokens[0]==="curl")j=1;

      while(j<tokens.length){
        var t=tokens[j];
        if(t==="-X"||t==="--request"){result.method=tokens[++j]||"GET";j++;}
        else if(t==="-H"||t==="--header"){result.headers.push(tokens[++j]);j++;}
        else if(t==="-d"||t==="--data"||t==="--data-raw"||t==="--data-binary"){result.body=tokens[++j];j++;}
        else if(t==="-u"||t==="--user"){result.auth=tokens[++j];j++;}
        else if(t==="-b"||t==="--cookie"){result.cookies=tokens[++j];j++;}
        else if(t==="-k"||t==="--insecure"){result.flags.push("insecure");j++;}
        else if(t==="-L"||t==="--location"){result.flags.push("follow");j++;}
        else if(t==="-s"||t==="--silent"){result.flags.push("silent");j++;}
        else if(t==="-v"||t==="--verbose"){result.flags.push("verbose");j++;}
        else if(t==="-A"||t==="--user-agent"){result.headers.push("User-Agent: "+tokens[++j]);j++;}
        else if(t==="--compressed"){result.flags.push("compressed");j++;}
        else if(t.startsWith("-")){j++;}
        else{result.url=t;j++;}
      }
      return result;
    }

    d.getElementById("parseBtn").addEventListener("click",function(){
      var input=d.getElementById("parseInput").value.trim();
      if(!input){d.getElementById("parseResult").innerHTML="";return;}
      try{
        var r=parseCurl(input);
        var html='<table>';
        html+='<tr><td><span class="key">Method</span></td><td>'+esc(r.method)+'</td></tr>';
        html+='<tr><td><span class="key">URL</span></td><td>'+esc(r.url)+'</td></tr>';
        if(r.headers.length){
          html+='<tr><td><span class="key">Headers</span></td><td>';
          r.headers.forEach(function(h){html+=esc(h)+"<br>";});
          html+='</td></tr>';
        }
        if(r.body){html+='<tr><td><span class="key">Body</span></td><td><pre style="white-space:pre-wrap;margin:0;">'+esc(r.body)+'</pre></td></tr>';}
        if(r.auth){html+='<tr><td><span class="key">Auth</span></td><td>'+esc(r.auth)+'</td></tr>';}
        if(r.cookies){html+='<tr><td><span class="key">Cookies</span></td><td>'+esc(r.cookies)+'</td></tr>';}
        if(r.flags.length){html+='<tr><td><span class="key">Flags</span></td><td>'+esc(r.flags.join(", "))+'</td></tr>';}
        html+='</table>';
        d.getElementById("parseResult").innerHTML=html;
      }catch(e){
        d.getElementById("parseResult").innerHTML='<p style="color:red;">Parse error: '+esc(e.message)+'</p>';
      }
    });

    generate();
  })();
  </script>
</body>
</html>
