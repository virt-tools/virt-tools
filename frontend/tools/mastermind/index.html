<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="/assets/theme-init.js"></script>
<title>Mastermind — Virtual Tools</title>
<link rel="stylesheet" href="/assets/style.css">
<style>
.tool-wrap{max-width:480px;margin:0 auto;text-align:center;}
.tool-desc{opacity:.7;font-size:14px;margin-bottom:8px;}
#board{margin:12px auto;width:fit-content;}
.row{display:flex;gap:6px;align-items:center;margin:4px 0;justify-content:center;}
.peg{width:36px;height:36px;border-radius:50%;border:2px solid #aaa;cursor:pointer;display:inline-block;}
.peg.slot{border:2px dashed #ccc;}
.feedback{display:flex;gap:3px;margin-left:8px;}
.dot{width:10px;height:10px;border-radius:50%;border:1px solid #999;}
.dot.hit{background:#000;}
.dot.miss{background:#fff;}
.colors{display:flex;gap:8px;justify-content:center;margin:12px 0;flex-wrap:wrap;}
.color-opt{width:36px;height:36px;border-radius:50%;border:2px solid #444;cursor:pointer;}
.color-opt.sel{border:3px solid #3498db;transform:scale(1.1);}
.controls{display:flex;gap:8px;justify-content:center;margin:12px 0;flex-wrap:wrap;}
.controls button{padding:6px 16px;border-radius:6px;border:1px solid var(--border,#2a2f3a);background:var(--bg-alt,#1a1f2e);color:var(--text,#e0e0e0);cursor:pointer;font-size:14px;}
.info{display:flex;gap:20px;justify-content:center;margin:8px 0;font-size:15px;}
#msg{font-size:14px;min-height:20px;font-weight:600;}
</style>
</head>
<body>
<header id="site-header"></header>
<main>
<div class="tool-wrap">
<h1>Mastermind</h1>
<p class="tool-desc">Classic code-breaking game. Guess the 4-color secret code in 10 tries. Black dots = right color, right position. White dots = right color, wrong position. Duplicates enabled.</p>
<div class="colors" id="palette"></div>
<div class="info"><span>Attempts: <b id="attempts">0</b>/10</span></div>
<div id="board"></div>
<div class="controls">
<button onclick="newGame()">New Game</button>
<button onclick="submitGuess()">Submit Guess</button>
<button onclick="clearCurrent()">Clear Row</button>
</div>
<div id="msg"></div>
</div>
</main>
<script src="/assets/app.js"></script>
<script>
const colors=['#e53935','#43a047','#1e88e5','#fdd835','#8e24aa','#fb8c00'];
const codeLen=4,maxAttempts=10;
let secret=[],guesses=[],current=[],selColor=0;

function newGame(){
  secret=[];for(let i=0;i<codeLen;i++)secret.push(Math.floor(Math.random()*colors.length));
  guesses=[];current=[];for(let i=0;i<codeLen;i++)current.push(-1);
  document.getElementById('msg').textContent='';
  document.getElementById('attempts').textContent='0';
  renderPalette();render();
}

function renderPalette(){
  const el=document.getElementById('palette');el.innerHTML='';
  colors.forEach((c,i)=>{
    const d=document.createElement('div');d.className='color-opt'+(i===selColor?' sel':'');
    d.style.background=c;d.onclick=()=>{selColor=i;renderPalette();};
    el.appendChild(d);
  });
}

function render(){
  const board=document.getElementById('board');board.innerHTML='';
  guesses.forEach(g=>{
    const row=document.createElement('div');row.className='row';
    g.guess.forEach(c=>{const p=document.createElement('div');p.className='peg';p.style.background=colors[c];row.appendChild(p);});
    const fb=document.createElement('div');fb.className='feedback';
    for(let i=0;i<g.hits;i++){const d=document.createElement('div');d.className='dot hit';fb.appendChild(d);}
    for(let i=0;i<g.misses;i++){const d=document.createElement('div');d.className='dot miss';fb.appendChild(d);}
    row.appendChild(fb);board.appendChild(row);
  });
  if(guesses.length<maxAttempts){
    const row=document.createElement('div');row.className='row';
    current.forEach((c,i)=>{
      const p=document.createElement('div');p.className='peg slot';
      if(c>=0)p.style.background=colors[c];
      p.onclick=()=>{current[i]=selColor;render();};
      row.appendChild(p);
    });
    board.appendChild(row);
  }
}

function submitGuess(){
  if(current.includes(-1)){document.getElementById('msg').textContent='Fill all 4 slots first.';return;}
  if(guesses.length>=maxAttempts)return;
  let hits=0,misses=0;
  const sCopy=[...secret],gCopy=[...current];
  for(let i=0;i<codeLen;i++){if(gCopy[i]===sCopy[i]){hits++;sCopy[i]=-1;gCopy[i]=-2;}}
  for(let i=0;i<codeLen;i++){
    if(gCopy[i]<0)continue;
    const idx=sCopy.indexOf(gCopy[i]);
    if(idx>=0){misses++;sCopy[idx]=-1;}
  }
  guesses.push({guess:[...current],hits,misses});
  document.getElementById('attempts').textContent=guesses.length;
  current=[];for(let i=0;i<codeLen;i++)current.push(-1);
  render();
  if(hits===codeLen){document.getElementById('msg').textContent='You cracked it! 🎉';return;}
  if(guesses.length>=maxAttempts){document.getElementById('msg').textContent='Game over. Code: '+secret.map(c=>colors[c]).join(' ');return;}
}

function clearCurrent(){current=[];for(let i=0;i<codeLen;i++)current.push(-1);render();}

newGame();
</script>
</body>
</html>
