<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="/assets/theme-init.js"></script>
<title>CSS Border Radius Generator — Virtual Tools</title>
<link rel="stylesheet" href="/assets/style.css">
<style>
.tool-wrap{max-width:720px;margin:0 auto;}
.tool-desc{font-size:14px;color:var(--text-secondary,#aaa);margin:8px 0 20px;}
.preview{background:var(--bg,#1e2230);border:1px solid var(--border,#444);border-radius:12px;padding:40px;margin:12px 0;min-height:260px;display:flex;align-items:center;justify-content:center;}
.radius-box{width:180px;height:180px;background:linear-gradient(135deg,#5b8def,#9c5bef);transition:border-radius .2s;}
.controls{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin:12px 0;}
.ctrl{display:flex;flex-direction:column;gap:4px;}
.ctrl label{font-size:12px;color:var(--text-secondary,#888);}
.ctrl input[type="range"]{width:100%;}
.ctrl .val{font-size:11px;color:var(--text,#eee);font-family:monospace;}
.css-output{background:var(--bg,#1e2230);border:1px solid var(--border,#444);border-radius:8px;padding:12px;margin:12px 0;font-family:monospace;font-size:12px;color:var(--text,#eee);white-space:pre-wrap;word-break:break-all;}
.preset-row{display:flex;gap:8px;flex-wrap:wrap;margin:8px 0;}
button.preset{padding:6px 12px;border-radius:6px;border:1px solid var(--border,#444);background:var(--card,#2a2f3e);color:var(--text,#eee);cursor:pointer;font-size:12px;}
button.preset:hover{border-color:var(--accent,#5b8def);}
button.action{padding:8px 16px;border-radius:6px;border:1px solid var(--border,#444);background:var(--card,#2a2f3e);color:var(--text,#eee);cursor:pointer;font-size:13px;margin-right:8px;}
button.action:hover{border-color:var(--accent,#5b8def);}
</style>
</head>
<body>
<header id="site-header"></header>
<main>
<div class="tool-wrap">
<h1>📐 CSS Border Radius Generator</h1>
<p class="tool-desc">Create complex border-radius shapes with individual corner control. 8 sliders for elliptical corners, live preview, copy CSS.</p>
<div class="preview"><div class="radius-box" id="rbox"></div></div>
<div class="css-output" id="cssOutput"></div>
<div class="preset-row">
<button class="preset" onclick="preset(0,0,0,0,0,0,0,0)">Square</button>
<button class="preset" onclick="preset(50,50,50,50,50,50,50,50)">Circle</button>
<button class="preset" onclick="preset(20,20,20,20,20,20,20,20)">Rounded</button>
<button class="preset" onclick="preset(90,90,90,90,20,20,20,20)">Leaf</button>
<button class="preset" onclick="preset(100,100,100,100,100,100,100,100)">Blob</button>
<button class="preset" onclick="preset(50,0,50,0,0,50,0,50)">Wave</button>
<button class="preset" onclick="preset(80,80,20,20,80,80,20,20)">Organic</button>
</div>
<div class="controls">
<div class="ctrl"><label>TL Horizontal</label><input type="range" id="tlh" min="0" max="100" value="20" oninput="update()"><span class="val" id="tlhv">20%</span></div>
<div class="ctrl"><label>TL Vertical</label><input type="range" id="tlv" min="0" max="100" value="20" oninput="update()"><span class="val" id="tlvv">20%</span></div>
<div class="ctrl"><label>TR Horizontal</label><input type="range" id="trh" min="0" max="100" value="20" oninput="update()"><span class="val" id="trhv">20%</span></div>
<div class="ctrl"><label>TR Vertical</label><input type="range" id="trv" min="0" max="100" value="20" oninput="update()"><span class="val" id="trvv">20%</span></div>
<div class="ctrl"><label>BR Horizontal</label><input type="range" id="brh" min="0" max="100" value="20" oninput="update()"><span class="val" id="brhv">20%</span></div>
<div class="ctrl"><label>BR Vertical</label><input type="range" id="brv" min="0" max="100" value="20" oninput="update()"><span class="val" id="brvv">20%</span></div>
<div class="ctrl"><label>BL Horizontal</label><input type="range" id="blh" min="0" max="100" value="20" oninput="update()"><span class="val" id="blhv">20%</span></div>
<div class="ctrl"><label>BL Vertical</label><input type="range" id="blv" min="0" max="100" value="20" oninput="update()"><span class="val" id="blvv">20%</span></div>
</div>
<div style="margin:12px 0;">
<button class="action" onclick="resetAll()">Reset</button>
<button class="action" onclick="copyCSS()">Copy CSS</button>
</div>
</div>
</main>
<script src="/assets/app.js"></script>
<script>
function v(id){return parseFloat(document.getElementById(id).value);}
function update(){
const tlh=v('tlh'),tlv=v('tlv'),trh=v('trh'),trv=v('trv'),brh=v('brh'),brv=v('brv'),blh=v('blh'),blv=v('blv');
['tlh','tlv','trh','trv','brh','brv','blh','blv'].forEach(id=>{document.getElementById(id+'v').textContent=v(id)+'%';});
const r=`${tlh}% ${trh}% ${brh}% ${blh}% / ${tlv}% ${trv}% ${brv}% ${blv}%`;
document.getElementById('rbox').style.borderRadius=r;
document.getElementById('cssOutput').textContent='border-radius: '+r+';';
}
function preset(a,b,c,d,e,f,g,h){['tlh','trh','brh','blh','tlv','trv','brv','blv'].forEach(id=>{});const ids=['tlh','trh','brh','blh','tlv','trv','brv','blv'];const vals=[a,b,c,d,e,f,g,h];ids.forEach((id,i)=>{document.getElementById(id).value=vals[i];});update();}
function resetAll(){preset(0,0,0,0,0,0,0,0);}
function copyCSS(){navigator.clipboard.writeText(document.getElementById('cssOutput').textContent).then(()=>alert('CSS copied!')).catch(()=>alert('Copy failed'));}
update();
</script>
</body>
</html>
