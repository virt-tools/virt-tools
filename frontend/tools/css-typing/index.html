<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CSS Typing Indicator Generator — virt.tools</title>
<link rel="stylesheet" href="/assets/style.css">
<style>
.tool-area{max-width:900px;margin:2rem auto;padding:0 1rem}
.controls{display:grid;gap:1rem;margin:1.5rem 0;padding:1.5rem;background:#1a1a2e;border-radius:12px}
.control-row{display:flex;gap:1rem;align-items:center;flex-wrap:wrap}
.control-row label{min-width:120px;font-weight:600;font-size:.9rem}
.control-row select,.control-row input{padding:.5rem .75rem;border-radius:8px;border:1px solid #444;background:#0f0f1e;color:#eee;font-size:.9rem}
.preview-box{margin:1.5rem 0;background:#1a1a2e;border-radius:12px;min-height:200px;display:flex;align-items:center;justify-content:center;gap:2rem;flex-wrap:wrap;padding:2rem}
.output-block{margin:2rem 0}
.output-block textarea{width:100%;min-height:100px;font-family:monospace;font-size:.85rem;padding:1rem;border-radius:8px;border:1px solid #444;background:#0f0f1e;color:#eee;resize:vertical}
.copy-btn{padding:.6rem 1.2rem;border:none;border-radius:8px;background:#667eea;color:#fff;cursor:pointer;font-size:.9rem;margin-top:.5rem}
h2{margin-top:2rem;font-size:1.2rem}
</style>
</head>
<body>
<header id="site-header"></header>
<main>
<div class="tool-area">
<h1>💬 CSS Typing Indicator Generator</h1>
<p>Create CSS typing indicator animations for chat UIs. 5 styles, customizable colors and speed. Copy HTML+CSS.</p>
<div class="controls">
<div class="control-row">
<label>Style</label><select id="style"><option value="dots">Bouncing Dots</option><option value="pulse">Pulse Dots</option><option value="wave">Wave Dots</option><option value="bar">Typing Bar</option><option value="ellipsis">Ellipsis</option></select>
<label>Dots</label><input type="number" id="dots" value="3" min="2" max="6" style="width:60px">
<label>Speed (s)</label><input type="number" id="speed" value="1.4" min="0.3" max="5" step="0.1" style="width:60px">
</div>
<div class="control-row">
<label>Dot Color</label><input type="color" id="dotColor" value="#667eea">
<label>Bg Color</label><input type="color" id="bgColor" value="#e8e8e8">
<label>Dot Size</label><input type="range" id="dotSize" value="10" min="4" max="20" style="width:100px">
<label>Radius</label><input type="range" id="radius" value="50" min="0" max="50" style="width:100px">
</div>
</div>
<h2>Preview</h2>
<div class="preview-box" id="preview"></div>
<h2>HTML</h2><div class="output-block"><textarea id="htmlOut" readonly></textarea><button class="copy-btn" onclick="copyText('htmlOut')">Copy HTML</button></div>
<h2>CSS</h2><div class="output-block"><textarea id="cssOut" readonly></textarea><button class="copy-btn" onclick="copyText('cssOut')">Copy CSS</button></div>
</div>
</main>
<script src="/assets/app.js"></script>
<script>
function update(){
var style=document.getElementById('style').value;
var n=parseInt(document.getElementById('dots').value);
var sp=parseFloat(document.getElementById('speed').value);
var dc=document.getElementById('dotColor').value;
var bc=document.getElementById('bgColor').value;
var ds=document.getElementById('dotSize').value;
var r=document.getElementById('radius').value;
var html='<div class="typing-indicator">\n';
for(var i=0;i<n;i++){html+='  <span class="typing-dot"></span>\n'}
html+='</div>';
var css='.typing-indicator{display:inline-flex;gap:4px;padding:10px 14px;background:'+bc+';border-radius:20px;align-items:center}\n';
css+='.typing-dot{width:'+ds+'px;height:'+ds+'px;background:'+dc+';border-radius:'+r+'%;display:inline-block';
if(style==='dots'){css+=';animation:td-bounce '+sp+'s ease-in-out infinite'}
else if(style==='pulse'){css+=';animation:td-pulse '+sp+'s ease-in-out infinite'}
else if(style==='wave'){css+=';animation:td-wave '+sp+'s ease-in-out infinite'}
else if(style==='bar'){css+=';animation:td-bar '+sp+'s ease-in-out infinite;width:'+(ds*1.5)+'px'}
else if(style==='ellipsis'){css+=';animation:td-ellipsis '+sp+'s ease-in-out infinite'}
css+='}\n';
for(var i=0;i<n;i++){css+='.typing-dot:nth-child('+(i+1)+'){animation-delay:'+(i*sp/n)+'s}\n'}
if(style==='dots'){css+='@keyframes td-bounce{0%,80%,100%{transform:scale(0.6);opacity:0.5}40%{transform:scale(1);opacity:1}}\n'}
else if(style==='pulse'){css+='@keyframes td-pulse{0%,100%{opacity:0.3;transform:scale(0.8)}50%{opacity:1;transform:scale(1.2)}\n'}
else if(style==='wave'){css+='@keyframes td-wave{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-8px)}\n'}
else if(style==='bar'){css+='@keyframes td-bar{0%,100%{height:'+(ds)+'px;opacity:0.4}50%{height:'+(ds*2)+'px;opacity:1}\n'}
else if(style==='ellipsis'){css+='@keyframes td-ellipsis{0%,100%{opacity:0.2}50%{opacity:1}\n'}
document.getElementById('htmlOut').value=html;
document.getElementById('cssOut').value=css;
var pv=document.getElementById('preview');
pv.innerHTML=html;
var st=document.createElement('style');st.textContent=css;pv.appendChild(st);
}
function copyText(id){var t=document.getElementById(id);t.select();document.execCommand('copy')}
document.querySelectorAll('select,input').forEach(function(e){e.addEventListener('input',update);e.addEventListener('change',update)});
update();
</script>
</body>
</html>
