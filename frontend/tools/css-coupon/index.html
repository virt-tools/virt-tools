<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CSS Coupon Generator — virt.tools</title>
<link rel="stylesheet" href="/assets/style.css">
<style>
.tool-wrap{max-width:900px;margin:0 auto;padding:20px;}
.controls{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin:20px 0;}
.control-group{display:flex;flex-direction:column;gap:6px;}
.control-group label{font-size:0.8rem;color:var(--text-dim);font-weight:600;}
.control-group select,.control-group input[type="text"],.control-group input[type="number"]{padding:8px 10px;border:1px solid var(--border);border-radius:8px;background:var(--card-bg);color:var(--text);font-size:0.9rem;font-family:inherit;}
.preview-area{background:var(--bg);border:2px dashed var(--border);border-radius:12px;padding:30px;margin:20px 0;min-height:200px;display:flex;align-items:center;justify-content:center;}
.coupon{width:320px;padding:24px;border-radius:12px;text-align:center;position:relative;}
.coupon.classic{border:2px dashed #6c5ce7;background:#fff;}
.coupon.modern{background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;border-radius:16px;}
.coupon.ticket{border:2px dashed #e0e0e0;background:#fafafa;position:relative;}
.coupon.ticket::before,.coupon.ticket::after{content:'';position:absolute;width:20px;height:20px;border-radius:50%;background:var(--bg);}
.coupon.ticket::before{left:-12px;top:50%;transform:translateY(-50%);}
.coupon.ticket::after{right:-12px;top:50%;transform:translateY(-50%);}
.coupon.glass{background:rgba(255,255,255,0.1);backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,0.2);border-radius:16px;color:#fff;}
.coupon.dark{background:#1a1a2e;color:#e0e0e0;border:2px dashed #505050;border-radius:12px;}
.coupon .discount{font-size:2.5rem;font-weight:800;margin-bottom:8px;}
.coupon .label{font-size:0.9rem;text-transform:uppercase;letter-spacing:1px;margin-bottom:12px;opacity:0.8;}
.coupon .code{display:inline-block;padding:6px 16px;border:1px dashed currentColor;border-radius:6px;font-family:monospace;font-size:1rem;font-weight:700;margin-top:8px;}
.coupon .desc{font-size:0.8rem;margin-top:12px;opacity:0.7;}
.code-block{background:var(--card-bg);border:1px solid var(--border);border-radius:8px;padding:16px;margin:16px 0;overflow-x:auto;font-size:0.85rem;line-height:1.5;}
.code-block pre{margin:0;white-space:pre-wrap;word-break:break-all;}
.btn{padding:10px 20px;border:none;border-radius:8px;background:var(--accent);color:#fff;cursor:pointer;font-size:0.9rem;}
.btn:hover{opacity:0.85;}
.btn.secondary{background:var(--card-bg);border:1px solid var(--border);color:var(--text);}
.section-title{font-size:1.1rem;font-weight:700;margin:20px 0 8px;}
h2{margin-top:0;}
</style>
</head>
<body>
<div id="site-header"></div>
<div class="tool-wrap">
<h2>🏷️ CSS Coupon Generator</h2>
<p>Create coupon/promo box components with 5 styles, discount text, and code.</p>

<div class="controls">
  <div class="control-group">
    <label>Style</label>
    <select id="style">
      <option value="classic">Classic (dashed border)</option>
      <option value="modern">Modern (gradient)</option>
      <option value="ticket">Ticket (notched)</option>
      <option value="glass">Glass</option>
      <option value="dark">Dark</option>
    </select>
  </div>
  <div class="control-group">
    <label>Discount Text</label>
    <input type="text" id="discount" value="50% OFF">
  </div>
  <div class="control-group">
    <label>Label</label>
    <input type="text" id="label" value="Summer Sale">
  </div>
  <div class="control-group">
    <label>Code</label>
    <input type="text" id="code" value="SUMMER50">
  </div>
  <div class="control-group" style="grid-column:1/-1;">
    <label>Description</label>
    <input type="text" id="desc" value="Valid until August 31st. One use per customer.">
  </div>
</div>

<button class="btn" onclick="updatePreview()">Update Preview</button>
<button class="btn secondary" onclick="copyHTML()">Copy HTML</button>
<button class="btn secondary" onclick="copyCSS()">Copy CSS</button>

<div class="section-title">Preview</div>
<div class="preview-area" id="preview"></div>

<div class="section-title">HTML</div>
<div class="code-block"><pre id="html-code"></pre></div>

<div class="section-title">CSS</div>
<div class="code-block"><pre id="css-code"></pre></div>

</div>
<script src="/assets/app.js"></script>
<script>
function genHTML(s,d,l,c,de){
  return '<div class="coupon '+s+'">\n  <div class="label">'+l+'</div>\n  <div class="discount">'+d+'</div>\n  <div class="code">'+c+'</div>\n  <div class="desc">'+de+'</div>\n</div>';
}
function genCSS(s){
  var styles={
    classic:'.coupon {\n  width:320px;\n  padding:24px;\n  border:2px dashed #6c5ce7;\n  border-radius:12px;\n  text-align:center;\n  background:#fff;\n}\n.coupon .discount {\n  font-size:2.5rem;\n  font-weight:800;\n  color:#6c5ce7;\n}\n.coupon .label {\n  font-size:0.9rem;\n  text-transform:uppercase;\n  letter-spacing:1px;\n  color:#888;\n}\n.coupon .code {\n  display:inline-block;\n  padding:6px 16px;\n  border:1px dashed #6c5ce7;\n  border-radius:6px;\n  font-family:monospace;\n  font-size:1rem;\n  font-weight:700;\n  color:#6c5ce7;\n}\n.coupon .desc {\n  font-size:0.8rem;\n  color:#999;\n}',
    modern:'.coupon {\n  width:320px;\n  padding:24px;\n  background:linear-gradient(135deg,#667eea,#764ba2);\n  color:#fff;\n  border-radius:16px;\n  text-align:center;\n}\n.coupon .discount {\n  font-size:2.5rem;\n  font-weight:800;\n}\n.coupon .label {\n  font-size:0.9rem;\n  text-transform:uppercase;\n  letter-spacing:1px;\n  opacity:0.8;\n}\n.coupon .code {\n  display:inline-block;\n  padding:6px 16px;\n  border:1px dashed #fff;\n  border-radius:6px;\n  font-family:monospace;\n  font-size:1rem;\n  font-weight:700;\n}\n.coupon .desc {\n  font-size:0.8rem;\n  opacity:0.7;\n}',
    ticket:'.coupon {\n  width:320px;\n  padding:24px;\n  border:2px dashed #e0e0e0;\n  background:#fafafa;\n  border-radius:12px;\n  text-align:center;\n  position:relative;\n}\n.coupon::before,.coupon::after {\n  content:"";\n  position:absolute;\n  width:20px;\n  height:20px;\n  border-radius:50%;\n  background:#fff;\n  border:2px solid #e0e0e0;\n}\n.coupon::before{left:-12px;top:50%;transform:translateY(-50%);}\n.coupon::after{right:-12px;top:50%;transform:translateY(-50%);}\n.coupon .discount {font-size:2.5rem;font-weight:800;color:#333;}\n.coupon .label {font-size:0.9rem;text-transform:uppercase;letter-spacing:1px;color:#888;}\n.coupon .code {display:inline-block;padding:6px 16px;border:1px dashed #999;border-radius:6px;font-family:monospace;font-size:1rem;font-weight:700;color:#333;}\n.coupon .desc {font-size:0.8rem;color:#999;}',
    glass:'.coupon {\n  width:320px;\n  padding:24px;\n  background:rgba(255,255,255,0.1);\n  backdrop-filter:blur(10px);\n  border:1px solid rgba(255,255,255,0.2);\n  border-radius:16px;\n  color:#fff;\n  text-align:center;\n}\n.coupon .discount {font-size:2.5rem;font-weight:800;}\n.coupon .label {font-size:0.9rem;text-transform:uppercase;letter-spacing:1px;opacity:0.8;}\n.coupon .code {display:inline-block;padding:6px 16px;border:1px dashed rgba(255,255,255,0.5);border-radius:6px;font-family:monospace;font-size:1rem;font-weight:700;}\n.coupon .desc {font-size:0.8rem;opacity:0.7;}',
    dark:'.coupon {\n  width:320px;\n  padding:24px;\n  background:#1a1a2e;\n  color:#e0e0e0;\n  border:2px dashed #505050;\n  border-radius:12px;\n  text-align:center;\n}\n.coupon .discount {font-size:2.5rem;font-weight:800;color:#a0a0ff;}\n.coupon .label {font-size:0.9rem;text-transform:uppercase;letter-spacing:1px;opacity:0.8;}\n.coupon .code {display:inline-block;padding:6px 16px;border:1px dashed #a0a0ff;border-radius:6px;font-family:monospace;font-size:1rem;font-weight:700;color:#a0a0ff;}\n.coupon .desc {font-size:0.8rem;opacity:0.7;}'
  };
  return styles[s]||styles.classic;
}
function updatePreview(){
  var s=document.getElementById('style').value;
  var d=document.getElementById('discount').value;
  var l=document.getElementById('label').value;
  var c=document.getElementById('code').value;
  var de=document.getElementById('desc').value;
  var preview=document.getElementById('preview');
  var isDark=(s==='dark'||s==='glass'||s==='modern');
  preview.style.background=isDark?'#2a2a3e':'var(--bg)';
  preview.innerHTML='<div class="coupon '+s+'"><div class="label">'+l+'</div><div class="discount">'+d+'</div><div class="code">'+c+'</div><div class="desc">'+de+'</div></div>';
  document.getElementById('html-code').textContent=genHTML(s,d,l,c,de);
  document.getElementById('css-code').textContent=genCSS(s);
}
function copyHTML(){
  var s=document.getElementById('style').value,d=document.getElementById('discount').value,l=document.getElementById('label').value,c=document.getElementById('code').value,de=document.getElementById('desc').value;
  navigator.clipboard.writeText(genHTML(s,d,l,c,de));
}
function copyCSS(){
  navigator.clipboard.writeText(genCSS(document.getElementById('style').value));
}
document.querySelectorAll('select,input').forEach(function(el){el.addEventListener('input',updatePreview);});
updatePreview();
</script>
</body>
</html>
