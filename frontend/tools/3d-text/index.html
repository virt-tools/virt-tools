<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="/assets/theme-init.js"></script>
<title>3D Text Generator — Virtual Tools</title>
<link rel="stylesheet" href="/assets/style.css">
<style>
.tool-wrap{max-width:720px;margin:0 auto;}
.tool-desc{font-size:14px;color:var(--text-secondary,#aaa);margin:8px 0 20px;}
.controls{display:flex;gap:8px;margin:12px 0;flex-wrap:wrap;align-items:center;}
.controls label{font-size:13px;color:var(--text-secondary,#888);margin-right:4px;}
.controls input[type="text"]{flex:1;min-width:200px;padding:6px 10px;border-radius:6px;border:1px solid var(--border,#444);background:var(--card,#2a2f3e);color:var(--text,#eee);font-size:13px;}
.controls select,.controls input[type="number"]{padding:6px 10px;border-radius:6px;border:1px solid var(--border,#444);background:var(--card,#2a2f3e);color:var(--text,#eee);font-size:13px;}
.preview{background:linear-gradient(135deg,#1a1a2e,#16213e);border:1px solid var(--border,#333);border-radius:8px;padding:48px;margin:12px 0;text-align:center;min-height:120px;display:flex;align-items:center;justify-content:center;perspective:600px;}
.three-d-text{font-family:Impact,sans-serif;font-size:56px;color:#fff;transform:rotateX(10deg) rotateY(-10deg);}
.color-row{display:flex;gap:8px;align-items:center;margin:8px 0;flex-wrap:wrap;}
.color-row input[type="color"]{width:40px;height:32px;border:none;border-radius:6px;cursor:pointer;background:none;}
button.action{padding:8px 16px;border-radius:6px;border:1px solid var(--border,#444);background:var(--card,#2a2f3e);color:var(--text,#eee);cursor:pointer;font-size:13px;}
button.action:hover{border-color:var(--accent,#5b8def);}
.css-output{background:var(--bg,#1e2230);border:1px solid var(--border,#444);border-radius:8px;padding:12px;margin:12px 0;font-family:monospace;font-size:12px;color:var(--text,#eee);white-space:pre-wrap;word-break:break-all;}
</style>
</head>
<body>
<header id="site-header"></header>
<main>
<div class="tool-wrap">
<h1>🧊 3D Text Generator</h1>
<p class="tool-desc">Create CSS 3D extruded text with depth layers, perspective rotation, and color gradients. Copy CSS.</p>
<div class="controls">
<input type="text" id="text" value="3D TEXT" placeholder="Enter text...">
<label>Size: <input type="number" id="size" value="56" min="8" max="120"></label>
<label>Depth: <input type="number" id="depth" value="8" min="1" max="30"></label>
<label>Font: <select id="font"><option value="Impact, sans-serif" selected>Impact</option><option value="Arial, sans-serif">Arial</option><option value="'Courier New', monospace">Monospace</option><option value="Georgia, serif">Georgia</option><option value="Verdana, sans-serif">Verdana</option></select></label>
</div>
<div class="color-row">
<label>Face: <input type="color" id="faceColor" value="#5b8def"></label>
<label>Side: <input type="color" id="sideColor" value="#1a3a8f"></label>
<label>Rotate X: <input type="number" id="rotX" value="10" min="-45" max="45"></label>
<label>Rotate Y: <input type="number" id="rotY" value="-10" min="-45" max="45"></label>
<label>Skeleton: <select id="skeleton"><option value="0">None</option><option value="1">Outline</option><option value="2">Wireframe</option></select></label>
</div>
<div class="controls">
<button class="action" onclick="copyCSS()">Copy CSS</button>
</div>
<div class="preview"><div class="three-d-text" id="preview">3D TEXT</div></div>
<div class="css-output" id="cssOutput"></div>
</div>
</main>
<script src="/assets/app.js"></script>
<script>
function build3D(){
const depth=parseInt(document.getElementById('depth').value);
const fc=document.getElementById('faceColor').value;
const sc=document.getElementById('sideColor').value;
const rx=parseInt(document.getElementById('rotX').value);
const ry=parseInt(document.getElementById('rotY').value);
let shadows=[];
for(let i=1;i<=depth;i++){
shadows.push((i)+'px '+(i)+'px 0 '+sc);
}
if(parseInt(document.getElementById('skeleton').value)===1)shadows.push('0 0 2px #fff');
const textShadow=shadows.join(', ');
const transform='perspective(600px) rotateX('+rx+'deg) rotateY('+ry+'deg)';
const p=document.getElementById('preview');
p.style.textShadow=textShadow;
p.style.transform=transform;
const css='color: '+fc+';\nfont-size: '+document.getElementById('size').value+'px;\nfont-family: '+document.getElementById('font').value+';\ntext-shadow: '+textShadow+';\ntransform: '+transform+';';
document.getElementById('cssOutput').textContent=css;
}
function update(){
const text=document.getElementById('text').value||'3D TEXT';
const size=document.getElementById('size').value;
const font=document.getElementById('font').value;
const fc=document.getElementById('faceColor').value;
const p=document.getElementById('preview');
p.textContent=text;p.style.fontSize=size+'px';p.style.fontFamily=font;p.style.color=fc;
build3D();
}
function copyCSS(){navigator.clipboard.writeText(document.getElementById('cssOutput').textContent).then(()=>alert('CSS copied!')).catch(()=>alert('Copy failed'));}
['text','size','depth','font','faceColor','sideColor','rotX','rotY','skeleton'].forEach(id=>{const el=document.getElementById(id);if(el)el.addEventListener('input',update);});
update();
</script>
</body>
</html>
