<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="/assets/theme-init.js"></script>
<title>Wordle — Virtual Tools</title>
<link rel="stylesheet" href="/assets/style.css">
<style>
.tool-wrap { max-width: 360px; margin: 0 auto; text-align:center; }
#grid { display:grid; grid-template-rows: repeat(6, 1fr); gap:6px; margin:20px auto; width:fit-content; }
.row { display:grid; grid-template-columns: repeat(5, 56px); gap:6px; }
.cell { width:56px; height:56px; border:2px solid #3a3f4a; border-radius:6px; display:flex; align-items:center; justify-content:center; font-size:26px; font-weight:800; text-transform:uppercase; color:#d4d9e0; }
.cell.filled { border-color:#565b66; }
.cell.correct { background:#538d4e; color:#fff; border-color:#538d4e; }
.cell.present { background:#b59f3b; color:#fff; border-color:#b59f3b; }
.cell.absent { background:#3a3f4a; color:#7a7f8a; border-color:#3a3f4a; }
.key { display:inline-block; min-width:32px; height:48px; padding:0 8px; margin:3px; border:none; border-radius:6px; font-size:14px; font-weight:700; cursor:pointer; background:#818384; color:#fff; text-transform:uppercase; }
.key:hover { filter:brightness(1.15); }
.key.correct { background:#538d4e; }
.key.present { background:#b59f3b; }
.key.absent { background:#3a3f4a; }
#keyboard { margin:16px 0; }
#msg { font-size:15px; font-weight:600; margin:12px 0; min-height:22px; }
#msg.win { color:#538d4e; }
#msg.lose { color:#e07b5e; }
.btn { background:var(--bg-panel,#11151c); border:1px solid var(--border,#2a2f3a); color:var(--text); border-radius:8px; padding:10px 20px; font-size:15px; cursor:pointer; margin-top:8px; }
.btn:hover { border-color:var(--accent,#6ea8fe); }
#stats { font-size:13px; opacity:.7; margin-top:12px; }
</style>
</head>
<body>
<div id="site-header"></div>
<main>
<div class="tool-header">
<a class="back" href="/">← All tools</a>
<h1>Wordle</h1>
<p>Guess the 5-letter word in 6 tries. After each guess, tiles show which letters are correct (green), present but in the wrong position (yellow), or absent (gray). No daily limit, no tracking — a new random word every game.</p>
</div>
<div class="panel tool-wrap">
<div id="grid"></div>
<div id="msg"></div>
<div id="keyboard"></div>
<button class="btn" id="newGame">New Game</button>
<div id="stats"></div>
</div>
</main>
<script src="/assets/app.js"></script>
<script>
(function(){
const WORDS = ["about","above","abuse","actor","acute","admit","adopt","adult","after","again","agent","agree","ahead","alarm","album","alert","alike","alive","allow","alone","along","alter","among","anger","angle","angry","apart","apple","apply","arena","argue","arise","array","aside","asset","audio","audit","avoid","award","aware","badly","baker","bases","basic","basis","beach","began","begin","begun","being","below","bench","billy","birth","black","blame","blind","block","blood","board","boost","booth","bound","brain","brand","bread","break","breed","brief","bring","broad","broke","brown","build","built","buyer","cable","calif","carry","catch","cause","chain","chair","chart","chase","cheap","check","chest","chief","child","china","chose","civil","claim","class","clean","clear","click","clock","close","coach","coast","could","count","court","cover","craft","crash","cream","crime","cross","crowd","crown","curve","cycle","daily","dance","dated","dealt","death","debut","delay","depth","doing","doubt","dozen","draft","drama","drawn","dream","dress","drill","drink","drive","drove","dying","eager","early","earth","eight","elite","empty","enemy","enjoy","enter","entry","equal","error","event","every","exact","exist","extra","faith","false","fault","fiber","field","fifth","fifty","fight","final","first","fixed","flash","fleet","floor","fluid","focus","force","forth","forty","forum","found","frame","frank","fraud","fresh","front","fruit","fully","funny","giant","given","glass","globe","going","grace","grade","grand","grant","grass","great","green","gross","group","grown","guard","guess","guest","guide","happy","harry","heart","heavy","hence","henry","horse","hotel","house","human","ideal","image","index","inner","input","issue","japan","jimmy","joint","jones","judge","known","label","large","laser","later","laugh","layer","learn","lease","least","leave","legal","level","lewis","light","limit","links","lives","local","logic","loose","lower","lucky","lunch","lying","magic","major","maker","march","maria","match","maybe","mayor","meant","media","metal","might","minor","minus","mixed","model","money","month","moral","motor","mount","mouse","mouth","movie","music","needs","never","newly","night","noise","north","noted","novel","nurse","occur","ocean","offer","often","order","other","ought","paint","panel","paper","party","peace","peter","phase","phone","photo","piece","pilot","pitch","place","plain","plane","plant","plate","point","pound","power","press","price","pride","prime","print","prior","prize","proof","proud","prove","queen","quick","quiet","quite","radio","raise","range","rapid","ratio","reach","ready","refer","right","rival","river","rough","round","route","royal","rural","scale","scene","scope","score","sense","serve","seven","shall","shape","share","sharp","sheet","shelf","shell","shift","shine","shirt","shock","shoot","short","shown","sight","since","sixth","sixty","sized","skill","sleep","slide","small","smart","smile","smith","smoke","solid","solve","sorry","sound","south","space","spare","speak","speed","spend","spent","split","spoke","sport","staff","stage","stake","stand","start","state","steam","steel","stick","still","stock","stone","stood","store","storm","story","strip","stuck","study","stuff","style","sugar","suite","super","sweet","table","taken","taste","taxes","teach","teeth","terry","texas","thank","theft","their","theme","there","these","thick","thing","think","third","those","three","threw","throw","tight","times","tired","title","today","topic","total","touch","tough","tower","track","trade","train","treat","trend","trial","tribe","trick","tried","tries","truck","truly","trust","truth","twice","under","undue","union","unity","until","upper","upset","urban","usage","usual","valid","value","video","virus","visit","vital","vocal","voice","waste","watch","water","wheel","where","which","while","white","whole","whose","woman","women","world","worry","worse","worst","worth","would","wound","write","wrong","wrote","yield","young","youth"];
const VALID = new Set(WORDS);
let target, row, col, grid, done;
const gridEl = document.getElementById('grid');
const kbEl = document.getElementById('keyboard');
const msgEl = document.getElementById('msg');
const statsEl = document.getElementById('stats');

function newGame() {
  target = WORDS[Math.floor(Math.random()*WORDS.length)];
  row = 0; col = 0; done = false;
  gridEl.innerHTML = '';
  for (let r = 0; r < 6; r++) {
    const rowEl = document.createElement('div');
    rowEl.className = 'row';
    for (let c = 0; c < 5; c++) {
      const cell = document.createElement('div');
      cell.className = 'cell';
      rowEl.appendChild(cell);
    }
    gridEl.appendChild(rowEl);
  }
  kbEl.innerHTML = '';
  const rows = ['qwertyuiop','asdfghjkl','zxcvbnm'];
  rows.forEach((lr,i) => {
    const line = document.createElement('div');
    if (i === 2) { const e = document.createElement('button'); e.className='key'; e.textContent='Enter'; e.dataset.key='enter'; line.appendChild(e); }
    for (const ch of lr) { const k = document.createElement('button'); k.className='key'; k.textContent=ch; k.dataset.key=ch; line.appendChild(k); }
    if (i === 2) { const b = document.createElement('button'); b.className='key'; b.textContent='⌫'; b.dataset.key='back'; line.appendChild(b); }
    kbEl.appendChild(line);
  });
  kbEl.querySelectorAll('.key').forEach(k => k.addEventListener('click', () => handleKey(k.dataset.key)));
  msgEl.textContent = ''; msgEl.className = '';
  const played = +(localStorage.getItem('wordle_played')||0);
  const won = +(localStorage.getItem('wordle_won')||0);
  if (played) statsEl.textContent = 'Played: '+played+'  Won: '+won+'  Win rate: '+Math.round(won/played*100)+'%';
}

function getCells(r) { return gridEl.children[r].children; }

function handleKey(key) {
  if (done) return;
  if (key === 'enter') { submit(); return; }
  if (key === 'back') { if (col > 0) { col--; getCells(row)[col].textContent=''; getCells(row)[col].className='cell'; } return; }
  if (/^[a-z]$/.test(key) && col < 5) { getCells(row)[col].textContent = key; getCells(row)[col].classList.add('filled'); col++; }
}

function submit() {
  if (col < 5) { msgEl.textContent = 'Not enough letters'; return; }
  let guess = '';
  for (let c = 0; c < 5; c++) guess += getCells(row)[c].textContent;
  if (!VALID.has(guess)) { msgEl.textContent = '"'+guess+'" is not in the word list'; return; }
  const result = evaluate(guess, target);
  for (let c = 0; c < 5; c++) { getCells(row)[c].classList.add(result[c]); }
  updateKeyboard(guess, result);
  if (guess === target) {
    msgEl.textContent = 'You got it! Took '+(row+1)+'/'+6; msgEl.className = 'win'; done = true;
    localStorage.setItem('wordle_played', +(localStorage.getItem('wordle_played')||0)+1);
    localStorage.setItem('wordle_won', +(localStorage.getItem('wordle_won')||0)+1);
  } else if (row === 5) {
    msgEl.textContent = 'The word was: '+target.toUpperCase(); msgEl.className = 'lose'; done = true;
    localStorage.setItem('wordle_played', +(localStorage.getItem('wordle_played')||0)+1);
  } else { row++; col = 0; msgEl.textContent=''; }
  const played = +(localStorage.getItem('wordle_played')||0);
  const won = +(localStorage.getItem('wordle_won')||0);
  if (played) statsEl.textContent = 'Played: '+played+'  Won: '+won+'  Win rate: '+Math.round(won/played*100)+'%';
}

function evaluate(guess, target) {
  const r = ['absent','absent','absent','absent','absent'];
  const tArr = target.split('');
  const gArr = guess.split('');
  for (let i = 0; i < 5; i++) if (gArr[i] === tArr[i]) { r[i] = 'correct'; tArr[i] = null; }
  for (let i = 0; i < 5; i++) if (r[i] !== 'correct') {
    const idx = tArr.indexOf(gArr[i]);
    if (idx >= 0) { r[i] = 'present'; tArr[idx] = null; }
  }
  return r;
}

function updateKeyboard(guess, result) {
  for (let i = 0; i < 5; i++) {
    const key = kbEl.querySelector('.key[data-key="'+guess[i]+'"]');
    if (!key) continue;
    if (result[i] === 'correct') key.className = 'key correct';
    else if (result[i] === 'present' && !key.classList.contains('correct')) key.className = 'key present';
    else if (result[i] === 'absent' && !key.classList.contains('correct') && !key.classList.contains('present')) key.className = 'key absent';
  }
}

document.addEventListener('keydown', e => {
  if (e.key === 'Enter') handleKey('enter');
  else if (e.key === 'Backspace') handleKey('back');
  else if (/^[a-zA-Z]$/.test(e.key)) handleKey(e.key.toLowerCase());
});
document.getElementById('newGame').addEventListener('click', newGame);
newGame();
})();
</script>
</body>
</html>
