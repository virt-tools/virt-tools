<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="/assets/theme-init.js"></script>
<title>Anagram Solver — Virtual Tools</title>
<link rel="stylesheet" href="/assets/style.css">
<style>
.tool-wrap { max-width: 720px; margin: 0 auto; }
.input-row { display:flex; gap:10px; margin:16px 0; flex-wrap:wrap; }
.input-row input[type=text] { flex:1; min-width:200px; padding:10px 14px; font-size:16px; border:1px solid var(--border,#2a2f3a); border-radius:8px; background:var(--bg-panel,#11151c); color:var(--text); }
.input-row input[type=text]:focus { outline:none; border-color:var(--accent,#6ea8fe); }
.btn { background:var(--bg-panel,#11151c); border:1px solid var(--border,#2a2f3a); color:var(--text); border-radius:8px; padding:10px 20px; font-size:15px; cursor:pointer; }
.btn:hover { border-color:var(--accent,#6ea8fe); }
.btn.active { background:var(--accent,#6ea8fe); color:#fff; border-color:var(--accent,#6ea8fe); }
.filters { display:flex; gap:12px; margin:12px 0; flex-wrap:wrap; align-items:center; }
.filters label { font-size:13px; opacity:.8; }
.filters select, .filters input[type=number] { padding:6px 10px; border:1px solid var(--border,#2a2f3a); border-radius:6px; background:var(--bg-panel,#11151c); color:var(--text); font-size:14px; }
#results { margin:16px 0; }
#results h3 { font-size:14px; opacity:.7; margin:12px 0 6px; text-transform:uppercase; letter-spacing:1px; }
.word-grid { display:flex; flex-wrap:wrap; gap:6px; }
.word-chip { display:inline-block; padding:5px 12px; background:var(--bg-panel,#11151c); border:1px solid var(--border,#2a2f3a); border-radius:6px; font-size:14px; cursor:pointer; transition:all .15s; }
.word-chip:hover { border-color:var(--accent,#6ea8fe); background:rgba(110,168,254,.1); }
#count { font-size:13px; opacity:.6; margin:8px 0; }
#empty { text-align:center; opacity:.5; padding:40px; font-size:15px; }
.tool-desc { opacity:.7; font-size:14px; margin-bottom:8px; }
</style>
</head>
<body>
<header id="site-header"></header>
<main>
<div class="tool-wrap">
<h1>Anagram Solver</h1>
<p class="tool-desc">Enter letters to find all dictionary words that can be formed. Fully client-side — no data sent anywhere.</p>
<div class="input-row">
<input type="text" id="letters" placeholder="Enter letters (e.g. LISTEN)" maxlength="20" autocomplete="off" spellcheck="false">
<button class="btn" id="solve" onclick="solve()">Find Anagrams</button>
</div>
<div class="filters">
<label>Min length:</label>
<input type="number" id="minlen" value="3" min="2" max="20" style="width:60px">
<label>Max length:</label>
<input type="number" id="maxlen" value="20" min="2" max="20" style="width:60px">
<label>Sort:</label>
<select id="sortby">
<option value="length">By length</option>
<option value="alpha">Alphabetical</option>
<option value="points">Scrabble points</option>
</select>
<button class="btn" id="copyall" onclick="copyAll()" style="margin-left:auto">Copy All</button>
</div>
<div id="count"></div>
<div id="results"><div id="empty">Enter letters above to find anagrams.</div></div>
</div>
</main>
<script src="/assets/app.js"></script>
<script>
const SCRABBLE={a:1,b:3,c:3,d:2,e:1,f:4,g:2,h:4,i:1,j:8,k:5,l:1,m:3,n:1,o:1,p:3,q:10,r:1,s:1,t:1,u:1,v:4,w:4,x:8,y:4,z:10};
const WORDS=["able","about","above","act","add","age","air","all","also","and","any","are","area","arm","army","art","ask","away","baby","back","bad","bag","ball","band","bank","bar","base","battle","bay","be","beach","bear","beat","beauty","bed","bee","begin","behind","believe","bell","best","better","between","big","bird","bit","black","block","blood","blow","blue","board","boat","body","bone","book","born","both","bottom","box","boy","brain","brand","bread","break","breath","bridge","bright","bring","broad","brother","brown","build","burn","bus","busy","but","buy","by","call","calm","came","camp","can","cap","car","card","care","carry","case","cash","cast","cat","catch","cause","cell","center","chain","chair","change","chart","chase","cheap","check","chest","chief","child","choice","choose","church","city","claim","class","clean","clear","climb","clock","close","cloth","cloud","club","coach","coast","coat","code","cold","collect","color","come","common","cook","cool","copy","corner","cost","could","count","course","court","cover","cow","create","cross","crowd","cry","current","cut","dad","daily","damage","dance","danger","dark","data","date","day","dead","deal","dear","death","deep","design","desk","detail","die","differ","dinner","direct","dirty","do","doctor","dog","dollar","door","down","draw","dream","dress","drink","drive","drop","dry","due","dust","duty","each","ear","early","earn","earth","east","easy","eat","edge","effect","effort","eight","either","else","end","enemy","enjoy","enough","enter","equal","error","even","event","ever","every","exact","example","except","exist","expect","eye","face","fact","fail","fair","fall","family","far","farm","fast","father","fear","feed","feel","feet","fell","felt","few","field","fight","figure","fill","final","find","fine","finger","finish","fire","first","fish","fit","five","flat","floor","fly","focus","follow","food","foot","for","force","forest","form","former","forth","four","free","fresh","friend","from","front","fruit","full","fun","future","game","garden","gas","gate","gather","general","get","gift","girl","give","glad","glass","go","goal","god","gold","gone","good","grand","grass","great","green","grew","grey","ground","group","grow","guess","guide","gun","guy","hair","half","hall","hand","hang","happen","happy","hard","hat","hate","have","he","head","hear","heart","heat","heavy","help","her","here","hero","high","hill","him","his","hit","hold","hole","home","hope","horse","hot","hotel","hour","house","how","huge","human","hundred","hunt","hurt","husband","ice","idea","if","image","imagine","in","inch","indeed","indian","information","inside","instead","interest","into","iron","is","island","issue","it","item","its","james","job","john","join","jump","just","keep","key","kick","kid","kill","kind","king","knee","knew","knife","know","land","language","large","last","late","later","laugh","lay","lead","learn","least","leave","left","leg","legal","less","let","letter","level","lie","life","light","like","line","list","listen","little","live","long","look","lord","lose","loss","lost","lot","loud","love","low","lower","lucky","lunch","machine","made","mail","main","major","make","man","manage","many","map","march","mark","market","master","match","matter","may","maybe","me","mean","measure","meat","meet","member","memory","men","mention","message","method","middle","might","mile","milk","mind","mine","minute","miss","model","modern","moment","money","month","moon","more","morning","most","mother","mount","mouse","mouth","move","much","music","must","my","name","nation","natural","nature","near","nearly","necessary","neck","need","never","new","news","next","nice","night","nine","no","noise","none","nor","north","nose","not","note","nothing","notice","now","number","object","occur","of","off","offer","office","often","oil","old","once","one","only","onto","open","operate","opportunity","oppose","or","order","origin","other","out","outside","over","own","page","pain","paint","pair","pan","paper","parent","park","part","party","pass","past","pat","pay","peace","people","perfect","perhaps","person","pick","picture","piece","pin","place","plain","plan","plane","plant","play","please","pleasure","point","poor","popular","position","possible","post","pot","pound","power","practice","prepare","present","press","pretty","price","pride","print","prison","private","prize","probable","problem","produce","program","proper","protect","proud","prove","public","pull","purpose","push","put","quality","quarter","question","quick","quiet","quite","race","radio","rain","raise","range","rat","rate","rather","reach","read","ready","real","reason","receive","record","red","reduce","region","relate","remain","remember","remove","repeat","reply","report","research","rest","result","return","rich","ride","right","ring","rise","risk","river","road","rock","role","roll","room","round","rule","run","safe","said","sail","sake","salt","same","sand","save","say","scale","school","score","sea","search","season","seat","second","secret","section","see","seem","self","sell","send","sense","series","serve","service","set","settle","seven","several","shall","shape","share","sharp","she","sheet","shine","ship","shirt","shoe","shoot","shop","short","should","shoulder","shout","show","shut","sick","side","sight","sign","silver","similar","simple","since","sing","single","sir","sister","sit","site","situation","six","size","skin","sky","sleep","slip","slow","small","smile","snow","so","social","soft","soil","soldier","solution","some","son","song","soon","sort","sound","source","south","space","speak","special","spend","spirit","sport","spot","spread","spring","square","staff","stage","stair","stand","standard","star","start","state","station","stay","steal","steam","steel","step","stick","still","stone","stop","store","storm","story","street","stretch","strike","string","strong","structure","struggle","student","study","stuff","style","subject","succeed","success","such","sudden","suffer","suggest","summer","sun","supply","support","sure","surface","surprise","sweet","swim","system","table","take","talk","tall","task","taste","tax","tea","teach","team","tear","tell","ten","tend","term","test","text","than","thank","the","theater","their","them","then","theory","there","these","they","thick","thing","think","third","this","though","thought","thousand","three","through","throw","tie","time","tiny","tip","tired","title","to","today","toe","together","tomorrow","tone","too","top","total","touch","toward","town","track","trade","train","travel","tree","trial","trip","trouble","truck","true","trust","try","turn","twelve","two","type","uncle","under","union","unit","until","up","upon","use","usual","valley","value","vary","very","view","village","voice","vote","wage","wait","walk","wall","want","war","warm","wash","waste","watch","water","wave","way","we","weak","wear","weather","week","well","west","what","wheel","when","where","which","while","white","who","whole","whose","why","wide","wife","wild","will","win","wind","window","wish","with","within","without","woman","wonder","wood","word","work","world","worry","worse","worst","worth","would","write","wrong","yard","year","yes","yet","you","young","your"];

const WORDSET=new Set(WORDS);

function getLetters(s){return s.toLowerCase().replace(/[^a-z]/g,'');}

function canForm(word,letters){
  if(word.length>letters.length)return false;
  const counts={};
  for(const c of letters)counts[c]=(counts[c]||0)+1;
  for(const c of word){
    if(!counts[c]||counts[c]<=0)return false;
    counts[c]--;
  }
  return true;
}

function scrabbleScore(word){
  return [...word].reduce((s,c)=>s+(SCRABBLE[c]||0),0);
}

function solve(){
  const letters=getLetters(document.getElementById('letters').value);
  const min=parseInt(document.getElementById('minlen').value)||2;
  const max=parseInt(document.getElementById('maxlen').value)||20;
  const sortby=document.getElementById('sortby').value;

  if(letters.length<2){
    document.getElementById('results').innerHTML='<div id="empty">Enter at least 2 letters.</div>';
    document.getElementById('count').textContent='';
    return;
  }

  let results=WORDS.filter(w=>w.length>=Math.max(min,2)&&w.length<=Math.max(max,w.length)&&canForm(w,letters));

  if(sortby==='length'){
    results.sort((a,b)=>b.length-a.length||a.localeCompare(b));
  }else if(sortby==='alpha'){
    results.sort((a,b)=>a.localeCompare(b));
  }else if(sortby==='points'){
    results.sort((a,b)=>scrabbleScore(b)-scrabbleScore(a)||a.localeCompare(b));
  }

  const groups={};
  for(const w of results){
    const k=w.length;
    if(!groups[k])groups[k]=[];
    groups[k].push(w);
  }

  const total=results.length;
  document.getElementById('count').textContent=total+' word'+(total!==1?'s':'')+' found'+(results.length>0?(' — '+results.filter(w=>w.length===letters.length).length+' full anagram'+(results.filter(w=>w.length===letters.length).length!==1?'s':'')):'');

  if(total===0){
    document.getElementById('results').innerHTML='<div id="empty">No words found for those letters.</div>';
    return;
  }

  let html='';
  for(const len of Object.keys(groups).sort((a,b)=>b-a)){
    html+='<h3>'+len+'-letter words ('+groups[len].length+')</h3><div class="word-grid">';
    for(const w of groups[len]){
      const pts=scrabbleScore(w);
      html+='<span class="word-chip" onclick="copyWord(\''+w+'\')" title="'+pts+' Scrabble points">'+w+'</span>';
    }
    html+='</div>';
  }
  document.getElementById('results').innerHTML=html;
}

function copyWord(w){
  navigator.clipboard&&navigator.clipboard.writeText(w);
  const el=event.target;
  const orig=el.textContent;
  el.textContent='Copied!';
  el.style.borderColor='var(--accent,#6ea8fe)';
  setTimeout(()=>{el.textContent=orig;el.style.borderColor='';},800);
}

function copyAll(){
  const chips=document.querySelectorAll('.word-chip');
  if(!chips.length)return;
  const words=[...chips].map(c=>c.textContent);
  navigator.clipboard&&navigator.clipboard.writeText(words.join(', '));
  const btn=document.getElementById('copyall');
  const orig=btn.textContent;
  btn.textContent='Copied!';
  setTimeout(()=>btn.textContent=orig,1200);
}

document.getElementById('letters').addEventListener('keydown',e=>{if(e.key==='Enter')solve();});
document.getElementById('minlen').addEventListener('change',solve);
document.getElementById('maxlen').addEventListener('change',solve);
document.getElementById('sortby').addEventListener('change',solve);
</script>
</body>
</html>
