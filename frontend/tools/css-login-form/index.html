<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CSS Login Form Generator — virt.tools</title>
<link rel="stylesheet" href="/assets/style.css">
<style>
.tool-area{max-width:960px;margin:2rem auto;padding:0 1rem}
.controls{display:grid;gap:1rem;margin:1.5rem 0;padding:1.5rem;background:var(--card-bg,#1a1a2e);border-radius:12px}
.control-row{display:flex;gap:1rem;align-items:center;flex-wrap:wrap}
.control-row label{min-width:120px;font-weight:600;font-size:.9rem}
.control-row select,.control-row input[type="text"],.control-row input[type="color"]{padding:.5rem .75rem;border-radius:8px;border:1px solid #444;background:var(--bg,#0f0f1e);color:var(--text,#eee);font-size:.9rem}
.preview-area{margin:2rem 0;padding:2rem;background:linear-gradient(135deg,#0f0f1e,#1a1a3e);border-radius:12px;min-height:320px;display:flex;align-items:center;justify-content:center}
.css-output{margin:2rem 0}
.css-output textarea{width:100%;min-height:200px;font-family:monospace;font-size:.85rem;padding:1rem;border-radius:8px;border:1px solid #444;background:#0f0f1e;color:#eee;resize:vertical}
.copy-btn{padding:.6rem 1.2rem;border:none;border-radius:8px;background:#4a9eff;color:#fff;cursor:pointer;font-size:.9rem;margin-top:.5rem}
h2{margin-top:2rem;font-size:1.2rem}
</style>
</head>
<body>
<header id="site-header"></header>
<main>
<div class="tool-area">
<h1>🔐 CSS Login Form Generator</h1>
<p>Create styled CSS login forms with 4 styles, social login buttons, and custom branding.</p>

<div class="controls">
<div class="control-row">
<label>Style</label><select id="style"><option value="card">Card</option><option value="minimal">Minimal</option><option value="split">Split Screen</option><option value="glass">Glassmorphism</option></select>
<label>Theme</label><select id="theme"><option value="dark">Dark</option><option value="light">Light</option></select>
</div>
<div class="control-row">
<label>Title</label><input type="text" id="title" value="Welcome Back" style="flex:1;min-width:120px">
<label>Subtitle</label><input type="text" id="subtitle" value="Sign in to your account" style="flex:1;min-width:120px">
</div>
<div class="control-row">
<label>Accent</label><input type="color" id="accent" value="#4a9eff">
<label>Radius</label><input type="range" id="radius" min="0" max="24" value="12"><span id="radiusVal">12px</span>
<label>Show Social</label><select id="showSocial"><option value="yes">Yes</option><option value="no">No</option></select>
</div>
</div>

<div class="preview-area" id="preview"></div>

<h2>HTML</h2><div class="css-output"><textarea id="htmlOut" readonly></textarea><button class="copy-btn" onclick="copyText('htmlOut')">Copy HTML</button></div>
<h2>CSS</h2><div class="css-output"><textarea id="cssOut" readonly></textarea><button class="copy-btn" onclick="copyText('cssOut')">Copy CSS</button></div>
</div>
</main>
<script src="/assets/app.js"></script>
<script>
function update(){
var style=document.getElementById('style').value;
var theme=document.getElementById('theme').value;
var title=document.getElementById('title').value;
var sub=document.getElementById('subtitle').value;
var accent=document.getElementById('accent').value;
var r=parseInt(document.getElementById('radius').value);
var showSocial=document.getElementById('showSocial').value==='yes';
document.getElementById('radiusVal').textContent=r+'px';

var bg=theme==='light'?'#fff':'#1a1a2e';
var color=theme==='light'?'#333':'#eee';
var inputBg=theme==='light'?'#f5f5f5':'#0f0f1e';
var borderColor=theme==='light'?'#ddd':'#333';

var glassStyle=style==='glass'?'backdrop-filter:blur(20px);background:'+(theme==='light'?'rgba(255,255,255,.15)':'rgba(26,26,46,.6)')+';':'background:'+bg+';';
var splitStyle=style==='split'?'display:flex;min-height:400px;':'';

var html='<div class="login-wrap"'+(style==='split'?' style="'+splitStyle+'"':'')+'>\n';
if(style==='split') html+='  <div class="login-banner"></div>\n';
html+='  <div class="login-form">\n    <h2 class="login-title">'+title+'</h2>\n    <p class="login-sub">'+sub+'</p>\n';
if(showSocial) html+='    <div class="login-social">\n      <button class="social-btn">G Google</button>\n      <button class="social-btn">f Facebook</button>\n    </div>\n    <div class="login-divider">or</div>\n';
html+='    <div class="input-group">\n      <input type="email" placeholder="Email">\n    </div>\n    <div class="input-group">\n      <input type="password" placeholder="Password">\n    </div>\n    <div class="login-options">\n      <label><input type="checkbox"> Remember me</label>\n      <a href="#">Forgot password?</a>\n    </div>\n    <button class="login-btn">Sign In</button>\n    <p class="login-signup">Don\'t have an account? <a href="#">Sign up</a></p>\n  </div>\n</div>';

var css='.login-wrap{\n  '+(style==='split'?'display:flex;border-radius:'+r+'px;overflow:hidden;box-shadow:0 8px 32px rgba(0,0,0,.2);max-width:700px;margin:0 auto;':'')+'\n}\n';
if(style==='split') css+='.login-banner{\n  flex:1;\n  background:linear-gradient(135deg,'+accent+',#6c5ce7);\n  min-width:200px;\n}\n';
css+='.login-form{\n  padding:2.5rem;\n  border-radius:'+r+'px;\n  '+glassStyle+'\n  color:'+color+';\n  '+(style!=='split'?'box-shadow:0 8px 32px rgba(0,0,0,.2);max-width:380px;margin:0 auto;':'flex:1;')+'\n}\n.login-title{\n  margin:0 0 .3rem;\n  font-size:1.5rem;\n  font-weight:700;\n}\n.login-sub{\n  margin:0 0 1.5rem;\n  font-size:.85rem;\n  opacity:.7;\n}\n.login-social{\n  display:flex;\n  gap:.5rem;\n  margin-bottom:1rem;\n}\n.social-btn{\n  flex:1;\n  padding:.6rem;\n  border:1px solid '+borderColor+';\n  border-radius:8px;\n  background:'+inputBg+';\n  color:'+color+';\n  cursor:pointer;\n  font-size:.85rem;\n}\n.login-divider{\n  text-align:center;\n  margin:1rem 0;\n  font-size:.8rem;\n  opacity:.5;\n  position:relative;\n}\n.login-divider::before,.login-divider::after{\n  content:"";\n  position:absolute;\n  top:50%;\n  width:40%;\n  height:1px;\n  background:'+borderColor+';\n}\n.login-divider::before{left:0}\n.login-divider::after{right:0}\n.input-group{\n  margin-bottom:.8rem;\n}\n.input-group input{\n  width:100%;\n  padding:.7rem .9rem;\n  border:1px solid '+borderColor+';\n  border-radius:8px;\n  background:'+inputBg+';\n  color:'+color+';\n  font-size:.9rem;\n  box-sizing:border-box;\n}\n.login-options{\n  display:flex;\n  justify-content:space-between;\n  align-items:center;\n  margin-bottom:1.2rem;\n  font-size:.8rem;\n}\n.login-options a{color:'+accent+';text-decoration:none}\n.login-btn{\n  width:100%;\n  padding:.8rem;\n  border:none;\n  border-radius:8px;\n  background:'+accent+';\n  color:#fff;\n  font-size:.95rem;\n  font-weight:600;\n  cursor:pointer;\n}\n.login-signup{\n  text-align:center;\n  margin-top:1rem;\n  font-size:.85rem;\n  opacity:.7;\n}\n.login-signup a{color:'+accent+';text-decoration:none}';

document.getElementById('preview').innerHTML='<style>'+css.replace(/\.login-/g,'.preview-area .login-').replace(/\.social-btn/g,'.preview-area .social-btn').replace(/\.input-group/g,'.preview-area .input-group')+'</style>'+html;
document.getElementById('htmlOut').value=html;
document.getElementById('cssOut').value=css;
}
function copyText(id){var t=document.getElementById(id);t.select();document.execCommand('copy');}
document.querySelectorAll('select,input').forEach(function(e){e.addEventListener('input',update)});
update();
</script>
</body>
</html>
