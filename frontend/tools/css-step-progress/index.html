<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="/assets/theme-init.js"></script>
<title>CSS Step Progress Generator — Virtual Tools</title>
<link rel="stylesheet" href="/assets/style.css">
<style>
.tool-wrap{max-width:800px;margin:0 auto;}
.tool-desc{font-size:14px;color:var(--text-secondary,#aaa);margin:8px 0 20px;}
.controls{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin:12px 0;}
.ctrl{display:flex;flex-direction:column;gap:4px;}
.ctrl label{font-size:12px;color:var(--text-secondary,#888);}
.ctrl input,.ctrl select{padding:6px 8px;border-radius:6px;border:1px solid var(--border,#444);background:var(--bg,#1e2230);color:var(--text,#eee);font-size:13px;font-family:inherit;}
button.action{padding:8px 16px;border-radius:6px;border:1px solid var(--border,#444);background:var(--card,#2a2f3e);color:var(--text,#eee);cursor:pointer;font-size:13px;margin:4px 4px 0 0;}
.preview{border:1px solid var(--border,#444);border-radius:8px;margin:12px 0;overflow:hidden;background:#0a0a1a;padding:30px 20px;}
.code-block{background:var(--bg,#1e2230);border:1px solid var(--border,#444);border-radius:8px;padding:12px;margin:8px 0;font-family:monospace;font-size:11px;color:var(--text,#eee);white-space:pre-wrap;word-break:break-all;max-height:400px;overflow:auto;}
.steps-display{display:flex;align-items:flex-start;justify-content:center;gap:0;flex-wrap:wrap;}
.step-item{display:flex;flex-direction:column;align-items:center;flex:1;min-width:80px;position:relative;}
.step-item:not(:last-child)::after{content:'';position:absolute;top:20px;left:50%;width:100%;height:3px;background:#3a3f4e;z-index:0;}
.step-item:not(:last-child) .step-line{position:absolute;top:20px;left:50%;width:100%;height:3px;background:var(--accent,#6c5ce7);z-index:1;clip-path:inset(0 0 0 0);}
.step-circle{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:600;z-index:2;position:relative;}
.step-label{margin-top:8px;font-size:11px;text-align:center;color:var(--text-secondary,#aaa);max-width:80px;}
.step-circle.active{background:var(--accent,#6c5ce7);color:#fff;border:2px solid var(--accent,#6c5ce7);}
.step-circle.done{background:var(--accent,#6c5ce7);color:#fff;border:2px solid var(--accent,#6c5ce7);}
.step-circle.pending{background:var(--bg,#1e2230);color:var(--text-secondary,#888);border:2px solid #3a3f4e;}
</style>
</head>
<body>
<header id="site-header"></header>
<main>
<div class="tool-wrap">
<h1>📊 CSS Step Progress Generator</h1>
<p class="tool-desc">Create step progress / stepper indicators for multi-step flows. 3 styles, 2-6 steps, custom colors. Copy HTML+CSS.</p>
<div class="controls">
<div class="ctrl"><label>Style</label><select id="style" onchange="render()">
<option value="circle" selected>Circle</option>
<option value="square">Square</option>
<option value="label">Label Tabs</option>
</select></div>
<div class="ctrl"><label>Steps</label><input type="range" id="steps" min="2" max="6" value="4" oninput="render()" style="width:100%"></div>
<div class="ctrl"><label>Current Step</label><input type="range" id="current" min="1" max="6" value="3" oninput="render()" style="width:100%"></div>
<div class="ctrl"><label>Color</label><input type="color" id="col" value="#6c5ce7" oninput="render()"></div>
</div>
<div style="margin:8px 0;"><button class="action" onclick="copyCode()">Copy HTML+CSS</button></div>
<div class="preview" id="prev"></div>
<div class="code-block" id="code"></div>
</div>
</div>
</main>
<script src="/assets/app.js"></script>
<script>
let codeText='';
function v(id){return document.getElementById(id).value;}
function render(){
const style=v('style'),steps=parseInt(v('steps')),current=parseInt(v('current')),col=v('col');
let p=document.getElementById('prev');
let html='<div class="steps-display">';
let labels=['Step 1','Step 2','Step 3','Step 4','Step 5','Step 6'];
for(let i=1;i<=steps;i++){
let cls=i<current?'done':i===current?'active':'pending';
let icon=i<current?'&#10003;':i;
let shape=style==='square'?'border-radius:4px;':'';
if(style==='label'){
html+=`<div class="step-item"><div class="step-circle ${cls}" style="background:${i<=current?col:'#1e2230'};color:${i<=current?'#fff':'#888'};border:2px solid ${i<=current?col:'#3a3f4e'};${shape}padding:8px 16px;border-radius:20px;white-space:nowrap;">${labels[i-1]}</div></div>`;
}else{
html+=`<div class="step-item"><div class="step-circle ${cls}" style="background:${i<=current?col:'#1e2230'};color:${i<=current?'#fff':'#888'};border:2px solid ${i<=current?col:'#3a3f4e'};${shape}">${icon}</div><div class="step-label">${labels[i-1]}</div></div>`;
}
}
html+='</div>';
p.innerHTML=html;
let css=`.steps-display{display:flex;align-items:flex-start;justify-content:center;gap:0;flex-wrap:wrap;}
.step-item{display:flex;flex-direction:column;align-items:center;flex:1;min-width:80px;position:relative;}
.step-item:not(:last-child)::after{content:'';position:absolute;top:20px;left:50%;width:100%;height:3px;background:#3a3f4e;z-index:0;}
.step-circle{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:600;z-index:2;position:relative;}
.step-label{margin-top:8px;font-size:11px;text-align:center;color:#aaa;max-width:80px;}`;
let htm=`<div class="steps-display">
${Array.from({length:steps},(_,i)=>{let n=i+1;let cls=n<current?'done':n===current?'active':'pending';return `  <div class="step-item"><div class="step-circle ${cls}">${n<current?'&#10003;':n}</div><div class="step-label">${labels[i]}</div></div>`;}).join('\n')}
</div>`;
codeText=`<style>\n${css}\n</style>\n\n${htm}`;
document.getElementById('code').textContent=codeText;
}
function copyCode(){navigator.clipboard.writeText(codeText).then(()=>alert('Copied!'));}
render();
</script>
</body>
</html>
