<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CSS Text Reveal Animation Generator — virt.tools</title>
<link rel="stylesheet" href="/assets/style.css">
<style>
.tool-area{max-width:900px;margin:2rem auto;padding:0 1rem}
.controls{display:grid;gap:1rem;margin:1.5rem 0;padding:1.5rem;background:#1a1a2e;border-radius:12px}
.ctrl-row{display:flex;gap:1rem;align-items:center;flex-wrap:wrap;margin-bottom:.5rem}
.ctrl-row label{font-weight:600;font-size:.9rem;min-width:120px}
.ctrl-row select,.ctrl-row input{padding:.5rem;border-radius:8px;border:1px solid #444;background:#0f0f1e;color:#eee}
.preview-box{margin:1.5rem 0;border-radius:12px;padding:3rem 2rem;background:#111;min-height:120px;display:flex;align-items:center;justify-content:center;text-align:center}
.output-block{margin:2rem 0}
.output-block textarea{width:100%;min-height:80px;font-family:monospace;font-size:.85rem;padding:1rem;border-radius:8px;border:1px solid #444;background:#0f0f1e;color:#eee;resize:vertical}
.copy-btn{padding:.6rem 1.2rem;border:none;border-radius:8px;background:#667eea;color:#fff;cursor:pointer;font-size:.9rem;margin-top:.5rem}
h2{margin-top:2rem;font-size:1.2rem}
</style>
</head>
<body>
<header id="site-header"></header>
<main>
<div class="tool-area">
<h1>🎭 CSS Text Reveal Animation Generator</h1>
<p>Create CSS text reveal animations. 6 styles, custom text, colors, speed. Copy HTML+CSS.</p>
<div class="controls">
<div class="ctrl-row">
<label>Style</label><select id="style"><option value="fade">Fade In</option><option value="slide">Slide Up</option><option value="clip">Clip Reveal</option><option value="blur">Blur In</option><option value="split">Split Letters</option><option value="typewriter">Typewriter</option></select>
<label>Text</label><input type="text" id="text" value="virt.tools" style="width:200px">
<label>Color</label><input type="color" id="color" value="#667eea">
<label>Speed</label><select id="speed"><option value="0.5">0.5s</option><option value="1" selected>1s</option><option value="2">2s</option><option value="3">3s</option></select>
</div>
<div class="ctrl-row"><button class="copy-btn" onclick="update()">Update</button> <button class="copy-btn" onclick="replay()">Replay</button></div>
</div>
<h2>Preview</h2>
<div class="preview-box" id="preview"></div>
<h2>HTML</h2><div class="output-block"><textarea id="htmlOut" readonly></textarea><button class="copy-btn" onclick="copyText('htmlOut')">Copy HTML</button></div>
<h2>CSS</h2><div class="output-block"><textarea id="cssOut" readonly></textarea><button class="copy-btn" onclick="copyText('cssOut')">Copy CSS</button></div>
</div>
</main>
<script src="/assets/app.js"></script>
<script>
function update(){
var s=document.getElementById('style').value;
var t=document.getElementById('text').value;
var c=document.getElementById('color').value;
var sp=document.getElementById('speed').value;
var html='',css='';
if(s==='fade'){html='<div class="reveal-fade">'+t+'</div>';
css='.reveal-fade{font-size:2rem;font-weight:700;color:'+c+';animation:fadeIn '+sp+'s ease forwards;opacity:0}\n@keyframes fadeIn{to{opacity:1}}';
}else if(s==='slide'){html='<div class="reveal-slide">'+t+'</div>';
css='.reveal-slide{font-size:2rem;font-weight:700;color:'+c+';animation:slideUp '+sp+'s ease forwards;opacity:0;transform:translateY(30px)}\n@keyframes slideUp{to{opacity:1;transform:translateY(0)}}';
}else if(s==='clip'){html='<div class="reveal-clip">'+t+'</div>';
css='.reveal-clip{font-size:2rem;font-weight:700;color:'+c+';animation:clipReveal '+sp+'s ease forwards;clip-path:inset(0 100% 0 0)}\n@keyframes clipReveal{to{clip-path:inset(0 0 0 0)}}';
}else if(s==='blur'){html='<div class="reveal-blur">'+t+'</div>';
css='.reveal-blur{font-size:2rem;font-weight:700;color:'+c+';animation:blurIn '+sp+'s ease forwards;filter:blur(20px);opacity:0}\n@keyframes blurIn{to{filter:blur(0);opacity:1}}';
}else if(s==='split'){
html='<div class="reveal-split">'+t.split('').map(function(ch,i){return '<span style="animation-delay:'+(i*0.08)+'s">'+ch+'</span>'}).join('')+'</div>';
css='.reveal-split{font-size:2rem;font-weight:700;color:'+c+'}\n.reveal-split span{display:inline-block;animation:letterDrop '+sp+'s ease forwards;opacity:0;transform:translateY(-20px) rotate(10deg)}\n@keyframes letterDrop{to{opacity:1;transform:translateY(0) rotate(0)}}';
}else if(s==='typewriter'){html='<div class="reveal-type">'+t+'</div>';
css='.reveal-type{font-size:2rem;font-weight:700;color:'+c+';overflow:hidden;white-space:nowrap;border-right:3px solid '+c+';width:'+(t.length*0.6+0.5)+'ch;animation:typing '+sp+'s steps('+t.length+') forwards,blink .5s step-end infinite}\n@keyframes typing{from{width:0}}\n@keyframes blink{50%{border-color:transparent}}';
}
document.getElementById('htmlOut').value=html;
document.getElementById('cssOut').value=css;
document.getElementById('preview').innerHTML='<style>'+css.replace(/animation:/g,'animation:')+'</style>'+html;
}
function replay(){update()}
function copyText(id){var t=document.getElementById(id);t.select();document.execCommand('copy')}
['style','text','color','speed'].forEach(function(id){document.getElementById(id).addEventListener('change',update)});
document.getElementById('text').addEventListener('input',update);
document.getElementById('color').addEventListener('input',update);
update();
</script>
</body>
</html>
