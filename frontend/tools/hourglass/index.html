<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="/assets/theme-init.js"></script>
<title>Hourglass Timer — Virtual Tools</title>
<link rel="stylesheet" href="/assets/style.css">
<style>
.tool-wrap{max-width:500px;margin:0 auto;text-align:center;}
.tool-desc{font-size:14px;color:var(--text-secondary,#aaa);margin:8px 0 16px;}
canvas{display:block;margin:0 auto;border-radius:12px;}
.controls{display:flex;gap:12px;justify-content:center;align-items:center;flex-wrap:wrap;margin-top:16px;}
.btn{padding:10px 24px;border-radius:8px;border:none;background:var(--accent,#5b8def);color:#fff;cursor:pointer;font-size:14px;}
.btn:hover{opacity:0.9;}
.btn:disabled{opacity:0.4;cursor:not-allowed;}
select,input{padding:8px 12px;border-radius:8px;border:1px solid var(--border,#444);background:var(--bg,#2a2f3e);color:var(--text,#eee);font-size:14px;}
.time-display{font-size:36px;font-weight:700;font-variant-numeric:tabular-nums;margin:12px 0;}
.status{font-size:14px;color:var(--text-secondary,#888);min-height:20px;}
</style>
</head>
<body>
<header id="site-header"></header>
<main>
<div class="tool-wrap">
<h1>⏳ Hourglass Timer</h1>
<p class="tool-desc">A visual sand timer with animated falling sand particles. Set a duration and watch the sand flow.</p>
<div class="time-display" id="display">01:00</div>
<canvas id="hc" width="240" height="320"></canvas>
<div class="controls">
<label>Minutes: <input type="number" id="mins" value="1" min="1" max="180" style="width:60px"></label>
<button class="btn" id="startBtn" onclick="startTimer()">Start</button>
<button class="btn" id="resetBtn" onclick="resetTimer()" style="background:#f44336">Reset</button>
</div>
<div class="status" id="status"></div>
</div>
</main>
<script src="/assets/app.js"></script>
<script>
const cv=document.getElementById('hc'),cx=cv.getContext('2d');
const W=240,H=320,cx2=120,topY=20,botY=300,neckY=160,gap=8;
let totalMs=60000,remaining=60000,running=false,last=0,particles=[],topSand=[],botSand=[],snd=null;
function initSand(){
topSand=[];botSand=[];particles=[];
for(let y=neckY-2;y>topY;y-=3){for(let x=cx2-(neckY-y);x<=cx2+(neckY-y);x+=3){topSand.push({x,y});}}
}
function drawFrame(){
cx.fillStyle='#8B7355';cx.beginPath();cx.moveTo(cx2-100,topY);cx.lineTo(cx2+100,topY);cx.lineTo(cx2+14,neckY);cx.lineTo(cx2+100,botY);cx.lineTo(cx2-100,botY);cx.lineTo(cx2-14,neckY);cx.closePath();cx.lineWidth=3;cx.strokeStyle='#5C4033';cx.stroke();
}
function drawSand(){
const ratio=remaining/totalMs;
const topH=(neckY-topY-4)*ratio;
cx.fillStyle='#F4E4BC';
cx.beginPath();cx.moveTo(cx2-(100-4),topY+4);
for(let y=0;y<=topH;y++){const hw=(100-4)*(1-y/(neckY-topY-4));cx.lineTo(cx2-hw,topY+4+y);}
for(let y=topH;y>=0;y--){const hw=(100-4)*(1-y/(neckY-topY-4));cx.lineTo(cx2+hw,topY+4+y);}
cx.fill();
const botH=(botY-neckY-4)*(1-ratio);
cx.beginPath();cx.moveTo(cx2-(100-4),botY-4);
for(let y=0;y<=botH;y++){const hw=(100-4)*(1-y/(botY-neckY-4));cx.lineTo(cx2-hw,botY-4-y);}
for(let y=botH;y>=0;y--){const hw=(100-4)*(1-y/(botY-neckY-4));cx.lineTo(cx2+hw,botY-4-y);}
cx.fill();
if(running&&ratio>0){cx.fillStyle='#F4E4BC';cx.beginPath();cx.arc(cx2,neckY+4,2.5,0,Math.PI*2);cx.fill();}
}
function draw(){cx.clearRect(0,0,W,H);drawFrame();drawSand();particles.forEach(p=>{cx.fillStyle='#F4E4BC';cx.fillRect(p.x,p.y,2,2);});}
function fmt(ms){const s=Math.ceil(ms/1000);return String(Math.floor(s/60)).padStart(2,'0')+':'+String(s%60).padStart(2,'0');}
function spawnParticle(){if(remaining<=0)return;particles.push({x:cx2-1+Math.random()*2,y:neckY,vy:1.5+Math.random()});}
function tick(ts){
if(!running)return;
if(!last)last=ts;
const dt=ts-last;last=ts;
remaining=Math.max(0,remaining-dt);
document.getElementById('display').textContent=fmt(remaining);
if(Math.random()<0.3)spawnParticle();
particles.forEach(p=>p.y+=p.vy*dt*0.06);
particles=particles.filter(p=>p.y<botY-4-(botY-neckY-4)*(1-remaining/totalMs));
draw();
if(remaining<=0){running=false;document.getElementById('startBtn').disabled=false;document.getElementById('status').textContent="Time's up! ⏳";playBell();return;}
requestAnimationFrame(tick);
}
function playBell(){if(!snd){snd=new(AudioContext||webkitAudioContext)();}const o=snd.createOscillator(),g=snd.createGain();o.connect(g);g.connect(snd.destination);o.frequency.value=800;g.gain.setValueAtTime(0.3,snd.currentTime);g.gain.exponentialRampToValueAtTime(0.01,snd.currentTime+1.5);o.start();o.stop(snd.currentTime+1.5);}
function startTimer(){if(running)return;const mins=parseInt(document.getElementById('mins').value)||1;totalMs=mins*60000;remaining=totalMs;running=true;last=0;document.getElementById('startBtn').disabled=true;document.getElementById('status').textContent='Running...';requestAnimationFrame(tick);}
function resetTimer(){running=false;const mins=parseInt(document.getElementById('mins').value)||1;totalMs=mins*60000;remaining=totalMs;document.getElementById('display').textContent=fmt(remaining);document.getElementById('startBtn').disabled=false;document.getElementById('status').textContent='';draw();}
initSand();draw();
</script>
</body>
</html>
