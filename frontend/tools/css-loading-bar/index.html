<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CSS Loading Bar Generator — virt.tools</title>
<link rel="stylesheet" href="/assets/style.css">
<style>
.tool-area{max-width:900px;margin:2rem auto;padding:0 1rem}
.controls{display:grid;gap:1rem;margin:1.5rem 0;padding:1.5rem;background:#1a1a2e;border-radius:12px}
.control-row{display:flex;gap:1rem;align-items:center;flex-wrap:wrap}
.control-row label{min-width:130px;font-weight:600;font-size:.9rem}
.control-row select,.control-row input{padding:.5rem .75rem;border-radius:8px;border:1px solid #444;background:#0f0f1e;color:#eee;font-size:.9rem}
.preview-box{margin:1.5rem 0;background:#0a0a14;border-radius:12px;min-height:120px;padding:30px}
.output-block{margin:2rem 0}
.output-block textarea{width:100%;min-height:120px;font-family:monospace;font-size:.85rem;padding:1rem;border-radius:8px;border:1px solid #444;background:#0f0f1e;color:#eee;resize:vertical}
.copy-btn{padding:.6rem 1.2rem;border:none;border-radius:8px;background:#667eea;color:#fff;cursor:pointer;font-size:.9rem;margin-top:.5rem}
h2{margin-top:2rem;font-size:1.2rem}
</style>
</head>
<body>
<header id="site-header"></header>
<main>
<div class="tool-area">
<h1>⏳ CSS Loading Bar Generator</h1>
<p>Create CSS animated loading/progress bars. 5 styles (determinate/indeterminate/striped/gradient/pulse). Copy HTML+CSS.</p>
<div class="controls">
<div class="control-row">
<label>Style</label><select id="style"><option value="determinate">Determinate</option><option value="indeterminate">Indeterminate</option><option value="striped">Striped</option><option value="gradient">Animated Gradient</option><option value="pulse">Pulse</option></select>
<label>Width</label><input type="range" id="width" value="400" min="200" max="800" style="width:120px">
<label>Height</label><input type="range" id="height" value="20" min="6" max="40" style="width:120px">
</div>
<div class="control-row">
<label>Bar Color</label><input type="color" id="barColor" value="#667eea">
<label>Bar Color 2</label><input type="color" id="barColor2" value="#764ba2">
<label>Bg Color</label><input type="color" id="bgColor" value="#1a1a2e">
<label>Radius</label><input type="range" id="radius" value="10" min="0" max="30" style="width:120px">
</div>
<div class="control-row">
<label>Progress %</label><input type="range" id="progress" value="65" min="0" max="100" style="width:120px">
<label>Speed (s)</label><input type="number" id="speed" value="1.5" min="0.3" max="5" step="0.1" style="width:60px">
</div>
</div>
<h2>Preview</h2>
<div class="preview-box" id="preview"></div>
<h2>HTML</h2><div class="output-block"><textarea id="htmlOut" readonly></textarea><button class="copy-btn" onclick="copyText('htmlOut')">Copy HTML</button></div>
<h2>CSS</h2><div class="output-block"><textarea id="cssOut" readonly></textarea><button class="copy-btn" onclick="copyText('cssOut')">Copy CSS</button></div>
</div>
</main>
<script src="/assets/app.js"></script>
<script>
function update(){
var w=document.getElementById('width').value;
var h=document.getElementById('height').value;
var c1=document.getElementById('barColor').value;
var c2=document.getElementById('barColor2').value;
var bg=document.getElementById('bgColor').value;
var r=document.getElementById('radius').value;
var p=document.getElementById('progress').value;
var sp=parseFloat(document.getElementById('speed').value);
var style=document.getElementById('style').value;
var html='<div class="loading-bar"></div>';
var css='.loading-bar{width:'+w+'px;height:'+h+'px;background:'+bg+';border-radius:'+r+'px;overflow:hidden;position:relative}\n';
if(style==='determinate'){
css+='.loading-bar::after{content:"";position:absolute;left:0;top:0;height:100%;width:'+p+'%;background:'+c1+';border-radius:'+r+'px}\n';
} else if(style==='indeterminate'){
css+='.loading-bar::after{content:"";position:absolute;left:0;top:0;height:100%;width:40%;background:'+c1+';border-radius:'+r+'px;animation:indet '+sp+'s ease-in-out infinite}\n';
css+='@keyframes indet{0%{left:-40%}100%{left:100%}}\n';
} else if(style==='striped'){
css+='.loading-bar::after{content:"";position:absolute;left:0;top:0;height:100%;width:'+p+'%;background:repeating-linear-gradient(45deg,'+c1+','+c1+' 10px,'+c2+' 10px,'+c2+' 20px);border-radius:'+r+'px;animation:stripes '+sp+'s linear infinite}\n';
css+='@keyframes stripes{0%{background-position:0 0}100%{background-position:20px 0}}\n';
} else if(style==='gradient'){
css+='.loading-bar::after{content:"";position:absolute;left:0;top:0;height:100%;width:'+p+'%;background:linear-gradient(90deg,'+c1+','+c2+','+c1+');background-size:200% 100%;border-radius:'+r+'px;animation:grad-move '+sp+'s linear infinite}\n';
css+='@keyframes grad-move{0%{background-position:0 0}100%{background-position:200% 0}}\n';
} else if(style==='pulse'){
css+='.loading-bar::after{content:"";position:absolute;left:0;top:0;height:100%;width:'+p+'%;background:'+c1+';border-radius:'+r+'px;animation:pulse-bar '+sp+'s ease-in-out infinite}\n';
css+='@keyframes pulse-bar{0%,100%{opacity:0.6}50%{opacity:1}}\n';
}
document.getElementById('htmlOut').value=html;
document.getElementById('cssOut').value=css;
var pv=document.getElementById('preview');
pv.innerHTML=html;
var st=document.createElement('style');st.textContent=css;pv.appendChild(st);
}
function copyText(id){var t=document.getElementById(id);t.select();document.execCommand('copy')}
document.querySelectorAll('select,input').forEach(function(e){e.addEventListener('input',update);e.addEventListener('change',update)});
update();
</script>
</body>
</html>
