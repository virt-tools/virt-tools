<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="/assets/theme-init.js"></script>
<title>CSS Tooltip Generator — Virtual Tools</title>
<link rel="stylesheet" href="/assets/style.css">
<style>
.tool-wrap{max-width:680px;margin:0 auto;}
.tool-desc{font-size:14px;color:var(--text-secondary,#aaa);margin:8px 0 20px;}
.preview{background:var(--bg,#1e2230);border:1px solid var(--border,#444);border-radius:8px;padding:48px;margin:12px 0;text-align:center;min-height:140px;display:flex;align-items:center;justify-content:center;}
.demo-btn{padding:10px 24px;border-radius:8px;border:1px solid var(--border,#444);background:var(--card,#2a2f3e);color:var(--text,#eee);cursor:pointer;font-size:14px;position:relative;}
.controls{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:12px;margin:12px 0;}
.ctrl{display:flex;flex-direction:column;gap:4px;}
.ctrl label{font-size:12px;color:var(--text-secondary,#888);}
.ctrl input,.ctrl select{padding:6px 8px;border-radius:6px;border:1px solid var(--border,#444);background:var(--bg,#1e2230);color:var(--text,#eee);font-size:13px;}
.ctrl input[type="color"]{padding:2px;height:34px;}
button.action{padding:8px 16px;border-radius:6px;border:1px solid var(--border,#444);background:var(--card,#2a2f3e);color:var(--text,#eee);cursor:pointer;font-size:13px;margin:4px 4px 0 0;}
button.action:hover{border-color:var(--accent,#5b8def);}
.code-block{background:var(--bg,#1e2230);border:1px solid var(--border,#444);border-radius:8px;padding:12px;margin:8px 0;font-family:monospace;font-size:11px;color:var(--text,#eee);white-space:pre-wrap;word-break:break-all;max-height:260px;overflow:auto;}
</style>
</head>
<body>
<header id="site-header"></header>
<main>
<div class="tool-wrap">
<h1>💬 CSS Tooltip Generator</h1>
<p class="tool-desc">Create CSS tooltips with 6 styles, 4 positions, and animations. Hover the preview to test. Copy CSS.</p>
<div class="controls">
<div class="ctrl"><label>Text</label><input type="text" id="tt" value="Hello!" oninput="render()"></div>
<div class="ctrl"><label>Position</label><select id="pos" onchange="render()"><option value="top">Top</option><option value="bottom">Bottom</option><option value="left">Left</option><option value="right">Right</option></select></div>
<div class="ctrl"><label>Style</label><select id="sty" onchange="render()"><option value="dark">Dark</option><option value="light">Light</option><option value="success">Success</option><option value="warning">Warning</option><option value="error">Error</option><option value="neon">Neon</option></select></div>
<div class="ctrl"><label>Animation</label><select id="ani" onchange="render()"><option value="fade">Fade</option><option value="slide">Slide</option><option value="scale">Scale</option><option value="none">None</option></select></div>
<div class="ctrl"><label>BG Color</label><input type="color" id="bg" value="#1e2230" oninput="render()"></div>
<div class="ctrl"><label>Text Color</label><input type="color" id="fg" value="#ffffff" oninput="render()"></div>
<div class="ctrl"><label>Font Size</label><input type="number" id="fs" value="13" min="10" max="24" oninput="render()"></div>
<div class="ctrl"><label>Padding</label><input type="number" id="pd" value="8" min="4" max="24" oninput="render()"></div>
</div>
<div class="preview" id="prev"></div>
<div style="margin:8px 0;"><button class="action" onclick="copyCSS()">Copy CSS</button></div>
<div class="code-block" id="code"></div>
</div>
</main>
<script src="/assets/app.js"></script>
<script>
let cssText='';
function render(){
const t=v('tt'),pos=v('pos'),sty=v('sty'),ani=v('ani');
const bg=v('bg'),fg=v('fg'),fs=parseInt(v('fs'))||13,pd=parseInt(v('pd'))||8;
const offsets={top:'bottom:125%;left:50%;transform:translateX(-50%)',bottom:'top:125%;left:50%;transform:translateX(-50%)',left:'right:125%;top:50%;transform:translateY(-50%)',right:'left:125%;top:50%;transform:translateY(-50%)'};
const arrows={top:'bottom:-5px;left:50%;margin-left:-5px;border:5px solid transparent;border-top-color:'+bg,bottom:'top:-5px;left:50%;margin-left:-5px;border:5px solid transparent;border-bottom-color:'+bg,left:'right:-5px;top:50%;margin-top:-5px;border:5px solid transparent;border-left-color:'+bg,right:'left:-5px;top:50%;margin-top:-5px;border:5px solid transparent;border-right-color:'+bg};
const anims={fade:'opacity:0;transition:opacity .3s',slide:'opacity:0;transition:all .3s',scale:'opacity:0;transform:translateX(-50%) scale(.8);transition:all .3s',none:''};
const hovers={fade:'opacity:1',slide:'opacity:1',scale:'opacity:1;transform:translateX(-50%) scale(1)',none:''};
if(pos==='left'||pos==='right'){anims.slide='opacity:0;transition:all .3s';hovers.slide='opacity:1';}
const glow=sty==='neon'?`box-shadow:0 0 10px ${bg},0 0 20px ${bg};`:'';
cssText=`.tooltip{position:relative;display:inline-block}
.tooltip-text{position:absolute;${offsets[pos]};background:${bg};color:${fg};font-size:${fs}px;padding:${pd}px ${pd*1.5}px;border-radius:6px;white-space:nowrap;pointer-events:none;${glow}${anims[ani]}}
.tooltip:hover .tooltip-text{${hovers[ani]}}
.tooltip-text::after{content:'';position:absolute;${arrows[pos]}}`;
const slideTransform = pos==='left'||pos==='right'?(pos==='left'?'translateX(10px)':'translateX(-10px)'):(pos==='top'?'translateY(10px)':'translateY(-10px)');
if(ani==='slide'&&cssText.includes('all .3s')){
cssText=cssText.replace('opacity:0;transition:all .3s}',`opacity:0;transform:${slideTransform};transition:all .3s}`);
cssText=cssText.replace('opacity:1}','opacity:1;transform:translateX(-50%) translateY(0)}');
if(pos==='left'||pos==='right')cssText=cssText.replace('opacity:1;transform:translateX(-50%) translateY(0)','opacity:1;transform:translateY(0)');
}
const html=`<div class="tooltip" style="position:relative;display:inline-block"><button class="demo-btn">Hover me</button><div class="tooltip-text" style="position:absolute;${offsets[pos]};background:${bg};color:${fg};font-size:${fs}px;padding:${pd}px ${pd*1.5}px;border-radius:6px;white-space:nowrap;pointer-events:none;${glow}${anims[ani]}">${t}<span style="position:absolute;${arrows[pos]}"></span></div></div>`;
document.getElementById('prev').innerHTML=html;
document.getElementById('code').textContent=cssText;
}
function v(id){return document.getElementById(id).value;}
function copyCSS(){navigator.clipboard.writeText(cssText).then(()=>alert('CSS copied!')).catch(()=>alert('Copy failed'));}
render();
</script>
</body>
</html>
