<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <script src="/assets/theme-init.js"></script>
  <title>Percentage Calculator — Virtual Tools</title>
  <link rel="stylesheet" href="/assets/style.css">
</head>
<body>
  <div id="site-header"></div>
  <main>
    <div class="tool-header">
      <a class="back" href="/">← All tools</a>
      <h1>Percentage Calculator</h1>
      <p>Work out percentages, percent change and value adjustments — live, in your browser. Nothing is sent anywhere.</p>
    </div>

    <div class="panel">
      <div class="pct-card">
        <label>What is <input type="number" id="a1" class="pct-num" step="any"> % of <input type="number" id="a2" class="pct-num" step="any">?</label>
        <div class="pct-result" id="r1">—</div>
      </div>

      <div class="pct-card">
        <label><input type="number" id="b1" class="pct-num" step="any"> is what % of <input type="number" id="b2" class="pct-num" step="any">?</label>
        <div class="pct-result" id="r2">—</div>
      </div>

      <div class="pct-card">
        <label>% change from <input type="number" id="c1" class="pct-num" step="any"> to <input type="number" id="c2" class="pct-num" step="any">?</label>
        <div class="pct-result" id="r3">—</div>
      </div>

      <div class="pct-card">
        <label><input type="number" id="d1" class="pct-num" step="any"> increased / decreased by <input type="number" id="d2" class="pct-num" step="any">%</label>
        <div class="pct-result" id="r4">—</div>
      </div>

      <p class="note">All calculations run locally in your browser. Percent change divides by the absolute value of the starting number.</p>
    </div>
  </main>

  <script src="/assets/app.js"></script>
  <script>
  (function () {
    function num(id) { var v = parseFloat(document.getElementById(id).value); return isNaN(v) ? null : v; }
    function fmt(n, suffix) {
      if (n === null || n === undefined || n === "" || (typeof n === "number" && (isNaN(n) || !isFinite(n)))) return "—";
      // Trim to a reasonable number of decimals without floating-point noise.
      var r = Math.round(n * 1e6) / 1e6;
      return r.toLocaleString(undefined, { maximumFractionDigits: 6 }) + (suffix || "");
    }

    function calc1() {
      var p = num("a1"), v = num("a2");
      document.getElementById("r1").textContent = (p === null || v === null) ? "—" : fmt(p / 100 * v);
    }
    function calc2() {
      var a = num("b1"), b = num("b2");
      document.getElementById("r2").textContent = (a === null || b === null || b === 0) ? "—" : fmt(a / b * 100, "%");
    }
    function calc3() {
      var a = num("c1"), b = num("c2");
      if (a === null || b === null || a === 0) { document.getElementById("r3").textContent = "—"; return; }
      var pct = (b - a) / Math.abs(a) * 100;
      var sign = pct > 0 ? "increase of " : pct < 0 ? "decrease of " : "";
      document.getElementById("r3").textContent = sign + fmt(Math.abs(pct), "%") + "  (" + fmt(pct, "%") + ")";
    }
    function calc4() {
      var v = num("d1"), p = num("d2");
      if (v === null || p === null) { document.getElementById("r4").textContent = "—"; return; }
      document.getElementById("r4").textContent = fmt(v * (1 + p / 100)) + "  (increased)   ·   " + fmt(v * (1 - p / 100)) + "  (decreased)";
    }

    [["a1","a2"],["b1","b2"],["c1","c2"],["d1","d2"]].forEach(function (pair, idx) {
      pair.forEach(function (id) {
        document.getElementById(id).addEventListener("input", [calc1, calc2, calc3, calc4][idx]);
      });
    });

    calc1(); calc2(); calc3(); calc4();
  })();
  </script>
</body>
</html>
