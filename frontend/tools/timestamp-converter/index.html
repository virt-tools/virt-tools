<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <script src="/assets/theme-init.js"></script>
  <title>Unix Timestamp Converter — Virtual Tools</title>
  <link rel="stylesheet" href="/assets/style.css">
</head>
<body>
  <div id="site-header"></div>
  <main>
    <div class="tool-header">
      <a class="back" href="/">← All tools</a>
      <h1>Unix Timestamp Converter</h1>
      <p>Convert between Unix epoch timestamps and human-readable dates. Runs entirely in your browser.</p>
    </div>

    <div class="panel">
      <label>Current Unix time</label>
      <div class="output" id="now-box" style="display:flex; gap:24px; flex-wrap:wrap;">
        <div><span class="muted">Seconds</span><br><span id="now-s" style="font-size:1.1rem;"></span></div>
        <div><span class="muted">Milliseconds</span><br><span id="now-ms" style="font-size:1.1rem;"></span></div>
      </div>
      <p class="note">Updates live. <button id="copy-now" class="link-btn">Copy seconds</button></p>
    </div>

    <div class="panel" style="margin-top:16px;">
      <div class="field">
        <label for="ts">From timestamp → date</label>
        <input type="text" id="ts" placeholder="e.g. 1700000000 or 1700000000000">
      </div>
      <div class="output" id="ts-out" style="white-space:pre-wrap;"></div>
      <p class="note" id="ts-note">Enter an epoch value in seconds or milliseconds.</p>
    </div>

    <div class="panel" style="margin-top:16px;">
      <div class="field">
        <label for="dt">From date → timestamp</label>
        <input type="datetime-local" id="dt" step="1">
      </div>
      <div class="output" id="dt-out" style="white-space:pre-wrap;"></div>
      <p class="note" id="dt-note">Pick a local date/time.</p>
    </div>
  </main>

  <script src="/assets/app.js"></script>
  <script>
  (function () {
    var nowS = document.getElementById("now-s");
    var nowMs = document.getElementById("now-ms");
    var tsIn = document.getElementById("ts");
    var tsOut = document.getElementById("ts-out");
    var tsNote = document.getElementById("ts-note");
    var dtIn = document.getElementById("dt");
    var dtOut = document.getElementById("dt-out");
    var dtNote = document.getElementById("dt-note");

    function pad(n) { return n < 10 ? "0" + n : "" + n; }

    function fmtLocal(d) {
      return d.getFullYear() + "-" + pad(d.getMonth() + 1) + "-" + pad(d.getDate()) +
        " " + pad(d.getHours()) + ":" + pad(d.getMinutes()) + ":" + pad(d.getSeconds());
    }

    // Live current time.
    function tick() {
      var now = Date.now();
      nowS.textContent = Math.floor(now / 1000);
      nowMs.textContent = now;
    }
    tick();
    setInterval(tick, 1000);

    document.getElementById("copy-now").addEventListener("click", function () {
      var v = nowS.textContent;
      if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(v);
      }
    });

    // Timestamp → date. Treat values >= 1e12 as milliseconds.
    function convertTs() {
      var raw = tsIn.value.trim();
      tsOut.textContent = "";
      if (!raw) { tsNote.textContent = "Enter an epoch value in seconds or milliseconds."; return; }
      if (!/^-?\d+$/.test(raw)) { tsNote.textContent = "Not a valid integer timestamp."; return; }
      var num = parseInt(raw, 10);
      var ms = Math.abs(num) >= 1e12 ? num : num * 1000;
      var d = new Date(ms);
      if (isNaN(d.getTime())) { tsNote.textContent = "Out of range."; return; }
      tsOut.textContent =
        "UTC:   " + d.toISOString() + "\n" +
        "Local: " + fmtLocal(d);
      tsNote.textContent = "";
    }
    tsIn.addEventListener("input", convertTs);

    // Date → timestamp.
    function convertDt() {
      dtOut.textContent = "";
      var v = dtIn.value;
      if (!v) { dtNote.textContent = "Pick a local date/time."; return; }
      var d = new Date(v);
      if (isNaN(d.getTime())) { dtNote.textContent = "Invalid date."; return; }
      var s = Math.floor(d.getTime() / 1000);
      dtOut.textContent =
        "Seconds:      " + s + "\n" +
        "Milliseconds: " + d.getTime() + "\n" +
        "UTC:          " + d.toISOString();
      dtNote.textContent = "";
    }
    dtIn.addEventListener("input", convertDt);

    // Pre-fill the date box with "now" so the tool is immediately useful.
    (function prefill() {
      var d = new Date();
      var v = d.getFullYear() + "-" + pad(d.getMonth() + 1) + "-" + pad(d.getDate()) +
        "T" + pad(d.getHours()) + ":" + pad(d.getMinutes()) + ":" + pad(d.getSeconds());
      dtIn.value = v;
      convertDt();
    })();
  })();
  </script>
</body>
</html>
