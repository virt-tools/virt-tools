<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CSS Cookie Consent Banner Generator — virt.tools</title>
<link rel="stylesheet" href="/assets/style.css">
<style>
.tool-area{max-width:900px;margin:2rem auto;padding:0 1rem}
.controls{display:grid;gap:1rem;margin:1.5rem 0;padding:1.5rem;background:#1a1a2e;border-radius:12px}
.ctrl-row{display:flex;gap:1rem;align-items:center;flex-wrap:wrap;margin-bottom:.5rem}
.ctrl-row label{font-weight:600;font-size:.9rem;min-width:120px}
.ctrl-row select,.ctrl-row input{padding:.5rem;border-radius:8px;border:1px solid #444;background:#0f0f1e;color:#eee}
.preview-box{margin:1.5rem 0;border-radius:12px;min-height:120px;padding:2rem;background:#e8e8e8;position:relative}
.output-block{margin:2rem 0}
.output-block textarea{width:100%;min-height:100px;font-family:monospace;font-size:.85rem;padding:1rem;border-radius:8px;border:1px solid #444;background:#0f0f1e;color:#eee;resize:vertical}
.copy-btn{padding:.6rem 1.2rem;border:none;border-radius:8px;background:#667eea;color:#fff;cursor:pointer;font-size:.9rem;margin-top:.5rem}
h2{margin-top:2rem;font-size:1.2rem}
</style>
</head>
<body>
<header id="site-header"></header>
<main>
<div class="tool-area">
<h1>🍪 CSS Cookie Consent Banner Generator</h1>
<p>Create CSS cookie consent / GDPR banner components. 4 positions, 3 themes, accept/reject buttons. Copy HTML+CSS.</p>
<div class="controls">
<div class="ctrl-row">
<label>Position</label><select id="position"><option value="bottom" selected>Bottom Bar</option><option value="top">Top Bar</option><option value="center">Center Modal</option><option value="corner">Bottom Corner</option></select>
<label>Theme</label><select id="theme"><option value="light" selected>Light</option><option value="dark">Dark</option><option value="glass">Glass</option></select>
<label>Style</label><select id="style"><option value="bar" selected>Bar</option><option value="card">Card</option></select>
</div>
<div class="ctrl-row">
<label>Primary Color</label><input type="color" id="accent" value="#667eea">
<label>Radius</label><input type="range" id="radius" min="0" max="24" value="12">
</div>
<div class="ctrl-row"><button class="copy-btn" onclick="update()">Update</button></div>
</div>
<h2>Preview</h2>
<div class="preview-box" id="preview"></div>
<h2>HTML</h2><div class="output-block"><textarea id="htmlOut" readonly></textarea><button class="copy-btn" onclick="copyText('htmlOut')">Copy HTML</button></div>
<h2>CSS</h2><div class="output-block"><textarea id="cssOut" readonly></textarea><button class="copy-btn" onclick="copyText('cssOut')">Copy CSS</button></div>
</div>
</main>
<script src="/assets/app.js"></script>
<script>
function update(){
var pos=document.getElementById('position').value;
var theme=document.getElementById('theme').value;
var style=document.getElementById('style').value;
var accent=document.getElementById('accent').value;
var radius=document.getElementById('radius').value;
var bg=theme==='dark'?'#1a1a2e':theme==='glass'?'rgba(255,255,255,0.85)':'#fff';
var fg=theme==='dark'?'#e0e0e0':theme==='glass'?'#222':'#222';
var posCss='';
if(pos==='bottom')posCss='bottom:0;left:0;right:0';
else if(pos==='top')posCss='top:0;left:0;right:0';
else if(pos==='center')posCss='top:50%;left:50%;transform:translate(-50%,-50%)';
else posCss='bottom:1rem;right:1rem;width:360px';
var html='<div class="cookie-consent cookie-'+pos+' cookie-'+theme+' cookie-'+style+'">\n  <p class="cookie-text">We use cookies to improve your experience. By continuing you accept our <a href="#">cookie policy</a>.</p>\n  <div class="cookie-actions">\n    <button class="cookie-deny">Reject</button>\n    <button class="cookie-accept">Accept</button>\n  </div>\n</div>';
var css='.cookie-consent{position:fixed;'+posCss+';z-index:9999;display:flex;align-items:center;justify-content:space-between;gap:1rem;padding:1rem 1.5rem;background:'+bg+';color:'+fg+';border-radius:'+(pos==='center'?radius+'px':'0')+';box-shadow:'+(pos==='center'||pos==='corner'||style==='card'?'0 4px 24px rgba(0,0,0,.15)':'none')+';font-family:system-ui,sans-serif;font-size:.9rem;backdrop-filter:'+(theme==='glass'?'blur(12px)':'none')+';border:'+(theme==='glass'?'1px solid rgba(255,255,255,.3)':'none')+';max-width:'+(pos==='corner'?'360px':'100%')+'}\n'+
'.cookie-text{margin:0;flex:1;line-height:1.5}\n'+
'.cookie-text a{color:'+accent+';text-decoration:underline}\n'+
'.cookie-actions{display:flex;gap:.5rem;flex-shrink:0}\n'+
'.cookie-accept{padding:.5rem 1.5rem;border:none;border-radius:'+(radius/2)+'px;background:'+accent+';color:#fff;font-weight:600;cursor:pointer;transition:opacity .2s;font-size:.85rem}\n'+
'.cookie-accept:hover{opacity:.85}\n'+
'.cookie-deny{padding:.5rem 1.5rem;border:1px solid '+fg+';border-radius:'+(radius/2)+'px;background:transparent;color:'+fg+';font-weight:600;cursor:pointer;transition:opacity .2s;font-size:.85rem}\n'+
'.cookie-deny:hover{opacity:.7}\n'+
'@media(max-width:600px){.cookie-consent{flex-direction:column;align-items:stretch;text-align:center}}\n';
document.getElementById('htmlOut').value=html;
document.getElementById('cssOut').value=css;
renderPreview(pos,theme,style,accent,radius);
}
function renderPreview(pos,theme,style,accent,radius){
var bg=theme==='dark'?'#1a1a2e':theme==='glass'?'rgba(255,255,255,0.85)':'#fff';
var fg=theme==='dark'?'#e0e0e0':theme==='glass'?'#222':'#222';
var posStyle='';
if(pos==='bottom')posStyle='bottom:0;left:0;right:0';
else if(pos==='top')posStyle='top:0;left:0;right:0';
else if(pos==='center')posStyle='top:50%;left:50%;transform:translate(-50%,-50%)';
else posStyle='bottom:1rem;right:1rem;max-width:360px';
var h='<div style="position:absolute;'+posStyle+';z-index:10;display:flex;align-items:center;justify-content:space-between;gap:1rem;padding:1rem 1.5rem;background:'+bg+';color:'+fg+';border-radius:'+(pos==='center'?radius+'px':'0')+';box-shadow:0 4px 24px rgba(0,0,0,.15);font-family:system-ui,sans-serif;font-size:.9rem;backdrop-filter:'+(theme==='glass'?'blur(12px)':'none')+';border:'+(theme==='glass'?'1px solid rgba(255,255,255,.3)':'none')+'">';
h+='<p style="margin:0;flex:1;line-height:1.5">We use cookies to improve your experience. By continuing you accept our <a href="#" style="color:'+accent+';text-decoration:underline">cookie policy</a>.</p>';
h+='<div style="display:flex;gap:.5rem;flex-shrink:0">';
h+='<button style="padding:.5rem 1.5rem;border:1px solid '+fg+';border-radius:'+(radius/2)+'px;background:transparent;color:'+fg+';font-weight:600;cursor:pointer;font-size:.85rem">Reject</button>';
h+='<button style="padding:.5rem 1.5rem;border:none;border-radius:'+(radius/2)+'px;background:'+accent+';color:#fff;font-weight:600;cursor:pointer;font-size:.85rem">Accept</button>';
h+='</div></div>';
document.getElementById('preview').innerHTML=h;
}
function copyText(id){var t=document.getElementById(id);t.select();document.execCommand('copy')}
document.getElementById('position').addEventListener('change',update);
document.getElementById('theme').addEventListener('change',update);
document.getElementById('style').addEventListener('change',update);
document.getElementById('accent').addEventListener('input',update);
document.getElementById('radius').addEventListener('input',update);
update();
</script>
</body>
</html>
