<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="/assets/theme-init.js"></script>
<title>Notes — Virtual Tools</title>
<link rel="stylesheet" href="/assets/style.css">
<style>
.tool-wrap{max-width:900px;margin:0 auto;}
.tool-desc{font-size:14px;color:var(--text-secondary,#aaa);margin:8px 0 16px;}
.layout{display:grid;grid-template-columns:240px 1fr;gap:16px;}
@media(max-width:640px){.layout{grid-template-columns:1fr;}}
.sidebar{background:var(--bg-alt,#1a1f2e);border-radius:12px;padding:16px;}
.sidebar h3{margin:0 0 12px;font-size:14px;color:var(--text-secondary,#888);text-transform:uppercase;letter-spacing:1px;}
.note-list{max-height:300px;overflow-y:auto;}
.note-item{padding:10px;border-radius:8px;cursor:pointer;margin-bottom:4px;border:1px solid transparent;}
.note-item:hover{background:var(--bg,#2a2f3e);}
.note-item.active{background:var(--bg,#2a2f3e);border-color:var(--accent,#5b8def);}
.note-item-title{font-weight:bold;font-size:13px;}
.note-item-preview{font-size:11px;color:var(--text-secondary,#888);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.editor{background:var(--bg-alt,#1a1f2e);border-radius:12px;padding:20px;}
.editor-row{display:flex;gap:12px;margin-bottom:12px;align-items:center;}
.editor input.title{flex:1;padding:10px;border-radius:8px;border:1px solid var(--border,#444);background:var(--bg,#2a2f3e);color:var(--text,#eee);font-size:16px;font-weight:bold;}
.editor input.tags{padding:8px;border-radius:8px;border:1px solid var(--border,#444);background:var(--bg,#2a2f3e);color:var(--text,#eee);font-size:13px;width:200px;}
.editor textarea{width:100%;min-height:300px;padding:12px;border-radius:8px;border:1px solid var(--border,#444);background:var(--bg,#2a2f3e);color:var(--text,#eee);font-size:14px;font-family:inherit;resize:vertical;}
.editor input:focus,.editor textarea:focus{outline:none;border-color:var(--accent,#5b8def);}
.btn{padding:8px 18px;border-radius:8px;border:none;background:var(--accent,#5b8def);color:#fff;cursor:pointer;font-size:13px;}
.btn:hover{opacity:0.9;}
.btn-sm{padding:6px 12px;font-size:12px;background:var(--bg,#2a2f3e);border:1px solid var(--border,#444);color:var(--text,#eee);border-radius:6px;cursor:pointer;}
.btn-sm:hover{border-color:var(--accent,#5b8def);}
.btn-sm.danger{border-color:#f44;color:#f44;}
.search{width:100%;padding:8px 12px;border-radius:8px;border:1px solid var(--border,#444);background:var(--bg,#2a2f3e);color:var(--text,#eee);font-size:13px;margin-bottom:8px;}
.search:focus{outline:none;border-color:var(--accent,#5b8def);}
.empty{text-align:center;color:var(--text-secondary,#888);padding:40px;}
.word-count{font-size:11px;color:var(--text-secondary,#888);margin-top:8px;}
</style>
</head>
<body>
<header id="site-header"></header>
<main>
<div class="tool-wrap">
<h1>Notes 📝</h1>
<p class="tool-desc">Private note-taking app. Create, edit, search, and tag notes. All stored locally in your browser — nothing leaves your device.</p>
<div class="layout">
<div class="sidebar">
<input class="search" type="text" id="search" placeholder="🔍 Search notes..." oninput="renderList()">
<h3>Notes (<span id="count">0</span>)</h3>
<div class="note-list" id="noteList"></div>
<button class="btn" style="width:100%;margin-top:8px" onclick="newNote()">+ New Note</button>
</div>
<div class="editor" id="editor">
<div class="empty" id="emptyState">Select or create a note to begin.</div>
<div id="editorContent" style="display:none">
<div class="editor-row">
<input class="title" type="text" id="title" placeholder="Note title" oninput="saveCurrent()">
<input class="tags" type="text" id="tags" placeholder="tags, comma, sep" oninput="saveCurrent()">
</div>
<textarea id="body" placeholder="Start writing..." oninput="saveCurrent()"></textarea>
<div style="display:flex;justify-content:space-between;align-items:center;margin-top:12px">
<span class="word-count" id="wordCount"></span>
<div>
<button class="btn-sm" onclick="exportNote()">Export .txt</button>
<button class="btn-sm danger" onclick="delNote()">Delete</button>
</div>
</div>
</div>
</div>
</div>
</div>
</main>
<script src="/assets/app.js"></script>
<script>
const STORE='vt_notes';
let notes=JSON.parse(localStorage.getItem(STORE)||'[]');
let activeId=null;
function save(){localStorage.setItem(STORE,JSON.stringify(notes));}
function esc(s){return (s||'').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function renderList(){const q=document.getElementById('search').value.toLowerCase();const list=document.getElementById('noteList');const filtered=notes.filter(n=>!q||n.title.toLowerCase().includes(q)||n.body.toLowerCase().includes(q)||(n.tags||'').toLowerCase().includes(q)).sort((a,b)=>b.updated-a.updated);document.getElementById('count').textContent=notes.length;if(!filtered.length){list.innerHTML='<div style="padding:12px;color:var(--text-secondary,#888);font-size:12px;text-align:center">No notes found.</div>';return;}list.innerHTML=filtered.map(n=>`<div class="note-item ${n.id===activeId?'active':''}" onclick="selectNote(${n.id})"><div class="note-item-title">${esc(n.title||'Untitled')}</div><div class="note-item-preview">${esc((n.body||'').slice(0,50))}</div></div>`).join('');}
function selectNote(id){const n=notes.find(x=>x.id===id);if(!n)return;activeId=id;document.getElementById('emptyState').style.display='none';document.getElementById('editorContent').style.display='block';document.getElementById('title').value=n.title;document.getElementById('tags').value=n.tags||'';document.getElementById('body').value=n.body;updateWordCount();renderList();}
function newNote(){const id=Date.now();notes.push({id,title:'',tags:'',body:'',updated:id});activeId=id;save();document.getElementById('emptyState').style.display='none';document.getElementById('editorContent').style.display='block';document.getElementById('title').value='';document.getElementById('tags').value='';document.getElementById('body').value='';document.getElementById('title').focus();renderList();}
function saveCurrent(){if(activeId===null)return;const n=notes.find(x=>x.id===activeId);if(!n)return;n.title=document.getElementById('title').value;n.tags=document.getElementById('tags').value;n.body=document.getElementById('body').value;n.updated=Date.now();save();updateWordCount();renderList();}
function delNote(){if(activeId===null)return;if(!confirm('Delete this note?'))return;notes=notes.filter(x=>x.id!==activeId);activeId=null;save();document.getElementById('emptyState').style.display='block';document.getElementById('editorContent').style.display='none';renderList();}
function exportNote(){if(activeId===null)return;const n=notes.find(x=>x.id===activeId);if(!n)return;const blob=new Blob([n.title+'\n\n'+n.body],{type:'text/plain'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=(n.title||'note').replace(/[^a-z0-9]/gi,'_')+'.txt';a.click();}
function updateWordCount(){const b=document.getElementById('body').value;const w=b.trim()?b.trim().split(/\s+/).length:0;document.getElementById('wordCount').textContent=`${w} words · ${b.length} chars`;}
renderList();
</script>
</body>
</html>
