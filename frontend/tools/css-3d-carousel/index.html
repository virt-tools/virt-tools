<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CSS 3D Carousel Generator — virt.tools</title>
<link rel="stylesheet" href="/assets/style.css">
<style>
.tool-area{max-width:800px;margin:2rem auto;padding:0 1rem}
.controls{display:grid;gap:.8rem;margin:1.5rem 0;padding:1.5rem;background:#1a1a2e;border-radius:12px}
.ctrl-row{display:flex;gap:1rem;align-items:center;flex-wrap:wrap}
.ctrl-row label{font-weight:600;font-size:.9rem;min-width:120px}
.ctrl-row select,.ctrl-row input{padding:.5rem;border-radius:8px;border:1px solid #444;background:#0f0f1e;color:#eee}
.preview-box{margin:1.5rem 0;padding:2rem;background:#0a0a12;border-radius:12px;min-height:300px;display:flex;align-items:center;justify-content:center;perspective:1000px}
.output-block{margin:1.5rem 0}
.output-block textarea{width:100%;min-height:120px;font-family:monospace;font-size:.85rem;padding:1rem;border-radius:8px;border:1px solid #444;background:#0f0f1e;color:#eee;resize:vertical}
.copy-btn{padding:.6rem 1.2rem;border:none;border-radius:8px;background:#667eea;color:#fff;cursor:pointer;font-size:.9rem;margin-top:.5rem}
h2{margin-top:2rem;font-size:1.2rem}
.carousel{position:relative;width:160px;height:200px;transform-style:preserve-3d;animation:spin 10s linear infinite}
.carousel-item{position:absolute;width:160px;height:200px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:2rem;font-weight:900;color:#fff;box-shadow:0 4px 20px rgba(0,0,0,.3)}
@keyframes spin{from{transform:rotateY(0)}to{transform:rotateY(360deg)}}
</style>
</head>
<body>
<header id="site-header"></header>
<main>
<div class="tool-area">
<h1>🎠 CSS 3D Carousel Generator</h1>
<p>Create CSS 3D rotating carousel components. 4-8 panels, adjustable radius/speed, auto-rotate. Copy HTML+CSS.</p>
<div class="controls">
<div class="ctrl-row"><label>Panel Count</label><select id="count"><option value="4">4</option><option value="6" selected>6</option><option value="8">8</option><option value="10">10</option></select></div>
<div class="ctrl-row"><label>Radius (px)</label><input type="number" id="radius" value="200" min="100" max="500" step="10" style="width:80px"></div>
<div class="ctrl-row"><label>Duration (s)</label><input type="number" id="duration" value="10" min="2" max="60" step="1" style="width:80px"></div>
<div class="ctrl-row"><label>Panel Size</label><select id="size"><option value="120">Small</option><option value="160" selected>Medium</option><option value="200">Large</option></select></div>
<div class="ctrl-row"><button class="copy-btn" onclick="update()">Update</button></div>
</div>
<h2>Preview</h2>
<div class="preview-box" id="preview"></div>
<h2>CSS</h2><div class="output-block"><textarea id="cssOut" readonly></textarea><button class="copy-btn" onclick="copyText('cssOut')">Copy CSS</button></div>
<h2>HTML</h2><div class="output-block"><textarea id="htmlOut" readonly></textarea><button class="copy-btn" onclick="copyText('htmlOut')">Copy HTML</button></div>
</div>
</main>
<script src="/assets/app.js"></script>
<script>
var colors=['#667eea','#764ba2','#f093fb','#f5576c','#4facfe','#00f2fe','#43e97b','#38f9d7','#fa709a','#fee140'];
function update(){
var count=parseInt(document.getElementById('count').value);
var radius=parseInt(document.getElementById('radius').value);
var dur=parseFloat(document.getElementById('duration').value);
var size=parseInt(document.getElementById('size').value);
var angle=360/count;
var css='.carousel{position:relative;width:'+size+'px;height:'+(size*1.25)+'px;transform-style:preserve-3d;animation:spin '+dur+'s linear infinite;margin:0 auto}\n.carousel-item{position:absolute;width:'+size+'px;height:'+(size*1.25)+'px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:2rem;font-weight:900;color:#fff;backface-visibility:hidden}\n';
for(var i=0;i<count;i++){
css+='.carousel-item:nth-child('+(i+1)+'){transform:rotateY('+(i*angle)+'deg) translateZ('+radius+'px);background:'+colors[i%colors.length]+'}\n';
}
css+='@keyframes spin{from{transform:rotateY(0)}to{transform:rotateY(360deg)}}';
var html='<div class="carousel">\n';
for(var i=0;i<count;i++){
html+='  <div class="carousel-item">'+(i+1)+'</div>\n';
}
html+='</div>';
document.getElementById('cssOut').value=css;
document.getElementById('htmlOut').value=html;
document.getElementById('preview').innerHTML='<style>'+css+'</style>'+html;
}
function copyText(id){var t=document.getElementById(id);t.select();document.execCommand('copy')}
['count','radius','duration','size'].forEach(function(id){var el=document.getElementById(id);el.addEventListener('input',update);el.addEventListener('change',update)});
update();
</script>
</body>
</html>
