<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="/assets/theme-init.js"></script>
<title>CSS Coming Soon Page Generator — Virtual Tools</title>
<link rel="stylesheet" href="/assets/style.css">
<style>
.tool-wrap{max-width:800px;margin:0 auto;}
.tool-desc{font-size:14px;color:var(--text-secondary,#aaa);margin:8px 0 20px;}
.controls{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin:12px 0;}
.ctrl{display:flex;flex-direction:column;gap:4px;}
.ctrl label{font-size:12px;color:var(--text-secondary,#888);}
.ctrl input,.ctrl select{padding:6px 8px;border-radius:6px;border:1px solid var(--border,#444);background:var(--bg,#1e2230);color:var(--text,#eee);font-size:13px;font-family:inherit;}
button.action{padding:8px 16px;border-radius:6px;border:1px solid var(--border,#444);background:var(--card,#2a2f3e);color:var(--text,#eee);cursor:pointer;font-size:13px;margin:4px 4px 0 0;}
.preview{border:1px solid var(--border,#444);border-radius:8px;margin:12px 0;overflow:hidden;}
.code-block{background:var(--bg,#1e2230);border:1px solid var(--border,#444);border-radius:8px;padding:12px;margin:8px 0;font-family:monospace;font-size:11px;color:var(--text,#eee);white-space:pre-wrap;word-break:break-all;max-height:400px;overflow:auto;}
.cs{min-height:300px;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:40px 20px;}
.cs .title{font-size:32px;font-weight:800;margin-bottom:8px;}
.cs .sub{font-size:16px;opacity:.7;margin-bottom:20px;}
.cs .count{display:flex;gap:12px;margin-bottom:20px;}
.cs .unit{text-align:center;}
.cs .num{font-size:36px;font-weight:700;}
.cs .lbl{font-size:11px;opacity:.6;text-transform:uppercase;}
.cs .notify{display:flex;gap:8px;}
.cs .notify input{padding:8px 12px;border-radius:6px;border:1px solid #fff3;font-size:13px;background:#fff1;color:#fff;}
.cs .notify button{padding:8px 16px;border-radius:6px;border:none;font-size:13px;font-weight:600;cursor:pointer;}
</style>
</head>
<body>
<header id="site-header"></header>
<main>
<div class="tool-wrap">
<h1>⏳ CSS Coming Soon Page Generator</h1>
<p class="tool-desc">Create "coming soon" / "under construction" page templates with countdown, email notify, and 4 styles. Copy HTML+CSS.</p>
<div class="controls">
<div class="ctrl"><label>Style</label><select id="style" onchange="render()"><option value="minimal" selected>Minimal</option><option value="gradient">Gradient</option><option value="space">Space</option><option value="retro">Retro</option></select></div>
<div class="ctrl"><label>Title</label><input type="text" id="title" value="Coming Soon" oninput="render()"></div>
<div class="ctrl"><label>Subtitle</label><input type="text" id="sub" value="Something amazing is on the way." oninput="render()" style="width:100%"></div>
<div class="ctrl"><label>Show Countdown</label><select id="countdown" onchange="render()"><option value="yes" selected>Yes</option><option value="no">No</option></select></div>
<div class="ctrl"><label>Show Email Notify</label><select id="notify" onchange="render()"><option value="yes" selected>Yes</option><option value="no">No</option></select></div>
<div class="ctrl"><label>Background</label><input type="color" id="bg" value="#1a1a2e" oninput="render()"></div>
<div class="ctrl"><label>Text Color</label><input type="color" id="txt" value="#ffffff" oninput="render()"></div>
<div class="ctrl"><label>Accent</label><input type="color" id="accent" value="#6c5ce7" oninput="render()"></div>
</div>
<div style="margin:8px 0;"><button class="action" onclick="copyCode()">Copy HTML+CSS</button></div>
<div class="preview" id="prev"></div>
<div class="code-block" id="code"></div>
</div>
</div>
</main>
<script src="/assets/app.js"></script>
<script>
let codeText='';
function v(id){return document.getElementById(id).value;}
function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function render(){
const style=v('style'),title=esc(v('title')),sub=esc(v('sub'));
const showCount=v('countdown')==='yes',showNotify=v('notify')==='yes';
const bg=v('bg'),txt=v('txt'),accent=v('accent');
let pageCss='',titleCss='',btnCss=`background:${accent};color:#fff;`;
if(style==='gradient'){pageCss=`background:linear-gradient(135deg,${bg},${accent}40);`;titleCss=`background:linear-gradient(135deg,${accent},#fd79a8);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;`;}
else if(style==='space'){pageCss=`background:radial-gradient(ellipse at center,${bg} 0%,#000 100%);`;titleCss=`color:${accent};text-shadow:0 0 20px ${accent}80;`;}
else if(style==='retro'){pageCss=`background:${bg};font-family:monospace;`;titleCss=`color:${accent};text-shadow:4px 4px 0 ${accent}40;`;}
else{pageCss=`background:${bg};`;titleCss=`color:${accent};`;}
let countHtml='';
if(showCount){countHtml=`<div class="count"><div class="unit"><div class="num">07</div><div class="lbl">Days</div></div><div class="unit"><div class="num">12</div><div class="lbl">Hours</div></div><div class="unit"><div class="num">30</div><div class="lbl">Mins</div></div><div class="unit"><div class="num">45</div><div class="lbl">Secs</div></div></div>`;}
let notifyHtml='';
if(showNotify){notifyHtml=`<div class="notify"><input type="email" placeholder="Enter your email"><button style="${btnCss}">Notify Me</button></div>`;}
const html=`<div class="cs" style="${pageCss}color:${txt};">
<div class="title" style="${titleCss}">${title}</div>
<div class="sub">${sub}</div>
${countHtml}
${notifyHtml}
</div>`;
document.getElementById('prev').innerHTML=html;
codeText=`<style>
.coming-soon {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 40px 20px;
  ${pageCss}
  color: ${txt};
}
.coming-soon .title {
  font-size: 32px;
  font-weight: 800;
  margin-bottom: 8px;
  ${titleCss}
}
.coming-soon .sub { font-size: 16px; opacity: 0.7; margin-bottom: 20px; }
.coming-soon .count { display: flex; gap: 12px; margin-bottom: 20px; }
.coming-soon .unit { text-align: center; }
.coming-soon .num { font-size: 36px; font-weight: 700; }
.coming-soon .lbl { font-size: 11px; opacity: 0.6; text-transform: uppercase; }
.coming-soon .notify { display: flex; gap: 8px; }
.coming-soon .notify input {
  padding: 8px 12px;
  border-radius: 6px;
  border: 1px solid rgba(255,255,255,0.2);
  font-size: 13px;
  background: rgba(255,255,255,0.1);
  color: #fff;
}
.coming-soon .notify button {
  padding: 8px 16px;
  border-radius: 6px;
  border: none;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  ${btnCss}
}
</style>

<div class="coming-soon">
  <div class="title">${title}</div>
  <div class="sub">${sub}</div>
${showCount?`  <div class="count">
    <div class="unit"><div class="num">07</div><div class="lbl">Days</div></div>
    <div class="unit"><div class="num">12</div><div class="lbl">Hours</div></div>
    <div class="unit"><div class="num">30</div><div class="lbl">Mins</div></div>
    <div class="unit"><div class="num">45</div><div class="lbl">Secs</div></div>
  </div>`:''}
${showNotify?`  <div class="notify">
    <input type="email" placeholder="Enter your email">
    <button>Notify Me</button>
  </div>`:''}
</div>`;
document.getElementById('code').textContent=codeText;
}
function copyCode(){navigator.clipboard.writeText(codeText).then(()=>alert('Copied!'));}
render();
</script>
</body>
</html>
