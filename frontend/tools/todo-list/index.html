<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="/assets/theme-init.js"></script>
<title>To-Do List — Virtual Tools</title>
<link rel="stylesheet" href="/assets/style.css">
<style>
.tool-wrap{max-width:700px;margin:0 auto;}
.tool-desc{font-size:14px;color:var(--text-secondary,#aaa);margin:8px 0 16px;}
.card{background:var(--bg-alt,#1a1f2e);border-radius:12px;padding:20px;margin:12px 0;}
.row{display:flex;gap:12px;flex-wrap:wrap;align-items:end;}
.field{flex:1;min-width:120px;}
.field label{display:block;font-size:12px;color:var(--text-secondary,#888);margin-bottom:4px;}
.field input,.field select{width:100%;padding:10px;border-radius:8px;border:1px solid var(--border,#444);background:var(--bg,#2a2f3e);color:var(--text,#eee);font-size:14px;}
.field input:focus,.field select:focus{outline:none;border-color:var(--accent,#5b8def);}
.btn{padding:10px 24px;border-radius:8px;border:none;background:var(--accent,#5b8def);color:#fff;cursor:pointer;font-size:14px;}
.btn:hover{opacity:0.9;}
.btn-sm{padding:6px 14px;font-size:12px;background:var(--bg-alt,#1a1f2e);border:1px solid var(--border,#444);color:var(--text,#eee);border-radius:6px;cursor:pointer;}
.btn-sm:hover{border-color:var(--accent,#5b8def);}
.btn-sm.active{background:var(--accent,#5b8def);color:#fff;border-color:var(--accent,#5b8def);}
.stats{display:flex;gap:16px;flex-wrap:wrap;margin:12px 0;}
.stat{background:var(--bg-alt,#1a1f2e);border-radius:10px;padding:12px 20px;text-align:center;flex:1;min-width:80px;}
.stat-val{font-size:22px;font-weight:bold;color:var(--accent,#5b8def);}
.stat-label{font-size:11px;color:var(--text-secondary,#888);text-transform:uppercase;letter-spacing:1px;}
.filters{display:flex;gap:8px;margin:12px 0;flex-wrap:wrap;}
.todo-item{display:flex;align-items:center;gap:12px;padding:12px;border-bottom:1px solid var(--border,#333);}
.todo-item:last-child{border-bottom:none;}
.todo-check{width:22px;height:22px;border-radius:6px;border:2px solid var(--border,#555);cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:14px;}
.todo-check.done{background:var(--accent,#5b8def);border-color:var(--accent,#5b8def);color:#fff;}
.todo-text{flex:1;}
.todo-text.done{text-decoration:line-through;color:var(--text-secondary,#666);}
.todo-note{font-size:12px;color:var(--text-secondary,#888);margin-top:2px;}
.todo-meta{font-size:11px;display:flex;gap:8px;align-items:center;}
.pri{padding:2px 8px;border-radius:10px;font-size:10px;font-weight:bold;text-transform:uppercase;}
.pri-high{background:#f4434320;color:#f44343;}
.pri-med{background:#ff980020;color:#ff9800;}
.pri-low{background:#4caf5020;color:#4caf50;}
.due{color:var(--text-secondary,#888);}
.due.overdue{color:#f44343;font-weight:bold;}
.del{background:none;border:none;color:var(--text-secondary,#888);cursor:pointer;font-size:18px;padding:4px;}
.del:hover{color:#f44;}
.empty{text-align:center;color:var(--text-secondary,#888);padding:30px;}
</style>
</head>
<body>
<header id="site-header"></header>
<main>
<div class="tool-wrap">
<h1>To-Do List ✅</h1>
<p class="tool-desc">Manage tasks with priorities, due dates, and notes. Filter by status or priority. All stored locally in your browser.</p>
<div class="stats" id="stats"></div>
<div class="card">
<div class="row">
<div class="field" style="flex:2"><label>Task</label><input type="text" id="title" placeholder="What needs doing?" onkeydown="if(event.key==='Enter')add()"></div>
<div class="field"><label>Priority</label><select id="pri"><option value="high">🔴 High</option><option value="med" selected>🟡 Medium</option><option value="low">🟢 Low</option></select></div>
<div class="field"><label>Due date</label><input type="date" id="due"></div>
<button class="btn" onclick="add()">Add</button>
</div>
</div>
<div class="filters" id="filters">
<button class="btn-sm active" onclick="setFilter('all',this)">All</button>
<button class="btn-sm" onclick="setFilter('active',this)">Active</button>
<button class="btn-sm" onclick="setFilter('done',this)">Done</button>
<button class="btn-sm" onclick="setFilter('high',this)">High Priority</button>
<button class="btn-sm" onclick="setFilter('today',this)">Due Today</button>
<button class="btn-sm" onclick="setFilter('overdue',this)">Overdue</button>
</div>
<div class="card" id="list"></div>
<button class="btn-sm" onclick="clearDone()">Clear Completed</button>
</div>
</main>
<script src="/assets/app.js"></script>
<script>
const STORE='vt_todos';
let todos=JSON.parse(localStorage.getItem(STORE)||'[]');
let filter='all';
function save(){localStorage.setItem(STORE,JSON.stringify(todos));}
function esc(s){return (s||'').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function todayStr(){return new Date().toISOString().slice(0,10);}
function renderStats(){const total=todos.length;const done=todos.filter(t=>t.done).length;const active=total-done;const overdue=todos.filter(t=>!t.done&&t.due&&t.due<todayStr()).length;document.getElementById('stats').innerHTML=`<div class="stat"><div class="stat-val">${total}</div><div class="stat-label">Total</div></div><div class="stat"><div class="stat-val">${active}</div><div class="stat-label">Active</div></div><div class="stat"><div class="stat-val">${done}</div><div class="stat-label">Done</div></div><div class="stat"><div class="stat-val">${overdue}</div><div class="stat-label">Overdue</div></div>`;}
function matchesFilter(t){if(filter==='all')return true;if(filter==='active')return !t.done;if(filter==='done')return t.done;if(filter==='high')return t.pri==='high'&&!t.done;if(filter==='today')return t.due===todayStr()&&!t.done;if(filter==='overdue')return !t.done&&t.due&&t.due<todayStr();return true;}
function renderList(){const c=document.getElementById('list');const filtered=todos.filter(matchesFilter);if(!filtered.length){c.innerHTML='<div class="empty">No tasks match this filter.</div>';return;}const priLabels={high:'<span class="pri pri-high">High</span>',med:'<span class="pri pri-med">Med</span>',low:'<span class="pri pri-low">Low</span>'};c.innerHTML=filtered.map(t=>{const idx=todos.indexOf(t);let dueHtml='';if(t.due){const od=!t.done&&t.due<todayStr();dueHtml=`<span class="due ${od?'overdue':''}">📅 ${t.due}${od?' ⚠':''}</span>`;}return `<div class="todo-item"><div class="todo-check ${t.done?'done':''}" onclick="toggle(${idx})">${t.done?'✓':''}</div><div class="todo-text ${t.done?'done':''}"><div>${esc(t.title)}</div>${t.note?`<div class="todo-note">${esc(t.note)}</div>`:''}<div class="todo-meta">${priLabels[t.pri]}${dueHtml}</div></div><button class="del" onclick="del(${idx})">×</button></div>`;}).join('');}
function add(){const title=document.getElementById('title').value.trim();if(!title){alert('Enter a task title');return;}const pri=document.getElementById('pri').value;const due=document.getElementById('due').value;todos.push({title,pri,due:due||'',done:false,created:Date.now()});save();document.getElementById('title').value='';document.getElementById('due').value='';renderAll();}
function toggle(idx){todos[idx].done=!todos[idx].done;save();renderAll();}
function del(idx){todos.splice(idx,1);save();renderAll();}
function setFilter(f,btn){filter=f;document.querySelectorAll('#filters .btn-sm').forEach(b=>b.classList.remove('active'));btn.classList.add('active');renderList();}
function clearDone(){const c=todos.filter(t=>t.done).length;if(c&&confirm(`Delete ${c} completed task(s)?`)){todos=todos.filter(t=>!t.done);save();renderAll();}}
function renderAll(){renderStats();renderList();}
renderAll();
</script>
</body>
</html>
