<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="/assets/theme-init.js"></script>
<title>CSS Timeline Generator — Virtual Tools</title>
<link rel="stylesheet" href="/assets/style.css">
<style>
.tool-wrap{max-width:800px;margin:0 auto;}
.tool-desc{font-size:14px;color:var(--text-secondary,#aaa);margin:8px 0 20px;}
.controls{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin:12px 0;}
.ctrl{display:flex;flex-direction:column;gap:4px;}
.ctrl label{font-size:12px;color:var(--text-secondary,#888);}
.ctrl input,.ctrl select{padding:6px 8px;border-radius:6px;border:1px solid var(--border,#444);background:var(--bg,#1e2230);color:var(--text,#eee);font-size:13px;}
.ctrl input[type="color"]{padding:2px;height:34px;}
button.action{padding:8px 16px;border-radius:6px;border:1px solid var(--border,#444);background:var(--card,#2a2f3e);color:var(--text,#eee);cursor:pointer;font-size:13px;margin:4px 4px 0 0;}
.preview{background:var(--bg,#1e2230);border:1px solid var(--border,#444);border-radius:8px;padding:24px;margin:12px 0;}
.code-block{background:var(--bg,#1e2230);border:1px solid var(--border,#444);border-radius:8px;padding:12px;margin:8px 0;font-family:monospace;font-size:11px;color:var(--text,#eee);white-space:pre-wrap;word-break:break-all;max-height:400px;overflow:auto;}
.timeline{position:relative;padding-left:30px;}
.timeline::before{content:'';position:absolute;left:10px;top:0;bottom:0;width:2px;}
.timeline-item{position:relative;padding:0 0 24px 20px;}
.timeline-item::before{content:'';position:absolute;left:-26px;top:4px;width:12px;height:12px;border-radius:50%;border:2px solid;}
.timeline-item .date{font-size:12px;font-weight:bold;}
.timeline-item .title{font-size:15px;font-weight:bold;margin:2px 0;}
.timeline-item .desc{font-size:13px;color:var(--text-secondary,#aaa);}
</style>
</head>
<body>
<header id="site-header"></header>
<main>
<div class="tool-wrap">
<h1>📅 CSS Timeline Generator</h1>
<p class="tool-desc">Create vertical CSS timelines with custom colors, dot styles, and animations. 4 presets, copy HTML+CSS.</p>
<div class="controls">
<div class="ctrl"><label>Accent Color</label><input type="color" id="ac" value="#5b8def" oninput="render()"></div>
<div class="ctrl"><label>Line Color</label><input type="color" id="lc" value="#444" oninput="render()"></div>
<div class="ctrl"><label>Dot Style</label><select id="ds" onchange="render()"><option value="0" selected>Circle</option><option value="1">Square</option><option value="2">Diamond</option></select></div>
<div class="ctrl"><label># Items</label><select id="ni" onchange="render()"><option value="3">3</option><option value="4">4</option><option value="5" selected>5</option><option value="6">6</option></select></div>
<div class="ctrl"><label>Animation</label><select id="an" onchange="render()"><option value="0">None</option><option value="1" selected>Slide-in</option><option value="2">Fade-in</option></select></div>
</div>
<div class="preview" id="prev"></div>
<div style="margin:8px 0;"><button class="action" onclick="copyCode()">Copy HTML+CSS</button></div>
<div class="code-block" id="code"></div>
</div>
</main>
<script src="/assets/app.js"></script>
<script>
let codeText='';
const ITEMS=[{date:'Jan 2024',title:'Project Kickoff',desc:'Initial planning and team assembly'},{date:'Mar 2024',title:'MVP Launch',desc:'First working prototype released'},{date:'Jun 2024',title:'Beta Testing',desc:'User feedback and bug fixes'},{date:'Sep 2024',title:'Public Release',desc:'Official launch to all users'},{date:'Dec 2024',title:'Year Review',desc:'Performance review and roadmap planning'},{date:'Jan 2025',title:'v2 Planning',desc:'New features and improvements roadmap'}];
function render(){
const ac=v('ac'),lc=v('lc'),ds=parseInt(v('ds')),ni=parseInt(v('ni')),an=parseInt(v('an'));
const dotShape=ds===0?'50%':ds===1?'0%':'0%';
const dotRotate=ds===2?'transform:rotate(45deg);':'';
const animCSS=an===1?'@keyframes slideIn{from{opacity:0;transform:translateX(-20px)}to{opacity:1;transform:translateX(0)}}.timeline-item{animation:slideIn .4s ease forwards}':an===2?'@keyframes fadeIn{from{opacity:0}to{opacity:1}}.timeline-item{animation:fadeIn .5s ease forwards}':'';
const css=`.timeline{position:relative;padding-left:30px}.timeline::before{content:'';position:absolute;left:10px;top:0;bottom:0;width:2px;background:${lc}}.timeline-item{position:relative;padding:0 0 24px 20px}.timeline-item::before{content:'';position:absolute;left:-26px;top:4px;width:12px;height:12px;border-radius:${dotShape};background:${ac};border:2px solid ${ac};${dotRotate}}.timeline-item .date{font-size:12px;font-weight:bold;color:${ac}}.timeline-item .title{font-size:15px;font-weight:bold;color:#eee;margin:2px 0}.timeline-item .desc{font-size:13px;color:#aaa}${animCSS?'\n'+animCSS:''}`;
let html='<div class="timeline">\n';
for(let i=0;i<ni;i++){
const it=ITEMS[i];
html+=`  <div class="timeline-item">\n    <div class="date">${it.date}</div>\n    <div class="title">${it.title}</div>\n    <div class="desc">${it.desc}</div>\n  </div>\n`;
}
html+='</div>';
document.getElementById('prev').innerHTML=`<style>${css}</style>${html}`;
codeText=`<!-- HTML -->\n${html}\n\n<!-- CSS -->\n<style>\n${css}\n</style>`;
document.getElementById('code').textContent=codeText;
}
function v(id){return document.getElementById(id).value;}
function copyCode(){navigator.clipboard.writeText(codeText).then(()=>alert('Code copied!')).catch(()=>alert('Copy failed'));}
render();
</script>
</body>
</html>
