<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <script src="/assets/theme-init.js"></script>
  <title>HTML Entity Encoder / Decoder — Virtual Tools</title>
  <link rel="stylesheet" href="/assets/style.css">
</head>
<body>
  <div id="site-header"></div>
  <main>
    <div class="tool-header">
      <a class="back" href="/">← All tools</a>
      <h1>HTML Entity Encoder / Decoder</h1>
      <p>Escape text to HTML entities — named, decimal or hex — and decode entities back to text. Runs entirely in your browser.</p>
    </div>

    <div class="panel">
      <div class="row" style="align-items:flex-end;">
        <div>
          <label for="mode">Mode</label>
          <select id="mode">
            <option value="encode" selected>Encode</option>
            <option value="decode">Decode</option>
          </select>
        </div>
        <div>
          <label for="style">Entity style</label>
          <select id="style">
            <option value="named" selected>Named (&amp; &lt; &gt;)</option>
            <option value="decimal">Decimal (&#38;)</option>
            <option value="hex">Hex (&#x26;)</option>
          </select>
        </div>
      </div>

      <div class="spacer"></div>
      <div id="encOpts" class="row">
        <label class="check"><input type="checkbox" id="cAmp" checked> &amp; ampersand</label>
        <label class="check"><input type="checkbox" id="cLt" checked> &lt; less-than</label>
        <label class="check"><input type="checkbox" id="cGt" checked> &gt; greater-than</label>
        <label class="check"><input type="checkbox" id="cQuot" checked> &quot; quote</label>
        <label class="check"><input type="checkbox" id="cApos" checked> &#39; apostrophe</label>
        <label class="check"><input type="checkbox" id="cAll"> all non-ASCII (&gt; 127)</label>
      </div>

      <div class="spacer"></div>
      <div class="field">
        <label for="in">Input</label>
        <textarea id="in" style="min-height:120px;">Tom &amp; "Jerry" &lt;cat&gt; café €</textarea>
      </div>

      <div class="spacer"></div>
      <div class="row" style="justify-content:space-between;">
        <label for="out">Output</label>
        <button id="copy" class="secondary" style="padding:4px 10px;">Copy</button>
      </div>
      <div class="output" id="out" style="word-break:break-all; min-height:1.6em;"></div>
      <p class="note" id="note">Encode replaces the selected characters with HTML entities. Decode handles named, decimal and hex entities.</p>
    </div>
  </main>

  <script src="/assets/app.js"></script>
  <script>
  (function () {
    var mode = document.getElementById("mode");
    var style = document.getElementById("style");
    var encOpts = document.getElementById("encOpts");
    var inEl = document.getElementById("in");
    var out = document.getElementById("out");
    var copy = document.getElementById("copy");
    var note = document.getElementById("note");
    var cAmp = document.getElementById("cAmp");
    var cLt = document.getElementById("cLt");
    var cGt = document.getElementById("cGt");
    var cQuot = document.getElementById("cQuot");
    var cApos = document.getElementById("cApos");
    var cAll = document.getElementById("cAll");

    var NAMED = { 38: "&amp;", 60: "&lt;", 62: "&gt;", 34: "&quot;", 39: "&#39;" };

    function encode(text) {
      var st = style.value;
      var selected = {};
      if (cAmp.checked) selected[38] = true;
      if (cLt.checked) selected[60] = true;
      if (cGt.checked) selected[62] = true;
      if (cQuot.checked) selected[34] = true;
      if (cApos.checked) selected[39] = true;
      var allNonAscii = cAll.checked;
      var result = "";
      for (var i = 0; i < text.length; i++) {
        var ch = text.charAt(i);
        var cp = text.charCodeAt(i);
        if (selected[cp]) {
          result += st === "named" ? NAMED[cp] : (st === "decimal" ? "&#" + cp + ";" : "&#x" + cp.toString(16) + ";");
        } else if (allNonAscii && cp > 127) {
          result += st === "decimal" ? "&#" + cp + ";" : "&#x" + cp.toString(16) + ";";
        } else {
          result += ch;
        }
      }
      return result;
    }

    function decode(text) {
      // Use a textarea element: setting innerHTML decodes all named/numeric
      // entities without parsing tags into the DOM (textarea is escapable
      // raw text), so it's safe and complete.
      var ta = document.createElement("textarea");
      ta.innerHTML = text;
      return ta.value;
    }

    function run() {
      var v = inEl.value;
      if (mode.value === "encode") {
        out.textContent = encode(v);
        note.textContent = "Encoded " + v.length + " characters.";
      } else {
        out.textContent = decode(v);
        note.textContent = "Decoded " + v.length + " characters of input.";
      }
      out.style.color = "";
    }

    function copyText() {
      var t = out.textContent;
      if (!t) return;
      function done() { copy.textContent = "Copied!"; setTimeout(function () { copy.textContent = "Copy"; }, 1200); }
      if (navigator.clipboard && navigator.clipboard.writeText) navigator.clipboard.writeText(t).then(done);
      else { var ta = document.createElement("textarea"); ta.value = t; document.body.appendChild(ta); ta.select(); try { document.execCommand("copy"); done(); } catch (e) {} ta.remove(); }
    }

    function syncOpts() {
      encOpts.style.display = mode.value === "encode" ? "" : "none";
      style.disabled = mode.value === "decode";
      // style is irrelevant for decode (decode handles all forms); dim it.
    }

    [mode, style, cAmp, cLt, cGt, cQuot, cApos, cAll].forEach(function (el) {
      el.addEventListener("input", function () { syncOpts(); run(); });
      el.addEventListener("change", function () { syncOpts(); run(); });
    });
    copy.addEventListener("click", copyText);

    syncOpts();
    run();
  })();
  </script>
</body>
</html>
