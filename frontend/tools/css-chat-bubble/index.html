<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CSS Chat Bubble Generator — virt.tools</title>
<link rel="stylesheet" href="/assets/style.css">
<style>
.tool-area{max-width:960px;margin:2rem auto;padding:0 1rem}
.controls{display:grid;gap:1rem;margin:1.5rem 0;padding:1.5rem;background:var(--card-bg,#1a1a2e);border-radius:12px}
.control-row{display:flex;gap:1rem;align-items:center;flex-wrap:wrap}
.control-row label{min-width:120px;font-weight:600;font-size:.9rem}
.control-row select,.control-row input[type="text"],.control-row input[type="color"]{padding:.5rem .75rem;border-radius:8px;border:1px solid #444;background:var(--bg,#0f0f1e);color:var(--text,#eee);font-size:.9rem}
.control-row input[type="range"]{flex:1;min-width:150px}
.preview-area{margin:2rem 0;padding:2rem;background:#1a1a2e;border-radius:12px;min-height:300px}
.chat-container{max-width:400px;margin:0 auto;display:flex;flex-direction:column;gap:.75rem}
.bubble{max-width:75%;padding:.75rem 1rem;border-radius:18px;font-size:.9rem;line-height:1.4;word-wrap:break-word;position:relative}
.bubble.sent{align-self:flex-end;background:#4a9eff;color:#fff;border-bottom-right-radius:4px}
.bubble.received{align-self:flex-start;background:#2a2a3e;color:#e0e0e0;border-bottom-left-radius:4px}
.bubble-time{font-size:.7rem;opacity:.6;margin-top:.25rem;text-align:right}
.css-output{margin:2rem 0}
.css-output textarea{width:100%;min-height:200px;font-family:monospace;font-size:.85rem;padding:1rem;border-radius:8px;border:1px solid #444;background:#0f0f1e;color:#eee;resize:vertical}
.copy-btn{padding:.6rem 1.2rem;border:none;border-radius:8px;background:#4a9eff;color:#fff;cursor:pointer;font-size:.9rem;margin-top:.5rem}
.copy-btn:hover{background:#3a8eef}
h2{margin-top:2rem;font-size:1.2rem}
</style>
</head>
<body>
<header id="site-header"></header>
<main>
<div class="tool-area">
<h1>💬 CSS Chat Bubble Generator</h1>
<p>Create chat message bubbles for messaging UI. 4 styles, sent/received sides, custom colors.</p>

<div class="controls">
<div class="control-row">
<label>Style</label>
<select id="style">
<option value="rounded">Rounded</option>
<option value="square">Square</option>
<option value="tail">With Tail</option>
<option value="gradient">Gradient</option>
</select>
</div>
<div class="control-row">
<label>Sent BG</label>
<input type="color" id="sentBg" value="#4a9eff">
<label>Sent Text</label>
<input type="color" id="sentText" value="#ffffff">
</div>
<div class="control-row">
<label>Recv BG</label>
<input type="color" id="recvBg" value="#2a2a3e">
<label>Recv Text</label>
<input type="color" id="recvText" value="#e0e0e0">
</div>
<div class="control-row">
<label>Message 1 (sent)</label>
<input type="text" id="msg1" value="Hey! How are you?" style="flex:1;min-width:200px">
</div>
<div class="control-row">
<label>Message 2 (recv)</label>
<input type="text" id="msg2" value="I'm great! Just shipped a new feature 🎉" style="flex:1;min-width:200px">
</div>
<div class="control-row">
<label>Message 3 (sent)</label>
<input type="text" id="msg3" value="Awesome! Want to grab coffee?" style="flex:1;min-width:200px">
</div>
<div class="control-row">
<label>Radius</label>
<input type="range" id="radius" min="0" max="30" value="18">
<span id="radiusVal">18px</span>
</div>
<div class="control-row">
<label>Show Time</label>
<select id="showTime"><option value="yes">Yes</option><option value="no">No</option></select>
</div>
</div>

<div class="preview-area" id="preview">
<div class="chat-container" id="chat"></div>
</div>

<h2>HTML</h2>
<div class="css-output">
<textarea id="htmlOut" readonly></textarea>
<button class="copy-btn" onclick="copyText('htmlOut')">Copy HTML</button>
</div>
<h2>CSS</h2>
<div class="css-output">
<textarea id="cssOut" readonly></textarea>
<button class="copy-btn" onclick="copyText('cssOut')">Copy CSS</button>
</div>
</div>
</main>
<script src="/assets/app.js"></script>
<script>
function update(){
var style=document.getElementById('style').value;
var sb=document.getElementById('sentBg').value;
var st=document.getElementById('sentText').value;
var rb=document.getElementById('recvBg').value;
var rt=document.getElementById('recvText').value;
var m1=document.getElementById('msg1').value;
var m2=document.getElementById('msg2').value;
var m3=document.getElementById('msg3').value;
var r=parseInt(document.getElementById('radius').value);
var showTime=document.getElementById('showTime').value==='yes';
document.getElementById('radiusVal').textContent=r+'px';

var msgs=[{t:m1,s:'sent'},{t:m2,s:'received'},{t:m3,s:'sent'}];
var chat=document.getElementById('chat');
chat.innerHTML='';
var htmlParts=[];
msgs.forEach(function(m,i){
var bg=m.s==='sent'?sb:rb;
var col=m.s==='sent'?st:rt;
var br='';
if(style==='rounded'){br=m.s==='sent'?'0 '+r+'px '+r+'px '+r+'px':r+'px 0 '+r+'px '+r+'px';}
else if(style==='square'){br='4px';}
else if(style==='tail'){br=m.s==='sent'?'0 '+r+'px '+r+'px '+r+'px':r+'px 0 '+r+'px '+r+'px';}
else if(style==='gradient'){br=m.s==='sent'?'0 '+r+'px '+r+'px '+r+'px':r+'px 0 '+r+'px '+r+'px';}

var bgStyle=style==='gradient'?(m.s==='sent'?'linear-gradient(135deg,'+sb+','+shade(sb,-20))':'linear-gradient(135deg,'+rb+','+shade(rb,20))):bg;
var tailStyle='';
if(style==='tail'){
tailStyle=m.s==='sent'?"::after{content:'';position:absolute;bottom:0;right:-6px;width:12px;height:12px;background:"+bg+";clip-path:polygon(0 0,100% 100%,0 100%)}":"::after{content:'';position:absolute;bottom:0;left:-6px;width:12px;height:12px;background:"+bg+";clip-path:polygon(0 100%,100% 100%,100% 0)}";
}

var div=document.createElement('div');
div.className='bubble '+m.s;
div.style.background=bgStyle;
div.style.color=col;
div.style.borderRadius=br;
if(style==='tail'){div.style.position='relative';}
div.textContent=m.t;
if(showTime){
var tm=document.createElement('div');
tm.className='bubble-time';
tm.textContent='12:'+(30+i*3<10?'0':'')+(30+i*3);
div.appendChild(tm);
}
chat.appendChild(div);
htmlParts.push('<div class="chat-bubble '+m.s+'">'+m.t+(showTime?'<span class="bubble-time">12:'+(30+i*3<10?'0':'')+(30+i*3)+'</span>':'')+'</div>');
});

var css='.chat-container{\n  max-width:400px;\n  display:flex;\n  flex-direction:column;\n  gap:.75rem;\n}\n.chat-bubble{\n  max-width:75%;\n  padding:.75rem 1rem;\n  border-radius:'+r+'px;\n  font-size:.9rem;\n  line-height:1.4;\n  word-wrap:break-word;\n}\n.chat-bubble.sent{\n  align-self:flex-end;\n  background:'+(style==='gradient'?'linear-gradient(135deg,'+sb+','+shade(sb,-20)+')':sb)+';\n  color:'+st+';\n  border-bottom-right-radius:'+(style==='square'?'4px':'4px')+';\n}\n.chat-bubble.received{\n  align-self:flex-start;\n  background:'+(style==='gradient'?'linear-gradient(135deg,'+rb+','+shade(rb,20)+')':rb)+';\n  color:'+rt+';\n  border-bottom-left-radius:4px;\n}\n.bubble-time{\n  font-size:.7rem;\n  opacity:.6;\n  margin-top:.25rem;\n  display:block;\n  text-align:right;\n}';

document.getElementById('htmlOut').value='<div class="chat-container">\n'+htmlParts.map(function(h){return'  '+h}).join('\n')+'\n</div>';
document.getElementById('cssOut').value=css;
}

function shade(hex,percent){
var R=parseInt(hex.substring(1,3),16),G=parseInt(hex.substring(3,5),16),B=parseInt(hex.substring(5,7),16);
R=Math.min(255,Math.max(0,parseInt(R*(100+percent)/100)));
G=Math.min(255,Math.max(0,parseInt(G*(100+percent)/100)));
B=Math.min(255,Math.max(0,parseInt(B*(100+percent)/100)));
return'#'+R.toString(16).padStart(2,'0')+G.toString(16).padStart(2,'0')+B.toString(16).padStart(2,'0');
}

function copyText(id){var t=document.getElementById(id);t.select();document.execCommand('copy');}
document.querySelectorAll('select,input').forEach(function(e){e.addEventListener('input',update)});
update();
</script>
</body>
</html>
