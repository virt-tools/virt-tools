<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CSS 3D Tilt Card Generator — virt.tools</title>
<link rel="stylesheet" href="/assets/style.css">
<style>
.tool-area{max-width:900px;margin:2rem auto;padding:0 1rem}
.controls{display:grid;gap:1rem;margin:1.5rem 0;padding:1.5rem;background:#1a1a2e;border-radius:12px}
.control-row{display:flex;gap:1rem;align-items:center;flex-wrap:wrap}
.control-row label{min-width:130px;font-weight:600;font-size:.9rem}
.control-row select,.control-row input{padding:.5rem .75rem;border-radius:8px;border:1px solid #444;background:#0f0f1e;color:#eee;font-size:.9rem}
.preview-box{margin:1.5rem 0;padding:3rem 2rem;background:linear-gradient(135deg,#0f0f1e,#1a1a3e);border-radius:12px;min-height:300px;display:flex;align-items:center;justify-content:center;perspective:1000px;overflow:hidden}
.tilt-card{width:220px;height:280px;background:linear-gradient(135deg,#667eea,#764ba2);border-radius:16px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1rem;box-shadow:0 20px 40px rgba(0,0,0,.4);transition:transform .2s ease-out;transform-style:preserve-3d;cursor:pointer}
.tilt-card .icon{font-size:3rem}
.tilt-card .title{font-size:1.2rem;font-weight:700;color:#fff}
.tilt-card .sub{font-size:.85rem;color:rgba(255,255,255,.7)}
.output-block{margin:2rem 0}
.output-block textarea{width:100%;min-height:120px;font-family:monospace;font-size:.85rem;padding:1rem;border-radius:8px;border:1px solid #444;background:#0f0f1e;color:#eee;resize:vertical}
.copy-btn{padding:.6rem 1.2rem;border:none;border-radius:8px;background:#667eea;color:#fff;cursor:pointer;font-size:.9rem;margin-top:.5rem}
h2{margin-top:2rem;font-size:1.2rem}
</style>
</head>
<body>
<header id="site-header"></header>
<main>
<div class="tool-area">
<h1>📐 CSS 3D Tilt Card Generator</h1>
<p>Create CSS 3D tilt-on-hover card effects. Adjustable max angle, perspective, glare, scale. Copy HTML+CSS+JS.</p>
<div class="controls">
<div class="control-row">
<label>Max Tilt (deg)</label><input type="number" id="maxtilt" value="15" min="1" max="45" style="width:60px">
<label>Perspective (px)</label><input type="number" id="perspective" value="1000" min="200" max="3000" step="100" style="width:70px">
<label>Scale</label><input type="number" id="scale" value="1.05" min="1" max="2" step="0.05" style="width:60px">
</div>
<div class="control-row">
<label>Transition (s)</label><input type="number" id="transition" value="0.2" min="0.05" max="2" step="0.05" style="width:60px">
<label>Glare</label><select id="glare"><option value="yes">Yes</option><option value="no">No</option></select>
<label>Theme</label><select id="theme"><option value="purple">Purple</option><option value="blue">Blue</option><option value="green">Green</option><option value="sunset">Sunset</option><option value="dark">Dark</option></select>
</div>
<div class="control-row">
<label>Title</label><input type="text" id="title" value="Hover Me" style="width:150px">
<label>Subtitle</label><input type="text" id="subtitle" value="3D Tilt Card" style="width:150px">
<label>Icon</label><select id="icon"><option value="📐">📐 Ruler</option><option value="🎮">🎮 Game</option><option value="💎">💎 Diamond</option><option value="🚀">🚀 Rocket</option><option value="🎨">🎨 Art</option></select>
</div>
</div>
<h2>Preview (hover the card)</h2>
<div class="preview-box" id="preview-box"><div class="tilt-card" id="card"><div class="icon" id="card-icon">📐</div><div class="title" id="card-title">Hover Me</div><div class="sub" id="card-sub">3D Tilt Card</div></div></div>
<h2>HTML</h2><div class="output-block"><textarea id="htmlOut" readonly></textarea><button class="copy-btn" onclick="copyText('htmlOut')">Copy HTML</button></div>
<h2>CSS</h2><div class="output-block"><textarea id="cssOut" readonly></textarea><button class="copy-btn" onclick="copyText('cssOut')">Copy CSS</button></div>
<h2>JS</h2><div class="output-block"><textarea id="jsOut" readonly></textarea><button class="copy-btn" onclick="copyText('jsOut')">Copy JS</button></div>
</div>
</main>
<script src="/assets/app.js"></script>
<script>
var themes={purple:'linear-gradient(135deg,#667eea,#764ba2)',blue:'linear-gradient(135deg,#2196f3,#0d47a1)',green:'linear-gradient(135deg,#43e97b,#38f9d7)',sunset:'linear-gradient(135deg,#fa709a,#fee140)',dark:'linear-gradient(135deg,#1a1a2e,#16213e)'};
function update(){
var maxtilt=parseInt(document.getElementById('maxtilt').value);
var perspective=parseInt(document.getElementById('perspective').value);
var scale=parseFloat(document.getElementById('scale').value);
var transition=parseFloat(document.getElementById('transition').value);
var glare=document.getElementById('glare').value;
var theme=document.getElementById('theme').value;
var title=document.getElementById('title').value;
var subtitle=document.getElementById('subtitle').value;
var icon=document.getElementById('icon').value;
document.getElementById('card').style.background=themes[theme];
document.getElementById('card-icon').textContent=icon;
document.getElementById('card-title').textContent=title;
document.getElementById('card-sub').textContent=subtitle;
document.getElementById('preview-box').style.perspective=perspective+'px';
document.getElementById('card').style.transition='transform '+transition+'s ease-out';
document.getElementById('cssOut').value='.tilt-container {\n  perspective: '+perspective+'px;\n}\n\n.tilt-card {\n  width: 220px;\n  height: 280px;\n  background: '+themes[theme]+';\n  border-radius: 16px;\n  display: flex;\n  flex-direction: column;\n  align-items: center;\n  justify-content: center;\n  gap: 1rem;\n  box-shadow: 0 20px 40px rgba(0,0,0,0.4);\n  transition: transform '+transition+'s ease-out;\n  transform-style: preserve-3d;\n  cursor: pointer;\n  position: relative;\n  overflow: hidden;\n}\n\n.tilt-card .icon {\n  font-size: 3rem;\n}\n\n.tilt-card .title {\n  font-size: 1.2rem;\n  font-weight: 700;\n  color: #fff;\n}\n\n.tilt-card .sub {\n  font-size: 0.85rem;\n  color: rgba(255,255,255,0.7);\n}\n'+(glare==='yes'?'\n.tilt-card::before {\n  content: "";\n  position: absolute;\n  inset: 0;\n  background: linear-gradient(135deg, rgba(255,255,255,0.3) 0%, transparent 50%);\n  opacity: 0;\n  transition: opacity '+transition+'s;\n  border-radius: 16px;\n  pointer-events: none;\n}\n\n.tilt-card:hover::before {\n  opacity: 1;\n}\n':'');
document.getElementById('htmlOut').value='<div class="tilt-container">\n  <div class="tilt-card">\n    <div class="icon">'+icon+'</div>\n    <div class="title">'+title+'</div>\n    <div class="sub">'+subtitle+'</div>\n  </div>\n</div>';
document.getElementById('jsOut').value="const card = document.querySelector('.tililt-card');\nconst maxTilt = "+maxtilt+";\nconst scale = "+scale+";\nconst glare = "+(glare==='yes'?'true':'false')+";\n\ncard.addEventListener('mousemove', (e) => {\n  const rect = card.getBoundingClientRect();\n  const x = e.clientX - rect.left;\n  const y = e.clientY - rect.top;\n  const cx = rect.width / 2;\n  const cy = rect.height / 2;\n  const rx = ((y - cy) / cy) * -maxTilt;\n  const ry = ((x - cx) / cx) * maxTilt;\n  card.style.transform = 'rotateX(' + rx + 'deg) rotateY(' + ry + 'deg) scale(' + scale + ')';\n  if (glare) {\n    card.style.setProperty('--mx', (x / rect.width * 100) + '%');\n    card.style.setProperty('--my', (y / rect.height * 100) + '%');\n  }\n});\n\ncard.addEventListener('mouseleave', () => {\n  card.style.transform = 'rotateX(0deg) rotateY(0deg) scale(1)';\n});";
}
var card=document.getElementById('card');
var maxtilt,scale,glareEnabled;
card.addEventListener('mousemove',function(e){
var rect=card.getBoundingClientRect();
var x=e.clientX-rect.left;
var y=e.clientY-rect.top;
var cx=rect.width/2;
var cy=rect.height/2;
var maxTilt=parseInt(document.getElementById('maxtilt').value);
var s=parseFloat(document.getElementById('scale').value);
var rx=((y-cy)/cy)*-maxTilt;
var ry=((x-cx)/cx)*maxTilt;
card.style.transform='rotateX('+rx+'deg) rotateY('+ry+'deg) scale('+s+')';
});
card.addEventListener('mouseleave',function(){card.style.transform='rotateX(0deg) rotateY(0deg) scale(1)'});
function copyText(id){var t=document.getElementById(id);t.select();document.execCommand('copy')}
document.querySelectorAll('select,input').forEach(function(e){e.addEventListener('input',update);e.addEventListener('change',update)});
update();
</script>
</body>
</html>
