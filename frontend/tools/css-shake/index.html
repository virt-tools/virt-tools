<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CSS Shake Animation Generator — virt.tools</title>
<link rel="stylesheet" href="/assets/style.css">
<style>
.tool-area{max-width:900px;margin:2rem auto;padding:0 1rem}
.controls{display:grid;gap:1rem;margin:1.5rem 0;padding:1.5rem;background:#1a1a2e;border-radius:12px}
.control-row{display:flex;gap:1rem;align-items:center;flex-wrap:wrap}
.control-row label{min-width:120px;font-weight:600;font-size:.9rem}
.control-row select,.control-row input{padding:.5rem .75rem;border-radius:8px;border:1px solid #444;background:#0f0f1e;color:#eee;font-size:.9rem}
.preview-box{margin:1.5rem 0;padding:3rem 2rem;background:#0f0f1e;border-radius:12px;min-height:250px;display:flex;align-items:center;justify-content:center;overflow:hidden}
.shake-demo{width:120px;height:120px;background:linear-gradient(135deg,#e74c3c,#f39c12);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:3rem;box-shadow:0 10px 30px rgba(231,76,60,.4)}
.output-block{margin:2rem 0}
.output-block textarea{width:100%;min-height:120px;font-family:monospace;font-size:.85rem;padding:1rem;border-radius:8px;border:1px solid #444;background:#0f0f1e;color:#eee;resize:vertical}
.copy-btn{padding:.6rem 1.2rem;border:none;border-radius:8px;background:#e74c3c;color:#fff;cursor:pointer;font-size:.9rem;margin-top:.5rem}
h2{margin-top:2rem;font-size:1.2rem}
</style>
</head>
<body>
<header id="site-header"></header>
<main>
<div class="tool-area">
<h1>🤪 CSS Shake Animation Generator</h1>
<p>Create CSS shake/wiggle/vibrate/jello/wobble animations. 7 presets, adjustable intensity/speed. Copy CSS.</p>
<div class="controls">
<div class="control-row">
<label>Animation</label><select id="anim"><option value="shake">Shake</option><option value="wiggle">Wiggle</option><option value="vibrate">Vibrate</option><option value="jello">Jello</option><option value="wobble">Wobble</option><option value="swing">Swing</option><option value="tada">Tada</option></select>
<label>Intensity (px/deg)</label><input type="number" id="intensity" value="10" min="1" max="50" style="width:60px">
</div>
<div class="control-row">
<label>Duration (s)</label><input type="number" id="duration" value="0.5" min="0.1" max="5" step="0.1" style="width:60px">
<label>Delay (s)</label><input type="number" id="delay" value="0" min="0" max="5" step="0.1" style="width:60px">
<label>Iterations</label><select id="iter"><option value="infinite">Infinite</option><option value="1">1</option><option value="2">2</option><option value="3">3</option><option value="5">5</option></select>
</div>
<div class="control-row">
<label>Icon</label><select id="icon"><option value="🤪">🤪 Crazy</option><option value="📦">📦 Box</option><option value="🔔">🔔 Bell</option><option value="📱">📱 Phone</option><option value="⚠️">⚠️ Warning</option><option value="🎲">🎲 Dice</option><option value="🎉">🎉 Party</option></select>
<button class="copy-btn" onclick="triggerAnim()" style="margin-left:auto">▶ Replay</button>
</div>
</div>
<h2>Preview</h2>
<div class="preview-box"><div class="shake-demo" id="demo">🤪</div></div>
<h2>CSS</h2><div class="output-block"><textarea id="cssOut" readonly></textarea><button class="copy-btn" onclick="copyText('cssOut')">Copy CSS</button></div>
</div>
</main>
<script src="/assets/app.js"></script>
<script>
function update(){
var anim=document.getElementById('anim').value;
var intensity=parseInt(document.getElementById('intensity').value);
var duration=parseFloat(document.getElementById('duration').value);
var delay=parseFloat(document.getElementById('delay').value);
var iter=document.getElementById('iter').value;
var icon=document.getElementById('icon').value;
var name='shakeAnim';
var keyframes='';
if(anim==='shake'){keyframes='@keyframes '+name+' {\n  0%,100% { transform: translateX(0); }\n  10%,30%,50%,70%,90% { transform: translateX(-'+intensity+'px); }\n  20%,40%,60%,80% { transform: translateX('+intensity+'px); }\n}';}
else if(anim==='wiggle'){keyframes='@keyframes '+name+' {\n  0%,100% { transform: rotate(0deg); }\n  25% { transform: rotate(-'+intensity+'deg); }\n  75% { transform: rotate('+intensity+'deg); }\n}';}
else if(anim==='vibrate'){keyframes='@keyframes '+name+' {\n  0%,100% { transform: translate(0,0); }\n  10% { transform: translate(-'+intensity+'px,1px); }\n  20% { transform: translate('+intensity+'px,-1px); }\n  30% { transform: translate(-'+intensity+'px,1px); }\n  40% { transform: translate('+intensity+'px,-1px); }\n  50% { transform: translate(-'+intensity+'px,1px); }\n  60% { transform: translate('+intensity+'px,-1px); }\n  70% { transform: translate(-'+intensity+'px,1px); }\n  80% { transform: translate('+intensity+'px,-1px); }\n  90% { transform: translate(-'+intensity+'px,1px); }\n}';}
else if(anim==='jello'){keyframes='@keyframes '+name+' {\n  0%,100% { transform: skew(0deg,0deg) scale(1); }\n  30% { transform: skew(-'+intensity+'deg,0deg) scale(0.95); }\n  40% { transform: skew('+intensity+'deg,0deg) scale(1.05); }\n  50% { transform: skew(-'+(intensity*0.5)+'deg,0deg) scale(1); }\n  65% { transform: skew('+intensity+'deg,0deg) scale(0.98); }\n  75% { transform: skew(-'+(intensity*0.3)+'deg,0deg) scale(1); }\n}';}
else if(anim==='wobble'){keyframes='@keyframes '+name+' {\n  0%,100% { transform: translateX(0%) rotate(0deg); }\n  15% { transform: translateX(-'+(intensity*2.5)+'px) rotate(-'+intensity+'deg); }\n  30% { transform: translateX('+intensity+'px) rotate('+intensity+'deg); }\n  45% { transform: translateX(-'+(intensity*1.5)+'px) rotate(-'+(intensity*0.5)+'deg); }\n  60% { transform: translateX('+intensity+'px) rotate('+intensity+'deg); }\n  75% { transform: translateX(-'+(intensity*0.5)+'px) rotate(-'+(intensity*0.3)+'deg); }\n}';}
else if(anim==='swing'){keyframes='@keyframes '+name+' {\n  0%,100% { transform: rotate(0deg); }\n  20% { transform: rotate('+intensity+'deg); }\n  40% { transform: rotate(-'+intensity+'deg); }\n  60% { transform: rotate('+intensity+'deg); }\n  80% { transform: rotate(-'+intensity+'deg); }\n}';}
else if(anim==='tada'){keyframes='@keyframes '+name+' {\n  0%,100% { transform: scale(1) rotate(0deg); }\n  10%,20% { transform: scale(0.9) rotate(-'+intensity+'deg); }\n  30%,50%,70%,90% { transform: scale(1.1) rotate('+intensity+'deg); }\n  40%,60%,80% { transform: scale(1.1) rotate(-'+intensity+'deg); }\n}';}
var css=keyframes+'\n\n.shake-element {\n  animation: '+name+' '+duration+'s ease-in-out '+delay+'s '+(iter==='infinite'?'infinite':iter)+';\n}';
document.getElementById('cssOut').value=css;
triggerAnim(icon);
}
function triggerAnim(emoji){
var demo=document.getElementById('demo');
demo.textContent=emoji||document.getElementById('icon').value;
demo.style.animation='none';
void demo.offsetWidth;
var name='shakeAnim';
var duration=parseFloat(document.getElementById('duration').value);
var delay=parseFloat(document.getElementById('delay').value);
var iter=document.getElementById('iter').value;
var styleId='shake-demo-style';
var oldS=document.getElementById(styleId);
if(oldS)oldS.remove();
var s=document.createElement('style');
s.id=styleId;
s.textContent=document.getElementById('cssOut').value.split('\n\n')[0];
document.head.appendChild(s);
demo.style.animation=name+' '+duration+'s ease-in-out '+delay+'s '+(iter==='infinite'?'infinite':iter);
}
function copyText(id){var t=document.getElementById(id);t.select();document.execCommand('copy')}
document.querySelectorAll('select,input').forEach(function(e){e.addEventListener('input',update);e.addEventListener('change',update)});
update();
</script>
</body>
</html>
