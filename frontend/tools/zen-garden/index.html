<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="/assets/theme-init.js"></script>
<title>Zen Garden — Virtual Tools</title>
<link rel="stylesheet" href="/assets/style.css">
<style>
.tool-wrap{max-width:600px;margin:0 auto;text-align:center;}
.tool-desc{font-size:14px;color:var(--text-secondary,#aaa);margin:8px 0;}
canvas{border-radius:12px;cursor:crosshair;margin:12px auto;display:block;max-width:100%;height:auto;box-shadow:0 4px 20px rgba(0,0,0,0.3);}
.controls{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin:8px 0;}
.controls button{padding:8px 20px;border-radius:6px;border:1px solid var(--border,#444);background:var(--bg-alt,#1a1f2e);color:var(--text,#eee);cursor:pointer;font-size:14px;}
.controls button:hover{background:var(--accent,#5b8def);color:#fff;}
.controls button.active{background:var(--accent,#5b8def);color:#fff;}
label{font-size:14px;color:var(--text-secondary,#aaa);}
input[type=range]{vertical-align:middle;}
</style>
</head>
<body>
<header id="site-header"></header>
<main>
<div class="tool-wrap">
<h1>Zen Garden 🏖️</h1>
<p class="tool-desc">Rake meditative patterns in virtual sand. Drag to rake, place stones, adjust rake width. Clear to start fresh.</p>
<canvas id="cv" width="500" height="400"></canvas>
<div class="controls">
<button id="rakeBtn" class="active" onclick="setMode('rake')">🦯 Rake</button>
<button id="stoneBtn" onclick="setMode('stone')">🪨 Place Stone</button>
<button onclick="clearGarden()">🗑️ Clear</button>
<button onclick="rakeAll()">⬜ Rake All</button>
<button onclick="savePNG()">💾 Save PNG</button>
</div>
</div>
</main>
<script src="/assets/app.js"></script>
<script>
const cv=document.getElementById('cv'),ctx=cv.getContext('2d');
const SAND='#e8dcc8',RAKE='#d4c5a9';
let mode='rake',raking=false,lastX=0,lastY=0;
const stones=[];
function clearGarden(){ctx.fillStyle=SAND;ctx.fillRect(0,0,cv.width,cv.height);drawRakeLines();stones.length=0;redrawStones();}
function drawRakeLines(){ctx.strokeStyle=RAKE;ctx.lineWidth=1;for(let y=10;y<cv.height;y+=8){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(cv.width,y);ctx.stroke();}}
function redrawStones(){stones.forEach(s=>drawStone(s.x,s.y,s.r));}
function drawStone(x,y,r){ctx.save();ctx.beginPath();ctx.arc(x,y,r,0,Math.PI*2);const g=ctx.createRadialGradient(x-r/3,y-r/3,0,x,y,r);g.addColorStop(0,'#888');g.addColorStop(1,'#333');ctx.fillStyle=g;ctx.fill();ctx.restore();}
function rake(x,y){const r=parseInt(document.getElementById('rakeW')?document.getElementById('rakeW').value:8);ctx.strokeStyle=SAND;ctx.lineWidth=r*2;ctx.lineCap='round';ctx.beginPath();ctx.moveTo(lastX,lastY);ctx.lineTo(x,y);ctx.stroke();ctx.strokeStyle=RAKE;ctx.lineWidth=1;for(let i=-r;i<=r;i+=4){ctx.beginPath();ctx.moveTo(lastX,lastY+i);ctx.lineTo(x,y+i);ctx.stroke();}redrawStones();lastX=x;lastY=y;}
function placeStone(x,y){const r=10+Math.random()*15;stones.push({x,y,r});drawStone(x,y,r);}
function pos(e){const rect=cv.getBoundingClientRect();const sx=cv.width/rect.width,sy=cv.height/rect.height;const t=e.touches?e.touches[0]:e;return{x:(t.clientX-rect.left)*sx,y:(t.clientY-rect.top)*sy};}
cv.addEventListener('mousedown',e=>{const p=pos(e);if(mode==='rake'){raking=true;lastX=p.x;lastY=p.y;}else if(mode==='stone'){placeStone(p.x,p.y);}});
cv.addEventListener('mousemove',e=>{if(!raking)return;const p=pos(e);rake(p.x,p.y);});
cv.addEventListener('mouseup',()=>raking=false);
cv.addEventListener('mouseleave',()=>raking=false);
cv.addEventListener('touchstart',e=>{e.preventDefault();const p=pos(e);if(mode==='rake'){raking=true;lastX=p.x;lastY=p.y;}else{placeStone(p.x,p.y);}});
cv.addEventListener('touchmove',e=>{e.preventDefault();if(!raking)return;const p=pos(e);rake(p.x,p.y);});
cv.addEventListener('touchend',()=>raking=false);
function setMode(m){mode=m;document.getElementById('rakeBtn').classList.toggle('active',m==='rake');document.getElementById('stoneBtn').classList.toggle('active',m==='stone');}
function rakeAll(){clearGarden();}
function savePNG(){const a=document.createElement('a');a.download='zen-garden.png';a.href=cv.toDataURL();a.click();}
clearGarden();
</script>
</body>
</html>
