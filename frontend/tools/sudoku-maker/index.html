<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="/assets/theme-init.js"></script>
<title>Sudoku Maker — Virtual Tools</title>
<link rel="stylesheet" href="/assets/style.css">
<style>
.tool-wrap{max-width:560px;margin:0 auto;}
.tool-desc{font-size:14px;color:var(--text-secondary,#aaa);margin:8px 0 20px;}
.controls{display:flex;gap:8px;margin:12px 0;flex-wrap:wrap;align-items:center;}
.controls button{padding:8px 16px;border-radius:6px;border:1px solid var(--border,#444);background:var(--card,#2a2f3e);color:var(--text,#eee);cursor:pointer;font-size:13px;}
.controls button:hover{background:var(--accent,#5b8def);color:#fff;}
.controls select{padding:6px 10px;border-radius:6px;border:1px solid var(--border,#444);background:var(--card,#2a2f3e);color:var(--text,#eee);font-size:13px;}
.board{display:grid;grid-template-columns:repeat(9,1fr);gap:1px;background:var(--border,#444);border:2px solid var(--border,#444);border-radius:4px;aspect-ratio:1;margin:12px 0;font-size:clamp(14px,3vw,22px);}
.cell{background:var(--bg,#1e1e2e);display:flex;align-items:center;justify-content:center;cursor:pointer;user-select:none;color:var(--text,#eee);font-weight:bold;transition:background .1s;}
.cell:hover{background:var(--card,#2a2f3e);}
.cell.selected{background:var(--accent,#5b8def);color:#fff;}
.cell.given{color:var(--text-bright,#fff);font-weight:900;}
.cell.error{background:#c33;color:#fff;}
.cell:nth-child(3n):not(:nth-child(9n)){border-right:2px solid var(--border,#666);}
.board > .cell[data-row="2"],.board > .cell[data-row="5"]{border-bottom:2px solid var(--border,#666);}
.numpad{display:grid;grid-template-columns:repeat(5,1fr);gap:4px;margin:8px 0;}
.numpad button{padding:10px;border-radius:6px;border:1px solid var(--border,#444);background:var(--card,#2a2f3e);color:var(--text,#eee);cursor:pointer;font-size:18px;font-weight:bold;}
.numpad button:hover{background:var(--accent,#5b8def);color:#fff;}
.info{font-size:13px;color:var(--text-secondary,#888);margin:8px 0;}
.stats{display:flex;gap:16px;margin:8px 0;flex-wrap:wrap;}
.stat{font-size:13px;color:var(--text-secondary,#aaa);}
.stat b{color:var(--text,#eee);}
</style>
</head>
<body>
<header id="site-header"></header>
<main>
<div class="tool-wrap">
<h1>🔢 Sudoku Maker</h1>
<p class="tool-desc">Generate custom Sudoku puzzles with 4 difficulty levels. Fill the grid, check your progress, or reveal the solution. Print-friendly.</p>
<div class="controls">
<select id="difficulty">
<option value="easy">Easy (45 given)</option>
<option value="medium" selected>Medium (35 given)</option>
<option value="hard">Hard (28 given)</option>
<option value="expert">Expert (24 given)</option>
</select>
<button onclick="newPuzzle()">New Puzzle</button>
<button onclick="checkProgress()">Check</button>
<button onclick="revealSolution()">Solve</button>
<button onclick="clearBoard()">Clear</button>
<button onclick="window.print()">Print</button>
</div>
<div class="stats">
<span class="stat">Given: <b id="statGiven">0</b></span>
<span class="stat">Filled: <b id="statFilled">0</b></span>
<span class="stat">Errors: <b id="statErrors">0</b></span>
<span class="stat">Time: <b id="statTime">0:00</b></span>
</div>
<div class="board" id="board"></div>
<div class="numpad">
<button onclick="enter(1)">1</button>
<button onclick="enter(2)">2</button>
<button onclick="enter(3)">3</button>
<button onclick="enter(4)">4</button>
<button onclick="enter(5)">5</button>
<button onclick="enter(6)">6</button>
<button onclick="enter(7)">7</button>
<button onclick="enter(8)">8</button>
<button onclick="enter(9)">9</button>
<button onclick="enter(0)">⌫</button>
</div>
<div class="info">Click a cell, then type 1-9 or use the numpad. Backspace/Delete to erase.</div>
</div>
</main>
<script src="/assets/app.js"></script>
<script>
let solution=[],puzzle=[],given=[],selected=null,startTime=Date.now(),timerInt=null;
function makeSolution(){
const base=Array.from({length:9},()=>Array(9).fill(0));
const nums=[1,2,3,4,5,6,7,8,9].sort(()=>Math.random()-0.5);
for(let r=0;r<9;r++)for(let c=0;c<9;c++)base[r][c]=nums[(r*3+Math.floor(r/3)+c)%9];
for(let i=0;i<50;i++){const r1=Math.floor(Math.random()*9),r2=Math.floor(Math.random()*9);if(r1!==r2&&Math.floor(r1/3)===Math.floor(r2/3)){const tmp=base[r1];base[r1]=base[r2];base[r2]=tmp;}}
for(let i=0;i<50;i++){const c1=Math.floor(Math.random()*9),c2=Math.floor(Math.random()*9);if(c1!==c2&&Math.floor(c1/3)===Math.floor(c2/3)){for(let r=0;r<9;r++){const tmp=base[r][c1];base[r][c1]=base[r][c2];base[r][c2]=tmp;}}}
return base.map(row=>row.slice());
}
function makePuzzle(sol,diff){const counts={easy:45,medium:35,hard:28,expert:24};const g=counts[diff]||35;const cells=[];for(let i=0;i<81;i++)cells.push(i);cells.sort(()=>Math.random()-0.5);const puz=sol.map(r=>r.slice());for(let i=0;i<81-g;i++){const idx=cells[i];puz[Math.floor(idx/9)][idx%9]=0;}return puz;}
function newPuzzle(){solution=makeSolution();const diff=document.getElementById('difficulty').value;puzzle=makePuzzle(solution,diff);given=puzzle.map(row=>row.map(v=>v!==0));selected=null;startTime=Date.now();if(timerInt)clearInterval(timerInt);timerInt=setInterval(updateTime,1000);render();}
function updateTime(){const s=Math.floor((Date.now()-startTime)/1000);const m=Math.floor(s/60);document.getElementById('statTime').textContent=m+':'+String(s%60).padStart(2,'0');}
function render(){const board=document.getElementById('board');board.innerHTML='';let filled=0,gCount=0,errors=0;for(let r=0;r<9;r++)for(let c=0;c<9;c++){const cell=document.createElement('div');cell.className='cell';cell.dataset.row=r;cell.dataset.col=c;const v=puzzle[r][c];if(v){cell.textContent=v;if(given[r][c])cell.classList.add('given');else filled++;if(!given[r][c]&&v!==solution[r][c]){cell.classList.add('error');errors++;}}else{gCount++;}if(selected&&selected[0]===r&&selected[1]===c)cell.classList.add('selected');cell.onclick=()=>{selected=[r,c];render();};board.appendChild(cell);}document.getElementById('statGiven').textContent=81-gCount;document.getElementById('statFilled').textContent=filled;document.getElementById('statErrors').textContent=errors;}
function enter(n){if(!selected)return;const[r,c]=selected;if(given[r][c])return;puzzle[r][c]=n;render();}
document.addEventListener('keydown',e=>{if(!selected)return;const[r,c]=selected;if(given[r][c])return;const k=e.key;if(k>='1'&&k<='9'){puzzle[r][c]=parseInt(k);render();}else if(k==='Backspace'||k==='Delete'||k==='0'){puzzle[r][c]=0;render();}else if(k==='ArrowUp'&&r>0){selected=[r-1,c];render();}else if(k==='ArrowDown'&&r<8){selected=[r+1,c];render();}else if(k==='ArrowLeft'&&c>0){selected=[r,c-1];render();}else if(k==='ArrowRight'&&c<8){selected=[r,c+1];render();}});
function checkProgress(){let errors=0;for(let r=0;r<9;r++)for(let c=0;c<9;c++)if(!given[r][c]&&puzzle[r][c]&&puzzle[r][c]!==solution[r][c])errors++;alert(errors===0?'No errors so far! 🎉':errors+' cell(s) incorrect.');}
function revealSolution(){if(confirm('Reveal the full solution?')){puzzle=solution.map(r=>r.slice());given=puzzle.map(r=>r.map(()=>true));render();}}
function clearBoard(){for(let r=0;r<9;r++)for(let c=0;c<9;c++)if(!given[r][c])puzzle[r][c]=0;render();}
newPuzzle();
</script>
</body>
</html>
