<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CSS Shine Sweep Generator — virt.tools</title>
<link rel="stylesheet" href="/assets/style.css">
<style>
.tool-area{max-width:900px;margin:2rem auto;padding:0 1rem}
.controls{display:grid;gap:1rem;margin:1.5rem 0;padding:1.5rem;background:#1a1a2e;border-radius:12px}
.ctrl-row{display:flex;gap:1rem;align-items:center;flex-wrap:wrap;margin-bottom:.5rem}
.ctrl-row label{font-weight:600;font-size:.9rem;min-width:120px}
.ctrl-row select,.ctrl-row input{padding:.5rem;border-radius:8px;border:1px solid #444;background:#0f0f1e;color:#eee}
.preview-box{margin:1.5rem 0;padding:3rem;border-radius:12px;min-height:150px;background:#0a0a1a;display:flex;align-items:center;justify-content:center;overflow:hidden;gap:1rem;flex-wrap:wrap}
.output-block{margin:2rem 0}
.output-block textarea{width:100%;min-height:80px;font-family:monospace;font-size:.85rem;padding:1rem;border-radius:8px;border:1px solid #444;background:#0f0f1e;color:#eee;resize:vertical}
.copy-btn{padding:.6rem 1.2rem;border:none;border-radius:8px;background:#667eea;color:#fff;cursor:pointer;font-size:.9rem;margin-top:.5rem}
h2{margin-top:2rem;font-size:1.2rem}
.shine-btn{position:relative;overflow:hidden;padding:1rem 2rem;border:none;border-radius:8px;font-size:1.1rem;font-weight:700;color:#fff;cursor:pointer}
.shine-btn::before{content:'';position:absolute;top:0;left:-100%;width:60%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,.4),transparent);transform:skewX(-20deg);transition:left .6s}
.shine-btn:hover::before{left:120%}
</style>
</head>
<body>
<header id="site-header"></header>
<main>
<div class="tool-area">
<h1>✨ CSS Shine Sweep Generator</h1>
<p>Create CSS shine/sweep overlay effects for buttons and cards. Adjustable angle, speed, color, intensity. Copy HTML+CSS.</p>
<div class="controls">
<div class="ctrl-row"><label>Style</label><select id="style"><option value="linear" selected>Linear Sweep</option><option value="diagonal">Diagonal</option><option value="pulse">Pulse Glow</option><option value="double">Double Sweep</option></select></div>
<div class="ctrl-row"><label>Button Color</label><input type="color" id="btnColor" value="#667eea"><label>Shine Color</label><input type="color" id="shineColor" value="#ffffff"></div>
<div class="ctrl-row"><label>Shine Opacity</label><select id="opacity"><option value="0.2">20%</option><option value="0.3" selected>30%</option><option value="0.5">50%</option><option value="0.7">70%</option></select><label>Speed</label><select id="speed"><option value="0.3">300ms</option><option value="0.5" selected>500ms</option><option value="0.8">800ms</option><option value="1.2">1200ms</option></select></div>
<div class="ctrl-row"><label>Button Text</label><input type="text" id="btnText" value="Click Me" size="15"><label>Radius</label><select id="radius"><option value="0">0px</option><option value="4">4px</option><option value="8" selected>8px</option><option value="16">16px</option><option value="9999">Pill</option></select></div>
<div class="ctrl-row"><button class="copy-btn" onclick="update()">Update</button></div>
</div>
<h2>Preview (hover over buttons)</h2>
<div class="preview-box" id="preview"></div>
<h2>HTML</h2><div class="output-block"><textarea id="htmlOut" readonly></textarea><button class="copy-btn" onclick="copyText('htmlOut')">Copy HTML</button></div>
<h2>CSS</h2><div class="output-block"><textarea id="cssOut" readonly></textarea><button class="copy-btn" onclick="copyText('cssOut')">Copy CSS</button></div>
</div>
</main>
<script src="/assets/app.js"></script>
<script>
function update(){
var st=document.getElementById('style').value;
var bc=document.getElementById('btnColor').value;
var sc=document.getElementById('shineColor').value;
var op=document.getElementById('opacity').value;
var sp=document.getElementById('speed').value;
var txt=document.getElementById('btnText').value||'Button';
var rad=document.getElementById('radius').value;
var grad,extra='';
if(st==='linear'){grad='linear-gradient(90deg,transparent,'+sc+op+',transparent)';extra=''}
else if(st==='diagonal'){grad='linear-gradient(135deg,transparent 40%,'+sc+op+' 50%,transparent 60%)';extra=''}
else if(st==='pulse'){grad='radial-gradient(circle,'+sc+op+',transparent 70%)';extra=''}
else{grad='linear-gradient(90deg,transparent,'+sc+op+',transparent)';extra='\n.shine-btn::after{content:\'\';position:absolute;top:0;right:-100%;width:60%;height:100%;background:linear-gradient(90deg,transparent,'+sc+op+',transparent);transform:skewX(-20deg);transition:right '+sp+'s}\n.shine-btn:hover::after{right:120%}'}
var css='.shine-btn{position:relative;overflow:hidden;padding:1rem 2rem;border:none;border-radius:'+rad+'px;font-size:1.1rem;font-weight:700;color:#fff;background:'+bc+';cursor:pointer}\n.shine-btn::before{content:\'\';position:absolute;top:0;left:-100%;width:60%;height:100%;background:'+grad+';transform:skewX(-20deg);transition:left '+sp+'s}\n.shine-btn:hover::before{left:120%}'+extra;
var html='<button class="shine-btn">'+txt+'</button>';
document.getElementById('htmlOut').value=html;
document.getElementById('cssOut').value=css;
var p=document.getElementById('preview');
p.innerHTML='<style>'+css+'</style>'+html;
}
function copyText(id){var t=document.getElementById(id);t.select();document.execCommand('copy')}
['style','btnColor','shineColor','opacity','speed','btnText','radius'].forEach(function(id){var el=document.getElementById(id);el.addEventListener('input',update);el.addEventListener('change',update)});
update();
</script>
</body>
</html>
