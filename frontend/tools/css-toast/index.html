<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CSS Toast Notification Generator — virt.tools</title>
<link rel="stylesheet" href="/assets/style.css">
<style>
.tool-area{max-width:900px;margin:2rem auto;padding:0 1rem}
.controls{display:grid;gap:1rem;margin:1.5rem 0;padding:1.5rem;background:#1a1a2e;border-radius:12px}
.control-row{display:flex;gap:1rem;align-items:center;flex-wrap:wrap}
.control-row label{min-width:100px;font-weight:600;font-size:.9rem}
.control-row select,.control-row input{padding:.5rem .75rem;border-radius:8px;border:1px solid #444;background:#0f0f1e;color:#eee;font-size:.9rem}
.preview-box{margin:1.5rem 0;border-radius:12px;min-height:200px;max-height:400px;overflow-y:auto;position:relative;padding:1rem}
.output-block{margin:2rem 0}
.output-block textarea{width:100%;min-height:100px;font-family:monospace;font-size:.85rem;padding:1rem;border-radius:8px;border:1px solid #444;background:#0f0f1e;color:#eee;resize:vertical}
.copy-btn{padding:.6rem 1.2rem;border:none;border-radius:8px;background:#667eea;color:#fff;cursor:pointer;font-size:.9rem;margin-top:.5rem}
h2{margin-top:2rem;font-size:1.2rem}
</style>
</head>
<body>
<header id="site-header"></header>
<main>
<div class="tool-area">
<h1>🔔 CSS Toast Notification Generator</h1>
<p>Create CSS toast/snackbar notification components. 4 types, 4 positions, 3 themes. Copy HTML+CSS.</p>
<div class="controls">
<div class="control-row">
<label>Type</label><select id="type"><option value="info" selected>Info</option><option value="success">Success</option><option value="warning">Warning</option><option value="error">Error</option></select>
<label>Position</label><select id="pos"><option value="top-right" selected>Top Right</option><option value="top-left">Top Left</option><option value="bottom-right">Bottom Right</option><option value="bottom-left">Bottom Left</option></select>
<label>Theme</label><select id="theme"><option value="light" selected>Light</option><option value="dark">Dark</option><option value="glass">Glass</option></select>
<label>Width</label><input type="range" id="width" min="280" max="480" value="360" style="width:80px">
<label>Action</label><select id="action"><option value="none" selected>None</option><option value="undo">Undo</option><option value="dismiss">Dismiss</option></select>
</div>
</div>
<h2>Preview</h2>
<div class="preview-box" id="preview"></div>
<h2>HTML</h2><div class="output-block"><textarea id="htmlOut" readonly></textarea><button class="copy-btn" onclick="copyText('htmlOut')">Copy HTML</button></div>
<h2>CSS</h2><div class="output-block"><textarea id="cssOut" readonly></textarea><button class="copy-btn" onclick="copyText('cssOut')">Copy CSS</button></div>
</div>
</main>
<script src="/assets/app.js"></script>
<script>
function update(){
var type=document.getElementById('type').value,pos=document.getElementById('pos').value;
var theme=document.getElementById('theme').value,w=document.getElementById('width').value;
var action=document.getElementById('action').value;
var icons={info:'ℹ️',success:'✅',warning:'⚠️',error:'❌'};
var colors={info:'#3b82f6',success:'#22c55e',warning:'#f59e0b',error:'#ef4444'};
var accent=colors[type];
var bg=theme==='dark'?'#1a1a2e':theme==='glass'?'rgba(255,255,255,.15)':'#fff';
var fg=theme==='dark'?'#e0e0e0':theme==='glass'?'#fff':'#333';
var bd=theme==='dark'?'#333':theme==='glass'?'rgba(255,255,255,.2)':'#e5e7eb';
var posCSS=pos.split('-');
var actionHTML=action==='undo'?' <button class="toast-action">Undo</button>':action==='dismiss'?' <button class="toast-action">Dismiss</button>':'';
var html='<div class="toast toast-'+pos+'" style="--toast-accent:'+accent+';--toast-w:'+w+'px;--toast-bg:'+bg+';--toast-fg:'+fg+';--toast-bd:'+bd+'">\n  <span class="toast-icon">'+icons[type]+'</span>\n  <span class="toast-msg">This is a '+type+' notification message.</span>\n'+actionHTML+'\n  <button class="toast-close">×</button>\n</div>';
var css='.toast{display:flex;align-items:center;gap:.75rem;padding:.875rem 1rem;border-radius:10px;border:1px solid var(--toast-bd);background:var(--toast-bg);color:var(--toast-fg);width:var(--toast-w);box-shadow:0 4px 16px rgba(0,0,0,.1);position:relative;overflow:hidden;animation:toastIn .3s ease}';
css+='\n.toast::before{content:"";position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--toast-accent)}';
css+='\n.toast-icon{font-size:1.1rem;flex-shrink:0}';
css+='\n.toast-msg{flex:1;font-size:.875rem}';
css+='\n.toast-close{background:none;border:none;color:inherit;opacity:.5;cursor:pointer;font-size:1.2rem;padding:0;flex-shrink:0}';
css+='\n.toast-close:hover{opacity:1}';
css+='\n.toast-action{background:none;border:none;color:var(--toast-accent);font-weight:600;font-size:.8rem;cursor:pointer;text-transform:uppercase;flex-shrink:0;padding:0 .25rem}';
css+='\n.toast-top-right{position:fixed;top:1rem;right:1rem}';
css+='\n.toast-top-left{position:fixed;top:1rem;left:1rem}';
css+='\n.toast-bottom-right{position:fixed;bottom:1rem;right:1rem}';
css+='\n.toast-bottom-left{position:fixed;bottom:1rem;left:1rem}';
css+='\n@keyframes toastIn{from{opacity:0;transform:translateY(-10px)}to{opacity:1;transform:translateY(0)}}';
if(theme==='glass'){css+='\n.toast{backdrop-filter:blur(12px)}';}
document.getElementById('htmlOut').value=html;
document.getElementById('cssOut').value=css;
document.getElementById('preview').innerHTML='<style>'+css+'<\/style>'+html.replace(/position:fixed/g,'position:relative');
}
function copyText(id){var t=document.getElementById(id);t.select();document.execCommand('copy')}
document.querySelectorAll('select,input').forEach(function(e){e.addEventListener('input',update);e.addEventListener('change',update)});
update();
</script>
</body>
</html>
