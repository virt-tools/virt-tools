<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="/assets/theme-init.js"></script>
<title>CSS Breadcrumb Generator — Virtual Tools</title>
<link rel="stylesheet" href="/assets/style.css">
<style>
.tool-wrap{max-width:720px;margin:0 auto;}
.tool-desc{font-size:14px;color:var(--text-secondary,#aaa);margin:8px 0 20px;}
.controls{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin:12px 0;}
.ctrl{display:flex;flex-direction:column;gap:4px;}
.ctrl label{font-size:12px;color:var(--text-secondary,#888);}
.ctrl input,.ctrl select{padding:6px 8px;border-radius:6px;border:1px solid var(--border,#444);background:var(--bg,#1e2230);color:var(--text,#eee);font-size:13px;}
.ctrl input[type="color"]{padding:2px;height:34px;}
button.action{padding:8px 16px;border-radius:6px;border:1px solid var(--border,#444);background:var(--card,#2a2f3e);color:var(--text,#eee);cursor:pointer;font-size:13px;margin:4px 4px 0 0;}
.preview{background:var(--bg,#1e2230);border:1px solid var(--border,#444);border-radius:8px;padding:24px;margin:12px 0;overflow:hidden;}
.code-block{background:var(--bg,#1e2230);border:1px solid var(--border,#444);border-radius:8px;padding:12px;margin:8px 0;font-family:monospace;font-size:11px;color:var(--text,#eee);white-space:pre-wrap;word-break:break-all;max-height:350px;overflow:auto;}
.breadcrumb{display:flex;align-items:center;gap:0;list-style:none;margin:0;padding:0;}
.breadcrumb li{display:flex;align-items:center;}
.breadcrumb a{text-decoration:none;font-size:14px;transition:all .2s;}
</style>
</head>
<body>
<header id="site-header"></header>
<main>
<div class="tool-wrap">
<h1>🍞 CSS Breadcrumb Generator</h1>
<p class="tool-desc">Create CSS breadcrumb navigation with 6 separator styles, custom colors, and hover effects. Copy HTML+CSS.</p>
<div class="controls">
<div class="ctrl"><label>Background</label><input type="color" id="bg" value="#1e2230" oninput="render()"></div>
<div class="ctrl"><label>Text Color</label><input type="color" id="tc" value="#aaaaaa" oninput="render()"></div>
<div class="ctrl"><label>Active Color</label><input type="color" id="ac" value="#5b8def" oninput="render()"></div>
<div class="ctrl"><label>Separator</label><select id="sep" onchange="render()"><option value="/" selected>/</option><option value=">">></option><option value="›">›</option><option value="→">→</option><option value="•">•</option><option value="❯">❯</option></select></div>
<div class="ctrl"><label>Items</label><select id="items" onchange="render()"><option value="3">3</option><option value="4" selected>4</option><option value="5">5</option><option value="6">6</option></select></div>
<div class="ctrl"><label>Style</label><select id="st" onchange="render()"><option value="0">Plain</option><option value="1" selected>Pill</option><option value="2">Arrow</option></select></div>
</div>
<div class="preview" id="prev"></div>
<div style="margin:8px 0;"><button class="action" onclick="copyCode()">Copy HTML+CSS</button></div>
<div class="code-block" id="code"></div>
</div>
</main>
<script src="/assets/app.js"></script>
<script>
let codeText='';
const labels=['Home','Category','Section','Subsection','Products','Details'];
function render(){
const bg=v('bg'),tc=v('tc'),ac=v('ac'),sep=v('sep'),st=v('st'),n=parseInt(v('items'));
const prev=document.getElementById('prev');
let styleCss='';
if(st==='0')styleCss='.breadcrumb{gap:8px}.breadcrumb li{padding:4px 8px}';
else if(st==='1')styleCss='.breadcrumb{gap:4px}.breadcrumb li{padding:6px 14px;border-radius:20px;background:'+bg};
else if(st==='2')styleCss='.breadcrumb{}.breadcrumb li{padding:8px 16px;clip-path:polygon(0 0,100% 50%,0 100%,8px 50%);background:'+bg+';margin-left:-8px}';
const items=[];
for(let i=0;i<n;i++){
const isLast=i===n-1;
items.push(`<li${st==='1'?' style="background:'+(isLast?ac:bg)+'"':''}><a href="#" style="color:${isLast?ac:tc}">${labels[i]}</a>${!isLast?`<span style="margin:0 8px;color:${tc};${st!=='0'?'display:none':''}">${sep}</span>`:''}</li>`);
}
prev.innerHTML=`<ul class="breadcrumb" style="${styleCss}">${items.join('')}</ul>`;
const css=`/* Breadcrumb */\n.breadcrumb{display:flex;align-items:center;list-style:none;margin:0;padding:0;${styleCss.split('}')[0].replace('.breadcrumb{','')}}\n${st==='1'?`.breadcrumb li{padding:6px 14px;border-radius:20px;background:${bg}}\n.breadcrumb li:last-child{background:${ac}}`:''}\n${st==='2'?`.breadcrumb li{padding:8px 16px;clip-path:polygon(0 0,100% 50%,0 100%,8px 50%);background:${bg};margin-left:-8px}\n.breadcrumb li:first-child{margin-left:0}`:''}\n.breadcrumb a{text-decoration:none;font-size:14px;color:${tc};transition:all .2s}\n.breadcrumb li:last-child a{color:${ac}}\n.breadcrumb a:hover{opacity:.8}`;
codeText=`<!-- HTML -->\n<ul class="breadcrumb">\n${items.map((it,i)=>`  ${it}`).join('\n')}\n</ul>\n\n<!-- CSS -->\n<style>\n${css}\n</style>`;
document.getElementById('code').textContent=codeText;
prev.querySelectorAll('a').forEach(a=>{a.addEventListener('mouseenter',function(){this.style.opacity='.8'});a.addEventListener('mouseleave',function(){this.style.opacity='1'})});
}
function v(id){return document.getElementById(id).value;}
function copyCode(){navigator.clipboard.writeText(codeText).then(()=>alert('Code copied!')).catch(()=>alert('Copy failed'));}
render();
</script>
</body>
</html>
