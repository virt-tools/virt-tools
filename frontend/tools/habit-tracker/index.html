<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="/assets/theme-init.js"></script>
<title>Habit Tracker — Virtual Tools</title>
<link rel="stylesheet" href="/assets/style.css">
<style>
.tool-wrap{max-width:800px;margin:0 auto;}
.tool-desc{font-size:14px;color:var(--text-secondary,#aaa);margin:8px 0;}
.add-row{display:flex;gap:8px;margin:12px 0;}
.add-row input{flex:1;padding:10px;border-radius:8px;border:1px solid var(--border,#444);background:var(--bg-alt,#1a1f2e);color:var(--text,#eee);font-size:14px;}
.add-row select{padding:10px;border-radius:8px;border:1px solid var(--border,#444);background:var(--bg-alt,#1a1f2e);color:var(--text,#eee);font-size:14px;}
.add-row button{padding:10px 20px;border-radius:8px;border:none;background:var(--accent,#5b8def);color:#fff;cursor:pointer;font-size:14px;}
.habit{background:var(--bg-alt,#1a1f2e);border-radius:10px;padding:16px;margin:8px 0;}
.habit-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}
.habit-name{font-weight:bold;font-size:15px;}
.habit-del{background:none;border:none;color:var(--text-secondary,#888);cursor:pointer;font-size:18px;padding:4px;}
.habit-del:hover{color:#f44;}
.habit-stats{display:flex;gap:16px;font-size:12px;color:var(--text-secondary,#888);margin-bottom:8px;}
.habit-stats span{white-space:nowrap;}
.week{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;}
.day{text-align:center;padding:8px 0;border-radius:6px;cursor:pointer;font-size:12px;border:1px solid var(--border,#333);transition:all 0.15s;}
.day.done{background:var(--accent,#5b8def);color:#fff;border-color:var(--accent,#5b8def);}
.day.today{border-color:var(--accent,#5b8def);border-width:2px;}
.day:hover:not(.done){background:var(--bg,#2a2f3e);}
.day-label{font-size:10px;color:var(--text-secondary,#888);margin-top:2px;}
.streak{color:#f80;font-weight:bold;}
.bar{height:4px;background:var(--border,#333);border-radius:2px;margin-top:6px;overflow:hidden;}
.bar-fill{height:100%;background:var(--accent,#5b8def);transition:width 0.3s;}
.empty{text-align:center;color:var(--text-secondary,#888);padding:40px;font-size:14px;}
</style>
</head>
<body>
<header id="site-header"></header>
<main>
<div class="tool-wrap">
<h1>Habit Tracker ✓</h1>
<p class="tool-desc">Track daily habits, build streaks, and stay consistent. All data stored locally in your browser — no account needed.</p>
<div class="add-row">
<input id="newHabit" placeholder="e.g. Drink 8 glasses of water" maxlength="60">
<select id="habitColor">
<option value="#5b8def">Blue</option>
<option value="#4caf50">Green</option>
<option value="#ff9800">Orange</option>
<option value="#e91e63">Pink</option>
<option value="#9c27b0">Purple</option>
<option value="#00bcd4">Cyan</option>
</select>
<button onclick="addHabit()">Add Habit</button>
</div>
<div id="habits"></div>
</div>
</main>
<script src="/assets/app.js"></script>
<script>
const DAYS=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
const STORE='vt_habits';
let habits=JSON.parse(localStorage.getItem(STORE)||'[]');
function save(){localStorage.setItem(STORE,JSON.stringify(habits));}
function todayStr(){return new Date().toISOString().slice(0,10);}
function dateStr(offset){const d=new Date();d.setDate(d.getDate()+offset);return d.toISOString().slice(0,10);}
function getStreak(h){let s=0;for(let i=0;;i++){const ds=dateStr(-i);if(h.days.includes(ds))s++;else break;}return s;}
function getWeekPct(h){let c=0;for(let i=0;i<7;i++)if(h.days.includes(dateStr(-i)))c++;return Math.round(c/7*100);}
function getBestStreak(h){let best=0,cur=0;const sorted=[...h.days].sort();for(let i=0;i<sorted.length;i++){if(i>0){const prev=new Date(sorted[i-1]);const curr=new Date(sorted[i]);const diff=Math.round((curr-prev)/86400000);if(diff===1)cur++;else cur=1;}else cur=1;best=Math.max(best,cur);}return best;}
function render(){const c=document.getElementById('habits');if(!habits.length){c.innerHTML='<div class="empty">No habits yet. Add one above to get started!</div>';return;}c.innerHTML=habits.map((h,idx)=>{const streak=getStreak(h);const pct=getWeekPct(h);const best=getBestStreak(h);const days=[];for(let i=6;i>=0;i--){const ds=dateStr(-i);const done=h.days.includes(ds);const isToday=ds===todayStr();days.push(`<div class="day${done?' done':''}${isToday?' today':''}" onclick="toggleDay(${idx},'${ds}')">${DAYS[new Date(ds).getDay()]}<div class="day-label">${ds.slice(8)}</div></div>`);}return `<div class="habit"><div class="habit-head"><div class="habit-name" style="color:${h.color}">${esc(h.name)}</div><button class="habit-del" onclick="delHabit(${idx})">×</button></div><div class="habit-stats"><span class="streak">🔥 ${streak}d streak</span><span>Best: ${best}d</span><span>This week: ${pct}%</span><span>Total: ${h.days.length} days</span></div><div class="week">${days.join('')}</div><div class="bar"><div class="bar-fill" style="width:${pct}%;background:${h.color}"></div></div></div>`;}).join('');}
function esc(s){return s.replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function addHabit(){const name=document.getElementById('newHabit').value.trim();if(!name)return;const color=document.getElementById('habitColor').value;habits.push({name,color,days:[]});document.getElementById('newHabit').value='';save();render();}
function delHabit(idx){habits.splice(idx,1);save();render();}
function toggleDay(idx,ds){const h=habits[idx];const i=h.days.indexOf(ds);if(i>=0)h.days.splice(i,1);else h.days.push(ds);save();render();}
document.getElementById('newHabit').addEventListener('keydown',e=>{if(e.key==='Enter')addHabit();});
render();
</script>
</body>
</html>
