<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="/assets/theme-init.js"></script>
<title>Glitch Text Generator — Virtual Tools</title>
<link rel="stylesheet" href="/assets/style.css">
<style>
.tool-wrap{max-width:720px;margin:0 auto;}
.tool-desc{font-size:14px;color:var(--text-secondary,#aaa);margin:8px 0 20px;}
.controls{display:flex;gap:8px;margin:12px 0;flex-wrap:wrap;align-items:center;}
.controls label{font-size:13px;color:var(--text-secondary,#888);margin-right:4px;}
.controls input[type="text"]{flex:1;min-width:200px;padding:6px 10px;border-radius:6px;border:1px solid var(--border,#444);background:var(--card,#2a2f3e);color:var(--text,#eee);font-size:13px;}
.controls select,.controls input[type="number"]{padding:6px 10px;border-radius:6px;border:1px solid var(--border,#444);background:var(--card,#2a2f3e);color:var(--text,#eee);font-size:13px;}
.color-row{display:flex;gap:8px;align-items:center;margin:8px 0;flex-wrap:wrap;}
.color-row input[type="color"]{width:40px;height:32px;border:none;border-radius:6px;cursor:pointer;background:none;}
.preview{background:#0a0a0a;border:1px solid var(--border,#333);border-radius:8px;padding:48px;margin:12px 0;text-align:center;min-height:120px;display:flex;align-items:center;justify-content:center;overflow:hidden;position:relative;}
.glitch{font-family:'Courier New',monospace;font-size:48px;color:#fff;position:relative;display:inline-block;}
.glitch::before,.glitch::after{content:attr(data-text);position:absolute;top:0;left:0;width:100%;height:100%;overflow:hidden;}
.glitch::before{color:#ff00aa;clip-path:inset(0 0 60% 0);animation:glitchTop 2s infinite linear alternate-reverse;}
.glitch::after{color:#00ffee;clip-path:inset(60% 0 0 0);animation:glitchBot 2s infinite linear alternate-reverse;}
@keyframes glitchTop{0%{transform:translate(0,0)}10%{transform:translate(-3px,-2px)}20%{transform:translate(3px,2px)}30%{transform:translate(-2px,1px)}40%{transform:translate(2px,-1px)}50%{transform:translate(0,0)}60%{transform:translate(-3px,2px)}70%{transform:translate(3px,-2px)}80%{transform:translate(-1px,1px)}90%{transform:translate(1px,-1px)}100%{transform:translate(0,0)}}
@keyframes glitchBot{0%{transform:translate(0,0)}10%{transform:translate(3px,2px)}20%{transform:translate(-3px,-2px)}30%{transform:translate(2px,-1px)}40%{transform:translate(-2px,1px)}50%{transform:translate(0,0)}60%{transform:translate(3px,-2px)}70%{transform:translate(-3px,2px)}80%{transform:translate(1px,-1px)}90%{transform:translate(-1px,1px)}100%{transform:translate(0,0)}}
.scanlines::after{content:'';position:absolute;top:0;left:0;right:0;bottom:0;background:repeating-linear-gradient(0deg,rgba(255,255,255,0.03) 0px,rgba(255,255,255,0.03) 1px,transparent 1px,transparent 3px);pointer-events:none;}
button.action{padding:8px 16px;border-radius:6px;border:1px solid var(--border,#444);background:var(--card,#2a2f3e);color:var(--text,#eee);cursor:pointer;font-size:13px;}
button.action:hover{border-color:var(--accent,#5b8def);}
.css-output{background:var(--bg,#1e2230);border:1px solid var(--border,#444);border-radius:8px;padding:12px;margin:12px 0;font-family:monospace;font-size:12px;color:var(--text,#eee);white-space:pre-wrap;word-break:break-all;}
</style>
</head>
<body>
<header id="site-header"></header>
<main>
<div class="tool-wrap">
<h1>📺 Glitch Text Generator</h1>
<p class="tool-desc">Create CSS glitch/distorted text effects with RGB split and scanlines. Copy CSS.</p>
<div class="controls">
<input type="text" id="text" value="GLITCH" placeholder="Enter text...">
<label>Size: <input type="number" id="size" value="48" min="8" max="120"></label>
</div>
<div class="color-row">
<label>Text: <input type="color" id="textColor" value="#ffffff"></label>
<label>R: <input type="color" id="rColor" value="#ff00aa"></label>
<label>B: <input type="color" id="bColor" value="#00ffee"></label>
<label>Offset: <input type="number" id="offset" value="3" min="0" max="20"></label>
<label>Scanlines: <select id="scanlines"><option value="1" selected>On</option><option value="0">Off</option></select></label>
</div>
<div class="controls">
<button class="action" onclick="copyCSS()">Copy CSS</button>
</div>
<div class="preview" id="previewWrap"><span class="glitch" id="preview" data-text="GLITCH">GLITCH</span></div>
<div class="css-output" id="cssOutput"></div>
</div>
</main>
<script src="/assets/app.js"></script>
<script>
function update(){
const text=document.getElementById('text').value||'GLITCH';
const size=document.getElementById('size').value;
const tc=document.getElementById('textColor').value;
const rc=document.getElementById('rColor').value;
const bc=document.getElementById('bColor').value;
const off=document.getElementById('offset').value;
const sl=document.getElementById('scanlines').value;
const p=document.getElementById('preview');
p.textContent=text;p.setAttribute('data-text',text);
p.style.fontSize=size+'px';p.style.color=tc;
p.style.setProperty('--rc',rc);p.style.setProperty('--bc',bc);
const style=document.createElement('style');
style.textContent='.glitch::before{color:'+rc+'!important}.glitch::after{color:'+bc+'!important}';
let old=document.getElementById('dynStyle');if(old)old.remove();
style.id='dynStyle';document.head.appendChild(style);
const pw=document.getElementById('previewWrap');
if(sl==='1')pw.classList.add('scanlines');else pw.classList.remove('scanlines');
const css='.glitch {\n  font-family: Courier New, monospace;\n  font-size: '+size+'px;\n  color: '+tc+';\n  position: relative;\n}\n.glitch::before, .glitch::after {\n  content: attr(data-text);\n  position: absolute;\n  top: 0; left: 0;\n}\n.glitch::before { color: '+rc+'; animation: glitchTop 2s infinite; }\n.glitch::after { color: '+bc+'; animation: glitchBot 2s infinite; }';
document.getElementById('cssOutput').textContent=css;
}
function copyCSS(){navigator.clipboard.writeText(document.getElementById('cssOutput').textContent).then(()=>alert('CSS copied!')).catch(()=>alert('Copy failed'));}
['text','size','textColor','rColor','bColor','offset','scanlines'].forEach(id=>{const el=document.getElementById(id);if(el)el.addEventListener('input',update);});
update();
</script>
</body>
</html>
