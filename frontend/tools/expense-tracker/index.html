<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="/assets/theme-init.js"></script>
<title>Expense Tracker — Virtual Tools</title>
<link rel="stylesheet" href="/assets/style.css">
<style>
.tool-wrap{max-width:800px;margin:0 auto;}
.tool-desc{font-size:14px;color:var(--text-secondary,#aaa);margin:8px 0 16px;}
.card{background:var(--bg-alt,#1a1f2e);border-radius:12px;padding:20px;margin:12px 0;}
.row{display:flex;gap:12px;flex-wrap:wrap;align-items:end;}
.field{flex:1;min-width:120px;}
.field label{display:block;font-size:12px;color:var(--text-secondary,#888);margin-bottom:4px;}
.field input,.field select{width:100%;padding:10px;border-radius:8px;border:1px solid var(--border,#444);background:var(--bg,#2a2f3e);color:var(--text,#eee);font-size:14px;}
.field input:focus,.field select:focus{outline:none;border-color:var(--accent,#5b8def);}
.btn{padding:10px 24px;border-radius:8px;border:none;background:var(--accent,#5b8def);color:#fff;cursor:pointer;font-size:14px;}
.btn:hover{opacity:0.9;}
.btn-sm{padding:6px 14px;font-size:12px;background:var(--bg-alt,#1a1f2e);border:1px solid var(--border,#444);color:var(--text,#eee);border-radius:6px;cursor:pointer;}
.btn-sm:hover{border-color:var(--accent,#5b8def);}
.stats{display:flex;gap:16px;flex-wrap:wrap;margin:12px 0;}
.stat{background:var(--bg-alt,#1a1f2e);border-radius:10px;padding:12px 20px;text-align:center;flex:1;min-width:100px;}
.stat-val{font-size:22px;font-weight:bold;color:var(--accent,#5b8def);}
.stat-label{font-size:11px;color:var(--text-secondary,#888);text-transform:uppercase;letter-spacing:1px;}
table{width:100%;border-collapse:collapse;margin:12px 0;font-size:13px;}
th{text-align:left;padding:8px;border-bottom:2px solid var(--border,#444);color:var(--text-secondary,#888);font-size:11px;text-transform:uppercase;}
td{padding:8px;border-bottom:1px solid var(--border,#333);}
.cat{display:inline-block;padding:2px 10px;border-radius:12px;font-size:11px;font-weight:bold;}
.cat-food{background:#4caf5020;color:#4caf50;}
.cat-transport{background:#2196f320;color:#2196f3;}
.cat-shopping{background:#ff980020;color:#ff9800;}
.cat-bills{background:#f4434320;color:#f44343;}
.cat-entertainment{background:#9c27b020;color:#9c27b0;}
.cat-other{background:#607d8b20;color:#607d8b;}
.del{background:none;border:none;color:var(--text-secondary,#888);cursor:pointer;font-size:16px;}
.del:hover{color:#f44;}
.empty{text-align:center;color:var(--text-secondary,#888);padding:30px;}
.cat-bars{margin:12px 0;}
.cat-bar{display:flex;align-items:center;gap:8px;margin:4px 0;font-size:12px;}
.cat-bar-label{width:100px;color:var(--text-secondary,#aaa);}
.cat-bar-track{flex:1;height:18px;background:var(--bg-alt,#1a1f2e);border-radius:9px;overflow:hidden;}
.cat-bar-fill{height:100%;border-radius:9px;transition:width 0.3s;}
.cat-bar-val{width:60px;text-align:right;color:var(--text,#eee);}
</style>
</head>
<body>
<header id="site-header"></header>
<main>
<div class="tool-wrap">
<h1>Expense Tracker 💰</h1>
<p class="tool-desc">Track daily expenses by category. View totals, category breakdown, and recent history. All stored locally in your browser.</p>
<div class="stats" id="stats"></div>
<div class="card">
<div class="row">
<div class="field"><label>Amount ($)</label><input type="number" id="amt" min="0" step="0.01" placeholder="0.00"></div>
<div class="field"><label>Category</label><select id="cat">
<option value="food">🍔 Food</option>
<option value="transport">🚗 Transport</option>
<option value="shopping">🛍️ Shopping</option>
<option value="bills">📋 Bills</option>
<option value="entertainment">🎬 Entertainment</option>
<option value="other">📦 Other</option>
</select></div>
<div class="field"><label>Note (optional)</label><input type="text" id="note" placeholder="What for?"></div>
<button class="btn" onclick="add()">Add</button>
</div>
</div>
<div class="card">
<div style="font-weight:bold;margin-bottom:8px;">Category Breakdown (This Month)</div>
<div class="cat-bars" id="catBars"></div>
</div>
<div class="card">
<div style="font-weight:bold;margin-bottom:8px;">Recent Expenses</div>
<table id="table"></table>
</div>
<button class="btn-sm" onclick="clearAll()">Clear All</button>
</div>
</main>
<script src="/assets/app.js"></script>
<script>
const STORE='vt_expenses';
const CATS={food:{label:'Food',color:'#4caf50',icon:'🍔'},transport:{label:'Transport',color:'#2196f3',icon:'🚗'},shopping:{label:'Shopping',color:'#ff9800',icon:'🛍️'},bills:{label:'Bills',color:'#f44343',icon:'📋'},entertainment:{label:'Entertainment',color:'#9c27b0',icon:'🎬'},other:{label:'Other',color:'#607d8b',icon:'📦'}};
let items=JSON.parse(localStorage.getItem(STORE)||'[]');
function save(){localStorage.setItem(STORE,JSON.stringify(items));}
function monthStr(){return new Date().toISOString().slice(0,7);}
function fmtMoney(v){return '$'+Number(v).toFixed(2);}
function fmtDate(ts){return new Date(ts).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});}
function monthTotal(){const m=monthStr();return items.filter(i=>i.date.slice(0,7)===m).reduce((s,i)=>s+i.amount,0);}
function todayTotal(){const d=new Date().toISOString().slice(0,10);return items.filter(i=>i.date.slice(0,10)===d).reduce((s,i)=>s+i.amount,0);}
function countThisMonth(){const m=monthStr();return items.filter(i=>i.date.slice(0,7)===m).length;}
function catTotals(){const m=monthStr();const t={};for(const c in CATS)t[c]=0;items.filter(i=>i.date.slice(0,7)===m).forEach(i=>{t[i.cat]=(t[i.cat]||0)+i.amount;});return t;}
function renderStats(){document.getElementById('stats').innerHTML=`<div class="stat"><div class="stat-val">${fmtMoney(todayTotal())}</div><div class="stat-label">Today</div></div><div class="stat"><div class="stat-val">${fmtMoney(monthTotal())}</div><div class="stat-label">This Month</div></div><div class="stat"><div class="stat-val">${countThisMonth()}</div><div class="stat-label">Entries</div></div>`;}
function renderCatBars(){const t=catTotals();const max=Math.max(...Object.values(t),1);document.getElementById('catBars').innerHTML=Object.entries(t).map(([c,v])=>`<div class="cat-bar"><div class="cat-bar-label">${CATS[c].icon} ${CATS[c].label}</div><div class="cat-bar-track"><div class="cat-bar-fill" style="width:${v/max*100}%;background:${CATS[c].color}"></div></div><div class="cat-bar-val">${fmtMoney(v)}</div></div>`).join('');}
function renderTable(){const recent=items.slice().reverse().slice(0,20);const c=document.getElementById('table');if(!recent.length){c.innerHTML='<tr><td class="empty">No expenses yet. Add one above!</td></tr>';return;}c.innerHTML='<tr><th>Date</th><th>Category</th><th>Note</th><th>Amount</th><th></th></tr>'+recent.map((i,idx)=>`<tr><td>${fmtDate(i.date)}</td><td><span class="cat cat-${i.cat}">${CATS[i.cat].icon} ${CATS[i.cat].label}</span></td><td>${esc(i.note||'—')}</td><td style="font-weight:bold">${fmtMoney(i.amount)}</td><td><button class="del" onclick="del(${items.length-1-idx})">×</button></td></tr>`).join('');}
function esc(s){return (s||'').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function add(){const amt=parseFloat(document.getElementById('amt').value);const cat=document.getElementById('cat').value;const note=document.getElementById('note').value;if(!amt||amt<=0){alert('Enter a valid amount');return;}items.push({amount:amt,cat,note:note||'',date:new Date().toISOString()});save();document.getElementById('amt').value='';document.getElementById('note').value='';renderAll();}
function del(idx){items.splice(idx,1);save();renderAll();}
function clearAll(){if(confirm('Delete ALL expenses? This cannot be undone.')){items=[];save();renderAll();}}
function renderAll(){renderStats();renderCatBars();renderTable();}
renderAll();
</script>
</body>
</html>
