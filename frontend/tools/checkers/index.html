<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="/assets/theme-init.js"></script>
<title>Checkers — Virtual Tools</title>
<link rel="stylesheet" href="/assets/style.css">
<style>
.tool-wrap{max-width:520px;margin:0 auto;text-align:center;}
.tool-desc{opacity:.7;font-size:14px;margin-bottom:8px;}
#board{display:inline-grid;grid-template-columns:repeat(8,52px);grid-template-rows:repeat(8,52px);gap:0;border:3px solid #333;margin:12px auto;}
.cell{width:52px;height:52px;display:flex;align-items:center;justify-content:center;}
.cell.light{background:#eeeed2;}.cell.dark{background:#1b7d3f;cursor:pointer;}
.cell.sel{box-shadow:inset 0 0 0 3px #3498db;}
.cell.hint{box-shadow:inset 0 0 0 3px rgba(231,76,60,.6);}
.piece{width:38px;height:38px;border-radius:50%;cursor:pointer;}
.piece.red{background:#c0392b;border:2px solid #922;}.piece.black{background:#1a1a1a;border:2px solid #444;}
.piece.king{position:relative;}
.piece.king::after{content:'★';font-size:20px;color:gold;line-height:38px;}
.controls{display:flex;gap:8px;justify-content:center;margin:12px 0;flex-wrap:wrap;}
.controls button{padding:6px 16px;border-radius:6px;border:1px solid var(--border,#2a2f3a);background:var(--bg-alt,#1a1f2e);color:var(--text,#e0e0e0);cursor:pointer;font-size:14px;}
.info{display:flex;gap:20px;justify-content:center;margin:8px 0;font-size:15px;}
#msg{font-size:14px;min-height:20px;font-weight:600;}
.mode select{padding:4px 8px;border-radius:4px;font-size:14px;}
</style>
</head>
<body>
<header id="site-header"></header>
<main>
<div class="tool-wrap">
<h1>Checkers</h1>
<p class="tool-desc">Classic 8×8 draughts. Red moves up, Black moves down. Jump opponent pieces to capture. Reach the far row to become a king (moves both directions). Mandatory captures.</p>
<div class="info"><span>🔴 Red: <b id="rCount">12</b></span><span>⚫ Black: <b id="bCount">12</b></span></div>
<div class="mode"><select id="modeSel" onchange="newGame()"><option value="ai">vs AI (you=Red)</option><option value="2p">2 Player</option></select></div>
<div id="board"></div>
<div class="controls"><button onclick="newGame()">New Game</button></div>
<div id="msg"></div>
</div>
</main>
<script src="/assets/app.js"></script>
<script>
const N=8;let board=[],sel=null,validTargets=[],player='r',mode='ai',gameOver=false;
function newGame(){
  board=Array.from({length:N},()=>Array(N).fill(0));
  for(let r=0;r<3;r++)for(let c=0;c<N;c++)if((r+c)%2===1)board[r][c]='b';
  for(let r=5;r<8;r++)for(let c=0;c<N;c++)if((r+c)%2===1)board[r][c]='r';
  sel=null;validTargets=[];player='r';gameOver=false;mode=document.getElementById('modeSel').value;
  document.getElementById('msg').textContent='';render();
}
function isKing(p){return p&&p.length===2&&p[1]==='k';}
function pieceColor(p){return p?p[0]:0;}
function promote(r,c){if(board[r][c]==='r'&&r===0)board[r][c]='rk';if(board[r][c]==='b'&&r===7)board[r][c]='bk';}
function getMoves(r,c){
  const p=board[r][c];if(!p)return{moves:[],jumps:[]};
  const col=pieceColor(p),k=isKing(p);
  const dirs=[];if(col==='r'||k)dirs.push([-1,-1],[-1,1]);if(col==='b'||k)dirs.push([1,-1],[1,1]);
  const moves=[],jumps=[];
  for(const[dr,dc]of dirs){
    const nr=r+dr,nc=c+dc;
    if(nr>=0&&nr<N&&nc>=0&&nc<N&&board[nr][nc]===0)moves.push([nr,nc]);
    const jr=r+2*dr,jc=c+2*dc;
    if(jr>=0&&jr<N&&jc>=0&&jc<N&&board[jr][jc]===0&&board[nr][nc]&&pieceColor(board[nr][nc])!==col)jumps.push([jr,jc,nr,nc]);
  }
  return{moves,jumps};
}
function allJumps(col){
  const j=[];for(let r=0;r<N;r++)for(let c=0;c<N;c++)if(board[r][c]&&pieceColor(board[r][c])===col){const m=getMoves(r,c);if(m.jumps.length)j.push([r,c]);}
  return j;
}
function allMovesFor(col){
  const jumps=allJumps(col);const all=[];
  for(let r=0;r<N;r++)for(let c=0;c<N;c++)if(board[r][c]&&pieceColor(board[r][c])===col){
    const m=getMoves(r,c);const list=jumps.length?m.jumps.map(j=>[r,c,...j]):m.moves.map(mv=>[r,c,...mv]);
    all.push(...list);
  }
  return all;
}
function render(){
  const el=document.getElementById('board');el.innerHTML='';
  let rc=0,bc=0;
  const myJumps=player==='r'?allJumps('r'):allJumps('b');
  for(let r=0;r<N;r++)for(let c=0;c<N;c++){
    const cell=document.createElement('div');cell.className=(r+c)%2===0?'cell light':'cell dark';
    if(sel&&sel[0]===r&&sel[1]===c)cell.classList.add('sel');
    if(validTargets.some(t=>t[0]===r&&t[1]===c))cell.classList.add('hint');
    if((r+c)%2===1)cell.onclick=()=>clickCell(r,c);
    if(board[r][c]){const p=document.createElement('div');p.className='piece '+(pieceColor(board[r][c])==='r'?'red':'black')+(isKing(board[r][c])?' king':'');cell.appendChild(p);if(pieceColor(board[r][c])==='r')rc++;else bc++;}
    el.appendChild(cell);
  }
  document.getElementById('rCount').textContent=rc;document.getElementById('bCount').textContent=bc;
  if(!gameOver){
    if(rc===0){gameOver=true;document.getElementById('msg').textContent='Black wins! 🎉';}
    else if(bc===0){gameOver=true;document.getElementById('msg').textContent='Red wins! 🎉';}
    else if(allMovesFor(player).length===0){gameOver=true;document.getElementById('msg').textContent=(player==='r'?'Red':'Black')+' has no moves — '+(player==='r'?'Black':'Red')+' wins!';}
  }
}
function clickCell(r,c){
  if(gameOver||(mode==='ai'&&player==='b'))return;
  const p=board[r][c];
  if(p&&pieceColor(p)===player){sel=[r,c];const m=getMoves(r,c);validTargets=myJumpsFilter(r,c,m);render();return;}
  if(sel&&validTargets.some(t=>t[0]===r&&t[1]===c)){
    const target=validTargets.find(t=>t[0]===r&&t[1]===c);
    doMove(sel[0],sel[1],r,c,target);
  }
}
function myJumpsFilter(r,c,m){
  const j=allJumps(player);if(j.length===0)return m.moves;
  if(!j.some(p=>p[0]===r&&p[1]===c))return[];
  return m.jumps;
}
function doMove(fr,fc,tr,tc,target){
  board[tr][tc]=board[fr][fc];board[fr][fc]=0;
  let jumped=false;
  if(target.length>2){board[target[2]][target[3]]=0;jumped=true;}
  promote(tr,tc);
  if(jumped){
    const m=getMoves(tr,tc);if(m.jumps.length){sel=[tr,tc];validTargets=m.jumps;render();return;}
  }
  sel=null;validTargets=[];player=player==='r'?'b':'r';render();
  if(mode==='ai'&&!gameOver&&player==='b')setTimeout(aiMove,400);
}
function aiMove(){
  const moves=allMovesFor('b');if(!moves.length)return;
  let best=moves[0],bestScore=-999;
  for(const m of moves){
    let s=Math.random()*0.5;
    if(m.length>4)s+=5;
    if(m[2]===7)s+=3;
    if(bestScore<s){bestScore=s;best=m;}
  }
  doMove(best[0],best[1],best[2],best[3],best);
}
newGame();
</script>
</body>
</html>
