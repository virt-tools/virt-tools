<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="/assets/theme-init.js"></script>
<title>CSS Button Generator â€” Virtual Tools</title>
<link rel="stylesheet" href="/assets/style.css">
<style>
.tool-wrap{max-width:800px;margin:0 auto;}
.tool-desc{font-size:14px;color:var(--text-secondary,#aaa);margin:8px 0 20px;}
.controls{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:10px;margin:12px 0;}
.ctrl{display:flex;flex-direction:column;gap:4px;}
.ctrl label{font-size:12px;color:var(--text-secondary,#888);}
.ctrl input,.ctrl select{padding:6px 8px;border-radius:6px;border:1px solid var(--border,#444);background:var(--bg,#1e2230);color:var(--text,#eee);font-size:13px;}
button.action{padding:8px 16px;border-radius:6px;border:1px solid var(--border,#444);background:var(--card,#2a2f3e);color:var(--text,#eee);cursor:pointer;font-size:13px;margin:4px 4px 0 0;}
.preview{background:var(--bg,#1e2230);border:1px solid var(--border,#444);border-radius:8px;padding:40px;margin:12px 0;display:flex;align-items:center;justify-content:center;min-height:120px;}
.code-block{background:var(--bg,#1e2230);border:1px solid var(--border,#444);border-radius:8px;padding:12px;margin:8px 0;font-family:monospace;font-size:11px;color:var(--text,#eee);white-space:pre-wrap;word-break:break-all;max-height:400px;overflow:auto;}
</style>
</head>
<body>
<header id="site-header"></header>
<main>
<div class="tool-wrap">
<h1>ðŸ”˜ CSS Button Generator</h1>
<p class="tool-desc">Create CSS buttons with 8 styles, 6 hover effects, custom colors, sizes, and border radius. Copy HTML+CSS.</p>
<div class="controls">
<div class="ctrl"><label>Style</label><select id="style" onchange="render()"><option value="solid" selected>Solid</option><option value="outline">Outline</option><option value="gradient">Gradient</option><option value="ghost">Ghost</option><option value="neon">Neon</option><option value="3d">3D</option><option value="glass">Glass</option><option value="retro">Retro</option></select></div>
<div class="ctrl"><label>Hover Effect</label><select id="hover" onchange="render()"><option value="none">None</option><option value="lift" selected>Lift</option><option value="scale">Scale</option><option value="glow">Glow</option><option value="slide">Slide</option><option value="press">Press</option><option value="shine">Shine</option></select></div>
<div class="ctrl"><label>Text</label><input type="text" id="bt" value="Click Me" oninput="render()"></div>
<div class="ctrl"><label>Padding X</label><input type="number" id="px" value="24" min="8" max="60" oninput="render()"></div>
<div class="ctrl"><label>Padding Y</label><input type="number" id="py" value="12" min="4" max="40" oninput="render()"></div>
<div class="ctrl"><label>Font Size</label><input type="number" id="fs" value="16" min="10" max="32" oninput="render()"></div>
<div class="ctrl"><label>Radius</label><input type="number" id="rd" value="8" min="0" max="40" oninput="render()"></div>
<div class="ctrl"><label>Bg Color</label><input type="color" id="bc" value="#6c5ce7" oninput="render()"></div>
<div class="ctrl"><label>Text Color</label><input type="color" id="tc" value="#ffffff" oninput="render()"></div>
</div>
<div style="margin:8px 0;"><button class="action" onclick="copyCode()">Copy HTML+CSS</button></div>
<div class="preview" id="prev"></div>
<div class="code-block" id="code"></div>
</div>
</main>
<script src="/assets/app.js"></script>
<script>
let codeText='';
function render(){
const style=v('style'),hover=v('hover'),bt=v('bt'),px=+v('px'),py=+v('py'),fs=+v('fs'),rd=+v('rd'),bc=v('bc'),tc=v('tc');
let css='',hoverCSS='';
if(style==='solid'){css=`background:${bc};color:${tc};border:none;`;}
else if(style==='outline'){css=`background:transparent;color:${bc};border:2px solid ${bc};`;}
else if(style==='gradient'){css=`background:linear-gradient(135deg,${bc},${bc}dd);color:${tc};border:none;`;}
else if(style==='ghost'){css=`background:${bc}22;color:${bc};border:none;`;}
else if(style==='neon'){css=`background:${bc}11;color:${bc};border:2px solid ${bc};box-shadow:0 0 10px ${bc}66,inset 0 0 10px ${bc}22;`;}
else if(style==='3d'){css=`background:${bc};color:${tc};border:none;box-shadow:0 4px 0 ${bc}88;`;}
else if(style==='glass'){css=`background:${bc}33;color:${tc};border:1px solid ${bc}55;backdrop-filter:blur(8px);`;}
else if(style==='retro'){css=`background:${bc};color:${tc};border:2px solid #000;border-radius:0;box-shadow:3px 3px 0 #000;`;}
if(hover==='lift'){hoverCSS=`transform:translateY(-3px);box-shadow:0 6px 20px ${bc}55;`;}
else if(hover==='scale'){hoverCSS=`transform:scale(1.08);`;}
else if(hover==='glow'){hoverCSS=`box-shadow:0 0 25px ${bc};`;}
else if(hover==='slide'){hoverCSS=`background:${tc};color:${bc};`;}
else if(hover==='press'){hoverCSS=`transform:translateY(2px);box-shadow:0 1px 0 ${bc}88;`;}
else if(hover==='shine'){hoverCSS=`box-shadow:inset 0 0 0 9999px #ffffff22;`;}
const btnCSS=`padding:${py}px ${px}px;font-size:${fs}px;border-radius:${rd}px;cursor:pointer;transition:all .25s ease;font-family:inherit;font-weight:600;${css}`;
document.getElementById('prev').innerHTML=`<button style="${btnCSS}" onmouseover="this.style.cssText='${btnCSS};${hoverCSS}'" onmouseout="this.style.cssText='${btnCSS}'">${bt}</button>`;
codeText=`<style>\n.btn {\n  ${btnCSS}\n}\n.btn:hover {\n  ${hoverCSS||'/* no hover effect */'}\n}\n</style>\n\n<button class="btn">${bt}</button>`;
document.getElementById('code').textContent=codeText;
}
function v(id){return document.getElementById(id).value;}
function copyCode(){navigator.clipboard.writeText(codeText).then(()=>alert('Code copied!')).catch(()=>alert('Copy failed'));}
render();
</script>
</body>
</html>
