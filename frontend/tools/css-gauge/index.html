<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CSS Gauge Meter Generator — virt.tools</title>
<link rel="stylesheet" href="/assets/style.css">
<style>
.tool-area{max-width:900px;margin:2rem auto;padding:0 1rem}
.controls{display:grid;gap:1rem;margin:1.5rem 0;padding:1.5rem;background:#1a1a2e;border-radius:12px}
.control-row{display:flex;gap:1rem;align-items:center;flex-wrap:wrap}
.control-row label{min-width:120px;font-weight:600;font-size:.9rem}
.control-row select,.control-row input{padding:.5rem .75rem;border-radius:8px;border:1px solid #444;background:#0f0f1e;color:#eee;font-size:.9rem}
.preview-box{margin:1.5rem 0;border-radius:12px;min-height:200px;padding:2rem;background:#f5f5f5;display:flex;align-items:center;justify-content:center;flex-wrap:wrap;gap:2rem}
.output-block{margin:2rem 0}
.output-block textarea{width:100%;min-height:100px;font-family:monospace;font-size:.85rem;padding:1rem;border-radius:8px;border:1px solid #444;background:#0f0f1e;color:#eee;resize:vertical}
.copy-btn{padding:.6rem 1.2rem;border:none;border-radius:8px;background:#667eea;color:#fff;cursor:pointer;font-size:.9rem;margin-top:.5rem}
h2{margin-top:2rem;font-size:1.2rem}
</style>
</head>
<body>
<header id="site-header"></header>
<main>
<div class="tool-area">
<h1>📡 CSS Gauge Meter Generator</h1>
<p>Create CSS gauge/speedometer-style meter components. Adjustable value, size, colors. Copy HTML+CSS.</p>
<div class="controls">
<div class="control-row">
<label>Value (%)</label><input type="range" id="value" min="0" max="100" value="65" style="width:150px">
<span id="valLabel">65%</span>
<label>Size</label><select id="size"><option value="120">Small</option><option value="180" selected>Medium</option><option value="240">Large</option></select>
<label>Theme</label><select id="theme"><option value="blue" selected>Blue</option><option value="green">Green</option><option value="orange">Orange</option><option value="red">Red</option><option value="purple">Purple</option></select>
<label>Show Label</label><select id="showLabel"><option value="yes" selected>Yes</option><option value="no">No</option></select>
<label>Style</label><select id="style"><option value="half" selected>Half Circle</option><option value="full">Full Circle</option></select>
</div>
</div>
<h2>Preview</h2>
<div class="preview-box" id="preview"></div>
<h2>HTML</h2><div class="output-block"><textarea id="htmlOut" readonly></textarea><button class="copy-btn" onclick="copyText('htmlOut')">Copy HTML</button></div>
<h2>CSS</h2><div class="output-block"><textarea id="cssOut" readonly></textarea><button class="copy-btn" onclick="copyText('cssOut')">Copy CSS</button></div>
</div>
</main>
<script src="/assets/app.js"></script>
<script>
var themes={blue:'#3b82f6',green:'#10b981',orange:'#f59e0b',red:'#ef4444',purple:'#8b5cf6'};
function update(){
var val=+document.getElementById('value').value;var sz=+document.getElementById('size').value;
var theme=themes[document.getElementById('theme').value];var showLbl=document.getElementById('showLabel').value==='yes';
var style=document.getElementById('style').value;var deg=style==='half'?180:360;
var fillDeg=(val/100)*deg;var rotation=style==='half'?180:0;
var html='<div class="gauge" style="position:relative;width:'+sz+'px;height:'+(style==='half'?sz/2+20:sz)+'px;margin:0 auto">\n';
html+='  <div class="gauge-bg" style="position:absolute;width:'+sz+'px;height:'+sz+'px;border-radius:50%;border:'+(sz/8)+'px solid #e5e7eb;clip-path:'+(style==='half'?'inset(0 0 50% 0)':'none')+';transform:rotate('+(style==='half'?0:0)+'deg)"></div>\n';
html+='  <div class="gauge-fill" style="position:absolute;width:'+sz+'px;height:'+sz+'px;border-radius:50%;border:'+(sz/8)+'px solid '+theme+';clip-path:polygon(50% 50%, 50% 0%, '+(50+50*Math.sin(fillDeg*Math.PI/180))+'% '+(50-50*Math.cos(fillDeg*Math.PI/180))+'%)"></div>\n';
if(showLbl)html+='  <div class="gauge-label" style="position:absolute;bottom:0;left:50%;transform:translateX(-50%);font-size:'+(sz/8)+'px;font-weight:700;color:'+theme+'">'+val+'%</div>\n';
html+='</div>';
var css='.gauge{position:relative}\n.gauge-bg{box-sizing:border-box}\n.gauge-fill{box-sizing:border-box;transition:all .5s ease}\n.gauge-label{text-align:center;white-space:nowrap}';
document.getElementById('htmlOut').value=html;
document.getElementById('cssOut').value=css;
document.getElementById('preview').innerHTML=html;
document.getElementById('valLabel').textContent=val+'%';
}
function copyText(id){var t=document.getElementById(id);t.select();document.execCommand('copy')}
['value','size','theme','showLabel','style'].forEach(function(id){var el=document.getElementById(id);el.addEventListener('change',update);el.addEventListener('input',update)});
update();
</script>
</body>
</html>
