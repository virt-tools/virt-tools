<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CSS File Tree Generator — virt.tools</title>
<link rel="stylesheet" href="/assets/style.css">
<style>
.tool-area{max-width:900px;margin:2rem auto;padding:0 1rem}
.controls{display:grid;gap:1rem;margin:1.5rem 0;padding:1.5rem;background:#1a1a2e;border-radius:12px}
.control-row{display:flex;gap:1rem;align-items:center;flex-wrap:wrap}
.control-row label{min-width:100px;font-weight:600;font-size:.9rem}
.control-row select,.control-row input{padding:.5rem .75rem;border-radius:8px;border:1px solid #444;background:#0f0f1e;color:#eee;font-size:.9rem}
.preview-box{margin:1.5rem 0;border-radius:12px;background:#2a2a3e;padding:1.5rem;min-height:250px}
.output-block{margin:2rem 0}
.output-block textarea{width:100%;min-height:120px;font-family:monospace;font-size:.85rem;padding:1rem;border-radius:8px;border:1px solid #444;background:#0f0f1e;color:#eee;resize:vertical}
.copy-btn{padding:.6rem 1.2rem;border:none;border-radius:8px;background:#667eea;color:#fff;cursor:pointer;font-size:.9rem;margin-top:.5rem}
h2{margin-top:2rem;font-size:1.2rem}
.tree-item{display:flex;align-items:center;gap:6px;padding:4px 8px;border-radius:6px;cursor:pointer;font-size:14px}
.tree-item:hover{background:rgba(255,255,255,.08)}
.tree-children{margin-left:20px;border-left:1px solid #333;padding-left:8px}
</style>
</head>
<body>
<header id="site-header"></header>
<main>
<div class="tool-area">
<h1>📂 CSS File Tree Generator</h1>
<p>Create CSS file tree/directory viewer components. 3 themes, expand/collapse, custom icons. Copy HTML+CSS.</p>
<div class="controls">
<div class="control-row">
<label>Theme</label><select id="theme"><option value="dark" selected>Dark</option><option value="light">Light</option><option value="mono">Mono</option></select>
<label>Items</label><select id="itemCount"><option value="5" selected>5</option><option value="8">8</option><option value="12">12</option></select>
<label>Accent</label><input type="color" id="accent" value="#667eea">
</div>
</div>
<h2>Preview</h2>
<div class="preview-box" id="preview"></div>
<h2>HTML</h2><div class="output-block"><textarea id="htmlOut" readonly></textarea><button class="copy-btn" onclick="copyText('htmlOut')">Copy HTML</button></div>
<h2>CSS</h2><div class="output-block"><textarea id="cssOut" readonly></textarea><button class="copy-btn" onclick="copyText('cssOut')">Copy CSS</button></div>
</div>
</main>
<script src="/assets/app.js"></script>
<script>
var items5=[['📁 src','','folder'],['  📄 index.js','js','file'],['  📄 utils.js','js','file'],['📁 public','','folder'],['  🖼️ logo.png','png','file']];
var items8=[['📁 src','','folder'],['  📄 index.js','js','file'],['  📄 utils.js','js','file'],['  📄 config.js','js','file'],['📁 public','','folder'],['  🖼️ logo.png','png','file'],['  📄 favicon.ico','ico','file'],['📄 package.json','json','file']];
var items12=[['📁 src','','folder'],['  📄 index.js','js','file'],['  📄 utils.js','js','file'],['  📄 config.js','js','file'],['  📁 components','','folder'],['    📄 Header.js','js','file'],['    📄 Footer.js','js','file'],['📁 public','','folder'],['  🖼️ logo.png','png','file'],['  📄 favicon.ico','ico','file'],['📄 package.json','json','file'],['📄 README.md','md','file']];
function update(){
var theme=document.getElementById('theme').value,count=parseInt(document.getElementById('itemCount').value);
var ac=document.getElementById('accent').value;
var items=count===5?items5:count===8?items8:items12;
var bg,text,accent;
if(theme==='light'){bg='#f5f5f5';text='#333'}else if(theme==='mono'){bg='#1e1e1e';text='#999'}else{bg='#1a1a2e';text='#ccc'}
var html='<div class="file-tree">\n';
items.forEach(function(it){
var indent=(it[0].match(/  /g)||[]).length;
html+='  <div class="tree-item" style="margin-left:'+(indent*20)+'px">'+it[0]+'</div>\n';
});
html+='</div>';
var css='.file-tree{background:'+bg+';border-radius:10px;padding:12px;color:'+text+';font-family:monospace;font-size:14px}\n';
css+='.tree-item{display:flex;align-items:center;gap:6px;padding:4px 8px;border-radius:6px;cursor:pointer}\n';
css+='.tree-item:hover{background:'+ac+'33}';
document.getElementById('htmlOut').value=html;
document.getElementById('cssOut').value=css;
document.getElementById('preview').innerHTML='<style>'+css+'<\/style>'+html;
}
function copyText(id){var t=document.getElementById(id);t.select();document.execCommand('copy')}
document.querySelectorAll('select,input').forEach(function(e){e.addEventListener('input',update);e.addEventListener('change',update)});
update();
</script>
</body>
</html>
