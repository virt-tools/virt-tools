<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <script src="/assets/theme-init.js"></script>
  <title>QR Code Generator — Virtual Tools</title>
  <link rel="stylesheet" href="/assets/style.css">
  <style>
    .vt-layout{max-width:640px;margin:20px auto;}
    textarea{width:100%;min-height:80px;box-sizing:border-box;font-family:monospace;font-size:14px;padding:10px;border:1px solid var(--border,#2a2f3a);border-radius:8px;background:var(--bg,#1a1a2e);color:var(--text,#e0e0e0);resize:vertical;}
    select,input[type="number"],input[type="color"]{font-size:13px;padding:4px 8px;background:var(--bg,#1a1a2e);color:var(--text,#e0e0e0);border:1px solid var(--border,#2a2f3a);border-radius:4px;}
    .vt-row{display:flex;gap:12px;align-items:center;flex-wrap:wrap;margin:12px 0;}
    canvas{display:block;margin:16px auto;border-radius:8px;image-rendering:pixelated;}
    #qrResult{text-align:center;}
    .vt-err{color:#e74c3c;font-size:13px;}
  </style>
</head>
<body>
  <div id="site-header"></div>
  <main>
    <div class="tool-header">
      <a class="back" href="/">← All tools</a>
      <h1>QR Code Generator</h1>
      <p>Generate QR codes for URLs, text, Wi-Fi, contact info and more — entirely in your browser. Customize size, colors, and error correction. Download as PNG or SVG.</p>
    </div>

    <div class="vt-layout">
      <label style="font-size:13px;">Content:</label>
      <textarea id="input" placeholder="Enter text, URL, or any content...">https://virt.tools</textarea>

      <div class="vt-row">
        <label>Error correction:
          <select id="ecl">
            <option value="L">Low (7%)</option>
            <option value="M" selected>Medium (15%)</option>
            <option value="Q">Quartile (25%)</option>
            <option value="H">High (30%)</option>
          </select>
        </label>
        <label>Module size (px):
          <input type="number" id="scale" value="8" min="2" max="40">
        </label>
        <label>Margin:
          <input type="number" id="margin" value="4" min="0" max="20">
        </label>
      </div>

      <div class="vt-row">
        <label>Foreground: <input type="color" id="fgColor" value="#000000"></label>
        <label>Background: <input type="color" id="bgColor" value="#ffffff"></label>
        <button id="downloadPng">Download PNG</button>
        <button id="downloadSvg">Download SVG</button>
      </div>

      <div id="qrResult">
        <canvas id="canvas"></canvas>
        <div id="qrInfo" style="opacity:.5;font-size:12px;margin-top:4px;"></div>
        <div id="qrError" class="vt-err" style="display:none;"></div>
      </div>
    </div>
  </main>

  <script src="/assets/app.js"></script>
  <script src="/vendor/qrgen.min.js"></script>
  <script>
  (function(){
    var d=document;
    var canvas=d.getElementById("canvas");
    var ctx=canvas.getContext("2d");
    var currentQR=null;

    function generate(){
      var text=d.getElementById("input").value;
      var ecl=d.getElementById("ecl").value;
      var scale=parseInt(d.getElementById("scale").value)||8;
      var margin=parseInt(d.getElementById("margin").value)||4;
      var fg=d.getElementById("fgColor").value;
      var bg=d.getElementById("bgColor").value;
      var err=d.getElementById("qrError");
      err.style.display="none";
      err.textContent="";

      if(!text){ctx.clearRect(0,0,canvas.width,canvas.height);return;}

      try{
        var qr=qrgen(text,{ecl:ecl});
        currentQR=qr;
        var size=qr.size+margin*2;
        canvas.width=size*scale;
        canvas.height=size*scale;
        ctx.fillStyle=bg;
        ctx.fillRect(0,0,canvas.width,canvas.height);
        ctx.fillStyle=fg;
        for(var r=0;r<qr.size;r++){
          for(var c=0;c<qr.size;c++){
            if(qr.get(r,c)){
              ctx.fillRect((c+margin)*scale,(r+margin)*scale,scale,scale);
            }
          }
        }
        d.getElementById("qrInfo").textContent="Version "+qr.version+" · "+qr.size+"×"+qr.size+" modules · "+text.length+" chars";
      }catch(e){
        err.textContent="Error: "+e.message;
        err.style.display="";
        ctx.clearRect(0,0,canvas.width,canvas.height);
      }
    }

    d.getElementById("input").addEventListener("input",generate);
    d.getElementById("ecl").addEventListener("change",generate);
    d.getElementById("scale").addEventListener("input",generate);
    d.getElementById("margin").addEventListener("input",generate);
    d.getElementById("fgColor").addEventListener("input",generate);
    d.getElementById("bgColor").addEventListener("input",generate);

    d.getElementById("downloadPng").addEventListener("click",function(){
      if(!currentQR)return;
      canvas.toBlob(function(blob){
        var a=d.createElement("a");
        a.href=URL.createObjectURL(blob);
        a.download="qrcode.png";
        a.click();
      });
    });

    d.getElementById("downloadSvg").addEventListener("click",function(){
      if(!currentQR)return;
      var qr=currentQR;
      var scale=parseInt(d.getElementById("scale").value)||8;
      var margin=parseInt(d.getElementById("margin").value)||4;
      var fg=d.getElementById("fgColor").value;
      var bg=d.getElementById("bgColor").value;
      var size=qr.size+margin*2;
      var px=scale;
      var svg='<svg xmlns="http://www.w3.org/2000/svg" width="'+(size*px)+'" height="'+(size*px)+'" viewBox="0 0 '+size+' '+size+'">';
      svg+='<rect width="'+size+'" height="'+size+'" fill="'+bg+'"/>';
      for(var r=0;r<qr.size;r++){
        for(var c=0;c<qr.size;c++){
          if(qr.get(r,c)){
            svg+='<rect x="'+(c+margin)+'" y="'+(r+margin)+'" width="1" height="1" fill="'+fg+'"/>';
          }
        }
      }
      svg+='</svg>';
      var blob=new Blob([svg],{type:"image/svg+xml"});
      var a=d.createElement("a");
      a.href=URL.createObjectURL(blob);
      a.download="qrcode.svg";
      a.click();
    });

    generate();
  })();
  </script>
</body>
</html>
