<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="/assets/theme-init.js"></script>
<title>CSS Flip Card Generator — Virtual Tools</title>
<link rel="stylesheet" href="/assets/style.css">
<style>
.tool-wrap{max-width:800px;margin:0 auto;}
.tool-desc{font-size:14px;color:var(--text-secondary,#aaa);margin:8px 0 20px;}
.controls{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin:12px 0;}
.ctrl{display:flex;flex-direction:column;gap:4px;}
.ctrl label{font-size:12px;color:var(--text-secondary,#888);}
.ctrl input,.ctrl select{padding:6px 8px;border-radius:6px;border:1px solid var(--border,#444);background:var(--bg,#1e2230);color:var(--text,#eee);font-size:13px;font-family:inherit;}
button.action{padding:8px 16px;border-radius:6px;border:1px solid var(--border,#444);background:var(--card,#2a2f3e);color:var(--text,#eee);cursor:pointer;font-size:13px;margin:4px 4px 0 0;}
.preview{border:1px solid var(--border,#444);border-radius:8px;margin:12px 0;overflow:hidden;background:#0a0a1a;padding:40px 20px;min-height:280px;display:flex;justify-content:center;align-items:center;perspective:1000px;}
.code-block{background:var(--bg,#1e2230);border:1px solid var(--border,#444);border-radius:8px;padding:12px;margin:8px 0;font-family:monospace;font-size:11px;color:var(--text,#eee);white-space:pre-wrap;word-break:break-all;max-height:400px;overflow:auto;}
.flip-card{width:240px;height:160px;perspective:1000px;cursor:pointer;}
.flip-inner{position:relative;width:100%;height:100%;transition:transform .6s;transform-style:preserve-3d;}
.flip-card:hover .flip-inner,.flip-card.flip-active .flip-inner{transform:rotateY(180deg);}
.flip-front,.flip-back{position:absolute;inset:0;backface-visibility:hidden;border-radius:10px;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:16px;text-align:center;}
.flip-front{background:#6c5ce7;color:#fff;}
.flip-back{background:#00cec9;color:#fff;transform:rotateY(180deg);}
.flip-title{font-size:18px;font-weight:700;margin-bottom:4px;}
.flip-text{font-size:13px;opacity:.9;}
</style>
</head>
<body>
<header id="site-header"></header>
<main>
<div class="tool-wrap">
<h1>🔄 CSS Flip Card Generator</h1>
<p class="tool-desc">Create CSS 3D flip cards that rotate on hover. Front and back content, custom colors, 3 sizes. Copy HTML+CSS.</p>
<div class="controls">
<div class="ctrl"><label>Card Size</label><select id="size" onchange="render()">
<option value="small">Small (200x140)</option>
<option value="medium" selected>Medium (240x160)</option>
<option value="large">Large (300x200)</option>
</select></div>
<div class="ctrl"><label>Flip Trigger</label><select id="trigger" onchange="render()">
<option value="hover" selected>Hover</option>
<option value="click">Click</option>
</select></div>
<div class="ctrl"><label>Front Color</label><input type="color" id="frontCol" value="#6c5ce7" oninput="render()"></div>
<div class="ctrl"><label>Back Color</label><input type="color" id="backCol" value="#00cec9" oninput="render()"></div>
<div class="ctrl"><label>Front Title</label><input type="text" id="frontTitle" value="Hover Me" oninput="render()"></div>
<div class="ctrl"><label>Front Text</label><input type="text" id="frontText" value="Flip to see back" oninput="render()"></div>
<div class="ctrl"><label>Back Title</label><input type="text" id="backTitle" value="Surprise!" oninput="render()"></div>
<div class="ctrl"><label>Back Text</label><input type="text" id="backText" value="This is the back side" oninput="render()"></div>
</div>
<div style="margin:8px 0;"><button class="action" onclick="copyCode()">Copy HTML+CSS</button></div>
<div class="preview" id="prev"></div>
<div class="code-block" id="code"></div>
</div>
</div>
</main>
<script src="/assets/app.js"></script>
<script>
let codeText='';
const SIZES={'small':'200px','medium':'240px','large':'300px'};
const HEIGHTS={'small':'140px','medium':'160px','large':'200px'};
function v(id){return document.getElementById(id).value;}
function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function render(){
const sz=v('size'),trig=v('trigger'),fc=v('frontCol'),bc=v('backCol');
const ft=esc(v('frontTitle')),fx=esc(v('frontText')),bt=esc(v('backTitle')),bx=esc(v('backText'));
const w=SIZES[sz],h=HEIGHTS[sz];
const trigClass=trig==='click'?'flip-active':'';
const trigCss=trig==='hover'?'.flip-card:hover .flip-inner{transform:rotateY(180deg);}':'.flip-card.flip-active .flip-inner{transform:rotateY(180deg);}';
let p=document.getElementById('prev');
p.innerHTML=`<div class="flip-card ${trigClass}" style="width:${w};height:${h};" ${trig==='click'?'onclick="this.classList.toggle(\'flip-active\')"':''}>
<div class="flip-inner"><div class="flip-front" style="background:${fc};"><div class="flip-title">${ft}</div><div class="flip-text">${fx}</div></div>
<div class="flip-back" style="background:${bc};"><div class="flip-title">${bt}</div><div class="flip-text">${bx}</div></div></div></div>`;
let css=`.flip-card{width:${w};height:${h};perspective:1000px;cursor:pointer;}
.flip-inner{position:relative;width:100%;height:100%;transition:transform .6s;transform-style:preserve-3d;}
${trigCss}
.flip-front,.flip-back{position:absolute;inset:0;backface-visibility:hidden;border-radius:10px;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:16px;text-align:center;}
.flip-front{background:${fc};color:#fff;}
.flip-back{background:${bc};color:#fff;transform:rotateY(180deg);}
.flip-title{font-size:18px;font-weight:700;margin-bottom:4px;}
.flip-text{font-size:13px;opacity:.9;}`;
let html=`<div class="flip-card"${trig==='click'?' onclick="this.classList.toggle(\'flip-active\')"':''}>
  <div class="flip-inner">
    <div class="flip-front">
      <div class="flip-title">${ft}</div>
      <div class="flip-text">${fx}</div>
    </div>
    <div class="flip-back">
      <div class="flip-title">${bt}</div>
      <div class="flip-text">${bx}</div>
    </div>
  </div>
</div>`;
codeText=`<style>\n${css}\n</style>\n\n${html}`;
document.getElementById('code').textContent=codeText;
}
function copyCode(){navigator.clipboard.writeText(codeText).then(()=>alert('Copied!'));}
render();
</script>
</body>
</html>
