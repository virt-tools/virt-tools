<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="/assets/theme-init.js"></script>
<title>Monthly Calendar — Virtual Tools</title>
<link rel="stylesheet" href="/assets/style.css">
<style>
.tool-wrap{max-width:700px;margin:0 auto;}
.tool-desc{font-size:14px;color:var(--text-secondary,#aaa);margin:8px 0 16px;}
.cal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;}
.cal-header h2{font-size:20px;margin:0;}
.cal-header button{padding:8px 16px;border-radius:8px;border:1px solid var(--border,#444);background:var(--bg,#2a2f3e);color:var(--text,#eee);cursor:pointer;font-size:14px;}
.cal-header button:hover{border-color:var(--accent,#5b8def);}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;}
.cal-dow{text-align:center;font-size:12px;font-weight:bold;color:var(--text-secondary,#888);padding:8px 4px;}
.cal-day{min-height:80px;border-radius:8px;border:1px solid var(--border,#333);background:var(--bg-alt,#1a1f2e);padding:6px;font-size:12px;cursor:pointer;position:relative;}
.cal-day:hover{border-color:var(--accent,#5b8def);}
.cal-day.empty{border:none;background:none;cursor:default;}
.cal-day.today{border-color:var(--accent,#5b8def);background:rgba(91,141,239,0.1);}
.cal-day .num{font-weight:bold;font-size:13px;}
.cal-day .evts{margin-top:4px;font-size:11px;color:var(--text-secondary,#aaa);line-height:1.3;}
.cal-day .dot{display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--accent,#5b8def);margin-right:3px;}
.modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:100;align-items:center;justify-content:center;}
.modal.open{display:flex;}
.modal-box{background:var(--bg,#2a2f3e);border-radius:12px;padding:24px;max-width:400px;width:90%;}
.modal-box h3{margin:0 0 12px;}
.modal-box textarea{width:100%;min-height:80px;padding:10px;border-radius:8px;border:1px solid var(--border,#444);background:var(--bg-alt,#1a1f2e);color:var(--text,#eee);font-size:14px;resize:vertical;}
.modal-box .btns{display:flex;gap:8px;margin-top:16px;justify-content:flex-end;}
.btn{padding:10px 20px;border-radius:8px;border:none;background:var(--accent,#5b8def);color:#fff;cursor:pointer;font-size:14px;}
.btn:hover{opacity:0.9;}
.btn.secondary{background:var(--bg-alt,#1a1f2e);border:1px solid var(--border,#444);color:var(--text,#eee);}
.btn.danger{background:#e74c3c;}
.legend{display:flex;gap:16px;margin-top:16px;font-size:12px;color:var(--text-secondary,#888);justify-content:center;}
</style>
</head>
<body>
<header id="site-header"></header>
<main>
<div class="tool-wrap">
<h1>Monthly Calendar 📅</h1>
<p class="tool-desc">View any month, add notes to dates, and track events. All data stored locally in your browser.</p>
<div class="cal-header">
<button onclick="prevMonth()">‹</button>
<h2 id="monthLabel"></h2>
<button onclick="nextMonth()">›</button>
</div>
<div class="cal-grid" id="dowRow"></div>
<div class="cal-grid" id="calGrid"></div>
<div class="legend"><span>• Click a day to add notes</span><span>• Blue border = today</span></div>
</div>
</main>
<div class="modal" id="modal">
<div class="modal-box">
<h3 id="modalDate"></h3>
<textarea id="modalText" placeholder="Add notes for this date..."></textarea>
<div class="btns">
<button class="btn danger" onclick="deleteNote()">Delete</button>
<button class="btn secondary" onclick="closeModal()">Cancel</button>
<button class="btn" onclick="saveNote()">Save</button>
</div>
</div>
</div>
<script src="/assets/app.js"></script>
<script>
const KEY='cal_notes_v1';const DOW=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
const MONTHS=['January','February','March','April','May','June','July','August','September','October','November','December'];
let curYear=new Date().getFullYear();let curMonth=new Date().getMonth();let selDate='';
function load(){try{return JSON.parse(localStorage.getItem(KEY))||{};}catch(e){return{};}}
function save(d){localStorage.setItem(KEY,JSON.stringify(d));}
function dk(y,m,d){return`${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;}
function render(){
document.getElementById('monthLabel').textContent=MONTHS[curMonth]+' '+curYear;
const dowRow=document.getElementById('dowRow');dowRow.innerHTML='';
DOW.forEach(d=>{dowRow.innerHTML+=`<div class="cal-dow">${d}</div>`;});
const grid=document.getElementById('calGrid');grid.innerHTML='';
const first=new Date(curYear,curMonth,1).getDay();
const days=new Date(curYear,curMonth+1,0).getDate();
const today=new Date();const isThisMonth=today.getFullYear()===curYear&&today.getMonth()===curMonth;
const d=load();
for(let i=0;i<first;i++)grid.innerHTML+='<div class="cal-day empty"></div>';
for(let day=1;day<=days;day++){
const k=dk(curYear,curMonth,day);const note=d[k]||'';
const isToday=isThisMonth&&day===today.getDate();
const preview=note?note.substring(0,30)+(note.length>30?'…':''):'';
const dot=note?'<span class="dot"></span>':'';
grid.innerHTML+=`<div class="cal-day${isToday?' today':''}" onclick="openModal('${k}')"><div class="num">${dot}${day}</div><div class="evts">${preview.replace(/</g,'&lt;')}</div></div>`;
}
}
function openModal(k){selDate=k;document.getElementById('modalDate').textContent=k;document.getElementById('modalText').value=load()[k]||'';document.getElementById('modal').classList.add('open');}
function closeModal(){document.getElementById('modal').classList.remove('open');}
function saveNote(){const txt=document.getElementById('modalText').value.trim();const d=load();if(txt)d[selDate]=txt;else delete d[selDate];save(d);closeModal();render();}
function deleteNote(){const d=load();delete d[selDate];save(d);closeModal();render();}
function prevMonth(){curMonth--;if(curMonth<0){curMonth=11;curYear--;}render();}
function nextMonth(){curMonth++;if(curMonth>11){curMonth=0;curYear++;}render();}
document.getElementById('modal').addEventListener('click',e=>{if(e.target.id==='modal')closeModal();});
render();
</script>
</body>
</html>
