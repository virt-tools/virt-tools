<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="/assets/theme-init.js"></script>
<title>Emoji Translator — Virtual Tools</title>
<link rel="stylesheet" href="/assets/style.css">
<style>
.tool-wrap{max-width:600px;margin:0 auto;}
.mode-tabs{display:flex;gap:8px;margin:10px 0;}
.mode-tab{padding:8px 18px;border-radius:8px;border:1px solid var(--border,#333);background:var(--bg-alt,#1a1f2e);color:var(--text,#e0e0e0);cursor:pointer;font-size:14px;}
.mode-tab.active{background:#1565c0;color:#fff;border-color:#1565c0;}
textarea{width:100%;min-height:100px;padding:12px;border-radius:8px;border:1px solid var(--border,#333);background:var(--bg,#0d1117);color:var(--text,#e0e0e0);font-size:16px;font-family:inherit;box-sizing:border-box;resize:vertical;}
.label-row{display:flex;justify-content:space-between;align-items:center;margin:10px 0 4px;}
.label-row label{font-size:14px;font-weight:600;}
.out{min-height:100px;padding:12px;border-radius:8px;border:1px solid var(--border,#333);background:var(--bg-alt,#1a1f2e);font-size:18px;line-height:1.5;white-space:pre-wrap;word-break:break-word;}
.dict-hint{font-size:13px;color:var(--text-dim,#888);margin:4px 0 8px;}
.copy-btn{padding:6px 14px;border-radius:6px;border:1px solid var(--border,#333);background:var(--bg-alt);color:var(--text);cursor:pointer;font-size:13px;margin:8px 0;}
.swap-btn{display:block;margin:8px auto;padding:6px 16px;border-radius:6px;border:1px solid var(--border,#333);background:var(--bg-alt);color:var(--text);cursor:pointer;font-size:14px;}
.dict-section{margin:20px 0;padding:12px;border-radius:8px;background:var(--bg-alt,#1a1f2e);border:1px solid var(--border,#333);}
.dict-section h3{font-size:15px;margin:0 0 8px;}
.dict-grid{display:flex;flex-wrap:wrap;gap:6px;}
.dict-item{font-size:20px;padding:4px 8px;border-radius:4px;background:var(--bg);cursor:default;}
.dict-item span{font-size:12px;color:var(--text-dim);}
</style>
</head>
<body>
<header id="site-header"></header>
<main>
<div class="tool-wrap">
<h1>Emoji Translator</h1>
<p class="tool-desc">Translate text into emoji and back. 120+ word-to-emoji mappings. Fun for messages, social media, and creative writing. All client-side.</p>

<div class="mode-tabs">
<button class="mode-tab active" onclick="setMode('toEmoji')" id="tabToEmoji">Text → Emoji</button>
<button class="mode-tab" onclick="setMode('toText')" id="tabToText">Emoji → Text</button>
</div>

<div class="label-row"><label id="inLabel">Enter your text</label></div>
<textarea id="inputText" placeholder="Type something here..." oninput="translate()"></textarea>

<button class="swap-btn" onclick="swap()">&#8593;&#8595; Swap</button>

<div class="label-row"><label id="outLabel">Emoji translation</label><button class="copy-btn" onclick="copyOut()">Copy</button></div>
<div class="out" id="outputText">emoji translation will appear here...</div>

<div class="dict-section">
<h3>Emoji Dictionary (tap to add to input)</h3>
<div class="dict-grid" id="dictGrid"></div>
</div>
</div>
</main>
<script src="/assets/app.js"></script>
<script>
const DICT={
"happy":"😀","sad":"😢","love":"❤️","heart":"❤️","angry":"😠","mad":"😠","smile":"😄","laugh":"😂","cry":"😭",
"sun":"☀️","moon":"🌙","star":"⭐","cloud":"☁️","rain":"🌧️","snow":"❄️","storm":"⛈️","fire":"🔥","water":"💧",
"cat":"🐱","dog":"🐶","bird":"🐦","fish":"🐟","horse":"🐴","cow":"🐮","pig":"🐷","frog":"🐸","bear":"🐻",
"apple":"🍎","banana":"🍌","pizza":"🍕","burger":"🍔","cake":"🍰","coffee":"☕","beer":"🍺","wine":"🍷","bread":"🍞",
"car":"🚗","bus":"🚌","plane":"✈️","train":"🚂","bike":"🚲","boat":"⛵","rocket":"🚀","truck":"🚚","taxi":"🚕",
"phone":"📱","computer":"💻","tv":"📺","camera":"📷","book":"📖","pen":"✏️","clock":"⏰","game":"🎮","music":"🎵",
"money":"💰","dollar":"💵","bank":"🏦","store":"🏪","school":"🏫","hospital":"🏥","church":"⛪","park":"🏞️","city":"🌆",
"run":"🏃","walk":"🚶","dance":"💃","sleep":"😴","eat":"🍽️","drink":"🥤","read":"📚","write":"✍️","think":"🤔",
"yes":"✅","no":"❌","ok":"👌","cool":"😎","hot":"🥵","cold":"🥶","tired":"😴","sick":"🤒","confused":"😕",
"king":"👑","queen":"👸","baby":"👶","ghost":"👻","alien":"👽","robot":"🤖","clown":"🤡","ninja":"🥷","zombie":"🧟",
"music":"🎶","art":"🎨","movie":"🎬","party":"🎉","gift":"🎁","balloon":"🎈","cake":"🎂","flower":"🌸","tree":"🌳",
"time":"⏰","day":"📅","week":"📅","month":"📆","year":"🎉","morning":"🌅","evening":"🌆","night":"🌃","weekend":"🎊",
"good":"👍","bad":"👎","best":"🏆","winner":"🏆","loser":"😞","champion":"🥇","gold":"🥇","silver":"🥈","bronze":"🥉",
"earth":"🌍","space":"🌌","ocean":"🌊","mountain":"⛰️","beach":"🏖️","forest":"🌲","desert":"🏜️","island":"🏝️","river":"🏞️",
"hello":"👋","bye":"👋","thanks":"🙏","please":"🥺","sorry":"😔","wow":"😮","oops":"😅","lol":"🤣","omg":"😱",
"burger":"🍔","hotdog":"🌭","taco":"🌮","sushi":"🍣","icecream":"🍦","cookie":"🍪","chocolate":"🍫","candy":"🍬","donut":"🍩",
"football":"⚽","basketball":"🏀","baseball":"⚾","tennis":"🎾","boxing":"🥊","golf":"⛳","swim":"🏊","ski":"⛷️","surf":"🏄",
"doctor":"👨‍⚕️","nurse":"👩‍⚕️","police":"👮","firefighter":"👨‍🚒","farmer":"👨‍🌾","chef":"👨‍🍳","artist":"👨‍🎨","scientist":"👨‍🔬","singer":"🎤",
"red":"🔴","blue":"🔵","green":"🟢","yellow":"🟡","purple":"🟣","orange":"🟠","black":"⚫","white":"⚪","brown":"🟤"
};

const EMOJI_TO_TEXT={};
Object.entries(DICT).forEach(([k,v])=>{if(!EMOJI_TO_TEXT[v])EMOJI_TO_TEXT[v]=k;});

let mode='toEmoji';

function setMode(m){
mode=m;
document.getElementById('tabToEmoji').classList.toggle('active',m==='toEmoji');
document.getElementById('tabToText').classList.toggle('active',m==='toText');
document.getElementById('inLabel').textContent=m==='toEmoji'?'Enter your text':'Enter emoji';
document.getElementById('outLabel').textContent=m==='toEmoji'?'Emoji translation':'Text translation';
translate();
}

function translate(){
const input=document.getElementById('inputText').value;
const out=document.getElementById('outputText');
if(!input.trim()){out.textContent=mode==='toEmoji'?'emoji translation will appear here...':'text translation will appear here...';return;}
if(mode==='toEmoji'){
let result=input;
Object.entries(DICT).sort((a,b)=>b[0].length-a[0].length).forEach(([word,emoji])=>{
const re=new RegExp('\\b'+word+'\\b','gi');
result=result.replace(re,emoji);
});
out.textContent=result;
}else{
let result=input;
Object.entries(EMOJI_TO_TEXT).forEach(([emoji,word])=>{
result=result.split(emoji).join(' '+word+' ');
});
out.textContent=result.trim().replace(/\s+/g,' ');
}
}

function swap(){
const inp=document.getElementById('inputText');
const out=document.getElementById('outputText');
inp.value=out.textContent;
setMode(mode==='toEmoji'?'toText':'toEmoji');
}

function copyOut(){navigator.clipboard.writeText(document.getElementById('outputText').textContent);}

function init(){
const grid=document.getElementById('dictGrid');
Object.entries(DICT).slice(0,60).forEach(([word,emoji])=>{
const d=document.createElement('span');d.className='dict-item';
d.innerHTML=`${emoji} <span>${word}</span>`;
d.title=word;
d.style.cursor='pointer';
d.onclick=()=>{const inp=document.getElementById('inputText');inp.value+=emoji+' ';translate();};
grid.appendChild(d);
});
}
VT.ready(init);
</script>
</body>
</html>
