<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <script src="/assets/theme-init.js"></script>
  <title>JSONPath Evaluator — Virtual Tools</title>
  <link rel="stylesheet" href="/assets/style.css">
</head>
<body>
  <div id="site-header"></div>
  <main>
    <div class="tool-header">
      <a class="back" href="/">← All tools</a>
      <h1>JSONPath Evaluator</h1>
      <p>Run a JSONPath query against a JSON document and see the matches — entirely in your browser with jsonpath-plus. Nothing is uploaded.</p>
    </div>

    <div class="panel">
      <div class="field">
        <label for="json">JSON document</label>
        <textarea id="json" placeholder='{"store":{"book":[{"title":"A","price":10},{"title":"B","price":20}]}}' style="min-height:140px; font-family:monospace;"></textarea>
      </div>
      <div class="field">
        <label for="path">JSONPath expression</label>
        <input id="path" type="text" placeholder="$.store.book[?(@.price > 15)].title" style="font-family:monospace;">
      </div>
      <div class="row" style="align-items:center; flex-wrap:wrap;">
        <button id="eval">Evaluate</button>
        <button id="clear" class="secondary">Clear</button>
        <span class="note" style="margin-left:auto;">Examples:
          <a href="#" data-p="$.store.book[*].author" data-j='{"store":{"book":[{"author":"Nigel"},{"author":"Erik"}]}}'>authors</a>
          <a href="#" data-p="$..price" data-j='{"store":{"book":[{"price":8.95},{"price":22.99}],"bicycle":{"price":19.95}}}'>all prices</a>
          <a href="#" data-p="$.store.book[?(@.price &gt; 15)].title" data-j='{"store":{"book":[{"title":"A","price":10},{"title":"B","price":20}]}}'>filter</a>
        </span>
      </div>
      <div class="spacer"></div>
      <div class="row" style="justify-content:space-between;">
        <label for="out">Matches</label>
        <button id="copy" class="secondary" style="padding:4px 10px;">Copy</button>
      </div>
      <div class="output" id="out" style="white-space:pre-wrap; word-break:break-all;"></div>
      <p class="note" id="note">Parsed and evaluated locally. Supports $..recursive, [?()] filters, and wildcards.</p>
    </div>
  </main>

  <script src="/assets/app.js"></script>
  <script src="/vendor/jsonpath-plus.min.js"></script>
  <script>
  (function () {
    var jsonEl = document.getElementById("json");
    var pathEl = document.getElementById("path");
    var out = document.getElementById("out");
    var note = document.getElementById("note");
    var JP = window.JSONPath && window.JSONPath.JSONPath;

    function show(text, err) {
      out.textContent = text;
      out.style.color = err ? "var(--bad)" : "";
      note.textContent = err || "Parsed and evaluated locally. Supports $..recursive, [?()] filters, and wildcards.";
    }

    function run() {
      var j = jsonEl.value.trim();
      var p = pathEl.value.trim();
      if (!j) { show("", "Paste a JSON document first."); return; }
      if (!p) { show("", "Enter a JSONPath expression."); return; }
      if (!JP) { show("", "Error: jsonpath-plus failed to load."); return; }
      var obj;
      try { obj = JSON.parse(j); }
      catch (e) { show("", "Invalid JSON: " + (e.message || e)); return; }
      try {
        var res = JP({ path: p, json: obj, wrap: true });
        var n = Array.isArray(res) ? res.length : (res === undefined ? 0 : 1);
        show(JSON.stringify(res, null, 2), null);
        note.textContent = n + " match" + (n === 1 ? "" : "es") + " — evaluated locally.";
      } catch (e) {
        show("", "Error: " + (e.message || e));
      }
    }

    document.getElementById("eval").addEventListener("click", run);
    document.getElementById("clear").addEventListener("click", function () {
      jsonEl.value = ""; pathEl.value = ""; show("", null);
    });

    document.querySelectorAll("a[data-p]").forEach(function (a) {
      a.addEventListener("click", function (e) {
        e.preventDefault();
        jsonEl.value = a.getAttribute("data-j");
        pathEl.value = a.getAttribute("data-p");
        run();
      });
    });

    document.getElementById("copy").addEventListener("click", function () {
      var t = out.textContent;
      if (!t) return;
      var b = this;
      if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(t).then(function () {
          b.textContent = "Copied!"; setTimeout(function () { b.textContent = "Copy"; }, 1200);
        });
      } else {
        var ta = document.createElement("textarea");
        ta.value = t; document.body.appendChild(ta); ta.select();
        try { document.execCommand("copy"); b.textContent = "Copied!"; setTimeout(function () { b.textContent = "Copy"; }, 1200); }
        catch (e) {}
        ta.remove();
      }
    });
  })();
  </script>
</body>
</html>
