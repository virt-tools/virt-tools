<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CSS Status Indicator Generator — virt.tools</title>
<link rel="stylesheet" href="/assets/style.css">
<style>
.tool-area{max-width:900px;margin:2rem auto;padding:0 1rem}
.controls{display:grid;gap:1rem;margin:1.5rem 0;padding:1.5rem;background:#1a1a2e;border-radius:12px}
.ctrl-row{display:flex;gap:1rem;align-items:center;flex-wrap:wrap;margin-bottom:.5rem}
.ctrl-row label{font-weight:600;font-size:.9rem;min-width:120px}
.ctrl-row select,.ctrl-row input{padding:.5rem;border-radius:8px;border:1px solid #444;background:#0f0f1e;color:#eee}
.preview-box{margin:1.5rem 0;border-radius:12px;padding:3rem 1.5rem;background:#111;min-height:200px;display:flex;align-items:center;justify-content:center;gap:2rem;flex-wrap:wrap;overflow:auto}
.output-block{margin:2rem 0}
.output-block textarea{width:100%;min-height:80px;font-family:monospace;font-size:.85rem;padding:1rem;border-radius:8px;border:1px solid #444;background:#0f0f1e;color:#eee;resize:vertical}
.copy-btn{padding:.6rem 1.2rem;border:none;border-radius:8px;background:#667eea;color:#fff;cursor:pointer;font-size:.9rem;margin-top:.5rem}
h2{margin-top:2rem;font-size:1.2rem}
</style>
</head>
<body>
<header id="site-header"></header>
<main>
<div class="tool-area">
<h1>🟢 CSS Status Indicator Generator</h1>
<p>Create CSS status indicator dot badges (online/offline/busy/away). 4 styles, pulse animation, custom colors. Copy HTML+CSS.</p>
<div class="controls">
<div class="ctrl-row">
<label>Status</label><select id="status"><option value="online" selected>Online</option><option value="offline">Offline</option><option value="busy">Busy</option><option value="away">Away</option></select>
<label>Style</label><select id="style"><option value="dot" selected>Dot</option><option value="badge">Badge</option><option value="icon">Icon+Text</option><option value="ring">Ring</option></select>
</div>
<div class="ctrl-row">
<label>Pulse</label><select id="pulse"><option value="yes" selected>Yes</option><option value="no">No</option></select>
<label>Size</label><select id="size"><option value="sm">Small</option><option value="md" selected>Medium</option><option value="lg">Large</option></select>
<label>Online</label><input type="color" id="c1" value="#22c55e" style="width:40px;height:34px">
</div>
<div class="ctrl-row">
<label>Offline</label><input type="color" id="c2" value="#94a3b8" style="width:40px;height:34px">
<label>Busy</label><input type="color" id="c3" value="#ef4444" style="width:40px;height:34px">
<label>Away</label><input type="color" id="c4" value="#f59e0b" style="width:40px;height:34px">
</div>
<div class="ctrl-row"><button class="copy-btn" onclick="update()">Update</button></div>
</div>
<h2>Preview</h2>
<div class="preview-box" id="preview"></div>
<h2>HTML</h2><div class="output-block"><textarea id="htmlOut" readonly></textarea><button class="copy-btn" onclick="copyText('htmlOut')">Copy HTML</button></div>
<h2>CSS</h2><div class="output-block"><textarea id="cssOut" readonly></textarea><button class="copy-btn" onclick="copyText('cssOut')">Copy CSS</button></div>
</div>
</main>
<script src="/assets/app.js"></script>
<script>
function update(){
var status=document.getElementById('status').value;
var style=document.getElementById('style').value;
var pulse=document.getElementById('pulse').value==='yes';
var size=document.getElementById('size').value;
var colors={online:document.getElementById('c1').value,offline:document.getElementById('c2').value,busy:document.getElementById('c3').value,away:document.getElementById('c4').value};
var color=colors[status];
var sizes={sm:'8px',md:'12px',lg:'18px'};
var d=sizes[size];
var label=status.charAt(0).toUpperCase()+status.slice(1);
var html='<span class="status-indicator status-'+status+'">\n  <span class="status-dot"></span>\n  <span class="status-text">'+label+'</span>\n</span>';
var css='.status-indicator{\n  display:inline-flex;\n  align-items:center;\n  gap:6px;\n  font-size:14px;\n  color:#e2e8f0;\n}\n.status-dot{\n  width:'+d+';\n  height:'+d+';\n  border-radius:50%;\n  background:'+color+';\n  display:inline-block;\n  flex-shrink:0;\n'+(pulse? '  position:relative;\n}\n.status-dot::after{\n  content:"";\n  position:absolute;\n  inset:0;\n  border-radius:50%;\n  background:'+color+';\n  animation:pulse 1.5s ease-out infinite;\n}\n@keyframes pulse{\n  0%{transform:scale(1);opacity:.7}\n  100%{transform:scale(2.5);opacity:0}\n}':'}')+'\n.status-online .status-dot{background:'+colors.online+'}\n.status-offline .status-dot{background:'+colors.offline+'}\n.status-busy .status-dot{background:'+colors.busy+'}\n.status-away .status-dot{background:'+colors.away+'}';
if(style==='badge'){html='<span class="status-badge status-'+status+'">'+label+'</span>';css='.status-badge{\n  display:inline-flex;\n  align-items:center;\n  gap:4px;\n  padding:4px 12px;\n  border-radius:999px;\n  font-size:13px;\n  font-weight:600;\n  color:'+color+';\n  background:'+color+'22;\n}\n.status-badge::before{\n  content:"";\n  width:8px;\n  height:8px;\n  border-radius:50%;\n  background:'+color+';\n'+(pulse?'  animation:pulse 1.5s ease-out infinite;\n':'')+'}';
if(style==='ring'){html='<span class="status-ring status-'+status+'">\n  <span class="status-text">'+label+'</span>\n</span>';css='.status-ring{\n  display:inline-flex;\n  align-items:center;\n  gap:8px;\n  font-size:14px;\n  color:#e2e8f0;\n}\n.status-ring::before{\n  content:"";\n  width:'+d+';\n  height:'+d+';\n  border-radius:50%;\n  border:3px solid '+color+';\n  background:'+color+'33;\n'+(pulse?'  animation:ring-pulse 1.5s ease-out infinite;\n':'')+'}'+(pulse?'\n@keyframes ring-pulse{\n  0%{box-shadow:0 0 0 0 '+color+'77}\n  100%{box-shadow:0 0 0 8px '+color+'00}\n}':'');}
document.getElementById('htmlOut').value=html;
document.getElementById('cssOut').value=css;
var pv='<span style="display:inline-flex;align-items:center;gap:6px;font-size:14px;color:#e2e8f0"><span style="width:'+d+';height:'+d+';border-radius:50%;background:'+color+';display:inline-block'+(pulse?';animation:pulse 1.5s ease-out infinite':'')+'"></span>'+label+'</span>';
if(style==='badge')pv='<span style="display:inline-flex;align-items:center;gap:4px;padding:4px 12px;border-radius:999px;font-size:13px;font-weight:600;color:'+color+';background:'+color+'22"><span style="width:8px;height:8px;border-radius:50%;background:'+color+'"></span>'+label+'</span>';
if(style==='ring')pv='<span style="display:inline-flex;align-items:center;gap:8px;font-size:14px;color:#e2e8f0"><span style="width:'+d+';height:'+d+';border-radius:50%;border:3px solid '+color+';background:'+color+'33"></span>'+label+'</span>';
document.getElementById('preview').innerHTML=pv;
}
function copyText(id){var t=document.getElementById(id);t.select();document.execCommand('copy')}
['status','style','pulse','size','c1','c2','c3','c4'].forEach(function(id){var el=document.getElementById(id);el.addEventListener(el.tagName==='SELECT'||el.tagName==='SELECT'?'change':el.type==='color'?'input':'input',update)});
update();
</script>
</body>
</html>
