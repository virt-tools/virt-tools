<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <script src="/assets/theme-init.js"></script>
  <title>Invoice Generator — Virtual Tools</title>
  <link rel="stylesheet" href="/assets/style.css">
  <style>
    .inv-layout { display:grid; grid-template-columns: 380px 1fr; gap:18px; margin:14px 0; align-items:start; }
    @media (max-width:900px){ .inv-layout { grid-template-columns: 1fr; } }
    .inv-form { background:var(--bg-inset,#1e1e2e); border:1px solid var(--border,#2a2f3a); border-radius:10px; padding:16px; }
    .inv-form h3 { margin:0 0 10px; font-size:14px; opacity:.7; text-transform:uppercase; letter-spacing:.05em; }
    .inv-form label { display:block; font-size:12px; opacity:.6; margin:8px 0 3px; }
    .inv-form input, .inv-form textarea, .inv-form select {
      width:100%; box-sizing:border-box; font-size:13px; padding:7px 10px; border-radius:6px;
      border:1px solid var(--border,#2a2f3a); background:var(--bg,#16161e); color:var(--text,#e0e0e0);
    }
    .inv-form textarea { resize:vertical; min-height:60px; }
    .inv-form .row2 { display:grid; grid-template-columns:1fr 1fr; gap:8px; }
    .inv-form .row3 { display:grid; grid-template-columns:2fr 1fr 1fr; gap:6px; }
    .line-items { margin-top:8px; }
    .line-item { display:grid; grid-template-columns:2fr 1fr 1fr 28px; gap:6px; align-items:center; margin-bottom:5px; }
    .line-item input { font-size:12px; padding:5px 8px; }
    .line-item .rm { font-size:16px; padding:2px; line-height:1; text-align:center; }
    .btn-row { display:flex; gap:8px; flex-wrap:wrap; margin-top:14px; }
    .btn-row button { font-size:13px; }
    .inv-preview { background:#fff; color:#1a1a1a; border-radius:10px; padding:32px; min-height:600px; font-size:14px; line-height:1.5; box-shadow:0 4px 20px rgba(0,0,0,.15); }
    .inv-preview .inv-top { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:24px; }
    .inv-preview .inv-title { font-size:28px; font-weight:800; color:#333; }
    .inv-preview .inv-number { font-size:13px; color:#666; }
    .inv-preview .inv-parties { display:flex; justify-content:space-between; margin-bottom:24px; gap:20px; }
    .inv-preview .inv-party h4 { margin:0 0 6px; font-size:11px; text-transform:uppercase; letter-spacing:.05em; color:#888; }
    .inv-preview .inv-party p { margin:0 0 2px; font-size:13px; }
    .inv-preview table { width:100%; border-collapse:collapse; margin:16px 0; }
    .inv-preview th { text-align:left; font-size:11px; text-transform:uppercase; letter-spacing:.05em; color:#888; padding:8px 6px; border-bottom:2px solid #e0e0e0; }
    .inv-preview td { padding:8px 6px; border-bottom:1px solid #eee; font-size:13px; }
    .inv-preview td.num { text-align:right; font-variant-numeric:tabular-nums; }
    .inv-preview .inv-totals { margin-left:auto; width:260px; margin-top:12px; }
    .inv-preview .inv-totals .total-row { display:flex; justify-content:space-between; padding:4px 0; font-size:13px; }
    .inv-preview .inv-totals .grand { font-weight:800; font-size:16px; border-top:2px solid #333; margin-top:6px; padding-top:8px; }
    .inv-preview .inv-meta { margin-top:28px; padding-top:16px; border-top:1px solid #eee; font-size:12px; color:#666; }
    .inv-preview .accent { color:#2563eb; }
    .add-item { font-size:12px; margin-top:6px; }
    .color-row { display:flex; align-items:center; gap:8px; }
    .color-row input[type=color] { width:36px; height:30px; border:none; border-radius:6px; cursor:pointer; background:none; padding:0; }
  </style>
</head>
<body>
  <div id="site-header"></div>
  <main>
    <div class="tool-header">
      <a class="back" href="/">← All tools</a>
      <h1>Invoice Generator</h1>
      <p>Create professional invoices entirely in your browser. Fill in the form, preview the live invoice, then print to PDF or download as HTML. No data leaves your device.</p>
    </div>

    <div class="inv-layout">
      <!-- FORM -->
      <div class="inv-form">
        <h3>Your Business</h3>
        <input type="text" id="bizName" placeholder="Business name" value="Your Company LLC">
        <label>Address</label>
        <textarea id="bizAddr" rows="3">123 Main Street&#10;City, ST 12345&#10;United States</textarea>
        <label>Email</label>
        <input type="text" id="bizEmail" value="billing@yourcompany.com">
        <label>Phone</label>
        <input type="text" id="bizPhone" value="+1 (555) 123-4567">

        <h3 style="margin-top:16px;">Bill To</h3>
        <input type="text" id="clientName" placeholder="Client name" value="Acme Corp">
        <label>Address</label>
        <textarea id="clientAddr" rows="3">456 Oak Avenue&#10;Somewhere, CA 90210&#10;United States</textarea>

        <h3 style="margin-top:16px;">Invoice Details</h3>
        <div class="row2">
          <div><label>Invoice #</label><input type="text" id="invNum" value="INV-0001"></div>
          <div><label>Date</label><input type="date" id="invDate"></div>
        </div>
        <div class="row2">
          <div><label>Due date</label><input type="date" id="dueDate"></div>
          <div><label>Currency</label>
            <select id="currency">
              <option value="$">$ — USD</option>
              <option value="€">€ — EUR</option>
              <option value="£">£ — GBP</option>
              <option value="¥">¥ — JPY</option>
              <option value="₹">₹ — INR</option>
              <option value="C$">C$ — CAD</option>
              <option value="A$">A$ — AUD</option>
              <option value="CHF">CHF</option>
              <option value="kr">kr — SEK</option>
            </select>
          </div>
        </div>
        <div class="row2">
          <div><label>Tax rate (%)</label><input type="number" id="taxRate" value="0" min="0" step="0.01"></div>
          <div><label>Discount (%)</label><input type="number" id="discRate" value="0" min="0" max="100" step="0.01"></div>
        </div>
        <label>Notes</label>
        <textarea id="notes" rows="2">Payment due within 30 days. Thank you for your business!</textarea>

        <h3 style="margin-top:16px;">Line Items</h3>
        <div class="line-items" id="lineItems">
          <div class="line-item">
            <input type="text" class="li-desc" value="Web design services" placeholder="Description">
            <input type="number" class="li-qty" value="1" min="0" step="1">
            <input type="number" class="li-price" value="1500" min="0" step="0.01">
            <button class="rm secondary">×</button>
          </div>
          <div class="line-item">
            <input type="text" class="li-desc" value="Hosting (12 months)" placeholder="Description">
            <input type="number" class="li-qty" value="12" min="0" step="1">
            <input type="number" class="li-price" value="25" min="0" step="0.01">
            <button class="rm secondary">×</button>
          </div>
        </div>
        <button class="add-item secondary" id="addItem">+ Add line item</button>

        <div class="btn-row">
          <button id="printBtn">Print / Save PDF</button>
          <button id="downloadBtn" class="secondary">Download HTML</button>
        </div>
        <div class="color-row" style="margin-top:10px;">
          <label style="margin:0;">Accent color</label>
          <input type="color" id="accentColor" value="#2563eb">
        </div>
      </div>

      <!-- PREVIEW -->
      <div class="inv-preview" id="preview">
      </div>
    </div>
  </main>

  <script src="/assets/app.js"></script>
  <script>
  (function () {
    var d = document;
    var today = new Date().toISOString().slice(0, 10);
    var in30 = new Date(Date.now() + 30 * 864e5).toISOString().slice(0, 10);
    d.getElementById("invDate").value = today;
    d.getElementById("dueDate").value = in30;

    function fmt(n) {
      return Number(n).toLocaleString("en-US", { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    }

    function getItems() {
      var rows = d.querySelectorAll("#lineItems .line-item");
      var items = [];
      rows.forEach(function (r) {
        var desc = r.querySelector(".li-desc").value || "";
        var qty = parseFloat(r.querySelector(".li-qty").value) || 0;
        var price = parseFloat(r.querySelector(".li-price").value) || 0;
        if (desc || qty || price) items.push({ desc: desc, qty: qty, price: price, total: qty * price });
      });
      return items;
    }

    function render() {
      var cur = d.getElementById("currency").value;
      var accent = d.getElementById("accentColor").value;
      var items = getItems();
      var subtotal = items.reduce(function (s, i) { return s + i.total; }, 0);
      var discRate = parseFloat(d.getElementById("discRate").value) || 0;
      var discount = subtotal * discRate / 100;
      var taxedBase = subtotal - discount;
      var taxRate = parseFloat(d.getElementById("taxRate").value) || 0;
      var tax = taxedBase * taxRate / 100;
      var grand = taxedBase + tax;

      var rowsHTML = items.map(function (i) {
        return "<tr><td>" + esc(i.desc) + "</td><td class='num'>" + i.qty + "</td><td class='num'>" + cur + fmt(i.price) + "</td><td class='num'>" + cur + fmt(i.total) + "</td></tr>";
      }).join("");

      d.getElementById("preview").innerHTML =
        '<div class="inv-top">' +
          '<div><div class="inv-title" style="color:' + accent + '">INVOICE</div>' +
          '<div class="inv-number">' + esc(d.getElementById("invNum").value) + '</div></div>' +
          '<div style="text-align:right"><p style="margin:0;font-size:13px;"><strong>Date:</strong> ' + esc(d.getElementById("invDate").value) + '</p>' +
          '<p style="margin:2px 0 0;font-size:13px;"><strong>Due:</strong> ' + esc(d.getElementById("dueDate").value) + '</p></div>' +
        '</div>' +
        '<div class="inv-parties">' +
          '<div class="inv-party"><h4>From</h4>' + fmtParty("bizName", "bizAddr", "bizEmail", "bizPhone") + '</div>' +
          '<div class="inv-party"><h4>Bill To</h4>' + fmtParty("clientName", "clientAddr") + '</div>' +
        '</div>' +
        '<table><thead><tr><th>Description</th><th style="text-align:right">Qty</th><th style="text-align:right">Rate</th><th style="text-align:right">Amount</th></tr></thead><tbody>' +
          rowsHTML +
        '</tbody></table>' +
        '<div class="inv-totals">' +
          '<div class="total-row"><span>Subtotal</span><span>' + cur + fmt(subtotal) + '</span></div>' +
          (discRate > 0 ? '<div class="total-row"><span>Discount (' + discRate + '%)</span><span>−' + cur + fmt(discount) + '</span></div>' : '') +
          (taxRate > 0 ? '<div class="total-row"><span>Tax (' + taxRate + '%)</span><span>' + cur + fmt(tax) + '</span></div>' : '') +
          '<div class="total-row grand"><span>Total Due</span><span>' + cur + fmt(grand) + '</span></div>' +
        '</div>' +
        '<div class="inv-meta">' + esc(d.getElementById("notes").value).replace(/\n/g, "<br>") + '</div>';
    }

    function fmtParty(nameId, addrId, emailId, phoneId) {
      var name = esc(d.getElementById(nameId).value);
      var addr = esc(d.getElementById(addrId).value).replace(/\n/g, "<br>");
      var html = "<p style='font-weight:700'>" + name + "</p><p>" + addr + "</p>";
      if (emailId) {
        var em = esc(d.getElementById(emailId).value);
        if (em) html += "<p style='margin-top:4px'>" + em + "</p>";
      }
      if (phoneId) {
        var ph = esc(d.getElementById(phoneId).value);
        if (ph) html += "<p>" + ph + "</p>";
      }
      return html;
    }

    function esc(s) {
      var d2 = d.createElement("div");
      d2.textContent = s;
      return d2.innerHTML;
    }

    // Wire up
    d.querySelectorAll("input, textarea, select").forEach(function (el) {
      el.addEventListener("input", render);
    });

    d.getElementById("addItem").addEventListener("click", function () {
      var row = d.createElement("div");
      row.className = "line-item";
      row.innerHTML = '<input type="text" class="li-desc" placeholder="Description"><input type="number" class="li-qty" value="1" min="0" step="1"><input type="number" class="li-price" value="0" min="0" step="0.01"><button class="rm secondary">×</button>';
      d.getElementById("lineItems").appendChild(row);
      row.querySelectorAll("input").forEach(function (i) { i.addEventListener("input", render); });
      row.querySelector(".rm").addEventListener("click", function () { row.remove(); render(); });
    });

    d.getElementById("lineItems").addEventListener("click", function (e) {
      if (e.target.classList.contains("rm")) {
        e.target.closest(".line-item").remove();
        render();
      }
    });

    d.getElementById("printBtn").addEventListener("click", function () {
      var prev = d.getElementById("preview").innerHTML;
      var w = window.open("", "_blank");
      w.document.write("<html><head><title>Invoice</title><style>" +
        "body{font-family:sans-serif;padding:32px;color:#1a1a1a}" +
        ".inv-top{display:flex;justify-content:space-between;margin-bottom:24px}" +
        ".inv-title{font-size:28px;font-weight:800}" +
        ".inv-parties{display:flex;justify-content:space-between;margin-bottom:24px;gap:20px}" +
        ".inv-party h4{margin:0 0 6px;font-size:11px;text-transform:uppercase;color:#888}" +
        ".inv-party p{margin:0 0 2px;font-size:13px}" +
        "table{width:100%;border-collapse:collapse;margin:16px 0}" +
        "th{text-align:left;font-size:11px;text-transform:uppercase;color:#888;padding:8px 6px;border-bottom:2px solid #e0e0e0}" +
        "td{padding:8px 6px;border-bottom:1px solid #eee;font-size:13px}" +
        "td.num{text-align:right}" +
        ".inv-totals{margin-left:auto;width:260px;margin-top:12px}" +
        ".total-row{display:flex;justify-content:space-between;padding:4px 0;font-size:13px}" +
        ".grand{font-weight:800;font-size:16px;border-top:2px solid #333;margin-top:6px;padding-top:8px}" +
        ".inv-meta{margin-top:28px;padding-top:16px;border-top:1px solid #eee;font-size:12px;color:#666}" +
        "</style></head><body>" + prev + "</body></html>");
      w.document.close();
      w.focus();
      setTimeout(function () { w.print(); }, 250);
    });

    d.getElementById("downloadBtn").addEventListener("click", function () {
      var prev = d.getElementById("preview").innerHTML;
      var style = ".inv-top{display:flex;justify-content:space-between;margin-bottom:24px;font-family:sans-serif}.inv-title{font-size:28px;font-weight:800}.inv-parties{display:flex;justify-content:space-between;margin-bottom:24px;gap:20px}.inv-party h4{margin:0 0 6px;font-size:11px;text-transform:uppercase;color:#888}.inv-party p{margin:0 0 2px;font-size:13px}table{width:100%;border-collapse:collapse;margin:16px 0}th{text-align:left;font-size:11px;text-transform:uppercase;color:#888;padding:8px 6px;border-bottom:2px solid #e0e0e0}td{padding:8px 6px;border-bottom:1px solid #eee;font-size:13px}td.num{text-align:right}.inv-totals{margin-left:auto;width:260px;margin-top:12px}.total-row{display:flex;justify-content:space-between;padding:4px 0;font-size:13px}.grand{font-weight:800;font-size:16px;border-top:2px solid #333;margin-top:6px;padding-top:8px}.inv-meta{margin-top:28px;padding-top:16px;border-top:1px solid #eee;font-size:12px;color:#666}body{padding:32px;color:#1a1a1a}";
      var html = "<!DOCTYPE html><html><head><meta charset='utf-8'><title>Invoice " + esc(d.getElementById("invNum").value) + "</title><style>" + style + "</style></head><body>" + prev + "</body></html>";
      var blob = new Blob([html], { type: "text/html" });
      var a = d.createElement("a");
      a.href = URL.createObjectURL(blob);
      a.download = "invoice-" + d.getElementById("invNum").value + ".html";
      a.click();
      setTimeout(function () { URL.revokeObjectURL(a.href); }, 1000);
    });

    render();
  })();
  </script>
</body>
</html>
