<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CSS Error Page Generator — virt.tools</title>
<link rel="stylesheet" href="/assets/style.css">
<style>
.tool-area{max-width:900px;margin:2rem auto;padding:0 1rem}
.controls{display:grid;gap:1rem;margin:1.5rem 0;padding:1.5rem;background:#1a1a2e;border-radius:12px}
.ctrl-row{display:flex;gap:1rem;align-items:center;flex-wrap:wrap;margin-bottom:.5rem}
.ctrl-row label{font-weight:600;font-size:.9rem;min-width:120px}
.ctrl-row select,.ctrl-row input{padding:.5rem;border-radius:8px;border:1px solid #444;background:#0f0f1e;color:#eee}
.preview-box{margin:1.5rem 0;border-radius:12px;padding:3rem 1.5rem;background:#111;min-height:400px;display:flex;align-items:center;justify-content:center;overflow:auto}
.output-block{margin:2rem 0}
.output-block textarea{width:100%;min-height:100px;font-family:monospace;font-size:.85rem;padding:1rem;border-radius:8px;border:1px solid #444;background:#0f0f1e;color:#eee;resize:vertical}
.copy-btn{padding:.6rem 1.2rem;border:none;border-radius:8px;background:#667eea;color:#fff;cursor:pointer;font-size:.9rem;margin-top:.5rem}
h2{margin-top:2rem;font-size:1.2rem}
</style>
</head>
<body>
<header id="site-header"></header>
<main>
<div class="tool-area">
<h1>🚫 CSS Error Page Generator</h1>
<p>Create CSS error pages (500/502/503/504). 4 styles, 3 themes, custom messages. Copy HTML+CSS.</p>
<div class="controls">
<div class="ctrl-row">
<label>Error Code</label><select id="code"><option value="500" selected>500 Internal Server Error</option><option value="502">502 Bad Gateway</option><option value="503">503 Service Unavailable</option><option value="504">504 Gateway Timeout</option></select>
</div>
<div class="ctrl-row">
<label>Style</label><select id="style"><option value="minimal" selected>Minimal</option><option value="centered">Centered card</option><option value="hero">Hero with image</option><option value="terminal">Terminal</option></select>
<label>Theme</label><select id="theme"><option value="dark" selected>Dark</option><option value="light">Light</option><option value="gradient">Gradient</option></select>
</div>
<div class="ctrl-row">
<label>Accent</label><input type="color" id="accent" value="#ef4444" style="width:40px;height:34px">
<label>Title</label><input type="text" id="title" value="Something went wrong" style="width:200px">
</div>
<div class="ctrl-row">
<label>Message</label><input type="text" id="message" value="We are working on fixing the issue. Please try again later." style="width:350px">
</div>
<div class="ctrl-row"><button class="copy-btn" onclick="update()">Update</button></div>
</div>
<h2>Preview</h2>
<div class="preview-box" id="preview"></div>
<h2>HTML</h2><div class="output-block"><textarea id="htmlOut" readonly></textarea><button class="copy-btn" onclick="copyText('htmlOut')">Copy HTML</button></div>
<h2>CSS</h2><div class="output-block"><textarea id="cssOut" readonly></textarea><button class="copy-btn" onclick="copyText('cssOut')">Copy CSS</button></div>
</div>
</main>
<script src="/assets/app.js"></script>
<script>
function update(){
var code=document.getElementById('code').value;
var style=document.getElementById('style').value;
var theme=document.getElementById('theme').value;
var accent=document.getElementById('accent').value;
var title=document.getElementById('title').value;
var message=document.getElementById('message').value;
var bg,tx;
if(theme==='dark'){bg='#111827';tx='#f3f4f6'}
else if(theme==='light'){bg='#fff';tx='#1f2937'}
else{bg='linear-gradient(135deg,#111827,'+accent+'22)';tx='#f3f4f6'}
var mono=style==='terminal'?"font-family:'Courier New',monospace;":'';
var html='<div class="error-page">\n  <div class="error-code">'+code+'</div>\n  <h1 class="error-title">'+title+'</h1>\n  <p class="error-message">'+message+'</p>\n  <a href="/" class="error-btn">Go Home</a>\n</div>';
var css='.error-page{\n  display:flex;\n  flex-direction:column;\n  align-items:center;\n  justify-content:center;\n  min-height:100vh;\n  background:'+bg+';\n  color:'+tx+';\n  text-align:center;\n  padding:2rem;\n  '+mono+'\n}\n.error-code{\n  font-size:6rem;\n  font-weight:800;\n  color:'+accent+';\n  line-height:1;\n  margin-bottom:1rem;\n}\n.error-title{\n  font-size:1.5rem;\n  font-weight:700;\n  margin-bottom:.75rem;\n}\n.error-message{\n  font-size:1rem;\n  opacity:.7;\n  max-width:400px;\n  margin-bottom:2rem;\n}\n.error-btn{\n  padding:.75rem 2rem;\n  border-radius:8px;\n  background:'+accent+';\n  color:#fff;\n  text-decoration:none;\n  font-weight:600;\n  transition:opacity .2s;\n}\n.error-btn:hover{\n  opacity:.85;\n}';
document.getElementById('htmlOut').value=html;
document.getElementById('cssOut').value=css;
var pv='<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:300px;background:'+(theme==='light'?'#fff':'#111827')+';color:'+(theme==='light'?'#1f2937':'#f3f4f6')+';text-align:center;padding:2rem;border-radius:12px;'+(style==='terminal'?"font-family:'Courier New',monospace;":'')+'"><div style="font-size:4rem;font-weight:800;color:'+accent+';line-height:1;margin-bottom:1rem">'+code+'</div><h1 style="font-size:1.5rem;font-weight:700;margin-bottom:.5rem">'+title+'</h1><p style="opacity:.7;max-width:350px;margin-bottom:1.5rem">'+message+'</p><a href="#" onclick="return false" style="padding:.6rem 1.5rem;border-radius:8px;background:'+accent+';color:#fff;text-decoration:none;font-weight:600">Go Home</a></div>';
document.getElementById('preview').innerHTML=pv;
}
function copyText(id){var t=document.getElementById(id);t.select();document.execCommand('copy')}
['code','style','theme','accent','title','message'].forEach(function(id){var el=document.getElementById(id);el.addEventListener(el.tagName==='SELECT'?'change':el.type==='color'||el.type==='text'?'input':'input',update)});
update();
</script>
</body>
</html>
