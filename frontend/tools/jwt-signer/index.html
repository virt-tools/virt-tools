<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <script src="/assets/theme-init.js"></script>
  <title>JWT Signer &amp; Verifier — Virtual Tools</title>
  <link rel="stylesheet" href="/assets/style.css">
  <style>
    .jwt-tab { padding: 4px 12px; border: 1px solid var(--border,#444); background: transparent; color: inherit; border-radius: 4px; cursor: pointer; font-size: 13px; }
    .jwt-tab.on { background: var(--accent,#ffd54a); color: #000; border-color: var(--accent,#ffd54a); }
    .jwt-banner { padding: 8px 12px; border-radius: 6px; font-weight: 600; margin-top: 8px; }
    .jwt-banner.ok { background: rgba(0,200,0,.12); color: var(--good,#0a0); }
    .jwt-banner.bad { background: rgba(220,40,40,.12); color: var(--bad); }
    textarea { width: 100%; box-sizing: border-box; font-family: ui-monospace, monospace; font-size: 13px; }
  </style>
</head>
<body>
  <div id="site-header"></div>
  <main>
    <div class="tool-header">
      <a class="back" href="/">← All tools</a>
      <h1>JWT Signer &amp; Verifier</h1>
      <p>Sign a JSON Web Token with HMAC (HS256 / HS384 / HS512) from a header, payload and secret, or verify an existing token's signature and inspect its claims. Signatures use the Web Crypto API; the secret and token are processed locally and never leave your browser.</p>
    </div>

    <div class="panel">
      <div class="row" style="align-items:flex-end;">
        <div>
          <label>Mode</label><br>
          <span id="tabs">
            <button class="jwt-tab on" data-m="sign">Sign</button>
            <button class="jwt-tab" data-m="verify">Verify</button>
          </span>
        </div>
      </div>

      <!-- SIGN -->
      <div id="sign-pane">
        <div class="spacer"></div>
        <div class="field">
          <label for="s-header">Header (JSON)</label>
          <textarea id="s-header" rows="2" spellcheck="false">{"alg":"HS256","typ":"JWT"}</textarea>
        </div>
        <div class="field">
          <label for="s-payload">Payload (JSON — claims)</label>
          <textarea id="s-payload" rows="3" spellcheck="false">{"sub":"1234567890","name":"John Doe","iat":1516239022}</textarea>
        </div>
        <div class="row" style="align-items:flex-end; flex-wrap:wrap; gap:12px;">
          <div>
            <label for="s-alg">Algorithm</label>
            <select id="s-alg">
              <option value="HS256" selected>HS256 (HMAC + SHA-256)</option>
              <option value="HS384">HS384 (HMAC + SHA-384)</option>
              <option value="HS512">HS512 (HMAC + SHA-512)</option>
            </select>
          </div>
          <div>
            <label for="s-secret">Secret</label>
            <input type="text" id="s-secret" value="your-256-bit-secret" spellcheck="false" style="font-family:ui-monospace,monospace; width:240px;">
          </div>
        </div>
        <div class="spacer"></div>
        <div class="row" style="justify-content:space-between;">
          <label for="s-token">Signed token</label>
          <button id="s-copy" class="secondary" style="padding:4px 10px;">Copy</button>
        </div>
        <div class="output" id="s-token" style="word-break:break-all; min-height:1.6em; font-family:ui-monospace,monospace;"></div>
        <p class="note" id="s-note"></p>
      </div>

      <!-- VERIFY -->
      <div id="verify-pane" hidden>
        <div class="spacer"></div>
        <div class="field">
          <label for="v-token">Token</label>
          <textarea id="v-token" rows="4" spellcheck="false" placeholder="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."></textarea>
        </div>
        <div class="row" style="align-items:flex-end; gap:12px;">
          <div>
            <label for="v-secret">Secret</label>
            <input type="text" id="v-secret" value="your-256-bit-secret" spellcheck="false" style="font-family:ui-monospace,monospace; width:240px;">
          </div>
          <label class="check"><input type="checkbox" id="v-exp" checked> check exp / nbf</label>
        </div>
        <div class="spacer"></div>
        <div class="jwt-banner" id="v-banner" hidden></div>
        <div class="spacer"></div>
        <div class="row" style="justify-content:space-between;">
          <label>Decoded header</label>
        </div>
        <div class="output" id="v-header" style="white-space:pre-wrap; word-break:break-all; font-family:ui-monospace,monospace;"></div>
        <div class="spacer"></div>
        <div class="row" style="justify-content:space-between;">
          <label>Decoded payload (claims)</label>
        </div>
        <div class="output" id="v-payload" style="white-space:pre-wrap; word-break:break-all; font-family:ui-monospace,monospace;"></div>
        <p class="note" id="v-claims"></p>
      </div>

      <p class="note" id="err" hidden style="color:var(--bad);"></p>
    </div>
  </main>

  <script src="/assets/app.js"></script>
  <script>
  (function () {
    var tabs = document.querySelectorAll(".jwt-tab");
    var signPane = document.getElementById("sign-pane");
    var verifyPane = document.getElementById("verify-pane");
    var sHeader = document.getElementById("s-header");
    var sPayload = document.getElementById("s-payload");
    var sAlg = document.getElementById("s-alg");
    var sSecret = document.getElementById("s-secret");
    var sToken = document.getElementById("s-token");
    var sNote = document.getElementById("s-note");
    var sCopy = document.getElementById("s-copy");
    var vToken = document.getElementById("v-token");
    var vSecret = document.getElementById("v-secret");
    var vExp = document.getElementById("v-exp");
    var vBanner = document.getElementById("v-banner");
    var vHeader = document.getElementById("v-header");
    var vPayload = document.getElementById("v-payload");
    var vClaims = document.getElementById("v-claims");
    var err = document.getElementById("err");

    function b64urlBytes(bytes) {
      var bin = "";
      for (var i = 0; i < bytes.length; i++) bin += String.fromCharCode(bytes[i]);
      return btoa(bin).replace(/\+/g, "-").replace(/\//g, "_").replace(/=+$/, "");
    }
    function b64urlStr(s) { return b64urlBytes(new TextEncoder().encode(s)); }
    function b64urlDecode(str) {
      var s = String(str).replace(/-/g, "+").replace(/_/g, "/");
      switch (s.length % 4) { case 2: s += "=="; break; case 3: s += "="; break; case 0: break; default: throw new Error("invalid base64url length"); }
      var bin = atob(s);
      var bytes = new Uint8Array(bin.length);
      for (var i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
      return bytes;
    }
    function hashName(alg) { return alg === "HS256" ? "SHA-256" : alg === "HS384" ? "SHA-384" : "SHA-512"; }
    function hmacKey(secret, alg) {
      return crypto.subtle.importKey("raw", new TextEncoder().encode(secret), { name: "HMAC", hash: { name: hashName(alg) } }, false, ["sign"]);
    }
    function hmacSign(secret, alg, dataStr) {
      return hmacKey(secret, alg).then(function (key) {
        return crypto.subtle.sign("HMAC", key, new TextEncoder().encode(dataStr));
      }).then(function (sig) { return b64urlBytes(new Uint8Array(sig)); });
    }
    function constantTimeEq(a, b) {
      if (a.length !== b.length) return false;
      var r = 0;
      for (var i = 0; i < a.length; i++) r |= a.charCodeAt(i) ^ b.charCodeAt(i);
      return r === 0;
    }
    function compactJson(str) {
      var o = JSON.parse(str);
      if (o === null || typeof o !== "object" || Array.isArray(o)) throw new Error("must be a JSON object");
      return JSON.stringify(o);          // compact, preserves key order
    }
    function pretty(str) {
      try { return JSON.stringify(JSON.parse(str), null, 2); } catch (e) { return str; }
    }

    function sign() {
      err.hidden = true; err.textContent = "";
      sToken.style.color = "";
      try {
        var alg = sAlg.value;
        var header = JSON.parse(compactJson(sHeader.value));
        header.alg = alg;                 // keep header consistent with chosen alg
        var payload = JSON.parse(compactJson(sPayload.value));
        var h = b64urlStr(JSON.stringify(header));
        var p = b64urlStr(JSON.stringify(payload));
        hmacSign(sSecret.value, alg, h + "." + p).then(function (sig) {
          var tok = h + "." + p + "." + sig;
          sToken.textContent = tok;
          sNote.textContent = "alg " + alg + " · header " + h.length + " chars, payload " + p.length + " chars, signature " + sig.length + " chars";
        }).catch(function (e) { sToken.textContent = "✗ " + (e && e.message ? e.message : e); sToken.style.color = "var(--bad)"; sNote.textContent = ""; });
      } catch (e) {
        sToken.textContent = "✗ " + (e && e.message ? e.message : e); sToken.style.color = "var(--bad)"; sNote.textContent = "";
      }
    }

    function verify() {
      err.hidden = true; err.textContent = "";
      vBanner.hidden = true; vHeader.textContent = ""; vPayload.textContent = ""; vClaims.textContent = "";
      var token = vToken.value.trim();
      var parts = token.split(".");
      if (parts.length !== 3) {
        vBanner.hidden = false; vBanner.className = "jwt-banner bad";
        vBanner.textContent = "✗ Invalid token — must have 3 dot-separated parts (got " + parts.length + ").";
        return;
      }
      var h = parts[0], p = parts[1], s = parts[2];
      var header, payload;
      try { header = JSON.parse(new TextDecoder().decode(b64urlDecode(h))); }
      catch (e) { vBanner.hidden = false; vBanner.className = "jwt-banner bad"; vBanner.textContent = "✗ Invalid header — " + (e.message || e); return; }
      var alg = header && header.alg;
      if (alg !== "HS256" && alg !== "HS384" && alg !== "HS512") {
        vBanner.hidden = false; vBanner.className = "jwt-banner bad";
        vBanner.textContent = "✗ Unsupported alg " + JSON.stringify(alg) + " — only HS256 / HS384 / HS512 are supported.";
        vHeader.textContent = pretty(JSON.stringify(header));
        return;
      }
      try { payload = JSON.parse(new TextDecoder().decode(b64urlDecode(p))); }
      catch (e) { vBanner.hidden = false; vBanner.className = "jwt-banner bad"; vBanner.textContent = "✗ Invalid payload — " + (e.message || e); vHeader.textContent = pretty(JSON.stringify(header)); return; }

      hmacSign(vSecret.value, alg, h + "." + p).then(function (expected) {
        vHeader.textContent = pretty(JSON.stringify(header));
        vPayload.textContent = pretty(JSON.stringify(payload));
        var notes = [];
        if (!constantTimeEq(expected, s)) {
          vBanner.hidden = false; vBanner.className = "jwt-banner bad";
          vBanner.textContent = "✗ Signature INVALID — secret does not match or token was tampered with.";
        } else {
          if (vExp.checked) {
            var now = Math.floor(Date.now() / 1000);
            var exp = payload.exp, nbf = payload.nbf;
            if (typeof exp === "number" && now >= exp) notes.push("expired (exp " + exp + ", now " + now + ")");
            if (typeof nbf === "number" && now < nbf) notes.push("not yet valid (nbf " + nbf + ", now " + now + ")");
            if (typeof exp === "number" && now < exp) notes.push("expires " + new Date(exp * 1000).toISOString());
          }
          vBanner.hidden = false; vBanner.className = "jwt-banner ok";
          vBanner.textContent = "✓ Signature valid" + (notes.length ? "" : " — claims verified.");
        }
        vClaims.textContent = notes.length ? notes.join("  ·  ") : "";
        vClaims.style.color = notes.some(function (n) { return /expired|not yet/.test(n); }) ? "var(--bad)" : "";
      }).catch(function (e) {
        vBanner.hidden = false; vBanner.className = "jwt-banner bad";
        vBanner.textContent = "✗ " + (e && e.message ? e.message : e);
      });
    }

    function copyToken() {
      var t = sToken.textContent;
      if (!t || t.indexOf("✗") === 0) return;
      function done() { sCopy.textContent = "Copied!"; setTimeout(function () { sCopy.textContent = "Copy"; }, 1200); }
      if (navigator.clipboard && navigator.clipboard.writeText) navigator.clipboard.writeText(t).then(done);
      else { var ta = document.createElement("textarea"); ta.value = t; document.body.appendChild(ta); ta.select(); try { document.execCommand("copy"); done(); } catch (e) {} ta.remove(); }
    }

    var mode = "sign";
    function setMode(m) {
      mode = m;
      tabs.forEach(function (b) { b.className = "jwt-tab" + (b.dataset.m === m ? " on" : ""); });
      signPane.hidden = m !== "sign";
      verifyPane.hidden = m !== "verify";
      err.hidden = true;
      if (m === "sign") sign(); else verify();
    }
    tabs.forEach(function (b) { b.addEventListener("click", function () { setMode(b.dataset.m); }); });
    sHeader.addEventListener("input", sign); sPayload.addEventListener("input", sign);
    sAlg.addEventListener("change", sign); sSecret.addEventListener("input", sign);
    sCopy.addEventListener("click", copyToken);
    vToken.addEventListener("input", verify); vSecret.addEventListener("input", verify); vExp.addEventListener("change", verify);

    setMode("sign");
  })();
  </script>
</body>
</html>
