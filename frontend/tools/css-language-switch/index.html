<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CSS Language Switcher Generator — virt.tools</title>
<link rel="stylesheet" href="/assets/style.css">
<style>
.tool-area{max-width:900px;margin:2rem auto;padding:0 1rem}
.controls{display:grid;gap:1rem;margin:1.5rem 0;padding:1.5rem;background:#1a1a2e;border-radius:12px}
.ctrl-row{display:flex;gap:1rem;align-items:center;flex-wrap:wrap;margin-bottom:.5rem}
.ctrl-row label{font-weight:600;font-size:.9rem;min-width:120px}
.ctrl-row select,.ctrl-row input{padding:.5rem;border-radius:8px;border:1px solid #444;background:#0f0f1e;color:#eee}
.preview-box{margin:1.5rem 0;border-radius:12px;min-height:120px;padding:2rem;background:#e8e8e8}
.output-block{margin:2rem 0}
.output-block textarea{width:100%;min-height:100px;font-family:monospace;font-size:.85rem;padding:1rem;border-radius:8px;border:1px solid #444;background:#0f0f1e;color:#eee;resize:vertical}
.copy-btn{padding:.6rem 1.2rem;border:none;border-radius:8px;background:#667eea;color:#fff;cursor:pointer;font-size:.9rem;margin-top:.5rem}
h2{margin-top:2rem;font-size:1.2rem}
</style>
</head>
<body>
<header id="site-header"></header>
<main>
<div class="tool-area">
<h1>🌐 CSS Language Switcher Generator</h1>
<p>Create CSS language selector / i18n switch components. 4 styles, 3 themes, flags or codes. Copy HTML+CSS.</p>
<div class="controls">
<div class="ctrl-row">
<label>Style</label><select id="style"><option value="dropdown" selected>Dropdown</option><option value="inline">Inline Pills</option><option value="select">Select Box</option><option value="icon">Icon Button</option></select>
<label>Theme</label><select id="theme"><option value="light" selected>Light</option><option value="dark">Dark</option><option value="glass">Glass</option></select>
</div>
<div class="ctrl-row">
<label>Accent Color</label><input type="color" id="accent" value="#667eea">
<label>Radius</label><input type="range" id="radius" min="0" max="24" value="8">
<label>Languages</label><select id="langcount"><option value="3">3</option><option value="5" selected>5</option><option value="8">8</option></select>
</div>
<div class="ctrl-row"><button class="copy-btn" onclick="update()">Update</button></div>
</div>
<h2>Preview</h2>
<div class="preview-box" id="preview"></div>
<h2>HTML</h2><div class="output-block"><textarea id="htmlOut" readonly></textarea><button class="copy-btn" onclick="copyText('htmlOut')">Copy HTML</button></div>
<h2>CSS</h2><div class="output-block"><textarea id="cssOut" readonly></textarea><button class="copy-btn" onclick="copyText('cssOut')">Copy CSS</button></div>
</div>
</main>
<script src="/assets/app.js"></script>
<script>
var LANGS=[{code:'EN',flag:'🇬🇧',name:'English'},{code:'ES',flag:'🇪🇸',name:'Español'},{code:'FR',flag:'🇫🇷',name:'Français'},{code:'DE',flag:'🇩🇪',name:'Deutsch'},{code:'IT',flag:'🇮🇹',name:'Italiano'},{code:'PT',flag:'🇵🇹',name:'Português'},{code:'NL',flag:'🇳🇱',name:'Nederlands'},{code:'RU',flag:'🇷🇺',name:'Русский'}];
function update(){
var style=document.getElementById('style').value;
var theme=document.getElementById('theme').value;
var accent=document.getElementById('accent').value;
var radius=document.getElementById('radius').value;
var count=parseInt(document.getElementById('langcount').value);
var langs=LANGS.slice(0,count);
var bg=theme==='dark'?'#1a1a2e':theme==='glass'?'rgba(255,255,255,0.85)':'#fff';
var fg=theme==='dark'?'#e0e0e0':'#222';
var html='',css='';
if(style==='dropdown'){
html='<div class="lang-switch lang-dropdown lang-'+theme+'">\n  <button class="lang-current">\n    <span class="lang-flag">🇬🇧</span>\n    <span class="lang-code">EN</span>\n    <span class="lang-arrow">▾</span>\n  </button>\n  <ul class="lang-menu">\n';
langs.forEach(function(l){html+='    <li><a href="#"><span class="lang-flag">'+l.flag+'</span><span>'+l.name+'</span></a></li>\n'});
html+='  </ul>\n</div>';
css='.lang-switch{position:relative;display:inline-block;font-family:system-ui,sans-serif}\n'+
'.lang-current{display:flex;align-items:center;gap:.5rem;padding:.5rem 1rem;border:1px solid '+fg+';border-radius:'+radius+'px;background:'+bg+';color:'+fg+';cursor:pointer;font-size:.9rem;transition:border-color .2s}\n'+
'.lang-current:hover{border-color:'+accent+'}\n'+
'.lang-arrow{font-size:.7rem;transition:transform .2s}\n'+
'.lang-menu{position:absolute;top:100%;left:0;margin:.25rem 0;padding:0;list-style:none;background:'+bg+';border:1px solid '+fg+';border-radius:'+radius+'px;overflow:hidden;min-width:160px;box-shadow:0 4px 12px rgba(0,0,0,.1);opacity:0;visibility:hidden;transform:translateY(-4px);transition:all .2s;z-index:100}\n'+
'.lang-switch:hover .lang-menu{opacity:1;visibility:visible;transform:translateY(0)}\n'+
'.lang-menu li a{display:flex;align-items:center;gap:.5rem;padding:.5rem 1rem;color:'+fg+';text-decoration:none;font-size:.85rem;transition:background .2s}\n'+
'.lang-menu li a:hover{background:'+accent+';color:#fff}\n'+
'.lang-flag{font-size:1.1rem}';
}else if(style==='inline'){
html='<div class="lang-switch lang-inline lang-'+theme+'">\n';
langs.forEach(function(l,i){html+='  <button class="lang-pill'+(i===0?' active':'')+'">'+l.code+'</button>\n'});
html+='</div>';
css='.lang-inline{display:flex;gap:.25rem;font-family:system-ui,sans-serif;flex-wrap:wrap}\n'+
'.lang-pill{padding:.35rem .8rem;border:1px solid '+fg+';border-radius:'+(radius)+'px;background:transparent;color:'+fg+';cursor:pointer;font-size:.8rem;font-weight:600;transition:all .2s}\n'+
'.lang-pill:hover{border-color:'+accent+';color:'+accent+'}\n'+
'.lang-pill.active{background:'+accent+';color:#fff;border-color:'+accent+'}';
}else if(style==='select'){
html='<select class="lang-switch lang-select lang-'+theme+'">\n';
langs.forEach(function(l,i){html+='  <option value="'+l.code+'"'+(i===0?' selected':'')+'>'+l.flag+' '+l.name+'</option>\n'});
html+='</select>';
css='.lang-select{padding:.5rem 1rem;border:1px solid '+fg+';border-radius:'+radius+'px;background:'+bg+';color:'+fg+';cursor:pointer;font-size:.9rem;font-family:system-ui,sans-serif;transition:border-color .2s}\n'+
'.lang-select:hover,.lang-select:focus{border-color:'+accent+';outline:none}';
}else{
html='<button class="lang-switch lang-icon lang-'+theme+'">\n  <span class="lang-flag">🌐</span>\n  <span class="lang-code">EN</span>\n</button>';
css='.lang-icon{display:flex;align-items:center;gap:.4rem;padding:.5rem;border:none;border-radius:50%;background:'+bg+';color:'+fg+';cursor:pointer;font-size:.9rem;font-family:system-ui,sans-serif;transition:all .2s;box-shadow:0 2px 8px rgba(0,0,0,.1)}\n'+
'.lang-icon:hover{background:'+accent+';color:#fff;transform:scale(1.1)}\n'+
'.lang-flag{font-size:1.2rem}';
}
document.getElementById('htmlOut').value=html;
document.getElementById('cssOut').value=css;
renderPreview(style,theme,accent,radius,langs,bg,fg);
}
function renderPreview(style,theme,accent,radius,langs,bg,fg){
var h='';
if(style==='dropdown'){
h='<div style="position:relative;display:inline-block;font-family:system-ui,sans-serif"><button style="display:flex;align-items:center;gap:.5rem;padding:.5rem 1rem;border:1px solid '+fg+';border-radius:'+radius+'px;background:'+bg+';color:'+fg+';cursor:pointer;font-size:.9rem"><span>🇬🇧</span><span>EN</span><span style="font-size:.7rem">▾</span></button></div>';
}else if(style==='inline'){
h='<div style="display:flex;gap:.25rem;flex-wrap:wrap">';
langs.forEach(function(l,i){h+='<button style="padding:.35rem .8rem;border:1px solid '+fg+';border-radius:'+radius+'px;background:'+(i===0?accent:'transparent')+';color:'+(i===0?'#fff':fg)+';cursor:pointer;font-size:.8rem;font-weight:600">'+l.code+'</button>'});
h+='</div>';
}else if(style==='select'){
h='<select style="padding:.5rem 1rem;border:1px solid '+fg+';border-radius:'+radius+'px;background:'+bg+';color:'+fg+';font-size:.9rem;font-family:system-ui">';
langs.forEach(function(l,i){h+='<option'+(i===0?' selected':'')+'>'+l.flag+' '+l.name+'</option>'});
h+='</select>';
}else{
h='<button style="display:flex;align-items:center;gap:.4rem;padding:.5rem;border:none;border-radius:50%;background:'+bg+';color:'+fg+';cursor:pointer;font-size:.9rem;box-shadow:0 2px 8px rgba(0,0,0,.1)"><span style="font-size:1.2rem">🌐</span><span>EN</span></button>';
}
document.getElementById('preview').innerHTML=h;
}
function copyText(id){var t=document.getElementById(id);t.select();document.execCommand('copy')}
['style','theme','accent','radius','langcount'].forEach(function(id){document.getElementById(id).addEventListener(id==='accent'||id==='radius'?'input':'change',update)});
update();
</script>
</body>
</html>
