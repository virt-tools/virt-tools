<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <script src="/assets/theme-init.js"></script>
  <title>Color Palette Generator — Virtual Tools</title>
  <link rel="stylesheet" href="/assets/style.css">
</head>
<body>
  <div id="site-header"></div>
  <main>
    <div class="tool-header">
      <a class="back" href="/">← All tools</a>
      <h1>Color Palette Generator</h1>
      <p>Generate harmonious color palettes from a base color — complementary, analogous, triadic, tetradic, split-complementary, monochromatic and shades. Runs in your browser.</p>
    </div>

    <div class="panel">
      <div class="row">
        <div>
          <label for="base">Base color</label>
          <input type="color" id="base" value="#6ea8fe">
        </div>
        <div>
          <label for="type">Harmony</label>
          <select id="type">
            <option value="complementary">Complementary</option>
            <option value="analogous">Analogous</option>
            <option value="triadic">Triadic</option>
            <option value="tetradic">Tetradic (square)</option>
            <option value="split">Split-complementary</option>
            <option value="monochromatic">Monochromatic</option>
            <option value="shades">Shades</option>
          </select>
        </div>
        <button id="random" class="secondary" style="align-self:flex-end;">Random base</button>
      </div>

      <div class="spacer"></div>
      <label>Palette <span class="muted">click a swatch to copy its hex</span></label>
      <div class="palette" id="palette"></div>

      <div class="spacer"></div>
      <div class="row">
        <button id="copyall">Copy all hex values</button>
        <button id="download" class="secondary">Download as CSS variables</button>
      </div>
      <p class="note" id="note"></p>
    </div>
  </main>

  <script src="/assets/app.js"></script>
  <script>
  (function () {
    var base = document.getElementById("base");
    var type = document.getElementById("type");
    var randomBtn = document.getElementById("random");
    var palette = document.getElementById("palette");
    var copyAll = document.getElementById("copyall");
    var download = document.getElementById("download");
    var note = document.getElementById("note");

    /* ---- color conversions ---- */
    function hexToRgb(h) {
      h = h.replace("#", "");
      return [parseInt(h.substr(0, 2), 16), parseInt(h.substr(2, 2), 16), parseInt(h.substr(4, 2), 16)];
    }
    function rgbToHex(r, g, b) {
      function c(v) { v = Math.round(Math.max(0, Math.min(255, v))); return ("0" + v.toString(16)).slice(-2); }
      return "#" + c(r) + c(g) + c(b);
    }
    function rgbToHsl(r, g, b) {
      r /= 255; g /= 255; b /= 255;
      var mx = Math.max(r, g, b), mn = Math.min(r, g, b), l = (mx + mn) / 2, h, s;
      if (mx === mn) { h = 0; s = 0; }
      else {
        var d = mx - mn;
        s = l > 0.5 ? d / (2 - mx - mn) : d / (mx + mn);
        if (mx === r) h = ((g - b) / d) % 6;
        else if (mx === g) h = (b - r) / d + 2;
        else h = (r - g) / d + 4;
        h *= 60;
      }
      return [((h % 360) + 360) % 360, s, l];
    }
    function hslToRgb(h, s, l) {
      h = ((h % 360) + 360) % 360;
      var c = (1 - Math.abs(2 * l - 1)) * s, x = c * (1 - Math.abs((h / 60) % 2 - 1)), m = l - c / 2, r, g, b;
      if (h < 60) { r = c; g = x; b = 0; }
      else if (h < 120) { r = x; g = c; b = 0; }
      else if (h < 180) { r = 0; g = c; b = x; }
      else if (h < 240) { r = 0; g = x; b = c; }
      else if (h < 300) { r = x; g = 0; b = c; }
      else { r = c; g = 0; b = x; }
      return [(r + m) * 255, (g + m) * 255, (b + m) * 255];
    }
    function hslToHex(h, s, l) { var rgb = hslToRgb(h, s, l); return rgbToHex(rgb[0], rgb[1], rgb[2]); }
    function clampL(v) { return Math.max(0.05, Math.min(0.95, v)); }

    function generate(baseHex, t) {
      var hsl = rgbToHsl.apply(null, hexToRgb(baseHex));
      var h = hsl[0], s = hsl[1], l = hsl[2];
      function at(hue) { return hslToHex(hue, s, l); }
      if (t === "complementary") return [baseHex, at(h + 180)];
      if (t === "analogous") return [at(h - 30), baseHex, at(h + 30)];
      if (t === "triadic") return [baseHex, at(h + 120), at(h + 240)];
      if (t === "tetradic") return [baseHex, at(h + 90), at(h + 180), at(h + 270)];
      if (t === "split") return [baseHex, at(h + 150), at(h + 210)];
      if (t === "monochromatic") return [hslToHex(h, s, clampL(l - 0.30)), hslToHex(h, s, clampL(l - 0.15)), baseHex, hslToHex(h, s, clampL(l + 0.15)), hslToHex(h, s, clampL(l + 0.30))];
      if (t === "shades") return [baseHex, hslToHex(h, s, clampL(l - 0.20)), hslToHex(h, s, clampL(l - 0.40)), hslToHex(h, s, clampL(l - 0.60))];
      return [baseHex];
    }

    function textOn(hex) {
      var rgb = hexToRgb(hex);
      var lum = 0.299 * rgb[0] + 0.587 * rgb[1] + 0.114 * rgb[2];
      return lum < 140 ? "#fff" : "#1a1f29";
    }

    function copy(text, label) {
      function done() { note.textContent = label || "Copied!"; setTimeout(function () { if (note.textContent === (label || "Copied!")) note.textContent = ""; }, 1200); }
      if (navigator.clipboard && navigator.clipboard.writeText) navigator.clipboard.writeText(text).then(done);
      else { var ta = document.createElement("textarea"); ta.value = text; document.body.appendChild(ta); ta.select(); try { document.execCommand("copy"); done(); } catch (e) {} ta.remove(); }
    }

    var current = [];
    function render() {
      current = generate(base.value, type.value);
      palette.innerHTML = "";
      current.forEach(function (hex, i) {
        var sw = document.createElement("div");
        sw.className = "swatch";
        sw.style.background = hex;
        sw.style.color = textOn(hex);
        sw.innerHTML = '<span class="swatch-hex">' + hex.toUpperCase() + "</span>" + (i === 0 ? '<span class="swatch-tag">base</span>' : "");
        sw.title = "Click to copy " + hex;
        sw.addEventListener("click", function () { copy(hex, "Copied " + hex.toUpperCase()); });
        palette.appendChild(sw);
      });
    }

    base.addEventListener("input", render);
    type.addEventListener("change", render);
    randomBtn.addEventListener("click", function () {
      base.value = hslToHex(Math.random() * 360, 0.55 + Math.random() * 0.3, 0.45 + Math.random() * 0.25);
      render();
    });
    copyAll.addEventListener("click", function () { copy(current.join(", "), "Copied all hex values"); });
    download.addEventListener("click", function () {
      var css = ":root {\n" + current.map(function (h, i) { return "  --color-" + (i + 1) + ": " + h + ";"; }).join("\n") + "\n}";
      var blob = new Blob([css], { type: "text/css" });
      var url = URL.createObjectURL(blob);
      var a = document.createElement("a"); a.href = url; a.download = "palette.css"; document.body.appendChild(a); a.click(); a.remove();
      URL.revokeObjectURL(url);
      note.textContent = "Downloaded palette.css"; setTimeout(function () { note.textContent = ""; }, 1500);
    });

    render();
  })();
  </script>
</body>
</html>
