<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="/assets/theme-init.js"></script>
<title>Simon Says — Virtual Tools</title>
<link rel="stylesheet" href="/assets/style.css">
<style>
.tool-wrap{max-width:480px;margin:0 auto;text-align:center;}
.pad-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;width:320px;margin:20px auto;}
.pad{width:140px;height:140px;border-radius:20px;cursor:pointer;opacity:.5;transition:opacity .15s,transform .1s;user-select:none;}
.pad.active{opacity:1;transform:scale(1.05);}
.pad:hover{opacity:.7;}
#green{background:#2ecc71;}
#red{background:#e74c3c;}
#yellow{background:#f1c40f;}
#blue{background:#3498db;}
#info{font-size:18px;font-weight:700;margin:16px 0;min-height:28px;}
#score{font-size:15px;opacity:.7;margin:8px 0;}
#start{border:1px solid var(--border,#2a2f3a);border-radius:8px;padding:10px 24px;font-size:16px;cursor:pointer;background:var(--bg-panel,#11151c);color:var(--text);margin:12px 0;}
#start:hover{border-color:var(--accent,#6ea8fe);}
.tool-desc{opacity:.7;font-size:14px;margin-bottom:8px;}
</style>
</head>
<body>
<header id="site-header"></header>
<main>
<div class="tool-wrap">
<h1>Simon Says</h1>
<p class="tool-desc">Watch the pattern, then repeat it back. Each round adds one more step. Uses Web Audio API for tones — no external sounds. Fully client-side.</p>
<div id="score">Best streak: 0</div>
<div class="pad-grid">
<div class="pad" id="green" onclick="padClick(0)"></div>
<div class="pad" id="red" onclick="padClick(1)"></div>
<div class="pad" id="yellow" onclick="padClick(2)"></div>
<div class="pad" id="blue" onclick="padClick(3)"></div>
</div>
<div id="info">Press Start to play</div>
<button id="start" onclick="startGame()">Start</button>
</div>
</main>
<script src="/assets/app.js"></script>
<script>
const pads=['green','red','yellow','blue'];
const freqs=[329.63,261.63,220,164.81];
let seq=[],userIdx=0,playing=false,accepting=false,best=0;
let audioCtx=null;

function beep(f,d){
  if(!audioCtx)audioCtx=new(AudioContext||webkitAudioContext)();
  const o=audioCtx.createOscillator(),g=audioCtx.createGain();
  o.frequency.value=f;o.type='sine';o.connect(g);g.connect(audioCtx.destination);
  g.gain.setValueAtTime(.3,audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(.001,audioCtx.currentTime+d/1000);
  o.start();o.stop(audioCtx.currentTime+d/1000);
}

function flash(i){
  const el=document.getElementById(pads[i]);
  el.classList.add('active');
  beep(freqs[i],400);
  setTimeout(()=>el.classList.remove('active'),300);
}

function startGame(){
  seq=[];userIdx=0;playing=true;
  document.getElementById('start').textContent='Stop';
  document.getElementById('info').textContent='Watch...';
  nextRound();
}

function nextRound(){
  accepting=false;userIdx=0;
  seq.push(Math.floor(Math.random()*4));
  document.getElementById('info').textContent='Round '+seq.length+' — Watch...';
  let i=0;
  const iv=setInterval(()=>{
    if(i>=seq.length){clearInterval(iv);accepting=true;document.getElementById('info').textContent='Your turn!';return;}
    flash(seq[i]);i++;
  },600);
}

function padClick(i){
  if(!accepting)return;
  flash(i);
  if(seq[userIdx]===i){
    userIdx++;
    if(userIdx===seq.length){
      accepting=false;
      document.getElementById('info').textContent='Correct! Next round...';
      if(seq.length>best){best=seq.length;document.getElementById('score').textContent='Best streak: '+best;}
      setTimeout(nextRound,800);
    }
  }else{
    accepting=false;playing=false;
    beep(110,600);
    document.getElementById('info').textContent='Game over! Streak: '+seq.length;
    document.getElementById('start').textContent='Start';
  }
}

document.addEventListener('keydown',e=>{
  if(!accepting)return;
  const map={'ArrowUp':0,'ArrowRight':1,'ArrowDown':2,'ArrowLeft':3,'1':0,'2':1,'3':2,'4':3};
  if(map[e.key]!==undefined){e.preventDefault();padClick(map[e.key]);}
});
</script>
</body>
</html>
