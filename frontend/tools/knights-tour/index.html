<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="/assets/theme-init.js"></script>
<title>Knight's Tour — Virtual Tools</title>
<link rel="stylesheet" href="/assets/style.css">
<style>
.tool-wrap{max-width:540px;margin:0 auto;text-align:center;}
#board{display:grid;grid-template-columns:repeat(8,1fr);gap:0;width:400px;margin:12px auto;aspect-ratio:1;border:3px solid var(--border,#444);}
.cell{display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:18px;font-weight:700;position:relative;}
.cell.light{background:#f0d9b5;color:#333;}.cell.dark{background:#b58863;color:#fff;}
.cell.visited{background:rgba(91,141,239,.7)!important;color:#fff;}
.cell.current{background:#e74c3c!important;color:#fff;}
.cell.start{background:#2ecc71!important;color:#fff;}
.cell.available::after{content:'';position:absolute;width:12px;height:12px;border-radius:50%;background:rgba(231,76,60,.5);}
.cell:hover{opacity:.8;}
.controls{margin:12px 0;display:flex;gap:8px;justify-content:center;flex-wrap:wrap;}
.controls button{padding:8px 16px;border-radius:6px;border:1px solid var(--border,#444);background:var(--bg-alt,#1a1f2e);color:var(--text,#eee);cursor:pointer;font-size:14px;}
.controls button:hover{background:var(--accent,#5b8def);color:#fff;}
.stats{font-size:14px;color:var(--text-secondary,#aaa);margin:8px 0;}
.stats span{color:var(--accent,#5b8def);font-weight:700;}
#msg{font-size:15px;font-weight:600;margin:8px 0;min-height:24px;color:#f1c40f;}
.tool-desc{font-size:14px;color:var(--text-secondary,#aaa);}
</style>
</head>
<body>
<header id="site-header"></header>
<main>
<div class="tool-wrap">
<h1>Knight's Tour ♞</h1>
<p class="tool-desc">Move the knight to visit every square on the 8×8 board exactly once. Click any square to start, then click a highlighted square to move.</p>
<div class="stats">Visited: <span id="visited">0</span>/64 | Moves: <span id="moves">0</span></div>
<div id="board"></div>
<div id="msg"></div>
<div class="controls">
<button onclick="resetBoard()">🔄 Reset</button>
<button onclick="undoMove()">⬅ Undo</button>
<button onclick="toggleHints()">💡 Hints: <span id="hints-on">ON</span></button>
</div>
</div>
</main>
<script src="/assets/app.js"></script>
<script>
let visited=[],path=[],knight=null,showHints=true;
const KMOVES=[[-2,-1],[-2,1],[2,-1],[2,1],[-1,-2],[-1,2],[1,-2],[1,2]];
function render(){
const b=document.getElementById('board');b.innerHTML='';
for(let r=0;r<8;r++)for(let c=0;c<8;c++){
const i=r*8+c;const cell=document.createElement('div');
cell.className='cell '+((r+c)%2===0?'light':'dark');
const vi=visited.indexOf(i);
if(vi>=0)cell.classList.add('visited');
if(knight===i)cell.classList.add('current');
if(vi===0)cell.classList.add('start');
if(showHints&&knight!==null&&isValidMove(r,c))cell.classList.add('available');
cell.textContent=vi>=0?(vi+1):'';
cell.onclick=()=>clickCell(r,c);b.appendChild(cell);
}
document.getElementById('visited').textContent=visited.length;
document.getElementById('moves').textContent=path.length;
}
function isValidMove(r,c){
if(knight===null)return true;
const kr=Math.floor(knight/8),kc=knight%8;
return KMOVES.some(([dr,dc])=>kr+dr===r&&kc+dc===c)&&!visited.includes(r*8+c);
}
function clickCell(r,c){
const i=r*8+c;
if(visited.includes(i))return;
if(knight===null){visited=[i];knight=i;path=[i];render();checkWin();return;}
if(!isValidMove(r,c))return;
path.push(i);visited.push(i);knight=i;render();checkWin();
}
function checkWin(){
if(visited.length===64){document.getElementById('msg').textContent='🎉 Complete! You visited all 64 squares in '+path.length+' moves!';
}else{const avail=countAvail();if(avail===0&&visited.length<64)document.getElementById('msg').textContent='Dead end! '+visited.length+'/64 visited. Undo or reset.';else document.getElementById('msg').textContent='';}
}
function countAvail(){if(knight===null)return 64;const kr=Math.floor(knight/8),kc=knight%8;return KMOVES.filter(([dr,dc])=>{const nr=kr+dr,nc=kc+dc;return nr>=0&&nr<8&&nc>=0&&nc<8&&!visited.includes(nr*8+nc);}).length;}
function undoMove(){if(path.length===0)return;path.pop();visited=[...path];knight=path.length>0?path[path.length-1]:null;document.getElementById('msg').textContent='';render();}
function resetBoard(){visited=[];path=[];knight=null;document.getElementById('msg').textContent='';render();}
function toggleHints(){showHints=!showHints;document.getElementById('hints-on').textContent=showHints?'ON':'OFF';render();}
render();
</script>
</body>
</html>
