<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CSS Count/Notification Badge Generator — virt.tools</title>
<link rel="stylesheet" href="/assets/style.css">
<style>
.tool-area{max-width:900px;margin:2rem auto;padding:0 1rem}
.controls{display:grid;gap:1rem;margin:1.5rem 0;padding:1.5rem;background:#1a1a2e;border-radius:12px}
.control-row{display:flex;gap:1rem;align-items:center;flex-wrap:wrap}
.control-row label{min-width:100px;font-weight:600;font-size:.9rem}
.control-row select,.control-row input{padding:.5rem .75rem;border-radius:8px;border:1px solid #444;background:#0f0f1e;color:#eee;font-size:.9rem}
.preview-box{margin:1.5rem 0;border-radius:12px;min-height:120px;padding:2rem;background:#f5f5f5;display:flex;gap:2rem;align-items:center;flex-wrap:wrap}
.output-block{margin:2rem 0}
.output-block textarea{width:100%;min-height:100px;font-family:monospace;font-size:.85rem;padding:1rem;border-radius:8px;border:1px solid #444;background:#0f0f1e;color:#eee;resize:vertical}
.copy-btn{padding:.6rem 1.2rem;border:none;border-radius:8px;background:#667eea;color:#fff;cursor:pointer;font-size:.9rem;margin-top:.5rem}
h2{margin-top:2rem;font-size:1.2rem}
</style>
</head>
<body>
<header id="site-header"></header>
<main>
<div class="tool-area">
<h1>🔢 CSS Count/Notification Badge Generator</h1>
<p>Create CSS count/notification badges for icons and nav items. 4 styles, 3 positions, custom colors. Copy HTML+CSS.</p>
<div class="controls">
<div class="control-row">
<label>Style</label><select id="style"><option value="solid" selected>Solid</option><option value="dot">Dot</option><option value="pill">Pill</option><option value="ring">Ring</option></select>
<label>Position</label><select id="pos"><option value="tr" selected>Top-Right</option><option value="tl">Top-Left</option><option value="br">Bottom-Right</option><option value="br2">Bottom-Left</option></select>
<label>Size</label><select id="size"><option value="sm">Small</option><option value="md" selected>Medium</option><option value="lg">Large</option></select>
<label>Color</label><input type="color" id="color" value="#ef4444" style="width:50px;padding:2px">
<label>Count</label><input type="number" id="count" value="3" min="0" max="999" style="width:60px">
</div>
</div>
<h2>Preview</h2>
<div class="preview-box" id="preview"></div>
<h2>HTML</h2><div class="output-block"><textarea id="htmlOut" readonly></textarea><button class="copy-btn" onclick="copyText('htmlOut')">Copy HTML</button></div>
<h2>CSS</h2><div class="output-block"><textarea id="cssOut" readonly></textarea><button class="copy-btn" onclick="copyText('cssOut')">Copy CSS</button></div>
</div>
</main>
<script src="/assets/app.js"></script>
<script>
function update(){
var style=document.getElementById('style').value,pos=document.getElementById('pos').value;
var size=document.getElementById('size').value,color=document.getElementById('color').value;
var count=document.getElementById('count').value;
var sizes={sm:{d:'16px',fs:'9px',p:'0 4px'},md:{d:'20px',fs:'11px',p:'0 6px'},lg:{d:'26px',fs:'13px',p:'0 8px'}};
var s=sizes[size];
var posMap={tr:'top:-6px;right:-6px',tl:'top:-6px;left:-6px',br:'bottom:-6px;right:-6px',br2:'bottom:-6px;left:-6px'};
var badgeStyle=style==='dot'?'width:'+s.d+';height:'+s.d+';border-radius:50%' : style==='ring'?'width:'+s.d+';height:'+s.d+';border-radius:50%;border:2px solid '+color+';background:transparent' : style==='pill'?'padding:'+s.p+';border-radius:10px;min-width:'+s.d : 'padding:'+s.p+';border-radius:50%;min-width:'+s.d+';height:'+s.d+';display:flex;align-items:center;justify-content:center';
var display=style==='dot'||style==='ring'?'block':'inline-flex';
var html='<div class="badge-wrap">\n  <div class="badge-icon">🔔</div>\n  <span class="badge-count">'+(style==='dot'||style==='ring'?'':count)+'</span>\n</div>';
var css='.badge-wrap{position:relative;display:inline-block;font-size:24px}';
css+='\n.badge-icon{font-size:24px}';
css+='\n.badge-count{position:absolute;'+posMap[pos]+';'+badgeStyle+';display:'+display+';align-items:center;justify-content:center;background:'+(style==='ring'?'transparent':color)+';color:#fff;font-size:'+s.fs+';font-weight:700;line-height:1;font-family:sans-serif}';
document.getElementById('htmlOut').value=html;
document.getElementById('cssOut').value=css;
document.getElementById('preview').innerHTML='<style>'+css+'<\/style>'+html;
}
function copyText(id){var t=document.getElementById(id);t.select();document.execCommand('copy')}
document.querySelectorAll('select,input').forEach(function(e){e.addEventListener('input',update);e.addEventListener('change',update)});
update();
</script>
</body>
</html>
