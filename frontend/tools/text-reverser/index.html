<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <script src="/assets/theme-init.js"></script>
  <title>Text Reverser — Virtual Tools</title>
  <link rel="stylesheet" href="/assets/style.css">
</head>
<body>
  <div id="site-header"></div>
  <main>
    <div class="tool-header">
      <a class="back" href="/">← All tools</a>
      <h1>Text Reverser</h1>
      <p>Reverse characters, words, or lines — plus flip case and tidy line runs. Entirely in your browser; nothing uploaded.</p>
    </div>

    <div class="panel">
      <div class="field">
        <label for="in">Input</label>
        <textarea id="in" placeholder="Type or paste text…" style="min-height:120px;"></textarea>
      </div>
      <div class="row" style="flex-wrap:wrap;">
        <button id="revChars">Reverse all characters</button>
        <button id="revLineChars" class="secondary">Reverse each line</button>
        <button id="revWords" class="secondary">Reverse word order</button>
        <button id="revWordChars" class="secondary">Reverse each word</button>
        <button id="revLines" class="secondary">Reverse line order</button>
        <button id="flipCase" class="secondary">Flip case</button>
      </div>
      <div class="row" style="flex-wrap:wrap;">
        <button id="dedupe" class="secondary">Remove duplicate lines</button>
        <button id="rmBlank" class="secondary">Remove blank lines</button>
        <button id="trim" class="secondary">Trim each line</button>
        <button id="clear" class="secondary">Clear</button>
      </div>
      <div class="spacer"></div>
      <div class="row" style="justify-content:space-between;">
        <label for="out">Output</label>
        <button id="copy" class="secondary" style="padding:4px 10px;">Copy</button>
      </div>
      <div class="output" id="out" style="white-space:pre-wrap; word-break:break-word;"></div>
      <p class="note" id="note">Transformed locally. Each button applies to the current input.</p>
    </div>
  </main>

  <script src="/assets/app.js"></script>
  <script>
  (function () {
    var inp = document.getElementById("in");
    var out = document.getElementById("out");
    var note = document.getElementById("note");

    function setOut(text) {
      out.textContent = text;
      note.textContent = "Transformed locally. Each button applies to the current input.";
    }

    function reverseStr(s) {
      // Use spread to keep surrogate pairs together (emoji-safe).
      try { return Array.from(s).reverse().join(""); }
      catch (e) { return s.split("").reverse().join(""); }
    }

    function apply(fn) {
      var t = inp.value;
      if (!t) { setOut(""); note.textContent = "Enter some text first."; return; }
      setOut(fn(t));
    }

    var ops = {
      revChars: function (t) { return reverseStr(t); },
      revLineChars: function (t) { return t.split("\n").map(reverseStr).join("\n"); },
      revWords: function (t) {
        return t.split("\n").map(function (line) {
          return line.split(/(\s+)/).reverse().join(""); // keep whitespace runs in place
        }).join("\n");
      },
      revWordChars: function (t) {
        return t.split("\n").map(function (line) {
          return line.split(/(\s+)/).map(function (tok) {
            return /^\s+$/.test(tok) ? tok : reverseStr(tok);
          }).join("");
        }).join("\n");
      },
      revLines: function (t) { return t.split("\n").reverse().join("\n"); },
      flipCase: function (t) {
        return t.replace(/[a-z]/gi, function (c) {
          return c === c.toUpperCase() ? c.toLowerCase() : c.toUpperCase();
        });
      },
      dedupe: function (t) {
        var seen = {}, out = [];
        t.split("\n").forEach(function (l) { if (!(l in seen)) { seen[l] = 1; out.push(l); } });
        return out.join("\n");
      },
      rmBlank: function (t) { return t.split("\n").filter(function (l) { return l.trim() !== ""; }).join("\n"); },
      trim: function (t) { return t.split("\n").map(function (l) { return l.trim(); }).join("\n"); }
    };

    Object.keys(ops).forEach(function (id) {
      document.getElementById(id).addEventListener("click", function () { apply(ops[id]); });
    });

    document.getElementById("clear").addEventListener("click", function () {
      inp.value = ""; setOut("");
    });

    document.getElementById("copy").addEventListener("click", function () {
      var t = out.textContent;
      if (!t) return;
      var b = this;
      if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(t).then(function () {
          b.textContent = "Copied!"; setTimeout(function () { b.textContent = "Copy"; }, 1200);
        });
      } else {
        var ta = document.createElement("textarea");
        ta.value = t; document.body.appendChild(ta); ta.select();
        try { document.execCommand("copy"); b.textContent = "Copied!"; setTimeout(function () { b.textContent = "Copy"; }, 1200); }
        catch (e) {}
        ta.remove();
      }
    });
  })();
  </script>
</body>
</html>
