<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <script src="/assets/theme-init.js"></script>
  <title>Case &amp; Text Transform — Virtual Tools</title>
  <link rel="stylesheet" href="/assets/style.css">
</head>
<body>
  <div id="site-header"></div>
  <main>
    <div class="tool-header">
      <a class="back" href="/">← All tools</a>
      <h1>Case &amp; Text Transform</h1>
      <p>Convert text between common cases and clean up whitespace — all in your browser.</p>
    </div>

    <div class="panel">
      <div class="field">
        <label for="in">Input</label>
        <textarea id="in" placeholder="Type or paste text…"></textarea>
      </div>
      <div class="row" style="gap:8px;">
        <button data-t="upper">UPPERCASE</button>
        <button data-t="lower" class="secondary">lowercase</button>
        <button data-t="title" class="secondary">Title Case</button>
        <button data-t="sentence" class="secondary">Sentence case</button>
        <button data-t="camel" class="secondary">camelCase</button>
        <button data-t="pascal" class="secondary">PascalCase</button>
        <button data-t="snake" class="secondary">snake_case</button>
        <button data-t="kebab" class="secondary">kebab-case</button>
        <button data-t="constant" class="secondary">CONSTANT_CASE</button>
        <button data-t="trim" class="secondary">Trim &amp; squeeze</button>
        <button data-t="reverse" class="secondary">Reverse</button>
      </div>
      <div class="spacer"></div>
      <div class="row" style="justify-content:space-between;">
        <label for="out">Output</label>
        <button id="copy" class="secondary" style="padding:4px 10px;">Copy</button>
      </div>
      <div class="output" id="out" style="white-space:pre-wrap;"></div>
      <p class="note" id="count">0 characters · 0 words · 0 lines</p>
    </div>
  </main>

  <script src="/assets/app.js"></script>
  <script>
  (function () {
    var inp = document.getElementById("in");
    var out = document.getElementById("out");
    var countEl = document.getElementById("count");

    function cap(w) { return w ? w.charAt(0).toUpperCase() + w.slice(1).toLowerCase() : w; }

    // Split into alphanumeric words, breaking camelCase boundaries first.
    function words(s) {
      return s
        .replace(/([a-z0-9])([A-Z])/g, "$1 $2")
        .replace(/[^a-zA-Z0-9]+/g, " ")
        .trim()
        .split(/\s+/)
        .filter(Boolean);
    }

    var T = {
      upper: function (s) { return s.toUpperCase(); },
      lower: function (s) { return s.toLowerCase(); },
      title: function (s) { return words(s).map(cap).join(" "); },
      sentence: function (s) {
        return s.toLowerCase().replace(/(^\s*[a-z])|([.!?]\s+[a-z])/g, function (m) {
          return m.toUpperCase();
        });
      },
      camel: function (s) {
        var w = words(s); if (!w.length) return "";
        return w[0].toLowerCase() + w.slice(1).map(cap).join("");
      },
      pascal: function (s) { return words(s).map(cap).join(""); },
      snake: function (s) { return words(s).map(function (w) { return w.toLowerCase(); }).join("_"); },
      kebab: function (s) { return words(s).map(function (w) { return w.toLowerCase(); }).join("-"); },
      constant: function (s) { return words(s).map(function (w) { return w.toUpperCase(); }).join("_"); },
      trim: function (s) { return s.replace(/\s+/g, " ").trim(); },
      reverse: function (s) { return s.split("").reverse().join(""); }
    };

    function updateCount(text) {
      var chars = text.length;
      var wordsN = text.trim() ? text.trim().split(/\s+/).length : 0;
      var lines = text ? text.split(/\n/).length : 0;
      countEl.textContent = chars + " characters · " + wordsN + " words · " + lines + " lines";
    }

    document.querySelectorAll("[data-t]").forEach(function (btn) {
      btn.addEventListener("click", function () {
        var fn = T[btn.getAttribute("data-t")];
        out.textContent = fn(inp.value);
        updateCount(out.textContent);
      });
    });

    document.getElementById("copy").addEventListener("click", function () {
      var text = out.textContent;
      if (!text) return;
      var btn = this;
      if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(text).then(function () {
          btn.textContent = "Copied!"; setTimeout(function () { btn.textContent = "Copy"; }, 1200);
        });
      } else {
        var ta = document.createElement("textarea");
        ta.value = text; document.body.appendChild(ta); ta.select();
        try { document.execCommand("copy"); btn.textContent = "Copied!"; setTimeout(function () { btn.textContent = "Copy"; }, 1200); }
        catch (e) {}
        ta.remove();
      }
    });

    inp.addEventListener("input", function () { updateCount(inp.value); });
  })();
  </script>
</body>
</html>
