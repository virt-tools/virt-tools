<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="/assets/theme-init.js"></script>
<title>Tarot Card Reader — Virtual Tools</title>
<link rel="stylesheet" href="/assets/style.css">
<style>
.tool-wrap{max-width:800px;margin:0 auto;text-align:center;}
.spreads{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin:15px 0;}
.spreads button{padding:8px 16px;border-radius:8px;border:1px solid var(--border,#555);background:var(--bg-alt,#1a1f2e);color:var(--text,#eee);cursor:pointer;font-size:14px;}
.spreads button.active{background:var(--accent,#5b8def);color:#fff;border-color:var(--accent,#5b8def);}
.cards{display:flex;gap:15px;justify-content:center;flex-wrap:wrap;margin:20px 0;min-height:240px;}
.card{width:140px;height:220px;border-radius:12px;background:linear-gradient(135deg,#2a1f3e,#1a1f2e);border:2px solid #6a4c93;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:10px;cursor:pointer;position:relative;transition:transform .3s;}
.card:hover{transform:translateY(-5px);}
.card.reversed{transform:rotate(180deg);}
.card.reversed:hover{transform:rotate(180deg) translateY(-5px);}
.card .name{font-size:14px;font-weight:700;text-align:center;color:#e0d8f0;margin-top:8px;}
.card .symbol{font-size:48px;}
.card .num{font-size:12px;color:#b39ddb;}
.interp{text-align:left;background:var(--bg-alt,#1a1f2e);padding:15px;border-radius:12px;margin:10px 0;}
.interp h3{color:var(--accent,#5b8def);margin:0 0 8px;}
.interp .pos{color:#43a047;font-size:13px;margin:4px 0;}
.interp .rev{color:#e53935;font-size:13px;margin:4px 0;}
.interp p{color:var(--text-secondary,#aaa);font-size:14px;margin:4px 0;}
.btn-primary{padding:10px 24px;border-radius:8px;border:none;background:var(--accent,#5b8def);color:#fff;cursor:pointer;font-size:16px;font-weight:600;}
</style>
</head>
<body>
<header id="site-header"></header>
<main>
<div class="tool-wrap">
<h1>Tarot Card Reader 🔮</h1>
<p class="tool-desc">Draw Tarot cards and receive interpretations. Choose from three spreads. Cards may appear reversed for alternate meanings. For entertainment and reflection.</p>
<div class="spreads">
<button class="active" onclick="setSpread(1,this)">Single Card</button>
<button onclick="setSpread(3,this)">Past / Present / Future</button>
<button onclick="setSpread(5,this)">Celtic Cross (5)</button>
</div>
<button class="btn-primary" onclick="draw()">✨ Draw Cards</button>
<div class="cards" id="cards"></div>
<div id="interps"></div>
</div>
</main>
<script src="/assets/app.js"></script>
<script>
const deck=[
{n:'The Fool',s:'🃏',m:'New beginnings, spontaneity, free spirit',r:'Recklessness, risk-taking, naivety'},
{n:'The Magician',s:'🪄',m:'Manifestation, willpower, skill',r:'Manipulation, untapped talents, deception'},
{n:'The High Priestess',s:'🌙',m:'Intuition, mystery, inner voice',r:'Secrets, disconnected from intuition, confusion'},
{n:'The Empress',s:'👑',m:'Abundance, nurturing, fertility, nature',r:'Dependence, smothering, creative block'},
{n:'The Emperor',s:'🏛️',m:'Authority, structure, control, leadership',r:'Domination, rigidity, inflexibility'},
{n:'The Hierophant',s:'⛪',m:'Tradition, spiritual wisdom, conformity',r:'Rebellion, unconventional, free-thinking'},
{n:'The Lovers',s:'💞',m:'Love, harmony, choices, values',r:'Disharmony, imbalance, misalignment'},
{n:'The Chariot',s:'⚔️',m:'Determination, willpower, victory',r:'Lack of direction, aggression, scattered'},
{n:'Strength',s:'🦁',m:'Courage, inner strength, patience',r:'Self-doubt, weakness, insecurity'},
{n:'The Hermit',s:'🔦',m:'Introspection, solitude, inner guidance',r:'Isolation, loneliness, withdrawal'},
{n:'Wheel of Fortune',s:'🎡',m:'Destiny, change, cycles, luck',r:'Bad luck, resistance to change, setbacks'},
{n:'Justice',s:'⚖️',m:'Fairness, truth, cause and effect',r:'Unfairness, dishonesty, avoidance'},
{n:'The Hanged Man',s:'🤸',m:'Sacrifice, perspective, letting go',r:'Stalling, indecision, resistance'},
{n:'Death',s:'💀',m:'Endings, transformation, transition',r:'Resistance to change, stagnation, decay'},
{n:'Temperance',s:'🍷',m:'Balance, moderation, patience',r:'Imbalance, excess, lack of harmony'},
{n:'The Devil',s:'😈',m:'Bondage, addiction, materialism',r:'Release, freedom, reclaiming power'},
{n:'The Tower',s:'🗼',m:'Sudden change, upheaval, revelation',r:'Avoiding disaster, fear of change'},
{n:'The Star',s:'⭐',m:'Hope, faith, renewal, inspiration',r:'Despair, hopelessness, discouragement'},
{n:'The Moon',s:'🌕',m:'Illusion, fear, subconscious, dreams',r:'Confusion lifting, truth revealed, clarity'},
{n:'The Sun',s:'☀️',m:'Joy, success, positivity, vitality',r:'Temporary sadness, delayed success'},
{n:'Judgement',s:'📯',m:'Awakening, reckoning, absolution',r:'Self-doubt, refusal to learn, regret'},
{n:'The World',s:'🌍',m:'Completion, achievement, fulfillment',r:'Incomplete, shortfalls, delays'},
];
let spread=1;
function setSpread(n,btn){spread=n;document.querySelectorAll('.spreads button').forEach(b=>b.classList.remove('active'));btn.classList.add('active');}
function draw(){
const cardsEl=document.getElementById('cards');const interpsEl=document.getElementById('interps');
cardsEl.innerHTML='';interpsEl.innerHTML='';
const picked=[];const used=new Set();
for(let i=0;i<spread;i++){let idx;do{idx=Math.floor(Math.random()*deck.length);}while(used.has(idx));used.add(idx);picked.push({card:deck[idx],reversed:Math.random()<0.4});}
const labels=spread===1?['Today\'s Card']:spread===3?['Past','Present','Future']:['Situation','Challenge','Advice','Outcome','Root'];
picked.forEach((p,i)=>{
const c=document.createElement('div');c.className='card'+(p.reversed?' reversed':'');
c.innerHTML=`<div class="symbol">${p.card.s}</div><div class="num">${labels[i]||'Card '+(i+1)}</div><div class="name">${p.card.n}</div>`;
cardsEl.appendChild(c);
const interp=document.createElement('div');interp.className='interp';
interp.innerHTML=`<h3>${labels[i]||'Card '+(i+1)}: ${p.card.n}${p.reversed?' (Reversed)':''}</h3>
${p.reversed?`<div class="rev">Reversed: ${p.card.r}</div>`:`<div class="pos">Upright: ${p.card.m}</div>`}`;
interpsEl.appendChild(interp);});
}
</script>
</body>
</html>
