<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <script src="/assets/theme-init.js"></script>
  <title>URL Encode / Decode — Virtual Tools</title>
  <link rel="stylesheet" href="/assets/style.css">
</head>
<body>
  <div id="site-header"></div>
  <main>
    <div class="tool-header">
      <a class="back" href="/">← All tools</a>
      <h1>URL Encode / Decode</h1>
      <p>Percent-encode or decode URLs and query parameters. Runs locally.</p>
    </div>

    <div class="panel">
      <div class="field">
        <label for="in">Input</label>
        <textarea id="in" placeholder="https://example.com/?q=hello world"></textarea>
      </div>
      <div class="row">
        <label style="display:flex; align-items:center; gap:6px; margin:0;">
          <input type="checkbox" id="component" checked> Encode component (encodeURIComponent)
        </label>
        <button id="encode">Encode →</button>
        <button id="decode" class="secondary">← Decode</button>
        <button id="clear" class="secondary">Clear</button>
      </div>
      <div class="spacer"></div>
      <label for="out">Output</label>
      <div class="output" id="out"></div>
      <p class="note" id="err"></p>
    </div>
  </main>

  <script src="/assets/app.js"></script>
  <script>
  (function () {
    var inp = document.getElementById("in");
    var out = document.getElementById("out");
    var err = document.getElementById("err");
    var component = document.getElementById("component");

    document.getElementById("encode").addEventListener("click", function () {
      err.textContent = "";
      try {
        out.textContent = component.checked ? encodeURIComponent(inp.value) : encodeURI(inp.value);
      } catch (e) { err.textContent = "Error: " + e.message; }
    });
    document.getElementById("decode").addEventListener("click", function () {
      err.textContent = "";
      try {
        out.textContent = component.checked ? decodeURIComponent(inp.value) : decodeURI(inp.value);
      } catch (e) { err.textContent = "Not valid percent-encoding."; }
    });
    document.getElementById("clear").addEventListener("click", function () {
      inp.value = ""; out.textContent = ""; err.textContent = "";
    });
  })();
  </script>
</body></html>
