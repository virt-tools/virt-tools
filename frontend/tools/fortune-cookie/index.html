<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="/assets/theme-init.js"></script>
<title>Fortune Cookie — Virtual Tools</title>
<link rel="stylesheet" href="/assets/style.css">
<style>
.tool-wrap{max-width:480px;margin:0 auto;text-align:center;}
.cookie-stage{margin:30px 0;}
.cookie{font-size:120px;cursor:pointer;display:inline-block;transition:transform .3s ease;user-select:none;}
.cookie:hover{transform:scale(1.1);}
.cookie.cracking{animation:crack .6s ease forwards;}
@keyframes crack{0%{transform:scale(1) rotate(0);}30%{transform:scale(1.15) rotate(-5deg);}60%{transform:scale(1.15) rotate(5deg);}100%{transform:scale(.9) rotate(0);opacity:.3;}}
.fortune-card{background:var(--bg-alt,#1a1f2e);border:1px solid var(--border,#333);border-radius:12px;padding:25px;margin:20px 0;display:none;animation:slideIn .5s ease;}
.fortune-card.show{display:block;}
@keyframes slideIn{from{opacity:0;transform:translateY(15px);}to{opacity:1;transform:translateY(0);}}
.fortune-text{font-size:18px;font-style:italic;color:var(--text,#e0e0e0);line-height:1.5;margin:10px 0;}
.fortune-text::before{content:'"';font-size:28px;color:var(--text-dim,#888);margin-right:4px;}
.fortune-text::after{content:'"';font-size:28px;color:var(--text-dim,#888);margin-left:4px;}
.lucky-section{margin:15px 0;padding-top:15px;border-top:1px solid var(--border,#333);}
.lucky-label{font-size:12px;color:var(--text-dim,#888);margin-bottom:8px;}
.lucky-numbers{display:flex;justify-content:center;gap:8px;}
.lucky-num{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,#e65100,#bf360c);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:15px;}
.fortune-luck{font-size:13px;color:var(--text-dim,#888);margin-top:10px;}
.crack-btn{display:block;width:100%;padding:14px;border-radius:8px;border:none;background:#e65100;color:#fff;font-size:18px;font-weight:700;cursor:pointer;margin:15px 0;}
.crack-btn:hover{background:#bf360c;}
.crack-btn:active{transform:scale(.98);}
.history-box{text-align:left;margin:15px 0;}
.history-box h4{color:var(--text-dim,#888);font-size:13px;margin-bottom:8px;}
.hist-item{background:var(--bg-alt,#1a1f2e);border-radius:8px;padding:10px;margin-bottom:6px;font-size:14px;font-style:italic;color:var(--text-dim,#aaa);}
.hist-item .time{font-size:11px;color:var(--text-dim,#666);font-style:normal;margin-top:4px;}
.share-btn{padding:6px 16px;border-radius:6px;border:1px solid var(--border,#333);background:transparent;color:var(--text,#e0e0e0);cursor:pointer;font-size:13px;margin-top:8px;}
.share-btn:hover{background:rgba(255,255,255,.05);}
</style>
</head>
<body>
<header id="site-header"></header>
<main>
<div class="tool-wrap">
<h1>Fortune Cookie 🥠</h1>
<p class="tool-desc">Crack open a virtual fortune cookie. Get a random fortune, lucky numbers, and a dose of wisdom. All client-side — no cookies (the tracking kind) involved!</p>

<div class="cookie-stage">
<div class="cookie" id="cookie" onclick="crackCookie()">🥠</div>
</div>

<div class="fortune-card" id="fortuneCard">
<div class="fortune-text" id="fortuneText"></div>
<div class="lucky-section">
<div class="lucky-label">Your lucky numbers</div>
<div class="lucky-numbers" id="luckyNumbers"></div>
</div>
<div class="fortune-luck" id="fortuneLuck"></div>
<button class="share-btn" onclick="copyFortune()">📋 Copy Fortune</button>
</div>

<button class="crack-btn" onclick="crackCookie()"> Crack Another Cookie</button>

<div class="history-box">
<h4>Recent fortunes</h4>
<div id="history"></div>
</div>
</div>
</main>
<script src="/assets/app.js"></script>
<script>
const FORTUNES=[
"A journey of a thousand miles begins with a single step, but the journey of a thousand bugs begins with one missing semicolon.",
"You will find unexpected joy in the most mundane tasks today.",
"The best time to plant a tree was 20 years ago. The second best time is now.",
"Your patience will be rewarded sooner than you think.",
"A pleasant surprise is waiting for you in the near future.",
"Do not be afraid of going slowly; be afraid only of standing still.",
"You will soon receive a message that changes your perspective.",
"Today is a good day to try something new.",
"Your hard work is about to pay off in an unexpected way.",
"The fortune you seek is in another cookie. Just kidding — it is right here.",
"Good things come to those who wait, but better things come to those who act.",
"You will make someone smile today without realizing it.",
"An opportunity will present itself in an unusual form.",
"Trust your instincts — they are wiser than you give them credit for.",
"A small change in your routine will lead to a big improvement.",
"You are stronger than you think and more capable than you know.",
"Someone is thinking of you fondly right now.",
"The path to success is never a straight line, but it is always forward.",
"You will discover a hidden talent within yourself this week.",
"Your generosity will return to you multiplied.",
"Do not mistake motion for progress — a rocking horse keeps moving but goes nowhere.",
"Today's challenge is tomorrow's strength.",
"You will find what you are looking for when you stop searching.",
"Be the person your dog thinks you are.",
"Adventure awaits you this weekend — say yes to the invitation.",
"The number you are thinking of has special significance today.",
"You will have a brilliant idea in the shower tomorrow morning.",
"Kindness is free, and today it will be worth more than gold.",
"You are about to turn a setback into a comeback.",
"Remember: a dead end is just a good place to turn around.",
"The early bird gets the worm, but the second mouse gets the cheese.",
"You will reconnect with someone who brings out the best in you.",
"Do not worry about what others think — they are too busy worrying about themselves.",
"A creative solution to your problem will come to you in a dream.",
"You will soon have reason to celebrate.",
"The universe is conspiring in your favor, even when it does not feel like it.",
"Your cooking will impress someone important this week.",
"Take the scenic route today — you will not regret it.",
"A problem you have been avoiding will resolve itself if you just start.",
"You will laugh so hard your sides hurt within the next 48 hours.",
"Today's coincidence is tomorrow's serendipity.",
"Your inbox will bring good news before the day is done.",
"You cannot control the wind, but you can adjust your sails.",
"Someone will compliment you today — accept it gracefully.",
"The book you need to read will find its way to you soon.",
"You will make a decision today that your future self will thank you for.",
"Keep your face always toward the sunshine, and shadows will fall behind you.",
"You will find money in an unexpected place this week.",
"Do not push the river — it flows by itself.",
"A long-standing question will finally be answered this month.",
"You are exactly where you need to be right now.",
];

const LUCK_TYPES=[
{label:'Luck rating',vals:['★★★★★ Excellent','★★★★☆ Very good','★★★★ Good','★★★☆ Fair','★★★ Moderate']},
{label:'Mood',vals:['Optimistic','Adventurous','Contemplative','Playful','Determined','Calm','Curious']},
{label:'Best activity today',vals:['Take a walk','Call a friend','Try a new recipe','Start that project','Read a book','Listen to music','Organize something','Help someone']},
{label:'Color of the day',vals:['Red','Blue','Green','Gold','Purple','Teal','Orange','Silver']},
];

function cryptoRandom(max){const a=new Uint32Array(1);crypto.getRandomValues(a);return a[0]%max;}

let historyData=[];

function crackCookie(){
const cookie=document.getElementById('cookie');
cookie.classList.add('cracking');
setTimeout(()=>{
cookie.classList.remove('cracking');
cookie.style.opacity='1';
showFortune();
},600);
}

function showFortune(){
const fortune=FORTUNES[cryptoRandom(FORTUNES.length)];
document.getElementById('fortuneText').textContent=fortune;
const luck=LUCK_TYPES[cryptoRandom(LUCK_TYPES.length)];
document.getElementById('fortuneLuck').textContent=`${luck.label}: ${luck.vals[cryptoRandom(luck.vals.length)]}`;
const nums=document.getElementById('luckyNumbers');nums.innerHTML='';
for(let i=0;i<6;i++){const n=document.createElement('div');n.className='lucky-num';n.textContent=cryptoRandom(49)+1;nums.appendChild(n);}
const card=document.getElementById('fortuneCard');
card.classList.remove('show');void card.offsetWidth;card.classList.add('show');
historyData.unshift({text:fortune,time:new Date().toLocaleTimeString()});
if(historyData.length>3)historyData.pop();
const h=document.getElementById('history');h.innerHTML='';
historyData.forEach(hd=>{const item=document.createElement('div');item.className='hist-item';item.innerHTML=`${hd.text}<div class="time">${hd.time}</div>`;h.appendChild(item);});
}

function copyFortune(){
const text=document.getElementById('fortuneText').textContent+'\n\n'+document.getElementById('fortuneLuck').textContent;
navigator.clipboard.writeText(text);
}
</script>
</body>
</html>
