<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CSS Progress Ring Generator — virt.tools</title>
<link rel="stylesheet" href="/assets/style.css">
<style>
.tool-area{max-width:900px;margin:2rem auto;padding:0 1rem}
.controls{display:grid;gap:1rem;margin:1.5rem 0;padding:1.5rem;background:#1a1a2e;border-radius:12px}
.control-row{display:flex;gap:1rem;align-items:center;flex-wrap:wrap}
.control-row label{min-width:140px;font-weight:600;font-size:.9rem}
.control-row select,.control-row input{padding:.5rem .75rem;border-radius:8px;border:1px solid #444;background:#0f0f1e;color:#eee;font-size:.9rem}
.preview-box{margin:1.5rem 0;padding:2rem;background:#0f0f1e;border-radius:12px;display:flex;justify-content:center;align-items:center;min-height:200px;gap:2rem;flex-wrap:wrap}
.output-block{margin:2rem 0}
.output-block textarea{width:100%;min-height:80px;font-family:monospace;font-size:.85rem;padding:1rem;border-radius:8px;border:1px solid #444;background:#0f0f1e;color:#eee;resize:vertical}
.copy-btn{padding:.6rem 1.2rem;border:none;border-radius:8px;background:#667eea;color:#fff;cursor:pointer;font-size:.9rem;margin-top:.5rem}
h2{margin-top:2rem;font-size:1.2rem}
.ring-wrap{position:relative;width:120px;height:120px}
.ring-svg{transform:rotate(-90deg)}
.ring-text{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:1.5rem;font-weight:700}
</style>
</head>
<body>
<header id="site-header"></header>
<main>
<div class="tool-area">
<h1>⭕ CSS Progress Ring Generator</h1>
<p>Create CSS circular/ring progress indicators using SVG. Adjustable size, stroke width, color, and value. Copy HTML+CSS.</p>
<div class="controls">
<div class="control-row">
<label>Progress (%)</label><input type="range" id="progress" min="0" max="100" value="65" style="width:120px"><span id="pVal">65%</span>
<label>Size (px)</label><input type="number" id="size" value="120" min="40" max="300" style="width:80px">
</div>
<div class="control-row">
<label>Stroke Width (px)</label><input type="range" id="strokeW" min="2" max="20" value="8" style="width:120px"><span id="swVal">8px</span>
<label>Ring Color</label><input type="color" id="ringColor" value="#667eea">
</div>
<div class="control-row">
<label>Track Color</label><input type="color" id="trackColor" value="#2a2a4e">
<label>Label</label><input type="text" id="label" value="" placeholder="auto %" style="width:100px">
<label>Font Size (px)</label><input type="number" id="fontSize" value="24" min="8" max="60" style="width:60px">
</div>
<div class="control-row">
<label>Style</label><select id="style"><option value="flat">Flat</option><option value="rounded" selected>Rounded</option><option value="gradient">Gradient</option><option value="glow">Glow</option></select>
<label>Gradient End</label><input type="color" id="gradEnd" value="#764ba2">
</div>
</div>
<h2>Preview</h2>
<div class="preview-box" id="preview"></div>
<h2>HTML</h2><div class="output-block"><textarea id="htmlOut" readonly></textarea><button class="copy-btn" onclick="copyText('htmlOut')">Copy HTML</button></div>
<h2>CSS</h2><div class="output-block"><textarea id="cssOut" readonly></textarea><button class="copy-btn" onclick="copyText('cssOut')">Copy CSS</button></div>
</div>
</main>
<script src="/assets/app.js"></script>
<script>
function update(){
var p=parseInt(document.getElementById('progress').value);
var sz=parseInt(document.getElementById('size').value);
var sw=parseInt(document.getElementById('strokeW').value);
var rc=document.getElementById('ringColor').value;
var tc=document.getElementById('trackColor').value;
var lbl=document.getElementById('label').value;
var fs=parseInt(document.getElementById('fontSize').value);
var st=document.getElementById('style').value;
var ge=document.getElementById('gradColor')?document.getElementById('gradColor').value:'#764ba2';
var ge2=document.getElementById('gradEnd').value;
document.getElementById('pVal').textContent=p+'%';
document.getElementById('swVal').textContent=sw+'px';
var r=(sz/2)-(sw/2);
var c=2*Math.PI*r;
var off=c-(p/100)*c;
var lc=st==='rounded'?'round':'butt';
var text=lbl||p+'%';
var gid='ringGrad'+Date.now();
var defs=st==='gradient'?'<defs><linearGradient id="'+gid+'" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="'+rc+'"/><stop offset="100%" stop-color="'+ge2+'"/></linearGradient></defs>':'';
var strokeC=st==='gradient'?'url(#'+gid+')':rc;
var glowFilter=st==='glow'?' style="filter:drop-shadow(0 0 4px '+rc+')"':'';
var html='<div class="ring-wrap" style="width:'+sz+'px;height:'+sz+'px">\n  <svg class="ring-svg" width="'+sz+'" height="'+sz+'"'+glowFilter+'>\n'+defs+'    <circle cx="'+sz/2+'" cy="'+sz/2+'" r="'+r+'" fill="none" stroke="'+tc+'" stroke-width="'+sw+'"/>\n    <circle cx="'+sz/2+'" cy="'+sz/2+'" r="'+r+'" fill="none" stroke="'+strokeC+'" stroke-width="'+sw+'" stroke-linecap="'+lc+'" stroke-dasharray="'+c.toFixed(2)+'" stroke-dashoffset="'+off.toFixed(2)+'" style="transition:stroke-dashoffset 0.5s ease"/>\n  </svg>\n  <span class="ring-text" style="font-size:'+fs+'px">'+text+'</span>\n</div>';
var css='.ring-wrap{position:relative;display:inline-flex;align-items:center;justify-content:center}\n.ring-svg{transform:rotate(-90deg)}\n.ring-text{position:absolute;font-weight:700}';
document.getElementById('preview').innerHTML=html;
document.getElementById('htmlOut').value=html;
document.getElementById('cssOut').value=css;
}
function copyText(id){var t=document.getElementById(id);t.select();document.execCommand('copy')}
document.querySelectorAll('select,input').forEach(function(e){e.addEventListener('input',update);e.addEventListener('change',update)});
update();
</script>
</body>
</html>
