<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CSS Blob & Morphing Shape Generator — virt.tools</title>
<link rel="stylesheet" href="/assets/style.css">
<style>
.tool-area{max-width:900px;margin:2rem auto;padding:0 1rem}
.controls{display:grid;gap:1rem;margin:1.5rem 0;padding:1.5rem;background:#1a1a2e;border-radius:12px}
.control-row{display:flex;gap:1rem;align-items:center;flex-wrap:wrap}
.control-row label{min-width:140px;font-weight:600;font-size:.9rem}
.control-row select,.control-row input{padding:.5rem .75rem;border-radius:8px;border:1px solid #444;background:#0f0f1e;color:#eee;font-size:.9rem}
.preview-box{margin:1.5rem 0;background:#0a0a14;border-radius:12px;min-height:320px;overflow:hidden;position:relative;display:flex;align-items:center;justify-content:center}
.output-block{margin:2rem 0}
.output-block textarea{width:100%;min-height:120px;font-family:monospace;font-size:.85rem;padding:1rem;border-radius:8px;border:1px solid #444;background:#0f0f1e;color:#eee;resize:vertical}
.copy-btn{padding:.6rem 1.2rem;border:none;border-radius:8px;background:#667eea;color:#fff;cursor:pointer;font-size:.9rem;margin-top:.5rem}
h2{margin-top:2rem;font-size:1.2rem}
</style>
</head>
<body>
<header id="site-header"></header>
<main>
<div class="tool-area">
<h1>🫧 CSS Blob & Morphing Shape Generator</h1>
<p>Create animated CSS blob/morphing shapes. 4 presets, adjustable colors/speed/complexity. Copy CSS.</p>
<div class="controls">
<div class="control-row">
<label>Preset</label><select id="preset"><option value="blob1">Blob 1</option><option value="blob2">Blob 2</option><option value="blob3">Blob 3</option><option value="blob4">Blob 4</option><option value="blob5">Blob 5</option></select>
</div>
<div class="control-row">
<label>Color</label><input type="color" id="color" value="#667eea">
<label>Size (px)</label><input type="number" id="size" value="200" min="50" max="400" step="10" style="width:70px">
<label>Speed (s)</label><input type="number" id="speed" value="8" min="2" max="30" step="1" style="width:60px">
</div>
<div class="control-row">
<label>Border Radius 1</label><input type="text" id="br1" value="60% 40% 30% 70% / 60% 30% 70% 40%" style="width:280px">
<label>Border Radius 2</label><input type="text" id="br2" value="30% 60% 70% 40% / 50% 60% 30% 60%" style="width:280px">
</div>
</div>
<h2>Preview</h2>
<div class="preview-box" id="preview"></div>
<h2>CSS</h2><div class="output-block"><textarea id="cssOut" readonly></textarea><button class="copy-btn" onclick="copyText('cssOut')">Copy CSS</button></div>
</div>
</main>
<script src="/assets/app.js"></script>
<script>
var presets={
blob1:{c:'#667eea',br1:'60% 40% 30% 70% / 60% 30% 70% 40%',br2:'30% 60% 70% 40% / 50% 60% 30% 60%'},
blob2:{c:'#f093fb',br1:'42% 58% 42% 58% / 42% 42% 58% 58%',br2:'58% 42% 58% 42% / 58% 58% 42% 42%'},
blob3:{c:'#4facfe',br1:'70% 30% 50% 50% / 50% 50% 30% 70%',br2:'30% 70% 50% 50% / 50% 50% 70% 30%'},
blob4:{c:'#43e97b',br1:'50% 50% 50% 50% / 40% 60% 40% 60%',br2:'50% 50% 50% 50% / 60% 40% 60% 40%'},
blob5:{c:'#fa709a',br1:'63% 37% 37% 63% / 41% 59% 41% 59%',br2:'37% 63% 63% 37% / 59% 41% 59% 41%'}
};
function update(){
var c=document.getElementById('color').value;
var sz=document.getElementById('size').value;
var sp=document.getElementById('speed').value;
var b1=document.getElementById('br1').value;
var b2=document.getElementById('br2').value;
var css='.blob{width:'+sz+'px;height:'+sz+'px;background:'+c+';border-radius:'+b1+';animation:blob-morph '+sp+'s ease-in-out infinite alternate}\n';
css+='@keyframes blob-morph{0%{border-radius:'+b1+';transform:rotate(0deg)}100%{border-radius:'+b2+';transform:rotate(180deg)}}\n';
document.getElementById('cssOut').value=css;
var pv=document.getElementById('preview');
pv.innerHTML='<div class="blob"></div>';
var st=document.createElement('style');st.textContent=css;pv.appendChild(st);
}
function copyText(id){var t=document.getElementById(id);t.select();document.execCommand('copy')}
document.getElementById('preset').addEventListener('change',function(){
var p=presets[this.value];document.getElementById('color').value=p.c;document.getElementById('br1').value=p.br1;document.getElementById('br2').value=p.br2;update();
});
document.querySelectorAll('select,input').forEach(function(e){e.addEventListener('input',update);e.addEventListener('change',update)});
update();
</script>
</body>
</html>
