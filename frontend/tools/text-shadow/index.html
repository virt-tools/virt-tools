<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="/assets/theme-init.js"></script>
<title>Text Shadow Generator — Virtual Tools</title>
<link rel="stylesheet" href="/assets/style.css">
<style>
.tool-wrap{max-width:720px;margin:0 auto;}
.tool-desc{font-size:14px;color:var(--text-secondary,#aaa);margin:8px 0 20px;}
.controls{display:grid;gap:8px;margin:12px 0;}
.row{display:flex;gap:8px;align-items:center;flex-wrap:wrap;}
.row label{font-size:13px;color:var(--text-secondary,#888);min-width:80px;}
.row input[type="text"]{flex:1;min-width:180px;padding:6px 10px;border-radius:6px;border:1px solid var(--border,#444);background:var(--card,#2a2f3e);color:var(--text,#eee);font-size:13px;}
.row input[type="number"]{width:70px;padding:6px;border-radius:6px;border:1px solid var(--border,#444);background:var(--card,#2a2f3e);color:var(--text,#eee);font-size:13px;}
.row input[type="color"]{width:40px;height:32px;border:none;border-radius:6px;cursor:pointer;background:none;}
.row select{padding:6px 10px;border-radius:6px;border:1px solid var(--border,#444);background:var(--card,#2a2f3e);color:var(--text,#eee);font-size:13px;}
.preview{background:linear-gradient(135deg,#1a1a2e,#16213e);border:1px solid var(--border,#333);border-radius:8px;padding:60px 20px;margin:12px 0;text-align:center;min-height:100px;}
.preview-text{font-size:48px;font-weight:700;font-family:Arial,sans-serif;}
button.action{padding:8px 16px;border-radius:6px;border:1px solid var(--border,#444);background:var(--card,#2a2f3e);color:var(--text,#eee);cursor:pointer;font-size:13px;}
button.action:hover{border-color:var(--accent,#5b8def);}
.css-output{background:var(--bg,#1e2230);border:1px solid var(--border,#444);border-radius:8px;padding:12px;margin:12px 0;font-family:monospace;font-size:12px;color:var(--text,#eee);white-space:pre-wrap;word-break:break-all;}
.presets{display:flex;gap:6px;flex-wrap:wrap;margin:8px 0;}
.preset-btn{padding:4px 12px;border-radius:6px;border:1px solid var(--border,#444);background:var(--card,#2a2f3e);color:var(--text,#eee);cursor:pointer;font-size:12px;}
.preset-btn:hover{border-color:var(--accent,#5b8def);}
</style>
</head>
<body>
<header id="site-header"></header>
<main>
<div class="tool-wrap">
<h1>🌑 Text Shadow Generator</h1>
<p class="tool-desc">Create CSS text-shadow effects: glow, outline, 3D, retro, neon. Copy CSS.</p>
<div class="presets">
<button class="preset-btn" onclick="preset('glow')">Glow</button>
<button class="preset-btn" onclick="preset('outline')">Outline</button>
<button class="preset-btn" onclick="preset('3d')">3D</button>
<button class="preset-btn" onclick="preset('retro')">Retro</button>
<button class="preset-btn" onclick="preset('neon')">Neon</button>
<button class="preset-btn" onclick="preset('fire')">Fire</button>
<button class="preset-btn" onclick="preset('multiple')">Multiple</button>
</div>
<div class="controls">
<div class="row"><label>Text:</label><input type="text" id="text" value="SHADOW"></div>
<div class="row"><label>Size:</label><input type="number" id="size" value="48" min="8" max="120"></div>
<div class="row"><label>Text color:</label><input type="color" id="textColor" value="#ffffff"><label>Shadow:</label><input type="color" id="shadowColor" value="#ff00aa"></div>
<div class="row"><label>Offset X:</label><input type="number" id="ox" value="2" min="-50" max="50"><label>Y:</label><input type="number" id="oy" value="2" min="-50" max="50"><label>Blur:</label><input type="number" id="blur" value="4" min="0" max="100"></div>
<div class="row"><label>Layers:</label><input type="number" id="layers" value="1" min="1" max="20"></div>
</div>
<div class="controls"><button class="action" onclick="copyCSS()">Copy CSS</button></div>
<div class="preview"><span class="preview-text" id="preview">SHADOW</span></div>
<div class="css-output" id="cssOutput"></div>
</div>
</main>
<script src="/assets/app.js"></script>
<script>
const presets={glow:{tc:'#fff',sc:'#00aaff',ox:0,oy:0,blur:20,layers:1},outline:{tc:'#fff',sc:'#000',ox:0,oy:0,blur:0,layers:8},3d:{tc:'#fff',sc:'#333',ox:3,oy:3,blur:0,layers:6},retro:{tc:'#fff',sc:'#ff00aa',ox:4,oy:4,blur:0,layers:1},neon:{tc:'#fff',sc:'#ff00ff',ox:0,oy:0,blur:15,layers:2},fire:{tc:'#fff',sc:'#ff6600',ox:0,oy:-4,blur:8,layers:1},multiple:{tc:'#fff',sc:'#00ff88',ox:2,oy:2,blur:0,layers:5}};
function preset(name){const p=presets[name];document.getElementById('textColor').value=p.tc;document.getElementById('shadowColor').value=p.sc;document.getElementById('ox').value=p.ox;document.getElementById('oy').value=p.oy;document.getElementById('blur').value=p.blur;document.getElementById('layers').value=p.layers;update();}
function buildShadow(){
const sc=document.getElementById('shadowColor').value;
const ox=parseInt(document.getElementById('ox').value);
const oy=parseInt(document.getElementById('oy').value);
const blur=parseInt(document.getElementById('blur').value);
const layers=parseInt(document.getElementById('layers').value);
let parts=[];
for(let i=1;i<=layers;i++){parts.push(`${ox*i}px ${oy*i}px ${blur}px ${sc}`);}
return parts.join(', ');
}
function update(){
const text=document.getElementById('text').value||'SHADOW';
const size=document.getElementById('size').value;
const tc=document.getElementById('textColor').value;
const p=document.getElementById('preview');
p.textContent=text;p.style.fontSize=size+'px';p.style.color=tc;
const shadow=buildShadow();p.style.textShadow=shadow;
document.getElementById('cssOutput').textContent=`text-shadow: ${shadow};`;
}
function copyCSS(){navigator.clipboard.writeText('text-shadow: '+buildShadow()+';').then(()=>alert('CSS copied!')).catch(()=>alert('Copy failed'));}
['text','size','textColor','shadowColor','ox','oy','blur','layers'].forEach(id=>{const el=document.getElementById(id);if(el)el.addEventListener('input',update);});
update();
</script>
</body>
</html>
