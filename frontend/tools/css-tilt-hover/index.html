<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CSS 3D Tilt on Hover Generator — virt.tools</title>
<link rel="stylesheet" href="/assets/style.css">
<style>
.tool-area{max-width:900px;margin:2rem auto;padding:0 1rem}
.controls{display:grid;gap:1rem;margin:1.5rem 0;padding:1.5rem;background:#1a1a2e;border-radius:12px}
.ctrl-row{display:flex;gap:1rem;align-items:center;flex-wrap:wrap;margin-bottom:.5rem}
.ctrl-row label{font-weight:600;font-size:.9rem;min-width:120px}
.ctrl-row select,.ctrl-row input{padding:.5rem;border-radius:8px;border:1px solid #444;background:#0f0f1e;color:#eee}
.preview-box{margin:1.5rem 0;padding:3rem;border-radius:12px;min-height:300px;display:flex;align-items:center;justify-content:center;perspective:800px}
.output-block{margin:2rem 0}
.output-block textarea{width:100%;min-height:80px;font-family:monospace;font-size:.85rem;padding:1rem;border-radius:8px;border:1px solid #444;background:#0f0f1e;color:#eee;resize:vertical}
.copy-btn{padding:.6rem 1.2rem;border:none;border-radius:8px;background:#667eea;color:#fff;cursor:pointer;font-size:.9rem;margin-top:.5rem}
h2{margin-top:2rem;font-size:1.2rem}
.tilt-card{width:200px;height:260px;border-radius:12px;background:linear-gradient(135deg,#667eea,#764ba2);display:flex;align-items:center;justify-content:center;color:#fff;font-size:1.5rem;font-weight:700;transition:transform .1s ease-out;box-shadow:0 20px 40px rgba(0,0,0,.3);transform-style:preserve-3d}
</style>
</head>
<body>
<header id="site-header"></header>
<main>
<div class="tool-area">
<h1>🎯 CSS 3D Tilt on Hover Generator</h1>
<p>Create CSS 3D card tilt effects that follow the mouse. Adjustable intensity, glare, shadow. Copy HTML+CSS+JS.</p>
<div class="controls">
<div class="ctrl-row">
<label>Max Tilt</label><select id="maxTilt"><option value="5">5°</option><option value="10">10°</option><option value="15" selected>15°</option><option value="25">25°</option><option value="35">35°</option></select>
<label>Scale</label><select id="scale"><option value="1">1.0</option><option value="1.05" selected>1.05</option><option value="1.1">1.1</option></select>
</div>
<div class="ctrl-row">
<label>Glare</label><select id="glare"><option value="none">None</option><option value="light">Light</option><option value="strong" selected>Strong</option></select>
<label>Shadow</label><select id="shadow"><option value="none">None</option><option value="small">Small</option><option value="large" selected>Large</option></select>
</div>
<div class="ctrl-row">
<label>Card Color</label><input type="color" id="cardColor" value="#667eea">
<label>Card Text</label><input type="text" id="cardText" value="Hover Me" style="width:120px">
</div>
<div class="ctrl-row"><button class="copy-btn" onclick="update()">Update</button></div>
</div>
<h2>Preview (hover the card)</h2>
<div class="preview-box" id="preview"></div>
<h2>HTML</h2><div class="output-block"><textarea id="htmlOut" readonly></textarea><button class="copy-btn" onclick="copyText('htmlOut')">Copy HTML</button></div>
<h2>CSS</h2><div class="output-block"><textarea id="cssOut" readonly></textarea><button class="copy-btn" onclick="copyText('cssOut')">Copy CSS</button></div>
<h2>JS</h2><div class="output-block"><textarea id="jsOut" readonly></textarea><button class="copy-btn" onclick="copyText('jsOut')">Copy JS</button></div>
</div>
</main>
<script src="/assets/app.js"></script>
<script>
function update(){
var mt=document.getElementById('maxTilt').value;
var sc=document.getElementById('scale').value;
var gl=document.getElementById('glare').value;
var sh=document.getElementById('shadow').value;
var cc=document.getElementById('cardColor').value;
var ct=document.getElementById('cardText').value;
var glareCSS=gl==='none'?'':'.tilt-card::before{content:"";position:absolute;inset:0;border-radius:inherit;background:linear-gradient(var(--glare-angle,135deg),rgba(255,255,255,'+(gl==='light'?'0.2':'0.4')+'),transparent 60%);opacity:0;transition:opacity .2s;pointer-events:none}.tilt-card:hover::before{opacity:1}';
var shadowCSS=sh==='none'?'box-shadow:none':sh==='small'?'box-shadow:0 5px 15px rgba(0,0,0,.2)':'box-shadow:0 20px 50px rgba(0,0,0,.4)';
var html='<div class="tilt-wrapper">\n  <div class="tilt-card">'+ct+'</div>\n</div>';
var css='.tilt-wrapper{perspective:800px}\n.tilt-card{width:200px;height:260px;border-radius:12px;background:linear-gradient(135deg,'+cc+','#764ba2);display:flex;align-items:center;justify-content:center;color:#fff;font-size:1.5rem;font-weight:700;transition:transform .1s ease-out;transform-style:preserve-3d;'+shadowCSS+';position:relative;overflow:hidden}\n'+glareCSS;
var js="document.querySelectorAll('.tilt-wrapper').forEach(function(wrap){\n  var card=wrap.querySelector('.tilt-card');\n  wrap.addEventListener('mousemove',function(e){\n    var rect=card.getBoundingClientRect();\n    var x=(e.clientX-rect.left)/rect.width-0.5;\n    var y=(e.clientY-rect.top)/rect.height-0.5;\n    var ry=x*"+mt+";\n    var rx=-y*"+mt+";\n    card.style.transform='perspective(800px) rotateX('+rx+'deg) rotateY('+ry+'deg) scale("+sc+")';\n    if(card.style.setProperty)card.style.setProperty('--glare-angle',(x*90+45)+'deg');\n  });\n  wrap.addEventListener('mouseleave',function(){\n    card.style.transform='perspective(800px) rotateX(0) rotateY(0) scale(1)';\n  });\n});";
document.getElementById('htmlOut').value=html;
document.getElementById('cssOut').value=css;
document.getElementById('jsOut').value=js;
var p=document.getElementById('preview');
p.innerHTML='<style>'+css+'</style>'+html;
eval(js);
}
function copyText(id){var t=document.getElementById(id);t.select();document.execCommand('copy')}
['maxTilt','scale','glare','shadow','cardColor','cardText'].forEach(function(id){var el=document.getElementById(id);el.addEventListener('input',update);el.addEventListener('change',update)});
update();
</script>
</body>
</html>
