<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CSS Changelog Generator — virt.tools</title>
<link rel="stylesheet" href="/assets/style.css">
<style>
.tool-area{max-width:900px;margin:2rem auto;padding:0 1rem}
.controls{display:grid;gap:1rem;margin:1.5rem 0;padding:1.5rem;background:#1a1a2e;border-radius:12px}
.control-row{display:flex;gap:1rem;align-items:center;flex-wrap:wrap}
.control-row label{min-width:100px;font-weight:600;font-size:.9rem}
.control-row select,.control-row input{padding:.5rem .75rem;border-radius:8px;border:1px solid #444;background:#0f0f1e;color:#eee;font-size:.9rem}
.preview-box{margin:1.5rem 0;border-radius:12px;padding:1.5rem;min-height:200px;background:#2a2a3e}
.output-block{margin:2rem 0}
.output-block textarea{width:100%;min-height:120px;font-family:monospace;font-size:.85rem;padding:1rem;border-radius:8px;border:1px solid #444;background:#0f0f1e;color:#eee;resize:vertical}
.copy-btn{padding:.6rem 1.2rem;border:none;border-radius:8px;background:#667eea;color:#fff;cursor:pointer;font-size:.9rem;margin-top:.5rem}
h2{margin-top:2rem;font-size:1.2rem}
</style>
</head>
<body>
<header id="site-header"></header>
<main>
<div class="tool-area">
<h1>📋 CSS Changelog Generator</h1>
<p>Create CSS changelog/release notes components. 3 styles, 4 item types (added/fixed/changed/removed). Copy HTML+CSS.</p>
<div class="controls">
<div class="control-row">
<label>Style</label><select id="style"><option value="card" selected>Card</option><option value="flat">Flat</option><option value="timeline">Timeline</option></select>
<label>Theme</label><select id="theme"><option value="dark" selected>Dark</option><option value="light">Light</option></select>
<label>Version</label><input type="text" id="version" value="v2.1.0" style="width:80px">
<label>Date</label><input type="text" id="date" value="2026-07-24" style="width:90px">
</div>
</div>
<h2>Preview</h2>
<div class="preview-box" id="preview"></div>
<h2>HTML</h2><div class="output-block"><textarea id="htmlOut" readonly></textarea><button class="copy-btn" onclick="copyText('htmlOut')">Copy HTML</button></div>
<h2>CSS</h2><div class="output-block"><textarea id="cssOut" readonly></textarea><button class="copy-btn" onclick="copyText('cssOut')">Copy CSS</button></div>
</div>
</main>
<script src="/assets/app.js"></script>
<script>
var items=[
{type:'added',text:'Dark mode support'},
{type:'fixed',text:'Memory leak in image processing'},
{type:'changed',text:'Updated UI for better accessibility'},
{type:'added',text:'Export to JSON feature'},
{type:'removed',text:'Deprecated legacy API endpoints'}
];
var typeColors={added:'#22c55e',fixed:'#3b82f6',changed:'#f59e0b',removed:'#ef4444'};
var typeIcons={added:'✚',fixed:'✓',changed:'↻',removed:'✕'};
function update(){
var style=document.getElementById('style').value,theme=document.getElementById('theme').value;
var ver=document.getElementById('version').value,date=document.getElementById('date').value;
var bg,text,bd;
if(theme==='light'){bg='#f8f9fa';text='#333';bd='#e0e0e0'}else{bg='#1a1a2e';text='#ccc';bd='#333'}
var html='<div class="changelog changelog-'+style+'">\n';
html+='  <div class="changelog-header">\n    <span class="changelog-version">'+ver+'</span>\n    <span class="changelog-date">'+date+'</span>\n  </div>\n';
html+='  <ul class="changelog-list">\n';
items.forEach(function(it){
html+='    <li class="changelog-item changelog-'+it.type+'">\n';
html+='      <span class="changelog-badge">'+typeIcons[it.type]+'</span>\n';
html+='      <span class="changelog-type">'+it.type.charAt(0).toUpperCase()+it.type.slice(1)+'</span>\n';
html+='      <span class="changelog-text">'+it.text+'</span>\n    </li>\n';
});
html+='  </ul>\n</div>';
var css='.changelog{max-width:500px;padding:24px;border-radius:12px;background:'+bg+';color:'+text+'}';
if(style==='flat')css+=';border-radius:0;box-shadow:none';
else if(style==='timeline')css+=';border-left:3px solid #667eea';
else css+=';border:1px solid '+bd;
css+='\n.changelog-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;padding-bottom:12px;border-bottom:1px solid '+bd+'}';
css+='\n.changelog-version{font-size:18px;font-weight:700}\n.changelog-date{font-size:13px;opacity:.6}';
css+='\n.changelog-list{list-style:none;padding:0;margin:0}';
css+='\n.changelog-item{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid '+bd}';
css+='\n.changelog-badge{width:24px;height:24px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:14px;color:#fff;flex-shrink:0}';
css+='\n.changelog-added .changelog-badge{background:'+typeColors.added+'}';
css+='\n.changelog-fixed .changelog-badge{background:'+typeColors.fixed+'}';
css+='\n.changelog-changed .changelog-badge{background:'+typeColors.changed+'}';
css+='\n.changelog-removed .changelog-badge{background:'+typeColors.removed+'}';
css+='\n.changelog-type{font-size:12px;font-weight:600;text-transform:uppercase;min-width:70px;opacity:.8}';
css+='\n.changelog-text{font-size:14px;flex:1}';
document.getElementById('htmlOut').value=html;
document.getElementById('cssOut').value=css;
document.getElementById('preview').innerHTML='<style>'+css+'<\/style>'+html;
}
function copyText(id){var t=document.getElementById(id);t.select();document.execCommand('copy')}
document.querySelectorAll('select,input').forEach(function(e){e.addEventListener('input',update);e.addEventListener('change',update)});
update();
</script>
</body>
</html>
