<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CSS Loading Screen Generator — virt.tools</title>
<link rel="stylesheet" href="/assets/style.css">
<style>
.tool-area{max-width:900px;margin:2rem auto;padding:0 1rem}
.controls{display:grid;gap:1rem;margin:1.5rem 0;padding:1.5rem;background:#1a1a2e;border-radius:12px}
.control-row{display:flex;gap:1rem;align-items:center;flex-wrap:wrap}
.control-row label{min-width:100px;font-weight:600;font-size:.9rem}
.control-row select,.control-row input{padding:.5rem .75rem;border-radius:8px;border:1px solid #444;background:#0f0f1e;color:#eee;font-size:.9rem}
.preview-box{margin:1.5rem 0;border-radius:12px;padding:1.5rem;min-height:250px;background:#111;display:flex;align-items:center;justify-content:center;overflow:hidden}
.output-block{margin:2rem 0}
.output-block textarea{width:100%;min-height:120px;font-family:monospace;font-size:.85rem;padding:1rem;border-radius:8px;border:1px solid #444;background:#0f0f1e;color:#eee;resize:vertical}
.copy-btn{padding:.6rem 1.2rem;border:none;border-radius:8px;background:#667eea;color:#fff;cursor:pointer;font-size:.9rem;margin-top:.5rem}
h2{margin-top:2rem;font-size:1.2rem}
</style>
</head>
<body>
<header id="site-header"></header>
<main>
<div class="tool-area">
<h1>⏳ CSS Loading Screen Generator</h1>
<p>Create CSS loading screen / preloader components. 6 animation types, 3 themes, custom text. Copy HTML+CSS.</p>
<div class="controls">
<div class="control-row">
<label>Type</label><select id="type"><option value="spinner" selected>Spinner</option><option value="dots">Bouncing Dots</option><option value="pulse">Pulse</option><option value="bars">Equalizer Bars</option><option value="ring">Ring</option><option value="orbit">Orbit</option></select>
<label>Theme</label><select id="theme"><option value="dark" selected>Dark</option><option value="light">Light</option><option value="colorful">Colorful</option></select>
<label>Size</label><select id="size"><option value="sm">Small</option><option value="md" selected>Medium</option><option value="lg">Large</option></select>
<label>Color</label><input type="color" id="color" value="#667eea">
<label>Text</label><input type="text" id="txt" value="Loading..." style="width:120px">
</div>
</div>
<h2>Preview</h2>
<div class="preview-box" id="preview"></div>
<h2>HTML</h2><div class="output-block"><textarea id="htmlOut" readonly></textarea><button class="copy-btn" onclick="copyText('htmlOut')">Copy HTML</button></div>
<h2>CSS</h2><div class="output-block"><textarea id="cssOut" readonly></textarea><button class="copy-btn" onclick="copyText('cssOut')">Copy CSS</button></div>
</div>
</main>
<script src="/assets/app.js"></script>
<script>
function update(){
var type=document.getElementById('type').value,theme=document.getElementById('theme').value;
var size=document.getElementById('size').value,color=document.getElementById('color').value,txt=document.getElementById('txt').value;
var sz= size==='sm'?40:size==='md'?60:80;
var bg=theme==='light'?'#fff':theme==='colorful'?'linear-gradient(135deg,#667eea,#764ba2)':'#111';
var tx=theme==='light'?'#333':'#fff';
var c2=theme==='colorful'?'#fff':color;
var html='<div class="ls ls-'+type+'" style="--ls-c:'+c2+';--ls-sz:'+sz+'px">\n';
if(type==='spinner')html+='  <div class="ls-spinner"></div>\n';
if(type==='dots')html+='  <div class="ls-dots"><span></span><span></span><span></span></div>\n';
if(type==='pulse')html+='  <div class="ls-pulse"></div>\n';
if(type==='bars')html+='  <div class="ls-bars"><span></span><span></span><span></span><span></span><span></span></div>\n';
if(type==='ring')html+='  <div class="ls-ring"></div>\n';
if(type==='orbit')html+='  <div class="ls-orbit"><span></span><span></span><span></span></div>\n';
if(txt)html+='  <p class="ls-text">'+txt+'</p>\n';
html+='</div>';
var css='.ls{display:flex;flex-direction:column;align-items:center;gap:20px;height:100vh;justify-content:center;background:'+bg+';color:'+tx+'}';
css+='\n.ls-spinner{width:var(--ls-sz);height:var(--ls-sz);border:4px solid '+c2+'30;border-top-color:var(--ls-c);border-radius:50%;animation:ls-spin .8s linear infinite}';
css+='\n.ls-dots{display:flex;gap:8px}.ls-dots span{width:calc(var(--ls-sz)/5);height:calc(var(--ls-sz)/5);background:var(--ls-c);border-radius:50%;animation:ls-bounce .6s ease infinite}.ls-dots span:nth-child(2){animation-delay:.1s}.ls-dots span:nth-child(3){animation-delay:.2s}';
css+='\n.ls-pulse{width:var(--ls-sz);height:var(--ls-sz);background:var(--ls-c);border-radius:50%;animation:ls-pulse 1.2s ease infinite}';
css+='\n.ls-bars{display:flex;gap:4px;align-items:flex-end;height:var(--ls-sz)}.ls-bars span{width:calc(var(--ls-sz)/8);height:100%;background:var(--ls-c);border-radius:4px;animation:ls-bar 1s ease infinite}.ls-bars span:nth-child(2){animation-delay:.1s}.ls-bars span:nth-child(3){animation-delay:.2s}.ls-bars span:nth-child(4){animation-delay:.3s}.ls-bars span:nth-child(5){animation-delay:.4s}';
css+='\n.ls-ring{width:var(--ls-sz);height:var(--ls-sz);border:4px solid transparent;border-top-color:var(--ls-c);border-bottom-color:var(--ls-c);border-radius:50%;animation:ls-spin 1s ease infinite}';
css+='\n.ls-orbit{position:relative;width:var(--ls-sz);height:var(--ls-sz);animation:ls-spin 1.5s linear infinite}.ls-orbit span{position:absolute;width:calc(var(--ls-sz)/4);height:calc(var(--ls-sz)/4);background:var(--ls-c);border-radius:50%}.ls-orbit span:nth-child(1){top:0;left:50%;transform:translateX(-50%)}.ls-orbit span:nth-child(2){bottom:0;left:50%;transform:translateX(-50%)}.ls-orbit span:nth-child(3){top:50%;left:0;transform:translateY(-50%)}';
css+='\n.ls-text{font-size:14px;font-family:system-ui;opacity:.7;animation:ls-fade 1.5s ease infinite}';
css+='\n@keyframes ls-spin{to{transform:rotate(360deg)}}';
css+='\n@keyframes ls-bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-15px)}}';
css+='\n@keyframes ls-pulse{0%,100%{transform:scale(.5);opacity:.5}50%{transform:scale(1);opacity:1}}';
css+='\n@keyframes ls-bar{0%,100%{height:30%}50%{height:100%}}';
css+='\n@keyframes ls-fade{0%,100%{opacity:.7}50%{opacity:.3}}';
document.getElementById('htmlOut').value=html;
document.getElementById('cssOut').value=css;
document.getElementById('preview').innerHTML='<style>'+css+'<\/style>'+html.replace(/height:100vh/g,'height:200px');
}
function copyText(id){var t=document.getElementById(id);t.select();document.execCommand('copy')}
document.querySelectorAll('select,input').forEach(function(e){e.addEventListener('input',update);e.addEventListener('change',update)});
update();
</script>
</body>
</html>
