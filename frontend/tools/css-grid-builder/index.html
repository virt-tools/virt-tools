<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <script src="/assets/theme-init.js"></script>
  <title>CSS Grid Layout Builder — Virtual Tools</title>
  <link rel="stylesheet" href="/assets/style.css">
  <style>
    .builder-grid { display: grid; gap: 4px; min-height: 360px; background: rgba(255,255,255,.03); border: 1px dashed var(--border,#2a2f3a); border-radius: 8px; padding: 8px; position: relative; }
    .grid-item { background: var(--accent,#6ea8fe); color: #08101f; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-weight: 700; font-family: monospace; cursor: pointer; min-height: 48px; transition: opacity .15s; opacity: .85; }
    .grid-item:hover { opacity: 1; }
    .grid-item.selected { outline: 3px solid #fff; outline-offset: 2px; }
    .controls { display: flex; flex-wrap: wrap; gap: 12px; align-items: center; margin: 12px 0; }
    .controls label { display: flex; align-items: center; gap: 6px; font-size: 13px; }
    .controls input[type="number"] { width: 60px; }
    .controls select { min-width: 100px; }
    .item-props { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; margin: 8px 0; padding: 10px; background: var(--bg-panel,#11151c); border-radius: 8px; font-size: 13px; }
    .item-props label { display: flex; align-items: center; gap: 4px; }
    .item-props input[type="number"] { width: 50px; }
    .code-output { background: #0a0d12; border: 1px solid var(--border,#2a2f3a); border-radius: 8px; padding: 14px; font-family: monospace; font-size: 12px; white-space: pre-wrap; overflow: auto; max-height: 280px; margin-top: 12px; }
    .code-output .sel { color: #6ea8fe; }
    .code-output .prop { color: #e6c07b; }
    .code-output .val { color: #98c379; }
    .area-input { font-family: monospace; width: 100%; min-height: 80px; background: #0a0d12; border: 1px solid var(--border,#2a2f3a); border-radius: 8px; padding: 10px; color: var(--text,#d4d9e0); font-size: 13px; resize: vertical; }
    .preset-row { display: flex; flex-wrap: wrap; gap: 6px; margin: 8px 0; }
    .preset-btn { padding: 4px 10px; border: 1px solid var(--border,#2a2f3a); border-radius: 6px; font-size: 12px; cursor: pointer; background: var(--bg-panel,#11151c); color: var(--text,#d4d9e0); }
    .preset-btn:hover { border-color: var(--accent,#6ea8fe); }
    .palette { display: flex; gap: 6px; flex-wrap: wrap; margin: 8px 0; }
    .palette .swatch { width: 24px; height: 24px; border-radius: 4px; cursor: pointer; border: 2px solid transparent; }
    .palette .swatch.active { border-color: #fff; }
    .btn-row { display: flex; gap: 8px; margin: 8px 0; }
    .btn { padding: 6px 14px; border-radius: 6px; border: 1px solid var(--border,#2a2f3a); background: var(--bg-panel,#11151c); color: var(--text,#d4d9e0); cursor: pointer; font-size: 13px; }
    .btn:hover { border-color: var(--accent,#6ea8fe); }
    .btn.primary { background: var(--accent,#6ea8fe); color: #08101f; border-color: var(--accent,#6ea8fe); font-weight: 600; }
  </style>
</head>
<body>
  <div id="site-header"></div>
  <main>
    <div class="tool-header">
      <a class="back" href="/">← All tools</a>
      <h1>CSS Grid Layout Builder</h1>
      <p>Visually build CSS Grid layouts. Set columns and rows, place items with grid-column/row spans, define grid areas, and copy the generated CSS. Choose from presets or build from scratch. Fully client-side.</p>
    </div>

    <div class="panel">
      <div class="controls">
        <label>Columns <input type="number" id="cols" value="3" min="1" max="12"></label>
        <label>Rows <input type="number" id="rows" value="3" min="1" max="12"></label>
        <label>Gap <input type="number" id="gap" value="8" min="0" max="40">px</label>
        <label>Template
          <select id="tmplType">
            <option value="none">Custom (fr)</option>
            <option value="auto">Auto-fit</option>
            <option value="repeat">Repeat</option>
          </select>
        </label>
        <label>Col width <input type="text" id="colWidth" value="1fr" style="width:80px"></label>
        <button class="btn" id="addBtn">+ Add item</button>
        <button class="btn" id="clearBtn">Clear</button>
      </div>

      <div class="preset-row">
        <button class="preset-btn" data-preset="holy-grail">Holy Grail</button>
        <button class="preset-btn" data-preset="dashboard">Dashboard</button>
        <button class="preset-btn" data-preset="magazine">Magazine</button>
        <button class="preset-btn" data-preset="gallery">Gallery</button>
        <button class="preset-btn" data-preset="sidebar">Sidebar Layout</button>
        <button class="preset-btn" data-preset="masonry">Masonry-ish</button>
      </div>

      <div class="palette" id="palette"></div>

      <div class="builder-grid" id="builder"></div>

      <div class="item-props" id="itemProps">
        <span style="opacity:.6;">Click an item to edit its placement, or add a new one.</span>
      </div>

      <div class="btn-row">
        <button class="btn primary" id="copyBtn">Copy CSS</button>
        <button class="btn" id="copyHtmlBtn">Copy HTML</button>
      </div>

      <div class="code-output" id="cssOutput"></div>
    </div>
  </main>

  <script src="/assets/app.js"></script>
  <script>
  (function() {
    const $ = s => document.querySelector(s);
    const builder = $('#builder');
    const colsIn = $('#cols'), rowsIn = $('#rows'), gapIn = $('#gap');
    const tmplType = $('#tmplType'), colWidth = $('#colWidth');
    const itemProps = $('#itemProps');
    const cssOutput = $('#cssOutput');
    const palette = $('#palette');

    let items = [];
    let nextId = 1;
    let selectedId = null;
    let colors = ['#6ea8fe','#f0883e','#56d364','#f85149','#a371f7','#ff7b72','#79c0ff','#d2a8ff','#7ee787','#ffa657'];
    let colorIdx = 0;

    colors.forEach((c, i) => {
      const sw = document.createElement('div');
      sw.className = 'swatch' + (i === 0 ? ' active' : '');
      sw.style.background = c;
      sw.dataset.color = c;
      sw.addEventListener('click', () => {
        palette.querySelectorAll('.swatch').forEach(s => s.classList.remove('active'));
        sw.classList.add('active');
        if (selectedId) { const it = items.find(x => x.id === selectedId); if (it) { it.color = c; render(); } }
      });
      palette.appendChild(sw);
    });

    function getGridCSS() {
      const cols = parseInt(colsIn.value);
      const rows = parseInt(rowsIn.value);
      const gap = gapIn.value + 'px';
      let colTmpl, rowTmpl;
      const type = tmplType.value;
      if (type === 'auto') {
        colTmpl = 'repeat(auto-fit, minmax(' + (colWidth.value || '120px') + ', 1fr))';
        rowTmpl = 'auto';
      } else if (type === 'repeat') {
        colTmpl = 'repeat(' + cols + ', ' + (colWidth.value || '1fr') + ')';
        rowTmpl = 'repeat(' + rows + ', minmax(48px, auto))';
      } else {
        colTmpl = Array(cols).fill(colWidth.value || '1fr').join(' ');
        rowTmpl = Array(rows).fill('minmax(48px, auto)').join(' ');
      }
      return { cols, rows, gap, colTmpl, rowTmpl };
    }

    function render() {
      const g = getGridCSS();
      builder.style.gridTemplateColumns = g.colTmpl;
      builder.style.gridTemplateRows = g.rowTmpl;
      builder.style.gridGap = g.gap;
      builder.innerHTML = '';
      items.forEach(it => {
        const el = document.createElement('div');
        el.className = 'grid-item' + (it.id === selectedId ? ' selected' : '');
        el.textContent = it.name;
        el.style.gridColumn = it.colStart + ' / ' + (it.colEnd !== 'auto' ? it.colEnd : 'span ' + (it.colSpan || 1));
        el.style.gridRow = it.rowStart + ' / ' + (it.rowEnd !== 'auto' ? it.rowEnd : 'span ' + (it.rowSpan || 1));
        el.style.background = it.color;
        el.dataset.id = it.id;
        el.addEventListener('click', () => { selectedId = it.id; render(); renderProps(); });
        builder.appendChild(el);
      });
      renderCSS();
    }

    function renderProps() {
      const it = items.find(x => x.id === selectedId);
      if (!it) { itemProps.innerHTML = '<span style="opacity:.6;">Click an item to edit its placement, or add a new one.</span>'; return; }
      itemProps.innerHTML = '<label>Name <input type="text" id="pName" value="' + it.name + '" style="width:60px"></label>' +
        '<label>Col start <input type="number" id="pCS" value="' + it.colStart + '" min="1" max="12"></label>' +
        '<label>Col span <input type="number" id="pCSp" value="' + (it.colSpan||1) + '" min="1" max="12"></label>' +
        '<label>Col end <select id="pCE"><option value="auto"' + (it.colEnd==='auto'?' selected':'') + '>auto</option><option value="custom"' + (it.colEnd!=='auto'?' selected':'') + '>custom</option></select><input type="number" id="pCEv" value="' + it.colEnd + '" min="1" max="13" style="width:40px"' + (it.colEnd==='auto'?' hidden':'') + '></label>' +
        '<label>Row start <input type="number" id="pRS" value="' + it.rowStart + '" min="1" max="12"></label>' +
        '<label>Row span <input type="number" id="pRSp" value="' + (it.rowSpan||1) + '" min="1" max="12"></label>' +
        '<label>Row end <select id="pRE"><option value="auto"' + (it.rowEnd==='auto'?' selected':'') + '>auto</option><option value="custom"' + (it.rowEnd!=='auto'?' selected':'') + '>custom</option></select><input type="number" id="pREv" value="' + it.rowEnd + '" min="1" max="13" style="width:40px"' + (it.rowEnd==='auto'?' hidden':'') + '></label>' +
        '<button class="btn" id="delBtn">Delete</button>';
      $('#pName').addEventListener('input', e => { it.name = e.target.value; render(); });
      $('#pCS').addEventListener('input', e => { it.colStart = parseInt(e.target.value)||1; render(); });
      $('#pCSp').addEventListener('input', e => { it.colSpan = parseInt(e.target.value)||1; render(); });
      $('#pCE').addEventListener('change', e => { it.colEnd = e.target.value; renderProps(); render(); });
      $('#pCEv').addEventListener('input', e => { it.colEnd = parseInt(e.target.value)||1; render(); });
      $('#pRS').addEventListener('input', e => { it.rowStart = parseInt(e.target.value)||1; render(); });
      $('#pRSp').addEventListener('input', e => { it.rowSpan = parseInt(e.target.value)||1; render(); });
      $('#pRE').addEventListener('change', e => { it.rowEnd = e.target.value; renderProps(); render(); });
      $('#pREv').addEventListener('input', e => { it.rowEnd = parseInt(e.target.value)||1; render(); });
      $('#delBtn').addEventListener('click', () => { items = items.filter(x => x.id !== selectedId); selectedId = null; renderProps(); render(); });
    }

    function renderCSS() {
      const g = getGridCSS();
      let css = '<span class="sel">.container</span> {\n';
      css += '  <span class="prop">display</span>: <span class="val">grid</span>;\n';
      css += '  <span class="prop">grid-template-columns</span>: <span class="val">' + escapeHTML(g.colTmpl) + '</span>;\n';
      css += '  <span class="prop">grid-template-rows</span>: <span class="val">' + escapeHTML(g.rowTmpl) + '</span>;\n';
      css += '  <span class="prop">gap</span>: <span class="val">' + escapeHTML(g.gap) + '</span>;\n';
      css += '}\n\n';
      items.forEach(it => {
        css += '<span class="sel">.' + escapeHTML(it.name) + '</span> {\n';
        css += '  <span class="prop">grid-column</span>: <span class="val">' + it.colStart + ' / ' + (it.colEnd !== 'auto' ? it.colEnd : 'span ' + (it.colSpan||1)) + '</span>;\n';
        css += '  <span class="prop">grid-row</span>: <span class="val">' + it.rowStart + ' / ' + (it.rowEnd !== 'auto' ? it.rowEnd : 'span ' + (it.rowSpan||1)) + '</span>;\n';
        css += '}\n\n';
      });
      cssOutput.innerHTML = css;
    }

    function escapeHTML(s) { return String(s).replace(/[&<>]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[c])); }

    function plainCSS() {
      const g = getGridCSS();
      let css = '.container {\n  display: grid;\n  grid-template-columns: ' + g.colTmpl + ';\n  grid-template-rows: ' + g.rowTmpl + ';\n  gap: ' + g.gap + ';\n}\n\n';
      items.forEach(it => {
        css += '.' + it.name + ' {\n  grid-column: ' + it.colStart + ' / ' + (it.colEnd !== 'auto' ? it.colEnd : 'span ' + (it.colSpan||1)) + ';\n  grid-row: ' + it.rowStart + ' / ' + (it.rowEnd !== 'auto' ? it.rowEnd : 'span ' + (it.rowSpan||1)) + ';\n}\n\n';
      });
      return css;
    }

    function plainHTML() {
      let html = '<div class="container">\n';
      items.forEach(it => {
        html += '  <div class="' + it.name + '">' + it.name + '</div>\n';
      });
      html += '</div>';
      return html;
    }

    function addItem() {
      const cols = parseInt(colsIn.value);
      const rows = parseInt(rowsIn.value);
      const it = {
        id: nextId++,
        name: 'item-' + (items.length + 1),
        colStart: 1, colSpan: 1, colEnd: 'auto',
        rowStart: 1, rowSpan: 1, rowEnd: 'auto',
        color: colors[colorIdx++ % colors.length]
      };
      items.push(it);
      selectedId = it.id;
      renderProps();
      render();
    }

    function applyPreset(name) {
      items = [];
      nextId = 1;
      colorIdx = 0;
      if (name === 'holy-grail') {
        colsIn.value = 3; rowsIn.value = 3; gapIn.value = 8; tmplType.value = 'none'; colWidth.value = '1fr';
        items.push({id:nextId++,name:'header',colStart:1,colSpan:3,colEnd:'auto',rowStart:1,rowSpan:1,rowEnd:'auto',color:colors[0]});
        items.push({id:nextId++,name:'nav',colStart:1,colSpan:1,colEnd:'auto',rowStart:2,rowSpan:1,rowEnd:'auto',color:colors[1]});
        items.push({id:nextId++,name:'main',colStart:2,colSpan:1,colEnd:'auto',rowStart:2,rowSpan:1,rowEnd:'auto',color:colors[2]});
        items.push({id:nextId++,name:'aside',colStart:3,colSpan:1,colEnd:'auto',rowStart:2,rowSpan:1,rowEnd:'auto',color:colors[3]});
        items.push({id:nextId++,name:'footer',colStart:1,colSpan:3,colEnd:'auto',rowStart:3,rowSpan:1,rowEnd:'auto',color:colors[4]});
      } else if (name === 'dashboard') {
        colsIn.value = 4; rowsIn.value = 3; gapIn.value = 8; tmplType.value = 'none'; colWidth.value = '1fr';
        items.push({id:nextId++,name:'sidebar',colStart:1,colSpan:1,colEnd:'auto',rowStart:1,rowSpan:3,rowEnd:'auto',color:colors[0]});
        items.push({id:nextId++,name:'topbar',colStart:2,colSpan:3,colEnd:'auto',rowStart:1,rowSpan:1,rowEnd:'auto',color:colors[1]});
        items.push({id:nextId++,name:'card1',colStart:2,colSpan:1,colEnd:'auto',rowStart:2,rowSpan:1,rowEnd:'auto',color:colors[2]});
        items.push({id:nextId++,name:'card2',colStart:3,colSpan:1,colEnd:'auto',rowStart:2,rowSpan:1,rowEnd:'auto',color:colors[3]});
        items.push({id:nextId++,name:'card3',colStart:4,colSpan:1,colEnd:'auto',rowStart:2,rowSpan:1,rowEnd:'auto',color:colors[4]});
        items.push({id:nextId++,name:'chart',colStart:2,colSpan:3,colEnd:'auto',rowStart:3,rowSpan:1,rowEnd:'auto',color:colors[5]});
      } else if (name === 'magazine') {
        colsIn.value = 4; rowsIn.value = 4; gapIn.value = 8; tmplType.value = 'none'; colWidth.value = '1fr';
        items.push({id:nextId++,name:'hero',colStart:1,colSpan:4,colEnd:'auto',rowStart:1,rowSpan:2,rowEnd:'auto',color:colors[0]});
        items.push({id:nextId++,name:'feat1',colStart:1,colSpan:2,colEnd:'auto',rowStart:3,rowSpan:1,rowEnd:'auto',color:colors[1]});
        items.push({id:nextId++,name:'feat2',colStart:3,colSpan:2,colEnd:'auto',rowStart:3,rowSpan:1,rowEnd:'auto',color:colors[2]});
        items.push({id:nextId++,name:'feat3',colStart:1,colSpan:1,colEnd:'auto',rowStart:4,rowSpan:1,rowEnd:'auto',color:colors[3]});
        items.push({id:nextId++,name:'feat4',colStart:2,colSpan:1,colEnd:'auto',rowStart:4,rowSpan:1,rowEnd:'auto',color:colors[4]});
        items.push({id:nextId++,name:'feat5',colStart:3,colSpan:2,colEnd:'auto',rowStart:4,rowSpan:1,rowEnd:'auto',color:colors[5]});
      } else if (name === 'gallery') {
        colsIn.value = 4; rowsIn.value = 3; gapIn.value = 8; tmplType.value = 'repeat'; colWidth.value = '1fr';
        for (let i = 0; i < 12; i++) {
          const r = Math.floor(i/4)+1, c = (i%4)+1;
          items.push({id:nextId++,name:'img'+(i+1),colStart:c,colSpan:1,colEnd:'auto',rowStart:r,rowSpan:1,rowEnd:'auto',color:colors[i%colors.length]});
        }
      } else if (name === 'sidebar') {
        colsIn.value = 2; rowsIn.value = 2; gapIn.value = 12; tmplType.value = 'none'; colWidth.value = '200px 1fr';
        items.push({id:nextId++,name:'sidebar',colStart:1,colSpan:1,colEnd:'auto',rowStart:1,rowSpan:2,rowEnd:'auto',color:colors[0]});
        items.push({id:nextId++,name:'content',colStart:2,colSpan:1,colEnd:'auto',rowStart:1,rowSpan:1,rowEnd:'auto',color:colors[2]});
        items.push({id:nextId++,name:'footer',colStart:2,colSpan:1,colEnd:'auto',rowStart:2,rowSpan:1,rowEnd:'auto',color:colors[4]});
      } else if (name === 'masonry') {
        colsIn.value = 3; rowsIn.value = 4; gapIn.value = 6; tmplType.value = 'repeat'; colWidth.value = '1fr';
        items.push({id:nextId++,name:'a',colStart:1,colSpan:1,colEnd:'auto',rowStart:1,rowSpan:2,rowEnd:'auto',color:colors[0]});
        items.push({id:nextId++,name:'b',colStart:2,colSpan:1,colEnd:'auto',rowStart:1,rowSpan:1,rowEnd:'auto',color:colors[1]});
        items.push({id:nextId++,name:'c',colStart:3,colSpan:1,colEnd:'auto',rowStart:1,rowSpan:3,rowEnd:'auto',color:colors[2]});
        items.push({id:nextId++,name:'d',colStart:2,colSpan:1,colEnd:'auto',rowStart:2,rowSpan:2,rowEnd:'auto',color:colors[3]});
        items.push({id:nextId++,name:'e',colStart:1,colSpan:1,colEnd:'auto',rowStart:3,rowSpan:1,rowEnd:'auto',color:colors[4]});
        items.push({id:nextId++,name:'f',colStart:1,colSpan:1,colEnd:'auto',rowStart:4,rowSpan:1,rowEnd:'auto',color:colors[5]});
        items.push({id:nextId++,name:'g',colStart:2,colSpan:1,colEnd:'auto',rowStart:4,rowSpan:1,rowEnd:'auto',color:colors[6]});
      }
      selectedId = null;
      renderProps();
      render();
    }

    [colsIn, rowsIn, gapIn, tmplType, colWidth].forEach(el => el.addEventListener('input', render));

    $('#addBtn').addEventListener('click', addItem);
    $('#clearBtn').addEventListener('click', () => { items = []; nextId = 1; colorIdx = 0; selectedId = null; renderProps(); render(); });
    $('#copyBtn').addEventListener('click', () => navigator.clipboard.writeText(plainCSS()).then(() => { $('#copyBtn').textContent = 'Copied!'; setTimeout(() => $('#copyBtn').textContent = 'Copy CSS', 1500); }));
    $('#copyHtmlBtn').addEventListener('click', () => navigator.clipboard.writeText(plainHTML()).then(() => { $('#copyHtmlBtn').textContent = 'Copied!'; setTimeout(() => $('#copyHtmlBtn').textContent = 'Copy HTML', 1500); }));
    document.querySelectorAll('.preset-btn').forEach(b => b.addEventListener('click', () => applyPreset(b.dataset.preset)));

    applyPreset('holy-grail');
  })();
  </script>
</body>
</html>
