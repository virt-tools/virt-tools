<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="/assets/theme-init.js"></script>
<title>CSS Tabs Generator — Virtual Tools</title>
<link rel="stylesheet" href="/assets/style.css">
<style>
.tool-wrap{max-width:680px;margin:0 auto;}
.tool-desc{font-size:14px;color:var(--text-secondary,#aaa);margin:8px 0 20px;}
.controls{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin:12px 0;}
.ctrl{display:flex;flex-direction:column;gap:4px;}
.ctrl label{font-size:12px;color:var(--text-secondary,#888);}
.ctrl input,.ctrl select{padding:6px 8px;border-radius:6px;border:1px solid var(--border,#444);background:var(--bg,#1e2230);color:var(--text,#eee);font-size:13px;}
.ctrl input[type="color"]{padding:2px;height:34px;}
button.action{padding:8px 16px;border-radius:6px;border:1px solid var(--border,#444);background:var(--card,#2a2f3e);color:var(--text,#eee);cursor:pointer;font-size:13px;margin:4px 4px 0 0;}
button.action:hover{border-color:var(--accent,#5b8def);}
.preview{background:var(--bg,#1e2230);border:1px solid var(--border,#444);border-radius:8px;padding:20px;margin:12px 0;min-height:200px;}
.code-block{background:var(--bg,#1e2230);border:1px solid var(--border,#444);border-radius:8px;padding:12px;margin:8px 0;font-family:monospace;font-size:11px;color:var(--text,#eee);white-space:pre-wrap;word-break:break-all;max-height:260px;overflow:auto;}
.tab-input{display:none}
.tab-label{display:inline-block;padding:10px 20px;cursor:pointer;border-radius:8px 8px 0 0;font-size:14px;border:1px solid transparent;transition:all .3s}
.tab-content{padding:16px;border-radius:0 8px 8px 8px;display:none;min-height:80px}
</style>
</head>
<body>
<header id="site-header"></header>
<main>
<div class="tool-wrap">
<h1>📋 CSS Tabs Generator</h1>
<p class="tool-desc">Create CSS-only tabbed interfaces with 3 animation styles. Live preview with working tabs. Copy HTML+CSS.</p>
<div class="controls">
<div class="ctrl"><label>Active Color</label><input type="color" id="ac" value="#5b8def" oninput="render()"></div>
<div class="ctrl"><label>Inactive Color</label><input type="color" id="ic" value="#2a2f3e" oninput="render()"></div>
<div class="ctrl"><label>Text Color</label><input type="color" id="tc" value="#ffffff" oninput="render()"></div>
<div class="ctrl"><label>Animation</label><select id="ani" onchange="render()"><option value="fade">Fade</option><option value="slide">Slide</option><option value="scale">Scale</option></select></div>
<div class="ctrl"><label>Border Radius</label><input type="number" id="br" value="8" min="0" max="24" oninput="render()"></div>
<div class="ctrl"><label>Tab Count</label><input type="number" id="tc2" value="3" min="2" max="6" oninput="render()"></div>
</div>
<div class="preview" id="prev"></div>
<div style="margin:8px 0;"><button class="action" onclick="copyCode()">Copy HTML+CSS</button></div>
<div class="code-block" id="code"></div>
</div>
</main>
<script src="/assets/app.js"></script>
<script>
let codeText='';
function render(){
const ac=v('ac'),ic=v('ic'),tc=v('tc'),ani=v('ani'),br=parseInt(v('br'))||8,n=Math.min(6,Math.max(2,parseInt(v('tc2'))||3));
const labels=['Home','About','Services','Portfolio','Blog','Contact'];
const contents=['Welcome to the home tab!','Learn more about us.','What we offer.','Our recent work.','Latest articles.','Get in touch.'];
const animCSS={fade:'display:block;opacity:0;animation:fadeIn .3s forwards',slide:'display:block;animation:slideIn .3s forwards',scale:'display:block;animation:scaleIn .3s forwards'};
const keyframes={fade:'@keyframes fadeIn{from{opacity:0}to{opacity:1}}',slide:'@keyframes slideIn{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:translateX(0)}}',scale:'@keyframes scaleIn{from{opacity:0;transform:scale(.95)}to{opacity:1;transform:scale(1)}}'};
let html='<div class="tabs-demo" style="font-family:sans-serif">';
for(let i=0;i<n;i++){
const checked=i===0?'checked':'';
html+=`<input type="radio" name="tabs-demo" id="tab-demo-${i}" class="tab-input" ${checked}>`;
}
for(let i=0;i<n;i++){
html+=`<label for="tab-demo-${i}" class="tab-label" style="background:${i===0?ac:ic};color:${tc};border-radius:${br}px ${br}px 0 0;border:1px solid ${i===0?ac:'transparent'}">${labels[i]}</label>`;
}
html+='<div style="clear:both"></div>';
for(let i=0;i<n;i++){
const show=i===0?ani==='none'?'display:block':'display:block;animation:fadeIn .3s forwards':'display:none';
html+=`<div class="tab-content" style="background:${ac};color:${tc};border-radius:0 0 ${br}px ${br}px;padding:16px;${show}">${contents[i]}</div>`;
}
html+='</div>';
document.getElementById('prev').innerHTML=html;
let css=`.tabs{font-family:sans-serif}
.tab-input{display:none}
.tab-label{display:inline-block;padding:10px 20px;cursor:pointer;border-radius:${br}px ${br}px 0 0;background:${ic};color:${tc};border:1px solid transparent;transition:all .3s}
.tab-label:hover{opacity:.85}
.tab-content{padding:16px;background:${ac};color:${tc};border-radius:0 0 ${br}px ${br}px;display:none}
${keyframes[ani]}
`;
for(let i=0;i<n;i++){
css+=`#tab-${i}:checked ~ label[for="tab-${i}"]{background:${ac};border-color:${ac}}\n#tab-${i}:checked ~ .tab-content:nth-of-type(${i+1}){${animCSS[ani]}}\n`;
}
let htmlCode=`<div class="tabs">\n`;
for(let i=0;i<n;i++){
htmlCode+=`  <input type="radio" name="tabs" id="tab-${i}" class="tab-input"${i===0?' checked':''}>\n`;
}
for(let i=0;i<n;i++){
htmlCode+=`  <label for="tab-${i}" class="tab-label">${labels[i]}</label>\n`;
}
htmlCode+=`  <div class="tab-content">${contents[i]||''}</div>\n`;
for(let i=1;i<n;i++)htmlCode+=`  <div class="tab-content">${contents[i]}</div>\n`;
htmlCode+=`</div>`;
codeText=`<!-- HTML -->\n${htmlCode}\n\n<!-- CSS -->\n<style>\n${css}</style>`;
document.getElementById('code').textContent=codeText;
// Wire up tabs
const inputs=document.getElementById('prev').querySelectorAll('.tab-input');
const contents2=document.getElementById('prev').querySelectorAll('.tab-content');
inputs.forEach((inp,i)=>{
inp.addEventListener('change',()=>{
contents2.forEach((c,j)=>{
if(i===j){c.style.display='block';c.style.animation=ani+'In .3s forwards';}
else c.style.display='none';
});
});
});
}
function v(id){return document.getElementById(id).value;}
function copyCode(){navigator.clipboard.writeText(codeText).then(()=>alert('Code copied!')).catch(()=>alert('Copy failed'));}
render();
</script>
</body>
</html>
