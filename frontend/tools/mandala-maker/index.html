<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="/assets/theme-init.js"></script>
<title>Mandala Maker — Virtual Tools</title>
<link rel="stylesheet" href="/assets/style.css">
<style>
.tool-wrap{max-width:620px;margin:0 auto;text-align:center;}
.tool-desc{font-size:14px;color:var(--text-secondary,#aaa);margin:8px 0;}
canvas{border-radius:12px;cursor:crosshair;margin:12px auto;display:block;max-width:100%;height:auto;box-shadow:0 4px 20px rgba(0,0,0,0.3);background:#1a1a2e;}
.controls{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin:8px 0;align-items:center;}
.controls button{padding:8px 16px;border-radius:6px;border:1px solid var(--border,#444);background:var(--bg-alt,#1a1f2e);color:var(--text,#eee);cursor:pointer;font-size:14px;}
.controls button:hover{background:var(--accent,#5b8def);color:#fff;}
label{font-size:13px;color:var(--text-secondary,#aaa);}
input[type=range]{vertical-align:middle;}
input[type=color]{vertical-align:middle;width:36px;height:28px;border:none;border-radius:4px;cursor:pointer;}
</style>
</head>
<body>
<header id="site-header"></header>
<main>
<div class="tool-wrap">
<h1>Mandala Maker 🪷</h1>
<p class="tool-desc">Create symmetric mandala art with 4-24 mirror segments. Choose colors, adjust brush size, save your creation.</p>
<canvas id="cv" width="500" height="500"></canvas>
<div class="controls">
<label>Segments: <input type="range" id="segs" min="4" max="24" value="8" step="2"></label>
<label>Brush: <input type="range" id="brush" min="1" max="20" value="3"></label>
<input type="color" id="color" value="#ff6b9d">
<button onclick="clearM()">🗑️ Clear</button>
<button onclick="savePNG()">💾 Save PNG</button>
</div>
</div>
</main>
<script src="/assets/app.js"></script>
<script>
const cv=document.getElementById('cv'),ctx=cv.getContext('2d');
let drawing=false,lastX=0,lastY=0;
function clearM(){ctx.fillStyle='#1a1a2e';ctx.fillRect(0,0,cv.width,cv.height);}
function getSegs(){return parseInt(document.getElementById('segs').value);}
function getBrush(){return parseInt(document.getElementById('brush').value);}
function getColor(){return document.getElementById('color').value;}
function pos(e){const rect=cv.getBoundingClientRect();const sx=cv.width/rect.width,sy=cv.height/rect.height;const t=e.touches?e.touches[0]:e;return{x:(t.clientX-rect.left)*sx,y:(t.clientY-rect.top)*sy};}
function drawMirror(x,y,lx,ly){const segs=getSegs();const cx=cv.width/2,cy=cv.height/2;const angle=2*Math.PI/segs;ctx.strokeStyle=getColor();ctx.lineWidth=getBrush();ctx.lineCap='round';for(let i=0;i<segs;i++){ctx.save();ctx.translate(cx,cy);ctx.rotate(angle*i);ctx.beginPath();ctx.moveTo(lx-cx,ly-cy);ctx.lineTo(x-cx,y-cy);ctx.stroke();ctx.restore();}}
cv.addEventListener('mousedown',e=>{drawing=true;const p=pos(e);lastX=p.x;lastY=p.y;});
cv.addEventListener('mousemove',e=>{if(!drawing)return;const p=pos(e);drawMirror(p.x,p.y,lastX,lastY);lastX=p.x;lastY=p.y;});
cv.addEventListener('mouseup',()=>drawing=false);
cv.addEventListener('mouseleave',()=>drawing=false);
cv.addEventListener('touchstart',e=>{e.preventDefault();drawing=true;const p=pos(e);lastX=p.x;lastY=p.y;});
cv.addEventListener('touchmove',e=>{e.preventDefault();if(!drawing)return;const p=pos(e);drawMirror(p.x,p.y,lastX,lastY);lastX=p.x;lastY=p.y;});
cv.addEventListener('touchend',()=>drawing=false);
function savePNG(){const a=document.createElement('a');a.download='mandala.png';a.href=cv.toDataURL();a.click();}
clearM();
</script>
</body>
</html>
