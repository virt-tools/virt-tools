<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="/assets/theme-init.js"></script>
<title>Biorhythm Calculator — Virtual Tools</title>
<link rel="stylesheet" href="/assets/style.css">
<style>
.tool-wrap{max-width:800px;margin:0 auto;}
.input-group{display:flex;gap:15px;align-items:center;flex-wrap:wrap;justify-content:center;margin:15px 0;}
.input-group label{font-weight:600;}
.input-group input[type="date"]{padding:8px;border-radius:8px;border:1px solid var(--border,#555);background:var(--bg-alt,#1a1f2e);color:var(--text,#eee);font-size:16px;}
canvas{display:block;margin:10px auto;max-width:100%;border-radius:12px;background:var(--bg-alt,#1a1f2e);}
.cycles{display:flex;justify-content:center;gap:20px;margin:10px 0;flex-wrap:wrap;}
.cycle{display:flex;flex-direction:column;align-items:center;padding:10px 20px;border-radius:12px;background:var(--bg-alt,#1a1f2e);}
.cycle .pct{font-size:24px;font-weight:700;}
.phys{color:#e53935;}.emot{color:#43a047;}.intel{color:#1e88e5;}
.results{margin:15px 0;text-align:center;}
.results table{margin:0 auto;border-collapse:collapse;}
.results th,.results td{padding:8px 16px;border-bottom:1px solid var(--border,#333);text-align:left;}
.results th{color:var(--text-secondary,#888);font-size:13px;}
</style>
</head>
<body>
<header id="site-header"></header>
<main>
<div class="tool-wrap">
<h1>Biorhythm Calculator 📅</h1>
<p class="tool-desc">Calculate your physical, emotional, and intellectual cycles based on your date of birth. See today's energy levels and a 30-day chart.</p>
<div class="input-group">
<label>Birth Date: <input type="date" id="birthDate" value="1990-01-01"></label>
<button class="btn btn-primary" onclick="calc()">Calculate</button>
</div>
<div class="cycles" id="cycles" style="display:none;">
<div class="cycle"><span class="pct phys" id="physVal">—</span><span>Physical (23 days)</span></div>
<div class="cycle"><span class="pct emot" id="emotVal">—</span><span>Emotional (28 days)</span></div>
<div class="cycle"><span class="pct intel" id="intVal">—</span><span>Intellectual (33 days)</span></div>
</div>
<canvas id="chart" width="780" height="300" style="display:none;"></canvas>
<div class="results" id="results" style="display:none;">
<h3>Upcoming Critical Days</h3>
<table><thead><tr><th>Date</th><th>Cycle</th><th>Type</th></tr></thead><tbody id="critBody"></tbody></table>
</div>
</div>
</main>
<script src="/assets/app.js"></script>
<script>
const PHYS=23,EMOT=28,INTL=33;
function sin(days,period){return Math.sin(2*Math.PI*days/period);}
function calc(){
const bd=new Date(document.getElementById('birthDate').value);if(isNaN(bd))return;
const today=new Date();today.setHours(12,0,0,0);
const days=Math.floor((today-bd)/(1000*60*60*24));
const p=sin(days,PHYS),e=sin(days,EMOT),i=sin(days,INTL);
document.getElementById('cycles').style.display='flex';
document.getElementById('physVal').textContent=Math.round(p*100)+'%';
document.getElementById('emotVal').textContent=Math.round(e*100)+'%';
document.getElementById('intVal').textContent=Math.round(i*100)+'%';
drawChart(bd);findCritical(bd);
}
function drawChart(bd){
const c=document.getElementById('chart');c.style.display='block';
const ctx=c.getContext('2d');const w=c.width,h=c.height;
ctx.clearRect(0,0,w,h);
const days=30;const pad=40;
const gw=w-pad*2,gh=h-pad*2;
ctx.strokeStyle=getComputedStyle(document.documentElement).getPropertyValue('--border')||'#444';
ctx.lineWidth=1;
ctx.beginPath();ctx.moveTo(pad,pad+gh/2);ctx.lineTo(pad+gw,pad+gh/2);ctx.stroke();
for(let d=0;d<=days;d++){const x=pad+(d/days)*gw;if(d%5===0){ctx.beginPath();ctx.moveTo(x,pad);ctx.lineTo(x,pad+gh);ctx.stroke();
ctx.fillStyle=getComputedStyle(document.documentElement).getPropertyValue('--text-secondary')||'#888';
ctx.font='11px sans-serif';ctx.textAlign='center';const dt=new Date();dt.setDate(dt.getDate()+d);ctx.fillText((dt.getMonth()+1)+'/'+dt.getDate(),x,pad+gh+15);}}
function plot(period,color){ctx.strokeStyle=color;ctx.lineWidth=2;ctx.beginPath();for(let d=0;d<=days;d++){const tDays=Math.floor((new Date()-bd)/(86400000))+d;const v=sin(tDays,period);const x=pad+(d/days)*gw;const y=pad+gh/2-(v*gh/2);if(d===0)ctx.moveTo(x,y);else ctx.lineTo(x,y);}ctx.stroke();}
plot(PHYS,'#e53935');plot(EMOT,'#43a047');plot(INTL,'#1e88e5');
ctx.fillStyle='#e53935';ctx.font='12px sans-serif';ctx.textAlign='left';ctx.fillText('Physical',pad+5,20);
ctx.fillStyle='#43a047';ctx.fillText('Emotional',pad+100,20);
ctx.fillStyle='#1e88e5';ctx.fillText('Intellectual',pad+200,20);
}
function findCritical(bd){
const tbody=document.getElementById('critBody');tbody.innerHTML='';
document.getElementById('results').style.display='block';
const today=new Date();today.setHours(0,0,0,0);
const found=[];
for(let d=0;d<60;d++){const t=new Date(today);t.setDate(t.getDate()+d);
const days=Math.floor((t-bd)/(86400000));
[[PHYS,'Physical'],[EMOT,'Emotional'],[INTL,'Intellectual']].forEach(([p,n])=>{
if(p==null)return;
const v=sin(days,p);if(Math.abs(v)<0.03){found.push({date:t,cycle:n,type:'Critical (zero crossing)'});}});
if(found.length>=8)break;}
found.slice(0,8).forEach(f=>{const tr=document.createElement('tr');
tr.innerHTML=`<td>${f.date.toLocaleDateString()}</td><td>${f.cycle}</td><td style="color:#e53935;">${f.type}</td>`;tbody.appendChild(tr);});
}
calc();
</script>
</body>
</html>
