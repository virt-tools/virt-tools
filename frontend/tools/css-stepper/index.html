<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CSS Stepper Generator — virt.tools</title>
<link rel="stylesheet" href="/assets/style.css">
<style>
.tool-area{max-width:900px;margin:2rem auto;padding:0 1rem}
.controls{display:grid;gap:1rem;margin:1.5rem 0;padding:1.5rem;background:#1a1a2e;border-radius:12px}
.control-row{display:flex;gap:1rem;align-items:center;flex-wrap:wrap}
.control-row label{min-width:130px;font-weight:600;font-size:.9rem}
.control-row select,.control-row input{padding:.5rem .75rem;border-radius:8px;border:1px solid #444;background:#0f0f1e;color:#eee;font-size:.9rem}
.preview-box{margin:1.5rem 0;border-radius:12px;background:#0f0f1e;padding:2rem 1.5rem}
.output-block{margin:2rem 0}
.output-block textarea{width:100%;min-height:100px;font-family:monospace;font-size:.85rem;padding:1rem;border-radius:8px;border:1px solid #444;background:#0f0f1e;color:#eee;resize:vertical}
.copy-btn{padding:.6rem 1.2rem;border:none;border-radius:8px;background:#667eea;color:#fff;cursor:pointer;font-size:.9rem;margin-top:.5rem}
h2{margin-top:2rem;font-size:1.2rem}
.stepper{display:flex;align-items:center;gap:0}
.step{display:flex;flex-direction:column;align-items:center;flex:1;position:relative}
.step-circle{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:1rem;z-index:1}
.step-label{margin-top:8px;font-size:.85rem}
.step-line{flex:1;height:3px;margin:0 -1px}
</style>
</head>
<body>
<header id="site-header"></header>
<main>
<div class="tool-area">
<h1>📏 CSS Stepper Generator</h1>
<p>Create CSS step/progress steppers for multi-step forms and wizards. Adjustable steps, styles, colors.</p>
<div class="controls">
<div class="control-row">
<label>Steps</label><input type="range" id="steps" value="4" min="2" max="8" style="width:120px">
<label>Style</label><select id="style"><option value="circle">Circle</option><option value="square">Square</option><option value="number">Numbered</option></select>
</div>
<div class="control-row">
<label>Active Color</label><input type="color" id="activeColor" value="#667eea">
<label>Done Color</label><input type="color" id="doneColor" value="#22c55e">
</div>
<div class="control-row">
<label>Pending Color</label><input type="color" id="pendingColor" value="#444">
<label>Current Step</label><input type="range" id="current" value="2" min="1" max="8" style="width:120px">
</div>
</div>
<h2>Preview</h2>
<div class="preview-box" id="preview"></div>
<h2>HTML</h2><div class="output-block"><textarea id="htmlOut" readonly></textarea><button class="copy-btn" onclick="copyText('htmlOut')">Copy HTML</button></div>
<h2>CSS</h2><div class="output-block"><textarea id="cssOut" readonly></textarea><button class="copy-btn" onclick="copyText('cssOut')">Copy CSS</button></div>
</div>
</div>
</main>
<script src="/assets/app.js"></script>
<script>
var labels=['Account','Details','Payment','Confirm','Shipping','Review','Security','Done'];
function update(){
var n=Math.min(+document.getElementById('steps').value,8);
var cur=Math.min(+document.getElementById('current').value,n);
var style=document.getElementById('style').value;
var ac=document.getElementById('activeColor').value;
var dc=document.getElementById('doneColor').value;
var pc=document.getElementById('pendingColor').value;
var br=style==='square'?'4px':'50%';
var html='<div class="stepper">\n';
for(var i=1;i<=n;i++){
var st=i<cur?'done':i===cur?'active':'pending';
var col=i<cur?dc:i===cur?ac:pc;
var txt=i<cur?'✓':i;
html+='  <div class="step">\n    <div class="step-circle" style="background:'+col+';border-radius:'+br+';color:#fff">'+txt+'</div>\n    <div class="step-label">'+labels[i-1]+'</div>\n';
if(i<n)html+='    <div class="step-line" style="background:'+(i<cur?dc:pc)+'"></div>\n';
html+='  </div>\n';
}
html+='</div>';
var css='.stepper{display:flex;align-items:flex-start;gap:0;width:100%}\n.step{display:flex;flex-direction:column;align-items:center;flex:1;position:relative}\n.step-circle{width:40px;height:40px;border-radius:'+br+';display:flex;align-items:center;justify-content:center;font-weight:700;font-size:1rem;z-index:1;color:#fff}\n.step-label{margin-top:8px;font-size:.85rem}\n.step-line{position:absolute;top:20px;left:50%;width:100%;height:3px;z-index:0}\n.step-line.done{background:'+dc+'}\n.step-line.pending{background:'+pc+'}';
document.getElementById('htmlOut').value=html;
document.getElementById('cssOut').value=css;
document.getElementById('preview').innerHTML='<style>'+css+'</style>'+html;
}
function copyText(id){var t=document.getElementById(id);t.select();document.execCommand('copy')}
document.querySelectorAll('select,input').forEach(function(e){e.addEventListener('input',update);e.addEventListener('change',update)});
update();
</script>
</body>
</html>
