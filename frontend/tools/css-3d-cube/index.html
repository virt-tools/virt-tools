<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CSS 3D Cube Generator — virt.tools</title>
<link rel="stylesheet" href="/assets/style.css">
<style>
.tool-area{max-width:900px;margin:2rem auto;padding:0 1rem}
.controls{display:grid;gap:1rem;margin:1.5rem 0;padding:1.5rem;background:#1a1a2e;border-radius:12px}
.control-row{display:flex;gap:1rem;align-items:center;flex-wrap:wrap}
.control-row label{min-width:120px;font-weight:600;font-size:.9rem}
.control-row select,.control-row input{padding:.5rem .75rem;border-radius:8px;border:1px solid #444;background:#0f0f1e;color:#eee;font-size:.9rem}
.preview-box{margin:1.5rem 0;background:radial-gradient(circle,#1a1a3e,#0a0a14);border-radius:12px;min-height:350px;display:flex;align-items:center;justify-content:center;perspective:800px}
.output-block{margin:2rem 0}
.output-block textarea{width:100%;min-height:120px;font-family:monospace;font-size:.85rem;padding:1rem;border-radius:8px;border:1px solid #444;background:#0f0f1e;color:#eee;resize:vertical}
.copy-btn{padding:.6rem 1.2rem;border:none;border-radius:8px;background:#667eea;color:#fff;cursor:pointer;font-size:.9rem;margin-top:.5rem}
h2{margin-top:2rem;font-size:1.2rem}
</style>
</head>
<body>
<header id="site-header"></header>
<main>
<div class="tool-area">
<h1>🎲 CSS 3D Cube Generator</h1>
<p>Create CSS 3D rotating cubes with customizable faces, colors, and animation. Copy HTML+CSS.</p>
<div class="controls">
<div class="control-row">
<label>Size (px)</label><input type="number" id="size" value="150" min="60" max="300" style="width:80px">
<label>Animation</label><select id="anim"><option value="rotate">Rotate All</option><option value="rotateX">Rotate X</option><option value="rotateY">Rotate Y</option><option value="float">Float+Rotate</option><option value="none">None</option></select>
<label>Speed (s)</label><input type="number" id="speed" value="8" min="1" max="30" step="0.5" style="width:60px">
</div>
<div class="control-row">
<label>Face 1</label><input type="color" id="f1" value="#667eea">
<label>Face 2</label><input type="color" id="f2" value="#764ba2">
<label>Face 3</label><input type="color" id="f3" value="#f093fb">
<label>Face 4</label><input type="color" id="f4" value="#4facfe">
<label>Face 5</label><input type="color" id="f5" value="#43e97b">
<label>Face 6</label><input type="color" id="f6" value="#fa709a">
</div>
<div class="control-row">
<label>Opacity</label><input type="range" id="opacity" value="0.9" min="0.3" max="1" step="0.05" style="width:120px">
<label>Radius</label><input type="range" id="radius" value="8" min="0" max="30" style="width:120px">
</div>
</div>
<h2>Preview</h2>
<div class="preview-box" id="preview"></div>
<h2>HTML</h2><div class="output-block"><textarea id="htmlOut" readonly></textarea><button class="copy-btn" onclick="copyText('htmlOut')">Copy HTML</button></div>
<h2>CSS</h2><div class="output-block"><textarea id="cssOut" readonly></textarea><button class="copy-btn" onclick="copyText('cssOut')">Copy CSS</button></div>
</div>
</main>
<script src="/assets/app.js"></script>
<script>
function update(){
var s=parseInt(document.getElementById('size').value);
var anim=document.getElementById('anim').value;
var sp=parseFloat(document.getElementById('speed').value);
var faces=[document.getElementById('f1').value,document.getElementById('f2').value,document.getElementById('f3').value,document.getElementById('f4').value,document.getElementById('f5').value,document.getElementById('f6').value];
var op=parseFloat(document.getElementById('opacity').value);
var r=document.getElementById('radius').value;
var h=s/2;
var html='<div class="cube-scene"><div class="cube">\n';
var labels=['Front','Back','Right','Left','Top','Bottom'];
for(var i=0;i<6;i++){html+='  <div class="cube-face face-'+(i+1)+'">'+labels[i]+'</div>\n'}
html+='</div></div>';
var css='.cube-scene{width:'+s+'px;height:'+s+'px;perspective:800px}\n';
css+='.cube{width:'+s+'px;height:'+s+'px;position:relative;transform-style:preserve-3d';
css+=';transform:rotateX(-20deg) rotateY(-25deg)';
if(anim!=='none'){css+=';animation:cube-'+anim+' '+sp+'s linear infinite'}
css+='}\n';
var transforms=[
'translateZ('+h+'px)',
'rotateY(180deg) translateZ('+h+'px)',
'rotateY(90deg) translateZ('+h+'px)',
'rotateY(-90deg) translateZ('+h+'px)',
'rotateX(90deg) translateZ('+h+'px)',
'rotateX(-90deg) translateZ('+h+'px)'
];
for(var i=0;i<6;i++){
css+='.face-'+(i+1)+'{position:absolute;width:'+s+'px;height:'+s+'px;background:'+faces[i]+';opacity:'+op+';border-radius:'+r+'px;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:14px;'+transforms[i]+'}\n';
}
if(anim==='rotate'){css+='@keyframes cube-rotate{0%{transform:rotateX(0) rotateY(0)}100%{transform:rotateX(360deg) rotateY(360deg)}}\n'}
else if(anim==='rotateX'){css+='@keyframes cube-rotateX{0%{transform:rotateX(0)}100%{transform:rotateX(360deg)}}\n'}
else if(anim==='rotateY'){css+='@keyframes cube-rotateY{0%{transform:rotateY(0)}100%{transform:rotateY(360deg)}}\n'}
else if(anim==='float'){css+='@keyframes cube-float{0%,100%{transform:rotateX(20deg) rotateY(0) translateY(0)}50%{transform:rotateX(20deg) rotateY(180deg) translateY(-20px)}}\n'}
document.getElementById('htmlOut').value=html;
document.getElementById('cssOut').value=css;
var pv=document.getElementById('preview');
pv.innerHTML=html;
var st=document.createElement('style');st.textContent=css;pv.appendChild(st);
}
function copyText(id){var t=document.getElementById(id);t.select();document.execCommand('copy')}
document.querySelectorAll('select,input').forEach(function(e){e.addEventListener('input',update);e.addEventListener('change',update)});
update();
</script>
</body>
</html>
