<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="/assets/theme-init.js"></script>
<title>Placeholder Image Generator — Virtual Tools</title>
<link rel="stylesheet" href="/assets/style.css">
<style>
.tool-wrap{max-width:680px;margin:0 auto;}
.tool-desc{font-size:14px;color:var(--text-secondary,#aaa);margin:8px 0 20px;}
.controls{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin:12px 0;}
.ctrl{display:flex;flex-direction:column;gap:4px;}
.ctrl label{font-size:12px;color:var(--text-secondary,#888);}
.ctrl input,.ctrl select{padding:6px 8px;border-radius:6px;border:1px solid var(--border,#444);background:var(--bg,#1e2230);color:var(--text,#eee);font-size:13px;}
.ctrl input[type="color"]{padding:2px;height:34px;}
.preview{background:var(--bg,#1e2230);border:1px solid var(--border,#444);border-radius:8px;padding:24px;margin:12px 0;text-align:center;min-height:200px;display:flex;align-items:center;justify-content:center;}
.preview img{max-width:100%;border-radius:4px;}
button.action{padding:8px 16px;border-radius:6px;border:1px solid var(--border,#444);background:var(--card,#2a2f3e);color:var(--text,#eee);cursor:pointer;font-size:13px;margin:4px 4px 0 0;}
button.action:hover{border-color:var(--accent,#5b8def);}
.preset-row{display:flex;gap:8px;flex-wrap:wrap;margin:8px 0;}
button.preset{padding:5px 10px;border-radius:6px;border:1px solid var(--border,#444);background:var(--card,#2a2f3e);color:var(--text,#eee);cursor:pointer;font-size:12px;}
button.preset:hover{border-color:var(--accent,#5b8def);}
.data-url{background:var(--bg,#1e2230);border:1px solid var(--border,#444);border-radius:8px;padding:10px;margin:8px 0;font-family:monospace;font-size:10px;color:var(--text-secondary,#888);word-break:break-all;max-height:80px;overflow:auto;}
</style>
</head>
<body>
<header id="site-header"></header>
<main>
<div class="tool-wrap">
<h1>🖼️ Placeholder Image Generator</h1>
<p class="tool-desc">Generate placeholder images with custom dimensions, colors, text, and format. Download as PNG, JPG, or SVG. All generated client-side.</p>
<div class="controls">
<div class="ctrl"><label>Width</label><input type="number" id="w" value="300" min="16" max="2000" oninput="render()"></div>
<div class="ctrl"><label>Height</label><input type="number" id="h" value="200" min="16" max="2000" oninput="render()"></div>
<div class="ctrl"><label>Background Color</label><input type="color" id="bg" value="#5b8def" oninput="render()"></div>
<div class="ctrl"><label>Text Color</label><input type="color" id="fg" value="#ffffff" oninput="render()"></div>
<div class="ctrl"><label>Text</label><input type="text" id="txt" value="300 × 200" oninput="render()"></div>
<div class="ctrl"><label>Format</label><select id="fmt" onchange="render()"><option value="png">PNG</option><option value="jpeg">JPG</option><option value="svg">SVG</option></select></div>
<div class="ctrl"><label>Font Size</label><input type="number" id="fs" value="24" min="8" max="100" oninput="render()"></div>
<div class="ctrl"><label>Border Radius</label><input type="number" id="br" value="0" min="0" max="50" oninput="render()"></div>
</div>
<div class="preset-row">
<button class="preset" onclick="preset(16,16)">16×16 Icon</button>
<button class="preset" onclick="preset(120,120)">120×120 Avatar</button>
<button class="preset" onclick="preset(300,200)">300×200 Card</button>
<button class="preset" onclick="preset(640,360)">640×360 Video</button>
<button class="preset" onclick="preset(800,600)">800×600 Photo</button>
<button class="preset" onclick="preset(1920,1080)">1920×1080 Banner</button>
</div>
<div class="preview" id="prev"></div>
<div style="margin:8px 0;">
<button class="action" onclick="download()">Download</button>
<button class="action" onclick="copyDataURL()">Copy Data URL</button>
</div>
<div class="data-url" id="durl">data URL will appear here</div>
</div>
</main>
<script src="/assets/app.js"></script>
<script>
let canvas,dataURL='';
function v(id){return document.getElementById(id).value;}
function render(){
const w=Math.max(16,Math.min(2000,parseInt(v('w'))||300));
const h=Math.max(16,Math.min(2000,parseInt(v('h'))||200));
const bg=v('bg'),fg=v('fg'),txt=v('txt'),fmt=v('fmt'),fs=parseInt(v('fs'))||24,br=parseInt(v('br'))||0;
if(fmt==='svg'){
const svg=`<svg xmlns="http://www.w3.org/2000/svg" width="${w}" height="${h}"><rect width="${w}" height="${h}" rx="${br}" fill="${bg}"/><text x="50%" y="50%" dy=".35em" fill="${fg}" font-family="sans-serif" font-size="${fs}" text-anchor="middle" dominant-baseline="middle">${escapeHtml(txt)}</text></svg>`;
dataURL='data:image/svg+xml;charset=utf-8,'+encodeURIComponent(svg);
document.getElementById('prev').innerHTML=`<img src="${dataURL}" style="width:${Math.min(w,500)}px;height:auto;">`;
document.getElementById('durl').textContent=dataURL.slice(0,500)+(dataURL.length>500?'...':'');
return;
}
canvas=document.createElement('canvas');
canvas.width=w;canvas.height=h;
const ctx=canvas.getContext('2d');
ctx.fillStyle=bg;
if(br>0){ctx.beginPath();ctx.roundRect(0,0,w,h,br);ctx.fill();}else{ctx.fillRect(0,0,w,h);}
ctx.fillStyle=fg;
ctx.font=`${fs}px sans-serif`;
ctx.textAlign='center';ctx.textBaseline='middle';
ctx.fillText(txt,w/2,h/2);
dataURL=canvas.toDataURL(fmt==='png'?'image/png':'image/jpeg',0.9);
document.getElementById('prev').innerHTML=`<img src="${dataURL}" style="max-width:500px;max-height:400px;">`;
document.getElementById('durl').textContent=dataURL.slice(0,500)+(dataURL.length>500?'...':'');
}
function preset(w,h){document.getElementById('w').value=w;document.getElementById('h').value=h;document.getElementById('txt').value=`${w} × ${h}`;render();}
function download(){const fmt=v('fmt');const ext=fmt==='jpeg'?'jpg':fmt;const a=document.createElement('a');a.href=dataURL;a.download=`placeholder-${v('w')}x${v('h')}.${ext}`;a.click();}
function copyDataURL(){navigator.clipboard.writeText(dataURL).then(()=>alert('Data URL copied!')).catch(()=>alert('Copy failed'));}
function escapeHtml(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
render();
</script>
</body>
</html>
