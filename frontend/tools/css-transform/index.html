<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="/assets/theme-init.js"></script>
<title>CSS Transform Generator — Virtual Tools</title>
<link rel="stylesheet" href="/assets/style.css">
<style>
.tool-wrap{max-width:720px;margin:0 auto;}
.tool-desc{font-size:14px;color:var(--text-secondary,#aaa);margin:8px 0 20px;}
.preview{background:var(--bg,#1e2230);border:1px solid var(--border,#444);border-radius:12px;padding:40px;margin:12px 0;min-height:240px;display:flex;align-items:center;justify-content:center;overflow:hidden;perspective:800px;}
.transform-box{width:140px;height:140px;background:linear-gradient(135deg,#5b8def,#9c5bef);border-radius:12px;transition:transform .3s;display:flex;align-items:center;justify-content:center;color:#fff;font-size:14px;font-weight:700;}
.controls{display:grid;gap:10px;margin:12px 0;}
.row{display:flex;gap:8px;align-items:center;}
.row label{font-size:13px;color:var(--text-secondary,#888);min-width:110px;}
.row input[type="range"]{flex:1;min-width:120px;}
.row .val{font-size:12px;color:var(--text,#eee);min-width:50px;text-align:right;font-family:monospace;}
.css-output{background:var(--bg,#1e2230);border:1px solid var(--border,#444);border-radius:8px;padding:12px;margin:12px 0;font-family:monospace;font-size:12px;color:var(--text,#eee);white-space:pre-wrap;word-break:break-all;}
button.action{padding:8px 16px;border-radius:6px;border:1px solid var(--border,#444);background:var(--card,#2a2f3e);color:var(--text,#eee);cursor:pointer;font-size:13px;}
button.action:hover{border-color:var(--accent,#5b8def);}
</style>
</head>
<body>
<header id="site-header"></header>
<main>
<div class="tool-wrap">
<h1>🔄 CSS Transform Generator</h1>
<p class="tool-desc">Create CSS transform with rotate, scale, skew, translate, and perspective. Live preview, copy CSS.</p>
<div class="preview"><div class="transform-box" id="tbox">PREVIEW</div></div>
<div class="css-output" id="cssOutput"></div>
<div class="controls">
<div class="row"><label>Rotate X (deg)</label><input type="range" id="rx" min="-180" max="180" value="0" oninput="update()"><span class="val" id="rxv">0°</span></div>
<div class="row"><label>Rotate Y (deg)</label><input type="range" id="ry" min="-180" max="180" value="0" oninput="update()"><span class="val" id="ryv">0°</span></div>
<div class="row"><label>Rotate Z (deg)</label><input type="range" id="rz" min="-180" max="180" value="0" oninput="update()"><span class="val" id="rzv">0°</span></div>
<div class="row"><label>Scale X</label><input type="range" id="sx" min="0.1" max="3" step="0.1" value="1" oninput="update()"><span class="val" id="sxv">1</span></div>
<div class="row"><label>Scale Y</label><input type="range" id="sy" min="0.1" max="3" step="0.1" value="1" oninput="update()"><span class="val" id="syv">1</span></div>
<div class="row"><label>Skew X (deg)</label><input type="range" id="kx" min="-89" max="89" value="0" oninput="update()"><span class="val" id="kxv">0°</span></div>
<div class="row"><label>Skew Y (deg)</label><input type="range" id="ky" min="-89" max="89" value="0" oninput="update()"><span class="val" id="kyv">0°</span></div>
<div class="row"><label>Translate X (px)</label><input type="range" id="tx" min="-200" max="200" value="0" oninput="update()"><span class="val" id="txv">0px</span></div>
<div class="row"><label>Translate Y (px)</label><input type="range" id="ty" min="-200" max="200" value="0" oninput="update()"><span class="val" id="tyv">0px</span></div>
<div class="row"><label>Perspective (px)</label><input type="range" id="persp" min="100" max="2000" step="50" value="800" oninput="update()"><span class="val" id="perspv">800px</span></div>
<div class="row"><button class="action" onclick="resetAll()">Reset</button><button class="action" onclick="copyCSS()">Copy CSS</button></div>
</div>
</div>
</main>
<script src="/assets/app.js"></script>
<script>
function v(id){return parseFloat(document.getElementById(id).value);}
function update(){
const rx=v('rx'),ry=v('ry'),rz=v('rz'),sx=v('sx'),sy=v('sy'),kx=v('kx'),ky=v('ky'),tx=v('tx'),ty=v('ty'),p=v('persp');
document.getElementById('rxv').textContent=rx+'°';document.getElementById('ryv').textContent=ry+'°';document.getElementById('rzv').textContent=rz+'°';
document.getElementById('sxv').textContent=sx;document.getElementById('syv').textContent=sy;
document.getElementById('kxv').textContent=kx+'°';document.getElementById('kyv').textContent=ky+'°';
document.getElementById('txv').textContent=tx+'px';document.getElementById('tyv').textContent=ty+'px';document.getElementById('perspv').textContent=p+'px';
const t=`perspective(${p}px) rotateX(${rx}deg) rotateY(${ry}deg) rotateZ(${rz}deg) scale(${sx}, ${sy}) skew(${kx}deg, ${ky}deg) translate(${tx}px, ${ty}px)`;
document.getElementById('tbox').style.transform=t;
document.getElementById('cssOutput').textContent='transform: '+t+';';
}
function resetAll(){['rx','ry','rz','kx','ky','tx','ty'].forEach(id=>document.getElementById(id).value=0);['sx','sy'].forEach(id=>document.getElementById(id).value=1);document.getElementById('persp').value=800;update();}
function copyCSS(){navigator.clipboard.writeText(document.getElementById('cssOutput').textContent).then(()=>alert('CSS copied!')).catch(()=>alert('Copy failed'));}
update();
</script>
</body>
</html>
