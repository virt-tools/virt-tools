<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="/assets/theme-init.js"></script>
<title>Match-3 Game — Virtual Tools</title>
<link rel="stylesheet" href="/assets/style.css">
<style>
.tool-wrap{max-width:500px;margin:0 auto;text-align:center;}
.tool-desc{font-size:14px;color:var(--text-secondary,#aaa);margin:8px 0;}
#board{display:grid;grid-template-columns:repeat(8,1fr);gap:2px;margin:16px auto;max-width:400px;background:var(--bg-alt,#1a1f2e);padding:8px;border-radius:8px;}
.cell{aspect-ratio:1;border-radius:6px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:22px;transition:transform 0.15s,opacity 0.15s;}
.cell:hover{transform:scale(1.08);}
.cell.selected{box-shadow:0 0 0 3px #f1c40f;transform:scale(1.05);}
.cell.matched{opacity:0;transform:scale(0.5);}
.cell.falling{transition:transform 0.2s;}
.stats{display:flex;gap:20px;justify-content:center;margin:8px 0;font-size:16px;}
.stats span{color:var(--accent,#5b8def);font-weight:700;}
.controls{margin:12px 0;}
.controls button{padding:10px 24px;border-radius:6px;border:1px solid var(--border,#444);background:var(--bg-alt,#1a1f2e);color:var(--text,#eee);cursor:pointer;font-size:14px;}
.controls button:hover{background:var(--accent,#5b8def);color:#fff;}
#msg{font-size:16px;font-weight:600;min-height:24px;margin:8px 0;color:#f1c40f;}
</style>
</head>
<body>
<header id="site-header"></header>
<main>
<div class="tool-wrap">
<h1>Match-3 💎</h1>
<p class="tool-desc">Swap adjacent gems to match 3 or more in a row. Cascading matches chain for bonus points. 8×8 board, 6 gem types.</p>
<div class="stats">Score: <span id="score">0</span> | Moves: <span id="moves">30</span></div>
<div id="msg">Click a gem, then click an adjacent one to swap!</div>
<div id="board"></div>
<div class="controls">
<button onclick="newGame()">🔄 New Game</button>
</div>
</div>
</main>
<script src="/assets/app.js"></script>
<script>
const SIZE=8;const GEMS=['💎','🔶','🔷','❤️','💚','💜'];let board=[],sel=null,score=0,moves=30,locked=false;
function makeBoard(){board=[];for(let r=0;r<SIZE;r++){board[r]=[];for(let c=0;c<SIZE;c++){let v;do{v=Math.floor(Math.random()*6);}while((c>=2&&board[r][c-1]===v&&board[r][c-2]===v)||(r>=2&&board[r-1][c]===v&&board[r-2][c]===v));board[r][c]=v;}}}
function render(){const el=document.getElementById('board');el.innerHTML='';for(let r=0;r<SIZE;r++){for(let c=0;c<SIZE;c++){const cell=document.createElement('div');cell.className='cell';cell.textContent=GEMS[board[r][c]]||'';cell.dataset.r=r;cell.dataset.c=c;if(sel&&sel.r===r&&sel.c===c)cell.classList.add('selected');cell.onclick=()=>clickCell(r,c);el.appendChild(cell);}}}
function clickCell(r,c){if(locked||moves<=0)return;if(!sel){sel={r,c};render();return;}if(sel.r===r&&sel.c===c){sel=null;render();return;}const dr=Math.abs(sel.r-r),dc=Math.abs(sel.c-c);if(dr+dc!==1){sel={r,c};render();return;}swap(sel.r,sel.c,r,c);}
function swap(r1,c1,r2,c2){locked=true;const t=board[r1][c1];board[r1][c1]=board[r2][c2];board[r2][c2]=t;sel=null;render();const m=findMatches();if(m.length===0){const t2=board[r1][c1];board[r1][c1]=board[r2][c2];board[r2][c2]=t2;render();document.getElementById('msg').textContent='❌ No match! Try again.';locked=false;}else{moves--;document.getElementById('moves').textContent=moves;processMatches(m);}}
function findMatches(){const m=[];for(let r=0;r<SIZE;r++){let s=0;for(let c=1;c<=SIZE;c++){if(c<SIZE&&board[r][c]===board[r][s]&&board[r][s]!==-1){}else{if(c-s>=3&&board[r][s]!==-1){for(let k=s;k<c;k++)m.push({r,c:k});}s=c;}}}for(let c=0;c<SIZE;c++){let s=0;for(let r=1;r<=SIZE;r++){if(r<SIZE&&board[r][c]===board[r-s]&&board[s][c]!==-1){}else{if(r-s>=3&&board[s][c]!==-1){for(let k=s;k<r;k++)m.push({r:k,c});}s=r;}}}return m;}
function processMatches(m){if(m.length===0){if(moves<=0){document.getElementById('msg').textContent='🎮 Game Over! Final score: '+score;}else{locked=false;}return;}const pts=m.length*10;score+=pts;document.getElementById('score').textContent=score;document.getElementById('msg').textContent='+'+pts+' points! ('+m.length+' gems)';m.forEach(p=>{board[p.r][p.c]=-1;});render();setTimeout(()=>{dropGems();render();setTimeout(()=>{const m2=findMatches();if(m2.length>0){processMatches(m2);}else{locked=false;}},200);},300);}
function dropGems(){for(let c=0;c<SIZE;c++){let col=[];for(let r=SIZE-1;r>=0;r--){if(board[r][c]!==-1)col.push(board[r][c]);}for(let r=SIZE-1;r>=0;r--){if(col.length>0){board[r][c]=col.shift();}else{board[r][c]=Math.floor(Math.random()*6);}}}}
function newGame(){score=0;moves=30;sel=null;locked=false;makeBoard();document.getElementById('score').textContent=0;document.getElementById('moves').textContent=30;document.getElementById('msg').textContent='Click a gem, then click an adjacent one to swap!';render();}
makeBoard();render();
</script>
</body>
</html>
