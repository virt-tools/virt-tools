<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CSS Countdown Component Generator — virt.tools</title>
<link rel="stylesheet" href="/assets/style.css">
<style>
.tool-area{max-width:960px;margin:2rem auto;padding:0 1rem}
.controls{display:grid;gap:1rem;margin:1.5rem 0;padding:1.5rem;background:#1a1a2e;border-radius:12px}
.control-row{display:flex;gap:1rem;align-items:center;flex-wrap:wrap}
.control-row label{min-width:120px;font-weight:600;font-size:.9rem}
.control-row select,.control-row input[type="color"],.control-row input[type="range"],.control-row input[type="text"]{padding:.5rem .75rem;border-radius:8px;border:1px solid #444;background:#0f0f1e;color:#eee;font-size:.9rem}
.preview-box{margin:1.5rem 0;padding:2rem;background:#0f0f1e;border-radius:12px}
.output-block{margin:2rem 0}
.output-block textarea{width:100%;min-height:200px;font-family:monospace;font-size:.85rem;padding:1rem;border-radius:8px;border:1px solid #444;background:#0f0f1e;color:#eee;resize:vertical}
.copy-btn{padding:.6rem 1.2rem;border:none;border-radius:8px;background:#4a9eff;color:#fff;cursor:pointer;font-size:.9rem;margin-top:.5rem}
h2{margin-top:2rem;font-size:1.2rem}
</style>
</head>
<body>
<header id="site-header"></header>
<main>
<div class="tool-area">
<h1>⏰ CSS Countdown Component Generator</h1>
<p>Create CSS countdown timer UI components with days/hours/minutes/seconds display. Configurable styles, colors, and sizes.</p>
<div class="controls">
<div class="control-row">
<label>Style</label><select id="style"><option value="card">Card</option><option value="block">Block</option><option value="circle">Circle</option><option value="flip">Flip</option></select>
<label>Theme</label><select id="theme"><option value="dark">Dark</option><option value="light">Light</option><option value="gradient">Gradient</option></select>
</div>
<div class="control-row">
<label>Label</label><input type="text" id="label" value="Launch begins in" style="width:200px">
<label>Accent Color</label><input type="color" id="accent" value="#4a9eff">
<label>Digit Size</label><input type="range" id="digitSize" min="24" max="80" value="48"><span id="digitSizeVal">48px</span>
</div>
<div class="control-row">
<label>Units</label>
<label><input type="checkbox" id="showDays" checked> Days</label>
<label><input type="checkbox" id="showHours" checked> Hours</label>
<label><input type="checkbox" id="showMins" checked> Minutes</label>
<label><input type="checkbox" id="showSecs" checked> Seconds</label>
</div>
</div>
<h2>Preview</h2>
<div class="preview-box" id="preview"></div>
<h2>CSS</h2><div class="output-block"><textarea id="cssOut" readonly></textarea><button class="copy-btn" onclick="copyText('cssOut')">Copy CSS</button></div>
<h2>HTML</h2><div class="output-block"><textarea id="htmlOut" readonly></textarea><button class="copy-btn" onclick="copyText('htmlOut')">Copy HTML</button></div>
</div>
</main>
<script src="/assets/app.js"></script>
<script>
function update(){
var style=document.getElementById('style').value;
var theme=document.getElementById('theme').value;
var label=document.getElementById('label').value;
var accent=document.getElementById('accent').value;
var digitSize=document.getElementById('digitSize').value;
document.getElementById('digitSizeVal').textContent=digitSize+'px';
var showDays=document.getElementById('showDays').checked;
var showHours=document.getElementById('showHours').checked;
var showMins=document.getElementById('showMins').checked;
var showSecs=document.getElementById('showSecs').checked;
var bg=theme==='dark'?'#1a1a2e':theme==='light'?'#f5f5f5':'linear-gradient(135deg,#667eea,#764ba2)';
var cardBg=theme==='dark'?'#0f0f1e':theme==='light'?'#fff':'rgba(255,255,255,.15)';
var textColor=theme==='dark'?'#eee':theme==='light'?'#333':'#fff';
var labelColor=theme==='dark'?'#aaa':theme==='light'?'#666':'rgba(255,255,255,.8)';
var units=[];
if(showDays)units.push(['Days','00']);
if(showHours)units.push(['Hours','00']);
if(showMins)units.push(['Minutes','00']);
if(showSecs)units.push(['Seconds','00']);
var html='<style>';
html+='.cdw{padding:2rem;border-radius:12px;text-align:center;background:'+bg+'}';
html+='.cdw-label{color:'+labelColor+';font-size:1rem;margin-bottom:1rem;display:block}';
html+='.cdw-grid{display:flex;gap:1rem;justify-content:center;flex-wrap:wrap}';
if(style==='card'){
html+='.cdw-unit{background:'+cardBg+';border-radius:12px;padding:1rem 1.5rem;min-width:90px;box-shadow:0 2px 8px rgba(0,0,0,.15)}';
html+='.cdw-digit{font-size:'+digitSize+'px;font-weight:800;color:'+accent+';font-variant-numeric:tabular-nums;line-height:1}';
html+='.cdw-unit-label{font-size:.7rem;text-transform:uppercase;letter-spacing:1px;color:'+labelColor+';margin-top:.5rem}';
}else if(style==='block'){
html+='.cdw-unit{min-width:90px}';
html+='.cdw-digit{font-size:'+digitSize+'px;font-weight:900;color:'+textColor+';background:'+accent+';border-radius:8px;padding:.5rem 1rem;font-variant-numeric:tabular-nums}';
html+='.cdw-unit-label{font-size:.7rem;text-transform:uppercase;letter-spacing:1px;color:'+labelColor+';margin-top:.5rem}';
}else if(style==='circle'){
html+='.cdw-unit{text-align:center}';
html+='.cdw-circle{width:'+Math.round(digitSize*2)+'px;height:'+Math.round(digitSize*2)+'px;border-radius:50%;border:3px solid '+accent+';display:flex;align-items:center;justify-content:center;margin:0 auto}';
html+='.cdw-digit{font-size:'+digitSize+'px;font-weight:800;color:'+accent+';font-variant-numeric:tabular-nums}';
html+='.cdw-unit-label{font-size:.7rem;text-transform:uppercase;letter-spacing:1px;color:'+labelColor+';margin-top:.5rem}';
}else if(style==='flip'){
html+='.cdw-unit{text-align:center}';
html+='.cdw-flip{background:'+cardBg+';border-radius:8px;padding:1rem;min-width:90px;position:relative;overflow:hidden}';
html+='.cdw-flip::after{content:"";position:absolute;top:50%;left:0;right:0;height:1px;background:rgba(0,0,0,.3)}';
html+='.cdw-digit{font-size:'+digitSize+'px;font-weight:900;color:'+textColor+';font-variant-numeric:tabular-nums;line-height:1}';
html+='.cdw-unit-label{font-size:.7rem;text-transform:uppercase;letter-spacing:1px;color:'+labelColor+';margin-top:.5rem}';
}
html+='</style>';
html+='<div class="cdw"><span class="cdw-label">'+escapeHtml(label)+'</span><div class="cdw-grid">';
units.forEach(function(u){
if(style==='circle'){
html+='<div class="cdw-unit"><div class="cdw-circle"><span class="cdw-digit">'+u[1]+'</span></div><div class="cdw-unit-label">'+u[0]+'</div></div>';
}else if(style==='flip'){
html+='<div class="cdw-unit"><div class="cdw-flip"><span class="cdw-digit">'+u[1]+'</span></div><div class="cdw-unit-label">'+u[0]+'</div></div>';
}else{
html+='<div class="cdw-unit"><span class="cdw-digit">'+u[1]+'</span><div class="cdw-unit-label">'+u[0]+'</div></div>';
}
});
html+='</div></div>';
document.getElementById('preview').innerHTML=html;
var cssText='.cdw {\n  padding: 2rem;\n  border-radius: 12px;\n  text-align: center;\n  background: '+bg+';\n}\n\n.cdw-label {\n  color: '+labelColor+';\n  font-size: 1rem;\n  margin-bottom: 1rem;\n  display: block;\n}\n\n.cdw-grid {\n  display: flex;\n  gap: 1rem;\n  justify-content: center;\n  flex-wrap: wrap;\n}\n';
if(style==='card')cssText+='.cdw-unit {\n  background: '+cardBg+';\n  border-radius: 12px;\n  padding: 1rem 1.5rem;\n  min-width: 90px;\n  box-shadow: 0 2px 8px rgba(0,0,0,.15);\n}\n\n.cdw-digit {\n  font-size: '+digitSize+'px;\n  font-weight: 800;\n  color: '+accent+';\n  font-variant-numeric: tabular-nums;\n  line-height: 1;\n}\n';
else if(style==='block')cssText+='.cdw-unit { min-width: 90px; }\n\n.cdw-digit {\n  font-size: '+digitSize+'px;\n  font-weight: 900;\n  color: '+textColor+';\n  background: '+accent+';\n  border-radius: 8px;\n  padding: .5rem 1rem;\n  font-variant-numeric: tabular-nums;\n}\n';
else if(style==='circle')cssText+='.cdw-circle {\n  width: '+Math.round(digitSize*2)+'px;\n  height: '+Math.round(digitSize*2)+'px;\n  border-radius: 50%;\n  border: 3px solid '+accent+';\n  display: flex;\n  align-items: center;\n  justify-content: center;\n  margin: 0 auto;\n}\n\n.cdw-digit {\n  font-size: '+digitSize+'px;\n  font-weight: 800;\n  color: '+accent+';\n  font-variant-numeric: tabular-nums;\n}\n';
else if(style==='flip')cssText+='.cdw-flip {\n  background: '+cardBg+';\n  border-radius: 8px;\n  padding: 1rem;\n  min-width: 90px;\n  position: relative;\n  overflow: hidden;\n}\n\n.cdw-flip::after {\n  content: "";\n  position: absolute;\n  top: 50%;\n  left: 0;\n  right: 0;\n  height: 1px;\n  background: rgba(0,0,0,.3);\n}\n\n.cdw-digit {\n  font-size: '+digitSize+'px;\n  font-weight: 900;\n  color: '+textColor+';\n  font-variant-numeric: tabular-nums;\n  line-height: 1;\n}\n';
cssText+='\n.cdw-unit-label {\n  font-size: 0.7rem;\n  text-transform: uppercase;\n  letter-spacing: 1px;\n  color: '+labelColor+';\n  margin-top: 0.5rem;\n}\n';
document.getElementById('cssOut').value=cssText;
var htmlOut='<div class="cdw">\n  <span class="cdw-label">'+escapeHtml(label)+'</span>\n  <div class="cdw-grid">\n';
units.forEach(function(u){
if(style==='circle')htmlOut+='    <div class="cdw-unit"><div class="cdw-circle"><span class="cdw-digit">'+u[1]+'</span></div><div class="cdw-unit-label">'+u[0]+'</div></div>\n';
else if(style==='flip')htmlOut+='    <div class="cdw-unit"><div class="cdw-flip"><span class="cdw-digit">'+u[1]+'</span></div><div class="cdw-unit-label">'+u[0]+'</div></div>\n';
else htmlOut+='    <div class="cdw-unit"><span class="cdw-digit">'+u[1]+'</span><div class="cdw-unit-label">'+u[0]+'</div></div>\n';
});
htmlOut+='  </div>\n</div>';
document.getElementById('htmlOut').value=htmlOut;
}
function escapeHtml(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function copyText(id){var t=document.getElementById(id);t.select();document.execCommand('copy')}
document.querySelectorAll('select,input').forEach(function(e){e.addEventListener('input',update)});
update();
</script>
</body>
</html>
