<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="/assets/theme-init.js"></script>
<title>CSS Pricing Table Generator — Virtual Tools</title>
<link rel="stylesheet" href="/assets/style.css">
<style>
.tool-wrap{max-width:800px;margin:0 auto;}
.tool-desc{font-size:14px;color:var(--text-secondary,#aaa);margin:8px 0 20px;}
.controls{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin:12px 0;}
.ctrl{display:flex;flex-direction:column;gap:4px;}
.ctrl label{font-size:12px;color:var(--text-secondary,#888);}
.ctrl input,.ctrl select{padding:6px 8px;border-radius:6px;border:1px solid var(--border,#444);background:var(--bg,#1e2230);color:var(--text,#eee);font-size:13px;}
.ctrl input[type="color"]{padding:2px;height:34px;}
button.action{padding:8px 16px;border-radius:6px;border:1px solid var(--border,#444);background:var(--card,#2a2f3e);color:var(--text,#eee);cursor:pointer;font-size:13px;margin:4px 4px 0 0;}
.preview{background:var(--bg,#1e2230);border:1px solid var(--border,#444);border-radius:8px;padding:24px;margin:12px 0;}
.code-block{background:var(--bg,#1e2230);border:1px solid var(--border,#444);border-radius:8px;padding:12px;margin:8px 0;font-family:monospace;font-size:11px;color:var(--text,#eee);white-space:pre-wrap;word-break:break-all;max-height:400px;overflow:auto;}
.pricing-table{display:flex;gap:16px;flex-wrap:wrap;justify-content:center;}
.pricing-card{flex:1;min-width:180px;max-width:220px;padding:24px 20px;border:1px solid var(--border,#444);border-radius:12px;background:var(--card,#2a2f3e);text-align:center;transition:all .2s;position:relative;}
.pricing-card:hover{transform:translateY(-4px);box-shadow:0 8px 24px rgba(0,0,0,.3);}
.pricing-card.featured{border-width:2px;}
.pricing-card .name{font-size:16px;font-weight:bold;color:var(--text,#eee);margin-bottom:8px;}
.pricing-card .price{font-size:32px;font-weight:bold;color:var(--text,#eee);margin:8px 0;}
.pricing-card .price .per{font-size:14px;color:var(--text-secondary,#888);}
.pricing-card .features{list-style:none;padding:0;margin:12px 0;font-size:13px;color:var(--text-secondary,#aaa);text-align:left;}
.pricing-card .features li{padding:4px 0;}
.pricing-card .features li::before{content:'✓ ';color:var(--accent,#5b8def);}
.pricing-card .btn{display:block;padding:10px;border-radius:8px;background:var(--accent,#5b8def);color:#fff;text-align:center;font-size:14px;margin-top:12px;}
.badge{position:absolute;top:-10px;left:50%;transform:translateX(-50%);padding:2px 12px;border-radius:12px;font-size:11px;font-weight:bold;color:#fff;}
</style>
</head>
<body>
<header id="site-header"></header>
<main>
<div class="tool-wrap">
<h1>💳 CSS Pricing Table Generator</h1>
<p class="tool-desc">Create CSS pricing tables with 2-4 tiers, featured highlight, custom colors, and hover effects. Copy HTML+CSS.</p>
<div class="controls">
<div class="ctrl"><label>Accent Color</label><input type="color" id="ac" value="#5b8def" oninput="render()"></div>
<div class="ctrl"><label>Card BG</label><input type="color" id="cbg" value="#2a2f3e" oninput="render()"></div>
<div class="ctrl"><label>Border Color</label><input type="color" id="bdc" value="#444" oninput="render()"></div>
<div class="ctrl"><label># Tiers</label><select id="tn" onchange="render()"><option value="2">2</option><option value="3" selected>3</option><option value="4">4</option></select></div>
<div class="ctrl"><label>Featured Tier</label><select id="ft" onchange="render()"><option value="0">None</option><option value="1" selected>2nd</option><option value="2">3rd</option><option value="3">4th</option></select></div>
<div class="ctrl"><label>Style</label><select id="st" onchange="render()"><option value="0">Modern</option><option value="1">Minimal</option><option value="2">Bold</option></select></div>
</div>
<div class="preview" id="prev"></div>
<div style="margin:8px 0;"><button class="action" onclick="copyCode()">Copy HTML+CSS</button></div>
<div class="code-block" id="code"></div>
</div>
</main>
<script src="/assets/app.js"></script>
<script>
let codeText='';
const TIERS=[{name:'Basic',price:'$9',feats:['5 projects','1GB storage','Email support']},{name:'Pro',price:'$29',feats:['20 projects','10GB storage','Priority support','Custom domain']},{name:'Business',price:'$99',feats:['Unlimited projects','100GB storage','24/7 support','API access','SSO']},{name:'Enterprise',price:'$299',feats:['Everything in Business','Dedicated server','SLA guarantee','Custom integrations']}];
function render(){
const ac=v('ac'),cbg=v('cbg'),bdc=v('bdc'),tn=parseInt(v('tn')),ft=parseInt(v('ft')),st=v('st');
const prev=document.getElementById('prev');
const fontSize=st==='1'?'13px':st==='2'?'15px':'14px';
const borderWidth=st==='2'?'2px':'1px';
const badgeText=['Most Popular','Recommended','Best Value'];
let html='<div class="pricing-table">\n';
let css=`.pricing-table{display:flex;gap:16px;flex-wrap:wrap;justify-content:center}\n.pricing-card{flex:1;min-width:180px;max-width:220px;padding:24px 20px;border:${borderWidth} solid ${bdc};border-radius:12px;background:${cbg};text-align:center;transition:all .2s;position:relative}\n.pricing-card:hover{transform:translateY(-4px);box-shadow:0 8px 24px rgba(0,0,0,.3)}\n.pricing-card.featured{border-color:${ac}}\n.pricing-card .name{font-size:16px;font-weight:bold;color:#eee;margin-bottom:8px}\n.pricing-card .price{font-size:32px;font-weight:bold;color:#eee;margin:8px 0}\n.pricing-card .price .per{font-size:14px;color:#888}\n.pricing-card .features{list-style:none;padding:0;margin:12px 0;font-size:${fontSize};color:#aaa;text-align:left}\n.pricing-card .features li{padding:4px 0}\n.pricing-card .features li::before{content:'\\2713 ';color:${ac}}\n.pricing-card .btn{display:block;padding:10px;border-radius:8px;background:${ac};color:#fff;text-align:center;font-size:14px;margin-top:12px}\n.badge{position:absolute;top:-10px;left:50%;transform:translateX(-50%);padding:2px 12px;border-radius:12px;font-size:11px;font-weight:bold;color:#fff;background:${ac}}`;
for(let i=0;i<tn;i++){
const t=TIERS[i];
const isFeat=i===ft-1;
html+=`  <div class="pricing-card${isFeat?' featured':''}">\n${isFeat?`    <span class="badge">${badgeText[ft-2]||'Popular'}</span>\n`:''}    <div class="name">${t.name}</div>\n    <div class="price">${t.price}<span class="per">/mo</span></div>\n    <ul class="features">\n`;
t.feats.forEach(f=>{html+=`      <li>${f}</li>\n`});
html+=`    </ul>\n    <a class="btn">Choose ${t.name}</a>\n  </div>\n`;
}
html+='</div>';
prev.innerHTML=`<style>${css}</style>${html}`;
codeText=`<!-- HTML -->\n${html}\n\n<!-- CSS -->\n<style>\n${css}\n</style>`;
document.getElementById('code').textContent=codeText;
}
function v(id){return document.getElementById(id).value;}
function copyCode(){navigator.clipboard.writeText(codeText).then(()=>alert('Code copied!')).catch(()=>alert('Copy failed'));}
render();
</script>
</body>
</html>
