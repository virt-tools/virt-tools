<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="/assets/theme-init.js"></script>
<title>CSS Pagination Generator — Virtual Tools</title>
<link rel="stylesheet" href="/assets/style.css">
<style>
.tool-wrap{max-width:800px;margin:0 auto;}
.tool-desc{font-size:14px;color:var(--text-secondary,#aaa);margin:8px 0 20px;}
.controls{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:10px;margin:12px 0;}
.ctrl{display:flex;flex-direction:column;gap:4px;}
.ctrl label{font-size:12px;color:var(--text-secondary,#888);}
.ctrl input,.ctrl select{padding:6px 8px;border-radius:6px;border:1px solid var(--border,#444);background:var(--bg,#1e2230);color:var(--text,#eee);font-size:13px;}
button.action{padding:8px 16px;border-radius:6px;border:1px solid var(--border,#444);background:var(--card,#2a2f3e);color:var(--text,#eee);cursor:pointer;font-size:13px;margin:4px 4px 0 0;}
.preview{background:var(--bg,#1e2230);border:1px solid var(--border,#444);border-radius:8px;padding:24px;margin:12px 0;text-align:center;}
.code-block{background:var(--bg,#1e2230);border:1px solid var(--border,#444);border-radius:8px;padding:12px;margin:8px 0;font-family:monospace;font-size:11px;color:var(--text,#eee);white-space:pre-wrap;word-break:break-all;max-height:400px;overflow:auto;}
.pg-item{display:inline-flex;align-items:center;justify-content:center;min-width:36px;height:36px;padding:0 8px;border-radius:6px;font-size:13px;cursor:pointer;margin:0 2px;}
</style>
</head>
<body>
<header id="site-header"></header>
<main>
<div class="tool-wrap">
<h1>📄 CSS Pagination Generator</h1>
<p class="tool-desc">Create CSS pagination with 6 styles, active page, prev/next, custom colors. Copy HTML+CSS.</p>
<div class="controls">
<div class="ctrl"><label>Total Pages</label><input type="number" id="tp" value="10" min="2" max="20" oninput="render()"></div>
<div class="ctrl"><label>Current Page</label><input type="number" id="cp" value="3" min="1" max="10" oninput="render()"></div>
<div class="ctrl"><label>Style</label><select id="st" onchange="render()"><option value="0" selected>Classic</option><option value="1">Rounded</option><option value="2">Pill</option><option value="3">Flat</option><option value="4">Outline</option><option value="5">Gradient</option></select></div>
<div class="ctrl"><label>Active Color</label><input type="color" id="ac" value="#4facfe" oninput="render()"></div>
<div class="ctrl"><label>Text Color</label><input type="color" id="tc" value="#ddd" oninput="render()"></div>
<div class="ctrl"><label>Radius</label><input type="number" id="rd" value="6" min="0" max="24" oninput="render()"></div>
</div>
<div style="margin:8px 0;"><button class="action" onclick="copyCode()">Copy HTML</button></div>
<div class="preview" id="prev"></div>
<div class="code-block" id="code"></div>
</div>
</main>
<script src="/assets/app.js"></script>
<script>
let codeText='';
function render(){
const tp=Math.max(2,+v('tp')||10),cp=Math.min(tp,Math.max(1,+v('cp')||1)),st=+v('st'),ac=v('ac'),tc=v('tc'),rd=+v('rd');
let radius=rd+'px',itemStyle='',activeStyle='';
switch(st){
case 1:radius='50px';break;
case 2:radius='20px';itemStyle='padding:0 16px;';break;
case 3:radius='0px';break;
case 4:itemStyle='border:1px solid '+ac+';';activeStyle='border-color:'+ac+';';break;
case 5:activeStyle='background:linear-gradient(135deg,'+ac+',#667eea);';break;
}
let pages=[];
pages.push('<span class="pg-item" style="color:'+tc+';border-radius:'+radius+';'+itemStyle+'">← Prev</span>');
for(let i=1;i<=tp;i++){
if(i===1||i===tp||(i>=cp-1&&i<=cp+1)){
const act=i===cp;
pages.push('<span class="pg-item" style="'+(act?activeStyle+'background:'+ac+';color:#fff':'background:transparent;color:'+tc)+'';border-radius:'+radius+';'+itemStyle+'">'+i+'</span>');
}else if(i===cp-2||i===cp+2){
pages.push('<span class="pg-item" style="color:'+tc+';border-radius:'+radius+'">···</span>');
}
}
pages.push('<span class="pg-item" style="color:'+tc+';border-radius:'+radius+';'+itemStyle+'">Next →</span>');
const html='<nav style="display:flex;align-items:center;justify-content:center;gap:4px;flex-wrap:wrap">\n'+pages.join('\n')+'\n</nav>';
document.getElementById('prev').innerHTML=html.replace(/<span/g,'<span').replace(/pg-item/g,'pg-item');
document.getElementById('prev').innerHTML=html;
codeText=html;
document.getElementById('code').textContent=html;
}
function v(id){return document.getElementById(id).value;}
function copyCode(){navigator.clipboard.writeText(codeText).then(()=>alert('HTML copied!')).catch(()=>alert('Copy failed'));}
render();
</script>
</body>
</html>
