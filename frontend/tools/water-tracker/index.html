<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="/assets/theme-init.js"></script>
<title>Water Intake Tracker — Virtual Tools</title>
<link rel="stylesheet" href="/assets/style.css">
<style>
.tool-wrap{max-width:500px;margin:0 auto;}
.tool-desc{font-size:14px;color:var(--text-secondary,#aaa);margin:8px 0 16px;}
.goal-row{display:flex;gap:8px;align-items:center;margin-bottom:16px;}
.goal-row input{width:80px;padding:8px;border-radius:8px;border:1px solid var(--border,#444);background:var(--bg,#2a2f3e);color:var(--text,#eee);font-size:14px;}
.bottle{width:200px;height:360px;border:4px solid var(--accent,#5b8def);border-radius:20px;margin:20px auto;position:relative;overflow:hidden;background:var(--bg-alt,#1a1f2e);}
.water{position:absolute;bottom:0;left:0;right:0;background:linear-gradient(180deg,#5b8def,#3b6dde);transition:height 0.5s ease;border-radius:0 0 16px 16px;}
.water::before{content:'';position:absolute;top:-5px;left:0;right:0;height:10px;background:#5b8def;border-radius:50%;animation:wave 2s infinite ease-in-out;}
@keyframes wave{0%,100%{transform:translateX(-10px)}50%{transform:translateX(10px)}}
.amount{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:28px;font-weight:bold;color:#fff;text-shadow:0 2px 4px rgba(0,0,0,0.3);z-index:1;}
.amount small{font-size:14px;display:block;text-align:center;}
.add-row{display:flex;gap:8px;justify-content:center;margin:20px 0;flex-wrap:wrap;}
.add-btn{padding:10px 20px;border-radius:10px;border:1px solid var(--border,#444);background:var(--bg,#2a2f3e);color:var(--text,#eee);cursor:pointer;font-size:14px;}
.add-btn:hover{border-color:var(--accent,#5b8def);}
.btn{padding:12px 24px;border-radius:10px;border:none;background:var(--accent,#5b8def);color:#fff;cursor:pointer;font-size:14px;}
.btn:hover{opacity:0.9;}
.btn.secondary{background:var(--bg-alt,#1a1f2e);border:1px solid var(--border,#444);color:var(--text,#eee);}
.stats{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:20px;}
.stat{background:var(--bg-alt,#1a1f2e);border-radius:12px;padding:16px;text-align:center;}
.stat .v{font-size:24px;font-weight:bold;color:var(--accent,#5b8def);}
.stat .l{font-size:12px;color:var(--text-secondary,#888);margin-top:4px;}
.history{margin-top:20px;}
.history h3{font-size:14px;color:var(--text-secondary,#888);margin-bottom:8px;}
.day{display:flex;justify-content:space-between;padding:8px 12px;border-radius:8px;background:var(--bg-alt,#1a1f2e);margin-bottom:4px;font-size:13px;}
.bar{width:100px;height:8px;background:var(--border,#333);border-radius:4px;overflow:hidden;margin-left:12px;}
.bar-fill{height:100%;background:var(--accent,#5b8def);border-radius:4px;}
</style>
</head>
<body>
<header id="site-header"></header>
<main>
<div class="tool-wrap">
<h1>Water Intake Tracker 💧</h1>
<p class="tool-desc">Track your daily water intake. Set a goal, log glasses throughout the day, and build healthy hydration habits.</p>
<div class="goal-row">
<label style="font-size:14px">Daily goal:</label>
<input type="number" id="goalMl" value="2000" min="500" max="5000" step="100">
<span style="font-size:13px;color:var(--text-secondary,#888)">ml</span>
<button class="btn secondary" style="margin-left:auto" onclick="saveGoal()">Set</button>
</div>
<div class="bottle">
<div class="water" id="water" style="height:0%"></div>
<div class="amount" id="amount">0<small>ml of 2000ml</small></div>
</div>
<div class="add-row">
<button class="add-btn" onclick="add(200)">+200ml</button>
<button class="add-btn" onclick="add(250)">+250ml</button>
<button class="add-btn" onclick="add(300)">+300ml</button>
<button class="add-btn" onclick="add(500)">+500ml</button>
</div>
<div style="text-align:center;">
<button class="btn secondary" onclick="resetToday()">Reset Today</button>
</div>
<div class="stats">
<div class="stat"><div class="v" id="pctV">0%</div><div class="l">Goal completed</div></div>
<div class="stat"><div class="v" id="streakV">0</div><div class="l">Day streak</div></div>
</div>
<div class="history">
<h3>Last 7 days</h3>
<div id="historyList"></div>
</div>
</div>
</main>
<script src="/assets/app.js"></script>
<script>
const KEY='water_tracker_v1';
function load(){try{return JSON.parse(localStorage.getItem(KEY))||{};}catch(e){return{};}}
function save(d){localStorage.setItem(KEY,JSON.stringify(d));}
function todayKey(){const d=new Date();return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;}
function getGoal(){return load().goal||2000;}
function getToday(){const d=load();return d[todayKey()]||0;}
function render(){
const goal=getGoal();const today=getToday();
const pct=Math.min(100,(today/goal)*100);
document.getElementById('water').style.height=pct+'%';
document.getElementById('amount').innerHTML=`${today}<small>ml of ${goal}ml</small>`;
document.getElementById('pctV').textContent=Math.round(pct)+'%';
renderHistory();renderStreak();
}
function add(ml){const d=load();const k=todayKey();d[k]=(d[k]||0)+ml;save(d);render();}
function resetToday(){const d=load();d[todayKey()]=0;save(d);render();}
function saveGoal(){const v=parseInt(document.getElementById('goalMl').value)||2000;const d=load();d.goal=v;save(d);render();}
function renderHistory(){
const d=load();const list=document.getElementById('historyList');list.innerHTML='';
const goal=getGoal();
for(let i=6;i>=0;i--){
const dt=new Date();dt.setDate(dt.getDate()-i);
const k=`${dt.getFullYear()}-${String(dt.getMonth()+1).padStart(2,'0')}-${String(dt.getDate()).padStart(2,'0')}`;
const v=d[k]||0;
const pct=Math.min(100,(v/goal)*100);
const label=i===0?'Today':dt.toLocaleDateString('en',{weekday:'short',month:'short',day:'numeric'});
const bar=`<div class="bar"><div class="bar-fill" style="width:${pct}%"></div></div>`;
list.innerHTML+=`<div class="day"><span>${label}</span><span style="display:flex;align-items:center">${bar}<span style="margin-left:12px;min-width:60px;text-align:right">${v}ml</span></span></div>`;
}
}
function renderStreak(){
const d=load();let streak=0;
for(let i=0;i<365;i++){
const dt=new Date();dt.setDate(dt.getDate()-i);
const k=`${dt.getFullYear()}-${String(dt.getMonth()+1).padStart(2,'0')}-${String(dt.getDate()).padStart(2,'0')}`;
if((d[k]||0)>=getGoal())streak++;else if(i>0)break;else continue;
}
document.getElementById('streakV').textContent=streak;
}
document.getElementById('goalMl').value=getGoal();
render();
</script>
</body>
</html>
