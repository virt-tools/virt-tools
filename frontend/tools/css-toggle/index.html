<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="/assets/theme-init.js"></script>
<title>CSS Toggle Switch Generator — Virtual Tools</title>
<link rel="stylesheet" href="/assets/style.css">
<style>
.tool-wrap{max-width:680px;margin:0 auto;}
.tool-desc{font-size:14px;color:var(--text-secondary,#aaa);margin:8px 0 20px;}
.controls{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin:12px 0;}
.ctrl{display:flex;flex-direction:column;gap:4px;}
.ctrl label{font-size:12px;color:var(--text-secondary,#888);}
.ctrl input,.ctrl select{padding:6px 8px;border-radius:6px;border:1px solid var(--border,#444);background:var(--bg,#1e2230);color:var(--text,#eee);font-size:13px;}
.ctrl input[type="color"]{padding:2px;height:34px;}
button.action{padding:8px 16px;border-radius:6px;border:1px solid var(--border,#444);background:var(--card,#2a2f3e);color:var(--text,#eee);cursor:pointer;font-size:13px;margin:4px 4px 0 0;}
button.action:hover{border-color:var(--accent,#5b8def);}
.preview{background:var(--bg,#1e2230);border:1px solid var(--border,#444);border-radius:8px;padding:30px;margin:12px 0;display:flex;gap:20px;flex-wrap:wrap;align-items:center;justify-content:center;}
.code-block{background:var(--bg,#1e2230);border:1px solid var(--border,#444);border-radius:8px;padding:12px;margin:8px 0;font-family:monospace;font-size:11px;color:var(--text,#eee);white-space:pre-wrap;word-break:break-all;max-height:300px;overflow:auto;}
.sw{position:relative;display:inline-block;width:60px;height:30px;border-radius:30px;background:#555;cursor:pointer;transition:background .3s}
.sw.on{background:var(--on-color,#4caf50)}
.sw::after{content:'';position:absolute;top:3px;left:3px;width:24px;height:24px;border-radius:50%;background:#fff;transition:transform .3s;box-shadow:0 1px 3px rgba(0,0,0,.3)}
.sw.on::after{transform:translateX(30px)}
.sw.ios{border-radius:30px}
.sw.android{width:52px;height:24px;border-radius:2px}
.sw.android::after{border-radius:2px;width:20px;height:18px;top:3px}
.sw.android.on::after{transform:translateX(28px)}
.sw.square{border-radius:4px}
.sw.square::after{border-radius:4px}
.sw.label-on::before{content:'ON';position:absolute;top:50%;left:8px;transform:translateY(-50%);font-size:10px;font-weight:700;color:#fff;opacity:0;transition:opacity .3s}
.sw.label-on.on::before{opacity:1}
.sw.label-off::after{content:''}
.sw.label-off:not(.on)::before{content:'OFF';position:absolute;top:50%;left:30px;transform:translateY(-50%);font-size:10px;font-weight:700;color:#aaa;transition:opacity .3s}
</style>
</head>
<body>
<header id="site-header"></header>
<main>
<div class="tool-wrap">
<h1>🎛️ CSS Toggle Switch Generator</h1>
<p class="tool-desc">Create iOS/Android/square-style CSS toggle switches. Custom colors, sizes, labels, 4 animations. Live preview, copy CSS.</p>
<div class="controls">
<div class="ctrl"><label>On Color</label><input type="color" id="oc" value="#4caf50" oninput="render()"></div>
<div class="ctrl"><label>Off Color</label><input type="color" id="ofc" value="#555555" oninput="render()"></div>
<div class="ctrl"><label>Knob Color</label><input type="color" id="kc" value="#ffffff" oninput="render()"></div>
<div class="ctrl"><label>Style</label><select id="st" onchange="render()"><option value="ios">iOS (Rounded)</option><option value="android">Android (Square)</option><option value="square">Square</option></select></div>
<div class="ctrl"><label>Size</label><select id="sz" onchange="render()"><option value="1">Small</option><option value="1.25" selected>Medium</option><option value="1.5">Large</option></select></div>
<div class="ctrl"><label>Labels</label><select id="lb" onchange="render()"><option value="0">None</option><option value="1">On/Off Text</option></select></div>
</div>
<div class="preview" id="prev"></div>
<div style="margin:8px 0;"><button class="action" onclick="copyCode()">Copy HTML+CSS</button></div>
<div class="code-block" id="code"></div>
</div>
</main>
<script src="/assets/app.js"></script>
<script>
let codeText='';
function render(){
const oc=v('oc'),ofc=v('ofc'),kc=v('kc'),st=v('st'),sz=parseFloat(v('sz')),lb=v('lb')==='1';
const prev=document.getElementById('prev');
prev.innerHTML='';
for(let i=0;i<4;i++){
const div=document.createElement('div');
div.className=`sw ${st}${lb?' label-on':''}${i%2?' on':''}`;
div.style.transform=`scale(${sz})`;
div.style.setProperty('--on-color',oc);
div.style.background=i%2?oc:ofc;
div.style.setProperty('--knob-color',kc);
div.onclick=function(){this.classList.toggle('on');this.style.background=this.classList.contains('on')?oc:ofc};
prev.appendChild(div);
}
const css=`.toggle{position:relative;display:inline-block;width:60px;height:30px;border-radius:30px;background:${ofc};cursor:pointer;transition:background .3s}
.toggle.on{background:${oc}}
.toggle::after{content:'';position:absolute;top:3px;left:3px;width:24px;height:24px;border-radius:50%;background:${kc};transition:transform .3s;box-shadow:0 1px 3px rgba(0,0,0,.3)}
.toggle.on::after{transform:translateX(30px)}`;
const html=`<div class="toggle" onclick="this.classList.toggle('on')"></div>
<div class="toggle on" onclick="this.classList.toggle('on')"></div>`;
codeText=`<!-- HTML -->\n${html}\n\n<!-- CSS -->\n<style>\n${css}\n</style>`;
document.getElementById('code').textContent=codeText;
}
function v(id){return document.getElementById(id).value;}
function copyCode(){navigator.clipboard.writeText(codeText).then(()=>alert('Code copied!')).catch(()=>alert('Copy failed'));}
render();
</script>
</body>
</html>
