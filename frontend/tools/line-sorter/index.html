<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <script src="/assets/theme-init.js"></script>
  <title>Line Sorter &amp; Deduper — Virtual Tools</title>
  <link rel="stylesheet" href="/assets/style.css">
</head>
<body>
  <div id="site-header"></div>
  <main>
    <div class="tool-header">
      <a class="back" href="/">← All tools</a>
      <h1>Line Sorter &amp; Deduper</h1>
      <p>Clean up a list — sort, remove duplicates, trim whitespace and drop blank lines. Everything runs in your browser.</p>
    </div>

    <div class="panel">
      <div class="field">
        <label for="in">Input</label>
        <textarea id="in" placeholder="one line per item…" style="min-height:200px;">banana
Apple
apple
10
2
1
banana
  cherry
</textarea>
      </div>

      <div class="spacer"></div>
      <div class="row" style="align-items:flex-end;">
        <div>
          <label for="sort">Sort</label>
          <select id="sort">
            <option value="none">Keep order</option>
            <option value="asc" selected>A → Z</option>
            <option value="desc">Z → A</option>
          </select>
        </div>
        <label class="check"><input type="checkbox" id="natural"> Numeric-aware (natural)</label>
        <label class="check"><input type="checkbox" id="ci"> Case-insensitive</label>
      </div>
      <div class="spacer"></div>
      <div class="row" style="align-items:flex-end;">
        <label class="check"><input type="checkbox" id="dedup" checked> Remove duplicates</label>
        <label class="check"><input type="checkbox" id="trim" checked> Trim each line</label>
        <label class="check"><input type="checkbox" id="blanks" checked> Remove blank lines</label>
      </div>

      <div class="spacer"></div>
      <div class="row">
        <button id="apply">Use output as input</button>
        <button id="copy" class="secondary">Copy output</button>
        <button id="clear" class="secondary">Clear</button>
      </div>

      <div class="spacer"></div>
      <div class="row" style="justify-content:space-between;">
        <label for="out">Output</label>
        <span class="note" id="stats" style="margin-top:0;"></span>
      </div>
      <textarea id="out" readonly style="min-height:200px;" placeholder="Result appears here…"></textarea>
    </div>
  </main>

  <script src="/assets/app.js"></script>
  <script>
  (function () {
    var inEl = document.getElementById("in");
    var sort = document.getElementById("sort");
    var natural = document.getElementById("natural");
    var ci = document.getElementById("ci");
    var dedup = document.getElementById("dedup");
    var trim = document.getElementById("trim");
    var blanks = document.getElementById("blanks");
    var applyBtn = document.getElementById("apply");
    var copyBtn = document.getElementById("copy");
    var clearBtn = document.getElementById("clear");
    var out = document.getElementById("out");
    var stats = document.getElementById("stats");

    function run() {
      var lines = inEl.value.split("\n");
      var inCount = lines.length;
      var removedBlanks = 0, removedDups = 0;

      if (trim.checked) lines = lines.map(function (l) { return l.replace(/^\s+|\s+$/g, ""); });
      if (blanks.checked) {
        var before = lines.length;
        lines = lines.filter(function (l) { return l.length > 0; });
        removedBlanks = before - lines.length;
      }

      if (dedup.checked) {
        var seen = {}, kept = [];
        lines.forEach(function (l) {
          var key = ci.checked ? l.toLowerCase() : l;
          if (seen[key]) { removedDups++; }
          else { seen[key] = true; kept.push(l); }
        });
        lines = kept;
      }

      if (sort.value !== "none") {
        var coll = new Intl.Collator(undefined, {
          numeric: natural.checked,
          sensitivity: ci.checked ? "base" : "variant"
        });
        lines.sort(function (a, b) {
          return sort.value === "asc" ? coll.compare(a, b) : coll.compare(b, a);
        });
      }

      out.value = lines.join("\n");
      stats.textContent = inCount + " in → " + lines.length + " out" +
        (removedBlanks ? "  ·  " + removedBlanks + " blank removed" : "") +
        (removedDups ? "  ·  " + removedDups + " duplicate" + (removedDups === 1 ? "" : "s") + " removed" : "");
    }

    function inputs() { return [inEl, sort, natural, ci, dedup, trim, blanks]; }
    inputs().forEach(function (el) {
      el.addEventListener("input", run);
      el.addEventListener("change", run);
    });

    applyBtn.addEventListener("click", function () { inEl.value = out.value; run(); inEl.focus(); });
    clearBtn.addEventListener("click", function () { inEl.value = ""; out.value = ""; stats.textContent = ""; inEl.focus(); });
    copyBtn.addEventListener("click", function () {
      if (!out.value) return;
      function done() { copyBtn.textContent = "Copied!"; setTimeout(function () { copyBtn.textContent = "Copy output"; }, 1200); }
      if (navigator.clipboard && navigator.clipboard.writeText) navigator.clipboard.writeText(out.value).then(done);
      else { var ta = out; ta.select(); try { document.execCommand("copy"); done(); } catch (e) {} }
    });

    run();
  })();
  </script>
</body>
</html>
