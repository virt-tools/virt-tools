<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="/assets/theme-init.js"></script>
<title>Drum Machine — Virtual Tools</title>
<link rel="stylesheet" href="/assets/style.css">
<style>
.tool-wrap{max-width:800px;margin:0 auto;}
.tool-desc{opacity:.7;font-size:14px;margin-bottom:8px;}
.controls{display:flex;gap:12px;align-items:center;flex-wrap:wrap;margin:10px 0;}
.controls button,.controls select{padding:6px 14px;border-radius:6px;border:1px solid var(--border,#2a2f3a);background:var(--bg-alt,#1a1f2e);color:var(--text,#e0e0e0);cursor:pointer;font-size:14px;}
.controls label{font-size:13px;display:flex;align-items:center;gap:4px;}
.sequencer{display:grid;grid-template-columns:80px repeat(16,1fr);gap:2px;margin:10px 0;}
.sequencer .label{display:flex;align-items:center;font-size:12px;padding:0 6px;}
.step{height:32px;border:1px solid var(--border,#333);border-radius:3px;cursor:pointer;background:var(--bg-alt,#1a1f2e);}
.step.active{background:#1565c0;}
.step.beat{border-color:#555;}
.step.current{outline:2px solid #ff9800;outline-offset:-1px;}
input[type=range]{width:80px;}
</style>
</head>
<body>
<header id="site-header"></header>
<main>
<div class="tool-wrap">
<h1>Drum Machine</h1>
<p class="tool-desc">16-step beat sequencer with 6 drum sounds, adjustable tempo, and swing. All audio generated in-browser — no samples loaded.</p>
<div class="controls">
<button id="playBtn" onclick="togglePlay()">Play</button>
<button onclick="clearPattern()">Clear</button>
<label>BPM <input type="range" id="bpmSlider" min="60" max="200" value="120" oninput="setBpm(this.value)"><span id="bpmVal">120</span></label>
<label>Swing <input type="range" id="swingSlider" min="0" max="50" value="0" oninput="setSwing(this.value)"><span id="swingVal">0</span>%</label>
<label>Vol <input type="range" id="volSlider" min="0" max="100" value="50" oninput="setVol(this.value)"></label>
</div>
<div class="sequencer" id="seq"></div>
</div>
</main>
<script src="/assets/app.js"></script>
<script>
const TRACKS=['Kick','Snare','Hi-Hat','Open Hat','Clap','Tom'];
const STEPS=16;
let pattern=TRACKS.map(()=>Array(STEPS).fill(false));
let playing=false,currentStep=0,bpm=120,swing=0,vol=0.5,audioCtx,intervalId;

function init(){
const seq=document.getElementById('seq');
TRACKS.forEach((name,row)=>{
const lbl=document.createElement('div');lbl.className='label';lbl.textContent=name;seq.appendChild(lbl);
for(let col=0;col<STEPS;col++){
const s=document.createElement('div');s.className='step'+(col%4===0?' beat':'');
s.dataset.row=row;s.dataset.col=col;
s.onclick=()=>{pattern[row][col]=!pattern[row][col];s.classList.toggle('active');};
seq.appendChild(s);
}
});
}

function togglePlay(){
if(playing){playing=false;clearInterval(intervalId);document.getElementById('playBtn').textContent='Play';
document.querySelectorAll('.step.current').forEach(s=>s.classList.remove('current'));return;}
if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();
playing=true;currentStep=0;document.getElementById('playBtn').textContent='Stop';
const stepTime=60/bpm/4;
intervalId=setInterval(()=>{playStep();},stepTime*1000);
}

function playStep(){
document.querySelectorAll('.step.current').forEach(s=>s.classList.remove('current()));
document.querySelectorAll(`.step[data-col="${currentStep}"]`).forEach(s=>s.classList.add('current'));
pattern.forEach((track,row)=>{
if(track[currentStep])playDrum(row);
});
currentStep=(currentStep+1)%STEPS;
}

function playDrum(row){
const t=audioCtx.currentTime;
const swingOffset=currentStep%2===1?swing/100*60/bpm/8:0;
const tt=t+swingOffset;
if(row===0){const o=audioCtx.createOscillator(),g=audioCtx.createGain();o.frequency.setValueAtTime(150,tt);o.frequency.exponentialRampToValueAtTime(0.01,tt+0.3);g.gain.setValueAtTime(vol,tt);g.gain.exponentialRampToValueAtTime(0.001,tt+0.3);o.connect(g);g.connect(audioCtx.destination);o.start(tt);o.stop(tt+0.3);}
else if(row===1){const n=audioCtx.createBufferSource();const buf=audioCtx.createBuffer(1,audioCtx.sampleRate*0.2,audioCtx.sampleRate);const d=buf.getChannelData(0);for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*Math.pow(1-i/d.length,2);n.buffer=buf;const g=audioCtx.createGain();g.gain.setValueAtTime(vol*0.7,tt);g.gain.exponentialRampToValueAtTime(0.001,tt+0.2);const f=audioCtx.createBiquadFilter();f.type='bandpass';f.frequency.value=1000;n.connect(f);f.connect(g);g.connect(audioCtx.destination);n.start(tt);}
else if(row===2){const n=audioCtx.createBufferSource();const buf=audioCtx.createBuffer(1,audioCtx.sampleRate*0.05,audioCtx.sampleRate);const d=buf.getChannelData(0);for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*Math.pow(1-i/d.length,4);n.buffer=buf;const g=audioCtx.createGain();g.gain.setValueAtTime(vol*0.4,tt);g.gain.exponentialRampToValueAtTime(0.001,tt+0.05);const f=audioCtx.createBiquadFilter();f.type='highpass';f.frequency.value=7000;n.connect(f);f.connect(g);g.connect(audioCtx.destination);n.start(tt);}
else if(row===3){const n=audioCtx.createBufferSource();const buf=audioCtx.createBuffer(1,audioCtx.sampleRate*0.3,audioCtx.sampleRate);const d=buf.getChannelData(0);for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*Math.pow(1-i/d.length,1.5);n.buffer=buf;const g=audioCtx.createGain();g.gain.setValueAtTime(vol*0.4,tt);g.gain.exponentialRampToValueAtTime(0.001,tt+0.3);const f=audioCtx.createBiquadFilter();f.type='highpass';f.frequency.value=5000;n.connect(f);f.connect(g);g.connect(audioCtx.destination);n.start(tt);}
else if(row===4){const n=audioCtx.createBufferSource();const buf=audioCtx.createBuffer(1,audioCtx.sampleRate*0.1,audioCtx.sampleRate);const d=buf.getChannelData(0);for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*Math.pow(1-i/d.length,3);n.buffer=buf;const g=audioCtx.createGain();g.gain.setValueAtTime(vol*0.5,tt);g.gain.exponentialRampToValueAtTime(0.001,tt+0.1);const f=audioCtx.createBiquadFilter();f.type='bandpass';f.frequency.value=2000;f.Q.value=3;n.connect(f);f.connect(g);g.connect(audioCtx.destination);n.start(tt);}
else if(row===5){const o=audioCtx.createOscillator(),g=audioCtx.createGain();o.frequency.setValueAtTime(250,tt);o.frequency.exponentialRampToValueAtTime(100,tt+0.2);g.gain.setValueAtTime(vol*0.6,tt);g.gain.exponentialRampToValueAtTime(0.001,tt+0.2);o.connect(g);g.connect(audioCtx.destination);o.start(tt);o.stop(tt+0.2);}
}

function clearPattern(){pattern=TRACKS.map(()=>Array(STEPS).fill(false));document.querySelectorAll('.step.active').forEach(s=>s.classList.remove('active'));}
function setBpm(v){bpm=parseInt(v);document.getElementById('bpmVal').textContent=v;if(playing){clearInterval(intervalId);const stepTime=60/bpm/4;intervalId=setInterval(playStep,stepTime*1000);}}
function setSwing(v){swing=parseInt(v);document.getElementById('swingVal').textContent=v;}
function setVol(v){vol=v/100;}

VT.ready(init);
</script>
</body>
</html>
