<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CSS Masonry Layout Generator — virt.tools</title>
<link rel="stylesheet" href="/assets/style.css">
<style>
.tool-area{max-width:960px;margin:2rem auto;padding:0 1rem}
.controls{display:grid;gap:1rem;margin:1.5rem 0;padding:1.5rem;background:#1a1a2e;border-radius:12px}
.control-row{display:flex;gap:1rem;align-items:center;flex-wrap:wrap}
.control-row label{min-width:120px;font-weight:600;font-size:.9rem}
.control-row select,.control-row input[type="color"],.control-row input[type="range"]{padding:.5rem .75rem;border-radius:8px;border:1px solid #444;background:#0f0f1e;color:#eee;font-size:.9rem}
.preview-area{margin:2rem 0;padding:2rem;background:#0f0f1e;border-radius:12px}
.masonry-preview{column-count:3;column-gap:16px}
.masonry-item{break-inside:avoid;margin-bottom:16px;border-radius:8px;padding:1rem;background:#2a2a4e;color:#eee}
.css-output{margin:2rem 0}
.css-output textarea{width:100%;min-height:180px;font-family:monospace;font-size:.85rem;padding:1rem;border-radius:8px;border:1px solid #444;background:#0f0f1e;color:#eee;resize:vertical}
.copy-btn{padding:.6rem 1.2rem;border:none;border-radius:8px;background:#4a9eff;color:#fff;cursor:pointer;font-size:.9rem;margin-top:.5rem}
h2{margin-top:2rem;font-size:1.2rem}
</style>
</head>
<body>
<header id="site-header"></header>
<main>
<div class="tool-area">
<h1>🧱 CSS Masonry Layout Generator</h1>
<p>Create CSS masonry-style grid layouts using CSS columns. Perfect for Pinterest-style layouts.</p>
<div class="controls">
<div class="control-row">
<label>Columns</label><input type="range" id="cols" min="2" max="6" value="3"><span id="colsVal">3</span>
<label>Gap</label><input type="range" id="gap" min="8" max="32" value="16"><span id="gapVal">16px</span>
</div>
<div class="control-row">
<label>Item Bg</label><input type="color" id="itemBg" value="#2a2a4e">
<label>Radius</label><input type="range" id="radius" min="0" max="24" value="8"><span id="radiusVal">8px</span>
</div>
<div class="control-row">
<label>Responsive</label><select id="responsive"><option value="no">No</option><option value="yes">Yes (auto)</option></select>
<label>Items</label><input type="range" id="items" min="4" max="12" value="6"><span id="itemsVal">6</span>
</div>
</div>
<div class="preview-area" id="preview"></div>
<h2>CSS</h2><div class="css-output"><textarea id="cssOut" readonly></textarea><button class="copy-btn" onclick="copyText('cssOut')">Copy CSS</button></div>
<h2>HTML</h2><div class="css-output"><textarea id="htmlOut" readonly></textarea><button class="copy-btn" onclick="copyText('htmlOut')">Copy HTML</button></div>
</div>
</main>
<script src="/assets/app.js"></script>
<script>
function update(){
var cols=document.getElementById('cols').value;
var gap=document.getElementById('gap').value;
var itemBg=document.getElementById('itemBg').value;
var radius=document.getElementById('radius').value;
var resp=document.getElementById('responsive').value;
var items=document.getElementById('items').value;
document.getElementById('colsVal').textContent=cols;
document.getElementById('gapVal').textContent=gap+'px';
document.getElementById('radiusVal').textContent=radius+'px';
document.getElementById('itemsVal').textContent=items;
var css='.masonry{\n  column-count:'+cols+';\n  column-gap:'+gap+'px;\n}\n'+
(resp==='yes'?'.masonry{\n  column-count:'+cols+';\n}\n@media(max-width:992px){.masonry{column-count:'+Math.max(2,cols-1)+'}}\n@media(max-width:600px){.masonry{column-count:'+Math.max(1,cols-2)+'}}\n':'')+
'.masonry-item{\n  break-inside:avoid;\n  margin-bottom:'+gap+'px;\n  border-radius:'+radius+'px;\n  background:'+itemBg+';\n  padding:1rem;\n}';
document.getElementById('cssOut').value=css;
var heights=[80,120,60,160,100,140,90,110,70,130,95,150];
var html='<div class="masonry">\n';
for(var i=0;i<items;i++){html+='  <div class="masonry-item" style="min-height:'+heights[i]+'px">Item '+(i+1)+'</div>\n'}
html+='</div>';
document.getElementById('htmlOut').value=html;
// render preview
var p=document.getElementById('preview');
p.innerHTML='<div style="column-count:'+cols+';column-gap:'+gap+'px">';
for(var j=0;j<items;j++){
p.innerHTML+='<div style="break-inside:avoid;margin-bottom:'+gap+'px;border-radius:'+radius+'px;background:'+itemBg+';padding:1rem;min-height:'+heights[j]+'px;color:#eee">Item '+(j+1)+'</div>';
}
p.innerHTML+='</div>';
}
function copyText(id){var t=document.getElementById(id);t.select();document.execCommand('copy')}
document.querySelectorAll('select,input').forEach(function(e){e.addEventListener('input',update)});
update();
</script>
</body>
</html>
