<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CSS Stagger Card Reveal Generator — virt.tools</title>
<link rel="stylesheet" href="/assets/style.css">
<style>
.tool-area{max-width:800px;margin:2rem auto;padding:0 1rem}
.controls{display:grid;gap:.8rem;margin:1.5rem 0;padding:1.5rem;background:#1a1a2e;border-radius:12px}
.ctrl-row{display:flex;gap:1rem;align-items:center;flex-wrap:wrap}
.ctrl-row label{font-weight:600;font-size:.9rem;min-width:120px}
.ctrl-row select,.ctrl-row input{padding:.5rem;border-radius:8px;border:1px solid #444;background:#0f0f1e;color:#eee}
.preview-box{margin:1.5rem 0;padding:2rem;background:#f5f5f5;border-radius:12px;min-height:200px}
.output-block{margin:1.5rem 0}
.output-block textarea{width:100%;min-height:120px;font-family:monospace;font-size:.85rem;padding:1rem;border-radius:8px;border:1px solid #444;background:#0f0f1e;color:#eee;resize:vertical}
.copy-btn{padding:.6rem 1.2rem;border:none;border-radius:8px;background:#667eea;color:#fff;cursor:pointer;font-size:.9rem;margin-top:.5rem}
h2{margin-top:2rem;font-size:1.2rem}
.stagger-card{padding:1.5rem;background:#fff;border-radius:12px;box-shadow:0 2px 8px rgba(0,0,0,.1);margin-bottom:1rem}
.stagger-card h3{margin:0 0 .5rem;font-size:1.1rem}
.stagger-card p{margin:0;color:#666;font-size:.9rem}
</style>
</head>
<body>
<header id="site-header"></header>
<main>
<div class="tool-area">
<h1>🎴 CSS Stagger Card Reveal Generator</h1>
<p>Create CSS staggered card reveal animations on scroll. 4 directions, adjustable delay/count. Copy HTML+CSS+JS.</p>
<div class="controls">
<div class="ctrl-row"><label>Direction</label><select id="direction"><option value="up" selected>Up</option><option value="down">Down</option><option value="left">Left</option><option value="right">Right</option><option value="scale">Scale</option><option value="fade">Fade</option></select></div>
<div class="ctrl-row"><label>Card Count</label><select id="count"><option value="3">3</option><option value="4">4</option><option value="5" selected>5</option><option value="6">6</option></select></div>
<div class="ctrl-row"><label>Stagger Delay (ms)</label><input type="number" id="delay" value="100" min="20" max="500" step="10" style="width:80px"></div>
<div class="ctrl-row"><label>Duration (ms)</label><input type="number" id="duration" value="600" min="100" max="2000" step="50" style="width:80px"></div>
<div class="ctrl-row"><button class="copy-btn" onclick="update()">Update</button></div>
</div>
<h2>Preview (scroll to trigger)</h2>
<div class="preview-box" id="preview"></div>
<h2>CSS</h2><div class="output-block"><textarea id="cssOut" readonly></textarea><button class="copy-btn" onclick="copyText('cssOut')">Copy CSS</button></div>
<h2>HTML</h2><div class="output-block"><textarea id="htmlOut" readonly></textarea><button class="copy-btn" onclick="copyText('htmlOut')">Copy HTML</button></div>
<h2>JS</h2><div class="output-block"><textarea id="jsOut" readonly></textarea><button class="copy-btn" onclick="copyText('jsOut')">Copy JS</button></div>
</div>
</main>
<script src="/assets/app.js"></script>
<script>
function update(){
var dir=document.getElementById('direction').value;
var count=parseInt(document.getElementById('count').value);
var delay=parseInt(document.getElementById('delay').value);
var dur=parseInt(document.getElementById('duration').value);
var transforms={
up:'translateY(40px)',down:'translateY(-40px)',left:'translateX(40px)',
right:'translateX(-40px)',scale:'scale(.8)',fade:'none'
};
var t=transforms[dir];
var css='.stagger-card{opacity:0;transform:'+t+';transition:opacity '+dur+'ms ease,transform '+dur+'ms ease}\n.stagger-card.visible{opacity:1;transform:none}\n';
var html='';
for(var i=0;i<count;i++){
html+='<div class="stagger-card" style="transition-delay:'+(i*delay)+'ms">\n  <h3>Card '+(i+1)+'</h3>\n  <p>This is card number '+(i+1)+' with staggered reveal animation.</p>\n</div>\n';
}
var js='var observer=new IntersectionObserver(function(entries){entries.forEach(function(e){if(e.isIntersecting){e.target.classList.add("visible")}})},{threshold:.1});\ndocument.querySelectorAll(".stagger-card").forEach(function(c){observer.observe(c)});';
document.getElementById('cssOut').value=css;
document.getElementById('htmlOut').value=html;
document.getElementById('jsOut').value=js;
var preview='<style>'+css+'</style>';
for(var i=0;i<count;i++){
preview+='<div class="stagger-card" style="transition-delay:'+(i*delay)+'ms"><h3>Card '+(i+1)+'</h3><p>This is card number '+(i+1)+' with staggered reveal animation.</p></div>';
}
document.getElementById('preview').innerHTML=preview;
var observer=new IntersectionObserver(function(entries){entries.forEach(function(e){if(e.isIntersecting){e.target.classList.add("visible")}})},{threshold:.1});
document.querySelectorAll('#preview .stagger-card').forEach(function(c){observer.observe(c)});
}
function copyText(id){var t=document.getElementById(id);t.select();document.execCommand('copy')}
['direction','count','delay','duration'].forEach(function(id){var el=document.getElementById(id);el.addEventListener('input',update);el.addEventListener('change',update)});
update();
</script>
</body>
</html>
