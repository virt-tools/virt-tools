<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CSS Progress Steps / Wizard Generator — virt.tools</title>
<link rel="stylesheet" href="/assets/style.css">
<style>
.tool-area{max-width:900px;margin:2rem auto;padding:0 1rem}
.controls{display:grid;gap:1rem;margin:1.5rem 0;padding:1.5rem;background:#1a1a2e;border-radius:12px}
.control-row{display:flex;gap:1rem;align-items:center;flex-wrap:wrap}
.control-row label{min-width:120px;font-weight:600;font-size:.9rem}
.control-row select,.control-row input{padding:.5rem .75rem;border-radius:8px;border:1px solid #444;background:#0f0f1e;color:#eee;font-size:.9rem}
.preview-box{margin:1.5rem 0;border-radius:12px;min-height:120px;padding:2rem;background:#f5f5f5;display:flex;align-items:center;justify-content:center}
.output-block{margin:2rem 0}
.output-block textarea{width:100%;min-height:100px;font-family:monospace;font-size:.85rem;padding:1rem;border-radius:8px;border:1px solid #444;background:#0f0f1e;color:#eee;resize:vertical}
.copy-btn{padding:.6rem 1.2rem;border:none;border-radius:8px;background:#667eea;color:#fff;cursor:pointer;font-size:.9rem;margin-top:.5rem}
h2{margin-top:2rem;font-size:1.2rem}
</style>
</head>
<body>
<header id="site-header"></header>
<main>
<div class="tool-area">
<h1>🧙 CSS Progress Steps / Wizard Generator</h1>
<p>Create CSS multi-step progress / wizard form components. Adjustable steps, styles, themes. Copy HTML+CSS.</p>
<div class="controls">
<div class="control-row">
<label>Steps</label><select id="steps"><option value="3">3</option><option value="4" selected>4</option><option value="5">5</option><option value="6">6</option></select>
<label>Current Step</label><select id="current"><option value="1">1</option><option value="2" selected>2</option><option value="3">3</option><option value="4">4</option><option value="5">5</option><option value="6">6</option></select>
<label>Style</label><select id="style"><option value="circle" selected>Circle</option><option value="square">Square</option><option value="bar">Bar</option></select>
<label>Theme</label><select id="theme"><option value="blue" selected>Blue</option><option value="green">Green</option><option value="purple">Purple</option><option value="dark">Dark</option></select>
<label>Show Labels</label><select id="labels"><option value="yes" selected>Yes</option><option value="no">No</option></select>
</div>
</div>
<h2>Preview</h2>
<div class="preview-box" id="preview"></div>
<h2>HTML</h2><div class="output-block"><textarea id="htmlOut" readonly></textarea><button class="copy-btn" onclick="copyText('htmlOut')">Copy HTML</button></div>
<h2>CSS</h2><div class="output-block"><textarea id="cssOut" readonly></textarea><button class="copy-btn" onclick="copyText('cssOut')">Copy CSS</button></div>
</div>
</main>
<script src="/assets/app.js"></script>
<script>
var themes={blue:'#3b82f6',green:'#10b981',purple:'#8b5cf6',dark:'#1f2937'};
var stepLabels=['Account','Profile','Preferences','Payment','Review','Confirm'];
function update(){
var n=+document.getElementById('steps').value;var cur=+document.getElementById('current').value;
var style=document.getElementById('style').value;var theme=themes[document.getElementById('theme').value];
var showLabels=document.getElementById('labels').value==='yes';
var shape=style==='circle'?'50%':'4px';
var html='<div class="wizard-steps">\n';
for(var i=1;i<=n;i++){
var isDone=i<cur;var isActive=i===cur;
var bg=isDone?theme:isActive?theme+'33':'#e5e7eb';
var color=isDone||isActive?'#fff':'#9ca3af';
var border=isActive?'2px solid '+theme:'none';
html+='  <div class="step '+(isActive?'active':'')+' '+(isDone?'done':'')+'">\n';
html+='    <div class="step-num" style="width:36px;height:36px;border-radius:'+shape+';display:flex;align-items:center;justify-content:center;background:'+bg+';color:'+color+';border:'+border+';font-weight:700;font-size:.9rem">'+(isDone?'✓':i)+'</div>\n';
if(showLabels&&i<=stepLabels.length)html+='    <span class="step-label" style="font-size:.75rem;color:'+(isActive?theme:'#6b7280')+';font-weight:'+(isActive?'600':'400')+'">'+stepLabels[i-1]+'</span>\n';
html+='  </div>\n';
if(i<n)html+='  <div class="step-line" style="flex:1;height:'+(style==='bar'?'4px':'2px')+';background:'+(i<cur?theme:'#e5e7eb')+';border-radius:2px;margin:0 -8px;z-index:0"></div>\n';
}
html+='</div>';
var css='.wizard-steps{display:flex;align-items:center;gap:0}\n.step{display:flex;flex-direction:column;align-items:center;gap:6px;z-index:1}\n.step-label{white-space:nowrap}\n.step-num{transition:all .3s ease}\n.step.done .step-num{background:'+theme+'}\n.step.active .step-num{box-shadow:0 0 0 4px '+theme+'22}';
document.getElementById('htmlOut').value=html;
document.getElementById('cssOut').value=css;
document.getElementById('preview').innerHTML=html;
}
function copyText(id){var t=document.getElementById(id);t.select();document.execCommand('copy')}
['steps','current','style','theme','labels'].forEach(function(id){document.getElementById(id).addEventListener('change',update)});
update();
</script>
</body>
</html>
