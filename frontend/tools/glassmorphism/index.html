<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="/assets/theme-init.js"></script>
<title>Glassmorphism Generator — Virtual Tools</title>
<link rel="stylesheet" href="/assets/style.css">
<style>
.tool-wrap{max-width:720px;margin:0 auto;}
.tool-desc{font-size:14px;color:var(--text-secondary,#aaa);margin:8px 0 20px;}
.controls{display:grid;gap:8px;margin:12px 0;}
.row{display:flex;gap:8px;align-items:center;flex-wrap:wrap;}
.row label{font-size:13px;color:var(--text-secondary,#888);min-width:90px;}
.row input[type="number"]{width:70px;padding:6px;border-radius:6px;border:1px solid var(--border,#444);background:var(--card,#2a2f3e);color:var(--text,#eee);font-size:13px;}
.row input[type="color"]{width:40px;height:32px;border:none;border-radius:6px;cursor:pointer;background:none;}
.row input[type="range"]{flex:1;min-width:120px;}
.preview{background:linear-gradient(135deg,#667eea,#764ba2,#f093fb);border-radius:8px;padding:40px 20px;margin:12px 0;min-height:200px;display:flex;align-items:center;justify-content:center;}
.glass-card{padding:30px 40px;border-radius:16px;text-align:center;color:#fff;font-size:22px;font-weight:600;backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);background:rgba(255,255,255,0.2);border:1px solid rgba(255,255,255,0.3);box-shadow:0 8px 32px rgba(0,0,0,0.1);}
button.action{padding:8px 16px;border-radius:6px;border:1px solid var(--border,#444);background:var(--card,#2a2f3e);color:var(--text,#eee);cursor:pointer;font-size:13px;}
button.action:hover{border-color:var(--accent,#5b8def);}
.css-output{background:var(--bg,#1e2230);border:1px solid var(--border,#444);border-radius:8px;padding:12px;margin:12px 0;font-family:monospace;font-size:12px;color:var(--text,#eee);white-space:pre-wrap;word-break:break-all;}
.presets{display:flex;gap:6px;flex-wrap:wrap;margin:8px 0;}
.preset-btn{padding:4px 12px;border-radius:6px;border:1px solid var(--border,#444);background:var(--card,#2a2f3e);color:var(--text,#eee);cursor:pointer;font-size:12px;}
.preset-btn:hover{border-color:var(--accent,#5b8def);}
</style>
</head>
<body>
<header id="site-header"></header>
<main>
<div class="tool-wrap">
<h1>🪟 Glassmorphism Generator</h1>
<p class="tool-desc">Create CSS frosted glass effects with backdrop-blur, transparency, and borders. Copy CSS.</p>
<div class="presets">
<button class="preset-btn" onclick="preset('light')">Light</button>
<button class="preset-btn" onclick="preset('dark')">Dark</button>
<button class="preset-btn" onclick="preset('neon')">Neon</button>
<button class="preset-btn" onclick="preset('frost')">Frost</button>
<button class="preset-btn" onclick="preset('sunset')">Sunset</button>
</div>
<div class="controls">
<div class="row"><label>Blur:</label><input type="range" id="blur" min="0" max="50" value="10"><span id="blurVal">10px</span></div>
<div class="row"><label>Opacity:</label><input type="range" id="opacity" min="0" max="100" value="20"><span id="opacityVal">20%</span></div>
<div class="row"><label>Tint:</label><input type="color" id="tint" value="#ffffff"></div>
<div class="row"><label>Border:</label><input type="color" id="borderColor" value="#ffffff"><label>W:</label><input type="number" id="borderW" value="1" min="0" max="10"></div>
<div class="row"><label>Border opacity:</label><input type="range" id="borderOpacity" min="0" max="100" value="30"><span id="borderOpacityVal">30%</span></div>
<div class="row"><label>Radius:</label><input type="range" id="radius" min="0" max="50" value="16"><span id="radiusVal">16px</span></div>
<div class="row"><label>Shadow:</label><input type="range" id="shadow" min="0" max="50" value="10"><span id="shadowVal">10px</span></div>
</div>
<div class="controls"><button class="action" onclick="copyCSS()">Copy CSS</button></div>
<div class="preview"><div class="glass-card" id="glassCard">Glass Card</div></div>
<div class="css-output" id="cssOutput"></div>
</div>
</main>
<script src="/assets/app.js"></script>
<script>
const presets={light:{blur:10,opacity:20,tint:'#ffffff',bc:'#ffffff',bw:1,bo:30,radius:16,shadow:10},dark:{blur:15,opacity:10,tint:'#000000',bc:'#ffffff',bw:1,bo:20,radius:16,shadow:20},neon:{blur:20,opacity:15,tint:'#ff00ff',bc:'#ff00ff',bw:2,bo:40,radius:20,shadow:15},frost:{blur:25,opacity:30,tint:'#e0f0ff',bc:'#ffffff',bw:1,bo:50,radius:24,shadow:5},sunset:{blur:12,opacity:25,tint:'#ff6b6b',bc:'#ffa500',bw:1,bo:35,radius:16,shadow:15}};
function preset(name){const p=presets[name];document.getElementById('blur').value=p.blur;document.getElementById('opacity').value=p.opacity;document.getElementById('tint').value=p.tint;document.getElementById('borderColor').value=p.bc;document.getElementById('borderW').value=p.bw;document.getElementById('borderOpacity').value=p.bo;document.getElementById('radius').value=p.radius;document.getElementById('shadow').value=p.shadow;update();}
function hexToRgb(h){h=h.replace('#','');return parseInt(h.substr(0,2),16)+','+parseInt(h.substr(2,2),16)+','+parseInt(h.substr(4,2),16);}
function update(){
const blur=document.getElementById('blur').value;
const opacity=document.getElementById('opacity').value;
const tint=document.getElementById('tint').value;
const bc=document.getElementById('borderColor').value;
const bw=document.getElementById('borderW').value;
const bo=document.getElementById('borderOpacity').value;
const radius=document.getElementById('radius').value;
const shadow=document.getElementById('shadow').value;
document.getElementById('blurVal').textContent=blur+'px';
document.getElementById('opacityVal').textContent=opacity+'%';
document.getElementById('borderOpacityVal').textContent=bo+'%';
document.getElementById('radiusVal').textContent=radius+'px';
document.getElementById('shadowVal').textContent=shadow+'px';
const card=document.getElementById('glassCard');
card.style.backdropFilter=`blur(${blur}px)`;
card.style.webkitBackdropFilter=`blur(${blur}px)`;
card.style.background=`rgba(${hexToRgb(tint)},${opacity/100})`;
card.style.border=`${bw}px solid rgba(${hexToRgb(bc)},${bo/100})`;
card.style.borderRadius=radius+'px';
card.style.boxShadow=`0 ${shadow}px ${shadow*3}px rgba(0,0,0,0.1)`;
const css=`backdrop-filter: blur(${blur}px);\n-webkit-backdrop-filter: blur(${blur}px);\nbackground: rgba(${hexToRgb(tint)},${opacity/100});\nborder: ${bw}px solid rgba(${hexToRgb(bc)},${bo/100});\nborder-radius: ${radius}px;\nbox-shadow: 0 ${shadow}px ${shadow*3}px rgba(0,0,0,0.1);`;
document.getElementById('cssOutput').textContent=css;
}
function copyCSS(){const css=document.getElementById('cssOutput').textContent;navigator.clipboard.writeText(css).then(()=>alert('CSS copied!')).catch(()=>alert('Copy failed'));}
['blur','opacity','tint','borderColor','borderW','borderOpacity','radius','shadow'].forEach(id=>{const el=document.getElementById(id);if(el)el.addEventListener('input',update);});
update();
</script>
</body>
</html>
