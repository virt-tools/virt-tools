<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="/assets/theme-init.js"></script>
<title>Killer Sudoku — Virtual Tools</title>
<link rel="stylesheet" href="/assets/style.css">
<style>
.tool-wrap{max-width:540px;margin:0 auto;text-align:center;}
#grid{display:grid;grid-template-columns:repeat(9,1fr);gap:1px;background:var(--border,#444);border:3px solid var(--border,#444);width:450px;margin:12px auto;aspect-ratio:1;}
.cell{background:var(--bg-alt,#1a1f2e);color:var(--text,#eee);display:flex;align-items:center;justify-content:center;font-size:20px;cursor:pointer;position:relative;}
.cell:hover{background:rgba(91,141,239,.2);}
.cell.selected{background:rgba(91,141,239,.4);}
.cell.box-border-r{border-right:2px solid var(--border,#444);}
.cell.box-border-b{border-bottom:2px solid var(--border,#444);}
.cell .cage-sum{position:absolute;top:1px;left:2px;font-size:9px;color:var(--accent,#5b8def);font-weight:700;line-height:1;}
.cell .cage-br{position:absolute;bottom:0;right:0;width:0;height:0;border-style:solid;border-width:0 0 6px 6px;border-color:transparent transparent var(--border,#444) transparent;}
.cell .cage-bl{position:absolute;bottom:0;left:0;width:0;height:0;border-style:solid;border-width:0 6px 6px 0;border-color:transparent var(--border,#444) transparent transparent;}
.cell .cage-tr{position:absolute;top:0;right:0;width:0;height:0;border-style:solid;border-width:6px 0 0 6px;border-color:transparent transparent transparent var(--border,#444);}
.cell .cage-tl{position:absolute;top:0;left:0;width:0;height:0;border-style:solid;border-width:6px 6px 0 0;border-color:var(--border,#444) transparent transparent transparent;}
.cell.fixed{color:var(--accent,#5b8def);font-weight:700;}
.cell.error{color:#e74c3c;}
.controls{margin:12px 0;display:flex;gap:8px;justify-content:center;flex-wrap:wrap;}
.controls button{padding:8px 16px;border-radius:6px;border:1px solid var(--border,#444);background:var(--bg-alt,#1a1f2e);color:var(--text,#eee);cursor:pointer;font-size:14px;}
.controls button:hover{background:var(--accent,#5b8def);color:#fff;}
.numpad{margin:8px 0;display:flex;gap:4px;justify-content:center;flex-wrap:wrap;}
.numpad button{width:40px;height:40px;border-radius:6px;border:1px solid var(--border,#444);background:var(--bg-alt,#1a1f2e);color:var(--text,#eee);cursor:pointer;font-size:18px;font-weight:700;}
.numpad button:hover{background:var(--accent,#5b8def);color:#fff;}
.info{font-size:13px;color:var(--text-secondary,#aaa);margin:8px 0;}
#msg{font-size:15px;font-weight:600;margin:8px 0;min-height:24px;color:#f1c40f;}
.stats{font-size:14px;margin:8px 0;color:var(--text-secondary,#aaa);}
.stats span{color:var(--accent,#5b8def);font-weight:700;}
.tool-desc{font-size:14px;color:var(--text-secondary,#aaa);}
</style>
</head>
<body>
<header id="site-header"></header>
<main>
<div class="tool-wrap">
<h1>Killer Sudoku 🔢</h1>
<p class="tool-desc">Sudoku with cage sum targets. Fill 1-9 per row, column, and 3×3 box — digits in each cage must sum to the target with no repeats.</p>
<div class="stats">Puzzle: <span id="puz-name">Easy</span> | Errors: <span id="errors">0</span> | <span id="timer">0:00</span></div>
<div id="grid"></div>
<div id="msg"></div>
<div class="numpad" id="numpad"></div>
<div class="controls">
<button onclick="checkPuzzle()">✓ Check</button>
<button onclick="solvePuzzle()">💡 Solve</button>
<button onclick="newPuzzle()">🔄 New</button>
<button onclick="eraseCell()">⌫ Erase</button>
</div>
<p class="info">Click a cell, then type 1-9 or use the number pad. Click a cage to see its sum.</p>
</div>
</main>
<script src="/assets/app.js"></script>
<script>
let solution=[],given=[],cages=[],cageMap={},sel=null,errors=0,startTime=0,timerInt=null;
const PUZZLES=[
{name:'Easy',grid:'534678912672195348198342567859761423426853791713924856961537284287419635345286179',cages:[{sum:3,cells:[[0,0],[0,1]]},{sum:10,cells:[[0,2],[1,2]]},{sum:12,cells:[[0,3],[0,4],[0,5]]},{sum:7,cells:[[0,6],[1,6]]},{sum:15,cells:[[0,7],[0,8],[1,8]]},{sum:14,cells:[[1,0],[2,0]]},{sum:13,cells:[[1,1],[2,1],[2,2]]},{sum:9,cells:[[1,3],[1,4]]},{sum:11,cells:[[1,5],[2,5]]},{sum:8,cells:[[1,7],[2,7]]},{sum:16,cells:[[2,3],[2,4],[3,4]]},{sum:10,cells:[[2,6],[3,6]]},{sum:5,cells:[[2,8],[3,8]]},{sum:18,cells:[[3,0],[3,1],[4,1]]},{sum:11,cells:[[3,2],[4,2]]},{sum:13,cells:[[3,3],[4,3]]},{sum:14,cells:[[3,5],[4,5]]},{sum:12,cells:[[3,7],[4,7]]},{sum:9,cells:[[4,0],[5,0]]},{sum:15,cells:[[4,4],[5,4]]},{sum:11,cells:[[4,6],[5,6]]},{sum:8,cells:[[4,8],[5,8]]},{sum:17,cells:[[5,1],[5,2],[6,2]]},{sum:10,cells:[[5,3],[6,3]]},{sum:6,cells:[[5,5],[6,5]]},{sum:13,cells:[[5,7],[6,7]]},{sum:14,cells:[[6,0],[7,0]]},{sum:12,cells:[[6,1],[7,1]]},{sum:16,cells:[[6,4],[7,4]]},{sum:11,cells:[[6,6],[7,6]]},{sum:9,cells:[[6,8],[7,8]]},{sum:10,cells:[[7,2],[8,2]]},{sum:13,cells:[[7,3],[8,3]]},{sum:8,cells:[[7,5],[8,5]]},{sum:12,cells:[[7,7],[8,7]]},{sum:15,cells:[[8,0],[8,1]]},{sum:14,cells:[[8,4],[8,6]]},{sum:11,cells:[[8,8],[7,8]]}]},
];
function idx(r,c){return r*9+c;}
function loadPuzzle(p){
solution=p.grid.split('').map(Number);given=new Array(81).fill(false);
for(let i=0;i<81;i++)if(solution[i]!==0&&Math.random()<0.35)given[i]=true;
cages=p.cages;cageMap={};cages.forEach((c,ci)=>c.cells.forEach(([r,cl])=>cageMap[idx(r,cl)]=ci));
errors=0;startTime=Date.now();if(timerInt)clearInterval(timerInt);timerInt=setInterval(updateTimer,1000);
document.getElementById('puz-name').textContent=p.name;document.getElementById('errors').textContent=0;
render();
}
function render(){
const g=document.getElementById('grid');g.innerHTML='';
for(let r=0;r<9;r++)for(let c=0;c<9;c++){
const i=idx(r,c);const cell=document.createElement('div');cell.className='cell';
if(c===2||c===5)cell.classList.add('box-border-r');if(r===2||r===5)cell.classList.add('box-border-b');
if(sel===i)cell.classList.add('selected');if(given[i])cell.classList.add('fixed');
const v=given[i]?solution[i]:(window['c'+i]||'');
cell.textContent=v||'';
if(cageMap[i]!==undefined){const cage=cages[cageMap[i]];const isTopLeft=cage.cells[0][0]===r&&cage.cells[0][1]===c;if(isTopLeft){const s=document.createElement('span');s.className='cage-sum';s.textContent=cage.sum;cell.appendChild(s);}}
cell.onclick=()=>{sel=i;render();};g.appendChild(cell);
}}
function updateTimer(){const e=Math.floor((Date.now()-startTime)/1000);const m=Math.floor(e/60);const s=e%60;document.getElementById('timer').textContent=m+':'+String(s).padStart(2,'0');}
function setNum(n){
if(sel===null)return;if(given[sel])return;
const cell=document.querySelectorAll('.cell')[sel];
if(window['c'+sel]===n){delete window['c'+sel];}else{window['c'+sel]=n;}
if(!given[sel]&&window['c'+sel]&&window['c'+sel]!==solution[sel]){errors++;document.getElementById('errors').textContent=errors;}
render();
}
function eraseCell(){if(sel===null||given[sel])return;delete window['c'+sel];render();}
function checkPuzzle(){let ok=true;for(let i=0;i<81;i++){const v=given[i]?solution[i]:(window['c'+i]||0);if(v!==solution[i]){ok=false;break;}}document.getElementById('msg').textContent=ok?'🎉 Solved correctly!':'Not yet — keep trying.';}
function solvePuzzle(){for(let i=0;i<81;i++)window['c'+i]=solution[i];render();document.getElementById('msg').textContent='Puzzle revealed.';}
function newPuzzle(){loadPuzzle(PUZZLES[0]);}
function buildNumpad(){const np=document.getElementById('numpad');for(let n=1;n<=9;n++){const b=document.createElement('button');b.textContent=n;b.onclick=()=>setNum(n);np.appendChild(b);}}
document.addEventListener('keydown',e=>{if(sel===null)return;if(e.key>='1'&&e.key<='9')setNum(parseInt(e.key));if(e.key==='Backspace'||e.key==='Delete'||e.key==='0')eraseCell();if(e.key==='ArrowUp'&&sel>=9){sel-=9;render();}if(e.key==='ArrowDown'&&sel<72){sel+=9;render();}if(e.key==='ArrowLeft'&&sel%9>0){sel--;render();}if(e.key==='ArrowRight'&&sel%9<8){sel++;render();}});
buildNumpad();newPuzzle();
</script>
</body>
</html>
