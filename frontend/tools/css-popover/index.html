<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CSS Popover Generator — virt.tools</title>
<link rel="stylesheet" href="/assets/style.css">
<style>
.tool-area{max-width:900px;margin:2rem auto;padding:0 1rem}
.controls{display:grid;gap:1rem;margin:1.5rem 0;padding:1.5rem;background:#1a1a2e;border-radius:12px}
.control-row{display:flex;gap:1rem;align-items:center;flex-wrap:wrap}
.control-row label{min-width:130px;font-weight:600;font-size:.9rem}
.control-row select,.control-row input{padding:.5rem .75rem;border-radius:8px;border:1px solid #444;background:#0f0f1e;color:#eee;font-size:.9rem}
.preview-box{margin:1.5rem 0;border-radius:12px;background:#2a2a3e;padding:3rem 1.5rem;min-height:250px;display:flex;align-items:center;justify-content:center;position:relative}
.output-block{margin:2rem 0}
.output-block textarea{width:100%;min-height:120px;font-family:monospace;font-size:.85rem;padding:1rem;border-radius:8px;border:1px solid #444;background:#0f0f1e;color:#eee;resize:vertical}
.copy-btn{padding:.6rem 1.2rem;border:none;border-radius:8px;background:#667eea;color:#fff;cursor:pointer;font-size:.9rem;margin-top:.5rem}
h2{margin-top:2rem;font-size:1.2rem}
</style>
</head>
<body>
<header id="site-header"></header>
<main>
<div class="tool-area">
<h1>💭 CSS Popover Generator</h1>
<p>Create CSS popover components with 4 positions, 3 themes, custom content. Hover to reveal. Copy HTML+CSS.</p>
<div class="controls">
<div class="control-row">
<label>Position</label><select id="pos"><option value="top" selected>Top</option><option value="bottom">Bottom</option><option value="left">Left</option><option value="right">Right</option></select>
<label>Theme</label><select id="theme"><option value="dark" selected>Dark</option><option value="light">Light</option><option value="glass">Glass</option></select>
</div>
<div class="control-row">
<label>Width</label><select id="width"><option value="160">160px</option><option value="220" selected>220px</option><option value="280">280px</option></select>
<label>Accent</label><input type="color" id="accent" value="#667eea">
<label>Radius</label><select id="radius"><option value="0">0</option><option value="8" selected>8px</option><option value="16">16px</option></select>
</div>
</div>
<h2>Preview (hover the button)</h2>
<div class="preview-box" id="preview"></div>
<h2>HTML</h2><div class="output-block"><textarea id="htmlOut" readonly></textarea><button class="copy-btn" onclick="copyText('htmlOut')">Copy HTML</button></div>
<h2>CSS</h2><div class="output-block"><textarea id="cssOut" readonly></textarea><button class="copy-btn" onclick="copyText('cssOut')">Copy CSS</button></div>
</div>
</main>
</main>
<script src="/assets/app.js"></script>
<script>
function update(){
var pos=document.getElementById('pos').value;
var theme=document.getElementById('theme').value;
var w=document.getElementById('width').value;
var ac=document.getElementById('accent').value;
var r=document.getElementById('radius').value;
var isLight=theme==='light';
var isGlass=theme==='glass';
var bg=isGlass?'rgba(26,26,46,.9)':isLight?'#fff':'#1a1a2e';
var textC=isLight?'#333':'#e0e0e0';
var borderC=isLight?'#ddd':isGlass?'rgba(255,255,255,.1)':'#333';
var arrowMap={top:'bottom',bottom:'top',left:'right',right:'left'};
var opp=arrowMap[pos];
var posCSS='';
if(pos==='top'){posCSS='bottom:120%;left:50%;transform:translateX(-50%)'}
else if(pos==='bottom'){posCSS='top:120%;left:50%;transform:translateX(-50%)'}
else if(pos==='left'){posCSS='right:120%;top:50%;transform:translateY(-50%)'}
else{posCSS='left:120%;top:50%;transform:translateY(-50%)'}
var arrowCSS='';
if(pos==='top'){arrowCSS='top:100%;left:50%;transform:translateX(-50%) rotate(45deg)'}
else if(pos==='bottom'){arrowCSS='bottom:100%;left:50%;transform:translateX(-50%) rotate(45deg)'}
else if(pos==='left'){arrowCSS='left:100%;top:50%;transform:translateY(-50%) rotate(45deg)'}
else{arrowCSS='right:100%;top:50%;transform:translateY(-50%) rotate(45deg)'}
var html='<div class="popover-wrap">\n  <button class="pop-trigger">Hover me</button>\n  <div class="popover">\n    <div class="popover-title">📋 Info</div>\n    <div class="popover-body">This is a popover with rich content. You can add text, links, and more.</div>\n    <div class="popover-arrow"></div>\n  </div>\n</div>';
var css='.popover-wrap{position:relative;display:inline-block}\n.pop-trigger{padding:.6rem 1.2rem;border:none;border-radius:8px;background:'+ac+';color:#fff;cursor:pointer;font-size:.9rem;font-family:system-ui,sans-serif}\n.popover{position:absolute;'+posCSS+';width:'+w+'px;background:'+bg+';border:1px solid '+borderC+';border-radius:'+r+'px;padding:.75rem 1rem;box-shadow:0 8px 30px rgba(0,0,0,.3);opacity:0;visibility:hidden;transition:opacity .2s,visibility .2s;backdrop-filter:'+(isGlass?'blur(12px)':'none')+';z-index:10}\n.popover-wrap:hover .popover{opacity:1;visibility:visible}\n.popover-title{font-weight:700;font-size:.85rem;color:'+ac+';margin-bottom:.35rem}\n.popover-body{font-size:.8rem;color:'+textC+';line-height:1.5}\n.popover-arrow{position:absolute;'+arrowCSS+';width:10px;height:10px;background:'+bg+';border-'+opp+':1px solid '+borderC+'}';
document.getElementById('htmlOut').value=html;
document.getElementById('cssOut').value=css;
var p=document.getElementById('preview');
p.innerHTML='<style>'+css+'</style>'+html;
}
function copyText(id){var t=document.getElementById(id);t.select();document.execCommand('copy')}
document.querySelectorAll('select,input').forEach(function(e){e.addEventListener('input',update);e.addEventListener('change',update)});
update();
</script>
</body>
</html>
