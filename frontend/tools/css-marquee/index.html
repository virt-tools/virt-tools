<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CSS Marquee Generator — virt.tools</title>
<link rel="stylesheet" href="/assets/style.css">
<style>
.tool-area{max-width:960px;margin:2rem auto;padding:0 1rem}
.controls{display:grid;gap:1rem;margin:1.5rem 0;padding:1.5rem;background:#1a1a2e;border-radius:12px}
.control-row{display:flex;gap:1rem;align-items:center;flex-wrap:wrap}
.control-row label{min-width:120px;font-weight:600;font-size:.9rem}
.control-row select,.control-row input[type="color"],.control-row input[type="range"],.control-row input[type="text"]{padding:.5rem .75rem;border-radius:8px;border:1px solid #444;background:#0f0f1e;color:#eee;font-size:.9rem}
.preview-box{margin:1.5rem 0;padding:2rem;background:#0f0f1e;border-radius:12px;overflow:hidden}
.output-block{margin:2rem 0}
.output-block textarea{width:100%;min-height:200px;font-family:monospace;font-size:.85rem;padding:1rem;border-radius:8px;border:1px solid #444;background:#0f0f1e;color:#eee;resize:vertical}
.copy-btn{padding:.6rem 1.2rem;border:none;border-radius:8px;background:#4a9eff;color:#fff;cursor:pointer;font-size:.9rem;margin-top:.5rem}
h2{margin-top:2rem;font-size:1.2rem}
</style>
</head>
<body>
<header id="site-header"></header>
<main>
<div class="tool-area">
<h1>📢 CSS Marquee Generator</h1>
<p>Create CSS marquee/ticker scrolling text effects with configurable direction, speed, and pause-on-hover.</p>
<div class="controls">
<div class="control-row">
<label>Text</label><input type="text" id="text" value="Breaking News • virt.tools • No telemetry • 1000 tools • Privacy first •">
<label>Direction</label><select id="dir"><option value="left">Left</option><option value="right">Right</option><option value="up">Up</option><option value="down">Down</option></select>
<label>Speed</label><input type="range" id="speed" min="5" max="60" value="20"><span id="speedVal">20s</span>
</div>
<div class="control-row">
<label>Text Color</label><input type="color" id="textColor" value="#ffffff">
<label>Bg Color</label><input type="color" id="bgColor" value="#1a1a2e">
<label>Font Size</label><input type="range" id="fontSize" min="10" max="48" value="18"><span id="fontSizeVal">18px</span>
</div>
<div class="control-row">
<label>Pause Hover</label><select id="pauseHover"><option value="yes">Yes</option><option value="no">No</option></select>
<label>Duplicate</label><select id="duplicate"><option value="yes">Yes (seamless)</option><option value="no">No</option></select>
</div>
</div>
<h2>Preview</h2>
<div class="preview-box" id="preview"></div>
<h2>CSS</h2><div class="output-block"><textarea id="cssOut" readonly></textarea><button class="copy-btn" onclick="copyText('cssOut')">Copy CSS</button></div>
<h2>HTML</h2><div class="output-block"><textarea id="htmlOut" readonly></textarea><button class="copy-btn" onclick="copyText('htmlOut')">Copy HTML</button></div>
</div>
</main>
<script src="/assets/app.js"></script>
<script>
function update(){
var text=document.getElementById('text').value;
var dir=document.getElementById('dir').value;
var speed=document.getElementById('speed').value;
var textColor=document.getElementById('textColor').value;
var bgColor=document.getElementById('bgColor').value;
var fontSize=document.getElementById('fontSize').value;
var pauseHover=document.getElementById('pauseHover').value;
var duplicate=document.getElementById('duplicate').value;
document.getElementById('speedVal').textContent=speed+'s';
document.getElementById('fontSizeVal').textContent=fontSize+'px';
var preview=document.getElementById('preview');
preview.style.background=bgColor;
var keyframeName='marquee-'+dir;
var axis=dir==='left'||dir==='right'?'translateX':'translateY';
var start=dir==='left'||dir==='up'?'0%':'-50%';
var end=dir==='left'||dir==='up'?'-50%':'0%';
if(dir==='right'){start='-50%';end='0%'}
if(dir==='down'){start='-50%';end='0%'}
var animName='marqueeScroll';
var innerText=duplicate==='yes'?text+' '+text:text;
var html='<style>@keyframes '+animName+'{from{transform:'+axis+'('+start+')}to{transform:'+axis+'('+end+')}}</style>';
html+='<div style="overflow:hidden;white-space:nowrap;'+(dir==='up'||dir==='down'?'height:200px;':'')+'">';
html+='<div style="display:inline-block;animation:'+animName+' '+speed+'s linear infinite;'+(pauseHover==='yes'?'':'.marquee-inner:hover{animation-play-state:paused}')+'color:'+textColor+';font-size:'+fontSize+'px;padding:0.5rem 0" class="marquee-inner">'+escapeHtml(innerText)+'</div>';
html+='</div>';
preview.innerHTML=html;
var cssText='@keyframes '+animName+' {\n  from { transform: '+axis+'('+start+'); }\n  to { transform: '+axis+'('+end+'); }\n}\n\n';
cssText+='.marquee-container {\n  overflow: hidden;\n  background: '+bgColor+';\n  '+(dir==='up'||dir==='down'?'height: 200px;\n':'')+'\n}\n\n';
cssText+='.marquee-inner {\n  display: inline-block;\n  white-space: nowrap;\n  animation: '+animName+' '+speed+'s linear infinite;\n  color: '+textColor+';\n  font-size: '+fontSize+'px;\n  padding: 0.5rem 0;\n}\n';
if(pauseHover==='yes')cssText+='\n.marquee-container:hover .marquee-inner {\n  animation-play-state: paused;\n}\n';
document.getElementById('cssOut').value=cssText;
var htmlOut='<div class="marquee-container">\n  <div class="marquee-inner">'+escapeHtml(innerText)+'</div>\n</div>';
document.getElementById('htmlOut').value=htmlOut;
}
function escapeHtml(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function copyText(id){var t=document.getElementById(id);t.select();document.execCommand('copy')}
document.querySelectorAll('select,input').forEach(function(e){e.addEventListener('input',update)});
update();
</script>
</body>
</html>
