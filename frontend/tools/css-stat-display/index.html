<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CSS Stat Display Generator — virt.tools</title>
<link rel="stylesheet" href="/assets/style.css">
<style>
.tool-area{max-width:900px;margin:2rem auto;padding:0 1rem}
.controls{display:grid;gap:1rem;margin:1.5rem 0;padding:1.5rem;background:#1a1a2e;border-radius:12px}
.ctrl-row{display:flex;gap:1rem;align-items:center;flex-wrap:wrap;margin-bottom:.5rem}
.ctrl-row label{font-weight:600;font-size:.9rem;min-width:120px}
.ctrl-row select,.ctrl-row input{padding:.5rem;border-radius:8px;border:1px solid #444;background:#0f0f1e;color:#eee}
.preview-box{margin:1.5rem 0;border-radius:12px;min-height:200px;padding:2rem;background:#f5f5f5;display:flex;align-items:center;justify-content:center;gap:2rem;flex-wrap:wrap}
.output-block{margin:2rem 0}
.output-block textarea{width:100%;min-height:100px;font-family:monospace;font-size:.85rem;padding:1rem;border-radius:8px;border:1px solid #444;background:#0f0f1e;color:#eee;resize:vertical}
.copy-btn{padding:.6rem 1.2rem;border:none;border-radius:8px;background:#667eea;color:#fff;cursor:pointer;font-size:.9rem;margin-top:.5rem}
h2{margin-top:2rem;font-size:1.2rem}
</style>
</head>
<body>
<header id="site-header"></header>
<main>
<div class="tool-area">
<h1>📈 CSS Stat Display Generator</h1>
<p>Create CSS stat/metric display components with icons. 4 styles, 3 themes, 3-6 stats. Copy HTML+CSS.</p>
<div class="controls">
<div class="ctrl-row">
<label>Style</label><select id="style"><option value="card" selected>Card</option><option value="minimal">Minimal</option><option value="outline">Outline</option><option value="glass">Glass</option></select>
<label>Theme</label><select id="theme"><option value="light" selected>Light</option><option value="dark">Dark</option><option value="colorful">Colorful</option></select>
<label>Count</label><select id="count"><option value="3" selected>3</option><option value="4">4</option><option value="5">5</option><option value="6">6</option></select>
<label>Columns</label><select id="cols"><option value="3" selected>3</option><option value="4">4</option><option value="2">2</option></select>
</div>
<div class="ctrl-row">
<label>Accent Color</label><input type="color" id="accent" value="#667eea" style="width:50px;height:36px">
<button class="copy-btn" onclick="update()">Update</button>
</div>
</div>
<h2>Preview</h2>
<div class="preview-box" id="preview"></div>
<h2>HTML</h2><div class="output-block"><textarea id="htmlOut" readonly></textarea><button class="copy-btn" onclick="copyText('htmlOut')">Copy HTML</button></div>
<h2>CSS</h2><div class="output-block"><textarea id="cssOut" readonly></textarea><button class="copy-btn" onclick="copyText('cssOut')">Copy CSS</button></div>
</div>
</main>
<script src="/assets/app.js"></script>
<script>
var ICONS=['👥','⭐','💰','🚀','📦','📈'];
var LABELS=['Users','Reviews','Revenue','Growth','Orders','Visits'];
var VALUES=['12.5K','4.9/5','$45K','+180%','3.2K','89K'];
function update(){
var style=document.getElementById('style').value;var theme=document.getElementById('theme').value;
var count=+document.getElementById('count').value;var cols=+document.getElementById('cols').value;
var accent=document.getElementById('accent').value;
var bg=theme==='dark'?'#1a1a2e':theme==='colorful'?'transparent':'#fff';
var fg=theme==='dark'?'#fff':'#1a1a2e';
var sub=theme==='dark'?'#888':'#666';
var borderCol=theme==='dark'?'#333':'#e0e0e0';
var glassStyle=style==='glass'?'background:rgba(255,255,255,.08);backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,.15);':'';
var cardBg=style==='card'?(theme==='dark'?'#252540':'#f8f8f8'):style==='outline'?'transparent':style==='glass'?'transparent':(theme==='dark'?'#252540':'#f8f8f8');
var html='<div class="stat-grid">\n';
for(var i=0;i<count;i++){
html+='  <div class="stat-item">\n    <div class="stat-icon">'+ICONS[i]+'</div>\n    <div class="stat-value">'+VALUES[i]+'</div>\n    <div class="stat-label">'+LABELS[i]+'</div>\n  </div>\n';
}
html+='</div>';
var css='.stat-grid{display:grid;grid-template-columns:repeat('+cols+',1fr);gap:1rem;font-family:system-ui,sans-serif}\n'+
'.stat-item{text-align:center;padding:1.5rem 1rem;border-radius:12px;background:'+cardBg+';'+glassStyle+'border:1px solid '+borderCol+';transition:transform .2s}\n'+
'.stat-item:hover{transform:translateY(-4px)}\n'+
'.stat-icon{font-size:2rem;margin-bottom:.5rem}\n'+
'.stat-value{font-size:1.8rem;font-weight:800;color:'+(theme==='colorful'?accent:fg)+'}\n'+
'.stat-label{font-size:.85rem;color:'+sub+';margin-top:.25rem}';
document.getElementById('htmlOut').value=html;
document.getElementById('cssOut').value=css;
renderPreview();
}
function renderPreview(){
var style=document.getElementById('style').value;var theme=document.getElementById('theme').value;
var count=+document.getElementById('count').value;var cols=+document.getElementById('cols').value;
var accent=document.getElementById('accent').value;
var bg=theme==='dark'?'#1a1a2e':theme==='colorful'?'transparent':'#fff';
var fg=theme==='dark'?'#fff':'#1a1a2e';var sub=theme==='dark'?'#888':'#666';
var borderCol=theme==='dark'?'#333':'#e0e0e0';
var glassStyle=style==='glass'?'background:rgba(255,255,255,.08);backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,.15);':'';
var cardBg=style==='card'?(theme==='dark'?'#252540':'#f8f8f8'):style==='outline'?'transparent':style==='glass'?'transparent':(theme==='dark'?'#252540':'#f8f8f8');
var p=document.getElementById('preview');
p.style.background=bg||'transparent';
var h='<div style="display:grid;grid-template-columns:repeat('+cols+',1fr);gap:1rem;font-family:system-ui,sans-serif;width:100%">';
for(var i=0;i<count;i++){
h+='<div style="text-align:center;padding:1.5rem 1rem;border-radius:12px;background:'+cardBg+';'+glassStyle+'border:1px solid '+borderCol+'">'+
'<div style="font-size:2rem;margin-bottom:.5rem">'+ICONS[i]+'</div>'+
'<div style="font-size:1.8rem;font-weight:800;color:'+(theme==='colorful'?accent:fg)+'">'+VALUES[i]+'</div>'+
'<div style="font-size:.85rem;color:'+sub+';margin-top:.25rem">'+LABELS[i]+'</div></div>';
}
h+='</div>';p.innerHTML=h;
}
function copyText(id){var t=document.getElementById(id);t.select();document.execCommand('copy')}
['style','theme','count','cols'].forEach(function(id){document.getElementById(id).addEventListener('change',update)});
document.getElementById('accent').addEventListener('input',update);
update();
</script>
</body>
</html>
