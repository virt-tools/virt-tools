<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <script src="/assets/theme-init.js"></script>
  <title>CSS Named Color Explorer — Virtual Tools</title>
  <link rel="stylesheet" href="/assets/style.css">
  <style>
    .row { display:flex; gap:10px; flex-wrap:wrap; align-items:center; margin:10px 0; }
    label { font-size:13px; opacity:.8; }
    .grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(190px,1fr)); gap:10px; margin:10px 0; }
    .card { border:1px solid var(--border,#2a2f3a); border-radius:8px; padding:10px; background:var(--panel-2,#161a22); cursor:pointer; }
    .card:hover { border-color: var(--accent,#6ea8fe); }
    .swatch { height:48px; border-radius:6px; margin-bottom:6px; border:1px solid rgba(128,128,128,.25); }
    .name { font-weight:600; font-size:13px; }
    .hex { font-family:monospace; font-size:11px; opacity:.7; }
    .rgb { font-family:monospace; font-size:11px; opacity:.55; }
    .detail { border:1px solid var(--border,#2a2f3a); border-radius:8px; padding:14px; margin:10px 0; background:var(--panel-2,#161a22); }
    .detail .bigswatch { height:80px; border-radius:8px; margin-bottom:10px; border:1px solid rgba(128,128,128,.25); }
    table { width:100%; border-collapse:collapse; }
    th, td { text-align:left; padding:4px 10px; border-bottom:1px solid var(--border,#2a2f3a); font-size:13px; }
    th { opacity:.65; white-space:nowrap; width:25%; }
    td.v { font-family:monospace; }
  </style>
</head>
<body>
  <div id="site-header"></div>
  <main>
    <div class="tool-header">
      <a class="back" href="/">← All tools</a>
      <h1>CSS Named Color Explorer</h1>
      <p>Browse all <span id="count">—</span> standard CSS named colors (CSS Level 1 through Level 4) — search by name or hex, filter by hue family, and click any swatch for its RGB, HSL, and ready-to-paste CSS values. Pure static reference, runs locally in your browser.</p>
    </div>

    <div class="panel">
      <div class="row">
        <input id="search" type="search" placeholder="Search name or hex…" style="flex:1;min-width:200px;">
        <label>Hue family: <select id="family"><option value="">all</option></select></label>
        <label><input type="checkbox" id="sortHue" > Sort by hue</label>
      </div>

      <div id="detail" class="detail" hidden></div>

      <div class="grid" id="grid"></div>
      <p class="note" id="note">Type to search.</p>
    </div>
  </main>

  <script src="/assets/app.js"></script>
  <script>
  (function () {
    var $ = function (id) { return document.getElementById(id); };
    var COLORS = [
      ["aliceblue", "#f0f8ff"], ["antiquewhite", "#faebd7"], ["aqua", "#00ffff"], ["aquamarine", "#7fffd4"],
      ["azure", "#f0ffff"], ["beige", "#f5f5dc"], ["bisque", "#ffe4c4"], ["black", "#000000"],
      ["blanchedalmond", "#ffebcd"], ["blue", "#0000ff"], ["blueviolet", "#8a2be2"], ["brown", "#a52a2a"],
      ["burlywood", "#deb887"], ["cadetblue", "#5f9ea0"], ["chartreuse", "#7fff00"], ["chocolate", "#d2691e"],
      ["coral", "#ff7f50"], ["cornflowerblue", "#6495ed"], ["cornsilk", "#fff8dc"], ["crimson", "#dc143c"],
      ["cyan", "#00ffff"], ["darkblue", "#00008b"], ["darkcyan", "#008b8b"], ["darkgoldenrod", "#b8860b"],
      ["darkgray", "#a9a9a9"], ["darkgreen", "#006400"], ["darkgrey", "#a9a9a9"], ["darkkhaki", "#bdb76b"],
      ["darkmagenta", "#8b008b"], ["darkolivegreen", "#556b2f"], ["darkorange", "#ff8c00"], ["darkorchid", "#9932cc"],
      ["darkred", "#8b0000"], ["darksalmon", "#e9967a"], ["darkseagreen", "#8fbc8f"], ["darkslateblue", "#483d8b"],
      ["darkslategray", "#2f4f4f"], ["darkslategrey", "#2f4f4f"], ["darkturquoise", "#00ced1"], ["darkviolet", "#9400d3"],
      ["deeppink", "#ff1493"], ["deepskyblue", "#00bfff"], ["dimgray", "#696969"], ["dimgrey", "#696969"],
      ["dodgerblue", "#1e90ff"], ["firebrick", "#b22222"], ["floralwhite", "#fffaf0"], ["forestgreen", "#228b22"],
      ["fuchsia", "#ff00ff"], ["gainsboro", "#dcdcdc"], ["ghostwhite", "#f8f8ff"], ["gold", "#ffd700"],
      ["goldenrod", "#daa520"], ["gray", "#808080"], ["green", "#008000"], ["greenyellow", "#adff2f"],
      ["grey", "#808080"], ["honeydew", "#f0fff0"], ["hotpink", "#ff69b4"], ["indianred", "#cd5c5c"],
      ["indigo", "#4b0082"], ["ivory", "#fffff0"], ["khaki", "#f0e68c"], ["lavender", "#e6e6fa"],
      ["lavenderblush", "#fff0f5"], ["lawngreen", "#7cfc00"], ["lemonchiffon", "#fffacd"], ["lightblue", "#add8e6"],
      ["lightcoral", "#f08080"], ["lightcyan", "#e0ffff"], ["lightgoldenrodyellow", "#fafad2"], ["lightgray", "#d3d3d3"],
      ["lightgreen", "#90ee90"], ["lightgrey", "#d3d3d3"], ["lightpink", "#ffb6c1"], ["lightsalmon", "#ffa07a"],
      ["lightseagreen", "#20b2aa"], ["lightskyblue", "#87cefa"], ["lightslategray", "#778899"], ["lightslategrey", "#778899"],
      ["lightsteelblue", "#b0c4de"], ["lightyellow", "#ffffe0"], ["lime", "#00ff00"], ["limegreen", "#32cd32"],
      ["linen", "#faf0e6"], ["magenta", "#ff00ff"], ["maroon", "#800000"], ["mediumaquamarine", "#66cdaa"],
      ["mediumblue", "#0000cd"], ["mediumorchid", "#ba55d3"], ["mediumpurple", "#9370db"], ["mediumseagreen", "#3cb371"],
      ["mediumslateblue", "#7b68ee"], ["mediumspringgreen", "#00fa9a"], ["mediumturquoise", "#48d1cc"], ["mediumvioletred", "#c71585"],
      ["midnightblue", "#191970"], ["mintcream", "#f5fffa"], ["mistyrose", "#ffe4e1"], ["moccasin", "#ffe4b5"],
      ["navajowhite", "#ffdead"], ["navy", "#000080"], ["oldlace", "#fdf5e6"], ["olive", "#808000"],
      ["olivedrab", "#6b8e23"], ["orange", "#ffa500"], ["orangered", "#ff4500"], ["orchid", "#da70d6"],
      ["palegoldenrod", "#eee8aa"], ["palegreen", "#98fb98"], ["paleturquoise", "#afeeee"], ["palevioletred", "#db7093"],
      ["papayawhip", "#ffefd5"], ["peachpuff", "#ffdab9"], ["peru", "#cd853f"], ["pink", "#ffc0cb"],
      ["plum", "#dda0dd"], ["powderblue", "#b0e0e6"], ["purple", "#800080"], ["rebeccapurple", "#663399"],
      ["red", "#ff0000"], ["rosybrown", "#bc8f8f"], ["royalblue", "#4169e1"], ["saddlebrown", "#8b4513"],
      ["salmon", "#fa8072"], ["sandybrown", "#f4a460"], ["seagreen", "#2e8b57"], ["seashell", "#fff5ee"],
      ["sienna", "#a0522d"], ["silver", "#c0c0c0"], ["skyblue", "#87ceeb"], ["slateblue", "#6a5acd"],
      ["slategray", "#708090"], ["slategrey", "#708090"], ["snow", "#fffafa"], ["springgreen", "#00ff7f"],
      ["steelblue", "#4682b4"], ["tan", "#d2b48c"], ["teal", "#008080"], ["thistle", "#d8bfd8"],
      ["tomato", "#ff6347"], ["turquoise", "#40e0d0"], ["violet", "#ee82ee"], ["wheat", "#f5deb3"],
      ["white", "#ffffff"], ["whitesmoke", "#f5f5f5"], ["yellow", "#ffff00"], ["yellowgreen", "#9acd32"]
    ];

    function hexToRgb(hex) {
      var n = parseInt(hex.slice(1), 16);
      return [(n >> 16) & 0xff, (n >> 8) & 0xff, n & 0xff];
    }
    function rgbToHsl(r, g, b) {
      r /= 255; g /= 255; b /= 255;
      var max = Math.max(r, g, b), min = Math.min(r, g, b), d = max - min, h = 0, s = 0, l = (max + min) / 2;
      if (d !== 0) {
        s = l > 0.5 ? d / (2 - max - min) : d / (max + min);
        switch (max) {
          case r: h = (g - b) / d + (g < b ? 6 : 0); break;
          case g: h = (b - r) / d + 2; break;
          case b: h = (r - g) / d + 4; break;
        }
        h *= 60;
      }
      return [Math.round(h), Math.round(s * 100), Math.round(l * 100)];
    }
    function hueFamily(h, s, l) {
      if (s < 10) return l < 20 ? "black" : l > 85 ? "white" : "gray";
      if (h < 15 || h >= 345) return "red";
      if (h < 45) return "orange";
      if (h < 70) return "yellow";
      if (h < 165) return "green";
      if (h < 195) return "cyan";
      if (h < 255) return "blue";
      if (h < 285) return "purple";
      return "pink";
    }

    var data = COLORS.map(function (c) {
      var rgb = hexToRgb(c[1]);
      var hsl = rgbToHsl(rgb[0], rgb[1], rgb[2]);
      return { name: c[0], hex: c[1], r: rgb[0], g: rgb[1], b: rgb[2], h: hsl[0], s: hsl[1], l: hsl[2], family: hueFamily(hsl[0], hsl[1], hsl[2]) };
    });
    var families = ["black", "white", "gray", "red", "orange", "yellow", "green", "cyan", "blue", "purple", "pink"];
    var famSel = $("family");
    families.forEach(function (f) {
      var o = document.createElement("option");
      o.value = f; o.textContent = f;
      famSel.appendChild(o);
    });
    $("count").textContent = data.length;

    function fmtPad(n, w) { return String(n).padStart(w, "0"); }
    function render() {
      var q = $("search").value.trim().toLowerCase();
      var fam = $("family").value;
      var sortHue = $("sortHue").checked;
      var list = data.filter(function (c) {
        if (fam && c.family !== fam) return false;
        if (!q) return true;
        return c.name.indexOf(q) >= 0 || c.hex.replace("#", "").indexOf(q) >= 0;
      });
      if (sortHue) {
        list.sort(function (a, b) {
          if (a.h !== b.h) return a.h - b.h;
          if (a.s !== b.s) return b.s - a.s;
          return b.l - a.l;
        });
      } else {
        list.sort(function (a, b) { return a.name.localeCompare(b.name); });
      }
      var grid = $("grid");
      grid.innerHTML = "";
      list.forEach(function (c) {
        var div = document.createElement("div");
        div.className = "card";
        div.style.background = c.hex;
        div.innerHTML =
          '<div class="swatch" style="background:' + c.hex + ';"></div>' +
          '<div class="name" style="color:var(--text,#e6e6e6);">' + c.name + '</div>' +
          '<div class="hex" style="color:var(--text,#e6e6e6);opacity:.7;">' + c.hex + '</div>';
        div.addEventListener("click", function () { showDetail(c); });
        grid.appendChild(div);
      });
      $("note").textContent = list.length + " color(s).";
    }
    function showDetail(c) {
      var d = $("detail");
      d.hidden = false;
      var rgbStr = "rgb(" + c.r + ", " + c.g + ", " + c.b + ")";
      var hslStr = "hsl(" + c.h + ", " + c.s + "%, " + c.l + "%)";
      d.innerHTML =
        '<div class="bigswatch" style="background:' + c.hex + ';"></div>' +
        '<table><tbody>' +
        '<tr><th>Name</th><td class="v">' + c.name + '</td></tr>' +
        '<tr><th>Hex</th><td class="v">' + c.hex + '</td></tr>' +
        '<tr><th>RGB</th><td class="v">' + rgbStr + '</td></tr>' +
        '<tr><th>HSL</th><td class="v">' + hslStr + '</td></tr>' +
        '<tr><th>Hue family</th><td class="v">' + c.family + '</td></tr>' +
        '<tr><th>CSS</th><td class="v">color: ' + c.name + ';</td></tr>' +
        '</tbody></table>' +
        '<div class="row" style="margin-top:8px;"><button data-copy="color: ' + c.name + ';">Copy CSS</button>' +
        '<button class="secondary" data-copy="' + c.hex + '">Copy hex</button>' +
        '<button class="secondary" data-copy="' + rgbStr + '">Copy RGB</button>' +
        '<button class="secondary" data-copy="' + hslStr + '">Copy HSL</button></div>';
    }
    $("detail").addEventListener("click", function (e) {
      var b = e.target.closest("button[data-copy]"); if (!b) return;
      var t = b.getAttribute("data-copy");
      if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(t).then(function () { $("note").textContent = "Copied: " + t; }, function () { $("note").textContent = "Copy failed."; });
      } else $("note").textContent = "Clipboard unavailable.";
    });

    $("search").addEventListener("input", render);
    $("family").addEventListener("change", render);
    $("sortHue").addEventListener("change", render);
    render();
  })();
  </script>
</body>
</html>
