<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="/assets/theme-init.js"></script>
<title>CSS Divider Generator — Virtual Tools</title>
<link rel="stylesheet" href="/assets/style.css">
<style>
.tool-wrap{max-width:800px;margin:0 auto;}
.tool-desc{font-size:14px;color:var(--text-secondary,#aaa);margin:8px 0 20px;}
.controls{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin:12px 0;}
.ctrl{display:flex;flex-direction:column;gap:4px;}
.ctrl label{font-size:12px;color:var(--text-secondary,#888);}
.ctrl input,.ctrl select{padding:6px 8px;border-radius:6px;border:1px solid var(--border,#444);background:var(--bg,#1e2230);color:var(--text,#eee);font-size:13px;font-family:inherit;}
button.action{padding:8px 16px;border-radius:6px;border:1px solid var(--border,#444);background:var(--card,#2a2f3e);color:var(--text,#eee);cursor:pointer;font-size:13px;margin:4px 4px 0 0;}
.preview{border:1px solid var(--border,#444);border-radius:8px;margin:12px 0;overflow:hidden;background:#0a0a1a;padding:20px 0;}
.code-block{background:var(--bg,#1e2230);border:1px solid var(--border,#444);border-radius:8px;padding:12px;margin:8px 0;font-family:monospace;font-size:11px;color:var(--text,#eee);white-space:pre-wrap;word-break:break-all;max-height:400px;overflow:auto;}
</style>
</head>
<body>
<header id="site-header"></header>
<main>
<div class="tool-wrap">
<h1>➗ CSS Divider Generator</h1>
<p class="tool-desc">Create CSS section dividers with 8 styles: gradient line, dotted, dashed, double, shadow, wave, zigzag, and center icon. Copy CSS.</p>
<div class="controls">
<div class="ctrl"><label>Style</label><select id="style" onchange="render()">
<option value="gradient" selected>Gradient Line</option>
<option value="dotted">Dotted</option>
<option value="dashed">Dashed</option>
<option value="double">Double</option>
<option value="shadow">Shadow</option>
<option value="wave">Wave</option>
<option value="zigzag">Zigzag</option>
<option value="icon">Center Icon</option>
</select></div>
<div class="ctrl"><label>Color</label><input type="color" id="col" value="#6c5ce7" oninput="render()"></div>
<div class="ctrl"><label>Color 2</label><input type="color" id="col2" value="#a29bfe" oninput="render()"></div>
<div class="ctrl"><label>Thickness</label><input type="range" id="thick" min="1" max="8" value="3" oninput="render()" style="width:100%"></div>
<div class="ctrl"><label>Width %</label><input type="range" id="width" min="20" max="100" value="100" oninput="render()" style="width:100%"></div>
</div>
<div style="margin:8px 0;"><button class="action" onclick="copyCode()">Copy CSS</button></div>
<div class="preview" id="prev"></div>
<div class="code-block" id="code"></div>
</div>
</main>
<script src="/assets/app.js"></script>
<script>
let codeText='';
function v(id){return document.getElementById(id).value;}
function render(){
const style=v('style'),col=v('col'),col2=v('col2'),thick=v('thick'),w=v('width');
let css='';
if(style==='gradient'){css=`.divider {
  width: ${w}%;
  height: ${thick}px;
  background: linear-gradient(90deg, transparent, ${col}, ${col2}, transparent);
  border: none;
  border-radius: ${thick}px;
  margin: 20px auto;
}`}
else if(style==='dotted'){css=`.divider {
  width: ${w}%;
  border: none;
  border-top: ${thick}px dotted ${col};
  margin: 20px auto;
}`}
else if(style==='dashed'){css=`.divider {
  width: ${w}%;
  border: none;
  border-top: ${thick}px dashed ${col};
  margin: 20px auto;
}`}
else if(style==='double'){css=`.divider {
  width: ${w}%;
  border: none;
  border-top: ${thick}px double ${col};
  margin: 20px auto;
}`}
else if(style==='shadow'){css=`.divider {
  width: ${w}%;
  height: ${thick}px;
  background: ${col};
  border: none;
  box-shadow: 0 0 ${thick*3}px ${col2}80;
  border-radius: ${thick}px;
  margin: 20px auto;
}`}
else if(style==='wave'){css=`.divider {
  width: ${w}%;
  height: ${thick*4}px;
  background: linear-gradient(90deg, ${col}, ${col2});
  border: none;
  border-radius: 50%;
  margin: 20px auto;
}`}
else if(style==='zigzag'){css=`.divider {
  width: ${w}%;
  height: ${thick*2}px;
  background: linear-gradient(135deg, ${col} 25%, transparent 25%) 0 0,
    linear-gradient(225deg, ${col} 25%, transparent 25%) 0 0,
    linear-gradient(315deg, ${col} 25%, transparent 25%) 0 0,
    linear-gradient(45deg, ${col} 25%, transparent 25%) 0 0;
  background-size: ${thick*2}px ${thick*2}px;
  border: none;
  margin: 20px auto;
}`}
else if(style==='icon'){css=`.divider {
  width: ${w}%;
  display: flex;
  align-items: center;
  justify-content: center;
  margin: 20px auto;
}
.divider::before,
.divider::after {
  content: "";
  flex: 1;
  height: ${thick}px;
  background: linear-gradient(90deg, transparent, ${col}, transparent);
}
.divider span {
  margin: 0 12px;
  font-size: ${thick*6}px;
  color: ${col2};
}`}
codeText=css;
let p=document.getElementById('prev');
p.innerHTML='';
let el=document.createElement('div');
el.style.cssText=css.replace(/\.divider/g,'').replace(/\s*\{[^}]*\}/g,'').trim();
let d=document.createElement('div');
d.className='divider';
d.style.cssText='width:'+w+'%;margin:10px auto;';
if(style==='gradient'||style==='shadow'||style==='wave'){d.style.height=thick+'px';d.style.background=style==='gradient'?`linear-gradient(90deg,transparent,${col},${col2},transparent)`:style==='shadow'?col:`linear-gradient(90deg,${col},${col2})`;d.style.border='none';d.style.borderRadius=thick+'px';if(style==='shadow')d.style.boxShadow=`0 0 ${thick*3}px ${col2}80`;}
else if(style==='dotted'||style==='dashed'||style==='double'){d.style.borderTop=`${thick}px ${style} ${col}`;d.style.borderBottom='none';d.style.borderLeft='none';d.style.borderRight='none';}
else if(style==='zigzag'){d.style.height=(thick*2)+'px';d.style.background=`linear-gradient(135deg,${col} 25%,transparent 25%) 0 0,linear-gradient(225deg,${col} 25%,transparent 25%) 0 0,linear-gradient(315deg,${col} 25%,transparent 25%) 0 0,linear-gradient(45deg,${col} 25%,transparent 25%) 0 0`;d.style.backgroundSize=`${thick*2}px ${thick*2}px`;d.style.border='none';}
else if(style==='icon'){d.style.display='flex';d.style.alignItems='center';d.style.justifyContent='center';d.innerHTML=`<span style="margin:0 12px;font-size:${thick*6}px;color:${col2};">&#10022;</span>`;let b1=document.createElement('span');b1.style.cssText=`flex:1;height:${thick}px;background:linear-gradient(90deg,transparent,${col},transparent);`;let b2=b1.cloneNode();b2.style.cssText=b1.style.cssText;d.insertBefore(b1,d.firstChild);d.appendChild(b2);}
p.appendChild(d);
document.getElementById('code').textContent=codeText;
}
function copyCode(){navigator.clipboard.writeText(codeText).then(()=>alert('Copied!'));}
render();
</script>
</body>
</html>
