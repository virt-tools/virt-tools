<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="/assets/theme-init.js"></script>
<title>Recipe Keeper — Virtual Tools</title>
<link rel="stylesheet" href="/assets/style.css">
<style>
.tool-wrap{max-width:800px;margin:0 auto;}
.tool-desc{font-size:14px;color:var(--text-secondary,#aaa);margin:8px 0 16px;}
.toolbar{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;}
.btn{padding:10px 20px;border-radius:8px;border:none;background:var(--accent,#5b8def);color:#fff;cursor:pointer;font-size:14px;}
.btn:hover{opacity:0.9;}
.btn.secondary{background:var(--bg-alt,#1a1f2e);border:1px solid var(--border,#444);color:var(--text,#eee);}
.search{flex:1;min-width:200px;padding:10px 14px;border-radius:8px;border:1px solid var(--border,#444);background:var(--bg-alt,#1a1f2e);color:var(--text,#eee);font-size:14px;}
.recipes{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:12px;}
.card{border:1px solid var(--border,#333);border-radius:12px;padding:16px;background:var(--bg-alt,#1a1f2e);cursor:pointer;}
.card:hover{border-color:var(--accent,#5b8def);}
.card h3{margin:0 0 4px;font-size:16px;}
.card .meta{font-size:12px;color:var(--text-secondary,#888);}
.card .tags{margin-top:8px;}
.tag{display:inline-block;padding:2px 8px;border-radius:12px;background:rgba(91,141,239,0.2);color:var(--accent,#5b8def);font-size:11px;margin-right:4px;}
.empty{text-align:center;padding:40px;color:var(--text-secondary,#888);}
.modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:100;align-items:center;justify-content:center;}
.modal.open{display:flex;}
.modal-box{background:var(--bg,#2a2f3e);border-radius:12px;padding:24px;max-width:600px;width:95%;max-height:85vh;overflow-y:auto;}
.modal-box h3{margin:0 0 12px;}
.modal-box label{display:block;font-size:12px;color:var(--text-secondary,#888);margin-top:12px;margin-bottom:4px;}
.modal-box input,.modal-box textarea{width:100%;padding:10px;border-radius:8px;border:1px solid var(--border,#444);background:var(--bg-alt,#1a1f2e);color:var(--text,#eee);font-size:14px;box-sizing:border-box;}
.modal-box textarea{min-height:80px;resize:vertical;}
.modal-box .btns{display:flex;gap:8px;margin-top:16px;justify-content:flex-end;}
.ingredients-list,.steps-list{margin:8px 0;}
.ing-row,.step-row{display:flex;gap:8px;margin-bottom:6px;align-items:center;}
.ing-row input,.step-row input{flex:1;}
.ing-row .rm,.step-row .rm{padding:6px 10px;border-radius:6px;border:1px solid var(--border,#444);background:var(--bg-alt,#1a1f2e);color:var(--text,#eee);cursor:pointer;font-size:14px;}
.ing-row .rm:hover,.step-row .rm:hover{border-color:#e74c3c;color:#e74c3c;}
.add-ing,.add-step{padding:6px 14px;border-radius:6px;border:1px dashed var(--border,#444);background:none;color:var(--text-secondary,#888);cursor:pointer;font-size:13px;margin-top:4px;}
.add-ing:hover,.add-step:hover{border-color:var(--accent,#5b8def);color:var(--accent,#5b8def);}
.view-box{background:var(--bg-alt,#1a1f2e);border-radius:12px;padding:24px;max-width:600px;width:95%;max-height:85vh;overflow-y:auto;}
.view-box h2{margin:0 0 8px;}
.view-box .tags{margin-bottom:16px;}
.view-box h4{margin:16px 0 8px;color:var(--accent,#5b8def);}
.view-box ul,.view-box ol{padding-left:20px;line-height:1.8;}
</style>
</head>
<body>
<header id="site-header"></header>
<main>
<div class="tool-wrap">
<h1>Recipe Keeper 🍳</h1>
<p class="tool-desc">Save and organize your favorite recipes. Add ingredients, steps, and tags. Search and filter by tag. All stored locally in your browser.</p>
<div class="toolbar">
<input class="search" id="search" placeholder="Search recipes…" oninput="render()">
<button class="btn" onclick="openAdd()">+ Add Recipe</button>
</div>
<div class="recipes" id="grid"></div>
</div>
</main>
<div class="modal" id="modal">
<div class="modal-box">
<h3 id="modalTitle">Add Recipe</h3>
<label>Title</label>
<input id="rTitle" placeholder="Recipe name">
<label>Tags (comma-separated)</label>
<input id="rTags" placeholder="dinner, quick, italian">
<label>Ingredients</label>
<div class="ingredients-list" id="ingList"></div>
<button class="add-ing" onclick="addIng()">+ Add ingredient</button>
<label>Steps</label>
<div class="steps-list" id="stepList"></div>
<button class="add-step" onclick="addStep()">+ Add step</button>
<label>Notes</label>
<textarea id="rNotes" placeholder="Optional notes…"></textarea>
<div class="btns">
<button class="btn secondary" onclick="closeModal()">Cancel</button>
<button class="btn danger" id="delBtn" style="display:none" onclick="deleteRecipe()">Delete</button>
<button class="btn" onclick="saveRecipe()">Save</button>
</div>
</div>
</div>
<div class="modal" id="viewModal">
<div class="view-box" id="viewBox"></div>
</div>
<script src="/assets/app.js"></script>
<script>
const KEY='recipes_v1';let editId=null;
function load(){try{return JSON.parse(localStorage.getItem(KEY))||[];}catch(e){return[];}}
function save(arr){localStorage.setItem(KEY,JSON.stringify(arr));}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,6);}
function render(){
const q=document.getElementById('search').value.toLowerCase();
const recipes=load().filter(r=>!q||r.title.toLowerCase().includes(q)||r.tags.some(t=>t.toLowerCase().includes(q)));
const grid=document.getElementById('grid');
if(!recipes.length){grid.innerHTML='<div class="empty">No recipes yet. Click "Add Recipe" to get started.</div>';return;}
grid.innerHTML=recipes.map(r=>`<div class="card" onclick="viewRecipe('${r.id}')"><h3>${esc(r.title)}</h3><div class="meta">${r.ingredients.length} ingredients · ${r.steps.length} steps</div><div class="tags">${r.tags.map(t=>`<span class="tag">${esc(t)}</span>`).join('')}</div></div>`).join('');
}
function esc(s){return s.replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function openAdd(){editId=null;document.getElementById('modalTitle').textContent='Add Recipe';document.getElementById('rTitle').value='';document.getElementById('rTags').value='';document.getElementById('rNotes').value='';document.getElementById('ingList').innerHTML='';document.getElementById('stepList').innerHTML='';addIng();addStep();document.getElementById('delBtn').style.display='none';document.getElementById('modal').classList.add('open');}
function openEdit(id){const r=load().find(x=>x.id===id);if(!r)return;editId=id;document.getElementById('modalTitle').textContent='Edit Recipe';document.getElementById('rTitle').value=r.title;document.getElementById('rTags').value=r.tags.join(', ');document.getElementById('rNotes').value=r.notes||'';const il=document.getElementById('ingList');il.innerHTML='';r.ingredients.forEach(i=>addIng(i));const sl=document.getElementById('stepList');sl.innerHTML='';r.steps.forEach(s=>addStep(s));document.getElementById('delBtn').style.display='inline-block';document.getElementById('modal').classList.add('open');}
function addIng(val){const list=document.getElementById('ingList');const row=document.createElement('div');row.className='ing-row';row.innerHTML=`<input placeholder="e.g. 2 cups flour" value="${esc(val||'')}"><button class="rm" onclick="this.parentElement.remove()">×</button>`;list.appendChild(row);}
function addStep(val){const list=document.getElementById('stepList');const row=document.createElement('div');row.className='step-row';row.innerHTML=`<input placeholder="e.g. Mix dry ingredients" value="${esc(val||'')}"><button class="rm" onclick="this.parentElement.remove()">×</button>`;list.appendChild(row);}
function closeModal(){document.getElementById('modal').classList.remove('open');}
function saveRecipe(){const title=document.getElementById('rTitle').value.trim();if(!title)return;const tags=document.getElementById('rTags').value.split(',').map(t=>t.trim()).filter(Boolean);const ingredients=[...document.querySelectorAll('#ingList input')].map(i=>i.value.trim()).filter(Boolean);const steps=[...document.querySelectorAll('#stepList input')].map(s=>s.value.trim()).filter(Boolean);const notes=document.getElementById('rNotes').value.trim();const arr=load();if(editId){const r=arr.find(x=>x.id===editId);Object.assign(r,{title,tags,ingredients,steps,notes});}else{arr.push({id:uid(),title,tags,ingredients,steps,notes});}save(arr);closeModal();render();}
function deleteRecipe(){if(!editId)return;const arr=load().filter(x=>x.id!==editId);save(arr);closeModal();render();}
function viewRecipe(id){const r=load().find(x=>x.id===id);if(!r)return;const box=document.getElementById('viewBox');box.innerHTML=`<h2>${esc(r.title)}</h2><div class="tags">${r.tags.map(t=>`<span class="tag">${esc(t)}</span>`).join('')}</div><h4>Ingredients</h4><ul>${r.ingredients.map(i=>`<li>${esc(i)}</li>`).join('')}</ul><h4>Steps</h4><ol>${r.steps.map(s=>`<li>${esc(s)}</li>`).join('')}</ol>${r.notes?`<h4>Notes</h4><p>${esc(r.notes)}</p>`:''}<div class="btns" style="margin-top:20px;display:flex;gap:8px;justify-content:flex-end"><button class="btn secondary" onclick="document.getElementById('viewModal').classList.remove('open')">Close</button><button class="btn" onclick="document.getElementById('viewModal').classList.remove('open');openEdit('${r.id}')">Edit</button></div>`;document.getElementById('viewModal').classList.add('open');}
document.getElementById('modal').addEventListener('click',e=>{if(e.target.id==='modal')closeModal();});
document.getElementById('viewModal').addEventListener('click',e=>{if(e.target.id==='viewModal')document.getElementById('viewModal').classList.remove('open');});
render();
</script>
</body>
</html>
