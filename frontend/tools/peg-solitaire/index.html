<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="/assets/theme-init.js"></script>
<title>Peg Solitaire — Virtual Tools</title>
<link rel="stylesheet" href="/assets/style.css">
<style>
.tool-wrap{max-width:500px;margin:0 auto;text-align:center;}
#board{display:inline-grid;gap:4px;margin:16px 0;}
.hole{width:40px;height:40px;border-radius:50%;border:2px solid var(--border,#444);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;}
.hole.invalid{visibility:hidden;}
.hole.empty{background:var(--bg-alt,#1a1f2e);}
.hole.peg{background:var(--accent,#5b8def);box-shadow:inset 0 -3px 6px rgba(0,0,0,.3);}
.hole.sel{border-color:#f1c40f;box-shadow:0 0 8px #f1c40f;}
.hole.target{border-color:#2ecc71;animation:pulse 1s infinite;}
@keyframes pulse{0%,100%{box-shadow:0 0 4px #2ecc71;}50%{box-shadow:0 0 12px #2ecc71;}}
.controls{margin:12px 0;display:flex;gap:8px;justify-content:center;flex-wrap:wrap;}
.controls button{padding:8px 16px;border-radius:8px;border:1px solid var(--border,#444);background:var(--bg-alt,#1a1f2e);color:var(--text,#eee);cursor:pointer;font-size:14px;}
.controls button:hover{background:var(--accent,#5b8def);color:#fff;}
.stats{display:flex;gap:24px;justify-content:center;margin:10px 0;font-size:15px;}
.stats span{color:var(--accent,#5b8def);font-weight:600;}
.info{color:var(--text-secondary,#888);font-size:13px;margin:8px 0;}
#msg{font-size:16px;font-weight:600;margin:8px 0;min-height:24px;}
.boards{display:flex;gap:8px;justify-content:center;margin:8px 0;flex-wrap:wrap;}
.boards button{padding:6px 14px;border-radius:6px;border:1px solid var(--border,#444);background:var(--bg-alt,#1a1f2e);color:var(--text,#eee);cursor:pointer;font-size:13px;}
.boards button.active{background:var(--accent,#5b8def);color:#fff;}
</style>
</head>
<body>
<header id="site-header"></header>
<main>
<div class="tool-wrap">
<h1>Peg Solitaire 🔵</h1>
<p class="tool-desc">Jump pegs over each other to remove them. Goal: leave just one peg on the board, ideally in the center.</p>
<div class="boards" id="boards"></div>
<div class="stats"><div>Pegs left: <span id="pegs">32</span></div><div>Moves: <span id="moves">0</span></div></div>
<div id="board"></div>
<div id="msg"></div>
<div class="controls">
<button onclick="undo()">↩ Undo</button>
<button onclick="newGame()">🔄 New Game</button>
</div>
<p class="info">Click a peg to select it, then click an empty hole to jump over an adjacent peg.</p>
</div>
</main>
<script src="/assets/app.js"></script>
<script>
const SHAPES={
English:[ "  ###  ","  ###  ","#######","#######","#######","  ###  ","  ###  "],
European:["   *   ","  ***  "," ***** ","*** ***"," ***** ","  ***  ","   *   "],
Diamond:["   *   ","  ***  "," ***** ","*******"," ***** ","  ***  ","   *   "]
};
let shape='English',grid=[],sel=null,hist=[],moves=0;
function newGame(){
grid=SHAPES[shape].map(r=>[...r].map(c=>c==='*'||c==='#'?1:0).map((v,ci,r2)=>{
const ch=SHAPES[shape][0];return v;
}));
grid=SHAPES[shape].map((row,ri)=>[...row].map(c=>c==='*'||c==='#'?1:0));
const cr=Math.floor(grid.length/2),cc=Math.floor(grid[0].length/2);
grid[cr][cc]=0;sel=null;hist=[];moves=0;document.getElementById('msg').textContent='';
render();
}
function valid(r,c){return r>=0&&r<grid.length&&c>=0&&c<grid[0].length&&grid[r][c]!==-1;}
function render(){
const b=document.getElementById('board');b.innerHTML='';
b.style.gridTemplateColumns='repeat('+grid[0].length+',40px)';
let targets=[];
if(sel){for(const[dr,dc]of[[0,2],[0,-2],[2,0],[-2,0]]){const nr=sel.r+dr,nc=sel.c+dc,mr=sel.r+dr/2,mc=sel.c+dc/2;if(valid(nr,nc)&&grid[nr][nc]===0&&valid(mr,mc)&&grid[mr][mc]===1)targets.push([nr,nc]);}}
for(let r=0;r<grid.length;r++)for(let c=0;c<grid[0].length;c++){
const v=grid[r][c];const h=document.createElement('div');
if(v===-1){h.className='hole invalid';b.appendChild(h);continue;}
h.className='hole '+(v===1?'peg':'empty');
if(sel&&sel.r===r&&sel.c===c)h.classList.add('sel');
if(targets.some(t=>t[0]===r&&t[1]===c))h.classList.add('target');
h.onclick=()=>click(r,c);b.appendChild(h);
}
const pegs=grid.flat().filter(v=>v===1).length;
document.getElementById('pegs').textContent=pegs;
document.getElementById('moves').textContent=moves;
if(pegs===1){const cr=Math.floor(grid.length/2),cc=Math.floor(grid[0].length/2);document.getElementById('msg').textContent=grid[cr][cc]===1?'🎉 Perfect! One peg in center!':'✅ Solved! One peg remaining.';}
else if(pegs>1&&!hasMoves()){document.getElementById('msg').textContent='😅 No more moves. '+pegs+' pegs left.';}
}
function click(r,c){
if(grid[r][c]===-1)return;
if(grid[r][c]===1){sel={r,c};render();return;}
if(grid[r][c]===0&&sel){
const dr=r-sel.r,dc=c-sel.c;
if(Math.abs(dr)+Math.abs(dc)===2){const mr=sel.r+dr/2,mc=sel.c+dc/2;
if(valid(mr,mc)&&grid[mr][mc]===1){
hist.push(grid.map(row=>[...row]));grid[sel.r][sel.c]=0;grid[mr][mc]=0;grid[r][c]=1;moves++;sel=null;render();
return;}}
sel=null;render();
}
}
function hasMoves(){for(let r=0;r<grid.length;r++)for(let c=0;c<grid[0].length;c++){if(grid[r][c]!==1)continue;for(const[dr,dc]of[[0,2],[0,-2],[2,0],[-2,0]]){const nr=r+dr,nc=c+dc,mr=r+dr/2,mc=c+dc/2;if(valid(nr,nc)&&grid[nr][nc]===0&&valid(mr,mc)&&grid[mr][mc]===1)return true;}}return false;}
function undo(){if(hist.length===0)return;grid=hist.pop();sel=null;moves--;render();}
function initBoards(){const bs=document.getElementById('boards');bs.innerHTML=Object.keys(SHAPES).map(s=>'<button class="'+(s===shape?'active':'')+'" onclick="shape=\''+s+'\';newGame();initBoards();">'+s+'</button>').join('');}
initBoards();newGame();
</script>
</body>
</html>
