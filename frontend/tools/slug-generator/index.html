<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <script src="/assets/theme-init.js"></script>
  <title>Slug Generator — Virtual Tools</title>
  <link rel="stylesheet" href="/assets/style.css">
</head>
<body>
  <div id="site-header"></div>
  <main>
    <div class="tool-header">
      <a class="back" href="/">← All tools</a>
      <h1>Slug Generator</h1>
      <p>Turn any text into a clean URL slug — strips accents, collapses separators and trims to a length, all in your browser.</p>
    </div>

    <div class="panel">
      <div class="field">
        <label for="in">Text</label>
        <textarea id="in" placeholder="Type a title…" style="min-height:120px;">Héllo Wörld — café & bar</textarea>
      </div>

      <div class="spacer"></div>
      <div class="row" style="align-items:flex-end;">
        <div>
          <label for="sep">Separator</label>
          <select id="sep">
            <option value="-" selected>- (hyphen)</option>
            <option value="_">_ (underscore)</option>
          </select>
        </div>
        <label class="check"><input type="checkbox" id="lower" checked> Lowercase</label>
        <label class="check"><input type="checkbox" id="accents" checked> Strip accents</label>
        <label class="check"><input type="checkbox" id="ascii" checked> ASCII only</label>
        <div>
          <label for="maxlen">Max length</label>
          <input type="number" id="maxlen" min="0" step="1" placeholder="none" style="width:90px;">
        </div>
      </div>

      <div class="spacer"></div>
      <div class="row" style="justify-content:space-between;">
        <label for="out">Slug</label>
        <button id="copy" class="secondary" style="padding:4px 10px;">Copy</button>
      </div>
      <div class="output" id="out" style="word-break:break-all; min-height:1.6em;"></div>
      <p class="note" id="note">Strip accents uses NFKD normalization so café → cafe, naïve → naive.</p>
    </div>
  </main>

  <script src="/assets/app.js"></script>
  <script>
  (function () {
    var inEl = document.getElementById("in");
    var sep = document.getElementById("sep");
    var lower = document.getElementById("lower");
    var accents = document.getElementById("accents");
    var ascii = document.getElementById("ascii");
    var maxlen = document.getElementById("maxlen");
    var out = document.getElementById("out");
    var copy = document.getElementById("copy");
    var note = document.getElementById("note");

    function escapeRegex(s) { return s.replace(/[.*+?^${}()|[\]\\]/g, "\\$&"); }

    function slugify(text, opts) {
      var s = text.trim();
      if (opts.accents) s = s.normalize("NFKD").replace(/[\u0300-\u036f]/g, "");
      if (opts.ascii) s = s.replace(/[^A-Za-z0-9]+/g, opts.sep);
      else s = s.replace(/[^\p{L}\p{N}]+/gu, opts.sep);
      if (opts.lower) s = s.toLowerCase();
      var esc = escapeRegex(opts.sep);
      s = s.replace(new RegExp(esc + "+", "g"), opts.sep);
      s = s.replace(new RegExp("^" + esc + "+|" + esc + "+$", "g"), "");
      if (opts.maxlen && s.length > opts.maxlen) {
        s = s.slice(0, opts.maxlen);
        var i = s.lastIndexOf(opts.sep);
        if (i > 0) s = s.slice(0, i);
        s = s.replace(new RegExp(esc + "+$", "g"), "");
      }
      return s;
    }

    function run() {
      var opts = {
        sep: sep.value,
        lower: lower.checked,
        accents: accents.checked,
        ascii: ascii.checked,
        maxlen: parseInt(maxlen.value, 10)
      };
      out.textContent = slugify(inEl.value, opts) || "—";
    }

    function copyText(text, label) {
      if (!text || text === "—") return;
      function done() { copy.textContent = "Copied!"; setTimeout(function () { copy.textContent = "Copy"; }, 1200); }
      if (navigator.clipboard && navigator.clipboard.writeText) navigator.clipboard.writeText(text).then(done);
      else { var ta = document.createElement("textarea"); ta.value = text; document.body.appendChild(ta); ta.select(); try { document.execCommand("copy"); done(); } catch (e) {} ta.remove(); }
    }

    [inEl, sep, lower, accents, ascii, maxlen].forEach(function (el) {
      el.addEventListener("input", run);
      el.addEventListener("change", run);
    });
    copy.addEventListener("click", function () { copyText(out.textContent, "Copied"); });

    run();
  })();
  </script>
</body>
</html>
