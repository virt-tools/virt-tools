<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CSS Avatar Stack Generator — virt.tools</title>
<link rel="stylesheet" href="/assets/style.css">
<style>
.tool-area{max-width:900px;margin:2rem auto;padding:0 1rem}
.controls{display:grid;gap:1rem;margin:1.5rem 0;padding:1.5rem;background:#1a1a2e;border-radius:12px}
.control-row{display:flex;gap:1rem;align-items:center;flex-wrap:wrap}
.control-row label{min-width:120px;font-weight:600;font-size:.9rem}
.control-row select,.control-row input{padding:.5rem .75rem;border-radius:8px;border:1px solid #444;background:#0f0f1e;color:#eee;font-size:.9rem}
.preview-box{margin:1.5rem 0;border-radius:12px;background:#2a2a3e;padding:2rem 1.5rem;min-height:200px;display:flex;align-items:center;justify-content:center}
.output-block{margin:2rem 0}
.output-block textarea{width:100%;min-height:120px;font-family:monospace;font-size:.85rem;padding:1rem;border-radius:8px;border:1px solid #444;background:#0f0f1e;color:#eee;resize:vertical}
.copy-btn{padding:.6rem 1.2rem;border:none;border-radius:8px;background:#667eea;color:#fff;cursor:pointer;font-size:.9rem;margin-top:.5rem}
h2{margin-top:2rem;font-size:1.2rem}
</style>
</head>
<body>
<header id="site-header"></header>
<main>
<div class="tool-area">
<h1>👥 CSS Avatar Stack Generator</h1>
<p>Create CSS avatar group/stack components with overlapping user avatars. 3 layouts, custom count/size/overlap. Copy HTML+CSS.</p>
<div class="controls">
<div class="control-row">
<label>Layout</label><select id="layout"><option value="stack" selected>Stack</option><option value="grid">Grid</option><option value="ring">Ring</option></select>
<label>Avatars</label><select id="count"><option value="3">3</option><option value="5" selected>5</option><option value="7">7</option><option value="10">10</option></select>
<label>Size</label><select id="size"><option value="32">32px</option><option value="40" selected>40px</option><option value="48">48px</option><option value="64">64px</option></select>
</div>
<div class="control-row">
<label>Overlap</label><select id="overlap"><option value="4">4px</option><option value="8" selected>8px</option><option value="12">12px</option><option value="16">16px</option></select>
<label>Accent</label><input type="color" id="accent" value="#667eea">
<label>Bg</label><input type="color" id="bgColor" value="#1a1a2e">
<label>Show count</label><select id="showCount"><option value="yes" selected>Yes</option><option value="no">No</option></select>
</div>
</div>
<h2>Preview</h2>
<div class="preview-box" id="preview"></div>
<h2>HTML</h2><div class="output-block"><textarea id="htmlOut" readonly></textarea><button class="copy-btn" onclick="copyText('htmlOut')">Copy HTML</button></div>
<h2>CSS</h2><div class="output-block"><textarea id="cssOut" readonly></textarea><button class="copy-btn" onclick="copyText('cssOut')">Copy CSS</button></div>
</div>
</main>
<script src="/assets/app.js"></script>
<script>
function update(){
var layout=document.getElementById('layout').value;
var n=parseInt(document.getElementById('count').value);
var sz=document.getElementById('size').value;
var ov=document.getElementById('overlap').value;
var ac=document.getElementById('accent').value;
var bg=document.getElementById('bgColor').value;
var showC=document.getElementById('showCount').value==='yes';
var colors=['#667eea','#f093fb','#4facfe','#43e97b','#fa709a','#fee140','#a18cd1','#fbc2eb','#ff9a9e','#ffecd2'];
var html='<div class="avatar-stack">\n';
for(var i=0;i<n;i++){
html+='  <div class="avatar" style="background:'+colors[i%colors.length]+';width:'+sz+'px;height:'+sz+'px">'+String.fromCharCode(65+i)+'</div>\n';
}
if(showC){html+='  <div class="avatar avatar-count" style="background:'+ac+';width:'+sz+'px;height:'+sz+'px">+'+(n+3)+'</div>\n'}
html+='</div>';
var css='.avatar-stack{display:flex;align-items:center}\n';
if(layout==='stack'){
css+='.avatar-stack .avatar{margin-left:-'+ov+'px;border:2px solid '+bg+';border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-size:'+(sz*0.4)+'px;font-weight:700;font-family:system-ui,sans-serif}\n';
css+='.avatar-stack .avatar:first-child{margin-left:0}\n';
css+='.avatar-stack .avatar:hover{z-index:10;transform:translateY(-2px);transition:transform .2s}\n';
}else if(layout==='grid'){
css+='.avatar-stack{display:grid;grid-template-columns:repeat('+(Math.ceil(Math.sqrt(n+ (showC?1:0)))+',1fr);gap:8px}\n';
css+='.avatar-stack .avatar{border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-size:'+(sz*0.4)+'px;font-weight:700;font-family:system-ui,sans-serif;border:2px solid '+bg+'}\n';
}else{
css+='.avatar-stack{position:relative;width:'+(sz*2.5)+'px;height:'+(sz*2.5)+'px}\n';
css+='.avatar-stack .avatar{position:absolute;border:2px solid '+bg+';border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-size:'+(sz*0.4)+'px;font-weight:700;font-family:system-ui,sans-serif}\n';
var total=n+(showC?1:0);
for(var j=0;j<total;j++){
var angle=(360/total)*j-90;
var rad=angle*Math.PI/180;
var r=sz*0.75;
var x=sz*1.25+r*Math.cos(rad)-sz/2;
var y=sz*1.25+r*Math.sin(rad)-sz/2;
css+='.avatar-stack .avatar:nth-child('+(j+1)+'){left:'+x.toFixed(0)+'px;top:'+y.toFixed(0)+'px;z-index:'+(total-j)+'}\n';
}
}
css+='.avatar-count{font-size:'+(sz*0.32)+'px!important}';
document.getElementById('htmlOut').value=html;
document.getElementById('cssOut').value=css;
var p=document.getElementById('preview');
p.innerHTML='<style>'+css+'<\/style>'+html;
}
function copyText(id){var t=document.getElementById(id);t.select();document.execCommand('copy')}
document.querySelectorAll('select,input').forEach(function(e){e.addEventListener('input',update);e.addEventListener('change',update)});
update();
</script>
</body>
</html>
