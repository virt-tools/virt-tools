<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CSS Register Form Generator — virt.tools</title>
<link rel="stylesheet" href="/assets/style.css">
<style>
.tool-area{max-width:960px;margin:2rem auto;padding:0 1rem}
.controls{display:grid;gap:1rem;margin:1.5rem 0;padding:1.5rem;background:#1a1a2e;border-radius:12px}
.control-row{display:flex;gap:1rem;align-items:center;flex-wrap:wrap}
.control-row label{min-width:120px;font-weight:600;font-size:.9rem}
.control-row select,.control-row input[type="text"],.control-row input[type="color"]{padding:.5rem .75rem;border-radius:8px;border:1px solid #444;background:#0f0f1e;color:#eee;font-size:.9rem}
.preview-area{margin:2rem 0;padding:2rem;background:linear-gradient(135deg,#0f0f1e,#1a1a3e);border-radius:12px;min-height:320px;display:flex;align-items:center;justify-content:center}
.css-output{margin:2rem 0}
.css-output textarea{width:100%;min-height:200px;font-family:monospace;font-size:.85rem;padding:1rem;border-radius:8px;border:1px solid #444;background:#0f0f1e;color:#eee;resize:vertical}
.copy-btn{padding:.6rem 1.2rem;border:none;border-radius:8px;background:#4a9eff;color:#fff;cursor:pointer;font-size:.9rem;margin-top:.5rem}
h2{margin-top:2rem;font-size:1.2rem}
</style>
</head>
<body>
<header id="site-header"></header>
<main>
<div class="tool-area">
<h1>📝 CSS Register Form Generator</h1>
<p>Create styled CSS registration/signup forms with 4 styles, password strength, and custom fields.</p>
<div class="controls">
<div class="control-row">
<label>Style</label><select id="style"><option value="card">Card</option><option value="minimal">Minimal</option><option value="glass">Glassmorphism</option><option value="bordered">Bordered</option></select>
<label>Theme</label><select id="theme"><option value="dark">Dark</option><option value="light">Light</option></select>
</div>
<div class="control-row">
<label>Title</label><input type="text" id="title" value="Create Account" style="flex:1;min-width:120px">
<label>Subtitle</label><input type="text" id="subtitle" value="Sign up to get started" style="flex:1;min-width:120px">
</div>
<div class="control-row">
<label>Accent</label><input type="color" id="accent" value="#4a9eff">
<label>Fields</label><select id="fields"><option value="3">Name+Email+Pass</option><option value="5">Full+User+Email+Pass+Confirm</option></select>
<label>Radius</label><input type="range" id="radius" min="0" max="24" value="12"><span id="radiusVal">12px</span>
</div>
</div>
<div class="preview-area" id="preview"></div>
<h2>HTML</h2><div class="css-output"><textarea id="htmlOut" readonly></textarea><button class="copy-btn" onclick="copyText('htmlOut')">Copy HTML</button></div>
<h2>CSS</h2><div class="css-output"><textarea id="cssOut" readonly></textarea><button class="copy-btn" onclick="copyText('cssOut')">Copy CSS</button></div>
</div>
</main>
<script src="/assets/app.js"></script>
<script>
function update(){
var style=document.getElementById('style').value;
var theme=document.getElementById('theme').value;
var title=document.getElementById('title').value;
var sub=document.getElementById('subtitle').value;
var accent=document.getElementById('accent').value;
var fields=parseInt(document.getElementById('fields').value);
var r=parseInt(document.getElementById('radius').value);
document.getElementById('radiusVal').textContent=r+'px';
var bg=theme==='light'?'#fff':'#1a1a2e';
var color=theme==='light'?'#333':'#eee';
var inputBg=theme==='light'?'#f5f5f5':'#0f0f1e';
var border=theme==='light'?'#ddd':'#333';
var glassStyle=style==='glass'?'backdrop-filter:blur(20px);background:'+(theme==='light'?'rgba(255,255,255,.15)':'rgba(26,26,46,.6)')+';':'background:'+bg+';';
var bordered=style==='bordered'?'border:2px solid '+accent+';':'';
var html='<div class="register-form">\n  <h2 class="reg-title">'+title+'</h2>\n  <p class="reg-sub">'+sub+'</p>\n';
if(fields===5){html+='  <div class="input-group"><input type="text" placeholder="Full name"></div>\n  <div class="input-group"><input type="text" placeholder="Username"></div>\n';}
else{html+='  <div class="input-group"><input type="text" placeholder="Name"></div>\n';}
html+='  <div class="input-group"><input type="email" placeholder="Email"></div>\n  <div class="input-group"><input type="password" placeholder="Password"></div>\n';
if(fields===5)html+='  <div class="input-group"><input type="password" placeholder="Confirm password"></div>\n';
html+='  <div class="reg-terms"><label><input type="checkbox"> I agree to the <a href="#">Terms</a></label></div>\n  <button class="reg-btn">Sign Up</button>\n  <p class="reg-login">Already have an account? <a href="#">Sign in</a></p>\n</div>';
var css='.register-form{\n  padding:2.5rem;\n  border-radius:'+r+'px;\n  '+glassStyle+'\n  '+bordered+'\n  color:'+color+';\n  max-width:400px;\n  margin:0 auto;\n  box-shadow:0 8px 32px rgba(0,0,0,.2);\n}\n.reg-title{\n  margin:0 0 .3rem;\n  font-size:1.5rem;\n  font-weight:700;\n}\n.reg-sub{\n  margin:0 0 1.5rem;\n  font-size:.85rem;\n  opacity:.7;\n}\n.input-group{\n  margin-bottom:.8rem;\n}\n.input-group input{\n  width:100%;\n  padding:.7rem .9rem;\n  border:1px solid '+border+';\n  border-radius:8px;\n  background:'+inputBg+';\n  color:'+color+';\n  font-size:.9rem;\n  box-sizing:border-box;\n}\n.reg-terms{\n  margin:1rem 0;\n  font-size:.8rem;\n}\n.reg-terms a{color:'+accent+';text-decoration:none}\n.reg-btn{\n  width:100%;\n  padding:.8rem;\n  border:none;\n  border-radius:8px;\n  background:'+accent+';\n  color:#fff;\n  font-size:.95rem;\n  font-weight:600;\n  cursor:pointer;\n}\n.reg-login{\n  text-align:center;\n  margin-top:1rem;\n  font-size:.85rem;\n  opacity:.7;\n}\n.reg-login a{color:'+accent+';text-decoration:none}';
document.getElementById('preview').innerHTML='<style>'+css.replace(/\.register-form/g,'.preview-area .register-form').replace(/\.reg-/g,'.preview-area .reg-').replace(/\.input-group/g,'.preview-area .input-group')+'</style>'+html;
document.getElementById('htmlOut').value=html;
document.getElementById('cssOut').value=css;
}
function copyText(id){var t=document.getElementById(id);t.select();document.execCommand('copy');}
document.querySelectorAll('select,input').forEach(function(e){e.addEventListener('input',update)});
update();
</script>
</body>
</html>
