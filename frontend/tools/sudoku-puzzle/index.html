<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="/assets/theme-init.js"></script>
<title>Sudoku — Virtual Tools</title>
<link rel="stylesheet" href="/assets/style.css">
<style>
.tool-wrap{max-width:540px;margin:0 auto;text-align:center;}
.tool-desc{opacity:.7;font-size:14px;margin-bottom:8px;}
#grid{display:grid;grid-template-columns:repeat(9,1fr);gap:1px;background:#333;width:450px;margin:12px auto;border:2px solid #333;border-radius:4px;}
.cell{width:50px;height:50px;display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:600;background:#fff;color:#222;cursor:pointer;user-select:none;}
.cell.given{background:#e8e8e8;color:#000;font-weight:700;}
.cell.sel{background:#bbdefb;}
.cell.hi{background:#d4e6f8;}
.cell.err{color:#e53935;background:#ffcdd2;}
.cell:nth-child(3n){margin-right:2px;}
.row-sep{border-bottom:2px solid #333;}
.controls{display:flex;gap:8px;justify-content:center;margin:12px 0;flex-wrap:wrap;}
.controls button{padding:6px 16px;border-radius:6px;border:1px solid var(--border,#2a2f3a);background:var(--bg-alt,#1a1f2e);color:var(--text,#e0e0e0);cursor:pointer;font-size:14px;}
.controls button.active{background:#3498db;color:#fff;}
.numpad{display:flex;gap:6px;justify-content:center;margin:8px 0;}
.numpad button{width:42px;height:42px;font-size:20px;border-radius:6px;border:1px solid var(--border,#2a2f3a);background:var(--bg-alt,#1a1f2e);color:var(--text,#e0e0e0);cursor:pointer;}
.info{display:flex;gap:20px;justify-content:center;margin:8px 0;font-size:15px;}
#msg{font-size:14px;opacity:.7;min-height:20px;}
@media(max-width:480px){#grid{width:315px;}.cell{width:35px;height:35px;font-size:16px;}}
</style>
</head>
<body>
<header id="site-header"></header>
<main>
<div class="tool-wrap">
<h1>Sudoku</h1>
<p class="tool-desc">Play Sudoku — generate fresh puzzles at three difficulty levels. Click a cell, type 1–9 or use the numpad. Backspace/0 to erase. Check, hint, and solve buttons included.</p>
<div class="info"><span>Difficulty: <b id="diff">Medium</b></span><span>Time: <b id="timer">0:00</b></span><span>Mistakes: <b id="mistakes">0</b></span></div>
<div id="grid"></div>
<div class="numpad" id="npad"></div>
<div class="controls">
<button onclick="setDiff('easy')">Easy</button>
<button onclick="setDiff('medium')" class="active">Medium</button>
<button onclick="setDiff('hard')">Hard</button>
<button onclick="newPuzzle()">New</button>
<button onclick="checkAll()">Check</button>
<button onclick="hint()">Hint</button>
<button onclick="solveAll()">Solve</button>
</div>
<div id="msg"></div>
</div>
</main>
<script src="/assets/app.js"></script>
<script>
let solution=[],puzzle=[],given=[],selR=-1,selC=-1,diff='medium',mistakes=0,t0=0,timerId=null;

function setDiff(d){diff=d;document.getElementById('diff').textContent=d.charAt(0).toUpperCase()+d.slice(1);document.querySelectorAll('.controls button').forEach(b=>b.classList.remove('active'));const idx={easy:0,medium:1,hard:2}[d];document.querySelectorAll('.controls button')[idx].classList.add('active');}

function emptyGrid(){return Array.from({length:9},()=>Array(9).fill(0));}

function isValid(g,r,c,n){
  for(let i=0;i<9;i++){if(g[r][i]===n||g[i][c]===n)return false;}
  const br=Math.floor(r/3)*3,bc=Math.floor(c/3)*3;
  for(let i=0;i<3;i++)for(let j=0;j<3;j++){if(g[br+i][bc+j]===n)return false;}
  return true;
}

function solveS(g){
  for(let r=0;r<9;r++)for(let c=0;c<9;c++){
    if(g[r][c]===0){
      const nums=[1,2,3,4,5,6,7,8,9].sort(()=>Math.random()-0.5);
      for(let n of nums){if(isValid(g,r,c,n)){g[r][c]=n;if(solveS(g))return true;g[r][c]=0;}}
      return false;
    }
  }
  return true;
}

function newPuzzle(){
  solution=emptyGrid();solveS(solution);
  puzzle=solution.map(r=>[...r]);
  const holes={easy:35,medium:45,hard:52}[diff];
  let removed=0;
  while(removed<holes){
    const r=Math.floor(Math.random()*9),c=Math.floor(Math.random()*9);
    if(puzzle[r][c]!==0){puzzle[r][c]=0;removed++;}
  }
  given=puzzle.map(r=>r.map(v=>v!==0));
  selR=selC=-1;mistakes=0;document.getElementById('mistakes').textContent='0';
  document.getElementById('msg').textContent='';
  t0=Date.now();startTimer();render();
}

function startTimer(){if(timerId)clearInterval(timerId);timerId=setInterval(()=>{const s=Math.floor((Date.now()-t0)/1000);document.getElementById('timer').textContent=Math.floor(s/60)+':'+String(s%60).padStart(2,'0');},1000);}

function render(){
  const grid=document.getElementById('grid');grid.innerHTML='';
  for(let r=0;r<9;r++)for(let c=0;c<9;c++){
    const cell=document.createElement('div');
    cell.className='cell';
    if(given[r][c])cell.classList.add('given');
    if(selR===r&&selC===c)cell.classList.add('sel');
    else if(selR>=0&&(selR===r||selC===c||(Math.floor(selR/3)===Math.floor(r/3)&&Math.floor(selC/3)===Math.floor(c/3))))cell.classList.add('hi');
    else if(selR>=0&&puzzle[selR][selC]&&puzzle[r][c]===puzzle[selR][selC])cell.classList.add('hi');
    cell.textContent=puzzle[r][c]||'';
    if(!given[r][c]&&puzzle[r][c]&&puzzle[r][c]!==solution[r][c])cell.classList.add('err');
    cell.onclick=()=>{if(given[r][c])return;selR=r;selC=c;render();};
    if(r%3===2&&r<8)cell.style.borderBottom='2px solid #333';
    if(c%3===2&&c<8)cell.style.borderRight='2px solid #333';
    grid.appendChild(cell);
  }
}

function inputNum(n){
  if(selR<0||selC<0)return;
  if(given[selR][selC])return;
  puzzle[selR][selC]=n;
  if(n!==0&&n!==solution[selR][selC]){mistakes++;document.getElementById('mistakes').textContent=mistakes;}
  render();
  checkWin();
}

function checkWin(){
  for(let r=0;r<9;r++)for(let c=0;c<9;c++){if(puzzle[r][c]!==solution[r][c])return false;}
  clearInterval(timerId);
  document.getElementById('msg').textContent='Solved! 🎉';
  return true;
}

function checkAll(){
  let ok=true;
  for(let r=0;r<9;r++)for(let c=0;c<9;c++){if(!given[r][c]&&puzzle[r][c]&&puzzle[r][c]!==solution[r][c])ok=false;}
  document.getElementById('msg').textContent=ok?'No errors so far!':'There are mistakes.';

}

function hint(){
  if(selR<0||selC<0){document.getElementById('msg').textContent='Select a cell first.';return;}
  if(given[selR][selC]){document.getElementById('msg').textContent='That cell is already given.';return;}
  puzzle[selR][selC]=solution[selR][selC];render();checkWin();
}

function solveAll(){
  for(let r=0;r<9;r++)for(let c=0;c<9;c++){puzzle[r][c]=solution[r][c];}
  clearInterval(timerId);render();document.getElementById('msg').textContent='Puzzle solved (no score).';
}

document.addEventListener('keydown',e=>{
  if(selR<0)return;
  if(e.key>='1'&&e.key<='9'){inputNum(parseInt(e.key));}
  else if(e.key==='Backspace'||e.key==='Delete'||e.key==='0'){inputNum(0);}
  else if(e.key==='ArrowUp'&&selR>0){selR--;render();}
  else if(e.key==='ArrowDown'&&selR<8){selR++;render();}
  else if(e.key==='ArrowLeft'&&selC>0){selC--;render();}
  else if(e.key==='ArrowRight'&&selC<8){selC++;render();}
});

const np=document.getElementById('npad');
for(let i=1;i<=9;i++){const b=document.createElement('button');b.textContent=i;b.onclick=()=>inputNum(i);np.appendChild(b);}
const clr=document.createElement('button');clr.textContent='✕';clr.onclick=()=>inputNum(0);np.appendChild(clr);

newPuzzle();
</script>
</body>
</html>
