<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="/assets/theme-init.js"></script>
<title>Fidget Spinner — Virtual Tools</title>
<link rel="stylesheet" href="/assets/style.css">
<style>
.tool-wrap{max-width:500px;margin:0 auto;text-align:center;}
.tool-desc{font-size:14px;color:var(--text-secondary,#aaa);margin:8px 0;}
#spinner-wrap{margin:30px auto;width:300px;height:300px;position:relative;cursor:pointer;user-select:none;}
#spinner{width:100%;height:100%;transition:none;}
.spinner-arm{fill:var(--accent,#5b8def);}
.spinner-circle{fill:#333;stroke:#555;stroke-width:2;}
.spinner-center{fill:#f1c40f;stroke:#e67e22;stroke-width:3;}
.stats{display:flex;justify-content:space-around;margin:8px 0;font-size:18px;}
.stats span{color:var(--accent,#5b8def);font-weight:700;}
#msg{font-size:16px;font-weight:600;margin:8px 0;min-height:24px;color:#f1c40f;}
.controls{margin:12px 0;display:flex;gap:8px;justify-content:center;flex-wrap:wrap;}
.controls button{padding:10px 24px;border-radius:6px;border:1px solid var(--border,#444);background:var(--bg-alt,#1a1f2e);color:var(--text,#eee);cursor:pointer;font-size:14px;}
.controls button:hover{background:var(--accent,#5b8def);color:#fff;}
.style-pick{display:flex;gap:8px;justify-content:center;margin:8px 0;}
.style-pick button{width:36px;height:36px;border-radius:50%;border:2px solid #555;cursor:pointer;}
.style-pick button.active{border-color:#fff;box-shadow:0 0 6px #fff;}
</style>
</head>
<body>
<header id="site-header"></header>
<main>
<div class="tool-wrap">
<h1>Fidget Spinner 🌀</h1>
<p class="tool-desc">Click and drag (or swipe) to spin! The faster you flick, the faster it spins. Click the spinner to give it a boost.</p>
<div class="stats">Speed: <span id="speed">0</span> RPM | Total Spins: <span id="total">0</span></div>
<div id="spinner-wrap" onmousedown="startDrag(event)" ontouchstart="startDrag(event)">
<svg id="spinner" viewBox="0 0 200 200">
<g id="spinner-group" transform="rotate(0 100 100)">
<circle class="spinner-circle" cx="100" cy="100" r="15"/>
<path class="spinner-arm" d="M100,100 L100,20 A20,20 0 0,1 120,40 L115,95 Z"/>
<path class="spinner-arm" d="M100,100 L170,145 A20,20 0 0,1 150,165 L108,108 Z"/>
<path class="spinner-arm" d="M100,100 L30,145 A20,20 0 0,1 50,165 L92,108 Z"/>
<circle class="spinner-center" cx="100" cy="100" r="12"/>
</g>
</svg>
</div>
<div id="msg">Click or swipe the spinner to spin it!</div>
<div class="controls">
<button onclick="boost()">⚡ Boost</button>
<button onclick="reset()">🔄 Reset</button>
</div>
<div class="style-pick">
<button style="background:#5b8def" class="active" onclick="pickStyle(this,'#5b8def')"></button>
<button style="background:#e74c3c" onclick="pickStyle(this,'#e74c3c')"></button>
<button style="background:#2ecc71" onclick="pickStyle(this,'#2ecc71')"></button>
<button style="background:#f39c12" onclick="pickStyle(this,'#f39c12')"></button>
<button style="background:#9b59b6" onclick="pickStyle(this,'#9b59b6')"></button>
</div>
</div>
</main>
<script src="/assets/app.js"></script>
<script>
let angle=0,speed=0,dragging=false,lastAngle=0,lastTime=0,totalSpins=0,armColor='#5b8def',raf=null;
const svg=document.getElementById('spinner');
const group=document.getElementById('spinner-group');
const wrap=document.getElementById('spinner-wrap');
function getAngle(e){
const rect=wrap.getBoundingClientRect();
const cx=rect.left+rect.width/2,cy=rect.top+rect.height/2;
const x=(e.touches?e.touches[0].clientX:e.clientX)-cx;
const y=(e.touches?e.touches[0].clientY:e.clientY)-cy;
return Math.atan2(y,x)*180/Math.PI;
}
function startDrag(e){
e.preventDefault();dragging=true;lastAngle=getAngle(e);lastTime=Date.now();
if(raf)cancelAnimationFrame(raf);
document.addEventListener('mousemove',onDrag);
document.addEventListener('mouseup',endDrag);
document.addEventListener('touchmove',onDrag);
document.addEventListener('touchend',endDrag);
}
function onDrag(e){
if(!dragging)return;e.preventDefault();
const a=getAngle(e);const now=Date.now();
let delta=a-lastAngle;
while(delta>180)delta-=360;while(delta<-180)delta+=360;
const dt=Math.max(1,now-lastTime);
speed=delta/dt*1000/6;
angle+=delta;lastAngle=a;lastTime=now;
render();
}
function endDrag(){
if(!dragging)return;dragging=false;
document.removeEventListener('mousemove',onDrag);
document.removeEventListener('mouseup',endDrag);
document.removeEventListener('touchmove',onDrag);
document.removeEventListener('touchend',endDrag);
animate();
}
function animate(){
if(Math.abs(speed)<0.1){speed=0;render();return;}
angle+=speed*0.016;speed*=0.99;
const fullTurns=Math.floor(Math.abs(angle)/360);
if(fullTurns>0){totalSpins+=fullTurns;angle%=360;}
render();raf=requestAnimationFrame(animate);
}
function boost(){speed+=50;if(!dragging&&!raf)animate();}
function reset(){speed=0;angle=0;totalSpins=0;if(raf){cancelAnimationFrame(raf);raf=null;}render();}
function pickStyle(btn,color){
document.querySelectorAll('.style-pick button').forEach(b=>b.classList.remove('active'));
btn.classList.add('active');armColor=color;
document.querySelectorAll('.spinner-arm').forEach(a=>a.setAttribute('fill',color));
}
function render(){
group.setAttribute('transform','rotate('+angle+' 100 100)');
document.getElementById('speed').textContent=Math.round(Math.abs(speed));
document.getElementById('total').textContent=totalSpins;
}
wrap.addEventListener('click',function(){if(!dragging&&speed===0)boost();});
render();
</script>
</body>
</html>
