<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="/assets/theme-init.js"></script>
<title>Diary — Virtual Tools</title>
<link rel="stylesheet" href="/assets/style.css">
<style>
.tool-wrap{max-width:700px;margin:0 auto;}
.tool-desc{font-size:14px;color:var(--text-secondary,#aaa);margin:8px 0 20px;}
.layout{display:grid;grid-template-columns:200px 1fr;gap:16px;}
.sidebar{border-right:1px solid var(--border,#3a3f4e);padding-right:12px;}
.sidebar h3{font-size:14px;margin:0 0 8px;color:var(--text-secondary,#888);}
.entry-list{max-height:500px;overflow-y:auto;}
.entry-item{padding:8px 10px;border-radius:6px;cursor:pointer;font-size:13px;margin-bottom:4px;}
.entry-item:hover{background:var(--card,#2a2f3e);}
.entry-item.active{background:var(--accent,#5b8def);color:#fff;}
.entry-item small{display:block;color:var(--text-secondary,#666);font-size:11px;}
.entry-item.active small{color:#ddd;}
.main-area{display:flex;flex-direction:column;gap:12px;}
.entry-header{display:flex;justify-content:space-between;align-items:center;}
.entry-header input[type=date]{padding:6px 10px;border-radius:6px;border:1px solid var(--border,#444);background:var(--card,#2a2f3e);color:var(--text,#eee);font-size:14px;}
.entry-header .mood{display:flex;gap:4px;}
.mood-btn{font-size:20px;cursor:pointer;opacity:0.4;border:none;background:none;}
.mood-btn.active{opacity:1;}
.editor{width:100%;min-height:300px;padding:12px;border-radius:8px;border:1px solid var(--border,#444);background:var(--card,#2a2f3e);color:var(--text,#eee);font-size:14px;font-family:inherit;resize:vertical;box-sizing:border-box;}
.editor:focus{outline:none;border-color:var(--accent,#5b8def);}
.btn{padding:8px 16px;border-radius:6px;border:none;background:var(--accent,#5b8def);color:#fff;cursor:pointer;font-size:13px;}
.btn:hover{opacity:0.9;}
.btn-ghost{background:transparent;border:1px solid var(--border,#444);color:var(--text,#eee);}
.btn-danger{background:#c53030;}
.search-row{display:flex;gap:8px;margin-bottom:12px;}
.search-row input{flex:1;padding:6px 10px;border-radius:6px;border:1px solid var(--border,#444);background:var(--card,#2a2f3e);color:var(--text,#eee);font-size:13px;}
.word-count{font-size:12px;color:var(--text-secondary,#666);text-align:right;}
.empty{color:var(--text-secondary,#666);text-align:center;padding:40px;}
@media(max-width:600px){.layout{grid-template-columns:1fr;}.sidebar{border-right:none;border-bottom:1px solid var(--border,#3a3f4e);padding:0 0 8px;}}
</style>
</head>
<body>
<header id="site-header"></header>
<main>
<div class="tool-wrap">
<h1>📔 Diary</h1>
<p class="tool-desc">Private daily journal. Write entries by date, set mood, search past entries. Everything stays in your browser.</p>
<div class="search-row">
<input type="text" id="searchBox" placeholder="🔍 Search entries..." oninput="renderList()">
</div>
<div class="layout">
<div class="sidebar">
<h3>Entries (<span id="entryCount">0</span>)</h3>
<button class="btn btn-ghost" style="width:100%;margin-bottom:8px;" onclick="newEntry()">+ New Entry</button>
<div class="entry-list" id="entryList"></div>
</div>
<div class="main-area" id="mainArea">
<div class="entry-header">
<input type="date" id="entryDate" onchange="updateDate()">
<div class="mood" id="moodPicker">
<span class="mood-btn" data-mood="😄" onclick="setMood('😄')">😄</span>
<span class="mood-btn" data-mood="🙂" onclick="setMood('🙂')">🙂</span>
<span class="mood-btn" data-mood="😐" onclick="setMood('😐')">😐</span>
<span class="mood-btn" data-mood="😢" onclick="setMood('😢')">😢</span>
<span class="mood-btn" data-mood="😡" onclick="setMood('😡')">😡</span>
<span class="mood-btn" data-mood="😴" onclick="setMood('😴')">😴</span>
</div>
</div>
<textarea class="editor" id="editor" placeholder="Write about your day..." oninput="saveCurrent()"></textarea>
<div style="display:flex;justify-content:space-between;align-items:center;">
<span class="word-count" id="wordCount">0 words</span>
<button class="btn btn-danger" onclick="deleteCurrent()">Delete Entry</button>
</div>
</div>
</div>
</div>
</main>
<script src="/assets/app.js"></script>
<script>
let entries={},currentId=null,dirty=false;
function load(){try{entries=JSON.parse(localStorage.getItem('diary')||'{}');}catch(e){entries={};}}
function save(){localStorage.setItem('diary',JSON.stringify(entries));}
function todayStr(){const d=new Date();return d.toISOString().slice(0,10);}
function newEntry(){const id='e'+Date.now();entries[id]={date:todayStr(),mood:'',text:''};currentId=id;save();renderList();loadEntry();}
function loadEntry(){if(!currentId||!entries[currentId]){document.getElementById('mainArea').style.display='none';return;}document.getElementById('mainArea').style.display='flex';const e=entries[currentId];document.getElementById('entryDate').value=e.date;document.getElementById('editor').value=e.text||'';document.querySelectorAll('.mood-btn').forEach(b=>{b.classList.toggle('active',b.dataset.mood===e.mood);});updateWordCount();}
function updateDate(){if(currentId&&entries[currentId]){entries[currentId].date=document.getElementById('entryDate').value;save();renderList();}}
function setMood(m){if(currentId&&entries[currentId]){entries[currentId].mood=m;document.querySelectorAll('.mood-btn').forEach(b=>{b.classList.toggle('active',b.dataset.mood===m);});save();renderList();}}
function saveCurrent(){if(currentId&&entries[currentId]){entries[currentId].text=document.getElementById('editor').value;updateWordCount();save();}}
function deleteCurrent(){if(!currentId||!entries[currentId])return;if(confirm('Delete this entry?')){delete entries[currentId];save();currentId=null;renderList();loadEntry();}}
function updateWordCount(){const t=document.getElementById('editor').value.trim();const c=t?t.split(/\s+/).length:0;document.getElementById('wordCount').textContent=c+' words';}
function renderList(){const search=document.getElementById('searchBox').value.toLowerCase();let ids=Object.keys(entries);if(search)ids=ids.filter(id=>{const e=entries[id];return(e.text||'').toLowerCase().includes(search)||(e.date||'').includes(search);});ids.sort((a,b)=>entries[b].date.localeCompare(entries[a].date));document.getElementById('entryCount').textContent=Object.keys(entries).length;let html='';ids.forEach(id=>{const e=entries[id];const d=new Date(e.date+'T00:00');const label=d.toLocaleDateString([], {month:'short',day:'numeric',year:'numeric'});const preview=(e.text||'').slice(0,40);html+=`<div class="entry-item ${id===currentId?'active':''}" onclick="selectEntry('${id}')">${e.mood||'📝'} ${label}<small>${preview}${preview.length>=40?'...':''}</small></div>`;});document.getElementById('entryList').innerHTML=html||'<div class="empty">No entries yet</div>';}
function selectEntry(id){currentId=id;renderList();loadEntry();}
load();renderList();if(Object.keys(entries).length===0){newEntry();}else{const latest=Object.keys(entries).sort((a,b)=>entries[b].date.localeCompare(entries[a].date))[0];selectEntry(latest);}
</script>
</body>
</html>
