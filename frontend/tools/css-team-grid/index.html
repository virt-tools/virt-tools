<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CSS Team Grid Generator — virt.tools</title>
<link rel="stylesheet" href="/assets/style.css">
<style>
.tool-area{max-width:900px;margin:2rem auto;padding:0 1rem}
.controls{display:grid;gap:1rem;margin:1.5rem 0;padding:1.5rem;background:#1a1a2e;border-radius:12px}
.control-row{display:flex;gap:1rem;align-items:center;flex-wrap:wrap}
.control-row label{min-width:100px;font-weight:600;font-size:.9rem}
.control-row select,.control-row input{padding:.5rem .75rem;border-radius:8px;border:1px solid #444;background:#0f0f1e;color:#eee;font-size:.9rem}
.preview-box{margin:1.5rem 0;border-radius:12px;min-height:300px;overflow-y:auto;max-height:500px}
.output-block{margin:2rem 0}
.output-block textarea{width:100%;min-height:120px;font-family:monospace;font-size:.85rem;padding:1rem;border-radius:8px;border:1px solid #444;background:#0f0f1e;color:#eee;resize:vertical}
.copy-btn{padding:.6rem 1.2rem;border:none;border-radius:8px;background:#667eea;color:#fff;cursor:pointer;font-size:.9rem;margin-top:.5rem}
h2{margin-top:2rem;font-size:1.2rem}
</style>
</head>
<body>
<header id="site-header"></header>
<main>
<div class="tool-area">
<h1>👥 CSS Team Grid Generator</h1>
<p>Create CSS team member grid card components. 3 styles, 3-8 members, social icons. Copy HTML+CSS.</p>
<div class="controls">
<div class="control-row">
<label>Style</label><select id="style"><option value="card" selected>Card</option><option value="minimal">Minimal</option><option value="overlay">Overlay</option></select>
<label>Members</label><select id="members"><option value="3">3</option><option value="4" selected>4</option><option value="6">6</option><option value="8">8</option></select>
<label>Columns</label><select id="cols"><option value="2">2</option><option value="3" selected>3</option><option value="4">4</option></select>
<label>Theme</label><select id="theme"><option value="light" selected>Light</option><option value="dark">Dark</option><option value="gradient">Gradient</option></select>
<label>Accent</label><input type="color" id="accent" value="#667eea">
<label>Radius</label><input type="range" id="radius" min="0" max="24" value="12" style="width:80px">
</div>
</div>
<h2>Preview</h2>
<div class="preview-box" id="preview"></div>
<h2>HTML</h2><div class="output-block"><textarea id="htmlOut" readonly></textarea><button class="copy-btn" onclick="copyText('htmlOut')">Copy HTML</button></div>
<h2>CSS</h2><div class="output-block"><textarea id="cssOut" readonly></textarea><button class="copy-btn" onclick="copyText('cssOut')">Copy CSS</button></div>
</div>
</main>
<script src="/assets/app.js"></script>
<script>
var names=['Alex Chen','Maria Garcia','Jordan Kim','Sam Patel','Riley Quinn','Taylor Swift','Casey Brooks','Morgan Lee'];
var roles=['CEO & Founder','CTO','Lead Designer','Senior Dev','Product Manager','Marketing Lead','DevOps Engineer','UX Researcher'];
function initials(n){var p=n.split(' ');return p[0][0]+p[1][0];}
function update(){
var style=document.getElementById('style').value,theme=document.getElementById('theme').value;
var accent=document.getElementById('accent').value,n=parseInt(document.getElementById('members').value);
var cols=parseInt(document.getElementById('cols').value),r=document.getElementById('radius').value;
var bg=theme==='dark'?'#1a1a2e':theme==='gradient'?'#667eea':'#fff';
var fg=theme==='dark'?'#e0e0e0':theme==='gradient'?'#fff':'#333';
var cardBg=theme==='dark'?'#222244':theme==='gradient'?'rgba(255,255,255,.15)':'#f8f8f8';
var html='<div class="team-grid" style="--tg-cols:'+cols+';--tg-ac:'+accent+';--tg-radius:'+r+'px;--tg-bg:'+bg+';--tg-fg:'+fg+';--tg-card:'+cardBg+'">\n';
for(var i=0;i<n;i++){
html+='  <div class="team-card team-'+style+'">\n    <div class="team-avatar">'+initials(names[i])+'</div>\n    <h3 class="team-name">'+names[i]+'</h3>\n    <p class="team-role">'+roles[i]+'</p>\n    <div class="team-social">\n      <a href="#" data-net="tw">𝕏</a>\n      <a href="#" data-net="in">in</a>\n      <a href="#" data-net="gh">gh</a>\n    </div>\n  </div>\n';
}
html+='</div>';
var css='.team-grid{display:grid;grid-template-columns:repeat(var(--tg-cols),1fr);gap:1.5rem;padding:2rem;background:var(--tg-bg);color:var(--tg-fg);border-radius:var(--tg-radius)}';
css+='\n.team-card{text-align:center;padding:2rem 1rem;background:var(--tg-card);border-radius:var(--tg-radius);transition:transform .2s}';
css+='\n.team-card:hover{transform:translateY(-4px)}';
css+='\n.team-avatar{width:72px;height:72px;border-radius:50%;background:var(--tg-ac);color:#fff;display:flex;align-items:center;justify-content:center;font-size:1.5rem;font-weight:700;margin:0 auto 1rem}';
css+='\n.team-name{margin:0;font-size:1.05rem}';
css+='\n.team-role{margin:.25rem 0 .75rem;font-size:.85rem;opacity:.7}';
css+='\n.team-social{display:flex;gap:.5rem;justify-content:center}';
css+='\n.team-social a{width:28px;height:28px;border-radius:6px;background:var(--tg-ac);color:#fff;text-decoration:none;font-size:.7rem;display:flex;align-items:center;justify-content:center}';
css+='\n.team-social a:hover{opacity:.8}';
if(style==='minimal'){css+='\n.team-minimal{background:none;box-shadow:none}';}
if(style==='overlay'){css+='\n.team-overlay{position:relative;overflow:hidden;min-height:200px}\n.team-overlay .team-avatar{position:absolute;top:50%;left:50%;transform:translate(-50%,-120%);opacity:0;transition:all .3s}\n.team-overlay:hover .team-avatar{opacity:1;transform:translate(-50%,-50%)}\n.team-overlay .team-name,.team-overlay .team-role,.team-overlay .team-social{position:relative;z-index:1}';}
document.getElementById('htmlOut').value=html;
document.getElementById('cssOut').value=css;
document.getElementById('preview').innerHTML='<style>'+css+'<\/style>'+html;
}
function copyText(id){var t=document.getElementById(id);t.select();document.execCommand('copy')}
document.querySelectorAll('select,input').forEach(function(e){e.addEventListener('input',update);e.addEventListener('change',update)});
update();
</script>
</body>
</html>
