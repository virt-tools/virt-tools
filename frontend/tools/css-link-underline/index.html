<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CSS Animated Link Underline Generator — virt.tools</title>
<link rel="stylesheet" href="/assets/style.css">
<style>
.tool-area{max-width:800px;margin:2rem auto;padding:0 1rem}
.controls{display:grid;gap:.8rem;margin:1.5rem 0;padding:1.5rem;background:#1a1a2e;border-radius:12px}
.ctrl-row{display:flex;gap:1rem;align-items:center;flex-wrap:wrap}
.ctrl-row label{font-weight:600;font-size:.9rem;min-width:120px}
.ctrl-row select,.ctrl-row input{padding:.5rem;border-radius:8px;border:1px solid #444;background:#0f0f1e;color:#eee}
.preview-box{margin:1.5rem 0;padding:2rem;background:#0a0a12;border-radius:12px;text-align:center}
.preview-box a{font-size:1.6rem;margin:1rem;display:inline-block;text-decoration:none;color:#667eea}
.output-block{margin:1.5rem 0}
.output-block textarea{width:100%;min-height:100px;font-family:monospace;font-size:.85rem;padding:1rem;border-radius:8px;border:1px solid #444;background:#0f0f1e;color:#eee;resize:vertical}
.copy-btn{padding:.6rem 1.2rem;border:none;border-radius:8px;background:#667eea;color:#fff;cursor:pointer;font-size:.9rem;margin-top:.5rem}
h2{margin-top:2rem;font-size:1.2rem}
</style>
</head>
<body>
<header id="site-header"></header>
<main>
<div class="tool-area">
<h1>🔗 CSS Animated Link Underline Generator</h1>
<p>Create CSS animated link hover underline effects. 8 styles, adjustable color/thickness. Copy HTML+CSS.</p>
<div class="controls">
<div class="ctrl-row"><label>Style</label><select id="style">
<option value="grow" selected>Grow from center</option>
<option value="sweep">Sweep from left</option>
<option value="sweep-rev">Sweep from right</option>
<option value="double">Double from center</option>
<option value="gradient">Gradient</option>
<option value="dotted">Dotted</option>
<option value="thick">Thick reveal</option>
<option value="wave">Wavy</option>
</select></div>
<div class="ctrl-row"><label>Thickness (px)</label><input type="number" id="thick" value="2" min="1" max="8" style="width:80px"></div>
<div class="ctrl-row"><label>Color</label><input type="color" id="color" value="#667eea" style="width:60px;height:36px"></div>
<div class="ctrl-row"><label>Duration (s)</label><input type="number" id="dur" value="0.3" min="0.1" max="2" step="0.1" style="width:80px"></div>
<div class="ctrl-row"><label>Link text</label><input type="text" id="text" value="Hover over this link" style="width:200px"></div>
<div class="ctrl-row"><button class="copy-btn" onclick="update()">Update</button></div>
</div>
<h2>Preview (hover links)</h2>
<div class="preview-box" id="preview"></div>
<h2>CSS</h2><div class="output-block"><textarea id="cssOut" readonly></textarea><button class="copy-btn" onclick="copyText('cssOut')">Copy CSS</button></div>
<h2>HTML</h2><div class="output-block"><textarea id="htmlOut" readonly></textarea><button class="copy-btn" onclick="copyText('htmlOut')">Copy HTML</button></div>
</div>
</main>
<script src="/assets/app.js"></script>
<script>
function update(){
var s=document.getElementById('style').value;
var t=document.getElementById('thick').value;
var c=document.getElementById('color').value;
var d=parseFloat(document.getElementById('dur').value);
var txt=document.getElementById('text').value;
var css='',cls='link-'+s;
if(s==='grow'||s==='sweep'||s==='sweep-rev'){
var tx=s==='grow'?'scaleX(0)':s==='sweep'?'scaleX(0)':'scaleX(0)';
var orig=s==='grow'?'center left':'sweep'?'left center':'right center';
css='.lnk{position:relative;text-decoration:none;color:'+c+';font-size:1.6rem}\n'+
'.lnk::after{content:"";position:absolute;bottom:0;left:0;right:0;height:'+t+'px;background:'+c+';transform:'+tx+';transform-origin:'+orig+';transition:transform '+d+'s ease}\n'+
'.lnk:hover::after{transform:scaleX(1)}';
}else if(s==='double'){
css='.lnk{position:relative;text-decoration:none;color:'+c+';font-size:1.6rem}\n'+
'.lnk::after{content:"";position:absolute;bottom:0;left:50%;width:0;height:'+t+'px;background:'+c+';transition:width '+d+'s ease,left '+d+'s ease}\n'+
'.lnk:hover::after{width:100%;left:0}';
}else if(s==='gradient'){
css='.lnk{position:relative;text-decoration:none;color:'+c+';font-size:1.6rem}\n'+
'.lnk::after{content:"";position:absolute;bottom:0;left:0;right:0;height:'+t+'px;background:linear-gradient(90deg,'+c+',#fff,'+c+');transform:scaleX(0);transition:transform '+d+'s ease}\n'+
'.lnk:hover::after{transform:scaleX(1)}';
}else if(s==='dotted'){
css='.lnk{text-decoration:none;color:'+c+';font-size:1.6rem;border-bottom:'+t+'px dotted '+c+';opacity:.7;transition:opacity '+d+'s}\n'+
'.lnk:hover{opacity:1}';
}else if(s==='thick'){
css='.lnk{text-decoration:none;color:'+c+';font-size:1.6rem;border-bottom:'+t+'px solid '+c+';transition:border-width '+d+'s,padding-bottom '+d+'s}\n'+
'.lnk:hover{border-width:'+(parseInt(t)+4)+'px;padding-bottom:4px}';
}else if(s==='wave'){
css='.lnk{text-decoration:underline wavy '+c+';color:'+c+';font-size:1.6rem;text-underline-offset:4px;transition:text-decoration-color '+d+'s}\n'+
'.lnk:hover{text-decoration-color:#fff}';
}
var html='<a class="lnk" href="#">'+txt+'</a>';
document.getElementById('cssOut').value=css;
document.getElementById('htmlOut').value=html;
document.getElementById('preview').innerHTML='<style>'+css.replace(/\.lnk/g,'.lnk-demo')+'</style>'+html.replace('class="lnk"','class="lnk-demo"')+'<br>'+html.replace('class="lnk"','class="lnk-demo"')+'<br>'+html.replace('class="lnk"','class="lnk-demo"');
}
function copyText(id){var t=document.getElementById(id);t.select();document.execCommand('copy')}
['style','thick','color','dur','text'].forEach(function(id){var el=document.getElementById(id);el.addEventListener('input',update);el.addEventListener('change',update)});
update();
</script>
</body>
</html>
