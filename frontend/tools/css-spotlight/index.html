<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CSS Spotlight Effect Generator — virt.tools</title>
<link rel="stylesheet" href="/assets/style.css">
<style>
.tool-area{max-width:900px;margin:2rem auto;padding:0 1rem}
.controls{display:grid;gap:1rem;margin:1.5rem 0;padding:1.5rem;background:#1a1a2e;border-radius:12px}
.control-row{display:flex;gap:1rem;align-items:center;flex-wrap:wrap}
.control-row label{min-width:140px;font-weight:600;font-size:.9rem}
.control-row select,.control-row input{padding:.5rem .75rem;border-radius:8px;border:1px solid #444;background:#0f0f1e;color:#eee;font-size:.9rem}
.preview-box{margin:1.5rem 0;padding:3rem 2rem;background:#0a0a14;border-radius:12px;display:flex;justify-content:center;align-items:center;min-height:200px;gap:2rem;flex-wrap:wrap}
.output-block{margin:2rem 0}
.output-block textarea{width:100%;min-height:100px;font-family:monospace;font-size:.85rem;padding:1rem;border-radius:8px;border:1px solid #444;background:#0f0f1e;color:#eee;resize:vertical}
.copy-btn{padding:.6rem 1.2rem;border:none;border-radius:8px;background:#667eea;color:#fff;cursor:pointer;font-size:.9rem;margin-top:.5rem}
h2{margin-top:2rem;font-size:1.2rem}
</style>
</head>
<body>
<header id="site-header"></header>
<main>
<div class="tool-area">
<h1>🔦 CSS Spotlight Effect Generator</h1>
<p>Create CSS spotlight and attention-grabbing effects. Mouse-follow spotlight, pulsing attention, and glow highlight. Copy HTML+CSS.</p>
<div class="controls">
<div class="control-row">
<label>Effect Type</label><select id="effectType"><option value="mouse-spotlight">Mouse Spotlight</option><option value="pulse-attention">Pulse Attention</option><option value="glow-highlight">Glow Highlight</option><option value="dim-others">Dim Others</option></select>
</div>
<div class="control-row">
<label>Spotlight Color</label><input type="color" id="spotColor" value="#667eea">
<label>Spotlight Size (px)</label><input type="number" id="spotSize" value="200" min="50" max="500" style="width:70px">
<label>Blur (px)</label><input type="number" id="blur" value="40" min="0" max="100" style="width:70px">
</div>
<div class="control-row">
<label>Background</label><input type="color" id="bgColor" value="#0a0a14">
<label>Content</label><input type="text" id="content" value="Hover Me" style="width:120px">
<label>Radius (px)</label><input type="number" id="radius" value="12" min="0" max="50" style="width:60px">
</div>
</div>
<h2>Preview</h2>
<div class="preview-box" id="preview"></div>
<h2>HTML</h2><div class="output-block"><textarea id="htmlOut" readonly></textarea><button class="copy-btn" onclick="copyText('htmlOut')">Copy HTML</button></div>
<h2>CSS</h2><div class="output-block"><textarea id="cssOut" readonly></textarea><button class="copy-btn" onclick="copyText('cssOut')">Copy CSS</button></div>
</div>
</main>
<script src="/assets/app.js"></script>
<script>
function update(){
var et=document.getElementById('effectType').value;
var sc=document.getElementById('spotColor').value;
var ss=parseInt(document.getElementById('spotSize').value);
var bl=parseInt(document.getElementById('blur').value);
var bg=document.getElementById('bgColor').value;
var ct=document.getElementById('content').value;
var rad=parseInt(document.getElementById('radius').value);
var html='',css='';
if(et==='mouse-spotlight'){
html='<div class="spotlight-card" onmousemove="this.style.setProperty(\'--mx\',event.offsetX+\'px\');this.style.setProperty(\'--my\',event.offsetY+\'px\')">'+ct+'</div>';
css='.spotlight-card{position:relative;padding:2rem 3rem;border-radius:'+rad+'px;background:'+bg+';color:#fff;cursor:pointer;overflow:hidden}\n.spotlight-card::before{content:"";position:absolute;inset:0;background:radial-gradient(circle at var(--mx,50%) var(--my,50%),'+sc+'88 0,transparent '+ss+'px);opacity:0;transition:opacity .3s}\n.spotlight-card:hover::before{opacity:1}\n.spotlight-card>*{position:relative;z-index:1}';
}else if(et==='pulse-attention'){
html='<div class="pulse-card">'+ct+'</div>';
css='.pulse-card{padding:1.5rem 3rem;border-radius:'+rad+'px;background:'+bg+';color:#fff;position:relative}\n.pulse-card::before,.pulse-card::after{content:"";position:absolute;inset:0;border-radius:'+rad+'px;border:2px solid '+sc+';animation:pulse-ring 2s infinite}\n.pulse-card::after{animation-delay:1s}\n@keyframes pulse-ring{0%{transform:scale(1);opacity:1}100%{transform:scale(1.5);opacity:0}}';
}else if(et==='glow-highlight'){
html='<div class="glow-card">'+ct+'</div>';
css='.glow-card{padding:1.5rem 3rem;border-radius:'+rad+'px;background:'+bg+';color:#fff;box-shadow:0 0 '+bl+'px '+sc+'44;transition:box-shadow .3s}\n.glow-card:hover{box-shadow:0 0 '+(bl*2)+'px '+sc+'aa}';
}else if(et==='dim-others'){
html='<div class="dim-group"><div class="dim-item">'+ct+'</div><div class="dim-item">Other</div><div class="dim-item">Other</div></div>';
css='.dim-group{display:flex;gap:1rem}\n.dim-item{padding:1.5rem 2rem;border-radius:'+rad+'px;background:'+bg+';color:#fff;transition:opacity .3s,transform .3s}\n.dim-group:hover .dim-item{opacity:.3}\n.dim-group .dim-item:hover{opacity:1;transform:scale(1.05);box-shadow:0 0 '+bl+'px '+sc+'66}';
}
document.getElementById('preview').innerHTML=html;
document.getElementById('htmlOut').value=html;
document.getElementById('cssOut').value=css;
}
function copyText(id){var t=document.getElementById(id);t.select();document.execCommand('copy')}
document.querySelectorAll('select,input').forEach(function(e){e.addEventListener('input',update);e.addEventListener('change',update)});
update();
</script>
</body>
</html>
