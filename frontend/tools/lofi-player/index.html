<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="/assets/theme-init.js"></script>
<title>Lo-Fi Player — Virtual Tools</title>
<link rel="stylesheet" href="/assets/style.css">
<style>
.tool-wrap{max-width:700px;margin:0 auto;}
.tool-desc{font-size:14px;color:var(--text-secondary,#aaa);margin:8px 0;}
.player{background:linear-gradient(135deg,#2a1f3d,#1a1f2e);border-radius:16px;padding:32px;margin:16px 0;text-align:center;}
.vinyl{width:180px;height:180px;margin:0 auto 16px;border-radius:50%;background:radial-gradient(circle,#333 28%,#111 28.5%,#333 29%,#1a1a1a 40%,#333 41%,#1a1a1a 60%,#333 61%,#1a1a1a 80%,#333 81%,#0a0a0a);position:relative;box-shadow:0 8px 32px rgba(0,0,0,0.5);transition:transform 0.3s;}
.vinyl.spinning{animation:spin 3s linear infinite;}
.vinyl::before{content:'';position:absolute;top:50%;left:50%;width:40px;height:40px;border-radius:50%;background:var(--accent,#5b8def);transform:translate(-50%,-50%);}
.vinyl::after{content:'';position:absolute;top:50%;left:50%;width:8px;height:8px;border-radius:50%;background:#000;transform:translate(-50%,-50%);z-index:1;}
@keyframes spin{to{transform:rotate(360deg);}}
.controls{display:flex;gap:12px;justify-content:center;align-items:center;margin:16px 0;}
button{padding:12px 24px;border-radius:8px;border:1px solid var(--border,#444);background:var(--accent,#5b8def);color:#fff;cursor:pointer;font-size:14px;}
button:hover{opacity:0.85;}
button.secondary{background:var(--bg-alt,#1a1f2e);color:var(--text,#eee);}
.play-btn{width:64px;height:64px;border-radius:50%;font-size:24px;padding:0;display:flex;align-items:center;justify-content:center;}
.tracks{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:8px;margin:16px 0;}
.track{padding:12px;border-radius:8px;background:var(--bg-alt,#1a1f2e);cursor:pointer;text-align:center;font-size:13px;border:2px solid transparent;}
.track.active{border-color:var(--accent,#5b8def);}
.track:hover{opacity:0.85;}
.track-name{font-weight:bold;margin-bottom:4px;}
.track-desc{font-size:11px;color:var(--text-secondary,#888);}
.vol{display:flex;align-items:center;gap:8px;margin:8px auto;justify-content:center;}
input[type=range]{width:120px;}
.now-playing{font-size:14px;color:var(--text,#eee);margin:8px 0;min-height:20px;}
.mood{display:flex;gap:8px;justify-content:center;margin:12px 0;flex-wrap:wrap;}
.mood button{padding:8px 16px;font-size:12px;}
</style>
</head>
<body>
<header id="site-header"></header>
<main>
<div class="tool-wrap">
<h1>Lo-Fi Player 🎵</h1>
<p class="tool-desc">Relaxing lo-fi beats generated entirely in your browser. Perfect for studying, working, or unwinding. No audio files — all synthesized live via Web Audio API.</p>
<div class="player">
<div class="vinyl" id="vinyl"></div>
<div class="now-playing" id="nowPlaying">Press play to start</div>
<div class="controls">
<button class="secondary" onclick="prevTrack()">⏮</button>
<button class="play-btn" id="playBtn" onclick="togglePlay()">▶</button>
<button class="secondary" onclick="nextTrack()">⏭</button>
</div>
<div class="vol">
<span style="font-size:13px;">🔊</span>
<input type="range" id="vol" min="0" max="100" value="40" oninput="setVol(this.value)">
<span style="font-size:12px;color:var(--text-secondary,#888);" id="volVal">40%</span>
</div>
</div>
<div class="mood">
<span style="font-size:12px;color:var(--text-secondary,#888);line-height:30px;">Mood:</span>
<button class="secondary" onclick="setMood('chill')">Chill</button>
<button class="secondary" onclick="setMood('sleepy')">Sleepy</button>
<button class="secondary" onclick="setMood('rainy')">Rainy</button>
<button class="secondary" onclick="setMood('upbeat')">Upbeat</button>
</div>
<div class="tracks" id="tracks"></div>
</div>
</main>
<script src="/assets/app.js"></script>
<script>
const TRACKS=[
{name:'Midnight Study',desc:'Slow jazz chords',chords:[['C3','E3','G3','B3'],['A2','C3','E3','G3'],['F2','A2','C3','E3'],['G2','B2','D3','F3']],bpm:72,drumPat:'lo',bassPat:[0,0,3,0,1,0,2,0]},
{name:'Coffee Shop',desc:'Warm vinyl',chords:[['F3','A3','C4','E4'],['D3','F3','A3','C4'],['Bb2','D3','F3','A3'],['C3','E3','G3','B3']],bpm:80,drumPat:'mid',bassPat:[0,0,4,0,3,0,2,0]},
{name:'Rainy Day',desc:'Minor melancholy',chords:[['A3','C4','E4','G4'],['F3','A3','C4','E4'],['C3','E3','G3','Bb3'],['G3','Bb3','D4','F4']],bpm:68,drumPat:'lo',bassPat:[0,0,5,0,3,0,1,0]},
{name:'Focus Flow',desc:'Steady groove',chords:[['E3','G3','B3','D4'],['C3','E3','G3','B3'],['A2','C3','E3','G3'],['B2','D3','F3','A3']],bpm:85,drumPat:'mid',bassPat:[0,2,0,4,0,1,0,3]},
{name:'Starlight',desc:'Dreamy ambient',chords:[['D3','F3','A3','C4'],['G2','B2','D3','F3'],['A2','C3','E3','G3'],['F2','A2','C3','E3']],bpm:65,drumPat:'lo',bassPat:[0,0,0,3,0,0,2,0]},
{name:'Tokyo Night',desc:'Neon synthwave',chords:[['F3','A3','C4','E4'],['C3','E3','G3','B3'],['D3','F3','A3','C4'],['Bb2','D3','F3','A3']],bpm:90,drumPat:'hi',bassPat:[0,0,5,0,1,0,3,0]},
{name:'Lazy Sunday',desc:'Soft & gentle',chords:[['C3','E3','G3','A3'],['G2','B2','D3','E3'],['A2','C3','E3','F3'],['F2','A2','C3','D3']],bpm:60,drumPat:'lo',bassPat:[0,0,0,2,0,0,1,0]},
{name:'Ocean Breeze',desc:'Calming waves',chords:[['E3','G3','B3','D4'],['C3','E3','G3','B3'],['A2','C3','E3','G3'],['B2','D3','F3','A3']],bpm:70,drumPat:'lo',bassPat:[0,0,3,0,0,2,0,1]}
];
const MOODS={chill:{bpm:75,filter:2000},sleepy:{bpm:60,filter:1500},rainy:{bpm:68,filter:1800},upbeat:{bpm:90,filter:3000}};
let ctx,master,gain,filter,trackIdx=0,playing=false,intervalId=null,step=0,mood='chill';
function ensure(){if(!ctx){ctx=new(window.AudioContext||window.webkitAudioContext)();master=ctx.createGain();master.gain.value=0.4;filter=ctx.createBiquadFilter();filter.type='lowpass';filter.frequency.value=2000;filter.connect(master);master.connect(ctx.destination);}}
function note(n,o=3){const C=['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];const i=C.indexOf(n.slice(0,-1));const oct=+n.slice(-1);return 440*Math.pow(2,(i-9)/12+(oct-4));}
function playTone(freq,dur,type='sine',vol=0.3){if(!ctx)return;const o=ctx.createOscillator();const g=ctx.createGain();o.type=type;o.frequency.value=freq;g.gain.setValueAtTime(0,ctx.currentTime);g.gain.linearRampToValueAtTime(vol,ctx.currentTime+0.02);g.gain.linearRampToValueAtTime(0,ctx.currentTime+dur);o.connect(g);g.connect(filter);o.start();o.stop(ctx.currentTime+dur);}
function kick(){if(!ctx)return;const o=ctx.createOscillator();const g=ctx.createGain();o.frequency.setValueAtTime(150,ctx.currentTime);o.frequency.exponentialRampToValueAtTime(50,ctx.currentTime+0.1);g.gain.setValueAtTime(0.3,ctx.currentTime);g.gain.exponentialRampToValueAtTime(0.01,ctx.currentTime+0.15);o.connect(g);g.connect(filter);o.start();o.stop(ctx.currentTime+0.15);}
function snare(){if(!ctx)return;const n=ctx.createBufferSource();const b=ctx.createBuffer(1,4410,44100);const d=b.getChannelData(0);for(let i=0;i<d.length;i++)d[i]=Math.random()*2-1;n.buffer=b;const g=ctx.createGain();g.gain.setValueAtTime(0.15,ctx.currentTime);g.gain.exponentialRampToValueAtTime(0.01,ctx.currentTime+0.1);n.connect(g);g.connect(filter);n.start();}
function hat(){if(!ctx)return;const n=ctx.createBufferSource();const b=ctx.createBuffer(1,2205,44100);const d=b.getChannelData(0);for(let i=0;i<d.length;i++)d[i]=Math.random()*2-1;n.buffer=b;const g=ctx.createGain();const f=ctx.createBiquadFilter();f.type='highpass';f.frequency.value=7000;g.gain.setValueAtTime(0.05,ctx.currentTime);g.gain.exponentialRampToValueAtTime(0.01,ctx.currentTime+0.05);n.connect(f);f.connect(g);g.connect(filter);n.start();}
function tick(){const t=TRACKS[trackIdx];const bpm=MOODS[mood].bpm||t.bpm;filter.frequency.value=MOODS[mood].filter;const dur=60/bpm/2;const chord=t.chords[Math.floor(step/4)%t.chords.length];if(step%4===0){chord.forEach(n=>playTone(note(n),dur*4,'sine',0.08));const bass=note(chord[0],2);playTone(bass,dur*2,'triangle',0.15);}const dp=t.drumPat;if(dp==='lo'){if(step%8===0)kick();if(step%16===4)snare();if(step%4===2&&Math.random()>0.3)hat();}else if(dp==='mid'){if(step%4===0)kick();if(step%8===4)snare();if(step%2===0)hat();}else{if(step%4===0||step%4===2)kick();if(step%4===2)snare();if(step%2===1)hat();}step++;}
function renderTracks(){const c=document.getElementById('tracks');c.innerHTML=TRACKS.map((t,i)=>`<div class="track${i===trackIdx?' active':''}" onclick="selectTrack(${i})"><div class="track-name">${t.name}</div><div class="track-desc">${t.desc}</div></div>`).join('');}
function selectTrack(i){trackIdx=i;renderTracks();if(playing){stop();start();}else{updateNP();}}
function start(){ensure();ctx.resume();playing=true;step=0;intervalId=setInterval(tick,(60000/MOODS[mood].bpm)/2);document.getElementById('vinyl').classList.add('spinning');document.getElementById('playBtn').textContent='⏸';updateNP();}
function stop(){playing=false;if(intervalId)clearInterval(intervalId);document.getElementById('vinyl').classList.remove('spinning');document.getElementById('playBtn').textContent='▶';document.getElementById('nowPlaying').textContent='Paused';}
function togglePlay(){playing?stop():start();}
function setVol(v){if(master)master.gain.value=v/100;document.getElementById('volVal').textContent=v+'%';}
function setMood(m){mood=m;if(playing){stop();start();}}
function nextTrack(){selectTrack((trackIdx+1)%TRACKS.length);}
function prevTrack(){selectTrack((trackIdx-1+TRACKS.length)%TRACKS.length);}
function updateNP(){document.getElementById('nowPlaying').textContent=playing?`Now playing: ${TRACKS[trackIdx].name}`:`Up next: ${TRACKS[trackIdx].name}`;}
renderTracks();
</script>
</body>
</html>
