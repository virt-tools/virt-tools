<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <script src="/assets/theme-init.js"></script>
  <title>HTTP Headers Reference — Virtual Tools</title>
  <link rel="stylesheet" href="/assets/style.css">
  <style>
    .hdr-table { width:100%; border-collapse:collapse; font-size:14px; }
    .hdr-table th, .hdr-table td { text-align:left; padding:6px 8px; border-bottom:1px solid var(--border,#2a2f3a); vertical-align:top; }
    .hdr-table th { font-weight:600; opacity:.7; }
    .hdr-table code { font-family:monospace; font-weight:600; }
    .hdr-type { display:inline-block; padding:1px 6px; border-radius:4px; font-size:12px; }
    .t-req { background:#1e3a5f; color:#9cc3ff; }
    .t-res { background:#1e3f2a; color:#7be08a; }
    .t-both { background:#3a2a3f; color:#cf9be0; }
    .hdr-empty { padding:16px; opacity:.6; }
  </style>
</head>
<body>
  <div id="site-header"></div>
  <main>
    <div class="tool-header">
      <a class="back" href="/">← All tools</a>
      <h1>HTTP Headers Reference</h1>
      <p>Look up common HTTP request and response headers by name (e.g. <code>Authorization</code>, <code>Cache-Control</code>) or meaning. Static reference, runs entirely in your browser.</p>
    </div>

    <div class="panel">
      <div class="field">
        <label for="q">Search header or meaning</label>
        <input id="q" type="text" placeholder="CORS, caching, content-type…" autocomplete="off">
      </div>
      <div class="spacer"></div>
      <div id="results"></div>
      <p class="note" id="note">Showing common headers. Start typing to filter.</p>
    </div>
  </main>

  <script src="/assets/app.js"></script>
  <script>
  (function () {
    // [name, type (req/res/both), description]
    var HEADERS = [
      ["Accept","req","Media types the client can process."],
      ["Accept-Charset","req","Character encodings the client accepts."],
      ["Accept-Encoding","req","Content encodings (e.g. gzip, br) the client accepts."],
      ["Accept-Language","req","Preferred natural languages, ordered by quality."],
      ["Access-Control-Allow-Credentials","res","CORS: whether credentials may be included in cross-origin requests."],
      ["Access-Control-Allow-Headers","res","CORS: which request headers are permitted."],
      ["Access-Control-Allow-Methods","res","CORS: which HTTP methods are permitted."],
      ["Access-Control-Allow-Origin","res","CORS: which origins may read the response."],
      ["Access-Control-Expose-Headers","res","CORS: response headers the browser exposes to JS."],
      ["Access-Control-Max-Age","res","CORS: how long a preflight result may be cached."],
      ["Access-Control-Request-Headers","req","CORS preflight: headers the actual request will send."],
      ["Access-Control-Request-Method","req","CORS preflight: the method of the actual request."],
      ["Age","res","Time in seconds since the response was generated at a cache."],
      ["Allow","res","Methods supported by the resource."],
      ["Authorization","req","Credentials for HTTP authentication (e.g. Bearer, Basic)."],
      ["Cache-Control","both","Directives for caching (max-age, no-cache, no-store, public…)."],
      ["Clear-Site-Data","res","Clears storage/cookies/cache for the origin."],
      ["Connection","both","Control options for the current connection (e.g. keep-alive)."],
      ["Content-Disposition","res","Suggests a default filename for download and inline vs attachment."],
      ["Content-Encoding","res","Encoding applied to the body (gzip, deflate, br)."],
      ["Content-Language","res","Intended audience language of the body."],
      ["Content-Length","both","Body size in bytes."],
      ["Content-Location","res","Alternate location for the representation."],
      ["Content-Range","res","Where a partial body belongs in the full resource."],
      ["Content-Security-Policy","res","CSP: restricts resource sources and script execution."],
      ["Content-Type","both","Media type and charset of the body."],
      ["Cookie","req","Stored cookies sent by the browser."],
      ["Cross-Origin-Embedder-Policy","res","Controls whether documents can load cross-origin resources."],
      ["Cross-Origin-Opener-Policy","res","Isolates a browsing context from cross-origin openers."],
      ["Cross-Origin-Resource-Policy","res","Restricts who may fetch the resource from cross-origin."],
      ["Date","both","Message origination date and time."],
      ["ETag","res","Opaque validator for cache revalidation."],
      ["Expect","req","Expectations the server must meet (e.g. 100-continue)."],
      ["Expires","res","Date after which the response is considered stale."],
      ["Forwarded","both","Identifies the originating client through proxies."],
      ["From","req","Email address of the human making the request."],
      ["Host","req","Target host and port (required in HTTP/1.1)."],
      ["If-Modified-Since","req","Conditional request: return 304 if not changed since this date."],
      ["If-None-Match","req","Conditional request: return 304 if the ETag matches."],
      ["If-Range","req","Range request applies only if the validator matches."],
      ["If-Unmodified-Since","req","Request fails if modified since this date."],
      ["Last-Modified","res","Date the resource was last modified."],
      ["Link","both","Relationships to other resources (e.g. preload, prefetch)."],
      ["Location","res","Redirect target (3xx) or created resource URL (201)."],
      ["Origin","req","Origin of the request (used by CORS)."],
      ["Proxy-Authenticate","res","Challenge for proxy authentication."],
      ["Proxy-Authorization","req","Credentials for proxy authentication."],
      ["Range","req","Requests a byte range of the resource."],
      ["Referer","req","Address of the previous page from which the request came."],
      ["Referrer-Policy","res","Controls how much Referer information is sent."],
      ["Retry-After","res","When to retry after 429/503 (seconds or date)."],
      ["Server","res","Software handling the request (often hidden for security)."],
      ["Server-Timing","res","Timing metrics for the server's processing."],
      ["Set-Cookie","res","Sends a cookie to the browser."],
      ["Strict-Transport-Security","res","HSTS: enforce HTTPS for this origin."],
      ["TE","req","Transfer encodings the client accepts."],
      ["Trailer","both","Header fields present in the chunked trailer."],
      ["Transfer-Encoding","both","Body transfer encoding (e.g. chunked)."],
      ["Upgrade","both","Ask to switch protocols (e.g. WebSocket)."],
      ["User-Agent","req","Identifies the client software making the request."],
      ["Vary","res","Request headers that determine the cache key."],
      ["Via","both","Intermediary proxies/ gateways the message passed through."],
      ["WWW-Authenticate","res","Challenge for HTTP authentication (401)."],
      ["X-Content-Type-Options","res","nosniff — blocks MIME sniffing."],
      ["X-Frame-Options","res","Controls framing (DENY, SAMEORIGIN) — superseded by CSP frame-ancestors."],
      ["X-Forwarded-For","both","Client IP chain through proxies (legacy form of Forwarded)."],
      ["X-Forwarded-Proto","both","Original protocol (http/https) seen by the client."]
    ];

    var qEl = document.getElementById("q");
    var results = document.getElementById("results");
    var note = document.getElementById("note");
    var LABEL = { req: "Request", res: "Response", both: "Both" };
    var CLASS = { req: "t-req", res: "t-res", both: "t-both" };

    function esc(s) {
      return String(s).replace(/[&<>]/g, function (c) {
        return c === "&" ? "&amp;" : c === "<" ? "&lt;" : "&gt;";
      });
    }

    function render(rows) {
      if (!rows.length) {
        results.innerHTML = '<div class="hdr-empty">No matching headers.</div>';
        note.textContent = "No matches for \"" + qEl.value + "\".";
        return;
      }
      var h = '<table class="hdr-table"><thead><tr><th>Header</th><th>Type</th><th>Meaning</th></tr></thead><tbody>';
      rows.forEach(function (r) {
        h += "<tr><td><code>" + esc(r[0]) + "</code></td>"
          + '<td><span class="hdr-type ' + CLASS[r[1]] + '">' + LABEL[r[1]] + "</span></td>"
          + "<td>" + esc(r[2]) + "</td></tr>";
      });
      h += "</tbody></table>";
      results.innerHTML = h;
      note.textContent = rows.length + " header" + (rows.length === 1 ? "" : "s") + " — static reference, runs locally.";
    }

    function filter() {
      var q = qEl.value.trim().toLowerCase();
      if (!q) { render(HEADERS); return; }
      render(HEADERS.filter(function (r) {
        return r[0].toLowerCase().indexOf(q) !== -1
          || LABEL[r[1]].toLowerCase().indexOf(q) !== -1
          || r[2].toLowerCase().indexOf(q) !== -1;
      }));
    }

    qEl.addEventListener("input", filter);
    filter();
  })();
  </script>
</body>
</html>
