<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CSS Comparison Table Generator — virt.tools</title>
<link rel="stylesheet" href="/assets/style.css">
<style>
.tool-area{max-width:900px;margin:2rem auto;padding:0 1rem}
.controls{display:grid;gap:1rem;margin:1.5rem 0;padding:1.5rem;background:#1a1a2e;border-radius:12px}
.ctrl-row{display:flex;gap:1rem;align-items:center;flex-wrap:wrap;margin-bottom:.5rem}
.ctrl-row label{font-weight:600;font-size:.9rem;min-width:120px}
.ctrl-row select,.ctrl-row input{padding:.5rem;border-radius:8px;border:1px solid #444;background:#0f0f1e;color:#eee}
.preview-box{margin:1.5rem 0;border-radius:12px;min-height:200px;padding:2rem;background:#f5f5f5;overflow-x:auto}
.output-block{margin:2rem 0}
.output-block textarea{width:100%;min-height:100px;font-family:monospace;font-size:.85rem;padding:1rem;border-radius:8px;border:1px solid #444;background:#0f0f1e;color:#eee;resize:vertical}
.copy-btn{padding:.6rem 1.2rem;border:none;border-radius:8px;background:#667eea;color:#fff;cursor:pointer;font-size:.9rem;margin-top:.5rem}
h2{margin-top:2rem;font-size:1.2rem}
</style>
</head>
<body>
<header id="site-header"></header>
<main>
<div class="tool-area">
<h1>⚖️ CSS Comparison Table Generator</h1>
<p>Create CSS feature comparison/pricing table components. 3 styles, 3 themes, 3-5 plans. Copy HTML+CSS.</p>
<div class="controls">
<div class="ctrl-row">
<label>Style</label><select id="style"><option value="card" selected>Card</option><option value="minimal">Minimal</option><option value="zebra">Zebra</option></select>
<label>Theme</label><select id="theme"><option value="light" selected>Light</option><option value="dark">Dark</option><option value="gradient">Gradient</option></select>
<label>Plans</label><select id="plans"><option value="3" selected>3</option><option value="4">4</option><option value="5">5</option></select>
<label>Rows</label><select id="rows"><option value="5" selected>5</option><option value="6">6</option><option value="7">7</option><option value="8">8</option></select>
</div>
<div class="ctrl-row">
<label>Accent Color</label><input type="color" id="accent" value="#667eea" style="width:50px;height:36px">
<button class="copy-btn" onclick="update()">Update</button>
</div>
</div>
<h2>Preview</h2>
<div class="preview-box" id="preview"></div>
<h2>HTML</h2><div class="output-block"><textarea id="htmlOut" readonly></textarea><button class="copy-btn" onclick="copyText('htmlOut')">Copy HTML</button></div>
<h2>CSS</h2><div class="output-block"><textarea id="cssOut" readonly></textarea><button class="copy-btn" onclick="copyText('cssOut')">Copy CSS</button></div>
</div>
</main>
<script src="/assets/app.js"></script>
<script>
var PLAN_NAMES=['Free','Starter','Pro','Business','Enterprise'];
var PLAN_PRICES=['$0','$9','$29','$99','$199'];
var FEATURES=['Users','Storage','API Calls','Support','Analytics','Custom Domain','SSO','SLA'];
var VALUES=[['1','5GB','1K','Community','Basic','—','—','—'],['5','20GB','10K','Email','Standard','—','—','—'],['25','100GB','50K','Priority','Advanced','✓','—','—'],['100','500GB','Unlimited','24/7','Full','✓','✓','—'],['Unlimited','2TB','Unlimited','Dedicated','Full','✓','✓','✓']];
function update(){
var style=document.getElementById('style').value;var theme=document.getElementById('theme').value;
var plans=+document.getElementById('plans').value;var rows=+document.getElementById('rows').value;
var accent=document.getElementById('accent').value;
var bg=theme==='dark'?'#1a1a2e':'#fff';
var fg=theme==='dark'?'#fff':'#1a1a2e';
var sub=theme==='dark'?'#888':'#666';
var borderCol=theme==='dark'?'#333':'#e0e0e0';
var headerBg=theme==='gradient'?'linear-gradient(135deg,'+accent+','#764ba2)':accent;
var html='<div class="cmp-table">\n  <div class="cmp-header">\n    <div class="cmp-feature-col">Features</div>\n';
for(var i=0;i<plans;i++)html+='    <div class="cmp-plan'+(i===2?' cmp-featured':'')+'">'+PLAN_NAMES[i]+'<span class="cmp-price">'+PLAN_PRICES[i]+'</span></div>\n';
html+='  </div>\n';
for(var r=0;r<rows;r++){
html+='  <div class="cmp-row'+(style==='zebra'&&r%2?' cmp-zebra':'')+'">\n    <div class="cmp-feature-col">'+FEATURES[r]+'</div>\n';
for(var i=0;i<plans;i++)html+='    <div class="cmp-cell">'+VALUES[i][r]+'</div>\n';
html+='  </div>\n';
}
html+='</div>';
var css='.cmp-table{font-family:system-ui,sans-serif;border-radius:12px;overflow:hidden;max-width:800px;margin:0 auto}\n'+
'.cmp-header{display:flex;background:'+(theme==='dark'?'#252540':theme==='gradient'?headerBg:accent)+';color:#fff;font-weight:700}\n'+
'.cmp-featured{background:'+accent+'!important;transform:scale(1.05);z-index:1}\n'+
'.cmp-header>div{flex:1;padding:1rem;text-align:center}\n'+
'.cmp-feature-col{flex:0 0 140px;text-align:left!important;background:'+(theme==='dark'?'#252540':'#f8f8f8')+';font-weight:600;color:'+fg+'}\n'+
'.cmp-price{display:block;font-size:1.5rem;margin-top:.25rem}\n'+
'.cmp-row{display:flex;border-bottom:1px solid '+borderCol+';color:'+fg+'}\n'+
'.cmp-row>div{flex:1;padding:.75rem;text-align:center}\n'+
'.cmp-row .cmp-feature-col{text-align:left;font-size:.9rem}\n'+
'.cmp-cell{font-size:.9rem}\n'+
'.cmp-zebra{background:'+(theme==='dark'?'rgba(255,255,255,.03)':'#f8f8f8')+'}';
document.getElementById('htmlOut').value=html;
document.getElementById('cssOut').value=css;
renderPreview();
}
function renderPreview(){
var style=document.getElementById('style').value;var theme=document.getElementById('theme').value;
var plans=+document.getElementById('plans').value;var rows=+document.getElementById('rows').value;
var accent=document.getElementById('accent').value;
var bg=theme==='dark'?'#1a1a2e':'#fff';
var fg=theme==='dark'?'#fff':'#1a1a2e';var sub=theme==='dark'?'#888':'#666';
var borderCol=theme==='dark'?'#333':'#e0e0e0';
var headerBg=theme==='gradient'?'linear-gradient(135deg,'+accent+',#764ba2)':accent;
var h='<div style="font-family:system-ui,sans-serif;border-radius:12px;overflow:hidden;max-width:700px;margin:0 auto">';
h+='<div style="display:flex;background:'+(theme==='dark'?'#252540':theme==='gradient'?headerBg:accent)+';color:#fff;font-weight:700">';
h+='<div style="flex:0 0 120px;padding:1rem;text-align:left;background:'+(theme==='dark'?'#252540':'#f8f8f8')+';color:'+fg+'">Features</div>';
for(var i=0;i<plans;i++)h+='<div style="flex:1;padding:1rem;text-align:center'+(i===2?';background:'+accent:'')+'">'+PLAN_NAMES[i]+'<span style="display:block;font-size:1.4rem;margin-top:.25rem">'+PLAN_PRICES[i]+'</span></div>';
h+='</div>';
for(var r=0;r<rows;r++){
h+='<div style="display:flex;border-bottom:1px solid '+borderCol+';color:'+fg+(style==='zebra'&&r%2?';background:'+(theme==='dark'?'rgba(255,255,255,.03)':'#f8f8f8'):'')+'">';
h+='<div style="flex:0 0 120px;padding:.75rem;text-align:left;background:'+(theme==='dark'?'#252540':'#f8f8f8')+';font-weight:600;font-size:.9rem">'+FEATURES[r]+'</div>';
for(var i=0;i<plans;i++)h+='<div style="flex:1;padding:.75rem;text-align:center;font-size:.9rem">'+VALUES[i][r]+'</div>';
h+='</div>';
}
h+='</div>';
document.getElementById('preview').style.background=bg;
document.getElementById('preview').innerHTML=h;
}
function copyText(id){var t=document.getElementById(id);t.select();document.execCommand('copy')}
['style','theme','plans','rows'].forEach(function(id){document.getElementById(id).addEventListener('change',update)});
document.getElementById('accent').addEventListener('input',update);
update();
</script>
</body>
</html>
