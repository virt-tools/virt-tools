<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CSS Confetti Effect Generator — virt.tools</title>
<link rel="stylesheet" href="/assets/style.css">
<style>
.tool-area{max-width:900px;margin:2rem auto;padding:0 1rem}
.controls{display:grid;gap:1rem;margin:1.5rem 0;padding:1.5rem;background:#1a1a2e;border-radius:12px}
.control-row{display:flex;gap:1rem;align-items:center;flex-wrap:wrap}
.control-row label{min-width:140px;font-weight:600;font-size:.9rem}
.control-row select,.control-row input{padding:.5rem .75rem;border-radius:8px;border:1px solid #444;background:#0f0f1e;color:#eee;font-size:.9rem}
.preview-box{margin:1.5rem 0;padding:0;background:#0a0a14;border-radius:12px;display:flex;justify-content:center;align-items:center;min-height:250px;overflow:hidden;position:relative}
.output-block{margin:2rem 0}
.output-block textarea{width:100%;min-height:100px;font-family:monospace;font-size:.85rem;padding:1rem;border-radius:8px;border:1px solid #444;background:#0f0f1e;color:#eee;resize:vertical}
.copy-btn{padding:.6rem 1.2rem;border:none;border-radius:8px;background:#667eea;color:#fff;cursor:pointer;font-size:.9rem;margin-top:.5rem}
h2{margin-top:2rem;font-size:1.2rem}
.confetti-piece{position:absolute;width:10px;height:10px;animation:confetti-fall 3s linear forwards}
@keyframes confetti-fall{0%{transform:translateY(-20px) rotate(0);opacity:1}100%{transform:translateY(300px) rotate(720deg);opacity:0}}
</style>
</head>
<body>
<header id="site-header"></header>
<main>
<div class="tool-area">
<h1>🎉 CSS Confetti Effect Generator</h1>
<p>Create CSS confetti and particle celebration effects. 3 styles, adjustable count/speed/colors. Copy HTML+CSS.</p>
<div class="controls">
<div class="control-row">
<label>Effect Type</label><select id="effectType"><option value="burst">Burst</option><option value="rain">Rain</option><option value="cannon">Cannon</option></select>
</div>
<div class="control-row">
<label>Color 1</label><input type="color" id="c1" value="#ff6b6b">
<label>Color 2</label><input type="color" id="c2" value="#4ecdc4">
<label>Color 3</label><input type="color" id="c3" value="#ffe66d">
<label>Color 4</label><input type="color" id="c4" value="#a29bfe">
</div>
<div class="control-row">
<label>Count</label><input type="number" id="count" value="30" min="5" max="100" style="width:60px">
<label>Speed (s)</label><input type="number" id="speed" value="3" min="1" max="10" step="0.5" style="width:60px">
<label>Shape</label><select id="shape"><option value="square">Square</option><option value="circle">Circle</option><option value="mixed">Mixed</option></select>
</div>
</div>
<h2>Preview</h2>
<div class="preview-box" id="preview"><button class="copy-btn" onclick="launch()" style="position:absolute;z-index:10">Launch Confetti</button></div>
<h2>HTML</h2><div class="output-block"><textarea id="htmlOut" readonly></textarea><button class="copy-btn" onclick="copyText('htmlOut')">Copy HTML</button></div>
<h2>CSS</h2><div class="output-block"><textarea id="cssOut" readonly></textarea><button class="copy-btn" onclick="copyText('cssOut')">Copy CSS</button></div>
</div>
</main>
<script src="/assets/app.js"></script>
<script>
var confettiId=0;
function update(){
var et=document.getElementById('effectType').value;
var sp=document.getElementById('speed').value;
var colors=[document.getElementById('c1').value,document.getElementById('c2').value,document.getElementById('c3').value,document.getElementById('c4').value];
var shape=document.getElementById('shape').value;
var cnt=parseInt(document.getElementById('count').value);
var css='.confetti-container{position:relative;overflow:hidden;width:100%;height:250px;border-radius:12px}\n';
css+='.confetti-piece{position:absolute;width:10px;height:10px;animation:confetti-fall '+sp+'s ease-out forwards}\n';
if(shape==='circle')css+='.confetti-piece{border-radius:50%}\n';
else if(shape==='mixed')css+='.confetti-piece:nth-child(odd){border-radius:50%}\n.confetti-piece:nth-child(even){border-radius:2px}\n';
if(et==='burst'){
css+='@keyframes confetti-fall{0%{transform:translate(125px,125px) scale(0) rotate(0);opacity:1}100%{transform:translate(var(--tx),var(--ty)) scale(1) rotate(var(--rot));opacity:0}}\n';
}else if(et==='rain'){
css+='@keyframes confetti-fall{0%{transform:translateY(-20px) rotate(0);opacity:1}100%{transform:translateY(270px) rotate(720deg);opacity:0}}\n';
}else{
css+='@keyframes confetti-fall{0%{transform:translate(0,250px) scale(0) rotate(0);opacity:1}50%{opacity:1}100%{transform:translate(var(--tx),var(--ty)) scale(1) rotate(var(--rot));opacity:0}}\n';
}
var html='<div class="confetti-container">\n';
for(var i=0;i<cnt;i++){
var c=colors[i%4];
var left=Math.random()*100;
var delay=Math.random()*1;
var tx=(Math.random()-0.5)*200;
var ty=et==='rain'?0:(Math.random()-0.5)*200;
var rot=Math.random()*720;
html+='<span class="confetti-piece" style="left:'+left+'%;background:'+c+';animation-delay:'+delay+'s;--tx:'+tx+'px;--ty:'+ty+'px;--rot:'+rot+'deg"></span>\n';
}
html+='</div>';
document.getElementById('htmlOut').value=html;
document.getElementById('cssOut').value=css;
}
function launch(){
var p=document.getElementById('preview');
p.innerHTML='<button class="copy-btn" onclick="launch()" style="position:absolute;z-index:10;top:10px;left:10px">Launch</button>'+document.getElementById('htmlOut').value;
var style=document.createElement('style');style.textContent=document.getElementById('cssOut').value;p.appendChild(style);
}
function copyText(id){var t=document.getElementById(id);t.select();document.execCommand('copy')}
document.querySelectorAll('select,input').forEach(function(e){e.addEventListener('input',update);e.addEventListener('change',update)});
update();
</script>
</body>
</html>
