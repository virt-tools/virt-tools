<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="/assets/theme-init.js"></script>
<title>Drawing Pad — Virtual Tools</title>
<link rel="stylesheet" href="/assets/style.css">
<style>
.tool-wrap{max-width:700px;margin:0 auto;text-align:center;}
.tool-desc{opacity:.7;font-size:14px;margin-bottom:8px;}
#canvas{border:2px solid var(--border,#2a2f3a);border-radius:8px;cursor:crosshair;touch-action:none;background:#fff;display:block;margin:10px auto;}
.toolbar{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin:10px 0;align-items:center;}
.toolbar button,.toolbar select{padding:6px 14px;border-radius:6px;border:1px solid var(--border,#2a2f3a);background:var(--bg-alt,#1a1f2e);color:var(--text,#e0e0e0);cursor:pointer;font-size:14px;}
.toolbar label{font-size:13px;display:flex;align-items:center;gap:4px;}
.toolbar input[type=color]{width:36px;height:28px;border:none;border-radius:4px;cursor:pointer;background:none;}
.toolbar input[type=range]{width:80px;}
.color-palette{display:flex;gap:4px;justify-content:center;flex-wrap:wrap;margin:4px 0;}
.swatch{width:24px;height:24px;border-radius:4px;cursor:pointer;border:2px solid transparent;}
.swatch.active{border-color:#1565c0;transform:scale(1.15);}
</style>
</head>
<body>
<header id="site-header"></header>
<main>
<div class="tool-wrap">
<h1>Drawing Pad</h1>
<p class="tool-desc">A simple canvas drawing pad — brush, eraser, shapes, colors, and PNG export. No data leaves your browser.</p>
<div class="toolbar">
<button onclick="setTool('brush')">Brush</button>
<button onclick="setTool('eraser')">Eraser</button>
<button onclick="setTool('line')">Line</button>
<button onclick="setTool('rect')">Rect</button>
<button onclick="setTool('circle')">Circle</button>
<button onclick="setTool('fill')">Fill</button>
<label>Size <input type="range" id="sizeSlider" min="1" max="50" value="4" oninput="setBrushSize(this.value)"><span id="sizeVal">4</span></label>
<label>Color <input type="color" id="colorPicker" value="#1565c0" oninput="setColor(this.value)"></label>
<button onclick="undo()">Undo</button>
<button onclick="clearCanvas()">Clear</button>
<button onclick="download()">Save PNG</button>
</div>
<div class="color-palette" id="palette"></div>
<canvas id="canvas" width="640" height="480"></canvas>
</div>
</main>
<script src="/assets/app.js"></script>
<script>
const COLORS=['#000000','#ffffff','#e53935','#f57c00','#fdd835,#43a047','#00acc1','#1565c0','#5e35b1','#8d6e63','#e91e63','#795548','#9e9e9e'];
let canvas,ctx,tool='brush',color='#1565c0',brushSize=4;
let drawing=false,startX,startY,lastX,lastY,snapshot;
let history=[];

function init(){
canvas=document.getElementById('canvas');ctx=canvas.getContext('2d');
ctx.fillStyle='#fff';ctx.fillRect(0,0,canvas.width,canvas.height);
saveState();
const pal=document.getElementById('palette');
['#000000','#ffffff','#e53935','#f57c00','#fdd835','#43a047','#00acc1','#1565c0','#5e35b1','#8d6e63','#e91e63','#795548'].forEach(c=>{
const s=document.createElement('div');s.className='swatch';s.style.background=c;
s.onclick=()=>{setColor(c);document.querySelectorAll('.swatch').forEach(x=>x.classList.remove('active'));s.classList.add('active');};
pal.appendChild(s);});
canvas.addEventListener('mousedown',startDraw);
canvas.addEventListener('mousemove',draw);
canvas.addEventListener('mouseup',endDraw);
canvas.addEventListener('mouseleave',endDraw);
canvas.addEventListener('touchstart',e=>{e.preventDefault();const t=e.touches[0];startDraw({clientX:t.clientX,clientY:t.clientY});});
canvas.addEventListener('touchmove',e=>{e.preventDefault();const t=e.touches[0];draw({clientX:t.clientX,clientY:t.clientY});});
canvas.addEventListener('touchend',endDraw);
}

function getPos(e){const r=canvas.getBoundingClientRect();return{x:e.clientX-r.left,y:e.clientY-r.top};}

function startDraw(e){
const{x,y}=getPos(e);startX=x;startY=y;lastX=x;lastY=y;
if(tool==='fill'){floodFill(Math.floor(x),Math.floor(y));saveState();return;}
drawing=true;
if(tool==='line'||tool==='rect'||tool==='circle'){snapshot=ctx.getImageData(0,0,canvas.width,canvas.height);}
}

function draw(e){
if(!drawing)return;
const{x,y}=getPos(e);
if(tool==='brush'||tool==='eraser'){
ctx.strokeStyle=tool==='eraser'?'#fff':color;
ctx.lineWidth=brushSize;ctx.lineCap='round';ctx.lineJoin='round';
ctx.beginPath();ctx.moveTo(lastX,lastY);ctx.lineTo(x,y);ctx.stroke();
lastX=x;lastY=y;
}else if(tool==='line'){
ctx.putImageData(snapshot,0,0);
ctx.strokeStyle=color;ctx.lineWidth=brushSize;ctx.lineCap='round';
ctx.beginPath();ctx.moveTo(startX,startY);ctx.lineTo(x,y);ctx.stroke();
}else if(tool==='rect'){
ctx.putImageData(snapshot,0,0);
ctx.strokeStyle=color;ctx.lineWidth=brushSize;
ctx.strokeRect(startX,startY,x-startX,y-startY);
}else if(tool==='circle'){
ctx.putImageData(snapshot,0,0);
ctx.strokeStyle=color;ctx.lineWidth=brushSize;
ctx.beginPath();const rx=Math.abs(x-startX)/2,ry=Math.abs(y-startY)/2;
ctx.ellipse((startX+x)/2,(startY+y)/2,rx,ry,0,0,2*Math.PI);ctx.stroke();
}
}

function endDraw(){if(drawing){drawing=false;saveState();}}

function saveState(){history.push(ctx.getImageData(0,0,canvas.width,canvas.height));if(history.length>30)history.shift();}

function undo(){if(history.length>1){history.pop();ctx.putImageData(history[history.length-1],0,0);}}

function clearCanvas(){ctx.fillStyle='#fff';ctx.fillRect(0,0,canvas.width,canvas.height);saveState();}

function setTool(t){tool=t;canvas.style.cursor=tool==='fill'?'pointer':'crosshair';}
function setColor(c){color=c;document.getElementById('colorPicker').value=c;}
function setBrushSize(s){brushSize=parseInt(s);document.getElementById('sizeVal').textContent=s;}

function download(){const a=document.createElement('a');a.download='drawing.png';a.href=canvas.toDataURL();a.click();}

function floodFill(x,y){
const img=ctx.getImageData(0,0,canvas.width,canvas.height);
const data=img.data;const w=canvas.width,h=canvas.height;
const idx=(x,y)=>(y*w+x)*4;
const target=[data[idx(x,y)],data[idx(x,y)+1],data[idx(x,y)+2],data[idx(x,y)+3]];
const fill=hexToRgb(color);
if(target[0]===fill.r&&target[1]===fill.g&&target[2]===fill.b)return;
const stack=[[x,y]];
while(stack.length){
const[cx,cy]=stack.pop();
if(cx<0||cy<0||cx>=w||cy>=h)continue;
const i=idx(cx,cy);
if(data[i]!==target[0]||data[i+1]!==target[1]||data[i+2]!==target[2]||data[i+3]!==target[3])continue;
data[i]=fill.r;data[i+1]=fill.g;data[i+2]=fill.b;data[i+3]=255;
stack.push([cx+1,cy],[cx-1,cy],[cx,cy+1],[cx,cy-1]);
}
ctx.putImageData(img,0,0);
}

function hexToRgb(h){const r=parseInt(h.slice(1,3),16),g=parseInt(h.slice(3,5),16),b=parseInt(h.slice(5,7),16);return{r,g,b};}

VT.ready(init);
</script>
</body>
</html>
