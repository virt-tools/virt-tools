<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CSS Vertical Tabs Generator — virt.tools</title>
<link rel="stylesheet" href="/assets/style.css">
<style>
.tool-area{max-width:900px;margin:2rem auto;padding:0 1rem}
.controls{display:grid;gap:1rem;margin:1.5rem 0;padding:1.5rem;background:#1a1a2e;border-radius:12px}
.control-row{display:flex;gap:1rem;align-items:center;flex-wrap:wrap}
.control-row label{min-width:100px;font-weight:600;font-size:.9rem}
.control-row select,.control-row input{padding:.5rem .75rem;border-radius:8px;border:1px solid #444;background:#0f0f1e;color:#eee;font-size:.9rem}
.preview-box{margin:1.5rem 0;border-radius:12px;background:#2a2a3e;padding:1.5rem;min-height:250px}
.output-block{margin:2rem 0}
.output-block textarea{width:100%;min-height:120px;font-family:monospace;font-size:.85rem;padding:1rem;border-radius:8px;border:1px solid #444;background:#0f0f1e;color:#eee;resize:vertical}
.copy-btn{padding:.6rem 1.2rem;border:none;border-radius:8px;background:#667eea;color:#fff;cursor:pointer;font-size:.9rem;margin-top:.5rem}
h2{margin-top:2rem;font-size:1.2rem}
</style>
</head>
<body>
<header id="site-header"></header>
<main>
<div class="tool-area">
<h1>📋 CSS Vertical Tabs Generator</h1>
<p>Create CSS vertical tab navigation with 3 styles, custom colors, 3-6 tabs. Copy HTML+CSS.</p>
<div class="controls">
<div class="control-row">
<label>Style</label><select id="style"><option value="flat" selected>Flat</option><option value="card">Card</option><option value="pill">Pill</option></select>
<label>Theme</label><select id="theme"><option value="dark" selected>Dark</option><option value="light">Light</option><option value="gradient">Gradient</option></select>
<label>Active Color</label><input type="color" id="activeColor" value="#667eea">
</div>
<div class="control-row">
<label>Tabs</label><select id="tabCount"><option value="3" selected>3</option><option value="4">4</option><option value="5">5</option><option value="6">6</option></select>
<label>Width</label><input type="number" id="tabWidth" value="180" min="100" max="300" style="width:60px">px
</div>
</div>
<h2>Preview</h2>
<div class="preview-box" id="preview"></div>
<h2>HTML</h2><div class="output-block"><textarea id="htmlOut" readonly></textarea><button class="copy-btn" onclick="copyText('htmlOut')">Copy HTML</button></div>
<h2>CSS</h2><div class="output-block"><textarea id="cssOut" readonly></textarea><button class="copy-btn" onclick="copyText('cssOut')">Copy CSS</button></div>
</div>
</main>
<script src="/assets/app.js"></script>
<script>
var tabNames=['Overview','Settings','Profile','Messages','Analytics','Security'];
function update(){
var style=document.getElementById('style').value,theme=document.getElementById('theme').value;
var ac=document.getElementById('activeColor').value,count=parseInt(document.getElementById('tabCount').value);
var w=document.getElementById('tabWidth').value;
var bg,bgItem,bgActive,textColor,textActive;
if(theme==='light'){bg='#f5f5f5';bgItem='transparent';textColor='#333'}
else if(theme==='gradient'){bg='linear-gradient(135deg,#1a1a2e,#16213e)';bgItem='transparent';textColor='#ccc'}
else{bg='#1a1a2e';bgItem='transparent';textColor='#aaa'}
textActive='#fff';
var html='<div class="vtabs">\n  <div class="vtabs-nav">\n';
for(var i=0;i<count;i++){
var active=i===0?' class="vtabs-tab active"':' class="vtabs-tab"';
html+='    <button'+active+'>'+tabNames[i]+'</button>\n';
}
html+='  </div>\n  <div class="vtabs-content">Tab content goes here</div>\n</div>';
var css='.vtabs{display:flex;gap:0;border-radius:12px;overflow:hidden;background:'+bg+';width:'+(parseInt(w)+300)+'px}\n';
css+='.vtabs-nav{display:flex;flex-direction:column;width:'+w+'px;padding:8px;gap:4px}\n';
css+='.vtabs-tab{padding:12px 16px;border:none;background:'+bgItem+';color:'+textColor+';text-align:left;cursor:pointer;font-size:14px;border-radius:';
if(style==='pill')css+='20px';else css+='8px';
css+=';transition:all .2s}\n';
css+='.vtabs-tab.active{background:'+ac+';color:'+textActive+';';
if(style==='card')css+='box-shadow:0 2px 8px rgba(0,0,0,.15)';
css+='}\n';
css+='.vtabs-tab:hover:not(.active){background:rgba(255,255,255,.08)}\n';
css+='.vtabs-content{flex:1;padding:24px;color:'+textColor+'}';
document.getElementById('htmlOut').value=html;
document.getElementById('cssOut').value=css;
document.getElementById('preview').innerHTML='<style>'+css+'<\/style>'+html;
}
function copyText(id){var t=document.getElementById(id);t.select();document.execCommand('copy')}
document.querySelectorAll('select,input').forEach(function(e){e.addEventListener('input',update);e.addEventListener('change',update)});
update();
</script>
</body>
</html>
