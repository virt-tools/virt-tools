<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="/assets/theme-init.js"></script>
<title>CSS Input Generator — Virtual Tools</title>
<link rel="stylesheet" href="/assets/style.css">
<style>
.tool-wrap{max-width:800px;margin:0 auto;}
.tool-desc{font-size:14px;color:var(--text-secondary,#aaa);margin:8px 0 20px;}
.controls{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:10px;margin:12px 0;}
.ctrl{display:flex;flex-direction:column;gap:4px;}
.ctrl label{font-size:12px;color:var(--text-secondary,#888);}
.ctrl input,.ctrl select{padding:6px 8px;border-radius:6px;border:1px solid var(--border,#444);background:var(--bg,#1e2230);color:var(--text,#eee);font-size:13px;}
button.action{padding:8px 16px;border-radius:6px;border:1px solid var(--border,#444);background:var(--card,#2a2f3e);color:var(--text,#eee);cursor:pointer;font-size:13px;margin:4px 4px 0 0;}
.preview{background:var(--bg,#1e2230);border:1px solid var(--border,#444);border-radius:8px;padding:40px;margin:12px 0;display:flex;align-items:center;justify-content:center;min-height:120px;}
.code-block{background:var(--bg,#1e2230);border:1px solid var(--border,#444);border-radius:8px;padding:12px;margin:8px 0;font-family:monospace;font-size:11px;color:var(--text,#eee);white-space:pre-wrap;word-break:break-all;max-height:400px;overflow:auto;}
.input-prev{outline:none;}
</style>
</head>
<body>
<header id="site-header"></header>
<main>
<div class="tool-wrap">
<h1>📝 CSS Input Generator</h1>
<p class="tool-desc">Create styled CSS input fields with 6 styles, custom colors, icons, and states. Copy HTML+CSS.</p>
<div class="controls">
<div class="ctrl"><label>Style</label><select id="style" onchange="render()"><option value="flat" selected>Flat</option><option value="outline">Outline</option><option value="filled">Filled</option><option value="underline">Underline</option><option value="floating">Floating Label</option><option value="glass">Glass</option></select></div>
<div class="ctrl"><label>Placeholder</label><input type="text" id="ph" value="Enter your name" oninput="render()"></div>
<div class="ctrl"><label>Padding</label><input type="number" id="pd" value="12" min="4" max="30" oninput="render()"></div>
<div class="ctrl"><label>Font Size</label><input type="number" id="fs" value="15" min="10" max="24" oninput="render()"></div>
<div class="ctrl"><label>Radius</label><input type="number" id="rd" value="8" min="0" max="30" oninput="render()"></div>
<div class="ctrl"><label>Width</label><input type="number" id="wd" value="250" min="100" max="500" oninput="render()"></div>
<div class="ctrl"><label>Bg Color</label><input type="color" id="bc" value="#2a2f3e" oninput="render()"></div>
<div class="ctrl"><label>Border Color</label><input type="color" id="ic" value="#6c5ce7" oninput="render()"></div>
<div class="ctrl"><label>Text Color</label><input type="color" id="tc" value="#eeeeee" oninput="render()"></div>
<div class="ctrl"><label>Icon</label><select id="icon" onchange="render()"><option value="">None</option><option value="👤">👤</option><option value="📧">📧</option><option value="🔒">🔒</option><option value="🔍">🔍</option><option value="📱">📱</option></select></div>
</div>
<div style="margin:8px 0;"><button class="action" onclick="copyCode()">Copy HTML+CSS</button></div>
<div class="preview" id="prev"></div>
<div class="code-block" id="code"></div>
</div>
</main>
<script src="/assets/app.js"></script>
<script>
let codeText='';
function render(){
const style=v('style'),ph=v('ph'),pd=+v('pd'),fs=+v('fs'),rd=+v('rd'),wd=+v('wd'),bc=v('bc'),ic=v('ic'),tc=v('tc'),icon=v('icon');
let css='',html='';
const base=`width:${wd}px;padding:${pd}px;font-size:${fs}px;color:${tc};font-family:inherit;outline:none;transition:all .25s ease;`;
if(style==='flat'){css=`background:${bc};border:none;border-radius:${rd}px;`;}
else if(style==='outline'){css=`background:transparent;border:2px solid ${bc};border-radius:${rd}px;`;}
else if(style==='filled'){css=`background:${bc};border:1px solid ${bc}88;border-radius:${rd}px;`;}
else if(style==='underline'){css=`background:transparent;border:none;border-bottom:2px solid ${bc};border-radius:0;padding-left:0;padding-right:0;`;}
else if(style==='floating'){css=`background:${bc};border:1px solid ${bc}88;border-radius:${rd}px;`;}
else if(style==='glass'){css=`background:${bc}44;backdrop-filter:blur(8px);border:1px solid ${bc}66;border-radius:${rd}px;`;}
if(style==='floating'){
html=`<div style="position:relative;width:${wd}px;"><input style="${base}${css}padding-top:${pd+4}px;" placeholder=" " class="input-prev"><label style="position:absolute;left:${pd}px;top:${pd}px;color:${tc}99;font-size:${fs}px;pointer-events:none;transition:all .2s ease;">${ph}</label></div>`;
codeText=`<style>\n.input-wrap {\n  position: relative;\n  width: ${wd}px;\n}\n.input-wrap input {\n  ${base}${css}padding-top:${pd+4}px;\n}\n.input-wrap input:focus + label {\n  top: 4px;\n  font-size: 11px;\n  color: ${ic};\n}\n.input-wrap label {\n  position: absolute;\n  left: ${pd}px;\n  top: ${pd}px;\n  color: ${tc}99;\n  font-size: ${fs}px;\n  pointer-events: none;\n  transition: all .2s ease;\n}\n.input-wrap input:focus {\n  border-color: ${ic};\n}\n</style>\n\n<div class="input-wrap">\n  <input type="text" placeholder=" ">\n  <label>${ph}</label>\n</div>`;
}else if(icon){
html=`<div style="position:relative;width:${wd}px;"><span style="position:absolute;left:${pd}px;top:50%;transform:translateY(-50%);font-size:${fs}px;pointer-events:none;">${icon}</span><input style="${base}${css}padding-left:${pd+28}px;" placeholder="${ph}" class="input-prev"></div>`;
codeText=`<style>\n.input-wrap {\n  position: relative;\n  width: ${wd}px;\n}\n.input-wrap input {\n  ${base}${css}padding-left:${pd+28}px;\n}\n.input-wrap input:focus {\n  border-color: ${ic};\n}\n.input-wrap .icon {\n  position: absolute;\n  left: ${pd}px;\n  top: 50%;\n  transform: translateY(-50%);\n  font-size: ${fs}px;\n  pointer-events: none;\n}\n</style>\n\n<div class="input-wrap">\n  <span class="icon">${icon}</span>\n  <input type="text" placeholder="${ph}">\n</div>`;
}else{
html=`<input style="${base}${css}" placeholder="${ph}" class="input-prev">`;
codeText=`<style>\n.input {\n  ${base}${css}\n}\n.input:focus {\n  border-color: ${ic};\n}\n</style>\n\n<input class="input" type="text" placeholder="${ph}">`;
}
document.getElementById('prev').innerHTML=html;
document.getElementById('code').textContent=codeText;
}
function v(id){return document.getElementById(id).value;}
function copyCode(){navigator.clipboard.writeText(codeText).then(()=>alert('Code copied!')).catch(()=>alert('Copy failed'));}
render();
</script>
</body>
</html>
