<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <script src="/assets/theme-init.js"></script>
  <title>String Escape / Unescape — Virtual Tools</title>
  <link rel="stylesheet" href="/assets/style.css">
</head>
<body>
  <div id="site-header"></div>
  <main>
    <div class="tool-header">
      <a class="back" href="/">← All tools</a>
      <h1>String Escape / Unescape</h1>
      <p>Escape or unescape a string for regex, shell, SQL, CSV or JSON contexts — entirely in your browser. Nothing is uploaded.</p>
    </div>

    <div class="panel">
      <div class="field">
        <label for="in">Input</label>
        <textarea id="in" placeholder="text to escape…" style="min-height:120px;"></textarea>
      </div>
      <div class="row" style="align-items:flex-end;">
        <div>
          <label for="fmt">Context</label>
          <select id="fmt">
            <option value="regex" selected>Regex</option>
            <option value="shell">Shell (POSIX single-quote)</option>
            <option value="sql">SQL string (standard)</option>
            <option value="csv">CSV (RFC 4180)</option>
            <option value="json">JSON string</option>
          </select>
        </div>
        <button id="escape">Escape</button>
        <button id="unescape" class="secondary">Unescape</button>
        <button id="clear" class="secondary">Clear</button>
      </div>
      <div class="spacer"></div>
      <div class="row" style="justify-content:space-between;">
        <label for="out">Output</label>
        <button id="copy" class="secondary" style="padding:4px 10px;">Copy</button>
      </div>
      <div class="output" id="out" style="white-space:pre-wrap; word-break:break-all;"></div>
      <p class="note" id="note">Escaped locally. SQL has no reliable reverse — its Unescape is best-effort.</p>
    </div>
  </main>

  <script src="/assets/app.js"></script>
  <script>
  (function () {
    var inp = document.getElementById("in");
    var out = document.getElementById("out");
    var note = document.getElementById("note");
    var fmtEl = document.getElementById("fmt");

    function show(text, err) {
      out.textContent = text;
      out.style.color = err ? "var(--bad)" : "";
      note.textContent = err || "Escaped locally. SQL has no reliable reverse — its Unescape is best-effort.";
    }

    // --- Escapers -----------------------------------------------------------
    var REGEX_META = /[.*+?^${}()|[\]\\]/g;
    function escRegex(s) { return s.replace(REGEX_META, "\\$&"); }
    function unRegex(s) {
      return s.replace(/\\(.)/g, function (m, c) {
        if (".*+?^${}()|[]\\".indexOf(c) !== -1) return c;
        return m; // leave unknown escapes intact
      });
    }

    function escShell(s) {
      // Wrap in single quotes; replace each literal ' with '\'' .
      return "'" + s.replace(/'/g, "'\\''") + "'";
    }
    function unShell(s) {
      var t = s.trim();
      if (t.length >= 2 && t.charAt(0) === "'" && t.charAt(t.length - 1) === "'") t = t.slice(1, -1);
      return t.replace(/'\\''/g, "'");
    }

    function escSql(s) { return "'" + s.replace(/'/g, "''") + "'"; }
    function unSql(s) {
      var t = s.trim();
      if (t.length >= 2 && t.charAt(0) === "'" && t.charAt(t.length - 1) === "'") t = t.slice(1, -1);
      return t.replace(/''/g, "'");
    }

    function escCsv(s) {
      if (/[",\n\r]/.test(s)) return '"' + s.replace(/"/g, '""') + '"';
      return s;
    }
    function unCsv(s) {
      var t = s;
      if (t.length >= 2 && t.charAt(0) === '"' && t.charAt(t.length - 1) === '"') t = t.slice(1, -1).replace(/""/g, '"');
      return t;
    }

    function escJson(s) { return JSON.stringify(s); }
    function unJson(s) {
      try { return JSON.parse(s); } catch (e) { throw new Error("Not a valid JSON string literal."); }
    }

    var ESC = { regex: escRegex, shell: escShell, sql: escSql, csv: escCsv, json: escJson };
    var UN = { regex: unRegex, shell: unShell, sql: unSql, csv: unCsv, json: unJson };

    document.getElementById("escape").addEventListener("click", function () {
      var v = inp.value;
      if (!v) { show("", "Enter some text first."); return; }
      try { show(ESC[fmtEl.value](v), null); } catch (e) { show("", "Error: " + (e.message || e)); }
    });

    document.getElementById("unescape").addEventListener("click", function () {
      var v = inp.value;
      if (!v) { show("", "Enter an escaped string first."); return; }
      try { show(UN[fmtEl.value](v), null); } catch (e) { show("", "Error: " + (e.message || e)); }
    });

    document.getElementById("clear").addEventListener("click", function () {
      inp.value = ""; show("", null);
    });

    document.getElementById("copy").addEventListener("click", function () {
      var t = out.textContent;
      if (!t) return;
      var btn = this;
      if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(t).then(function () {
          btn.textContent = "Copied!"; setTimeout(function () { btn.textContent = "Copy"; }, 1200);
        });
      } else {
        var ta = document.createElement("textarea");
        ta.value = t; document.body.appendChild(ta); ta.select();
        try { document.execCommand("copy"); btn.textContent = "Copied!"; setTimeout(function () { btn.textContent = "Copy"; }, 1200); }
        catch (e) {}
        ta.remove();
      }
    });
  })();
  </script>
</body>
</html>
