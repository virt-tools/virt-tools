<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CSS Star Rating Generator — virt.tools</title>
<link rel="stylesheet" href="/assets/style.css">
<style>
.tool-area{max-width:900px;margin:2rem auto;padding:0 1rem}
.controls{display:grid;gap:1rem;margin:1.5rem 0;padding:1.5rem;background:#1a1a2e;border-radius:12px}
.control-row{display:flex;gap:1rem;align-items:center;flex-wrap:wrap}
.control-row label{min-width:100px;font-weight:600;font-size:.9rem}
.control-row select,.control-row input{padding:.5rem .75rem;border-radius:8px;border:1px solid #444;background:#0f0f1e;color:#eee;font-size:.9rem}
.preview-box{margin:1.5rem 0;border-radius:12px;background:#2a2a3e;padding:2rem 1.5rem;min-height:100px;display:flex;align-items:center;justify-content:center;gap:1rem;flex-wrap:wrap}
.output-block{margin:2rem 0}
.output-block textarea{width:100%;min-height:100px;font-family:monospace;font-size:.85rem;padding:1rem;border-radius:8px;border:1px solid #444;background:#0f0f1e;color:#eee;resize:vertical}
.copy-btn{padding:.6rem 1.2rem;border:none;border-radius:8px;background:#667eea;color:#fff;cursor:pointer;font-size:.9rem;margin-top:.5rem}
h2{margin-top:2rem;font-size:1.2rem}
</style>
</head>
<body>
<header id="site-header"></header>
<main>
<div class="tool-area">
<h1>⭐ CSS Star Rating Generator</h1>
<p>Create CSS star rating display/input components. 4 styles, fractional support, custom colors. Copy HTML+CSS.</p>
<div class="controls">
<div class="control-row">
<label>Style</label><select id="style"><option value="solid" selected>Solid Stars</option><option value="outline">Outline Stars</option><option value="gradient">Gradient Stars</option><option value="emoji">Emoji Stars</option></select>
<label>Stars</label><select id="maxStars"><option value="5" selected>5</option><option value="10">10</option></select>
<label>Rating</label><input type="number" id="rating" value="4.5" min="0" max="10" step="0.5" style="width:80px">
<label>Color</label><input type="color" id="starColor" value="#fbbf24">
<label>Size</label><select id="size"><option value="small">Small</option><option value="medium" selected>Medium</option><option value="large">Large</option></select>
<label>Show Count</label><select id="showCount"><option value="no" selected>No</option><option value="yes">Yes</option></select>
</div>
</div>
<h2>Preview</h2>
<div class="preview-box" id="preview"></div>
<h2>HTML</h2><div class="output-block"><textarea id="htmlOut" readonly></textarea><button class="copy-btn" onclick="copyText('htmlOut')">Copy HTML</button></div>
<h2>CSS</h2><div class="output-block"><textarea id="cssOut" readonly></textarea><button class="copy-btn" onclick="copyText('cssOut')">Copy CSS</button></div>
</div>
</main>
<script src="/assets/app.js"></script>
<script>
function update(){
var s=document.getElementById('style').value,maxStars=parseInt(document.getElementById('maxStars').value);
var rating=parseFloat(document.getElementById('rating').value),col=document.getElementById('starColor').value;
var sz=document.getElementById('size').value,showCount=document.getElementById('showCount').value;
var sizeMap={small:'14px',medium:'24px',large:'36px'};
var px=sizeMap[sz];
var stars='';
var fullStars=Math.floor(rating);
var hasHalf=rating%1>=0.25&&rating%1<0.75;
var roundedStars=Math.round(rating);
for(var i=0;i<maxStars;i++){
var filled=i<fullStars;
var half=i===fullStars&&hasHalf;
if(s==='emoji'){
stars+=filled?'⭐':half?'🌗':'☆';
}else{
stars+='<span class="star'+(filled?' star-filled':'')+(half?' star-half':'')+'">★</span>';
}
}
var countText=showCount==='yes'?' <span class="rating-count">'+rating+'/'+maxStars+'</span>':'';
var html='<div class="rating-container">\n  <div class="stars-wrap">'+stars+'</div>'+countText+'\n</div>';
var css='.rating-container{display:flex;align-items:center;gap:0.5rem}\n';
css+='.stars-wrap{display:flex;gap:2px}\n';
css+='.star{font-size:'+px+';color:#444;transition:color 0.2s}\n';
css+='.star-filled{color:'+col+'}\n';
if(s==='gradient'){css+='.star-filled{background:linear-gradient(135deg,'+col+',#f97316);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}\n'}
if(s==='outline'){css+='.star{color:transparent;-webkit-text-stroke:2px #555}\n.star-filled{-webkit-text-stroke:2px '+col+';color:'+col+'}\n'}
css+='.star-half{position:relative;color:#444}\n.star-half::after{content:"★";position:absolute;left:0;top:0;width:50%;overflow:hidden;color:'+col+'}\n';
css+='.rating-count{font-size:0.85rem;color:#888;font-weight:600}';
document.getElementById('htmlOut').value=html;
document.getElementById('cssOut').value=css;
document.getElementById('preview').innerHTML='<style>'+css+'<\/style>'+html;
}
function copyText(id){var t=document.getElementById(id);t.select();document.execCommand('copy')}
document.querySelectorAll('select,input').forEach(function(e){e.addEventListener('input',update);e.addEventListener('change',update)});
update();
</script>
</body>
</html>
