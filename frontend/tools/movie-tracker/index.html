<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="/assets/theme-init.js"></script>
<title>Movie Tracker — Virtual Tools</title>
<link rel="stylesheet" href="/assets/style.css">
<style>
.tool-wrap{max-width:700px;margin:0 auto;}
.tool-desc{font-size:14px;color:var(--text-secondary,#aaa);margin:8px 0 16px;}
.card{border:1px solid var(--border,#333);border-radius:12px;padding:20px;background:var(--bg-alt,#1a1f2e);margin-bottom:16px;}
label{display:block;font-size:12px;color:var(--text-secondary,#888);margin-bottom:4px;margin-top:12px;}
input,select,textarea{width:100%;padding:10px;border-radius:8px;border:1px solid var(--border,#444);background:var(--bg,#2a2f3e);color:var(--text,#eee);font-size:14px;box-sizing:border-box;}
.btn{padding:10px 20px;border-radius:8px;border:none;background:var(--accent,#5b8def);color:#fff;cursor:pointer;font-size:14px;margin-top:12px;}
.btn:hover{opacity:0.9;}
.btn-sm{padding:6px 12px;font-size:12px;}
.movie-card{border:1px solid var(--border,#333);border-radius:10px;padding:14px;margin-bottom:12px;background:var(--bg,#2a2f3e);display:flex;gap:14px;align-items:flex-start;}
.movie-emoji{font-size:36px;}
.movie-info{flex:1;}
.movie-title{font-weight:700;font-size:16px;}
.movie-meta{font-size:12px;color:var(--text-secondary,#888);margin-top:4px;}
.movie-actions{display:flex;gap:6px;margin-top:8px;}
.status-badge{display:inline-block;padding:2px 8px;border-radius:12px;font-size:11px;font-weight:700;}
.badge-watched{background:rgba(76,175,80,0.2);color:#4caf50;}
.badge-watching{background:rgba(91,141,239,0.2);color:#5b8def;}
.badge-watchlist{background:rgba(255,193,7,0.2);color:#ffc107;}
.empty{text-align:center;padding:30px;color:var(--text-secondary,#888);}
.row{display:flex;gap:12px;}.row>div{flex:1;}
.stars{color:#ffc107;font-size:16px;}
.filter-bar{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;}
.filter-btn{padding:6px 14px;border-radius:20px;border:1px solid var(--border,#444);background:var(--bg,#2a2f3e);color:var(--text,#eee);cursor:pointer;font-size:13px;}
.filter-btn.active{background:var(--accent,#5b8def);color:#fff;border-color:var(--accent,#5b8def);}
</style>
</head>
<body>
<header id="site-header"></header>
<main>
<div class="tool-wrap">
<h1>Movie Tracker 🎬</h1>
<p class="tool-desc">Track films you've watched, are watching, or want to watch. Add ratings, genres, and reviews. All stored locally.</p>
<div class="card">
<h3>Add Movie</h3>
<div class="row">
<div><label>Title</label><input type="text" id="mtitle" placeholder="Movie title"></div>
<div><label>Year</label><input type="number" id="myear" placeholder="2024"></div>
</div>
<div class="row">
<div><label>Genre</label><input type="text" id="mgenre" placeholder="Sci-Fi"></div>
<div><label>Status</label><select id="mstatus"><option value="watchlist">Watchlist</option><option value="watching">Watching</option><option value="watched">Watched</option></select></div>
</div>
<div class="row">
<div><label>Rating (1-5)</label><input type="number" id="mrating" min="0" max="5" value="0"></div>
</div>
<label>Review</label><input type="text" id="mreview" placeholder="Optional short review">
<button class="btn" onclick="addMovie()">Add Movie</button>
</div>
<div class="filter-bar">
<button class="filter-btn active" onclick="setFilter('all',this)">All</button>
<button class="filter-btn" onclick="setFilter('watchlist',this)">Watchlist</button>
<button class="filter-btn" onclick="setFilter('watching',this)">Watching</button>
<button class="filter-btn" onclick="setFilter('watched',this)">Watched</button>
</div>
<div id="movies"></div>
</div>
</main>
<script src="/assets/app.js"></script>
<script>
const KEY='movie_tracker_v1';
let currentFilter='all';
function load(){try{return JSON.parse(localStorage.getItem(KEY))||[];}catch(e){return[];}}
function save(a){localStorage.setItem(KEY,JSON.stringify(a));}
function esc(s){return s.replace(/</g,'&lt;');}
function stars(n){return '★'.repeat(n)+'☆'.repeat(5-n);}
function statusLabel(s){return s==='watched'?'Watched':s==='watching'?'Watching':'Watchlist';}
function statusBadge(s){return s==='watched'?'badge-watched':s==='watching'?'badge-watching':'badge-watchlist';}
function addMovie(){
const title=document.getElementById('mtitle').value.trim();if(!title)return;
const year=document.getElementById('myear').value.trim();
const genre=document.getElementById('mgenre').value.trim();
const status=document.getElementById('mstatus').value;
const rating=Math.max(0,Math.min(5,parseInt(document.getElementById('mrating').value)||0));
const review=document.getElementById('mreview').value.trim();
const arr=load();arr.push({id:Date.now(),title,year,genre,status,rating,review});save(arr);
document.getElementById('mtitle').value='';document.getElementById('myear').value='';document.getElementById('mgenre').value='';document.getElementById('mreview').value='';render();
}
function cycleStatus(id){const arr=load();const m=arr.find(m=>m.id===id);if(m){m.status=m.status==='watchlist'?'watching':m.status==='watching'?'watched':'watchlist';save(arr);render();}}
function deleteMovie(id){const arr=load().filter(m=>m.id!==id);save(arr);render();}
function setFilter(f,el){currentFilter=f;document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));el.classList.add('active');render();}
function render(){
let arr=load();
if(currentFilter!=='all')arr=arr.filter(m=>m.status===currentFilter);
const c=document.getElementById('movies');
if(!arr.length){c.innerHTML='<div class="card"><div class="empty">No movies in this category. Add one above! 🎬</div></div>';return;}
c.innerHTML=arr.map(m=>{
return `<div class="movie-card"><div class="movie-emoji">🎬</div><div class="movie-info"><div class="movie-title">${esc(m.title)}</div><div class="movie-meta">${m.year?esc(m.year):''}${m.genre?' · '+esc(m.genre):''}</div><div class="movie-meta"><span class="status-badge ${statusBadge(m.status)}">${statusLabel(m.status)}</span> ${m.rating>0?`<span class="stars">${stars(m.rating)}</span>`:''}</div>${m.review?`<div class="movie-meta">"${esc(m.review)}"</div>`:''}<div class="movie-actions"><button class="btn btn-sm" onclick="cycleStatus(${m.id})">Cycle Status</button><button class="btn btn-sm" onclick="deleteMovie(${m.id})" style="background:#f44336">Delete</button></div></div></div>`;
}).join('');
}
render();
</script>
</body>
</html>
