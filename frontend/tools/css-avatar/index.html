<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="/assets/theme-init.js"></script>
<title>CSS Avatar Generator — Virtual Tools</title>
<link rel="stylesheet" href="/assets/style.css">
<style>
.tool-wrap{max-width:800px;margin:0 auto;}
.tool-desc{font-size:14px;color:var(--text-secondary,#aaa);margin:8px 0 20px;}
.controls{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin:12px 0;}
.ctrl{display:flex;flex-direction:column;gap:4px;}
.ctrl label{font-size:12px;color:var(--text-secondary,#888);}
.ctrl input,.ctrl select{padding:6px 8px;border-radius:6px;border:1px solid var(--border,#444);background:var(--bg,#1e2230);color:var(--text,#eee);font-size:13px;}
button.action{padding:8px 16px;border-radius:6px;border:1px solid var(--border,#444);background:var(--card,#2a2f3e);color:var(--text,#eee);cursor:pointer;font-size:13px;margin:4px 4px 0 0;}
.preview{background:var(--bg,#1e2230);border:1px solid var(--border,#444);border-radius:8px;padding:40px;margin:12px 0;min-height:200px;display:flex;align-items:center;justify-content:center;gap:20px;flex-wrap:wrap;}
.code-block{background:var(--bg,#1e2230);border:1px solid var(--border,#444);border-radius:8px;padding:12px;margin:8px 0;font-family:monospace;font-size:11px;color:var(--text,#eee);white-space:pre-wrap;word-break:break-all;max-height:400px;overflow:auto;}
.swatches{display:flex;gap:6px;flex-wrap:wrap;margin:4px 0;}
.swatch{width:28px;height:28px;border-radius:6px;cursor:pointer;border:2px solid transparent;}
.swatch.sel{border-color:#fff;}
</style>
</head>
<body>
<header id="site-header"></header>
<main>
<div class="tool-wrap">
<h1>👤 CSS Avatar Generator</h1>
<p class="tool-desc">Create CSS avatars with initials, gradient backgrounds, shapes, and sizes. 8 gradient presets, 3 shapes. Copy HTML+CSS.</p>
<div class="controls">
<div class="ctrl"><label>Name (for initials)</label><input type="text" id="nm" value="John Doe" oninput="render()"></div>
<div class="ctrl"><label>Size (px)</label><input type="number" id="sz" value="80" min="32" max="200" oninput="render()"></div>
<div class="ctrl"><label>Shape</label><select id="sh" onchange="render()"><option value="0" selected>Circle</option><option value="1">Rounded</option><option value="2">Square</option></select></div>
<div class="ctrl"><label>Font Size</label><input type="number" id="fs" value="32" min="10" max="80" oninput="render()"></div>
<div class="ctrl"><label>Text Color</label><input type="color" id="tc" value="#ffffff" oninput="render()"></div>
<div class="ctrl" style="grid-column:1/-1"><label>Gradient Preset</label></div>
</div>
<div class="swatches" id="sw"></div>
<div style="margin:8px 0;"><button class="action" onclick="copyCode()">Copy HTML+CSS</button></div>
<div class="preview" id="prev"></div>
<div class="code-block" id="code"></div>
</div>
</main>
<script src="/assets/app.js"></script>
<script>
const GRADS=[['#667eea','#764ba2'],['#f093fb','#f5576c'],['#4facfe','#00f2fe'],['#43e97b','#38f9d7'],['#fa709a','#fee140'],['#30cfd0','#330867'],['#a8edea','#fed6e3'],['#f6d365','#fda085']];
let selG=0;
let codeText='';
function render(){
const nm=v('nm'),sz=+v('sz'),sh=+v('sh'),fs=+v('fs'),tc=v('tc');
const initials=nm.split(' ').map(w=>w[0]||'').slice(0,2).join('').toUpperCase()||'?';
const radius=sh===0?'50%':sh===1?'20%':'0';
const g=GRADS[selG];
const html=`<div class="avatar">${initials}</div>`;
const css=`.avatar{width:${sz}px;height:${sz}px;border-radius:${radius};background:linear-gradient(135deg,${g[0]},${g[1]});display:flex;align-items:center;justify-content:center;font-size:${fs}px;font-weight:bold;color:${tc};font-family:sans-serif;user-select:none}`;
document.getElementById('prev').innerHTML=`<style>${css}</style>${html}`;
codeText=`<!-- HTML -->\n${html}\n\n<!-- CSS -->\n<style>\n${css}\n</style>`;
document.getElementById('code').textContent=codeText;
}
function v(id){return document.getElementById(id).value;}
function buildSwatches(){const c=document.getElementById('sw');c.innerHTML='';GRADS.forEach((g,i)=>{const s=document.createElement('div');s.className='swatch'+(i===selG?' sel':'');s.style.background=`linear-gradient(135deg,${g[0]},${g[1]})`;s.onclick=()=>{selG=i;buildSwatches();render();};c.appendChild(s);});}
function copyCode(){navigator.clipboard.writeText(codeText).then(()=>alert('Code copied!')).catch(()=>alert('Copy failed'));}
buildSwatches();render();
</script>
</body>
</html>
