<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="/assets/theme-init.js"></script>
<title>CSS Newsletter Signup Generator — Virtual Tools</title>
<link rel="stylesheet" href="/assets/style.css">
<style>
.tool-wrap{max-width:800px;margin:0 auto;}
.tool-desc{font-size:14px;color:var(--text-secondary,#aaa);margin:8px 0 20px;}
.controls{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin:12px 0;}
.ctrl{display:flex;flex-direction:column;gap:4px;}
.ctrl label{font-size:12px;color:var(--text-secondary,#888);}
.ctrl input,.ctrl select,.ctrl textarea{padding:6px 8px;border-radius:6px;border:1px solid var(--border,#444);background:var(--bg,#1e2230);color:var(--text,#eee);font-size:13px;}
.ctrl textarea{resize:vertical;min-height:32px;}
button.action{padding:8px 16px;border-radius:6px;border:1px solid var(--border,#444);background:var(--card,#2a2f3e);color:var(--text,#eee);cursor:pointer;font-size:13px;margin:4px 4px 0 0;}
.preview{border:1px solid var(--border,#444);border-radius:8px;margin:12px 0;overflow:hidden;min-height:160px;}
.code-block{background:var(--bg,#1e2230);border:1px solid var(--border,#444);border-radius:8px;padding:12px;margin:8px 0;font-family:monospace;font-size:11px;color:var(--text,#eee);white-space:pre-wrap;word-break:break-all;max-height:400px;overflow:auto;}
</style>
</head>
<body>
<header id="site-header"></header>
<main>
<div class="tool-wrap">
<h1>📧 CSS Newsletter Signup Generator</h1>
<p class="tool-desc">Create newsletter signup forms with 5 styles. Custom heading, placeholder, button text, and colors. Copy HTML+CSS.</p>
<div class="controls">
<div class="ctrl"><label>Style</label><select id="style" onchange="render()"><option value="card" selected>Card</option><option value="banner">Banner</option><option value="inline">Inline</option><option value="gradient">Gradient</option><option value="minimal">Minimal</option></select></div>
<div class="ctrl"><label>Heading</label><input type="text" id="heading" value="Subscribe to our newsletter" oninput="render()"></div>
<div class="ctrl"><label>Subtext</label><textarea id="subtext" oninput="render()">Get the latest updates straight to your inbox.</textarea></div>
<div class="ctrl"><label>Placeholder</label><input type="text" id="placeholder" value="Enter your email" oninput="render()"></div>
<div class="ctrl"><label>Button Text</label><input type="text" id="btnText" value="Subscribe" oninput="render()"></div>
<div class="ctrl"><label>Bg Color</label><input type="color" id="bg1" value="#1a1a2e" oninput="render()"></div>
<div class="ctrl"><label>Accent</label><input type="color" id="accent" value="#6c5ce7" oninput="render()"></div>
<div class="ctrl"><label>Text Color</label><input type="color" id="txt" value="#ffffff" oninput="render()"></div>
</div>
<div style="margin:8px 0;"><button class="action" onclick="copyCode()">Copy HTML+CSS</button></div>
<div class="preview" id="prev"></div>
<div class="code-block" id="code"></div>
</div>
</div>
</main>
<script src="/assets/app.js"></script>
<script>
let codeText='';
function v(id){return document.getElementById(id).value;}
function render(){
const style=v('style'),heading=v('heading'),sub=v('subtext'),ph=v('placeholder'),btn=v('btnText'),bg1=v('bg1'),accent=v('accent'),txt=v('txt');
let bgCss='',layout='';
if(style==='gradient'){bgCss=`background:linear-gradient(135deg,${bg1},${accent});`;}
else if(style==='banner'){bgCss=`background:${bg1};`;}
else if(style==='minimal'){bgCss=`background:transparent;border:2px dashed ${accent};`;}
else{bgCss=`background:${bg1};`;}
if(style==='inline'){
layout=`display:flex;align-items:center;gap:16px;`;
}else{
layout=`display:flex;flex-direction:column;align-items:center;text-align:center;`;
}
const formHtml=`<div style="${bgCss}${layout}padding:32px;border-radius:8px;color:${txt};font-family:inherit;">
${style==='inline'?'<div style="flex:1;">':''}
<h3 style="margin:0 0 8px;font-size:20px;font-weight:700;">${heading}</h3>
<p style="margin:0 0 16px;opacity:.8;font-size:14px;">${sub}</p>
${style==='inline'?'<\\/div><div style="display:flex;gap:8px;">':''}
<input type="email" placeholder="${ph}" style="padding:10px 16px;border:1px solid ${accent}55;border-radius:6px;background:transparent;color:${txt};font-size:14px;min-width:200px;">
<button style="background:${accent};color:#fff;border:none;padding:10px 24px;border-radius:6px;font-size:14px;cursor:pointer;font-weight:600;">${btn}</button>
${style==='inline'?'<\\/div>':''}
</div>`;
document.getElementById('prev').innerHTML=formHtml.replace(/\\\/div/g,'/div');
codeText=`<style>
.newsletter {
  ${bgCss}${layout}
  padding: 32px;
  border-radius: 8px;
  color: ${txt};
  font-family: inherit;
}
.newsletter h3 {
  margin: 0 0 8px;
  font-size: 20px;
  font-weight: 700;
}
.newsletter p {
  margin: 0 0 16px;
  opacity: 0.8;
  font-size: 14px;
}
.newsletter input {
  padding: 10px 16px;
  border: 1px solid ${accent}55;
  border-radius: 6px;
  background: transparent;
  color: ${txt};
  font-size: 14px;
  min-width: 200px;
}
.newsletter button {
  background: ${accent};
  color: #fff;
  border: none;
  padding: 10px 24px;
  border-radius: 6px;
  font-size: 14px;
  cursor: pointer;
  font-weight: 600;
}
</style>

<div class="newsletter">
  <h3>${heading}</h3>
  <p>${sub}</p>
  <input type="email" placeholder="${ph}">
  <button>${btn}</button>
</div>`;
document.getElementById('code').textContent=codeText;
}
function copyCode(){navigator.clipboard.writeText(codeText).then(()=>alert('Copied!'));}
render();
</script>
</body>
</html>
