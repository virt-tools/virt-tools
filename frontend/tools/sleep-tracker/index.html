<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="/assets/theme-init.js"></script>
<title>Sleep Tracker — Virtual Tools</title>
<link rel="stylesheet" href="/assets/style.css">
<style>
.tool-wrap{max-width:700px;margin:0 auto;}
.tool-desc{font-size:14px;color:var(--text-secondary,#aaa);margin:8px 0 16px;}
.card{border:1px solid var(--border,#333);border-radius:12px;padding:20px;background:var(--bg-alt,#1a1f2e);margin-bottom:16px;}
label{display:block;font-size:12px;color:var(--text-secondary,#888);margin-bottom:4px;margin-top:12px;}
input,select{width:100%;padding:10px;border-radius:8px;border:1px solid var(--border,#444);background:var(--bg,#2a2f3e);color:var(--text,#eee);font-size:14px;box-sizing:border-box;}
.btn{padding:10px 20px;border-radius:8px;border:none;background:var(--accent,#5b8def);color:#fff;cursor:pointer;font-size:14px;margin-top:12px;}
.btn:hover{opacity:0.9;}
.row{display:flex;gap:12px;}
.row>div{flex:1;}
.stats{display:flex;gap:16px;flex-wrap:wrap;margin-bottom:16px;}
.stat{text-align:center;padding:12px 20px;border-radius:10px;background:var(--bg,#2a2f3e);border:1px solid var(--border,#333);min-width:100px;}
.stat .num{font-size:24px;font-weight:700;color:var(--accent,#5b8def);}
.stat .lbl{font-size:11px;color:var(--text-secondary,#888);}
.history{display:flex;flex-direction:column;gap:6px;}
.entry{display:flex;align-items:center;gap:12px;padding:8px 12px;border-radius:8px;background:var(--bg,#2a2f3e);font-size:13px;}
.entry .date{color:var(--text-secondary,#888);min-width:90px;}
.entry .hrs{font-weight:700;color:var(--accent,#5b8def);min-width:55px;}
.entry .q{font-size:18px;}
.entry .note{flex:1;color:var(--text,#eee);}
h3{margin:0 0 12px;}
.empty{text-align:center;padding:30px;color:var(--text-secondary,#888);}
.bar-chart{display:flex;align-items:flex-end;gap:4px;height:80px;margin-top:12px;}
.bar{flex:1;background:var(--accent,#5b8def);border-radius:4px 4px 0 0;min-height:4px;position:relative;}
.bar:hover::after{content:attr(data-val);position:absolute;bottom:100%;left:50%;transform:translateX(-50%);font-size:10px;background:var(--bg-alt,#1a1f2e);padding:2px 6px;border-radius:4px;white-space:nowrap;}
</style>
</head>
<body>
<header id="site-header"></header>
<main>
<div class="tool-wrap">
<h1>Sleep Tracker 😴</h1>
<p class="tool-desc">Log your sleep hours and quality each night. See averages and trends over time. All data stored locally.</p>
<div class="stats" id="stats"></div>
<div class="card">
<h3>Log Last Night's Sleep</h3>
<div class="row">
<div><label>Bedtime</label><input type="time" id="bedtime" value="23:00"></div>
<div><label>Wake Time</label><input type="time" id="waketime" value="07:00"></div>
</div>
<label>Quality</label>
<select id="quality">
<option value="5">⭐⭐⭐⭐⭐ Excellent</option>
<option value="4">⭐⭐⭐⭐ Good</option>
<option value="3">⭐⭐⭐ Fair</option>
<option value="2">⭐⭐ Poor</option>
<option value="1">⭐ Very Poor</option>
</select>
<label>Note (optional)</label>
<input type="text" id="note" placeholder="What affected your sleep?">
<button class="btn" onclick="save()">Save Entry</button>
</div>
<div class="card">
<h3>Last 14 Nights</h3>
<div class="bar-chart" id="chart"></div>
</div>
<div class="card">
<h3>Recent Entries</h3>
<div class="history" id="history"></div>
</div>
</div>
</main>
<script src="/assets/app.js"></script>
<script>
const KEY='sleep_tracker_v1';const Q_EMOJI={5:'😴',4:'🙂',3:'😐',2:'😕',1:'😩'};
function load(){try{return JSON.parse(localStorage.getItem(KEY))||[];}catch(e){return[];}}
function saveData(a){localStorage.setItem(KEY,JSON.stringify(a));}
function todayKey(){const d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
function calcHours(bed,wake){
let [bh,bm]=bed.split(':').map(Number);let [wh,wm]=wake.split(':').map(Number);
let b=bh*60+bm,w=wh*60+wm;if(w<b)w+=24*60;return((w-b)/60).toFixed(1);
}
function save(){
const bed=document.getElementById('bedtime').value,wake=document.getElementById('waketime').value;
const q=parseInt(document.getElementById('quality').value);const note=document.getElementById('note').value.trim();
if(!bed||!wake)return;const hrs=calcHours(bed,wake);
const arr=load();const key=todayKey();
const ex=arr.find(e=>e.date===key);
const entry={date:key,bed,wake,hours:parseFloat(hrs),quality:q,note};
if(ex)Object.assign(ex,entry);else arr.unshift(entry);
saveData(arr);document.getElementById('note').value='';render();
}
function render(){
const arr=load();const stats=document.getElementById('stats');
if(arr.length){
const avg=(arr.reduce((s,e)=>s+e.hours,0)/arr.length).toFixed(1);
const avgQ=(arr.reduce((s,e)=>s+e.quality,0)/arr.length).toFixed(1);
const best=Math.max(...arr.map(e=>e.hours)).toFixed(1);
stats.innerHTML=`<div class="stat"><div class="num">${avg}h</div><div class="lbl">Avg Sleep</div></div><div class="stat"><div class="num">${avgQ}⭐</div><div class="lbl">Avg Quality</div></div><div class="stat"><div class="num">${best}h</div><div class="lbl">Best Night</div></div><div class="stat"><div class="num">${arr.length}</div><div class="lbl">Total Logs</div></div>`;
}else{stats.innerHTML='';}
const chart=document.getElementById('chart');
const recent=arr.slice(0,14).reverse();
const maxH=Math.max(...recent.map(e=>e.hours),8);
chart.innerHTML=recent.map(e=>`<div class="bar" style="height:${(e.hours/maxH*100)}%" data-val="${e.date}: ${e.hours}h"></div>`).join('')||'<div class="empty">No data yet</div>';
const hist=document.getElementById('history');
if(!arr.length){hist.innerHTML='<div class="empty">No sleep logs yet.</div>';return;}
hist.innerHTML=arr.slice(0,20).map(e=>`<div class="entry"><span class="date">${e.date}</span><span class="hrs">${e.hours}h</span><span class="q">${Q_EMOJI[e.quality]}</span><span class="note">${e.note?e.note.replace(/</g,'&lt;'):''}</span></div>`).join('');
}
render();
</script>
</body>
</html>
