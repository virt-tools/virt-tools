<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="/assets/theme-init.js"></script>
<title>CSS Image Hover Effects Generator — Virtual Tools</title>
<link rel="stylesheet" href="/assets/style.css">
<style>
.tool-wrap{max-width:800px;margin:0 auto;}
.tool-desc{font-size:14px;color:var(--text-secondary,#aaa);margin:8px 0 20px;}
.controls{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin:12px 0;}
.ctrl{display:flex;flex-direction:column;gap:4px;}
.ctrl label{font-size:12px;color:var(--text-secondary,#888);}
.ctrl input,.ctrl select{padding:6px 8px;border-radius:6px;border:1px solid var(--border,#444);background:var(--bg,#1e2230);color:var(--text,#eee);font-size:13px;font-family:inherit;}
button.action{padding:8px 16px;border-radius:6px;border:1px solid var(--border,#444);background:var(--card,#2a2f3e);color:var(--text,#eee);cursor:pointer;font-size:13px;margin:4px 4px 0 0;}
.preview{border:1px solid var(--border,#444);border-radius:8px;margin:12px 0;overflow:hidden;background:#0a0a1a;padding:30px 20px;min-height:250px;display:flex;justify-content:center;align-items:center;gap:16px;flex-wrap:wrap;}
.code-block{background:var(--bg,#1e2230);border:1px solid var(--border,#444);border-radius:8px;padding:12px;margin:8px 0;font-family:monospace;font-size:11px;color:var(--text,#eee);white-space:pre-wrap;word-break:break-all;max-height:400px;overflow:auto;}
.hov-wrap{position:relative;width:200px;height:150px;overflow:hidden;border-radius:8px;}
.hov-img{width:100%;height:100%;object-fit:cover;display:block;transition:all .4s ease;}
.hov-overlay{position:absolute;inset:0;background:rgba(0,0,0,.5);opacity:0;transition:opacity .4s ease;display:flex;align-items:center;justify-content:center;color:#fff;font-size:14px;font-weight:600;}
.hov-wrap:hover .hov-overlay{opacity:1;}
</style>
</head>
<body>
<header id="site-header"></header>
<main>
<div class="tool-wrap">
<h1>🖼️ CSS Image Hover Effects Generator</h1>
<p class="tool-desc">Create CSS image hover effects: zoom, overlay, grayscale, blur, slide, rotate. 8 effects, copy HTML+CSS.</p>
<div class="controls">
<div class="ctrl"><label>Effect</label><select id="effect" onchange="render()">
<option value="zoom" selected>Zoom</option>
<option value="blur">Blur</option>
<option value="grayscale">Grayscale</option>
<option value="overlay">Overlay</option>
<option value="slide-left">Slide Left</option>
<option value="slide-up">Slide Up</option>
<option value="rotate">Rotate</option>
<option value="brightness">Brightness</option>
</select></div>
<div class="ctrl"><label>Overlay Text</label><input type="text" id="overlay" value="View" oninput="render()"></div>
<div class="ctrl"><label>Overlay Color</label><input type="color" id="ovCol" value="#000000" oninput="render()"></div>
<div class="ctrl"><label>Overlay Opacity</label><input type="range" id="ovOp" min="0" max="100" value="50" oninput="render()"></div>
</div>
<div style="margin:8px 0;"><button class="action" onclick="copyCode()">Copy HTML+CSS</button></div>
<div class="preview" id="prev"></div>
<div class="code-block" id="code"></div>
</div>
</div>
</main>
<script src="/assets/app.js"></script>
<script>
let codeText='';
const EFFECTS={
'zoom':'.hov-img{transform:scale(1);}.hov-wrap:hover .hov-img{transform:scale(1.2);}',
'blur':'.hov-img{filter:blur(0);}.hov-wrap:hover .hov-img{filter:blur(4px);}',
'grayscale':'.hov-img{filter:grayscale(100%);}.hov-wrap:hover .hov-img{filter:grayscale(0);}',
'overlay':'.hov-overlay{opacity:0;}.hov-wrap:hover .hov-overlay{opacity:VAR_OP;}',
'slide-left':'.hov-img{transform:translateX(0);}.hov-wrap:hover .hov-img{transform:translateX(-30px);}',
'slide-up':'.hov-img{transform:translateY(0);}.hov-wrap:hover .hov-img{transform:translateY(-30px);}',
'rotate':'.hov-img{transform:rotate(0);}.hov-wrap:hover .hov-img{transform:rotate(5deg) scale(1.1);}',
'brightness':'.hov-img{filter:brightness(1);}.hov-wrap:hover .hov-img{filter:brightness(1.5);}'
};
function v(id){return document.getElementById(id).value;}
function render(){
const eff=v('effect'),ov=v('overlay'),ovCol=v('ovCol'),ovOp=parseInt(v('ovOp'))/100;
let effectCss=EFFECTS[eff].replace('VAR_OP',ovOp);
let usesOverlay=eff==='overlay';
let overlayHtml=usesOverlay?`<div class="hov-overlay" style="background:${ovCol}cc;">${ov}</div>`:'';
let p=document.getElementById('prev');
let canvasImg='data:image/svg+xml,'+encodeURIComponent('<svg xmlns="http://www.w3.org/2000/svg" width="200" height="150"><rect width="200" height="150" fill="#6c5ce7"/><text x="100" y="75" text-anchor="middle" fill="white" font-size="20">Image</text></svg>');
p.innerHTML=`<div class="hov-wrap"><img class="hov-img" src="${canvasImg}" alt="demo">${overlayHtml}</div>`;
let css=`.hov-wrap{position:relative;width:200px;height:150px;overflow:hidden;border-radius:8px;}
.hov-img{width:100%;height:100%;object-fit:cover;display:block;transition:all .4s ease;}
${usesOverlay?`.hov-overlay{position:absolute;inset:0;background:${ovCol}cc;opacity:0;transition:opacity .4s ease;display:flex;align-items:center;justify-content:center;color:#fff;font-size:14px;font-weight:600;}\n`:''}${effectCss}`;
let html=`<div class="hov-wrap">\n  <img class="hov-img" src="your-image.jpg" alt="description">${usesOverlay?`\n  <div class="hov-overlay">${ov}</div>`:''}\n</div>`;
codeText=`<style>\n${css}\n</style>\n\n${html}`;
document.getElementById('code').textContent=codeText;
}
function copyCode(){navigator.clipboard.writeText(codeText).then(()=>alert('Copied!'));}
render();
</script>
</body>
</html>
