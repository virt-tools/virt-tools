<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CSS Mesh Gradient Generator — virt.tools</title>
<link rel="stylesheet" href="/assets/style.css">
<style>
.tool-area{max-width:900px;margin:2rem auto;padding:0 1rem}
.controls{display:grid;gap:1rem;margin:1.5rem 0;padding:1.5rem;background:#1a1a2e;border-radius:12px}
.ctrl-row{display:flex;gap:1rem;align-items:center;flex-wrap:wrap;margin-bottom:.5rem}
.ctrl-row label{font-weight:600;font-size:.9rem;min-width:100px}
.ctrl-row select,.ctrl-row input{padding:.5rem;border-radius:8px;border:1px solid #444;background:#0f0f1e;color:#eee}
.color-row{display:flex;gap:.5rem;align-items:center;flex-wrap:wrap;margin:.5rem 0}
.color-row input[type=color]{width:50px;height:36px;border:none;border-radius:6px;cursor:pointer;background:none}
.preview-box{margin:1.5rem 0;border-radius:12px;min-height:250px;border:1px solid #333}
.output-block{margin:2rem 0}
.output-block textarea{width:100%;min-height:80px;font-family:monospace;font-size:.85rem;padding:1rem;border-radius:8px;border:1px solid #444;background:#0f0f1e;color:#eee;resize:vertical}
.copy-btn{padding:.6rem 1.2rem;border:none;border-radius:8px;background:#667eea;color:#fff;cursor:pointer;font-size:.9rem;margin-top:.5rem}
h2{margin-top:2rem;font-size:1.2rem}
.preset-btn{padding:.4rem .8rem;border:1px solid #444;border-radius:6px;background:#0f0f1e;color:#eee;cursor:pointer;font-size:.85rem}
.preset-btn:hover{border-color:#667eea}
</style>
</head>
<body>
<header id="site-header"></header>
<main>
<div class="tool-area">
<h1>🌈 CSS Mesh Gradient Generator</h1>
<p>Create CSS mesh gradient backgrounds using layered radial gradients. 2-6 color stops, 5 presets, adjustable blur. Copy HTML+CSS.</p>
<div class="controls">
<div class="ctrl-row">
<label>Colors</label><select id="numColors"><option value="2">2</option><option value="3">3</option><option value="4" selected>4</option><option value="5">5</option><option value="6">6</option></select>
<label>Blur</label><select id="blur"><option value="0">0px</option><option value="20">20px</option><option value="40" selected>40px</option><option value="60">60px</option><option value="80">80px</option></select>
<label>Opacity</label><select id="opacity"><option value="0.5">50%</option><option value="0.7">70%</option><option value="0.85" selected>85%</option><option value="1">100%</option></select>
</div>
<div class="color-row" id="colorRow"></div>
<div class="ctrl-row">
<label>Presets</label>
<button class="preset-btn" onclick="preset('sunset')">Sunset</button>
<button class="preset-btn" onclick="preset('ocean')">Ocean</button>
<button class="preset-btn" onclick="preset('forest')">Forest</button>
<button class="preset-btn" onclick="preset('candy')">Candy</button>
<button class="preset-btn" onclick="preset('neon')">Neon</button>
</div>
<div class="ctrl-row"><button class="copy-btn" onclick="update()">Update</button></div>
</div>
<h2>Preview</h2>
<div class="preview-box" id="preview"></div>
<h2>HTML</h2><div class="output-block"><textarea id="htmlOut" readonly></textarea><button class="copy-btn" onclick="copyText('htmlOut')">Copy HTML</button></div>
<h2>CSS</h2><div class="output-block"><textarea id="cssOut" readonly></textarea><button class="copy-btn" onclick="copyText('cssOut')">Copy CSS</button></div>
</div>
</main>
<script src="/assets/app.js"></script>
<script>
var defaultColors=['#ff6b6b','#4ecdc4','#45b7d1','#96ceb4','#feca57','#ff9ff3'];
var presets={
sunset:['#ff6b6b','#feca57','#ff9ff3','#c44569'],
ocean:['#45b7d1','#4ecdc4','#96ceb4','#26d0ce'],
forest:['#a8e6cf','#dcedc1','#96ceb4','#56ab91'],
candy:['#f8b195','#f67280','#c06c84','#6c5b7b'],
neon:['#667eea','#764ba2','#f093fb','#4facfe']
};
function buildColors(){
var n=parseInt(document.getElementById('numColors').value);
var row=document.getElementById('colorRow');
row.innerHTML='';
for(var i=0;i<n;i++){
var inp=document.createElement('input');
inp.type='color';inp.value=defaultColors[i]||'#888';inp.id='c'+i;
inp.addEventListener('input',update);
row.appendChild(inp);
}
}
function update(){
var n=parseInt(document.getElementById('numColors').value);
var colors=[];
for(var i=0;i<n;i++)colors.push(document.getElementById('c'+i).value);
var blur=document.getElementById('blur').value;
var op=document.getElementById('opacity').value;
var positions=[[20,20],[80,20],[80,80],[20,80],[50,50],[50,10]];
var layers=[];
for(var i=0;i<n;i++){
var p=positions[i]||[50,50];
layers.push('radial-gradient(at '+p[0]+'% '+p[1]+'%, '+colors[i]+' 0px, transparent 50%)');
}
var bg=colors[0];
var css='.mesh-gradient{background:'+layers.join(', ')+', '+bg+';filter:blur('+blur+'px);opacity:'+op+';width:100%;height:300px;border-radius:12px}';
var html='<div class="mesh-gradient"></div>';
document.getElementById('htmlOut').value=html;
document.getElementById('cssOut').value=css;
document.getElementById('preview').innerHTML='<style>'+css+'</style>'+html;
}
function preset(name){
var cols=presets[name];
document.getElementById('numColors').value=cols.length;
defaultColors=cols.slice();
buildColors();update();
}
function copyText(id){var t=document.getElementById(id);t.select();document.execCommand('copy')}
['numColors','blur','opacity'].forEach(function(id){document.getElementById(id).addEventListener('change',function(){if(id==='numColors')buildColors();update()})});
buildColors();update();
</script>
</body>
</html>
