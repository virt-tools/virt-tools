<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="/assets/theme-init.js"></script>
<title>CSS Checkbox Generator — Virtual Tools</title>
<link rel="stylesheet" href="/assets/style.css">
<style>
.tool-wrap{max-width:720px;margin:0 auto;}
.tool-desc{font-size:14px;color:var(--text-secondary,#aaa);margin:8px 0 20px;}
.controls{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin:12px 0;}
.ctrl{display:flex;flex-direction:column;gap:4px;}
.ctrl label{font-size:12px;color:var(--text-secondary,#888);}
.ctrl input,.ctrl select{padding:6px 8px;border-radius:6px;border:1px solid var(--border,#444);background:var(--bg,#1e2230);color:var(--text,#eee);font-size:13px;}
.ctrl input[type="color"]{padding:2px;height:34px;}
button.action{padding:8px 16px;border-radius:6px;border:1px solid var(--border,#444);background:var(--card,#2a2f3e);color:var(--text,#eee);cursor:pointer;font-size:13px;margin:4px 4px 0 0;}
.preview{background:var(--bg,#1e2230);border:1px solid var(--border,#444);border-radius:8px;padding:24px;margin:12px 0;min-height:120px;}
.code-block{background:var(--bg,#1e2230);border:1px solid var(--border,#444);border-radius:8px;padding:12px;margin:8px 0;font-family:monospace;font-size:11px;color:var(--text,#eee);white-space:pre-wrap;word-break:break-all;max-height:350px;overflow:auto;}
.cb-row{display:flex;align-items:center;gap:10px;margin:12px 0;font-size:15px;color:var(--text,#eee);cursor:pointer;}
</style>
</head>
<body>
<header id="site-header"></header>
<main>
<div class="tool-wrap">
<h1>☑️ CSS Checkbox Generator</h1>
<p class="tool-desc">Create custom CSS checkboxes with 6 styles, custom colors, sizes, and animations. Copy HTML+CSS.</p>
<div class="controls">
<div class="ctrl"><label>Style</label><select id="st" onchange="render()"><option value="0">Classic</option><option value="1">Rounded</option><option value="2">Square</option><option value="3">Switch</option><option value="4">Pill</option><option value="5">Card</option></select></div>
<div class="ctrl"><label>Check Color</label><input type="color" id="cc" value="#5b8def" oninput="render()"></div>
<div class="ctrl"><label>Box Color</label><input type="color" id="bc" value="#2a2f3e" oninput="render()"></div>
<div class="ctrl"><label>Border Color</label><input type="color" id="bdc" value="#555" oninput="render()"></div>
<div class="ctrl"><label>Size</label><select id="sz" onchange="render()"><option value="16">16px</option><option value="20" selected>20px</option><option value="24">24px</option><option value="28">28px</option></select></div>
<div class="ctrl"><label>Label Text</label><input type="text" id="lt" value="Accept terms" oninput="render()"></div>
</div>
<div class="preview" id="prev"></div>
<div style="margin:8px 0;"><button class="action" onclick="copyCode()">Copy HTML+CSS</button></div>
<div class="code-block" id="code"></div>
</div>
</main>
<script src="/assets/app.js"></script>
<script>
let codeText='';
function render(){
const st=v('st'),cc=v('cc'),bc=v('bc'),bdc=v('bdc'),sz=parseInt(v('sz')),lt=v('lt');
const prev=document.getElementById('prev');
const borderRadius=st==='0'?'4px':st==='1'?'50%':st==='3'?'12px':'6px';
let html='',css='';
if(st==='3'){
html=`<label class="cb-switch">\n  <input type="checkbox">\n  <span class="switch-track"></span>\n  <span class="switch-label">${lt}</span>\n</label>`;
css=`/* Switch Checkbox */\n.cb-switch{display:flex;align-items:center;gap:10px;cursor:pointer}\n.cb-switch input{display:none}\n.switch-track{width:${sz*2}px;height:${sz}px;background:${bc};border:1px solid ${bdc};border-radius:${sz}px;position:relative;transition:all .3s}\n.switch-track::after{content:'';position:absolute;top:2px;left:2px;width:${sz-6}px;height:${sz-6}px;background:${bdc};border-radius:50%;transition:all .3s}\n.cb-switch input:checked+.switch-track{background:${cc};border-color:${cc}}\n.cb-switch input:checked+.switch-track::after{transform:translateX(${sz}px);background:#fff}\n.switch-label{font-size:15px;color:#eee}`;
}else if(st==='5'){
html=`<label class="cb-card">\n  <input type="checkbox">\n  <span class="card-box">${lt}</span>\n</label>`;
css=`/* Card Checkbox */\n.cb-card{display:inline-flex;cursor:pointer}\n.cb-card input{display:none}\n.card-box{padding:12px 20px;border:2px solid ${bdc};border-radius:8px;background:${bc};color:#eee;font-size:15px;transition:all .2s}\n.cb-card input:checked+.card-box{border-color:${cc};background:${cc}33;box-shadow:0 0 0 1px ${cc}}`;
}else if(st==='4'){
html=`<label class="cb-pill">\n  <input type="checkbox">\n  <span class="pill-box">${lt}</span>\n</label>`;
css=`/* Pill Checkbox */\n.cb-pill{display:inline-flex;cursor:pointer}\n.cb-pill input{display:none}\n.pill-box{padding:8px 18px;border:1px solid ${bdc};border-radius:20px;background:${bc};color:#eee;font-size:14px;transition:all .2s}\n.cb-pill input:checked+.pill-box{background:${cc};border-color:${cc};color:#fff}`;
}else{
html=`<label class="cb-row">\n  <input type="checkbox">\n  <span class="cb-box"></span>\n  <span class="cb-label">${lt}</span>\n</label>`;
css=`/* Checkbox */\n.cb-row{display:flex;align-items:center;gap:10px;cursor:pointer}\n.cb-row input{display:none}\n.cb-box{width:${sz}px;height:${sz}px;border:2px solid ${bdc};border-radius:${borderRadius};background:${bc};position:relative;transition:all .2s}\n.cb-row input:checked+.cb-box{background:${cc};border-color:${cc}}\n.cb-row input:checked+.cb-box::after{content:'✓';position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);color:#fff;font-size:${sz-4}px;font-weight:bold}\n.cb-label{font-size:15px;color:#eee}`;
}
prev.innerHTML=`<style>${css}</style>${html}`;
codeText=`<!-- HTML -->\n${html}\n\n<!-- CSS -->\n<style>\n${css}\n</style>`;
document.getElementById('code').textContent=codeText;
prev.querySelectorAll('input[type="checkbox"]').forEach(cb=>{cb.checked=Math.random()>0.5;cb.addEventListener('change',function(){this.checked=this.checked})});
}
function v(id){return document.getElementById(id).value;}
function copyCode(){navigator.clipboard.writeText(codeText).then(()=>alert('Code copied!')).catch(()=>alert('Copy failed'));}
render();
</script>
</body>
</html>
