<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="/assets/theme-init.js"></script>
<title>Neumorphism Generator — Virtual Tools</title>
<link rel="stylesheet" href="/assets/style.css">
<style>
.tool-wrap{max-width:720px;margin:0 auto;}
.tool-desc{font-size:14px;color:var(--text-secondary,#aaa);margin:8px 0 20px;}
.controls{display:grid;gap:8px;margin:12px 0;}
.row{display:flex;gap:8px;align-items:center;flex-wrap:wrap;}
.row label{font-size:13px;color:var(--text-secondary,#888);min-width:100px;}
.row input[type="number"]{width:70px;padding:6px;border-radius:6px;border:1px solid var(--border,#444);background:var(--card,#2a2f3e);color:var(--text,#eee);font-size:13px;}
.row input[type="color"]{width:40px;height:32px;border:none;border-radius:6px;cursor:pointer;background:none;}
.row input[type="range"]{flex:1;min-width:120px;}
.preview{background:#e0e0e0;border-radius:12px;padding:50px 20px;margin:12px 0;min-height:200px;display:flex;align-items:center;justify-content:center;transition:background .2s;}
body.dark .preview{background:#2a2d3a;}
.neu-card{padding:30px 50px;border-radius:20px;text-align:center;font-size:20px;font-weight:600;background:#e0e0e0;color:#333;box-shadow:8px 8px 16px #bebebe,-8px -8px 16px #ffffff;transition:all .2s;}
body.dark .neu-card{background:#2a2d3a;color:#ccc;box-shadow:8px 8px 16px #1e2029,-8px -8px 16px #363a4b;}
button.action{padding:8px 16px;border-radius:6px;border:1px solid var(--border,#444);background:var(--card,#2a2f3e);color:var(--text,#eee);cursor:pointer;font-size:13px;}
button.action:hover{border-color:var(--accent,#5b8def);}
.css-output{background:var(--bg,#1e2230);border:1px solid var(--border,#444);border-radius:8px;padding:12px;margin:12px 0;font-family:monospace;font-size:12px;color:var(--text,#eee);white-space:pre-wrap;word-break:break-all;}
.presets{display:flex;gap:6px;flex-wrap:wrap;margin:8px 0;}
.preset-btn{padding:4px 12px;border-radius:6px;border:1px solid var(--border,#444);background:var(--card,#2a2f3e);color:var(--text,#eee);cursor:pointer;font-size:12px;}
.preset-btn:hover{border-color:var(--accent,#5b8def);}
</style>
</head>
<body>
<header id="site-header"></header>
<main>
<div class="tool-wrap">
<h1>🧊 Neumorphism Generator</h1>
<p class="tool-desc">Create CSS neumorphism (soft UI) effects with dual shadows. 5 presets, inset/raised modes, copy CSS.</p>
<div class="presets">
<button class="preset-btn" onclick="preset('light')">Light</button>
<button class="preset-btn" onclick="preset('dark')">Dark</button>
<button class="preset-btn" onclick="preset('raised')">Raised</button>
<button class="preset-btn" onclick="preset('inset')">Inset</button>
<button class="preset-btn" onclick="preset('flat')">Flat</button>
</div>
<div class="controls">
<div class="row"><label>Distance:</label><input type="range" id="distance" min="0" max="30" value="8"><span id="distanceVal">8px</span></div>
<div class="row"><label>Blur:</label><input type="range" id="blur" min="0" max="40" value="16"><span id="blurVal">16px</span></div>
<div class="row"><label>Intensity:</label><input type="range" id="intensity" min="0" max="50" value="20"><span id="intensityVal">20</span></div>
<div class="row"><label>Radius:</label><input type="range" id="radius" min="0" max="50" value="20"><span id="radiusVal">20px</span></div>
<div class="row"><label>Background:</label><input type="color" id="bgColor" value="#e0e0e0"></div>
<div class="row"><label>Mode:</label>
<select id="mode" style="padding:6px;border-radius:6px;border:1px solid var(--border,#444);background:var(--card,#2a2f3e);color:var(--text,#eee);font-size:13px;">
<option value="raised">Raised</option>
<option value="inset">Inset</option>
<option value="flat">Flat</option>
</select>
</div>
</div>
<div class="controls"><button class="action" onclick="copyCSS()">Copy CSS</button></div>
<div class="preview" id="preview"><div class="neu-card" id="neuCard">Soft Card</div></div>
<div class="css-output" id="cssOutput"></div>
</div>
</main>
<script src="/assets/app.js"></script>
<script>
const presets={light:{distance:8,blur:16,intensity:20,radius:20,bg:'#e0e0e0',mode:'raised'},dark:{distance:8,blur:16,intensity:20,radius:20,bg:'#2a2d3a',mode:'raised'},raised:{distance:12,blur:24,intensity:30,radius:24,bg:'#e0e0e0',mode:'raised'},inset:{distance:8,blur:16,intensity:25,radius:20,bg:'#e0e0e0',mode:'inset'},flat:{distance:4,blur:8,intensity:10,radius:16,bg:'#e0e0e0',mode:'flat'}};
function preset(name){const p=presets[name];document.getElementById('distance').value=p.distance;document.getElementById('blur').value=p.blur;document.getElementById('intensity').value=p.intensity;document.getElementById('radius').value=p.radius;document.getElementById('bgColor').value=p.bg;document.getElementById('mode').value=p.mode;update();}
function hexToRgb(h){h=h.replace('#','');return{r:parseInt(h.substr(0,2),16),g:parseInt(h.substr(2,2),16),b:parseInt(h.substr(4,2),16)};}
function shade(rgb,amt){return`rgb(${Math.max(0,Math.min(255,rgb.r+amt))},${Math.max(0,Math.min(255,rgb.g+amt))},${Math.max(0,Math.min(255,rgb.b+amt))})`;}
function update(){
const distance=+document.getElementById('distance').value;
const blur=+document.getElementById('blur').value;
const intensity=+document.getElementById('intensity').value;
const radius=+document.getElementById('radius').value;
const bg=document.getElementById('bgColor').value;
const mode=document.getElementById('mode').value;
document.getElementById('distanceVal').textContent=distance+'px';
document.getElementById('blurVal').textContent=blur+'px';
document.getElementById('intensityVal').textContent=intensity;
document.getElementById('radiusVal').textContent=radius+'px';
const rgb=hexToRgb(bg);
const darkShade=shade(rgb,-intensity);
const lightShade=shade(rgb,intensity);
const preview=document.getElementById('preview');
preview.style.background=bg;
const card=document.getElementById('neuCard');
card.style.background=bg;
card.style.borderRadius=radius+'px';
let shadow;
if(mode==='raised'){shadow=`${distance}px ${distance}px ${blur}px ${darkShade}, -${distance}px -${distance}px ${blur}px ${lightShade}`;}
else if(mode==='inset'){shadow=`inset ${distance}px ${distance}px ${blur}px ${darkShade}, inset -${distance}px -${distance}px ${blur}px ${lightShade}`;}
else{shadow=`${distance}px ${distance}px ${blur}px ${darkShade}, -${distance}px -${distance}px ${blur}px ${lightShade}`;}
card.style.boxShadow=shadow;
const css=`background: ${bg};\nborder-radius: ${radius}px;\nbox-shadow: ${shadow};`;
document.getElementById('cssOutput').textContent=css;
}
function copyCSS(){const css=document.getElementById('cssOutput').textContent;navigator.clipboard.writeText(css).then(()=>alert('CSS copied!')).catch(()=>alert('Copy failed'));}
['distance','blur','intensity','radius','bgColor','mode'].forEach(id=>{const el=document.getElementById(id);if(el)el.addEventListener('input',update);});
update();
</script>
</body>
</html>
