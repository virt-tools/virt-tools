<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CSS Parallax Generator — virt.tools</title>
<link rel="stylesheet" href="/assets/style.css">
<style>
.tool-area{max-width:960px;margin:2rem auto;padding:0 1rem}
.controls{display:grid;gap:1rem;margin:1.5rem 0;padding:1.5rem;background:#1a1a2e;border-radius:12px}
.control-row{display:flex;gap:1rem;align-items:center;flex-wrap:wrap}
.control-row label{min-width:120px;font-weight:600;font-size:.9rem}
.control-row select,.control-row input[type="color"],.control-row input[type="range"]{padding:.5rem .75rem;border-radius:8px;border:1px solid #444;background:#0f0f1e;color:#eee;font-size:.9rem}
.preview-area{margin:2rem 0;border-radius:12px;overflow:hidden;height:400px;position:relative;border:1px solid #333}
.parallax-layer{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:2rem;font-weight:700;color:#fff;text-shadow:0 2px 8px rgba(0,0,0,.5)}
.css-output{margin:2rem 0}
.css-output textarea{width:100%;min-height:200px;font-family:monospace;font-size:.85rem;padding:1rem;border-radius:8px;border:1px solid #444;background:#0f0f1e;color:#eee;resize:vertical}
.copy-btn{padding:.6rem 1.2rem;border:none;border-radius:8px;background:#4a9eff;color:#fff;cursor:pointer;font-size:.9rem;margin-top:.5rem}
h2{margin-top:2rem;font-size:1.2rem}
</style>
</head>
<body>
<header id="site-header"></header>
<main>
<div class="tool-area">
<h1>🏔️ CSS Parallax Generator</h1>
<p>Create CSS parallax scrolling effects with layered backgrounds. Pure CSS, no JavaScript needed.</p>
<div class="controls">
<div class="control-row">
<label>Layers</label><input type="range" id="layers" min="2" max="5" value="3"><span id="layersVal">3</span>
<label>Speed</label><input type="range" id="speed" min="1" max="10" value="5"><span id="speedVal">5</span>
</div>
<div class="control-row">
<label>Bg Color 1</label><input type="color" id="bg1" value="#1a1a2e">
<label>Bg Color 2</label><input type="color" id="bg2" value="#16213e">
<label>Bg Color 3</label><input type="color" id="bg3" value="#0f3460">
</div>
<div class="control-row">
<label>Text</label><input type="text" id="text" value="PARALLAX" style="padding:.5rem .75rem;border-radius:8px;border:1px solid #444;background:#0f0f1e;color:#eee;font-size:.9rem;width:200px">
<label>Height</label><input type="range" id="height" min="200" max="600" value="400"><span id="heightVal">400px</span>
</div>
</div>
<div class="preview-area" id="preview"></div>
<h2>CSS</h2><div class="css-output"><textarea id="cssOut" readonly></textarea><button class="copy-btn" onclick="copyText('cssOut')">Copy CSS</button></div>
<h2>HTML</h2><div class="css-output"><textarea id="htmlOut" readonly></textarea><button class="copy-btn" onclick="copyText('htmlOut')">Copy HTML</button></div>
</div>
</main>
<script src="/assets/app.js"></script>
<script>
function update(){
var layers=+document.getElementById('layers').value;
var speed=+document.getElementById('speed').value;
var bg1=document.getElementById('bg1').value;
var bg2=document.getElementById('bg2').value;
var bg3=document.getElementById('bg3').value;
var text=document.getElementById('text').value||'PARALLAX';
var height=document.getElementById('height').value;
var bgs=[bg1,bg2,bg3,bg1,bg2];
document.getElementById('layersVal').textContent=layers;
document.getElementById('speedVal').textContent=speed;
document.getElementById('heightVal').textContent=height+'px';
// preview
var p=document.getElementById('preview');
p.style.height=height+'px';
p.innerHTML='';
for(var i=0;i<layers;i++){
var d=document.createElement('div');
d.className='parallax-layer';
d.style.background=bgs[i];
d.style.opacity=0.7;
d.style.transform='translateZ('+(i*speed*-2)+'px) scale('+(1+i*0.1)+')';
d.style.zIndex=i;
d.textContent=text+' L'+(i+1);
p.appendChild(d);
}
// css
var css='.parallax-container{\n  height:'+height+'px;\n  overflow:hidden;\n  position:relative;\n  perspective:'+speed*100+'px;\n}\n'+
'.parallax-layer{\n  position:absolute;\n  inset:0;\n  display:flex;\n  align-items:center;\n  justify-content:center;\n  font-size:2rem;\n  font-weight:700;\n  color:#fff;\n  text-shadow:0 2px 8px rgba(0,0,0,.5);\n}\n';
for(var j=0;j<layers;j++){
css+='.layer-'+(j+1)+'{\n  background:'+bgs[j]+';\n  transform:translateZ('+(j*speed*-2)+'px) scale('+(1+j*0.1)+');\n  z-index:'+j+';\n}\n';
}
document.getElementById('cssOut').value=css;
// html
var html='<div class="parallax-container">\n';
for(var k=0;k<layers;k++){html+='  <div class="parallax-layer layer-'+(k+1)+'">'+text+' L'+(k+1)+'</div>\n'}
html+='</div>';
document.getElementById('htmlOut').value=html;
}
function copyText(id){var t=document.getElementById(id);t.select();document.execCommand('copy')}
document.querySelectorAll('select,input').forEach(function(e){e.addEventListener('input',update)});
update();
</script>
</body>
</html>
