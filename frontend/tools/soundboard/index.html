<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="/assets/theme-init.js"></script>
<title>Soundboard — Virtual Tools</title>
<link rel="stylesheet" href="/assets/style.css">
<style>
.tool-wrap{max-width:700px;margin:0 auto;text-align:center;}
.pad-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin:20px 0;}
.pad{padding:24px 12px;border-radius:12px;border:2px solid var(--border,#444);background:var(--bg-alt,#1a1f2e);color:var(--text,#eee);cursor:pointer;font-size:15px;font-weight:600;transition:all .1s;user-select:none;display:flex;flex-direction:column;align-items:center;gap:6px;}
.pad:hover{border-color:var(--accent,#5b8def);}
.pad:active{transform:scale(.95);background:var(--accent,#5b8def);color:#fff;}
.pad .icon{font-size:28px;}
.pads-label{color:var(--text-secondary,#aaa);font-size:13px;margin:8px 0;}
.vol{display:flex;align-items:center;gap:10px;justify-content:center;margin:10px 0;}
.vol label{color:var(--text-secondary,#aaa);font-size:14px;}
</style>
</head>
<body>
<header id="site-header"></header>
<main>
<div class="tool-wrap">
<h1>Soundboard 🔊</h1>
<p class="tool-desc">Tap pads to play sound effects — all synthesized live via the Web Audio API, no audio files needed. Click or use keyboard 1-8.</p>
<div class="vol"><label>Volume</label><input type="range" id="vol" min="0" max="100" value="60"></div>
<div class="pads-label">Click pads or press keys 1–8</div>
<div class="pad-grid" id="grid"></div>
</div>
</main>
<script src="/assets/app.js"></script>
<script>
const pads=[
{icon:'👏',name:'Clap',fn:clap,k:'1'},
{icon:'🥁',name:'Kick',fn:kick,k:'2'},
{icon:'🎩',name:'Snare',fn:snare,k:'3'},
{icon:'🔔',name:'Bell',fn:bell,k:'4'},
{icon:'🔫',name:'Laser',fn:laser,k:'5'},
{icon:'💥',name:'Boom',fn:boom,k:'6'},
{icon:'🐦',name:'Chirp',fn:chirp,k:'7'},
{icon:'🚨',name:'Siren',fn:siren,k:'8'},
];
let ctx,master;
function ac(){if(!ctx){ctx=new(window.AudioContext||window.webkitAudioContext)();master=ctx.createGain();master.gain.value=0.6;master.connect(ctx.destination);}return ctx;}
function vol(){return(document.getElementById('vol').value/100)*0.8;}
function osc(type,f,dur,gain){const c=ac();const o=c.createOscillator();const g=c.createGain();o.type=type;o.frequency.setValueAtTime(f,c.currentTime);g.gain.setValueAtTime(gain*vol(),c.currentTime);g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+dur);o.connect(g);g.connect(master);o.start();o.stop(c.currentTime+dur);}
function sweep(type,f1,f2,dur,gain){const c=ac();const o=c.createOscillator();const g=c.createGain();o.type=type;o.frequency.setValueAtTime(f1,c.currentTime);o.frequency.exponentialRampToValueAtTime(f2,c.currentTime+dur);g.gain.setValueAtTime(gain*vol(),c.currentTime);g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+dur);o.connect(g);g.connect(master);o.start();o.stop(c.currentTime+dur);}
function noise(dur,gain,filterFreq){const c=ac();const buf=c.createBuffer(1,c.sampleRate*dur,c.sampleRate);const d=buf.getChannelData(0);for(let i=0;i<d.length;i++)d[i]=Math.random()*2-1;const src=c.createBufferSource();src.buffer=buf;const g=c.createGain();g.gain.setValueAtTime(gain*vol(),c.currentTime);g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+dur);const f=c.createBiquadFilter();f.type='lowpass';f.frequency.value=filterFreq||2000;src.connect(f);f.connect(g);g.connect(master);src.start();}
function clap(){noise(0.15,0.7,1500);}
function kick(){sweep('sine',150,40,0.3,0.8);}
function snare(){noise(0.2,0.5,3000);sweep('triangle',200,100,0.1,0.3);}
function bell(){osc('sine',880,0.8,0.5);osc('sine',1320,0.8,0.3);}
function laser(){sweep('sawtooth',1200,100,0.3,0.4);}
function boom(){sweep('sine',80,20,0.6,0.9);}
function chirp(){sweep('sine',2000,4000,0.1,0.3);sweep('sine',3000,2000,0.08,0.2);}
function siren(){let c=ac();let o=c.createOscillator();let g=c.createGain();o.type='sine';o.frequency.setValueAtTime(600,c.currentTime);o.frequency.linearRampToValueAtTime(400,c.currentTime+0.5);o.frequency.linearRampToValueAtTime(600,c.currentTime+1);g.gain.setValueAtTime(0.4*vol(),c.currentTime);g.gain.linearRampToValueAtTime(0.001,c.currentTime+1);o.connect(g);g.connect(master);o.start();o.stop(c.currentTime+1);}
function render(){const g=document.getElementById('grid');g.innerHTML='';pads.forEach((p,i)=>{const b=document.createElement('div');b.className='pad';b.innerHTML=`<div class="icon">${p.icon}</div>${p.name}<div style="font-size:11px;opacity:.5">[${p.k}]</div>`;b.onclick=()=>{ac().resume();p.fn();b.style.background='var(--accent,#5b8def)';b.style.color='#fff';setTimeout(()=>{b.style.background='';b.style.color='';},150);};g.appendChild(b);});}
document.addEventListener('keydown',e=>{const idx=parseInt(e.key)-1;if(idx>=0&&idx<pads.length){ac().resume();pads[idx].fn();}});
render();
</script>
</body>
</html>
