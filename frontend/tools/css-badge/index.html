<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CSS Badge Generator — virt.tools</title>
<link rel="stylesheet" href="/assets/style.css">
<style>
.tool-area{max-width:900px;margin:2rem auto;padding:0 1rem}
.controls{display:grid;gap:1rem;margin:1.5rem 0;padding:1.5rem;background:#1a1a2e;border-radius:12px}
.control-row{display:flex;gap:1rem;align-items:center;flex-wrap:wrap}
.control-row label{min-width:130px;font-weight:600;font-size:.9rem}
.control-row select,.control-row input{padding:.5rem .75rem;border-radius:8px;border:1px solid #444;background:#0f0f1e;color:#eee;font-size:.9rem}
.preview-box{margin:1.5rem 0;padding:2rem;background:#0f0f1e;border-radius:12px;display:flex;justify-content:center;align-items:center;min-height:120px;gap:1rem;flex-wrap:wrap}
.output-block{margin:2rem 0}
.output-block textarea{width:100%;min-height:80px;font-family:monospace;font-size:.85rem;padding:1rem;border-radius:8px;border:1px solid #444;background:#0f0f1e;color:#eee;resize:vertical}
.copy-btn{padding:.6rem 1.2rem;border:none;border-radius:8px;background:#667eea;color:#fff;cursor:pointer;font-size:.9rem;margin-top:.5rem}
h2{margin-top:2rem;font-size:1.2rem}
</style>
</head>
<body>
<header id="site-header"></header>
<main>
<div class="tool-area">
<h1>🏷️ CSS Badge Generator</h1>
<p>Create CSS badges, pills, and stamps. 6 styles, adjustable colors, sizes, and shapes. Copy HTML+CSS.</p>
<div class="controls">
<div class="control-row">
<label>Text</label><input type="text" id="badgeText" value="NEW" style="width:120px">
<label>Style</label><select id="badgeStyle"><option value="solid">Solid</option><option value="outline">Outline</option><option value="pill">Pill</option><option value="stamp">Stamp</option><option value="ribbon">Ribbon</option><option value="dot">Dot+Text</option></select>
</div>
<div class="control-row">
<label>Background</label><input type="color" id="bgColor" value="#667eea">
<label>Text Color</label><input type="color" id="textColor" value="#ffffff">
<label>Font Size (px)</label><input type="number" id="fontSize" value="12" min="8" max="32" style="width:60px">
</div>
<div class="control-row">
<label>Padding X (px)</label><input type="number" id="padX" value="12" min="0" max="40" style="width:60px">
<label>Padding Y (px)</label><input type="number" id="padY" value="4" min="0" max="20" style="width:60px">
<label>Radius (px)</label><input type="number" id="radius" value="4" min="0" max="50" style="width:60px">
</div>
<div class="control-row">
<label>Font Weight</label><select id="fontWeight"><option value="400">400</option><option value="600">600</option><option value="700" selected>700</option><option value="900">900</option></select>
<label>Uppercase</label><input type="checkbox" id="uppercase" checked>
</div>
</div>
<h2>Preview</h2>
<div class="preview-box" id="preview"></div>
<h2>HTML</h2><div class="output-block"><textarea id="htmlOut" readonly></textarea><button class="copy-btn" onclick="copyText('htmlOut')">Copy HTML</button></div>
<h2>CSS</h2><div class="output-block"><textarea id="cssOut" readonly></textarea><button class="copy-btn" onclick="copyText('cssOut')">Copy CSS</button></div>
</div>
</main>
<script src="/assets/app.js"></script>
<script>
function update(){
var txt=document.getElementById('badgeText').value;
var st=document.getElementById('badgeStyle').value;
var bg=document.getElementById('bgColor').value;
var tc=document.getElementById('textColor').value;
var fs=parseInt(document.getElementById('fontSize').value);
var px=parseInt(document.getElementById('padX').value);
var py=parseInt(document.getElementById('padY').value);
var rad=parseInt(document.getElementById('radius').value);
var fw=document.getElementById('fontWeight').value;
var uc=document.getElementById('uppercase').checked;
var t=uc?txt.toUpperCase():txt;
var html='',css='';
if(st==='solid'){
html='<span class="badge badge-solid">'+t+'</span>';
css='.badge{display:inline-block;font-size:'+fs+'px;font-weight:'+fw+';padding:'+py+'px '+px+'px;border-radius:'+rad+'px;text-transform:'+(uc?'uppercase':'none')+'}\n.badge-solid{background:'+bg+';color:'+tc+'}';
}else if(st==='outline'){
html='<span class="badge badge-outline">'+t+'</span>';
css='.badge{display:inline-block;font-size:'+fs+'px;font-weight:'+fw+';padding:'+py+'px '+px+'px;border-radius:'+rad+'px;text-transform:'+(uc?'uppercase':'none')+'}\n.badge-outline{background:transparent;color:'+bg+';border:2px solid '+bg+'}';
}else if(st==='pill'){
html='<span class="badge badge-pill">'+t+'</span>';
css='.badge{display:inline-block;font-size:'+fs+'px;font-weight:'+fw+';padding:'+py+'px '+(px+8)+'px;border-radius:50px;text-transform:'+(uc?'uppercase':'none')+'}\n.badge-pill{background:'+bg+';color:'+tc+'}';
}else if(st==='stamp'){
html='<span class="badge badge-stamp">'+t+'</span>';
css='.badge{display:inline-block;font-size:'+fs+'px;font-weight:900;padding:'+py+'px '+px+'px;text-transform:'+(uc?'uppercase':'none')+'}\n.badge-stamp{color:'+bg+';border:3px solid '+bg+';border-radius:4px;transform:rotate(-5deg);letter-spacing:2px}';
}else if(st==='ribbon'){
html='<span class="badge badge-ribbon">'+t+'</span>';
css='.badge{display:inline-block;font-size:'+fs+'px;font-weight:'+fw+';padding:'+py+'px '+px+'px;text-transform:'+(uc?'uppercase':'none')+'}\n.badge-ribbon{background:'+bg+';color:'+tc+';clip-path:polygon(0 0,100% 0,100% 100%,calc(50% + 6px) 100%,50% calc(100% - 6px),calc(50% - 6px) 100%,0 100%)}';
}else if(st==='dot'){
html='<span class="badge badge-dot"><span class="dot"></span>'+t+'</span>';
css='.badge{display:inline-flex;align-items:center;gap:6px;font-size:'+fs+'px;font-weight:'+fw+';text-transform:'+(uc?'uppercase':'none')+';color:'+tc+'}\n.badge-dot .dot{display:inline-block;width:8px;height:8px;border-radius:50%;background:'+bg+';animation:pulse 2s infinite}\n@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}';
}
document.getElementById('preview').innerHTML=html;
document.getElementById('htmlOut').value=html;
document.getElementById('cssOut').value=css;
}
function copyText(id){var t=document.getElementById(id);t.select();document.execCommand('copy')}
document.querySelectorAll('select,input').forEach(function(e){e.addEventListener('input',update);e.addEventListener('change',update)});
update();
</script>
</body>
</html>
