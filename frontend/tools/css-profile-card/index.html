<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="/assets/theme-init.js"></script>
<title>CSS Profile Card Generator — Virtual Tools</title>
<link rel="stylesheet" href="/assets/style.css">
<style>
.tool-wrap{max-width:800px;margin:0 auto;}
.tool-desc{font-size:14px;color:var(--text-secondary,#aaa);margin:8px 0 20px;}
.controls{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin:12px 0;}
.ctrl{display:flex;flex-direction:column;gap:4px;}
.ctrl label{font-size:12px;color:var(--text-secondary,#888);}
.ctrl input,.ctrl select{padding:6px 8px;border-radius:6px;border:1px solid var(--border,#444);background:var(--bg,#1e2230);color:var(--text,#eee);font-size:13px;font-family:inherit;}
button.action{padding:8px 16px;border-radius:6px;border:1px solid var(--border,#444);background:var(--card,#2a2f3e);color:var(--text,#eee);cursor:pointer;font-size:13px;margin:4px 4px 0 0;}
.preview{border:1px solid var(--border,#444);border-radius:8px;margin:12px 0;padding:32px 24px;display:flex;justify-content:center;}
.code-block{background:var(--bg,#1e2230);border:1px solid var(--border,#444);border-radius:8px;padding:12px;margin:8px 0;font-family:monospace;font-size:11px;color:var(--text,#eee);white-space:pre-wrap;word-break:break-all;max-height:400px;overflow:auto;}
.profile-card{width:280px;border-radius:16px;overflow:hidden;text-align:center;}
.pc-header{height:80px;}
pc-avatar{width:72px;height:72px;border-radius:50%;border:3px solid #fff;margin-top:36px;display:inline-flex;align-items:center;justify-content:center;font-size:24px;font-weight:700;}
.pc-body{padding:12px 16px 20px;}
.pc-body h3{margin:8px 0 2px;font-size:17px;}
.pc-body .role{font-size:13px;opacity:.7;margin-bottom:8px;}
.pc-body .bio{font-size:12px;opacity:.6;margin-bottom:12px;line-height:1.4;}
.pc-stats{display:flex;justify-content:space-around;margin-bottom:12px;}
.pc-stats div{text-align:center;}
.pc-stats .num{font-weight:700;font-size:16px;}
.pc-stats .lbl{font-size:11px;opacity:.6;}
.pc-links{display:flex;gap:8px;justify-content:center;}
.pc-links a{width:32px;height:32px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;text-decoration:none;font-size:14px;}
</style>
</head>
<body>
<header id="site-header"></header>
<main>
<div class="tool-wrap">
<h1>👤 CSS Profile Card Generator</h1>
<p class="tool-desc">Create profile cards with avatar, name, role, bio, stats, and social links. 3 styles, custom colors. Copy HTML+CSS.</p>
<div class="controls">
<div class="ctrl"><label>Style</label><select id="style" onchange="render()"><option value="card" selected>Card</option><option value="minimal">Minimal</option><option value="gradient">Gradient Header</option></select></div>
<div class="ctrl"><label>Name</label><input type="text" id="name" value="Jane Doe" oninput="render()"></div>
<div class="ctrl"><label>Role</label><input type="text" id="role" value="Product Designer" oninput="render()"></div>
<div class="ctrl"><label>Initials</label><input type="text" id="initials" value="JD" oninput="render()" maxlength="3"></div>
<div class="ctrl" style="grid-column:1/-1;"><label>Bio</label><input type="text" id="bio" value="Passionate about creating delightful user experiences." oninput="render()" style="width:100%"></div>
<div class="ctrl"><label>Header Color</label><input type="color" id="hdrColor" value="#6c5ce7" oninput="render()"></div>
<div class="ctrl"><label>Avatar Bg</label><input type="color" id="avBg" value="#a29bfe" oninput="render()"></div>
<div class="ctrl"><label>Card Bg</label><input type="color" id="cardBg" value="#2a2f3e" oninput="render()"></div>
<div class="ctrl"><label>Text Color</label><input type="color" id="txt" value="#ffffff" oninput="render()"></div>
<div class="ctrl"><label>Accent</label><input type="color" id="accent" value="#6c5ce7" oninput="render()"></div>
<div class="ctrl"><label>Stat 1 Label</label><input type="text" id="s1l" value="Posts" oninput="render()"></div>
<div class="ctrl"><label>Stat 1 Val</label><input type="text" id="s1v" value="142" oninput="render()"></div>
<div class="ctrl"><label>Stat 2 Label</label><input type="text" id="s2l" value="Followers" oninput="render()"></div>
<div class="ctrl"><label>Stat 2 Val</label><input type="text" id="s2v" value="3.2k" oninput="render()"></div>
<div class="ctrl"><label>Stat 3 Label</label><input type="text" id="s3l" value="Following" oninput="render()"></div>
<div class="ctrl"><label>Stat 3 Val</label><input type="text" id="s3v" value="891" oninput="render()"></div>
</div>
<div style="margin:8px 0;"><button class="action" onclick="copyCode()">Copy HTML+CSS</button></div>
<div class="preview" id="prev"></div>
<div class="code-block" id="code"></div>
</div>
</div>
</main>
<script src="/assets/app.js"></script>
<script>
let codeText='';
function v(id){return document.getElementById(id).value;}
function render(){
const style=v('style'),name=v('name'),role=v('role'),init=v('initials'),bio=v('bio');
const hdr=v('hdrColor'),avBg=v('avBg'),cardBg=v('cardBg'),txt=v('txt'),accent=v('accent');
const s1l=v('s1l'),s1v=v('s1v'),s2l=v('s2l'),s2v=v('s2v'),s3l=v('s3l'),s3v=v('s3v');
let hdrCss='';
if(style==='gradient'){hdrCss=`background:linear-gradient(135deg,${hdr},${accent});`;}
else if(style==='minimal'){hdrCss=`background:${cardBg};border-bottom:1px solid ${accent}30;`;}
else{hdrCss=`background:${hdr};`;}
const html=`<div class="profile-card" style="background:${cardBg};color:${txt};box-shadow:0 4px 20px rgba(0,0,0,.15);">
<div class="pc-header" style="${hdrCss}"><pc-avatar style="background:${avBg};color:#fff;">${init}</pc-avatar></div>
<div class="pc-body">
<h3>${name}</h3><div class="role">${role}</div>
<div class="bio">${bio}</div>
<div class="pc-stats">
<div><div class="num" style="color:${accent}">${s1v}</div><div class="lbl">${s1l}</div></div>
<div><div class="num" style="color:${accent}">${s2v}</div><div class="lbl">${s2l}</div></div>
<div><div class="num" style="color:${accent}">${s3v}</div><div class="lbl">${s3l}</div></div>
</div>
<div class="pc-links">
<a href="#" style="background:${accent}20;color:${accent}">in</a>
<a href="#" style="background:${accent}20;color:${accent}">tw</a>
<a href="#" style="background:${accent}20;color:${accent}">gh</a>
</div>
</div></div>`;
document.getElementById('prev').innerHTML=html;
codeText=`<style>
.profile-card {
  width: 280px;
  border-radius: 16px;
  overflow: hidden;
  text-align: center;
  background: ${cardBg};
  color: ${txt};
  box-shadow: 0 4px 20px rgba(0,0,0,0.15);
}
.pc-header {
  height: 80px;
  ${hdrCss}
}
.pc-avatar {
  width: 72px; height: 72px;
  border-radius: 50%;
  border: 3px solid #fff;
  margin-top: 36px;
  display: inline-flex;
  align-items: center; justify-content: center;
  font-size: 24px; font-weight: 700;
  background: ${avBg}; color: #fff;
}
.pc-body { padding: 12px 16px 20px; }
.pc-body h3 { margin: 8px 0 2px; font-size: 17px; }
.pc-body .role { font-size: 13px; opacity: 0.7; margin-bottom: 8px; }
.pc-body .bio { font-size: 12px; opacity: 0.6; margin-bottom: 12px; line-height: 1.4; }
.pc-stats { display: flex; justify-content: space-around; margin-bottom: 12px; }
.pc-stats .num { font-weight: 700; font-size: 16px; color: ${accent}; }
.pc-stats .lbl { font-size: 11px; opacity: 0.6; }
.pc-links { display: flex; gap: 8px; justify-content: center; }
.pc-links a {
  width: 32px; height: 32px; border-radius: 50%;
  display: inline-flex; align-items: center; justify-content: center;
  text-decoration: none; font-size: 14px;
  background: ${accent}20; color: ${accent};
}
</style>

<div class="profile-card">
  <div class="pc-header"><div class="pc-avatar">${init}</div></div>
  <div class="pc-body">
    <h3>${name}</h3>
    <div class="role">${role}</div>
    <div class="bio">${bio}</div>
    <div class="pc-stats">
      <div><div class="num">${s1v}</div><div class="lbl">${s1l}</div></div>
      <div><div class="num">${s2v}</div><div class="lbl">${s2l}</div></div>
      <div><div class="num">${s3v}</div><div class="lbl">${s3l}</div></div>
    </div>
    <div class="pc-links">
      <a href="#">in</a><a href="#">tw</a><a href="#">gh</a>
    </div>
  </div>
</div>`;
document.getElementById('code').textContent=codeText;
}
function copyCode(){navigator.clipboard.writeText(codeText).then(()=>alert('Copied!'));}
render();
</script>
</body>
</html>
