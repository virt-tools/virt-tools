<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <script src="/assets/theme-init.js"></script>
  <title>Random Name Picker — Virtual Tools</title>
  <link rel="stylesheet" href="/assets/style.css">
  <style>
    .vt-layout{max-width:700px;margin:20px auto;}
    .vt-card{background:var(--card-bg,#21212e);border:1px solid var(--border,#2a2f3a);border-radius:8px;padding:16px 20px;margin:10px 0;}
    .vt-card h3{margin:0 0 12px;font-size:15px;}
    label{font-size:13px;display:block;margin-bottom:4px;}
    input[type=text],textarea,select{font-family:monospace;font-size:13px;padding:8px 12px;border:1px solid var(--border,#2a2f3a);border-radius:6px;background:var(--bg,#1a1a2e);color:var(--text,#e0e0e0);box-sizing:border-box;width:100%;}
    textarea{min-height:120px;resize:vertical;}
    button{padding:10px 24px;border-radius:8px;cursor:pointer;border:1px solid var(--border,#2a2f3a);background:var(--card-bg,#21212e);color:var(--text,#e0e0e0);font-size:14px;margin:4px 0;}
    button:hover{opacity:.8;}
    button.primary{background:#5b8af5;color:#fff;border-color:#5b8af5;font-size:16px;padding:12px 32px;}
    button:disabled{opacity:.4;cursor:default;}
    .hint{font-size:12px;opacity:.5;margin:4px 0 0;}
    .wheel-wrap{display:flex;justify-content:center;margin:20px 0;}
    canvas{max-width:100%;height:auto;}
    .result{font-size:28px;font-weight:bold;text-align:center;color:#5b8af5;margin:16px 0;min-height:40px;}
    .options-display{font-size:13px;opacity:.6;text-align:center;margin:4px 0;}
    .row{display:flex;gap:12px;align-items:center;flex-wrap:wrap;}
    .row>div{flex:1;min-width:120px;}
    .history{margin:12px 0;}
    .history-item{display:inline-block;padding:4px 10px;border-radius:4px;background:var(--bg,#1a1a2e);font-size:12px;margin:2px;}
    input[type=checkbox]{width:auto;}
  </style>
</head>
<body>
  <div id="site-header"></div>
  <main>
    <div class="tool-header">
      <a class="back" href="/">← All tools</a>
      <h1>Random Name Picker</h1>
      <p>Spin the wheel to randomly pick a name or option from your list. Fully client-side — your data never leaves your browser.</p>
    </div>

    <div class="vt-layout">
      <div class="vt-card">
        <h3>Enter your options</h3>
        <label>One option per line (or comma-separated)</label>
        <textarea id="options" placeholder="Alice&#10;Bob&#10;Charlie&#10;Diana&#10;Eve">Alice
Bob
Charlie
Diana
Eve</textarea>
        <div class="hint">Auto-removes duplicates and empty lines.</div>
        <div class="actions" style="margin:12px 0">
          <button class="primary" id="spinBtn">🎲 Spin!</button>
          <button id="removeBtn">Remove Winner After Spin</button>
          <button id="clearBtn">Clear Results</button>
        </div>
      </div>

      <div class="wheel-wrap">
        <canvas id="wheel" width="420" height="460"></canvas>
      </div>

      <div class="result" id="result">Ready to spin!</div>
      <div class="options-display" id="optDisplay"></div>

      <div class="vt-card" id="historyCard" style="display:none">
        <h3>Recent Winners</h3>
        <div class="history" id="history"></div>
      </div>
    </div>
  </main>

  <script src="/assets/app.js"></script>
  <script>
  (function(){
    var d=document;
    var canvas=d.getElementById("wheel");
    var ctx=canvas.getContext("2d");
    var cx=210, cy=210, radius=200;
    var angle=0;
    var spinning=false;
    var spinTarget=0;
    var spinStart=0;
    var spinDuration=5000;
    var spinStartAngle=0;
    var winnerIndex=-1;
    var history=[];

    var colors=["#5b8af5","#e74c3c","#f39c12","#2ecc71","#9b59b6","#1abc9c","#e67e22","#3498db","#e91e63","#00bcd4","#ff5722","#8bc34a","#673ab7","#ffc107","#795548","#607d8b"];

    function getOptions(){
      var raw=d.getElementById("options").value;
      var items=raw.split(/[\n,]/).map(function(s){return s.trim();}).filter(function(s,i,a){
        return s&&a.indexOf(s)===i;
      });
      return items;
    }

    function drawWheel(){
      var opts=getOptions();
      var n=opts.length;
      ctx.clearRect(0,0,canvas.width,canvas.height);

      if(n===0){
        ctx.fillStyle="#666";
        ctx.font="16px monospace";
        ctx.textAlign="center";
        ctx.fillText("Add options to spin",cx,cy);
        d.getElementById("optDisplay").textContent="No options";
        return;
      }

      var arc=Math.PI*2/n;
      for(var i=0;i<n;i++){
        var startAngle=angle+i*arc;
        var endAngle=startAngle+arc;
        ctx.beginPath();
        ctx.moveTo(cx,cy);
        ctx.arc(cx,cy,radius,startAngle,endAngle);
        ctx.closePath();
        ctx.fillStyle=colors[i%colors.length];
        ctx.fill();
        ctx.strokeStyle="#fff";
        ctx.lineWidth=2;
        ctx.stroke();

        // label
        ctx.save();
        ctx.translate(cx,cy);
        ctx.rotate(startAngle+arc/2);
        ctx.textAlign="right";
        ctx.fillStyle="#fff";
        var fontSize=Math.max(10,Math.min(16,20-n*0.3));
        ctx.font="bold "+fontSize+"px sans-serif";
        var label=opts[i];
        if(label.length>18)label=label.slice(0,16)+"…";
        ctx.fillText(label,radius-10,5);
        ctx.restore();
      }

      // center circle
      ctx.beginPath();
      ctx.arc(cx,cy,25,0,Math.PI*2);
      ctx.fillStyle="#21212e";
      ctx.fill();
      ctx.strokeStyle="#5b8af5";
      ctx.lineWidth=3;
      ctx.stroke();

      // pointer
      ctx.beginPath();
      ctx.moveTo(cx,cy-radius-10);
      ctx.lineTo(cx-12,cy-radius-30);
      ctx.lineTo(cx+12,cy-radius-30);
      ctx.closePath();
      ctx.fillStyle="#5b8af5";
      ctx.fill();
      ctx.strokeStyle="#fff";
      ctx.lineWidth=2;
      ctx.stroke();

      d.getElementById("optDisplay").textContent=n+" option"+(n>1?"s":"");
    }

    function easeOutCubic(t){return 1-Math.pow(1-t,3);}

    function animate(ts){
      if(!spinning)return;
      if(!spinStart)spinStart=ts;
      var elapsed=ts-spinStart;
      var t=Math.min(elapsed/spinDuration,1);
      var eased=easeOutCubic(t);
      angle=spinStartAngle+(spinTarget-spinStartAngle)*eased;
      drawWheel();
      if(t<1){
        requestAnimationFrame(animate);
      }else{
        spinning=false;
        spinStart=0;
        var opts=getOptions();
        var n=opts.length;
        var arc=Math.PI*2/n;
        var normalized=((angle%(Math.PI*2))+Math.PI*2)%(Math.PI*2);
        // pointer at top, segment 0 starts at angle
        var pointerAngle=(Math.PI*1.5-normalized+Math.PI*2)%(Math.PI*2);
        winnerIndex=Math.floor(pointerAngle/arc);
        if(winnerIndex>=n)winnerIndex=0;
        var winner=opts[winnerIndex];
        d.getElementById("result").textContent="🎉 "+winner+" 🎉";
        history.unshift(winner);
        if(history.length>10)history.pop();
        renderHistory();
        d.getElementById("spinBtn").disabled=false;

        if(d.getElementById("removeBtn").dataset.remove==="yes"){
          var lines=d.getElementById("options").value.split(/[\n,]/).map(function(s){return s.trim();}).filter(Boolean);
          var idx=lines.indexOf(winner);
          if(idx>=0)lines.splice(idx,1);
          d.getElementById("options").value=lines.join("\n");
          drawWheel();
        }
      }
    }

    function renderHistory(){
      var card=d.getElementById("historyCard");
      var h=d.getElementById("history");
      if(history.length===0){card.style.display="none";return;}
      card.style.display="";
      h.innerHTML=history.map(function(w,i){
        return '<span class="history-item">'+(i+1)+". "+w.replace(/</g,"&lt;")+'</span>';
      }).join("");
    }

    d.getElementById("spinBtn").addEventListener("click",function(){
      var opts=getOptions();
      if(opts.length<2){d.getElementById("result").textContent="Need at least 2 options!";return;}
      if(opts.length===1){d.getElementById("result").textContent="🎉 "+opts[0]+" 🎉";return;}
      spinning=true;
      d.getElementById("spinBtn").disabled=true;
      d.getElementById("result").textContent="Spinning...";
      spinStart=0;
      spinStartAngle=angle;
      var n=opts.length;
      var arc=Math.PI*2/n;
      var winner=Math.floor(Math.random()*n);
      // target: winner segment center at pointer (top = angle -PI/2 relative)
      spinTarget=angle+Math.PI*2*5+(Math.PI*1.5-(winner*arc+arc/2));
      requestAnimationFrame(animate);
    });

    d.getElementById("removeBtn").addEventListener("click",function(){
      if(this.dataset.remove==="yes"){
        this.dataset.remove="no";
        this.style.opacity="";
        this.textContent="Remove Winner After Spin";
      }else{
        this.dataset.remove="yes";
        this.style.opacity="1";
        this.textContent="✓ Remove Winner After Spin";
      }
    });

    d.getElementById("clearBtn").addEventListener("click",function(){
      history=[];
      renderHistory();
      d.getElementById("result").textContent="Ready to spin!";
    });

    d.getElementById("options").addEventListener("input",function(){
      if(!spinning)drawWheel();
    });

    drawWheel();
  })();
  </script>
</body>
</html>
