<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="/assets/theme-init.js"></script>
<title>CSS Social Icons Generator — Virtual Tools</title>
<link rel="stylesheet" href="/assets/style.css">
<style>
.tool-wrap{max-width:800px;margin:0 auto;}
.tool-desc{font-size:14px;color:var(--text-secondary,#aaa);margin:8px 0 20px;}
.controls{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:10px;margin:12px 0;}
.ctrl{display:flex;flex-direction:column;gap:4px;}
.ctrl label{font-size:12px;color:var(--text-secondary,#888);}
.ctrl input,.ctrl select{padding:6px 8px;border-radius:6px;border:1px solid var(--border,#444);background:var(--bg,#1e2230);color:var(--text,#eee);font-size:13px;}
button.action{padding:8px 16px;border-radius:6px;border:1px solid var(--border,#444);background:var(--card,#2a2f3e);color:var(--text,#eee);cursor:pointer;font-size:13px;margin:4px 4px 0 0;}
.preview{background:var(--bg,#1e2230);border:1px solid var(--border,#444);border-radius:8px;padding:24px;margin:12px 0;display:flex;gap:8px;flex-wrap:wrap;align-items:center;justify-content:center;}
.code-block{background:var(--bg,#1e2230);border:1px solid var(--border,#444);border-radius:8px;padding:12px;margin:8px 0;font-family:monospace;font-size:11px;color:var(--text,#eee);white-space:pre-wrap;word-break:break-all;max-height:400px;overflow:auto;}
.icons-grid{display:flex;gap:12px;flex-wrap:wrap;justify-content:center;}
.si{width:48px;height:48px;border-radius:var(--rd,12px);display:flex;align-items:center;justify-content:center;font-size:24px;cursor:pointer;transition:all .3s;}
</style>
</head>
<body>
<header id="site-header"></header>
<main>
<div class="tool-wrap">
<h1>📱 CSS Social Icons Generator</h1>
<p class="tool-desc">Create CSS social media icon buttons. 10 platforms, 4 styles, 3 hover effects, custom colors and sizes. Copy HTML+CSS.</p>
<div class="controls">
<div class="ctrl"><label>Style</label><select id="style" onchange="render()"><option value="filled" selected>Filled</option><option value="outline">Outline</option><option value="gradient">Gradient</option><option value="glass">Glass</option></select></div>
<div class="ctrl"><label>Hover Effect</label><select id="hover" onchange="render()"><option value="scale" selected>Scale</option><option value="rotate">Rotate</option><option value="lift">Lift</option><option value="glow">Glow</option></select></div>
<div class="ctrl"><label>Size</label><input type="number" id="sz" value="48" min="32" max="80" oninput="render()"></div>
<div class="ctrl"><label>Radius</label><input type="number" id="rd" value="12" min="0" max="40" oninput="render()"></div>
<div class="ctrl"><label>Gap</label><input type="number" id="gp" value="12" min="0" max="40" oninput="render()"></div>
<div class="ctrl"><label>Base Color</label><input type="color" id="bc" value="#2a2f3e" oninput="render()"></div>
</div>
<div style="margin:8px 0;"><button class="action" onclick="copyCode()">Copy HTML+CSS</button></div>
<div class="preview" id="prev"></div>
<div class="code-block" id="code"></div>
</div>
</main>
<script src="/assets/app.js"></script>
<script>
const PLATFORMS=[
{n:'Twitter',e:'𝕏',c:'#1DA1F2'},{n:'GitHub',e:'⌥',c:'#181717'},{n:'YouTube',e:'▶',c:'#FF0000'},
{n:'Instagram',e:'📷',c:'#E4405F'},{n:'LinkedIn',e:'in',c:'#0A66C2'},{n:'Facebook',e:'f',c:'#1877F2'},
{n:'Discord',e:'D',c:'#5865F2'},{n:'Reddit',e:'r',c:'#FF4500'},{n:'Twitch',e:'🎮',c:'#9146FF'},
{n:'TikTok',e:'♪',c:'#000000'}
];
let codeText='';
function render(){
const style=v('style'),hover=v('hover'),sz=+v('sz'),rd=+v('rd'),gp=+v('gp'),bc=v('bc');
let html='<div class="icons-grid" style="gap:'+gp+'px">\n';
PLATFORMS.forEach(p=>{
let bg='',color='',border='';
if(style==='filled'){bg=`background:${p.c};`;color=`color:#fff;`;}
else if(style==='outline'){bg=`background:${bc};`;color=`color:${p.c};`;border=`border:2px solid ${p.c};`;}
else if(style==='gradient'){bg=`background:linear-gradient(135deg,${p.c},${p.c}aa);`;color=`color:#fff;`;}
else{bg=`background:${bc}99;backdrop-filter:blur(8px);`;color=`color:${p.c};`;border=`border:1px solid ${p.c}55;`;}
const hoverCSS=hover==='scale'?'transform:scale(1.2)':hover==='rotate'?'transform:rotate(15deg)':hover==='lift'?'transform:translateY(-6px)':`box-shadow:0 0 20px ${p.c}`;
html+=`  <a href="#" class="si" style="width:${sz}px;height:${sz}px;border-radius:${rd}px;${bg}${color}${border}font-size:${Math.round(sz*0.5)}px;display:flex;align-items:center;justify-content:center;text-decoration:none;transition:all .3s;" onmouseover="this.style.cssText+=';${hoverCSS}'" onmouseout="this.style.cssText=this.dataset.orig" data-orig="width:${sz}px;height:${sz}px;border-radius:${rd}px;${bg}${color}${border}font-size:${Math.round(sz*0.5)}px;display:flex;align-items:center;justify-content:center;text-decoration:none;transition:all .3s;">${p.e}</a>\n`;
});
html+='</div>';
document.getElementById('prev').innerHTML=html;
codeText=`<style>\n.social-icons{display:flex;gap:${gp}px}\n.social-icon{width:${sz}px;height:${sz}px;border-radius:${rd}px;${style==='filled'?'background:var(--brand)':'background:'+bc};${style==='outline'?'border:2px solid var(--brand)':''}${style==='gradient'?'background:linear-gradient(135deg,var(--brand),var(--brand-aa))':''}${style==='glass'?'background:'+bc+'99;backdrop-filter:blur(8px);border:1px solid var(--brand-55)':''}\n  display:flex;align-items:center;justify-content:center;font-size:${Math.round(sz*0.5)}px;${style==='filled'||style==='gradient'?'color:#fff':'color:var(--brand)'};text-decoration:none;transition:all .3s}\n.social-icon:hover{${hoverCSS}}\n</style>\n\n<div class="social-icons">\n${PLATFORMS.map(p=>`  <a href="#" class="social-icon" style="--brand:${p.c}">${p.e}</a>`).join('\n')}\n</div>`;
document.getElementById('code').textContent=codeText;
}
function v(id){return document.getElementById(id).value;}
function copyCode(){navigator.clipboard.writeText(codeText).then(()=>alert('Code copied!')).catch(()=>alert('Copy failed'));}
render();
</script>
</body>
</html>
