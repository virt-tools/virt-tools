<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CSS Alert Box Generator — virt.tools</title>
<link rel="stylesheet" href="/assets/style.css">
<style>
.tool-area{max-width:900px;margin:2rem auto;padding:0 1rem}
.controls{display:grid;gap:1rem;margin:1.5rem 0;padding:1.5rem;background:#1a1a2e;border-radius:12px}
.control-row{display:flex;gap:1rem;align-items:center;flex-wrap:wrap}
.control-row label{min-width:100px;font-weight:600;font-size:.9rem}
.control-row select,.control-row input{padding:.5rem .75rem;border-radius:8px;border:1px solid #444;background:#0f0f1e;color:#eee;font-size:.9rem}
.preview-box{margin:1.5rem 0;border-radius:12px;background:#2a2a3e;padding:1.5rem;min-height:100px}
.output-block{margin:2rem 0}
.output-block textarea{width:100%;min-height:120px;font-family:monospace;font-size:.85rem;padding:1rem;border-radius:8px;border:1px solid #444;background:#0f0f1e;color:#eee;resize:vertical}
.copy-btn{padding:.6rem 1.2rem;border:none;border-radius:8px;background:#667eea;color:#fff;cursor:pointer;font-size:.9rem;margin-top:.5rem}
h2{margin-top:2rem;font-size:1.2rem}
</style>
</head>
<body>
<header id="site-header"></header>
<main>
<div class="tool-area">
<h1>🚨 CSS Alert Box Generator</h1>
<p>Create CSS alert/notification boxes (info/success/warning/error). 4 styles, close button, icons. Copy HTML+CSS.</p>
<div class="controls">
<div class="control-row">
<label>Type</label><select id="type"><option value="info" selected>Info</option><option value="success">Success</option><option value="warning">Warning</option><option value="error">Error</option></select>
<label>Style</label><select id="style"><option value="solid" selected>Solid</option><option value="outline">Outline</option><option value="left-border">Left Border</option><option value="filled">Filled</option></select>
<label>Radius</label><input type="number" id="radius" value="8" min="0" max="24" style="width:60px">
<label>Close</label><select id="close"><option value="yes" selected>Yes</option><option value="no">No</option></select>
</div>
<div class="control-row">
<label>Title</label><input type="text" id="title" value="Heads up!" style="width:150px">
<label>Message</label><input type="text" id="message" value="This is an important message you should read." style="width:300px">
</div>
</div>
<h2>Preview</h2>
<div class="preview-box" id="preview"></div>
<h2>HTML</h2><div class="output-block"><textarea id="htmlOut" readonly></textarea><button class="copy-btn" onclick="copyText('htmlOut')">Copy HTML</button></div>
<h2>CSS</h2><div class="output-block"><textarea id="cssOut" readonly></textarea><button class="copy-btn" onclick="copyText('cssOut')">Copy CSS</button></div>
</div>
</main>
<script src="/assets/app.js"></script>
<script>
var types={info:{icon:'ℹ️',color:'#3b82f6',bg:'#eff6ff'},success:{icon:'✅',color:'#22c55e',bg:'#f0fdf4'},warning:{icon:'⚠️',color:'#f59e0b',bg:'#fffbeb'},error:{icon:'❌',color:'#ef4444',bg:'#fef2f2'}};
function update(){
var t=document.getElementById('type').value,s=document.getElementById('style').value;
var r=document.getElementById('radius').value,c=document.getElementById('close').value;
var title=document.getElementById('title').value,msg=document.getElementById('message').value;
var d=types[t];
var closeHTML=c==='yes'?'<span class="alert-close">✕</span>':'';
var html='<div class="alert alert-'+t+'">\n  <span class="alert-icon">'+d.icon+'</span>\n  <div class="alert-body">\n    <div class="alert-title">'+title+'</div>\n    <div class="alert-message">'+msg+'</div>\n  </div>\n  '+closeHTML+'\n</div>';
var css='.alert{display:flex;align-items:flex-start;gap:12px;padding:16px;border-radius:'+r+'px;max-width:500px;';
if(s==='solid'){css+='background:'+d.color+';color:#fff'}
else if(s==='outline'){css+='border:2px solid '+d.color+';background:transparent;color:'+d.color}
else if(s==='left-border'){css+='background:'+d.bg+';color:#1a1a1a;border-left:4px solid '+d.color}
else{css+='background:'+d.bg+';color:#1a1a1a;border:1px solid '+d.color+'40'}
css+='}\n';
css+='.alert-icon{font-size:20px;line-height:1}\n';
css+='.alert-body{flex:1}\n';
css+='.alert-title{font-weight:700;margin-bottom:4px}\n';
css+='.alert-message{font-size:14px;opacity:.9}\n';
css+='.alert-close{cursor:pointer;font-size:18px;opacity:.6;margin-left:auto}\n';
css+='.alert-close:hover{opacity:1}';
document.getElementById('htmlOut').value=html;
document.getElementById('cssOut').value=css;
var bg=s==='solid'?'#1a1a2e':s==='outline'?'#1a1a2e':d.bg;
document.getElementById('preview').innerHTML='<style>'+css+'<\/style>'+html;
}
function copyText(id){var t=document.getElementById(id);t.select();document.execCommand('copy')}
document.querySelectorAll('select,input').forEach(function(e){e.addEventListener('input',update);e.addEventListener('change',update)});
update();
</script>
</body>
</html>
