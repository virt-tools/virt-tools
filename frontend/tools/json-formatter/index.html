<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <script src="/assets/theme-init.js"></script>
  <title>JSON Formatter — Virtual Tools</title>
  <link rel="stylesheet" href="/assets/style.css">
</head>
<body>
  <div id="site-header"></div>
  <main>
    <div class="tool-header">
      <a class="back" href="/">← All tools</a>
      <h1>JSON Formatter &amp; Validator</h1>
      <p>Pretty-print, minify and validate JSON in your browser. Parsed and rendered locally — nothing is uploaded.</p>
    </div>

    <div class="panel">
      <div class="field">
        <label for="in">JSON input</label>
        <textarea id="in" placeholder='{"hello":"world","numbers":[1,2,3]}' style="min-height:160px;"></textarea>
      </div>
      <div class="row">
        <button id="format">Format</button>
        <button id="minify" class="secondary">Minify</button>
        <button id="validate" class="secondary">Validate</button>
        <button id="clear" class="secondary">Clear</button>
        <div>
          <label for="indent">Indent</label>
          <select id="indent">
            <option value="2" selected>2 spaces</option>
            <option value="4">4 spaces</option>
            <option value="\t">Tab</option>
          </select>
        </div>
      </div>
      <div class="spacer"></div>
      <div class="row" style="justify-content:space-between;">
        <label for="out">Output</label>
        <button id="copy" class="secondary" style="padding:4px 10px;">Copy</button>
      </div>
      <div class="output" id="out" style="white-space:pre;"></div>
      <p class="note" id="note"></p>
    </div>
  </main>

  <script src="/assets/app.js"></script>
  <script>
  (function () {
    var inp = document.getElementById("in");
    var out = document.getElementById("out");
    var note = document.getElementById("note");
    var indentSel = document.getElementById("indent");

    function indentValue() {
      var v = indentSel.value;
      return v === "\\t" ? "\t" : parseInt(v, 10);
    }

    function parseInput() {
      var text = inp.value.trim();
      if (!text) { note.textContent = "Paste some JSON first."; throw new Error("empty"); }
      return JSON.parse(text);
    }

    function show(text) { out.textContent = text; }

    document.getElementById("format").addEventListener("click", function () {
      note.textContent = "";
      try {
        var obj = parseInput();
        show(JSON.stringify(obj, null, indentValue()));
        note.textContent = "Valid JSON — formatted.";
      } catch (e) {
        show(""); note.textContent = "Invalid JSON: " + (e.message || e);
      }
    });

    document.getElementById("minify").addEventListener("click", function () {
      note.textContent = "";
      try {
        var obj = parseInput();
        show(JSON.stringify(obj));
        note.textContent = "Valid JSON — minified.";
      } catch (e) {
        show(""); note.textContent = "Invalid JSON: " + (e.message || e);
      }
    });

    document.getElementById("validate").addEventListener("click", function () {
      try {
        parseInput();
        show(""); note.textContent = "✓ Valid JSON.";
      } catch (e) {
        show(""); note.textContent = "✗ Invalid JSON: " + (e.message || e);
      }
    });

    document.getElementById("clear").addEventListener("click", function () {
      inp.value = ""; show(""); note.textContent = "";
    });

    document.getElementById("copy").addEventListener("click", function () {
      var text = out.textContent;
      if (!text) return;
      var btn = this;
      if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(text).then(function () {
          btn.textContent = "Copied!"; setTimeout(function () { btn.textContent = "Copy"; }, 1200);
        });
      } else {
        var ta = document.createElement("textarea");
        ta.value = text; document.body.appendChild(ta); ta.select();
        try { document.execCommand("copy"); btn.textContent = "Copied!"; setTimeout(function () { btn.textContent = "Copy"; }, 1200); }
        catch (e) {}
        ta.remove();
      }
    });
  })();
  </script>
</body>
</html>
