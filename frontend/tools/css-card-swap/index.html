<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CSS Card Swap on Hover Generator — virt.tools</title>
<link rel="stylesheet" href="/assets/style.css">
<style>
.tool-area{max-width:800px;margin:2rem auto;padding:0 1rem}
.controls{display:grid;gap:.8rem;margin:1.5rem 0;padding:1.5rem;background:#1a1a2e;border-radius:12px}
.ctrl-row{display:flex;gap:1rem;align-items:center;flex-wrap:wrap}
.ctrl-row label{font-weight:600;font-size:.9rem;min-width:120px}
.ctrl-row select,.ctrl-row input{padding:.5rem;border-radius:8px;border:1px solid #444;background:#0f0f1e;color:#eee}
.preview-box{margin:1.5rem 0;padding:2rem;background:#0a0a12;border-radius:12px;display:flex;align-items:center;justify-content:center;gap:1rem;flex-wrap:wrap}
.output-block{margin:1.5rem 0}
.output-block textarea{width:100%;min-height:120px;font-family:monospace;font-size:.85rem;padding:1rem;border-radius:8px;border:1px solid #444;background:#0f0f1e;color:#eee;resize:vertical}
.copy-btn{padding:.6rem 1.2rem;border:none;border-radius:8px;background:#667eea;color:#fff;cursor:pointer;font-size:.9rem;margin-top:.5rem}
h2{margin-top:2rem;font-size:1.2rem}
</style>
</head>
<body>
<header id="site-header"></header>
<main>
<div class="tool-area">
<h1>🔄 CSS Card Swap on Hover Generator</h1>
<p>Create CSS card content swap/reveal on hover. 6 directions, adjustable size/colors. Copy HTML+CSS.</p>
<div class="controls">
<div class="ctrl-row"><label>Direction</label><select id="dir"><option value="up" selected>Up</option><option value="down">Down</option><option value="left">Left</option><option value="right">Right</option><option value="fade">Fade</option><option value="zoom">Zoom</option></select></div>
<div class="ctrl-row"><label>Width (px)</label><input type="number" id="w" value="200" min="100" max="400" style="width:80px"></div>
<div class="ctrl-row"><label>Height (px)</label><input type="number" id="h" value="260" min="100" max="400" style="width:80px"></div>
<div class="ctrl-row"><label>Radius (px)</label><input type="number" id="r" value="12" min="0" max="40" style="width:80px"></div>
<div class="ctrl-row"><label>Front Color</label><input type="color" id="c1" value="#667eea" style="width:60px;height:36px"></div>
<div class="ctrl-row"><label>Back Color</label><input type="color" id="c2" value="#764ba2" style="width:60px;height:36px"></div>
<div class="ctrl-row"><label>Duration (s)</label><input type="number" id="dur" value="0.4" min="0.1" max="2" step="0.1" style="width:80px"></div>
<div class="ctrl-row"><button class="copy-btn" onclick="update()">Update</button></div>
</div>
<h2>Preview (hover cards)</h2>
<div class="preview-box" id="preview"></div>
<h2>CSS</h2><div class="output-block"><textarea id="cssOut" readonly></textarea><button class="copy-btn" onclick="copyText('cssOut')">Copy CSS</button></div>
<h2>HTML</h2><div class="output-block"><textarea id="htmlOut" readonly></textarea><button class="copy-btn" onclick="copyText('htmlOut')">Copy HTML</button></div>
</div>
</main>
<script src="/assets/app.js"></script>
<script>
function update(){
var dir=document.getElementById('dir').value;
var w=document.getElementById('w').value;
var h=document.getElementById('h').value;
var r=document.getElementById('r').value;
var c1=document.getElementById('c1').value;
var c2=document.getElementById('c2').value;
var dur=parseFloat(document.getElementById('dur').value);
var frontTx='',backTx0='',backTx1='';
var dirs={up:'translateY(100%)',down:'translateY(-100%)',left:'translateX(100%)',right:'translateX(-100%)',fade:'translateY(0)',zoom:'scale(0.8)'};
var initT=dirs[dir];
var css='.swap-card{position:relative;width:'+w+'px;height:'+h+'px;border-radius:'+r+'px;overflow:hidden;cursor:pointer}\n'+
'.swap-card .face{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:1.4rem;font-weight:700;color:#fff;transition:transform '+dur+'s ease,opacity '+dur+'s ease;border-radius:'+r+'px}\n'+
'.swap-card .front{background:'+c1+';z-index:2}\n'+
'.swap-card .back{background:'+c2+';transform:'+initT+';opacity:'+(dir==='fade'||dir==='zoom'?'0':'1')+';z-index:1}\n'+
'.swap-card:hover .front{transform:'+(dir==='fade'?'translateY(-100%)':dir==='zoom'?'scale(1.2)':dirs[dir].replace('100%','-100%'))+';opacity:'+(dir==='fade'||dir==='zoom'?'0':'1')+'}\n'+
'.swap-card:hover .back{transform:'+(dir==='fade'?'translateY(0)':dir==='zoom'?'scale(1)':'translate(0,0)')+';opacity:1}';
var html='<div class="swap-card">\n  <div class="face front">Front Content</div>\n  <div class="face back">Back Content</div>\n</div>';
document.getElementById('cssOut').value=css;
document.getElementById('htmlOut').value=html;
var demo=html.replace(/class="swap-card"/g,'class="swap-card-demo"');
var demoCss=css.replace(/\.swap-card/g,'.swap-card-demo');
document.getElementById('preview').innerHTML='<style>'+demoCss+'</style>'+demo+demo+demo;
}
function copyText(id){var t=document.getElementById(id);t.select();document.execCommand('copy')}
['dir','w','h','r','c1','c2','dur'].forEach(function(id){var el=document.getElementById(id);el.addEventListener('input',update);el.addEventListener('change',update)});
update();
</script>
</body>
</html>
