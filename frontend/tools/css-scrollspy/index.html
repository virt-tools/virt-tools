<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CSS Scrollspy Navigation Generator — virt.tools</title>
<link rel="stylesheet" href="/assets/style.css">
<style>
.tool-area{max-width:900px;margin:2rem auto;padding:0 1rem}
.controls{display:grid;gap:1rem;margin:1.5rem 0;padding:1.5rem;background:#1a1a2e;border-radius:12px}
.ctrl-row{display:flex;gap:1rem;align-items:center;flex-wrap:wrap;margin-bottom:.5rem}
.ctrl-row label{font-weight:600;font-size:.9rem;min-width:120px}
.ctrl-row select,.ctrl-row input{padding:.5rem;border-radius:8px;border:1px solid #444;background:#0f0f1e;color:#eee}
.preview-box{margin:1.5rem 0;border-radius:12px;padding:0;background:#111;min-height:350px;overflow:hidden}
.output-block{margin:2rem 0}
.output-block textarea{width:100%;min-height:100px;font-family:monospace;font-size:.85rem;padding:1rem;border-radius:8px;border:1px solid #444;background:#0f0f1e;color:#eee;resize:vertical}
.copy-btn{padding:.6rem 1.2rem;border:none;border-radius:8px;background:#667eea;color:#fff;cursor:pointer;font-size:.9rem;margin-top:.5rem}
h2{margin-top:2rem;font-size:1.2rem}
</style>
</head>
<body>
<header id="site-header"></header>
<main>
<div class="tool-area">
<h1>🔍 CSS Scrollspy Navigation Generator</h1>
<p>Create CSS scrollspy section navigation with active section highlighting. 3 styles, 3 themes. Copy HTML+CSS+JS.</p>
<div class="controls">
<div class="ctrl-row">
<label>Style</label><select id="style"><option value="side" selected>Side dots</option><option value="top">Top bar</option><option value="bottom">Bottom bar</option></select>
<label>Theme</label><select id="theme"><option value="dark" selected>Dark</option><option value="light">Light</option><option value="gradient">Gradient</option></select>
</div>
<div class="ctrl-row">
<label>Sections</label><input type="text" id="sections" value="Intro,Features,Pricing,FAQ,Contact" style="width:250px">
<label>Accent</label><input type="color" id="accent" value="#667eea" style="width:40px;height:34px">
</div>
<div class="ctrl-row"><button class="copy-btn" onclick="update()">Update</button></div>
</div>
<h2>Preview</h2>
<div class="preview-box" id="preview"></div>
<h2>HTML</h2><div class="output-block"><textarea id="htmlOut" readonly></textarea><button class="copy-btn" onclick="copyText('htmlOut')">Copy HTML</button></div>
<h2>CSS</h2><div class="output-block"><textarea id="cssOut" readonly></textarea><button class="copy-btn" onclick="copyText('cssOut')">Copy CSS</button></div>
<h2>JS</h2><div class="output-block"><textarea id="jsOut" readonly></textarea><button class="copy-btn" onclick="copyText('jsOut')">Copy JS</button></div>
</div>
</main>
<script src="/assets/app.js"></script>
<script>
function update(){
var style=document.getElementById('style').value;
var theme=document.getElementById('theme').value;
var sections=document.getElementById('sections').value.split(',');
var accent=document.getElementById('accent').value;
var bg,tx;
if(theme==='dark'){bg='#1a1a2e';tx='#eee'}
else if(theme==='light'){bg='#fff';tx='#333'}
else{bg='linear-gradient(135deg,'+accent+',#764ba2)';tx='#fff'}
var pos=style==='side'?'right:1rem;top:50%;transform:translateY(-50%);flex-direction:column':style==='bottom'?'bottom:0;left:0;right:0':'top:0;left:0;right:0';
var navItems=sections.map(function(s,i){return '<a href="#sec'+i+'" data-target="sec'+i+'">'+s.trim()+'</a>'}).join('\n    ');
var html='<!-- Sections -->\n<div class="content">\n'+sections.map(function(s,i){return '<section id="sec'+i+'" style="min-height:100vh;display:flex;align-items:center;justify-content:center;font-size:2rem;color:#999">'+s.trim()+'</section>'}).join('\n')+'\n</div>\n<!-- Scrollspy nav -->\n<nav class="scrollspy-nav">\n    '+navItems+'\n</nav>';
var css='.scrollspy-nav{\n  position:fixed;\n  '+pos+';\n  display:flex;\n  gap:.75rem;\n  padding:.75rem 1rem;\n  background:'+(theme==='light'?'rgba(255,255,255,.9)':'rgba(26,26,46,.9)')+';\n  backdrop-filter:blur(8px);\n  border-radius:999px;\n  z-index:100;\n}\n.scrollspy-nav a{\n  padding:.5rem .75rem;\n  color:'+(theme==='light'?'#666':'#aaa')+';\n  text-decoration:none;\n  font-size:.85rem;\n  border-radius:999px;\n  transition:all .3s;\n}\n.scrollspy-nav a.active{\n  color:#fff;\n  background:'+accent+';\n}';
var js="const links=document.querySelectorAll('.scrollspy-nav a');\nconst sections=document.querySelectorAll('section[id]');\nconst obs=new IntersectionObserver(function(entries){\n  entries.forEach(function(e){\n    if(e.isIntersecting){\n      links.forEach(function(l){l.classList.toggle('active',l.dataset.target===e.target.id)});\n    }\n  });\n},{threshold:.5});\nsections.forEach(function(s){obs.observe(s)});";
document.getElementById('htmlOut').value=html;
document.getElementById('cssOut').value=css;
document.getElementById('jsOut').value=js;
var pv='<div style="position:relative;height:350px;overflow-y:auto;background:#0a0a16" id="pvScroll">';
pv+='<nav style="position:sticky;'+pos+';display:flex;gap:.5rem;padding:.5rem .75rem;background:'+(theme==='light'?'rgba(255,255,255,.9)':'rgba(26,26,46,.9)')+';backdrop-filter:blur(8px);border-radius:999px;z-index:100">';
sections.forEach(function(s,i){pv+='<a href="#" data-i="'+i+'" style="padding:.35rem .65rem;color:'+(theme==='light'?'#666':'#aaa')+';text-decoration:none;font-size:.75rem;border-radius:999px" onclick="return false">'+s.trim()+'</a>'});
pv+='</nav>';
sections.forEach(function(s,i){pv+='<section style="min-height:200px;display:flex;align-items:center;justify-content:center;font-size:1.5rem;color:#999;border-bottom:1px solid #222">'+s.trim()+'</section>'});
pv+='</div>';
document.getElementById('preview').innerHTML=pv;
var pvScroll=document.getElementById('pvScroll');
var pvLinks=pv.querySelectorAll('a');
pvScroll.addEventListener('scroll',function(){var idx=Math.floor(pvScroll.scrollTop/200);pvLinks.forEach(function(l,i){l.style.background=i===idx?accent:'transparent';l.style.color=i===idx?'#fff':(theme==='light'?'#666':'#aaa')})});
}
function copyText(id){var t=document.getElementById(id);t.select();document.execCommand('copy')}
['style','theme','sections','accent'].forEach(function(id){var el=document.getElementById(id);el.addEventListener(el.tagName==='SELECT'?'change':el.type==='color'?'input':'input',update)});
update();
</script>
</body>
</html>
