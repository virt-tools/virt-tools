<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="/assets/theme-init.js"></script>
<title>CSS CTA Section Generator — Virtual Tools</title>
<link rel="stylesheet" href="/assets/style.css">
<style>
.tool-wrap{max-width:800px;margin:0 auto;}
.tool-desc{font-size:14px;color:var(--text-secondary,#aaa);margin:8px 0 20px;}
.controls{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin:12px 0;}
.ctrl{display:flex;flex-direction:column;gap:4px;}
.ctrl label{font-size:12px;color:var(--text-secondary,#888);}
.ctrl input,.ctrl select,.ctrl textarea{padding:6px 8px;border-radius:6px;border:1px solid var(--border,#444);background:var(--bg,#1e2230);color:var(--text,#eee);font-size:13px;font-family:inherit;}
.ctrl textarea{resize:vertical;min-height:32px;}
button.action{padding:8px 16px;border-radius:6px;border:1px solid var(--border,#444);background:var(--card,#2a2f3e);color:var(--text,#eee);cursor:pointer;font-size:13px;margin:4px 4px 0 0;}
.preview{border:1px solid var(--border,#444);border-radius:8px;margin:12px 0;padding:48px 24px;overflow:hidden;}
.code-block{background:var(--bg,#1e2230);border:1px solid var(--border,#444);border-radius:8px;padding:12px;margin:8px 0;font-family:monospace;font-size:11px;color:var(--text,#eee);white-space:pre-wrap;word-break:break-all;max-height:400px;overflow:auto;}
.cta{text-align:center;padding:40px;border-radius:16px;}
.cta h2{margin:0 0 12px;font-size:24px;}
.cta p{margin:0 0 20px;font-size:15px;opacity:.8;}
.cta button{padding:12px 32px;border:none;border-radius:8px;font-size:15px;font-weight:600;cursor:pointer;}
</style>
</head>
<body>
<header id="site-header"></header>
<main>
<div class="tool-wrap">
<h1>📣 CSS CTA Section Generator</h1>
<p class="tool-desc">Create call-to-action sections with heading, subtext, button, and 4 background styles. Custom colors. Copy HTML+CSS.</p>
<div class="controls">
<div class="ctrl"><label>Style</label><select id="style" onchange="render()"><option value="solid" selected>Solid</option><option value="gradient">Gradient</option><option value="outline">Outline</option><option value="glass">Glass</option></select></div>
<div class="ctrl"><label>Heading</label><input type="text" id="heading" value="Ready to Get Started?" oninput="render()"></div>
<div class="ctrl" style="grid-column:1/-1;"><label>Subtext</label><textarea id="subtext" oninput="render()">Join thousands of users already benefiting from our platform.</textarea></div>
<div class="ctrl"><label>Button Text</label><input type="text" id="btnText" value="Sign Up Free" oninput="render()"></div>
<div class="ctrl"><label>Bg Color</label><input type="color" id="bgColor" value="#6c5ce7" oninput="render()"></div>
<div class="ctrl"><label>Bg Color 2</label><input type="color" id="bg2" value="#a29bfe" oninput="render()"></div>
<div class="ctrl"><label>Text Color</label><input type="color" id="txt" value="#ffffff" oninput="render()"></div>
<div class="ctrl"><label>Button Bg</label><input type="color" id="btnBg" value="#ffffff" oninput="render()"></div>
<div class="ctrl"><label>Button Text</label><input type="color" id="btnTxt" value="#6c5ce7" oninput="render()"></div>
<div class="ctrl"><label>Radius</label><input type="range" id="radius" min="0" max="30" value="16" oninput="render()"></div>
</div>
<div style="margin:8px 0;"><button class="action" onclick="copyCode()">Copy HTML+CSS</button></div>
<div class="preview" id="prev"></div>
<div class="code-block" id="code"></div>
</div>
</div>
</main>
<script src="/assets/app.js"></script>
<script>
let codeText='';
function v(id){return document.getElementById(id).value;}
function render(){
const style=v('style'),heading=v('heading'),subtext=v('subtext'),btnText=v('btnText');
const bg=v('bgColor'),bg2=v('bg2'),txt=v('txt'),btnBg=v('btnBg'),btnTxt=v('btnTxt'),r=v('radius');
let bgCss='';
if(style==='gradient'){bgCss=`background:linear-gradient(135deg,${bg},${bg2});`;}
else if(style==='outline'){bgCss=`background:transparent;border:2px solid ${bg};`;}
else if(style==='glass'){bgCss=`background:${bg}20;backdrop-filter:blur(12px);border:1px solid ${bg}40;`;}
else{bgCss=`background:${bg};`;}
const html=`<div class="cta" style="${bgCss}color:${txt};border-radius:${r}px;"><h2>${heading}</h2><p>${subtext}</p><button style="background:${btnBg};color:${btnTxt};border-radius:8px;">${btnText}</button></div>`;
document.getElementById('prev').innerHTML=html;
codeText=`<style>
.cta {
  text-align: center;
  padding: 40px;
  border-radius: ${r}px;
  color: ${txt};
  ${bgCss}
}
.cta h2 { margin: 0 0 12px; font-size: 24px; }
.cta p { margin: 0 0 20px; font-size: 15px; opacity: 0.8; }
.cta button {
  padding: 12px 32px;
  border: none;
  border-radius: 8px;
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
  background: ${btnBg};
  color: ${btnTxt};
}
</style>

<div class="cta">
  <h2>${heading}</h2>
  <p>${subtext}</p>
  <button>${btnText}</button>
</div>`;
document.getElementById('code').textContent=codeText;
}
function copyCode(){navigator.clipboard.writeText(codeText).then(()=>alert('Copied!'));}
render();
</script>
</body>
</html>
