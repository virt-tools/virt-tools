<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <script src="/assets/theme-init.js"></script>
  <title>SQL Formatter — Virtual Tools</title>
  <link rel="stylesheet" href="/assets/style.css">
</head>
<body>
  <div id="site-header"></div>
  <main>
    <div class="tool-header">
      <a class="back" href="/">← All tools</a>
      <h1>SQL Formatter</h1>
      <p>Pretty-print SQL in your browser with sql-formatter. Supports many dialects — parsed and rendered locally, nothing uploaded.</p>
    </div>

    <div class="panel">
      <div class="field">
        <label for="in">SQL input</label>
        <textarea id="in" placeholder="select id,name from users where active=1 order by name;" style="min-height:120px; font-family:monospace;"></textarea>
      </div>
      <div class="row" style="align-items:flex-end; flex-wrap:wrap;">
        <div>
          <label for="lang">Dialect</label>
          <select id="lang">
            <option value="sql">Standard SQL</option>
            <option value="postgresql">PostgreSQL</option>
            <option value="mysql">MySQL</option>
            <option value="mariadb">MariaDB</option>
            <option value="sqlite">SQLite</option>
            <option value="bigquery">BigQuery</option>
            <option value="tsql">T-SQL</option>
            <option value="plsql">PL/SQL</option>
            <option value="db2">DB2</option>
            <option value="redshift">Redshift</option>
            <option value="snowflake">Snowflake</option>
            <option value="hive">Hive</option>
            <option value="spark">Spark</option>
            <option value="duckdb">DuckDB</option>
            <option value="n1ql">N1QL</option>
          </select>
        </div>
        <div>
          <label for="indent">Indent</label>
          <select id="indent">
            <option value="2" selected>2 spaces</option>
            <option value="4">4 spaces</option>
            <option value="\t">Tab</option>
          </select>
        </div>
        <div>
          <label for="kw">Keywords</label>
          <select id="kw">
            <option value="preserve" selected>Preserve</option>
            <option value="upper">Upper</option>
            <option value="lower">Lower</option>
          </select>
        </div>
        <div>
          <label for="lbq">Lines between queries</label>
          <input id="lbq" type="number" min="0" max="5" value="1" style="width:64px;">
        </div>
        <button id="format">Format</button>
        <button id="clear" class="secondary">Clear</button>
      </div>
      <div class="spacer"></div>
      <div class="row" style="justify-content:space-between;">
        <label for="out">Output</label>
        <button id="copy" class="secondary" style="padding:4px 10px;">Copy</button>
      </div>
      <div class="output" id="out" style="white-space:pre; font-family:monospace;"></div>
      <p class="note" id="note">Formatted locally with sql-formatter.</p>
    </div>
  </main>

  <script src="/assets/app.js"></script>
  <script src="/vendor/sql-formatter.min.js"></script>
  <script>
  (function () {
    var inp = document.getElementById("in");
    var out = document.getElementById("out");
    var note = document.getElementById("note");
    var langEl = document.getElementById("lang");
    var indentEl = document.getElementById("indent");
    var kwEl = document.getElementById("kw");
    var lbqEl = document.getElementById("lbq");
    var sf = window.sqlFormatter;

    function indentValue() {
      var v = indentEl.value;
      return v === "\\t" ? "\t" : parseInt(v, 10);
    }

    function show(text, err) {
      out.textContent = text;
      out.style.color = err ? "var(--bad)" : "";
      note.textContent = err || "Formatted locally with sql-formatter.";
    }

    document.getElementById("format").addEventListener("click", function () {
      var sql = inp.value;
      if (!sql.trim()) { show("", "Paste some SQL first."); return; }
      if (!sf || !sf.format) { show("", "Error: sql-formatter failed to load."); return; }
      try {
        var res = sf.format(sql, {
          language: langEl.value,
          tabWidth: indentValue(),
          keywordCase: kwEl.value,
          linesBetweenQueries: parseInt(lbqEl.value, 10) || 1
        });
        show(res, null);
      } catch (e) {
        show("", "Error: " + (e && e.message ? e.message : e));
      }
    });

    document.getElementById("clear").addEventListener("click", function () {
      inp.value = ""; show("", null);
    });

    document.getElementById("copy").addEventListener("click", function () {
      var t = out.textContent;
      if (!t) return;
      var b = this;
      if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(t).then(function () {
          b.textContent = "Copied!"; setTimeout(function () { b.textContent = "Copy"; }, 1200);
        });
      } else {
        var ta = document.createElement("textarea");
        ta.value = t; document.body.appendChild(ta); ta.select();
        try { document.execCommand("copy"); b.textContent = "Copied!"; setTimeout(function () { b.textContent = "Copy"; }, 1200); }
        catch (e) {}
        ta.remove();
      }
    });
  })();
  </script>
</body>
</html>
