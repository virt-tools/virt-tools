<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="/assets/theme-init.js"></script>
<title>CSS Feature Grid Generator — Virtual Tools</title>
<link rel="stylesheet" href="/assets/style.css">
<style>
.tool-wrap{max-width:800px;margin:0 auto;}
.tool-desc{font-size:14px;color:var(--text-secondary,#aaa);margin:8px 0 20px;}
.controls{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin:12px 0;}
.ctrl{display:flex;flex-direction:column;gap:4px;}
.ctrl label{font-size:12px;color:var(--text-secondary,#888);}
.ctrl input,.ctrl select{padding:6px 8px;border-radius:6px;border:1px solid var(--border,#444);background:var(--bg,#1e2230);color:var(--text,#eee);font-size:13px;}
button.action{padding:8px 16px;border-radius:6px;border:1px solid var(--border,#444);background:var(--card,#2a2f3e);color:var(--text,#eee);cursor:pointer;font-size:13px;margin:4px 4px 0 0;}
.preview{border:1px solid var(--border,#444);border-radius:8px;margin:12px 0;padding:24px;}
.code-block{background:var(--bg,#1e2230);border:1px solid var(--border,#444);border-radius:8px;padding:12px;margin:8px 0;font-family:monospace;font-size:11px;color:var(--text,#eee);white-space:pre-wrap;word-break:break-all;max-height:400px;overflow:auto;}
.feat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px;}
.feat-item{padding:20px;border-radius:12px;text-align:center;}
.feat-item .icon{font-size:32px;margin-bottom:8px;}
.feat-item .title{font-size:15px;font-weight:700;margin-bottom:6px;}
.feat-item .desc{font-size:13px;line-height:1.5;opacity:.7;}
</style>
</head>
<body>
<header id="site-header"></header>
<main>
<div class="tool-wrap">
<h1>✨ CSS Feature Grid Generator</h1>
<p class="tool-desc">Create feature grid sections with icons, titles, and descriptions. 3 styles, 2-6 items, custom colors. Copy HTML+CSS.</p>
<div class="controls">
<div class="ctrl"><label>Style</label><select id="style" onchange="render()"><option value="card" selected>Card</option><option value="outline">Outline</option><option value="minimal">Minimal</option></select></div>
<div class="ctrl"><label>Columns</label><select id="cols" onchange="render()"><option value="2">2</option><option value="3" selected>3</option><option value="4">4</option></select></div>
<div class="ctrl"><label>Items</label><select id="items" onchange="render()"><option value="3" selected>3</option><option value="4">4</option><option value="6">6</option></select></div>
<div class="ctrl"><label>Card Bg</label><input type="color" id="cardBg" value="#2a2f3e" oninput="render()"></div>
<div class="ctrl"><label>Accent</label><input type="color" id="accent" value="#6c5ce7" oninput="render()"></div>
<div class="ctrl"><label>Text</label><input type="color" id="txt" value="#ffffff" oninput="render()"></div>
</div>
<div style="margin:8px 0;"><button class="action" onclick="copyCode()">Copy HTML+CSS</button></div>
<div class="preview" id="prev"></div>
<div class="code-block" id="code"></div>
</div>
</div>
</main>
<script src="/assets/app.js"></script>
<script>
let codeText='';
const defaultItems=[['⚡','Fast','Lightning quick results'],['🔒','Private','No data leaves your browser'],['🎯','Precise','Accurate every time'],['📱','Responsive','Works on any device'],['🎨','Beautiful','Clean modern design'],['🔍','Smart','Intelligent algorithms']];
function v(id){return document.getElementById(id).value;}
function render(){
const style=v('style'),cols=v('cols'),n=parseInt(v('items')),cardBg=v('cardBg'),accent=v('accent'),txt=v('txt');
let cardCss='';
if(style==='outline'){cardCss=`background:transparent;border:1px solid ${accent}33;`;}
else if(style==='minimal'){cardCss=`background:transparent;`;}
else{cardCss=`background:${cardBg};box-shadow:0 2px 8px rgba(0,0,0,.12);`;}
let html=`<div class="feat-grid" style="grid-template-columns:repeat(${cols},1fr);">`;
for(let i=0;i<n;i++){const it=defaultItems[i];
html+=`<div class="feat-item" style="${cardCss}color:${txt};"><div class="icon">${it[0]}</div><div class="title" style="color:${accent};">${it[1]}</div><div class="desc">${it[2]}</div></div>`;
}
html+='</div>';
document.getElementById('prev').innerHTML=html;
codeText=`<style>
.feat-grid {
  display: grid;
  grid-template-columns: repeat(${cols}, 1fr);
  gap: 16px;
}
.feat-item {
  ${cardCss}
  color: ${txt};
  padding: 20px;
  border-radius: 12px;
  text-align: center;
}
.feat-item .icon { font-size: 32px; margin-bottom: 8px; }
.feat-item .title { font-size: 15px; font-weight: 700; margin-bottom: 6px; color: ${accent}; }
.feat-item .desc { font-size: 13px; line-height: 1.5; opacity: 0.7; }
</style>

<div class="feat-grid">`;
for(let i=0;i<n;i++){const it=defaultItems[i];
codeText+=`
  <div class="feat-item">
    <div class="icon">${it[0]}</div>
    <div class="title">${it[1]}</div>
    <div class="desc">${it[2]}</div>
  </div>`;
}
codeText+=`
</div>`;
document.getElementById('code').textContent=codeText;
}
function copyCode(){navigator.clipboard.writeText(codeText).then(()=>alert('Copied!'));}
render();
</script>
</body>
</html>
