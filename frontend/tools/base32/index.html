<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <script src="/assets/theme-init.js"></script>
  <title>Base32 Encode / Decode — Virtual Tools</title>
  <link rel="stylesheet" href="/assets/style.css">
</head>
<body>
  <div id="site-header"></div>
  <main>
    <div class="tool-header">
      <a class="back" href="/">← All tools</a>
      <h1>Base32 Encode / Decode</h1>
      <p>Encode text to Base32 (RFC 4648) or decode it back. Decode is lenient — case-insensitive, whitespace-tolerant and padding-optional. Runs entirely in your browser.</p>
    </div>

    <div class="panel">
      <div class="row" style="align-items:flex-end;">
        <div>
          <label for="mode">Mode</label>
          <select id="mode">
            <option value="encode" selected>Encode</option>
            <option value="decode">Decode</option>
          </select>
        </div>
        <label class="check"><input type="checkbox" id="nopad"> Omit padding (=)</label>
        <label class="check"><input type="checkbox" id="upper" checked> Uppercase output</label>
      </div>

      <div class="spacer"></div>
      <div class="field">
        <label for="in">Input</label>
        <textarea id="in" placeholder="Type text to encode, or Base32 to decode…" style="min-height:120px;">Hello World</textarea>
      </div>

      <div class="spacer"></div>
      <div class="row" style="justify-content:space-between;">
        <label for="out">Output</label>
        <button id="copy" class="secondary" style="padding:4px 10px;">Copy</button>
      </div>
      <div class="output" id="out" style="word-break:break-all; min-height:1.6em;"></div>
      <p class="note" id="note">RFC 4648 alphabet: A–Z and 2–7. Decoding handles lowercase, spaces and missing padding.</p>
    </div>
  </main>

  <script src="/assets/app.js"></script>
  <script>
  (function () {
    var mode = document.getElementById("mode");
    var nopad = document.getElementById("nopad");
    var upper = document.getElementById("upper");
    var inEl = document.getElementById("in");
    var out = document.getElementById("out");
    var copy = document.getElementById("copy");
    var note = document.getElementById("note");

    var ALPHA = "ABCDEFGHIJKLMNOPQRSTUVWXYZ234567";

    function enc(bytes) {
      var res = "";
      for (var i = 0; i < bytes.length; i += 5) {
        var n = Math.min(5, bytes.length - i);
        var buf = 0;
        for (var j = 0; j < n; j++) buf = (buf << 8) | bytes[i + j];
        buf <<= (5 - n) * 8; // left-align data into the 40-bit field
        var nchars = [0, 2, 4, 5, 7, 8][n];
        for (var c = 0; c < nchars; c++) res += ALPHA[(buf >>> (35 - 5 * c)) & 0x1F];
        for (var c = nchars; c < 8; c++) res += "=";
      }
      if (nopad.checked) res = res.replace(/=+$/, "");
      if (!upper.checked) res = res.toLowerCase();
      return res;
    }

    function dec(str) {
      str = str.toUpperCase().replace(/[^A-Z2-7=]/g, "").replace(/=+$/, "");
      var bits = 0, nbits = 0;
      var bytes = [];
      for (var i = 0; i < str.length; i++) {
        var ch = str.charAt(i);
        if (ch === "=") continue;
        var v = ALPHA.indexOf(ch);
        if (v < 0) throw new Error("Invalid Base32 character: " + ch);
        bits = (bits << 5) | v;
        nbits += 5;
        while (nbits >= 8) {
          bytes.push((bits >>> (nbits - 8)) & 0xFF);
          nbits -= 8;
        }
      }
      return bytes;
    }

    function run() {
      var v = inEl.value;
      try {
        if (mode.value === "encode") {
          var bytes = new TextEncoder().encode(v);
          out.textContent = enc(bytes);
          note.textContent = "Encoded " + v.length + " characters (" + bytes.length + " UTF-8 bytes).";
        } else {
          var bytes = dec(v);
          if (!bytes.length) { out.textContent = "—"; note.textContent = "No data."; return; }
          var text = new TextDecoder("utf-8", { fatal: false }).decode(new Uint8Array(bytes));
          out.textContent = text;
          note.textContent = "Decoded " + v.replace(/\s/g, "").length + " Base32 characters → " + bytes.length + " bytes.";
        }
        out.style.color = "";
      } catch (e) {
        out.textContent = "Error: " + (e && e.message ? e.message : e);
        note.textContent = "";
        out.style.color = "var(--bad)";
      }
    }

    function copyText() {
      var t = out.textContent;
      if (!t || t === "—" || t.indexOf("Error") === 0) return;
      function done() { copy.textContent = "Copied!"; setTimeout(function () { copy.textContent = "Copy"; }, 1200); }
      if (navigator.clipboard && navigator.clipboard.writeText) navigator.clipboard.writeText(t).then(done);
      else { var ta = document.createElement("textarea"); ta.value = t; document.body.appendChild(ta); ta.select(); try { document.execCommand("copy"); done(); } catch (e) {} ta.remove(); }
    }

    [mode, nopad, upper].forEach(function (el) {
      el.addEventListener("input", run);
      el.addEventListener("change", run);
    });
    inEl.addEventListener("input", run);
    copy.addEventListener("click", copyText);

    run();
  })();
  </script>
</body>
</html>
