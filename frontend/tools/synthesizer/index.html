<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="/assets/theme-init.js"></script>
<title>Synthesizer — Virtual Tools</title>
<link rel="stylesheet" href="/assets/style.css">
<style>
.tool-wrap{max-width:700px;margin:0 auto;}
.controls{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin:15px 0;}
.ctrl-group{background:var(--bg-alt,#1a1f2e);border-radius:8px;padding:12px;}
.ctrl-group h3{font-size:13px;margin:0 0 8px;text-transform:uppercase;opacity:.6;}
label{display:block;font-size:13px;margin:6px 0 2px;}
select,input[type=range]{width:100%;padding:4px;border-radius:4px;border:1px solid var(--border,#333);background:var(--bg,#0d1117);color:var(--text,#e0e0e0);font-size:13px;box-sizing:border-box;}
input[type=range]{padding:0;}
.val{display:inline-block;font-size:12px;opacity:.6;min-width:40px;text-align:right;}
.keyboard{display:flex;position:relative;margin:20px 0;user-select:none;}
.white-key{width:40px;height:160px;border:1px solid #333;border-radius:0 0 4px 4px;background:#f0f0f0;cursor:pointer;display:flex;align-items:flex-end;justify-content:center;padding-bottom:8px;font-size:11px;color:#333;}
.white-key:hover{background:#e0e0e0;}
.white-key.active{background:#1565c0;color:#fff;}
.black-key{position:absolute;width:26px;height:100px;background:#222;border:1px solid #000;border-radius:0 0 3px 3px;cursor:pointer;z-index:2;display:flex;align-items:flex-end;justify-content:center;padding-bottom:6px;font-size:9px;color:#888;}
.black-key:hover{background:#333;}
.black-key.active{background:#1565c0;}
.preset-btn{padding:6px 12px;border-radius:6px;border:1px solid var(--border,#333);background:var(--bg-alt);color:var(--text);cursor:pointer;font-size:12px;margin:3px;}
.preset-btn.active{background:#1565c0;color:#fff;border-color:#1565c0;}
.preset-row{margin:10px 0;}
.note-display{text-align:center;font-size:24px;font-weight:bold;margin:10px 0;min-height:30px;}
</style>
</head>
<body>
<header id="site-header"></header>
<main>
<div class="tool-wrap">
<h1>Synthesizer</h1>
<p class="tool-desc">A playable polyphonic synthesizer with multiple waveforms, ADSR envelope, lowpass filter, and presets. Click keys or use your keyboard (A-K row). All sound is generated live — no audio files, no network.</p>

<div class="note-display" id="noteDisplay">—</div>

<div class="preset-row">
<button class="preset-btn active" onclick="setPreset('sine','sine')">Pure Sine</button>
<button class="preset-btn" onclick="setPreset('square','square')">Square</button>
<button class="preset-btn" onclick="setPreset('sawtooth','sawtooth')">Saw</button>
<button class="preset-btn" onclick="setPreset('triangle','triangle')">Triangle</button>
<button class="preset-btn" onclick="setPreset('sawtooth','square')">Fat Lead</button>
<button class="preset-btn" onclick="setPreset('square','sawtooth')">Harsh</button>
</div>

<div class="controls">
<div class="ctrl-group">
<h3>Oscillator</h3>
<label>Wave Type</label>
<select id="waveType" onchange="cfg.wave=this.value">
<option value="sine">Sine</option>
<option value="square">Square</option>
<option value="sawtooth">Sawtooth</option>
<option value="triangle">Triangle</option>
</select>
<label>Octave</label>
<input type="range" id="octave" min="-2" max="2" value="0" oninput="cfg.octave=+this.value;updateOctLabel()">
<span class="val" id="octLabel">0</span>
<label>Detune (cents)</label>
<input type="range" id="detune" min="-50" max="50" value="0" oninput="cfg.detune=+this.value;this.nextElementSibling.textContent=this.value">
<span class="val">0</span>
</div>
<div class="ctrl-group">
<h3>Envelope (ADSR)</h3>
<label>Attack <span class="val" id="aVal">0.01</span></label>
<input type="range" id="attack" min="0" max="2" step="0.01" value="0.01" oninput="cfg.attack=+this.value;document.getElementById('aVal').textContent=this.value">
<label>Decay <span class="val" id="dVal">0.1</span></label>
<input type="range" id="decay" min="0" max="2" step="0.01" value="0.1" oninput="cfg.decay=+this.value;document.getElementById('dVal').textContent=this.value">
<label>Sustain <span class="val" id="sVal">0.7</span></label>
<input type="range" id="sustain" min="0" max="1" step="0.01" value="0.7" oninput="cfg.sustain=+this.value;document.getElementById('sVal').textContent=this.value">
<label>Release <span class="val" id="rVal">0.3</span></label>
<input type="range" id="release" min="0" max="3" step="0.01" value="0.3" oninput="cfg.release=+this.value;document.getElementById('rVal').textContent=this.value">
</div>
<div class="ctrl-group">
<h3>Filter</h3>
<label>Cutoff <span class="val" id="fVal">8000</span></label>
<input type="range" id="cutoff" min="100" max="12000" step="50" value="8000" oninput="cfg.cutoff=+this.value;document.getElementById('fVal').textContent=this.value;updateFilter()">
<label>Resonance <span class="val" id="qVal">1</span></label>
<input type="range" id="resonance" min="0" max="20" step="0.1" value="1" oninput="cfg.resonance=+this.value;document.getElementById('qVal').textContent=this.value;updateFilter()">
</div>
<div class="ctrl-group">
<h3>Volume</h3>
<label>Master <span class="val" id="vVal">0.5</span></label>
<input type="range" id="volume" min="0" max="1" step="0.01" value="0.5" oninput="cfg.volume=+this.value;document.getElementById('vVal').textContent=this.value;masterGain.gain.value=cfg.volume">
</div>
</div>

<div class="keyboard" id="keyboard"></div>
</div>
</main>
<script src="/assets/app.js"></script>
<script>
const NOTES=['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
const WHITE=[0,2,4,5,7,9,11,12,14,16,17,19,21,23];
const BLACK=[{n:1,p:0},{n:3,p:1},{n:6,p:3},{n:8,p:4},{n:10,p:5},{n:13,p:7},{n:15,p:8},{n:18,p:10},{n:20,p:11},{n:22,p:12}];
const KEY_MAP={'a':0,'w':1,'s':2,'e':3,'d':4,'f':5,'t':6,'g':7,'y':8,'h':9,'u':10,'j':11,'k':12,'o':13,'l':14,'p':15,';':16};
const cfg={wave:'sine',octave:0,detune:0,attack:0.01,decay:0.1,sustain:0.7,release:0.3,cutoff:8000,resonance:1,volume:0.5};
let ctx,masterGain,filter,active={};

function initAudio(){
if(ctx)return;
ctx=new(AudioContext||webkitAudioContext)();
masterGain=ctx.createGain();masterGain.gain.value=cfg.volume;
filter=ctx.createBiquadFilter();filter.type='lowpass';filter.frequency.value=cfg.cutoff;filter.Q.value=cfg.resonance;
filter.connect(masterGain);masterGain.connect(ctx.destination);
}

function noteFreq(midi){return 440*Math.pow(2,(midi-69)/12);}
function updateFilter(){if(filter){filter.frequency.value=cfg.cutoff;filter.Q.value=cfg.resonance;}}
function updateOctLabel(){document.getElementById('octLabel').textContent=cfg.octave;}

function noteOn(midi){
midi+=cfg.octave*12;
if(active[midi])return;
initAudio();
const osc=ctx.createOscillator();osc.type=cfg.wave;osc.frequency.value=noteFreq(midi);osc.detune.value=cfg.detune;
const g=ctx.createGain();
osc.connect(g);g.connect(filter);
const t=ctx.currentTime;
g.gain.setValueAtTime(0,t);
g.gain.linearRampToValueAtTime(1,t+cfg.attack);
g.gain.linearRampToValueAtTime(cfg.sustain,t+cfg.attack+cfg.decay);
osc.start(t);
active[midi]={osc,g};
document.getElementById('noteDisplay').textContent=NOTES[midi%12]+(Math.floor(midi/12)-1);
}

function noteOff(midi){
midi+=cfg.octave*12;
const a=active[midi];if(!a)return;
const t=ctx.currentTime;
a.g.gain.cancelScheduledValues(t);
a.g.gain.setValueAtTime(a.g.gain.value,t);
a.g.gain.linearRampToValueAtTime(0,t+cfg.release);
a.osc.stop(t+cfg.release+0.01);
delete active[midi];
}

function buildKeyboard(){
const kb=document.getElementById('keyboard');
WHITE.forEach((n,i)=>{
const k=document.createElement('div');k.className='white-key';
const midi=60+n;k.dataset.midi=midi;
k.textContent=NOTES[n%12];
k.onmousedown=()=>{noteOn(midi);k.classList.add('active');};
k.onmouseup=()=>{noteOff(midi);k.classList.remove('active');};
k.onmouseleave=()=>{if(k.classList.contains('active')){noteOff(midi);k.classList.remove('active');}};
kb.appendChild(k);
});
BLACK.forEach(b=>{
const k=document.createElement('div');k.className='black-key';
const midi=60+b.n;k.dataset.midi=midi;
k.style.left=(b.p*40+27)+'px';
k.onmousedown=()=>{noteOn(midi);k.classList.add('active');};
k.onmouseup=()=>{noteOff(midi);k.classList.remove('active');};
k.onmouseleave=()=>{if(k.classList.contains('active')){noteOff(midi);k.classList.remove('active');}};
kb.appendChild(k);
});
}

function setPreset(w1,w2){
cfg.wave=w1;document.getElementById('waveType').value=w1;
document.querySelectorAll('.preset-btn').forEach(b=>b.classList.remove('active'));
event.target.classList.add('active');
}

document.addEventListener('keydown',e=>{
if(e.repeat||!KEY_MAP.hasOwnProperty(e.key))return;
const keys=document.querySelectorAll('[data-midi]');
const midi=60+KEY_MAP[e.key];
const el=Array.from(keys).find(k=>+k.dataset.midi===midi);
if(el){noteOn(midi);el.classList.add('active');}
});
document.addEventListener('keyup',e=>{
if(!KEY_MAP.hasOwnProperty(e.key))return;
const keys=document.querySelectorAll('[data-midi]');
const midi=60+KEY_MAP[e.key];
const el=Array.from(keys).find(k=>+k.dataset.midi===midi);
if(el){noteOff(midi);el.classList.remove('active');}
});

VT.ready(buildKeyboard);
</script>
</body>
</html>
