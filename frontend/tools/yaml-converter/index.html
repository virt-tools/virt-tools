<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <script src="/assets/theme-init.js"></script>
  <title>JSON ⇄ YAML Converter — Virtual Tools</title>
  <link rel="stylesheet" href="/assets/style.css">
</head>
<body>
  <div id="site-header"></div>
  <main>
    <div class="tool-header">
      <a class="back" href="/">← All tools</a>
      <h1>JSON ⇄ YAML Converter</h1>
      <p>Convert between JSON and YAML entirely in your browser. Parsed and rendered locally with js-yaml — nothing is uploaded.</p>
    </div>

    <div class="panel">
      <div class="field">
        <label for="in">Input</label>
        <textarea id="in" placeholder='{"name":"ada","skills":["math","poetry"],"active":true}' style="min-height:160px;"></textarea>
      </div>
      <div class="row">
        <button id="to-yaml">JSON → YAML</button>
        <button id="to-json" class="secondary">YAML → JSON</button>
        <button id="clear" class="secondary">Clear</button>
        <div>
          <label for="indent">Indent</label>
          <select id="indent">
            <option value="2" selected>2 spaces</option>
            <option value="4">4 spaces</option>
          </select>
        </div>
      </div>
      <div class="spacer"></div>
      <div class="row" style="justify-content:space-between;">
        <label for="out">Output</label>
        <button id="copy" class="secondary" style="padding:4px 10px;">Copy</button>
      </div>
      <div class="output" id="out" style="white-space:pre;"></div>
      <p class="note" id="note"></p>
    </div>
  </main>

  <script src="/assets/app.js"></script>
  <script src="/vendor/js-yaml.min.js"></script>
  <script>
  (function () {
    var inp = document.getElementById("in");
    var out = document.getElementById("out");
    var note = document.getElementById("note");
    var indentSel = document.getElementById("indent");
    var jsyaml = window.jsyaml;

    function indentValue() {
      return parseInt(indentSel.value, 10) || 2;
    }

    function show(text) { out.textContent = text; }

    document.getElementById("to-yaml").addEventListener("click", function () {
      note.textContent = "";
      var text = inp.value.trim();
      if (!text) { show(""); note.textContent = "Paste some JSON first."; return; }
      try {
        var obj = JSON.parse(text);
        show(jsyaml.dump(obj, { indent: indentValue(), lineWidth: 100 }));
        note.textContent = "✓ Converted JSON to YAML.";
      } catch (e) {
        show(""); note.textContent = "✗ Invalid JSON: " + (e.message || e);
      }
    });

    document.getElementById("to-json").addEventListener("click", function () {
      note.textContent = "";
      var text = inp.value.trim();
      if (!text) { show(""); note.textContent = "Paste some YAML first."; return; }
      try {
        var obj = jsyaml.load(text);
        show(JSON.stringify(obj, null, indentValue()));
        note.textContent = "✓ Converted YAML to JSON.";
      } catch (e) {
        show(""); note.textContent = "✗ Invalid YAML: " + (e.message || e);
      }
    });

    document.getElementById("clear").addEventListener("click", function () {
      inp.value = ""; show(""); note.textContent = "";
    });

    document.getElementById("copy").addEventListener("click", function () {
      var text = out.textContent;
      if (!text) return;
      var btn = this;
      if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(text).then(function () {
          btn.textContent = "Copied!"; setTimeout(function () { btn.textContent = "Copy"; }, 1200);
        });
      } else {
        var ta = document.createElement("textarea");
        ta.value = text; document.body.appendChild(ta); ta.select();
        try { document.execCommand("copy"); btn.textContent = "Copied!"; setTimeout(function () { btn.textContent = "Copy"; }, 1200); }
        catch (e) {}
        ta.remove();
      }
    });
  })();
  </script>
</body>
</html>
