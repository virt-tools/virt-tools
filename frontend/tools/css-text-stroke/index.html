<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CSS Text Stroke Generator — virt.tools</title>
<link rel="stylesheet" href="/assets/style.css">
<style>
.tool-area{max-width:900px;margin:2rem auto;padding:0 1rem}
.controls{display:grid;gap:1rem;margin:1.5rem 0;padding:1.5rem;background:#1a1a2e;border-radius:12px}
.control-row{display:flex;gap:1rem;align-items:center;flex-wrap:wrap}
.control-row label{min-width:140px;font-weight:600;font-size:.9rem}
.control-row select,.control-row input{padding:.5rem .75rem;border-radius:8px;border:1px solid #444;background:#0f0f1e;color:#eee;font-size:.9rem}
.preview-box{margin:1.5rem 0;padding:2rem;background:#0f0f1e;border-radius:12px;display:flex;justify-content:center;align-items:center;min-height:150px}
.output-block{margin:2rem 0}
.output-block textarea{width:100%;min-height:80px;font-family:monospace;font-size:.85rem;padding:1rem;border-radius:8px;border:1px solid #444;background:#0f0f1e;color:#eee;resize:vertical}
.copy-btn{padding:.6rem 1.2rem;border:none;border-radius:8px;background:#667eea;color:#fff;cursor:pointer;font-size:.9rem;margin-top:.5rem}
h2{margin-top:2rem;font-size:1.2rem}
</style>
</head>
<body>
<header id="site-header"></header>
<main>
<div class="tool-area">
<h1>✏️ CSS Text Stroke Generator</h1>
<p>Create CSS text stroke/outline effects. Adjustable width, color, fill, and paint order. Copy CSS.</p>
<div class="controls">
<div class="control-row">
<label>Text</label><input type="text" id="text" value="STROKE" style="width:200px">
<label>Font Size (px)</label><input type="number" id="fontSize" value="72" min="12" max="200" style="width:80px">
</div>
<div class="control-row">
<label>Stroke Width (px)</label><input type="range" id="strokeWidth" min="0" max="10" step="0.5" value="2" style="width:120px"><span id="swVal">2px</span>
<label>Stroke Color</label><input type="color" id="strokeColor" value="#667eea">
</div>
<div class="control-row">
<label>Fill Color</label><input type="color" id="fillColor" value="#1a1a2e">
<label>Transparent Fill</label><input type="checkbox" id="transparent">
<label>Font Weight</label><select id="fontWeight"><option value="400">Normal</option><option value="700" selected>Bold</option><option value="900">Black</option></select>
</div>
<div class="control-row">
<label>Paint Order</label><select id="paintOrder"><option value="stroke fill">Stroke First</option><option value="fill stroke">Fill First</option><option value="fill stroke" selected>Default (Fill First)</option></select>
<label>Font Family</label><select id="fontFamily"><option value="Arial, sans-serif" selected>Arial</option><option value="Georgia, serif">Georgia</option><option value="'Courier New', monospace">Courier</option><option value="Impact, sans-serif">Impact</option></select>
</div>
</div>
<h2>Preview</h2>
<div class="preview-box" id="preview"></div>
<h2>CSS</h2><div class="output-block"><textarea id="cssOut" readonly></textarea><button class="copy-btn" onclick="copyText('cssOut')">Copy CSS</button></div>
<h2>HTML</h2><div class="output-block"><textarea id="htmlOut" readonly></textarea><button class="copy-btn" onclick="copyText('htmlOut')">Copy HTML</button></div>
</div>
</main>
<script src="/assets/app.js"></script>
<script>
function update(){
var text=document.getElementById('text').value||'STROKE';
var fs=document.getElementById('fontSize').value;
var sw=document.getElementById('strokeWidth').value;
var sc=document.getElementById('strokeColor').value;
var fc=document.getElementById('fillColor').value;
var trans=document.getElementById('transparent').checked;
var fw=document.getElementById('fontWeight').value;
var po=document.getElementById('paintOrder').value;
var ff=document.getElementById('fontFamily').value;
document.getElementById('swVal').textContent=sw+'px';
var fill=trans?'transparent':fc;
var css='.text-stroke {\n  font-size: '+fs+'px;\n  font-weight: '+fw+';\n  font-family: '+ff+';\n  -webkit-text-stroke: '+sw+'px '+sc+';\n  -webkit-text-fill-color: '+fill+';\n  color: '+fill+';\n  paint-order: '+po+';\n}';
var html='<span class="text-stroke">'+text+'</span>';
document.getElementById('preview').innerHTML='<span style="font-size:'+fs+'px;font-weight:'+fw+';font-family:'+ff+';-webkit-text-stroke:'+sw+'px '+sc+';-webkit-text-fill-color:'+fill+';color:'+fill+';paint-order:'+po+'">'+text+'</span>';
document.getElementById('cssOut').value=css;
document.getElementById('htmlOut').value=html;
}
function copyText(id){var t=document.getElementById(id);t.select();document.execCommand('copy')}
document.querySelectorAll('select,input').forEach(function(e){e.addEventListener('input',update);e.addEventListener('change',update)});
update();
</script>
</body>
</html>
