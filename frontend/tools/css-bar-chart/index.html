<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CSS Bar Chart Generator — virt.tools</title>
<link rel="stylesheet" href="/assets/style.css">
<style>
.tool-area{max-width:900px;margin:2rem auto;padding:0 1rem}
.controls{display:grid;gap:1rem;margin:1.5rem 0;padding:1.5rem;background:#1a1a2e;border-radius:12px}
.control-row{display:flex;gap:1rem;align-items:center;flex-wrap:wrap}
.control-row label{min-width:120px;font-weight:600;font-size:.9rem}
.control-row select,.control-row input{padding:.5rem .75rem;border-radius:8px;border:1px solid #444;background:#0f0f1e;color:#eee;font-size:.9rem}
.preview-box{margin:1.5rem 0;border-radius:12px;min-height:250px;padding:2rem;background:#f5f5f5;display:flex;align-items:flex-end;justify-content:center;gap:2rem}
.output-block{margin:2rem 0}
.output-block textarea{width:100%;min-height:100px;font-family:monospace;font-size:.85rem;padding:1rem;border-radius:8px;border:1px solid #444;background:#0f0f1e;color:#eee;resize:vertical}
.copy-btn{padding:.6rem 1.2rem;border:none;border-radius:8px;background:#667eea;color:#fff;cursor:pointer;font-size:.9rem;margin-top:.5rem}
h2{margin-top:2rem;font-size:1.2rem}
</style>
</head>
<body>
<header id="site-header"></header>
<main>
<div class="tool-area">
<h1>📊 CSS Bar Chart Generator</h1>
<p>Create CSS bar chart components using pure CSS. Adjustable bars, colors, orientations. Copy HTML+CSS.</p>
<div class="controls">
<div class="control-row">
<label>Bars</label><select id="bars"><option value="3">3</option><option value="5" selected>5</option><option value="7">7</option><option value="10">10</option></select>
<label>Orientation</label><select id="orient"><option value="v" selected>Vertical</option><option value="h">Horizontal</option></select>
<label>Style</label><select id="style"><option value="flat" selected>Flat</option><option value="gradient">Gradient</option><option value="rounded">Rounded</option></select>
<label>Show Values</label><select id="values"><option value="yes" selected>Yes</option><option value="no">No</option></select>
<label>Grid Lines</label><select id="grid"><option value="yes" selected>Yes</option><option value="no">No</option></select>
</div>
<div class="control-row" id="barRow"></div>
</div>
<h2>Preview</h2>
<div class="preview-box" id="preview"></div>
<h2>HTML</h2><div class="output-block"><textarea id="htmlOut" readonly></textarea><button class="copy-btn" onclick="copyText('htmlOut')">Copy HTML</button></div>
<h2>CSS</h2><div class="output-block"><textarea id="cssOut" readonly></textarea><button class="copy-btn" onclick="copyText('cssOut')">Copy CSS</button></div>
</div>
</main>
<script src="/assets/app.js"></script>
<script>
var defaultColors=['#667eea','#764ba2','#f093fb','#4facfe','#43e97b','#fa709a','#fee140','#30cfd0','#330867','#f5576c'];
var defaultLabels=['Mon','Tue','Wed','Thu','Fri','Sat','Sun','W8','W9','W10'];
var defaultVals=[45,72,38,90,55,68,42,80,60,35];
function buildBarInputs(){var n=+document.getElementById('bars').value;var row=document.getElementById('barRow');row.innerHTML='';for(var i=0;i<n;i++){row.innerHTML+='<label>Bar '+(i+1)+'</label><input type="color" value="'+defaultColors[i]+'" data-idx="'+i+'" class="bar-color" style="width:40px;padding:2px"><input type="text" value="'+defaultLabels[i]+'" data-idx="'+i+'" class="bar-label" style="width:60px"><input type="number" value="'+defaultVals[i]+'" data-idx="'+i+'" class="bar-val" min="0" max="100" style="width:50px">';}row.querySelectorAll('input').forEach(function(e){e.addEventListener('input',update);e.addEventListener('change',update)})}
function update(){
var n=+document.getElementById('bars').value;var orient=document.getElementById('orient').value;
var style=document.getElementById('style').value;var showVals=document.getElementById('values').value==='yes';
var showGrid=document.getElementById('grid').value==='yes';
var colors=[],labels=[],vals=[];for(var i=0;i<n;i++){colors.push(document.querySelectorAll('.bar-color')[i].value);labels.push(document.querySelectorAll('.bar-label')[i].value);vals.push(+document.querySelectorAll('.bar-val')[i].value)}
var maxVal=Math.max.apply(null,vals)||100;
var bg=style==='gradient'?'linear-gradient(180deg,var(--c1),var(--c2))':'var(--c1)';
var radius=style==='rounded'?'8px 8px 0 0':'0';
var html='<div class="bar-chart" style="display:'+(orient==='v'?'flex':'flex')+';flex-direction:'+(orient==='v'?'row':'column')+';align-items:'+(orient==='v'?'flex-end':'stretch')+';gap:'+(orient==='v'?'16px':'8px')+';height:300px;padding:1rem;position:relative">\n';
if(showGrid&&orient==='v'){for(var g=1;g<=4;g++){html+='  <div class="grid-line" style="position:absolute;left:0;right:0;bottom:'+(g*25)+'%;border-top:1px dashed #ddd"></div>\n';}}
for(var i=0;i<n;i++){
var h=Math.round(vals[i]/maxVal*100);
if(orient==='v'){
html+='  <div class="bar-item" style="display:flex;flex-direction:column;align-items:center;gap:4px;height:100%;justify-content:flex-end">\n';
if(showVals)html+='    <span class="bar-val" style="font-size:.75rem;font-weight:700;color:#333">'+vals[i]+'</span>\n';
html+='    <div class="bar-fill" style="width:40px;height:'+h+'%;background:'+(style==='gradient'?'linear-gradient(180deg,'+colors[i]+','+colors[i]+'88)':'colors[i]')+';border-radius:'+(style==='rounded'?'8px 8px 0 0':'0')+'"></div>\n    <span class="bar-label" style="font-size:.75rem;color:#666">'+labels[i]+'</span>\n  </div>\n';
}else{
html+='  <div class="bar-item" style="display:flex;align-items:center;gap:8px;width:100%">\n    <span class="bar-label" style="font-size:.75rem;color:#666;min-width:50px">'+labels[i]+'</span>\n    <div class="bar-fill" style="height:24px;width:'+h+'%;background:'+(style==='gradient'?'linear-gradient(90deg,'+colors[i]+','+colors[i]+'88)':'colors[i]')+';border-radius:'+(style==='rounded'?'0 8px 8px 0':'0')+'"></div>\n';
if(showVals)html+='    <span class="bar-val" style="font-size:.75rem;font-weight:700;color:#333">'+vals[i]+'</span>\n';
html+='  </div>\n';
}}
html+='</div>';
var css='.bar-chart{position:relative}\n.bar-item{display:flex}\n.bar-fill{transition:width .3s ease,height .3s ease}\n.bar-label{font-size:.75rem}\n.bar-val{font-size:.75rem;font-weight:700}\n.grid-line{border-top:1px dashed #ddd}';
document.getElementById('htmlOut').value=html;
document.getElementById('cssOut').value=css;
document.getElementById('preview').innerHTML=html;
}
function copyText(id){var t=document.getElementById(id);t.select();document.execCommand('copy')}
document.getElementById('bars').addEventListener('change',buildBarInputs);
document.getElementById('orient').addEventListener('change',update);
document.getElementById('style').addEventListener('change',update);
document.getElementById('values').addEventListener('change',update);
document.getElementById('grid').addEventListener('change',update);
buildBarInputs();update();
</script>
</body>
</html>
