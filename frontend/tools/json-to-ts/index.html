<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <script src="/assets/theme-init.js"></script>
  <title>JSON to TypeScript — Virtual Tools</title>
  <link rel="stylesheet" href="/assets/style.css">
</head>
<body>
  <div id="site-header"></div>
  <main>
    <div class="tool-header">
      <a class="back" href="/">← All tools</a>
      <h1>JSON to TypeScript</h1>
      <p>Automatically generate TypeScript interfaces from a JSON object. All processing happens locally in your browser.</p>
    </div>

    <div class="panel">
      <div class="field">
        <label for="in">JSON input</label>
        <textarea id="in" placeholder='{"id": 1, "name": "Product", "tags": ["new", "sale"], "details": {"weight": 1.2, "dimensions": {"w": 10, "h": 20}}}' style="min-height:160px;"></textarea>
      </div>
      <div class="row">
        <label for="rootName">Root Interface Name</label>
        <input type="text" id="rootName" value="RootObject" style="width:150px;">
        <button id="convert" style="margin-left:auto;">Convert</button>
        <button id="clear" class="secondary">Clear</button>
      </div>
      <div class="spacer"></div>
      <div class="row" style="justify-content:space-between;">
        <label for="out">TypeScript Interfaces</label>
        <button id="copy" class="secondary" style="padding:4px 10px;">Copy</button>
      </div>
      <div class="output" id="out" style="white-space:pre; font-family: monospace;">Scribe your JSON and click convert...</div>
      <p class="note" id="note"></p>
    </div>
  </main>

  <script src="/assets/app.js"></script>
  <script>
  (function () {
    var inp = document.getElementById("in");
    var out = document.getElementById("out");
    var note = document.getElementById("note");
    var rootNameInp = document.getElementById("rootName");

    function toPascalCase(str) {
      return str.replace(/(\w)(\w*)/g, function(g0, g1, g2) {
        return g1.toUpperCase() + g2.toLowerCase();
      }).replace(/[^a-zA-Z0-9]/g, '');
    }

    function convert() {
      note.textContent = "";
      var text = inp.value.trim();
      if (!text) {
        out.textContent = "Paste some JSON first.";
        return;
      }

      try {
        var obj = JSON.parse(text);
        var definitions = [];
        var structMap = new Map();
        var rootName = rootNameInp.value.trim() || "RootObject";

        function generateType(val, suggestedName) {
          if (val === null) return "any";
          if (Array.isArray(val)) {
            if (val.length === 0) return "any[]";
            var types = new Set();
            val.forEach(function(item, i) {
              types.add(generateType(item, suggestedName + "Item"));
            });
            var type = types.size === 1 ? Array.from(types)[0] : "{ " + Array.from(types).join(" | ") + " }";
            return type + "[]";
          }
          if (typeof val === "object") {
            var struct = JSON.stringify(val); // Simple structure check
            if (structMap.has(struct)) return structMap.get(struct);

            var name = toPascalCase(suggestedName);
            if (!name) name = "Interface";

            // Handle name collisions by adding index if necessary (simplified)
            var finalName = name;
            var counter = 1;
            while (structMap.has(finalName) && structMap.get(struct) !== finalName) {
              finalName = name + counter++;
            }

            structMap.set(struct, finalName);

            var props = {};
            for (var key in val) {
              props[key] = generateType(val[key], key);
            }
            definitions.push({ name: finalName, props: props });
            return finalName;
          }
          if (typeof val === "string") return "string";
          if (typeof val === "number") return "number";
          if (typeof val === "boolean") return "boolean";
          return "any";
        }

        // Initial call for the root object
        var rootType = generateType(obj, rootName);

        // The root definition might have been added to the list already.
        // Let's ensure the root name matches the input.
        var rootDef = definitions.find(function(d) { return d.name === rootType; });
        if (rootDef) {
          // We might want to rename the root definition if the user provided a specific rootName
          // But our generateType already used the suggestedName.
        }

        var result = "";
        definitions.forEach(function(def) {
          result += "interface " + def.name + " {\n";
          for (var key in def.props) {
            result += "  " + key + ": " + def.props[key] + ";\n";
          }
          result += "}\n\n";
        });

        out.textContent = result || "// No interfaces generated";
        note.textContent = "✓ Conversion complete.";
      } catch (e) {
        out.textContent = "";
        note.textContent = "Invalid JSON: " + (e.message || e);
      }
    }

    document.getElementById("convert").addEventListener("click", convert);
    document.getElementById("clear").addEventListener("click", function () {
      inp.value = ""; out.textContent = "Scribe your JSON and click convert..."; note.textContent = "";
    });

    document.getElementById("copy").addEventListener("click", function () {
      var text = out.textContent;
      if (!text) return;
      var btn = this;
      if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(text).then(function () {
          btn.textContent = "Copied!"; setTimeout(function () { btn.textContent = "Copy"; }, 1200);
        });
      } else {
        var ta = document.createElement("textarea");
        ta.value = text; document.body.appendChild(ta); ta.select();
        try { document.execCommand("copy"); btn.textContent = "Copied!"; setTimeout(function () { btn.textContent = "Copy"; }, 1200); }
        catch (e) {}
        ta.remove();
      }
    });
  })();
  </script>
</body>
</html>
