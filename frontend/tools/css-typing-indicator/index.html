<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CSS Typing Indicator Generator — virt.tools</title>
<link rel="stylesheet" href="/assets/style.css">
<style>
.tool-area{max-width:900px;margin:2rem auto;padding:0 1rem}
.controls{display:grid;gap:1rem;margin:1.5rem 0;padding:1.5rem;background:#1a1a2e;border-radius:12px}
.ctrl-row{display:flex;gap:1rem;align-items:center;flex-wrap:wrap;margin-bottom:.5rem}
.ctrl-row label{font-weight:600;font-size:.9rem;min-width:120px}
.ctrl-row select,.ctrl-row input{padding:.5rem;border-radius:8px;border:1px solid #444;background:#0f0f1e;color:#eee}
.preview-box{margin:1.5rem 0;border-radius:12px;padding:3rem 1.5rem;background:#111;min-height:200px;display:flex;align-items:center;justify-content:center;gap:2rem;flex-wrap:wrap;overflow:auto}
.output-block{margin:2rem 0}
.output-block textarea{width:100%;min-height:80px;font-family:monospace;font-size:.85rem;padding:1rem;border-radius:8px;border:1px solid #444;background:#0f0f1e;color:#eee;resize:vertical}
.copy-btn{padding:.6rem 1.2rem;border:none;border-radius:8px;background:#667eea;color:#fff;cursor:pointer;font-size:.9rem;margin-top:.5rem}
h2{margin-top:2rem;font-size:1.2rem}
</style>
</head>
<body>
<header id="site-header"></header>
<main>
<div class="tool-area">
<h1>💬 CSS Typing Indicator Generator</h1>
<p>Create CSS chat typing indicator dot animations. 5 styles, 3 sizes, custom colors and speed. Copy HTML+CSS.</p>
<div class="controls">
<div class="ctrl-row">
<label>Style</label><select id="style"><option value="dots" selected>Dots</option><option value="wave">Wave</option><option value="pulse">Pulse</option><option value="bar">Bar</option><option value="ripple">Ripple</option></select>
<label>Size</label><select id="size"><option value="sm">Small</option><option value="md" selected>Medium</option><option value="lg">Large</option></select>
</div>
<div class="ctrl-row">
<label>Color</label><input type="color" id="color" value="#94a3b8" style="width:40px;height:34px">
<label>Bg Color</label><input type="color" id="bgcolor" value="#1e293b" style="width:40px;height:34px">
<label>Speed</label><select id="speed"><option value="0.8">Fast</option><option value="1.4" selected>Normal</option><option value="2.5">Slow</option></select>
</div>
<div class="ctrl-row"><button class="copy-btn" onclick="update()">Update</button></div>
</div>
<h2>Preview</h2>
<div class="preview-box" id="preview"></div>
<h2>HTML</h2><div class="output-block"><textarea id="htmlOut" readonly></textarea><button class="copy-btn" onclick="copyText('htmlOut')">Copy HTML</button></div>
<h2>CSS</h2><div class="output-block"><textarea id="cssOut" readonly></textarea><button class="copy-btn" onclick="copyText('cssOut')">Copy CSS</button></div>
</div>
</main>
<script src="/assets/app.js"></script>
<script>
function update(){
var style=document.getElementById('style').value;
var size=document.getElementById('size').value;
var color=document.getElementById('color').value;
var bgcolor=document.getElementById('bgcolor').value;
var speed=document.getElementById('speed').value;
var sizes={sm:'6px',md:'10px',lg:'16px'};
var d=sizes[size];
var html='<div class="typing-indicator">\n  <span></span>\n  <span></span>\n  <span></span>\n</div>';
var css='.typing-indicator{\n  display:inline-flex;\n  align-items:center;\n  gap:'+Math.round(parseInt(d)*0.3)+'px;\n  padding:'+(parseInt(d)*1.2)+'px '+(parseInt(d)*1.5)+'px;\n  background:'+bgcolor+';\n  border-radius:999px;\n}\n.typing-indicator span{\n  width:'+d+';\n  height:'+d+';\n  border-radius:50%;\n  background:'+color+';\n  display:inline-block;\n  animation:'+style+' '+speed+'s ease-in-out infinite;\n}\n.typing-indicator span:nth-child(2){animation-delay:'+(parseFloat(speed)/3).toFixed(2)+'s}\n.typing-indicator span:nth-child(3){animation-delay:'+(parseFloat(speed)/3*2).toFixed(2)+'s}\n';
var anims={
dots:'@keyframes dots{0%,60%,100%{opacity:0.3;transform:translateY(0)}30%{opacity:1;transform:translateY(-4px)}}',
wave:'@keyframes wave{0%,60%,100%{transform:scaleY(1)}30%{transform:scaleY(1.8)}}',
pulse:'@keyframes pulse{0%,100%{transform:scale(1);opacity:.4}50%{transform:scale(1.3);opacity:1}}',
bar:'@keyframes bar{0%,100%{height:'+d+';opacity:.3}50%{height:'+(parseInt(d)*2)+'px;opacity:1}}',
ripple:'@keyframes ripple{0%{transform:scale(1);opacity:1}100%{transform:scale(2);opacity:0}}'
};
css+=anims[style];
if(style==='bar'){css=css.replace('border-radius:50%;','border-radius:2px;')}
document.getElementById('htmlOut').value=html;
document.getElementById('cssOut').value=css;
var gap=Math.round(parseInt(d)*0.3);
var pv='<div style="display:inline-flex;align-items:center;gap:'+gap+'px;padding:'+(parseInt(d)*1.2)+'px '+(parseInt(d)*1.5)+'px;background:'+bgcolor+';border-radius:999px">';
for(var i=0;i<3;i++){
pv+='<span style="width:'+d+';height:'+d+';border-radius:'+(style==='bar'?'2px':'50%')+';background:'+color+';display:inline-block;animation:'+style+'a '+speed+'s ease-in-out infinite '+(i*parseFloat(speed)/3).toFixed(2)+'s"></span>';
}
pv+='</div><style>@keyframes '+style+'a{'+anims[style].replace('@keyframes '+style+'{','').replace('}','')+'}</style>';
document.getElementById('preview').innerHTML=pv;
}
function copyText(id){var t=document.getElementById(id);t.select();document.execCommand('copy')}
['style','size','color','bgcolor','speed'].forEach(function(id){var el=document.getElementById(id);el.addEventListener(el.tagName==='SELECT'?'change':el.type==='color'?'input':'input',update)});
update();
</script>
</body>
</html>
