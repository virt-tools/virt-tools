<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CSS Feature List Generator — virt.tools</title>
<link rel="stylesheet" href="/assets/style.css">
<style>
.tool-area{max-width:900px;margin:2rem auto;padding:0 1rem}
.controls{display:grid;gap:1rem;margin:1.5rem 0;padding:1.5rem;background:#1a1a2e;border-radius:12px}
.ctrl-row{display:flex;gap:1rem;align-items:center;flex-wrap:wrap;margin-bottom:.5rem}
.ctrl-row label{font-weight:600;font-size:.9rem;min-width:120px}
.ctrl-row select,.ctrl-row input{padding:.5rem;border-radius:8px;border:1px solid #444;background:#0f0f1e;color:#eee}
.preview-box{margin:1.5rem 0;border-radius:12px;min-height:200px;padding:2rem;background:#f5f5f5;overflow-x:auto}
.output-block{margin:2rem 0}
.output-block textarea{width:100%;min-height:100px;font-family:monospace;font-size:.85rem;padding:1rem;border-radius:8px;border:1px solid #444;background:#0f0f1e;color:#eee;resize:vertical}
.copy-btn{padding:.6rem 1.2rem;border:none;border-radius:8px;background:#667eea;color:#fff;cursor:pointer;font-size:.9rem;margin-top:.5rem}
h2{margin-top:2rem;font-size:1.2rem}
</style>
</head>
<body>
<header id="site-header"></header>
<main>
<div class="tool-area">
<h1>✅ CSS Feature List Generator</h1>
<p>Create CSS feature list components with check/cross icons. 4 styles, 3 themes, 5-10 items. Copy HTML+CSS.</p>
<div class="controls">
<div class="ctrl-row">
<label>Style</label><select id="style"><option value="card" selected>Card</option><option value="minimal">Minimal</option><option value="outline">Outline</option><option value="pill">Pill</option></select>
<label>Theme</label><select id="theme"><option value="light" selected>Light</option><option value="dark">Dark</option><option value="gradient">Gradient</option></select>
<label>Items</label><select id="items"><option value="5">5</option><option value="6">6</option><option value="7" selected>7</option><option value="8">8</option><option value="9">9</option><option value="10">10</option></select>
</div>
<div class="ctrl-row">
<label>Check Color</label><input type="color" id="checkColor" value="#22c55e" style="width:50px;height:36px">
<label>Cross Color</label><input type="color" id="crossColor" value="#ef4444" style="width:50px;height:36px">
<button class="copy-btn" onclick="update()">Update</button>
</div>
</div>
<h2>Preview</h2>
<div class="preview-box" id="preview"></div>
<h2>HTML</h2><div class="output-block"><textarea id="htmlOut" readonly></textarea><button class="copy-btn" onclick="copyText('htmlOut')">Copy HTML</button></div>
<h2>CSS</h2><div class="output-block"><textarea id="cssOut" readonly></textarea><button class="copy-btn" onclick="copyText('cssOut')">Copy CSS</button></div>
</div>
</main>
<script src="/assets/app.js"></script>
<script>
var FEATURES=[
['Unlimited projects',true],['Priority support',true],['Custom domain',true],
['Advanced analytics',true],['Team collaboration',true],['API access',true],
['SSO / SAML',false],['SLA guarantee',false],['White-label',false],['Dedicated manager',false]
];
function update(){
var style=document.getElementById('style').value;var theme=document.getElementById('theme').value;
var items=+document.getElementById('items').value;
var checkCol=document.getElementById('checkColor').value;
var crossCol=document.getElementById('crossColor').value;
var bg=theme==='dark'?'#1a1a2e':'#fff';
var fg=theme==='dark'?'#fff':'#1a1a2e';
var sub=theme==='dark'?'#999':'#666';
var borderCol=theme==='dark'?'#333':'#e0e0e0';
var cardBg=theme==='dark'?'#252540':'#fafafa';
var gradBg=theme==='gradient'?'linear-gradient(135deg,#667eea,#764ba2)':checkCol;
var html='<div class="feat-list feat-'+style+' feat-'+theme+'">\n';
for(var i=0;i<items;i++){
var has=FEATURES[i][1];
var icon=has?'✓':'✕';var cls=has?'feat-yes':'feat-no';
html+='  <div class="feat-item '+cls+'">\n    <span class="feat-icon">'+icon+'</span>\n    <span class="feat-text">'+FEATURES[i][0]+'</span>\n  </div>\n';
}
html+='</div>';
var css='.feat-list{max-width:450px;margin:0 auto;border-radius:'+(style==='card'?'12px':'0')+';overflow:hidden'+(style==='card'?';box-shadow:0 2px 8px rgba(0,0,0,.1)':'')+'}\n'+
'.feat-'+style+'{padding:'+(style==='pill'?'0':'1.5rem')+'}\n'+
'.feat-item{display:flex;align-items:center;gap:.75rem;padding:.75rem 0;border-bottom:1px solid '+borderCol+'}\n'+
'.feat-item:last-child{border-bottom:none}\n'+
'.feat-pill .feat-item{border-radius:8px;padding:.75rem 1rem;margin-bottom:.5rem;background:'+(theme==='dark'?'#252540':'#f5f5f5')+'}\n'+
'.feat-pill .feat-item:last-child{border-bottom:1px solid '+borderCol+'}\n'+
'.feat-icon{display:inline-flex;align-items:center;justify-content:center;width:24px;height:24px;border-radius:50%;font-size:.8rem;font-weight:700;flex-shrink:0}\n'+
'.feat-yes .feat-icon{background:'+checkCol+';color:#fff}\n'+
'.feat-no .feat-icon{background:'+crossCol+';color:#fff}\n'+
'.feat-text{color:'+fg+';font-family:system-ui,sans-serif;font-size:.95rem}\n'+
'.feat-no .feat-text{opacity:.5;text-decoration:line-through}\n'+
'.feat-outline{border:1px solid '+borderCol+';border-radius:12px}\n'+
'.feat-dark{background:'+bg+'}';
document.getElementById('htmlOut').value=html;
document.getElementById('cssOut').value=css;
renderPreview();
}
function renderPreview(){
var style=document.getElementById('style').value;var theme=document.getElementById('theme').value;
var items=+document.getElementById('items').value;
var checkCol=document.getElementById('checkColor').value;
var crossCol=document.getElementById('crossColor').value;
var bg=theme==='dark'?'#1a1a2e':'#fff';
var fg=theme==='dark'?'#fff':'#1a1a2e';
var borderCol=theme==='dark'?'#333':'#e0e0e0';
var cardBg=theme==='dark'?'#252540':'#fafafa';
var h='<div style="max-width:450px;margin:0 auto;border-radius:'+(style==='card'?'12px':'0')+';overflow:hidden;padding:'+(style==='pill'?'0':'1rem')+(style==='card'?';box-shadow:0 2px 8px rgba(0,0,0,.1)':'')+(style==='outline'?';border:1px solid '+borderCol+';border-radius:12px':'')+';background:'+(theme==='dark'?bg:'#fff')+'">';
for(var i=0;i<items;i++){
var has=FEATURES[i][1];var icon=has?'✓':'✕';
h+='<div style="display:flex;align-items:center;gap:.75rem;padding:.75rem'+(style==='pill'?' 1rem':'')+';margin-bottom:'+(style==='pill'?'.5rem':'0')+';border-bottom:'+(style==='pill'?'none':'1px solid '+borderCol)+';border-radius:'+(style==='pill'?'8px':'0')+';background:'+(style==='pill'?(theme==='dark'?'#252540':'#f5f5f5'):'transparent')+'">';
h+='<span style="display:inline-flex;align-items:center;justify-content:center;width:24px;height:24px;border-radius:50%;font-size:.8rem;font-weight:700;flex-shrink:0;background:'+(has?checkCol:crossCol)+';color:#fff">'+icon+'</span>';
h+='<span style="color:'+fg+';font-family:system-ui,sans-serif;font-size:.95rem'+(has?'':';opacity:.5;text-decoration:line-through')+'">'+FEATURES[i][0]+'</span>';
h+='</div>';
}
h+='</div>';
document.getElementById('preview').style.background=theme==='dark'?'#1a1a2e':'#f5f5f5';
document.getElementById('preview').innerHTML=h;
}
function copyText(id){var t=document.getElementById(id);t.select();document.execCommand('copy')}
['style','theme','items'].forEach(function(id){document.getElementById(id).addEventListener('change',update)});
document.getElementById('checkColor').addEventListener('input',update);
document.getElementById('crossColor').addEventListener('input',update);
update();
</script>
</body>
</html>
