<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CSS Newsletter Popup Generator — virt.tools</title>
<link rel="stylesheet" href="/assets/style.css">
<style>
.tool-area{max-width:900px;margin:2rem auto;padding:0 1rem}
.controls{display:grid;gap:1rem;margin:1.5rem 0;padding:1.5rem;background:#1a1a2e;border-radius:12px}
.control-row{display:flex;gap:1rem;align-items:center;flex-wrap:wrap}
.control-row label{min-width:100px;font-weight:600;font-size:.9rem}
.control-row select,.control-row input{padding:.5rem .75rem;border-radius:8px;border:1px solid #444;background:#0f0f1e;color:#eee;font-size:.9rem}
.preview-box{margin:1.5rem 0;border-radius:12px;min-height:300px;overflow-y:auto;max-height:500px;position:relative}
.output-block{margin:2rem 0}
.output-block textarea{width:100%;min-height:120px;font-family:monospace;font-size:.85rem;padding:1rem;border-radius:8px;border:1px solid #444;background:#0f0f1e;color:#eee;resize:vertical}
.copy-btn{padding:.6rem 1.2rem;border:none;border-radius:8px;background:#667eea;color:#fff;cursor:pointer;font-size:.9rem;margin-top:.5rem}
h2{margin-top:2rem;font-size:1.2rem}
</style>
</head>
<body>
<header id="site-header"></header>
<main>
<div class="tool-area">
<h1>📧 CSS Newsletter Popup Generator</h1>
<p>Create CSS newsletter signup popup/modal components. 4 styles, 3 themes, close button. Copy HTML+CSS.</p>
<div class="controls">
<div class="control-row">
<label>Style</label><select id="style"><option value="card" selected>Card</option><option value="slide">Slide-in</option><option value="bar">Top Bar</option><option value="fullscreen">Fullscreen</option></select>
<label>Theme</label><select id="theme"><option value="light" selected>Light</option><option value="dark">Dark</option><option value="gradient">Gradient</option></select>
<label>Accent</label><input type="color" id="accent" value="#667eea">
<label>Width</label><input type="range" id="width" min="300" max="600" value="420" style="width:80px">
<label>Show Close</label><select id="close"><option value="yes" selected>Yes</option><option value="no">No</option></select>
</div>
</div>
<h2>Preview</h2>
<div class="preview-box" id="preview"></div>
<h2>HTML</h2><div class="output-block"><textarea id="htmlOut" readonly></textarea><button class="copy-btn" onclick="copyText('htmlOut')">Copy HTML</button></div>
<h2>CSS</h2><div class="output-block"><textarea id="cssOut" readonly></textarea><button class="copy-btn" onclick="copyText('cssOut')">Copy CSS</button></div>
</div>
</main>
<script src="/assets/app.js"></script>
<script>
function update(){
var style=document.getElementById('style').value,theme=document.getElementById('theme').value;
var accent=document.getElementById('accent').value,w=document.getElementById('width').value;
var showClose=document.getElementById('close').value==='yes';
var bg=theme==='dark'?'#1a1a2e':theme==='gradient'?'linear-gradient(135deg,#667eea,#764ba2)':'#fff';
var fg=theme==='dark'?'#e0e0e0':theme==='gradient'?'#fff':'#333';
var sub=theme==='dark'?'#aaa':theme==='gradient'?'rgba(255,255,255,.8)':'#777';
var closeHTML=showClose?'<button class="nl-close" onclick="this.parentElement.style.display=\'none\'">×</button>\n':'';
var html='<div class="nl-popup nl-'+style+'" style="--nl-ac:'+accent+';--nl-w:'+w+'px;--nl-bg:'+bg+';--nl-fg:'+fg+';--nl-sub:'+sub+'">\n'+closeHTML+'  <div class="nl-content">\n    <div class="nl-icon">📬</div>\n    <h2 class="nl-title">Subscribe to our newsletter</h2>\n    <p class="nl-desc">Get the latest updates delivered to your inbox.</p>\n    <form class="nl-form" onsubmit="return false">\n      <input type="email" placeholder="your@email.com" class="nl-input">\n      <button type="submit" class="nl-btn">Subscribe</button>\n    </form>\n    <p class="nl-note">No spam. Unsubscribe anytime.</p>\n  </div>\n</div>';
var css='.nl-popup{position:relative;background:var(--nl-bg);color:var(--nl-fg);border-radius:16px;overflow:hidden;max-width:var(--nl-w);margin:0 auto}';
css+='\n.nl-close{position:absolute;top:.75rem;right:.75rem;width:28px;height:28px;border:none;border-radius:50%;background:rgba(0,0,0,.15);color:inherit;font-size:1.1rem;cursor:pointer;display:flex;align-items:center;justify-content:center}';
css+='\n.nl-content{padding:2.5rem 2rem;text-align:center}';
css+='\n.nl-icon{font-size:2.5rem;margin-bottom:.75rem}';
css+='\n.nl-title{margin:0 0 .5rem;font-size:1.3rem}';
css+='\n.nl-desc{margin:0 0 1.25rem;color:var(--nl-sub);font-size:.9rem}';
css+='\n.nl-form{display:flex;gap:.5rem;margin-bottom:.75rem}';
css+='\n.nl-input{flex:1;padding:.7rem .9rem;border:1px solid #ddd;border-radius:8px;font-size:.9rem;background:rgba(255,255,255,.95);color:#333}';
css+='\n.nl-btn{padding:.7rem 1.5rem;border:none;border-radius:8px;background:var(--nl-ac);color:#fff;font-weight:600;cursor:pointer;white-space:nowrap}';
css+='\n.nl-btn:hover{opacity:.9}';
css+='\n.nl-note{margin:0;font-size:.75rem;color:var(--nl-sub)}';
if(style==='slide'){css+='\n.nl-slide{position:fixed;bottom:1rem;right:1rem;box-shadow:0 8px 32px rgba(0,0,0,.2);animation:nlSlideIn .3s ease}';css+='\n@keyframes nlSlideIn{from{transform:translateX(100%)}to{transform:translateX(0)}}';}
if(style==='bar'){css+='\n.nl-bar{max-width:100%;border-radius:0;padding:1rem 2rem}.nl-bar .nl-content{display:flex;align-items:center;justify-content:space-between;gap:1rem;text-align:left}.nl-bar .nl-form{margin:0;flex-shrink:0}';}
if(style==='fullscreen'){css+='\n.nl-fullscreen{position:fixed;inset:0;max-width:100%;display:flex;align-items:center;justify-content:center;min-height:100vh}';}
document.getElementById('htmlOut').value=html;
document.getElementById('cssOut').value=css;
document.getElementById('preview').innerHTML='<style>'+css+'<\/style>'+html;
}
function copyText(id){var t=document.getElementById(id);t.select();document.execCommand('copy')}
document.querySelectorAll('select,input').forEach(function(e){e.addEventListener('input',update);e.addEventListener('change',update)});
update();
</script>
</body>
</html>
