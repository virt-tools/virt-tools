<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="/assets/theme-init.js"></script>
<title>Towers of Hanoi — Virtual Tools</title>
<link rel="stylesheet" href="/assets/style.css">
<style>
.tool-wrap{max-width:600px;margin:0 auto;text-align:center;}
#game{display:flex;justify-content:center;gap:4px;margin:20px 0;position:relative;height:280px;}
.peg{flex:1;display:flex;flex-direction:column-reverse;align-items:center;cursor:pointer;border-top:2px solid transparent;padding:0;transition:border-color .2s;}
.peg:hover{border-top-color:var(--accent,#5b8def);}
.peg.sel{border-top-color:#f1c40f;}
.peg-base{width:90%;height:8px;background:#8b6f47;border-radius:4px;margin-top:0;}
.peg-pole{width:4px;height:220px;background:#a08560;position:absolute;bottom:8px;z-index:0;}
.disk{height:24px;border-radius:4px;margin:1px 0;z-index:1;transition:transform .15s;box-shadow:0 1px 3px rgba(0,0,0,.4);}
.controls{margin:16px 0;display:flex;gap:8px;justify-content:center;flex-wrap:wrap;align-items:center;}
.controls button{padding:8px 16px;border-radius:8px;border:1px solid var(--border,#444);background:var(--bg-alt,#1a1f2e);color:var(--text,#eee);cursor:pointer;font-size:14px;}
.controls button:hover{background:var(--accent,#5b8def);color:#fff;}
.controls label{font-size:14px;color:var(--text-secondary,#aaa);}
.controls select{padding:6px;border-radius:6px;background:var(--bg-alt,#1a1f2e);color:var(--text,#eee);border:1px solid var(--border,#444);font-size:14px;}
.stats{display:flex;gap:24px;justify-content:center;margin:12px 0;font-size:15px;}
.stats span{color:var(--accent,#5b8def);font-weight:600;}
.info{color:var(--text-secondary,#888);font-size:13px;margin:8px 0;}
#msg{font-size:16px;font-weight:600;color:#f1c40f;margin:8px 0;min-height:24px;}
</style>
</head>
<body>
<header id="site-header"></header>
<main>
<div class="tool-wrap">
<h1>Towers of Hanoi 🗼</h1>
<p class="tool-desc">Move all disks from the left peg to the right peg. Only one disk at a time, and never place a larger disk on a smaller one.</p>
<div class="stats"><div>Moves: <span id="moves">0</span></div><div>Min: <span id="min">7</span></div><div>Time: <span id="time">0:00</span></div></div>
<div class="controls">
<label>Disks: <select id="nd" onchange="newGame()"><option>3</option><option>4</option><option selected>5</option><option>6</option><option>7</option><option>8</option></select></label>
<button onclick="newGame()">🔄 New Game</button>
<button onclick="undo()">↩ Undo</button>
<button onclick="solve()">🤖 Auto-Solve</button>
</div>
<div id="game"></div>
<div id="msg"></div>
<p class="info">Click a peg to pick up its top disk, then click another peg to drop it.</p>
</div>
</main>
<script src="/assets/app.js"></script>
<script>
let towers=[],n=5,sel=-1,moves=0,hist=[],t0=0,timer=null;
const DC=['#e74c3c','#e67e22','#f1c40f','#2ecc71','#1abc9c','#3498db','#9b59b6','#e84393'];
function newGame(){
n=parseInt(document.getElementById('nd').value);
towers=[[...Array(n)].map((_,i)=>n-i),[],[]];sel=-1;moves=0;hist=[];
document.getElementById('min').textContent=Math.pow(2,n)-1;
document.getElementById('moves').textContent=0;
document.getElementById('msg').textContent='';
t0=Date.now();if(timer)clearInterval(timer);
timer=setInterval(()=>{const s=Math.floor((Date.now()-t0)/1000);document.getElementById('time').textContent=Math.floor(s/60)+':'+String(s%60).padStart(2,'0');},500);
render();
}
function render(){
const g=document.getElementById('game');g.innerHTML='';
for(let i=0;i<3;i++){
const peg=document.createElement('div');peg.className='peg'+(sel===i?' sel':'');peg.onclick=()=>click(i);
const pole=document.createElement('div');pole.className='peg-pole';peg.appendChild(pole);
for(const d of towers[i]){const disk=document.createElement('div');disk.className='disk';disk.style.width=(30+d*16)+'px';disk.style.background=DC[d%DC.length];peg.appendChild(disk);}
const base=document.createElement('div');base.className='peg-base';peg.appendChild(base);
g.appendChild(peg);
}
}
function click(i){
if(sel===-1){if(towers[i].length===0)return;sel=i;render();return;}
if(sel===i){sel=-1;render();return;}
const disk=towers[sel][towers[sel].length-1];
if(towers[i].length>0&&towers[i][towers[i].length-1]<disk){sel=-1;render();return;}
hist.push([sel,i]);towers[i].push(towers[sel].pop());moves++;sel=-1;
document.getElementById('moves').textContent=moves;
render();
if(towers[2].length===n){clearInterval(timer);const min=Math.pow(2,n)-1;document.getElementById('msg').textContent=moves===min?'🎉 Perfect! Solved in minimum moves!':'✅ Solved in '+moves+' moves (min: '+min+')';}
}
function undo(){
if(hist.length===0)return;const[a,b]=hist.pop();towers[a].push(towers[b].pop());moves--;sel=-1;
document.getElementById('moves').textContent=moves;render();
}
function solve(){
newGame();const steps=[];(function h(f,t,k){if(k===0)return;const m=3-f-t;h(f,m,k-1);steps.push([f,t]);h(m,t,k-1);})(0,2,n);
let si=0;(function play(){if(si>=steps.length){clearInterval(timer);const min=Math.pow(2,n)-1;document.getElementById('msg').textContent='🤖 Auto-solved in '+steps.length+' moves!';return;}const[f,t]=steps[si++];hist.push([f,t]);towers[t].push(towers[f].pop());moves++;document.getElementById('moves').textContent=moves;render();setTimeout(play,300);})();
}
newGame();
</script>
</body>
</html>
