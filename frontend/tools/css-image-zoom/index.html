<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CSS Image Zoom Generator — virt.tools</title>
<link rel="stylesheet" href="/assets/style.css">
<style>
.tool-area{max-width:900px;margin:2rem auto;padding:0 1rem}
.controls{display:grid;gap:1rem;margin:1.5rem 0;padding:1.5rem;background:#1a1a2e;border-radius:12px}
.ctrl-row{display:flex;gap:1rem;align-items:center;flex-wrap:wrap;margin-bottom:.5rem}
.ctrl-row label{font-weight:600;font-size:.9rem;min-width:120px}
.ctrl-row select,.ctrl-row input{padding:.5rem;border-radius:8px;border:1px solid #444;background:#0f0f1e;color:#eee}
.preview-box{margin:1.5rem 0;border-radius:12px;padding:2rem;background:#1a1a2e;min-height:200px;display:flex;justify-content:center;align-items:center}
.output-block{margin:2rem 0}
.output-block textarea{width:100%;min-height:100px;font-family:monospace;font-size:.85rem;padding:1rem;border-radius:8px;border:1px solid #444;background:#0f0f1e;color:#eee;resize:vertical}
.copy-btn{padding:.6rem 1.2rem;border:none;border-radius:8px;background:#667eea;color:#fff;cursor:pointer;font-size:.9rem;margin-top:.5rem}
h2{margin-top:2rem;font-size:1.2rem}
.zoom-container{width:250px;height:180px;border-radius:var(--zr,8px);overflow:hidden;position:relative;cursor:pointer}
.zoom-container img{width:100%;height:100%;object-fit:cover;transition:transform .4s ease}
.zoom-container:hover img{transform:scale(1.5)}
</style>
</head>
<body>
<header id="site-header"></header>
<main>
<div class="tool-area">
<h1>🔍 CSS Image Zoom on Hover Generator</h1>
<p>Create CSS image zoom/magnify on hover effects. 5 zoom styles, adjustable scale/speed/radius. Copy HTML+CSS.</p>
<div class="controls">
<div class="ctrl-row">
<label>Zoom Style</label><select id="style"><option value="scale" selected>Scale (uniform)</option><option value="scale-x">Scale X</option><option value="scale-y">Scale Y</option><option value="lens">Lens magnify</option><option value="reveal">Reveal zoom</option></select>
<label>Scale</label><input type="range" id="scale" min="1.2" max="3" step="0.1" value="1.5" style="width:100px">
</div>
<div class="ctrl-row">
<label>Duration</label><input type="text" id="duration" value="0.4s" style="width:60px">
<label>Radius</label><input type="text" id="radius" value="8px" style="width:60px">
<label>Overlay</label><select id="overlay"><option value="none" selected>None</option><option value="dark">Dark</option><option value="light">Light</option><option value="color">Color tint</option></select>
</div>
<div class="ctrl-row"><button class="copy-btn" onclick="update()">Update</button></div>
</div>
<h2>Preview</h2>
<div class="preview-box" id="preview"></div>
<h2>HTML</h2><div class="output-block"><textarea id="htmlOut" readonly></textarea><button class="copy-btn" onclick="copyText('htmlOut')">Copy HTML</button></div>
<h2>CSS</h2><div class="output-block"><textarea id="cssOut" readonly></textarea><button class="copy-btn" onclick="copyText('cssOut')">Copy CSS</button></div>
</div>
</main>
<script src="/assets/app.js"></script>
<script>
function makeCanvasImg(w,h,grad){
var c=document.createElement('canvas');c.width=w;c.height=h;var ctx=c.getContext('2d');
var g=ctx.createLinearGradient(0,0,w,h);grad.forEach(function(c,i){g.addColorStop(i/(grad.length-1),c)});ctx.fillStyle=g;ctx.fillRect(0,0,w,h);
ctx.fillStyle='rgba(255,255,255,.3)';ctx.font='40px sans-serif';ctx.textAlign='center';ctx.fillText('Hover Me',w/2,h/2);
return c.toDataURL();
}
function update(){
var style=document.getElementById('style').value;
var scale=parseFloat(document.getElementById('scale').value);
var dur=document.getElementById('duration').value;
var radius=document.getElementById('radius').value;
var overlay=document.getElementById('overlay').value;
var img=makeCanvasImg(250,180,['#667eea','#764ba2']);
var html='<div class="zoom-container">\n  <img src="your-image.jpg" alt="Image">\n</div>';
var transform;
if(style==='scale')transform='scale('+scale+')';
else if(style==='scale-x')transform='scaleX('+scale+')';
else if(style==='scale-y')transform='scaleY('+scale+')';
else if(style==='lens')transform='scale('+scale+')';
else transform='scale('+scale+')';
var overlayCSS='';
if(overlay==='dark')overlayCSS='\n.zoom-container::after{content:"";position:absolute;inset:0;background:rgba(0,0,0,.3);opacity:0;transition:opacity '+dur+'}\n.zoom-container:hover::after{opacity:1}';
else if(overlay==='light')overlayCSS='\n.zoom-container::after{content:"";position:absolute;inset:0;background:rgba(255,255,255,.2);opacity:0;transition:opacity '+dur+'}\n.zoom-container:hover::after{opacity:1}';
else if(overlay==='color')overlayCSS='\n.zoom-container::after{content:"";position:absolute;inset:0;background:rgba(102,126,234,.3);opacity:0;transition:opacity '+dur+'}\n.zoom-container:hover::after{opacity:1}';
var css='.zoom-container{\n  width:250px;\n  height:180px;\n  border-radius:'+radius+';\n  overflow:hidden;\n  position:relative;\n  cursor:pointer\n}\n.zoom-container img{\n  width:100%;\n  height:100%;\n  object-fit:cover;\n  transition:transform '+dur+' ease\n}\n.zoom-container:hover img{\n  transform:'+transform+'\n}'+overlayCSS;
document.getElementById('htmlOut').value=html;
document.getElementById('cssOut').value=css;
var pv='<div class="zoom-container" style="border-radius:'+radius+';overflow:hidden;position:relative;cursor:pointer">';
pv+='<img src="'+img+'" style="width:100%;height:100%;object-fit:cover;transition:transform '+dur+' ease" onmouseover="this.style.transform=\''+transform+'\'" onmouseout="this.style.transform=\'scale(1)\'">';
pv+='</div>';
document.getElementById('preview').innerHTML=pv;
}
function copyText(id){var t=document.getElementById(id);t.select();document.execCommand('copy')}
['style','scale','duration','radius','overlay'].forEach(function(id){var el=document.getElementById(id);el.addEventListener(el.tagName==='SELECT'?'change':el.type==='range'?'input':'input',update)});
update();
</script>
</body>
</html>
