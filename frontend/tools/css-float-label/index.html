<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CSS Floating Label Generator — virt.tools</title>
<link rel="stylesheet" href="/assets/style.css">
<style>
.tool-area{max-width:800px;margin:2rem auto;padding:0 1rem}
.controls{display:grid;gap:.8rem;margin:1.5rem 0;padding:1.5rem;background:#1a1a2e;border-radius:12px}
.ctrl-row{display:flex;gap:1rem;align-items:center;flex-wrap:wrap}
.ctrl-row label{font-weight:600;font-size:.9rem;min-width:120px}
.ctrl-row select,.ctrl-row input{padding:.5rem;border-radius:8px;border:1px solid #444;background:#0f0f1e;color:#eee}
.preview-box{margin:1.5rem 0;padding:2rem;background:#f5f5f5;border-radius:12px;min-height:200px}
.output-block{margin:1.5rem 0}
.output-block textarea{width:100%;min-height:100px;font-family:monospace;font-size:.85rem;padding:1rem;border-radius:8px;border:1px solid #444;background:#0f0f1e;color:#eee;resize:vertical}
.copy-btn{padding:.6rem 1.2rem;border:none;border-radius:8px;background:#667eea;color:#fff;cursor:pointer;font-size:.9rem;margin-top:.5rem}
h2{margin-top:2rem;font-size:1.2rem}
</style>
</head>
<body>
<header id="site-header"></header>
<main>
<div class="tool-area">
<h1>🏷️ CSS Floating Label Generator</h1>
<p>Create CSS floating label form inputs. 4 styles, 3 themes, adjustable colors. Copy HTML+CSS.</p>
<div class="controls">
<div class="ctrl-row"><label>Style</label><select id="style"><option value="border" selected>Border</option><option value="filled">Filled</option><option value="underline">Underline</option><option value="outlined">Outlined</option></select></div>
<div class="ctrl-row"><label>Theme</label><select id="theme"><option value="light" selected>Light</option><option value="dark">Dark</option><option value="glass">Glass</option></select></div>
<div class="ctrl-row"><label>Label Text</label><input type="text" id="labelText" value="Your Name" style="width:200px"></div>
<div class="ctrl-row"><label>Accent Color</label><input type="color" id="accent" value="#667eea" style="width:50px;height:35px;border:none;border-radius:4px"></div>
<div class="ctrl-row"><button class="copy-btn" onclick="update()">Update</button></div>
</div>
<h2>Preview</h2>
<div class="preview-box" id="preview"></div>
<h2>CSS</h2><div class="output-block"><textarea id="cssOut" readonly></textarea><button class="copy-btn" onclick="copyText('cssOut')">Copy CSS</button></div>
<h2>HTML</h2><div class="output-block"><textarea id="htmlOut" readonly></textarea><button class="copy-btn" onclick="copyText('htmlOut')">Copy HTML</button></div>
</div>
</main>
<script src="/assets/app.js"></script>
<script>
function update(){
var style=document.getElementById('style').value;
var theme=document.getElementById('theme').value;
var labelText=document.getElementById('labelText').value;
var accent=document.getElementById('accent').value;
var bg,fg,border,labelColor;
if(theme==='light'){bg='#fff';fg='#333';border='#ccc';labelColor='#666'}
else if(theme==='dark'){bg='#1a1a2e';fg='#eee';border='#444';labelColor='#999'}
else{bg='rgba(255,255,255,.1)';fg='#fff';border='rgba(255,255,255,.2)';labelColor='rgba(255,255,255,.6)'}
var styleCSS='';
if(style==='border'){styleCSS='.float-wrap{position:relative;margin-top:1rem}\n.float-wrap input{width:100%;padding:14px 12px 6px;border:1px solid '+border+';border-radius:8px;background:'+bg+';color:'+fg+';font-size:1rem;outline:none;box-sizing:border-box}\n.float-wrap label{position:absolute;left:12px;top:14px;color:'+labelColor+';font-size:1rem;pointer-events:none;transition:all .2s ease;background:'+bg+';padding:0 4px}\n.float-wrap input:focus,.float-wrap input:not(:placeholder-shown){border-color:'+accent+'}\n.float-wrap input:focus+label,.float-wrap input:not(:placeholder-shown)+label{top:-8px;font-size:.75rem;color:'+accent+'}'}
else if(style==='filled'){styleCSS='.float-wrap{position:relative;margin-top:1rem}\n.float-wrap input{width:100%;padding:14px 12px 6px;border:none;border-radius:8px 8px 0 0;background:'+border+';color:'+fg+';font-size:1rem;outline:none;box-sizing:border-box}\n.float-wrap label{position:absolute;left:12px;top:14px;color:'+labelColor+';font-size:1rem;pointer-events:none;transition:all .2s ease}\n.float-wrap input:focus{background:'+accent+'22}\n.float-wrap input:focus+label,.float-wrap input:not(:placeholder-shown)+label{top:6px;font-size:.75rem;color:'+accent+'}'}
else if(style==='underline'){styleCSS='.float-wrap{position:relative;margin-top:1.5rem}\n.float-wrap input{width:100%;padding:8px 0;border:none;border-bottom:2px solid '+border+';background:transparent;color:'+fg+';font-size:1rem;outline:none}\n.float-wrap label{position:absolute;left:0;top:8px;color:'+labelColor+';font-size:1rem;pointer-events:none;transition:all .2s ease}\n.float-wrap input:focus{border-color:'+accent+'}\n.float-wrap input:focus+label,.float-wrap input:not(:placeholder-shown)+label{top:-14px;font-size:.75rem;color:'+accent+'}'}
else{styleCSS='.float-wrap{position:relative;margin-top:1rem}\n.float-wrap input{width:100%;padding:14px 12px;border:2px solid '+border+';border-radius:12px;background:'+bg+';color:'+fg+';font-size:1rem;outline:none;box-sizing:border-box;transition:border-color .2s}\n.float-wrap label{position:absolute;left:12px;top:14px;color:'+labelColor+';font-size:1rem;pointer-events:none;transition:all .2s ease;background:'+bg+';padding:0 4px}\n.float-wrap input:focus{border-color:'+accent+'}\n.float-wrap input:focus+label,.float-wrap input:not(:placeholder-shown)+label{top:-8px;font-size:.75rem;color:'+accent+';font-weight:600}'}
var html='<div class="float-wrap">\n  <input type="text" id="name" placeholder=" ">\n  <label for="name">'+labelText+'</label>\n</div>';
document.getElementById('cssOut').value=styleCSS;
document.getElementById('htmlOut').value=html;
document.getElementById('preview').innerHTML='<style>'+styleCSS+'</style><div style="max-width:300px;padding:1rem">'+html+'</div>';
}
function copyText(id){var t=document.getElementById(id);t.select();document.execCommand('copy')}
['style','theme','labelText','accent'].forEach(function(id){var el=document.getElementById(id);el.addEventListener('input',update);el.addEventListener('change',update)});
update();
</script>
</body>
</html>
