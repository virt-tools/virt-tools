<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="/assets/theme-init.js"></script>
<title>Rock Paper Scissors — Virtual Tools</title>
<link rel="stylesheet" href="/assets/style.css">
<style>
.tool-wrap{max-width:500px;margin:0 auto;text-align:center;}
.choices{display:flex;justify-content:center;gap:20px;margin:25px 0;flex-wrap:wrap;}
.choice-btn{width:100px;height:100px;border-radius:50%;border:3px solid var(--border,#333);background:var(--bg-alt,#1a1f2e);color:var(--text,#e0e0e0);font-size:48px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;}
.choice-btn:hover{border-color:#1565c0;transform:scale(1.05);}
.choice-btn:active{transform:scale(0.95);}
.battle{display:flex;justify-content:center;align-items:center;gap:30px;margin:20px 0;font-size:72px;min-height:100px;}
.battle .hand{width:100px;text-align:center;}
.vs{font-size:24px;color:var(--text-dim,#888);}
.result-text{font-size:28px;font-weight:700;margin:15px 0;min-height:34px;}
.score-row{display:flex;justify-content:center;gap:40px;margin:15px 0;font-size:18px;}
.score-box{background:var(--bg-alt,#1a1f2e);border-radius:10px;padding:10px 20px;min-width:80px;}
.score-box .num{font-size:32px;font-weight:800;color:#1565c0;}
.score-box.you .num{color:#4caf50;}
.score-box.ai .num{color:#f44336;}
.history{margin:15px 0;}
.history h4{color:var(--text-dim,#888);font-size:14px;}
.history-row{display:flex;justify-content:center;gap:4px;flex-wrap:wrap;}
.hist-pill{padding:3px 10px;border-radius:12px;font-size:12px;font-weight:600;}
.hist-pill.win{background:rgba(76,175,80,.2);color:#4caf50;}
.hist-pill.lose{background:rgba(244,67,54,.2);color:#f44336;}
.hist-pill.tie{background:rgba(255,193,7,.2);color:#ffc107;}
.streak{font-size:14px;color:var(--text-dim,#888);margin:8px 0;}
.reset-btn{padding:8px 20px;border-radius:6px;border:1px solid var(--border,#333);background:transparent;color:var(--text-dim,#888);cursor:pointer;font-size:14px;margin-top:10px;}
.reset-btn:hover{color:var(--text,#e0e0e0);}
</style>
</head>
<body>
<header id="site-header"></header>
<main>
<div class="tool-wrap">
<h1>Rock Paper Scissors</h1>
<p class="tool-desc">Classic hand game vs AI. Pick rock, paper, or scissors. First to 5 wins the round. Score and history persist across rounds. All client-side.</p>

<div class="score-row">
<div class="score-box you"><div>You</div><div class="num" id="scoreYou">0</div></div>
<div class="score-box"><div>Ties</div><div class="num" id="scoreTie">0</div></div>
<div class="score-box ai"><div>AI</div><div class="num" id="scoreAI">0</div></div>
</div>

<div class="battle">
<div class="hand" id="youHand">✊</div>
<div class="vs">VS</div>
<div class="hand" id="aiHand">✊</div>
</div>

<div class="result-text" id="resultText">Choose your weapon!</div>
<div class="streak" id="streakText"></div>

<div class="choices">
<button class="choice-btn" onclick="play('rock')" title="Rock">✊</button>
<button class="choice-btn" onclick="play('paper')" title="Paper">✋</button>
<button class="choice-btn" onclick="play('scissors')" title="Scissors">✌️</button>
</div>

<div class="history">
<h4>Recent rounds</h4>
<div class="history-row" id="historyRow"></div>
</div>

<button class="reset-btn" onclick="resetGame()">Reset Score</button>
</div>
</main>
<script src="/assets/app.js"></script>
<script>
const EMOJI={rock:'✊',paper:'✋',scissors:'✌️'};
const NAMES={rock:'Rock',paper:'Paper',scissors:'Scissors'};
let score={you:0,ai:0,tie:0};
let history=[];
let streak={type:'',count:0};
let animating=false;

function play(choice){
if(animating)return;animating=true;
const aiChoice=['rock','paper','scissors'][Math.floor(Math.random()*3)];
let i=0;const animId=setInterval(()=>{
document.getElementById('aiHand').textContent=EMOJI[['rock','paper','scissors'][i%3]];
i++;
},100);
setTimeout(()=>{
clearInterval(animId);
document.getElementById('youHand').textContent=EMOJI[choice];
document.getElementById('aiHand').textContent=EMOJI[aiChoice];
const result=judge(choice,aiChoice);
showResult(result,choice,aiChoice);
animating=false;
},800);
}

function judge(y,ai){
if(y===ai)return'tie';
if((y==='rock'&&ai==='scissors')||(y==='paper'&&ai==='rock')||(y==='scissors'&&ai==='paper'))return'win';
return'lose';
}

function showResult(result,y,ai){
const rt=document.getElementById('resultText');
if(result==='tie'){score.tie++;rt.textContent="It's a tie!";rt.style.color='#ffc107';
if(streak.type==='tie')streak.count++;else{streak.type='tie';streak.count=1;}}
else if(result==='win'){score.you++;rt.textContent=`${NAMES[y]} beats ${NAMES[ai]}! You win!`;rt.style.color='#4caf50';
if(streak.type==='win')streak.count++;else{streak.type='win';streak.count=1;}}
else{score.ai++;rt.textContent=`${NAMES[ai]} beats ${NAMES[y]}. AI wins!`;rt.style.color='#f44336';
if(streak.type==='lose')streak.count++;else{streak.type='lose';streak.count=1;}}
updateUI();
history.unshift(result);
if(history.length>15)history.pop();
renderHistory();
}

function updateUI(){
document.getElementById('scoreYou').textContent=score.you;
document.getElementById('scoreAI').textContent=score.ai;
document.getElementById('scoreTie').textContent=score.tie;
const st=document.getElementById('streakText');
if(streak.count>=2){
const label=streak.type==='win'?'Winning':streak.type==='lose'?'Losing':'Tie';
st.textContent=`${label} streak: ${streak.count}`;
}else{st.textContent='';}
}

function renderHistory(){
const row=document.getElementById('historyRow');
row.innerHTML='';
history.forEach(r=>{
const pill=document.createElement('span');
pill.className='hist-pill '+(r==='win'?'win':r==='lose'?'lose':'tie');
pill.textContent=r==='win'?'W':r==='lose'?'L':'T';
row.appendChild(pill);
});
}

function resetGame(){
score={you:0,ai:0,tie:0};history=[];streak={type:'',count:0};
document.getElementById('resultText').textContent='Choose your weapon!';
document.getElementById('resultText').style.color='';
document.getElementById('streakText').textContent='';
document.getElementById('youHand').textContent='✊';
document.getElementById('aiHand').textContent='✊';
updateUI();renderHistory();
}
VT.ready(()=>{});
</script>
</body>
</html>
