<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CSS Orbit Animation Generator — virt.tools</title>
<link rel="stylesheet" href="/assets/style.css">
<style>
.tool-area{max-width:900px;margin:2rem auto;padding:0 1rem}
.controls{display:grid;gap:1rem;margin:1.5rem 0;padding:1.5rem;background:#1a1a2e;border-radius:12px}
.control-row{display:flex;gap:1rem;align-items:center;flex-wrap:wrap}
.control-row label{min-width:130px;font-weight:600;font-size:.9rem}
.control-row select,.control-row input{padding:.5rem .75rem;border-radius:8px;border:1px solid #444;background:#0f0f1e;color:#eee;font-size:.9rem}
.preview-box{margin:1.5rem 0;background:#0a0a14;border-radius:12px;min-height:380px;overflow:hidden;position:relative;display:flex;align-items:center;justify-content:center}
.output-block{margin:2rem 0}
.output-block textarea{width:100%;min-height:120px;font-family:monospace;font-size:.85rem;padding:1rem;border-radius:8px;border:1px solid #444;background:#0f0f1e;color:#eee;resize:vertical}
.copy-btn{padding:.6rem 1.2rem;border:none;border-radius:8px;background:#667eea;color:#fff;cursor:pointer;font-size:.9rem;margin-top:.5rem}
h2{margin-top:2rem;font-size:1.2rem}
</style>
</head>
<body>
<header id="site-header"></header>
<main>
<div class="tool-area">
<h1>🪐 CSS Orbit Animation Generator</h1>
<p>Create CSS orbiting element animations. Adjustable orbits, speed, sizes, colors. Copy HTML+CSS.</p>
<div class="controls">
<div class="control-row">
<label>Preset</label><select id="preset"><option value="solar">Solar System</option><option value="loader">Loader</option><option value="atoms">Atoms</option><option value="rings">Rings</option></select>
</div>
<div class="control-row">
<label>Orbits</label><input type="number" id="orbits" value="3" min="1" max="6" style="width:60px">
<label>Speed (s)</label><input type="number" id="speed" value="4" min="1" max="20" step="0.5" style="width:60px">
<label>Orbit Color</label><input type="color" id="orbitColor" value="#333355">
</div>
<div class="control-row">
<label>Planet Color</label><input type="color" id="planetColor" value="#667eea">
<label>Center Color</label><input type="color" id="centerColor" value="#fbbf24">
<label>Planet Size (px)</label><input type="number" id="planetSize" value="16" min="4" max="40" style="width:60px">
</div>
</div>
<h2>Preview</h2>
<div class="preview-box" id="preview"></div>
<h2>HTML</h2><div class="output-block"><textarea id="htmlOut" readonly></textarea><button class="copy-btn" onclick="copyText('htmlOut')">Copy HTML</button></div>
<h2>CSS</h2><div class="output-block"><textarea id="cssOut" readonly></textarea><button class="copy-btn" onclick="copyText('cssOut')">Copy CSS</button></div>
</div>
</main>
<script src="/assets/app.js"></script>
<script>
function update(){
var n=parseInt(document.getElementById('orbits').value);
var sp=parseFloat(document.getElementById('speed').value);
var oc=document.getElementById('orbitColor').value;
var pc=document.getElementById('planetColor').value;
var cc=document.getElementById('centerColor').value;
var ps=parseInt(document.getElementById('planetSize').value);
var html='<div class="orbit-system">\n';
html+='  <div class="orbit-center" style="background:'+cc+'"></div>\n';
for(var i=0;i<n;i++){
var sz=80+i*60;
html+='  <div class="orbit-ring" style="width:'+sz+'px;height:'+sz+'px;border-color:'+oc+'">\n';
html+='    <div class="orbit-planet" style="width:'+ps+'px;height:'+ps+'px;background:'+pc+'"></div>\n';
html+='  </div>\n';
}
html+='</div>';
var css='.orbit-system{position:relative;width:300px;height:300px;display:flex;align-items:center;justify-content:center}\n';
css+='.orbit-center{width:'+(ps*2)+'px;height:'+(ps*2)+'px;border-radius:50%;position:absolute;z-index:'+(n+1)+';box-shadow:0 0 20px '+cc+'88}\n';
css+='.orbit-ring{position:absolute;border-radius:50%;border:2px solid '+oc+';display:flex;align-items:center;justify-content:flex-end;animation:orbit-rotate '+sp+'s linear infinite}\n';
css+='.orbit-planet{border-radius:50%;box-shadow:0 0 10px '+pc+'88}\n';
for(var i=1;i<n;i++){
css+='.orbit-ring:nth-child('+(i+2)+'){animation-duration:'+(sp+i*2)+'s;animation-direction:'+(i%2?'reverse':'normal')+'}\n';
}
css+='@keyframes orbit-rotate{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}\n';
document.getElementById('htmlOut').value=html;
document.getElementById('cssOut').value=css;
var pv=document.getElementById('preview');
pv.innerHTML=html;
var st=document.createElement('style');st.textContent=css;pv.appendChild(st);
}
function copyText(id){var t=document.getElementById(id);t.select();document.execCommand('copy')}
document.querySelectorAll('select,input').forEach(function(e){e.addEventListener('input',update);e.addEventListener('change',update)});
document.getElementById('preset').addEventListener('change',function(){
var p=this.value;
if(p==='solar'){document.getElementById('orbits').value=4;document.getElementById('speed').value=6;document.getElementById('centerColor').value='#fbbf24'}
if(p==='loader'){document.getElementById('orbits').value=3;document.getElementById('speed').value=2;document.getElementById('centerColor').value='#667eea'}
if(p==='atoms'){document.getElementById('orbits').value=3;document.getElementById('speed').value=3;document.getElementById('centerColor').value='#ef4444'}
if(p==='rings'){document.getElementById('orbits').value=5;document.getElementById('speed').value=8;document.getElementById('centerColor').value='#10b981'}
update();
});
update();
</script>
</body>
</html>
