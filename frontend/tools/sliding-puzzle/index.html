<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="/assets/theme-init.js"></script>
<title>Sliding Puzzle — Virtual Tools</title>
<link rel="stylesheet" href="/assets/style.css">
<style>
.tool-wrap{max-width:440px;margin:0 auto;text-align:center;}
.tool-desc{opacity:.7;font-size:14px;margin-bottom:8px;}
#board{display:inline-grid;grid-template-columns:repeat(4,90px);grid-template-rows:repeat(4,90px);gap:3px;background:#333;padding:3px;margin:12px auto;}
.tile{width:90px;height:90px;font-size:36px;font-weight:700;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#3498db,#2980b9);color:#fff;cursor:pointer;border-radius:6px;user-select:none;}
.tile:hover{filter:brightness(1.1);}
.tile.empty{background:transparent;cursor:default;}
.controls{display:flex;gap:8px;justify-content:center;margin:12px 0;flex-wrap:wrap;}
.controls button{padding:6px 16px;border-radius:6px;border:1px solid var(--border,#2a2f3a);background:var(--bg-alt,#1a1f2e);color:var(--text,#e0e0e0);cursor:pointer;font-size:14px;}
.info{display:flex;gap:20px;justify-content:center;margin:8px 0;font-size:15px;}
.size-sel select{padding:4px 8px;border-radius:4px;font-size:14px;}
#msg{font-size:16px;font-weight:700;min-height:24px;color:#27ae60;}
</style>
</head>
<body>
<header id="site-header"></header>
<main>
<div class="tool-wrap">
<h1>Sliding Puzzle</h1>
<p class="tool-desc">Arrange the tiles in order from 1 to 15. Click any tile adjacent to the empty space to slide it.</p>
<div class="size-sel"><select id="sizeSel" onchange="newGame()"><option value="3">3×3 (8-puzzle)</option><option value="4" selected>4×4 (15-puzzle)</option><option value="5">5×5 (24-puzzle)</option></select></div>
<div class="info"><span>Moves: <b id="moves">0</b></span><span>Time: <b id="timer">0s</b></span></div>
<div id="board"></div>
<div class="controls"><button onclick="newGame()">Shuffle & New</button></div>
<div id="msg"></div>
</div>
</main>
<script src="/assets/app.js"></script>
<script>
let size=4,tiles=[],emptyIdx=0,moveCount=0,t0=0,intv=null,solved=false;
function newGame(){
  size=parseInt(document.getElementById('sizeSel').value);
  tiles=Array.from({length:size*size},(_,i)=>i+1);tiles[tiles.length-1]=0;emptyIdx=tiles.length-1;
  solved=false;moveCount=0;document.getElementById('moves').textContent='0';document.getElementById('msg').textContent='';
  for(let i=0;i<500*size;i++){const ns=neighbors(emptyIdx);const pick=ns[Math.floor(Math.random()*ns.length)];swap(pick);}
  if(intv)clearInterval(intv);t0=Date.now();intv=setInterval(updateTimer,1000);
  document.getElementById('timer').textContent='0s';
  render();
}
function neighbors(idx){
  const r=Math.floor(idx/size),c=idx%size,res=[];
  if(r>0)res.push(idx-size);if(r<size-1)res.push(idx+size);if(c>0)res.push(idx-1);if(c<size-1)res.push(idx+1);
  return res;
}
function swap(idx){[tiles[idx],tiles[emptyIdx]]=[tiles[emptyIdx],tiles[idx]];emptyIdx=idx;}
function render(){
  const el=document.getElementById('board');
  el.style.gridTemplateColumns=`repeat(${size},${90/4*size}px)`;
  el.style.gridTemplateRows=`repeat(${size},${90/4*size}px)`;
  el.innerHTML='';
  for(let i=0;i<tiles.length;i++){
    const t=document.createElement('div');t.className='tile'+(tiles[i]===0?' empty':'');
    if(tiles[i]!==0)t.textContent=tiles[i];
    t.onclick=()=>clickTile(i);
    el.appendChild(t);
  }
}
function clickTile(idx){
  if(solved)return;
  if(neighbors(emptyIdx).includes(idx)){swap(idx);moveCount++;document.getElementById('moves').textContent=moveCount;render();checkWin();}
}
function checkWin(){
  for(let i=0;i<tiles.length-1;i++)if(tiles[i]!==i+1)return;
  solved=true;clearInterval(intv);
  const sec=Math.round((Date.now()-t0)/1000);
  document.getElementById('msg').textContent=`🎉 Solved in ${moveCount} moves and ${sec}s!`;
}
function updateTimer(){if(solved)return;const sec=Math.round((Date.now()-t0)/1000);document.getElementById('timer').textContent=sec+'s';}
newGame();
</script>
</body>
</html>
