<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CSS Review Card Generator — virt.tools</title>
<link rel="stylesheet" href="/assets/style.css">
<style>
.tool-area{max-width:900px;margin:2rem auto;padding:0 1rem}
.controls{display:grid;gap:1rem;margin:1.5rem 0;padding:1.5rem;background:#1a1a2e;border-radius:12px}
.control-row{display:flex;gap:1rem;align-items:center;flex-wrap:wrap}
.control-row label{min-width:100px;font-weight:600;font-size:.9rem}
.control-row select,.control-row input{padding:.5rem .75rem;border-radius:8px;border:1px solid #444;background:#0f0f1e;color:#eee;font-size:.9rem}
.preview-box{margin:1.5rem 0;border-radius:12px;padding:1.5rem;min-height:200px}
.output-block{margin:2rem 0}
.output-block textarea{width:100%;min-height:120px;font-family:monospace;font-size:.85rem;padding:1rem;border-radius:8px;border:1px solid #444;background:#0f0f1e;color:#eee;resize:vertical}
.copy-btn{padding:.6rem 1.2rem;border:none;border-radius:8px;background:#667eea;color:#fff;cursor:pointer;font-size:.9rem;margin-top:.5rem}
h2{margin-top:2rem;font-size:1.2rem}
</style>
</head>
<body>
<header id="site-header"></header>
<main>
<div class="tool-area">
<h1>💬 CSS Review Card Generator</h1>
<p>Create CSS review/testimonial cards with star ratings. 4 styles, 3 themes, custom name/role/rating. Copy HTML+CSS.</p>
<div class="controls">
<div class="control-row">
<label>Style</label><select id="style"><option value="card" selected>Card</option><option value="flat">Flat</option><option value="bordered">Bordered</option><option value="glass">Glass</option></select>
<label>Theme</label><select id="theme"><option value="dark" selected>Dark</option><option value="light">Light</option><option value="gradient">Gradient</option></select>
<label>Stars</label><select id="stars"><option value="5" selected>5</option><option value="4">4</option><option value="3">3</option></select>
<label>Accent</label><input type="color" id="accent" value="#ffc107">
</div>
<div class="control-row">
<label>Name</label><input type="text" id="name" value="Jane Doe" style="width:120px">
<label>Role</label><input type="text" id="role" value="Product Designer" style="width:140px">
<label>Quote</label><input type="text" id="quote" value="Absolutely love this product! It has transformed our workflow." style="width:300px">
</div>
</div>
<h2>Preview</h2>
<div class="preview-box" id="preview" style="background:#2a2a3e"></div>
<h2>HTML</h2><div class="output-block"><textarea id="htmlOut" readonly></textarea><button class="copy-btn" onclick="copyText('htmlOut')">Copy HTML</button></div>
<h2>CSS</h2><div class="output-block"><textarea id="cssOut" readonly></textarea><button class="copy-btn" onclick="copyText('cssOut')">Copy CSS</button></div>
</div>
</main>
<script src="/assets/app.js"></script>
<script>
function update(){
var style=document.getElementById('style').value,theme=document.getElementById('theme').value;
var stars=parseInt(document.getElementById('stars').value),ac=document.getElementById('accent').value;
var name=document.getElementById('name').value,role=document.getElementById('role').value,quote=document.getElementById('quote').value;
var bg,text,bd;
if(theme==='light'){bg='#f8f9fa';text='#333';bd='#e0e0e0'}else if(theme==='gradient'){bg='linear-gradient(135deg,#667eea,#764ba2)';text='#fff';bd='transparent'}else{bg='#1a1a2e';text='#ccc';bd='#333'}
var starHtml='';for(var i=0;i<5;i++){starHtml+='<span style="color:'+(i<stars?ac:'#555')+';font-size:18px">★</span>'}
var html='<div class="review-card review-'+style+'">\n';
html+='  <div class="review-stars">'+starHtml+'</div>\n';
html+='  <p class="review-quote">"'+quote+'"</p>\n';
html+='  <div class="review-author">\n';
html+='    <div class="review-avatar">'+name.charAt(0).toUpperCase()+'</div>\n';
html+='    <div class="review-info"><strong>'+name+'</strong><br><span class="review-role">'+role+'</span></div>\n';
html+='  </div>\n';
html+='</div>';
var css='.review-card{max-width:400px;padding:24px;border-radius:16px;background:'+bg+';color:'+text+'}';
if(style==='bordered')css+=';border:2px solid '+ac;
if(style==='glass')css+=';backdrop-filter:blur(12px);background:rgba(255,255,255,0.1)';
if(style==='flat')css+=';border-radius:0;box-shadow:none';
if(style!=='flat')css+=';box-shadow:0 4px 20px rgba(0,0,0,0.15)';
css+='\n.review-stars{margin-bottom:12px}\n.review-quote{font-size:15px;line-height:1.6;margin:0 0 16px}\n';
css+='.review-author{display:flex;align-items:center;gap:12px}\n';
css+='.review-avatar{width:44px;height:44px;border-radius:50%;background:'+ac+';color:#fff;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:bold}\n';
css+='.review-info strong{font-size:14px}\n.review-role{font-size:12px;opacity:.7}';
document.getElementById('htmlOut').value=html;
document.getElementById('cssOut').value=css;
document.getElementById('preview').innerHTML='<style>'+css+'<\/style>'+html;
}
function copyText(id){var t=document.getElementById(id);t.select();document.execCommand('copy')}
document.querySelectorAll('select,input').forEach(function(e){e.addEventListener('input',update);e.addEventListener('change',update)});
update();
</script>
</body>
</html>
