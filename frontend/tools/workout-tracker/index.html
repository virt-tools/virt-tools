<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="/assets/theme-init.js"></script>
<title>Workout Tracker — Virtual Tools</title>
<link rel="stylesheet" href="/assets/style.css">
<style>
.tool-wrap{max-width:700px;margin:0 auto;}
.tool-desc{font-size:14px;color:var(--text-secondary,#aaa);margin:8px 0 16px;}
.card{border:1px solid var(--border,#333);border-radius:12px;padding:20px;background:var(--bg-alt,#1a1f2e);margin-bottom:16px;}
label{display:block;font-size:12px;color:var(--text-secondary,#888);margin-bottom:4px;margin-top:12px;}
input,select{width:100%;padding:10px;border-radius:8px;border:1px solid var(--border,#444);background:var(--bg,#2a2f3e);color:var(--text,#eee);font-size:14px;box-sizing:border-box;}
.btn{padding:10px 20px;border-radius:8px;border:none;background:var(--accent,#5b8def);color:#fff;cursor:pointer;font-size:14px;margin-top:12px;}
.btn:hover{opacity:0.9;}
.btn-sm{padding:6px 12px;font-size:12px;}
.row{display:flex;gap:12px;}.row>div{flex:1;}
.stats{display:flex;gap:16px;flex-wrap:wrap;margin-bottom:16px;}
.stat{text-align:center;padding:12px 20px;border-radius:10px;background:var(--bg,#2a2f3e);border:1px solid var(--border,#333);min-width:100px;}
.stat .num{font-size:24px;font-weight:700;color:var(--accent,#5b8def);}
.stat .lbl{font-size:11px;color:var(--text-secondary,#888);}
h3{margin:0 0 12px;}
.set-row{display:flex;gap:8px;align-items:center;margin-bottom:6px;font-size:13px;}
.set-row span{min-width:60px;color:var(--text-secondary,#888);}
.set-row input{flex:1;padding:6px 8px;font-size:13px;}
.exercise-block{border:1px solid var(--border,#333);border-radius:8px;padding:12px;margin-bottom:12px;background:var(--bg,#2a2f3e);}
.ex-name{font-weight:700;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center;}
.history-item{padding:10px 14px;border-radius:8px;background:var(--bg,#2a2f3e);margin-bottom:8px;font-size:13px;}
.history-item .date{color:var(--text-secondary,#888);font-size:11px;}
.history-item .exs{margin-top:4px;}
.history-item .ex{display:inline-block;margin-right:8px;color:var(--accent,#5b8def);}
.empty{text-align:center;padding:30px;color:var(--text-secondary,#888);}
.add-ex{display:flex;gap:8px;margin-bottom:12px;}
.add-ex input{flex:1;}
</style>
</head>
<body>
<header id="site-header"></header>
<main>
<div class="tool-wrap">
<h1>Workout Tracker 💪</h1>
<p class="tool-desc">Log your exercises with sets, reps, and weights. Track your workout history and stats over time. All data stored locally.</p>
<div class="stats" id="stats"></div>
<div class="card">
<h3>Today's Workout — <span id="today"></span></h3>
<div class="add-ex">
<input type="text" id="exname" placeholder="Exercise name (e.g. Bench Press)">
<button class="btn btn-sm" onclick="addEx()">Add Exercise</button>
</div>
<div id="exercises"></div>
<button class="btn" onclick="saveWorkout()">Save Workout</button>
</div>
<div class="card">
<h3>Workout History</h3>
<div id="history"></div>
</div>
</div>
</main>
<script src="/assets/app.js"></script>
<script>
const KEY='workout_tracker_v1';let currentExs=[];
function load(){try{return JSON.parse(localStorage.getItem(KEY))||[];}catch(e){return[];}}
function saveData(a){localStorage.setItem(KEY,JSON.stringify(a));}
function todayStr(){const d=new Date();return d.toISOString().slice(0,10);}
function addEx(){
const name=document.getElementById('exname').value.trim();if(!name)return;
currentExs.push({name,sets:[{reps:'',weight:''}]});document.getElementById('exname').value='';
renderExs();}
function renderExs(){
const c=document.getElementById('exercises');
if(!currentExs.length){c.innerHTML='<div class="empty">No exercises added yet.</div>';return;}
c.innerHTML=currentExs.map((ex,ei)=>`<div class="exercise-block"><div class="ex-name">${esc(ex.name)} <button class="btn btn-sm" onclick="addSet(${ei})">+ Set</button></div>${ex.sets.map((s,si)=>`<div class="set-row"><span>Set ${si+1}</span><input type="number" placeholder="Reps" value="${s.reps}" onchange="updSet(${ei},${si},'reps',this.value)"><input type="number" placeholder="Weight" value="${s.weight}" onchange="updSet(${ei},${si},'weight',this.value)"></div>`).join('')}</div>`).join('');
}
function addSet(ei){currentExs[ei].sets.push({reps:'',weight:''});renderExs();}
function updSet(ei,si,field,val){currentExs[ei].sets[si][field]=val;}
function saveWorkout(){
const valid=currentExs.filter(e=>e.sets.some(s=>s.reps||s.weight));if(!valid.length)return;
const arr=load();arr.unshift({date:todayStr(),exercises:valid});saveData(arr);
currentExs=[];renderExs();render();
}
function esc(s){return s.replace(/</g,'&lt;');}
function render(){
const arr=load();const today=document.getElementById('today');today.textContent=todayStr();
const stats=document.getElementById('stats');
if(arr.length){const totalSets=arr.reduce((s,w)=>s+w.exercises.reduce((s2,e)=>s2+e.sets.length,0),0);
stats.innerHTML=`<div class="stat"><div class="num">${arr.length}</div><div class="lbl">Workouts</div></div><div class="stat"><div class="num">${totalSets}</div><div class="lbl">Total Sets</div></div><div class="stat"><div class="num">${arr.reduce((s,w)=>s+w.exercises.length,0)}</div><div class="lbl">Exercises</div></div></div>`;}else stats.innerHTML='';
const hist=document.getElementById('history');
if(!arr.length){hist.innerHTML='<div class="empty">No workouts logged yet.</div>';return;}
hist.innerHTML=arr.slice(0,20).map(w=>`<div class="history-item"><div class="date">${w.date}</div><div class="exs">${w.exercises.map(e=>`<span class="ex">${esc(e.name)} (${e.sets.length}×${e.sets.map(s=>s.reps||'?').join('/')})</span>`).join('')}</div></div>`).join('');
}
renderExs();render();
</script>
</body>
</html>
