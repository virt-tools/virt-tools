<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="/assets/theme-init.js"></script>
<title>Lottery Number Generator — Virtual Tools</title>
<link rel="stylesheet" href="/assets/style.css">
<style>
.tool-wrap{max-width:560px;margin:0 auto;}
.format-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:8px;margin:15px 0;}
.format-btn{padding:12px;border-radius:8px;border:2px solid var(--border,#333);background:var(--bg-alt,#1a1f2e);color:var(--text,#e0e0e0);cursor:pointer;text-align:center;transition:all .15s;font-size:14px;}
.format-btn:hover{border-color:#1565c0;}
.format-btn.active{border-color:#1565c0;background:rgba(21,101,192,.15);}
.format-btn .fmt-name{font-weight:700;font-size:15px;}
.format-btn .fmt-desc{font-size:11px;color:var(--text-dim,#888);margin-top:3px;}
.balls{display:flex;justify-content:center;gap:10px;flex-wrap:wrap;margin:20px 0;}
.ball{width:56px;height:56px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:800;color:#fff;box-shadow:0 2px 8px rgba(0,0,0,.3);}
.ball.main{background:linear-gradient(135deg,#1565c0,#0d47a1);}
.ball.bonus{background:linear-gradient(135deg,#e65100,#bf360c);}
.ball.placeholder{background:var(--bg-alt,#2a2f3e);color:var(--text-dim,#555);box-shadow:none;}
.draw-info{text-align:center;color:var(--text-dim,#888);font-size:14px;margin:8px 0;}
.gen-btn{display:block;width:100%;padding:14px;border-radius:8px;border:none;background:#1565c0;color:#fff;font-size:18px;font-weight:700;cursor:pointer;margin:15px 0;}
.gen-btn:hover{background:#0d47a1;}
.gen-btn:active{transform:scale(.98);}
.multi-row{display:flex;justify-content:center;gap:8px;margin:6px 0;flex-wrap:wrap;}
.multi-set{display:flex;gap:5px;padding:6px 10px;background:var(--bg-alt,#1a1f2e);border-radius:8px;align-items:center;}
.multi-set .ball{width:34px;height:34px;font-size:14px;}
.history-box{margin:15px 0;}
.history-box h4{color:var(--text-dim,#888);font-size:13px;margin-bottom:8px;}
.hist-item{display:flex;gap:5px;padding:6px 10px;background:var(--bg-alt,#1a1f2e);border-radius:6px;margin-bottom:4px;align-items:center;flex-wrap:wrap;}
.hist-item .ball{width:28px;height:28px;font-size:12px;}
.hist-item .time{font-size:11px;color:var(--text-dim,#666);margin-left:auto;}
.copied{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#4caf50;color:#fff;padding:8px 20px;border-radius:6px;font-size:14px;opacity:0;transition:opacity .3s;pointer-events:none;}
.copied.show{opacity:1;}
</style>
</head>
<body>
<header id="site-header"></header>
<main>
<div class="tool-wrap">
<h1>Lottery Number Generator</h1>
<p class="tool-desc">Generate random lottery numbers for popular formats worldwide. Cryptographically secure via Web Crypto API. Generate single or multiple sets at once.</p>

<div class="format-grid" id="formatGrid"></div>

<div class="draw-info" id="drawInfo">Select a lottery format above</div>

<div class="balls" id="balls"></div>

<button class="gen-btn" onclick="generate()">🎲 Generate Numbers</button>

<div style="text-align:center;margin:10px 0;">
<label style="font-size:14px;color:var(--text-dim,#888);">Sets: </label>
<select id="numSets" onchange="generate()" style="padding:4px 8px;border-radius:4px;background:var(--bg-alt,#1a1f2e);color:var(--text,#e0e0e0);border:1px solid var(--border,#333);">
<option value="1">1</option><option value="3">3</option><option value="5">5</option><option value="10">10</option>
</select>
<button onclick="copyAll()" style="margin-left:10px;padding:6px 14px;border-radius:4px;border:1px solid var(--border,#333);background:transparent;color:var(--text,#e0e0e0);cursor:pointer;font-size:13px;">📋 Copy</button>
</div>

<div id="multiSets"></div>

<div class="history-box">
<h4>Recent draws</h4>
<div id="history"></div>
</div>

<div class="copied" id="copied">Copied!</div>
</div>
</main>
<script src="/assets/app.js"></script>
<script>
const FORMATS={
powerball:{name:'Powerball',desc:'5 of 69 + 1 of 26',main:5,mainMax:69,bonus:1,bonusMax:26},
megamillions:{name:'Mega Millions',desc:'5 of 70 + 1 of 25',main:5,mainMax:70,bonus:1,bonusMax:25},
euromillions:{name:'EuroMillions',desc:'5 of 50 + 2 of 12',main:5,mainMax:50,bonus:2,bonusMax:12},
eurojackpot:{name:'Eurojackpot',desc:'5 of 50 + 2 of 10',main:5,mainMax:50,bonus:2,bonusMax:10},
uklotto:{name:'UK Lotto',desc:'6 of 59',main:6,mainMax:59,bonus:0,bonusMax:0},
superenalotto:{name:'SuperEnalotto',desc:'6 of 90',main:6,mainMax:90,bonus:0,bonusMax:0},
ozlotto:{name:'Oz Lotto',desc:'7 of 47',main:7,mainMax:47,bonus:0,bonusMax:0},
649:{name:'Lotto 6/49',desc:'6 of 49',main:6,mainMax:49,bonus:0,bonusMax:0},
};
let currentFormat='powerball';
let lastSets=[];

function cryptoRandom(max){
const a=new Uint32Array(1);
crypto.getRandomValues(a);
return a[0]%max;
}

function drawNumbers(count,max){
const nums=new Set();
while(nums.size<count){nums.add(cryptoRandom(max)+1);}
return[...nums].sort((a,b)=>a-b);
}

function renderFormats(){
const grid=document.getElementById('formatGrid');
grid.innerHTML='';
Object.entries(FORMATS).forEach(([key,f])=>{
const btn=document.createElement('div');
btn.className='format-btn'+(key===currentFormat?' active':'');
btn.innerHTML=`<div class="fmt-name">${f.name}</div><div class="fmt-desc">${f.desc}</div>`;
btn.onclick=()=>{currentFormat=key;renderFormats();generate();};
grid.appendChild(btn);
});
}

function generate(){
const f=FORMATS[currentFormat];
const sets=parseInt(document.getElementById('numSets').value);
document.getElementById('drawInfo').textContent=`${f.name} — ${f.desc}`;
lastSets=[];
for(let i=0;i<sets;i++){
const main=drawNumbers(f.main,f.mainMax);
const bonus=f.bonus>0?drawNumbers(f.bonus,f.bonusMax):[];
lastSets.push({main,bonus});
}
if(sets===1){renderSingle(lastSets[0]);document.getElementById('multiSets').innerHTML='';}
else{document.getElementById('balls').innerHTML='';renderMulti();}
addHistory();
}

function makeBall(num,bonus){
const b=document.createElement('div');
b.className='ball '+(bonus?'bonus':'main');
b.textContent=num;
return b;
}

function renderSingle(set){
const c=document.getElementById('balls');c.innerHTML='';
set.main.forEach(n=>c.appendChild(makeBall(n,false)));
if(set.bonus.length){c.appendChild(Object.assign(document.createElement('div'),{style:'width:2px;',textContent:' '}));set.bonus.forEach(n=>c.appendChild(makeBall(n,true)));}
}

function renderMulti(){
const c=document.getElementById('multiSets');c.innerHTML='';
lastSets.forEach((set,i)=>{
const row=document.createElement('div');
row.className='multi-set';
const label=document.createElement('span');
label.style.cssText='font-size:12px;color:var(--text-dim,#888);min-width:20px;';
label.textContent=`${i+1}.`;
row.appendChild(label);
set.main.forEach(n=>{const b=makeBall(n,false);b.style.width='34px';b.style.height='34px';b.style.fontSize='14px';row.appendChild(b);});
if(set.bonus.length){const sep=document.createElement('span');sep.style.cssText='color:var(--text-dim,#555);';sep.textContent='|';row.appendChild(sep);set.bonus.forEach(n=>{const b=makeBall(n,true);b.style.width='34px';b.style.height='34px';b.style.fontSize='14px';row.appendChild(b);});}
c.appendChild(row);
});
}

let historyData=[];
function addHistory(){
historyData.unshift({format:FORMATS[currentFormat].name,sets:lastSets.slice(),time:new Date().toLocaleTimeString()});
if(historyData.length>5)historyData.pop();
const h=document.getElementById('history');h.innerHTML='';
historyData.forEach(hd=>{
const item=document.createElement('div');item.className='hist-item';
hd.sets[0].main.forEach(n=>{const b=makeBall(n,false);b.style.cssText+='width:28px;height:28px;font-size:12px;';item.appendChild(b);});
if(hd.sets[0].bonus.length){hd.sets[0].bonus.forEach(n=>{const b=makeBall(n,true);b.style.cssText+='width:28px;height:28px;font-size:12px;';item.appendChild(b);});}
const t=document.createElement('span');t.className='time';t.textContent=`${hd.format} · ${hd.time}`;item.appendChild(t);
h.appendChild(item);
});
}

function copyAll(){
const f=FORMATS[currentFormat];
const text=lastSets.map(s=>{
const m=s.main.join(', ');
const b=s.bonus.length?' + '+s.bonus.join(', '):'';
return m+b;
}).join('\n');
navigator.clipboard.writeText(text);
const c=document.getElementById('copied');c.classList.add('show');
setTimeout(()=>c.classList.remove('show'),1500);
}

renderFormats();generate();
VT.ready(()=>{});
</script>
</body>
</html>
