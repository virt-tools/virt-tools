<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="/assets/theme-init.js"></script>
<title>Color Therapy — Virtual Tools</title>
<link rel="stylesheet" href="/assets/style.css">
<style>
.tool-wrap{max-width:600px;margin:0 auto;text-align:center;}
.tool-desc{font-size:14px;color:var(--text-secondary,#aaa);margin:8px 0;}
.preview{width:100%;height:320px;border-radius:12px;margin:12px 0;transition:background 2s ease;display:flex;align-items:center;justify-content:center;font-size:48px;color:rgba(255,255,255,0.8);text-shadow:0 2px 8px rgba(0,0,0,0.3);}
.controls{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin:8px 0;align-items:center;}
.controls button{padding:10px 20px;border-radius:6px;border:1px solid var(--border,#444);background:var(--bg-alt,#1a1f2e);color:var(--text,#eee);cursor:pointer;font-size:14px;}
.controls button:hover{background:var(--accent,#5b8def);color:#fff;}
.controls button.active{background:var(--accent,#5b8def);color:#fff;border-color:var(--accent,#5b8def);}
label{font-size:13px;color:var(--text-secondary,#aaa);}
input[type=range]{width:120px;vertical-align:middle;}
.modes{display:flex;gap:6px;justify-content:center;flex-wrap:wrap;margin:8px 0;}
.modes button{padding:8px 14px;font-size:12px;border-radius:20px;border:2px solid transparent;background:var(--bg-alt,#1a1f2e);color:var(--text-secondary,#aaa);cursor:pointer;}
.modes button.active{border-color:var(--accent,#5b8def);color:var(--accent,#5b8def);}
.info{font-size:13px;color:var(--text-secondary,#aaa);margin:8px 0;}
.hex{font-family:monospace;font-size:16px;color:var(--text,#eee);margin:4px 0;}
</style>
</head>
<body>
<header id="site-header"></header>
<main>
<div class="tool-wrap">
<h1>Color Therapy 🌈</h1>
<p class="tool-desc">Relax with soothing color transitions. Full-screen mood lighting for meditation, focus, or sleep.</p>
<div class="preview" id="pv">🧘</div>
<div class="hex" id="hex">#000000</div>
<div class="modes">
<button class="active" data-mode="rainbow">🌈 Rainbow</button>
<button data-mode="warm">🔥 Warm</button>
<button data-mode="cool">❄️ Cool</button>
<button data-mode="ocean">🌊 Ocean</button>
<button data-mode="forest">🌲 Forest</button>
<button data-mode="sunset">🌅 Sunset</button>
<button data-mode="calm">😌 Calm</button>
</div>
<div class="controls">
<label>Speed: <input type="range" id="speed" min="1" max="20" value="5"></label>
<button id="playBtn" onclick="togglePlay()">⏸ Pause</button>
<button id="fsBtn" onclick="toggleFS()">⛶ Fullscreen</button>
</div>
<div class="info" id="info">Cycling through colors. Click fullscreen for immersive experience.</div>
</div>
</main>
<script src="/assets/app.js"></script>
<script>
const pv=document.getElementById('pv'),hexEl=document.getElementById('hex'),infoEl=document.getElementById('info');
let mode='rainbow',playing=true,hue=0,speed=5,t=0;
const palettes={
rainbow:()=>`hsl(${hue%360},70%,55%)`,
warm:()=>{const h=0+Math.sin(t*0.02)*30;return `hsl(${(h+360)%360},80%,55%)`;},
cool:()=>{const h=200+Math.sin(t*0.02)*40;return `hsl(${h%360},70%,55%)`;},
ocean:()=>{const h=180+Math.sin(t*0.015)*30;const s=60+Math.sin(t*0.01)*20;return `hsl(${h%360},${s}%,50%)`;},
forest:()=>{const h=100+Math.sin(t*0.02)*40;return `hsl(${h%360},60%,45%)`;},
sunset:()=>{const h=20+Math.sin(t*0.025)*30;return `hsl(${(h+360)%360},85%,55%)`;},
calm:()=>{const l=40+Math.sin(t*0.01)*20;return `hsl(220,30%,${l}%)`;},
};
const emojis={rainbow:'🌈',warm:'🔥',cool:'❄️',ocean:'🌊',forest:'🌲',sunset:'🌅',calm:'😌'};
function hslToHex(hsl){const m=hsl.match(/hsl\((\d+),\s*(\d+)%,\s*(\d+)%\)/);if(!m)return'#000000';const h=+m[1]/360,s=+m[2]/100,l=+m[3]/100;const a=s*Math.min(l,1-l);const f=n=>{const k=(n+h*12)%12;return Math.round(255*(l-a*Math.max(-1,Math.min(k-3,9-k,1))))*0+Math.round(255*(l-a*Math.max(-1,Math.min(k-3,9-k,1))));};const r=f(0),g=f(8),b=f(4);return'#'+[r,g,b].map(x=>x.toString(16).padStart(2,'0')).join('');}
function loop(){if(playing){t++;hue+=speed*0.3;const c=palettes[mode]();pv.style.background=c;pv.textContent=emojis[mode];hexEl.textContent=hslToHex(c);}requestAnimationFrame(loop);}
function togglePlay(){playing=!playing;document.getElementById('playBtn').textContent=playing?'⏸ Pause':'▶ Play';infoEl.textContent=playing?'Cycling through colors.':'Paused.';}
function toggleFS(){if(!document.fullscreenElement){pv.requestFullscreen&&pv.requestFullscreen();}else{document.exitFullscreen&&document.exitFullscreen();}}
document.querySelectorAll('.modes button').forEach(b=>{b.addEventListener('click',()=>{document.querySelectorAll('.modes button').forEach(x=>x.classList.remove('active'));b.classList.add('active');mode=b.dataset.mode;t=0;});});
document.getElementById('speed').addEventListener('input',e=>speed=+e.target.value);
loop();
</script>
</body>
</html>
