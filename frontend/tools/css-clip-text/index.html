<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CSS Clip-Path Text Reveal Generator — virt.tools</title>
<link rel="stylesheet" href="/assets/style.css">
<style>
.tool-area{max-width:800px;margin:2rem auto;padding:0 1rem}
.controls{display:grid;gap:.8rem;margin:1.5rem 0;padding:1.5rem;background:#1a1a2e;border-radius:12px}
.ctrl-row{display:flex;gap:1rem;align-items:center;flex-wrap:wrap}
.ctrl-row label{font-weight:600;font-size:.9rem;min-width:120px}
.ctrl-row select,.ctrl-row input{padding:.5rem;border-radius:8px;border:1px solid #444;background:#0f0f1e;color:#eee}
.preview-box{margin:1.5rem 0;padding:2rem;background:#0f0f1e;border-radius:12px;min-height:120px;display:flex;align-items:center;justify-content:center}
.output-block{margin:1.5rem 0}
.output-block textarea{width:100%;min-height:120px;font-family:monospace;font-size:.85rem;padding:1rem;border-radius:8px;border:1px solid #444;background:#0f0f1e;color:#eee;resize:vertical}
.copy-btn{padding:.6rem 1.2rem;border:none;border-radius:8px;background:#667eea;color:#fff;cursor:pointer;font-size:.9rem;margin-top:.5rem}
h2{margin-top:2rem;font-size:1.2rem}
</style>
</head>
<body>
<header id="site-header"></header>
<main>
<div class="tool-area">
<h1>✂️ CSS Clip-Path Text Reveal Generator</h1>
<p>Create CSS clip-path text reveal/mask animations. 6 reveal directions, adjustable duration. Copy HTML+CSS.</p>
<div class="controls">
<div class="ctrl-row"><label>Text</label><input type="text" id="text" value="REVEAL" style="width:200px"></div>
<div class="ctrl-row"><label>Reveal Direction</label><select id="direction"><option value="left" selected>Left to Right</option><option value="right">Right to Left</option><option value="top">Top to Bottom</option><option value="bottom">Bottom to Top</option><option value="center">Center Out</option><option value="diag">Diagonal</option></select></div>
<div class="ctrl-row"><label>Duration (s)</label><input type="number" id="duration" value="2" min=".5" max="10" step=".5" style="width:80px"></div>
<div class="ctrl-row"><label>Font Size (px)</label><input type="number" id="fontSize" value="72" min="16" max="200" step="2" style="width:80px"></div>
<div class="ctrl-row"><label>Text Color</label><input type="color" id="textColor" value="#667eea" style="width:60px;height:36px"></div>
<div class="ctrl-row"><label>Background</label><input type="color" id="bgColor" value="#1a1a2e" style="width:60px;height:36px"></div>
<div class="ctrl-row"><button class="copy-btn" onclick="update()">Update</button></div>
</div>
<h2>Preview</h2>
<div class="preview-box" id="preview"></div>
<h2>CSS</h2><div class="output-block"><textarea id="cssOut" readonly></textarea><button class="copy-btn" onclick="copyText('cssOut')">Copy CSS</button></div>
<h2>HTML</h2><div class="output-block"><textarea id="htmlOut" readonly></textarea><button class="copy-btn" onclick="copyText('htmlOut')">Copy HTML</button></div>
</div>
</main>
<script src="/assets/app.js"></script>
<script>
function update(){
var text=document.getElementById('text').value||'REVEAL';
var dir=document.getElementById('direction').value;
var dur=parseFloat(document.getElementById('duration').value);
var fs=parseInt(document.getElementById('fontSize').value);
var tc=document.getElementById('textColor').value;
var bg=document.getElementById('bgColor').value;
var clips={
left:'inset(0 100% 0 0)',
right:'inset(0 0 0 100%)',
top:'inset(0 0 100% 0)',
bottom:'inset(100% 0 0 0)',
center:'inset(50% 50% 50% 50%)',
diag:'inset(0 100% 100% 0)'
};
var css='.clip-text{font-size:'+fs+'px;font-weight:900;color:'+tc+';background:'+bg+';padding:1rem 2rem;border-radius:8px;display:inline-block;clip-path:'+clips[dir]+';animation:clipReveal '+dur+'s ease forwards}\n@keyframes clipReveal{to{clip-path:inset(0 0 0 0)}}';
var html='<div class="clip-text">'+text+'</div>';
document.getElementById('cssOut').value=css;
document.getElementById('htmlOut').value=html;
document.getElementById('preview').innerHTML='<style>'+css+'</style>'+html;
}
function copyText(id){var t=document.getElementById(id);t.select();document.execCommand('copy')}
['text','direction','duration','fontSize','textColor','bgColor'].forEach(function(id){var el=document.getElementById(id);el.addEventListener('input',update);el.addEventListener('change',update)});
update();
</script>
</body>
</html>
