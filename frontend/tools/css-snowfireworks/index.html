<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CSS Snow & Fireworks Generator — virt.tools</title>
<link rel="stylesheet" href="/assets/style.css">
<style>
.tool-area{max-width:900px;margin:2rem auto;padding:0 1rem}
.controls{display:grid;gap:1rem;margin:1.5rem 0;padding:1.5rem;background:#1a1a2e;border-radius:12px}
.control-row{display:flex;gap:1rem;align-items:center;flex-wrap:wrap}
.control-row label{min-width:140px;font-weight:600;font-size:.9rem}
.control-row select,.control-row input{padding:.5rem .75rem;border-radius:8px;border:1px solid #444;background:#0f0f1e;color:#eee;font-size:.9rem}
.preview-box{margin:1.5rem 0;padding:0;background:#0a0a14;border-radius:12px;display:flex;justify-content:center;align-items:center;min-height:300px;overflow:hidden;position:relative}
.output-block{margin:2rem 0}
.output-block textarea{width:100%;min-height:100px;font-family:monospace;font-size:.85rem;padding:1rem;border-radius:8px;border:1px solid #444;background:#0f0f1e;color:#eee;resize:vertical}
.copy-btn{padding:.6rem 1.2rem;border:none;border-radius:8px;background:#667eea;color:#fff;cursor:pointer;font-size:.9rem;margin-top:.5rem}
h2{margin-top:2rem;font-size:1.2rem}
</style>
</head>
<body>
<header id="site-header"></header>
<main>
<div class="tool-area">
<h1>🌨️ CSS Snow & Fireworks Generator</h1>
<p>Create CSS snowfall and fireworks particle effects. 2 effect types, adjustable count/speed/colors. Copy HTML+CSS.</p>
<div class="controls">
<div class="control-row">
<label>Effect</label><select id="effect"><option value="snow">Snowfall</option><option value="fireworks">Fireworks</option></select>
</div>
<div class="control-row">
<label>Count</label><input type="number" id="count" value="30" min="5" max="80" style="width:60px">
<label>Speed (s)</label><input type="number" id="speed" value="5" min="1" max="20" step="0.5" style="width:60px">
<label>Size (px)</label><input type="number" id="size" value="4" min="2" max="20" style="width:60px">
</div>
<div class="control-row" id="snowColors">
<label>Color 1</label><input type="color" id="c1" value="#ffffff">
<label>Color 2</label><input type="color" id="c2" value="#a8d8ff">
</div>
<div class="control-row" id="fireColors" style="display:none">
<label>Color 1</label><input type="color" id="fc1" value="#ff6b6b">
<label>Color 2</label><input type="color" id="fc2" value="#ffe66d">
<label>Color 3</label><input type="color" id="fc3" value="#4ecdc4">
</div>
</div>
<h2>Preview</h2>
<div class="preview-box" id="preview"></div>
<h2>HTML</h2><div class="output-block"><textarea id="htmlOut" readonly></textarea><button class="copy-btn" onclick="copyText('htmlOut')">Copy HTML</button></div>
<h2>CSS</h2><div class="output-block"><textarea id="cssOut" readonly></textarea><button class="copy-btn" onclick="copyText('cssOut')">Copy CSS</button></div>
</div>
</main>
<script src="/assets/app.js"></script>
<script>
function update(){
var eff=document.getElementById('effect').value;
document.getElementById('snowColors').style.display=eff==='snow'?'flex':'none';
document.getElementById('fireColors').style.display=eff==='fireworks'?'flex':'none';
var cnt=parseInt(document.getElementById('count').value);
var sp=document.getElementById('speed').value;
var sz=document.getElementById('size').value;
var colors=eff==='snow'?[document.getElementById('c1').value,document.getElementById('c2').value]:[document.getElementById('fc1').value,document.getElementById('fc2').value,document.getElementById('fc3').value];
var css='',html='';
if(eff==='snow'){
css='.snow-container{position:relative;width:100%;height:300px;overflow:hidden;border-radius:12px;background:linear-gradient(180deg,#0a0a30,#1a1a40)}\n';
css+='.snowflake{position:absolute;top:-10px;width:'+sz+'px;height:'+sz+'px;border-radius:50%;animation:snowfall '+sp+'s linear infinite;opacity:0.8}\n';
css+='@keyframes snowfall{0%{transform:translateY(-10px) translateX(0)}100%{transform:translateY(320px) translateX(var(--drift,0px))}}\n';
html='<div class="snow-container">\n';
for(var i=0;i<cnt;i++){
var c=colors[i%2];var left=Math.random()*100;var delay=(Math.random()*sp).toFixed(2);var drift=(Math.random()-0.5)*100;
html+='<span class="snowflake" style="left:'+left+'%;background:'+c+';animation-delay:-'+delay+'s;--drift:'+drift+'px"></span>\n';
}
html+='</div>';
}else{
css='.fireworks-container{position:relative;width:100%;height:300px;overflow:hidden;border-radius:12px;background:#0a0a14}\n';
css+='.firework{position:absolute;width:3px;height:3px;border-radius:50%;animation:firework-burst '+sp+'s ease-out infinite}\n';
css+='.firework::before,.firework::after{content:"";position:absolute;width:3px;height:3px;border-radius:50%;animation:spark '+sp+'s ease-out infinite}\n';
css+='@keyframes firework-burst{0%{transform:scale(0);opacity:1}100%{transform:scale(1);opacity:0}}\n';
css+='@keyframes spark{0%{transform:translate(0,0);opacity:1}100%{transform:translate(var(--sx,50px),var(--sy,50px));opacity:0}}\n';
html='<div class="fireworks-container">\n';
for(var i=0;i<cnt;i++){
var c=colors[i%3];var left=20+Math.random()*60;var top=20+Math.random()*60;var delay=(Math.random()*sp).toFixed(2);
var sx=(Math.random()-0.5)*150;var sy=(Math.random()-0.5)*150;
html+='<span class="firework" style="left:'+left+'%;top:'+top+'%;background:'+c+';box-shadow:0 0 6px '+c+';animation-delay:-'+delay+'s;--sx:'+sx+'px;--sy:'+sy+'px"></span>\n';
}
html+='</div>';
}
document.getElementById('htmlOut').value=html;
document.getElementById('cssOut').value=css;
document.getElementById('preview').innerHTML=html;
var st=document.createElement('style');st.textContent=css;document.getElementById('preview').appendChild(st);
}
function copyText(id){var t=document.getElementById(id);t.select();document.execCommand('copy')}
document.querySelectorAll('select,input').forEach(function(e){e.addEventListener('input',update);e.addEventListener('change',update)});
update();
</script>
</body>
</html>
