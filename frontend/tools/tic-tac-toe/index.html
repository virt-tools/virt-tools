<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <script src="/assets/theme-init.js"></script>
  <title>Tic-Tac-Toe — Virtual Tools</title>
  <link rel="stylesheet" href="/assets/style.css">
  <style>
    .board { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; width: 320px; margin: 24px auto; }
    .cell { aspect-ratio: 1; background: var(--bg-panel,#11151c); border: 1px solid var(--border,#2a2f3a); border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 48px; font-weight: 900; cursor: pointer; transition: all .15s; user-select: none; }
    .cell:hover:not(.taken):not(.locked) { border-color: var(--accent,#6ea8fe); transform: scale(1.03); }
    .cell.x { color: #6ea8fe; }
    .cell.o { color: #f472b6; }
    .cell.locked { cursor: default; }
    .cell.win { background: rgba(110,168,254,.15); border-color: var(--accent,#6ea8fe); }
    .seg { display: flex; gap: 0; margin: 16px 0; }
    .seg button { border-radius: 0; border: 1px solid var(--border,#2a2f3a); background: var(--bg-panel,#11151c); color: var(--text,#d4d9e0); padding: 8px 20px; font-weight: 600; }
    .seg button:first-child { border-radius: 8px 0 0 8px; }
    .seg button:last-child { border-radius: 0 8px 8px 0; }
    .seg button.active { background: var(--accent,#6ea8fe); color: #08101f; }
    .scores { display: flex; gap: 24px; justify-content: center; margin: 16px 0; }
    .score-box { text-align: center; }
    .score-box .num { font-size: 28px; font-weight: 900; }
    .score-box .lbl { font-size: 12px; opacity: .6; text-transform: uppercase; letter-spacing: 1px; }
    .status { text-align: center; font-size: 18px; font-weight: 700; margin: 16px 0; min-height: 28px; }
    .actions { display: flex; gap: 12px; justify-content: center; }
    button.primary { background: var(--accent,#6ea8fe); color: #08101f; border: none; border-radius: 8px; padding: 10px 24px; font-weight: 700; cursor: pointer; }
    button.secondary { background: var(--bg-panel,#11151c); color: var(--text,#d4d9e0); border: 1px solid var(--border,#2a2f3a); border-radius: 8px; padding: 10px 24px; cursor: pointer; }
    button:hover { opacity: .85; }
    .opt-row { display: flex; gap: 16px; align-items: center; justify-content: center; flex-wrap: wrap; margin: 12px 0; }
    .opt-row label { font-size: 14px; }
    select { background: var(--bg-panel,#11151c); color: var(--text,#d4d9e0); border: 1px solid var(--border,#2a2f3a); border-radius: 8px; padding: 8px 12px; }
  </style>
</head>
<body>
  <div id="site-header"></div>
  <main>
    <div class="tool-header">
      <a class="back" href="/">← All tools</a>
      <h1>Tic-Tac-Toe</h1>
      <p>Classic 3×3 Tic-Tac-Toe with a minimax AI opponent (easy/medium/hard) or two-player mode. Score tracking, first-move alternation. Fully client-side — no tracking.</p>
    </div>
    <div class="panel">
      <div class="seg" style="justify-content:center;display:flex">
        <button id="modeAi" class="active">vs AI</button>
        <button id="modePvp">2 Players</button>
      </div>
      <div class="opt-row" id="aiOpts">
        <label>Difficulty:
          <select id="difficulty">
            <option value="easy">Easy (random)</option>
            <option value="medium" selected>Medium (70% optimal)</option>
            <option value="hard">Hard (minimax)</option>
          </select>
        </label>
        <label>AI plays:
          <select id="aiMark">
            <option value="O" selected>Second (O)</option>
            <option value="X">First (X)</option>
          </select>
        </label>
      </div>
      <div class="scores">
        <div class="score-box"><div class="num" id="scoreX" style="color:#6ea8fe">0</div><div class="lbl">X wins</div></div>
        <div class="score-box"><div class="num" id="scoreD" style="opacity:.5">0</div><div class="lbl">Draws</div></div>
        <div class="score-box"><div class="num" id="scoreO" style="color:#f472b6">0</div><div class="lbl">O wins</div></div>
      </div>
      <div class="status" id="status">X's turn</div>
      <div class="board" id="board"></div>
      <div class="actions">
        <button class="primary" id="newBtn">New Game</button>
        <button class="secondary" id="resetBtn">Reset Scores</button>
      </div>
    </div>
  </main>
  <script src="/assets/app.js"></script>
  <script>
  (function() {
    const boardEl = document.getElementById('board');
    const statusEl = document.getElementById('status');
    const modeAi = document.getElementById('modeAi');
    const modePvp = document.getElementById('modePvp');
    const aiOpts = document.getElementById('aiOpts');
    const difficulty = document.getElementById('difficulty');
    const aiMark = document.getElementById('aiMark');
    const scoreXEl = document.getElementById('scoreX');
    const scoreOEl = document.getElementById('scoreO');
    const scoreDEl = document.getElementById('scoreD');
    const newBtn = document.getElementById('newBtn');
    const resetBtn = document.getElementById('resetBtn');

    let board, current, gameOver, winLine, scores = {X:0,O:0,D:0};
    let mode = 'ai';
    let aiIs = 'O';

    const WINS = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];

    function newGame() {
      board = Array(9).fill('');
      const aiGoesFirst = mode === 'ai' && aiMark.value === 'X';
      current = aiGoesFirst ? 'O' : 'X';
      gameOver = false;
      winLine = null;
      render();
      if (aiGoesFirst) setTimeout(aiMove, 300);
    }

    function render() {
      boardEl.innerHTML = '';
      for (let i = 0; i < 9; i++) {
        const c = document.createElement('div');
        c.className = 'cell';
        if (board[i]) { c.classList.add('taken', board[i].toLowerCase()); c.textContent = board[i]; }
        if (gameOver) c.classList.add('locked');
        if (winLine && winLine.includes(i)) c.classList.add('win');
        c.addEventListener('click', () => play(i));
        boardEl.appendChild(c);
      }
      if (gameOver) {
        if (winLine) statusEl.textContent = board[winLine[0]] + ' wins!';
        else statusEl.textContent = "It's a draw!";
      } else {
        const isAiTurn = mode === 'ai' && current === aiIs;
        statusEl.textContent = current + "'s turn" + (isAiTurn ? ' (AI thinking...)' : '');
      }
    }

    function play(i) {
      if (gameOver || board[i]) return;
      if (mode === 'ai' && current === aiIs) return;
      board[i] = current;
      if (check()) { endGame(); return; }
      current = current === 'X' ? 'O' : 'X';
      render();
      if (mode === 'ai' && !gameOver && current === aiIs) setTimeout(aiMove, 300);
    }

    function check() {
      for (const w of WINS) {
        if (board[w[0]] && board[w[0]] === board[w[1]] && board[w[1]] === board[w[2]]) {
          winLine = w; return true;
        }
      }
      if (board.every(c => c)) { return true; }
      return false;
    }

    function endGame() {
      gameOver = true;
      if (winLine) { scores[board[winLine[0]]]++; } else { scores.D++; }
      scoreXEl.textContent = scores.X;
      scoreOEl.textContent = scores.O;
      scoreDEl.textContent = scores.D;
      render();
    }

    function aiMove() {
      if (gameOver) return;
      let move;
      const d = difficulty.value;
      if (d === 'easy') {
        move = randomMove();
      } else if (d === 'medium') {
        move = Math.random() < 0.7 ? bestMove(aiIs) : randomMove();
      } else {
        move = bestMove(aiIs);
      }
      if (move !== null && move !== undefined) {
        board[move] = aiIs;
        if (check()) { endGame(); return; }
        current = current === 'X' ? 'O' : 'X';
        render();
      }
    }

    function randomMove() {
      const empty = board.map((c,i) => c ? null : i).filter(i => i !== null);
      return empty.length ? empty[Math.floor(Math.random()*empty.length)] : null;
    }

    function bestMove(player) {
      let best = -Infinity, move = null;
      const opp = player === 'X' ? 'O' : 'X';
      for (let i = 0; i < 9; i++) {
        if (!board[i]) {
          board[i] = player;
          const s = minimax(board, 0, false, player, opp);
          board[i] = '';
          if (s > best) { best = s; move = i; }
        }
      }
      return move;
    }

    function minimax(b, depth, isMax, player, opp) {
      for (const w of WINS) {
        if (b[w[0]] && b[w[0]] === b[w[1]] && b[w[1]] === b[w[2]]) {
          return b[w[0]] === player ? 10 - depth : depth - 10;
        }
      }
      if (b.every(c => c)) return 0;
      if (isMax) {
        let best = -Infinity;
        for (let i = 0; i < 9; i++) {
          if (!b[i]) { b[i] = player; best = Math.max(best, minimax(b, depth+1, false, player, opp)); b[i] = ''; }
        }
        return best;
      } else {
        let best = Infinity;
        for (let i = 0; i < 9; i++) {
          if (!b[i]) { b[i] = opp; best = Math.min(best, minimax(b, depth+1, true, player, opp)); b[i] = ''; }
        }
        return best;
      }
    }

    modeAi.addEventListener('click', () => {
      mode = 'ai'; modeAi.classList.add('active'); modePvp.classList.remove('active'); aiOpts.style.display = '';
      newGame();
    });
    modePvp.addEventListener('click', () => {
      mode = 'pvp'; modePvp.classList.add('active'); modeAi.classList.remove('active'); aiOpts.style.display = 'none';
      newGame();
    });
    difficulty.addEventListener('change', newGame);
    aiMark.addEventListener('change', newGame);
    newBtn.addEventListener('click', newGame);
    resetBtn.addEventListener('click', () => { scores = {X:0,O:0,D:0}; scoreXEl.textContent='0'; scoreOEl.textContent='0'; scoreDEl.textContent='0'; newGame(); });

    newGame();
  })();
  </script>
</body>
</html>
