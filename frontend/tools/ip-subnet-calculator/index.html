<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <script src="/assets/theme-init.js"></script>
  <title>IP & Subnet Calculator — Virtual Tools</title>
  <link rel="stylesheet" href="/assets/style.css">
  <style>
    .vt-layout{max-width:700px;margin:20px auto;}
    input[type="text"],select{font-family:monospace;font-size:14px;padding:8px;border:1px solid var(--border,#2a2f3a);border-radius:8px;background:var(--bg,#1a1a2e);color:var(--text,#e0e0e0);box-sizing:border-box;}
    .vt-row{display:flex;gap:10px;flex-wrap:wrap;margin:12px 0;align-items:center;}
    .vt-card{background:var(--card-bg,#21212e);border:1px solid var(--border,#2a2f3a);border-radius:8px;padding:12px 16px;margin:8px 0;}
    .vt-card h3{margin:0 0 8px;font-size:14px;}
    .vt-card table{width:100%;border-collapse:collapse;font-size:13px;}
    .vt-card td{padding:4px 8px;border-bottom:1px solid var(--border,#2a2f3a);}
    .vt-card td:first-child{opacity:.5;width:45%;}
    .vt-card td:last-child{font-family:monospace;}
    .vt-mono{font-family:monospace;font-size:12px;opacity:.6;word-break:break-all;}
    .vt-tab{display:inline-block;padding:4px 12px;border-radius:6px 6px 0 0;border:1px solid var(--border,#2a2f3a);border-bottom:none;cursor:pointer;font-size:13px;}
    .vt-tab.active{background:var(--card-bg,#21212e);}
    .vt-tab-content{display:none;}
    .vt-tab-content.active{display:block;}
  </style>
</head>
<body>
  <div id="site-header"></div>
  <main>
    <div class="tool-header">
      <a class="back" href="/">← All tools</a>
      <h1>IP & Subnet Calculator</h1>
      <p>Calculate IPv4 and IPv6 subnets from CIDR notation. Get network address, broadcast, host range, prefix length, and binary representation. Fully client-side.</p>
    </div>

    <div class="vt-layout">
      <div class="vt-tab active" data-tab="v4">IPv4</div>
      <div class="vt-tab" data-tab="v6">IPv6</div>

      <!-- IPv4 -->
      <div class="vt-tab-content active" id="tab-v4">
        <div class="vt-row">
          <input type="text" id="ipv4Input" value="192.168.1.100/24" style="width:200px;" placeholder="192.168.1.0/24">
          <button id="ipv4Calc">Calculate</button>
          <button id="ipv4MyIP">Use my IP</button>
        </div>
        <div id="ipv4Result"></div>
      </div>

      <!-- IPv6 -->
      <div class="vt-tab-content" id="tab-v6">
        <div class="vt-row">
          <input type="text" id="ipv6Input" value="2001:db8::1/64" style="width:260px;" placeholder="2001:db8::/64">
          <button id="ipv6Calc">Calculate</button>
        </div>
        <div id="ipv6Result"></div>
      </div>
    </div>
  </main>

  <script src="/assets/app.js"></script>
  <script>
  (function(){
    var d=document;
    d.querySelectorAll(".vt-tab").forEach(function(t){
      t.addEventListener("click",function(){
        d.querySelectorAll(".vt-tab").forEach(function(x){x.classList.remove("active");});
        d.querySelectorAll(".vt-tab-content").forEach(function(x){x.classList.remove("active");});
        t.classList.add("active");
        d.getElementById("tab-"+t.dataset.tab).classList.add("active");
      });
    });

    // --- IPv4 ---
    function parseIPv4(str){
      var parts=str.trim().split("/");
      var ip=parts[0].trim();
      var prefix=parts[1]?parseInt(parts[1],10):32;
      if(prefix<0||prefix>32||isNaN(prefix)) return null;
      var octets=ip.split(".");
      if(octets.length!==4) return null;
      var bytes=[];
      for(var i=0;i<4;i++){
        var o=parseInt(octets[i],10);
        if(isNaN(o)||o<0||o>255) return null;
        bytes.push(o);
      }
      var intIP=(bytes[0]<<24)|(bytes[1]<<16)|(bytes[2]<<8)|bytes[3];
      if(intIP<0) intIP=intIP>>>0;
      var mask=prefix===0?0:((-1<<(32-prefix))>>>0);
      var network=(intIP&mask)>>>0;
      var broadcast=(network|(~mask>>>0))>>>0;
      var wildcard=(~mask>>>0);
      var hostMin=prefix===32?network:(network+1)>>>0;
      var hostMax=prefix===32?network:(broadcast-1)>>>0;
      var totalHosts=Math.pow(2,32-prefix);
      var usableHosts=prefix>=31?totalHosts:totalHosts-2;

      function ipStr(n){return [(n>>>24)&255,(n>>>16)&255,(n>>>8)&255,n&255].join(".");}
      function ipBin(n){var s=n.toString(2);while(s.length<32)s="0"+s;return s.match(/.{8}/g).join(".");}

      return {
        ip:ipStr(intIP),ipBin:ipBin(intIP),
        network:ipStr(network),networkBin:ipBin(network),
        broadcast:ipStr(broadcast),broadcastBin:ipBin(broadcast),
        mask:ipStr(mask),maskBin:ipBin(mask),
        wildcard:ipStr(wildcard),
        hostMin:ipStr(hostMin),hostMax:ipStr(hostMax),
        prefix:prefix,totalHosts:totalHosts,usableHosts:usableHosts,
        class:getClass(bytes[0]),isPrivate:isPrivate(bytes[0])
      };
    }

    function getClass(o){
      if(o<128)return "A";
      if(o<192)return "B";
      if(o<224)return "C";
      if(o<240)return "D (Multicast)";
      return "E (Reserved)";
    }
    function isPrivate(o){
      return (o===10)||(o===172)||(o===192);
    }

    function renderIPv4(r){
      if(!r){d.getElementById("ipv4Result").innerHTML='<p style="color:red;">Invalid IPv4 CIDR</p>';return;}
      var rows=[
        ["IP Address",r.ip],
        ["IP Binary",r.ipBin],
        ["Network Address",r.network],
        ["Network Binary",r.networkBin],
        ["Broadcast Address",r.broadcast],
        ["Subnet Mask",r.mask],
        ["Mask Binary",r.maskBin],
        ["Wildcard Mask",r.wildcard],
        ["Host Range",r.prefix>=31?r.hostMin:r.hostMin+" - "+r.hostMax],
        ["Prefix Length","/"+r.prefix],
        ["Total Addresses",r.totalHosts.toLocaleString()],
        ["Usable Hosts",r.usableHosts.toLocaleString()],
        ["IP Class",r.class],
        ["Private Range",r.isPrivate?"Yes":"No"]
      ];
      var html='<div class="vt-card"><h3>IPv4 Subnet Details</h3><table>';
      rows.forEach(function(row){html+='<tr><td>'+row[0]+'</td><td>'+row[1]+'</td></tr>';});
      html+='</table></div>';
      d.getElementById("ipv4Result").innerHTML=html;
    }

    d.getElementById("ipv4Calc").addEventListener("click",function(){
      renderIPv4(parseIPv4(d.getElementById("ipv4Input").value));
    });
    d.getElementById("ipv4Input").addEventListener("keydown",function(e){if(e.key==="Enter")d.getElementById("ipv4Calc").click();});
    d.getElementById("ipv4MyIP").addEventListener("click",function(){
      // Can't get public IP without network. Use common private IP.
      d.getElementById("ipv4Input").value="10.0.0.1/8";
      d.getElementById("ipv4Calc").click();
    });

    // --- IPv6 ---
    function parseIPv6(str){
      var parts=str.trim().split("/");
      var ipStr=parts[0].trim();
      var prefix=parts[1]?parseInt(parts[1],10):128;
      if(prefix<0||prefix>128||isNaN(prefix)) return null;

      // Expand :: shorthand
      var halves=ipStr.split("::");
      var left,right;
      if(halves.length===2){
        left=halves[0]?halves[0].split(":"):[];
        right=halves[1]?halves[1].split(":"):[];
      }else{
        left=ipStr.split(":");
        right=[];
      }
      // Validate groups
      for(var i=0;i<left.length;i++){if(!/^[0-9a-fA-F]{1,4}$/.test(left[i]))return null;}
      for(var i=0;i<right.length;i++){if(!/^[0-9a-fA-F]{1,4}$/.test(right[i]))return null;}
      var missing=8-left.length-right.length;
      if(halves.length===2&&missing<0)return null;
      if(halves.length!==2&&left.length!==8)return null;
      var groups=left.concat(new Array(missing).fill("0")).concat(right);
      var ints=groups.map(function(g){return parseInt(g,16);});

      // Network address: zero out host bits
      var netInts=[];
      var bitsLeft=prefix;
      for(var i=0;i<8;i++){
        if(bitsLeft>=16){netInts.push(ints[i]);bitsLeft-=16;}
        else if(bitsLeft>0){var mask=(0xFFFF<<(16-bitsLeft))&0xFFFF;netInts.push(ints[i]&mask);bitsLeft=0;}
        else{netInts.push(0);}
      }

      function compress(groups){
        var str=groups.map(function(g){return g.toString(16);}).join(":");
        // Compress longest zero run
        var bestStart=-1,bestLen=0,curStart=-1,curLen=0;
        for(var i=0;i<8;i++){
          if(groups[i]===0){
            if(curStart<0)curStart=i;
            curLen++;
            if(curLen>bestLen){bestLen=curLen;bestStart=curStart;}
          }else{curStart=-1;curLen=0;}
        }
        if(bestLen>=2){
          var before=groups.slice(0,bestStart).map(function(g){return g.toString(16);});
          var after=groups.slice(bestStart+bestLen).map(function(g){return g.toString(16);});
          str=before.join(":")+(before.length>0?":":"")+(after.length>0?":":"")+after.join(":");
          if(before.length===0)str=":"+str;
          if(after.length===0)str=str+":";
        }
        return str;
      }

      var expanded=groups.map(function(g){return g.toString(16).padStart(4,"0");}).join(":");
      var netExpanded=netInts.map(function(g){return g.toString(16).padStart(4,"0");}).join(":");
      var totalAddrs=Math.pow(2,128-prefix);

      return {
        ip:compress(groups),expanded:expanded,
        network:compress(netInts),networkExpanded:netExpanded,
        prefix:prefix,totalAddresses:totalAddrs
      };
    }

    function renderIPv6(r){
      if(!r){d.getElementById("ipv6Result").innerHTML='<p style="color:red;">Invalid IPv6 CIDR</p>';return;}
      var rows=[
        ["IPv6 Address",r.ip],
        ["Expanded",r.expanded],
        ["Network Address",r.network],
        ["Network Expanded",r.networkExpanded],
        ["Prefix Length","/"+r.prefix],
        ["Total Addresses",r.totalAddresses.toExponential(2)]
      ];
      var html='<div class="vt-card"><h3>IPv6 Subnet Details</h3><table>';
      rows.forEach(function(row){html+='<tr><td>'+row[0]+'</td><td>'+row[1]+'</td></tr>';});
      html+='</table></div>';
      d.getElementById("ipv6Result").innerHTML=html;
    }

    d.getElementById("ipv6Calc").addEventListener("click",function(){
      renderIPv6(parseIPv6(d.getElementById("ipv6Input").value));
    });
    d.getElementById("ipv6Input").addEventListener("keydown",function(e){if(e.key==="Enter")d.getElementById("ipv6Calc").click();});

    // Initial
    d.getElementById("ipv4Calc").click();
    d.getElementById("ipv6Calc").click();
  })();
  </script>
</body>
</html>
