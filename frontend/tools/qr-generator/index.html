<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>QR Code Generator — Virtual Tools</title>
  <link rel="stylesheet" href="/assets/style.css">
</head>
<body>
  <div id="site-header"></div>
  <main>
    <div class="tool-header">
      <a class="back" href="/">← All tools</a>
      <h1>QR Code Generator</h1>
      <p>Create a QR code from any text or URL. Generated entirely in your browser.</p>
    </div>

    <div class="panel">
      <div class="field">
        <label for="qr-input">Text or URL</label>
        <textarea id="qr-input" placeholder="https://example.com">https://virt.tools</textarea>
      </div>
      <div class="row">
        <div>
          <label for="qr-size">Size (px)</label>
          <select id="qr-size">
            <option>128</option>
            <option selected>256</option>
            <option>384</option>
            <option>512</option>
          </select>
        </div>
        <div>
          <label for="qr-ec">Error correction</label>
          <select id="qr-ec">
            <option value="L">Low</option>
            <option value="M" selected>Medium</option>
            <option value="Q">Quartile</option>
            <option value="H">High</option>
          </select>
        </div>
      </div>
      <div class="spacer"></div>
      <button id="qr-generate">Generate</button>
      <button id="qr-download" class="secondary" disabled>Download PNG</button>

      <div id="qr-output" style="margin-top:18px; display:flex; justify-content:center;"></div>
      <p class="note">Library: vendored <code>qrcode.min.js</code> — no network requests are made.</p>
    </div>
  </main>

  <script src="/vendor/qrcode.min.js"></script>
  <script src="/assets/app.js"></script>
  <script>
  (function () {
    var input = document.getElementById("qr-input");
    var sizeSel = document.getElementById("qr-size");
    var ecSel = document.getElementById("qr-ec");
    var out = document.getElementById("qr-output");
    var dl = document.getElementById("qr-download");
    var current = null;

    function clearOutput() { out.innerHTML = ""; }

    function generate() {
      var text = input.value.trim();
      if (!text) { clearOutput(); dl.disabled = true; return; }
      clearOutput();
      var size = parseInt(sizeSel.value, 10);
      var ecMap = { L: QRCode.CorrectLevel.L, M: QRCode.CorrectLevel.M, Q: QRCode.CorrectLevel.Q, H: QRCode.CorrectLevel.H };
      var holder = document.createElement("div");
      out.appendChild(holder);
      current = new QRCode(holder, {
        text: text,
        width: size,
        height: size,
        correctLevel: ecMap[ecSel.value] || QRCode.CorrectLevel.M,
      });
      dl.disabled = false;
    }

    function download() {
      var canvas = out.querySelector("canvas");
      var img = out.querySelector("img");
      var dataURL;
      if (canvas) dataURL = canvas.toDataURL("image/png");
      else if (img) dataURL = img.src;
      else return;
      var a = document.createElement("a");
      a.href = dataURL;
      a.download = "qrcode.png";
      document.body.appendChild(a);
      a.click();
      a.remove();
    }

    document.getElementById("qr-generate").addEventListener("click", generate);
    dl.addEventListener("click", download);
    input.addEventListener("input", function () { if (current) generate(); });
    generate();
  })();
  </script>
</body>
</html>
