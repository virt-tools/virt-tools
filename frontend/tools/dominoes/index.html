<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="/assets/theme-init.js"></script>
<title>Dominoes — Virtual Tools</title>
<link rel="stylesheet" href="/assets/style.css">
<style>
.tool-wrap{max-width:600px;margin:0 auto;text-align:center;}
#board{min-height:120px;padding:12px;margin:12px 0;background:var(--bg-alt,#1a1f2e);border-radius:8px;display:flex;flex-wrap:wrap;gap:4px;justify-content:center;align-items:center;font-size:13px;color:var(--text-secondary,#aaa);}
#board:empty::before{content:'Click a tile to start the chain';}
.tile{display:inline-flex;flex-direction:column;width:36px;height:60px;border:2px solid var(--border,#555);border-radius:6px;background:#f5f0e1;color:#333;cursor:pointer;font-weight:700;}
.tile-half{display:flex;align-items:center;justify-content:center;flex:1;font-size:16px;border-bottom:1px solid #888;}
.tile-half:last-child{border-bottom:none;}
.tile-dot-0::before{content:'';}
.tile-placed{cursor:default;}
.tile-hand{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;margin:12px 0;}
.tile-hand .tile:hover{outline:2px solid var(--accent,#5b8def);}
.tile-selected{outline:3px solid #e74c3c!important;}
.controls{margin:12px 0;display:flex;gap:8px;justify-content:center;flex-wrap:wrap;}
.controls button{padding:8px 16px;border-radius:6px;border:1px solid var(--border,#444);background:var(--bg-alt,#1a1f2e);color:var(--text,#eee);cursor:pointer;font-size:14px;}
.controls button:hover{background:var(--accent,#5b8def);color:#fff;}
.stats{font-size:14px;color:var(--text-secondary,#aaa);margin:8px 0;}
.stats span{color:var(--accent,#5b8def);font-weight:700;}
#msg{font-size:15px;font-weight:600;margin:8px 0;min-height:24px;color:#f1c40f;}
.tool-desc{font-size:14px;color:var(--text-secondary,#aaa);}
.ends{font-size:13px;color:var(--text-secondary,#999);margin:4px 0;}
</style>
</head>
<body>
<header id="site-header"></header>
<main>
<div class="tool-wrap">
<h1>Dominoes 🁫</h1>
<p class="tool-desc">Classic double-six dominoes. Match tiles end-to-end by pip count. Play vs AI, draw from boneyard when stuck.</p>
<div class="stats">Your tiles: <span id="hand-count">7</span> | Boneyard: <span id="bone-count">14</span> | AI tiles: <span id="ai-count">7</span></div>
<div class="ends" id="ends"></div>
<div id="board"></div>
<div id="msg"></div>
<div class="tile-hand" id="hand"></div>
<div class="controls">
<button onclick="drawTile()">🎴 Draw from boneyard</button>
<button onclick="passTurn()" id="pass-btn" disabled>⏭ Pass</button>
<button onclick="newGame()">🔄 New game</button>
</div>
</div>
</main>
<script src="/assets/app.js"></script>
<script>
let hand=[],aiHand=[],boneyard=[],chain=[],leftEnd=0,rightEnd=0,selected=null,turn='player',aiTimer=null;
function makeTiles(){const t=[];for(let i=0;i<=6;i++)for(let j=i;j<=6;j++)t.push([i,j]);return t;}
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function pips(n){return ['','•','••','•••','••••','•••••','••••••'][n]||n;}
function newGame(){
clearTimeout(aiTimer);
const all=shuffle(makeTiles());
hand=all.slice(0,7);aiHand=all.slice(7,14);boneyard=all.slice(14);
chain=[];selected=null;turn='player';document.getElementById('msg').textContent='';
render();
}
function canPlay(tile){
if(chain.length===0)return true;
return tile.includes(leftEnd)||tile.includes(rightEnd);
}
function playTile(tile,side,fromAI){
if(chain.length===0){chain.push([...tile].sort((a,b)=>a-b));leftEnd=tile[0];rightEnd=tile[1];}
else if(side==='left'){
if(tile[1]===leftEnd){chain.unshift(tile);leftEnd=tile[0];}
else if(tile[0]===leftEnd){chain.unshift([tile[1],tile[0]]);leftEnd=tile[1];}
else return false;
}
else{
if(tile[0]===rightEnd){chain.push(tile);rightEnd=tile[1];}
else if(tile[1]===rightEnd){chain.push([tile[1],tile[0]]);rightEnd=tile[0];}
else return false;
}
return true;
}
function placeSelected(side){
if(!selected)return;
if(playTile(selected,side)){
hand=hand.filter(t=>!(t[0]===selected[0]&&t[1]===selected[1]));
selected=null;turn='ai';render();
checkWin();
if(!checkWin())aiTimer=setTimeout(aiTurn,800);
}else{document.getElementById('msg').textContent='Cannot play there.';}
}
function aiTurn(){
const playable=aiHand.filter(t=>t.includes(leftEnd)||t.includes(rightEnd)||(chain.length===0));
if(playable.length===0){
if(boneyard.length>0){aiHand.push(boneyard.pop());render();aiTimer=setTimeout(aiTurn,400);return;}
turn='player';render();document.getElementById('msg').textContent='AI passed.';return;
}
const tile=playable[0];
let side='right';
if(chain.length>0&&!tile.includes(rightEnd)&&tile.includes(leftEnd))side='left';
playTile(tile,side);
aiHand=aiHand.filter(t=>!(t[0]===tile[0]&&t[1]===tile[1]));
turn='player';render();
checkWin();
}
function drawTile(){
if(turn!=='player')return;
if(boneyard.length===0){document.getElementById('msg').textContent='Boneyard empty.';return;}
hand.push(boneyard.pop());render();
}
function passTurn(){
if(turn!=='player')return;
const can=hand.some(t=>canPlay(t));
if(can){document.getElementById('msg').textContent='You have playable tiles.';return;}
if(boneyard.length>0){document.getElementById('msg').textContent='Draw from boneyard first.';return;}
turn='ai';render();document.getElementById('msg').textContent='You passed.';aiTimer=setTimeout(aiTurn,800);
}
function checkWin(){
if(hand.length===0){document.getElementById('msg').textContent='🎉 You win!';clearTimeout(aiTimer);return true;}
if(aiHand.length===0){document.getElementById('msg').textContent='😢 AI wins.';clearTimeout(aiTimer);return true;}
return false;
}
function selectTile(tile){
if(turn!=='player')return;
const idx=hand.findIndex(t=>t[0]===tile[0]&&t[1]===tile[1]);
selected=selected&&selected[0]===tile[0]&&selected[1]===tile[1]?null:[...tile];
render();
if(selected&&chain.length>0){
const canL=tile.includes(leftEnd),canR=tile.includes(rightEnd);
if(canL&&!canR)placeSelected('left');
else if(canR&&!canL)placeSelected('right');
}
else if(selected&&chain.length===0)placeSelected('right');
}
function render(){
const be=document.getElementById('board');be.innerHTML='';
chain.forEach(t=>{const el=document.createElement('div');el.className='tile tile-placed';
el.innerHTML='<div class="tile-half">'+pips(t[0])+'</div><div class="tile-half">'+pips(t[1])+'</div>';be.appendChild(el);});
const he=document.getElementById('hand');he.innerHTML='';
hand.forEach(t=>{const el=document.createElement('div');el.className='tile';
if(selected&&selected[0]===t[0]&&selected[1]===t[1])el.classList.add('tile-selected');
el.innerHTML='<div class="tile-half">'+pips(t[0])+'</div><div class="tile-half">'+pips(t[1])+'</div>';
el.onclick=()=>selectTile(t);he.appendChild(el);});
document.getElementById('hand-count').textContent=hand.length;
document.getElementById('bone-count').textContent=boneyard.length;
document.getElementById('ai-count').textContent=aiHand.length;
document.getElementById('ends').textContent=chain.length?('Left end: '+leftEnd+' | Right end: '+rightEnd):'';
document.getElementById('pass-btn').disabled=turn!=='player'||hand.some(t=>canPlay(t))||boneyard.length>0;
}
newGame();
</script>
</body>
</html>
