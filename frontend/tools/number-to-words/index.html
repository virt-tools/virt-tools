<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <script src="/assets/theme-init.js"></script>
  <title>Number to Words — Virtual Tools</title>
  <link rel="stylesheet" href="/assets/style.css">
</head>
<body>
  <div id="site-header"></div>
  <main>
    <div class="tool-header">
      <a class="back" href="/">← All tools</a>
      <h1>Number to Words</h1>
      <p>Convert a number to English words — up to trillions, with optional cents mode for check-writing. Runs entirely in your browser.</p>
    </div>

    <div class="panel">
      <div class="row" style="align-items:flex-end;">
        <div style="flex:1 1 280px;">
          <label for="in">Number</label>
          <input type="text" id="in" value="1234.56" style="font-family:ui-monospace,monospace;">
        </div>
        <label class="check"><input type="checkbox" id="cents"> Cents mode (2-digit decimals as "... and N cents")</label>
      </div>

      <div class="spacer"></div>
      <div class="row" style="justify-content:space-between;">
        <label for="out">In words</label>
        <div class="row" style="gap:8px;">
          <button id="upper" class="secondary" style="padding:4px 10px;">UPPERCASE</button>
          <button id="copy" class="secondary" style="padding:4px 10px;">Copy</button>
        </div>
      </div>
      <div class="output" id="out" style="word-break:break-word; min-height:1.6em;"></div>
      <p class="note" id="note">Supports integers up to 999 trillion and optional decimals. Negative numbers read as "negative …".</p>
    </div>
  </main>

  <script src="/assets/app.js"></script>
  <script>
  (function () {
    var ONES = ["", "one", "two", "three", "four", "five", "six", "seven", "eight", "nine",
      "ten", "eleven", "twelve", "thirteen", "fourteen", "fifteen", "sixteen",
      "seventeen", "eighteen", "nineteen"];
    var DIGITS = ["zero","one","two","three","four","five","six","seven","eight","nine"];
    var TENS = ["", "", "twenty", "thirty", "forty", "fifty", "sixty", "seventy", "eighty", "ninety"];
    var SCALES = ["", "thousand", "million", "billion", "trillion"];

    var inEl = document.getElementById("in");
    var cents = document.getElementById("cents");
    var upper = document.getElementById("upper");
    var out = document.getElementById("out");
    var copy = document.getElementById("copy");
    var note = document.getElementById("note");

    function underThousand(n) {
      var parts = [];
      var h = Math.floor(n / 100), r = n % 100;
      if (h) parts.push(ONES[h] + " hundred");
      if (r) {
        if (r < 20) parts.push(ONES[r]);
        else parts.push(TENS[Math.floor(r / 10)] + (r % 10 ? "-" + ONES[r % 10] : ""));
      }
      return parts.join(" ");
    }
    function intToWords(n) {
      if (n === 0) return "zero";
      n = Math.abs(n);
      var groups = [];
      while (n > 0) { groups.push(n % 1000); n = Math.floor(n / 1000); }
      if (groups.length > SCALES.length) throw new Error("Number too large (max 999 trillion).");
      var words = [];
      for (var i = groups.length - 1; i >= 0; i--) {
        var g = groups[i];
        if (!g) continue;
        var w = underThousand(g);
        if (SCALES[i]) w += " " + SCALES[i];
        words.push(w);
      }
      return words.join(" ");
    }
    function numToWords(s, useCents) {
      s = s.trim();
      if (!s) throw new Error("Enter a number.");
      var neg = false;
      if (s.charAt(0) === "+" || s.charAt(0) === "-") { neg = s.charAt(0) === "-"; s = s.slice(1); }
      var intpart, frac;
      var dot = s.indexOf(".");
      if (dot !== -1) { intpart = s.slice(0, dot); frac = s.slice(dot + 1); }
      else { intpart = s; frac = ""; }
      if (intpart === "") intpart = "0";
      if (!/^\d*$/.test(intpart) || (frac !== "" && !/^\d*$/.test(frac))) throw new Error("That doesn't look like a number.");
      if (intpart.length > 15) throw new Error("Number too large (max 999 trillion).");
      var result = intToWords(parseInt(intpart, 10) || 0);
      if (frac !== "") {
        if (useCents && frac.length === 2) {
          var c = parseInt(frac, 10);
          result += " and " + (c ? underThousand(c) : "zero") + (c === 1 ? " cent" : " cents");
        } else {
          var ds = [];
          for (var i = 0; i < frac.length; i++) ds.push(DIGITS[parseInt(frac.charAt(i), 10)]);
          result += " point " + ds.join(" ");
        }
      }
      if (neg) result = "negative " + result;
      return result;
    }

    function run() {
      try {
        var w = numToWords(inEl.value, cents.checked);
        out.textContent = w;
        note.textContent = "Reads as " + w.split(" ").length + " words. Valid up to ~999 trillion.";
        out.style.color = "";
        note.style.color = "";
      } catch (e) {
        out.textContent = "—";
        note.textContent = e.message;
        note.style.color = "var(--bad)";
      }
    }

    function copyText() {
      var t = out.textContent;
      if (!t || t === "—") return;
      function done() { copy.textContent = "Copied!"; setTimeout(function () { copy.textContent = "Copy"; }, 1200); }
      if (navigator.clipboard && navigator.clipboard.writeText) navigator.clipboard.writeText(t).then(done);
      else { var ta = document.createElement("textarea"); ta.value = t; document.body.appendChild(ta); ta.select(); try { document.execCommand("copy"); done(); } catch (e) {} ta.remove(); }
    }

    [inEl, cents].forEach(function (el) {
      el.addEventListener("input", run);
      el.addEventListener("change", run);
    });
    upper.addEventListener("click", function () {
      if (out.textContent && out.textContent !== "—") out.textContent = out.textContent.toUpperCase();
    });
    copy.addEventListener("click", copyText);

    run();
  })();
  </script>
</body>
</html>
