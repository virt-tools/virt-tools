<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <script src="/assets/theme-init.js"></script>
  <title>CSS Gradient Generator — Virtual Tools</title>
  <link rel="stylesheet" href="/assets/style.css">
</head>
<body>
  <div id="site-header"></div>
  <main>
    <div class="tool-header">
      <a class="back" href="/">← All tools</a>
      <h1>CSS Gradient Generator</h1>
      <p>Build CSS linear and radial gradients with a live preview. Everything runs in your browser.</p>
    </div>

    <div class="panel">
      <div class="row">
        <div>
          <label for="c1">Color 1</label>
          <input type="color" id="c1" value="#6ea8fe">
        </div>
        <div>
          <label for="c2">Color 2</label>
          <input type="color" id="c2" value="#8b7bff">
        </div>
        <div>
          <label for="type">Type</label>
          <select id="type">
            <option value="linear" selected>Linear</option>
            <option value="radial">Radial</option>
          </select>
        </div>
        <div>
          <label for="angle">Angle: <span id="angle-val">90</span>°</label>
          <input type="range" id="angle" min="0" max="360" value="90">
        </div>
      </div>

      <div class="spacer"></div>
      <label for="preview">Preview</label>
      <div id="preview" style="height:200px; border-radius:8px; border:1px solid var(--border); margin-top:6px;"></div>

      <div class="spacer"></div>
      <div class="row" style="justify-content:space-between;">
        <label for="css">CSS</label>
        <button id="copy" class="secondary" style="padding:4px 10px;">Copy</button>
      </div>
      <div class="output" id="css" style="word-break:break-all;"></div>
    </div>
  </main>

  <script src="/assets/app.js"></script>
  <script>
  (function () {
    var c1 = document.getElementById("c1");
    var c2 = document.getElementById("c2");
    var type = document.getElementById("type");
    var angle = document.getElementById("angle");
    var angleVal = document.getElementById("angle-val");
    var preview = document.getElementById("preview");
    var css = document.getElementById("css");

    function build() {
      var t = type.value;
      var a = angle.value;
      angleVal.textContent = a;
      angle.disabled = (t !== "linear");
      var expr;
      if (t === "linear") {
        expr = "linear-gradient(" + a + "deg, " + c1.value + ", " + c2.value + ")";
      } else {
        expr = "radial-gradient(circle, " + c1.value + ", " + c2.value + ")";
      }
      preview.style.background = expr;
      css.textContent = "background: " + expr + ";";
    }

    document.getElementById("copy").addEventListener("click", function () {
      var text = css.textContent;
      if (!text) return;
      var btn = this;
      if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(text).then(function () {
          btn.textContent = "Copied!"; setTimeout(function () { btn.textContent = "Copy"; }, 1200);
        });
      } else {
        var ta = document.createElement("textarea");
        ta.value = text; document.body.appendChild(ta); ta.select();
        try { document.execCommand("copy"); btn.textContent = "Copied!"; setTimeout(function () { btn.textContent = "Copy"; }, 1200); }
        catch (e) {}
        ta.remove();
      }
    });

    [c1, c2, type, angle].forEach(function (elx) {
      elx.addEventListener("input", build);
      elx.addEventListener("change", build);
    });

    build();
  })();
  </script>
</body>
</html>
