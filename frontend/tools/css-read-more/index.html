<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CSS Read More Generator — virt.tools</title>
<link rel="stylesheet" href="/assets/style.css">
<style>
.tool-area{max-width:960px;margin:2rem auto;padding:0 1rem}
.controls{display:grid;gap:1rem;margin:1.5rem 0;padding:1.5rem;background:#1a1a2e;border-radius:12px}
.control-row{display:flex;gap:1rem;align-items:center;flex-wrap:wrap}
.control-row label{min-width:130px;font-weight:600;font-size:.9rem}
.control-row select,.control-row input[type="color"],.control-row input[type="range"],.control-row input[type="number"],.control-row textarea{padding:.5rem .75rem;border-radius:8px;border:1px solid #444;background:#0f0f1e;color:#eee;font-size:.9rem}
.control-row textarea{width:100%;min-height:80px}
.preview-box{margin:1.5rem 0;padding:2rem;background:#0f0f1e;border-radius:12px;overflow:hidden}
.output-block{margin:2rem 0}
.output-block textarea{width:100%;min-height:200px;font-family:monospace;font-size:.85rem;padding:1rem;border-radius:8px;border:1px solid #444;background:#0f0f1e;color:#eee;resize:vertical}
.copy-btn{padding:.6rem 1.2rem;border:none;border-radius:8px;background:#4a9eff;color:#fff;cursor:pointer;font-size:.9rem;margin-top:.5rem}
h2{margin-top:2rem;font-size:1.2rem}
</style>
</head>
<body>
<header id="site-header"></header>
<main>
<div class="tool-area">
<h1>📖 CSS Read More Generator</h1>
<p>Create CSS text truncation with expandable "read more" toggle. Configurable line limit, custom text, and button style.</p>
<div class="controls">
<div class="control-row">
<label>Content</label><textarea id="content" rows="3">Lorem ipsum dolor sit amet, consectetur adipiscing elit. Sed do eiusmod tempor incididunt ut labore et dolore magna aliqua. Ut enim ad minim veniam, quis nostrud exercitation ullamco laboris nisi ut aliquip ex ea commodo consequat. Duis aute irure dolor in reprehenderit in voluptate velit esse cillum dolore eu fugiat nulla pariatur. Excepteur sint occaecat cupidatat non proident, sunt in culpa qui officia deserunt mollit anim id est laborum.</textarea>
</div>
<div class="control-row">
<label>Line Limit</label><input type="number" id="lineLimit" value="3" min="1" max="20">
<label>Expand Text</label><input type="text" id="expandText" value="Read more" style="width:120px">
<label>Collapse Text</label><input type="text" id="collapseText" value="Read less" style="width:120px">
</div>
<div class="control-row">
<label>Text Color</label><input type="color" id="textColor" value="#cccccc">
<label>Link Color</label><input type="color" id="linkColor" value="#4a9eff">
<label>Font Size</label><input type="range" id="fontSize" min="12" max="24" value="16"><span id="fontSizeVal">16px</span>
</div>
<div class="control-row">
<label>Style</label><select id="style"><option value="fade">Fade</option><option value="plain">Plain</option><option value="bordered">Bordered</option></select>
</div>
</div>
<h2>Preview</h2>
<div class="preview-box" id="preview"></div>
<h2>CSS</h2><div class="output-block"><textarea id="cssOut" readonly></textarea><button class="copy-btn" onclick="copyText('cssOut')">Copy CSS</button></div>
<h2>HTML</h2><div class="output-block"><textarea id="htmlOut" readonly></textarea><button class="copy-btn" onclick="copyText('htmlOut')">Copy HTML</button></div>
</div>
</main>
<script src="/assets/app.js"></script>
<script>
function update(){
var content=document.getElementById('content').value;
var lineLimit=parseInt(document.getElementById('lineLimit').value)||3;
var expandText=document.getElementById('expandText').value;
var collapseText=document.getElementById('collapseText').value;
var textColor=document.getElementById('textColor').value;
var linkColor=document.getElementById('linkColor').value;
var fontSize=document.getElementById('fontSize').value;
var style=document.getElementById('style').value;
document.getElementById('fontSizeVal').textContent=fontSize+'px';
var preview=document.getElementById('preview');
var lineHeight=Math.round(fontSize*1.5);
var maxHeight=lineHeight*lineLimit;
var styleClass=style==='fade'?'rm-fade':style==='bordered'?'rm-bordered':'rm-plain';
var html='<style>'+
'.rm-container{color:'+textColor+';font-size:'+fontSize+'px;line-height:'+lineHeight+'px;position:relative}'+
'.rm-content{overflow:hidden;transition:max-height .3s ease;max-height:'+maxHeight+'px}'+
'.rm-checkbox{display:none}'+
'.rm-checkbox:checked~.rm-content{max-height:2000px}'+
'.rm-label{color:'+linkColor+';cursor:pointer;display:inline-block;margin-top:8px;font-weight:600}'+
'.rm-checkbox:checked~.rm-label .rm-expand{display:none}'+
'.rm-checkbox:checked~.rm-label .rm-collapse{display:inline}'+
'.rm-label .rm-collapse{display:none}'+
(style==='fade'?'.rm-content::after{content:"";position:absolute;bottom:'+lineHeight+'px;left:0;right:0;height:'+lineHeight+'px;background:linear-gradient(transparent,#0f0f1e);pointer-events:none;transition:opacity .3s}.rm-checkbox:checked~.rm-content::after{opacity:0}':'')+
(style==='bordered'?'.rm-container{padding:1rem;border:1px solid #333;border-radius:8px}':'')+
'</style>';
html+='<div class="rm-container '+styleClass+'">';
html+='<input type="checkbox" id="rm-toggle" class="rm-checkbox">';
html+='<div class="rm-content">'+escapeHtml(content)+'</div>';
html+='<label for="rm-toggle" class="rm-label"><span class="rm-expand">'+expandText+'</span><span class="rm-collapse">'+collapseText+'</span></label>';
html+='</div>';
preview.innerHTML=html;
var cssText='.rm-container {\n  color: '+textColor+';\n  font-size: '+fontSize+'px;\n  line-height: '+lineHeight+'px;\n  position: relative;\n'+(style==='bordered'?'  padding: 1rem;\n  border: 1px solid #333;\n  border-radius: 8px;\n':'')+'}\n\n';
cssText+='.rm-content {\n  overflow: hidden;\n  transition: max-height 0.3s ease;\n  max-height: '+maxHeight+'px;\n}\n\n';
cssText+='/* Use checkbox hack for pure CSS toggle */\n.rm-checkbox {\n  display: none;\n}\n\n.rm-checkbox:checked ~ .rm-content {\n  max-height: 2000px;\n}\n\n';
cssText+='.rm-label {\n  color: '+linkColor+';\n  cursor: pointer;\n  display: inline-block;\n  margin-top: 8px;\n  font-weight: 600;\n}\n\n';
cssText+='.rm-label .rm-collapse { display: none; }\n.rm-checkbox:checked ~ .rm-label .rm-expand { display: none; }\n.rm-checkbox:checked ~ .rm-label .rm-collapse { display: inline; }\n';
if(style==='fade')cssText+='\n.rm-content::after {\n  content: "";\n  position: absolute;\n  bottom: '+lineHeight+'px;\n  left: 0;\n  right: 0;\n  height: '+lineHeight+'px;\n  background: linear-gradient(transparent, #fff);\n  pointer-events: none;\n  transition: opacity 0.3s;\n}\n\n.rm-checkbox:checked ~ .rm-content::after {\n  opacity: 0;\n}\n';
document.getElementById('cssOut').value=cssText;
var htmlOut='<div class="rm-container">\n  <input type="checkbox" id="rm-toggle" class="rm-checkbox">\n  <div class="rm-content">'+escapeHtml(content)+'</div>\n  <label for="rm-toggle" class="rm-label">\n    <span class="rm-expand">'+expandText+'</span>\n    <span class="rm-collapse">'+collapseText+'</span>\n  </label>\n</div>';
document.getElementById('htmlOut').value=htmlOut;
}
function escapeHtml(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function copyText(id){var t=document.getElementById(id);t.select();document.execCommand('copy')}
document.querySelectorAll('select,input,textarea').forEach(function(e){e.addEventListener('input',update)});
update();
</script>
</body>
</html>
