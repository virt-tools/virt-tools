<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="/assets/theme-init.js"></script>
<title>CSS Accordion Generator — Virtual Tools</title>
<link rel="stylesheet" href="/assets/style.css">
<style>
.tool-wrap{max-width:680px;margin:0 auto;}
.tool-desc{font-size:14px;color:var(--text-secondary,#aaa);margin:8px 0 20px;}
.controls{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin:12px 0;}
.ctrl{display:flex;flex-direction:column;gap:4px;}
.ctrl label{font-size:12px;color:var(--text-secondary,#888);}
.ctrl input,.ctrl select{padding:6px 8px;border-radius:6px;border:1px solid var(--border,#444);background:var(--bg,#1e2230);color:var(--text,#eee);font-size:13px;}
.ctrl input[type="color"]{padding:2px;height:34px;}
button.action{padding:8px 16px;border-radius:6px;border:1px solid var(--border,#444);background:var(--card,#2a2f3e);color:var(--text,#eee);cursor:pointer;font-size:13px;margin:4px 4px 0 0;}
button.action:hover{border-color:var(--accent,#5b8def);}
.preview{background:var(--bg,#1e2230);border:1px solid var(--border,#444);border-radius:8px;padding:20px;margin:12px 0;}
.code-block{background:var(--bg,#1e2230);border:1px solid var(--border,#444);border-radius:8px;padding:12px;margin:8px 0;font-family:monospace;font-size:11px;color:var(--text,#eee);white-space:pre-wrap;word-break:break-all;max-height:260px;overflow:auto;}
.acc-item{border-radius:8px;overflow:hidden;margin-bottom:8px;}
.acc-input{display:none}
.acc-label{display:block;padding:12px 16px;cursor:pointer;font-weight:600;font-size:14px;position:relative}
.acc-label::after{content:'▼';position:absolute;right:16px;top:50%;transform:translateY(-50%);transition:transform .3s}
.acc-content{max-height:0;overflow:hidden;transition:max-height .3s ease;padding:0 16px}
.acc-input:checked ~ .acc-label::after{transform:translateY(-50%) rotate(180deg)}
.acc-input:checked ~ .acc-content{max-height:200px;padding:12px 16px}
</style>
</head>
<body>
<header id="site-header"></header>
<main>
<div class="tool-wrap">
<h1>📂 CSS Accordion Generator</h1>
<p class="tool-desc">Create CSS-only accordion/FAQ components with smooth expand/collapse animations. 4 styles, customizable colors, copy HTML+CSS.</p>
<div class="controls">
<div class="ctrl"><label>Header Color</label><input type="color" id="hc" value="#5b8def" oninput="render()"></div>
<div class="ctrl"><label>Content Color</label><input type="color" id="cc" value="#2a2f3e" oninput="render()"></div>
<div class="ctrl"><label>Text Color</label><input type="color" id="tc" value="#ffffff" oninput="render()"></div>
<div class="ctrl"><label>Style</label><select id="st" onchange="render()"><option value="filled">Filled</option><option value="bordered">Bordered</option><option value="shadow">Shadow</option><option value="minimal">Minimal</option></select></div>
<div class="ctrl"><label>Border Radius</label><input type="number" id="br" value="8" min="0" max="24" oninput="render()"></div>
<div class="ctrl"><label>Item Count</label><input type="number" id="ic" value="3" min="2" max="6" oninput="render()"></div>
</div>
<div class="preview" id="prev"></div>
<div style="margin:8px 0;"><button class="action" onclick="copyCode()">Copy HTML+CSS</button></div>
<div class="code-block" id="code"></div>
</div>
</main>
<script src="/assets/app.js"></script>
<script>
let codeText='';
const faqs=[
{q:'What is this tool?',a:'A CSS-only accordion generator that creates FAQ or collapsible content sections.'},
{q:'Does it use JavaScript?',a:'No! Pure CSS using hidden checkboxes and sibling selectors.'},
{q:'Can I customize colors?',a:'Yes, use the color pickers to match your site theme.'},
{q:'How many items?',a:'Between 2 and 6 accordion items.'},
{q:'Is it responsive?',a:'Yes, the accordion adapts to container width automatically.'},
{q:'Can I copy the code?',a:'Click the Copy button to get the full HTML and CSS.'}
];
function render(){
const hc=v('hc'),cc=v('cc'),tc=v('tc'),st=v('st'),br=parseInt(v('br'))||8,n=Math.min(6,Math.max(2,parseInt(v('ic'))||3));
const styleMap={filled:`border:none`,bordered:`border:1px solid ${hc}`,shadow:`border:none;box-shadow:0 2px 8px rgba(0,0,0,.2)`,minimal:`border:none;border-bottom:1px solid ${hc}`};
let html='';
for(let i=0;i<n;i++){
const open=i===0?'checked':'';
html+=`<div class="acc-item" style="background:${st==='filled'?cc:'transparent'};border-radius:${br}px;${styleMap[st]}">`;
html+=`<input type="checkbox" id="acc-${i}" class="acc-input" ${open}>`;
html+=`<label for="acc-${i}" class="acc-label" style="background:${hc};color:${tc}">${faqs[i].q}</label>`;
html+=`<div class="acc-content" style="background:${cc};color:${tc}">${faqs[i].a}</div>`;
html+='</div>';
}
document.getElementById('prev').innerHTML=html;
// Generate code
let css=`.accordion{font-family:sans-serif}
.acc-item{background:${st==='filled'?cc:'transparent'};border-radius:${br}px;margin-bottom:8px;${styleMap[st]}}
.acc-input{display:none}
.acc-label{display:block;padding:12px 16px;cursor:pointer;font-weight:600;color:${tc};background:${hc};border-radius:${br}px;position:relative}
.acc-label::after{content:'▼';position:absolute;right:16px;top:50%;transform:translateY(-50%);transition:transform .3s}
.acc-content{max-height:0;overflow:hidden;transition:max-height .3s ease;color:${tc};background:${cc}}
.acc-input:checked ~ .acc-label::after{transform:translateY(-50%) rotate(180deg)}
.acc-input:checked ~ .acc-content{max-height:200px;padding:12px 16px}`;
let htmlCode=`<div class="accordion">\n`;
for(let i=0;i<n;i++){
htmlCode+=`  <div class="acc-item">\n    <input type="checkbox" id="acc-${i}" class="acc-input"${i===0?' checked':''}>\n    <label for="acc-${i}" class="acc-label">${faqs[i].q}</label>\n    <div class="acc-content">${faqs[i].a}</div>\n  </div>\n`;
}
htmlCode+=`</div>`;
codeText=`<!-- HTML -->\n${htmlCode}\n\n<!-- CSS -->\n<style>\n${css}\n</style>`;
document.getElementById('code').textContent=codeText;
}
function v(id){return document.getElementById(id).value;}
function copyCode(){navigator.clipboard.writeText(codeText).then(()=>alert('Code copied!')).catch(()=>alert('Copy failed'));}
render();
</script>
</body>
</html>
