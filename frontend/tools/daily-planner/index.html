<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="/assets/theme-init.js"></script>
<title>Daily Planner — Virtual Tools</title>
<link rel="stylesheet" href="/assets/style.css">
<style>
.tool-wrap{max-width:700px;margin:0 auto;}
.tool-desc{font-size:14px;color:var(--text-secondary,#aaa);margin:8px 0 16px;}
.planner-header{display:flex;gap:12px;align-items:center;flex-wrap:wrap;margin-bottom:16px;}
.planner-header input[type=date]{padding:8px 12px;border-radius:8px;border:1px solid var(--border,#444);background:var(--bg,#2a2f3e);color:var(--text,#eee);font-size:14px;}
.btn{padding:8px 16px;border-radius:8px;border:none;background:var(--accent,#5b8def);color:#fff;cursor:pointer;font-size:14px;}
.btn:hover{opacity:0.9;}
.btn-sm{padding:4px 10px;font-size:12px;}
.btn-danger{background:#f44336;}
.slot{display:flex;gap:8px;align-items:flex-start;padding:8px;border-radius:8px;background:var(--card,#2a2f3e);margin-bottom:6px;border:1px solid var(--border,#3a3f4e);}
.slot-time{font-weight:700;font-variant-numeric:tabular-nums;min-width:60px;color:var(--accent,#5b8def);}
.slot-input{flex:1;padding:6px 10px;border-radius:6px;border:1px solid var(--border,#444);background:var(--bg,#1e2230);color:var(--text,#eee);font-size:14px;}
.slot-done{text-decoration:line-through;opacity:0.5;}
.stats{font-size:13px;color:var(--text-secondary,#888);margin-top:12px;}
.empty{color:var(--text-secondary,#666);font-style:italic;text-align:center;padding:20px;}
</style>
</head>
<body>
<header id="site-header"></header>
<main>
<div class="tool-wrap">
<h1>🗓️ Daily Planner</h1>
<p class="tool-desc">Plan your day hour-by-hour. Add tasks to time slots, mark them done, and navigate between dates. All stored locally.</p>
<div class="planner-header">
<input type="date" id="datePicker" onchange="render()">
<button class="btn btn-sm" onclick="prevDay()">◀ Prev</button>
<button class="btn btn-sm" onclick="nextDay()">Next ▶</button>
<button class="btn btn-sm" onclick="goToday()">Today</button>
<button class="btn btn-sm btn-danger" onclick="clearDay()">Clear Day</button>
</div>
<div id="slots"></div>
<div class="stats" id="stats"></div>
</div>
</main>
<script src="/assets/app.js"></script>
<script>
const SLOTS=[];
for(let h=6;h<=22;h++)SLOTS.push(h);
let currentDate=new Date().toISOString().slice(0,10);
functiongetKey(){return'planner_'+currentDate;}
functionload(){try{return JSON.parse(localStorage.getItem(getKey())||'{}');}catch(e){return{};}}
functionsave(data){localStorage.setItem(getKey(),JSON.stringify(data));}
functionrender(){
document.getElementById('datePicker').value=currentDate;
const data=load();
const c=document.getElementById('slots');
let html='',done=0,total=0;
SLOTS.forEach(h=>{
const key=h.toString();
const entry=data[key]||{task:'',done:false};
const label=h<12?h+' AM':(h===12?'12 PM':(h-12)+' PM');
if(entry.done)done++;
if(entry.task)total++;
html+=`<div class="slot${entry.done?' slot-done':''}">
<div class="slot-time">${label}</div>
<input type="text" class="slot-input" placeholder="What's planned?" value="${escapeHtml(entry.task)}" onchange="update(${h},this.value)" onkeydown="if(event.key==='Enter')this.blur()" ${entry.done?'disabled':''}>
<button class="btn btn-sm" onclick="toggle(${h})">${entry.done?'↩':'✓'}</button>
</div>`;
});
c.innerHTML=html;
document.getElementById('stats').textContent=`${done}/${total} tasks completed`;
}
functionescapeHtml(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
functionupdate(h,val){const data=load();data[h.toString()]={task:val,done:data[h.toString()]?.done||false};if(!val)delete data[h.toString()];save(data);render();}
functiontoggle(h){const data=load();const k=h.toString();if(data[k]){data[k].done=!data[k].done;save(data);render();}}
functionprevDay(){const d=new Date(currentDate);d.setDate(d.getDate()-1);currentDate=d.toISOString().slice(0,10);render();}
functionnextDay(){const d=new Date(currentDate);d.setDate(d.getDate()+1);currentDate=d.toISOString().slice(0,10);render();}
functiongoToday(){currentDate=new Date().toISOString().slice(0,10);render();}
functionclearDay(){if(confirm('Clear all tasks for this day?')){localStorage.removeItem(getKey());render();}}
render();
</script>
</body>
</html>
