<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="/assets/theme-init.js"></script>
<title>Drum Pad — Virtual Tools</title>
<link rel="stylesheet" href="/assets/style.css">
<style>
.tool-wrap{max-width:700px;margin:0 auto;}
.tool-desc{font-size:14px;color:var(--text-secondary,#aaa);margin:8px 0 20px;}
.kit-selector{display:flex;gap:8px;margin:12px 0;flex-wrap:wrap;}
.kit-selector button{padding:6px 14px;border-radius:6px;border:1px solid var(--border,#444);background:var(--card,#2a2f3e);color:var(--text,#eee);cursor:pointer;font-size:13px;}
.kit-selector button.active{background:var(--accent,#5b8def);color:#fff;border-color:var(--accent,#5b8def);}
.pads{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin:16px 0;}
.pad{aspect-ratio:1;border-radius:10px;border:2px solid var(--border,#444);background:var(--card,#2a2f3e);color:var(--text,#eee);font-size:13px;font-weight:bold;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;user-select:none;transition:all .08s;}
.pad:active,.pad.playing{transform:scale(0.94);background:var(--accent,#5b8def);color:#fff;border-color:var(--accent,#5b8def);}
.pad .key{font-size:10px;opacity:0.6;margin-top:4px;}
.pad .name{font-size:12px;}
.controls{display:flex;align-items:center;gap:12px;margin:12px 0;flex-wrap:wrap;}
.controls label{font-size:13px;color:var(--text-secondary,#aaa);}
input[type=range]{vertical-align:middle;}
.info{font-size:12px;color:var(--text-secondary,#888);margin:8px 0;}
.beat-track{margin:12px 0;}
.beat-track button{margin:4px 2px;}
</style>
</head>
<body>
<header id="site-header"></header>
<main>
<div class="tool-wrap">
<h1>🥁 Drum Pad</h1>
<p class="tool-desc">16-pad drum machine. Click pads or use your keyboard (1-4 row A, 5-8 row B, Q-R row C, U-P row D). All sounds synthesized live via Web Audio API — no audio files.</p>
<div class="kit-selector" id="kitSelector">
<button class="active" onclick="setKit(0)">Acoustic</button>
<button onclick="setKit(1)">Electronic</button>
<button onclick="setKit(2)">Hip-Hop</button>
<button onclick="setKit(3)">Retro 808</button>
</div>
<div class="controls">
<label>Volume</label><input type="range" id="vol" min="0" max="100" value="70" oninput="setVol(this.value)">
<span id="volLabel">70%</span>
</div>
<div class="pads" id="pads"></div>
<div class="info">Keys: Row A: <b>1 2 3 4</b> · Row B: <b>5 6 7 8</b> · Row C: <b>Q W E R</b> · Row D: <b>U I O P</b></div>
</div>
</main>
<script src="/assets/app.js"></script>
<script>
const KITS=[
['Kick','Snare','Hihat Closed','Hihat Open','Clap','Tom Low','Tom Mid','Tom High','Crash','Ride','Cowbell','Rimshot','Conga','Timbale','Shaker','Tambourine'],
['Kick','Snare','Hihat','Open HH','Clap','Bass Tom','Mid Tom','High Tom','Crash','Ride','Bell','Rim','Conga','Timbale','Shaker','Tambourine'],
['Kick','Snare','Hihat','Open HH','Clap','Low Tom','Mid Tom','High Tom','Crash','Ride','Cowbell','Rimshot','Conga','Timbale','Shaker','Tambourine'],
['808 Kick','808 Snare','808 HH','Open HH','Clap','Bass Tom','Mid Tom','High Tom','Crash','Ride','Cowbell','Rimshot','Conga','Timbale','Shaker','Tambourine']
];
const KEYS=['1','2','3','4','5','6','7','8','q','w','e','r','u','i','o','p'];
let ctx=null,masterGain=null,vol=0.7,currentKit=0;
function initAudio(){if(!ctx){ctx=new(window.AudioContext||window.webkitAudioContext)();masterGain=ctx.createGain();masterGain.gain.value=vol;masterGain.connect(ctx.destination);}}
function setVol(v){vol=v/100;document.getElementById('volLabel').textContent=v+'%';if(masterGain)masterGain.gain.value=vol;}
function setKit(i){currentKit=i;document.querySelectorAll('#kitSelector button').forEach((b,idx)=>b.classList.toggle('active',idx===i));renderPads();}
function renderPads(){const el=document.getElementById('pads');el.innerHTML='';KITS[currentKit].forEach((name,i)=>{const pad=document.createElement('div');pad.className='pad';pad.innerHTML=`<div class="name">${name}</div><div class="key">${KEYS[i].toUpperCase()}</div>`;pad.onclick=()=>playPad(i);el.appendChild(pad);});}
function playPad(idx){initAudio();const sounds=[playKick,playSnare,playHihatClosed,playHihatOpen,playClap,playTom,playTom,playTom,playCrash,playRide,playCowbell,playRimshot,playConga,playTimbale,playShaker,playTambourine];sounds[idx](idx);const pads=document.querySelectorAll('.pad');if(pads[idx]){pads[idx].classList.add('playing');setTimeout(()=>pads[idx].classList.remove('playing'),120);}}
function playKick(freq=150){const osc=ctx.createOscillator();const gain=ctx.createGain();osc.frequency.setValueAtTime(freq*2,ctx.currentTime);osc.frequency.exponentialRampToValueAtTime(freq*0.5,ctx.currentTime+0.15);gain.gain.setValueAtTime(1,ctx.currentTime);gain.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.2);osc.connect(gain).connect(masterGain);osc.start();osc.stop(ctx.currentTime+0.2);}
function playSnare(){const noise=ctx.createBufferSource();const buffer=ctx.createBuffer(1,4410,44100);const data=buffer.getChannelData(0);for(let i=0;i<data.length;i++)data[i]=Math.random()*2-1;noise.buffer=buffer;const filter=ctx.createBiquadFilter();filter.type='highpass';filter.frequency.value=1500;const gain=ctx.createGain();gain.gain.setValueAtTime(0.6,ctx.currentTime);gain.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.15);noise.connect(filter).connect(gain).connect(masterGain);noise.start();noise.stop(ctx.currentTime+0.15);if(currentKit===3)playKick(100);}
function playHihatClosed(){const noise=ctx.createBufferSource();const buffer=ctx.createBuffer(1,2205,44100);const data=buffer.getChannelData(0);for(let i=0;i<data.length;i++)data[i]=Math.random()*2-1;noise.buffer=buffer;const filter=ctx.createBiquadFilter();filter.type='highpass';filter.frequency.value=7000;const gain=ctx.createGain();gain.gain.setValueAtTime(0.3,ctx.currentTime);gain.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.05);noise.connect(filter).connect(gain).connect(masterGain);noise.start();noise.stop(ctx.currentTime+0.05);}
function playHihatOpen(){const noise=ctx.createBufferSource();const buffer=ctx.createBuffer(1,8820,44100);const data=buffer.getChannelData(0);for(let i=0;i<data.length;i++)data[i]=Math.random()*2-1;noise.buffer=buffer;const filter=ctx.createBiquadFilter();filter.type='highpass';filter.frequency.value=7000;const gain=ctx.createGain();gain.gain.setValueAtTime(0.25,ctx.currentTime);gain.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.3);noise.connect(filter).connect(gain).connect(masterGain);noise.start();noise.stop(ctx.currentTime+0.3);}
function playClap(){for(let i=0;i<3;i++){const noise=ctx.createBufferSource();const buffer=ctx.createBuffer(1,1102,44100);const data=buffer.getChannelData(0);for(let j=0;j<data.length;j++)data[j]=Math.random()*2-1;noise.buffer=buffer;const filter=ctx.createBiquadFilter();filter.type='bandpass';filter.frequency.value=1500;const gain=ctx.createGain();const t=ctx.currentTime+i*0.01;gain.gain.setValueAtTime(0.4,t);gain.gain.exponentialRampToValueAtTime(0.001,t+0.05);noise.connect(filter).connect(gain).connect(masterGain);noise.start(t);noise.stop(t+0.05);}}
function playTom(idx){const freqs=[100,180,250];const f=freqs[(idx-5)%3];const osc=ctx.createOscillator();osc.type='sine';const gain=ctx.createGain();osc.frequency.setValueAtTime(f*1.5,ctx.currentTime);osc.frequency.exponentialRampToValueAtTime(f,ctx.currentTime+0.3);gain.gain.setValueAtTime(0.5,ctx.currentTime);gain.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.3);osc.connect(gain).connect(masterGain);osc.start();osc.stop(ctx.currentTime+0.3);}
function playCrash(){const noise=ctx.createBufferSource();const buffer=ctx.createBuffer(1,22050,44100);const data=buffer.getChannelData(0);for(let i=0;i<data.length;i++)data[i]=Math.random()*2-1;noise.buffer=buffer;const filter=ctx.createBiquadFilter();filter.type='highpass';filter.frequency.value=5000;const gain=ctx.createGain();gain.gain.setValueAtTime(0.3,ctx.currentTime);gain.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+1);noise.connect(filter).connect(gain).connect(masterGain);noise.start();noise.stop(ctx.currentTime+1);}
function playRide(){const noise=ctx.createBufferSource();const buffer=ctx.createBuffer(1,8820,44100);const data=buffer.getChannelData(0);for(let i=0;i<data.length;i++)data[i]=Math.random()*2-1;noise.buffer=buffer;const filter=ctx.createBiquadFilter();filter.type='bandpass';filter.frequency.value=6000;const gain=ctx.createGain();gain.gain.setValueAtTime(0.25,ctx.currentTime);gain.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.4);noise.connect(filter).connect(gain).connect(masterGain);noise.start();noise.stop(ctx.currentTime+0.4);}
function playCowbell(){const osc1=ctx.createOscillator();const osc2=ctx.createOscillator();osc1.frequency.value=800;osc2.frequency.value=540;const gain=ctx.createGain();gain.gain.setValueAtTime(0.3,ctx.currentTime);gain.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.3);osc1.connect(gain);osc2.connect(gain);gain.connect(masterGain);osc1.start();osc2.start();osc1.stop(ctx.currentTime+0.3);osc2.stop(ctx.currentTime+0.3);}
function playRimshot(){const osc=ctx.createOscillator();osc.frequency.value=2500;osc.type='square';const gain=ctx.createGain();gain.gain.setValueAtTime(0.2,ctx.currentTime);gain.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.03);osc.connect(gain).connect(masterGain);osc.start();osc.stop(ctx.currentTime+0.03);}
function playConga(){const osc=ctx.createOscillator();osc.type='sine';osc.frequency.setValueAtTime(200,ctx.currentTime);osc.frequency.exponentialRampToValueAtTime(100,ctx.currentTime+0.15);const gain=ctx.createGain();gain.gain.setValueAtTime(0.4,ctx.currentTime);gain.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.15);osc.connect(gain).connect(masterGain);osc.start();osc.stop(ctx.currentTime+0.15);}
function playTimbale(){const osc=ctx.createOscillator();osc.type='triangle';osc.frequency.setValueAtTime(400,ctx.currentTime);osc.frequency.exponentialRampToValueAtTime(200,ctx.currentTime+0.1);const gain=ctx.createGain();gain.gain.setValueAtTime(0.3,ctx.currentTime);gain.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.1);osc.connect(gain).connect(masterGain);osc.start();osc.stop(ctx.currentTime+0.1);}
function playShaker(){const noise=ctx.createBufferSource();const buffer=ctx.createBuffer(1,2205,44100);const data=buffer.getChannelData(0);for(let i=0;i<data.length;i++)data[i]=Math.random()*2-1;noise.buffer=buffer;const filter=ctx.createBiquadFilter();filter.type='highpass';filter.frequency.value=4000;const gain=ctx.createGain();gain.gain.setValueAtTime(0.15,ctx.currentTime);gain.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.08);noise.connect(filter).connect(gain).connect(masterGain);noise.start();noise.stop(ctx.currentTime+0.08);}
function playTambourine(){for(let i=0;i<4;i++){const osc=ctx.createOscillator();osc.frequency.value=6000+i*200;osc.type='square';const gain=ctx.createGain();const t=ctx.currentTime+i*0.005;gain.gain.setValueAtTime(0.1,t);gain.gain.exponentialRampToValueAtTime(0.001,t+0.05);osc.connect(gain).connect(masterGain);osc.start(t);osc.stop(t+0.05);}}
document.addEventListener('keydown',e=>{const key=e.key.toLowerCase();const idx=KEYS.indexOf(key);if(idx>=0){e.preventDefault();playPad(idx);}});
renderPads();
</script>
</body>
</html>
