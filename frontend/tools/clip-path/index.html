<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="/assets/theme-init.js"></script>
<title>CSS Clip-Path Generator — Virtual Tools</title>
<link rel="stylesheet" href="/assets/style.css">
<style>
.tool-wrap{max-width:720px;margin:0 auto;}
.tool-desc{font-size:14px;color:var(--text-secondary,#aaa);margin:8px 0 20px;}
.shape-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(100px,1fr));gap:8px;margin:12px 0;}
.shape-btn{padding:10px 8px;border-radius:8px;border:1px solid var(--border,#444);background:var(--card,#2a2f3e);color:var(--text,#eee);cursor:pointer;font-size:12px;text-align:center;transition:all .15s;}
.shape-btn:hover,.shape-btn.active{border-color:var(--accent,#5b8def);background:var(--card-hover,#333a4e);}
.preview{background:var(--bg,#1e2230);border:1px solid var(--border,#444);border-radius:12px;padding:30px;margin:12px 0;min-height:280px;display:flex;align-items:center;justify-content:center;overflow:hidden;}
.clip-box{width:220px;height:180px;background:linear-gradient(135deg,#5b8def,#9c5bef);transition:clip-path .3s;}
.controls{display:grid;gap:8px;margin:12px 0;}
.row{display:flex;gap:8px;align-items:center;flex-wrap:wrap;}
.row label{font-size:13px;color:var(--text-secondary,#888);min-width:100px;}
.row input[type="range"]{flex:1;min-width:120px;}
.row input[type="color"]{width:40px;height:32px;border:none;border-radius:6px;cursor:pointer;background:none;}
.css-output{background:var(--bg,#1e2230);border:1px solid var(--border,#444);border-radius:8px;padding:12px;margin:12px 0;font-family:monospace;font-size:12px;color:var(--text,#eee);white-space:pre-wrap;word-break:break-all;}
button.action{padding:8px 16px;border-radius:6px;border:1px solid var(--border,#444);background:var(--card,#2a2f3e);color:var(--text,#eee);cursor:pointer;font-size:13px;}
button.action:hover{border-color:var(--accent,#5b8def);}
</style>
</head>
<body>
<header id="site-header"></header>
<main>
<div class="tool-wrap">
<h1>✂️ CSS Clip-Path Generator</h1>
<p class="tool-desc">Create CSS clip-path shapes: triangle, pentagon, hexagon, star, arrow, diamond, message bubble, and more. Copy CSS.</p>
<div class="shape-grid" id="shapeGrid"></div>
<div class="preview"><div class="clip-box" id="clipBox"></div></div>
<div class="css-output" id="cssOutput"></div>
<div class="controls"><button class="action" onclick="copyCSS()">Copy CSS</button></div>
</div>
</main>
<script src="/assets/app.js"></script>
<script>
const shapes=[
{name:'Triangle',clip:'polygon(50% 0%, 0% 100%, 100% 100%)'},
{name:'Pentagon',clip:'polygon(50% 0%, 100% 38%, 82% 100%, 18% 100%, 0% 38%)'},
{name:'Hexagon',clip:'polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%)'},
{name:'Heptagon',clip:'polygon(50% 0%, 90% 20%, 100% 62%, 72% 100%, 28% 100%, 0% 62%, 10% 20%)'},
{name:'Octagon',clip:'polygon(30% 0%, 70% 0%, 100% 30%, 100% 70%, 70% 100%, 30% 100%, 0% 70%, 0% 30%)'},
{name:'Star',clip:'polygon(50% 0%, 61% 35%, 98% 35%, 68% 57%, 79% 91%, 50% 70%, 21% 91%, 32% 57%, 2% 35%, 39% 35%)'},
{name:'Diamond',clip:'polygon(50% 0%, 100% 50%, 50% 100%, 0% 50%)'},
{name:'Arrow',clip:'polygon(0% 20%, 60% 20%, 60% 0%, 100% 50%, 60% 100%, 60% 80%, 0% 80%)'},
{name:'Chevron',clip:'polygon(75% 0%, 100% 50%, 75% 100%, 0% 100%, 25% 50%, 0% 0%)'},
{name:'Trapezoid',clip:'polygon(20% 0%, 80% 0%, 100% 100%, 0% 100%)'},
{name:'Parallelogram',clip:'polygon(25% 0%, 100% 0%, 75% 100%, 0% 100%)'},
{name:'Message',clip:'polygon(0% 0%, 100% 0%, 100% 75%, 75% 75%, 75% 100%, 50% 75%, 0% 75%)'},
{name:'Heart',clip:'polygon(50% 15%, 35% 0%, 10% 10%, 0% 35%, 25% 65%, 50% 90%, 75% 65%, 100% 35%, 90% 10%, 65% 0%)'},
{name:'Cross',clip:'polygon(35% 0%, 65% 0%, 65% 35%, 100% 35%, 100% 65%, 65% 65%, 65% 100%, 35% 100%, 35% 65%, 0% 65%, 0% 35%, 35% 35%)'},
{name:'Ribbon',clip:'polygon(0% 0%, 100% 0%, 100% 100%, 50% 80%, 0% 100%)'},
{name:'Bevel',clip:'polygon(20% 0%, 80% 0%, 100% 20%, 100% 80%, 80% 100%, 20% 100%, 0% 80%, 0% 20%)'},
];
let activeShape=0;
const grid=document.getElementById('shapeGrid');
shapes.forEach((s,i)=>{const btn=document.createElement('button');btn.className='shape-btn'+(i===0?' active':'');btn.textContent=s.name;btn.onclick=()=>{activeShape=i;document.querySelectorAll('.shape-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');update();};grid.appendChild(btn);});
function update(){const s=shapes[activeShape];document.getElementById('clipBox').style.clipPath=s.clip;document.getElementById('cssOutput').textContent='clip-path: '+s.clip+';\n-webkit-clip-path: '+s.clip+';';}
function copyCSS(){const css=document.getElementById('cssOutput').textContent;navigator.clipboard.writeText(css).then(()=>alert('CSS copied!')).catch(()=>alert('Copy failed'));}
update();
</script>
</body>
</html>
