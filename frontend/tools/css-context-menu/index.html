<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CSS Context Menu Generator — virt.tools</title>
<link rel="stylesheet" href="/assets/style.css">
<style>
.tool-area{max-width:900px;margin:2rem auto;padding:0 1rem}
.controls{display:grid;gap:1rem;margin:1.5rem 0;padding:1.5rem;background:#1a1a2e;border-radius:12px}
.control-row{display:flex;gap:1rem;align-items:center;flex-wrap:wrap}
.control-row label{min-width:130px;font-weight:600;font-size:.9rem}
.control-row select,.control-row input{padding:.5rem .75rem;border-radius:8px;border:1px solid #444;background:#0f0f1e;color:#eee;font-size:.9rem}
.preview-box{margin:1.5rem 0;border-radius:12px;background:#2a2a3e;padding:2rem 1.5rem;min-height:300px;display:flex;align-items:center;justify-content:center;position:relative}
.output-block{margin:2rem 0}
.output-block textarea{width:100%;min-height:120px;font-family:monospace;font-size:.85rem;padding:1rem;border-radius:8px;border:1px solid #444;background:#0f0f1e;color:#eee;resize:vertical}
.copy-btn{padding:.6rem 1.2rem;border:none;border-radius:8px;background:#667eea;color:#fff;cursor:pointer;font-size:.9rem;margin-top:.5rem}
h2{margin-top:2rem;font-size:1.2rem}
</style>
</head>
<body>
<header id="site-header"></header>
<main>
<div class="tool-area">
<h1>🖱️ CSS Context Menu Generator</h1>
<p>Create CSS right-click context menu components. 3 themes, dividers, submenus, shortcut keys. Copy HTML+CSS.</p>
<div class="controls">
<div class="control-row">
<label>Theme</label><select id="theme"><option value="dark" selected>Dark</option><option value="light">Light</option><option value="glass">Glass</option></select>
<label>Width</label><select id="width"><option value="180">180px</option><option value="220" selected>220px</option><option value="260">260px</option></select>
</div>
<div class="control-row">
<label>Accent</label><input type="color" id="accent" value="#667eea">
<label>Radius</label><select id="radius"><option value="0">0</option><option value="8" selected>8px</option><option value="16">16px</option></select>
</div>
</div>
<h2>Preview</h2>
<div class="preview-box" id="preview"></div>
<h2>HTML</h2><div class="output-block"><textarea id="htmlOut" readonly></textarea><button class="copy-btn" onclick="copyText('htmlOut')">Copy HTML</button></div>
<h2>CSS</h2><div class="output-block"><textarea id="cssOut" readonly></textarea><button class="copy-btn" onclick="copyText('cssOut')">Copy CSS</button></div>
</div>
</main>
</main>
<script src="/assets/app.js"></script>
<script>
function update(){
var theme=document.getElementById('theme').value;
var w=document.getElementById('width').value;
var ac=document.getElementById('accent').value;
var r=document.getElementById('radius').value;
var isLight=theme==='light';
var isGlass=theme==='glass';
var bg=isGlass?'rgba(26,26,46,.85)':isLight?'#fff':'#1a1a2e';
var textC=isLight?'#333':'#e0e0e0';
var divC=isLight?'#eee':'#333';
var hoverBg=isLight?'#f5f5f5':'#2a2a3e';
var borderC=isLight?'#ddd':isGlass?'rgba(255,255,255,.1)':'#333';
var html='<div class="ctx-menu">\n  <div class="ctx-item">\n    <span class="ctx-icon">↩️</span>\n    <span class="ctx-label">Undo</span>\n    <kbd class="ctx-key">⌘Z</kbd>\n  </div>\n  <div class="ctx-divider"></div>\n  <div class="ctx-item">\n    <span class="ctx-icon">✂️</span>\n    <span class="ctx-label">Cut</span>\n    <kbd class="ctx-key">⌘X</kbd>\n  </div>\n  <div class="ctx-item">\n    <span class="ctx-icon">📋</span>\n    <span class="ctx-label">Copy</span>\n    <kbd class="ctx-key">⌘C</kbd>\n  </div>\n  <div class="ctx-item">\n    <span class="ctx-icon">📄</span>\n    <span class="ctx-label">Paste</span>\n    <kbd class="ctx-key">⌘V</kbd>\n  </div>\n  <div class="ctx-divider"></div>\n  <div class="ctx-item danger">\n    <span class="ctx-icon">🗑️</span>\n    <span class="ctx-label">Delete</span>\n    <kbd class="ctx-key">Del</kbd>\n  </div>\n  <div class="ctx-divider"></div>\n  <div class="ctx-item has-sub">\n    <span class="ctx-icon">📤</span>\n    <span class="ctx-label">Share</span>\n    <span class="ctx-arrow">▶</span>\n  </div>\n</div>';
var css='.ctx-menu{width:'+w+'px;background:'+bg+';border-radius:'+r+'px;box-shadow:0 8px 30px rgba(0,0,0,.4);border:1px solid '+borderC+';padding:.4rem;font-family:system-ui,sans-serif;color:'+textC+';font-size:.875rem;backdrop-filter:'+(isGlass?'blur(12px)':'none')+'}\n.ctx-item{display:flex;align-items:center;gap:.5rem;padding:.5rem .75rem;border-radius:'+(r>0?'6px':'0')+';cursor:pointer;transition:background .1s}\n.ctx-item:hover,.ctx-item.active{background:'+hoverBg+'}\n.ctx-item.danger{color:#ef4444}\n.ctx-item.danger:hover{background:rgba(239,68,68,.1)}\n.ctx-icon{width:1.25rem;text-align:center;font-size:.9rem}\n.ctx-label{flex:1}\n.ctx-key{font-size:.65rem;padding:.1rem .35rem;background:'+(isLight?'#f0f0f0':'#2a2a3e')+';border-radius:3px;border:1px solid '+(isLight?'#ddd':'#444')+';color:'+(isLight?'#888':'#888')+'}\n.ctx-divider{height:1px;background:'+divC+';margin:.35rem .5rem}\n.ctx-arrow{font-size:.6rem;color:'+(isLight?'#aaa':'#666')+';margin-left:.25rem}\n.ctx-item.has-sub{position:relative}';
document.getElementById('htmlOut').value=html;
document.getElementById('cssOut').value=css;
var p=document.getElementById('preview');
p.innerHTML='<style>'+css+'</style>'+html;
}
function copyText(id){var t=document.getElementById(id);t.select();document.execCommand('copy')}
document.querySelectorAll('select,input').forEach(function(e){e.addEventListener('input',update);e.addEventListener('change',update)});
update();
</script>
</body>
</html>
