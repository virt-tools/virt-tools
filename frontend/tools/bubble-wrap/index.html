<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="/assets/theme-init.js"></script>
<title>Bubble Wrap Pop — Virtual Tools</title>
<link rel="stylesheet" href="/assets/style.css">
<style>
.tool-wrap{max-width:600px;margin:0 auto;text-align:center;}
.tool-desc{font-size:14px;color:var(--text-secondary,#aaa);margin:8px 0;}
.stats{font-size:18px;margin:8px 0;}
.stats span{color:var(--accent,#5b8def);font-weight:700;}
#bubble-grid{display:grid;grid-template-columns:repeat(12,1fr);gap:6px;margin:20px auto;max-width:540px;}
.bubble{aspect-ratio:1;border-radius:50%;background:radial-gradient(circle at 30% 30%,#7eb8e0 0%,#5b8def 50%,#3a6db5 100%);cursor:pointer;transition:transform 0.1s,box-shadow 0.1s;box-shadow:inset -2px -3px 6px rgba(0,0,0,0.3),inset 2px 3px 6px rgba(255,255,255,0.3);user-select:none;}
.bubble.popped{background:radial-gradient(circle at 30% 30%,#2a2a2a 0%,#1a1a1a 50%,#111 100%);box-shadow:inset 1px 1px 3px rgba(0,0,0,0.5);transform:scale(0.85);cursor:default;}
.bubble:active:not(.popped){transform:scale(0.92);}
#msg{font-size:16px;font-weight:600;margin:8px 0;min-height:24px;color:#f1c40f;}
.controls{margin:12px 0;display:flex;gap:8px;justify-content:center;flex-wrap:wrap;}
.controls button{padding:10px 24px;border-radius:6px;border:1px solid var(--border,#444);background:var(--bg-alt,#1a1f2e);color:var(--text,#eee);cursor:pointer;font-size:14px;}
.controls button:hover{background:var(--accent,#5b8def);color:#fff;}
</style>
</head>
<body>
<header id="site-header"></header>
<main>
<div class="tool-wrap">
<h1>Bubble Wrap Pop 🫧</h1>
<p class="tool-desc">Satisfying virtual bubble wrap! Click or drag across bubbles to pop them. Pop them all, then refresh for a new sheet.</p>
<div class="stats">Popped: <span id="count">0</span> / <span id="total">0</span> | Sheets: <span id="sheets">1</span></div>
<div id="bubble-grid"></div>
<div id="msg">Start popping! 🫧</div>
<div class="controls">
<button onclick="newSheet()">🔄 New Sheet</button>
<button onclick="popAll()">💥 Pop All</button>
</div>
</div>
</main>
<script src="/assets/app.js"></script>
<script>
const ROWS=8,COLS=12;let popped=0,sheets=1;
const grid=document.getElementById('bubble-grid');
function newSheet(){
grid.innerHTML='';popped=0;
const total=ROWS*COLS;
for(let i=0;i<total;i++){
const b=document.createElement('div');
b.className='bubble';
b.addEventListener('mousedown',popBubble);
b.addEventListener('touchstart',popBubble);
b.addEventListener('mouseenter',function(e){if(e.buttons===1)popBubble.call(this,e);});
grid.appendChild(b);
}
document.getElementById('total').textContent=total;
document.getElementById('count').textContent=0;
document.getElementById('sheets').textContent=sheets;
document.getElementById('msg').textContent='Start popping! 🫧';
}
function popBubble(e){
if(e)e.preventDefault();
if(this.classList.contains('popped'))return;
this.classList.add('popped');popped++;
document.getElementById('count').textContent=popped;
const total=ROWS*COLS;
if(popped===total){
document.getElementById('msg').textContent='🎉 All popped! Sheet complete!';
}else if(popped>total*0.9){
document.getElementById('msg').textContent='Almost there! Keep going!';
}else if(popped>total*0.5){
document.getElementById('msg').textContent='Halfway done!';
}
}
function popAll(){
document.querySelectorAll('.bubble').forEach(b=>{
if(!b.classList.contains('popped')){
setTimeout(()=>{b.classList.add('popped');popped++;document.getElementById('count').textContent=popped;},Math.random()*800);
}
});
setTimeout(()=>{document.getElementById('msg').textContent='🎉 All popped!';},900);
}
sheets=1;newSheet();
document.querySelector('button[onclick="newSheet()"]').addEventListener('click',function(){sheets++;});
</script>
</body>
</html>
