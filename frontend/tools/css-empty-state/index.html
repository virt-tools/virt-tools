<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CSS Empty State Generator — virt.tools</title>
<link rel="stylesheet" href="/assets/style.css">
<style>
.tool-area{max-width:960px;margin:2rem auto;padding:0 1rem}
.controls{display:grid;gap:1rem;margin:1.5rem 0;padding:1.5rem;background:var(--card-bg,#1a1a2e);border-radius:12px}
.control-row{display:flex;gap:1rem;align-items:center;flex-wrap:wrap}
.control-row label{min-width:120px;font-weight:600;font-size:.9rem}
.control-row select,.control-row input[type="text"],.control-row input[type="color"]{padding:.5rem .75rem;border-radius:8px;border:1px solid #444;background:var(--bg,#0f0f1e);color:var(--text,#eee);font-size:.9rem}
.preview-area{margin:2rem 0;padding:2rem;background:#1a1a2e;border-radius:12px;min-height:300px}
.css-output{margin:2rem 0}
.css-output textarea{width:100%;min-height:200px;font-family:monospace;font-size:.85rem;padding:1rem;border-radius:8px;border:1px solid #444;background:#0f0f1e;color:#eee;resize:vertical}
.copy-btn{padding:.6rem 1.2rem;border:none;border-radius:8px;background:#4a9eff;color:#fff;cursor:pointer;font-size:.9rem;margin-top:.5rem}
h2{margin-top:2rem;font-size:1.2rem}
.empty-state{text-align:center;padding:3rem 2rem}
.empty-icon{font-size:4rem;margin-bottom:1rem;opacity:.5}
.empty-title{font-size:1.2rem;font-weight:bold;margin-bottom:.5rem;color:#eee}
.empty-desc{font-size:.9rem;opacity:.6;margin-bottom:1.5rem;color:#aaa;max-width:400px;margin-left:auto;margin-right:auto}
.empty-btn{display:inline-block;padding:.6rem 1.5rem;border-radius:8px;background:#4a9eff;color:#fff;text-decoration:none;font-size:.9rem;cursor:pointer;border:none}
</style>
</head>
<body>
<header id="site-header"></header>
<main>
<div class="tool-area">
<h1>📭 CSS Empty State Generator</h1>
<p>Create "no data" / empty state placeholder components for UIs. 5 icon presets, custom title/description, optional CTA button.</p>

<div class="controls">
<div class="control-row">
<label>Icon</label>
<select id="icon"><option value="📭">Empty Box</option><option value="🔍">No Results</option><option value="🔕">No Notifications</option><option value="📥">Inbox Zero</option><option value="🎯">No Goals</option><option value="📊">No Data</option><option value="💬">No Messages</option><option value="⭐">No Favorites</option></select>
<label>Style</label><select id="style"><option value="card">Card</option><option value="flat">Flat</option><option value="bordered">Bordered</option><option value="dashed">Dashed</option></select>
</div>
<div class="control-row">
<label>Title</label><input type="text" id="title" value="No items found" style="flex:1;min-width:150px">
</div>
<div class="control-row">
<label>Description</label><input type="text" id="desc" value="There are no items to display yet. Try adding one to get started." style="flex:1;min-width:200px">
</div>
<div class="control-row">
<label>Button Text</label><input type="text" id="btnText" value="Add Item" style="flex:1;min-width:150px">
<label>Show Button</label><select id="showBtn"><option value="yes">Yes</option><option value="no">No</option></select>
</div>
<div class="control-row">
<label>Box BG</label><input type="color" id="boxBg" value="#2a2a3e">
<label>Accent</label><input type="color" id="accent" value="#4a9eff">
</div>
<div class="control-row">
<label>Radius</label><input type="range" id="radius" min="0" max="24" value="12"><span id="radiusVal">12px</span>
</div>
</div>

<div class="preview-area" id="preview"></div>

<h2>HTML</h2><div class="css-output"><textarea id="htmlOut" readonly></textarea><button class="copy-btn" onclick="copyText('htmlOut')">Copy HTML</button></div>
<h2>CSS</h2><div class="css-output"><textarea id="cssOut" readonly></textarea><button class="copy-btn" onclick="copyText('cssOut')">Copy CSS</button></div>
</div>
</main>
<script src="/assets/app.js"></script>
<script>
function update(){
var icon=document.getElementById('icon').value;
var style=document.getElementById('style').value;
var title=document.getElementById('title').value;
var desc=document.getElementById('desc').value;
var btnText=document.getElementById('btnText').value;
var showBtn=document.getElementById('showBtn').value==='yes';
var bbg=document.getElementById('boxBg').value;
var accent=document.getElementById('accent').value;
var r=parseInt(document.getElementById('radius').value);
document.getElementById('radiusVal').textContent=r+'px';

var border=style==='bordered'?'border:1px solid #444;':style==='dashed'?'border:2px dashed #555;':style==='flat'?'border:none;':'box-shadow:0 2px 8px rgba(0,0,0,.2);';

var html='<div class="empty-state">\n  <div class="empty-icon">'+icon+'</div>\n  <div class="empty-title">'+title+'</div>\n  <div class="empty-desc">'+desc+'</div>';
if(showBtn) html+='\n  <button class="empty-btn">'+btnText+'</button>';
html+='\n</div>';

var css='.empty-state{\n  text-align:center;\n  padding:3rem 2rem;\n  background:'+bbg+';\n  border-radius:'+r+'px;\n  '+border+'\n}\n.empty-icon{\n  font-size:4rem;\n  margin-bottom:1rem;\n  opacity:.5;\n}\n.empty-title{\n  font-size:1.2rem;\n  font-weight:bold;\n  margin-bottom:.5rem;\n  color:#eee;\n}\n.empty-desc{\n  font-size:.9rem;\n  opacity:.6;\n  margin-bottom:1.5rem;\n  color:#aaa;\n  max-width:400px;\n  margin-left:auto;\n  margin-right:auto;\n}\n.empty-btn{\n  display:inline-block;\n  padding:.6rem 1.5rem;\n  border-radius:8px;\n  background:'+accent+';\n  color:#fff;\n  text-decoration:none;\n  font-size:.9rem;\n  cursor:pointer;\n  border:none;\n}';

document.getElementById('preview').innerHTML='<style>'+css.replace(/\.empty-state/g,'.preview-area .empty-state')+'</style>'+html;
document.getElementById('htmlOut').value=html;
document.getElementById('cssOut').value=css;
}
function copyText(id){var t=document.getElementById(id);t.select();document.execCommand('copy');}
document.querySelectorAll('select,input').forEach(function(e){e.addEventListener('input',update)});
update();
</script>
</body>
</html>
