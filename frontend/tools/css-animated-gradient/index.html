<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CSS Animated Gradient Generator — virt.tools</title>
<link rel="stylesheet" href="/assets/style.css">
<style>
.tool-area{max-width:900px;margin:2rem auto;padding:0 1rem}
.controls{display:grid;gap:1rem;margin:1.5rem 0;padding:1.5rem;background:#1a1a2e;border-radius:12px}
.ctrl-row{display:flex;gap:1rem;align-items:center;flex-wrap:wrap;margin-bottom:.5rem}
.ctrl-row label{font-weight:600;font-size:.9rem;min-width:120px}
.ctrl-row select,.ctrl-row input{padding:.5rem;border-radius:8px;border:1px solid #444;background:#0f0f1e;color:#eee}
.preview-box{margin:1.5rem 0;border-radius:12px;min-height:250px;overflow:hidden}
.output-block{margin:2rem 0}
.output-block textarea{width:100%;min-height:80px;font-family:monospace;font-size:.85rem;padding:1rem;border-radius:8px;border:1px solid #444;background:#0f0f1e;color:#eee;resize:vertical}
.copy-btn{padding:.6rem 1.2rem;border:none;border-radius:8px;background:#667eea;color:#fff;cursor:pointer;font-size:.9rem;margin-top:.5rem}
h2{margin-top:2rem;font-size:1.2rem}
.color-row{display:flex;gap:.5rem;align-items:center}
.color-row input{width:50px;height:35px;padding:0;border:none;border-radius:4px}
</style>
</head>
<body>
<header id="site-header"></header>
<main>
<div class="tool-area">
<h1>🎨 CSS Animated Gradient Generator</h1>
<p>Create CSS animated moving gradient backgrounds. 5 presets, 2-5 colors, adjustable angle/speed. Copy HTML+CSS.</p>
<div class="controls">
<div class="ctrl-row"><label>Preset</label><select id="preset"><option value="sunset" selected>Sunset</option><option value="ocean">Ocean</option><option value="forest">Forest</option><option value="candy">Candy</option><option value="neon">Neon</option><option value="custom">Custom</option></select></div>
<div class="ctrl-row"><label>Direction</label><select id="angle"><option value="0">0° (↑)</option><option value="45" selected>45°</option><option value="90">90° (→)</option><option value="135">135°</option><option value="180">180° (↓)</option><option value="270">270° (←)</option></select></div>
<div class="ctrl-row"><label>Speed</label><select id="speed"><option value="3">3s</option><option value="5" selected>5s</option><option value="8">8s</option><option value="15">15s</option><option value="30">30s</option></select></div>
<div class="ctrl-row"><label>Gradient Type</label><select id="type"><option value="linear" selected>Linear</option><option value="radial">Radial</option><option value="conic">Conic</option></select></div>
<div class="ctrl-row"><label>Colors</label><div class="color-row" id="colorRow"><input type="color" value="#ff6b6b"><input type="color" value="#feca57"><input type="color" value="#48dbfb"><button class="copy-btn" onclick="addColor()">+</button></div></div>
<div class="ctrl-row"><button class="copy-btn" onclick="update()">Update</button></div>
</div>
<h2>Preview</h2>
<div class="preview-box" id="preview"></div>
<h2>CSS</h2><div class="output-block"><textarea id="cssOut" readonly></textarea><button class="copy-btn" onclick="copyText('cssOut')">Copy CSS</button></div>
</div>
</main>
<script src="/assets/app.js"></script>
<script>
var presets={sunset:['#ff6b6b','#feca57','#ff9ff3'],ocean:['#48dbfb','#0abde3','#006ba6'],forest:['#26de81','#20bf6b','#0fb9b1'],candy:['#fc5c7d','#6a82fb','#fc5c7d'],neon:['#00f5ff','#ff00e6','#ffff00','#00ff88']};
function applyPreset(p){var c=presets[p];if(!c)return;var r=document.getElementById('colorRow');r.innerHTML='';c.forEach(function(col){var i=document.createElement('input');i.type='color';i.value=col;r.appendChild(i)});var btn=document.createElement('button');btn.className='copy-btn';btn.textContent='+';btn.onclick=addColor;r.appendChild(btn)}
function addColor(){var r=document.getElementById('colorRow');var btn=r.lastChild;var i=document.createElement('input');i.type='color';i.value='#'+Math.floor(Math.random()*16777215).toString(16).padStart(6,'0');r.insertBefore(i,btn)}
function update(){
var p=document.getElementById('preset').value;
if(p!=='custom')applyPreset(p);
var angle=document.getElementById('angle').value;
var speed=document.getElementById('speed').value;
var type=document.getElementById('type').value;
var colors=[];document.querySelectorAll('#colorRow input[type=color]').forEach(function(i){colors.push(i.value)});
if(colors.length<2)colors=['#ff6b6b','#48dbfb'];
var stops=colors.map(function(c,i){return c+' '+Math.round(i/(colors.length-1)*100)+'%'}).join(', ');
var bgStr;
if(type==='linear')bgStr='linear-gradient('+angle+'deg,'+stops+')';
else if(type==='radial')bgStr='radial-gradient(circle,'+stops+')';
else bgStr='conic-gradient(from '+angle+'deg,'+stops+')';
var bgSize=type==='conic'?'100% 100%':'400% 400%';
var css='.animated-gradient{background:'+bgStr+';background-size:'+bgSize+';animation:gradientShift '+speed+'s ease infinite}\n@keyframes gradientShift{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}';
document.getElementById('cssOut').value=css;
document.getElementById('preview').innerHTML='<style>'+css+'\n#preview{'+css.replace('.animated-gradient{','').replace('}','').replace('}','')+'}</style><div style="'+(type==='linear'?'background:'+bgStr+';background-size:400% 400%;animation:gradientShift '+speed+'s ease infinite':type==='radial'?'background:'+bgStr+';background-size:400% 400%;animation:gradientShift '+speed+'s ease infinite':'background:'+bgStr+';animation:spin '+speed+'s linear infinite')+';width:100%;height:250px;border-radius:12px"></div>';
}
function copyText(id){var t=document.getElementById(id);t.select();document.execCommand('copy')}
['preset','angle','speed','type'].forEach(function(id){document.getElementById(id).addEventListener('change',update)});
update();
</script>
</body>
</html>
