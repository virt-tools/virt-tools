<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="/assets/theme-init.js"></script>
<title>CSS Footer Generator — Virtual Tools</title>
<link rel="stylesheet" href="/assets/style.css">
<style>
.tool-wrap{max-width:800px;margin:0 auto;}
.tool-desc{font-size:14px;color:var(--text-secondary,#aaa);margin:8px 0 20px;}
.controls{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin:12px 0;}
.ctrl{display:flex;flex-direction:column;gap:4px;}
.ctrl label{font-size:12px;color:var(--text-secondary,#888);}
.ctrl input,.ctrl select{padding:6px 8px;border-radius:6px;border:1px solid var(--border,#444);background:var(--bg,#1e2230);color:var(--text,#eee);font-size:13px;}
button.action{padding:8px 16px;border-radius:6px;border:1px solid var(--border,#444);background:var(--card,#2a2f3e);color:var(--text,#eee);cursor:pointer;font-size:13px;margin:4px 4px 0 0;}
.preview{background:var(--bg,#1e2230);border:1px solid var(--border,#444);border-radius:8px;padding:0;margin:12px 0;overflow:hidden;}
.code-block{background:var(--bg,#1e2230);border:1px solid var(--border,#444);border-radius:8px;padding:12px;margin:8px 0;font-family:monospace;font-size:11px;color:var(--text,#eee);white-space:pre-wrap;word-break:break-all;max-height:400px;overflow:auto;}
</style>
</head>
<body>
<header id="site-header"></header>
<main>
<div class="tool-wrap">
<h1>🦶 CSS Footer Generator</h1>
<p class="tool-desc">Create CSS footer components with 1-4 columns, links, social icons, copyright. 3 styles, custom colors. Copy HTML+CSS.</p>
<div class="controls">
<div class="ctrl"><label>Columns</label><select id="cols" onchange="render()"><option value="1">1</option><option value="2">2</option><option value="3" selected>3</option><option value="4">4</option></select></div>
<div class="ctrl"><label>Style</label><select id="st" onchange="render()"><option value="0" selected>Modern Dark</option><option value="1">Light</option><option value="2">Gradient</option></select></div>
<div class="ctrl"><label>Bg Color</label><input type="color" id="bg" value="#1a1a2e" oninput="render()"></div>
<div class="ctrl"><label>Text Color</label><input type="color" id="tc" value="#aaa" oninput="render()"></div>
<div class="ctrl"><label>Link Color</label><input type="color" id="lc" value="#4facfe" oninput="render()"></div>
<div class="ctrl"><label>Radius</label><input type="number" id="rd" value="0" min="0" max="24" oninput="render()"></div>
</div>
<div style="margin:8px 0;"><button class="action" onclick="copyCode()">Copy HTML+CSS</button></div>
<div class="preview" id="prev"></div>
<div class="code-block" id="code"></div>
</div>
</main>
<script src="/assets/app.js"></script>
<script>
const COL_TITLES=['Product','Company','Resources','Support'];
const COL_LINKS=[['Features','Pricing','Changelog','Roadmap'],['About','Blog','Careers','Press'],['Docs','API','Community','Tutorials'],['Help','Status','Contact','Privacy']];
let codeText='';
function render(){
const cols=+v('cols'),st=+v('st'),bgC=v('bg'),tc=v('tc'),lc=v('lc'),rd=+v('rd');
let footerBg=bgC,grad='';
if(st===1){footerBg='#f8f9fa';}
if(st===2){grad='background:linear-gradient(135deg,#1a1a2e,#16213e);';footerBg='transparent';}
let colHtml='';
for(let i=0;i<cols;i++){
let links='';
for(let j=0;j<4;j++){links+=`<li><a href="#" style="color:${lc};text-decoration:none;font-size:13px">${COL_LINKS[i][j]}</a></li>`;}
colHtml+=`<div><h4 style="color:${tc};font-size:14px;margin:0 0 8px">${COL_TITLES[i]}</h4><ul style="list-style:none;padding:0;margin:0;gap:6px;display:flex;flex-direction:column">${links}</ul></div>`;
}
const html=`<footer style="${grad}background:${footerBg};border-radius:${rd}px;padding:32px 24px">
<div style="display:grid;grid-template-columns:repeat(${cols},1fr);gap:24px;max-width:960px;margin:0 auto">
${colHtml}
</div>
<div style="border-top:1px solid rgba(255,255,255,0.1);margin-top:24px;padding-top:16px;text-align:center">
<p style="color:${tc};font-size:12px;margin:0">© 2026 Your Company. All rights reserved.</p>
</div>
</footer>`;
document.getElementById('prev').innerHTML=html;
codeText=html;
document.getElementById('code').textContent=html;
}
function v(id){return document.getElementById(id).value;}
function copyCode(){navigator.clipboard.writeText(codeText).then(()=>alert('HTML copied!')).catch(()=>alert('Copy failed'));}
render();
</script>
</body>
</html>
