<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CSS Radial Progress Generator — virt.tools</title>
<link rel="stylesheet" href="/assets/style.css">
<style>
.tool-area{max-width:900px;margin:2rem auto;padding:0 1rem}
.controls{display:grid;gap:1rem;margin:1.5rem 0;padding:1.5rem;background:#1a1a2e;border-radius:12px}
.ctrl-row{display:flex;gap:1rem;align-items:center;flex-wrap:wrap;margin-bottom:.5rem}
.ctrl-row label{font-weight:600;font-size:.9rem;min-width:120px}
.ctrl-row select,.ctrl-row input{padding:.5rem;border-radius:8px;border:1px solid #444;background:#0f0f1e;color:#eee}
.preview-box{margin:1.5rem 0;border-radius:12px;min-height:250px;padding:2rem;background:#f5f5f5;display:flex;align-items:center;justify-content:center;flex-wrap:wrap;gap:2rem}
.output-block{margin:2rem 0}
.output-block textarea{width:100%;min-height:100px;font-family:monospace;font-size:.85rem;padding:1rem;border-radius:8px;border:1px solid #444;background:#0f0f1e;color:#eee;resize:vertical}
.copy-btn{padding:.6rem 1.2rem;border:none;border-radius:8px;background:#667eea;color:#fff;cursor:pointer;font-size:.9rem;margin-top:.5rem}
h2{margin-top:2rem;font-size:1.2rem}
</style>
</head>
<body>
<header id="site-header"></header>
<main>
<div class="tool-area">
<h1>🎯 CSS Radial Progress Generator</h1>
<p>Create CSS radial/circular progress ring components. Conic-gradient based, 3 sizes, custom colors, gradient support. Copy HTML+CSS.</p>
<div class="controls">
<div class="ctrl-row">
<label>Size</label><select id="size"><option value="120" selected>Small (120px)</option><option value="160">Medium (160px)</option><option value="200">Large (200px)</option></select>
<label>Thickness</label><select id="thick"><option value="8">Thin</option><option value="12" selected>Medium</option><option value="20">Thick</option></select>
<label>Progress</label><input type="range" id="progress" min="0" max="100" value="65" oninput="update()">
<span id="progLabel">65%</span>
</div>
<div class="ctrl-row">
<label>Track Color</label><input type="color" id="trackColor" value="#e0e0e0">
<label>Fill Style</label><select id="fillStyle"><option value="solid" selected>Solid</option><option value="gradient">Gradient</option></select>
<label>Fill Color</label><input type="color" id="fillColor" value="#3b82f6">
<label>Gradient End</label><input type="color" id="gradEnd" value="#a855f7">
</div>
<div class="ctrl-row">
<label>Show Label</label><select id="showLabel"><option value="yes" selected>Yes</option><option value="no">No</option></select>
<label>Label Type</label><select id="labelType"><option value="percent" selected>Percent</option><option value="custom">Custom</option></select>
<label>Custom Text</label><input type="text" id="customText" value="Done" style="width:100px">
<label>Rounded</label><select id="rounded"><option value="no" selected>No</option><option value="yes">Yes</option></select>
</div>
</div>
<h2>Preview</h2>
<div class="preview-box" id="preview"></div>
<h2>HTML</h2><div class="output-block"><textarea id="htmlOut" readonly></textarea><button class="copy-btn" onclick="copyText('htmlOut')">Copy HTML</button></div>
<h2>CSS</h2><div class="output-block"><textarea id="cssOut" readonly></textarea><button class="copy-btn" onclick="copyText('cssOut')">Copy CSS</button></div>
</div>
</main>
<script src="/assets/app.js"></script>
<script>
function update(){
var size=+document.getElementById('size').value;var thick=+document.getElementById('thick').value;
var prog=+document.getElementById('progress').value;document.getElementById('progLabel').textContent=prog+'%';
var track=document.getElementById('trackColor').value;var fillStyle=document.getElementById('fillStyle').value;
var fill=document.getElementById('fillColor').value;var gradEnd=document.getElementById('gradEnd').value;
var showLabel=document.getElementById('showLabel').value==='yes';var labelType=document.getElementById('labelType').value;
var customText=document.getElementById('customText').value;var rounded=document.getElementById('rounded').value==='yes';
var fillVal=fillStyle==='gradient'?'linear-gradient(135deg,'+fill+','+gradEnd+')':fill;
var cap=rounded?'round':'butt';
var labelText=labelType==='percent'?prog+'%':customText;
var html='<div class="radial-progress" style="--size:'+size+'px;--thick:'+thick+'px;--track:'+track+';--fill:'+fill+';--grad-end:'+gradEnd+';--prog:'+prog+';--cap:'+cap+';">\n';
if(showLabel)html+='  <div class="radial-label">'+labelText+'</div>\n';
html+='</div>';
var css='.radial-progress{\n  --size:120px;--thick:12px;--track:#e0e0e0;--fill:#3b82f6;--grad-end:#a855f7;--prog:65;--cap:butt;\n  width:var(--size);height:var(--size);border-radius:50%;\n  background:conic-gradient(var(--fill) calc(var(--prog)*1%),var(--track) 0);\n  display:flex;align-items:center;justify-content:center;position:relative;\n}\n.radial-progress::before{\n  content:"";position:absolute;inset:var(--thick);\n  border-radius:50%;background:#fff;\n}\n.radial-label{position:relative;z-index:1;font-size:calc(var(--size)*0.18);font-weight:700;color:#333;font-family:system-ui,sans-serif}';
if(fillStyle==='gradient'){css=css.replace('var(--fill) calc(var(--prog)*1%)','linear-gradient(135deg,var(--fill),var(--grad-end)) calc(var(--prog)*1%)')}
document.getElementById('htmlOut').value=html;
document.getElementById('cssOut').value=css;
var p=document.getElementById('preview');
p.innerHTML='<div style="'+(fillStyle==='gradient'?'background:conic-gradient('+fill+' 0,'+gradEnd+' '+prog+'%,'+track+' '+prog+'%);':'background:conic-gradient('+fill+' '+prog+'%,'+track+' 0);')+'width:'+size+'px;height:'+size+'px;border-radius:50%;display:flex;align-items:center;justify-content:center;position:relative;">';
p.firstChild.style.background=fillStyle==='gradient'?'conic-gradient('+fill+' 0%,'+gradEnd+' '+prog+'%,'+track+' '+prog+'%)':'conic-gradient('+fill+' '+prog+'%,'+track+' 0)';
var inner=document.createElement('div');inner.style.cssText='position:absolute;inset:'+thick+'px;border-radius:50%;background:#fff;';
p.firstChild.appendChild(inner);
if(showLabel){var lab=document.createElement('div');lab.style.cssText='position:relative;z-index:1;font-size:'+(size*0.18)+'px;font-weight:700;color:#333;font-family:system-ui,sans-serif;';lab.textContent=labelText;p.firstChild.appendChild(lab)}
}
function copyText(id){var t=document.getElementById(id);t.select();document.execCommand('copy')}
['size','thick','trackColor','fillStyle','fillColor','gradEnd','showLabel','labelType','customText','rounded'].forEach(function(id){var el=document.getElementById(id);el.addEventListener(el.type==='range'?'input':'change',update)});
update();
</script>
</body>
</html>
