<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="/assets/theme-init.js"></script>
<title>Crossword Puzzle — Virtual Tools</title>
<link rel="stylesheet" href="/assets/style.css">
<style>
.tool-wrap{max-width:600px;margin:0 auto;text-align:center;}
.tool-desc{opacity:.7;font-size:14px;margin-bottom:8px;}
.controls{margin:10px;display:flex;gap:8px;justify-content:center;flex-wrap:wrap;}
.controls button,.controls select{padding:6px 14px;border-radius:6px;border:1px solid var(--border,#2a2f3a);background:var(--bg-alt,#1a1f2e);color:var(--text,#e0e0e0);cursor:pointer;font-size:14px;}
#grid{display:inline-grid;gap:0;border:2px solid #333;margin:10px auto;}
.cell{width:36px;height:36px;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:600;border:1px solid #999;position:relative;cursor:pointer;}
.cell.block{background:#222;border:none;}
.cell.light{background:#fff;color:#000;}
.cell.active{background:#aad4ff!important;outline:2px solid #1565c0;}
.cell.wrong{color:#c42525;}
.cell .num{position:absolute;top:0;left:2px;font-size:8px;font-weight:400;color:#666;line-height:1;}
#clues{display:flex;gap:20px;justify-content:center;text-align:left;flex-wrap:wrap;margin:10px auto;max-width:580px;}
.clue-list{font-size:13px;max-width:280px;}
.clue-list h3{font-size:14px;margin:4px 0;}
.clue-list div{margin:3px 0;cursor:pointer;padding:2px 4px;border-radius:4px;}
.clue-list div:hover{background:var(--bg-alt,#1a1f2e);}
.clue-list div.active{background:#1565c0;color:#fff;}
.info{font-size:14px;margin:8px 0;}
</style>
</head>
<body>
<header id="site-header"></header>
<main>
<div class="tool-wrap">
<h1>Crossword Puzzle</h1>
<p class="tool-desc">Auto-generated mini crosswords from a built-in word bank. Click a cell to select, type to fill. Check answers, reveal letters, or generate a new puzzle.</p>
<div class="controls">
<select id="size"><option value="8">8×8</option><option value="10" selected>10×10</option><option value="12">12×12</option></select>
<button onclick="newPuzzle()">New Puzzle</button>
<button onclick="checkAnswers()">Check</button>
<button onclick="revealLetter()">Reveal Letter</button>
<button onclick="revealWord()">Reveal Word</button>
<button onclick="clearAll()">Clear</button>
</div>
<div class="info" id="info"></div>
<div id="grid"></div>
<div id="clues"></div>
</div>
</main>
<script src="/assets/app.js"></script>
<script>

let grid,solution,cellNumbers,acrossClues,downClues,activeCell,activeDir;

function newPuzzle(){
const size=parseInt(document.getElementById('size').value);
const wPool=WORDS.filter(w=>w[0].length<=size-2).sort(()=>Math.random()-0.5);
grid=[];solution=[];cellNumbers=[];
for(let r=0;r<size;r++){grid[r]=[];solution[r]=[];cellNumbers[r]=[];
for(let c=0;c<size;c++){grid[r][c]=null;solution[r][c]=null;cellNumbers[r][c]=0;}}
const placed=[];
for(const[word,clue]of wPool){
if(placed.length>=12)break;
const horiz=Math.random()<0.5;
let attempts=0;
while(attempts<60){
const r=horiz?Math.floor(Math.random()*size):Math.floor(Math.random()*(size-word.length+1));
const c=horiz?Math.floor(Math.random()*(size-word.length+1)):Math.floor(Math.random()*size);
if(canPlace(word,r,c,horiz)){
placeWord(word,r,c,horiz);
placed.push({word,clue,r,c,horiz,number:0});
break;
}
attempts++;
}
}
numberCells(placed);
buildClues(placed);
renderGrid();renderClues();clearInfo();
}

function canPlace(word,r,c,horiz){
const size=grid.length;
for(let i=0;i<word.length;i++){
const rr=horiz?r:r+i;const cc=horiz?c+i:c;
if(rr>=size||cc>=size)return false;
const ex=solution[rr][cc];
if(ex&&ex!==word[i])return false;
// Check adjacent cells don't conflict (no accidental words)
if(!ex){
if(horiz){
if(rr>0&&solution[rr-1][cc])return false;
if(rr<size-1&&solution[rr+1][cc])return false;
}else{
if(cc>0&&solution[rr][cc-1])return false;
if(cc<size-1&&solution[rr][cc+1])return false;
}
}
}
return true;
}

function placeWord(word,r,c,horiz){
for(let i=0;i<word.length;i++){
const rr=horiz?r:r+i;const cc=horiz?c+i:c;
solution[rr][cc]=word[i];
}
}

function numberCells(placed){
let num=1;
const size=grid.length;
for(let r=0;r<size;r++)for(let c=0;c<size;c++){
if(solution[r][c]){
const startsAcross=placed.some(w=>w.r===r&&w.c===c&&w.horiz);
const startsDown=placed.some(w=>w.r===r&&w.c===c&&!w.horiz);
if(startsAcross||startsDown){
cellNumbers[r][c]=num;
placed.forEach(w=>{if(w.r===r&&w.c===c&&w.horiz)w.number=num;
if(w.r===r&&w.c===c&&!w.horiz)w.number=num;});
num++;
}
}
}
}

function buildClues(placed){
acrossClues=placed.filter(w=>w.horiz).sort((a,b)=>a.number-b.number);
downClues=placed.filter(w=>!w.horiz).sort((a,b)=>a.number-b.number);
}

function renderGrid(){
const size=grid.length;
const el=document.getElementById('grid');
el.style.gridTemplateColumns=`repeat(${size},36px)`;
el.innerHTML='';
for(let r=0;r<size;r++)for(let c=0;c<size;c++){
const cell=document.createElement('div');
if(solution[r][c]){
cell.className='cell light';
if(cellNumbers[r][c]){const n=document.createElement('span');n.className='num';n.textContent=cellNumbers[r][c];cell.appendChild(n);}
const inp=document.createElement('span');inp.textContent=grid[r][c]||'';cell.appendChild(inp);
cell.onclick=()=>selectCell(r,c);
if(activeCell&&activeCell[0]===r&&activeCell[1]===c)cell.classList.add('active');
}else{
cell.className='cell block';
}
el.appendChild(cell);
}
}

function selectCell(r,c){
if(!solution[r][c])return;
if(activeCell&&activeCell[0]===r&&activeCell[1]===c){
activeDir=activeDir==='across'?'down':'across';
}else{
activeCell=[r,c];
// Determine default direction
const hasAcross=(c<size()&&solution[r][c+1])||(c>0&&solution[r][c-1]);
const hasDown=(r<grid.length-1&&solution[r+1][c])||(r>0&&solution[r-1][c]);
activeDir=hasAcross?'across':'down';
}
renderGrid();renderClues();
}

function size(){return grid.length;}

function renderClues(){
const el=document.getElementById('clues');
el.innerHTML='';
const aDiv=document.createElement('div');aDiv.className='clue-list';
aDiv.innerHTML='<h3>Across</h3>';
acrossClues.forEach(c=>{
const d=document.createElement('div');d.textContent=c.number+'. '+c.clue;
d.onclick=()=>{activeCell=[c.r,c.c];activeDir='across';renderGrid();renderClues();};
if(activeCell&&activeCell[0]===c.r&&activeCell[1]===c.c&&activeDir==='across')d.classList.add('active');
aDiv.appendChild(d);});
const dDiv=document.createElement('div');dDiv.className='clue-list';
dDiv.innerHTML='<h3>Down</h3>';
downClues.forEach(c=>{
const d=document.createElement('div');d.textContent=c.number+'. '+c.clue;
d.onclick=()=>{activeCell=[c.r,c.c];activeDir='down';renderGrid();renderClues();};
if(activeCell&&activeCell[0]===c.r&&activeCell[1]===c.c&&activeDir==='down')d.classList.add('active');
dDiv.appendChild(d);});
el.appendChild(aDiv);el.appendChild(dDiv);
}

document.addEventListener('keydown',e=>{
if(!activeCell)return;
if(e.key==='Backspace'||e.key==='Delete'){
const[r,c]=activeCell;grid[r][c]='';renderGrid();e.preventDefault();return;
}
if(e.key==='ArrowLeft'){if(c>0&&solution[activeCell[0]][activeCell[1]-1]){activeCell[1]--;activeDir='across';renderGrid();renderClues();}e.preventDefault();return;}
if(e.key==='ArrowRight'){if(c<size()-1&&solution[activeCell[0]][activeCell[1]+1]){activeCell[1]++;activeDir='across';renderGrid();renderClues();}e.preventDefault();return;}
if(e.key==='ArrowUp'){if(r>0&&solution[activeCell[0]-1][activeCell[1]]){activeCell[0]--;activeDir='down';renderGrid();renderClues();}e.preventDefault();return;}
if(e.key==='ArrowDown'){if(r<grid.length-1&&solution[activeCell[0]+1][activeCell[1]]){activeCell[0]++;activeDir='down';renderGrid();renderClues();}e.preventDefault();return;}
const ch=e.key.toUpperCase();
if(ch.length===1&&ch>='A'&&ch<='Z'){
const[r,c]=activeCell;grid[r][c]=ch;
if(activeDir==='across'&&c<size()-1&&solution[r][c+1])activeCell[1]++;
else if(activeDir==='down'&&r<grid.length-1&&solution[r+1][c])activeCell[0]++;
renderGrid();renderClues();e.preventDefault();
}
});

function checkAnswers(){
let all=true;let correct=true;
const size=grid.length;
for(let r=0;r<size;r++)for(let c=0;c<size;c++){
if(solution[r][c]){if(grid[r][c]){if(grid[r][c]!==solution[r][c])correct=false;}else{all=false;correct=false;}}
}
document.querySelectorAll('.cell').forEach(cell=>{});
for(let r=0;r<size;r++)for(let c=0;c<size;c++){
if(solution[r][c]&&grid[r][c]&&grid[r][c]!==solution[r][c]){
const idx=r*size+c;const cellEl=document.getElementById('grid').children[idx];
cellEl.classList.add('wrong');
}
}
if(!all){document.getElementById('info').textContent='Some cells are empty or incorrect.';}
else if(correct){document.getElementById('info').textContent='All correct! 🎉';}
else{document.getElementById('info').textContent='Some answers are wrong (shown in red).';}
}

function revealLetter(){
if(!activeCell)return;
const[r,c]=activeCell;grid[r][c]=solution[r][c];renderGrid();
}

function revealWord(){
if(!activeCell)return;
const[r,c]=activeCell;
const word=activeDir==='across'?acrossClues.find(w=>w.r===r&&w.c===c):downClues.find(w=>w.r===r&&w.c===c);
if(!word)return;
for(let i=0;i<word.word.length;i++){
const rr=word.horiz?r:r+i;const cc=word.horiz?c+i:c;
grid[rr][cc]=solution[rr][cc];
}
renderGrid();
}

function clearAll(){
const size=grid.length;
for(let r=0;r<size;r++)for(let c=0;c<size;c++)if(grid[r][c])grid[r][c]='';
renderGrid();clearInfo();
}

function clearInfo(){document.getElementById('info').textContent='';}

newPuzzle();
</script>
