<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CSS Odometer/Number Roll Generator — virt.tools</title>
<link rel="stylesheet" href="/assets/style.css">
<style>
.tool-area{max-width:800px;margin:2rem auto;padding:0 1rem}
.controls{display:grid;gap:.8rem;margin:1.5rem 0;padding:1.5rem;background:#1a1a2e;border-radius:12px}
.ctrl-row{display:flex;gap:1rem;align-items:center;flex-wrap:wrap}
.ctrl-row label{font-weight:600;font-size:.9rem;min-width:120px}
.ctrl-row select,.ctrl-row input{padding:.5rem;border-radius:8px;border:1px solid #444;background:#0f0f1e;color:#eee}
.preview-box{margin:1.5rem 0;padding:2rem;background:#0a0a12;border-radius:12px;display:flex;align-items:center;justify-content:center;gap:.5rem}
.output-block{margin:1.5rem 0}
.output-block textarea{width:100%;min-height:120px;font-family:monospace;font-size:.85rem;padding:1rem;border-radius:8px;border:1px solid #444;background:#0f0f1e;color:#eee;resize:vertical}
.copy-btn{padding:.6rem 1.2rem;border:none;border-radius:8px;background:#667eea;color:#fff;cursor:pointer;font-size:.9rem;margin-top:.5rem}
h2{margin-top:2rem;font-size:1.2rem}
.odometer{display:inline-flex;gap:2px;background:#111;padding:.5rem;border-radius:8px}
.odometer .digit{position:relative;width:.7em;height:1.2em;overflow:hidden;display:inline-block;font-size:3rem;font-weight:900;font-family:monospace;background:#1a1a2e;border-radius:4px}
.odometer .digit .roll{position:absolute;top:0;left:0;right:0;text-align:center;transition:transform .8s cubic-bezier(.3,.7,.4,1)}
.odometer .digit .roll span{display:block;height:1.2em;line-height:1.2em;color:#667eea}
</style>
</head>
<body>
<header id="site-header"></header>
<main>
<div class="tool-area">
<h1>🔢 CSS Odometer/Number Roll Generator</h1>
<p>Create CSS animated odometer/rolling number counter. 4 styles, adjustable digits/speed. Copy HTML+CSS+JS.</p>
<div class="controls">
<div class="ctrl-row"><label>Style</label><select id="style"><option value="mono" selected>Monospace</option><option value="led">LED</option><option value="flip">Flip</option><option value="slide">Slide</option></select></div>
<div class="ctrl-row"><label>Digit Count</label><input type="number" id="digits" value="5" min="1" max="10" style="width:80px"></div>
<div class="ctrl-row"><label>Duration (s)</label><input type="number" id="dur" value="0.8" min="0.1" max="3" step="0.1" style="width:80px"></div>
<div class="ctrl-row"><label>Color</label><input type="color" id="color" value="#667eea" style="width:60px;height:36px"></div>
<div class="ctrl-row"><label>Target Number</label><input type="number" id="target" value="12345" style="width:120px"></div>
<div class="ctrl-row"><button class="copy-btn" onclick="update()">Update</button></div>
</div>
<h2>Preview</h2>
<div class="preview-box" id="preview"></div>
<h2>CSS</h2><div class="output-block"><textarea id="cssOut" readonly></textarea><button class="copy-btn" onclick="copyText('cssOut')">Copy CSS</button></div>
<h2>HTML</h2><div class="output-block"><textarea id="htmlOut" readonly></textarea><button class="copy-btn" onclick="copyText('htmlOut')">Copy HTML</button></div>
<h2>JS</h2><div class="output-block"><textarea id="jsOut" readonly></textarea><button class="copy-btn" onclick="copyText('jsOut')">Copy JS</button></div>
</div>
</main>
<script src="/assets/app.js"></script>
<script>
var curValue=[];
function update(){
var style=document.getElementById('style').value;
var nd=parseInt(document.getElementById('digits').value);
var dur=parseFloat(document.getElementById('dur').value);
var col=document.getElementById('color').value;
var tgt=document.getElementById('target').value.padStart(nd,'0').slice(-nd);
var bg=style==='led'?'#0a0a0a':style==='flip'?'#222':'#1a1a2e';
var fontF=style==='led'?'monospace':'monospace';
var glow=style==='led'?'text-shadow:0 0 6px '+col+';':'';
var radius=style==='flip'?'2px':style==='led'?'2px':'4px';
var css='.odometer{display:inline-flex;gap:2px;background:'+bg+';padding:.5rem;border-radius:8px}\n.odometer .digit{position:relative;width:.7em;height:1.2em;overflow:hidden;display:inline-block;font-size:3rem;font-weight:900;font-family:'+fontF+';background:'+bg+';border-radius:'+radius+'}\n.odometer .digit .roll{position:absolute;top:0;left:0;right:0;text-align:center;transition:transform '+dur+'s cubic-bezier(.3,.7,.4,1)}\n.odometer .digit .roll span{display:block;height:1.2em;line-height:1.2em;color:'+col+';'+glow+'}';
var html='<div class="odometer" id="odo">\n  ';
for(var i=0;i<nd;i++)html+='<div class="digit"><div class="roll"><span>0</span><span>1</span><span>2</span><span>3</span><span>4</span><span>5</span><span>6</span><span>7</span><span>8</span><span>9</span></div></div>';
html+='\n</div>';
var js='function setOdo(v){var d=document.querySelectorAll("#odo .digit");for(var i=0;i<d.length;i++){var n=parseInt(v[i]||"0");d[i].querySelector(".roll").style.transform="translateY(-"+(n*1.2)+"em)"}}\nsetTimeout(function(){setOdo("'+tgt+'")},100)';
document.getElementById('cssOut').value=css;
document.getElementById('htmlOut').value=html;
document.getElementById('jsOut').value=js;
document.getElementById('preview').innerHTML='<style>'+css+'</style>'+html.replace('id="odo"','id="odoDemo"')+'<script>'+js.replace(/#odo/g,'#odoDemo')+'<\/script>';
}
function copyText(id){var t=document.getElementById(id);t.select();document.execCommand('copy')}
['style','digits','dur','color','target'].forEach(function(id){var el=document.getElementById(id);el.addEventListener('input',update);el.addEventListener('change',update)});
update();
</script>
</body>
</html>
