<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <script src="/assets/theme-init.js"></script>
  <title>Bill Splitter & Tip Calculator — Virtual Tools</title>
  <link rel="stylesheet" href="/assets/style.css">
  <style>
    .tool-wrap { max-width: 560px; margin: 0 auto; }
    .field { margin-bottom: 16px; }
    .field label { display: block; font-weight: 600; margin-bottom: 4px; font-size: 14px; }
    .field input, .field select { width: 100%; background: var(--bg-panel,#11151c); color: var(--text,#d4d9e0); border: 1px solid var(--border,#2a2f3a); border-radius: 8px; padding: 10px 12px; font-size: 16px; box-sizing: border-box; }
    .row { display: flex; gap: 12px; }
    .row .field { flex: 1; }
    .tip-buttons { display: flex; gap: 8px; flex-wrap: wrap; }
    .tip-buttons button { flex: 1; min-width: 60px; background: var(--bg-panel,#11151c); color: var(--text,#d4d9e0); border: 1px solid var(--border,#2a2f3a); border-radius: 8px; padding: 10px; font-size: 15px; font-weight: 700; cursor: pointer; }
    .tip-buttons button.active { background: var(--accent,#6ea8fe); color: #08101f; border-color: var(--accent,#6ea8fe); }
    .result { background: var(--bg-panel,#11151c); border: 1px solid var(--border,#2a2f3a); border-radius: 12px; padding: 24px; margin-top: 20px; }
    .result-row { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; font-size: 15px; }
    .result-row.total { border-top: 2px solid var(--border,#2a2f3a); margin-top: 8px; padding-top: 16px; font-size: 22px; font-weight: 800; }
    .result-row span:last-child { font-weight: 700; }
    .per-person { text-align: center; font-size: 32px; font-weight: 900; color: var(--accent,#6ea8fe); margin: 16px 0; }
    .per-person-label { text-align: center; font-size: 14px; opacity: .6; }
  </style>
</head>
<body>
  <div id="site-header"></div>
  <main>
    <div class="tool-header">
      <a class="back" href="/">← All tools</a>
      <h1>Bill Splitter & Tip Calculator</h1>
      <p>Split a restaurant bill among any number of people. Calculate tip, tax, and per-person cost instantly. All calculations happen in your browser — no data sent anywhere.</p>
    </div>
    <div class="panel tool-wrap">
      <div class="field">
        <label for="bill">Bill Amount ($)</label>
        <input type="number" id="bill" value="100" min="0" step="0.01" inputmode="decimal">
      </div>
      <div class="field">
        <label>Tip Percentage</label>
        <div class="tip-buttons" id="tipButtons">
          <button data-tip="10">10%</button>
          <button data-tip="15" class="active">15%</button>
          <button data-tip="18">18%</button>
          <button data-tip="20">20%</button>
          <button data-tip="custom">Custom</button>
        </div>
      </div>
      <div class="field" id="customTipField" style="display:none">
        <label for="customTip">Custom Tip (%)</label>
        <input type="number" id="customTip" value="15" min="0" step="0.5" inputmode="decimal">
      </div>
      <div class="row">
        <div class="field">
          <label for="tax">Tax Rate (%)</label>
          <input type="number" id="tax" value="8.5" min="0" step="0.01" inputmode="decimal">
        </div>
        <div class="field">
          <label for="people">Number of People</label>
          <input type="number" id="people" value="2" min="1" step="1" inputmode="numeric">
        </div>
      </div>
      <div class="result" id="result">
        <div class="per-person-label">Each person pays</div>
        <div class="per-person" id="perPerson">$0.00</div>
        <div class="result-row"><span>Subtotal</span><span id="subtotal">$0.00</span></div>
        <div class="result-row"><span>Tip</span><span id="tipAmount">$0.00</span></div>
        <div class="result-row"><span>Tax</span><span id="taxAmount">$0.00</span></div>
        <div class="result-row total"><span>Total Bill</span><span id="total">$0.00</span></div>
      </div>
    </div>
  </main>
  <script src="/assets/app.js"></script>
  <script>
  (function() {
    const bill = document.getElementById('bill');
    const tax = document.getElementById('tax');
    const people = document.getElementById('people');
    const customTip = document.getElementById('customTip');
    const customTipField = document.getElementById('customTipField');
    const tipButtons = document.getElementById('tipButtons');
    let tipPct = 15;
    let useCustom = false;

    tipButtons.querySelectorAll('button').forEach(btn => {
      btn.addEventListener('click', () => {
        tipButtons.querySelectorAll('button').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        if (btn.dataset.tip === 'custom') {
          useCustom = true;
          customTipField.style.display = '';
          tipPct = parseFloat(customTip.value) || 0;
        } else {
          useCustom = false;
          customTipField.style.display = 'none';
          tipPct = parseFloat(btn.dataset.tip);
        }
        calc();
      });
    });

    customTip.addEventListener('input', () => { if (useCustom) { tipPct = parseFloat(customTip.value)||0; calc(); } });
    [bill, tax, people].forEach(el => el.addEventListener('input', calc));

    function fmt(v) { return '$' + (isNaN(v)?0:v).toFixed(2); }

    function calc() {
      const b = parseFloat(bill.value) || 0;
      const t = parseFloat(tax.value) || 0;
      const n = Math.max(1, parseInt(people.value) || 1);
      const tipAmt = b * tipPct / 100;
      const taxAmt = b * t / 100;
      const total = b + tipAmt + taxAmt;
      const per = total / n;
      document.getElementById('subtotal').textContent = fmt(b);
      document.getElementById('tipAmount').textContent = fmt(tipAmt);
      document.getElementById('taxAmount').textContent = fmt(taxAmt);
      document.getElementById('total').textContent = fmt(total);
      document.getElementById('perPerson').textContent = fmt(per);
    }
    calc();
  })();
  </script>
</body>
</html>
