<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="/assets/theme-init.js"></script>
<title>CSS 404 Page Generator — Virtual Tools</title>
<link rel="stylesheet" href="/assets/style.css">
<style>
.tool-wrap{max-width:800px;margin:0 auto;}
.tool-desc{font-size:14px;color:var(--text-secondary,#aaa);margin:8px 0 20px;}
.controls{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin:12px 0;}
.ctrl{display:flex;flex-direction:column;gap:4px;}
.ctrl label{font-size:12px;color:var(--text-secondary,#888);}
.ctrl input,.ctrl select{padding:6px 8px;border-radius:6px;border:1px solid var(--border,#444);background:var(--bg,#1e2230);color:var(--text,#eee);font-size:13px;font-family:inherit;}
button.action{padding:8px 16px;border-radius:6px;border:1px solid var(--border,#444);background:var(--card,#2a2f3e);color:var(--text,#eee);cursor:pointer;font-size:13px;margin:4px 4px 0 0;}
.preview{border:1px solid var(--border,#444);border-radius:8px;margin:12px 0;overflow:hidden;}
.code-block{background:var(--bg,#1e2230);border:1px solid var(--border,#444);border-radius:8px;padding:12px;margin:8px 0;font-family:monospace;font-size:11px;color:var(--text,#eee);white-space:pre-wrap;word-break:break-all;max-height:400px;overflow:auto;}
.p404{min-height:300px;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:40px 20px;}
.p404 .big{font-size:72px;font-weight:800;line-height:1;margin-bottom:8px;}
.p404 .msg{font-size:18px;margin-bottom:8px;}
.p404 .sub{font-size:14px;opacity:.6;margin-bottom:20px;}
.p404 .btn{padding:10px 28px;border-radius:8px;font-size:14px;font-weight:600;text-decoration:none;display:inline-block;}
</style>
</head>
<body>
<header id="site-header"></header>
<main>
<div class="tool-wrap">
<h1>🚫 CSS 404 Page Generator</h1>
<p class="tool-desc">Create custom 404 error page templates with 5 styles, custom messages, and a CTA button. Copy HTML+CSS.</p>
<div class="controls">
<div class="ctrl"><label>Style</label><select id="style" onchange="render()"><option value="simple" selected>Simple</option><option value="gradient">Gradient</option><option value="glitch">Glitch</option><option value="space">Space</option><option value="retro">Retro</option></select></div>
<div class="ctrl"><label>Big Text</label><input type="text" id="big" value="404" oninput="render()"></div>
<div class="ctrl"><label>Message</label><input type="text" id="msg" value="Page Not Found" oninput="render()"></div>
<div class="ctrl"><label>Subtext</label><input type="text" id="sub" value="The page you're looking for doesn't exist or has been moved." oninput="render()" style="width:100%"></div>
<div class="ctrl"><label>Button Text</label><input type="text" id="btnText" value="Go Home" oninput="render()"></div>
<div class="ctrl"><label>Background</label><input type="color" id="bg" value="#1a1a2e" oninput="render()"></div>
<div class="ctrl"><label>Text Color</label><input type="color" id="txt" value="#ffffff" oninput="render()"></div>
<div class="ctrl"><label>Accent</label><input type="color" id="accent" value="#6c5ce7" oninput="render()"></div>
</div>
<div style="margin:8px 0;"><button class="action" onclick="copyCode()">Copy HTML+CSS</button></div>
<div class="preview" id="prev"></div>
<div class="code-block" id="code"></div>
</div>
</div>
</main>
<script src="/assets/app.js"></script>
<script>
let codeText='';
function v(id){return document.getElementById(id).value;}
function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function render(){
const style=v('style'),big=esc(v('big')),msg=esc(v('msg')),sub=esc(v('sub')),btnT=esc(v('btnText'));
const bg=v('bg'),txt=v('txt'),accent=v('accent');
let bigCss='',pageCss='',btnCss=`background:${accent};color:#fff;`;
if(style==='gradient'){bigCss=`background:linear-gradient(135deg,${accent},#fd79a8);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;`;pageCss=`background:linear-gradient(135deg,${bg},${accent}30);`;}
else if(style==='glitch'){bigCss=`color:${txt};text-shadow:2px 0 #ff00ff,-2px 0 #00ffff;`;pageCss=`background:${bg};`;}
else if(style==='space'){bigCss=`color:${accent};text-shadow:0 0 20px ${accent}80;`;pageCss=`background:radial-gradient(ellipse at center,${bg} 0%,#000 100%);`;}
else if(style==='retro'){bigCss=`color:${accent};font-family:monospace;text-shadow:4px 4px 0 ${accent}40;`;pageCss=`background:${bg};font-family:monospace;`;}
else{bigCss=`color:${accent};`;pageCss=`background:${bg};`;}
const html=`<div class="p404" style="${pageCss}color:${txt};">
<div class="big" style="${bigCss}">${big}</div>
<div class="msg">${msg}</div>
<div class="sub">${sub}</div>
<a href="/" class="btn" style="${btnCss}">${btnT}</a>
</div>`;
document.getElementById('prev').innerHTML=html;
codeText=`<style>
.error-page {
  min-height: 300px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 40px 20px;
  ${pageCss}
  color: ${txt};
}
.error-page .big {
  font-size: 72px;
  font-weight: 800;
  line-height: 1;
  margin-bottom: 8px;
  ${bigCss}
}
.error-page .msg { font-size: 18px; margin-bottom: 8px; }
.error-page .sub { font-size: 14px; opacity: 0.6; margin-bottom: 20px; }
.error-page .btn {
  padding: 10px 28px;
  border-radius: 8px;
  font-size: 14px;
  font-weight: 600;
  text-decoration: none;
  display: inline-block;
  ${btnCss}
}
</style>

<div class="error-page">
  <div class="big">${big}</div>
  <div class="msg">${msg}</div>
  <div class="sub">${sub}</div>
  <a href="/" class="btn">${btnT}</a>
</div>`;
document.getElementById('code').textContent=codeText;
}
function copyCode(){navigator.clipboard.writeText(codeText).then(()=>alert('Copied!'));}
render();
</script>
</body>
</html>
