<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CSS FAQ Accordion Generator — virt.tools</title>
<link rel="stylesheet" href="/assets/style.css">
<style>
.tool-wrap{max-width:900px;margin:0 auto;padding:20px;}
.controls{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin:20px 0;}
.control-group{display:flex;flex-direction:column;gap:6px;}
.control-group label{font-size:0.8rem;color:var(--text-dim);font-weight:600;}
.control-group select{padding:8px 10px;border:1px solid var(--border);border-radius:8px;background:var(--card-bg);color:var(--text);font-size:0.9rem;font-family:inherit;}
.faq-list{margin:20px 0;}
.faq-item{border:1px solid var(--border);border-radius:8px;margin-bottom:8px;overflow:hidden;}
.faq-q{padding:16px 20px;cursor:pointer;font-weight:600;display:flex;justify-content:space-between;align-items:center;background:var(--card-bg);}
.faq-q .icon{font-size:1.2rem;transition:transform 0.2s;}
.faq-a{max-height:0;overflow:hidden;transition:max-height 0.3s ease;padding:0 20px;}
.faq-item.open .faq-a{max-height:200px;padding:0 20px 16px;}
.faq-item.open .faq-q .icon{transform:rotate(45deg);}
.faq-q:hover{background:rgba(108,92,231,0.05);}
.style-simple .faq-item{border-radius:4px;}
.style-card .faq-item{border:none;box-shadow:0 2px 8px rgba(0,0,0,0.08);border-radius:10px;}
.style-line .faq-item{border:none;border-bottom:2px solid var(--border);border-radius:0;}
.style-line .faq-item:last-child{border-bottom:none;}
.style-gradient .faq-q{background:linear-gradient(135deg,#667eea22,#764ba222);color:var(--text);}
.btn{padding:10px 20px;border:none;border-radius:8px;background:var(--accent);color:#fff;cursor:pointer;font-size:0.9rem;}
.btn:hover{opacity:0.85;}
.btn.secondary{background:var(--card-bg);border:1px solid var(--border);color:var(--text);}
.code-block{background:var(--card-bg);border:1px solid var(--border);border-radius:8px;padding:16px;margin:16px 0;overflow-x:auto;font-size:0.85rem;line-height:1.5;}
.code-block pre{margin:0;white-space:pre-wrap;word-break:break-all;}
.section-title{font-size:1.1rem;font-weight:700;margin:20px 0 8px;}
h2{margin-top:0;}
</style>
</head>
<body>
<div id="site-header"></div>
<div class="tool-wrap">
<h2>❓ CSS FAQ Accordion Generator</h2>
<p>Create FAQ accordion components with expand/collapse. 4 styles, custom Q&A items, copy HTML+CSS+JS.</p>

<div class="controls">
  <div class="control-group">
    <label>Style</label>
    <select id="style">
      <option value="simple">Simple</option>
      <option value="card">Card</option>
      <option value="line">Line</option>
      <option value="gradient">Gradient</option>
    </select>
  </div>
  <div class="control-group">
    <label>Default Open</label>
    <select id="open">
      <option value="0">First item</option>
      <option value="-1">All collapsed</option>
    </select>
  </div>
</div>

<div class="section-title">Preview</div>
<div class="faq-list style-simple" id="preview"></div>

<div style="display:flex;gap:8px;margin:12px 0;">
<button class="btn" onclick="updatePreview()">Update</button>
<button class="btn secondary" onclick="copyCode()">Copy Code</button>
</div>

<div class="section-title">HTML</div>
<div class="code-block"><pre id="html-code"></pre></div>

<div class="section-title">CSS</div>
<div class="code-block"><pre id="css-code"></pre></div>

<div class="section-title">JS</div>
<div class="code-block"><pre id="js-code"></pre></div>

</div>
<script src="/assets/app.js"></script>
<script>
var faqs=[
  {q:"What is virt.tools?",a:"A privacy-first catalog of browser utilities that run fully client-side."},
  {q:"Is my data sent to a server?",a:"No. Every tool runs in your browser with zero network requests."},
  {q:"Is it free?",a:"Yes, completely free and open source."},
  {q:"Can I request a tool?",a:"Yes! Use the feedback form to suggest new tools."}
];
function genHTML(s){
  var h='<div class="faq-list style-'+s+'">\n';
  faqs.forEach(function(f,i){
    h+='  <div class="faq-item'+(i===0?' open':'')+'">\n';
    h+='    <div class="faq-q">'+f.q+' <span class="icon">+</span></div>\n';
    h+='    <div class="faq-a"><p>'+f.a+'</p></div>\n';
    h+='  </div>\n';
  });
  h+='</div>';
  return h;
}
function genCSS(s){
  var base='.faq-list { max-width:600px; margin:0 auto; }\n'+
  '.faq-item { border:1px solid #e0e0e0; border-radius:8px; margin-bottom:8px; overflow:hidden; }\n'+
  '.faq-q { padding:16px 20px; cursor:pointer; font-weight:600; display:flex; justify-content:space-between; align-items:center; background:#fff; }\n'+
  '.faq-q:hover { background:rgba(108,92,231,0.05); }\n'+
  '.faq-q .icon { font-size:1.2rem; transition:transform 0.2s; }\n'+
  '.faq-a { max-height:0; overflow:hidden; transition:max-height 0.3s ease; padding:0 20px; }\n'+
  '.faq-item.open .faq-a { max-height:200px; padding:0 20px 16px; }\n'+
  '.faq-item.open .faq-q .icon { transform:rotate(45deg); }';
  if(s==='card') base=base.replace('border:1px solid #e0e0e0; border-radius:8px;','border:none; box-shadow:0 2px 8px rgba(0,0,0,0.08); border-radius:10px;');
  if(s==='line') base=base.replace('.faq-item { border:1px solid #e0e0e0; border-radius:8px; margin-bottom:8px; overflow:hidden; }','.faq-item { border:none; border-bottom:2px solid #e0e0e0; border-radius:0; margin-bottom:0; overflow:hidden; }\n.faq-item:last-child { border-bottom:none; }');
  if(s==='gradient') base=base.replace('background:#fff; }','background:linear-gradient(135deg,rgba(102,126,234,0.13),rgba(118,75,162,0.13)); }');
  return base;
}
function genJS(){
  return 'document.querySelectorAll(".faq-item").forEach(function(item){\n'+
  '  item.querySelector(".faq-q").addEventListener("click",function(){\n'+
  '    item.classList.toggle("open");\n'+
  '  });\n'+
  '});';
}
function updatePreview(){
  var s=document.getElementById('style').value;
  var p=document.getElementById('preview');
  p.className='faq-list style-'+s;
  p.innerHTML='';
  faqs.forEach(function(f,i){
    var item=document.createElement('div');
    item.className='faq-item'+(i===0?' open':'');
    item.innerHTML='<div class="faq-q">'+f.q+' <span class="icon">+</span></div><div class="faq-a"><p>'+f.a+'</p></div>';
    item.querySelector('.faq-q').onclick=function(){item.classList.toggle('open');};
    p.appendChild(item);
  });
  document.getElementById('html-code').textContent=genHTML(s);
  document.getElementById('css-code').textContent=genCSS(s);
  document.getElementById('js-code').textContent=genJS();
}
function copyCode(){
  var s=document.getElementById('style').value;
  var code='<!-- HTML -->\n'+genHTML(s)+'\n\n/* CSS */\n'+genCSS(s)+'\n\n// JS\n'+genJS();
  navigator.clipboard.writeText(code);
}
document.querySelectorAll('select').forEach(function(el){el.addEventListener('change',updatePreview);});
updatePreview();
</script>
</body>
</html>
