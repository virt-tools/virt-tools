<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CSS Custom Range Slider Generator — virt.tools</title>
<link rel="stylesheet" href="/assets/style.css">
<style>
.tool-area{max-width:900px;margin:2rem auto;padding:0 1rem}
.controls{display:grid;gap:1rem;margin:1.5rem 0;padding:1.5rem;background:#1a1a2e;border-radius:12px}
.control-row{display:flex;gap:1rem;align-items:center;flex-wrap:wrap}
.control-row label{min-width:100px;font-weight:600;font-size:.9rem}
.control-row select,.control-row input{padding:.5rem .75rem;border-radius:8px;border:1px solid #444;background:#0f0f1e;color:#eee;font-size:.9rem}
.preview-box{margin:1.5rem 0;border-radius:12px;min-height:120px;padding:2rem;background:#f5f5f5;display:flex;align-items:center;justify-content:center}
.output-block{margin:2rem 0}
.output-block textarea{width:100%;min-height:100px;font-family:monospace;font-size:.85rem;padding:1rem;border-radius:8px;border:1px solid #444;background:#0f0f1e;color:#eee;resize:vertical}
.copy-btn{padding:.6rem 1.2rem;border:none;border-radius:8px;background:#667eea;color:#fff;cursor:pointer;font-size:.9rem;margin-top:.5rem}
h2{margin-top:2rem;font-size:1.2rem}
</style>
</head>
<body>
<header id="site-header"></header>
<main>
<div class="tool-area">
<h1>🎚️ CSS Custom Range Slider Generator</h1>
<p>Create CSS styled range input/sliders. 4 styles, 3 themes, custom colors. Copy HTML+CSS.</p>
<div class="controls">
<div class="control-row">
<label>Style</label><select id="style"><option value="flat" selected>Flat</option><option value="rounded">Rounded</option><option value="neumorphic">Neumorphic</option><option value="gradient">Gradient</option></select>
<label>Theme</label><select id="theme"><option value="light" selected>Light</option><option value="dark">Dark</option><option value="colorful">Colorful</option></select>
<label>Size</label><select id="size"><option value="sm">Small</option><option value="md" selected>Medium</option><option value="lg">Large</option></select>
<label>Color</label><input type="color" id="color" value="#667eea" style="width:50px;padding:2px">
<label>Track Color</label><input type="color" id="trackColor" value="#ddd" style="width:50px;padding:2px">
</div>
</div>
<h2>Preview</h2>
<div class="preview-box" id="preview"></div>
<h2>HTML</h2><div class="output-block"><textarea id="htmlOut" readonly></textarea><button class="copy-btn" onclick="copyText('htmlOut')">Copy HTML</button></div>
<h2>CSS</h2><div class="output-block"><textarea id="cssOut" readonly></textarea><button class="copy-btn" onclick="copyText('cssOut')">Copy CSS</button></div>
</div>
</main>
<script src="/assets/app.js"></script>
<script>
function update(){
var style=document.getElementById('style').value,theme=document.getElementById('theme').value;
var size=document.getElementById('size').value,color=document.getElementById('color').value;
var track=document.getElementById('trackColor').value;
var sizes={sm:{h:'4px',thumb:'12px'},md:{h:'6px',thumb:'18px'},lg:{h:'8px',thumb:'24px'}};
var s=sizes[size];
var themes={light:{bg:'#f5f5f5',text:'#333'},dark:{bg:'#1a1a2e',text:'#eee'},colorful:{bg:'linear-gradient(135deg,#667eea,#764ba2)',text:'#fff'}};
var th=themes[theme];
var radius=style==='rounded'||style==='neumorphic'?'999px':'4px';
var thumbRadius=style==='neumorphic'?'50%':radius;
var trackBg=style==='gradient'?'linear-gradient(90deg,'+color+','+color+'88)':'transparent';
var neumorphicShadow=style==='neumorphic'?'box-shadow:inset 2px 2px 4px rgba(0,0,0,.2),inset -2px -2px 4px rgba(255,255,255,.1)':'';
var html='<input type="range" class="custom-slider" min="0" max="100" value="50">';
var css='.custom-slider{-webkit-appearance:none;appearance:none;width:100%;height:'+s.h+';background:'+(style==='gradient'?trackBg:track)+';border-radius:'+radius+';outline:none;'+neumorphicShadow+'}';
css+='\n.custom-slider::-webkit-slider-thumb{-webkit-appearance:none;appearance:none;width:'+s.thumb+';height:'+s.thumb+';background:'+color+';border-radius:'+thumbRadius+';cursor:pointer;border:2px solid '+(theme==='dark'?'#fff':'#fff')+';box-shadow:0 2px 6px rgba(0,0,0,.3)}';
css+='\n.custom-slider::-moz-range-thumb{width:'+s.thumb+';height:'+s.thumb+';background:'+color+';border-radius:'+thumbRadius+';cursor:pointer;border:2px solid #fff;box-shadow:0 2px 6px rgba(0,0,0,.3)}';
document.getElementById('htmlOut').value=html;
document.getElementById('cssOut').value=css;
document.getElementById('preview').innerHTML='<style>'+css+'<\/style><div style="width:80%;padding:1rem;background:'+th.bg+';border-radius:8px">'+html+'</div>';
}
function copyText(id){var t=document.getElementById(id);t.select();document.execCommand('copy')}
document.querySelectorAll('select,input').forEach(function(e){e.addEventListener('input',update);e.addEventListener('change',update)});
update();
</script>
</body>
</html>
