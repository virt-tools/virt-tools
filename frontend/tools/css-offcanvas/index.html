<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CSS Off-Canvas Sidebar Generator — virt.tools</title>
<link rel="stylesheet" href="/assets/style.css">
<style>
.tool-area{max-width:960px;margin:2rem auto;padding:0 1rem}
.controls{display:grid;gap:1rem;margin:1.5rem 0;padding:1.5rem;background:#1a1a2e;border-radius:12px}
.control-row{display:flex;gap:1rem;align-items:center;flex-wrap:wrap}
.control-row label{min-width:110px;font-weight:600;font-size:.9rem}
.control-row select,.control-row input[type="color"]{padding:.5rem .75rem;border-radius:8px;border:1px solid #444;background:#0f0f1e;color:#eee;font-size:.9rem}
.preview-area{margin:2rem 0;padding:2rem;background:#0f0f1e;border-radius:12px;position:relative;min-height:320px;overflow:hidden}
.demo-btn{padding:.6rem 1.2rem;border:none;border-radius:8px;background:#4a9eff;color:#fff;cursor:pointer;font-size:.9rem;margin-bottom:1rem}
.css-output{margin:2rem 0}
.css-output textarea{width:100%;min-height:200px;font-family:monospace;font-size:.85rem;padding:1rem;border-radius:8px;border:1px solid #444;background:#0f0f1e;color:#eee;resize:vertical}
.copy-btn{padding:.6rem 1.2rem;border:none;border-radius:8px;background:#4a9eff;color:#fff;cursor:pointer;font-size:.9rem;margin-top:.5rem}
h2{margin-top:2rem;font-size:1.2rem}
</style>
</head>
<body>
<header id="site-header"></header>
<main>
<div class="tool-area">
<h1>📐 CSS Off-Canvas Sidebar Generator</h1>
<p>Create CSS off-canvas sidebar navigation that slides in from the edge.</p>
<div class="controls">
<div class="control-row">
<label>Position</label><select id="position"><option value="left">Left</option><option value="right">Right</option></select>
<label>Width</label><input type="range" id="width" min="200" max="400" value="280"><span id="widthVal">280px</span>
</div>
<div class="control-row">
<label>Animation</label><select id="anim"><option value="slide">Slide</option><option value="push">Push</option><option value="reveal">Reveal</option><option value="scale">Scale</option></select>
<label>Bg Color</label><input type="color" id="bgColor" value="#1a1a2e">
<label>Overlay</label><select id="overlay"><option value="yes">Yes</option><option value="no">No</option></select>
</div>
</div>
<div class="preview-area" id="preview">
<button class="demo-btn" onclick="document.getElementById('preview').classList.add('oc-open')">Open Sidebar</button>
</div>
<h2>HTML</h2><div class="css-output"><textarea id="htmlOut" readonly></textarea><button class="copy-btn" onclick="copyText('htmlOut')">Copy HTML</button></div>
<h2>CSS</h2><div class="css-output"><textarea id="cssOut" readonly></textarea><button class="copy-btn" onclick="copyText('cssOut')">Copy CSS</button></div>
</div>
</main>
<script src="/assets/app.js"></script>
<script>
function update(){
var pos=document.getElementById('position').value;
var w=document.getElementById('width').value;
var anim=document.getElementById('anim').value;
var bg=document.getElementById('bgColor').value;
var ov=document.getElementById('overlay').value;
document.getElementById('widthVal').textContent=w+'px';
var transform='';
if(anim==='slide'||anim==='reveal'){transform='translateX('+(pos==='left'?'-':'')+'100%)'}
else if(anim==='push'){transform='translateX('+(pos==='left'?'-':'')+'100%)'}
else if(anim==='scale'){transform='translateX('+(pos==='left'?'-':'')+'100%) scale(.8)'}
var css='.oc-container{position:relative;overflow:hidden}\n'+
'.oc-sidebar{\n  position:absolute;\n  '+(pos==='left'?'left':'right')+':0;\n  top:0;\n  width:'+w+'px;\n  height:100%;\n  background:'+bg+';\n  transform:'+transform+';\n  transition:transform .3s ease;\n  z-index:100;\n}\n'+
'.oc-container.oc-open .oc-sidebar{transform:translateX(0)'+(anim==='scale'?' scale(1)':'')+'}\n'+
(ov==='yes'?'.oc-overlay{position:absolute;inset:0;background:rgba(0,0,0,.5);opacity:0;pointer-events:none;transition:opacity .3s ease;z-index:99}\n.oc-container.oc-open .oc-overlay{opacity:1;pointer-events:auto}\n':'')+
'.oc-content{transition:'+(anim==='push'?'transform .3s ease':'all .3s ease')+'}\n'+
(anim==='push'?'.oc-container.oc-open .oc-content{transform:translateX('+(pos==='left'?w:-w)+'px)}\n':'');
var html='<div class="oc-container">\n  <div class="oc-sidebar">\n    <!-- sidebar content -->\n    <nav>\n      <a href="#">Home</a>\n      <a href="#">About</a>\n      <a href="#">Contact</a>\n    </nav>\n  </div>\n'+(ov==='yes'?'  <div class="oc-overlay" onclick="this.parentElement.classList.remove(\'oc-open\')"></div>\n':'')+'  <div class="oc-content">\n    <button onclick="this.closest(\'.oc-container\').classList.add(\'oc-open\')">☰ Menu</button>\n    <!-- main content -->\n  </div>\n</div>';
document.getElementById('cssOut').value=css;
document.getElementById('htmlOut').value=html;
// update preview
var p=document.getElementById('preview');
p.className='preview-area'+(p.classList.contains('oc-open')?' oc-open':'');
var style=p.querySelector('#oc-style');
if(!style){style=document.createElement('style');style.id='oc-style';p.appendChild(style)}
style.textContent=css;
var sb=p.querySelector('.oc-sidebar');
if(!sb){
sb=document.createElement('div');sb.className='oc-sidebar';sb.innerHTML='<div style="padding:1.5rem;color:#eee"><h3 style="margin:0 0 1rem">Sidebar</h3><p style="margin:0 0 .5rem;color:#aaa">Link 1</p><p style="margin:0 0 .5rem;color:#aaa">Link 2</p><p style="margin:0;color:#aaa">Link 3</p></div>';
p.insertBefore(sb,p.firstChild);
var btn=p.querySelector('.demo-btn');
btn.onclick=function(){p.classList.toggle('oc-open');btn.textContent=p.classList.contains('oc-open')?'Close Sidebar':'Open Sidebar'};
if(ov==='yes'){var o=document.createElement('div');o.className='oc-overlay';o.onclick=function(){p.classList.remove('oc-open');btn.textContent='Open Sidebar'};p.insertBefore(o,sb.nextSibling)}
}
sb.style.cssText='position:absolute;top:0;'+pos+':0;width:'+w+'px;height:100%;background:'+bg+';transform:'+(p.classList.contains('oc-open')?'translateX(0)':transform)+';transition:transform .3s ease;z-index:100;padding:1.5rem;box-sizing:border-box';
}
function copyText(id){var t=document.getElementById(id);t.select();document.execCommand('copy')}
document.querySelectorAll('select,input').forEach(function(e){e.addEventListener('input',update)});
update();
</script>
</body>
</html>
