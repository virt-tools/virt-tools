<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CSS Announcement Banner Generator — virt.tools</title>
<link rel="stylesheet" href="/assets/style.css">
<style>
.tool-area{max-width:900px;margin:2rem auto;padding:0 1rem}
.controls{display:grid;gap:1rem;margin:1.5rem 0;padding:1.5rem;background:#1a1a2e;border-radius:12px}
.control-row{display:flex;gap:1rem;align-items:center;flex-wrap:wrap}
.control-row label{min-width:100px;font-weight:600;font-size:.9rem}
.control-row select,.control-row input{padding:.5rem .75rem;border-radius:8px;border:1px solid #444;background:#0f0f1e;color:#eee;font-size:.9rem}
.preview-box{margin:1.5rem 0;border-radius:12px;background:#2a2a3e;padding:1.5rem;min-height:80px}
.output-block{margin:2rem 0}
.output-block textarea{width:100%;min-height:120px;font-family:monospace;font-size:.85rem;padding:1rem;border-radius:8px;border:1px solid #444;background:#0f0f1e;color:#eee;resize:vertical}
.copy-btn{padding:.6rem 1.2rem;border:none;border-radius:8px;background:#667eea;color:#fff;cursor:pointer;font-size:.9rem;margin-top:.5rem}
h2{margin-top:2rem;font-size:1.2rem}
</style>
</head>
<body>
<header id="site-header"></header>
<main>
<div class="tool-area">
<h1>📢 CSS Announcement Banner Generator</h1>
<p>Create CSS announcement/promo banners. 4 styles, CTA button, close button, custom colors. Copy HTML+CSS.</p>
<div class="controls">
<div class="control-row">
<label>Style</label><select id="style"><option value="solid" selected>Solid</option><option value="gradient">Gradient</option><option value="outline">Outline</option><option value="dashed">Dashed</option></select>
<label>Theme</label><select id="theme"><option value="purple" selected>Purple</option><option value="blue">Blue</option><option value="green">Green</option><option value="orange">Orange</option><option value="red">Red</option></select>
</div>
<div class="control-row">
<label>Text</label><input type="text" id="text" value="🎉 New features available!" style="width:250px">
<label>CTA</label><input type="text" id="cta" value="Learn More" style="width:120px">
<label>Close</label><select id="close"><option value="yes" selected>Yes</option><option value="no">No</option></select>
<label>Radius</label><input type="number" id="radius" value="8" min="0" max="24" style="width:60px">
</div>
</div>
<h2>Preview</h2>
<div class="preview-box" id="preview"></div>
<h2>HTML</h2><div class="output-block"><textarea id="htmlOut" readonly></textarea><button class="copy-btn" onclick="copyText('htmlOut')">Copy HTML</button></div>
<h2>CSS</h2><div class="output-block"><textarea id="cssOut" readonly></textarea><button class="copy-btn" onclick="copyText('cssOut')">Copy CSS</button></div>
</div>
</main>
<script src="/assets/app.js"></script>
<script>
var themes={purple:{c1:'#7c3aed',c2:'#667eea'},blue:{c1:'#3b82f6',c2:'#0ea5e9'},green:{c1:'#22c55e',c2:'#16a34a'},orange:{c1:'#f59e0b',c2:'#ea580c'},red:{c1:'#ef4444',c2:'#dc2626'}};
function update(){
var s=document.getElementById('style').value,th=document.getElementById('theme').value;
var text=document.getElementById('text').value,cta=document.getElementById('cta').value;
var c=document.getElementById('close').value,r=document.getElementById('radius').value;
var d=themes[th];
var closeHTML=c==='yes'?'<span class="banner-close">✕</span>':'';
var ctaHTML=cta?'<a href="#" class="banner-cta">'+cta+'</a>':'';
var html='<div class="announcement-banner">\n  <span class="banner-text">'+text+'</span>\n  '+ctaHTML+'\n  '+closeHTML+'\n</div>';
var css='.announcement-banner{display:flex;align-items:center;justify-content:center;gap:16px;padding:14px 24px;border-radius:'+r+'px;';
if(s==='solid'){css+='background:'+d.c1+';color:#fff'}
else if(s==='gradient'){css+='background:linear-gradient(135deg,'+d.c1+','+d.c2+');color:#fff'}
else if(s==='outline'){css+='border:2px solid '+d.c1+';color:'+d.c1+';background:transparent'}
else{css+='border:2px dashed '+d.c1+';color:'+d.c1+';background:'+d.c1+'10'}
css+='}\n';
css+='.banner-text{font-size:14px;font-weight:500}\n';
css+='.banner-cta{background:rgba(255,255,255,.2);color:#fff;padding:6px 16px;border-radius:6px;text-decoration:none;font-size:13px;font-weight:600;white-space:nowrap}\n';
css+='.banner-cta:hover{background:rgba(255,255,255,.3)}\n';
css+='.banner-close{cursor:pointer;font-size:18px;opacity:.6;margin-left:auto}\n';
css+='.banner-close:hover{opacity:1}';
document.getElementById('htmlOut').value=html;
document.getElementById('cssOut').value=css;
document.getElementById('preview').innerHTML='<style>'+css+'<\/style>'+html;
}
function copyText(id){var t=document.getElementById(id);t.select();document.execCommand('copy')}
document.querySelectorAll('select,input').forEach(function(e){e.addEventListener('input',update);e.addEventListener('change',update)});
update();
</script>
</body>
</html>
