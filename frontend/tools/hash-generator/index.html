<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <script src="/assets/theme-init.js"></script>
  <title>Hash Generator — Virtual Tools</title>
  <link rel="stylesheet" href="/assets/style.css">
</head>
<body>
  <div id="site-header"></div>
  <main>
    <div class="tool-header">
      <a class="back" href="/">← All tools</a>
      <h1>Hash Generator</h1>
      <p>Compute cryptographic hashes (SHA-1 / SHA-256 / SHA-384 / SHA-512) of any text, entirely in your browser via the Web Crypto API. Nothing is sent anywhere.</p>
    </div>

    <div class="panel">
      <div class="field">
        <label for="in">Input text</label>
        <textarea id="in" placeholder="Type or paste text to hash…"></textarea>
      </div>
      <div class="row">
        <div>
          <label for="algo">Algorithm</label>
          <select id="algo">
            <option value="SHA-256" selected>SHA-256</option>
            <option value="SHA-1">SHA-1</option>
            <option value="SHA-384">SHA-384</option>
            <option value="SHA-512">SHA-512</option>
          </select>
        </div>
        <label class="check" style="align-self:flex-end;"><input type="checkbox" id="upper"> Uppercase hex</label>
      </div>
      <div class="spacer"></div>
      <button id="copy" class="secondary">Copy hash</button>

      <div class="spacer"></div>
      <label for="out">Digest (hex)</label>
      <div class="output" id="out" style="word-break:break-all;"></div>
      <p class="note" id="note">Computed locally with <code>crypto.subtle.digest()</code> — no network requests.</p>
    </div>
  </main>

  <script src="/assets/app.js"></script>
  <script>
  (function () {
    var inp = document.getElementById("in");
    var algo = document.getElementById("algo");
    var upper = document.getElementById("upper");
    var out = document.getElementById("out");
    var note = document.getElementById("note");
    var lastHash = "";

    function toHex(buf) {
      var bytes = new Uint8Array(buf);
      var hex = "";
      for (var i = 0; i < bytes.length; i++) {
        var b = bytes[i].toString(16);
        if (b.length < 2) b = "0" + b;
        hex += b;
      }
      return hex;
    }

    function compute() {
      var text = inp.value;
      out.textContent = "";
      if (!text) { lastHash = ""; return; }
      var bytes = new TextEncoder().encode(text);
      crypto.subtle.digest(algo.value, bytes).then(function (buf) {
        var hex = toHex(buf);
        if (upper.checked) hex = hex.toUpperCase();
        lastHash = hex;
        out.textContent = hex;
        note.innerHTML = "Computed locally with <code>crypto.subtle.digest()</code> — no network requests.";
      }).catch(function (e) {
        out.textContent = "";
        note.textContent = "Error: " + (e && e.message ? e.message : "could not compute hash.");
      });
    }

    document.getElementById("copy").addEventListener("click", function () {
      if (!lastHash) return;
      var btn = this;
      if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(lastHash).then(function () {
          btn.textContent = "Copied!"; setTimeout(function () { btn.textContent = "Copy hash"; }, 1200);
        });
      } else {
        var ta = document.createElement("textarea");
        ta.value = lastHash; document.body.appendChild(ta); ta.select();
        try { document.execCommand("copy"); btn.textContent = "Copied!"; setTimeout(function () { btn.textContent = "Copy hash"; }, 1200); }
        catch (e) {}
        ta.remove();
      }
    });

    inp.addEventListener("input", compute);
    algo.addEventListener("change", compute);
    upper.addEventListener("change", function () {
      if (lastHash) out.textContent = upper.checked ? lastHash.toUpperCase() : lastHash.toLowerCase();
    });

    compute();
  })();
  </script>
</body>
</html>
