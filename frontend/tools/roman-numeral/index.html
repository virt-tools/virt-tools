<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <script src="/assets/theme-init.js"></script>
  <title>Roman Numeral Converter — Virtual Tools</title>
  <link rel="stylesheet" href="/assets/style.css">
</head>
<body>
  <div id="site-header"></div>
  <main>
    <div class="tool-header">
      <a class="back" href="/">← All tools</a>
      <h1>Roman Numeral Converter</h1>
      <p>Convert integers (1–3999) to Roman numerals and back. Decode validates canonical form and rejects non-standard spellings. Runs entirely in your browser.</p>
    </div>

    <div class="panel">
      <div class="row" style="align-items:flex-end;">
        <div>
          <label for="mode">Mode</label>
          <select id="mode">
            <option value="toRoman" selected>Number → Roman</option>
            <option value="fromRoman">Roman → Number</option>
          </select>
        </div>
      </div>

      <div class="spacer"></div>
      <div class="field">
        <label for="in">Input</label>
        <input type="text" id="in" value="1994" style="font-family:ui-monospace,monospace;">
      </div>

      <div class="spacer"></div>
      <div class="row" style="justify-content:space-between;">
        <label for="out">Output</label>
        <button id="copy" class="secondary" style="padding:4px 10px;">Copy</button>
      </div>
      <div class="output" id="out" style="word-break:break-all; min-height:1.6em;"></div>
      <p class="note" id="note">Standard subtractive notation: I, V, X, L, C, D, M (1, 5, 10, 50, 100, 500, 1000). Valid range 1–3999.</p>
    </div>
  </main>

  <script src="/assets/app.js"></script>
  <script>
  (function () {
    var VAL = [
      [1000, "M"], [900, "CM"], [500, "D"], [400, "CD"],
      [100, "C"], [90, "XC"], [50, "L"], [40, "XL"],
      [10, "X"], [9, "IX"], [5, "V"], [4, "IV"], [1, "I"]
    ];

    var mode = document.getElementById("mode");
    var inEl = document.getElementById("in");
    var out = document.getElementById("out");
    var copy = document.getElementById("copy");
    var note = document.getElementById("note");

    function toRoman(n) {
      if (!/^-?\d+$/.test(String(n))) throw new Error("Enter a whole number.");
      n = parseInt(n, 10);
      if (n < 1 || n > 3999) throw new Error("Number out of range — enter an integer from 1 to 3999.");
      var res = "";
      for (var i = 0; i < VAL.length; i++) {
        while (n >= VAL[i][0]) { res += VAL[i][1]; n -= VAL[i][0]; }
      }
      return res;
    }
    function fromRoman(s) {
      s = s.trim().toUpperCase();
      if (!s) throw new Error("Enter a Roman numeral.");
      var i = 0, total = 0;
      while (i < s.length) {
        var matched = false;
        for (var j = 0; j < VAL.length; j++) {
          if (s.startsWith(VAL[j][1], i)) { total += VAL[j][0]; i += VAL[j][1].length; matched = true; break; }
        }
        if (!matched) throw new Error("Invalid character '" + s.charAt(i) + "' at position " + (i + 1) + ".");
      }
      if (toRoman(total) !== s) throw new Error("Non-standard spelling — canonical form is " + toRoman(total) + ".");
      return total;
    }

    function run() {
      var v = inEl.value.trim();
      try {
        if (mode.value === "toRoman") {
          out.textContent = toRoman(v) || "—";
          note.textContent = "Converted " + v + " to a Roman numeral.";
        } else {
          out.textContent = fromRoman(v);
          note.textContent = "Converted " + v.toUpperCase() + " to an integer.";
        }
        out.style.color = "";
      } catch (e) {
        out.textContent = "—";
        note.textContent = e.message;
        note.style.color = "var(--bad)";
        return;
      }
      note.style.color = "";
    }

    function copyText() {
      var t = out.textContent;
      if (!t || t === "—") return;
      function done() { copy.textContent = "Copied!"; setTimeout(function () { copy.textContent = "Copy"; }, 1200); }
      if (navigator.clipboard && navigator.clipboard.writeText) navigator.clipboard.writeText(t).then(done);
      else { var ta = document.createElement("textarea"); ta.value = t; document.body.appendChild(ta); ta.select(); try { document.execCommand("copy"); done(); } catch (e) {} ta.remove(); }
    }

    mode.addEventListener("change", run);
    inEl.addEventListener("input", run);
    copy.addEventListener("click", copyText);

    run();
  })();
  </script>
</body>
</html>
