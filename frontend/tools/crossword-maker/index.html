<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="/assets/theme-init.js"></script>
<title>Crossword Maker — Virtual Tools</title>
<link rel="stylesheet" href="/assets/style.css">
<style>
.tool-wrap{max-width:900px;margin:0 auto;}
.tool-desc{font-size:14px;color:var(--text-secondary,#aaa);margin:8px 0 20px;}
.layout{display:grid;grid-template-columns:1fr 300px;gap:20px;}
@media(max-width:700px){.layout{grid-template-columns:1fr;}}
.input-area textarea{width:100%;min-height:180px;padding:12px;border-radius:8px;border:1px solid var(--border,#444);background:var(--card,#2a2f3e);color:var(--text,#eee);font-size:13px;font-family:monospace;resize:vertical;box-sizing:border-box;}
.btn{padding:8px 16px;border-radius:6px;border:none;background:var(--accent,#5b8def);color:#fff;cursor:pointer;font-size:13px;margin:4px 2px;}
.btn:hover{opacity:0.9;}
.btn-ghost{background:transparent;border:1px solid var(--border,#444);color:var(--text,#eee);}
.crossword-wrap{overflow-x:auto;}
table.crossword{border-collapse:collapse;margin:10px 0;}
td.cell{width:34px;height:34px;border:1px solid var(--border,#555);position:relative;text-align:center;vertical-align:middle;background:var(--bg,#1a1f2e);}
td.cell.black{background:#111;border:none;}
td.cell input{width:100%;height:100%;border:none;text-align:center;font-size:16px;font-weight:bold;background:transparent;color:var(--text,#eee);text-transform:uppercase;padding:0;}
td.cell input:focus{outline:none;background:var(--accent,#5b8def);color:#fff;}
td.cell .num{position:absolute;top:0;left:2px;font-size:8px;color:var(--text-secondary,#888);line-height:1;}
.clues{font-size:13px;}
.clues h3{font-size:14px;margin:0 0 8px;}
.clues ol{padding-left:20px;margin:0 0 12px;}
.clues li{margin:4px 0;cursor:pointer;}
.clues li:hover{color:var(--accent,#5b8def);}
.info{font-size:12px;color:var(--text-secondary,#888);margin:8px 0;}
.preset-btn{font-size:11px;padding:4px 10px;}
</style>
</head>
<body>
<header id="site-header"></header>
<main>
<div class="tool-wrap">
<h1>🔤 Crossword Maker</h1>
<p class="tool-desc">Generate custom crossword puzzles from your own word/clue list. Click a clue to highlight the answer. Print or solve interactively.</p>
<div class="layout">
<div>
<div class="input-area">
<label class="info">Enter words and clues, one per line: <code>WORD|clue text</code></label>
<textarea id="wordInput" placeholder="APPLE|A red or green fruit&#10;OCEAN|Large body of water&#10;PIANO|Musical instrument with keys&#10;EARTH|Our planet&#10;NEEDLE|Sewing tool">APPLE|A red or green fruit
OCEAN|Large body of water
PIANO|Musical instrument with keys
EARTH|Our planet
NEEDLE|Sewing tool
LEMON|Yellow citrus fruit
NOON|Midday
OPEN|Not closed</textarea>
<div style="margin:8px 0;">
<button class="btn" onclick="generate()">Generate Crossword</button>
<button class="btn btn-ghost preset-btn" onclick="loadPreset('animals')">Animals</button>
<button class="btn btn-ghost preset-btn" onclick="loadPreset('food')">Food</button>
<button class="btn btn-ghost preset-btn" onclick="loadPreset('space')">Space</button>
<button class="btn btn-ghost" onclick="clearGrid()">Clear</button>
</div>
</div>
<div class="crossword-wrap" id="gridWrap"></div>
</div>
<div class="clues" id="cluesPanel">
<h3>Clues</h3>
<p class="info">Generate a crossword to see clues.</p>
</div>
</div>
</div>
</main>
<script src="/assets/app.js"></script>
<script>
const PRESETS={animals:'CAT|Common pet that purrs\nDOG|Loyal companion\nBEAR|Large furry mammal\nEAGLE|Bird of prey\nRABBIT|Long-eared hopper\nTIGER|Striped big cat\nGOAT|Farm animal that climbs\nLION|King of the jungle',food:'BREAD|Baked from flour\nPIZZA|Italian dish with toppings\nSUGAR|Sweet white substance\nRICE|Common Asian grain\nMEAT|Animal flesh food\nEGGS|Breakfast oval food\nLEMON|Yellow citrus fruit\nAPPLE|Red or green fruit',space:'MARS|Red planet\nEARTH|Our home planet\nMOON|Earth's natural satellite\nSTAR|Burning gas sphere\nCOMET|Icy space visitor\nORBIT|Path around a star\nVENUS|Second planet from sun\nSUN|Center of our solar system'};
let grid=[],words=[],acrossClues=[],downClues=[],currentDir='across',currentRow=0,currentCol=0;
function loadPreset(name){document.getElementById('wordInput').value=PRESETS[name];generate();}
function parseInput(){const lines=document.getElementById('wordInput').value.split('\n').filter(l=>l.trim());const result=[];lines.forEach(l=>{const idx=l.indexOf('|');if(idx>0){const word=l.slice(0,idx).trim().toUpperCase();const clue=l.slice(idx+1).trim();if(word.length>=2&&word.length<=12&&/^[A-Z]+$/.test(word))result.push({word,clue});}});return result;}
function generate(){const parsed=parseInput();if(parsed.length<2){alert('Enter at least 2 valid words (letters only, 2-12 chars).');return;}words=parsed;words.sort((a,b)=>b.word.length-a.word.length);const N=15;grid=Array(N).fill(0).map(()=>Array(N).fill(null));placeWords();renderGrid();renderClues();}
function placeWords(){const placed=[];const N=grid.length;words.forEach((w,i)=>{if(i===0){const r=Math.floor(N/2);const c=Math.floor((N-w.word.length)/2);placeWord(w.word,r,c,'across');placed.push({...w,row:r,col:c,dir:'across',num:1});return;}let best=null;for(let r=0;r<N;r++){for(let c=0;c<N;c++){for(let d of['across','down']){if(d==='across'&&c+w.word.length>N)continue;if(d==='down'&&r+w.word.length>N)continue;let score=0,ok=true,intersections=0;for(let k=0;k<w.word.length;k++){const rr=d==='down'?r+k:r;const cc=d==='across'?c+k:c;const existing=grid[rr][cc];if(existing===null){if(d==='across'&&(rr>0&&grid[rr-1][cc]||rr<N-1&&grid[rr+1][cc])){ok=false;break;}if(d==='down'&&(cc>0&&grid[rr][cc-1]||cc<N-1&&grid[rr][cc+1])){ok=false;break;}}else if(existing!==w.word[k]){ok=false;break;}else{intersections++;}}if(!ok)continue;if(d==='across'){if(c>0&&grid[r][c-1])ok=false;if(c+w.word.length<N&&grid[r][c+w.word.length])ok=false;}else{if(r>0&&grid[r-1][c])ok=false;if(r+w.word.length<N&&grid[r+w.word.length][c])ok=false;}if(ok&&intersections>0)score=intersections*10;if(ok&&(intersections>0||i===0)&&(!best||score>best.score))best={r,c,d,score};}}if(best)break;}if(best){placeWord(w.word,best.r,best.c,best.d);placed.push({...w,row:best.r,col:best.c,dir:best.d});}});words=placed;numberClues();}
function placeWord(word,r,c,dir){for(let k=0;k<word.length;k++){const rr=dir==='down'?r+k:r;const cc=dir==='across'?c+k:c;grid[rr][cc]=word[k];}}
function numberClues(){const N=grid.length;let num=1;const nums=Array(N).fill(0).map(()=>Array(N).fill(0));acrossClues=[];downClues=[];for(let r=0;r<N;r++){for(let c=0;c<N;c++){if(grid[r][c]===null)continue;const startA=(c===0||grid[r][c-1]===null)&&(c<N-1&&grid[r][c+1]!==null);const startD=(r===0||grid[r-1][c]===null)&&(r<N-1&&grid[r+1][c]!==null);if(startA||startD){nums[r][c]=num;words.forEach(w=>{if(w.row===r&&w.col===c&&w.dir==='across'&&startA)acrossClues.push({num,word:w.word,clue:w.clue,row:r,col:c});if(w.row===r&&w.col===c&&w.dir==='down'&&startD)downClues.push({num,word:w.word,clue:w.clue,row:r,col:c});});num++;}}}grid._nums=nums;}
function renderGrid(){const N=grid.length;let html='<table class="crossword">';for(let r=0;r<N;r++){html+='<tr>';for(let c=0;c<N;c++){const cell=grid[r][c];if(cell===null){html+='<td class="cell black"></td>';}else{const num=(grid._nums&&grid._nums[r][c])||'';html+=`<td class="cell">${num?`<span class="num">${num}</span>`:''}<input maxlength="1" data-r="${r}" data-c="${c}" value="" onfocus="focusCell(${r},${c})" oninput="checkInput(this)" onkeydown="navCell(event,this)"></td>`;}}html+='</tr>';}html+='</table>';document.getElementById('gridWrap').innerHTML=html;}
function focusCell(r,c){currentRow=r;currentCol=c;}
function checkInput(input){input.value=input.value.toUpperCase().replace(/[^A-Z]/,'');}
function navCell(e,input){const r=+input.dataset.r,c=+input.dataset.c;if(e.key==='ArrowRight'&&c<grid.length-1){const next=document.querySelector(`input[data-r="${r}"][data-c="${c+1}"]`);if(next)next.focus();}else if(e.key==='ArrowLeft'&&c>0){const next=document.querySelector(`input[data-r="${r}"][data-c="${c-1}"]`);if(next)next.focus();}else if(e.key==='ArrowDown'&&r<grid.length-1){const next=document.querySelector(`input[data-r="${r+1}"][data-c="${c}"]`);if(next)next.focus();}else if(e.key==='ArrowUp'&&r>0){const next=document.querySelector(`input[data-r="${r-1}"][data-c="${c}"]`);if(next)next.focus();}}
function renderClues(){let html='<h3>Across</h3><ol>';acrossClues.forEach(c=>{html+=`<li onclick="highlightCell(${c.row},${c.col})">${c.clue} (${c.word.length})</li>`;});html+='</ol><h3>Down</h3><ol>';downClues.forEach(c=>{html+=`<li onclick="highlightCell(${c.row},${c.col})">${c.clue} (${c.word.length})</li>`;});html+='</ol>';document.getElementById('cluesPanel').innerHTML=html;}
function highlightCell(r,c){const input=document.querySelector(`input[data-r="${r}"][data-c="${c}"]`);if(input)input.focus();}
function clearGrid(){grid=[];words=[];acrossClues=[];downClues=[];document.getElementById('gridWrap').innerHTML='';document.getElementById('cluesPanel').innerHTML='<h3>Clues</h3><p class="info">Generate a crossword to see clues.</p>';}
</script>
</body>
</html>
