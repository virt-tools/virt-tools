<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <script src="/assets/theme-init.js"></script>
  <title>URL Parser — Virtual Tools</title>
  <link rel="stylesheet" href="/assets/style.css">
  <style>
    .parts { display:grid; grid-template-columns: 140px 1fr auto; gap:6px 10px; align-items:center; }
    .parts .k { opacity:.7; font-weight:600; }
    .parts .v { font-family:monospace; word-break:break-all; }
    .parts .v.empty { opacity:.4; font-style:italic; }
    .copy-btn { padding:2px 8px; font-size:12px; }
    .qp-table { width:100%; border-collapse:collapse; font-size:14px; }
    .qp-table th, .qp-table td { text-align:left; padding:5px 8px; border-bottom:1px solid var(--border,#2a2f3a); vertical-align:top; }
    .qp-table th { font-weight:600; opacity:.7; }
    .qp-table code { font-family:monospace; }
    .qp-empty { padding:12px; opacity:.55; }
    .sub-h { margin:18px 0 6px; font-weight:600; }
  </style>
</head>
<body>
  <div id="site-header"></div>
  <main>
    <div class="tool-header">
      <a class="back" href="/">← All tools</a>
      <h1>URL Parser</h1>
      <p>Break a URL into its components — scheme, host, port, path, query params (decoded), fragment. Parsed locally in your browser; nothing uploaded.</p>
    </div>

    <div class="panel">
      <div class="field">
        <label for="in">URL</label>
        <textarea id="in" placeholder="https://user:pass@example.com:8443/path/to/page?q=hello&n=42&n=7#section" style="min-height:80px; font-family:monospace;"></textarea>
      </div>
      <div class="field">
        <label for="base">Base URL (optional — for relative URLs)</label>
        <input id="base" type="text" placeholder="https://example.com" style="font-family:monospace;">
      </div>
      <div class="row">
        <button id="parse">Parse</button>
        <button id="clear" class="secondary">Clear</button>
      </div>
      <div class="spacer"></div>
      <div class="sub-h">Components</div>
      <div id="parts" class="parts"></div>
      <div class="sub-h">Query parameters</div>
      <div id="qp"></div>
      <p class="note" id="note">Parsed locally with the browser's native URL parser.</p>
    </div>
  </main>

  <script src="/assets/app.js"></script>
  <script>
  (function () {
    var inp = document.getElementById("in");
    var baseEl = document.getElementById("base");
    var partsEl = document.getElementById("parts");
    var qpEl = document.getElementById("qp");
    var note = document.getElementById("note");

    // Fields shown in the components table, in order. The URL API exposes these.
    var FIELDS = [
      ["href", "Full URL"],
      ["origin", "Origin"],
      ["protocol", "Scheme"],
      ["username", "Username"],
      ["password", "Password"],
      ["hostname", "Host"],
      ["port", "Port"],
      ["pathname", "Path"],
      ["search", "Query string"],
      ["hash", "Fragment"]
    ];

    function esc(s) {
      return String(s).replace(/[&<>]/g, function (c) {
        return c === "&" ? "&amp;" : c === "<" ? "&lt;" : "&gt;";
      });
    }

    function copyBtn(label, value) {
      return '<button type="button" class="copy-btn secondary" data-v="' + encodeURIComponent(value) + '">' + label + '</button>';
    }

    function renderParts(url) {
      var html = "";
      FIELDS.forEach(function (f) {
        var key = f[0], label = f[1];
        var val = url[key] || "";
        var empty = !val;
        if (key === "port" && val === "0") { val = ""; empty = true; } // URL API returns "0" only when explicitly set; keep as-is otherwise
        html += '<div class="k">' + label + '</div>';
        html += '<div class="v' + (empty ? " empty" : "") + '">' + esc(empty ? "—" : val) + '</div>';
        html += '<div>' + (empty ? "" : copyBtn("Copy", val)) + '</div>';
      });
      partsEl.innerHTML = html;
    }

    function renderParams(url) {
      var sp;
      try { sp = new URLSearchParams(url.search); }
      catch (e) { sp = null; }
      if (!sp || !Array.from(sp.keys()).length) {
        qpEl.innerHTML = '<div class="qp-empty">No query parameters.</div>';
        return;
      }
      // Preserve order and repeat keys: iterate entries directly.
      var rows = "";
      var idx = 0;
      sp.forEach(function (v, k) {
        rows += "<tr><td><code>" + esc(k) + "</code></td>"
          + "<td><code>" + esc(v) + "</code></td>"
          + '<td style="opacity:.6;font-family:monospace;">#' + (idx++) + "</td></tr>";
      });
      qpEl.innerHTML = '<table class="qp-table"><thead><tr><th>Name</th><th>Value (decoded)</th><th>Index</th></tr></thead><tbody>'
        + rows + "</tbody></table>";
    }

    function run() {
      partsEl.innerHTML = "";
      qpEl.innerHTML = "";
      var raw = inp.value;
      if (!raw.trim()) { note.textContent = "Enter a URL to parse."; return; }
      var url;
      try {
        var base = baseEl.value.trim() || undefined;
        url = new URL(raw.trim(), base);
      } catch (e) {
        note.textContent = "Invalid URL: " + (e.message || e);
        return;
      }
      renderParts(url);
      renderParams(url);
      note.textContent = "Parsed locally. " + Array.from(new URLSearchParams(url.search)).length + " query parameter" + (Array.from(new URLSearchParams(url.search)).length === 1 ? "" : "s") + ".";
    }

    document.getElementById("parse").addEventListener("click", run);
    document.getElementById("clear").addEventListener("click", function () {
      inp.value = ""; baseEl.value = ""; partsEl.innerHTML = ""; qpEl.innerHTML = ""; note.textContent = "Parsed locally with the browser's native URL parser.";
    });

    // Delegate copy clicks.
    document.addEventListener("click", function (e) {
      var b = e.target.closest(".copy-btn");
      if (!b) return;
      var val = decodeURIComponent(b.getAttribute("data-v") || "");
      if (!val) return;
      if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(val).then(function () {
          var t = b.textContent; b.textContent = "Copied!";
          setTimeout(function () { b.textContent = t; }, 1200);
        });
      } else {
        var ta = document.createElement("textarea");
        ta.value = val; document.body.appendChild(ta); ta.select();
        try { document.execCommand("copy"); var t2 = b.textContent; b.textContent = "Copied!"; setTimeout(function () { b.textContent = t2; }, 1200); } catch (x) {}
        ta.remove();
      }
    });
  })();
  </script>
</body>
</html>
