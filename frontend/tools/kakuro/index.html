<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="/assets/theme-init.js"></script>
<title>Kakuro Puzzle — Virtual Tools</title>
<link rel="stylesheet" href="/assets/style.css">
<style>
.tool-wrap{max-width:540px;margin:0 auto;text-align:center;}
.kb{display:inline-grid;gap:1px;background:#666;padding:1px;border-radius:4px;margin:10px auto;}
.kc{width:52px;height:52px;background:var(--bg-alt,#1a1f2e);display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:600;color:var(--text,#eee);cursor:pointer;border:none;outline:none;text-align:center;font-family:inherit;}
.kc.empty{background:#333;cursor:default;}
.kc.clue{background:#5a7a9a;color:#fff;font-size:12px;flex-direction:column;justify-content:flex-start;padding:2px;cursor:default;line-height:1.1;}
.kc.clue .c-top{font-size:10px;align-self:flex-end;width:100%;text-align:right;padding-right:2px;}
.kc.clue .c-bot{font-size:10px;align-self:flex-start;width:100%;text-align:left;padding-left:2px;}
.kc.clue .c-top:empty{display:none;}
.kc.clue .c-bot:empty{display:none;}
.kc.sel{box-shadow:inset 0 0 0 2px #5b8def;}
.kc.err{background:#7a2a2a;}
.controls{margin:15px 0;display:flex;gap:8px;justify-content:center;flex-wrap:wrap;}
.controls button{padding:8px 16px;border-radius:8px;border:1px solid var(--border,#444);background:var(--bg-alt,#1a1f2e);color:var(--text,#eee);cursor:pointer;font-size:14px;}
.controls button:hover{background:var(--accent,#5b8def);color:#fff;}
.numpad{display:grid;grid-template-columns:repeat(5,1fr);gap:4px;max-width:280px;margin:10px auto;}
.numpad button{padding:12px 0;font-size:18px;font-weight:600;border-radius:8px;border:1px solid var(--border,#444);background:var(--bg-alt,#1a1f2e);color:var(--text,#eee);cursor:pointer;}
.numpad button:hover{background:var(--accent,#5b8def);color:#fff;}
.info{color:var(--text-secondary,#888);font-size:13px;margin:8px 0;}
.msg{font-size:16px;font-weight:600;margin:8px 0;min-height:24px;color:var(--accent,#5b8def);}
.puzzles{display:flex;gap:8px;justify-content:center;margin:10px 0;flex-wrap:wrap;}
.puzzles button{padding:6px 14px;border-radius:6px;border:1px solid var(--border,#444);background:var(--bg-alt,#1a1f2e);color:var(--text,#eee);cursor:pointer;font-size:13px;}
.puzzles button.active{background:var(--accent,#5b8def);color:#fff;}
</style>
</head>
<body>
<header id="site-header"></header>
<main>
<div class="tool-wrap">
<h1>Kakuro 🧮</h1>
<p class="tool-desc">Fill empty cells with digits 1-9 so each horizontal/vertical run sums to the clue. No digit repeats within a run.</p>
<div class="puzzles" id="puzzles"></div>
<div class="msg" id="msg">Select a puzzle to start</div>
<div id="board"></div>
<div class="numpad" id="numpad" style="display:none;">
<button onclick="enter(1)">1</button><button onclick="enter(2)">2</button><button onclick="enter(3)">3</button><button onclick="enter(4)">4</button><button onclick="enter(5)">5</button>
<button onclick="enter(6)">6</button><button onclick="enter(7)">7</button><button onclick="enter(8)">8</button><button onclick="enter(9)">9</button><button onclick="enter(0)">⌫</button>
</div>
<div class="controls">
<button onclick="check()">✓ Check</button>
<button onclick="solve()">👁 Solve</button>
<button onclick="clearAll()">🗑 Clear</button>
</div>
<p class="info">Click a cell, then use the numpad or keyboard (1-9 to enter, 0/Backspace to erase).</p>
</div>
</main>
<script src="/assets/app.js"></script>
<script>
const P=[
{name:"Warmup",g:[
[0,0,[3,0],[4,0]],
[0,[0,4],1,2],
[[0,3],2,1,0]]},
{name:"Easy",g:[
[0,0,[7,0],[6,0],[3,0]],
[0,[0,7],3,4,0],
[0,[0,3],1,2,0],
[[0,6],2,1,3,0]]},
{name:"Medium",g:[
[0,0,0,[6,0],[7,0],[3,0]],
[0,0,[0,4],1,3,0],
[0,[0,7],4,3,0,0],
[[0,6],3,1,2,0,0],
[[0,4],1,3,0,0,0],
[0,0,0,0,0,0]]},
{name:"Hard",g:[
[0,0,[7,0],[3,0],[4,0]],
[[0,7],4,3,0,0],
[[0,4],1,3,0,0],
[0,0,0,[0,7],4],
[0,0,[0,3],2,1]]}
];
let cur=0,grid=[],sel=null,solved=false;
const board=document.getElementById('board'),msg=document.getElementById('msg');
function init(){
const ps=document.getElementById('puzzles');
ps.innerHTML=P.map((p,i)=>'<button class="'+(i===cur?'active':'')+'" onclick="load('+i+')">'+p.name+'</button>').join('');
load(cur);
}
function load(idx){cur=idx;solved=false;const p=P[idx];const g=p.g;const R=g.length,C=g[0].length;grid=[];for(let r=0;r<R;r++){const row=[];for(let c=0;c<C;c++){const cell=g[r][c];if(cell===0){row.push({type:'empty'});}else if(typeof cell==='number'){row.push({type:'block'});}else{row.push({type:'clue',top:cell[0]||null,bot:cell[1]||null});}}grid.push(row);}sel=null;render();msg.textContent='Playing: '+p.name;}
function render(){const R=grid.length,C=grid[0].length;let h='<div class="kb" style="grid-template-columns:repeat('+C+',1fr)">';for(let r=0;r<R;r++)for(let c=0;c<C;c++){const cell=grid[r][c];if(cell.type==='empty'){const v=cell.val||'';const sc=sel&&sel.r===r&&sel.c===c?' sel':'';const ec=cell.err?' err':'';h+='<input class="kc'+sc+ec+'" type="text" maxlength="1" value="'+v+'" data-r="'+r+'" data-c="'+c+'" onclick="selectCell('+r+','+c+')" oninput="onInput(this,'+r+','+c+')" readonly>';}else if(cell.type==='clue'){h+='<div class="kc clue"><div class="c-top">'+(cell.bot?'→'+cell.bot:'')+'</div><div class="c-bot">'+(cell.top?'↓'+cell.top:'')+'</div></div>';}else{h+='<div class="kc empty"></div>';}}board.innerHTML=h+'</div>';document.getElementById('numpad').style.display=grid?'grid':'none';}
function selectCell(r,c){sel={r,c};render();}
function enter(n){if(!sel)return;const cell=grid[sel.r][sel.c];if(cell.type!=='empty')return;cell.val=n>0?String(n):'';cell.err=false;checkAuto();render();}
function onInput(el,r,c){}
function check(){let errs=0;for(let r=0;r<grid.length;r++)for(let c=0;c<grid[0].length;c++){const cell=grid[r][c];if(cell.type==='empty'&&cell.val){if(!isValid(r,c,parseInt(cell.val))){cell.err=true;errs++;}else{cell.err=false;}}}render();msg.textContent=errs?'❌ '+errs+' cell(s) violate rules':'✅ All entries look valid';if(errs===0&&isComplete()){msg.textContent='🎉 Solved!';solved=true;}}
function checkAuto(){if(isComplete()&&allValid()){msg.textContent='🎉 Solved!';solved=true;}}
function isComplete(){for(let r=0;r<grid.length;r++)for(let c=0;c<grid[0].length;c++){const cell=grid[r][c];if(cell.type==='empty'&&!cell.val)return false;}return true;}
function allValid(){for(let r=0;r<grid.length;r++)for(let c=0;c<grid[0].length;c++){const cell=grid[r][c];if(cell.type==='empty'&&cell.val){if(!isValid(r,c,parseInt(cell.val)))return false;}}return true;}
function getRuns(r,c){let hStart=c;while(hStart>0&&grid[r][hStart-1].type==='empty')hStart--;let hEnd=c;while(hEnd<grid[0].length-1&&grid[r][hEnd+1].type==='empty')hEnd++;let vStart=r;while(vStart>0&&grid[vStart-1][c].type==='empty')vStart--;let vEnd=r;while(vEnd<grid.length-1&&grid[vEnd+1][c].type==='empty')vEnd++;return{hr:[hStart,hEnd],vr:[vStart,vEnd]};}
function isValid(r,c,val){const runs=getRuns(r,c);const hr=runs.hr,vr=runs.vr;let hSum=0,vSum=0,hDigits=[],vDigits=[];for(let i=hr[0];i<=hr[1];i++){if(i===c){hSum+=val;hDigits.push(val);}else if(grid[r][i].val){hSum+=parseInt(grid[r][i].val);hDigits.push(parseInt(grid[r][i].val));}}for(let i=vr[0];i<=vr[1];i++){if(i===r){vSum+=val;vDigits.push(val);}else if(grid[i][c].val){vSum+=parseInt(grid[i][c].val);vDigits.push(parseInt(grid[i][c].val));}}if(hDigits.length>1&&new Set(hDigits).size!==hDigits.length)return false;if(vDigits.length>1&&new Set(vDigits).size!==vDigits.length)return false;return true;}
function solve(){for(let r=0;r<grid.length;r++)for(let c=0;c<grid[0].length;c++){const cell=grid[r][c];if(cell.type==='empty')cell.val='';}solveRec(0,0);render();if(isComplete())msg.textContent='👁 Solved (revealed)';else msg.textContent='Could not solve automatically';}
function solveRec(r,c){if(r===grid.length)return true;if(c===grid[0].length)return solveRec(r+1,0);const cell=grid[r][c];if(cell.type!=='empty')return solveRec(r,c+1);for(let n=1;n<=9;n++){cell.val=String(n);if(isValid(r,c,n)&&solveRec(r,c+1))return true;}cell.val='';return false;}
function clearAll(){for(let r=0;r<grid.length;r++)for(let c=0;c<grid[0].length;c++){const cell=grid[r][c];if(cell.type==='empty'){cell.val='';cell.err=false;}}render();msg.textContent='Cleared';solved=false;}
document.addEventListener('keydown',e=>{if(!sel)return;if(e.key>='1'&&e.key<='9'){enter(parseInt(e.key));}else if(e.key==='Backspace'||e.key==='Delete'||e.key==='0'){enter(0);}else if(e.key==='ArrowUp'&&sel.r>0){sel.r--;render();}else if(e.key==='ArrowDown'&&sel.r<grid.length-1){sel.r++;render();}else if(e.key==='ArrowLeft'&&sel.c>0){sel.c--;render();}else if(e.key==='ArrowRight'&&sel.c<grid[0].length-1){sel.c++;render();}});
init();
</script>
</body>
</html>
