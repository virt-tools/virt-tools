<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CSS Horizontal Scroll Cards Generator — virt.tools</title>
<link rel="stylesheet" href="/assets/style.css">
<style>
.tool-area{max-width:900px;margin:2rem auto;padding:0 1rem}
.controls{display:grid;gap:1rem;margin:1.5rem 0;padding:1.5rem;background:#1a1a2e;border-radius:12px}
.control-row{display:flex;gap:1rem;align-items:center;flex-wrap:wrap}
.control-row label{min-width:130px;font-weight:600;font-size:.9rem}
.control-row select,.control-row input{padding:.5rem .75rem;border-radius:8px;border:1px solid #444;background:#0f0f1e;color:#eee;font-size:.9rem}
.preview-box{margin:1.5rem 0;border-radius:12px;background:#0f0f1e;padding:1.5rem;overflow:hidden}
.output-block{margin:2rem 0}
.output-block textarea{width:100%;min-height:100px;font-family:monospace;font-size:.85rem;padding:1rem;border-radius:8px;border:1px solid #444;background:#0f0f1e;color:#eee;resize:vertical}
.copy-btn{padding:.6rem 1.2rem;border:none;border-radius:8px;background:#667eea;color:#fff;cursor:pointer;font-size:.9rem;margin-top:.5rem}
h2{margin-top:2rem;font-size:1.2rem}
.hscroll{display:flex;gap:16px;overflow-x:auto;scroll-snap-type:x mandatory;padding:8px;-webkit-overflow-scrolling:touch}
.hscroll::-webkit-scrollbar{height:6px}
.hscroll::-webkit-scrollbar-track{background:#222;border-radius:3px}
.hscroll::-webkit-scrollbar-thumb{background:#667eea;border-radius:3px}
.hscroll-card{min-width:200px;height:160px;border-radius:12px;scroll-snap-align:start;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;padding:1rem}
</style>
</head>
<body>
<header id="site-header"></header>
<main>
<div class="tool-area">
<h1>↔️ CSS Horizontal Scroll Cards Generator</h1>
<p>Create horizontally scrolling card carousels with scroll-snap. Adjustable card count, sizes, colors, and scrollbar styles.</p>
<div class="controls">
<div class="control-row">
<label>Card Count</label><input type="range" id="cardCount" value="6" min="3" max="10" style="width:120px">
<label>Card Width</label><input type="range" id="cardWidth" value="200" min="120" max="300" style="width:120px">
</div>
<div class="control-row">
<label>Card Height</label><input type="range" id="cardHeight" value="160" min="100" max="250" style="width:120px">
<label>Gap</label><input type="range" id="gap" value="16" min="0" max="40" style="width:120px">
</div>
<div class="control-row">
<label>Card Color</label><input type="color" id="cardColor" value="#667eea">
<label>Radius</label><input type="range" id="radius" value="12" min="0" max="24" style="width:120px">
</div>
<div class="control-row">
<label>Snap Type</label><select id="snapType"><option value="x mandatory">X Mandatory</option><option value="x proximity">X Proximity</option><option value="none">None</option></select>
<label>Scrollbar</label><select id="scrollbar"><option value="thin">Thin</option><option value="hidden">Hidden</option><option value="styled">Styled</option></select>
</div>
</div>
<h2>Preview (scroll horizontally)</h2>
<div class="preview-box" id="preview"></div>
<h2>HTML</h2><div class="output-block"><textarea id="htmlOut" readonly></textarea><button class="copy-btn" onclick="copyText('htmlOut')">Copy HTML</button></div>
<h2>CSS</h2><div class="output-block"><textarea id="cssOut" readonly></textarea><button class="copy-btn" onclick="copyText('cssOut')">Copy CSS</button></div>
</div>
</div>
</main>
<script src="/assets/app.js"></script>
<script>
var icons=['📦','🎁','🚀','⭐','💎🔥','🎯','🎨','🌙','☀️'];
function update(){
var n=+document.getElementById('cardCount').value;
var w=+document.getElementById('cardWidth').value;
var h=+document.getElementById('cardHeight').value;
var gap=+document.getElementById('gap').value;
var cc=document.getElementById('cardColor').value;
var rad=document.getElementById('radius').value;
var snap=document.getElementById('snapType').value;
var sb=document.getElementById('scrollbar').value;
var html='<div class="hscroll">\n';
for(var i=0;i<n;i++)html+='  <div class="hscroll-card">'+icons[i%icons.length]+'<span>Card '+(i+1)+'</span></div>\n';
html+='</div>';
var css='.hscroll{display:flex;gap:'+gap+'px;overflow-x:auto;scroll-snap-type:'+snap+';padding:8px;-webkit-overflow-scrolling:touch}\n';
if(sb==='hidden')css+='.hscroll::-webkit-scrollbar{display:none}\n.hscroll{scrollbar-width:none}\n';
else if(sb==='thin')css+='.hscroll::-webkit-scrollbar{height:6px}\n.hscroll::-webkit-scrollbar-track{background:#eee;border-radius:3px}\n.hscroll::-webkit-scrollbar-thumb{background:#999;border-radius:3px}\n';
else css+='.hscroll::-webkit-scrollbar{height:8px}\n.hscroll::-webkit-scrollbar-track{background:'+cc+'22;border-radius:4px}\n.hscroll::-webkit-scrollbar-thumb{background:'+cc+';border-radius:4px}\n';
css+='.hscroll-card{min-width:'+w+'px;height:'+h+'px;border-radius:'+rad+'px;scroll-snap-align:start;background:'+cc+';display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;padding:1rem;color:#fff;font-size:1.1rem;font-weight:600;flex-shrink:0}';
document.getElementById('htmlOut').value=html;
document.getElementById('cssOut').value=css;
var p=document.getElementById('preview');
p.innerHTML='<style>'+css+'</style>'+html;
}
function copyText(id){var t=document.getElementById(id);t.select();document.execCommand('copy')}
document.querySelectorAll('select,input').forEach(function(e){e.addEventListener('input',update);e.addEventListener('change',update)});
update();
</script>
</body>
</html>
