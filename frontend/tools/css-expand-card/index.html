<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CSS Expandable Card Generator — virt.tools</title>
<link rel="stylesheet" href="/assets/style.css">
<style>
.tool-area{max-width:900px;margin:2rem auto;padding:0 1rem}
.controls{display:grid;gap:1rem;margin:1.5rem 0;padding:1.5rem;background:#1a1a2e;border-radius:12px}
.control-row{display:flex;gap:1rem;align-items:center;flex-wrap:wrap}
.control-row label{min-width:130px;font-weight:600;font-size:.9rem}
.control-row select,.control-row input{padding:.5rem .75rem;border-radius:8px;border:1px solid #444;background:#0f0f1e;color:#eee;font-size:.9rem}
.preview-box{margin:1.5rem 0;border-radius:12px;background:#2a2a3e;padding:3rem 1.5rem;min-height:300px;display:flex;align-items:center;justify-content:center;gap:2rem;flex-wrap:wrap}
.output-block{margin:2rem 0}
.output-block textarea{width:100%;min-height:120px;font-family:monospace;font-size:.85rem;padding:1rem;border-radius:8px;border:1px solid #444;background:#0f0f1e;color:#eee;resize:vertical}
.copy-btn{padding:.6rem 1.2rem;border:none;border-radius:8px;background:#667eea;color:#fff;cursor:pointer;font-size:.9rem;margin-top:.5rem}
h2{margin-top:2rem;font-size:1.2rem}
</style>
</head>
<body>
<header id="site-header"></header>
<main>
<div class="tool-area">
<h1>🎴 CSS Expandable Card Generator</h1>
<p>Create CSS cards that expand on hover to reveal more content. 3 trigger modes, 4 themes. Copy HTML+CSS.</p>
<div class="controls">
<div class="control-row">
<label>Trigger</label><select id="trigger"><option value="hover" selected>Hover</option><option value="focus">Focus</option><option value="checkbox">Click (Checkbox)</option></select>
<label>Theme</label><select id="theme"><option value="dark" selected>Dark</option><option value="light">Light</option><option value="gradient">Gradient</option><option value="glass">Glass</option></select>
</div>
<div class="control-row">
<label>Width</label><select id="width"><option value="240">240px</option><option value="300" selected>300px</option><option value="360">360px</option></select>
<label>Expand</label><select id="expand"><option value="height" selected>Height</option><option value="width">Width</option><option value="scale">Scale</option></select>
<label>Accent</label><input type="color" id="accent" value="#667eea">
<label>Radius</label><select id="radius"><option value="0">0</option><option value="12" selected>12px</option><option value="24">24px</option></select>
</div>
</div>
<h2>Preview</h2>
<div class="preview-box" id="preview"></div>
<h2>HTML</h2><div class="output-block"><textarea id="htmlOut" readonly></textarea><button class="copy-btn" onclick="copyText('htmlOut')">Copy HTML</button></div>
<h2>CSS</h2><div class="output-block"><textarea id="cssOut" readonly></textarea><button class="copy-btn" onclick="copyText('cssOut')">Copy CSS</button></div>
</div>
</main>
<script src="/assets/app.js"></script>
<script>
function update(){
var tr=document.getElementById('trigger').value;
var th=document.getElementById('theme').value;
var w=document.getElementById('width').value;
var ex=document.getElementById('expand').value;
var ac=document.getElementById('accent').value;
var r=document.getElementById('radius').value;
var isLight=th==='light';
var isGlass=th==='glass';
var isGrad=th==='gradient';
var bg=isGlass?'rgba(26,26,46,.85)':isLight?'#fff':isGrad?'linear-gradient(135deg,'+ac+',#333)':'#1a1a2e';
var textC=isLight?'#333':'#e0e0e0';
var borderC=isLight?'#ddd':isGlass?'rgba(255,255,255,.1)':'transparent';
var expandProp=ex==='height'?'max-height':ex==='width'?'max-width':'transform';
var expandedVal=ex==='height'?'300px':ex==='width'?'500px':'scale(1.08)';
var collapsedVal=ex==='height'?'180px':ex==='width'?'300px':'scale(1)';
var triggerSel=tr==='hover'?'.exp-card:hover':tr==='focus'?'.exp-card:focus-within':'.exp-card input:checked ~ .exp-content';
var html='<div class="exp-card">\n  '+(tr==='checkbox'?'<input type="checkbox" id="exp-toggle">\n  <label for="exp-toggle" class="exp-label">Click to expand</label>\n  ':'')+'<div class="exp-content">\n    <div class="exp-icon">📊</div>\n    <h3 class="exp-title">Card Title</h3>\n    <p class="exp-desc">Short visible description that fits in collapsed state.</p>\n    <div class="exp-extra">Additional content revealed on '+tr+'.</div>\n  </div>\n</div>';
var css='.exp-card{width:'+w+'px;background:'+bg+';border:1px solid '+borderC+';border-radius:'+r+'px;padding:1.25rem;overflow:hidden;backdrop-filter:'+(isGlass?'blur(12px)':'none')+';transition:all .3s ease;cursor:pointer;box-shadow:0 4px 20px rgba(0,0,0,.2)'+(tr==='checkbox'?'':'')+'}\n';
if(tr==='checkbox'){css+='.exp-card input{display:none}\n.exp-label{display:block;font-weight:700;color:'+ac+';margin-bottom:.5rem;cursor:pointer;font-size:.9rem}\n'}
css+='.exp-content{'+expandProp+':'+collapsedVal+';overflow:hidden;transition:'+expandProp+' .3s ease'+(ex==='scale'?'':'')+'}\n';
css+=triggerSel+' '+expandProp+(ex==='scale'?'':'')+'{'+(ex==='scale'?'':'')+'}\n';
if(ex==='scale'){css+='.exp-card:hover{transform:scale(1.08)}\n'}
else{css+=triggerSel+'{'+expandProp+':'+expandedVal+'!important}\n'}
css+='.exp-icon{font-size:2rem;margin-bottom:.5rem}\n.exp-title{font-size:1.1rem;font-weight:700;color:'+(isLight?'#333':ac)+';margin-bottom:.5rem}\n.exp-desc{font-size:.85rem;color:'+textC+';line-height:1.5;margin-bottom:.5rem}\n.exp-extra{font-size:.8rem;color:'+textC+';opacity:.8;'+expandProp+':'+(ex==='height'?'0':ex==='width'?'0':'1')+';overflow:hidden;transition:'+expandProp+' .3s ease}\n'+triggerSel+' .exp-extra{'+expandProp+':'+(ex==='height'?'100px':ex==='width'?'300px':'1')+'!important}';
document.getElementById('htmlOut').value=html;
document.getElementById('cssOut').value=css;
document.getElementById('preview').innerHTML='<style>'+css+'</style>'+html;
}
function copyText(id){var t=document.getElementById(id);t.select();document.execCommand('copy')}
document.querySelectorAll('select,input').forEach(function(e){e.addEventListener('input',update);e.addEventListener('change',update)});
update();
</script>
</body>
</html>
