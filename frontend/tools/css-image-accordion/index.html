<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CSS Image Accordion Generator — virt.tools</title>
<link rel="stylesheet" href="/assets/style.css">
<style>
.tool-area{max-width:900px;margin:2rem auto;padding:0 1rem}
.controls{display:grid;gap:1rem;margin:1.5rem 0;padding:1.5rem;background:#1a1a2e;border-radius:12px}
.ctrl-row{display:flex;gap:1rem;align-items:center;flex-wrap:wrap;margin-bottom:.5rem}
.ctrl-row label{font-weight:600;font-size:.9rem;min-width:120px}
.ctrl-row select,.ctrl-row input{padding:.5rem;border-radius:8px;border:1px solid #444;background:#0f0f1e;color:#eee}
.preview-box{margin:1.5rem 0;border-radius:12px;padding:2rem;background:#111;min-height:220px;display:flex;gap:4px}
.output-block{margin:2rem 0}
.output-block textarea{width:100%;min-height:80px;font-family:monospace;font-size:.85rem;padding:1rem;border-radius:8px;border:1px solid #444;background:#0f0f1e;color:#eee;resize:vertical}
.copy-btn{padding:.6rem 1.2rem;border:none;border-radius:8px;background:#667eea;color:#fff;cursor:pointer;font-size:.9rem;margin-top:.5rem}
h2{margin-top:2rem;font-size:1.2rem}
.accordion-demo{display:flex;height:200px;gap:4px;border-radius:8px;overflow:hidden}
.acc-panel{flex:1;overflow:hidden;transition:flex .4s ease;cursor:pointer;position:relative;display:flex;align-items:flex-end;padding:10px;color:#fff;font-weight:600}
.acc-panel:hover{flex:5}
.acc-label{white-space:nowrap;opacity:0;transition:opacity .3s .2s}
.acc-panel:hover .acc-label{opacity:1}
</style>
</head>
<body>
<header id="site-header"></header>
<main>
<div class="tool-area">
<h1>🖼️ CSS Image Accordion Generator</h1>
<p>Create CSS accordion image galleries that expand on hover. 3-6 panels, 4 styles, custom colors. Copy HTML+CSS.</p>
<div class="controls">
<div class="ctrl-row">
<label>Panels</label><select id="panels"><option>3</option><option selected>4</option><option>5</option><option>6</option></select>
<label>Height</label><select id="height"><option value="150">150px</option><option value="200" selected>200px</option><option value="300">300px</option><option value="400">400px</option></select>
<label>Expand Mode</label><select id="mode"><option value="hover" selected>Hover</option><option value="click">Click (radio)</option></select>
<label>Accent</label><input type="color" id="accent" value="#667eea">
</div>
<div class="ctrl-row"><button class="copy-btn" onclick="update()">Update</button></div>
</div>
<h2>Preview</h2>
<div class="preview-box" id="preview"></div>
<h2>HTML</h2><div class="output-block"><textarea id="htmlOut" readonly></textarea><button class="copy-btn" onclick="copyText('htmlOut')">Copy HTML</button></div>
<h2>CSS</h2><div class="output-block"><textarea id="cssOut" readonly></textarea><button class="copy-btn" onclick="copyText('cssOut')">Copy CSS</button></div>
</div>
</main>
<script src="/assets/app.js"></script>
<script>
var palette=['#667eea','#764ba2','#f093fb','#4facfe','#43e97b','#fa709a'];
function update(){
var n=+document.getElementById('panels').value;
var h=document.getElementById('height').value;
var mode=document.getElementById('mode').value;
var accent=document.getElementById('accent').value;
var html='',css='.image-accordion{display:flex;height:'+h+'px;gap:4px;border-radius:8px;overflow:hidden}\n';
if(mode==='hover'){css+='.ia-panel{flex:1;overflow:hidden;transition:flex .4s ease;cursor:pointer;position:relative;display:flex;align-items:flex-end;padding:10px;color:#fff;font-weight:600;white-space:nowrap}\n.ia-panel:hover{flex:5}\n.ia-panel .ia-label{opacity:0;transition:opacity .3s .2s}\n.ia-panel:hover .ia-label{opacity:1}\n';
for(var i=0;i<n;i++){html+='<div class="ia-panel" style="background:linear-gradient(135deg,'+palette[i%6]+','+palette[(i+3)%6]+')"><span class="ia-label">Panel '+(i+1)+'</span></div>\n'}
}else{css+='.ia-panel{flex:1;overflow:hidden;transition:flex .4s ease;position:relative;display:flex;align-items:flex-end;padding:10px;color:#fff;font-weight:600;white-space:nowrap}\n.ia-radio{display:none}\n.ia-radio:checked+.ia-panel{flex:5}\n.ia-panel .ia-label{opacity:0;transition:opacity .3s .2s}\n.ia-radio:checked+.ia-panel .ia-label{opacity:1}\n';
for(var i=0;i<n;i++){html+='<input type="radio" name="ia" class="ia-radio" id="ia'+i+'"'+(i===0?' checked':'')+'><label class="ia-panel" for="ia'+i+'" style="background:linear-gradient(135deg,'+palette[i%6]+','+palette[(i+3)%6]+')"><span class="ia-label">Panel '+(i+1)+'</span></label>\n'}}
css+='.ia-label{cursor:pointer}';
document.getElementById('htmlOut').value='<div class="image-accordion">\n'+html+'</div>';
document.getElementById('cssOut').value=css;
var pv='<style>'+css+'</style><div class="image-accordion">'+html.replace(/<(input|label)/g,'<$1').replace(/class="ia-panel"/g,'class="ia-panel"')+'</div>';
if(mode==='click'){pv='<style>'+css+'</style><div class="image-accordion">'+html+'</div>'}else{pv='<style>'+css+'</style><div class="image-accordion">'+html+'</div>'}
document.getElementById('preview').innerHTML=pv;
}
function copyText(id){var t=document.getElementById(id);t.select();document.execCommand('copy')}
['panels','height','mode','accent'].forEach(function(id){document.getElementById(id).addEventListener('change',update)});
document.getElementById('accent').addEventListener('input',update);
update();
</script>
</body>
</html>
