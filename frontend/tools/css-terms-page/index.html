<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CSS Terms of Service Page Generator — virt.tools</title>
<link rel="stylesheet" href="/assets/style.css">
<style>
.tool-area{max-width:900px;margin:2rem auto;padding:0 1rem}
.controls{display:grid;gap:1rem;margin:1.5rem 0;padding:1.5rem;background:#1a1a2e;border-radius:12px}
.control-row{display:flex;gap:1rem;align-items:center;flex-wrap:wrap}
.control-row label{min-width:100px;font-weight:600;font-size:.9rem}
.control-row select,.control-row input{padding:.5rem .75rem;border-radius:8px;border:1px solid #444;background:#0f0f1e;color:#eee;font-size:.9rem}
.preview-box{margin:1.5rem 0;border-radius:12px;min-height:300px;overflow-y:auto;max-height:500px}
.output-block{margin:2rem 0}
.output-block textarea{width:100%;min-height:120px;font-family:monospace;font-size:.85rem;padding:1rem;border-radius:8px;border:1px solid #444;background:#0f0f1e;color:#eee;resize:vertical}
.copy-btn{padding:.6rem 1.2rem;border:none;border-radius:8px;background:#667eea;color:#fff;cursor:pointer;font-size:.9rem;margin-top:.5rem}
h2{margin-top:2rem;font-size:1.2rem}
</style>
</head>
<body>
<header id="site-header"></header>
<main>
<div class="tool-area">
<h1>📄 CSS Terms of Service Page Generator</h1>
<p>Create CSS terms of service / legal page components. 3 styles, 3 themes, custom sections. Copy HTML+CSS.</p>
<div class="controls">
<div class="control-row">
<label>Style</label><select id="style"><option value="clean" selected>Clean</option><option value="card">Card</option><option value="sidebar">Sidebar</option></select>
<label>Theme</label><select id="theme"><option value="light" selected>Light</option><option value="dark">Dark</option><option value="mono">Mono</option></select>
<label>Accent</label><input type="color" id="accent" value="#667eea">
<label>Title</label><input type="text" id="title" value="Terms of Service" style="width:140px">
<label>Updated</label><input type="text" id="updated" value="January 1, 2026" style="width:120px">
<label>Sections</label><select id="sections"><option value="3">3</option><option value="5" selected>5</option><option value="8">8</option></select>
</div>
</div>
<h2>Preview</h2>
<div class="preview-box" id="preview"></div>
<h2>HTML</h2><div class="output-block"><textarea id="htmlOut" readonly></textarea><button class="copy-btn" onclick="copyText('htmlOut')">Copy HTML</button></div>
<h2>CSS</h2><div class="output-block"><textarea id="cssOut" readonly></textarea><button class="copy-btn" onclick="copyText('cssOut')">Copy CSS</button></div>
</div>
</main>
<script src="/assets/app.js"></script>
<script>
var secData=[
['1. Acceptance of Terms','By accessing this website, you agree to be bound by these Terms of Service and all applicable laws and regulations.'],
['2. Use of Service','You may use this service for lawful purposes only. You agree not to use the service in any way that could damage, disable, or impair the website.'],
['3. Intellectual Property','All content on this website, including text, graphics, and code, is the property of the respective owners and is protected by copyright laws.'],
['4. Limitation of Liability','The service is provided "as is" without any warranties. We shall not be liable for any damages arising from the use of this service.'],
['5. Changes to Terms','We reserve the right to modify these terms at any time. Continued use of the service after changes constitutes acceptance of the new terms.'],
['6. Privacy','Your use of the service is also governed by our Privacy Policy. Please review it to understand our practices.'],
['7. Third-Party Links','This website may contain links to third-party websites. We are not responsible for the content or practices of these external sites.'],
['8. Contact','If you have any questions about these Terms, please contact us at the address provided on our website.']
];
function update(){
var style=document.getElementById('style').value,theme=document.getElementById('theme').value;
var accent=document.getElementById('accent').value,title=document.getElementById('title').value;
var updated=document.getElementById('updated').value,n=parseInt(document.getElementById('sections').value);
var bg=theme==='dark'?'#1a1a2e':theme==='mono'?'#f5f5f5':'#fff';
var fg=theme==='dark'?'#e0e0e0':theme==='mono'?'#222':'#333';
var bd=theme==='dark'?'#333':'#ddd';
var html='<div class="tos tos-'+style+'" style="--tos-bg:'+bg+';--tos-fg:'+fg+';--tos-bd:'+bd+';--tos-ac:'+accent+'">\n';
html+='  <div class="tos-header">\n    <h1>'+title+'</h1>\n    <p class="tos-updated">Last updated: '+updated+'</p>\n  </div>\n';
if(style==='sidebar'){
html+='  <nav class="tos-nav">\n';
for(var i=0;i<n;i++){html+='    <a href="#sec-'+i+'">'+secData[i][0]+'</a>\n';}
html+='  </nav>\n';
}
for(var i=0;i<n;i++){
html+='  <section class="tos-section" id="sec-'+i+'">\n    <h2>'+secData[i][0]+'</h2>\n    <p>'+secData[i][1]+'</p>\n  </section>\n';
}
html+='</div>';
var css='.tos{background:var(--tos-bg);color:var(--tos-fg);border:1px solid var(--tos-bd);border-radius:12px;padding:2rem;max-width:800px;margin:0 auto;font-family:system-ui;line-height:1.7}';
css+='\n.tos-header{border-bottom:2px solid var(--tos-ac);padding-bottom:1rem;margin-bottom:1.5rem}';
css+='\n.tos-header h1{color:var(--tos-ac);margin:0;font-size:1.6rem}';
css+='\n.tos-updated{font-size:.85rem;opacity:.6;margin:.5rem 0 0}';
css+='\n.tos-section{margin-bottom:1.5rem}';
css+='\n.tos-section h2{font-size:1.1rem;margin:0 0 .5rem;color:var(--tos-fg)}';
css+='\n.tos-section p{font-size:.95rem;margin:0}';
if(style==='card'){css+='\n.tos-section{background:'+'rgba(0,0,0,.02)'+';border:1px solid var(--tos-bd);border-radius:8px;padding:1rem}';}
if(style==='sidebar'){css+='\n.tos-sidebar .tos{display:grid;grid-template-columns:200px 1fr;gap:2rem}\n.tos-nav{display:flex;flex-direction:column;gap:.5rem;border-right:1px solid var(--tos-bd);padding-right:1rem}\n.tos-nav a{color:var(--tos-fg);text-decoration:none;font-size:.85rem;padding:.3rem .5rem;border-radius:6px}\n.tos-nav a:hover{background:var(--tos-ac);color:#fff}';}
document.getElementById('htmlOut').value=html;
document.getElementById('cssOut').value=css;
document.getElementById('preview').innerHTML='<style>'+css+'<\/style>'+html;
}
function copyText(id){var t=document.getElementById(id);t.select();document.execCommand('copy')}
document.querySelectorAll('select,input').forEach(function(e){e.addEventListener('input',update);e.addEventListener('change',update)});
update();
</script>
</body>
</html>
