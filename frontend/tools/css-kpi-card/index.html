<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CSS KPI Card Generator — virt.tools</title>
<link rel="stylesheet" href="/assets/style.css">
<style>
.tool-area{max-width:900px;margin:2rem auto;padding:0 1rem}
.controls{display:grid;gap:1rem;margin:1.5rem 0;padding:1.5rem;background:#1a1a2e;border-radius:12px}
.control-row{display:flex;gap:1rem;align-items:center;flex-wrap:wrap}
.control-row label{min-width:100px;font-weight:600;font-size:.9rem}
.control-row select,.control-row input{padding:.5rem .75rem;border-radius:8px;border:1px solid #444;background:#0f0f1e;color:#eee;font-size:.9rem}
.preview-box{margin:1.5rem 0;border-radius:12px;background:#2a2a3e;padding:2rem 1.5rem;min-height:140px;display:flex;align-items:center;justify-content:center;gap:1rem;flex-wrap:wrap}
.output-block{margin:2rem 0}
.output-block textarea{width:100%;min-height:120px;font-family:monospace;font-size:.85rem;padding:1rem;border-radius:8px;border:1px solid #444;background:#0f0f1e;color:#eee;resize:vertical}
.copy-btn{padding:.6rem 1.2rem;border:none;border-radius:8px;background:#667eea;color:#fff;cursor:pointer;font-size:.9rem;margin-top:.5rem}
h2{margin-top:2rem;font-size:1.2rem}
</style>
</head>
<body>
<header id="site-header"></header>
<main>
<div class="tool-area">
<h1>📊 CSS KPI Card Generator</h1>
<p>Create CSS KPI/metric/stat cards with trend indicators. 4 styles, trend arrows, icons. Copy HTML+CSS.</p>
<div class="controls">
<div class="control-row">
<label>Style</label><select id="style"><option value="standard" selected>Standard</option><option value="compact">Compact</option><option value="gradient">Gradient</option><option value="outline">Outline</option></select>
<label>Theme</label><select id="theme"><option value="dark" selected>Dark</option><option value="light">Light</option></select>
<label>Trend</label><select id="trend"><option value="up" selected>↑ Up</option><option value="down">↓ Down</option><option value="flat">→ Flat</option><option value="none">None</option></select>
<label>Icon</label><select id="icon"><option value="chart">📊</option><option value="users">👥</option><option value="money">💰</option><option value="cart">🛒</option><option value="eye">👁️</option></select>
</div>
<div class="control-row">
<label>Label</label><input type="text" id="label" value="Total Revenue" style="width:140px">
<label>Value</label><input type="text" id="value" value="$48,250" style="width:100px">
<label>Change</label><input type="text" id="change" value="12.5%" style="width:80px">
<label>Accent</label><input type="color" id="accent" value="#667eea">
</div>
</div>
<h2>Preview</h2>
<div class="preview-box" id="preview"></div>
<h2>HTML</h2><div class="output-block"><textarea id="htmlOut" readonly></textarea><button class="copy-btn" onclick="copyText('htmlOut')">Copy HTML</button></div>
<h2>CSS</h2><div class="output-block"><textarea id="cssOut" readonly></textarea><button class="copy-btn" onclick="copyText('cssOut')">Copy CSS</button></div>
</div>
</main>
<script src="/assets/app.js"></script>
<script>
function update(){
var s=document.getElementById('style').value,th=document.getElementById('theme').value;
var tr=document.getElementById('trend').value,ic=document.getElementById('icon').value;
var lb=document.getElementById('label').value,vl=document.getElementById('value').value;
var ch=document.getElementById('change').value,ac=document.getElementById('accent').value;
var icons={chart:'📊',users:'👥',money:'💰',cart:'🛒',eye:'👁️'};
var cardBg=th==='dark'?'#1a1a2e':'#fff',textCol=th==='dark'?'#eee':'#222',subCol=th==='dark'?'#aaa':'#666';
var trendArrow=tr==='up'?'▲':tr==='down'?'▼':tr==='flat'?'▶':'';
var trendCol=tr==='up'?'#4ade80':tr==='down'?'#f87171':tr==='flat'?'#fbbf24':'transparent';
var html='<div class="kpi-card">\n  <div class="kpi-icon">'+icons[ic]+'</div>\n  <div class="kpi-body">\n    <span class="kpi-label">'+lb+'</span>\n    <span class="kpi-value">'+vl+'</span>\n';
if(tr!=='none'){html+='    <span class="kpi-trend kpi-trend-'+tr+'">'+trendArrow+' '+ch+'</span>\n'}
html+='  </div>\n</div>';
var css='.kpi-card{display:flex;align-items:center;gap:1rem;width:240px;padding:1.25rem;border-radius:16px;';
if(s==='gradient'){css+='background:linear-gradient(135deg,'+ac+',#764ba2);color:#fff'}
else if(s==='outline'){css+='background:'+cardBg+';border:2px solid '+ac+';color:'+textCol}
else{css+='background:'+cardBg+';color:'+textCol}
if(s==='standard'||s==='compact'){css+=';box-shadow:0 4px 20px rgba(0,0,0,0.15)'}
css+=';font-family:system-ui,sans-serif}\n';
css+='.kpi-icon{font-size:'+(s==='compact'?'1.5':'2')+'rem;width:'+(s==='compact'?'40':'48')+'px;height:'+(s==='compact'?'40':'48')+'px;display:flex;align-items:center;justify-content:center;border-radius:12px;background:'+(s==='gradient'?'rgba(255,255,255,0.2)':ac+'20')+'}\n';
css+='.kpi-body{display:flex;flex-direction:column;gap:0.25rem}\n';
css+='.kpi-label{font-size:'+(s==='compact'?'0.7':'0.8')+'rem;color:'+(s==='gradient'?'rgba(255,255,255,0.8)':subCol)+';font-weight:600;text-transform:uppercase;letter-spacing:0.5px}\n';
css+='.kpi-value{font-size:'+(s==='compact'?'1.25':'1.75')+'rem;font-weight:700}\n';
css+='.kpi-trend{font-size:0.8rem;font-weight:600}\n';
css+='.kpi-trend-up{color:'+(s==='gradient'?'#86efac':'#4ade80')+'}\n.kpi-trend-down{color:'+(s==='gradient'?'#fca5a5':'#f87171')+'}\n.kpi-trend-flat{color:'+(s==='gradient'?'#fde68a':'#fbbf24')+'}';
document.getElementById('htmlOut').value=html;
document.getElementById('cssOut').value=css;
document.getElementById('preview').innerHTML='<style>'+css+'<\/style>'+html;
}
function copyText(id){var t=document.getElementById(id);t.select();document.execCommand('copy')}
document.querySelectorAll('select,input').forEach(function(e){e.addEventListener('input',update);e.addEventListener('change',update)});
update();
</script>
</body>
</html>
