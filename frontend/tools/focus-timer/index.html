<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="/assets/theme-init.js"></script>
<title>Focus Timer — Virtual Tools</title>
<link rel="stylesheet" href="/assets/style.css">
<style>
.tool-wrap{max-width:500px;margin:0 auto;text-align:center;}
.tool-desc{font-size:14px;color:var(--text-secondary,#aaa);margin:8px 0 24px;}
.timer-ring{position:relative;width:280px;height:280px;margin:0 auto 24px;}
.timer-ring svg{width:100%;height:100%;transform:rotate(-90deg);}
.timer-ring circle{fill:none;stroke-width:8;}
.ring-bg{stroke:var(--border,#3a3f4e);}
.ring-fg{stroke:var(--accent,#5b8def);stroke-linecap:round;transition:stroke-dashoffset 1s linear;}
.timer-text{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:48px;font-weight:700;font-variant-numeric:tabular-nums;color:var(--text,#eee);}
.timer-label{position:absolute;top:68%;left:50%;transform:translateX(-50%);font-size:13px;color:var(--text-secondary,#888);}
.btn{padding:12px 24px;border-radius:10px;border:none;background:var(--accent,#5b8def);color:#fff;cursor:pointer;font-size:16px;margin:4px;}
.btn:hover{opacity:0.9;}
.btn-sm{padding:8px 16px;font-size:13px;}
.btn-ghost{background:transparent;border:1px solid var(--border,#444);color:var(--text,#eee);}
.presets{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin-bottom:20px;}
.preset{padding:8px 16px;border-radius:8px;border:1px solid var(--border,#444);background:var(--card,#2a2f3e);color:var(--text,#eee);cursor:pointer;font-size:13px;}
.preset.active{border-color:var(--accent,#5b8def);background:var(--accent,#5b8def);color:#fff;}
.stats{font-size:13px;color:var(--text-secondary,#888);margin-top:16px;}
.session-list{font-size:12px;color:var(--text-secondary,#666);margin-top:12px;text-align:left;max-width:300px;margin-left:auto;margin-right:auto;}
.session-list div{padding:4px 0;border-bottom:1px solid var(--border,#2a2f3e);}
.ambient-row{display:flex;gap:8px;justify-content:center;margin:12px 0;flex-wrap:wrap;}
.ambient-btn{padding:6px 12px;border-radius:6px;border:1px solid var(--border,#444);background:var(--card,#2a2f3e);color:var(--text,#eee);cursor:pointer;font-size:12px;}
.ambient-btn.active{border-color:var(--accent,#5b8def);color:var(--accent,#5b8def);}
</style>
</head>
<body>
<header id="site-header"></header>
<main>
<div class="tool-wrap">
<h1>🎯 Focus Timer</h1>
<p class="tool-desc">Distraction-free focus timer with session tracking and optional ambient sound.</p>
<div class="presets">
<div class="preset active" data-min="25" onclick="setPreset(25,this)">25 min</div>
<div class="preset" data-min="50" onclick="setPreset(50,this)">50 min</div>
<div class="preset" data-min="90" onclick="setPreset(90,this)">90 min</div>
<div class="preset" data-min="5" onclick="setPreset(5,this)">5 min break</div>
</div>
<div class="timer-ring">
<svg viewBox="0 0 200 200">
<circle class="ring-bg" cx="100" cy="100" r="92"/>
<circle class="ring-fg" id="ringFg" cx="100" cy="100" r="92" stroke-dasharray="578" stroke-dashoffset="0"/>
</svg>
<div class="timer-text" id="timerText">25:00</div>
<div class="timer-label" id="timerLabel">Ready to focus</div>
</div>
<div>
<button class="btn" id="startBtn" onclick="toggle()">Start</button>
<button class="btn btn-sm btn-ghost" onclick="reset()">Reset</button>
</div>
<div class="ambient-row">
<span style="font-size:12px;color:var(--text-secondary,#888);align-self:center;">Ambient:</span>
<div class="ambient-btn" data-sound="rain" onclick="toggleAmbient('rain',this)">🌧️ Rain</div>
<div class="ambient-btn" data-sound="white" onclick="toggleAmbient('white',this)">📻 White Noise</div>
<div class="ambient-btn" data-sound="brown" onclick="toggleAmbient('brown',this)">🎸 Brown Noise</div>
</div>
<div class="stats" id="stats"></div>
<div class="session-list" id="sessionList"></div>
</div>
</main>
<script src="/assets/app.js"></script>
<script>
let duration=25*60,remaining=25*60,running=false,interval=null;
let audioCtx=null,ambientNode=null,ambientSource=null,currentAmbient=null;
const CIRC=2*Math.PI*92;
functionformat(s){const m=Math.floor(s/60),sec=s%60;return String(m).padStart(2,'0')+':'+String(sec).padStart(2,'0');}
functionupdateRing(){const pct=remaining/duration;document.getElementById('ringFg').setAttribute('stroke-dashoffset',CIRC*(1-pct));document.getElementById('timerText').textContent=format(remaining);}
functionsetPreset(min,el){if(running)return;document.querySelectorAll('.preset').forEach(p=>p.classList.remove('active'));el.classList.add('active');duration=min*60;remaining=duration;updateRing();document.getElementById('timerLabel').textContent='Ready to focus';}
functiontoggle(){if(running){pause();}else{start();}}
functionstart(){running=true;document.getElementById('startBtn').textContent='Pause';document.getElementById('timerLabel').textContent='Focusing...';interval=setInterval(()=>{remaining--;updateRing();if(remaining<=0){complete();}},1000);}
functionpause(){running=false;clearInterval(interval);document.getElementById('startBtn').textContent='Resume';document.getElementById('timerLabel').textContent='Paused';}
functionreset(){running=false;clearInterval(interval);remaining=duration;updateRing();document.getElementById('startBtn').textContent='Start';document.getElementById('timerLabel').textContent='Ready to focus';}
functioncomplete(){running=false;clearInterval(interval);document.getElementById('startBtn').textContent='Start';document.getElementById('timerLabel').textContent='Session complete! 🎉';remaining=duration;updateRing();logSession();beep();}
functionlogSession(){const sessions=JSON.parse(localStorage.getItem('focusSessions')||'[]');sessions.push({date:new Date().toISOString(),minutes:Math.round(duration/60)});if(sessions.length>50)sessions.shift();localStorage.setItem('focusSessions',JSON.stringify(sessions));renderStats();}
functionrenderStats(){const sessions=JSON.parse(localStorage.getItem('focusSessions')||'[]');const total=sessions.reduce((s,x)=>s+x.minutes,0);document.getElementById('stats').textContent=`${sessions.length} sessions • ${total} minutes total`;const recent=sessions.slice(-10).reverse();let html='';recent.forEach(s=>{const d=new Date(s.date);const label=d.toLocaleString([], {month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'});html+=`<div>${label} — ${s.minutes} min</div>`;});document.getElementById('sessionList').innerHTML=html;}
functionbeep(){try{if(!audioCtx)audioCtx=new(AudioContext||webkitAudioContext)();const o=audioCtx.createOscillator(),g=audioCtx.createGain();o.connect(g);g.connect(audioCtx.destination);o.frequency.value=800;g.gain.setValueAtTime(0.3,audioCtx.currentTime);g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+1.5);o.start();o.stop(audioCtx.currentTime+1.5);}catch(e){}}
functiontoggleAmbient(type,el){if(currentAmbient===type){stopAmbient();document.querySelectorAll('.ambient-btn').forEach(b=>b.classList.remove('active'));return;}document.querySelectorAll('.ambient-btn').forEach(b=>b.classList.remove('active'));el.classList.add('active');startAmbient(type);}
functionstartAmbient(type){stopAmbient();currentAmbient=type;try{if(!audioCtx)audioCtx=new(AudioContext||webkitAudioContext)();const bufferSize=audioCtx.sampleRate*2;const buffer=audioCtx.createBuffer(1,bufferSize,audioCtx.sampleRate);const data=buffer.getChannelData(0);if(type==='white'){for(let i=0;i<bufferSize;i++)data[i]=Math.random()*2-1;}else if(type==='brown'){let last=0;for(let i=0;i<bufferSize;i++){const white=Math.random()*2-1;data[i]=(last+0.02*white)/1.02;last=data[i];data[i]*=3.5;}}else if(type==='rain'){for(let i=0;i<bufferSize;i++)data[i]=(Math.random()*2-1)*0.5;const filter=audioCtx.createBiquadFilter();filter.type='lowpass';filter.frequency.value=800;ambientSource=audioCtx.createBufferSource();ambientSource.buffer=buffer;ambientSource.connect(filter);filter.connect(audioCtx.destination);ambientSource.loop=true;ambientSource.start();return;}ambientSource=audioCtx.createBufferSource();ambientSource.buffer=buffer;ambientSource.connect(audioCtx.destination);ambientSource.loop=true;ambientSource.start();}catch(e){}}
functionstopAmbient(){if(ambientSource){try{ambientSource.stop();}catch(e){}ambientSource=null;}currentAmbient=null;}
updateRing();renderStats();
</script>
</body>
</html>
