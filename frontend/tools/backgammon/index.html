<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="/assets/theme-init.js"></script>
<title>Backgammon — Virtual Tools</title>
<link rel="stylesheet" href="/assets/style.css">
<style>
.tool-wrap{max-width:720px;margin:0 auto;text-align:center;}
.tool-desc{font-size:14px;color:var(--text-secondary,#aaa);margin:8px 0;}
#board{display:grid;grid-template-columns:repeat(13,1fr);gap:1px;background:#2a1810;border:3px solid #8B6914;border-radius:8px;padding:4px;margin:8px auto;max-width:680px;}
.point{height:200px;display:flex;flex-direction:column;align-items:center;cursor:pointer;position:relative;}
.point.even{background:#d4a060;}
.point.odd{background:#e8c89a;}
.point.bear{background:#444;height:200px;}
.point-label{font-size:10px;color:#333;position:absolute;bottom:2px;}
.checker{width:28px;height:28px;border-radius:50%;border:2px solid;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;margin-top:-2px;z-index:1;}
.checker.w{background:#f5f5dc;border-color:#8B6914;color:#333;}
.checker.b{background:#2c2c2c;border-color:#000;color:#f5f5dc;}
.bar{grid-column:7;background:#1a0e08;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:0;cursor:pointer;}
.bar .checker{margin-top:-2px;}
.msg{font-size:16px;font-weight:600;margin:8px 0;min-height:24px;color:#f1c40f;}
.dice{font-size:36px;margin:8px;min-height:50px;}
.dice span{display:inline-block;width:50px;height:50px;background:var(--bg-alt,#1a1f2e);border:2px solid var(--accent,#5b8def);border-radius:8px;line-height:50px;margin:0 4px;}
.controls{margin:12px 0;display:flex;gap:8px;justify-content:center;flex-wrap:wrap;}
.controls button{padding:8px 20px;border-radius:6px;border:1px solid var(--border,#444);background:var(--bg-alt,#1a1f2e);color:var(--text,#eee);cursor:pointer;font-size:14px;}
.controls button:hover{background:var(--accent,#5b8def);color:#fff;}
.controls button:disabled{opacity:0.4;cursor:not-allowed;}
.selected{box-shadow:0 0 6px 3px #2ecc71;}
.stats{font-size:14px;margin:4px 0;}
.stats span{color:var(--accent,#5b8def);font-weight:700;}
</style>
</head>
<body>
<header id="site-header"></header>
<main>
<div class="tool-wrap">
<h1>Backgammon 🎲</h1>
<p class="tool-desc">Roll dice, move checkers toward your home board, bear off all 15 to win. Hit single opponent blots to send them to the bar.</p>
<div class="stats">You (white): <span id="w-off">0</span> off | AI (black): <span id="b-off">0</span> off</div>
<div class="msg" id="msg">Roll to start your turn!</div>
<div class="dice" id="dice"></div>
<div id="board"></div>
<div class="controls">
<button id="roll-btn" onclick="rollDice()">🎲 Roll</button>
<button onclick="newGame()">🔄 New Game</button>
</div>
</div>
</main>
<script src="/assets/app.js"></script>
<script>
// Board: 24 points (0-23), bar, off. White moves 23→0, Black moves 0→23.
let points=Array.from({length:24},()=>[]),bar={w:0,b:0},off={w:0,b:0};
let dice=[],moves=[],turn='w',gameOver=false,selected=null;
function newGame(){
points=Array.from({length:24},()=>[]);
// White (player) starts at 23,18; Black (AI) at 0,5
points[23]=Array(2).fill('w');points[12]=Array(5).fill('w');points[7]=Array(3).fill('w');points[5]=Array(5).fill('w');
points[0]=Array(2).fill('b');points[11]=Array(5).fill('b');points[16]=Array(3).fill('b');points[18]=Array(5).fill('b');
bar={w:0,b:0};off={w:0,b:0};dice=[];moves=[];turn='w';gameOver=false;selected=null;
document.getElementById('msg').textContent='Roll to start your turn!';render();
}
function rollDice(){
if(gameOver||dice.length>0)return;
const d=[1+Math.floor(Math.random()*6),1+Math.floor(Math.random()*6)];
dice=d[0]===d[1]?[d[0],d[0],d[0],d[0]]:d;
moves=[...dice];
document.getElementById('dice').innerHTML=dice.map(d=>'<span>'+d+'</span>').join('');
if(!hasAnyMove('w')){document.getElementById('msg').textContent='No legal moves — turn skipped.';dice=[];moves=[];turn='b';render();setTimeout(aiTurn,800);return;}
document.getElementById('msg').textContent='Click a point with your checker, then a destination.';
render();
}
function dest(from,player,die){
if(player==='w'){
if(from==='bar')return 24-die;
const to=from-die;
if(to<0){if(from===5-off_count_w()||die===from+1||(to===-1&&allInHome('w')))return'off';return null;}
return to;
}else{
if(from==='bar')return die-1;
const to=from+die;
if(to>23){if(from===18+off_count_b()||die===24-from||(to===24&&allInHome('b')))return'off';return null;}
return to;
}
}
function off_count_w(){return 15-points.flat().filter(c=>c==='w').length-bar.w-off.w;}
function off_count_b(){return 15-points.flat().filter(c=>c==='b').length-bar.b-off.b;}
function allInHome(p){if(p==='w'){if(bar.w>0)return false;for(let i=6;i<24;i++)if(points[i].some(c=>c==='w'))return false;return true;}else{if(bar.b>0)return false;for(let i=0;i<18;i++)if(points[i].some(c=>c==='b'))return false;return true;}}
function canMove(from,player,die){
const player_color=player;
if(bar[player_color]>0&&from!=='bar')return false;
const to=dest(from,player_color,die);
if(to===null||to===undefined)return false;
if(to==='off')return allInHome(player_color);
const pt=points[to];
if(pt.length>=2&&pt[0]!==player_color)return false;
return true;
}
function hasAnyMove(player){
const dc=moves.length?[...new Set(moves)]:[1,2,3,4,5,6];
if(bar[player]>0){return dc.some(d=>canMove('bar',player,d));}
for(let i=0;i<24;i++){if(points[i].length>0&&points[i][0]===player){if(dc.some(d=>canMove(i,player,d)))return true;}}
return false;
}
function selectPoint(idx){
if(gameOver||turn!=='w'||moves.length===0)return;
if(bar.w>0&&idx!=='bar'){document.getElementById('msg').textContent='You must re-enter from the bar first!';return;}
if(selected===null){
if(idx==='bar'){if(bar.w===0)return;selected='bar';}
else{if(points[idx].length===0||points[idx][0]!=='w')return;selected=idx;}
render();return;
}
// Try to move
const die=moves.find(d=>canMove(selected,'w',d)&&dest(selected,'w',d)===(idx==='off'?'off':idx));
if(die){
doMove(selected,'w',die,idx);
moves=moves.filter((_,i)=>i!==moves.indexOf(die));
if(moves.length===0){dice=[];if(!gameOver){turn='b';render();setTimeout(aiTurn,800);}}
selected=null;
render();
}else{selected=null;render();}
}
function doMove(from,player,die,to){
if(from==='bar')bar[player]--;
else points[from].pop();
if(to==='off'){off[player]++;return;}
const pt=points[to];
if(pt.length===1&&pt[0]!==player){bar[pt[0]]++;pt.pop();}
pt.push(player);
checkWin();
}
function checkWin(){if(off.w===15){gameOver=true;document.getElementById('msg').textContent='🎉 You win!';}if(off.b===15){gameOver=true;document.getElementById('msg').textContent='😢 AI wins!';}}
function aiTurn(){
if(gameOver)return;
const d=[1+Math.floor(Math.random()*6),1+Math.floor(Math.random()*6)];
dice=d[0]===d[1]?[d[0],d[0],d[0],d[0]]:d;
moves=[...dice];
document.getElementById('dice').innerHTML=dice.map(d=>'<span>'+d+'</span>').join('');
document.getElementById('msg').textContent='AI rolled...';
render();
setTimeout(aiPlay,600);
}
function aiPlay(){
if(gameOver||moves.length===0){if(!gameOver){turn='w';dice=[];moves=[];document.getElementById('msg').textContent='Your turn — roll!';render();}return;}
if(!hasAnyMove('b')){moves=[];dice=[];turn='w';document.getElementById('msg').textContent='AI has no moves. Your turn — roll!';render();return;}
// Greedy: prefer hitting blots, then bearing off, then advancing
let best=null;
const dice_left=[...new Set(moves)];
const try_from=bar.b>0?['bar']:Array.from({length:24},(_,i)=>i).filter(i=>points[i].length>0&&points[i][0]==='b');
for(const from of try_from){
for(const die of dice_left){
if(!canMove(from,'b',die))continue;
const to=dest(from,'b',die);
let score=0;
if(to!=='off'){
const pt=points[to];
if(pt.length===1&&pt[0]==='w')score+=50;
if(to>=18)score+=5;
if(from==='bar')score+=10;
}else score+=30;
if(score>(best?.score||-1))best={from,die,to,score};
}
}
if(best){
doMove(best.from,'b',best.die,best.to);
moves=moves.filter((_,i)=>i!==moves.indexOf(best.die));
if(moves.length===0){dice=[];if(!gameOver){turn='w';document.getElementById('msg').textContent='Your turn — roll!';}}
render();if(!gameOver&&moves.length>0)setTimeout(aiPlay,500);else if(!gameOver){turn='w';render();}
}else{moves=[];dice=[];turn='w';document.getElementById('msg').textContent='AI stuck. Your turn — roll!';render();}
}
function buildBoard(){
const board=document.getElementById('board');board.innerHTML='';
// Top: points 12-17, bar, 18-23
for(let i=12;i<=17;i++)board.appendChild(makePoint(i,'even'));
const barEl=makeBar();board.appendChild(barEl);
for(let i=18;i<=23;i++)board.appendChild(makePoint(i,'odd'));
// Bottom: points 11-6, bar space, 5-0
for(let i=11;i>=6;i--)board.appendChild(makePoint(i,'odd'));
board.appendChild(makePoint(-1,'bear')); // spacer
for(let i=5;i>=0;i--)board.appendChild(makePoint(i,'even'));
}
function makePoint(idx,cls){
const el=document.createElement('div');el.className='point '+cls;
if(idx===-1){el.classList.add('bear');return el;}
if(cls==='even'||cls==='odd'){
const checkers=points[idx];
checkers.forEach(c=>{const ck=document.createElement('div');ck.className='checker '+c;ck.textContent=checkers.length>5?checkers.length:'';el.appendChild(ck);});
if(selected===idx)el.classList.add('selected');
el.onclick=()=>selectPoint(idx);
const lbl=document.createElement('div');lbl.className='point-label';lbl.textContent=idx;el.appendChild(lbl);
}
return el;
}
function makeBar(){
const el=document.createElement('div');el.className='bar';
for(let i=0;i<bar.b;i++){const c=document.createElement('div');c.className='checker b';el.appendChild(c);}
el.appendChild(document.createElement('div')).style.height='8px';
for(let i=0;i<bar.w;i++){const c=document.createElement('div');c.className='checker w';el.appendChild(c);}
if(bar.w>0&&turn==='w'){el.classList.add('selected');}
el.onclick=()=>{if(bar.w>0)selectPoint('bar');};
return el;
}
function render(){
buildBoard();
document.getElementById('w-off').textContent=off.w;
document.getElementById('b-off').textContent=off.b;
document.getElementById('roll-btn').disabled=turn!=='w'||dice.length>0||gameOver;
}
newGame();
</script>
</body>
</html>
