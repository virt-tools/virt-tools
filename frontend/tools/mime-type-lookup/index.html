<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <script src="/assets/theme-init.js"></script>
  <title>MIME Type Lookup — Virtual Tools</title>
  <link rel="stylesheet" href="/assets/style.css">
  <style>
    .mime-table { width:100%; border-collapse:collapse; font-size:14px; }
    .mime-table th, .mime-table td { text-align:left; padding:6px 8px; border-bottom:1px solid var(--border, #333); vertical-align:top; }
    .mime-table th { font-weight:600; opacity:.7; }
    .mime-table code { font-family:monospace; }
    .mime-empty { padding:16px; opacity:.6; }
  </style>
</head>
<body>
  <div id="site-header"></div>
  <main>
    <div class="tool-header">
      <a class="back" href="/">← All tools</a>
      <h1>MIME Type Lookup</h1>
      <p>Look up a MIME type by file extension or by name (e.g. <code>json</code>, <code>pdf</code>, <code>text/html</code>). Static reference, runs entirely in your browser — nothing uploaded.</p>
    </div>

    <div class="panel">
      <div class="field">
        <label for="q">Search extension or MIME type</label>
        <input id="q" type="text" placeholder="pdf, jpg, application/json…" autocomplete="off">
      </div>
      <div class="spacer"></div>
      <div id="results"></div>
      <p class="note" id="note">Showing common types. Start typing to filter.</p>
    </div>
  </main>

  <script src="/assets/app.js"></script>
  <script>
  (function () {
    // Extension -> primary MIME. Multiple extensions share a type; the table
    // below lists one row per MIME type with all its common extensions.
    var TYPES = [
      ["application/atom+xml",         ["atom"],                 "Atom syndication feed"],
      ["application/epub+zip",          ["epub"],                 "Electronic publication (EPUB)"],
      ["application/gzip",             ["gz", "gzip"],           "GZIP compressed archive"],
      ["application/java-archive",     ["jar"],                  "Java archive (JAR)"],
      ["application/javascript",       ["js", "mjs"],            "JavaScript"],
      ["application/json",             ["json"],                 "JSON"],
      ["application/ld+json",          ["jsonld"],               "Linked Data JSON"],
      ["application/msword",           ["doc"],                  "Microsoft Word (legacy)"],
      ["application/octet-stream",     ["bin", "exe", "so"],     "Arbitrary binary data"],
      ["application/ogg",              ["ogg"],                  "Ogg container"],
      ["application/pdf",              ["pdf"],                  "Portable Document Format"],
      ["application/pgp-keys",        ["asc", "pgp"],            "OpenPGP keys"],
      ["application/postscript",      ["ps", "eps"],              "PostScript"],
      ["application/rtf",             ["rtf"],                    "Rich Text Format"],
      ["application/tar",             ["tar"],                    "Tar archive"],
      ["application/vnd.android.package-archive", ["apk"],        "Android package"],
      ["application/vnd.apple.mpegurl", ["m3u8"],                 "HLS playlist"],
      ["application/vnd.ms-excel",     ["xls"],                  "Microsoft Excel (legacy)"],
      ["application/vnd.ms-powerpoint",["ppt"],                  "Microsoft PowerPoint (legacy)"],
      ["application/vnd.oasis.opendocument.spreadsheet", ["ods"],  "OpenDocument Spreadsheet"],
      ["application/vnd.oasis.opendocument.text", ["odt"],         "OpenDocument Text"],
      ["application/vnd.openxmlformats-officedocument.presentationml.presentation", ["pptx"], "PowerPoint OOXML"],
      ["application/vnd.openxmlformats-officedocument.spreadsheetml.sheet", ["xlsx"],         "Excel OOXML"],
      ["application/vnd.openxmlformats-officedocument.wordprocessingml.document", ["docx"],   "Word OOXML"],
      ["application/vnd.rar",         ["rar"],                    "RAR archive"],
      ["application/x-7z-compressed", ["7z"],                     "7-Zip archive"],
      ["application/x-bzip",           ["bz"],                    "Bzip archive"],
      ["application/x-bzip2",          ["bz2"],                   "Bzip2 archive"],
      ["application/x-httpd-php",      ["php"],                   "PHP source"],
      ["application/x-sh",            ["sh"],                     "Shell script"],
      ["application/x-shockwave-flash",["swf"],                   "Shockwave Flash"],
      ["application/x-tar",           ["tar"],                    "Tar archive (alt)"],
      ["application/x-xz",            ["xz"],                     "XZ compressed archive"],
      ["application/x-www-form-urlencoded", [""],                 "URL-encoded form payload"],
      ["application/xhtml+xml",       ["xhtml"],                  "XHTML"],
      ["application/xml",             ["xml", "xsl"],             "XML document"],
      ["application/zip",             ["zip"],                     "ZIP archive"],
      ["audio/aac",                   ["aac"],                    "AAC audio"],
      ["audio/flac",                  ["flac"],                    "Free Lossless Audio"],
      ["audio/midi",                  ["mid", "midi"],            "MIDI"],
      ["audio/mpeg",                  ["mp3"],                    "MP3 audio"],
      ["audio/ogg",                   ["oga", "ogg"],             "Ogg audio"],
      ["audio/wav",                   ["wav"],                    "Waveform audio"],
      ["audio/webm",                  ["weba"],                   "WebM audio"],
      ["audio/x-m4a",                 ["m4a"],                    "M4A audio"],
      ["font/otf",                    ["otf"],                     "OpenType font"],
      ["font/ttf",                    ["ttf"],                     "TrueType font"],
      ["font/woff",                   ["woff"],                    "WOFF font"],
      ["font/woff2",                  ["woff2"],                   "WOFF2 font"],
      ["image/avif",                  ["avif"],                    "AVIF image"],
      ["image/bmp",                   ["bmp"],                     "Bitmap image"],
      ["image/gif",                   ["gif"],                     "GIF image"],
      ["image/jpeg",                   ["jpg", "jpeg", "jfif"],    "JPEG image"],
      ["image/png",                   ["png"],                     "PNG image"],
      ["image/svg+xml",               ["svg"],                     "Scalable Vector Graphics"],
      ["image/tiff",                  ["tif", "tiff"],             "TIFF image"],
      ["image/webp",                  ["webp"],                    "WebP image"],
      ["image/x-icon",                ["ico"],                     "Icon"],
      ["image/vnd.microsoft.icon",    ["ico"],                     "Icon (registered)"],
      ["model/gltf-binary",           ["glb"],                     "Binary glTF 3D model"],
      ["model/gltf+json",             ["gltf"],                    "glTF 3D model JSON"],
      ["text/calendar",               ["ics"],                     "iCalendar"],
      ["text/css",                    ["css"],                     "CSS stylesheet"],
      ["text/csv",                    ["csv"],                     "Comma-separated values"],
      ["text/html",                   ["html", "htm"],            "HTML document"],
      ["text/javascript",             ["js"],                      "JavaScript (text)"],
      ["text/markdown",               ["md", "markdown"],         "Markdown"],
      ["text/plain",                  ["txt", "text", "log", "conf", "ini"], "Plain text"],
      ["text/richtext",               ["rtx"],                     "Rich text"],
      ["text/tab-separated-values",   ["tsv"],                     "Tab-separated values"],
      ["text/xml",                    ["xml"],                     "XML (text)"],
      ["text/yaml",                   ["yaml", "yml"],             "YAML"],
      ["video/3gpp",                  ["3gp"],                     "3GPP video"],
      ["video/avi",                   ["avi"],                     "AVI video"],
      ["video/mp4",                   ["mp4", "m4v"],             "MP4 video"],
      ["video/mpeg",                  ["mpeg", "mpg"],            "MPEG video"],
      ["video/ogg",                   ["ogv"],                     "Ogg video"],
      ["video/quicktime",             ["mov"],                     "QuickTime video"],
      ["video/webm",                  ["webm"],                    "WebM video"],
      ["video/x-matroska",            ["mkv"],                     "Matroska video"],
      ["video/x-ms-wmv",              ["wmv"],                     "Windows Media video"]
    ];

    var qEl = document.getElementById("q");
    var results = document.getElementById("results");
    var note = document.getElementById("note");

    function esc(s) {
      return String(s).replace(/[&<>]/g, function (c) {
        return c === "&" ? "&amp;" : c === "<" ? "&lt;" : "&gt;";
      });
    }

    function render(rows) {
      if (!rows.length) {
        results.innerHTML = '<div class="mime-empty">No matching MIME types.</div>';
        note.textContent = "No matches for \"" + qEl.value + "\".";
        return;
      }
      var h = '<table class="mime-table"><thead><tr><th>Extension(s)</th><th>MIME type</th><th>Description</th></tr></thead><tbody>';
      rows.forEach(function (r) {
        var exts = r[1].filter(Boolean).map(function (e) { return "." + e; }).join(", ") || "—";
        h += "<tr><td>" + esc(exts) + "</td><td><code>" + esc(r[0]) + "</code></td><td>" + esc(r[2]) + "</td></tr>";
      });
      h += "</tbody></table>";
      results.innerHTML = h;
      note.textContent = rows.length + " type" + (rows.length === 1 ? "" : "s") + " — static reference, runs locally.";
    }

    function filter() {
      var q = qEl.value.trim().toLowerCase().replace(/^\./, "");
      if (!q) { render(TYPES); return; }
      var out = TYPES.filter(function (r) {
        if (r[0].toLowerCase().indexOf(q) !== -1) return true;
        for (var i = 0; i < r[1].length; i++) {
          if (r[1][i] && r[1][i].toLowerCase().indexOf(q) !== -1) return true;
        }
        return r[2].toLowerCase().indexOf(q) !== -1;
      });
      render(out);
    }

    qEl.addEventListener("input", filter);
    filter();
  })();
  </script>
</body>
</html>
