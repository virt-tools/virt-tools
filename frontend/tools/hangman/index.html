<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <script src="/assets/theme-init.js"></script>
  <title>Hangman — Virtual Tools</title>
  <link rel="stylesheet" href="/assets/style.css">
  <style>
    .game-wrap { max-width: 720px; margin: 0 auto; text-align: center; }
    .svg-wrap { margin: 16px auto; width: 280px; height: 320px; }
    .svg-wrap svg { width: 100%; height: 100%; }
    .svg-wrap line, .svg-wrap circle { stroke: var(--text,#d4d9e0); stroke-width: 3; stroke-linecap: round; fill: none; }
    .svg-wrap .part { opacity: 0; transition: opacity .3s; }
    .svg-wrap .part.show { opacity: 1; }
    .word-display { font-size: 36px; font-weight: 900; letter-spacing: 8px; margin: 24px 0; font-family: monospace; }
    .word-display span { border-bottom: 3px solid var(--border,#2a2f3a); padding: 0 6px; min-width: 28px; display: inline-block; }
    .word-display span.revealed { border-bottom-color: transparent; }
    .alphabet { display: flex; flex-wrap: wrap; gap: 6px; justify-content: center; margin: 20px 0; max-width: 600px; margin: 0 auto; }
    .alphabet button { width: 40px; height: 40px; border: 1px solid var(--border,#2a2f3a); background: var(--bg-panel,#11151c); color: var(--text,#d4d9e0); border-radius: 8px; font-size: 16px; font-weight: 700; cursor: pointer; }
    .alphabet button:hover:not(:disabled) { background: var(--accent,#6ea8fe); color: #08101f; }
    .alphabet button:disabled { opacity: .3; cursor: not-allowed; }
    .alphabet button.correct { background: #22c55e22; color: #4ade80; border-color: #4ade80; }
    .alphabet button.wrong { background: #ef444422; color: #f87171; border-color: #f87171; }
    .status { font-size: 18px; font-weight: 600; margin: 16px 0; min-height: 28px; }
    .status.win { color: #4ade80; }
    .status.lose { color: #f87171; }
    .controls { display: flex; gap: 12px; justify-content: center; align-items: center; flex-wrap: wrap; margin: 20px 0; }
    select, button.new-game { background: var(--bg-panel,#11151c); color: var(--text,#d4d9e0); border: 1px solid var(--border,#2a2f3a); border-radius: 8px; padding: 10px 16px; font-size: 14px; font-weight: 600; }
    button.new-game { background: var(--accent,#6ea8fe); color: #08101f; border: none; cursor: pointer; }
    button.new-game:hover { opacity: .85; }
    .stats { font-size: 14px; opacity: .6; margin-top: 12px; }
    .hint-text { font-size: 12px; opacity: .4; margin-top: 8px; }
  </style>
</head>
<body>
  <div id="site-header"></div>
  <main>
    <div class="tool-header">
      <a class="back" href="/">← All tools</a>
      <h1>Hangman</h1>
      <p>Classic word-guessing game. Choose a difficulty and guess the word before the hangman is complete. Fully client-side with a built-in word list — no network requests.</p>
    </div>
    <div class="panel game-wrap">
      <div class="controls">
        <select id="difficulty">
          <option value="easy">Easy (4-5 letters)</option>
          <option value="medium" selected>Medium (6-8 letters)</option>
          <option value="hard">Hard (9+ letters)</option>
        </select>
        <button class="new-game" id="newGameBtn">New Game</button>
      </div>
      <div class="svg-wrap">
        <svg viewBox="0 0 200 240">
          <line x1="20" y1="220" x2="120" y2="220"/>
          <line x1="40" y1="220" x2="40" y2="20"/>
          <line x1="40" y1="20" x2="120" y2="20"/>
          <line x1="120" y1="20" x2="120" y2="40"/>
          <circle class="part" id="head" cx="120" cy="55" r="15"/>
          <line class="part" id="body" x1="120" y1="70" x2="120" y2="130"/>
          <line class="part" id="larm" x1="120" y1="90" x2="100" y2="110"/>
          <line class="part" id="rarm" x1="120" y1="90" x2="140" y2="110"/>
          <line class="part" id="lleg" x1="120" y1="130" x2="100" y2="160"/>
          <line class="part" id="rleg" x1="120" y1="130" x2="140" y2="160"/>
        </svg>
      </div>
      <div class="word-display" id="wordDisplay"></div>
      <div class="status" id="status"></div>
      <div class="alphabet" id="alphabet"></div>
      <div class="stats" id="stats"></div>
      <p class="hint-text">Click letters or use your keyboard. You have 6 wrong guesses.</p>
    </div>
  </main>
  <script src="/assets/app.js"></script>
  <script>
  (function() {
    const WORDS = {
      easy: ["CAT","DOG","FISH","BIRD","TREE","BOOK","LAMP","DESK","DOOR","MOON","STAR","LAKE","FROG","SHIP","WOLF","BEAR","CAKE","MILK","RAIN","SNOW","KING","QUEEN","BOAT","GOAT","DUCK","FARM","LEAF","ROCK","SALT","WIND","FIRE","GOLD","IRON","JUMP","SWIM","WALK","TALK","SING","DANCE","PLAY","READ","WAVE"],
      medium: ["PLANET","GUITAR","MONKEY","ELEPHANT","DOLPHIN","PENGUIN","CASTLE","DRAGON","WIZARD","KNIGHT","GARDEN","FOREST","BRIDGE","WINDOW","SILVER","GOLDEN","SUNSET","WINTER","SUMMER","SPRING","AUTUMN","ROCKET","GALAXY","COMET","ORBIT","CIRCUIT","PYTHON","BUFFER","SERVER","CLOUD","MEMORY","SCREEN","PIXEL","MATRIX","VECTOR","METHOD","OBJECT","SCHEMA","PARSER","TOKEN","COOKIES","SESSION"],
      hard: ["ADVENTURE","BUTTERFLY","CHOCOLATE","DINOSAUR","EARTHQUAKE","FANTASTIC","GRAVITATION","HELICOPTER","INVENTION","JUXTAPOSE","KNOWLEDGE","LANDSCAPE","MAGNIFICENT","NEIGHBORHOOD","OXYGENATE","PHILOSOPHY","QUADRATIC","REVOLUTION","SILHOUETTE","TELEVISION","UNDERWATER","VOCABULARY","WATERFALL","XYLOPHONE","YOUTHFUL","ZIGZAGGING","ARCHITECTURE","CONSTELLATION","EXTRAORDINARY","MANUFACTURING","PARALLELISM","SUBSTITUTION","THRESHOLD","UNIVERSITY","WAVELENGTH"]
    };
    const PARTS = ["head","body","larm","rarm","lleg","rleg"];
    let word, guessed, wrong, gameOver, wins, losses;
    wins = 0; losses = 0;
    const wordDisplay = document.getElementById('wordDisplay');
    const status = document.getElementById('status');
    const alphabet = document.getElementById('alphabet');
    const stats = document.getElementById('stats');
    const difficulty = document.getElementById('difficulty');

    function newGame() {
      const list = WORDS[difficulty.value];
      word = list[Math.floor(Math.random() * list.length)];
      guessed = new Set();
      wrong = 0;
      gameOver = false;
      status.textContent = '';
      status.className = 'status';
      PARTS.forEach(p => document.getElementById(p).classList.remove('show'));
      renderWord();
      renderAlphabet();
      updateStats();
    }

    function renderWord() {
      wordDisplay.innerHTML = word.split('').map(c => {
        const known = guessed.has(c);
        return `<span class="${known ? 'revealed' : ''}">${known ? c : ''}</span>`;
      }).join('');
    }

    function renderAlphabet() {
      alphabet.innerHTML = '';
      for (let i = 65; i <= 90; i++) {
        const letter = String.fromCharCode(i);
        const btn = document.createElement('button');
        btn.textContent = letter;
        btn.dataset.letter = letter;
        if (guessed.has(letter)) {
          btn.disabled = true;
          btn.classList.add(word.includes(letter) ? 'correct' : 'wrong');
        }
        if (!gameOver) btn.addEventListener('click', () => guess(letter));
        alphabet.appendChild(btn);
      }
    }

    function guess(letter) {
      if (gameOver || guessed.has(letter)) return;
      guessed.add(letter);
      if (word.includes(letter)) {
        renderWord();
        const won = word.split('').every(c => guessed.has(c));
        if (won) { gameOver = true; wins++; status.textContent = '🎉 You won!'; status.className = 'status win'; }
      } else {
        if (wrong < 6) { document.getElementById(PARTS[wrong]).classList.add('show'); wrong++; }
        if (wrong >= 6) { gameOver = true; losses++; status.textContent = `💀 Game over! The word was: ${word}`; status.className = 'status lose'; renderWordReveal(); }
      }
      renderAlphabet();
      updateStats();
    }

    function renderWordReveal() {
      wordDisplay.innerHTML = word.split('').map(c => {
        const known = guessed.has(c);
        return `<span class="revealed" style="color:${known ? '' : '#f87171'}">${c}</span>`;
      }).join('');
    }

    function updateStats() { stats.textContent = `Wins: ${wins} · Losses: ${losses}`; }

    document.addEventListener('keydown', (e) => {
      const k = e.key.toUpperCase();
      if (k.length === 1 && k >= 'A' && k <= 'Z' && !gameOver) guess(k);
    });

    document.getElementById('newGameBtn').addEventListener('click', newGame);
    newGame();
  })();
  </script>
</body>
</html>
