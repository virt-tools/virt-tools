<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="/assets/theme-init.js"></script>
<title>Reaction Time Test — Virtual Tools</title>
<link rel="stylesheet" href="/assets/style.css">
<style>
.tool-wrap{max-width:560px;margin:0 auto;text-align:center;}
#box{width:100%;max-width:500px;height:300px;border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:24px;font-weight:700;cursor:pointer;margin:20px auto;transition:background .15s;user-select:none;}
#box.red{background:#e74c3c;color:#fff;}
#box.green{background:#2ecc71;color:#fff;}
#box.blue{background:#3498db;color:#fff;}
#box.gray{background:var(--bg-panel,#11151c);color:var(--text);border:2px solid var(--border,#2a2f3a);}
#stats{display:flex;gap:24px;justify-content:center;margin:16px 0;font-size:15px;}
#stats span{font-weight:700;}
#history{margin-top:16px;font-size:13px;opacity:.7;}
.bar{display:inline-block;width:8px;height:8px;border-radius:50%;margin:0 2px;vertical-align:middle;}
.tool-desc{opacity:.7;font-size:14px;margin-bottom:8px;}
.btn{border:1px solid var(--border,#2a2f3a);border-radius:8px;padding:8px 18px;font-size:14px;cursor:pointer;background:var(--bg-panel,#11151c);color:var(--text);}
.btn:hover{border-color:var(--accent,#6ea8fe);}
</style>
</head>
<body>
<header id="site-header"></header>
<main>
<div class="tool-wrap">
<h1>Reaction Time Test</h1>
<p class="tool-desc">Click the box when it turns green. Test your reflexes — 5 rounds, then see your average and best time. No tracking, no data sent.</p>
<div id="box" class="gray" onclick="handleClick()">Click to start</div>
<div id="stats" style="display:none">
<div>Round: <span id="round">1</span>/5</div>
<div>Last: <span id="last">—</span> ms</div>
<div>Best: <span id="best">—</span> ms</div>
<div>Avg: <span id="avg">—</span> ms</div>
</div>
<div id="history"></div>
<button class="btn" onclick="reset()" style="margin-top:12px">Reset</button>
</div>
</main>
<script src="/assets/app.js"></script>
<script>
let state='idle',startTime=0,round=0,times=[],timeoutId=null;

function handleClick(){
  const box=document.getElementById('box');
  if(state==='idle'||state==='done'){
    startRound();
  }else if(state==='waiting'){
    clearTimeout(timeoutId);
    box.className='red';
    box.textContent='Too early! Click to retry';
    state='idle';
  }else if(state==='ready'){
    const rt=Date.now()-startTime;
    times.push(rt);
    round++;
    updateStats(rt);
    if(round>=5){
      const avg=Math.round(times.reduce((a,b)=>a+b,0)/times.length);
      const best=Math.min(...times);
      box.className='gray';
      box.textContent='Done! Avg: '+avg+'ms • Best: '+best+'ms\nClick to play again';
      state='done';
    }else{
      box.className='gray';
      box.textContent='Nice! '+rt+'ms — Click for next round';
      state='idle';
    }
  }
}

function startRound(){
  const box=document.getElementById('box');
  document.getElementById('stats').style.display='flex';
  document.getElementById('round').textContent=round+1;
  box.className='red';
  box.textContent='Wait for green...';
  state='waiting';
  const delay=1000+Math.random()*3000;
  timeoutId=setTimeout(()=>{
    box.className='green';
    box.textContent='CLICK!';
    state='ready';
    startTime=Date.now();
  },delay);
}

function updateStats(rt){
  document.getElementById('last').textContent=rt;
  document.getElementById('best').textContent=Math.min(...times);
  document.getElementById('avg').textContent=Math.round(times.reduce((a,b)=>a+b,0)/times.length);
  document.getElementById('round').textContent=Math.min(round+1,5);
  const hist=document.getElementById('history');
  hist.innerHTML=times.map((t,i)=>{
    const c=t<250?'#2ecc71':t<350?'#f1c40f':t<450?'#e67e22':'#e74c3c';
    return '<span class="bar" style="background:'+c+'"></span>'+t+'ms';
  }).join(' &nbsp; ');
}

function reset(){
  clearTimeout(timeoutId);
  state='idle';round=0;times=[];
  document.getElementById('box').className='gray';
  document.getElementById('box').textContent='Click to start';
  document.getElementById('stats').style.display='none';
  document.getElementById('history').innerHTML='';
}
</script>
</body>
</html>
