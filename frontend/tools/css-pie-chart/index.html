<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CSS Pie Chart Generator — virt.tools</title>
<link rel="stylesheet" href="/assets/style.css">
<style>
.tool-area{max-width:900px;margin:2rem auto;padding:0 1rem}
.controls{display:grid;gap:1rem;margin:1.5rem 0;padding:1.5rem;background:#1a1a2e;border-radius:12px}
.seg-row{display:grid;grid-template-columns:1fr 60px 100px 40px;gap:.5rem;align-items:center;margin-bottom:.5rem}
.seg-row input,.seg-row select{padding:.4rem;border-radius:6px;border:1px solid #444;background:#0f0f1e;color:#eee;font-size:.85rem}
.seg-row button{padding:.4rem;border:none;border-radius:6px;background:#ef4444;color:#fff;cursor:pointer}
.preview-box{margin:1.5rem 0;border-radius:12px;min-height:250px;padding:2rem;background:#f5f5f5;display:flex;align-items:center;justify-content:center;gap:2rem;flex-wrap:wrap}
.output-block{margin:2rem 0}
.output-block textarea{width:100%;min-height:100px;font-family:monospace;font-size:.85rem;padding:1rem;border-radius:8px;border:1px solid #444;background:#0f0f1e;color:#eee;resize:vertical}
.copy-btn{padding:.6rem 1.2rem;border:none;border-radius:8px;background:#667eea;color:#fff;cursor:pointer;font-size:.9rem;margin-top:.5rem}
h2{margin-top:2rem;font-size:1.2rem}
.add-btn{padding:.5rem 1rem;border:none;border-radius:8px;background:#10b981;color:#fff;cursor:pointer;margin-top:.5rem}
.ctrl-row{display:flex;gap:1rem;align-items:center;flex-wrap:wrap;margin-bottom:.5rem}
.ctrl-row label{font-weight:600;font-size:.9rem;min-width:100px}
.ctrl-row select{padding:.5rem;border-radius:8px;border:1px solid #444;background:#0f0f1e;color:#eee}
</style>
</head>
<body>
<header id="site-header"></header>
<main>
<div class="tool-area">
<h1>🥧 CSS Pie Chart Generator</h1>
<p>Create CSS pie chart components using conic-gradient. 2-8 segments, custom labels and colors. Copy HTML+CSS.</p>
<div class="controls">
<div class="ctrl-row"><label>Size</label><select id="size"><option value="120">Small</option><option value="180" selected>Medium</option><option value="240">Large</option></select>
<label>Show Legend</label><select id="legend"><option value="yes" selected>Yes</option><option value="no">No</option></select>
<label>Show Labels</label><select id="labels"><option value="yes" selected>Yes</option><option value="no">No</option></select></div>
<div id="segments"></div>
<button class="add-btn" onclick="addSegment()">+ Add Segment</button>
</div>
<h2>Preview</h2>
<div class="preview-box" id="preview"></div>
<h2>HTML</h2><div class="output-block"><textarea id="htmlOut" readonly></textarea><button class="copy-btn" onclick="copyText('htmlOut')">Copy HTML</button></div>
<h2>CSS</h2><div class="output-block"><textarea id="cssOut" readonly></textarea><button class="copy-btn" onclick="copyText('cssOut')">Copy CSS</button></div>
</div>
</main>
<script src="/assets/app.js"></script>
<script>
var colors=['#3b82f6','#ef4444','#10b981','#f59e0b','#8b5cf6','#ec4899','#14b8a6','#f97316'];
var segs=[{label:'Slice A',val:30},{label:'Slice B',val:25},{label:'Slice C',val:20},{label:'Slice D',val:25}];
function renderSegs(){var c=document.getElementById('segments');c.innerHTML='';
segs.forEach(function(s,i){var d=document.createElement('div');d.className='seg-row';
d.innerHTML='<input value="'+s.label+'" onchange="segs['+i+'].label=this.value;update()" style="width:100%">'+
'<input type="number" value="'+s.val+'" min="1" max="100" onchange="segs['+i+'].val=+this.value;update()">'+
'<select onchange="segs['+i+'].color=this.value;update()">'+colors.map(function(co){return '<option value="'+co+'"'+(s.color===co||(!s.color&&colors[i]===co)?' selected':'')+' style="background:'+co+'">'+co+'</option>'}).join('')+'</select>'+(segs.length>2?'<button onclick="segs.splice('+i+',1);renderSegs();update()">✕</button>':'<span></span>');
c.appendChild(d)})}
function addSegment(){if(segs.length<8){segs.push({label:'Slice '+String.fromCharCode(65+segs.length),val:20,color:colors[segs.length]});renderSegs();update()}}
function update(){var sz=+document.getElementById('size').value;var showLeg=document.getElementById('legend').value==='yes';var showLbl=document.getElementById('labels').value==='yes';
var total=segs.reduce(function(a,s){return a+s.val},0);var acc=0;var stops=[];
segs.forEach(function(s,i){var col=s.color||colors[i];var pct=s.val/total*100;stops.push(col+' '+acc+'% '+(acc+pct)+'%');acc+=pct});
var gradient='conic-gradient('+stops.join(',')+')';
var pie='<div style="display:flex;gap:2rem;align-items:center;flex-wrap:wrap">\n  <div class="pie-chart" style="width:'+sz+'px;height:'+sz+'px;border-radius:50%;background:'+gradient+';position:relative">\n'+(showLbl?segs.map(function(s,i){var col=s.color||colors[i];var mid=0;for(var j=0;j<i;j++)mid+=segs[j].val/total*360;mid+=s.val/total*360/2;var rad=(mid-90)*Math.PI/180;var r=sz*0.32;var x=Math.cos(rad)*r+sz/2;var y=Math.sin(rad)*r+sz/2;return '    <span style="position:absolute;left:'+x.toFixed(1)+'px;top:'+y.toFixed(1)+'px;transform:translate(-50%,-50%);font-size:'+(sz/14)+'px;font-weight:700;color:#fff;text-shadow:0 1px 2px rgba(0,0,0,.5)">'+s.val+'%</span>\n'}).join(''):'')+'  </div>\n';
if(showLeg){pie+='  <div class="pie-legend" style="display:flex;flex-direction:column;gap:.4rem">\n';segs.forEach(function(s,i){var col=s.color||colors[i];pie+='    <div style="display:flex;align-items:center;gap:.5rem;font-size:.85rem"><span style="width:14px;height:14px;border-radius:3px;background:'+col+';display:inline-block"></span> '+s.label+' ('+s.val+'%)</div>\n'});pie+='  </div>\n'}
pie+='</div>';
var css='.pie-chart{box-shadow:0 4px 12px rgba(0,0,0,.1);transition:transform .3s}\n.pie-chart:hover{transform:scale(1.05)}\n.pie-legend{padding:1rem}';
document.getElementById('htmlOut').value=pie;document.getElementById('cssOut').value=css;
document.getElementById('preview').innerHTML=pie}
function copyText(id){var t=document.getElementById(id);t.select();document.execCommand('copy')}
segs.forEach(function(s,i){s.color=colors[i]});
document.getElementById('size').addEventListener('change',update);
document.getElementById('legend').addEventListener('change',update);
document.getElementById('labels').addEventListener('change',update);
renderSegs();update();
</script>
</body>
</html>
