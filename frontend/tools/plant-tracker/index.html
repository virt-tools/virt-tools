<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="/assets/theme-init.js"></script>
<title>Plant Tracker — Virtual Tools</title>
<link rel="stylesheet" href="/assets/style.css">
<style>
.tool-wrap{max-width:700px;margin:0 auto;}
.tool-desc{font-size:14px;color:var(--text-secondary,#aaa);margin:8px 0 16px;}
.card{border:1px solid var(--border,#333);border-radius:12px;padding:20px;background:var(--bg-alt,#1a1f2e);margin-bottom:16px;}
label{display:block;font-size:12px;color:var(--text-secondary,#888);margin-bottom:4px;margin-top:12px;}
input,select{width:100%;padding:10px;border-radius:8px;border:1px solid var(--border,#444);background:var(--bg,#2a2f3e);color:var(--text,#eee);font-size:14px;box-sizing:border-box;}
.btn{padding:10px 20px;border-radius:8px;border:none;background:var(--accent,#5b8def);color:#fff;cursor:pointer;font-size:14px;margin-top:12px;}
.btn:hover{opacity:0.9;}
.btn-sm{padding:6px 12px;font-size:12px;}
.plant-card{border:1px solid var(--border,#333);border-radius:10px;padding:14px;margin-bottom:12px;background:var(--bg,#2a2f3e);display:flex;gap:14px;align-items:flex-start;}
.plant-emoji{font-size:36px;}
.plant-info{flex:1;}
.plant-name{font-weight:700;font-size:16px;}
.plant-meta{font-size:12px;color:var(--text-secondary,#888);margin-top:4px;}
.plant-actions{display:flex;gap:6px;margin-top:8px;}
.status-badge{display:inline-block;padding:2px 8px;border-radius:12px;font-size:11px;font-weight:700;}
.badge-ok{background:rgba(76,175,80,0.2);color:#4caf50;}
.badge-due{background:rgba(255,193,7,0.2);color:#ffc107;}
.badge-late{background:rgba(244,67,54,0.2);color:#f44336;}
.empty{text-align:center;padding:30px;color:var(--text-secondary,#888);}
.row{display:flex;gap:12px;}.row>div{flex:1;}
</style>
</head>
<body>
<header id="site-header"></header>
<main>
<div class="tool-wrap">
<h1>Plant Tracker 🌿</h1>
<p class="tool-desc">Track your houseplants with watering schedules, last-watered dates, and care notes. Get alerts when plants are due or overdue. All stored locally.</p>
<div class="card">
<h3>Add Plant</h3>
<div class="row">
<div><label>Plant Name</label><input type="text" id="pname" placeholder="e.g. Monstera"></div>
<div><label>Emoji</label><input type="text" id="pemoji" placeholder="🪴" value="🪴"></div>
</div>
<div class="row">
<div><label>Watering Interval (days)</label><input type="number" id="pinterval" value="7" min="1"></div>
<div><label>Last Watered Date</label><input type="date" id="plast"></div>
</div>
<label>Care Notes</label><input type="text" id="pnotes" placeholder="e.g. Bright indirect light, mist weekly">
<button class="btn" onclick="addPlant()">Add Plant</button>
</div>
<div id="plants"></div>
</div>
</main>
<script src="/assets/app.js"></script>
<script>
const KEY='plant_tracker_v1';
function load(){try{return JSON.parse(localStorage.getItem(KEY))||[];}catch(e){return[];}}
function save(a){localStorage.setItem(KEY,JSON.stringify(a));}
function todayStr(){const d=new Date();return d.toISOString().slice(0,10);}
function daysBetween(d1,d2){return Math.round((new Date(d2)-new Date(d1))/(86400000));}
function esc(s){return s.replace(/</g,'&lt;');}
function statusFor(p){
const last=p.lastWatered;if(!last)return{cls:'badge-due',text:'Water me'};
const diff=daysBetween(last,todayStr());
if(diff>=p.interval+1)return{cls:'badge-late',text:`${diff-p.interval}d overdue`};
if(diff>=p.interval)return{cls:'badge-due',text:'Due today'};
return{cls:'badge-ok',text:`${p.interval-diff}d left`};
}
function addPlant(){
const name=document.getElementById('pname').value.trim();if(!name)return;
const emoji=document.getElementById('pemoji').value.trim()||'🪴';
const interval=parseInt(document.getElementById('pinterval').value)||7;
const lastWatered=document.getElementById('plast').value||todayStr();
const notes=document.getElementById('pnotes').value.trim();
const arr=load();arr.push({id:Date.now(),name,emoji,interval,lastWatered,notes});save(arr);
document.getElementById('pname').value='';document.getElementById('pnotes').value='';render();
}
function waterPlant(id){
const arr=load();const p=arr.find(p=>p.id===id);if(p)p.lastWatered=todayStr();save(arr);render();
}
function deletePlant(id){const arr=load().filter(p=>p.id!==id);save(arr);render();}
function render(){
const arr=load();const c=document.getElementById('plants');
if(!arr.length){c.innerHTML='<div class="card"><div class="empty">No plants yet. Add one above! 🪴</div></div>';return;}
c.innerHTML=arr.map(p=>{
const st=statusFor(p);
const last=p.lastWatered?daysBetween(p.lastWatered,todayStr())+' days ago':'never';
return `<div class="plant-card"><div class="plant-emoji">${esc(p.emoji)}</div><div class="plant-info"><div class="plant-name">${esc(p.name)}</div><div class="plant-meta">Every ${p.interval}d • Last watered: ${last}</div>${p.notes?`<div class="plant-meta">${esc(p.notes)}</div>`:''}<div class="plant-meta"><span class="status-badge ${st.cls}">${st.text}</span></div><div class="plant-actions"><button class="btn btn-sm" onclick="waterPlant(${p.id})">💧 Water</button><button class="btn btn-sm" onclick="deletePlant(${p.id})" style="background:#f44336">Delete</button></div></div></div>`;
}).join('');
}
render();
</script>
</body>
</html>
