<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CSS Sticky Header Generator — virt.tools</title>
<link rel="stylesheet" href="/assets/style.css">
<style>
.tool-area{max-width:900px;margin:2rem auto;padding:0 1rem}
.controls{display:grid;gap:1rem;margin:1.5rem 0;padding:1.5rem;background:#1a1a2e;border-radius:12px}
.ctrl-row{display:flex;gap:1rem;align-items:center;flex-wrap:wrap;margin-bottom:.5rem}
.ctrl-row label{font-weight:600;font-size:.9rem;min-width:120px}
.ctrl-row select,.ctrl-row input{padding:.5rem;border-radius:8px;border:1px solid #444;background:#0f0f1e;color:#eee}
.preview-box{margin:1.5rem 0;border-radius:12px;padding:0;background:#111;min-height:300px;overflow:hidden}
.output-block{margin:2rem 0}
.output-block textarea{width:100%;min-height:100px;font-family:monospace;font-size:.85rem;padding:1rem;border-radius:8px;border:1px solid #444;background:#0f0f1e;color:#eee;resize:vertical}
.copy-btn{padding:.6rem 1.2rem;border:none;border-radius:8px;background:#667eea;color:#fff;cursor:pointer;font-size:.9rem;margin-top:.5rem}
h2{margin-top:2rem;font-size:1.2rem}
</style>
</head>
<body>
<header id="site-header"></header>
<main>
<div class="tool-area">
<h1>📌 CSS Sticky Header Generator</h1>
<p>Create CSS sticky/fixed header navigation components. 4 styles, 3 themes, scroll-aware shrink. Copy HTML+CSS.</p>
<div class="controls">
<div class="ctrl-row">
<label>Style</label><select id="style"><option value="solid" selected>Solid</option><option value="blur">Blur/Glass</option><option value="transparent">Transparent</option><option value="gradient">Gradient</option></select>
<label>Theme</label><select id="theme"><option value="dark" selected>Dark</option><option value="light">Light</option><option value="colorful">Colorful</option></select>
</div>
<div class="ctrl-row">
<label>Height</label><input type="text" id="height" value="64px" style="width:60px">
<label>Shrink on scroll</label><select id="shrink"><option value="no" selected>No</option><option value="yes">Yes</option></select>
<label>Shadow</label><select id="shadow"><option value="no">No</option><option value="yes" selected>Yes</option></select>
</div>
<div class="ctrl-row">
<label>Logo text</label><input type="text" id="logo" value="Brand" style="width:80px">
<label>Nav items</label><input type="text" id="navitems" value="Home,About,Services,Contact" style="width:200px">
<label>Accent</label><input type="color" id="accent" value="#667eea" style="width:40px;height:34px">
</div>
<div class="ctrl-row"><button class="copy-btn" onclick="update()">Update</button></div>
</div>
<h2>Preview</h2>
<div class="preview-box" id="preview"></div>
<h2>HTML</h2><div class="output-block"><textarea id="htmlOut" readonly></textarea><button class="copy-btn" onclick="copyText('htmlOut')">Copy HTML</button></div>
<h2>CSS</h2><div class="output-block"><textarea id="cssOut" readonly></textarea><button class="copy-btn" onclick="copyText('cssOut')">Copy CSS</button></div>
</div>
</main>
<script src="/assets/app.js"></script>
<script>
function update(){
var style=document.getElementById('style').value;
var theme=document.getElementById('theme').value;
var height=document.getElementById('height').value;
var shrink=document.getElementById('shrink').value;
var shadow=document.getElementById('shadow').value;
var logo=document.getElementById('logo').value;
var navitems=document.getElementById('navitems').value.split(',');
var accent=document.getElementById('accent').value;
var bg,tx;
if(theme==='dark'){bg='#1a1a2e';tx='#eee'}
else if(theme==='light'){bg='#fff';tx='#333'}
else{bg='linear-gradient(135deg,'+accent+',#764ba2)';tx='#fff'}
var headerBg;
if(style==='blur')headerBg='rgba('+(theme==='light'?'255,255,255':'26,26,46')+',0.7);backdrop-filter:blur(10px)';
else if(style==='transparent')headerBg='transparent';
else if(style==='gradient')headerBg='linear-gradient(135deg,'+accent+',#764ba2)';
else headerBg=bg;
var sh=shadow==='yes'?'box-shadow:0 2px 10px rgba(0,0,0,.15);':'';
var sh2=shrink==='yes'?'  transition:all .3s ease;\n}\n.sticky-header.scrolled{\n  height:calc('+height+' * 0.75);\n  font-size:.9em':'';
var itemsHtml=navitems.map(function(i){return '<a href="#">'+i.trim()+'</a>'}).join('\n    ');
var html='<header class="sticky-header">\n  <div class="sticky-header-inner">\n    <div class="sticky-logo">'+logo+'</div>\n    <nav class="sticky-nav">\n    '+itemsHtml+'\n    </nav>\n  </div>\n</header>';
var css='.sticky-header{\n  position:sticky;\n  top:0;\n  left:0;\n  right:0;\n  height:'+height+';\n  background:'+headerBg+';\n  color:'+tx+';\n  '+sh+'\n  z-index:100;\n  display:flex;\n  align-items:center;'+sh2+'\n}\n.sticky-header-inner{\n  max-width:1200px;\n  margin:0 auto;\n  width:100%;\n  padding:0 1.5rem;\n  display:flex;\n  justify-content:space-between;\n  align-items:center;\n}\n.sticky-logo{\n  font-weight:700;\n  font-size:1.25rem;\n  color:'+tx+'\n}\n.sticky-nav{\n  display:flex;\n  gap:1.5rem;\n}\n.sticky-nav a{\n  color:'+tx+';\n  text-decoration:none;\n  font-size:.95rem;\n  transition:color .2s;\n}\n.sticky-nav a:hover{\n  color:'+accent+';\n}';
document.getElementById('htmlOut').value=html;
document.getElementById('cssOut').value=css;
var pv='<div style="position:relative;height:300px;overflow-y:auto;background:#0a0a16">';
pv+='<header style="position:sticky;top:0;height:'+height+';background:'+headerBg+';color:'+tx+';'+sh+'z-index:100;display:flex;align-items:center">';
pv+='<div style="max-width:100%;width:100%;padding:0 1.5rem;display:flex;justify-content:space-between;align-items:center">';
pv+='<div style="font-weight:700;font-size:1.25rem">'+logo+'</div>';
pv+='<nav style="display:flex;gap:1.5rem">'+navitems.map(function(i){return '<a href="#" style="color:'+tx+';text-decoration:none;font-size:.9rem">'+i.trim()+'</a>'}).join('')+'</nav>';
pv+='</div></header>';
for(var i=0;i<8;i++)pv+='<div style="padding:2rem;color:#999">Content section '+(i+1)+'</div>';
pv+='</div>';
document.getElementById('preview').innerHTML=pv;
}
function copyText(id){var t=document.getElementById(id);t.select();document.execCommand('copy')}
['style','theme','height','shrink','shadow','logo','navitems','accent'].forEach(function(id){var el=document.getElementById(id);el.addEventListener(el.tagName==='SELECT'?'change':el.type==='color'?'input':'input',update)});
update();
</script>
</body>
</html>
