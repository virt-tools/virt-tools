<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="/assets/theme-init.js"></script>
<title>CSS Card Generator — Virtual Tools</title>
<link rel="stylesheet" href="/assets/style.css">
<style>
.tool-wrap{max-width:720px;margin:0 auto;}
.tool-desc{font-size:14px;color:var(--text-secondary,#aaa);margin:8px 0 20px;}
.controls{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin:12px 0;}
.ctrl{display:flex;flex-direction:column;gap:4px;}
.ctrl label{font-size:12px;color:var(--text-secondary,#888);}
.ctrl input,.ctrl select{padding:6px 8px;border-radius:6px;border:1px solid var(--border,#444);background:var(--bg,#1e2230);color:var(--text,#eee);font-size:13px;}
.ctrl input[type="color"]{padding:2px;height:34px;}
button.action{padding:8px 16px;border-radius:6px;border:1px solid var(--border,#444);background:var(--card,#2a2f3e);color:var(--text,#eee);cursor:pointer;font-size:13px;margin:4px 4px 0 0;}
button.action:hover{border-color:var(--accent,#5b8def);}
.preview{background:var(--bg,#1e2230);border:1px solid var(--border,#444);border-radius:8px;padding:30px;margin:12px 0;display:flex;justify-content:center;align-items:center;}
.code-block{background:var(--bg,#1e2230);border:1px solid var(--border,#444);border-radius:8px;padding:12px;margin:8px 0;font-family:monospace;font-size:11px;color:var(--text,#eee);white-space:pre-wrap;word-break:break-all;max-height:350px;overflow:auto;}
.card{width:260px;padding:20px;border-radius:12px;background:#2a2f3e;transition:all .3s;cursor:pointer}
.card:hover{transform:translateY(-4px)}
.card .icon{font-size:32px;margin-bottom:12px}
.card .title{font-size:16px;font-weight:700;margin-bottom:8px;color:#eee}
.card .body{font-size:13px;color:#aaa;line-height:1.5}
.card .tag{display:inline-block;margin-top:12px;padding:4px 10px;border-radius:20px;font-size:11px;font-weight:600}
</style>
</head>
<body>
<header id="site-header"></header>
<main>
<div class="tool-wrap">
<h1>🃏 CSS Card Generator</h1>
<p class="tool-desc">Create CSS card components with shadows, borders, hover effects, and gradients. 6 presets, copy HTML+CSS.</p>
<div class="controls">
<div class="ctrl"><label>Background</label><input type="color" id="bg" value="#2a2f3e" oninput="render()"></div>
<div class="ctrl"><label>Text Color</label><input type="color" id="tc" value="#eeeeee" oninput="render()"></div>
<div class="ctrl"><label>Tag Color</label><input type="color" id="tagc" value="#5b8def" oninput="render()"></div>
<div class="ctrl"><label>Radius</label><input type="range" id="br" min="0" max="40" value="12" oninput="render()"></div>
<div class="ctrl"><label>Shadow</label><select id="sh" onchange="render()"><option value="0">None</option><option value="1" selected>Small</option><option value="2">Medium</option><option value="3">Large</option><option value="4">Colored Glow</option></select></div>
<div class="ctrl"><label>Hover</label><select id="hv" onchange="render()"><option value="0">None</option><option value="1" selected>Lift</option><option value="2">Scale</option><option value="3">Tilt</option><option value="4">Glow</option></select></div>
<div class="ctrl"><label>Border</label><select id="bd" onchange="render()"><option value="0">None</option><option value="1">1px solid</option><option value="2" selected>1px subtle</option></select></div>
<div class="ctrl"><label>Gradient</label><select id="gr" onchange="render()"><option value="0">None</option><option value="1">Top-Left</option><option value="2">Diagonal</option><option value="3">Radial</option></select></div>
</div>
<div class="preview" id="prev"></div>
<div style="margin:8px 0;"><button class="action" onclick="copyCode()">Copy HTML+CSS</button></div>
<div class="code-block" id="code"></div>
</div>
</main>
<script src="/assets/app.js"></script>
<script>
let codeText='';
const shadows={0:'none',1:'0 2px 8px rgba(0,0,0,.15)',2:'0 4px 16px rgba(0,0,0,.2)',3:'0 8px 32px rgba(0,0,0,.3)',4:'0 0 20px '};
const hovers={0:'none',1:'translateY(-4px)',2:'scale(1.05)',3:'rotate(-1deg) translateY(-2px)',4:'translateY(-2px)'};
function render(){
const bg=v('bg'),tc=v('tc'),tagc=v('tagc'),br=v('br'),sh=v('sh'),hv=v('hv'),bd=v('bd'),gr=v('gr');
const card=document.getElementById('prev');
let shadow=shadows[sh];
if(sh==='4')shadow=shadows[4]+tagc+'40';
let border=bd==='0'?'none':bd==='1'?'1px solid '+tc+'20':'1px solid rgba(255,255,255,.08)';
let bgStyle=bg;
if(gr==='1')bgStyle=`linear-gradient(135deg,${bg},${tagc}40)`;
else if(gr==='2')bgStyle=`linear-gradient(45deg,${bg},${tagc}30)`;
else if(gr==='3')bgStyle=`radial-gradient(circle at 30% 30%,${tagc}20,${bg})`;
card.innerHTML=`<div class="card" style="border-radius:${br}px;background:${bgStyle};box-shadow:${shadow};border:${border}"><div class="icon">🚀</div><div class="title" style="color:${tc}">Card Title</div><div class="body" style="color:${tc}99">This is a sample card body. Edit colors, shadows, radius, and hover effects above.</div><div class="tag" style="background:${tagc}20;color:${tagc}">Tag</div></div>`;
card.querySelector('.card').style.transition='all .3s';
card.querySelector('.card').onmouseenter=function(){if(hv!=='0')this.style.transform=hovers[hv];if(hv==='4')this.style.boxShadow='0 0 30px '+tagc+'60'};
card.querySelector('.card').onmouseleave=function(){this.style.transform='';this.style.boxShadow=shadow};
const css=`.card{width:260px;padding:20px;border-radius:${br}px;background:${bgStyle};box-shadow:${shadow};border:${border};transition:all .3s;cursor:pointer}
.card:hover{transform:${hovers[hv]};${hv==='4'?`box-shadow:0 0 30px ${tagc}60`:''}}
.card .icon{font-size:32px;margin-bottom:12px}
.card .title{font-size:16px;font-weight:700;margin-bottom:8px;color:${tc}}
.card .body{font-size:13px;color:${tc}99;line-height:1.5}
.card .tag{display:inline-block;margin-top:12px;padding:4px 10px;border-radius:20px;font-size:11px;font-weight:600;background:${tagc}20;color:${tagc}}`;
codeText=`<!-- HTML -->\n<div class="card">\n  <div class="icon">🚀</div>\n  <div class="title">Card Title</div>\n  <div class="body">Card body text here.</div>\n  <div class="tag">Tag</div>\n</div>\n\n<!-- CSS -->\n<style>\n${css}\n</style>`;
document.getElementById('code').textContent=codeText;
}
function v(id){return document.getElementById(id).value;}
function copyCode(){navigator.clipboard.writeText(codeText).then(()=>alert('Code copied!')).catch(()=>alert('Copy failed'));}
render();
</script>
</body>
</html>
