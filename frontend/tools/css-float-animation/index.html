<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CSS Floating Animation Generator — virt.tools</title>
<link rel="stylesheet" href="/assets/style.css">
<style>
.tool-area{max-width:900px;margin:2rem auto;padding:0 1rem}
.controls{display:grid;gap:1rem;margin:1.5rem 0;padding:1.5rem;background:#1a1a2e;border-radius:12px}
.control-row{display:flex;gap:1rem;align-items:center;flex-wrap:wrap}
.control-row label{min-width:120px;font-weight:600;font-size:.9rem}
.control-row select,.control-row input{padding:.5rem .75rem;border-radius:8px;border:1px solid #444;background:#0f0f1e;color:#eee;font-size:.9rem}
.preview-box{margin:1.5rem 0;padding:3rem 2rem;background:#0f0f1e;border-radius:12px;min-height:300px;display:flex;align-items:center;justify-content:center;overflow:hidden}
.float-demo{width:120px;height:120px;background:linear-gradient(135deg,#4a9eff,#9b59b6);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:3rem;box-shadow:0 10px 40px rgba(74,158,255,.4)}
.output-block{margin:2rem 0}
.output-block textarea{width:100%;min-height:120px;font-family:monospace;font-size:.85rem;padding:1rem;border-radius:8px;border:1px solid #444;background:#0f0f1e;color:#eee;resize:vertical}
.copy-btn{padding:.6rem 1.2rem;border:none;border-radius:8px;background:#4a9eff;color:#fff;cursor:pointer;font-size:.9rem;margin-top:.5rem}
h2{margin-top:2rem;font-size:1.2rem}
</style>
</head>
<body>
<header id="site-header"></header>
<main>
<div class="tool-area">
<h1>🎈 CSS Floating Animation Generator</h1>
<p>Create CSS floating/bobbing/levitating animations. 6 presets, adjustable distance/speed/easing. Copy CSS.</p>
<div class="controls">
<div class="control-row">
<label>Animation</label><select id="anim"><option value="float">Float Up-Down</option><option value="float-x">Float Left-Right</option><option value="bob">Gentle Bob</option><option value="levitate">Levitate</option><option value="drift">Drift</option><option value="pulse-float">Pulse Float</option></select>
<label>Easing</label><select id="easing"><option value="ease-in-out">Ease In Out</option><option value="ease">Ease</option><option value="linear">Linear</option><option value="cubic-bezier(0.45,0,0.55,1)">Smooth</option></select>
</div>
<div class="control-row">
<label>Distance (px)</label><input type="number" id="distance" value="20" min="2" max="100" style="width:60px">
<label>Duration (s)</label><input type="number" id="duration" value="3" min="0.5" max="20" step="0.5" style="width:60px">
<label>Delay (s)</label><input type="number" id="delay" value="0" min="0" max="5" step="0.1" style="width:60px">
</div>
<div class="control-row">
<label>Iterations</label><select id="iter"><option value="infinite">Infinite</option><option value="1">1</option><option value="2">2</option><option value="3">3</option><option value="5">5</option><option value="10">10</option></select>
<label>Icon</label><select id="icon"><option value="🎈">🎈 Balloon</option><option value="⭐">⭐ Star</option><option value="🌙">🌙 Moon</option><option value="☁️">☁️ Cloud</option><option value="🛸">🛸 UFO</option><option value="🫧">🫧 Bubble</option><option value="✨">✨ Sparkle</option><option value="📦">📦 Box</option></select>
</div>
</div>
<h2>Preview</h2>
<div class="preview-box"><div class="float-demo" id="demo">🎈</div></div>
<h2>CSS</h2><div class="output-block"><textarea id="cssOut" readonly></textarea><button class="copy-btn" onclick="copyText('cssOut')">Copy CSS</button></div>
</div>
</main>
<script src="/assets/app.js"></script>
<script>
function update(){
var anim=document.getElementById('anim').value;
var easing=document.getElementById('easing').value;
var distance=parseInt(document.getElementById('distance').value);
var duration=parseFloat(document.getElementById('duration').value);
var delay=parseFloat(document.getElementById('delay').value);
var iter=document.getElementById('iter').value;
var icon=document.getElementById('icon').value;
var name='floatAnim';
var keyframes='';
if(anim==='float'){keyframes='@keyframes '+name+' {\n  0%,100% { transform: translateY(0); }\n  50% { transform: translateY(-'+distance+'px); }\n}';}
else if(anim==='float-x'){keyframes='@keyframes '+name+' {\n  0%,100% { transform: translateX(0); }\n  50% { transform: translateX('+distance+'px); }\n}';}
else if(anim==='bob'){keyframes='@keyframes '+name+' {\n  0%,100% { transform: translateY(0) rotate(0deg); }\n  25% { transform: translateY(-'+(distance*0.5)+'px) rotate(-3deg); }\n  75% { transform: translateY(-'+(distance*0.5)+'px) rotate(3deg); }\n}';}
else if(anim==='levitate'){keyframes='@keyframes '+name+' {\n  0%,100% { transform: translateY(0) scale(1); }\n  50% { transform: translateY(-'+distance+'px) scale(1.05); }\n}';}
else if(anim==='drift'){keyframes='@keyframes '+name+' {\n  0% { transform: translate(0,0) rotate(0deg); }\n  25% { transform: translate('+distance+'px,-'+(distance*0.5)+'px) rotate(5deg); }\n  50% { transform: translate(0,-'+distance+'px) rotate(0deg); }\n  75% { transform: translate(-'+distance+'px,-'+(distance*0.5)+'px) rotate(-5deg); }\n  100% { transform: translate(0,0) rotate(0deg); }\n}';}
else if(anim==='pulse-float'){keyframes='@keyframes '+name+' {\n  0%,100% { transform: translateY(0); box-shadow: 0 10px 20px rgba(0,0,0,0.2); }\n  50% { transform: translateY(-'+distance+'px); box-shadow: 0 30px 40px rgba(0,0,0,0.15); }\n}';}
var css=keyframes+'\n\n.float-element {\n  animation: '+name+' '+duration+'s '+easing+' '+delay+'s '+iter+';\n}';
document.getElementById('cssOut').value=css;
var demo=document.getElementById('demo');
demo.textContent=icon;
demo.style.animation='none';
void demo.offsetWidth;
demo.style.animation=name+' '+duration+'s '+easing+' '+delay+'s '+(iter==='infinite'?'infinite':iter);
var styleId='float-demo-style';
var oldS=document.getElementById(styleId);
if(oldS)oldS.remove();
var s=document.createElement('style');
s.id=styleId;
s.textContent=keyframes;
document.head.appendChild(s);
}
function copyText(id){var t=document.getElementById(id);t.select();document.execCommand('copy')}
document.querySelectorAll('select,input').forEach(function(e){e.addEventListener('input',update);e.addEventListener('change',update)});
update();
</script>
</body>
</html>
