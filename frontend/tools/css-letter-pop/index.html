<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CSS Letter Pop Generator — virt.tools</title>
<link rel="stylesheet" href="/assets/style.css">
<style>
.tool-area{max-width:900px;margin:2rem auto;padding:0 1rem}
.controls{display:grid;gap:1rem;margin:1.5rem 0;padding:1.5rem;background:#1a1a2e;border-radius:12px}
.ctrl-row{display:flex;gap:1rem;align-items:center;flex-wrap:wrap;margin-bottom:.5rem}
.ctrl-row label{font-weight:600;font-size:.9rem;min-width:120px}
.ctrl-row select,.ctrl-row input{padding:.5rem;border-radius:8px;border:1px solid #444;background:#0f0f1e;color:#eee}
.preview-box{margin:1.5rem 0;padding:3rem;border-radius:12px;min-height:150px;background:#0a0a1a;display:flex;align-items:center;justify-content:center;overflow:hidden}
.output-block{margin:2rem 0}
.output-block textarea{width:100%;min-height:80px;font-family:monospace;font-size:.85rem;padding:1rem;border-radius:8px;border:1px solid #444;background:#0f0f1e;color:#eee;resize:vertical}
.copy-btn{padding:.6rem 1.2rem;border:none;border-radius:8px;background:#667eea;color:#fff;cursor:pointer;font-size:.9rem;margin-top:.5rem}
h2{margin-top:2rem;font-size:1.2rem}
.pop-text{font-size:3rem;font-weight:700;color:#fff;cursor:default}
.pop-text span{display:inline-block;transition:transform .3s,color .3s}
.pop-text:hover span{transform:translateY(-10px) scale(1.2);color:#667eea}
</style>
</head>
<body>
<header id="site-header"></header>
<main>
<div class="tool-area">
<h1>🔤 CSS Letter Pop Generator</h1>
<p>Create CSS letter-by-letter stagger animations on hover. Adjustable direction, delay, color, scale. Copy HTML+CSS+JS.</p>
<div class="controls">
<div class="ctrl-row"><label>Text</label><input type="text" id="popText" value="virt.tools" size="20"></div>
<div class="ctrl-row"><label>Direction</label><select id="direction"><option value="up" selected>Up</option><option value="down">Down</option><option value="left">Left</option><option value="right">Right</option><option value="scale">Scale</option><option value="rotate">Rotate</option></select></div>
<div class="ctrl-row"><label>Hover Color</label><input type="color" id="hoverColor" value="#667eea"><label>Scale</label><select id="scale"><option value="1.1">1.1x</option><option value="1.2" selected>1.2x</option><option value="1.3">1.3x</option><option value="1.5">1.5x</option></select></div>
<div class="ctrl-row"><label>Stagger Delay</label><select id="stagger"><option value="0.02">20ms</option><option value="0.04" selected>40ms</option><option value="0.06">60ms</option><option value="0.08">80ms</option></select><label>Duration</label><select id="duration"><option value="0.2">200ms</option><option value="0.3" selected>300ms</option><option value="0.5">500ms</option></select></div>
<div class="ctrl-row"><button class="copy-btn" onclick="update()">Update</button></div>
</div>
<h2>Preview (hover over text)</h2>
<div class="preview-box" id="preview"></div>
<h2>HTML</h2><div class="output-block"><textarea id="htmlOut" readonly></textarea><button class="copy-btn" onclick="copyText('htmlOut')">Copy HTML</button></div>
<h2>CSS</h2><div class="output-block"><textarea id="cssOut" readonly></textarea><button class="copy-btn" onclick="copyText('cssOut')">Copy CSS</button></div>
<h2>JS</h2><div class="output-block"><textarea id="jsOut" readonly></textarea><button class="copy-btn" onclick="copyText('jsOut')">Copy JS</button></div>
</div>
</main>
<script src="/assets/app.js"></script>
<script>
function update(){
var txt=document.getElementById('popText').value||'Hello';
var dir=document.getElementById('direction').value;
var hc=document.getElementById('hoverColor').value;
var sc=document.getElementById('scale').value;
var st=document.getElementById('stagger').value;
var du=document.getElementById('duration').value;
var dx={up:'translateY(-10px)',down:'translateY(10px)',left:'translateX(-10px)',right:'translateX(10px)',scale:'scale('+sc+')',rotate:'rotate(15deg) scale('+sc+')'}[dir];
var html='<div class="pop-text">'+txt.split('').map(function(c,i){return '<span style="transition-delay:'+(i*st)+'s">'+(c===' '?'&nbsp;':c)+'</span>'}).join('')+'</div>';
var css='.pop-text{font-size:3rem;font-weight:700;cursor:default}\n.pop-text span{display:inline-block;transition:transform '+du+'s ease, color '+du+'s ease}\n.pop-text:hover span{transform:'+dx+';color:'+hc+'}';
var js='// No JS needed — pure CSS hover effect!\n// Each span has inline transition-delay for stagger.';
document.getElementById('htmlOut').value=html;
document.getElementById('cssOut').value=css;
document.getElementById('jsOut').value=js;
var p=document.getElementById('preview');
p.innerHTML='<style>'+css+'</style>'+html;
}
function copyText(id){var t=document.getElementById(id);t.select();document.execCommand('copy')}
['popText','direction','hoverColor','scale','stagger','duration'].forEach(function(id){var el=document.getElementById(id);el.addEventListener('input',update);el.addEventListener('change',update)});
update();
</script>
</body>
</html>
