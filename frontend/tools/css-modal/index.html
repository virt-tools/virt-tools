<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="/assets/theme-init.js"></script>
<title>CSS Modal Generator — Virtual Tools</title>
<link rel="stylesheet" href="/assets/style.css">
<style>
.tool-wrap{max-width:800px;margin:0 auto;}
.tool-desc{font-size:14px;color:var(--text-secondary,#aaa);margin:8px 0 20px;}
.controls{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin:12px 0;}
.ctrl{display:flex;flex-direction:column;gap:4px;}
.ctrl label{font-size:12px;color:var(--text-secondary,#888);}
.ctrl input,.ctrl select,.ctrl textarea{padding:6px 8px;border-radius:6px;border:1px solid var(--border,#444);background:var(--bg,#1e2230);color:var(--text,#eee);font-size:13px;}
.ctrl textarea{resize:vertical;min-height:40px;}
button.action{padding:8px 16px;border-radius:6px;border:1px solid var(--border,#444);background:var(--card,#2a2f3e);color:var(--text,#eee);cursor:pointer;font-size:13px;margin:4px 4px 0 0;}
.preview{background:var(--bg,#1e2230);border:1px solid var(--border,#444);border-radius:8px;padding:24px;margin:12px 0;min-height:300px;position:relative;overflow:hidden;}
.code-block{background:var(--bg,#1e2230);border:1px solid var(--border,#444);border-radius:8px;padding:12px;margin:8px 0;font-family:monospace;font-size:11px;color:var(--text,#eee);white-space:pre-wrap;word-break:break-all;max-height:400px;overflow:auto;}
.modal-overlay{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.5);}
.modal-box{background:#fff;color:#222;border-radius:12px;padding:24px;max-width:350px;width:80%;box-shadow:0 8px 32px rgba(0,0,0,.3);}
.modal-title{font-size:18px;font-weight:bold;margin:0 0 8px;}
.modal-body{font-size:14px;margin:0 0 16px;line-height:1.5;}
.modal-close{position:absolute;top:12px;right:16px;font-size:20px;cursor:pointer;color:#999;border:none;background:none;}
.modal-btn{padding:8px 20px;border-radius:6px;border:none;cursor:pointer;font-size:14px;}
</style>
</head>
<body>
<header id="site-header"></header>
<main>
<div class="tool-wrap">
<h1>🪟 CSS Modal Generator</h1>
<p class="tool-desc">Create CSS modal/dialog components with overlay, animations, and close button. 5 animation styles, custom colors. Copy HTML+CSS.</p>
<div class="controls">
<div class="ctrl"><label>Width (px)</label><input type="number" id="wd" value="400" min="200" max="800" oninput="render()"></div>
<div class="ctrl"><label>Radius</label><input type="range" id="ra" min="0" max="24" value="12" oninput="render()"></div>
<div class="ctrl"><label>Animation</label><select id="an" onchange="render()"><option value="0">None</option><option value="1" selected>Scale-in</option><option value="2">Slide-down</option><option value="3">Fade</option><option value="4">Bounce</option></select></div>
<div class="ctrl"><label>Overlay</label><select id="ov" onchange="render()"><option value="0" selected>Dark</option><option value="1">Light</option><option value="2">Blur</option></select></div>
<div class="ctrl"><label>Title</label><input type="text" id="ti" value="Confirm Action" oninput="render()"></div>
<div class="ctrl" style="grid-column:1/-1"><label>Body Text</label><textarea id="bo" rows="2" oninput="render()">Are you sure you want to proceed? This action cannot be undone.</textarea></div>
</div>
<div style="margin:8px 0;"><button class="action" onclick="copyCode()">Copy HTML+CSS</button></div>
<div class="preview" id="prev"></div>
<div class="code-block" id="code"></div>
</div>
</main>
<script src="/assets/app.js"></script>
<script>
let codeText='';
function render(){
const wd=v('wd'),ra=v('ra'),an=parseInt(v('an')),ov=parseInt(v('ov')),ti=v('ti'),bo=v('bo');
const ovCSS=ov===0?'background:rgba(0,0,0,.5)':ov===1?'background:rgba(255,255,255,.4)':`background:rgba(0,0,0,.3);backdrop-filter:blur(4px)`;
const animCSS=an===1?'@keyframes modalScale{from{opacity:0;transform:scale(.8)}to{opacity:1;transform:scale(1)}}.modal-box{animation:modalScale .25s ease}':an===2?'@keyframes modalSlide{from{opacity:0;transform:translateY(-40px)}to{opacity:1;transform:translateY(0)}}.modal-box{animation:modalSlide .3s ease}':an===3?'@keyframes modalFade{from{opacity:0}to{opacity:1}}.modal-box{animation:modalFade .3s ease}':an===4?'@keyframes modalBounce{0%{opacity:0;transform:scale(.7)}60%{opacity:1;transform:scale(1.05)}100%{transform:scale(1)}}.modal-box{animation:modalBounce .4s ease}':'';
const html=`<div class="modal-overlay">
  <div class="modal-box">
    <button class="modal-close">&times;</button>
    <h2 class="modal-title">${ti}</h2>
    <p class="modal-body">${bo}</p>
    <button class="modal-btn" style="background:#6366f1;color:#fff">Confirm</button>
    <button class="modal-btn" style="background:#e5e7eb;color:#333;margin-left:8px">Cancel</button>
  </div>
</div>`;
const css=`.modal-overlay{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;${ovCSS};z-index:999}
.modal-box{background:#fff;color:#222;border-radius:${ra}px;padding:24px;max-width:${wd}px;width:90%;box-shadow:0 8px 32px rgba(0,0,0,.3);position:relative}
.modal-title{font-size:18px;font-weight:bold;margin:0 0 8px}
.modal-body{font-size:14px;margin:0 0 16px;line-height:1.5;color:#666}
.modal-close{position:absolute;top:12px;right:16px;font-size:24px;cursor:pointer;color:#999;border:none;background:none;line-height:1}
.modal-close:hover{color:#333}
.modal-btn{padding:8px 20px;border-radius:6px;border:none;cursor:pointer;font-size:14px}${animCSS?'\n'+animCSS:''}`;
document.getElementById('prev').innerHTML=`<style>${css}</style>${html}`;
codeText=`<!-- HTML -->\n${html}\n\n<!-- CSS -->\n<style>\n${css}\n</style>`;
document.getElementById('code').textContent=codeText;
}
function v(id){return document.getElementById(id).value;}
function copyCode(){navigator.clipboard.writeText(codeText).then(()=>alert('Code copied!')).catch(()=>alert('Copy failed'));}
render();
</script>
</body>
</html>
