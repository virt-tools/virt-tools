<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="/assets/theme-init.js"></script>
<title>Stress Ball — Virtual Tools</title>
<link rel="stylesheet" href="/assets/style.css">
<style>
.tool-wrap{max-width:500px;margin:0 auto;text-align:center;}
.tool-desc{font-size:14px;color:var(--text-secondary,#aaa);margin:8px 0;}
canvas{margin:12px auto;display:block;cursor:grab;touch-action:none;}
.controls{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin:8px 0;align-items:center;}
.controls button{padding:8px 16px;border-radius:6px;border:1px solid var(--border,#444);background:var(--bg-alt,#1a1f2e);color:var(--text,#eee);cursor:pointer;font-size:14px;}
.controls button:hover{background:var(--accent,#5b8def);color:#fff;}
label{font-size:13px;color:var(--text-secondary,#aaa);}
input[type=color]{width:36px;height:28px;border:none;border-radius:4px;cursor:pointer;}
.stats{font-size:13px;color:var(--text-secondary,#aaa);margin:8px 0;}
</style>
</head>
<body>
<header id="site-header"></header>
<main>
<div class="tool-wrap">
<h1>Stress Ball 🟢</h1>
<p class="tool-desc">Click and hold to squeeze. Release to let it bounce back. Track your squeezes for stress relief.</p>
<canvas id="cv" width="320" height="320"></canvas>
<div class="stats">Squeezes: <span id="cnt">0</span> | Time squeezed: <span id="tms">0.0s</span></div>
<div class="controls">
<label>Color: <input type="color" id="color" value="#5cb85c"></label>
<button onclick="resetStats()">↺ Reset Stats</button>
</div>
</div>
</main>
<script src="/assets/app.js"></script>
<script>
const cv=document.getElementById('cv'),ctx=cv.getContext('2d');
let squeezing=false,squeeze=0,count=0,totalMs=0,startT=0;
const ball={x:160,y:160,r:100};
function getColor(){return document.getElementById('color').value;}
function draw(){ctx.clearRect(0,0,cv.width,cv.height);const sq=squeeze*0.3;const rx=ball.r+sq*1.5;const ry=ball.r-sq*1.5;ctx.save();ctx.translate(ball.x,ball.y);ctx.fillStyle=getColor();ctx.beginPath();ctx.ellipse(0,0,rx,ry,0,0,Math.PI*2);ctx.fill();ctx.fillStyle='rgba(255,255,255,0.25)';ctx.beginPath();ctx.ellipse(-rx*0.3,-ry*0.3,rx*0.3,ry*0.3,0,0,Math.PI*2);ctx.fill();ctx.restore();}
function loop(){if(squeezing&&squeeze<1)squeeze+=0.04;if(!squeezing&&squeeze>0)squeeze-=0.08;if(squeeze<0)squeeze=0;draw();requestAnimationFrame(loop);}
cv.addEventListener('mousedown',()=>{squeezing=true;startT=Date.now();count++;document.getElementById('cnt').textContent=count;});
cv.addEventListener('mouseup',()=>{squeezing=false;if(startT){totalMs+=Date.now()-startT;document.getElementById('tms').textContent=(totalMs/1000).toFixed(1)+'s';}});
cv.addEventListener('mouseleave',()=>{if(squeezing){squeezing=false;if(startT){totalMs+=Date.now()-startT;document.getElementById('tms').textContent=(totalMs/1000).toFixed(1)+'s';}}});
cv.addEventListener('touchstart',e=>{e.preventDefault();squeezing=true;startT=Date.now();count++;document.getElementById('cnt').textContent=count;});
cv.addEventListener('touchend',e=>{e.preventDefault();squeezing=false;if(startT){totalMs+=Date.now()-startT;document.getElementById('tms').textContent=(totalMs/1000).toFixed(1)+'s';}});
function resetStats(){count=0;totalMs=0;startT=0;document.getElementById('cnt').textContent='0';document.getElementById('tms').textContent='0.0s';}
loop();
</script>
</body>
</html>
