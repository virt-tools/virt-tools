<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="/assets/theme-init.js"></script>
<title>Reversi — Virtual Tools</title>
<link rel="stylesheet" href="/assets/style.css">
<style>
.tool-wrap{max-width:520px;margin:0 auto;text-align:center;}
.tool-desc{opacity:.7;font-size:14px;margin-bottom:8px;}
#board{display:inline-grid;grid-template-columns:repeat(8,50px);grid-template-rows:repeat(8,50px);gap:1px;background:#333;border:3px solid #333;margin:12px auto;}
.cell{width:50px;height:50px;background:#1b5e20;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.cell.valid{box-shadow:inset 0 0 0 3px rgba(52,152,219,.5);}
.cell.valid:hover{background:#2e7d32;}
.piece{width:38px;height:38px;border-radius:50%;transition:transform .2s;}
.piece.black{background:#111;}
.piece.white{background:#f5f5f5;border:1px solid #aaa;}
.controls{display:flex;gap:8px;justify-content:center;margin:12px 0;flex-wrap:wrap;}
.controls button{padding:6px 16px;border-radius:6px;border:1px solid var(--border,#2a2f3a);background:var(--bg-alt,#1a1f2e);color:var(--text,#e0e0e0);cursor:pointer;font-size:14px;}
.info{display:flex;gap:20px;justify-content:center;margin:8px 0;font-size:16px;}
.score-dot{display:inline-block;width:14px;height:14px;border-radius:50%;vertical-align:middle;margin-right:4px;}
.score-dot.black{background:#111;}.score-dot.white{background:#f5f5f5;border:1px solid #aaa;}
#msg{font-size:14px;min-height:20px;font-weight:600;}
.mode select{padding:4px 8px;border-radius:4px;font-size:14px;}
</style>
</head>
<body>
<header id="site-header"></header>
<main>
<div class="tool-wrap">
<h1>Reversi (Othello)</h1>
<p class="tool-desc">Classic 8×8 strategy game. Place a piece to flank opponent's pieces and flip them. Most pieces wins. Play vs AI or 2-player.</p>
<div class="info"><span><span class="score-dot black"></span>Black: <b id="bScore">2</b></span><span><span class="score-dot white"></span>White: <b id="wScore">2</b></span></div>
<div class="mode"><select id="modeSel" onchange="newGame()"><option value="ai">vs AI (you=Black)</option><option value="2p">2 Player</option></select></div>
<div id="board"></div>
<div class="controls"><button onclick="newGame()">New Game</button></div>
<div id="msg"></div>
</div>
</main>
<script src="/assets/app.js"></script>
<script>
const N=8;let board=[],player=1,mode='ai',gameOver=false;
function newGame(){
  board=Array.from({length:N},()=>Array(N).fill(0));
  board[3][3]=2;board[3][4]=1;board[4][3]=1;board[4][4]=2;
  player=1;gameOver=false;mode=document.getElementById('modeSel').value;
  document.getElementById('msg').textContent='';render();
}
function inBounds(r,c){return r>=0&&r<N&&c>=0&&c<N;}
function flips(r,c,p){
  if(board[r][c]!==0)return [];
  const opp=p===1?2:1;const all=[];
  for(let dr=-1;dr<=1;dr++)for(let dc=-1;dc<=1;dc++){
    if(!dr&&!dc)continue;let line=[];
    let nr=r+dr,nc=c+dc;
    while(inBounds(nr,nc)&&board[nr][nc]===opp){line.push([nr,nc]);nr+=dr;nc+=dc;}
    if(inBounds(nr,nc)&&board[nr][nc]===p&&line.length)all.push(...line);
  }
  return all;
}
function validMoves(p){
  const m=[];for(let r=0;r<N;r++)for(let c=0;c<N;c++)if(board[r][c]===0&&flips(r,c,p).length)m.push([r,c]);return m;
}
function render(){
  const el=document.getElementById('board');el.innerHTML='';
  const vm=mode==='ai'&&player===2?[]:validMoves(player);
  let bs=0,ws=0;
  for(let r=0;r<N;r++)for(let c=0;c<N;c++){
    const cell=document.createElement('div');cell.className='cell';
    if(board[r][c]===0&&vm.some(m=>m[0]===r&&m[1]===c))cell.classList.add('valid');
    cell.onclick=()=>play(r,c);
    if(board[r][c]){const p=document.createElement('div');p.className='piece '+(board[r][c]===1?'black':'white');cell.appendChild(p);if(board[r][c]===1)bs++;else ws++;}
    el.appendChild(cell);
  }
  document.getElementById('bScore').textContent=bs;
  document.getElementById('wScore').textContent=ws;
  if(!gameOver){
    if(bs+ws===64||validMoves(1).length===0&&validMoves(2).length===0){
      gameOver=true;
      document.getElementById('msg').textContent=bs>ws?'Black wins! 🎉':ws>bs?'White wins! 🎉':"It's a tie!";
    }else if(validMoves(player).length===0){
      document.getElementById('msg').textContent=(player===1?'Black':'White')+' has no moves — pass.';
      player=player===1?2:1;render();return;
    }
  }
}
function play(r,c){
  if(gameOver)return;
  if(mode==='ai'&&player===2)return;
  const fl=flips(r,c,player);
  if(!fl.length)return;
  board[r][c]=player;fl.forEach(([fr,fc])=>board[fr][fc]=player);
  player=player===1?2:1;render();
  if(mode==='ai'&&!gameOver&&player===2)setTimeout(aiMove,400);
}
function aiMove(){
  const moves=validMoves(2);
  if(!moves.length){player=1;render();return;}
  let best=moves[0],bestScore=-1;
  for(const [r,c] of moves){
    const s=flips(r,c,2).length+(r===0||r===7?3:0)+(c===0||c===7?3:0);
    if(s>bestScore){bestScore=s;best=[r,c];}
  }
  const fl=flips(best[0],best[1],2);
  board[best[0]][best[1]]=2;fl.forEach(([fr,fc])=>board[fr][fc]=2);
  player=1;render();
}
newGame();
</script>
</body>
</html>
