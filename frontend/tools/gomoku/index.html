<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="/assets/theme-init.js"></script>
<title>Gomoku — Virtual Tools</title>
<link rel="stylesheet" href="/assets/style.css">
<style>
.tool-wrap{max-width:540px;margin:0 auto;text-align:center;}
.tool-desc{opacity:.7;font-size:14px;margin-bottom:8px;}
#board{display:inline-grid;grid-template-columns:repeat(15,32px);grid-template-rows:repeat(15,32px);gap:0;background:#dc9;border:3px solid #865;padding:6px;margin:12px auto;}
.cell{width:32px;height:32px;position:relative;cursor:pointer;}
.cell:hover .preview{opacity:.4;}
.stone{position:absolute;width:26px;height:26px;border-radius:50%;top:3px;left:3px;}
.stone.b{background:radial-gradient(circle at 35% 35%,#555,#000);}.stone.w{background:radial-gradient(circle at 35% 35%,#fff,#ccc);}
.preview{opacity:0;}
.controls{display:flex;gap:8px;justify-content:center;margin:12px 0;flex-wrap:wrap;}
.controls button,.controls select{padding:6px 16px;border-radius:6px;border:1px solid var(--border,#2a2f3a);background:var(--bg-alt,#1a1f2e);color:var(--text,#e0e0e0);cursor:pointer;font-size:14px;}
.info{display:flex;gap:20px;justify-content:center;margin:8px 0;font-size:15px;}
#msg{font-size:16px;font-weight:700;min-height:24px;}
</style>
</head>
<body>
<header id="site-header"></header>
<main>
<div class="tool-wrap">
<h1>Gomoku</h1>
<p class="tool-desc">Five in a row wins. Black plays first. Click any intersection to place a stone.</p>
<div class="info"><span>⚫ Black</span><span>⚪ White</span><span id="turn">Black's turn</span></div>
<div class="controls"><select id="modeSel"><option value="ai">vs AI (you=Black)</option><option value="2p">2 Player</option></select><button onclick="newGame()">New Game</button><button onclick="undo()">Undo</button></div>
<div id="board"></div>
<div id="msg"></div>
</div>
</main>
<script src="/assets/app.js"></script>
<script>
const N=15;let board=[],turn=1,mode='ai',history=[],gameOver=false,lastMove=null;
function newGame(){
  board=Array.from({length:N},()=>Array(N).fill(0));turn=1;history=[];gameOver=false;lastMove=null;
  mode=document.getElementById('modeSel').value;document.getElementById('msg').textContent='';
  render();
}
function render(){
  const el=document.getElementById('board');el.innerHTML='';
  for(let r=0;r<N;r++)for(let c=0;c<N;c++){
    const cell=document.createElement('div');cell.className='cell';
    cell.onclick=()=>place(r,c);
    if(board[r][c]===1){const s=document.createElement('div');s.className='stone b';cell.appendChild(s);}
    else if(board[r][c]===2){const s=document.createElement('div');s.className='stone w';cell.appendChild(s);}
    else{const p=document.createElement('div');p.className='stone '+(turn===1?'b preview':'w preview');cell.appendChild(p);}
    if(lastMove&&lastMove[0]===r&&lastMove[1]===c){cell.style.boxShadow='inset 0 0 0 2px #e74c3c';}
    el.appendChild(cell);
  }
  document.getElementById('turn').textContent=gameOver?'':(turn===1?"Black's turn":"White's turn");
}
function place(r,c){
  if(gameOver||board[r][c]!==0)return;
  if(mode==='ai'&&turn===2)return;
  doPlace(r,c);
  if(!gameOver&&mode==='ai'&&turn===2)setTimeout(aiMove,300);
}
function doPlace(r,c){
  board[r][c]=turn;history.push([r,c,turn]);lastMove=[r,c];
  if(checkWin(r,c,turn)){gameOver=true;document.getElementById('msg').textContent=(turn===1?'⚫ Black':'⚪ White')+' wins! 🎉';render();return;}
  turn=turn===1?2:1;render();
}
function checkWin(r,c,p){
  for(const[dr,dc]of[[0,1],[1,0],[1,1],[1,-1]]){
    let count=1;
    for(let i=1;i<5;i++){const nr=r+dr*i,nc=c+dc*i;if(nr>=0&&nr<N&&nc>=0&&nc<N&&board[nr][nc]===p)count++;else break;}
    for(let i=1;i<5;i++){const nr=r-dr*i,nc=c-dc*i;if(nr>=0&&nr<N&&nc>=0&&nc<N&&board[nr][nc]===p)count++;else break;}
    if(count>=5)return true;
  }
  return false;
}
function undo(){if(history.length===0||gameOver)return;if(mode==='ai'&&history.length>=2){history.pop();history.pop();}else{history.pop();}
  board=Array.from({length:N},()=>Array(N).fill(0));for(const[r,c,p]of history)board[r][c]=p;
  turn=history.length%2===0?1:2;lastMove=history.length?history[history.length-1]:null;render();
}
function aiMove(){
  let best=null,bestScore=-1;
  for(let r=0;r<N;r++)for(let c=0;c<N;c++){
    if(board[r][c]!==0)continue;
    if(!hasNeighbor(r,c,2))continue;
    const s=evalPos(r,c,2)*1.0+evalPos(r,c,1)*0.9;
    if(s>bestScore){bestScore=s;best=[r,c];}
  }
  if(!best){best=[7,7];}
  doPlace(best[0],best[1]);
}
function hasNeighbor(r,c,d){for(let dr=-d;dr<=d;dr++)for(let dc=-d;dc<=d;dc++){if(!dr&&!dc)continue;const nr=r+dr,nc=c+dc;if(nr>=0&&nr<N&&nc>=0&&nc<N&&board[nr][nc]!==0)return true;}return false;}
function evalPos(r,c,p){
  let score=0;
  for(const[dr,dc]of[[0,1],[1,0],[1,1],[1,-1]]){
    let line=0;for(let i=-4;i<=4;i++){const nr=r+dr*i,nc=c+dc*i;if(nr>=0&&nr<N&&nc>=0&&nc<N&&board[nr][nc]===p)line++;}
    score+=line*line;
  }
  return score;
}
newGame();
</script>
</body>
</html>
