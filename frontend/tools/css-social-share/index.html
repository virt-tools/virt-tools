<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CSS Social Share Buttons Generator — virt.tools</title>
<link rel="stylesheet" href="/assets/style.css">
<style>
.tool-area{max-width:900px;margin:2rem auto;padding:0 1rem}
.controls{display:grid;gap:1rem;margin:1.5rem 0;padding:1.5rem;background:#1a1a2e;border-radius:12px}
.ctrl-row{display:flex;gap:1rem;align-items:center;flex-wrap:wrap;margin-bottom:.5rem}
.ctrl-row label{font-weight:600;font-size:.9rem;min-width:120px}
.ctrl-row select,.ctrl-row input{padding:.5rem;border-radius:8px;border:1px solid #444;background:#0f0f1e;color:#eee}
.preview-box{margin:1.5rem 0;border-radius:12px;min-height:120px;padding:2rem;background:#f5f5f5;display:flex;align-items:center;justify-content:center;flex-wrap:wrap;gap:.5rem}
.output-block{margin:2rem 0}
.output-block textarea{width:100%;min-height:100px;font-family:monospace;font-size:.85rem;padding:1rem;border-radius:8px;border:1px solid #444;background:#0f0f1e;color:#eee;resize:vertical}
.copy-btn{padding:.6rem 1.2rem;border:none;border-radius:8px;background:#667eea;color:#fff;cursor:pointer;font-size:.9rem;margin-top:.5rem}
h2{margin-top:2rem;font-size:1.2rem}
</style>
</head>
<body>
<header id="site-header"></header>
<main>
<div class="tool-area">
<h1>🔗 CSS Social Share Buttons Generator</h1>
<p>Create CSS social media share button bar components. 4 styles, 3 sizes, brand colors. Copy HTML+CSS.</p>
<div class="controls">
<div class="ctrl-row">
<label>Style</label><select id="style"><option value="solid" selected>Solid</option><option value="outline">Outline</option><option value="circle">Circle</option><option value="pill">Pill</option></select>
<label>Size</label><select id="size"><option value="sm">Small</option><option value="md" selected>Medium</option><option value="lg">Large</option></select>
<label>Theme</label><select id="theme"><option value="color" selected>Brand Colors</option><option value="mono">Monochrome</option><option value="dark">Dark</option></select>
</div>
<div class="ctrl-row">
<label>Platforms</label>
<label style="min-width:auto"><input type="checkbox" id="p-twitter" checked> X</label>
<label style="min-width:auto"><input type="checkbox" id="p-facebook" checked> Facebook</label>
<label style="min-width:auto"><input type="checkbox" id="p-linkedin" checked> LinkedIn</label>
<label style="min-width:auto"><input type="checkbox" id="p-reddit"> Reddit</label>
<label style="min-width:auto"><input type="checkbox" id="p-whatsapp"> WhatsApp</label>
<label style="min-width:auto"><input type="checkbox" id="p-telegram"> Telegram</label>
<label style="min-width:auto"><input type="checkbox" id="p-email"> Email</label>
</div>
<div class="ctrl-row"><button class="copy-btn" onclick="update()">Update</button></div>
</div>
<h2>Preview</h2>
<div class="preview-box" id="preview"></div>
<h2>HTML</h2><div class="output-block"><textarea id="htmlOut" readonly></textarea><button class="copy-btn" onclick="copyText('htmlOut')">Copy HTML</button></div>
<h2>CSS</h2><div class="output-block"><textarea id="cssOut" readonly></textarea><button class="copy-btn" onclick="copyText('cssOut')">Copy CSS</button></div>
</div>
</main>
<script src="/assets/app.js"></script>
<script>
var BRANDS={
twitter:{name:'X',color:'#000',icon:'𝕏'},
facebook:{name:'Facebook',color:'#1877f2',icon:'f'},
linkedin:{name:'LinkedIn',color:'#0a66c2',icon:'in'},
reddit:{name:'Reddit',color:'#ff4500',icon:'r'},
whatsapp:{name:'WhatsApp',color:'#25d366',icon:'✆'},
telegram:{name:'Telegram',color:'#0088cc',icon:'✈'},
email:{name:'Email',color:'#6b7280',icon:'✉'}
};
var SIZES={sm:{btn:'28px',font:'.7rem',pad:'.4rem .6rem'},md:{btn:'40px',font:'.85rem',pad:'.6rem 1rem'},lg:{btn:'52px',font:'1rem',pad:'.75rem 1.5rem'}};
function update(){
var style=document.getElementById('style').value;var size=document.getElementById('size').value;
var theme=document.getElementById('theme').value;
var platforms=[];['twitter','facebook','linkedin','reddit','whatsapp','telegram','email'].forEach(function(p){
if(document.getElementById('p-'+p).checked)platforms.push(p);
});
if(platforms.length===0)platforms=['twitter','facebook','linkedin'];
var s=SIZES[size];
var html='<div class="share-bar share-'+style+' share-'+size+' share-'+theme+'">\n';
platforms.forEach(function(p){
var b=BRANDS[p];
html+='  <a href="#" class="share-btn share-'+p+'" aria-label="Share on '+b.name+'">\n    <span class="share-icon">'+b.icon+'</span>'+(style==='pill'?'    <span class="share-label">'+b.name+'</span>\n':'\n')+'  </a>\n';
});
html+='</div>';
var css='.share-bar{display:flex;gap:.5rem;flex-wrap:wrap;align-items:center}\n'+
'.share-btn{display:inline-flex;align-items:center;justify-content:center;width:'+(style==='circle'||style==='solid'?s.btn:'auto')+';height:'+s.btn+';border-radius:'+(style==='circle'?'50%':style==='pill'?'999px':'8px')+';text-decoration:none;font-family:system-ui,sans-serif;font-size:'+s.font+';font-weight:700;transition:transform .2s,opacity .2s;cursor:pointer;padding:'+(style==='circle'?'0':s.pad)+'}\n'+
'.share-btn:hover{transform:translateY(-2px);opacity:.85}\n'+
'.share-icon{display:flex;align-items:center;justify-content:center}\n'+
'.share-label{margin-left:.5rem}\n';
if(theme==='color'){
platforms.forEach(function(p){css+='.share-'+p+'{background:'+BRANDS[p].color+';color:#fff;border:none}\n'});
css+='.share-outline .share-'+platforms[0]+'{background:transparent;border:2px solid '+BRANDS[platforms[0]].color+';color:'+BRANDS[platforms[0]].color+'}\n';
}else if(theme==='mono'){
css+='.share-btn{background:#333;color:#fff;border:none}\n.share-outline .share-btn{background:transparent;border:2px solid #333;color:#333}\n';
}else{
css+='.share-btn{background:#1a1a2e;color:#fff;border:1px solid #333}\n.share-outline .share-btn{background:transparent;border:2px solid #555;color:#ccc}\n';
}
css+='.share-outline .share-btn{background:transparent}\n';
document.getElementById('htmlOut').value=html;
document.getElementById('cssOut').value=css;
renderPreview(platforms,style,size,theme);
}
function renderPreview(platforms,style,size,theme){
var s=SIZES[size];
var h='<div style="display:flex;gap:.5rem;flex-wrap:wrap;align-items:center">';
platforms.forEach(function(p){
var b=BRANDS[p];
var bg=theme==='color'?b.color:theme==='mono'?'#333':'#1a1a2e';
var col=theme==='mono'?'#fff':'#fff';
var border=style==='outline'?'2px solid '+bg:'none';
var bgStyle=style==='outline'?'transparent':bg;
var txtCol=style==='outline'?bg:col;
h+='<a href="#" style="display:inline-flex;align-items:center;justify-content:center;width:'+(style==='circle'||style==='solid'?s.btn:'auto')+';height:'+s.btn+';border-radius:'+(style==='circle'?'50%':style==='pill'?'999px':'8px')+';text-decoration:none;font-family:system-ui,sans-serif;font-size:'+s.font+';font-weight:700;padding:'+(style==='circle'?'0':s.pad)+';background:'+bgStyle+';color:'+txtCol+';border:'+border+';transition:all .2s;cursor:pointer">';
h+='<span>'+b.icon+'</span>';
if(style==='pill')h+='<span style="margin-left:.5rem">'+b.name+'</span>';
h+='</a>';
});
h+='</div>';
document.getElementById('preview').innerHTML=h;
}
function copyText(id){var t=document.getElementById(id);t.select();document.execCommand('copy')}
document.getElementById('style').addEventListener('change',update);
document.getElementById('size').addEventListener('change',update);
document.getElementById('theme').addEventListener('change',update);
['twitter','facebook','linkedin','reddit','whatsapp','telegram','email'].forEach(function(p){
document.getElementById('p-'+p).addEventListener('change',update);
});
update();
</script>
</body>
</html>
