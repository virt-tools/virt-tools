<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="/assets/theme-init.js"></script>
<title>Mad Libs — Virtual Tools</title>
<link rel="stylesheet" href="/assets/style.css">
<style>
.tool-wrap{max-width:600px;margin:0 auto;}
.story-select{padding:8px 12px;border-radius:8px;border:1px solid var(--border,#333);background:var(--bg-alt,#1a1f2e);color:var(--text,#e0e0e0);font-size:16px;width:100%;margin:10px 0;box-sizing:border-box;}
.inputs{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:15px 0;}
.input-field{display:flex;flex-direction:column;}
.input-field label{font-size:13px;margin:4px 0;}
.input-field input{padding:8px;border-radius:6px;border:1px solid var(--border,#333);background:var(--bg,#0d1117);color:var(--text,#e0e0e0);font-size:14px;box-sizing:border-box;}
.gen-btn{padding:12px 24px;border-radius:8px;border:none;background:#1565c0;color:#fff;cursor:pointer;font-size:16px;margin:10px 0;}
.gen-btn:disabled{opacity:.5;}
.result{background:var(--bg-alt,#1a1f2e);border-radius:10px;padding:20px;margin:15px 0;font-size:16px;line-height:1.6;border:1px solid var(--border,#333);}
.result .blank{color:#1565c0;font-weight:bold;}
.again-btn{padding:8px 18px;border-radius:6px;border:1px solid var(--border,#333);background:var(--bg-alt);color:var(--text);cursor:pointer;font-size:14px;margin:5px;}
</style>
</head>
<body>
<header id="site-header"></header>
<main>
<div class="tool-wrap">
<h1>Mad Libs</h1>
<p class="tool-desc">Fill in the blanks with words to create hilarious stories. 8 story templates. Your words are highlighted in blue. All client-side — your stories never leave your device.</p>

<select class="story-select" id="storySelect" onchange="loadStory()"></select>
<div class="inputs" id="inputs"></div>
<button class="gen-btn" onclick="generate()" id="genBtn">Generate Story</button>
<div id="resultDiv" style="display:none;">
<div class="result" id="resultText"></div>
<button class="again-btn" onclick="reset()">Play Again</button>
<button class="again-btn" onclick="copyResult()">Copy</button>
</div>
</div>
</main>
<script src="/assets/app.js"></script>
<script>
const STORIES=[
{title:"A Day at the Beach",blanks:["adjective","noun","verb (past tense)","adjective","plural noun","verb","adjective","noun"],
template:"One {adj1} summer day, I went to the beach with my {noun1}. I {verb1} in the sand and built a {adj2} castle. Suddenly, a flock of {plural1} flew overhead, making me {verb2}. I grabbed my {adj3} {noun2} and ran to the water to cool off."},
{title:"The Haunted House",blanks:["adjective","plural noun","verb (past tense)","body part","adjective","noun","adverb","adjective"],
template:"I was walking through a {adj1} forest when I stumbled upon an old house. The {plural1} on the porch were creaking. I {verb1} inside and felt a chill down my {body1}. The {adj2} walls were covered in cobwebs. A {noun1} fell from the ceiling, and I screamed {adv1} as I ran back into the {adj3} night."},
{title:"Space Adventure",blanks:["adjective","noun","number","verb","adjective","plural noun","planet name","emotion"],
template:"Captain {adj1} {noun1} boarded the starship with a crew of {num1} brave astronauts. They {verb1} through the galaxy, dodging {adj2} asteroids and {plural1}. Finally, they landed on {planet1}, where they felt overwhelming {emotion1} at the sight of alien sunsets."},
{title:"The Job Interview",blanks:["adjective","job title","verb (past tense)","silly word","adjective","plural noun","adverb","noun"],
template:"I walked into the {adj1} office for my interview as a {job1}. I {verb1} confidently and said '{silly1}!' The manager raised an eyebrow but seemed {adj2}. 'Tell me about your experience with {plural1},' she said. I answered {adv1} and showed her my {noun1}. I got the job!"},
{title:"A Strange Pet",blanks:["animal","adjective","verb","noun","silly sound","adjective","food","plural noun"],
template:"Yesterday I adopted a {animal1} from the shelter. It was very {adj1} and loved to {verb1} on my {noun1}. Every morning it made a {sound1} noise. I named it Sir Fluffington. It only eats {adj2} {food1} and collects {plural1} under the couch."},
{title:"The Cooking Disaster",blanks:["adjective","ingredient","verb (past tense)","kitchen tool","adjective","plural noun","temperature","exclamation"],
template:"I decided to cook a {adj1} meal using {ingredient1} as the main ingredient. I {verb1} it with a {tool1} and added some {adj2} spices. But then the {plural1} caught fire! I turned the oven to {temp1} degrees and yelled '{exclaim1}!' We ordered pizza instead."},
{title:"Superhero Origin",blanks:["adjective","superpower","city","verb","animal","adjective","villain name","catchphrase"],
template:"After being bitten by a radioactive {animal1}, I gained the power of {power1}. I became the {adj1} guardian of {city1}. I would {verb1} through the skies, fighting {adj2} criminals. My nemesis was Dr. {villain1}, and I always defeated them with my catchphrase: '{phrase1}!'"},
{title:"The Worst Date",blanks:["adjective","restaurant name","verb (past tense)","silly word","adjective","body part","noun","adverb"],
template:"My date took me to a {adj1} place called {rest1}. I {verb1} on my chair and nervously said '{silly1}.' The waiter was {adj2} and spilled soup on my {body1}. My date pulled out a {noun1} and started talking about stamps. I left {adv1} and never called back."}
];

let currentStory=0;
function loadStory(){
currentStory=+document.getElementById('storySelect').value;
const s=STORIES[currentStory];
const div=document.getElementById('inputs');
div.innerHTML='';
s.blanks.forEach((b,i)=>{
const f=document.createElement('div');f.className='input-field';
f.innerHTML=`<label>${b}</label><input type="text" id="w${i}" placeholder="${b}">`;
div.appendChild(f);
});
document.getElementById('resultDiv').style.display='none';
document.getElementById('genBtn').disabled=false;
}

function generate(){
const s=STORIES[currentStory];
const words=[];let allFilled=true;
s.blanks.forEach((b,i)=>{
const v=document.getElementById('w'+i).value.trim();
if(!v)allFilled=false;
words.push(v||'___');
});
let story=s.template;
const vars=['adj1','noun1','verb1','adj2','plural1','verb2','adj3','noun2','body1','adv1','num1','planet1','emotion1','job1','silly1','tool1','animal1','sound1','food1','ingredient1','rest1','power1','city1','villain1','phrase1','exclaim1','temp1'];
let vi=0;
story=story.replace(/\{(\w+)\}/g,(m,name)=>{
const idx=vars.indexOf(name);
if(idx>=0&&idx<words.length)return `<span class="blank">${words[idx]}</span>`;
return m;
});
document.getElementById('resultText').innerHTML=story;
document.getElementById('resultDiv').style.display='block';
document.getElementById('genBtn').disabled=true;
}

function reset(){document.querySelectorAll('.inputs input').forEach(i=>i.value='');document.getElementById('resultDiv').style.display='none';document.getElementById('genBtn').disabled=false;}

function copyResult(){const t=document.getElementById('resultText').innerText;navigator.clipboard.writeText(t);}

function init(){
const sel=document.getElementById('storySelect');
STORIES.forEach((s,i)=>{const o=document.createElement('option');o.value=i;o.textContent=s.title;sel.appendChild(o);});
loadStory();
}
VT.ready(init);
</script>
</body>
</html>
