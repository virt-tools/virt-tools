<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CSS Flag Badge Generator — virt.tools</title>
<link rel="stylesheet" href="/assets/style.css">
<style>
.tool-area{max-width:900px;margin:2rem auto;padding:0 1rem}
.controls{display:grid;gap:1rem;margin:1.5rem 0;padding:1.5rem;background:#1a1a2e;border-radius:12px}
.ctrl-row{display:flex;gap:1rem;align-items:center;flex-wrap:wrap;margin-bottom:.5rem}
.ctrl-row label{font-weight:600;font-size:.9rem;min-width:120px}
.ctrl-row select,.ctrl-row input{padding:.5rem;border-radius:8px;border:1px solid #444;background:#0f0f1e;color:#eee}
.preview-box{margin:1.5rem 0;border-radius:12px;padding:2rem;background:#111;min-height:200px;display:flex;gap:1rem;flex-wrap:wrap;align-items:center}
.output-block{margin:2rem 0}
.output-block textarea{width:100%;min-height:80px;font-family:monospace;font-size:.85rem;padding:1rem;border-radius:8px;border:1px solid #444;background:#0f0f1e;color:#eee;resize:vertical}
.copy-btn{padding:.6rem 1.2rem;border:none;border-radius:8px;background:#667eea;color:#fff;cursor:pointer;font-size:.9rem;margin-top:.5rem}
h2{margin-top:2rem;font-size:1.2rem}
</style>
</head>
<body>
<header id="site-header"></header>
<main>
<div class="tool-area">
<h1>🚩 CSS Flag Badge Generator</h1>
<p>Create CSS country flag badge components using pure CSS gradients. 6 styles, 3 sizes. Copy HTML+CSS.</p>
<div class="controls">
<div class="ctrl-row">
<label>Country</label><select id="country"><option value="us">🇺🇸 USA</option><option value="gb">🇬🇧 UK</option><option value="fr">🇫🇷 France</option><option value="de">🇩🇪 Germany</option><option value="jp">🇯🇵 Japan</option><option value="br">🇧🇷 Brazil</option><option value="ca">🇨🇦 Canada</option><option value="it">🇮🇹 Italy</option><option value="es">🇪🇸 Spain</option><option value="ie">🇮🇪 Ireland</option></select>
<label>Style</label><select id="style"><option value="rounded">Rounded</option><option value="square">Square</option><option value="circle">Circle</option><option value="wavy">Wavy</option><option value="pill">Pill</option><option value="shield">Shield</option></select>
<label>Size</label><select id="size"><option value="sm">Small</option><option value="md" selected>Medium</option><option value="lg">Large</option></select>
</div>
<div class="ctrl-row"><button class="copy-btn" onclick="update()">Update</button></div>
</div>
<h2>Preview</h2>
<div class="preview-box" id="preview"></div>
<h2>HTML</h2><div class="output-block"><textarea id="htmlOut" readonly></textarea><button class="copy-btn" onclick="copyText('htmlOut')">Copy HTML</button></div>
<h2>CSS</h2><div class="output-block"><textarea id="cssOut" readonly></textarea><button class="copy-btn" onclick="copyText('cssOut')">Copy CSS</button></div>
</div>
</main>
<script src="/assets/app.js"></script>
<script>
var flags={
us:{type:'stripes-h',colors:['#b22234','#fff'],stripes:13,canton:{color:'#3c3b6e',w:'60%',h:'53%'}},
gb:{type:'cross',bg:'#012169',cross:['#fff','#c8102e']},
fr:{type:'vertical',colors:['#0055a4','#fff','#ef4135']},
de:{type:'horizontal',colors:['#000','#dd0000','#ffce00']},
jp:{type:'circle',bg:'#fff',disc:'#bc002d'},
br:{type:'complex',bg:'#009c3b',disc:'#ffdf00',band:'#002776'},
ca:{type:'vertical',colors:['#ff0000','#fff','#ff0000'],leaf:'#ff0000'},
it:{type:'vertical',colors:['#009246','#fff','#ce2b37']},
es:{type:'horizontal',colors:['#c60b1e','#ffc400','#c60b1e']},
ie:{type:'vertical',colors:['#169b62','#fff','#ff883e']}
};
var sizeMap={sm:{w:24,h:16},md:{w:40,h:28},lg:{w:64,h:44}};
var styleMap={rounded:'border-radius:6px',square:'border-radius:0',circle:'border-radius:50%',wavy:'border-radius:4px 4px 50% 50%',pill:'border-radius:14px',shield:'border-radius:0 0 6px 6px;clip-path:polygon(0 0,100% 0,100% 70%,50% 100%,0 70%)'};
function buildCSS(country,style,size){
var f=flags[country];var s=sizeMap[size];var st=styleMap[style];var parts=[];
if(f.type==='horizontal'){var seg=Math.floor(100/f.colors.length);var bg='linear-gradient(to bottom';f.colors.forEach(function(c,i){var p=i*seg;bg+=','+c+' '+p+'%,'+c+' '+(p+seg)+'%'});bg+=')';return '.flag-badge{width:'+s.w+'px;height:'+s.h+'px;background:'+bg+';'+st+';display:inline-block;border:1px solid rgba(0,0,0,.2)}'}
if(f.type==='vertical'){var seg=Math.floor(100/f.colors.length);var bg='linear-gradient(to right';f.colors.forEach(function(c,i){var p=i*seg;bg+=','+c+' '+p+'%,'+c+' '+(p+seg)+'%'});bg+=')';return '.flag-badge{width:'+s.w+'px;height:'+s.h+'px;background:'+bg+';'+st+';display:inline-block;border:1px solid rgba(0,0,0,.2)}'}
if(f.type==='circle'){return '.flag-badge{width:'+s.w+'px;height:'+s.h+'px;background:'+f.bg+';'+st+';display:inline-flex;align-items:center;justify-content:center;border:1px solid rgba(0,0,0,.2);position:relative}\n.flag-badge::after{content:"";width:'+Math.floor(s.h*0.6)+'px;height:'+Math.floor(s.h*0.6)+'px;border-radius:50%;background:'+(f.disc||f.leaf)+'}'}
return '.flag-badge{width:'+s.w+'px;height:'+s.h+'px;background:'+(f.bg||'#ccc')+';'+st+';display:inline-block;border:1px solid rgba(0,0,0,.2)}'
}
function update(){
var c=document.getElementById('country').value;var st=document.getElementById('style').value;var sz=document.getElementById('size').value;
var css=buildCSS(c,st,sz);var html='<span class="flag-badge"></span>';
document.getElementById('htmlOut').value=html;document.getElementById('cssOut').value=css;
document.getElementById('preview').innerHTML='<style>'+css+'</style>'+html;
}
function copyText(id){var t=document.getElementById(id);t.select();document.execCommand('copy')}
['country','style','size'].forEach(function(id){document.getElementById(id).addEventListener('change',update)});
update();
</script>
</body>
</html>
