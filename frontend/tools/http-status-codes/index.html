<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <script src="/assets/theme-init.js"></script>
  <title>HTTP Status Code Reference — Virtual Tools</title>
  <link rel="stylesheet" href="/assets/style.css">
  <style>
    .http-table { width:100%; border-collapse:collapse; font-size:14px; }
    .http-table th, .http-table td { text-align:left; padding:6px 8px; border-bottom:1px solid var(--border, #333); vertical-align:top; }
    .http-table th { font-weight:600; opacity:.7; }
    .http-table code { font-family:monospace; font-weight:600; }
    .http-cat { display:inline-block; padding:1px 6px; border-radius:4px; font-size:12px; }
    .cat-1 { background:#1e3a5f; color:#9cc3ff; }
    .cat-2 { background:#1e3f2a; color:#7be08a; }
    .cat-3 { background:#3a3a1e; color:#e0d77b; }
    .cat-4 { background:#3f2a1e; color:#e0a07b; }
    .cat-5 { background:#3f1e1e; color:#e08a8a; }
    .http-empty { padding:16px; opacity:.6; }
  </style>
</head>
<body>
  <div id="site-header"></div>
  <main>
    <div class="tool-header">
      <a class="back" href="/">← All tools</a>
      <h1>HTTP Status Code Reference</h1>
      <p>Look up any HTTP response status code — by number (e.g. <code>404</code>, <code>503</code>) or by name. Static reference, runs entirely in your browser.</p>
    </div>

    <div class="panel">
      <div class="field">
        <label for="q">Search code or meaning</label>
        <input id="q" type="text" placeholder="404, Not Found, gateway…" autocomplete="off">
      </div>
      <div class="spacer"></div>
      <div id="results"></div>
      <p class="note" id="note">Showing all RFC and common status codes. Start typing to filter.</p>
    </div>
  </main>

  <script src="/assets/app.js"></script>
  <script>
  (function () {
    // [code, reason, category(1-5), description]
    var CODES = [
      [100,"Continue",1,"Client may proceed with the request body."],
      [101,"Switching Protocols",1,"Server is switching protocols per the Upgrade header."],
      [102,"Processing",1,"Server received the request and is processing it (WebDAV)."],
      [103,"Early Hints",1,"Preload hints before the final response."],
      [200,"OK",2,"Standard success — request succeeded."],
      [201,"Created",2,"Resource created; a Location header often points to it."],
      [202,"Accepted",2,"Request accepted for processing, not yet complete."],
      [203,"Non-Authoritative Information",2,"Returned info is from a transforming proxy."],
      [204,"No Content",2,"Success, no body returned."],
      [205,"Reset Content",2,"Client should reset the document view."],
      [206,"Partial Content",2,"Server delivered a byte range (Range request)."],
      [207,"Multi-Status",2,"Multiple statuses in one XML body (WebDAV)."],
      [208,"Already Reported",2,"Members already reported in a prior part (WebDAV)."],
      [226,"IM Used",2,"Instance manipulation used (Delta encoding)."],
      [300,"Multiple Choices",3,"More than one possible resource; client picks."],
      [301,"Moved Permanently",3,"Resource has a new permanent URI; update bookmarks."],
      [302,"Found",3,"Temporary redirect to another URI."],
      [303,"See Other",3,"Fetch the response at another URI via GET."],
      [304,"Not Modified",3,"Cached version is still valid; no body sent."],
      [305,"Use Proxy",3,"Deprecated — access via a specified proxy."],
      [307,"Temporary Redirect",3,"Redirect to another URI, preserving the method."],
      [308,"Permanent Redirect",3,"Permanent redirect, preserving the method."],
      [400,"Bad Request",4,"Malformed syntax; the server will not process it."],
      [401,"Unauthorized",4,"Authentication required and not provided."],
      [402,"Payment Required",4,"Reserved for future use (payment)."],
      [403,"Forbidden",4,"Server understood but refuses to authorize."],
      [404,"Not Found",4,"No resource found at the requested URI."],
      [405,"Method Not Allowed",4,"HTTP method is not allowed for this resource."],
      [406,"Not Acceptable",4,"No content acceptable per Accept headers."],
      [407,"Proxy Authentication Required",4,"Authenticate with the proxy first."],
      [408,"Request Timeout",4,"Client did not produce a request in time."],
      [409,"Conflict",4,"Request conflicts with the current resource state."],
      [410,"Gone",4,"Resource is gone with no forwarding address."],
      [411,"Length Required",4,"Content-Length header is required."],
      [412,"Precondition Failed",4,"A precondition header evaluated false."],
      [413,"Content Too Large",4,"Payload exceeds the server's limits."],
      [414,"URI Too Long",4,"The requested URI is too long."],
      [415,"Unsupported Media Type",4,"Content-Type is not supported."],
      [416,"Range Not Satisfiable",4,"Requested byte range cannot be served."],
      [417,"Expectation Failed",4,"Expect header could not be met."],
      [418,"I'm a teapot",4,"RFC 2324 joke; cannot brew coffee with a teapot."],
      [421,"Misdirected Request",4,"Request sent to a server that cannot respond."],
      [422,"Unprocessable Content",4,"Well-formed but semantically invalid (WebDAV)."],
      [423,"Locked",4,"Resource is locked (WebDAV)."],
      [424,"Failed Dependency",4,"A dependent request failed (WebDAV)."],
      [425,"Too Early",4,"Replay of a secure request was rejected."],
      [426,"Upgrade Required",4,"Client must switch to a different protocol."],
      [428,"Precondition Required",4,"Server requires a precondition header."],
      [429,"Too Many Requests",4,"Rate limit exceeded."],
      [431,"Request Header Fields Too Large",4,"Headers exceed the server's limits."],
      [451,"Unavailable For Legal Reasons",4,"Blocked for legal reasons (censorship)."],
      [500,"Internal Server Error",5,"Server error — generic failure."],
      [501,"Not Implemented",5,"Server does not support the functionality."],
      [502,"Bad Gateway",5,"Upstream server returned an invalid response."],
      [503,"Service Unavailable",5,"Server is down for maintenance or overload."],
      [504,"Gateway Timeout",5,"Upstream server timed out."],
      [505,"HTTP Version Not Supported",5,"Server does not support that HTTP version."],
      [506,"Variant Also Negotiates",5,"Transparent content negotiation error."],
      [507,"Insufficient Storage",5,"No room to store the resource (WebDAV)."],
      [508,"Loop Detected",5,"Infinite loop in WebDAV binding."],
      [510,"Not Extended",5,"Further extensions are required."],
      [511,"Network Authentication Required",5,"Captive portal — authenticate to access the network."]
    ];

    var qEl = document.getElementById("q");
    var results = document.getElementById("results");
    var note = document.getElementById("note");
    var CATS = {1:"1xx Informational",2:"2xx Success",3:"3xx Redirection",4:"4xx Client Error",5:"5xx Server Error"};

    function esc(s) {
      return String(s).replace(/[&<>]/g, function (c) {
        return c === "&" ? "&amp;" : c === "<" ? "&lt;" : "&gt;";
      });
    }

    function render(rows) {
      if (!rows.length) {
        results.innerHTML = '<div class="http-empty">No matching status codes.</div>';
        note.textContent = "No matches for \"" + qEl.value + "\".";
        return;
      }
      var h = '<table class="http-table"><thead><tr><th>Code</th><th>Reason phrase</th><th>Class</th><th>Meaning</th></tr></thead><tbody>';
      rows.forEach(function (r) {
        h += "<tr><td><code>" + r[0] + "</code></td><td>" + esc(r[1]) + "</td>"
          + '<td><span class="http-cat cat-' + r[2] + '">' + CATS[r[2]] + "</span></td>"
          + "<td>" + esc(r[3]) + "</td></tr>";
      });
      h += "</tbody></table>";
      results.innerHTML = h;
      note.textContent = rows.length + " code" + (rows.length === 1 ? "" : "s") + " — static reference, runs locally.";
    }

    function filter() {
      var q = qEl.value.trim().toLowerCase();
      if (!q) { render(CODES); return; }
      render(CODES.filter(function (r) {
        return String(r[0]).indexOf(q) !== -1
          || r[1].toLowerCase().indexOf(q) !== -1
          || CATS[r[2]].toLowerCase().indexOf(q) !== -1
          || r[3].toLowerCase().indexOf(q) !== -1;
      }));
    }

    qEl.addEventListener("input", filter);
    filter();
  })();
  </script>
</body>
</html>
