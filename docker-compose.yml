services:
  web:
    build:
      context: .
      dockerfile: nginx/Dockerfile
    ports:
      - "8080:80"
    depends_on:
      - api
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    volumes:
      - feedback-data:/data
    environment:
      VT_FEEDBACK_DB: /data/feedback.db
    restart: unless-stopped

volumes:
  feedback-data: